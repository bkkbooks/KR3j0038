front:
  text: 容齊四筆目録卷上
  hash: sha256:18b3dab13f7b6f6e6387a31a20211a92664c3c2c4a9114552860fa55ecf51180
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_066-1a}
body:
  text: 第一卷十九則孔廟位次周三公不特置周公作金縢雲夢澤關雎不同迷癡厥撥三館祕閣亭榭立名十十錢犀舟畢仲游二書列子與佛經相參韋孟詩乖踈康衡守正西極化人詔令不可輕出戰國䇿范曅漢志繕修犯土第二卷二十則諸家經學興廢漢人姓名輕浮稱謂鬼谷子書有美堂詩張天覺小簡城狐社鼠用兵為臣下利志文不可冗趙殺鳴犢五帝官天下黃帝李法抄傳文書之誤二十八宿大觀元夕詩顔魯公帖文潞公奏除改官制待制知制誥裴行儉景陽北人重甘䉀第三卷十六則韓退之張籍書韓公稱李杜此日足可惜粉白黛黑李杜往來詩李太白怖州佐祝不勝詛吕子論學曾太皇太后中天之臺實年官年雷公炮炙論治藥捷法陳翠說燕后燕非強國水旱祈禱第四卷十五則今日官冗欒城和張安道詩和范杜蘇四公外臺祕要六枳關王荆公上書并詩左黃州表李郭詔書兩道出師杜韓用歇後語唐明皇賜二相物一百五日老杜寒山詩譽石之毒㑹合聮句第五卷十四則土木偶人饒州風俗禽畜菜茄不同伏龍肝勇怯無常趙德甫金石録韓文公薦士王勃文章吕覽引詩書藍田丞壁記錢武肅三改元黃庭換鵝宋桑林馮夷姓字第六卷十五則韓文公逸詩竇叔向詩不存用奈花事王廖兒良徒木僨表建武中元續書草駒聾蟲記李履中二事乾寧覆試進士臨海蟹圗東坡作碑銘洗兒金錢告命失故事扁字二義娑羅樹第七卷十四則天咫縣尉為少仙杜詩用受覺二字西太一宫六言由與猶同人焉廋哉久而俱化黃文江賦沈季長進言繁遏渠替戾岡文潞公平章重事考課之法廢小官受俸第八卷十七則庫路真得意失意詩狄監盧尹項韓兵書承天塔記穆護歌省試取人額通印子魚壽亭侯印茸附洽疽漏莆田荔枝雙陸不勝華元入楚師公羊用疊語文書誤一字歷代史本末賢者一言解疑譛第九卷十六則蔣魏公逸史沈慶之曹景宗詩藍尾酒歐陽公辭官南北語音不同南舟北帳魏冉罪大辨秦少游義倡姓源韻譜譽人過實作文句法書簡循習健訟之誤用史語之失文字書簡謹日更衣第十卷十七則過所露布東坡題潭帖山公啓事親王回庶官書責降考試官青蓮居士閩俗詭祕殺人冨公遷官唐藩鎮行墨勑吏部循資格五行納音五行化真錢忠懿判語王逸少為藝所纍鄂州南樓磨崖賞魚袋出處十一卷十八則京丞相轉官熙寧司農牟利文與可樂府譏議遷史常何李密詩寺監主簿溫大雅兄弟名字冊府元龜漢髙帝祖稱豐公樞密行香船名三翼東坡誨葛延之用書雲之誤張鷖譏武后濫官唐王府官猥下御史風聞唐御史遷轉定限十二卷十三則小學不講主臣景華御苑州升府而不為鎮漢唐三君知子當官營繕治歷明持仕官捷疾詞臣益輕夏英公好處神宗用人至道九老李文正兩罷相十三卷二十四則科舉之弊不可革宰執子弟廷試國𥘉救弊房元齡名字二朱詩詞金剛經四句偈四蓮華之名黑法白法多心經偈天宫寶樹白分黑分月雙閠雙踰繕那一由旬七極微塵宰相贈本生父母官執政贈三代不同唐孫處約事夏侯勝京房兩傳漢人坐語言獲罪樞密書史知州轉運使為通判范正辭治饒州榮王藏書秦杜八六子十四卷十四則祖宗親小事王居正封駮王元之論官冗梁狀元八十二歲太宗恤民潘游洪沈舞鷗游蜻郎中用資序臺諌分職正元朝士表章用兩臣字對劉夢得謝上表陳簡齊葆真詩仙傳圗志荒唐十五卷十五則徽廟朝宰輔教官掌箋奏經句全文對北郊議論討論濫賞詞尺八三給事相攻朱藏一詩蔡京輕用官職節度使改東宫環衛官宰相任怨四李杜渾脫隊歲陽歲名官稱别名十六卷十二則漢重蘇子卿昔賢為卒伍兵家貴於備豫渠陽蠻俗寄資官親王帶將仕郎郡縣用隂陽字杜畿李泌董晉嚴有翼詆坡公曹馬能收人心取蜀將帥不利李嶠楊再思
