body:
  text: 容齋五筆卷第六十二則鄱陽七談鄱陽素無圖經地志元祐六年餘干進士都頡始作七談一篇叙土風人物云張仁有篇徐濯有說顧雍有論王德璉有記而未有形於詩賦之流者因作七談其起事則命以建端先生其止語則以畢意子其一章言澹浦彭蠡山川之險勝番君之靈傑其二章言濵湖蒲魚之利膏腴七萬頃柔桑蚕繭之盛其三章言林麓木植之饒水草𬞞果之衍魚鱉禽畜之富其四章言銅冶鑄錢陶埴爲器其五章言宫寺游觀王遥仙壇呉氏潤泉叔倫戴隄其六章言鄱江之水其七章言堯山之民有陶唐之遺風凢三千餘字自謂八日而成比之太沖十稔平子十年爲無慊予偶於故簏中得之惜其不傳于世故表著於此其所引張徐王顧所著今不復存更爲可恨也經解之名晉唐至今諸儒訓釋六經否則自立佳名蓋各以百數其書曰得曰解曰章句而已若戰國迨漢則其名簡雅一曰故故者通其指義也書有夏侯解故詩有魯故后氏故韓故也毛詩故訓傳顔師古謂流俗改故訓傳爲詁字失眞耳小學有杜林蒼頡故二曰微謂釋其微指如春秋有左氏微鐸氏微張氏微虞卿微傳三曰通如洼丹易通論名爲洼君通班固白虎通應劭風俗通唐劉知幾史通韓滉春秋通凡此諸書唯白虎通風俗通僅存耳又如鄭康成作毛詩箋申明其義他書無用此字者論語之學但曰齊論魯論張侯論後來皆不然也卜筮不敬古者龜爲卜筴爲筮皆興神物以前民用其用之至嚴其奉之至敬其來之至悉其應之至精齋戒乃請問不相襲故史祝所言其驗若荅周史筮陳敬仲知其八世之後莫之與京將必代齊有國史蘇占晉伯姬之嫁而及於爲嬴敗姬惠懷之亂至䆳至賾通於神明後世浸以不然今而愈甚至以飲食峱雜之際呼日者隅坐使之占卜往往不加冠裳一門四五而責其術之不信豈有是理哉善乎班孟堅之論曰君子將有爲也將有行也問焉而以言其受命也如響及至衰世懈於齋戒而婁煩卜筮神明不應故筮瀆不告易以爲忌龜厭不告詩以爲刺謂周易之蒙卦曰初筮告再三瀆瀆則不告詩小旻之章云我龜旣厭不我告猶言卜問煩數狎嫚於龜龜靈厭之不告以道也漢世尚爾況在於今未嘗頃刻盡敬而一歸咎於滛巫瞽史其可乎哉糖霜譜糖霜之名唐以前無所見自古食蔗者始爲蔗漿宋玉招魂所謂胹鼈炰羔有柘漿是也其後爲蔗餳孫亮使黄門就中藏吏取交州獻甘蔗餳是也後又爲石蜜南中八郡志云笮甘蔗汁曝成飴謂之石蜜本草亦云煉糖和乳爲石蜜是也後又爲蔗酒唐赤土國用甘蔗作酒雜以紫瓜根是也唐太宗遣使至摩揭陁國取熬糖法即詔楊州上諸蔗榨瀋如其劑色味愈於西域遠甚然只是今之沙糖蔗之技盡於此不言作霜然則糖霜非古也歷世詩入摸竒寫異亦無一章一句言之唯東坡公過金山寺作詩送遂寧僧圎寳云涪江與中泠共此一味水冰盤薦琥珀何似糖霜美黄魯直在戎州作頌荅梓州雍熈長老寄糖霜云遠寄蔗霜知有味勝於崔子水晶鹽正宗掃地從誰說我舌猶能及鼻尖則遂寧糖霜見於文字者實始二公甘蔗所在皆植獨福唐四明番禺廣漢遂寜有糖氷而遂寧爲冠四郡所産甚微而顆碎色淺味薄纔比遂之最下者亦皆起於近世唐大曆中有鄒和尚者始來小溪之繖山教民黄氏以造霜之法繖山在縣北二十里山前後爲蔗田者十之四糖霜戸十之三蔗有四色曰杜蔗曰西蔗曰芀蔗本草所謂荻蔗也曰紅蔗本草崑崙蔗也紅蔗止堪生噉芀蔗可作沙糖西蔗可作霜色淺土人不甚貴杜蔗紫嫰味極厚專用作霜凡蔗最困地力今年爲蔗田者明年改鍾五榖以息之霜戸器用曰蔗削曰蔗鎌曰蔗凳曰蔗碾曰榨斗曰榨牀曰漆甕各有制度凡霜一甕中品色亦自不同堆疊如假山者爲上團枝次之甕鑑次之小顆塊次之沙脚爲下紫爲上深琥珀次之淺黄又次之淺白爲下宣和𥘉王黼創應奉司遂寧常貢外歳别進數千斤是時所産益竒墻壁或方寸應奉司罷乃不再見當時因之大擾敗本業者居半乆而未復遂寜王灼作糖霜譜七篇且載其說予采取之以廣聞見李彦仙守陜靖康夷虜之禍忠義之士死於守城而得書史傳者如汾州之張克戩隆德之張確懷之霍安國代之史抗建寜寨之楊震震武之朱昭是已唯建炎以來士之得其死者蓋不少兹讀王灼所作李彦仙傳雖嘗具表上進然慮實録正史未曽采用謹識於此彦仙字少嚴本名孝忠其先寜州人也後徙于鞏幼有大志喜談兵習騎射所歷山川形勢必識之尚氣謹然諾非豪俠不交金人南侵郡縣募勤王軍彦仙散家貲得三千人入援京師虜圍太原李綱爲宣撫使彦仙上書切詆有司逮捕急乃易今名棄官亡命頃之復從种師中師中敗死仙走陜州守將李彌大問北事條對詳複使扼殽澠間金人再圍汴陜西范致虚緫六路兵進援仙請曰殽澠險隘難於立軍前却即衆潰矣宜分道並進伺空以岀且留半軍于陜爲善後計致虛曰如子言乃逗撓也仙曰兵輕而分正可速逹不從爭益牢致虛怒罷其職旣而敗績卒無功建炎元年四月金人屠陜州經制使王􅊛度不能支引部曲去官吏逃逸仙爲石壕尉獨如平時歸者繦屬即徙老穉入士花砦三觜石柱大通諸山拔武銳者分主之自營三觜諭衆曰虜實易與今得地利若軰堅守足矣少日虜復据陜分軍來攻有徤酋升前阜嫚罵仙單騎衝擊挾之以歸始料衆正部伍虜數萬圍三觜仙邀戰伏精兵後崦掩殺萬計奪馬三百虜解去京洛閒多爭附者勢益雄張未閱月破虜五十餘壁初虜再入陜官其土人俾招復業者人給符别之仙隂縱麾下往約日内應二年三月引兵直州南城中火起虜方備南壁而水軍自新店夜順流薄城東北蒙泉坡龍堂溝以入表裏夾攻僵尸相藉遂復陜始河東之人倡義拒虜仙約胡夜义者爲助假以㳂河提舉意不滿叛趨南原仙誘致殺之奪五千衆邵隆邵雲本其黨欲爲復讎仙因客鐫說遂來歸乗勝渡河柵中條諸山蒲解至太原皆響動乃分遺隆雲等取安邑虞鄕芮城正平解皆下之蒲幾拔㑹援至不克以功遷閤門宣贊舍人就畀陜兼安撫司公事悉裒所俘酋長護送行在上咨歎賜袍帶槍劒許直逹奏事便宜處決時闗以東獨陜在益増陴䟽塹蒐軍繕鎧廣屯田訓農耕作家素留鞏盡取至官曰吾父母妻子同城存亡矣聞者感恱各有固志十二月金酋烏魯撤拔圍陜仙背城鏖闘七日虜傷甚跳奔三年婁宿孛堇自絳移屯蒲解諜知之設伏於諸谷鼓躁横突俘馘十八婁宿僅以身免制置使王庶檄使輕軍掎角次虞鄕虜以萬甲逆石鍾谷口終日戰斬級二千遷武功大夫寧州觀察使河解同耀制置使時河東土豪密附期王師來爲應仙益治軍欲請于朝乞詔陜西諸路各助歩騎二萬㑹張浚經略處置川陜弗之許十二月婁宿衆十萬復圍陜仙夜使人隧地焚其攻具營部囂亂縱兵乗之虜稍退四年正月益生兵傅壘晝夜進攻鵝車天橋火車衝車叢進仙隨機拒敵又爲金汁礮火藥所及縻爛無遺而圍不解日慿堞須外援浚爲遣軍虜先阻雍不得進則令涇原曲端出鄜坊繞虜後端素嫉仙聲績逾已幸其敗詭託不行丁巳城䧟仙挾親軍巷戰矢集身如蝟左臂中刃不殊戰逾力遂死之并其家遇害先是虜嘗許以河南元帥及圍合復言如前約當退師仙叱曰吾寜鬼於宋安用汝冨貴爲虜惜其才必欲降之城將破先令軍中生致者予萬金仙平時弊衣同士卒及是雜羣伍中死虜不能察其爲人靣少和色有犯令雖親屬不貸諸將敗事或有他過其外屯者輙封箠遣帳下往皆祼就笞不敢出一詞當是時同華長安盡爲敵藪陜斗絶一隅初無朝家素定約束中立孤軍日與虜确但誦忠議惑勵其衆每拜君賜曁取敵金貲悉均之毛銖不入已以是精兵三萬大小二百戰皆樂爲用軍事獨裁決至郡政必問法所底闔境稱治浚承制贈彰武軍節度使建廟啇州邵雲者龍門人城破𬒳執婁宿欲命以千戸長肆詈不屈乃釘之木架上置解州東門外惡少撫其背涅文戯曰可鞘吾佩刀雲怒偃架仆之後五日磔解之至抉眼摘肝詈不絶喉斷乃巳初行刑將剸刃雲叱之失刀而斃其忠勇蓋如此姦雄疾勝已者自古姦雄得志包藏禍心窺伺神器其勢必嫉士大夫之勝已者故常持寜我負人無人負我之說若蔡伯喈之值董卓孔文舉禰正平楊德祖之值曹操嵇叔夜阮嗣宗之值司馬昭師温太眞之值王處仲謝安石孟嘉之值亘温皆可謂不幸矣伯喈堇堇脫卓手終以之隕命正平轉死於黄祖文舉覆宗德祖被戮叔夜罹東市之害嗣宗沉湎佯狂至爲勸進表以逃大咎太眞以智挫錢鳯而免其危若蹈虎尾唯謝公以高名逹識表裏至誠故温敬之重之不敢萌相窺之意然尚有爲性命忍須臾及晉祚存亡在此一行之虞孟嘉爲人夷曠冲黙名冠州里稱盛德人仕於温府歷征西參軍從事中郎長史在朝隤然仗正必不効郗超軰輕與温合然自度終不得善其去故放志酒中如龍山落㡌豈爲不自覺哉温至云人不可以無勢我乃能駕馭卿老賊於是見其肺肝矣嘉雖得全於酒幸以考終然財享年五十一蓋酒爲之累也陶淵明實其外孫傷其道悠運促悲夫俗語放錢今人出本錢以規利入俗語謂之放債又名生放予考之亦有所來漢書谷永傳云至爲人起責分利受謝顔師古注曰言富賈有錢假託其名代之爲主放與他人以取利息而共分之此放字所起也漢書多叙谷永予亡弟景何少時讀書甚精勤晝夜不釋卷不幸有心疾以至夭逝嘗見梁宏夫誦漢書即云唯谷永一人無處不有宏夫驗之於史乃服其說今五十餘年矣漫摭永諸所論建以渫予在原之思薛宣爲少府御史大夫缺永言宣簡在兩府諌大夫劉輔繋獄永同中朝臣上書救之光禄大夫鄭寛中卒永乞以師傅恩加其禮謚陳湯下獄永上䟽訟其功鴻嘉河决永言當觀水勢然後順天心而圖之成帝好鬼神方術永言皆妄人惑衆挾左道以欺罔世主宜距絶此類梁王爲有司奏禽獸行永上䟽諌止勿治淳于長初封下朝臣議永言長當封叚㑹宗復爲西域都護永憐其老復遠出手書戒之建昭雨雪燕多死永請皇后就宫令衆妾人人更進建始星孛營室永言爲後宫懷任之象彗星加之將絶繼嗣者永始日良永以易占對言酒亡節之所致次年又食永言民愁怨之所致星隕如雨永言王者失道下將叛去故星叛天而隕以見其象樓護傳言谷子雲之筆札叙傳述其論許班事許皇后傳云上采永所言以荅書其載於史者詳複如此本傳云永善言災異前後所上四十餘事蓋謂是云玉堂殿閣漢谷永對成帝問曰抑損椒房玉堂之盛寵顔師古注椒房皇后所居玉堂嬖幸之舍也按漢書李㝷傳乆汙玉堂之署注玉堂殿在未央宫翼奉䟽曰孝文帝時未央宫又無高門武臺麒麟鳯皇白虎玉堂金華之殿三輔黄圖曰未央宫有殿閣三十二椒房玉堂在其中漢宫閣記云未央宫有玉堂宣室閣又引漢書建章宫南有玉堂璧門三層臺高三十丈玉堂内殿十二門階階皆玉爲之又有玉堂神明堂二十六殿然今漢書郊祀志但云建章宫南有玉堂璧門而無它語晉灼注楊雄解謿上玉堂之句曰黄圖有大玉堂小玉堂殿而今黄圖無此文國朝太宗淳化中賜翰林玉堂之署四字其後以最下一字犯廟諱故元符中只云玉堂紹興未學士周麟之又乞高宗御書玉堂二字揭於直廬麟之跋語自有所疑巳而議者皆謂玉堂乃殿名不得以爲臣下直舍當如承明故事請曰玉堂之廬可也今翰林但扁摛文堂三字示不敢居然則其爲禁内宫殿明白有殿有閣有臺谷永以配椒房言之意當日亦嘗爲燕游之地師古直以爲嬖幸之舎與前注自相舛異大誤矣漢武帝喜殺人者漢武帝天資剛嚴聞臣下有殺人者不唯不加之罪更喜而褒稱之李廣以故將軍屏居藍田夜出至亭爲覇陵醉尉所辱居無何拜右北平太守請尉與俱至軍而斬之上書自陳謝罪上報曰將軍者國之爪牙也怒形則千里竦威振則萬物伏夫報忿除害朕之所圖於將軍也若廼免冠徒跣稽顙請罪豈朕之指哉胡建守軍正丞時監軍御史穿北軍壘垣以爲賈區建欲誅之當選士馬日御史與護軍諸校列坐堂皇上建趨至拜謁因令走卒曵御史下斬之遂上奏曰案軍法正亡屬將軍將軍有罪以聞二千石以下行法焉丞於用法疑臣謹以斬謂丞屬軍正斬御史於法有疑也制曰三王或誓於軍中欲民先成其慮也或誓於軍門之外欲民先意以待事也或將交刃而誓致民志也建又何疑焉建繇是顯名觀此二詔豈不開妄殺之路乎知人之難霍光事武帝但爲奉車都尉出則奉車入侍左古雖以小心謹飾親信𥘉未嘗少見於事也一旦位諸百寮之上使之受遺當國金日磾以胡父不降没入官養馬上因游宴見馬於造次頃刻閒異其爲人即日親近其後遂爲光副兩人皆能稱上所委然一日用四人若上官桀桑弘羊亦同時輔政幾於欲害霍光苟非昭帝之明社稷危矣則其知人之哲得失相半爲未能盡此雖帝堯之聖而以爲難也館職遷除建炎南渡稍置舘職紹興初始定制除監少丞外以著作郎佐郎祕書郎二貟校書正字通十二貟爲額倣唐瀛州十八學士之數其遷出它司非郎官即御史唯林之竒以疾王十朋以論事皆徙越府大宗正丞自乾道以後有旨須曽任知縣始得除臺察曽任郡守始得爲郎三舘之士固無有歷此者於是朝廷欲越次擢用者乃以爲將作軍器少監旋進爲監旣班在郎上則無所不可爲欲徑隮清要者則由著廷祕郎而拜左右二史不然不過兼權省郎年歳閒求一郡而去而御史之除皆歸六院矣爾後頗靳其選俟再遷寺監丞簿然後命之向時郡守召用雖自軍壘亦除郎今資淺聖輕者但得丞及司直或又再命始入省云容齋五筆卷第六終
