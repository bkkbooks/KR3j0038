body:
  text: 容齊三筆卷第十一十六則碑志不書名碑志之作本孝子慈孫欲以稱揚其父祖之功德播之當時而垂之後世當直存其名字無所避隱然東漢諸銘載其先代多只書官如淳于長夏承碑云東萊府君之孫太尉掾之中子右中郎將之弟李翊碑云牂柯太守曽孫謁者孫從事君元子之類是也自唐及本朝名人文集所志往往只稱君諱某字某至於記序之文亦然王荆公為多殆與求文揚名之旨為不相契東坡先生送路都曹詩首言乖崖公在蜀有録事參軍老病廢事公責之遂求去以詩留别所謂秋光都似宦情薄山色不如歸意農者公驚謝之曰吾過矣同僚有詩人而吾不知因留而慰薦之坡幼時聞父老言恨不問其姓名及守潁州而都曹路君以小疾求致仕誦此語留之不可乃采前人意作詩送之其詩大略云結髮空百戰市人看先封誰能搔白首抱關望夕烽則路君之賢而不遇可知矣然亦不書其名使之少獲表見又為可惜也漢文帝不用兵史記律書云高祖厭苦軍事偃武休息孝文即位將軍陳武等議曰南越朝鮮擁兵阻厄選蠕觀望宜及士民樂用征討逆黨以一封疆孝文曰朕能任衣冠念不到此㑹吕氏之亂誤居正位常戰戰栗栗恐事之不終且兵凶器雖克所願動亦耗病謂百姓逺方何今胸奴內侵邊吏無功邊民父子荷兵日久朕常為動心傷痛無日忘之願且堅邊設候結和通使休寧北陲為功多矣且無議軍故百姓無內外之繇得息肩於田畒天下富盛粟至十餘錢豫謂孝文之仁德如此與武帝黷武窮兵為霄壤不侔矣然班史略不及此事資治通鑑亦不編入使其事不甚暴白惜哉帝王諱名帝王諱名自周世始有此制然只避之於本廟中耳克昌厥後駿發爾私成王時所作詩昌發不為文武諱也宣王名誦而吉甫作誦之句正在其時厲王名胡而胡為虺蜴胡然厲矣之句在其孫幽王時小國曰胡亦自若也襄王名鄭而鄭不改封至於出居其國使者告于秦晉曰鄙在鄭地受晉文公朝而鄭伯傅王唯秦始皇以父莊襄王名楚稱楚曰荆其名曰政自避其嫌以正月為一月蓋巳非周禮矣漢代所謂邦之字曰國盈之字曰滿徹之字曰通雖但諱本字而吏民犯者有刑唐太宗名丗民在位之日不偏諱故戴胄唐儉為民部尚書虞世南李世績在韓至于高宗始改民部為戶部世績但為績諱公諱辨云今上書及詔不聞諱滸勢秉饑惟宦官宫妾乃不敢言喻及機以為觸犯此數者皆其先世嫌名也本朝尚文之習大盛故禮官討論每欲其多廟諱遂有五十字者舉埸試卷小涉疑似士人輒不敢用一或犯之往往暗行黜落方州科舉尤甚此風殆不可革然太祖諱下字內有從木從勻者廣韻於進字中亦收張魏公以名其子而音為進太宗諱字內有從耳從火者又有梗音今為人姓如故高宗諱內從包從口者亦然真宗諱從小從亘音胡登切若缺其下畫則為恆遂并恆字不敢用而易為常矣家諱中字士大夫除官於官稱及州府曹局名犯家諱者聽回避此常行之法也李燾仁甫之父名中當贈中奉大夫仁甫請於朝謂當告家廟與自身不同乞用元豐以前官制贈光祿卿丞相頗欲許之豫在西垣聞其說為諸公言今一變成式則它日贈中大夫必為祕書監贈太中大夫必為諌議矣決不可行遂止李願為江東提刑以父名中所部遂呼為通議蓋近世率妄稱太中也李自稱只以本秩曰朝散黃通老資政之子為臨安通判府中亦稱為通議而受之自如記張元事自古夷狄之臣來入中國者必為人用由余入秦穆公以霸金日磾仕漢脫武帝五柞之厄唐世尤多執失思力阿史那社爾李臨淮高仙芝渾瑊李懷光􅎤跌光顔朱耶克用皆立大功名不可殫紀然亦在朝廷所以御之否則為郭藥師矣儻使中國英雋翻致力於異域忌壯士以資敵國者固亦多有賈季在狄晉六卿以為難日至亘溫不能留王猛使為符堅用唐莊宗不能知韓延徽使為阿保機用皆是也西夏曩霄之叛其謀皆出於華州士人張元與吳昊而其事本末國史不書比得田晝承君集實紀其事云張元吳昊姚嗣宗皆關中人負氣倜儻有縱橫才相與友善嘗薄遊塞上觀覘山川風俗有經略西鄙意姚題詩崆峒山寺壁在兩界間云南粵干戈未息肩五原金鼓又轟天崆峒山叟笑無語飽聽松聲春晝眠范文正公巡邊見之大驚又有踏破賀蘭石掃清西海塵之句張為鸚鵡詩卒章曰好著金籠收拾取莫教飛去别人家吳亦有詩將謁韓范二帥恥自屈不肯往乃礱大石刻詩其上使壯夫拽之於通衢三人從後哭之欲以鼓動二帥既而果召與相見躊躇未用間張吳徑走西夏范公以急騎追之不及乃表姚入幕府張吳既至夏國夏人倚為謀主以抗朝廷連兵十餘年西方至為疲弊職此二人為之時二人家屬羈縻隨州間使諜者矯中國詔釋之人未有知者後乃聞西人臨境作樂迎此二家而去自是邊帥始待士矣姚又有述懷詩曰大開雙白眼只見一青天張有雪詩曰五丁仗劒決雲霓直取銀河下帝畿戰死玉龍三十萬敗鱗風卷滿天飛吳詩獨不傳觀此數聮可想見其人非池中物也承君所記如此豫謂張吳在夏國然後舉事不應韓范作帥日尚猶在關中豈非記其歲時先後不審乎姚張詩筆談諸書頗亦紀載張吳之名正與羌酋二字同蓋非偶然也宫室土木秦始皇作阿房宫寫蜀荆地材至關中役徒七十萬人隋煬帝營宫室近山無大木皆致之逺方二千人曵一柱以木為輪則戞摩火出乃鑄鐵為轂行一二里轂輒破别使數百人齎轂隨而易之盡日不過行二三十里計一柱之費巳用數十萬功大中祥符間姦佞之臣罔真宗以符瑞大興土木之役以為道宫玉清昭應之建丁謂為修宫使凡役工日至三四萬所用有秦隴歧同之松嵐石汾隂之柏潭惜之國史志載其事欲以為夸然不若掩之之為愈也沈括筆談云溫州鴈蕩山前世人所不見故謝靈運為太守未嘗游歷因昭應宫采木深入窮山此境始露於外他可知矣歲月日風雷雄雌虞喜天文論漢太𥘉曆十一月甲子夜半冬至云歲雄在閼逢雌在攝提格月雄在畢雌在觜日雄在子又云甲歲雄也畢月雄也陬月雌也大氐以十干為歲陽故謂之雄十二支為歲隂故謂之雌但畢觜為月雄雌不可曉今之言隂陽者未嘗用雄雌二字也郎顗傳引易雌雄祕歷今亡此書宋玉風賦有雄風雌風之說沈約有雌霓連蜷之句春秋元命包曰隂陽合而為雷師曠占曰春雷始起其音格格其霹靂者所謂雄雷早氣也其鳴依音音不大霹靂者所謂雌雷水氣也見法苑珠林豫家有故書一種曰孝經雌雄圖云出京房易傳亦日星占相書也東坡三詩東坡初赴惠州過峽山寺不值主人故其詩云山僧本幽獨乞食况未還雲碓水自舂松門風為關石泉解娛客琴筑鳴空山既至惠州殘臘獨出至栖禪寺亦不逢一僧故其詩云江邊有微行詰曲背城市平湖春草合步到栖禪寺堂空不見人老稚掩關睡所營在一食食巳寧復事客行豈無得施子淨掃地風松獨不靜送我作鼓吹後在儋耳作觀棊詩記游廬山白鶴觀觀中人皆闔戶晝寢獨聞棊聲云五老峰前白鶴遺址長松䕃庭風日清美我時獨游不逢一士誰歟棊者戶外屨二不聞人聲時聞落子其寂寞冷落之味可以想見句語之妙一至於此天文七政尚書舜典以齊七政孔安國本注謂日月五星也而馬融云七政者北斗七星各有所主第一主日第二主月第三曰命火謂熒惑也第四曰煞土謂填星也第五曰代水謂辰星也第六曰危木謂歲星也第七曰剽金謂太白也日月五星各異故曰七政尚書大傳一說又以為七政者謂春秋冬夏天文地理人道所以為政也人道正而萬事順成三說不同然不若孔氏之明白也符讀書城南符讀書城南一章韓文公以訓其子使之腹有詩書致力於學其意美矣然所謂一為公與相潭潭府中居不見公與相起身自犁鋤等語乃是顓覬冨貴為可議也杜牧之寄小姪阿宜詩亦云朝廷用文治大開官職埸願爾出門去取官如驅羊其意與韓類也豫向為陳鑄作城南堂記亦及此意云致仕官上壽范蜀公自翰林學士以本官戶部侍郎致仕仍居京師同天節乞隨班上壽許之遂著為令韓康公元祐二年以司空致仕太皇太后受冊乞隨班稱賀而降詔免赴二者不同如此五經字義相反治之與亂順之與擾定之與荒香之與臭遂之與潰皆美惡相對之字然五經用之或相反如亂臣十人亂越我家惟以亂民亂為四方新辟亂為四輔厥亂明我新造邦丕乃俾亂之類以亂訓治也安擾邦國擾而毅擾龍六擾之類以擾訓順也荒度土功遂荒大東大王荒之葛藟荒之之類以荒訓定也無聲無臭胡臭亶時其臭羶臭隂逹于淵泉之類以臭訓香也是用不潰于成草不潰茂之類以潰訓遂也鄭康成箋毛詩潰成與毛公皆釋為遂至於潰茂則以為潰當作彚彚茂貌也自為異同如此鎮星為福世之伎術以五星論命者大率以火土為惡故有晝忌火星夜忌土之語土鎮星也行遲每至一宫則二歲四月乃去以故為災最久然以國家論之則不然符堅欲南伐歲鎮守斗識者以為不利史記天官書云五潢五帝居舍火入旱金兵水水宋均曰不言木土者德星不為害也又云五星犯北落軍起火金水尤甚木土軍吉又云鎮星所居國吉未當居而居巳去而復還居之其國得土若當居而不居既巳居之又西東去其國失土其居久其國福厚其居易福薄如此則鎮星乃為大福德與木亡異豈非國家休祥所係非民庶可得侔邪東坡引用史傳東坡先生作文引用史傳必詳述本末有至百餘字者蓋欲使讀者一覽而得之不待復尋繹書䇿也如勤上人詩集叙引翟公罷廷尉賔客反覆事朝君成詩集叙引李郃漢中以星知二使者事上富丞相書引左史倚相美衛武公事答李琮書引李固論發兵討交趾事與朱鄂州書引王濬活巴人生子事蓋公堂記引曹參治齊事滕縣公堂記引徐公事溫公碑引慕容紹宗李績事密州通判題名記引羊叔子鄒湛事荔枝歎詩引唐羌言荔枝事是也兩莫愁莫愁者郢州石城人今郢有莫愁村畫工傳其貌好事者多寫寄四逺唐書樂志曰莫愁樂者出於石城樂石城有女子名莫愁善歌謡古詞曰莫愁在何處莫愁石城西艇子打兩槳催送莫愁來者是也李義山詩曰海外徒聞更九州他生未卜此生休空傳虎旅鳴宵柝無復雞人送曉籌此日六軍同駐馬他時七夕笑牽牛如何四紀為天子不及盧家有莫愁此莫愁者洛陽人梁武帝河中之歌曰河中之水向東流洛陽女兒名莫愁莫愁十三能織綺十四采桑南陌頭十五嫁為盧家婦十六生兒似阿侯盧家蘭室桂為梁中有鬱金蘇合香頭上金叉十二行足下絲履五文章珊瑚挂鏡爛生光平頭奴子擎履箱人生冨貴何所望恨不早嫁東家王者是也盧氏之盛如此所云不早嫁東家王莫詳其義近世周美成樂府西河一闋專詠金陵所云莫愁艇子曽繫之語豈非誤指石頭城為石城乎何公橋詩英州小市江水貫其中舊架木作橋每不過數年輒為湍潦所壞郡守建安何智甫始疊石為之方成而東坡還自海外何求文以紀坡作四言詩一首凡五十六句今載於後集第八卷所謂天壤之間水居其多人之往來如鵜在河是也豫侍親居英與僧希賜游南山步過橋上讀詩碑希賜云真本藏于何氏此有石刻經黨禁亦不存今以板刻之乃希賜所書也賜因言何公初請記坡為賦此詩既大書矣而未遣送郡候兵執役者見之以告何何又來謁坡曰軾未到橋所難以想像落筆何即命具食拉坡偕往坡曰使君是地主宜先升車何謝不敢乃並轎而行既至坡曰至堪作詩晚當奉戒抵暮送與之蓋詩中云我來與公同載而出歡呼填道抱其馬足故欲同行以印此語耳坡公作詩時建中靖國元年辛巳豫聞希賜語時紹興十七年丁卯相去四十六年今追憶前事乃紹熙五年甲寅又四十七年矣容齊三筆卷第十一終
