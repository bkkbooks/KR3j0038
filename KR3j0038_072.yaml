body:
  text: 容齋四筆卷第六十五則韓文公逸詩唐五竇聮珠集載竇牟為東都判官陪韓院長韋河南同尋劉師不遇分韻賦詩都官貟外郎韓愈得尋字其語云秦客何年駐仙源此地深還隨躡鳬騎來訪馭雲襟院閉青霞入松高老鶴尋猶疑隱形坐敢起竊桃心今諸本韓集皆不載近者莆田方嵩卿考證訪頥甚至猶取聮珠中竇庠酬退之登嶽陽樓一大篇顧獨遺此何也竇叔向詩不存竇氏聮珠序云五竇之父叔向當代宗朝善五言詩名冠流輩時屬正懿皇后山陵上注意哀挽即時進三章內考首出傳諸人口有命婦羞蘋葉都人插奈花禁兵環素帟宫女哭寒雲之句可謂佳唱而略無一首存於今荆公百家詩選亦無之是可惜也豫嘗得故吳良嗣家所抄唐詩僅有叔向六篇皆竒作念其不傳於丗今悉録之夏夜宿表兄話舊云夜合花開香滿庭夜深微雨醉𥘉醒遠書珍重何時逹舊事淒涼不可聽去日兒童皆長大昔年親友半凋零明朝又是孤舟别愁見河橋酒幔青秋砧送包大夫云斷續長門夜清冷逆旅秋征夫應待信寒女不勝愁帶月飛城上因風散陌頭離居偏入聽况復送歸舟春日早朝應制云紫殿俯千官春松應合歡御爐香熖暖馳道玉聲寒乳燕翻珠綴祥烏集露盤宫花一萬樹不敢舉頭看過簷石湖云曉發魚門伐晴看簷石湖日銜高浪出天入四空無只尺分洲鳬纎毫指舳艫渺然從此去誰念客帆孤正懿挽歌二首云二陵恭婦道六寢盛皇情禮遜生前貴恩追殁後榮幼王親捧土愛女復連塋東望長如在誰云向玉京後庭攀畫柳上陌咽清笳命婦羞蘋葉都人插奈花壽宫星月異仙路往來賖縱有迎神術終悲隔絳紗第三篇亡叔向字遺直仕至左拾遺出為溧水令唐書亦稱其以詩自名云用奈花事竇叔向所用奈花事出晉史云成帝時三吳女子相與簮白花望之如素奈傳言天公織女死為之著服巳而杜皇后崩其言遂驗紹興五年寧德皇后訃音從北庭來知徽州唐輝使休寧尉陳之茂撰疏文有語云十年罹難終弗返於蒼梧萬國銜冤徒盡簪於白奈是時正從徽宗蒙塵其對偶精確如此王廖兒良賈誼過秦論曰六國之士吳起孫臏帶他兒良王廖田忌廉頗趙奢之朋制其兵漢書注家皆無所釋顔師古但音兒為五奚又廖為聊而巳此八人者帶他兒良王廖不知其何國人獨吕氏春秋云老耽貴柔孔子貴仁墨翟貴廉關尹貴清子列子貴虛陳駢貴齊陽朱貴已孫臏貴勢王廖貴先兒良貴後而注云王廖謀兵事貴先建茅也兒良作兵謀貴後雖僅見二人之名然亦莫能詳也廖良列於孔老之末而漢四種兵書有良權謀一篇又賈誼首稱寧􅚼杜赫為之謀漢書亦不注吕氏云孔墨寧越皆布衣之士也越中牟人也周威公師之又稱杜赫以安天下説周昭文君則越赫善謀可以槩見漫書之以補漢注之缺徙木僨表啇鞅變秦法恐民不信乃募民徙三丈之木而豫五十金有一人徙之輒豫金乃下令吳起治西河欲諭其信於民夜置表於南門之外令於邑中曰有人能僨表者仕之長大夫民相謂曰此必不信有一人曰試往僨表不得賞而巳何傷往僨表來謁吳起起仕之長大夫自是之後民信起之賞罰豫謂鞅本魏人其徙木示信蓋以效起而起之事不傳建武中元續書隨筆所書建武中元一則文惠公作隸釋於蜀郡守何君閣道碑一篇中以為不然比得蜀士袁夢麒應祥漢制叢録亦以紀志傳不同為惑而云近歲稚州榮經縣治之西有得蜀郡治道記於崖壁間者記末云建武中元二年六月就於是千載之疑渙然冰釋豫觀何君閣道正建武中元二年六月就袁君所言榮經崖壁之記蓋是此耳但以出於近歲恨不得質之文惠為之惻然草駒聾蟲今人謂野收馬為草馬淮南子修務訓曰馬之為草駒之時跳躍揚蹄翹尾而走人不能制注云馬五尺已下為駒放在草中故曰草駒蓋今之所稱者是也下文曰形之於馬馬不可化其可駕御教之所為也馬聾蟲也而可以通氣志猶待教而成又况人乎注云蟲喻無知也聾蟲之名甚竒記李履中二事崇寧中蔡京當國欲洗邢恕誣謗宗廟之罪既抆拭用之又欲令立邊功以進身於是以為涇原經略使遂謀用車戰法及造舟五百艘將直抵興靈以空夏國詔以付熙河漕臣李復復長安人久居兵間習熟戎事力上疏詆切之豫頃書之於國史恕列傳中比得上饒所刋潏水集正復所為文得此兩奏歎其能以區區外官而排斥上相之客如此恨史傳為不詳盡乃録于此其乞罷造戰車疏云奉聖旨令本司製造戰車三百兩臣嘗覽載籍古者師行固嘗用車蓋兵不妄動征戰有禮不為詭遇多在平原易野故車可以行今盡之極邊戎狄乘勢而來雖鷙鳥飛翥不如是之迅捷下寨駐軍各以保險為利其往也車不及期居而保險車不能登歸則虜多襲逐爭先奔趍不暇回顧車安能收非若古昔於中國為用臣聞此議出於許彥圭彥圭因姚麟而獻説朝廷遂然之不知彥圭劇為輕妄唐之房琯嘗用車戰大敗於陳濤斜十萬義軍無有脫者畿邑平地且如此况今欲用於峻阪溝谷之間乎又戰車比常車闊六七寸運不合轍牽拽不行昨來兵夫典賣衣物自賃牛具終日方進五七里遂致兵夫逃亡棄車於道大為諸路之患今乞便行罷造如别路已有造者乞更不牽拽前來其乞罷造船奏云邢恕乞打造船五百隻於黃河順流放下至會州西小河內藏放有旨專委臣監督限一年了當契勘本路只有船匠一人須乞於荆江淮浙和雇又丁線物料亦非本路所出觀恕奏請實是兒戲且造船五百隻若目今工料並備亦須數年自蘭州駕放至會州約三百里北岸是敵境豈可容易會州之西小河鹹水其闊不及一丈深止於一二尺豈能藏船黃河過會州入韋精山石峽險窄自上垂流直下高數十尺船豈可過至西安州之東大河分為六七道水淺灘磧不勝舟載一船所載不過五馬二十人雖到興州又何能為又不知幾月得至此聲若出必為夏國侮笑臣未敢便依旨揮擘畫恐虛費錢物終誤大事疏既上徽宗察其言忠遂罷二役復字履中為關內名儒官至中大夫集英殿修撰李昭玘嘗贈詩云結交賴有紫􅐖翁鶴骨嶄嶄爛修目五言長城屹千丈萬卷書樓聊一讀可知其人矣乾寧覆試進士唐昭宗乾寧二年試進士刑部尚書崔凝下二十五人放榜後宣詔翰林學士陸扆祕書監馮渥入內各贈衣一副及氊𬒳於武德殿前覆試但放十五人自狀頭張貽範以下重落其六人許再入舉場四人所試最下不許再入蘇楷其一也故挾此憾至於駮昭宗聖文之諡崔凝坐貶合州刺史是時國祚如贅斿悍鎮強藩請隧問鼎之不暇顧卷卷若此其再試也詩賦各兩篇內良弓獻問賦以太宗問工人木心不正脈理皆邪若何道理十七字皆取五聲字依輪次以雙周隔句為韻限三百二十字成貽範等六人訖唐末不復綴榜蓋是時不糊名一黜之後主司不敢再收拾也有黃滔者是年及第閩人也九世孫沃為吉州永豐宰刋其遺文𥘉試覆試凡三賦皆在焉曲直不相入賦以題中曲直兩字為韻釋云邪正殊途各有好惡終篇只押兩韻良弓獻問賦取五聲字次第用各隨聲為賦格於是第一韻尾句云資國祥之崇崇上平聲也第二韻垂寶祚於綿綿下平聲也第三韻曽非唯唯上聲也第四韻露其言而粲粲去聲也而闕入聲一韻賦韻如是前所未有國將亡必多制亦云可笑矣信州永豐人王正白時再試中選郡守為改所居坊名曰進賢且減戶稅亦後來所無臨海蟹圖文登吕亢多識草木蟲魚守官台州臨海命工作蟹圖凡十有二種一曰蝤蛑乃蟹之巨者兩螯大而有細毛如苔八足亦皆有微毛二曰撥棹子狀如蝤蛑螯足無毛後兩小足薄而微闊類人之所食者然亦頗異其大如升南人皆呼為蟹八月間盛出人採之與人鬪其螯甚巨往往能害人三曰擁劒狀如蟹而色黃其一螯偏長三寸餘有光四曰彭螖螯微毛足無毛以鹽藏而貨於市爾雅曰彭蠌小者蟧云小蟹也蠌音澤蟧音勞吳人呼為彭越搜神記言此物嘗通人夢自稱長卿今臨海人多以長卿呼之五曰竭朴大於彭螖殼黑斑有文章螯正赤常以大螯障目小螯取食六曰沙狗似彭螖壤沙為穴見人則走屈折易道不可得七曰望潮殼白色居則背坎外向潮欲來皆出坎舉螯如望不失常期八曰倚望亦大如彭螖居常東西顧睨行不四五又舉兩螯以足起望惟入穴乃止九曰石蜠大於常蟹八足殼通赤狀若鵝卵十曰蜂江如蟹兩螯足極小堅如石不可食十一曰蘆虎似彭蜞正赤不可食十二曰彭蜞大於螖小於常蟹吕君云此皆常所見者北人罕見故繪以為圖又海啇言海中􅔢鼊島之東一島多蟹種類甚異有虎頭者有翅能飛者有能捕魚者有殼大兼尺者以非親見故不畫李履中得其一本為作記豫家楚宦遊二浙閩廣所識蟹屬多矣亦不悉與前説同而所謂黃甲白蟹蟳蠘諸種吕圖不載豈名謂或殊乎故紀其詳以示博雅者東坡作碑銘東坡祭張文定文云軾於天下未嘗銘墓獨銘五人皆盛德故以文集考之凡七篇若富韓公司馬溫公趙清獻公范蜀公并張公坡所自作此外趙康靖滕元發二志乃代張公者故不列於五人之數眉州小集有元祐中奏稿云臣近準勑差撰故固知樞密院事趙瞻神道碑并書者臣平生本不為人撰行狀埋銘墓碑士大夫所共知只因近日撰司馬光行狀蓋為光曾為臣亡母程氏撰埋銘又為范鎮撰墓志蓋為鎮與先臣某平生交契至深不可不撰及奉詔撰司馬光冨弼等墓碑不可固辭然終非本志况臣老病廢學文詞鄙陋不稱人子所欲顯揚其親之意伏望聖慈别擇能者特許辭免觀此一奏可印公心而杭本奏議十五卷中不載洗兒金錢車駕都錢塘以來皇子在邸生男及女則戚里三衙浙漕京尹皆有餉獻隨即致答自金幣之外洗兒錢果動以十數合極其珍巧若揔而言之殆不可勝算莫知其事例之所起劉原甫在嘉祐中因論無故踈決云在外羣情皆云聖意以皇女生故施此慶恐非王者之令典也又聞多作金銀犀象玉石琥珀玳瑁擅香等錢及鑄金銀為花果賜豫臣下自宰相臺諌皆受此賜無益之費無名之賞殆無甚於此若欲夸示奢麗為世俗之觀則可矣非所以軌物訓儉也宰相臺諌以道德輔主奈何空受此賜曽無一言遂事不諌臣願深執恭儉以答上天之貺不宜行姑息之恩以損政體偉哉劉公之論其徑切如此歐陽公銘墓略而不書豫為國史亦不知載於本傳比方讀其奏章故敬紀之韓偓金鑾密記云天復二年大駕在岐皇女生三日賜洗兒果子金銀錢銀葉坐子金銀鋌子豫謂唐昭宗於是時尚復講此而在庭無一言蓋宫掖相承欲罷不能也告命失故事祖宗時知制誥六貟故朝廷除授雖京官磨勘選人改秩奏薦門客恩科助教率皆命詞然有官列巳崇而有司不舉者多出時相之意劉原甫掌外制以任顓落職不降誥詞曽奏陳以為非故事得旨即施行之巳而劉元瑜王琪降宫直以勑牒劉又言非朝廷賞罰訓誥毖重之意今觀劉集有太平州文學袁嗣立改江州文學制云昔先王簡不帥教而不變者屏之裔土終身不齒若爾之行豈足顧哉然猶假以仕板徙之善郡不資之恩也勉思自新無重其咎未幾嗣立又徙洪州制云爾頃冒憲典遷之尋陽復以親嫌於法當避天薄志節寡廉耻者固不可使處有嫌之地益徙豫章思自湔滌嗣立之事微矣乃費兩誥讀此命書可知其人漫書之以發一笑扁字二義扁音薄典切唐韻二義其一曰扁署門戶其一曰姓也此外無它説案鶡冠子云五家為伍十伍為里四里為扁扁為之長十扁為鄉其上為縣為郡其不奉上令者以告扁長蓋如遂黨都保之稱諸書皆不載娑羅樹世俗多指言月中桂為娑羅樹不知所起案酉陽雜爼云巴陵有寺僧房宋下忽生一木隨伐而長外國僧見曰此娑羅也元嘉中出花如蓮唐天寶初安西進娑羅枝狀言臣所管四鎮拔汗郍國有娑羅樹特為竒絶不芘凡草不止惡禽近采得樹枝二百莖以進豫比得楚州淮隂縣唐開元十一年海州刺史李雍所作娑羅樹碑云非中夏物土所宜有者婆娑十畒蔚映千人惡禽翔而不集好鳥止而不巢深識者雖徘徊仰止而莫知冥植博物者雖沈吟稱引而莫辨嘉名隨所方靣頗證靈應東瘁則青郊苦而歲不稔西茂則白藏泰而秋有成嘗有三藏義淨還自西域齋戒瞻嘆於是邑宰張松質請雍述文建碑觀雍所言惡禽不集正與上説同又有松質一書答雍云此土玉像爰及石龜一離淮隂百有餘載前後抗表尚不能稱賴公威德備聞所以還歸故里謹遣僧三人父老七人賁狀拜謝宣和中向子諲過淮隂見此樹今有二本方廣丈餘蓋非故物蔣潁叔云玉像石龜不知今安在然則娑羅之異世間無别種也吳興芮燁國器有從沈文伯乞娑羅樹碑古風一首云楚州淮隂娑羅樹霜露榮悴今何如能令草木死不朽當時為有北海書荒碑雨侵澀苔蘚尚想墨本傳東吳正賦此也歐陽公有定力院七葉木詩云伊洛多佳木娑羅舊得名常於佛家見宜在月宫生扣砌隂鋪靜虛堂子落聲亦此樹耳所謂七葉者未詳容齋四筆卷第六終
