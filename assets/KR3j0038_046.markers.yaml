  - {type: punctuation, offset: 4221, content: (, id: KR3j0038_krp_046-bkkpn408}
  - {type: variant, offset: 4221, length: 0, content: '', WYG: 欽定四庫全書容齋三筆卷十一十六則宋洪邁撰碑誌不書名碑誌之作本孝子慈孫欲以稱揚其父祖之功徳播之當時而垂之後世當直存其名字無所避隱然東漢諸銘載其先代多只書官如淳于長夏承碑云東萊府君之孫太尉掾之中子右中郎將之弟李翊碑云䍧牱太守曾孫謁者孫從事君元子之類是也自唐及本朝名人文集所志往往只稱君諱某字某至於記序之文亦然王荆公為多殆與求文揚名之㫖為不相契東坡先生送路都曹詩首言乖崖公在蜀有録事參軍老病廢事公責之遂求去以詩留别所謂秋光都似宦情薄山色不如歸意濃者公驚謝之曰吾過矣同僚有詩人而吾不知因留而慰薦之坡㓜時聞父老言恨不問其姓名及守潁州而都曹路君以小疾求致仕誦此語留之不可乃采前人意作詩送之其詩大略云結髮空百戰市人看先封誰能搔白首抱關望夕烽則路君之賢而不遇可知矣然亦不書其名使之少獲表見又為可惜也漢文帝不用兵史記律書云髙祖厭苦軍事偃武休息孝文即位將軍陳武等議曰南越朝鮮擁兵阻阸選蠕觀望宜及士民樂用征討逆黨以一封疆孝文曰朕能任衣冠念不到此會吕氏之亂誤居正位常戰戰慄慄恐事之不}
