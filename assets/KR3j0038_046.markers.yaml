  - {type: variant, offset: 4222, length: 0, content: '', WYG: 且兵凶器雖克所願動亦耗病謂百姓逺方何今匈奴内侵邊吏無功邊民父子荷兵日久朕常為動心傷痛無日忘之願且堅邊設候結和通使休寧北陲為功多矣且無議軍故百姓無内外之繇得息肩於田畝天下富盛粟至十餘錢予謂孝文之仁徳如此與武帝黷武窮兵為霄壤不侔矣然班史略不及此事資治通鑑亦不編入使其事不甚暴白惜哉帝王諱名帝王諱名自周世始有此制然只避之於本廟中耳克昌厥後駿發爾私成王時所作詩昌發不為文武諱也宣王名誦而吉甫作誦之句正在其時厲王名胡而胡為虺蜴胡然厲矣之句在其孫幽王時小國曰胡亦自若也襄王名鄭而鄭不改封至於出居其國使者告于秦晉曰鄙在鄭地受晉文公朝而鄭伯傅王唯秦始皇以父莊襄王名楚稱楚曰荆其名曰政自避其嫌以正月為一月盖已非周禮矣漢代所謂邦之字曰國盈之字曰滿徹之字曰通雖但諱本字而吏民犯者有刑唐太宗名世民在位之日不偏諱故戴胄唐儉為民部尚書虞世南李世勣在朝至于髙宗始改民部為户部世勣但為勣韓公諱辨云今上書及詔不聞諱滸勢秉饑惟宦官宫妾乃不敢言喻及機以為觸犯此數者皆其先世嫌名也本朝尚文之習大盛故禮官討論每欲其多廟諱遂有五十字者舉塲試卷小渉疑似士人輒不敢用一或犯之往往暗行黜落方州科舉尤甚此風殆不可革然太祖諱下字内有从木从勻者廣韻於進字中亦收張魏公以名其子而音為進太宗諱字内有从耳从火者又有梗音今為人姓如故髙宗諱内从勻从口者亦然真宗諱从心从亘音胡登切若缺其一畫則為􅁪遂并􅁪字不敢用而易為常矣家諱中字士大夫除官於官稱及州府曹局名犯家諱者聽回避此常行之法也李燾仁甫之父名中當贈中奉大夫仁甫請於朝謂當告家廟與自身不同乞用元豐以前官制贈光禄卿丞相頗欲許之予在西垣聞其說為諸公言今一變成式則他日贈中大夫必為祕書監贈太中大夫必為諫議矣法不可行遂止李愿為江東提刑以父名中所部遂呼為通議盖近世率妄稱太中也李自稱只以本秩曰朝散黄通老資政之子為臨安通判府中亦稱為通議而受之自如記張元事自古外國之臣來入中國者必為人用由余入秦穆公以霸金日磾仕漢脫武帝五柞之厄唐世尤多執失思力阿史那社爾李臨淮髙仙芝渾瑊李懐光􅎤跌光顔朱耶克用皆立大功名不可殫紀然亦在朝廷所以御之否則為郭藥師矣儻使中國英儁翻致力於異域忌壯士以資敵國者固亦多有賈季在狄晉六卿以為難日至桓温不能留王猛使為苻堅用唐莊宗不能知韓延徽使為阿保機用皆是也西夏曩霄之叛其謀皆出於華州士人張元與呉昊而其事本末國史不書比得田晝承君集實紀其事云張元呉昊姚嗣宗皆關中人負氣倜儻有縱横才相與友善嘗薄遊塞上觀覘山川風俗有經略西鄙意姚題詩崆峒山寺壁在兩界閒云南粤干戈未息肩五原金􅈜又轟天崆峒山叟笑無語飽聽松聲春晝眠范文正公巡邊見之大驚又有踏破賀蘭石掃清西海塵之句張為鸚鵡詩卒章曰好著金籠收拾取莫教飛去别人家呉亦有詩將謁韓范二帥恥自屈不肯往乃礱大石刻詩其上使壯夫拽之於通衢三人從後哭之欲以鼓動二帥既而果召與相見躊躇未用閒張呉徑走西夏范公以急騎追之不及乃表姚入幕府張呉既至夏國夏人倚為謀主以抗朝廷連兵十餘年西方至為疲弊職此二人為之時二人家屬羈縻隨州閒使諜者矯中國詔釋之人未有知者後乃聞西人臨境作樂迎此二家而去自是邊帥始待士矣姚又有述懐詩曰大開雙白眼只見一青天張有雪詩曰五丁仗劍決雲霓直取銀河下帝畿戰死玉龍三十萬敗鱗風卷滿天飛呉詩獨不𫝊觀此數聮可想見其人非池中物也承君所記如此予謂張呉在夏國然後舉事不應韓范作帥日尚猶在闗中豈非記其嵗時先後不審乎姚張詩筆談諸書頗亦紀載張呉之名正與羌酋二字同蓋非偶然也宫室土木秦始皇作阿房宫寫蜀荆地材至關中役徒七十萬人隋煬帝營宫室近山無大木皆致之逺方二千人曵一柱以木為輪則戞摩火出乃鑄鐵為轂行一二里轂輒破别使數百人齎轂隨而易之盡日不過行二三十里計一柱之費已用數十萬功大中祥符閒姦佞之臣罔真宗以符瑞大興土木之役以為道宫玉清昭應之建丁謂為修宫使凡役工日至三四萬所用有秦隴岐同之松嵐石汾隂之栢潭衡道永鼎吉之梌柟櫧温台衢吉之檮永澧處之槻樟潭柳明越之杉鄭淄之青石衡州之碧石萊州之白石絳州之斑石呉越之奇石洛水之石卵宜聖庫之銀朱桂州之丹砂河南之赭土衢州之朱土梓信之石青石碌磁相之黛秦階之雌黄廣州之藤黄孟澤之槐華虢州之鉛丹信州之土黄河南之胡粉衞州之白堊鄆州之蚌粉兖澤之墨歸歙之漆萊蕪興國之鐵其木石皆遣所在官部兵民入山谷伐取又於京師置局化銅為鍮治金薄鍜鐵以給用凡東西三百一十歩南北百四十三歩地多黒土䟽惡於京東北取良土易之自三尺至一丈有六等起二年四月至七年十一月宫成總二千六百一十區不及二十年天火一夕焚􅅡但存一殿是時役徧天下而至尊無窮兵黷武聲色苑囿嚴刑峻法之舉故民間樂從無一違命視秦隋二代萬萬不侔矣然一時賢識之士猶為盛世}
