  - {type: variant, offset: 0, length: 222, content: 容齊四筆序始予作容齋隨筆首尾十八年續筆十三年三筆五年而四筆之成不費一歳身益老而著書益速蓋有其說曩自越府歸謝絶外事獨弄筆紀𫐠之習不可掃除故捜采異聞但緒夷堅諸志於議論雌黃不復關抱而稚予櫰毎見夷堅滿𥿄輙曰隨筆夷堅皆大人素所游戯今隨筆不加益不應厚於彼而薄於此也日日立案傍必俟草一則乃退重逆其意則裒所憶而書之櫰嗜讀書雖就寢猶置一編枕畔旦則與之俱興而天嗇其付年且弱冠聦明殊未開以彼其勤殆必有日丈夫愛憐少子此乎見之於是占抒爲序并獎其志云慶元三年九月二十四日序, WYG: ''}
