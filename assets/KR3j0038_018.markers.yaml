  - {type: variant, offset: 108, length: 0, content: '', WYG: 宋洪邁撰文章小伎文章}
  - {type: variant, offset: 109, length: 1, content: 條, WYG: 小伎於道未為尊雖杜子美有激而云然要為失言不可以訓文章豈小事哉易賁之彖言剛柔交錯天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下孔子稱帝堯煥乎有文章子貢曰夫子之文章可得而聞詩美衞武公亦云有文章堯舜禹湯文武成康之聖賢桀紂幽厲之昏亂非詩書以文章載之何以傳伏羲畫八卦文王重之非孔子以文章翼之何以傳孔子至言要道託孝經論語之文而傳曽子子思孟子傳聖人心學使無中庸及七篇之書後人何所窺門户老莊絶滅禮學忘言去為而五千言與内外篇極其文藻釋氏之為禪者謂語言為累不知大乘諸經可廢乎然則詆為小伎其理謬矣彼後世為詞章者逐其末而忘其本翫其華而落其實流宕自逺非文章過也杜老所云文章千古事已似愛文章文章日自負文章實致身文章開穾奥文章憎命達名豈文章著枚乘文章老文章敢自誣海内文章伯文章曹植波瀾闊庾信文章老更成豈有文章驚海内每語見許文章伯文章有神交有道如此之類多指詩而言所見狹矣三長月釋氏以正五九月為三長月故奉佛者皆茹素其説云天帝釋以大寳鏡輪照四天下寅午戌月正臨南贍部洲故當食素以徼福官司謂之斷月故受驛劵有所謂羊肉者則不支俗謂之惡月士大夫赴官者輒避之或人以謂唐日藩鎮蒞事必大享軍屠殺羊豕至多故不欲以其月上事今之他官不當爾也然此説亦無所經見予讀晉書禮志穆帝納后欲用九月九月是忌月北齊書云高洋謀簒魏其臣宋景業言宜以仲夏受禪或曰五月不可入官犯之終於其位景業曰王為天子無復下期豈得不終於其位乎乃知此忌相承由來已久竟不能曉其義及出何經典也兄弟直西垣秦少游集中有與鮮于子駿書云今中書舍人皆以伯仲繼直西垣前世以來未有其事誠國家之美非特衣冠之盛也除書始下中外欣然舉酒相屬予以其時考之蓋元祐二年謂蘇子由曽子開劉貢甫也子由之兄子瞻子開之兄子固子宣貢甫之兄原甫皆經是職故少游有此語云紹興二十九年予仲兄始入西省至隆興二年伯兄繼之乾道三年予又繼之相距首尾九歲予作謝表云父子相承四上鑾坡之直弟兄在望三陪鳯閣之游比之前賢實為遭際固為門户榮事然亦以此自愧也}
