  - {type: variant, offset: 4354, length: 0, content: '', WYG: 十六欽定四庫全書容齋四筆目録卷一孔廟位次周三公不特置周公作金縢雲夢澤關雎不同迷癡厥撥三館祕閣亭榭立名十十錢犀舟畢仲游二書列子與佛經相參韋孟詩乖踈匡衡守正西極化人詔令不可輕出戰國策范煜漢志繕修犯土卷二諸家經學興廢漢人姓名輕浮稱謂鬼谷子書有美堂詩張天覺小簡城狐社䑕用兵為臣下利誌文不可冗趙殺鳴犢五帝官天下黄帝李法抄傳文書之誤二十八宿大觀元夕詩顔魯公帖文潞公奏除改官制待制知制誥裴行儉景陽北人重甘蔗卷三韓退之張籍書韓公稱李杜此日足可惜粉白黛黑李杜徃來詩李太白怖州佐祝不勝詛吕子論學曾太皇太后中天之臺實年官年雷公炮炙論治藥捷法陳翠説燕后燕非強國水旱祈禱卷四今日官冗欒城和張安道詩和范杜蘇四公外臺祕要六枳關王荆公上書并詩左黄州表李郭詔書兩道出師杜韓用歇後語唐明皇賜二相物一百五日老杜寒山詩礜石之毒㑹合聮句卷五􅁟木偶人饒州風俗禽畜菜茄不同伏龍肝勇怯無常趙徳甫金石録韓文公薦士王勃文章吕覽引詩書藍田丞壁記錢武肅三改元黄庭換鵞宋桑林馮夷姓字卷六韓文公逸詩竇叔向詩不存用柰花事王廖兒良徙木僨表建武中元續書草駒聾蟲記李履中二事乾寧覆試進士臨海蠏圖東坡作碑銘洗兒金錢告命失故事扁字二義娑羅樹卷七天咫縣尉為少仙杜詩用受覺二字西太一宫六言由與猶同人焉廋哉乆而俱化黄文江賦沈季長進言繁遏渠替戾岡文潞公平章重事考課之法廢小官受俸卷八庫路真得意失意詩狄監盧尹項韓兵書承天塔記穆護歌省試取人額通印子魚夀亭侯印茸附治疽漏莆田荔枝雙陸不勝華元入楚師公羊用疊語文書誤一字厯代史本末賢者一言解疑譖卷九蒋魏公逸史沈慶之曹景宗詩藍尾酒歐陽公辭官南北語音不同南舟北帳魏冉罪大辨秦少游義倡姓源韻譜譽人過實作文句法書簡循習健訟之誤用史語之失文字書簡謹日更衣卷十過所露布東坡題潭帖山公啓事親王回庶官書責降考試官青蓮居士閩俗詭祕殺人富公遷官唐藩鎮行墨勑吏部循資格五行納音五行化真錢忠懿判語王逸少為藝所累鄂州南樓磨崖賞魚袋出處卷十一京丞相轉官熈寧司農牟利文與可樂府譏議遷史常何李宻詩寺監主簿温大雅兄弟名字册府元龜漢髙帝祖稱豐公樞宻行香船名三翼東坡誨葛延之用書雲之誤張鷟譏武后濫官唐王府官猥下御史風聞唐御史遷轉定限卷十二小學不講主臣景華御苑州陞府而不為鎮漢唐三君知子當官營繕治厯明時仕宦捷疾詞臣益輕夏英公好處神宗用人至道九老李文正兩罷相卷十三科舉之弊不可革宰執子弟廷試國初救弊房元齡名字二朱詩詞金剛經四句偈四蓮華之名黑法白法多心經偈天宮寳樹白分黑分月雙閏雙踰繕那一由旬七極微塵宰相贈本生父母官執政贈三代不同唐孫處約事夏侯勝京房兩傳漢人坐語言獲罪樞宻書史知州轉運使為通判范正辤治饒州榮王藏書秦杜八六子卷十四祖宗親小事王居正封駮王元之論官冗梁狀元八十二歲太祖恤民潘游洪沈舞鷗游蜻郎中用資序臺諌分職正元朝士表章用兩臣字對劉夢得謝上表陳簡齋葆真詩仙傳圖志荒唐卷十五徽廟朝宰輔教官掌箋奏經句全文對北郊議論討論濫賞詞尺八三給事相攻朱藏一詩蔡京輕用官職節度使改東宮環衞官宰相任怨四李杜渾脫隊歲陽歲名官稱别名卷十六漢重蘇子卿昔賢為卒伍兵家貴於備豫渠陽蠻俗寄資官親王帶將仕郎郡縣用隂陽字杜畿李泌董晉嚴有翼詆坡公曹馬能收人心取蜀將帥不利李嶠楊再思容齋四筆目録容齋四筆序始予作容齋一筆首尾十八年二筆十三年三筆五年而四筆之成不費一歲身益老而著書益速蓋有其説曩自越府歸謝絶外事獨弄筆紀述之習不可掃除故捜采異聞但緒夷堅志於議論雌黄不復關抱而稚子櫰毎見夷堅滿紙輒曰隨筆夷堅皆大人素所游戲今隨筆不加益不應厚於彼而薄於此也日日立案旁必俟草一則乃退重逆其意則裒所憶而書之櫰嗜讀書雖就寢猶置一編枕畔旦則與之俱興而天嗇其付年且弱冠聰明殊未開以彼其勤殆必有日丈夫愛憐少子此乎見之於是占抒為序并奬其志云慶元三年九月二十四日序容齋四筆序欽定四庫全書容齋四筆卷一十九則宋洪邁撰孔廟位次自唐以來相𫝊以孔門髙弟顔淵至子夏為十哲故坐祀於廟堂上其後升顔子配享則進曽子於堂居子夏之次以補其闕然顔子之父路曽子之父㸃乃在廡下從祀之列子處父上神靈有知何以自安所謂子雖齊聖不先父食正謂是也又孟子配食與顔子並而其師子思子思之師曽子亦在下此兩者於禮於義實為未然特相承既乆莫之敢議耳周三公不特置周成王董正治官立太師太傅太保兹惟三公而云官不必備惟其人以書傳考之皆兼領六卿未嘗特置也周公既為師然猶位冡宰尚書所載召公以太保領冡宰芮伯為司徒彤伯為宗伯畢公以太師領司馬衞侯為司寇毛公以太傅領司空是已其所次第惟以六卿為先後而師傅之尊乃居太保下也周公作金縢尚書孔氏所傳五十九篇皆有序其出於史官者不言某人作如虞書五篇紀一時君臣吁咈都俞及識其政事如説命武成顧命康王之誥召誥自惟二月既望至越自乃御事洛誥自戊辰王在新邑至篇終蔡仲之命自惟周公位冡宰至邦之蔡皆然如指言某人所作則伊尹作伊訓太甲咸有一徳盤庚三篇周公作大誥康誥酒誥梓材多士無逸君奭多方立政是也惟金縢之篇首尾皆敘事而直以為周公作按此篇除冊祝三王外餘皆周史之詞如公乃自以為功公歸納冊公將不利於孺子公乃為詩以貽王王亦未敢誚公公命我勿敢言天動威以彰周公之徳公勤勞王家之語出郊反風之異决非周公所自為今不復可質究矣雲夢澤雲夢楚澤藪也列於周禮職方氏鄭氏曰在華容漢志有雲夢官然其實雲也夢也各為一處禹貢所書雲土夢作乂注云在江南惟左傳得其詳如䢵夫人棄子文于夢中注云夢澤名在江夏安陸縣城東南楚子田江南之夢注云楚之雲夢跨江南北楚子濟江入于雲中注入雲澤中所謂江南之夢然則雲在江之北夢在其南也上林賦楚有七澤嘗見其一名曰雲夢特其小小者耳方九百里此乃司馬長卿夸言今為縣𨽻徳安詢諸彼人已不能的指疆域職方氏以夢為瞢前漢敘傳子文投於夢中音皆同關雎不同關雎為國風首毛氏列之於三百篇之前大序云后妃之徳也而魯詩云后夫人雞鳴佩玉去君所周康王后不然故詩人歎而傷之後漢皇后紀序康王晏朝關雎作諷蓋用此也顯宗永平八年詔云昔應門失守關雎刺世注引春秋説題辭曰人主不正應門失守故歌關雎以感之宋均云應門聽政之處也言不以政事為務則有宣淫之心關雎樂而不淫思得賢人與之共化修應門之政者也薛氏韓詩章句曰詩人言雎鳩正㓗敬疋以聲相求隱蔽于無人之處故人君退朝入于私宮后妃御見有度應門擊柝鼓人上堂退反燕處體安志明今時大人内傾于色賢人見其萌故詠關雎之説淑女正容儀以刺時三説不同如此黍離之詩列於王國風之首周大夫所作也而齊詩以為衞宣公之子夀閔其兄伋之且見害作憂思之詩黍離之詩是也此説尤為可議迷癡厥撥柔詞謟笑專取容悦世俗謂之迷癡亦曰迷嬉中心有愧見諸顔面者謂之緬靦舉措脫落觸事乖忤者謂之厥撥雖為俚言然其說皆有所本列子云墨杘單至嘽咺憋懯四人相與游於世又云眠娗諈諉勇敢怯疑四人亦相與游張湛注云墨音眉杘勑夷反方言江淮之閒謂之無賴眠音緬娗音殄方言欺謾之語也郭璞云謂以言相輕嗤弄也所釋雖不同然大略具是矣曲禮衣毋撥足毋蹶鄭氏注云撥發揚貌蹶行遽貌大抵亦指其荒率也三館祕閣國朝儒館仍唐制有四曰昭文館曰史館曰集賢院曰祕閣率以上相領昭文大學士其次監修國史其次領集賢若只兩相則首㕔秉國史唯祕閣最低故但以兩制判之四局各置直官均謂之館職皆稱學士其下則為挍理撿討挍勘地望清切非名流不得處范景仁為館閣挍勘當遷挍理宰相龎籍言范鎮有異才恬於進取乃除直祕閣司馬公作詩賀之曰延閣屹中天積書雲漢連神宗重其選謂太宗也國士比為仙玉檻鉤陳上丹梯北斗邊帝容瞻日角宸翰照星躔職秩曽無貴光華在得賢其重如此自熈寧以來或頗用賞勞元豐官制行不置昭文集賢以史館入著作局而直祕閣只為貼職至崇寧政宣以處大臣子弟姻戚其濫及於錢糓文俗吏士大夫不復貴重然除此職者必詣館下拜閣乃具盛筵邀見在三館者宴集秋日暴書宴皆得預席若餘日則不許至隨筆有館職名存一則云亭榭立名立亭榭名最易蹈襲既不可近俗而務為竒澁亦非是東坡見一客云近看晉書問之曰曾尋得好亭子名否蓋謂其難也秦楚材在宣城於城外並江作亭目之曰知有用杜詩已知出郭少塵事更有澄江消客愁之句也王仲衡在㑹稽於後山作亭目之曰白涼亦用杜詩越女天下白鑑湖五月涼之句二者可謂甚新然要為未當廬山一寺中有亭頗幽勝或標之曰不更歸取韓詩末句亦可笑也十十錢市肆閒交易論錢陌者云十十錢言其足數滿百無蹺減也其語至俗然亦有所本後漢書襄楷傳引宮崇所獻神書其太平經與帝王篇云開其玉户施種於中比若春種於地也十十相應和而生其施不以其時比若十月種物於地也十十盡死固無生者其書不傳於今唐章懷太子注釋之時尚猶存也此所謂十十蓋言十種十生無一失耳其盡死之義亦然與錢陌之事殊然其字則同也犀舟張衡應閒云犀舟勁檝後漢注引前書羌戎弓矛之兵器不犀利音義曰今俗謂刀兵利為犀犀堅也犀舟甚新竒然為文者未嘗用亦慮予所見之不博也畢仲游二書元祐初司馬温公當國盡改王荆公所行政事士大夫言利害者以千百數聞朝廷更化莫不驩然相賀唯畢仲游一書究盡本末其略云昔安石以興作之説動先帝而患財之不足也故凡政之可以得民財者無不用蓋散青苗置市易斂役錢變鹽法者事也而欲興作患不足者情也茍未能杜其興作之情而徒欲禁其散斂變置之事是以百説而百不行今遂欲廢青苗罷市易蠲役錢去鹽法凡號為財利而傷民者一掃而更之則向來用事於新法者必不喜矣不喜之人必不但曰青苗不可廢市易不可罷役錢不可蠲鹽法不可去必探不足之情言不足之事以動上意雖致石人而使聽之猶將動也如是則廢者可復散罷者可復置蠲者可復斂去者可復存矣則不足之情可不預治哉為今之䇿當大舉天下之計深明出入之數以諸路所積之錢粟一歸地官使經費可支二十年之用數年之間又將十倍於今日使天子曉然知天下之餘於財也則不足之論不得陳於前然後所謂新法者始可永罷而不復行矣昔安石之居位也中外莫非其人故其法能行今欲捄前日之敝而左右侍從職司使者十有七八皆安石之徒雖起二三舊臣用六七君子然累百之中存其十數烏在其勢之可為也勢未可為而欲為之則青苗雖廢將復散況未廢乎市易雖罷且復置況未罷乎役錢鹽法亦莫不然以此捄前日之敝如人乆病而少閒其父兄子弟喜見顔色而未敢賀者意其病之在也先是東坡公在館閣頗因言語文章規切時政仲游憂其及禍貽書戒之曰孟軻不得已而後辯孔子欲無言古人所以精謀極慮固功業而養夀命者未嘗不出乎此君自立朝以來禍福利害繫身者未嘗言顧直惜其言爾夫言語之累不特出口者為言其形于詩歌贊于賦頌託于碑銘著于序記者亦言也今知畏於口而未畏於文是其所是則見是者喜非其所非則蒙非者怨喜者未能濟君之謀而怨者或已敗君之事矣天下論君之文如孫臏之用兵扁鵲之醫疾固所指名者矣雖無是非之言猶有是非之疑又况其有耶官非諫臣職非御史而非人所未非是人所未是危身觸諱以游其閒殆由抱石而捄溺也二公得書聳然竟如其慮予頃修史時因得其集讀二書思欲為之表見故官雖不顯亦為之立傳云列子與佛經相參張湛序列子云其書大略明羣有以至虚為宗萬品以終滅為驗神惠以凝寂常全想念以著物自喪生覺與夢化等情所明徃徃與佛經相參予讀天瑞篇載林類答子貢之言曰死之與生一徃一反故死於是者安知不生於彼故吾知其不相若矣吾又安知吾今之死不愈昔之生乎此一節所謂與佛經相參者也又云商太宰問孔子三王五帝三皇聖者歟孔子皆曰弗知太宰曰然則孰者為聖孔子曰西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉丘疑其為聖弗知真為聖歟真不聖歟其後論者以為列子所言乃佛也寄於孔子云韋孟詩乖踈漢書韋賢傳載韋孟詩二篇及其孫元成詩一篇皆深有三百篇風致但韋孟諷諫云肅肅我祖國自豕韋總齊羣邦以翼大商至于有周厯世㑹同王赧聽譖寔絶我邦我邦既絶厥政斯逸賞罰之行非繇王室庶尹羣后靡扶靡衞五服崩離宗周以隊應劭曰王赧聽讒受譖絶豕韋氏自是政教逸漏不由王者觀孟之自敘乃祖而乖踈如是周至赧王僅存七邑救亡不暇豈能絶侯邦乎周之積微乆矣非因絶豕韋一國然後五服崩離也其妄固不待攻而應劭又從而實之尤為可笑左傳書范宣子之言曰匄之祖在商為豕韋氏在周為唐杜氏杜預曰豕韋國於東郡白馬縣殷末國於唐周成王滅之此最可證惜顔師古之不引用也匡衡守正漢元帝時貢禹奏言天子七廟親盡之廟宜毁及郡國廟不應古禮宜正定天子下其議未及施行而禹卒後乃下詔先罷郡國廟其親盡寢園皆無復修已而上寢疾夢祖宗譴罷郡國廟詔問丞相匡衡議欲復之衡深言不可上疾乆不平衡皇恐禱髙祖孝文孝武廟曰親廟宜一居京師今皇帝有疾不豫廼夢祖宗見戒以廟皇帝悼懼即詔臣衡復修立如誠非禮義之中違祖宗之心咎盡在臣衡當受其殃又告謝毁廟曰遷廟合祭乆長之策今皇帝乃有疾願復修立承祀臣衡等咸以為禮不得如不合諸帝后之意罪盡在臣衡等當受其咎今詔中朝臣具復毁廟之文臣衡以為天子之祀義有所斷無所依緣以作其文事如失措罪廼在臣衡予按衡平生佞䛕專附石顯以取大位而此一節獨据經守禮其禱廟之文殆與金縢之冊祝相似而不為後世所稱述漢史又不書於本傳憎而知其善可也郊祀志南山巫祠秦中秦中者二世皇帝也以其彊死䰟􅅎為厲故祠之成帝時匡衡奏罷之亦可書西極化人列子載周穆王時西極之國有化人來王敬之若神化人謁王同游王執化人之袪騰而上者中天乃止暨及化人之宮自以居數十年不思其國復謁王同游意迷精喪請化人求還既寤所坐猶嚮者之處侍御猶嚮者之人視其前則酒未清肴未䀟王問所從來左右曰王黙存耳穆王自失者三月復問化人化人曰吾與王神游也形奚動哉予然後知唐人所著南柯太守黄粱夣櫻桃青衣之類皆本乎此詔令不可輕出人君一話一言不宜輕發况於詔令形播告者哉漢光武初即位既立郭氏為皇后矣時隂麗華為貴人帝欲崇以尊位后固辭以郭氏有子終不肯當建武九年遂下詔曰吾以貴人有母儀之美宜立為后而固辭不敢當列於媵妾朕嘉其義讓許封諸弟乃追爵其父及弟為侯皆前世妃嬪所未有至十七年竟廢郭后及太子彊而立貴人為后蓋九年之詔既行主意移奪已見之矣郭后豈得安其位乎戰國策劉向序戰國策言其書錯亂相揉莒本字多誤脫為半字以趙為肖以齊為立如此類者多予按今傳於世者大抵不可讀其韓非子新序説苑韓詩外傳髙士傳史記索隱太平御覽北堂書鈔藝文類聚諸書所引用者多今本所無向博極羣書但擇焉不精不止於文字脫誤而已惟太史公史記所采之事九十有三則明白光艷悉可稽考視向為有閒矣范煜漢志沈約作宋書謝儼傳曰范煜所撰十志一皆託儼捜撰垂畢遇煜敗悉蠟以覆車宋文帝令丹陽尹徐湛之就儼尋求已不復得一代以為恨其志今闕煜本傳載煜在獄中與諸生姪書曰既造後漢欲徧作諸志前漢所有者悉令備雖事不必多且使見文得盡又欲因事就卷内發論以正一代得失意復不果此説與儼傳不同然儼傳所云乃范紀}
