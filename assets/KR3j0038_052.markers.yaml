  - {type: variant, offset: 4356, length: 0, content: '', WYG: 卷公主注中引之今宋書却無殊不可曉劉昭注補志三十卷至本朝乾興元年判國子監孫奭始奏以備前史之闕故淳化五年監中所刋後漢書凡九十卷惟帝后紀十卷列傳八十卷而無志云新唐書藝文志劉昭補注後漢書五十八卷不知昭為何代人所謂志三十卷當在其中也繕修犯土今世俗營建宅舍或小遭疾厄皆云犯土故道家有謝土司章醮之文按後漢書來厯傳所載安帝時皇太子驚病不安避幸乳母野王君王聖舍太子㕑監邴吉以為聖舍新繕修犯土禁不可乆御然則古有其説矣容齋四筆卷一欽定四庫全書容齋四筆卷二二十則宋洪邁撰諸家經學興廢稚子問漢儒所傳授諸經各名其家而今或存或不存請盡其本末為四筆一則乃為采摭班史及陸徳明經典釋文并他書刪取綱要詳載於此周易傳自商瞿始至漢初田何以之顓門其後為施讐孟喜梁邱賀之學又有京房費直髙相三家至後漢髙氏已微晉永嘉之亂梁邱之易亡孟京費氏人無傳者唯鄭康成王弼所注行于世江左中興欲置鄭易博士不果立而弼猶為世所重韓康伯等十人並注繋辭今唯韓傳尚書自漢文帝時伏生得二十九篇其後為大小夏侯之學古文者武帝時出於孔壁凡五十九篇詔孔安國作傳遭巫蠱事不獲以聞遂不列於學官其本殆絶是以馬鄭杜預之徒皆謂之逸書王肅嘗為注解至晉元帝時孔傳始出而亡舜典一篇乃取肅所注堯典分以續之學徒遂盛及唐以來馬鄭王注遂廢今以孔氏為正云詩自子夏之後至漢興分而為四魯申公曰魯詩齊轅固生曰齊詩燕韓詩皆列博士毛詩者出於河閒人大毛公為之故訓以授小毛公為獻王博士以不在漢朝不列於學鄭衆賈逵馬融皆作詩注及鄭康成作箋三家遂廢齊詩乆亡魯詩不過江東韓詩雖在人無傳者唯毛詩鄭箋獨立國學今所遵用漢髙堂生傳士禮十七篇即今之儀禮也古禮經五十}
