  - {type: variant, offset: 4357, length: 0, content: '', WYG: 篇后蒼傳十七篇曰后氏曲臺記所餘二十九篇名為逸禮戴徳刪古禮二百四篇為八十五篇謂之大戴禮戴聖又刪為四十九篇謂之小戴禮馬融盧植考諸家異同附戴聖篇章去其煩重及所缺略而行於世即今之禮記也王莽時劉歆始建立周官經以為周禮在三禮中最為晚出左氏為春秋傳又有公羊糓梁鄒氏夾氏鄒氏無師夾氏無書公羊興於景帝時縠梁盛於宣帝時而左氏終西漢不顯迨章帝乃令賈逵作訓詁自是左氏大興二傳漸微矣古文孝經二十二章世不復行只用鄭注十八章本論語三家魯論語者魯人所傳即今所行篇次是也齊論語者齊人所傳凡二十二篇古論語者出自孔壁凡二十一篇各有章句魏何晏集諸家之説為集解今盛行於世漢人姓名西漢名人如公孫宏董仲舒朱買臣丙吉王褒貢禹皆有異世與之同姓名者戰國策及呂氏春秋齊有公孫宏與秦王孟嘗君言者明帝時又有幽州從事公孫宏交通楚王英見於虞延傳髙祖時又有謁者貢禹梁元帝時有武昌太守朱買臣尚書左僕射王褒後漢安帝時有太子㕑監邴吉南齊武帝之子巴東王子響為荆州刺史要直閣將軍董蠻與同行蠻曰殿下癲如雷敢相隨耶子響曰君敢出此語亦復竒癲上聞而不悦曰人名蠻復何容得醖藉乃改為仲舒謂曰今日仲舒何如昔日仲舒答曰昔日仲舒出自私庭今日仲舒降自先帝以此言之勝昔逺矣然此人後不復見輕浮稱謂南齊陸慧曉立身清肅為諸王長史行事僚佐以下造詣必起迎之或曰長史貴重不宜妄自謙屈答曰我性惡人無禮不容不以禮處人未嘗卿士大夫或問其故慧曉曰貴人不可卿而賤者乃可卿人生何容立輕重於懷抱終身常呼人位今世俗浮薄少年或身為卑官而與尊者言話稱其儕流必曰某丈談其所事牧伯監司亦然至於當他人父兄尊長之前語及其子孫甥壻亦云某丈或妄稱宰相執政貴人之字皆大不識事分者習慣以然元非簡傲也子常以戒兒輩云鬼谷子書鬼谷子與蘇秦張儀書曰二足下功名赫赫但春華至秋不得乆茂今二子好朝露之榮忽長乆之功輕喬松之永延貴一旦之浮爵夫女愛不極席男歡不畢輪痛哉夫君戰國策楚江乙謂安陵君曰以財交者財盡而交絶以色交者華落而愛渝是以嬖女不敝席寵臣不敝軒吕不韋說華陽夫人曰以色事人者色衰而愛弛詩氓之序曰華落色衰復相棄背是諸說大抵意同皆以色而為喻士之嗜進而不知自反者尚監兹哉有美堂詩東坡在杭州作有美堂㑹客詩頷聮云天外黑風吹海立浙東飛雨過江來讀者疑海不能立黄魯直曰蓋是為老杜所誤因舉三大禮賦朝獻太清宮云九天之雲下垂四海之水皆立以告之二者皆句語雄峻前無古人坡和陶停雲詩有雲屯九河雪立三江之句亦用此也張天覺小簡張天覺熈寧中為渝州南川宰章子厚經制夔夷狎侮州縣吏無人敢與共語部使者念獨張可亢之檄至夔子厚詢人才使者以告即呼入同食張著道士服長揖就坐子厚肆意大言張隨機折之落落出其上子厚大喜延為上客歸而薦諸王介甫遂得召用政和六年張在荆南與子厚之子致平一帖云老夫行年七十有四日閱佛書四五卷早晩食米一升麵五兩肉八兩魚酒佐之以此為常亦不服煖藥唯以呼吸氣晝夜合天度而已數數夢見先相公語論如平生豈其人在天仙間而老夫定中神遊或遇之乎嗟乎安得竒男子如先相公者一快吾胸中哉此帖藏致平家其曽孫簡刻諸石予今年亦七十四歲姪孫偲於長興得墨本以相示聊記之云城狐社䑕城狐不灌社䑕不燻謂其所棲宂者得所憑依此古語也故議論者率指人君左右近習為城狐社䑕予讀說苑所載孟嘗君之客曰狐者人之所攻也䑕者人之所燻也臣未嘗見稷狐見攻社䑕見燻何則所託者然也稷狐之字甚竒且新用兵為臣下利富公奉使契丹國主言欲舉兵公曰北朝與中國通好則人主專其利而臣下無所獲若用兵則利歸臣下而人主任其禍故北朝羣臣爭勸舉兵者此皆其自謀非國計也勝負未可知就使其勝所亡士馬羣臣當之歟抑人主當之歟是時語録傳於四方蘇明允讀至此曰此一叚議論古人有之否東坡年未十歲在傍對曰記得嚴安上書云今徇南夷朝夜郎略薉州建城邑深入匈奴燔其龍城議者美之此人臣之利非天下之長策也正是此意明允以為然予又記魏太武時南邊諸將表稱宋人大嚴將入寇請先其未發逆擊之魏公卿皆以為當崔伯深曰朝廷羣臣及西北守將從陛下征伐西平赫連北破蠕蠕多獲美女珍寶南邊諸將聞而慕之亦欲南鈔以取資財皆營私計為國生事不可從也魏主乃止其論亦然誌文不可冗東坡為張文定公作墓誌銘有答其子厚之一書云志文路中已作得太半到此百冗未絶筆計得十日半月乃成然書大事略小節已有六千餘字若纎悉盡書萬字不了古無此例也知之知之蓋當時厚之意但欲務多耳又一帖云志文謁告數日方冩得了謹遣持納衰病眼眩辭翰皆不佳不知可用否今誌文正本凡七千一百字銘詩百六十字云予鄉士作一列大夫小郡守行狀九千言衢州士人詣闕上書二萬言使讀之者豈不厭倦作文者宜戒之坡帖藏梁氏竹齋趙晉臣鐫石於湖南憲司楚觀趙殺鳴犢漢書劉輔傳谷永等上書曰趙簡子殺其大夫鳴犢孔子臨河而還張晏注曰簡子欲分晉國故先殺鳴犢又聘孔子孔子聞其死至河而還也顔師古曰戰國策說二人姓名云鳴犢鐸犨而史記及古今人表並以為鳴犢竇犨蓋鐸犢及竇其聲相近故有不同耳今永等指鳴犢一人不論竇犨也韓退之將歸操亦云孔子之趙聞殺鳴犢作予按今本史記孔子世家乃以為竇鳴犢舜華說苑權謀篇云晉有澤鳴犢犨其不同如此五帝官天下漢蓋寛饒奏封事引韓氏易傳言五帝官天下三王家天下家以傳子官以傳賢若四時之運成功者去坐指意欲求禪而死故或云自後稱天子為官家蓋出於此今世無韓氏易諸家注釋漢書皆無一語惟說苑至公篇云秦始皇帝既吞天下召羣臣議五帝禪賢三王世繼孰是博士鮑令之對曰天下官則選賢是也天下家則世繼是也故五帝以天下為官三王以天下為家始皇帝歎曰吾徳出于五帝吾將官天下誰可使代我後者此說可以為證輒記之以補漢注之缺蒋濟萬機論亦有官天下家天下之語黄帝李法漢書胡建傳黄帝李法蘇林曰獄官名也天文志左角李右角將顔師古曰李者法官之號也其書曰李法唐世系表李氏自臯陶為堯大理厯虞夏商世世作此官以官命族為理氏至紂之時逃難於伊侯之墟食木子得全遂改理為李氏予按今本漢書天文志騎官左角理乃用理字而史記天官書則為李說苑載胡建事亦為理法然則理李一也故左傳數云行李徃來杜預注曰行李使人也至鄭子産與晉盟于平邱則曰行理之命注亦云行理使人通聘問者其義益明臯陶作大理傳子孫不改迨商之季幾千二百年世官乆任倉氏庫氏不足道矣表系疑不可信抄傳文書之誤今代所傳文書筆吏不謹至於成行脫漏予在三館假庾自直類文先以正本㸃撿中有數卷皆以後板為前予令書庫整頓然後錄之他多類此周益公以蘇魏公集付太平州鏤板亦先為勘挍其所作東山長老語錄序云側定政宗無用所以為用因蹄得兎忘言而後可言以上一句不明白又與下不對折簡來問予億莊子曰地非不廣且大也人之所用容足爾然而厠足而墊之致黄泉知無用而後可以言用矣始驗側定政宗當是厠足致泉正與下文相應四字皆誤也因記曽紘所書陶淵明讀山海經詩云形夭無千歲猛志固常在疑上下文義若不貫遂取山海經參挍則云刑天獸名也口中好銜干戚而舞乃知是刑天舞干戚故與下句相應五字皆訛以語友人岑公休晁之道皆撫掌驚歎亟取所藏本是正之此一節甚類蘇集云二十八宿二十八宿宿音秀若考其義則止當讀如本音嘗記前人有說如此説苑辯物篇曰天之五星運氣於五行所謂宿者日月五星之所宿也其義昭然大觀元夕詩大觀初年京師以元夕張燈開宴時再復湟鄯徽宗賦詩賜羣臣其頷聮云午夜笙歌連海嶠春風燈火過湟中席上和者皆莫及開封尹宋喬年不能詩密走介求援於其客周子雍得句云風生閶闔春來早月到蓬萊夜未中為時輩所稱子雍汝隂人曽受學於陳無已故有句法則作文為詩者可無師承乎顔魯公帖顔魯公忠義氣節史策略盡偶閱臨汝石刻見一帖云政可守不可不守吾去歲中言事得罪又不能逆道茍時為千古罪人也雖貶居逺方終身不恥汝曹當須謂吾之志不可不守也此是獨赴謫地而與其子孫者無由考其歲月千載之下使人讀之尚可畏而仰也文潞公奏除改官制自熈寧以來士大夫資厯之法日趨於壞歲甚一歲乆而不可復清近年愈甚綜核之制未嘗能守偶見文潞公在元祐中任平章軍國重事宣仁面諭令具自來除授官職次序一本進呈公遂具除改舊制節目以奏其一云吏部選兩任親民有舉主升通判通判兩任滿有舉主升知州軍謂之常調知州軍有績効或有舉薦名實相副者特擢升轉運使副判官或提㸃刑獄府推判官謂之出常調轉運使有路分輕重逺近之差河北陜西河東三路為重路歲滿多任三司使副或發運使發運任滿亦充三司副使成都路次三路京東西淮南又其次江東西荆湖兩浙又次之二廣福建梓利夔路為逺小已上三等路分轉運任滿或就移近上次等路分或歸任省府判官漸次擢充三路重任内提㸃刑獄則不拘路分輕重除授潞公所奏乃是治平以前常行今一切蕩然矣京朝官未嘗肯兩任親民纔為通判便望州郡至於監司既無輕重逺近之閒不復以序升擢云待制知制誥慶厯七年曽魯公公亮自脩起居注除天章閣待制時陳恭公獨為相其弟婦王氏冀公孫女曽出也當月旦出拜恭公迎語之曰六新婦曽三做從官想甚喜應聲對曰三舅荷伯伯提挈極驩喜只是外婆不樂恭公問故曰外婆見三舅來謝責之曰汝第五人及第當過詞掖想是全廢學故朝廷如此處汝恭公黙然自失後竟改知制誥蓋恭公不由科第不諳典故致受譏於女子而此女對答之時元未嘗徃外家也其警慧如此國家故事修注官次補必知制誥惟趙康靖公以歐陽公位在下而欲先遷司馬公以力辭三字皆除待制其雜壓先後可見云裴行儉景陽裴行儉為定襄道大緫管討突厥大軍次單于北暮已立營塹壕既周更命徙營髙岡吏白士安堵不可擾不聽促徙之比夜風雨暴至前占營所水深丈餘衆莫不駭歎問何以知之行儉曰自今第如我節制毋問我所以知也按戰國策云齊韓魏共攻燕楚王使景陽将而救之暮舍使左右司馬各營壁地已植表景陽怒曰女所營者水皆至滅表此焉可以舍乃令徙明日大雨山水大出所營者水皆滅表軍吏乃服二事正同而景陽之事不傳北人重甘蔗甘蔗只生於南方北人嗜之而不可得魏太武至彭城遣人於武陵王處求酒及甘蔗郭汾陽在汾上代宗賜甘蔗二十條子虚賦所云諸柘巴且諸柘者甘柘也蓋相如指言楚雲夢之物漢郊祀歌泰尊柘漿亦謂取甘蔗汁以為飲容齋四筆卷二欽定四庫全書卷容齋四筆卷三十六則宋洪邁撰韓退之張籍書韓公集中有答張籍二書其前篇曰吾子所論排釋老不若著書若僕之見則有異乎此請待五六十然後為之吾子又譏吾與人為無實駮雜之說此吾所以為戲耳若商論不能下氣或似有之博塞之譏敢不承教後篇曰二氏行乎中土蓋六百年非可以朝令而夕禁俟五六十為之未失也謂吾與人商論不能下氣若好勝者雖誠有之抑非好已勝也好己之道勝也駮雜之譏前書盡之昔者夫子猶有所戲烏害於道哉大略籍所論四事乞著書譏駮雜諌商論好勝及博塞也今得籍所與書前篇曰漢之衰浮圖之法入中國黄老之術相㳂而熾盍為一書以興存聖人之道執事多尚駮雜無實之説使人陳之前以為懽此有累於盛徳又商論之際或不容人之短如任私尚勝者亦有所累也况為博塞之戲與人競財乎廢棄日時不識其然願絶博塞之好棄無實之談𢎞慮以接士嗣孟軻揚雄之作使聖人之道復見於唐後篇曰老釋惑於生人乆矣執事可以任著書之事君子汲汲於所欲為若皆待五十六十而後有所為則或有遺恨矣君子發言舉足不逺於禮未聞以駮雜無實之說以為戲也執事毎見其說則拊抃呼笑是撓氣害性不得其正矣籍之二書甚勁而直但稱韓公為執事不曰先生考其時乃云執事參於戎府按韓公以貞元十二年為汴州推官時年二十有九十五年為徐州推官時年三十有二年位未盛籍未以師禮事之云韓公稱李杜新唐書杜甫傳贊曰昌黎韓愈於文章重許可至歌詩獨推曰李杜文章在光熖萬丈長誠可信云予讀韓詩其稱李杜者數端聊䟽於此石鼓歌曰少陵無人謫僊死才薄将柰石鼓何酬盧雲夫曰髙揖羣公謝名譽逺追甫白感至諴薦士曰勃興得李杜萬類困凌暴醉留東野曰昔年因讀李白杜甫詩長恨二人不相從感春曰近憐李杜無撿束爛漫長醉多文辭并唐志所引蓋六用之此日足可惜韓退之此日足可惜一首贈張籍凡百四十句雜用東冬江陽庚青六韻及其亡也籍作詩祭之凡百六十六句用陽庚二韻其語鏗鏘震厲全倣韓體所謂乃出二侍女合彈琵琶箏者是也粉白黛黑韓退之為文章不肯蹈襲前人一言一句故其語曰惟陳言之務去戞戞乎其難哉獨粉白黛緑四字似有所因列子周穆王築中天之臺簡鄭衞之處子娥媌靡曼者粉白黛黑以滿之戰國策張儀謂楚王曰鄭周之女粉白黛黒立於衢閒見者以為神屈原大招粉白黛黑施芳澤只司馬相如靚莊刻飾郭璞曰粉白黛黑也淮南子毛嬙西施施芳澤正娥眉設笄珥衣阿錫粉白黛黑笑目流眺韓公以黑為緑其㫖則同李杜徃來詩李太白杜子美在布衣時同游梁宋為詩酒㑹心之友以杜集考之其稱太白及懷贈之篇甚多如李侯金閨彦脫身事幽討南尋禹宂見李白道甫問訊今何如李白一㪷詩百篇自稱臣是酒中僊近來海内為長句汝與山東李白好昔者與髙李晩登單父臺李侯有佳句徃徃似隂鏗憶與髙李輩論交入酒壚白也詩無敵飄然思不羣昔年有狂客號爾謫僊人落月滿屋梁猶疑照顔色三夜頻夢君情親見君意秋來相顧尚飄蓬未就丹砂愧葛洪寂寞書齋裏終朝獨爾思凉風起天末君子意如何不見李生乆佯狂真可哀凡十四五篇至於太白與子美詩略不見一句或謂堯祠亭别杜補闕者是已乃殊不然杜但為右拾遺不曽任補闕兼自諫省出為華州司功迤邐避難入蜀未嘗復至東州所謂飯顆山頭之嘲亦好事者所撰耳李太白怖州佐李太白上安州裴長史書云白竊慕髙義得趨末塵何圖謗言忽生衆口攢毁将恐投杼下客震於嚴威若使事得其實罪當其身則将浴蘭沐芳自屏於烹鮮之地惟君侯死生之願君侯惠以大遇洞開心顔終乎前恩再辱英眄必能使精誠動天長虹貫日若赫然作威加以大怒即膝行而前再拜而去耳裴君不知何如人至譽其貴而且賢名飛天京天才超然度越作者稜威雄雄下慴羣物予謂白以白衣入翰林其蓋世英姿能使髙力士脫鞾於殿上豈拘拘然怖一州佐者邪蓋時有屈伸正自不得不爾大賢不偶神龍困於螻蟻可勝歎哉白此書自敘其平生云昔與蜀中友人吳指南死於洞庭之上白􅎭服慟哭炎月伏屍猛虎前臨堅守不動遂權殯於湖側數年來觀筋骨尚在雪泣持刃躬申洗削褁骨徒步負之而趨寢興攜持無輟身手遂丐貸營葬於鄂城其存交重義如此又與逸人東巖子隱於岷山巢居數年不跡城市養竒禽千計呼皆就掌取食了無驚猜其養髙忘機如此而史傳不為書之亦為未盡祝不勝詛齊景公有疾梁邱據請誅祝史晏子曰祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能勝億兆人之詛晉中行寅将亡召其太祝欲加罪曰子為我祝齋戒不敬使吾國亡祝簡對曰今舟車飾賦斂厚民怨謗詛多矣茍以為祝有益於國則詛亦将為損一人祝之一國詛之一祝不勝萬詛國亡不亦宜乎祝其何罪此二説若出一口真藥石之言也吕子論學吕子曰天生人而使其耳可以聞不學其聞則不若聾使其目可以見不學其見則不若盲使其口可以言不學其言則不若喑使其心可以智不學其智則不若狂故凡學非能益之也逹天性也能全天之所生而勿敗之可謂善學者矣此說甚美而罕為學者所稱故書以自戒曽太皇太后唐徳宗即位訪求其母沈太后厯順宗及憲宗時為曽祖母故稱為曽太皇太后蓋别於祖母也舊新二唐書紀皆載之今慈福太皇太后在夀康太上時已加尊稱若於主上則為曽祖母當用唐故事加曽字向者嘗以告宰相而省吏以為典故所無天子逮事三世安得有前比亦可謂不知禮矣又嗣濮王士歆在隆興為從叔祖在紹熈為曽叔祖慶元為髙叔祖矣而仍稱皇叔祖如故士歆視嗣秀王伯圭為從祖今圭稱皇伯祖而歆但為皇叔祖乃是弟爾禮寺亦以為國朝以來無稱曽髙者彼蓋不知累朝尊屬元未之有也中天之臺中天之臺有二其一列子曰西極化人見周穆王王為之改築宫室土木之功赭堊之色無遺巧焉五府為虚而臺始成其髙千仞臨終南之上名曰中天之臺其一新序曰魏王将起中天臺許綰負操鍤入曰臣能商臺王曰若何曰天與地相去萬五千里今王因而半之當起七千五百里之臺髙既如是其趾須方八千里盡王之地不足以為臺趾必起此臺先以兵伐諸侯盡有其地又伐四夷得方八千里乃足以為臺趾度八千里之外當定農畝之地足以奉給王之臺者臺具以備乃可以作王黙然無以應乃罷起臺實年官年士大夫敘官閥有所謂實年官年兩說前此未嘗見於官文書大抵布衣應舉必減歲數蓋少壯者欲藉此為求昏地不幸潦倒塲屋勉從特恩則年未六十始許入仕不得不豫為之圖至公卿任子欲其早列仕籍或正在童孺故率増擡庚甲有至數歲者然守義之士猶曰兒曹甫策名委質而父祖先導之以挾詐欺君不可也比者以朝臣屢言年及七十者不許任監司郡守搢紳多不自安爭引年以決去就江東提刑李信甫雖春秋過七十而官年損其五堅乞致仕有㫖官年未及與之外祠知房州章騆六十八歲而官年増其三亦求罷去諸司以其精力未衰援實為請有㫖聽終任知嚴州秦焴乞祠之䟽曰實年六十五而官年已踰七十遂得去齊慶胄寧國乞歸亦曰實年七十而官年六十七於是實年官年之字形於制書播告中外是君臣上下公相為欺也掌故之野甚矣此豈可紀於史録哉雷公炮炙論雷公炮炙論載一藥而能治重疾者今醫家罕用之聊志於此其説云髮眉墮落塗半夏而立生目辟眼􅀈有五花而自正脚生肉栨裩繋菪根囊皺漩多夜煎竹木體寒腹大全賴鸕鷀血泛經過飲調𤓰子咳逆數數酒服熟雄遍體􅇙風冷調生側腸虚泄利須假草零乆渴心煩宜投竹瀝除癥去塊全仗硝硇益食加觴須煎蘆朴强筋健骨湏是蓯鱓駐色延年精蒸神錦知瘡所在口㸃隂膠産後肌浮甘皮酒服腦痛鼻投硝末心痛速覔延胡凡十八項謂眉髮墮落者煉生半夏莖取涎塗髮落處立生五花者五加皮也葉有雄雌三葉為雄五葉為雌須使五葉者作末酒浸用之目􅀈者正脚有肉栨者取莨菪根繋裩帶上永痊多小便者煎萆薢服之永不夜起若患腹大如鼓米飲調鸕鷀末服立枯如故血泛行者搗甜𤓰子仁作末去油飲調服之立絶咳逆者天雄炮過以酒調一錢匕服􅇙風者側子附子傍生者作末冷酒服虚泄者搗五倍子末熟水下之癥塊者以硇砂硝石二味乳鉢中研作粉同煆了酒服神効不飲者并飲酒少者煎逆水蘆根并厚朴二味湯服之蓯蓉并鱓魚作末以黄精汁圓服之可力倍常日也黄精自然汁拌細研神錦於柳木甑中蒸七日了以蜜圓服顔貌可如㓜女之容色隂膠即是甑中氣垢㸃少許於口中即知臟腑所起直徹至住處知痛足可醫也産後肌浮酒服甘皮立枯頭痛者以硝石作末内鼻中立止心痛者以延胡索作散酒服之治藥捷法藥有至賤易得人所常用而難於修製者如香附子莵絲子艾葉之類醫家昧其節度或終日疲勞而不能成本草云凡莵絲子煖湯淘汰去沙土漉乾煖酒漬經一宿漉出暴微白搗之不盡者更以酒漬經三五日乃出更晒㣲乾搗之須㬰悉盡極易碎蓋以其顆細難施工其說亦殊勞費然自有捷法但撚紙條數枚寘其閒則馴帖成粉香附子洗去皮毛炒之焦熟然後舉投水鉢内候浸漬透徹漉出暴日中㣲燥乃入搗臼悉應手糜碎艾葉柔軟不可著力若入白茯苓三五片同碾則即時可作細末陳翠說燕后趙左師觸龍說太后使長安君出質用愛憐少子之說以感動之予嘗論之於隨筆中其事載於戰國策史記資治通鑑而燕語中又有陳翠一段甚相似云陳翠合齊燕将令燕王之弟為質於齊太后大怒曰陳公不能為人之國則亦已矣焉有離人子母者翠遂入見后曰人主之愛子也不如布衣之甚也非徒不愛子也又不愛丈夫子獨甚太后曰何也對曰太后嫁女諸侯奉以千金今王願封公子羣臣曰公子無功不當封今以公子為質且以為功而封之也太后弗聽是以知人主之不愛丈夫子獨甚也且太后與王幸而在故公子貴太后千秋之後王棄國家而太子即位公子賤於布衣故非及太后與王封公子則終身不封矣太后曰老婦不知長者之計乃命為行具此語與觸龍無異而史記不書通鑑不取學者亦未嘗言燕非强國北燕在春秋時最為僻小能自見於中國者不過三四大率制命於齊七雄之際為齊所取後賴五國之力樂毅為将然後勝齊然卒於得七十城不能守也故蘇秦說趙王曰趙北有燕燕固弱國不足畏也燕王曰寡人國小西迫強秦南近齊趙齊趙彊國也又曰天下之戰國七而燕處弱焉獨戰則不能有所附則無不重昭王謂郭隗曰孤極知燕弱小不足以報齊蘇代曰一齊之彊燕猶不能支奉陽君曰燕弱國也東不如齊西不如趙趙長平之敗壯者皆死燕以二千乗攻之為趙所敗太子丹謂荆軻曰燕小弱數困於兵何足以當秦楚漢之初趙王武臣為燕軍所得趙廝養卒謂其将曰一趙尚易燕况以兩賢王滅燕易矣彭寵以漁陽叛即時夷滅十六國之起戎狄亂華稱燕稱趙者多矣未嘗有只據幽薊之地者也獨安禄山以三十年節制之威又兼領河東乗天寳政亂出不意而舉兵史思明繼之雖為天下之禍旋亦殄滅至於藩鎮擅地所謂范陽盧龍固常受制於天雄成徳也劉仁恭守光父子僭竊一方唐莊宗遣周徳威攻之克取巡屬十餘州如拾地芥石晉割賂契丹仍其舊國恃以為强然晉開運陽城之戰徳光幾不免周世宗小振之立下三關但太平興國失於輕舉又不治敗将䘮師之罪致令披猖以迄于今若以謂幽燕為用武之地則不然也水旱祈禱海内雨暘之數郡異而縣不同為守為令能以民事介心必自知以時禱祈不待上命也而省部循案故例但視天府為節下之諸道轉運司使巡内州縣各詣名山靈祠精㓗致禱然固難以一槩論乾道九年秋贑吉連雨暴漲予守贑方多備土囊壅諸城門以杜水入凡二日乃退而臺符令禱雨予格之不下但據實報之已而聞吉州於小㕔設祈晴道塲大㕔祈雨問其故郡守曰請霽者本郡以淫潦為灾而請雨者朝㫖也其不知變如此殆為威侮神天幽冥之下将何所据慿哉俚語笑林謂兩商人入神廟其一陸行欲晴許賽以猪頭其一水行欲雨許賽羊頭神顧小鬼言晴乾喫猪頭雨落吃羊頭有何不可正謂此耳坡詩云耕田欲雨刈欲晴去得順風來者怨若使人人禱輒遂造物應須日千變此意未易為庸俗道也容齋四筆卷三欽定四庫全書容齋四筆卷四十五則宋洪邁撰今日官宂元豐中曽鞏判三班院今侍右也上䟽言國朝景徳墾田百七十萬頃官萬員皇祐二百二十五萬頃官二萬員治平四百三十萬頃官二萬四千員田日加辟官日加多而後之郊費視前一倍以三班三年之籍較之其入籍者幾七百人而死亡免退不能二百是年増歲溢未見其止則用財之端入官之門當令有司講求其故使天下之人如治平而財之用官之數同景徳以三十年之通可以餘十年之蓄矣是時海内全盛倉庫多有樁積猶有此懼慶元二年四月有朝臣奏對極言云曩在乾道閒京朝官三四千員選人七八千員紹熈二年四選名籍尚左京官四千一百五十九員尚右大使臣五千一百七十三員侍左選人一萬二千八百六十九員侍右小使臣一萬一千三百十五員合四選之數共二萬三千五百十六員冗倍於國朝全盛之際近者四年之閒京官未至増添外選人増至一萬三千六百七十員比紹熈増八百一員大使臣六千五百二十五員比紹熈増一千三百四十八員小使臣一萬八千七百五員比紹熈増七千四百員而今年科舉明年奏薦不在焉通無慮四萬三千員比四年之數増萬員矣可不為之寒心哉蓋連有覃霈慶典屢行而宗室推恩不以服􅉽近逺為閒斷特奏名三舉皆值異恩雖助教亦出官歸正人毎州以數十百病在膏盲正使俞跗扁鵲持上池良藥以救之亦無及已欒城和張安道詩張文定公在蜀一見蘇公父子即以國士許之熈寧中張守陳州南都辟子由幕府元豐初東坡謫齊安子由貶監筠酒稅與張别張悽然不樂酌酒相命手寫一詩曰可憐萍梗飄蓬客自歎匏𤓰老病身從此空齋掛塵榻不知重掃待何人後七年子由召還猶復見之於南都及元符末自龍川還許昌因姪叔黨出坡遺墨再讀張所贈詩其薨已十年泣下不能已乃追和之曰少年便識成都尹中歲仍為幕下賔待我江西徐孺子一生知己有斯人兩詩皆哀而不怨使人至今有感於斯文今世薄夫受人異恩轉眼若不相識况於一死一生拳拳如此忠厚之至殆可端拜也和范杜蘇四公晉相和凝以唐長興四年知貢舉取范質為第十三人唐故事知貢舉者所放進士以已及第時名次為重謂之傳衣鉢蓋凝在梁貞明中居此級故以處質且云他日當如我後皆至宰相封魯國公官至太子太傅當時以為榮凝夀止五十八質止五十四三朝史質本傳亦書之而新五代史和凝傳誤為第五以登科記考之而非也杜祁公罷相以太子少師致仕後以南郊免陪位恩連進至太子太師年八十而薨蘇子容初筮仕為南京判官杜公方里居告以平生出處本末曰子異日所至亦如老夫及蘇更踐中外名徳殊與之相似集中有謝杜公書正敘此事其罷相也亦以太子太師致仕進太保年八十二而薨昔賢謂貴人徃徃善相人以所閱多之故也此二者併官爵年夀皆前知異矣外臺祕要外臺祕要載制虎方云到山下先閉氣三十五息所在山神将虎來到吾前乃存吾肺中有白帝出收取虎兩目塞吾下部中乃吐肺氣上自通冠一山林之上於是良乆又閉氣三十五息兩手捻都監目作三步步皆以右足在前乃止祝曰李耳李耳圖汝非李耳邪汝盗黄帝之犬黄帝教我問汝云何畢便行一山虎不可得見若卒逢之者因正面立大張左手五指側之極勢跳手上下三度於跳中大喚咄曰虎北斗君使汝去虎即走予謂人卒逢虎䰟􅅎驚怖竄伏之不暇豈能雍容步趨仗呪語七字而脫邪因讀此方聊書之以發一笑此書乃唐王珪之孫燾所作本傳云燾視母疾數從髙醫游遂窮其術因以所學作書討繹精明世寳焉蓋不深考也六枳關盤洲種枳六本以為藩籬之限立小門名曰六枳關每為人問其所出倦於酬應今取馮衍顯志賦中語書於此衍云揵六枳而為籬按東觀漢記作八枳逸周書小開篇云嗚呼汝何敬非時何擇非徳徳枳維大人大人枳維公公枳維卿卿枳維大夫大夫枳維士登登皇皇維在國枳國枳維都都枳維邑邑枳維家家枳維欲無疆言上下相維遞為藩蔽也其數有八與東觀記同予詳考之乃九枳也宋景文公賀宰相啓式維公枳蓋用此云王荆公上書并詩王荆公議論髙竒果於自用嘉祐初為度支判官上萬言書以為今天下財力日以困窮風俗日以衰壞患在不知法度不法先王之政故也法先王之政者法其意而已法其意則吾所改易更革不至乎傾駭天下之耳目而固已合矣因天下之力以生天下之財取天下之財以供天下之費自古治世未嘗以不足為公患也患在治財無其道爾在位之人才既不足而閭巷草野之閒亦少可用之材社稷之託封疆之守陛下其能乆以天幸為常而無一旦之憂乎願監茍且因循之敝明詔大臣為之以漸期為合於當世之變臣之所稱流俗之所不講而議者以為迂闊而熟爛者也當時富韓二公在相位讀之不樂知其得志必生事後安石當國其所注措大抵皆祖此書又不忍貧民而深疾富民志欲破富以惠貧嘗賦兼并詩一篇曰三代子百姓公私無異財人主擅操柄如天持斗魁賦予皆自我兼并乃姦回姦回法有誅勢亦無自來後世始倒持黔首遂難裁秦王不知此更築懷清臺禮義日已媮聖經乆堙埃法尚有存者欲言時所咍俗吏不知方掊克乃為才俗儒不知變兼并可無摧利孔至百出小人司闔開有司與之爭民愈可憐哉其語絶不工迨其得政設青苖法以奪富民之利民無貧富兩稅之外皆重出息十二呂惠卿復作手實之法民遂大病其禍源於此詩蘇子由以為昔之詩病未有若此其酷也痛哉左黄州表唐肅宗時王璵以祠禱見寵驟得宰相帝嘗不豫璵遣女巫乘傳分禱天下名山大川巫皆盛服中人護領所至干託州縣賂遺狼藉時有一巫美而豔以惡少年數十自隨尤憸狡不法馳入黄州刺史左震晨至館請事門鐍不啓震怒破鐍入取巫斬廷下悉誅所從少年籍其贓得十餘萬因遣還中人璵不能詰帝亦不加罪震剛決如此而史不記其他事予讀元次山集有左黄州表一篇云乾元己亥贊善大夫左振出為黄州刺史下車黄人歌曰我欲逃鄉里我欲去墳墓左公今既來誰忍棄之去後一歲又歌曰吾鄉有鬼巫惑人人不知天子正尊信左公能殺之蓋此巫黄人也振在州三遷侍御史判金州刺史将去黄人多去思故為作表予謂振即震也為政宜民見於歌頌史官當特書之於循吏中而僅能不没其實故為標顯於此己亥者乾元二年璵以元年五月自太常少卿拜中書相二年三月罷本紀及宰相表同而新史本傳以為三年自太常卿拜相明日罷失之矣乃承舊史之誤也李郭詔書唐代宗即位郭汾陽為近昵所搖懼禍之及表上自靈武河北至于絳州兩朝所貽詔書一千餘卷家傳載其表語其多如是又讀韋端符所撰李衞公故物記云三原令座中有客曰李丞者衞公之胄藏文帝賜書二十通多言征討事厚勞苦其兵事節度皆付公吾不從中治也暨公疾親詔者數四其一曰有晝夜視公病大老嫗令一人來吾欲熟知公起居狀權文公視此詔常泣曰君臣之際乃如是耶新史載其事云靖五代孫彦芳太和中為鳳翔司録參軍以髙祖太宗賜靖詔書數函上之天子悉留禁中又勑摹詔本還賜彦芳即二事觀之唐世之所以眷禮名将相者綢繆熟復至此漢晉以來所不及也兩道出師國家用兵行師異道並出其勝敗功罪當隨其實而處之則賞信罸明人知勸戒漢武帝遣衞青霍去病伐匈奴去病以功益封又封部将四人為列侯而青不得益封軍吏卒皆無封侯者宣帝遣田廣明等五将軍撃匈奴又以常惠護烏孫兵共出五将皆無功而廣明及田順以罪誅獨常惠奉使克獲封侯宋文帝伐魏雍州諸将柳元景等既㧞𢎞農陜城戍潼關矣而上以東軍王元謨敗退皆召還其後元謨貶黜元景受賞紹興七年淮西大帥劉少師罷湖北岳少保以母憂去累辭起復之命朝廷以兵部尚書吕安老侍郎張淵道分使兩部已而正除宣撫遂掌其軍岳在九江憂兵柄一失不容再得亟兼程至鄂有㫖復故任而召淵道為樞宻都承㫖安老在廬遭變言者論罷張魏公淵道亦繼坐斥隆興中北虜再動兵張公為督帥遣李顯忠邵宏淵攻符離失利而退一府皆貶秩是時汪莊敏以參知政事督視荆襄東西不相為謀乃亦坐譴古今不侔如此杜韓用歇後語杜韓二公作詩或用歇後語如悽其望吕葛仙鳥仙花吾友于友于皆挺㧞再接再礪乃僮僕誠自劊為爾惜居諸誰謂貽厥無基趾之類是已唐明皇賜二相物唐明皇以李林甫為右相顓付大政而左相牛仙客李適之陳希烈前後同列皆拱手備員林甫死楊國忠代之其寵遇愈甚天寳十三載上御躍龍殿門張樂宴羣臣賜右相絹一千五百疋綵羅三百疋綵綾五百疋而賜左相絹三百羅綾各五十而已其多寡不侔至於五倍如希烈庸才知上恩意安得不奴事之乎宜其甘心臣於禄山也一百五日今人謂寒食為一百五者以其自冬至之後至清明厯節氣六凡為一百七日而先兩日為寒食故云他節皆不然也杜老有鄜州一百五日夜對月一篇江西宗派詩云一百五日足風雨三十六峰勞夢魂一百五日寒食雨二十四畨花信風之類是也吾州城北芝山寺為禁煙遊賞之地寺僧欲建華嚴閣請予作勸縁䟽其末一聮云大善知識五十三永壯人天之仰寒食清明一百六鼎來道俗之觀或問一百六所出應之曰元微之連昌宮詞初過寒食一百六店舍無煙宫樹緑是以用之老杜寒山詩老杜春日憶李白詩云白也詩無敵飄然思不羣清新庾開府俊逸鮑參軍嘗有武弁議其失曰既是無敵又却似庾鮑或折之曰庾清新而不能俊逸鮑俊逸而不能清新太白兼之所以為無敵也今集别本一作無數殆好事者更之乎寒山子詩云吾心似秋月碧潭清皎㓗無物堪比倫教我如何說人亦有言既似秋月碧潭乃以為無物堪比何也蓋其意謂若無二物比倫當如何説耳讀者當以是求之礜石之毒讀黄伯思東觀餘論内評王大令書一節曰靜息帖云礜石深是可疑事兄憙患散輒發癰散者寒食散之類散中蓋用礜石是性極熱有毒故云深可疑也劉表在荆州與王粲登障山見一岡不生百草粲曰此必古冡其人在世服生礜石熱蒸出外故草木焦滅鑿看果墓礜石滿塋又今洛水冬月不冰古人謂之温洛下亦有礜石今取此石置甕水中水亦不冰又鸛伏卵以助煖氣其烈酷如此固不宜餌服子敬之語實然淮南子曰人食礜石死蠶食之而不饑予仲兄文安公鎮金陵因秋暑減食當塗醫湯三益教以服礜石圓已而飲啖日進遂加意服之越十月而毒作鼻衂血斗餘自是數數不止竟至精液皆竭迨於捐館偶見其語使人追痛因書之以戒未來者㑹合聮句韻略上聲二腫字險窄予向作汪莊敏銘詩八十句唯蕭敏中讀之曰押盡一韻今考之猶有十字越用一董内韻其詞曰維天生材萬彚傾竦侯王将相曽是有種公家江東世繹耕壟桃谿之涘是播是㥎孰丰厥培蓺此圭珙公羈未奮逸駕思駷沈酣春秋蹈迪周孔徑策名第稍辭渫䢇横經湘沅士敬如捧蓬萊方丈佩飾有琫應龍天飛薈蔚雲滃千官在序摩厲從㬰吾惟片言借箸泉湧正冠霜臺過者卞悚顔顔殿戺聲氣不動顯仁東欑巫史呼洶昌言一下恩浹千冡獯粥孔熾邊戒毛氄媕娿當位左掣右壅公云當今沸渭混澒天威震耀誰不憤踊遂遷中司西柄是董出關啓斾籌檄倥偬業業荆襄将懦日拱投袂電赴如尊乃勇鄧唐蔡陳馳捷系踵佛狸歸骴民恃不恐璽書賜朝百揆參揔亞勛贊冊國勢尊鞏督軍載西寄責罙重方規許洛事援秦隴符離罔功竒畫膠拲鈞樞建使宰席亢寵還臨西州夾道歡擁有銜未鬯病癖且尰曽不愸遺使我心懵湘湖髙邱草木蔚蓊維水容裔維山巃嵸矢其銘詩詞費以冗柰何乎公萬禩毋聳若韓孟籍徹㑹合聮句三十四韻除􅀈蛹二字韻略不收外餘皆不出二腫中雄竒激越如大川洪河不見涯涘非𤨏𤨏潢汙行潦之水所可同語也其詩曰離别言無期㑹合意罙重病添兒女戀老䘮丈夫勇劒心知未死詩思猶孤聳愁去劇箭飛讙來若泉涌析言多新貫攄抱無昔壅念難須勤追悔易勿輕踵吟巴山犖嶨說楚波堆壟馬辭虎豹怒舟出蛟鼉恐狂鯨時孤軒幽􅎜雜百種瘴衣常腥膩蠻器多踈冗剥苔吊斑林角飯餌沉塚忽爾銜逺命歸歟舞新寵鬼窟脫幽妖天居覿清拱京遊步方振謫夢意猶恟詩書誇舊知酒食接新奉嘉言寫清越瘉病失肬腫夏隂偶髙庇宵䰟接虚擁雪弦寂寂聽茗盌纎纎捧馳輝燭浮螢幽響泄潛蛬詩老獨何心江疾有餘尰我家本瀍糓有地介臯鞏休跡憶沉冥峩冠慙闟䢇升朝髙轡逸振物羣聽悚徒言濯幽泌誰與薙荒茸朝紳鬱青緑馬飾曜珪珙國讐未銷鑠我志蕩卭隴君才誠倜儻時論方洶溶格言多彪蔚縣解無梏拲張生得淵源寒色㧞山冡堅如撞羣金眇若抽獨蛹伊余何所擬跛鼈詎能踊塊然墮岳石飄爾罥巢氄龍斾垂天衢雲韶凝禁甬君胡眠安然朝鼓聲洶洶其閒或有纇句然衆手立成理如是也容齋四筆卷四欽定四庫全書容齋四筆卷五十四則宋洪邁撰土木偶人趙徳夫作金石錄其䟦漢居攝墳壇二刻石云其一上谷府卿墳壇其一祝其卿墳壇曰墳壇者古未有土木像故為壇以祀之兩漢時皆如此予案戰國策所載蘇秦謂孟嘗君曰有土偶人與桃梗相語桃梗曰子西岸之土也埏子以為人雨下水至則汝殘矣土偶曰子東國之桃梗也刻削子以為人雨降水至流子而去矣所謂土木為偶人非像而何漢至寓龍寓車馬皆謂以木為之像其真形謂之兩漢未有則不可也饒州風俗嘉祐中吳孝宗子經者作餘干縣學記云古者江南不能與中土等宋受天命然後七閩二浙與江之西東冠帶詩書翕然大肆人才之盛遂甲於天下江南既為天下甲而饒人喜事又甲於江南盖饒之為州壤土肥而養生之物多其民家富而户羨蓄百金者不在富人之列又當寛平無事之際而天性好善為父兄者以其子與弟不文為咎為母妻者以其子與夫不學為辱其美如此予觀今之饒民所謂家富户羨了非昔時而髙甍巨棟連阡亘陌者又皆數十年來寓公所擅而好善為學亦不盡如吳記所言故録其語以寄一歎禽畜菜茄色不同禽畜菜茄之色所在不同如江浙間猪黒而羊白至江廣吉州以西二者則反是蘇秀閒鵞皆白或有一班褐者則呼為鴈鵞頗異而畜之若吾鄉凡鵞皆鴈也小兒至取浙中白者飼養以為湖沼觀美浙西常茄皆皮紫其皮白者為水茄吾鄉常茄皮白而水茄則紫其異如是伏龍肝本草伏龍肝陶隠居云此竈中對釜月下黄土也以竈有神故呼為伏龍肝并以透隱為名爾雷公云凡使勿悞用竈下土其伏龍肝是十年已來竈額内火氣積自結如赤色石中黄其形貌八稜予嘗見臨安醫官陳輿大夫言當以砌竈時納猪肝一具於土中俟其積乆與土為一然後用之則稍與名相應比讀後漢書隂識傳云其先隂子方臘日晨炊而竈神形見注引雜五行書曰宜市買猪肝泥竈令婦孝然則輿之說亦有所本云廣濟厯亦有此說又列作竈忌日云伏龍在不可移作所謂伏龍者竈之神也勇怯無常民無常勇亦無常怯有氣則實實則勇無氣則虚虚則怯怯勇虚實其由甚㣲不可不知勇則戰怯則北戰而勝者戰其勇者也戰而北者戰其怯者也怯勇無常儵忽徃來而莫知其方惟聖人獨見其所由然此吕氏春秋決勝篇之語予愛而書之趙徳甫金石録東武趙明誠徳甫清憲丞相中子也著金石録三十篇上自三代下訖五季鼎鍾甗鬲槃匜尊爵之欵識豐碑大碣顯人晦士之事蹟見于石刻者皆是正偽謬去取褒貶凡為卷二千其妻易安李居士平生與之同志趙没後愍悼舊物之不存乃作後序極道遭罹變故本末今龍舒郡庫刻其書而此序不見取比獲見元藁於王順伯因為撮述大槩云予以建中辛巳歸趙氏時丞相作吏部侍郎家素貧儉徳甫在太學毎朔望謁告出質衣取半千錢步入相國寺市碑文果實歸相對展玩咀嚼後二年從官便有窮盡天下古文竒字之志傳冩未見書買名人書畫古竒器有持徐熈牡丹圖求錢二十萬留信宿計無所得捲還之夫婦相向惋悵者數日及連守兩郡竭俸入以事鈆槧毎獲一書即日勘挍裝緝得名畫彞器亦摩玩舒卷摘指疵病盡一燭為率故紙札精緻字畫全整冠於諸家毎飯罷坐歸來堂烹茶指堆積書史言某事在某書某卷第幾葉第幾行以中否勝負為飲茶先後中則舉桮大笑或至茶覆懷中不得飲而起凡書史百家字不刓缺本不誤者輒市之儲作副本靖康丙午徳甫守淄川聞金犯京師盈箱溢篋戀戀悵悵知其必不為己物建炎丁未奔太夫人䘮南來既長物不能盡載乃先去書之印本重大者畫之多幅者噐之無欵識者已又去書之監本者畫之平常者噐之重大者所載尚十五車連艫渡淮江其青州故第所鎻十閒屋期以明年具舟載之又化為煨燼己酉歲六月徳甫駐家池陽獨赴行都自岸上望舟中告别予意甚惡呼曰如傳聞城中緩急奈何遥應曰從衆必不得已先弃輜重次衣衾次書冊次卷軸次古噐獨宋噐者可自負抱與身俱存亡勿忘之徑馳馬去秋八月徳甫以病不起時六宫徃江西予遣二吏部所存書二萬卷金石刻二千本先徃洪州至冬金䧟洪遂盡委弃所謂連艫渡江者又散為雲煙矣獨餘輕小卷軸寫本李杜韓栁集世說鹽鐵論石刻數十副軸鼎鼐十數及南唐書數篋偶在卧内巋然獨存上江既不可徃乃之台温之衢之越之杭寄物於嵊縣庚戌春官軍收叛卒悉取去入故李将軍家巋然者十失五六猶有五七簏挈家寓越城一夕為盗宂壁負五簏去盡為吳說運使賤價得之僅存不成部帙殘書策數種忽閱此書如見故人因憶徳甫在東萊靜治堂装褾初就芸籖縹帶束十卷作一帙日挍二卷䟦一卷此二千卷有題䟦者五百二卷耳今手澤如新墓木已拱乃知有有必有無有聚必有散亦理之常又胡足道所以區區記其終始者亦欲為後世好古博雅者之戒云時紹興四年也易安年五十二矣自叙如此予讀其文而悲之為識於是書韓文公薦士唐世科舉之柄顓付之主司仍不糊名又有交朋之厚者為之助謂之通牓故其取人也畏於譏議多公而審亦有脅於權勢或撓於親故或累於子弟皆常情所不能免者若賢者臨之則不然未引試之前其去取髙下固已定於胸中矣韓文公與祠部陸員外書云執事與司貢士者相知識彼之所望於執事者至而無閒彼之職在乎得人執事之職在乎進賢如得其人而授之所謂兩得矣愈之知者有侯喜侯雲長劉述古韋羣玉摭言作紓此四子者可以當首薦而極論期於成而後止可也沈把張苰科記又作宏尉遲汾李紳張後餘李翊皆出羣之才與之足以收人望而得才實主司廣求焉則以告之可也徃者陸相公司貢士愈時幸在得中所與及第者皆赫然有聲原其所以亦由梁補闕肅王郎中礎佐之梁舉八人無有失者其餘則王皆與謀焉陸相於王與梁如此不疑也至今以為美談此書在集中不注歲月案摭言云貞元十八年權徳輿主文陸傪員外通牓韓文公薦十人於傪權公凡三榜共放六人餘不出五年内皆捷以登科記考之貞元十八年徳輿以中書舍人知舉放進士二十三人尉遲汾侯雲長韋紓沈把李翊登第十九年以禮部侍郎放二十人侯喜登第永貞元年放二十九人劉述古登第通三榜共七十二人而韓所薦者預其七元和元年崔邠下放李紳二年又放張後餘張宏皆與摭言合陸傪在貞元閒時名最著韓公敬重之其行難一篇為傪作也曰陸先生之賢聞於天下是是而非非自越州召拜祠部京師之人造焉先生曰今之用人也不詳位于朝者吾取某與某而已在下者多于朝凡吾與者若干人又送其刺歙州序曰君出刺歙州朝廷耆舊之賢都邑游居之良齎咨涕夷咸以為不當去則傪之以人物為己任乆矣其刺歙以十八年二月權公放牓時既以去國而用其言不替其不負公議而采人望盖與陸宣公同韓公與書時方為四門博士居百寮底殊不以其薦為犯分故公作權公碑云典貢士薦士於公者其言可信不以其人布衣不用即不可信雖大官勢人交言一不以綴意又云前後考第進士及庭所䇿試士踊相躡為宰相逹官其餘布處臺閣外府凡百餘人梁肅及傪皆為後進領袖一時龍門惜其位不通顯也豈非汲引善士為當國者所忌乎韓公又有荅劉正夫書云舉進士者於先進之門何所不徃先進之於後輩茍見其至寧可以不荅其意邪來者則接之舉城士大夫莫不皆然而愈不幸獨有接後進名以是觀之韓之留意人士可見也王勃文章王勃等四子之文皆精切有本原其用駢儷作記序碑碣盖一時體格如此而後來頗議之杜詩云王楊盧駱當時體輕薄為文哂未休爾曹身與名俱滅不廢江河萬古流正謂此耳身名俱滅以責輕薄子江河萬古流指四子也韓公滕王閣記云江南多游觀之美而滕王閣獨為第一及得三王所為序賦記等壮其文辭注謂王勃作游閣序又云中丞命為記竊喜載名其上詞列三王之次有榮耀焉則韓之所以推勃亦為不淺矣勃之文今存者二十七卷云吕覽引詩書吕氏春秋有始覽諭大篇引夏書曰天子之徳廣運乃神乃武乃文又引商書曰五世之廟可以觀恠萬夫之長可以生謀髙誘注皆曰逸書也廟者鬼神之所在五世乆逺故於其所觀魅物之恠異也予謂吕不韋作書時秦未有詩書之禁何因所引訛謬如此髙誘注文恠異之説一何不典之甚邪又孝行覽亦引商書曰刑三百罪莫重於不孝今安得有此文亦與孝經不合又引周書曰若臨深淵若履薄冰注云周書周文公所作尤妄也又以普天之下莫非王土率土之濵莫非王臣為舜自作詩子惠思我褰裳涉洧子不我思豈無他士為子產荅叔向之詩不知是時國風雅頌何所定也寗戚飯牛歌髙誘全引碩䑕三章又為可笑藍田丞壁記韓退之作藍田縣丞㕔壁記柳子厚作武功縣丞㕔壁記二縣皆京兆屬城在唐為畿甸事體正同而韓文雄㧞超峻光前絶後以柳視之殆猶碔砆之與美玉也莆田方崧卿得蜀本數處與今文小異其破崖岸而為文一句繼以丞㕔故有記蜀本無而字考其語脉乃破崖岸為文丞是句絶文丞者猶言文具備員而已語尤竒崛若以丞字屬下句則既是丞㕔記矣而又云丞㕔故有記雖初學為文者不肯爾也此篇之外不復容後人出手姪孫倬頃丞宣城後生頗有意斯道自作題名記示予予曉之曰他文尚可隨力工拙下筆至如此記豈宜犯不韙哉倬時已勒石深悔之近日亦見有為之者吾家孫姪多京官調選再轉必為丞慮其復有效尤者故書以戒之錢武肅三改元歐陽公五代史敘列國年譜云聞於故老謂吳越亦嘗稱帝改元而求其事迹不可得頗疑吳越後自諱之及旁采諸國書與吳越徃來者多矣皆無稱帝之事獨得其封落星石為寳石山制書稱寳正六年辛卯耳王順伯收碑有臨安府石屋崇化寺尊勝幢云時天寳四年歲次辛未四月某日元帥府府庫使王某又明慶寺白傘盖陀羅尼幢云吳越國女弟子吳氏十五娘建其發願文序曰十五娘生忝覇朝貴彰國懿天寳五年太歲壬申月日題順伯考其歲年知非唐天寳而辛未乃梁開平五年其五月改乾化壬申乃二年梁以丁卯簒唐武肅是歲猶用唐天祐次年自建元也錢唐湖廣潤龍王廟碑云錢鏐貞明二年丙子正月建新功臣壇院碑封睦州墻下神廟勅皆貞明中登聖寺磨崖梁龍徳元年歲次辛巳錢鏐建又有龍徳三年上宫詩是歲梁亡九里松觀音尊勝幢寳大二年歲次乙酉建衢州司馬墓誌云寳大二年八月殁順伯案乙酉乃唐莊宗同光三年其元年當在甲申盖自壬申以後用梁紀元至後唐革命復自立正朔也又水月寺幢云寳正元年丙戌十月具位錢鏐建是年為明宗天成招賢寺幢云丁亥寳正二年又小昭慶金牛碼碯等九幢皆二年至五年所刻貢院前橋柱刻寳正六年歲在辛卯造然則寳大止二年而改寳正寳正盡六年次年壬辰有天竺日觀庵經幢復稱長興三年八月用唐正朔其年三月武肅薨方寢疾語其子元瓘曰子孫善事中國勿以易姓廢事大之禮於是以遺命去國儀用藩鎮法然則有天寳寳大寳正三名歐陽公但知其一耳通鑑亦然自是厯晉漢周及本朝不復建元今猶有清泰天福開運㑹同係契丹年乾祐廣順顯徳石刻存者三四十種固未嘗稱帝也黄庭換鵝李太白詩云山隂道士如相見應寫黄庭換白鵝盖用王逸少事也前賢或議之曰逸少寫道徳經道士舉鵝群以贈之元非黄庭以為太白之誤予謂太白眼髙四海衝口成章必不規規然旋撿閱晉史看逸少傳然後落筆正使誤以道徳為黄庭於理正自無害議之過矣東坡雪堂既毁紹興初黄州一道士自捐錢粟再營建士人何頡斯舉作上梁文其一聮云前身化鶴曽陪赤壁之游故事換鵝無復黄庭之字乃用太白詩為出處可謂竒語案張彥逺法書要録載褚遂良右軍書目正書有黄庭經云注六十行與山隂道士真蹟故在又武平一徐氏法書記云武后曝太宗時法書六十餘函有黄庭又徐季海古蹟記元宗時大王正書三卷以黄庭為第一皆不云有道徳經則知乃晉傳誤也宋桑林左傳宋公享晉侯於楚邱請以桑林注桑林者殷天子之樂名舞師題以旌夏晉侯懼而退及著雍疾卜桑林見荀偃士匄欲奔請禱焉荀罃不可予案吕氏春秋云武王勝殷立成湯之後於宋以奉桑林髙誘注曰桑山之林湯所禱也故使奉之淮南子云湯旱以身禱於桑山之林許叔重注曰桑山之林能興雲致雨故禱之桑林二說不同杜預注左傳不曽引用豈非是時未見其書乎馮夷姓字張衡思𤣥賦號馮夷俾清津􅀆櫂龍舟以濟予李善注文選引青令傳曰河伯姓馮氏名夷浴於河中而溺死是為河伯太公金匱曰河伯姓馮名修裴氏新語謂為馮夷莊子曰馮夷得之以㳺大川淮南子曰馮夷服夷石而水仙後漢張衡傳注引聖賢冢墓記曰馮夷者𢎞農華隂潼鄉隄首里人服八石得水仙為河伯又龍魚河圖曰河伯姓吕名公子夫人姓馮名夷唐碑有河侯新祠頌秦宗撰文曰河伯姓馮名夷字公子數說不同然則不經之傳也盖本於屈原逺遊篇所謂使湘靈鼓瑟兮令海若舞馮夷前此未有用者淮南子原道訓又曰馮夷大丙之御也乗雲車入雲蜺許叔重云皆古之得道能御隂陽者此自别一馮夷也容齋四筆卷五欽定四庫全書容齋四筆卷六十五則宋洪邁撰韓文公逸詩唐五竇聮珠集載竇牟為東都判官陪韓院長韋河南同尋劉師不遇分韵賦詩都官員外郎韓愈得尋字其語云秦客何年駐仙源此地深還隨躡鳬騎來訪馭雲襟院閉青霞入松髙老鶴尋猶疑隱形坐敢起竊桃心今諸本韓集皆不載近者莆田方崧卿考證訪賾甚至猶取聮珠中竇庠酬退之登岳陽樓一大篇顧獨遺此何也竇叔向詩不存竇氏聮珠序云五竇之父叔向當代宗朝善五言詩名冠流輩時屬正懿皇后山陵上注意哀挽即時進三章内考首出傳諸人口有命婦羞蘋葉都人挿柰花禁兵環素帟宮女哭寒雲之句可謂佳唱而畧無一首存於今荆公百家詩選亦無之是可惜也予嘗得故吳良嗣家所抄唐詩僅有叔向六篇皆竒作念其不傳於世今悉録之夏夜宿表兄話舊云夜合花開香滿庭夜深㣲雨醉初醒逺書珍重何時逹舊事凄凉不可聽去日兒童皆長大昔年親友半凋零明朝又是孤舟别愁見河橋酒幔青秋砧送包大夫云斷續長門夜清冷逆旅秋征夫應待信寒女不勝愁帶月飛城上因風散陌頭離居偏入聽况復送歸舟春日早朝應制云紫殿俯千官春松應合歡御爐香熖煖馳道玉聲寒乳燕翻珠綴祥烏集露盤宫花一萬樹不敢舉頭㸔過檐石湖云曉發魚門埭晴㸔檐石湖日衘髙浪出天入四空無咫尺分洲島纎毫指舳艫渺然從此去誰念客㠶孤正懿挽歌二首云二陵恭婦道六寝盛皇情禮遜生前貴恩追殁後榮㓜王親捧土愛女復連塋東望長如在誰云向玉京後庭攀畫柳上陌咽清笳命婦羞蘋葉都人挿柰花夀宫星月異仙路徃來賖縱有迎神術終悲隔絳紗第三篇亡叔向字遺直仕至左拾遺出為溧水令唐書亦稱其以詩自名云用柰花事竇叔向所用柰花事出晉史云成帝時三吳女子相與簪白花望之如素柰傳言天公織女死為之着服已而杜皇后崩其言遂騐紹興五年寧徳皇后訃音從北庭來知徽州唐煇使休寧尉陳之茂撰䟽文有語云十年罹難終弗返於蒼梧萬國衘寃徒盡簪於白柰是時正從徽廟􅂪塵其對偶精確如此王廖兒良賈誼過秦論曰六國之士吳起孫臏帶他兒良王廖田忌廉頗趙奢之朋制其兵漢書注家皆無所釋顔師古但音兒為五奚反廖為聊而已此八人者帶他兒良王廖不知其何國人獨吕氏春秋云老聃貴柔孔子貴仁墨翟貴廉關尹貴清列子貴虚陳駢貴齊楊朱貴己孫臏貴勢王廖貴先兒良貴後而注云王廖謀兵事貴先建茅也兒良作兵謀貴後雖僅見二人之名然亦莫能詳也廖良列於孔老之末而漢四種兵書有良權謀一篇又賈誼首稱寗越杜赫為之謀漢書亦不注呂氏云孔墨寗越皆布衣之士也越中牟人也周威公師之又稱杜赫以安天下說周昭文君則越赫善謀可以槩見漫書之以補漢書之缺徙木僨表商鞅變秦法恐民不信乃募民徙三丈之木而予五十金有一人徙之輒予金乃下令吳起治西河欲諭其信於民夜置表於南門之外令於邑中曰有人能僨表者仕之長大夫民相謂曰此必不信有一人曰試徃僨表不得賞而已何傷徃僨表來謁吳起起仕之長大夫自是之後民信起之賞罰予謂鞅本魏人其徙木示信盖以効起而起之事不傳建武中元續書隨筆所書建武中元一則文惠公作隷釋於蜀郡守何君閣道碑一篇中以為不然比得蜀士袁夢麒應祥漢制叢録亦以紀志傳不同為惑而云近歲雅州榮經縣治之西有得蜀郡治道記於崖壁間者記末云建武中元二年六月就於是千載之疑渙然氷釋予觀何君閣道正建武中元二年六月就袁君所言榮經崖壁之記盖是此耳但以出於近歲恨不得質之文惠為之惻然草駒聾蟲今人謂野牧馬為草馬淮南子脩務訓曰馬之為草駒之時跳躍揚蹏翹尾而走人不能制注云馬五尺以下為駒放在草中故曰草駒盖今之所稱者是也下文曰形之於馬馬不可化其可駕御教之所為也馬聾蟲也而可以通氣志猶待教而成又况人乎注曰蟲喻無知也聾蟲之名甚竒記李履中二事崇寧中蔡京當國欲洗邢恕誣謗宗廟之罪既􅋞拭用之又欲令立邉功以進身於是以為涇原經畧使遂謀用車戰法及造舟五百艘将直抵興靈以空夏國詔以付熈河漕臣李復復長安人乆居兵閒習熟戎事力上䟽詆切之予頃書之於國史恕列傳中比得上饒所刋潏水集正復所為文得此兩奏歎其能以區區外官而排斥上相之客如此恨史傳為不詳盡乃録于此其乞罷造戰車䟽云奉聖㫖令本司製造戰車三百兩臣嘗覧載籍古者師行固嘗用車盖兵不妄動征戰有禮不為詭遇多在平原廣野故車可以行今盡在極邉戎狄乗勢而來雖鷙鳥飛翥不如是之迅捷下寨駐軍各以保險為利其徃也車不及期居而保險車不能登歸則虜多襲逐爭先奔趍不暇囬顧車安能收非若古昔於中國為用臣聞此議出於許彥圭彦圭因姚麟而獻說朝廷遂然之不知彥圭劇為輕妄唐之房琯嘗用車戰大敗於陳濤斜十萬義軍無有脫者畿邑平地且如此况今欲用於峻阪溝谷之閒乎又戰車比常車濶六七寸運不合轍牽拽不行昨來兵夫典賣衣物自賃牛具終日方進五七里遂致兵夫逃亡棄車於道大為諸路之患今乞便行罷造如别路已有造者乞更不牽拽前來其乞罷造船奏云邢恕乞打造船五百隻於黄河順流放下至㑹州西小河内蔵放有㫖專委臣監督限一年了當契勘本路只有船匠一人須乞於荆江淮浙和雇又丁線物料亦非本路所出觀恕奏請實是兒戱且造船五百隻若自今工料並備亦須數年自蘭州駕放至㑹州約三百里北岸是敵境豈可容易㑹州之西小河醎水其濶不及一丈深止於一二尺豈能蔵船黄河過㑹州入韋精山石峽險窄自上垂流直下髙數十尺船豈可過至西安州之東大河分為六七道水淺灘磧不勝舟載一船所載不過五馬二十人雖到興州又何能為又不知幾月得至此聲若出必為夏國侮笑臣未敢便依㫖揮擘畫恐虚費錢物終誤大事䟽既上徽宗察其言忠遂罷二役復字履中為關内名儒官至中大夫集英殿脩撰李昭玘嘗贈詩云結交頼有紫翁鶴骨嶄嶄爛脩目五言長城屹千丈萬卷書樓聊一讀可知其人矣乾寧覆試進士唐昭宗乾寧二年試進士刑部尚書崔凝下二十五人放榜後宣詔翰林學士陸扆祕書監馮渥入内各贈衣一副及氊被於武徳殿前復試但放十五人自状頭張貽範以下重落其六人許再入舉塲四人所試最下不許再入蘇楷其一也故挾此憾至於駮昭宗聖文之謚崔凝坐貶合州刺史是時國祚如贅疣悍鎮強藩請隧問鼎之不暇顧惓惓若此其再試也詩賦各兩篇内良弓獻問賦以太宗問工人木心不正脉理皆邪若何道理十七字皆取五聲字依輪次以雙周隔句為韻限三百二十字成貽範等六人訖唐末不復綴榜盖是時不糊名一黜之後主司不敢再收拾也有黄滔者是年及第閩人也九世孫沃為吉州永豐宰刋其遺文初試覆試凡三賦皆在焉曲直不相入賦以題中曲直兩字為韻釋云邪正殊途各有好惡終篇只押兩韻良弓獻問賦取五聲字次第用各隨聲為賦格於是第一韻尾句云資國祚之崇崇上平聲也第二韻垂寳祚於緜緜下平聲也第三韻曽非唯唯上聲也第四韻露其言而粲粲去聲也而闕入聲一韻賦韻如是前所未有國将亡必多制亦云可笑矣信州永豐人王正白時再試中選郡守為改所居坊名曰進賢且減户稅亦後來所無臨海蠏圖文登吕亢多識草木蟲魚守官台州臨海命工作蠏圖凡十有二種一曰蝤蛑乃蠏之巨者兩螯大而有細毛如苔八足亦皆有㣲毛二曰撥棹子状如蝤蛑螯足無毛後兩小足薄而㣲濶類人之所食者然亦頗異其大如升南人皆呼為蠏八月閒盛出人採之與人鬭其螯甚巨徃徃能害人三曰擁劒状如蠏而色黄其一螯偏長三寸餘有光四曰彭螖螯㣲毛足無毛以鹽藏而貨於市爾雅曰彭蠌小者蟧云小蠏也蠌音澤蟧音勞呉人呼為彭越搜神記言此物嘗通人夢自稱長卿今臨海人多以長卿呼之五曰竭朴大於彭螖殻黒斑有文章螯正赤常以大螯障目小螯取食六曰沙狗似彭螖壤沙為宂見人則走屈折易道不可得七曰望潮殻白色居則背坎外向潮欲來皆出坎舉螯如望不失常期八曰倚望亦大如彭螖居常東西顧睨行不四五又舉兩螯以足起望惟入穴乃止九曰石硱大於常蠏八足殻通赤状若鵞卵十曰蜂江如蠏兩螯足極小堅如石不可食十一曰蘆虎似彭蜞正赤不可食十二曰彭蜞大於螖小於常蠏吕君云此皆常所見者北人罕見故繪以為圖又海商言海中􅔢鼊島之東一島多蠏種名甚異有虎頭者有翅能飛者有能捕魚者有殻大兼尺者以非親見故不畫李履中得其一本為作記予家楚宦游二浙閩廣所識蠏屬多矣亦不悉與前説同而所謂黄甲白蠏蟳蠘諸種吕圖不載豈名謂或殊乎故紀其詳以示博雅者東坡作碑銘東坡祭張文定文云軾於天下未嘗銘墓獨銘五人皆盛徳故以文集考之凡七篇若富韓公司馬温公趙清獻公范蜀公并張公坡所自作此外趙康靖滕元發二誌乃代張公者故不列於五人之數眉州小集有元祐中奏稿云臣近凖敇差撰故同知樞宻院事趙瞻神道碑并書者臣平生本不為人撰行狀埋銘墓碑士大夫所共知只因近日撰司馬光行狀盖為光曽為臣亡母程氏撰埋銘又為范鎮撰墓誌盖為鎮與先臣某平生交契至深不可不撰及奉詔撰司馬光富弼等墓碑不可固辭然終非本志况臣老病廢學文詞鄙陋不稱人子所欲顯揚其親之意伏望聖慈别擇能者特許辭免觀此一奏可印公心而杭本奏議十五卷中不載洗兒金錢車駕都錢塘以來皇子在邸生男及女則戚里三衙浙漕京尹皆有餉獻隨即致答自金幣之外洗兒錢果動以十數合極其珍巧若揔而言之殆不可勝算莫知其事例之所起劉原甫在嘉祐中因論無故踈决云在外羣情皆云聖意以皇女生故施此慶恐非王者之令典也又聞多作金銀犀象玊石琥珀玳瑁檀香等錢及鑄金銀為花果賜予臣下自宰相臺諫皆受此賜無益之費無名之賞殆無甚於此若欲夸示奢麗為世俗之觀則可矣非所以軌物訓儉也宰相臺諫以道徳輔主奈何空受此賜曽無一言遂事不諌臣願深執恭儉以答上天之貺不宜行姑息之恩以損政體偉哉劉公之論其勁切如此歐陽公銘墓畧而不書予為國史亦不知載於本傳比方讀其奏章故敬紀之韓偓金鑾宻記云天復二年大駕在岐皇女生三日賜洗兒果子金銀錢銀葉坐子金銀鋌子予謂唐昭宗於是時尚復講此而在庭無一言葢宫掖相承欲罷不能也告命失故事祖宗時知制誥六員故朝廷除授雖京官磨勘選人改秩奏薦門客恩科助教率皆命詞然有官列已崇而有司不舉者多出時相之意劉原甫掌外制以任顓落職不降誥詞曾奏陳以為非故事得㫖即施行之已而劉元瑜王琪降官直以勑牒劉又言非朝廷賞罰訓誥毖重之意今觀劉集有太平州文學袁嗣立改江州文學制云昔先王簡不帥教而不變者屏之裔土終身不齒若爾之行豈足顧哉然猶假以仕板徙之善郡不貲之恩也勉思自新無重其咎未幾嗣立又徙洪州制云爾頃冒憲典遷之尋陽復以親嫌於法當避夫薄志節寡廉耻者固不可使處有嫌之地益徙豫章思自湔滌嗣立之事㣲矣乃費兩誥讀此命書可知其人漫書之以發一笑扁字二義扁音薄典切唐韻二義其一曰扁署門户其一曰姓也此外無他說案鶡冠子云五家為伍十伍為里四里為扁扁為之長十扁為鄉其上為縣為郡其不奉上令者以告扁長盖如遂黨都保之稱諸書皆不載娑羅樹世俗多指言月中桂為娑羅樹不知所起案酉陽雜爼云巴陵有寺僧房床下忽生一木隨伐而長外國僧見曰此娑羅也元嘉中出一花如蓮唐天寳初安西進娑羅枝狀言臣所管四鎮㧞汗郍國有娑羅樹特為竒絶不比凡草不止惡禽近來得樹枝二百莖以進予比得楚州淮隂縣唐開元十一年海州刺史李邕所作娑羅樹碑云非中夏物土所宜有者婆娑十畝蔚䁐千人惡禽翔而不集好鳥止而不巢深識者雖徘徊仰止而莫知冥植博物者雖沉吟稱引而莫辨嘉名隨所方靣頗證靈應東瘁則青郊苦而歲不稔西茂則白蔵㤗而秋有成嘗有三藏義浄還自西域齋戒瞻嘆於是邑宰張松質請邕述文建碑觀邕所言惡禽不集正與上說同又有松質一書答邕云此土玊像爰及石龜一離淮隂百有餘載前後抗表尚不能稱頼公威徳備聞所以還歸故里謹遣僧三人父老七人齎狀拜謝宣和中向子諲過淮隂見此樹今有二本方廣丈餘盖非故物蒋頴叔云玊像石龜不知今安在然則娑羅之異世間無别種也呉興苪􅂱國器有從沈文伯乞娑羅樹碑古風一首云楚州淮隂娑羅樹霜露榮悴今何如能令草木死不朽當時為有北海書荒碑雨侵澁苔蘚尚想墨本傳東吳正賦此也歐陽公有定力院七葉木詩云伊洛多佳木娑羅舊得名常於佛家見宜在月宫生釦砌隂鋪靜虚堂子落聲亦此樹耳所謂七葉者未詳容齋四筆卷六欽定四庫全書容齋四筆卷七十四則宋洪邁撰天咫黄魯直和王定國詩聞蘇子由病卧績溪云湔祓瘴霧姿朝趨去天咫蜀士任淵注引天威不違顔咫尺予按國語楚靈築三城使子晢問范無宇無宇不可王曰是知天咫安知民則韋昭曰咫者少也言少知天道耳酉陽雜爼有天咫篇黄詩盖用此徐師川喜王秀才見過小酌翫月四言曰君家近市所見天咫庭户之閒容光能幾菰蒲之中江湖之涘一碧萬頃長空千里正祖述黄所用云縣尉為少仙隨筆載縣尉為少公予後得晏幾道叔原一帖與通叟少公者正用此也杜詩有野望因過常少仙一篇所謂落盡髙天日幽人未遣回者蜀士注曰少仙應是言縣尉也縣尉謂之少府而梅福為尉有神仙之稱少仙二字尤為清雅與今俗呼為仙尉不侔矣杜詩用受覺二字杜詩所用受覺二字皆絶竒今摭其受字云脩竹不受暑勿受外嫌猜莫受二毛侵監河受貸粟輕燕受風斜能事不受相促迫野航恰受兩三人一雙白魚不受釣雄姿未受伏櫪恩其覺字云已覺糟床注身覺省郎在自覺成老醜更覺松竹幽日覺死生忙最覺潤龍鱗喜覺都城動更覺老隨人毎覺昇元輔覺而行步奔尚覺王孫貴含悽覺汝賢厨煙覺逺庖詩成覺有己已覺披衣慣自覺酒須賒早覺仲容賢城池未覺喧無人覺來徃人才覺弟優直覺巫山暮重覺在天邉行遲更覺仙深覺負平生秋覺追隨盡追隨不覺晩熊羆覺自肥自覺坐能堅已覺良宵永更覺綵衣春已覺氣與嵩華敵未覺千金滿髙價梅花欲開不自覺胡來不覺潼關隘自得隋珠覺夜明放筯未覺金盤空東歸貪路自覺難更覺良工心獨苦始覺屏障生光輝不覺前賢畏後生吏情更覺滄洲逺我獨覺子神充實習池未覺風流盡用之雖多然毎字命意不同又雜於千五百篇中學者讀之唯見其新工也若陳簡齋亦好用此二字未免頻復者盖只在數百篇内所以見其多如未受風作惡不受珠璣絡不受折簡呼不受人招麾不受安危侵飽受今日閒却扇受景風語聞受逺響坐受世故驅庭栢不受寒可復受憂戚寧受此酸辛滔滔江受風坐受世􅄶迫清池不受暑平池受細雨窮村受春晩不受急景催肯受元規塵了不受榮悴意閒不受榮與辱獨自人閒不受寒枯木無枝不受寒天馬何妨畧受鞿來禽花髙不受折不受隂晴與寒暑長林巨木受軒輊未覺懶相先未覺壮心休未覺身淹留未覺墉隂遲未覺欠孟嘉未覺有等倫未覺風來遲未覺經旬乆欲徃還覺非獨覺賦詩難稍覺夜月添菰蒲覺風入未覺此計非髙處覺眼新意定覺景多未覺徐娘老未覺有榮辱未覺饑腸虚未覺平生與願違村空更覺水潺湲眼中㣲覺欠扁舟居夷更覺中原好便覺杯觴耐薄寒墻頭花定覺風闌可謂多矣盖喜用其字自不知下筆所著也西太一宮六言楊柳鳴蜩緑暗荷花落日紅酣三十六陂春水白頭想見江南荆公題西太一宫六言首篇也今臨川刻本以楊柳為柳葉其意欲與荷花為切對而語句遂不佳此猶未足問至改三十六陂春水為三十六宫煙水則極可笑公本意以在京華中故想見江南等物何預於宫禁哉不學者妄意塗竄殊為害也彼盖以太一宫為禁廷離宫爾由與猶同新唐書藩鎮傳序云其人自視由羌狄然據字義由當為猶故吳縝作唐書音訓有紏謬一篇正指其失彼元不深䆒孟子也文惠公頃與予作唐書補過嘗駮其說予作文毎用之輒為人所疑問今為詳載於此如以齊王由反手也由弓人而恥為弓王由足用為善是由惡醉而強酒由已溺之由已飢之由射於百步之外見且由不得亟其義皆然盖由與猶通用也人焉廋哉孔子論人之善惡始之曰視其所以繼之以觀其所由察其所安然後重言之曰人焉廋哉人焉廋哉盖以上之三語詳察之也而孟氏一斷以眸子其言曰存乎人者莫良於眸子眸子不能掩其惡胷中正則眸子瞭焉胷中不正則眸子眊焉聽其言也觀其眸子人焉廋哉說者謂人與物接之時其神在目故胷中正則神精而明不正則神散而昏心之所發并此而觀則人之邪正不可匿矣言猶可以偽為眸子則有不容偽者孔聖既以發之於前孟子知言之要續為之說故簡亮如此舊見王季明云太學士子嘗戯作一論其畧曰知人焉廋哉之義然後知人焉廋哉人焉廋哉之義知人焉廋哉人焉廋哉之義然後知人焉廋哉之義孔子所云人焉廋哉人焉廋哉者詳言之也孟子所云人焉廋哉者畧言之也孔子之所謂人焉廋哉人焉廋哉即孟子之所謂人焉廋哉也孟子之所謂人焉廋哉即孔子之所謂人焉廋哉人焉廋哉也繼又疊三語為一云夫人焉廋哉人焉廋哉人焉廋哉雖曰不同而其所以為人焉廋哉人焉廋哉人焉廋哉未始不同演而成數百字可資一笑亦幾於侮聖言矣乆而俱化天生萬物乆而與之俱化固其理焉無閒於有情無情有知無知也予得雙鴈於衢人鄭伯膺純白色極馴擾可翫寘之雲壑不逺飛翔未幾殞其一其一塊獨無儔因念白鵞正同色又性亦相類乃取一隻與同處始也兩下不相賔接見則東西分背雖一盆飼榖不肯並啜如是五日漸復相就踰旬之後怡然同群但形體有大小而色澤飛鳴則一乆之鴈不自知其為鴈鵞不自知其為鵞宛如同巢而生者與之俱化於是騐焉今人呼鵞為野鴈或稱家鴈其褐色者為鴈鵞鴈之最大者曰天鵞唐太宗時吐蕃禄東贊上書以謂聖功逺被雖鴈飛于天無是之速鵞猶鴈也遂鑄金為鵞以獻盖二禽一種也黄文江賦晩唐士人作律賦多以古事為題寓悲傷之㫖如吳融徐寅諸人是也黄滔字文江亦以此擅名有明皇回駕經馬嵬坡隔句云日慘風悲到玉顔之死處花愁露泣認朱臉之啼痕褒雲萬疊斷腸新出於啼猿秦樹千層比翼不如於飛鳥羽衞參差擁翠華而不發天顔愴悢覺紅袖以難留神仙表態忽零落以無歸雨露成波已沾濡而不及六馬歸秦却經過於此地九泉隔越幾悽惻於平生景陽井云理昧納隍處窮泉而詎得誠乖馭朽攀素綆以胡顔青銅有恨也從零落於秋風碧浪無情寧觧流傳於夜􅐿荒凉四面花朝而不見朱顔滴瀝千尋雨夜而空啼碧溜莫可追尋玉樹之歌聲邈矣最堪惆悵金瓶之咽處依然館娃宫云花顔縹緲欺樹裏之春風銀熖熒煌却城頭之曉色恨留山鳥啼百草之春紅愁寄壠雲鏁四天之暮碧遺堵塵空幾踐群遊之鹿滄洲月在寧銷怒觸之濤陳皇后因賦復寵云已為無雨之期空懸夢寐終自凌雲之製能致煙霄秋色云空三楚之暮天樓中厯厯滿六朝之故地草際悠悠白日上昇云較美古今列子之乘風固劣論功晝夜姮娥之奔月非優凡此數十聮皆研確有情致若夫格律之卑則自當時體如此耳沈季長進言沈季長元豐中為崇政殿說書考開封進士既罷入見神宗曰論不以智治國誰為此者對曰李定所為上曰聞定意譏朕季長曰定事陛下有年頃者御史言定乃人倫所棄陛下力排羣議而定始得為人如初繼又擢用不次定雖懐利尚當知恩臣以此敢謂無譏陛下意詩序曰言之者無罪聞之者足以戒書曰小人怨汝詈汝則皇自敬徳陛下自視豈任智者不知何自嫌疑乃信此為譏也上曰卿言甚善朕今已釋然矣卿長者乃喜為人辯謗對曰臣非為人辯謗乃為陛下辯譖耳他日上語及前代君臣因曰漢武帝學神仙不死之術卿曉其意否此乃貪生以固位耳故其晩年舉指謬戾禍貽骨肉幾覆宗社且人主固位其禍猶爾則為人臣而固位者其患亦何所不至故朕毎患天下之士能輕爵禄者少季長曰士而輕爵禄為士言之則可為國言之則非福也人主有尊徳樂道之志士皆以不得爵禄為耻寧有輕爵禄者哉至於言違諌怫士有去志故以爵禄為輕上曰誠如卿言按季長雖嘗至脩起居注其後但終於庶僚史不立傳王和甫銘其墓載此兩論予在史院時未之見也其子銖為侍從恨不獲附見之故表出於是繁遏渠國語魯叔孫穆子曰金奏肆夏繁遏渠天子所以饗元侯也􅅊昭注曰繁遏渠肆夏之三也禮有九夏皆篇名昭雖曉其義而不詳釋按周禮春官鍾師掌金奏以鍾皷奏九夏鄭氏注引吕叔玉云肆夏繁遏渠皆周頌也肆夏時邁也繁遏執競也渠思文也又曰繁多也遏止也言福禄止於周之多也故執競曰降福穰穰降福簡簡渠大也言以后稷配天王道之大也故思文曰思文后稷克配彼天予謂此說亦近於鑿替戾岡坡公游鶴林招隱有岡字韻詩凡作七首最後云背城借一吾何敢切勿樽前替戾岡小兒問三字所出按晉書佛圖澄傳澄能聽鈴音以知吉凶徃投石勒及劉曜攻洛陽勒将救之其羣下咸諌以為不可勒以訪澄澄曰相輪鈴音云秀支替戾岡僕谷劬禿當此羯語也秀支軍也替戻岡出也僕谷劉曜胡位也劬禿當捉也此言軍出捉得曜也勒遂擒曜坡公正用此云潞公平章重事文潞公元豐六年以太師致仕時七十八歲矣後二年哲宗即位太皇太后垂簾同聽政用司馬公為門下侍郎公奏乞召潞公置之百寮之首以鎮安四海后遣中使梁惟簡宣諭曰彦博名位已重又得人心今天子㓜冲恐其有震主之威且於輔相中無處安排又已致仕難為復起公當時以新入不敢復言元祐元年三月公拜左僕射乃再上奏曰書曰人惟求舊盖以其厯年之多也彥愽沉敏有謀畧知國家治體能斷大事自仁宗以來出将入相功効顯著天下所共知年踰八十精力尚強臣初曽奏陳尋蒙宣諭竊惟彦博一書生爾年逼桑榆富貴已極夫復何求非有兵權死黨可畏懼也假使為相一旦欲罷之止煩召一學士授以詞頭白麻既出則一匹夫爾何難制之有震主之威防慮大過若依今官制用之為相以太師兼侍中行左僕射有何不可儻不欲以劇務煩老臣則凡常程文書只委右僕射以下簽書發遣惟事有難决者方就彦博咨禀自古致仕復起盖非一人彦博今年八十一不過得其數年之力願急用之臣但以門下侍郎助彦博恐亦時有小補今不以彦博首相而以臣處之是猶捨騏驥而策駑駘也竊為朝廷惜之若以除臣左僕射難為無故以他人易之則臣欲露表舉其自代奏入不許給事中范純仁亦勸乞召致留為師臣未幾右僕射韓縝求去后始賜司馬公宻詔欲除彦博兼侍中行右僕射事其合行恩禮令相度條具公以名體未正不敢居其上乞以左僕射自守右僕射詔曰使彦博居卿上非予所以待卿之意卿更思之公執奏言臣為京官時彦博己為宰相今使彥博列位在下非所以正大倫也於是召赴闕既而御史中丞劉摯左正言朱光庭右正言王覿俱上言彦博春秋髙不可為三省長官司馬公又言若令以正太師平章軍國重事亦足以尊老成矣四月遂下制如公言詔一月兩赴經筵六日一入朝因至都堂與執政商量事朝廷有大政令即與輔臣共議潞公此命可謂鄭重費力盖本不出於主意也然居位越五年屢謝病乃得歸竟坐此貽紹聖之貶考課之法廢唐制尚書考功掌内外文武官吏之考課凡應考之官家具録當年功過行能本司及本州長官對衆讀議其優劣定為九等考第然後送省别勑定京官位望髙者二人一挍京官考一挍外官考又定給事中中書舍人各一人一監京官考一監外官考郎中判京官考員外郎判外官考凡考課之法有四善二十七最一最以上有四善為上上有三善或無最而有四善為上中有二善或無最而有三善為上下其末至於居官謟詐貪濁有狀為下下外州則司録録事參軍主之各㨿之以為黜陟國朝此法尚存慶厯皇祐中黄亞夫庶佐一府三州幕其集所載考詞十四篇黄司理者曰治犴獄歲在周矣論其罪棄市者五十四流若徒三百十有四杖百八十六皆得其情無有寃隱不伸非才也其孰能其考可書中舞陽尉者曰舞陽太約地廣它盜徃徃囊槖於其間居一歲為竊與強者凡十一前件官捕得之其亡者一而已矣非才焉固不能可書中法曹劉昭逺者曰法者禮之防也其用之以當人情為得刻者為之則拘而少恩前件官以通經舉進士始掾於此若老於為法者毎抱具獄必傅之經義然後處故無一不當其情其考可書中它皆類此不知其制廢於何時今但付之士按吏据定式書於印紙比者又令郡守定縣令臧否髙下人亦不知所從出若使稍復舊貫似為得宜雖未必人人盡公得實然思過半矣小官受俸沈存中筆談書國初時州縣之小官俸入至薄故有五貫九百六十俸省錢且作足錢用之語黄亞夫皇祐閒自序其所為伐檀集云歴佐一府三州皆為從事踰十年郡之政巨細無不與大抵止於簿書獄訟而已其心之所存可以効於君補於國資於民者曽未有一事可以自見然月廩於官粟麥常兩斛錢常七千問其所為乃一常人皆可不勉而能兹素餐昭昭矣遂以伐檀名其集且識其愧予謂今之仕宦雖主簿尉盖或七八倍於此然常有不足之歎若兩斛七千秪可禄一書吏小挍耳豈非風俗日趨於浮靡人用日以汰物價日以滋致於不能贍足乎亞夫之立志如此真可重也山谷先生乃其子云容齋四筆卷七欽定四庫全書容齋四筆卷八十七則宋洪邁撰庫路真新唐書地理志襄州土貢漆噐庫路真二品十乘花文五乘庫路真者漆噐名也然其義不可曉元豐九域志云貢漆噐二十事是以于頔傳頔為襄陽節度襄有髹噐天下以為法至頔驕蹇故方帥不法者稱為襄様節度舊唐書職官志武徳七年改秦王齊王下領三衞及庫真驅咥真並為統軍疑是周隋間西邉方言也記白樂天集曾有一說而未之見得意失意詩舊傳有詩四句誦世人得意者云久旱逢甘雨他鄉見故知洞房花燭夜金榜掛名時好事者續以失意四句曰寡婦携兒泣將軍被敵擒失恩宫女面下第舉人心此二詩可喜可悲之狀極矣狄監盧尹文潞公留守西京年七十七為蓍英㑹凡十有二人時富韓公年七十九最長至于太中大夫張問年七十唯司馬公方六十四嵗用狄監盧尹故事亦預於㑹或問狄盧之說乃見唐白樂天集今所謂九老圖者懐州司馬胡杲年八十九衞尉卿吉皎年八十六龍武長史鄭㨿八十四慈州刺史劉嘉侍御史盧正皆八十二其年皆在元豐諸公之上永州刺史張渾刑部尚書白居易皆七十四時㑹昌五年白公序云六賢皆多年夀予亦次焉秘書監狄兼謩河南尹盧正以年未七十雖與㑹而不及列故温公紀韓公至張昌言而自不書今士大夫皆熟知此事姑志狄盧二賢以示兒輩但唐兩盧正夲字犯廟諱而又同㑹疑文字或誤云項韓兵書漢成帝時任宏論次兵書為四種其權謀中有韓信三篇形勢中有項王一篇前後藝文志載之且云漢興張良韓信序次兵法凡百八十二家刪取要用定著三十五家諸吕用事而盗取之項韓雖不得其死而遺書可傳於後者漢世不廢今不復可見矣承天塔記黄魯直初謫戎涪既得歸而湖北轉運判官陳舉以時相趙清憲與之有小怨訐其所作荆南承天塔記以為幸災遂除名覊管宜州竟卒于彼今豫章集不載其文盖謂因之兆禍故不忍著録其曾孫㽦續編别集始得見之大畧云余得罪竄黔中道出江陵寓承天襌院住持僧智珠方徹舊浮圖於地而屬曰余成功之後願乞文記之後六年蒙㤙東歸則七級巋然已立於是作記其後云儒者嘗論一佛寺之費盖中民萬家之産實生民穀帛之蠧雖余亦謂之然然自省事以來觀天下財力屈竭之端國家無大軍旅勤民丁賦之政則蝗旱水溢或疾疫連數十州此盖生人之共業盈虛有數非人力所能勝者耶其語不過如是初無幸災諷刺之意乃至於遠斥以死寃哉穆䕶歌郭茂倩編次樂府詩穆䕶歌一篇引歴代歌辭曰曲犯角其語曰玊管朝朝弄清歌日日新折花當驛路寄與隴頭人黄魯直題牧䕶歌後云予嘗問人此歌皆莫能說牧䕶之義昔在巴􅈎閒六年問諸道人亦莫能說他日船宿雲安野次㑹其人祭神罷而飲福坐客更起舞而歌木瓠其詞有云聴說商人木瓠四海五湖曾去中有數十句皆叙賈人之樂末云一言為報諸人倒盡百瓶歸去繼有數人起舞皆陳述己事而始末畧同問其所以為木瓠盖瓠曲木狀如瓠擊之以為歌舞之節耳乃悟穆䕶蓋木瓠也㨿此說則茂倩所序為不知本原云且四句律詩如何便差排為犯角曲殊無意義省試取人額累舉省試鎻院至開院限以一月如未訖事則申展亦不過十日所奏名一十四人取一為定數不知此制起於何年黄魯直以元祐三年為貢院參詳官有書帖一紙云正月乙丑鎻太學試禮部進士四千七百三十二人三月戊申具奏進士五百人乃是在院四十四日而九人半取一人視今日為不侔也此帖載於别集通印子魚魚通印之語夲出於王荆公送張兵部知福州詩長魚爼上通三印之句盖以福州瀕海多魚其大如此初不指言為子魚也東坡始以通印子魚對披緜黄雀乃借子字與黄字為假對耳山谷所云子魚通印蠔破山盖承而用之陳正敏遯齋閒覽云其地有通應廟廟前港中子魚最佳王初寮詩通印子魚鹽透白正采其說郡人黄處權云興化子魚去城五十里地名迎仙者為上所産之處土名謂之子魚潭而已初無通應港之名有大神祠賜額曰顯應乃遯齋所指之廟者亦非通應也潭傍又有小祠一間庳陋之甚農家以祀田神好事欲實遯齋之說遂粉刷一扁妄標曰通應廟側題五小字曰元祐某年立此尤可笑且用神廟封額以名土物它處未嘗有也壽亭侯印荆門玉泉闗將軍廟中有夀亭侯印一鈕其上大環徑四寸下連四環皆系於印上相傳云紹興中洞庭漁者得之入于潭府以為闗雲長封漢壽亭侯此其故物也故以歸之廟中南雄守黄兊見臨川興聖院僧惠通印圖形為作記而復州寳相院又以建炎二年因伐木於三門大樹下土中深四尺餘得此印其環并背俱有文云漢建安二十年壽亭侯印今留於左蔵庫邵州守黄沃叔啓慶元二年復買一鈕於郡人張氏其文正同只欠五系環耳予以謂皆非真漢物且漢壽乃亭名既以封雲長不應去漢字又其大比它漢印㡬倍之聞嘉興王仲言亦有其一侯印一而已安得有四雲長以四年受封當即刻印不應在二十年尤非也是特後人為之以奉廟祭其數必多今流落人間者尚如此也予為黄叔啓作辨䟦一篇見贅槀茸附治疽漏時康祖病心痔二十年用聖惠方治腰痛者鹿茸附子服之月餘而愈夷堅已志書其事予毎與醫言輙云癰疽之發藴熱之極也烏有翻使熱藥之理福州醫郭晉卿云脉陷則害漏陷者泠也若氣血温煖則漏自止正用得茸附按内經素問生氣通天論曰陷脉為痿留連肉腠注云䧟脉謂寒氣陷缺其脉也積寒留舍經血稽凝久瘀内攻結於肉理故發為瘍瘻肉腠相連此說可謂明白故復記於此庶㡬或有助於瘍毉云莆田荔枝莆田荔枝名品皆出天成雖以其核種之終與其夲不相類宋香之後無宋香所存者孫枝爾陳紫之後無陳紫過墻則為小陳紫矣筆談謂焦核荔子土人能為之取本木去其大根火燔令焦復植於土以石壓之令勿生傍根其核自小里人謂不然此果形狀變態百出不可以理求或似龍牙或類鳯爪釵頭紅之可簪緑珠子之旁綴是豈人力所能加哉初方氏有樹結實數千顆欲重其名以二百顆送蔡忠惠公紿以常嵗所産止此公為目之曰方家紅著之於譜印證其妄自後華實雖極䌓茂逮至成熟所存者未嘗越二百遂成語䜟此段已載遯齋閒覽中郡士黄處權復志其詳如此䨇陸不勝新唐書狄仁傑傳武后召問夢䨇陸不勝何也仁傑與王方慶俱在二人同辭對曰䨇陸不勝無子也天其意者以儆陛下乎於是召還廬陵王舊史不載資治通鑑但書鸚鵡折翼一事而考異云䨇陸之說世傳狄梁公傳有之以為李邕所作而其詞多鄙誕疑非夲書故黜不取藝文志有李繁大唐說纂四卷今罕得其書予家有之凡所紀事率不過數十字極為簡要新史大抵采用之其忠節一門曰武后問石泉公王方慶曰朕夜夢䨇陸不勝何也曰盖謂宫中無子意者恐有神靈儆夫陛下因陳人心在唐之意后大悟召廬陵王復其儲位俾石泉公為宫相以輔翊之然則新史兼采二李之説而為狄為王莫能辨也通鑑去之似為可惜華元入楚師左傳楚莊王圍宋宋華元夜入楚師登子反之牀起之曰寡君使元以病告子反懼與之盟而退三十里杜注曰兵法因其鄉人而用之必先知其守將左右謁者門者之姓名因而利道之華元盖用此術得以自通予按前三年晉楚邲之戰隨武子稱楚之善曰軍行右轅左追蓐前茅慮無中權後勁軍政不戒而備大抵言其備豫之固今使敵人能入上將之幕而登其牀則刺客姦人何施不得雖至於王所可也豈所謂軍制乎疑不然也公羊傳云楚使子反乘堙而闚宋城宋華元亦乘堙而出見之其說比左氏為有理公羊用疊語公羊𫝊書楚子圍宋宋人及楚人平事㡬四百字其稱司馬子反者八又再曰將去而歸爾然後而歸爾臣請歸爾吾亦從子而歸爾又三書軍有七日之糧爾凡五用爾字然不覺其煩文書誤一字文書一字之誤有絶係利害者予親經其三焉至今思之猶為汗下乾道二年冬䝉恩召還過三衢郡守何徳輔問奏對用幾劄因出草藁示之其一乞蠲減鄱陽歳貢誕節金千兩事言此貢不知起於何時或云藝祖初下江南郡庫適有金守臣取以獻長春節遂為故事誤書長春為萬春乃金主褒節名也徳輔讀之指以相告予悚然耳發赤亟改之三年以侍講講毛詩作發題引孔子於論語中說詩處云不學詩無以言誤書言為立已寫進讀正夲經筵吏袁顯忠曰恐是言字予愧謝之淳熈十三年在翰苑作賜安南國歴日詔云兹履夏正載頒漢朔書夏正為周正院吏以呈宰執周益公見而摘其誤吏還以告盖語順意同一時不自覺也厯代史夲末古者世有史官其著見於今則自堯舜二典始周之諸侯各有國史孔子因魯史記而作春秋左氏為之傳鄭志宋志晉齊太史南史氏之事皆見焉更纂異同以為國語漢司馬談自以其先周室之太史有述作之意傳其子遷紬金匱石室之書罔羅天下放失舊聞述黄帝以來至於元狩馳騁古今上下數千載間變編年之體為十二夲紀十表八書三十世家七十列傳凡百三十篇而十篇有録無書元成之間禇先生補缺作武帝紀三王世家龜䇿日者列傳張晏以為言辭鄙陋今雜於書中而藝文志有馮商續太史公七篇則泯没不見司馬之書既出後世雖有作者不能少紊其規制斑彪固父子以為漢紹堯運建帝業而六世史臣追述功徳私作夲紀編於百王之末厠於秦項之列故探纂前紀綴輯舊聞以述漢書起於高祖終於王莾之誅大抵仍司馬氏第更八書為十志而無世家凡百卷固死其書未能全女弟昭續成之是為前漢書荀恱漢紀則續所論著者也後漢之事初命儒臣著述於東觀謂之漢紀其後有袁宏紀張璠薛瑩謝承華嶠袁山松劉義慶謝沈皆有書宋范煜刪采為十紀八十列𫝊是為後漢書而張璠以下諸家盡廢其志則劉昭所補也三國雜史至多有王沈魏書元行冲魏典魚豢典畧張勃吳録韋昭吳書孫盛魏春秋司馬彪九州春秋丘恱三國典畧員半千三國春秋虞漙江表𫝊今唯以陳壽書為定是為三國志晉書則有王隠虞預謝靈運臧榮緒孫綽干寳諸家唐太宗詔房喬褚遂良等修定為百三十卷以四論太宗所作故總名之曰御撰是為晉書至今用之南北兩朝各四代而僭偽之國十數其書尤多如徐爰孫嚴王智深顧野王魏澹張大素李徳林之正史皆不𫝊今之存者沈約宋書蕭子顯齊書姚思廉梁陳書魏收魏書李百藥北齊書令狐徳棻周書魏鄭公隋書其它國則有和包漢趙紀田融趙石記范亨燕書王景暉南燕録高閭燕志劉昞涼書裴景仁秦記崔鴻十六國春秋蕭方武敏之三十國春秋李太師延夀父子悉取為南史八十卷北史百卷今沈約以下八史雖存而李氏之書獨行是為南北史唐自高祖至于武宗有實録後唐脩為書劉煦所上者是已而猥襍無統國朝慶歴中復詔刋修歴十七年而成歐陽文忠公主紀表志宋景文公主𫝊今行於世梁唐晉漢周謂之五代國初監脩國史薛居正提舉上之其後歐陽芟為新書故唐五代史各有舊新之目凡十七代夲末如此稚兒數以為問故詳記之賢者一言解疑譖賢者以單詞片言為人釋謗解患卓卓可書者予得兩事焉秦氏當國時先忠宣公鄭亨仲資政胡明仲侍郎朱新仲舍人皆在謫籍分置廣東方務徳為經畧帥待之盡禮秦對一客言曰方滋在廣部凡得罪於朝廷者必加意䕶結得非欲為異日地乎客曰非公相有云不敢輙言方滋之為人天性長者凡於人唯以周旋為志非獨於遷客然也秦悟曰方務徳却是箇周旋底人其疑遂釋當時使一憸巧者承其問㣲肆一語方必得罪而諸公不得安迹矣言之者可謂大君子當求之古人中嚴陵王大卞赴曲江守過南安謁張先生子韶從容言大卞頃在撿院以羅彦濟中丞章去國其後彦濟自吏書出守嚴遂遷避於蘭溪彦濟到郡遺書相邀曰與君有同年之契何為爾不得已復還既見宻語云前此臺評乃朱新仲所作託造物之意以相授一時失於審思至今為悔此事既往今適守韶而朱在彼邂逅有弗愜為之奈何張揣其必將修怨即云國先為君子為小人皆在此舉王悚然曰謹受教至則降意彌縫終二年不見分毫形迹盖夲自相善也予曩侍張公坐聞其言故追紀之容齋四筆卷八欽定四庫全書容齋四筆卷九十六則宋洪邁撰蔣魏公逸史蔣魏公逸史二十卷頴叔所著也多紀當時典章文物云舊有數百冊兵火間盡失之其曽孫芾始攟摭遺藁而成此書將以奏御以其副上之太史且板行之傳之天下後世既而不果蔣公在熈寧元祐崇寧時名為博聞強識然閲其論述頗有可議恨不及丞相在日與之言其一云行守試視其官品之高下除者必𢃄夲官吕晦叔除守司空而不𢃄金紫光禄大夫者此翰林之失也既不𢃄官不當著守字故晦叔辨之遂去守字為正司空議者謂超過特進東宫三太儀同矣予謂行守試必𢃄正官固也然自改官制以後既為司空自不應復𢃄階官吕從金紫遷只是超特進一級耳東宫三太何嘗以為宰相官儀同又係使相也吕亦無自辨之說其二云文潞公既為真太師矣其罷也乃加守字潞公怏怏諸公欲為去之議者謂非典故潞公之意止欲以真太師致仕耳諸公曰如此可乎曰不可為真太師則在宰相之上竟不去守字但出劄子令權去之案潞公夲以開府儀同三司守太師河東節度使致仕入為平章軍國重事故繫銜只云太師及再致仕悉還舊稱當時有㫖於制詞内除去守字以嘗正任太師也所謂劄子權去恐或不然其三云舊制執政䨇轉謂自工部侍郎轉刑部刑部轉兵部兵部轉工部尚書惟宰相對轉工部侍郎直轉工書比執政三遷也予考舊制執政轉官與學士等六侍郎則升兩曹以工禮刑户兵吏為叙至兵侍者轉右丞至吏侍者轉左丞皆轉工書然後細遷今言兵侍即轉工書非也宰相為侍郎者升三曹為尚書者䨇轉如工侍轉户侍禮侍轉兵侍若係户侍當改二丞而宰相故事不立丞故直遷尚書今言工侍對轉工書非也其四云楊察為翰林學士一夜當三制劉沆以叅知政事富弼以宣徽使皆除宰相宣徽在參政下則富當在劉下乃誤以居上人皆不覺其失惟學士李淑知之揚言其事遂貼麻改之予考國史至和元年八月劉沆以叅知政事拜集賢相二年六月以忠武軍節度使知永興軍文彦博為昭文相位第一劉沆遷史館相位第二宣徽南院使判并州富弼為集賢相位第三其夕三制是已而劉先一年已在相位初無失誤貼改之說其五云有四儀同一曰開府儀同三司二曰儀同三司三曰左儀同三司四曰右儀同三司案自漢鄧隲始為儀同三司魏晉以降但有開府儀同三司之目周隋又増上字為一階又改儀同三司為儀同大將軍又有開府上開府儀同上儀同班列益卑未嘗有左右之稱也後進不當輙議前輩因孫偃有問書以示之沈慶之曹景宗詩宋孝武嘗令羣臣賦詩沈慶之手不知書毎恨眼不識字上逼令作詩慶之曰臣不知書請口授師伯上即令顔師伯執筆慶之口授之曰㣲生遇多幸得逢時運昌朽老筋力盡徒歩還南岡辭榮此聖世何愧張子房上甚恱衆坐并稱其辭意之美梁曹景宗破魏軍還振旅凱入武帝宴飲聯句令沈約賦韻景宗不得韻意色不平啓求賦詩帝曰卿伎能甚多人才英㧞何必止在一詩景宗已醉求作不已時韻已盡唯餘競病二字景宗便操筆其辭曰去時兒女悲歸來笳皷競借問行路人何如霍去病帝歎不已約及朝賢驚嗟竟日予謂沈曹二公未必能辨此疑好事者為之然正可為一佳對曰辭榮聖世何愧子房借問路人何如去病若全用後兩句亦自的切藍尾酒白樂天元日對酒詩云三盃藍尾酒一楪膠牙􅄳又云老過占他藍尾酒病餘收得到頭身嵗盞後推藍尾酒春盤先勸膠牙􅄳荆楚嵗時記云膠牙者取其堅固如膠也而藍尾之義殊不可曉河東記載申屠澄與路傍茅舍中老父嫗及處女環火而坐嫗自外挈酒壺至曰以君冐寒且進一盃澄因揖遜曰始自主人翁即廵澄當婪尾盖以藍為婪當婪尾者謂最在後飲也葉少藴石林燕語云唐人言藍尾多不同藍字多作啉出於侯白酒律謂酒廵匝末坐者連飲三盃為藍尾盖末坐遠酒行到常遲故連飲以慰之以啉為貪婪之意或謂啉為燷如鐡入火貴其出色此尤無稽則唐人自不能曉此義葉之說如此予謂不然白公三盃之句只為酒之廵數耳安有連飲者哉侯白滑稽之語見於啓顔録唐藝文志白有啓顔録十卷雜語五卷不聞有酒律之書也蘇鶚演義亦引其說歐陽公辭官歐陽公自亳州除兵部尚書知青州辭免至四云恩典超優遷轉頗􅂾臣近自去春由吏部侍郎轉左丞未踰兩月又超轉三資除刑部尚書今纔踰嵗又超轉兩資尚書六曹一嵗之間超轉其五累降詔不從其請此是熈寧元年未改官制時今人多不能曉盖昔者左右丞在尚書下所謂左丞超三資除刑書者謂厯工禮乃至刑也下云又超兩資者謂厯户部乃至兵也其上唯有吏部故言尚書六曹超轉其五云南北語音不同南北語音之異至於不能相通故噐物花木之屬雖人所常用固有不識者如毛鄭釋詩以梅為柟竹為王芻簍為翹翹之草是矣顔師古注漢書亦然淮南王安諫武帝伐越書曰輿轎而隃領服䖍曰轎音橋謂隘道輿車也臣瓚曰今竹輿車也江表作竹輿以行項昭曰陵絶水曰轎音旗廟反師古曰服音瓚說是也項氏謬矣此直言以轎過領耳何云陵絶水乎旗廟之音無所依㨿又武帝紀戈船將軍張晏曰越人於水中負人船又有蛟龍之害故置戈於船下因以為名瓚曰伍子胥書有戈船以載干戈因謂之戈船也師古曰以樓船之例言之則非為載干戈也此盖船下安戈㦸以禦蛟鼉水蟲之害張說近之二說皆為三劉所破云今南方竹輿正作旗廟音項亦未為全非顔乃西北人隨其方言遂音橋又云船下安戈㦸既難厝置又不可以行且今造舟船甚多未嘗有置戈者顔北人不知行船項說是也子謂項音轎字是也而云陵絶水則謬故劉公以為未可全非張晏云越人於水中負船尤可笑南舟北帳頃在豫章遇一遼州僧於上藍與之閒談曰南人不信北方有千人之帳北人不信南人有萬斛之舟盖土俗然也法苑珠林云山中人不信有魚大如木海上人不信有木大如魚胡人見錦不信有蟲食樹吐絲所成吳人身在江南不信有千人氊帳及來河北不信有二萬碩船遼僧之談合於此魏冉罪大自漢以來議者謂秦之亡由商鞅李斯鞅更變法令使民不見徳斯焚燒詩書欲人不知古其事固然予觀秦所以得罪於天下後世皆自挾詐失信故耳其始也以商於六百里啖楚絶齊繼約楚懐王入武闗辱為藩臣竟留之至死及其喪歸楚人皆憐之如悲親戚諸侯由是不直秦未及百年三户亡秦之語遂騐而為此謀者張儀魏冉也儀之惡不待言而冉之計頗隠故不為士君子所誅當秦武王薨諸弟爭立唯冉力能立昭王冉者昭王母宣太后之弟也昭王少太后自治事任冉為政威震秦國才六年而詐留楚王又怒其立太子復取十六城是時王不過十餘嵗為此者必冉也後冉為范睢所間而廢逐司馬公以為冉援立昭王除其災害使諸侯稽首而事秦秦益彊大者冉之功也盖公不細考之云又嘗請趙王㑹澠池處心積慮亦與詐楚同頼藺相如折之是以無所成不然與楚等耳冉區區匹夫之見徒能為秦一時之功而貽秦不義不信之名萬世不滅者冉之罪誠大矣辯秦少游義倡夷堅已志載潭州義倡事謂秦少游南遷過潭與之徃來後倡竟為秦死常州教授鍾將之得其說於李結次山為作傳予反復思之定無此事當時失於審訂然悔之不及矣秦將赴杭倅時有妾邉朝華既而以妨其學道割愛去之未㡬罹黨禍豈復眷戀一倡女哉予記國史所書温益知潭州當紹聖中逐臣在其廵内若范忠宣劉仲馮韓川原伯吕希純子進吕陶元鈞皆為所侵困鄒公南遷過潭暮投宿村寺益即時遣州都監將數卒夜出城逼使登舟竟凌風絶江去㡬於覆舟以是觀之豈肯容少游欵眤累日此不待辯而明已志之失著矣姓源韻譜姓氏之書大抵多謬誤如唐貞觀氏族志今已亡其夲元和姓纂誕妄最多國朝所修姓源韻譜尤為可笑姑以洪氏一項考之云五代時有洪昌洪杲皆為參知政事予按二人乃五代南漢僭主劉龑之子及晟嗣位用為知政事其兄弟本連𢎞字以夲朝國諱故五代史追改之元非姓洪氏也此與洪慶善序丹陽𢎞氏云有𢎞憲者元和四年嘗䟦輞川圖不知𢎞憲乃李吉甫之字耳其誤正同三筆已載此說譽人過實稱譽人過實最為作文章者之疵病班孟堅尚不能免如薦謝夷吾一書予盖論之於三筆矣柳子厚復杜温夫書云三辱生書書皆逾千言抵吾必曰周孔周孔安可當也語人必於其倫生來柳州見一刺史即周孔之今而去我道連而謁於潮又得二周孔去之京師京師顯人為文詞立聲名以千數又宜得周孔千百何吾生胸中擾擾焉多周孔哉是時劉夢得在連韓退之在潮故子厚云然此文人人能誦然今之好為諛者固自若也予表出之以為子孫戒張說賀魏元忠衣紫曰公居伊周之任即為二張所䜛幾於隕命此但形於語言之間耳作文句法作文㫖意句法固有規倣前人而音節鏘亮不嫌於同者如前漢書贊云豎牛奔仲叔孫卒郈伯毁季昭公逐費忌納女楚建走宰嚭譖胥夫差喪李園進妹春申斃上官訴屈懐王執趙高敗斯二世縊伊戾坎盟宋痤死江充造蠱太子殺息夫作姦東平誅新唐書効之云三宰嘯㐫牝奪辰林甫將蕃黄屋奔鬼質敗謀興元戲崔柳倒持李宗覆劉夢得因論儆舟篇云越子膝行吳君忽晉宣尸居魏臣怠白公厲劒子西哂李園飬士春申易以効班史語也然其模範本自荀子成相篇書簡循習近代士人相承於書尺語言浸渉竒獧雖有賢識不能自改如小􅂤問委自言所在必求新異之名予守贑時屬縣興國宰貽書云㶑水有驅策乞疏下㶑水者彼邑一水耳郡中未嘗知此不足以為工當言下邑屬邑足矣為縣丞者無不采藍田壁記語云負丞某處哦松無補渉筆承之皆厭爛陳言至稱丞曰藍田殊為可笑初赴州郡與人書必言前政頺靡倉庫匱乏未知所以善後㳂習一律正使真如所陳讀者亦不之信予到當塗日謝執政書云郡雖小而事簡庫錢倉粟自可枝梧得坐嘯道院誠為至幸周益公答云從前得外郡太守書未有不以窘冗為詞獨創見來緘如此盖覺其與它異也此兩者皆狃熟成俗故紀述以戒子弟輩健訟之誤破句讀書之誤根着于人殆不可復正在易彖之下先釋卦義然後承以本名者凡八卦蒙卦曰蒙山下有險險而止蒙以止字為句絶乃及於蒙始係以蒙亨以亨行訟卦曰訟上剛下險險而健訟以健字為句絶乃及於訟始係以訟有孚豫卦剛應而志行順以動豫隨卦剛來而下柔動而説隨蠱卦剛上而柔下㢲而止蠱恒卦㢲而動剛柔皆應恒解卦解險以動動而免乎險解井卦巽乎水而上水井皆是卦名之上為句絶而童蒙入學之初其師㸃句輙混於上遂以健訟相連此下說隨二字尚為有說若止蒙動豫之類將如之何凡謂頑民好訟者曰嚚訟曰終訟可也黄魯直江西道院賦云細民險而健以終訟為能筠獨不嚚於訟是已同人卦柔得中而應乎乾曰同人同人曰同人于野亨据其文義正與諸卦同但多下一曰字王弼以為乾之所行故特曰同人曰程伊川以為衍三字恐不然也用史語之失今之牽引史語者亦未免有失張釋之言便宜事文帝曰卑之毋甚高論令今可行也遂言秦漢之間事帝稱善顔師古云令其議論依附時事予謂不欲使為甚高難行之論故令少卑之爾而今之語者直以言議不足采為無甚高論又文帝問上林令禽獸簿不能對虎圏嗇夫從旁代對帝曰吏不當如此邪薛廣徳諫元帝御樓船曰宜從橋且有血汚車輪之訐張猛曰乘船危就橋安上曰曉人不當如是耶師古謂諫爭之言當如猛之詳婉也按兩帝之語皆是褒嘉之詞猶云獨不當如是乎今乃指人引諭非理或直述其私曰曉人不當如是又韓公送諸葛覺徃徐州讀書詩云鄴侯家多書挿架三萬軸一一懸牙籖新若手未觸為人強記覽過眼不再讀偉哉羣聖文磊落載其腹鄴侯盖謂李繁時為隨州刺史藏書既多且記性警敏故籖軸嚴整如是今人或指言雖名為收書而未嘗過目者輙曰新若手未觸亦非也文字書簡謹日作文字紀月日當以實言若拘拘然必以節序則為牽強乃似麻沙書坊桃源居士輩所䟦耳至於徃還書問不可不繫日而性率者一切不書予有婿生子遣報云今日巳時得一子更不知為何日或又失之好竒外姻孫鼎臣毎致書必題其後曰某節至云小暑前一日驚蟄前兩日之類文惠公常笑云看孫鼎臣書須著置歴日於案上盖自元正人日三元上已中秋端午七夕重九除夕外雖寒食冬至亦當謹識之况於小小氣候後生宜戒更衣雅志堂後小室名之曰更衣以為姻賔憇息地稚子數請所出因錄班史語示之灌夫𫝊坐乃起更衣顔注更改也凡久坐者皆起更衣以其寒暖或變也田延年起至更衣顔注古者延賔必有更衣之處衞皇后𫝊帝起更衣子夫侍尚衣容齋四筆卷九欽定四庫全書容齋四筆卷十十七則宋洪邁撰過所刑統衞禁律云不應度闗而給過所若冒名請過所而度者又云以過所與人又闗津疏議闗謂判過所之處津直度人不判過所釋名曰過所至闗津以示之或曰𫝊𫝊轉也轉移所在識以為信漢文帝十二年除闗無用傳張晏曰𫝊信也若今過所也兩行書繒帛分持其一出入闗合之乃得過謂之傳也魏志倉慈為敦煌太守西域雜胡欲詣洛者為封過所廷尉決事曰廣平趙禮詣雒治病門人齎過所詣洛陽責禮冒名渡津受一嵗半刑徐鉉稽神録道士張謹好符法客遊華隂得二奴曰徳兒歸寳謹愿可慿信張東行凡書囊符法過所衣服皆付歸寳負之將及闗二奴忽不見所齎之物皆失之矣時秦隴用兵闗禁嚴急客行無驗皆見刑戮既不敢東度復還主人乃見二兒因擲過所還之然過所二字讀者多不曉盖若今時公慿引㨿之類故裒其事于此露布用兵獲勝則上其功狀於朝謂之露布今博學宏詞科以為一題雖自魏晉以來有之然竟不知所出唯劉勰文心雕龍云露布者盖露板不封布諸觀聽也唐莊宗為晉王時擒滅劉守光命掌書記王緘草露布緘不知故事書之於布遣人曵之為議者所笑然亦有所從來魏高祖南伐長史韓顯宗與齊戍將力戰斬其禆將高祖曰卿何為不作露布對曰頃聞將軍王肅獲賊二三人驢馬數匹皆為露布私每哂之近雖得摧醜虜擒斬不多脫復高曵長縑虛張功捷尤而效之其罪彌甚臣所以斂毫卷帛解上而已以是而言則用絹高懸久矣東坡題潭帖潭州石刻法帖十卷盖錢希白所鑴最為善本吾鄉程欽之待詔以元符三年帥桂林東坡自儋耳移合浦得觀其藏帖每帖各題其末第二卷云唐太宗作詩至多亦有徐庾風氣而世不𫝊獨於初學記時時見之第四卷云吳道子始見張僧繇畫曰浪得名耳已而坐卧其下三日不能去庾征西初不服逸少有家雞野䳱之論後乃以為伯英再生今觀其書乃不逮子敬遠甚正可比羊欣耳第六卷云宰相安和殷生無恙宰相當是簡文帝殷生則淵源也邪第八卷云希白作字自有江左風味故長沙法帖比淳化待詔所摹為勝世俗不察爭訪閣下本誤矣此逸少一卷尤妙庚辰七夕合浦官舍借觀第九卷云謝安問獻之君書何如尊公答曰故自不同安曰外人不爾曰人那得知已上所書今麻沙所刋大全集志林中或有之案庾亮及弟翼俱為征西將軍坡所引者翼也坡又有詩曰暮年却得庾安西自厭家雞題六紙盖指翼前所厯官云此帖今藏予家山公啓事晉書山濤傳濤再居選職十有餘年每一官缺輙啓擬數人詔㫖有所向然後顯奏随帝意所欲為先故帝之所用或非舉首衆情不察以濤輕重任意或譖之於帝濤行之自若一年之後衆情乃􅆍濤所奏甄㧞人物各為題目時稱山公啓事此語今多引用然不得其式法帖中乃有之云侍中尚書僕射奉車都尉新㳫伯臣濤言臣近啓崔諒史曜陳准可補吏部郎詔書可爾此三人皆衆所稱諒尤質止少華可以崇教雖大化未可倉卒風尚所勸為益者多臣以為宜先用諒謹隨事以聞觀此一帖可以槩見然所啓三人後亦無聞既云皆衆所稱當不碌碌也舊潭帖為識者稱許以為賢於他本然於此奏未可倉卒之下乃云風筆惻然全無意義今所録者臨江本也親王回庶官書隨筆中載親王與侍從徃還禮數又得錢丕行年雜紀云昇王受恩命丕是時為將作少監亦投賀狀王降回書簽子啓頭繼為皇太子三司判官並通牓子詣内東門參賀通入後中貴出𫝊令㫖𫝊語及受冊寳訖百官班賀又赴東宫賀宰相親王階下班定太子降階宰相前拜致詞訖又拜太子皆答拜亦致詞叙謝一時之儀如此責降考試官天禧二年九月勑差屯田員外郎判度支計院任布著作郎直史館徐奭太子中允直集賢院麻温其並充開封府發解官十月差兵部員外郎直集賢院楊侃太子中允直集賢院丁度並國子監發解官十一月解一百四人解元郭稹十六日宣翰林學士錢惟演盛度樞密直學士王晦叔龍圖閣待制李虛已李行簡覆考開封舉人為落解舉人有訟不平者及奏名郭稹依舊其餘覆落并却考上人數甚多十二月發解官並降差遣任布鄧州徐奭洪州楊侃江州丁度齊州並監税此事見於錢丕雜紀用五侍從覆考解試前後未之有也青蓮居士李太白贈玊泉仙人掌茶詩序云荆州玉泉寺近清溪諸山徃徃有乳窟其水邉處處有茗草羅生枝葉如碧玊唯玊泉真公常采而飲之余遊金陵見宗僧中孚示予茶數十片其狀如手名為仙人掌茶盖新出乎玉泉之山曠古未覿因持以見遺兼贈詩要予答之遂有此作後之高僧大隠知仙人掌茶發乎中孚禪子及青蓮居士李白也太白之稱但有謫仙人爾青蓮居士獨於此見之文人未嘗引用而仙人掌茶今池州九華山中亦頗有之其狀畧如蕨拳也閩俗詭祕殺人姦㐫之民恃富逞力處心積慮果於殺人然揆之以法盖有勑律所不曾登載善治惡者當原情定罪必致其誅可也閩中習俗尤甚毎執縛其仇窮肆殘虐或以酒調鋸屑逼之使飲欲其粘着肺腑不能傳化馴致痰渴之疾或炒沙鎔蠟灌注耳中令其聾瞶或以濕薦束體布褁卵石痛加敺箠而外無痕傷或按擦肩背使皮膚寛皺乃施針刺入肩井不可復出或以小釣鈎藏於鰍魚之腹強使吞之攻鑽五臟久而必死凡此等者類非一端既痕腫不露於外撿驗不得而見情犯巨蠧功意兩惡而法所不言顔度魯子為轉運使嘗掲榜禁約予守建寧亦窮治一兩事吳楚間士大夫宦游於彼者不可不察也富公遷官富韓公慶厯二年以右正言知制誥報聘契丹還除吏部郎中樞密直學士不受尋除翰林學士又不受三年除右諫議大夫樞密副使力辭乃改資政殿學士而諫議如初公受之又五月復為副樞盖昔時除目才下即時命詞給告及其改命但不拜執政而猶得所進官用今日官制言之是承議郎舊為正言中書舍人舊知制誥而為太中大夫舊為諫議資政殿學士也唐藩鎮行墨勑池州銅陵縣孚貺侯廟有唐中和二年二月一碑其詞云勑宣歙池等州都團練觀察使牒當道先准詔㫖許行墨勑授管内諸州有功刺史大將等憲官具件如後晉朝故晉陽太守兼揚州長史張寛牒奉處分當道先准詔㫖許行墨勑奬勸功勳雖幽顯不同而襃昇一致神久標竒絶早揖英風靈跡屢彰神逵不昧夫寵贈之典非列藩宜為神功既昭乃軍都顒請是行權制用副人心謹議褒贈游擊將軍宣州都督後云使撿挍工部尚書兼御史大夫裴押邑人以為裴休秋浦志亦然予考之非也張魏公宣撫川陜便宜封爵諸神實本諸此吏部循資格唐開元十八年四月以侍中裴光庭兼吏部尚書先是選司注官惟視其人之能否或不次超遷或老於下位有出身二十餘年不得祿者又州縣亦無等級或自大入小或初近後逺皆無定制光庭始奏用循資格各以罷官若干選而集官高者選少卑者選多無問能否選滿則注限年躡級毋得踰越非負譴者皆有陞無降其庸愚沉滯者皆喜謂之聖書而材俊之士無不怨嘆宋璟爭之不能得二十一年光庭薨博士孫琬議光庭用循資格失勸奬之道請謚曰克是年六月制自今選人有才業操行委吏部臨時擢用雖有此制而有司以循資格便於己猶踵行之盖今日吏部四選乃其法也予案元魏肅宗神龜二年官員既少應選者多尚書李韶銓注不行大致怨嗟崔亮代之奏為格制不問士之賢愚專以停解月日為斷沉滯者皆稱其能亮甥劉景安與書曰商周以鄉塾貢士兩漢由州郡薦材魏晉中正雖未盡美應什收六七而朝廷貢材止求其文不取其理察孝廉唯論章句不及治道立中正不考材行空辨姓氏舅屬當銓衡宜須改張易調反為停年格以限之天下士子誰復修厲名行哉洛陽令薛琡上書言黎元命繫長吏若選曹惟取年勞不簡能否義均行鴈次若貫魚執簿呼名一人足矣數人而用何謂銓衡乞令王公貴人薦賢以補郡縣詔公卿議之其後甄琛等繼亮利其便已踵而行之魏之選舉失人自亮始也至孝靜帝元象二年以高澄攝吏部尚書始改亮年勞之制銓擢賢能當是自此一變光庭又祖亮故智云然後人罕有談亮澄事者五行納音六十甲子納音之說術家多不能曉原其所以得名皆從五音所生有條不紊端如貫珠盖甲子為首而五音始於宫宫土生金故甲子為金而乙丑以隂從陽商金生水故丙子為水而丁丑從之角木生火故戊子為火徴火生土故庚子為土羽水生木故壬子為木而已丑辛丑癸丑各從之至於甲寅則納音起於商商金生水故甲寅為水角木生火故丙寅為火徴火生土故戊寅為土羽水生木故庚寅為木宫土生金故壬寅為金而五卯各從之至甲辰則納音起於角角木生火故甲辰為火徴火生土故丙辰為土羽水生木故戊辰為木宫土生金故庚辰為金商金生水故壬辰為水而五已各從之宫商角既然惟徴羽不得居首於是甲午復如甲子甲申如甲寅甲戌如甲辰而五未五酉五亥亦各從其類五行化真五行運化如甲巳化真土之類若推求其義無從可得盖只以五虎元所生命之如甲巳之年丙作首謂丙寅月建也丙屬火火生土故甲巳化真土乙庚之嵗戊為頭謂戊寅月建也戊屬土土生金故乙庚化真金丙辛寄向庚寅去庚屬金金生水故丙辛化真水丁壬壬位順行流壬屬水水生木故丁壬化真木戊癸但向甲寅求甲屬木木生火故戊癸化真火此二說皆得之莆田鄭景實頃在舘中見魏㡬道談五行納音亦然錢忠懿判語王順伯家有錢忠懿一判語其狀云臣贊寧右臣伏奉宣㫖撰文疏今進呈乞給下取設齋日五更前上塔臣自宣却欲重建乞於仁政殿前夜間化却不然便向塔前化並取聖㫖判曰便要吾人宣讀後於真身塔前焚化二十七日而在前花押予謂錢氏固嘗三改元但或言其稱帝則否也此狀内進呈聖㫖等語盖類西河之人擬子夏於夫子故自貽僭帝之議想它所施行皆然矣王逸少為藝所累王逸少在東晉時盖温太真蔡謨謝安石一等人也直以抗懐物外不為人役故功名成就無一可言而其操履識見議論閎卓當世亦少其比公卿愛其才噐頻召不就殷淵源輔政勸使應命遺之書曰足下出處正與隆替對豈可以一世之存亡必從足下從容之適逸少報曰吾素自無廊廟王丞相欲内吾誓不許之手跡猶存由來尚矣不於足下參政而方進退自兒娶女嫁便懐尚子平之志數與親知言之非一日也及殷侯將北伐以為必敗貽書止之殷敗後復圖再舉又遺書曰以區區江左所營綜如此天下寒心久矣自冦亂以來處内外之任者疲竭根本各從所志竟無一功可論一事可紀任其事者豈得辭四海之責哉若猶以前事為未工故復求之於分外宇宙雖廣何所自容又與㑹稽王牋曰今雖有可欣之㑹内求諸已而所憂乃重於所欣以區區吳越經緯天下十分之九不亡何待願令諸軍皆還保淮須根立勢舉謀之未晩其識慮精深如是其至恨不見於用耳而為書名所盖後世但以翰墨稱之晉書夲贊標為唐太宗御撰專頌其研精篆素盡善盡美至有心慕手追之語畧無一詞論其平生則一藝之工為累大矣獻之立志亦似其父謝安欲使題太極殿榜以為萬代寳而難言之試及韋仲將凌雲榜事即正色曰使其若此有以知魏徳之不長遂不之逼觀此一節可以知其為人而亦以書名之故没其盛徳二王尚爾况於他人乎鄂州南樓磨崖慶元元年鄂州修南樓剥土有大石露于外竒崛可觀郡守吳琚見而愛之命洗剔出圭角即而諦視乃磨崖二碑其一刻兩字上曰栁徑二尺四寸筆勢清勁下若翻書人字唯存人脚不可復辨或以為符或以為花押邦人至標飭置神堂香火供事或云道州學側虞帝廟内亦有之云柳君名應辰是唐末五代時湖北人也其一高丈一尺闊如其高而加五寸刻大字八十五凡為九行其文曰乾正元年荆襄冦亂大吳將軍出陳武昌詔太守楊公出鎮後云荆江京漢推忠輔國侍衛將軍吳居中記案楊行密之子溥嗣吳王位是嵗唐明宗天成二年溥以十一月僭帝改元乾貞宋莒公紀年通譜書為乾正云避仁宗嫌名通鑑亦同而此直以為乾正一時所立不應有誤也賞魚袋出處隨筆書衡山唐碑别駕賞魚袋云名不可曉今按唐職林魚𢃄門叙金玊銀鐡𢃄及金銀魚袋云開元勑非灼然有戰功者餘不得輙賞魚袋斯明文也容齋四筆卷十欽定四庫全書容齋四筆卷十一宋洪邁撰京丞相轉官慶元二年朝廷奉上三宫徽稱冊寳繼又進勑令玉牒實録大臣遷秩于再于三蓋自崇寧至于紹熈未之有也於是京右丞相以十月受􅁽寳賞由正議轉宣奉十二月用勑局賞當得兩官以一回授一轉光禄三年二月用提舉玊牒實録院及禮儀使賞有㫖三項各轉兩官辭之至四五詔減為四官其半回授其二遂轉金紫四月之間陟五華資仍回授三帙在法宰執轉官與除拜同故得給使㤙百二十年而入流者二十有四邁記淳熈十四年王左相進玉牒并充國史禮儀使梁右相進四朝史傳國朝㑹要并充玊牒禮儀使詔各與轉兩官所謂各者指二相也時梁公誤認為三者各兩官已係特進謂如此則序進太師矣中批只共為兩官復辭之詔許回授又辭但令加恩亦辭適已罷相在經筵訖於分毫不受惟王公獨加恩今日之事全相類而又已有去冬二賞矣有司不諳練故實徑凖昔年中㫖行出聞京公殊不自安然無說可免惜乎東閤賢賔客不告以十年内親的故事以成其美邁頃居翰苑荅王梁諸詔嘗上章開析論列是以竊識其詳熈寧司農牟利熈寧元豐中聚斂之臣專務以利為國司農遂粥天下祠廟官既得錢聴民為賈區廟中慢侮穢踐無所不至南京有閼伯微子兩廟一嵗所得不過七八千張文定公判應天府上言曰宋王業所基也而以火王閼伯封於商邱以主夫火微子為宋始封此二祠者獨不可免乎乞以公使庫錢代其嵗入神宗震怒批出曰慢神辱國無甚於斯於是天下祠廟皆得不粥又有議前代帝王陵􅃦許民請射耕墾司農可之唐之諸陵因此悉見芟刈昭陵喬木翦伐無遺御史中丞鄧潤甫言熈寧著令本禁樵采遇郊祀則勑吏致祭徳意可謂逺矣小人掊克不顧大體使其所得不貲猶為不可況至為淺鮮者哉願絀創議之人而一切如故於是未耕之地僅得免二者可謂前古未有一日萬㡬蓋無由盡知之也文與可樂府今人但能知文與可之竹石惟東坡公稱其詩騷又表出美人却扇坐羞落庭下花之句予常恨不見其全比得蜀本石室先生丹淵集盖其遺文也於樂府雜詠有秦王卷衣篇曰咸陽秦王家宫闕明曉霞丹文映碧鏤光采相鈎加銅螭逐銀猊壓屋驚蟠拏洞户鎻日月其中光景賖春風動珠箔鸞額金窠斜美人却扇坐羞落庭下花閒弄玉指環輕氷扼紅牙君王顧之笑為駐七寳車自卷金鏤衣龍鸞蔚紛葩持以贈所愛結懽期無涯其語意罙入騷人閫域又有王昭君三絶句云絶艷生殊域芳年入内庭誰知金屋寵只是信丹青㡬嵗後宫塵今朝絶國春君王重恩信不欲遣他人極目胡沙滿傷心漢月圓一生埋没恨長入四條絃令人讀之縹縹感慨無已也譏議遷史大儒立言著論要當使後人無復擬議乃為至當如王氏中說謂陳壽有志於史依大議而削異端使壽不美於史遷固之罪也又曰史之失自遷固始也記繁而志寡王氏之意直以壽之書過於漢史矣豈其然乎元續讀詩書猶有存者不知能出遷固之右乎蘇子由作古史謂太史公易編年之法為本紀世家列傳後世莫能易之然其人淺近而不學疎畧而輕信故因遷之舊别為古史今其書固在果能盡矯前人之失乎指司馬子長為淺近不學貶之已甚後之學者不敢謂然常何唐太宗貞觀五年以旱詔文武官極言得失時馬周客遊長安舍於中郎將常何之家何武人不闕不知所言周代之陳便宜二十餘條上怪其能以問何對曰此非臣所能家客馬周為臣具草耳上即召周與語甚恱以何為知人賜絹三百匹常何後亦不顯莫知其所以進予案李宻傳宻從翟讓與張須陀戰率驍勇常何等二十人為游騎遂殺須陀常何之名蓋見於此唐史亦采於劉仁軌行年河洛記也李宻詩李宻在隋大業中從楊𤣥感起兵被獲以計得脫變姓名為劉智逺教授諸生自給鬱鬱不得志哀吟泣下唐史所書如此劉仁軌行年河洛記專載宻事云宻往來諸賊帥之間說以舉大計莫肯從者因作詩言志曰金風蕩初節玊露垂晩林此夕窮途士鬱陶傷寸心平野葭葦合荒村葵藿深眺聴良多感徙倚獨沾襟沾襟何所為悵然懐古意秦洛既未平漢道將何冀樊噲市井屠蕭何刀筆吏一朝逢時㑹千載傳名謚寄言世上雄虛生真可愧諸將見詩漸敬之予意此篇正其哀吟中所作也寺監主簿自元豐官制行九寺五監各置主簿專以掌鉤考簿書為職它不得預紹聖初韓粹彦為光禄主簿自言今輙預寺事非先帝意也請如元豐詔書從之如玉牒修書主簿不預見於王定國舊録予猶及見紹興中太府寺公狀文移惟卿丞繫銜後來掌故之吏昧於典章遂一切與丞等今百官庻府背戾官制非特此一事也温大雅兄弟名字新唐書温大雅字彦𢎞弟彦博字大臨大有字彦將舊史不載彦博字它皆同三温兄弟也而兩人以大為名彦為字一以彦為名大為字宰相世系表則云彦將字大有而博雅與傳同讀者徃徃致疑歐陽公集古録引顔思魯制中書舍人彦將行證表為是然則惟彦博異耳故或以為悞予少時因文惠公得歐率更所書虞㳟公誌銘乃彦博也其名字實然後見大唐創業起居注大雅所撰其中云煬帝遣使夜至太原温彦將宿於城西樓上首先見之報兄彦𢎞馳以啓帝帝方卧聞而驚起執彦𢎞手而笑据此則三温之名皆從彦而此書首題乃云大雅奉勑撰不應於其間敢自稱字已而詳攷之高宗太子𢎞為武后所酖追尊為孝敬皇帝廟曰義宗列於太廟故諱其名如𢎞文館改為昭文𢎞農縣改為恒農徐𢎞敏改為有功韋𢎞機但為機李含光本姓𢎞易為李曲阿𢎞氏易為洪則大雅之名後人追改之也顔魯公作顔勤禮碑叙顔温二家之盛曰思魯大雅􅉖楚彦博遊秦彦將以雅為名亦由避諱耳錢聞詩在太學以此為䇿問而言歐陽作傳戾於聞見彼蓋不察宋子京之作云􅁽府元龜真宗初命儒臣編修君臣事迹後謂輔臣曰昨見宴享門中録唐中宗宴飲韋庶人等預㑹和詩與臣寮馬上口摘含桃事皆非禮也已令削之又曰所編事迹蓋欲垂為典法異端小說咸所不取可謂盡善而編修官上言近代臣僚自述揚歴之事如李徳裕文武兩朝獻替記李石開成承詔録韓偓金鑾宻記之類又有子孫追述先徳叙家世如李繁鄴侯傳柳氏序訓魏公家傳之類或隠已之惡或攘人之善並多溢美故匪信書并僭偽諸國各有著撰如偽吳録孟知祥實録之類自矜本國事或近誣其上件書並欲不取餘有三十國春秋河洛記壺關録之類多是正史已有秦記燕書之類出自偽邦商芸小說談藪之類俱是談詼小事河南志邠志平剡録之類多是故吏賔從述本府戎帥征伐之功傷於煩碎西京雜記明皇雜録事多語怪奉天録尤是虛詞盡議采收恐成蕪穢並從之及書成賜名冊府元龜首尾十年皆王欽若提總凡一千卷其所遺弃既多故亦不能暴白如資治通鑑則不然以唐朝一代言之叙王世充李宻事用河洛記魏鄭公諌爭用諌録李絳議奏用李司空論事睢陽事用張中丞𫝊淮西事用涼公平蔡録李泌事用鄴侯家𫝊李徳裕太原澤潞回鶻事用兩朝獻替記大中吐蕃尚婢婢等事用林恩後史補韓偓鳯翔謀畫用金鑾宻記平龐勛用彭門記亂討裘甫用平剡録記畢師鐸吕用之事用廣陵妖亂志皆本末粲然然則雜史𤨏說家𫝊豈可盡廢也漢高帝祖稱豐公前漢書高祖紀贊云劉氏自秦獲於魏秦滅魏遷大梁都于豐故周市說雍齒曰豐故梁徙也是以頌高祖云漢帝本系出自唐帝降及于周在秦作劉渉魏而東遂為豐公豐公蓋太上皇父案上六句皆韻語不知何人作此頌諸家注釋大氐闕如予自少時讀班史今六七十年何啻百遍用朱㸃句亦須十本初不記憶高帝之祖稱豐公比再閲之恍然若昧平生聊表見於此舊書不厭百回讀信哉樞宻行香唐世樞宻使專以内侍為之與它使均稱内諸司五代以來始叅用士大夫遂同執政案實録所載景徳二年三月元徳皇后忌中書樞宻院文武百官並赴相國寺行香初樞宻院言舊例國忌行香惟樞宻使副依内諸司例不赴恐有虧恭恪今欲每遇大忌日與中書門下同赴行香從之樞宻使副翰林樞宻直學士並赴自兹始也然則樞宻之同内諸司久矣隆興以來定朝臣四叅之儀自宰臣至于郎官御史皆班列殿庭拜舞惟樞宻立殿上不預亦此意云船名三翼文選張景陽七命曰浮三翼戱中沚其事出越絶書李善注頗言其畧蓋戰船也其書云闔閭見子胥問船運之備對曰船名大翼小翼突胃樓船橋船大翼者當陵軍之車小翼者當陵軍之輕車又水戰兵法内經曰大翼一艘廣一丈五尺三寸長十丈中翼一艘廣一丈三尺五寸長九丈小翼一艘廣一丈二尺長五丈六尺大抵皆巨戰船而昔之詩人乃以為輕舟梁元帝云日華三翼舸又云三翼自相追張正見云三翼木蘭船元㣲之云光隂三翼過其它亦鮮用之者東坡誨葛延之江隂葛延之元符間自郷縣不逺萬里省蘇公於儋耳公留之一月葛請作文之法誨之曰儋州雖數百家之聚而州人之所須取之市而足然不可徒得也必有一物以攝之然後為已用所謂一物者錢是也作文亦然天下之事散在經子史中不可徒使必得一物以攝之然後為己用所謂一物者意是也不得錢不可以取物不得意不可以用事此作文之要也葛拜其言而書諸紳嘗以親製龜冠為獻公受之而贈以詩曰南海神龜三千嵗兆叶朋從生慶喜智能周物不周身未死人鑽七十二誰能用爾作小冠􅒖嶁耳孫創其製今君此去闕二字來欲慰相思時整視今集中無此詩葛常之延之三從弟也嘗見其親筆用書雲之誤今人以冬至日為書雲至用之於表啓中雖前輩或不細考然皆非也左氏𫝊僖公五年正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啓閉必書雲物為備故也杜預注云周正月今十一月分春秋分也至冬夏至也啓者立春立夏閉者立秋立冬雲物者氣色災變也蓋四時凡八節其禮並同漢明帝永平二年春正月辛未宗祀光武畢登靈臺觀雲物尤可為證而但讀左傳前兩三句故遂顓以指冬至云今太史局官每至此八日則為一狀若立春則曰風從艮位上來春分則曰風從震位上來它皆倣此只是定夲元非摭實起居注隨即修入顯為文具蓋古之書雲意也張鷟譏武后濫官武后革命濫授人官故張鷟為諺以譏之曰補闕連車載拾遺平斗量杷推侍御史腕脫挍書郎唐新舊史亦載其語但泛言之案天授二年二月以十道使所舉人石艾縣令王山輝等六十一人並授拾遺補闕懐州録事叅軍霍獻可等二十四人並授侍御史并州録事叅軍徐昕等二十四人授著作郎内黄縣尉崔宣道等二十三人授衞佐挍書凡百三十二人同日而命試官自此始也其濫如此劉子𤣥𫝊武后詔九品以上陳得失子𤣥言君不虛授臣不虛受今羣臣無功遭遇輙遷至都下有車載斗量杷推腕脫之諺正為此設然只是自外官便除此四職非所謂輙遷子𤣥之言失之矣唐王府官猥下唐自高宗以後諸王府官益輕惟開元二十三年加榮王以下官爵悉拜王府官屬浸又減省僅有一傅一友一長史亦但備員至與其府王不相見寳歴中瓊王府長史裴簡求具狀言諸王府本在宣平坊多年摧毁後付莊宅使收管遂為公局每聖恩除授無處禮上王官為衆所輕府既不存官同虛設伏乞賜官宅一區乃詔賜延康坊宅予因閱九經字樣一書開成中唐𤣥度所纂其官階云朝議郎知沔王友兖翰林待詔沔王名恂憲宗之子而以書吏為友其餘可知案文武宣昭四宗皆自藩王登大位剛明果斷為史所稱蓋出於天性然非資於師友成就也御史風聞御史許風聞論事相承有此言而不究所從來以予考之蓋自晉宋以下如此齊沈約為御史中丞奏彈王源曰風聞東海王源蘇冕㑹要云故事御史臺無受詞訟之例有詞狀在門御史採狀有可彈者即略其姓名皆云風聞訪知其後疾惡公方者少遞相推倚通狀人頗壅滯開元十四年始定受事御史人知一日劾狀遂題告事人名乖自古風聞之義然則向之所行今日之短卷是也二字本見尉佗傳唐御史遷轉定限唐元和中御史中丞王播奏監察御史舊例在任二十五月轉準具員不加今請仍舊其殿中侍御史舊十二月轉具員加至十八月今請減至十五月侍御史舊十月轉加至十三月今請減至十二月從之案唐世䑓官雖職在抨彈然進退從違皆出宰相不若今之雄𦂳觀其遷叙定限可知矣國朝未改官制之前任監察滿四年而轉殿中又四年轉侍御史又四年解臺職始轉司封員外郎元豐五年以後陞沉逈别矣容齋四筆卷十一欽定四庫全書容齋四筆卷十二十三則宋洪邁撰小學不講古人八嵗入小學教之六書周官保氏之職實掌斯事厥後浸廢蕭何著法太史試學童諷書九千字乃得為吏以六體試之吏人上書字或不正輙有舉劾劉子正父子校中祕書自史籕以下凡十家序為小學次於六藝之末許叔重收集篆籕古文諸家之學就𨽻為訓注謂之說文蔡伯喈以經義分散𫝊記交亂訛偽相䝉乃請刋定五經備體刻石立于太學門外謂之石經後有吕忱又集說文之所漏畧著字林五篇以補之唐制國子監置書學博士立說文石經字林之學舉其文義嵗登下之而考功禮部課試貢舉許以所習為通人茍趨便不求當否大厯十年司業張參纂成五經文字以類相從至開成中翰林待詔唐𤣥度又加九經字様補參之所不載晉開運末祭酒田敏合二者為一編並以考正俗體訛謬今之世不復詳考雖士大夫作字亦不能悉如古法矣韓子曰凡為文辭宜畧識字又云阿買不識字頗知書八分安有不識字而能書蓋所謂識字者如上所云也予采張氏田氏之書擇今人所共昧者漫載於此以訓子孫本字從木一在其下今為大十者非休字象人息於木隂加㸃者非美从羊从大今从犬从火者非􅂒字古者以車戰故軍从勹下車後相承作軍義無所取看字从手凡視物不審則以手遮目看之作㸔者非揚州取輕揚之義从木者非梁从木作梁者非乾有干䖍二音為字一體今俗分别作乹字音䖍而乾音干者非尊从酋下寸作尊者非奠从酋从丌作奠者非夷从弓从大作夷者訛耆从㫖作老下目者訛漆泰黍黎下並从水相承省作小今从小从小者訛決沖況涼盜並从水作冫者訛饑飢二字上穀不熟下餓也今多誤用至於果芻韭之加草岡加山攜之作携鉏作鋤惡作􅁖霸作覇筍作笋頿作髭須加髟或从水祕从禾簡作蕑寶从尔趨从多衡合从角从大而从魚啓从又及弋肈从文徹从去麤作鹿蟲作虫墮許規反俗作隳又以為惰幡作幡怪為恠關為關炙从夕閒从日功从力兹合从二𤣥而作兹升作􅅩輩从北妬从户姦為姧􅀢从毒吝作􅈔寃上加㸃鄰作隣牟从午互作㸦元从㸃舌从千蓋作盖京作亰皎从日次从冫鼓从皮濳譖僭从替出作二山覺从與游於以方為才皁為皂曷為曷匹為疋收作収叙作叙臥从臣从人而以人為卜改从戊巳之巳而以為巳凢作凡允作允館作舘覽作覧祭合从月从又而作祭瞻作瞻緥从衣滛从缶徧作遍徼作僥漾作漾琴瑟之弦从糸輕作輕如是者皆非也主臣漢文帝問陳平決獄錢穀平謝曰主臣史記漢書皆同張晏曰若今人謝曰惶恐也文頴曰惶恐之辭猶今言死罪也晉灼曰主擊也臣服也言其擊服皇恐之辭馬融龍虎賦曰勇怯見之莫不主臣正用此意文選載梁任昉奏彈曹景宗先叙其罪然後繼之曰景宗即主臣仍繼之曰謹案某官臣景宗又彈劉整亦曰整即主臣齊沈約彈王源文亦然李善捨漢史所書而引王隠晉書庾純自劾以謂然以主為句則臣當下讀殊為非是不知所謂某人即主有何義哉景華御苑崔徳符坐元符上書邪黨困於崇寧後監洛南稻田務嘗送客於㑹節園是時冬暮梅花已開明年春監修大内閹官容佐取以為景華御苑徳符不知也至春晩復騎瘦馬與老兵游園内坐梅下賦詩其詞曰去年白玉花結子深枝間小憇籍清影低顰啄㣲酸故人不可見春事今已䦨繞樹尋履跡空餘􅁟花斑次日佐入園見地上馬糞知為徳符是時府官事佐如不及而徳符未嘗謁之佐即具奏劾以擅入御苑作踐有㫖勒停家素貧𫝊食於諸賢之舍久乃歸陽翟徳符没於靖康官卑不應立𫝊予詳考本末為特書之頗憶此段事擬載於傳中以悼君子之不幸且知馬永卿􅂴真錄中有之而求不可得漫紀于此州陞府而不為鎮州郡之名莫重於府雖節鎮不及焉固未有稱府而不為節度者比年以來陞蜀州為崇慶府劒州為隆慶府㳟州為重慶府嘉州為嘉定府秀州為嘉興府英州為英徳府蜀劒既有崇慶普安軍之額而恭嘉以下獨未然故幕職官仍云某府軍事判官推官大與府不相稱皆有司之失也信陽軍一小壘耳而司户叅軍銜内𢃄兼節推尤為可笑頃在中都時每為天官主者言之云亦不必白朝廷只本案檢舉改正申知足矣乃曰久例如此竟相承到今文安公嘗為左選侍郎是時未知此也漢唐三君知子英明之君見其子有材者必愛而稱之漢高祖謂趙王如意類已欲以易孝惠以大臣諫而止宣帝以淮陽王欽壯大好經書法律聦逹有材數嗟嘆曰真我子也常有意欲立為嗣而因太子起於㣲細且早失母故弗忍唐太宗以吳王恪英果類我欲以代雉奴其後如意為吕母所戕恪為長孫無忌所害欽陷張博之事殆於不免此三王行事無由表見然孝惠之仁弱幾遭吕氏之覆宗孝元之優柔不斷權移於閽寺漢業遂衰高宗之庸懦受制㐫后為李氏禍尤惨其不能繼述固已灼然高祖宣帝太宗蓋本三子之材而言之非専指其容貎也可謂知子矣彼明崇儼謂英王哲即中宗也貎類太宗張說謂太宗畫像雅類忠王即肅宗也此惟取其形似也若以材言之中宗之視太宗天壤相隔矣漢成帝所幸妾曹宫産子曰我兒額上有壯髪類孝元皇帝使其真是孝元亦何足道而況於嬰孺之狀耶當官營繕元豐元年范純粹自中書撿正官謫知徐州滕縣一新公堂吏舍凡百一十有六間而寢室未治非嫌於奉己也曰吾力有所未暇而已是時新法正行御史大夫如束濕雖任二千石之重而一錢粒粟不敢輙用否則必著冊書東坡公歎其廉適為徐守故為作記其略曰至於宫室蓋有所從受而𫝊之無窮非獨以自飬也今日不治後日之費必倍而比年以來所在務為儉陋尤諱土木營造之功欹仄腐壊轉以相付不敢擅易一椽此何義也是記之出新進趨時之士媢疾以惡之恭覽國史開寳二年二月詔曰一日必葺昔賢之能事如聞諸道藩鎮郡邑公宇及倉庫凡有墮壊弗即繕修因循嵗時以至頽毁及僝工充役則倍增勞費目今節度觀察防禦團練使刺史知州通判等罷任其治所廨舍有無隳壊及所増修著以為籍迭相符授幕職州縣官受代則對書於考課之厯損壊不全者殿一選修葺建置而不煩民者加一選太祖創業方十年而聖意下逮克勤小物一至於此後之當官者不復留意以興仆植僵為務則暗於事體不好稱人之善者徃徃翻指為妄作名色盜隠官錢至於使之束手諱避忽視傾陋逮於不可奈何而後已殊不思貪墨之吏欲為姦者無施不可何必假於營造一節乎治厯明時易革之彖曰天地革而四時成湯武革命順乎天而應乎人魏晉而降凡及禪代者必据以為說案漢轅固與黄生爭論湯武於景帝前但評受命之是非不引易為證卦之象曰君子以治厯明時其義了不相渉偃孫頗留意厯學云按唐一行大衍厯日度議曰顓帝厯上元甲寅正月甲寅晨初合朔立春七曜皆直艮維之首湯作殷厯更以十一月合朔冬至為上元周人因之此謂治厯也至於三統之建夏以寅為嵗首得人統殷以丑為得地統周武王改從子為得天統此謂明時也其革命之說劉歆作三統厯及譜引革彖湯武革命又曰治厯明時所以和人道也如是而已其前又引逸書曰先其革命顔師古曰言王者統業先立筭數以命百事也推此而伸之所云革命蓋謂是耳非論其取天下也況大衍之用四十有九一行以之起厯而革卦之序在周易正當四十九然則專為厯甚明考其上句尤極顯白然諸儒贊易皆不及此王弼亦無一言仕宦捷疾唐傳遊藝以期年之中厯衣青綠朱紫時人謂之四時仕宦言其速也國朝惟綠緋紫三等而紫袍者除武臣外文官之制其别有六庶僚黒角𢃄佩金魚未至侍從而特賜𢃄者為荔枝五子不佩魚中書舍人諫議待制權侍郎紅鞓黒犀𢃄佩魚權尚書御史中丞資政端明殿閣學士直學士正侍郎給事中金御仙花帶不佩魚謂之横金翰林學士以上正尚書御仙𢃄佩魚謂之重金執政官宰相方團毬文𢃄俗謂之笏頭者是也其叙如此若猛進躐得者則不然紹興中宋樸自侍御史遷中丞施鉅自中書檢正鄭仲熊自右正言並遷權侍郎三人皆受告日易服以正謝日拜執政樸鉅以緋仲熊以綠服紫之次日而賜毬文帶蓋侍從以下俟正謝乃易帶而執政命才下即遣中使齎賜遂服之而赴都堂供職可謂捷疾矣若李綱則又異於是宣和七年十二月二十九日自太常少卿除兵部侍郎未謝閒靖康元年正月四日胡騎將至京城綱以邊事求見宰執奏事未退綱語知閤門事朱孝莊曰有急切公事欲與宰執廷辯孝莊曰舊例未有宰執未退而從官求對者綱曰此何時而用例邪孝莊即具奏詔引綱立於執政之末時宰執議欲奉鑾輿出狩襄鄧綱請固守上曰誰可將者綱曰願以死報第人㣲官卑恐不足以鎮服士卒白時中乞以為禮部尚書綱曰亦只是侍從即命除尚書右丞綱曰臣未正謝猶衣綠非所以示中外即靣賜袍帶并笏綱服之以謝且言方時艱難臣不敢辭此為不經緋紫而極其服章未之有也詞臣益輕治平以前謂翰林學士及知制誥為兩制自翰林罷補外者得端明殿學士謂之換職熈寧之後乃始為龍圖紹興以來愈不及矣修起居注者序遷知制誥其次及辭不為者乃為待制趙康靖馮文簡曾魯公司馬公吕正獻公是也學士闕則次補或為宰相所不樂者猶得侍讀學士劉元甫是也在職未久而外除者為樞宻直學士韓魏公是也亦為龍圖直學士歐陽公是也後來褒擢者僅得待制王時亨是也餘以善去者集英修撰而止耳夏英公好處夏英公既失時譽且以慶厯聖徳頌之故不正之名愈彰然固自有好處夏羗之叛英公為四路經畧安撫招討使韓魏公副之賊犯山外韓公令大將任福自懐逺城趨得勝寨出賊後如未可戰即踞險置伏要其歸戒之至再又移檄申約茍違節度雖有功必斬福竟為賊誘没于好水川朝論歸咎於韓英公使人收散兵得韓檄於福衣帶間言罪不在韓故但奪一官英公此事賢矣而後來士大夫未必知也予是以表出之神宗用人神宗用人進退遲速不執一端茍其材可任則超資越級曾不少靳非拘拘於愛惜名噐也宋琪自員外郎以正月擢拜諫議大夫三月參知政事太宗將用李昉時昉官工部尚書七月特遷琪刑書遂並命為相而琪居昉上自外郎嵗中至此石熈載以太平興國四年正月自右補闕今朝奉郎為兵部員外郎今朝請郎樞宻直學士才七日簽書院事四月拜給事中今通議大夫為副樞十月遷刑部侍郎今正議六年遷户部尚書今銀青光禄為使八年罷為右僕射今特進從初至此五嵗用今時階秩言之乃是朝奉郎而為特進也當日職名唯有宻直多從庻僚得之旋即大用張齊賢王沔皆自補闕直史舘遷郎中充學士越半嵗並遷諌議簽樞温仲舒冦凖皆自正言今承議郎直館遷郎中充職二年並為樞宻副使向敏中自工部郎中以本官充職越三月同知宻院錢若水自同州推官入直史館踰年擢知制誥二年除翰林學士遂以諌議同知宻院首尾五年至道九老李文正公昉罷相後只居京師以司空致仕至道元年年七十二矣思白樂天洛中九老之㑹適交游中有此數曰太子中允張好問年八十五太常少卿李運年八十故相吏部尚書宋琪廬州節度副使武允成皆七十九吳僧贊寧年七十八郢州刺史魏丕年七十六左諌議大夫楊徽之年七十五水部郎中朱昻與昉皆七十一欲繼其事為宴集㑹蜀冦起而罷其中兩宰相乃著一僧唐世及元豐耆英所無也次年李公即世此事竟不成耋老康寧相與燕嬉於升平之世而雅懐弗遂造物豈亦吝此耶李文正兩罷相宰相拜罷恩典重輕詞臣受㫖者得以高下其手李文正公昉太平興國八年以工部尚書為集賢史館相端拱元年為布衣翟馬周所訟太宗召學士賈黄中草制罷為右僕射令詔書切責黄中言僕射百寮師長今自工書拜乃為殊遷非黜責之義若以均勞逸為辭斯為得體上然之其詞略云端揆崇資非賢不授昉素高聞望久展謨猷謙和秉君子之風純懿擅吉人之美輟從三事揔彼六卿用資鎮俗之清規式表尊賢之茂典其美如此淳化二年復歸舊㕔四年又罷優加左僕射學士張洎言近者霖霔百餘日昉職在爕和隂陽不能決意引退僕射之重右減於左位望不侔因而授之何以示勸上批洎奏尾止令罷守夲官洎遂草制峻詆腦詞云爕和隂陽輔相天地此宰相之任也茍或依違在位啓沃無聞雖居廊廟之崇莫著彌綸之効宜敷朝㫖用罷鼎司昉自處機衡曾無規畫擁化源而滋久孤物望以何深俾長中䑓尚為優渥可依前尚書右僕射罷知政事歴考前後制麻只言可某官其云罷知政事者洎創增之也國史昉𫝊云昉厚善洎及昉罷洎草制乃如此紹興二十九年沈該罷制學士周麟之於結句後添入可罷尚書左僕射同平章事盖用此云容齋四筆卷十二欽定四庫全書容齋四筆卷十三二十四則宋洪邁撰科舉之弊不可革法禁益煩姦偽滋熾唯科塲最然其尤者莫如銓試代筆有禁也禁之愈急則代之者獲賂謝愈多其不幸而敗者百無一二正使得之元未嘗致法吏部長貳簾試之制非不善也而文具兒戱抑又甚焉議論奉公之臣朝夕建明然此風如決流偃草未嘗少革或以謂失於任法而不任人之故殊不思所任之人渠肯一意向方見惡輙取於事無益而禍謗先集于厥身矣開寳中太子賔客邉光範掌選太廟齋郎李宗訥赴吏部銓光範見其年少意未能屬辭語之曰茍授筆成六韻雖不試書判可入等矣宗訥曰非唯學詩亦嘗留心詞賦即試詩賦二首數刻而就甚嘉賞之翌日擬授秘書省正字今之世寧復有是哉宰執子弟廷試太宗朝吕文穆公蒙正之弟蒙亨舉進士禮部高等薦名既廷試與李文正公昉之子宗諤並以父兄在中書罷之國史許仲宣𫝊云仲宣子待問雍熈二年舉進士與李宗諤吕䝉亨王扶並預廷試宗諤即宰相昉之子蒙亨參知政事蒙正之弟扶鹽鐡使明之子上曰斯並勢家與孤寒競進縱以藝升人亦謂朕有私也皆下第正此事也仲宣時為度支使仁宗朝韓忠憲公億為參知政事子維以進士奏名禮部不肯試大廷受䕃入官唐質肅公介叅政子義問鎻㕔試禮部用舉者召試秘閣介引嫌罷之舊制嚴於宰執子弟如此與夫秦益公柄國而子熺孫塤皆於省殿試輙冠多士者異矣國初救弊國朝削併僭偽救民水火之中然亦有因仍舊弊未暇更張者故須頼於賢士大夫昌言之江左初平太宗選張齊賢為江南西路轉運使諭以民間不便事令一一條奏先是諸州罪人多錮送闕下縁路非理而死者常十五六齊賢至蘄州見南劍州吏送罪人者索得州帖視之二人皆逢販私鹽者為荷鹽籠得鹽二斤又六人皆常見販鹽而不告者並黥決傳送而五人已死于路江州司理院自正月至二月經過寄禁罪人計三百二十四人建州民二人本田家客户嘗於主家塘内以錐刺得魚一斤半並杖脊黥面送闕下齊賢上言乞俟至京擇官慮問如顯有負屈者本州官吏量加懲罰自今只令發遣正身及䖍州送三囚嘗市得牛肉并家屬十二人悉詣闕而殺牛賊不獲齊賢憫之即遣其妻子還自是江南送罪人者減大半是皆相循習所致也齊賢改為其利民如此齊賢以太平興國二年方登科六年為使者八年還朝由宻學拜執政可謂迅用也房𤣥齡名字舊唐書目錄書房元齡而本傳云房喬字𤣥齡新唐書列傳房𤣥齡字喬而宰相世系表𤣥齡字喬松三者不同趙明誠金石録得其神道碑褚遂良書名字與新史傳同予記先公自燕還有房碑一􅁽于志寧撰乃𤣥齡字喬松本欽宗在東宫時所藏其後猶有一印曰伯志西齋今亦不存矣二朱詩詞朱載上舒州桐城人為黄州教授有詩云官閒無一事胡蝶飛上階東坡公見之稱賞再三遂為知己中書舍人新仲翌其次子也有家學十八嵗時戱作小詞所謂流水泠泠斷橋斜路梅枝亞者朱希真見而書諸扇今人遂以為希真所作又有摺疊扇詞云宫紗蜂趕梅寳扇鸞開翅數摺聚清風一捻生秋憶揺摇雲母輕裊裊瓊枝細莫解玉連環怕作飛花墜公親書藁固存亦因張安國書扇而載於于湖集中其詠五月菊詞云玊臺金盞對炎光全似去年香有意莊嚴端午不應忘却重陽菖蒲九節金英滿把同泛瑤觴舊日東籬陶令北忩正傲羲皇淵明於五六月高臥北忩之下清風颯至自謂羲皇上人用此事於五月菊詩家嘆其精切云金剛經四句偈今世所行金剛經用姚秦鳩摩羅什所譯其四句偈曰一切有為法如夣幻泡影如露亦如電應作如是觀又曰若以色見我以音聲求我是人行邪道不能見如來予博觀它本頗有不同元魏天竺三藏菩提流支譯云一切有為法如星翳燈幻露泡夣電雲應作如是觀而不能見如来之下更有四句云彼如來妙體即法身諸佛法體不可見彼識不能知陳天竺三藏真諦譯云如如不動恒有正説應觀有為法如暗翳燈幻露泡夣電雲若以色見我以音聲求我是人行邪道不應得見我由法應見佛調御法為身此法非識境法如深難見唐三藏𤣥奘譯云諸和合所為如星翳燈幻露泡夢電雲應作如是觀諸以色見我以音聲尋我彼生履邪斷不能當見我應觀佛法性即導師法身法性非所識故彼不能了唐沙門義淨譯前四句與魏菩提本同而後云若以色見我以音聲求我是人起邪觀不能當見我後四句與𤣥奘本同予案今人稱云如東坡以名堂者謂夢幻泡影露電也而此四譯乃知有九如大般若經第八㑹世尊頌第九㑹能斷金剛分二頌亦與𤣥奘所譯同四蓮華之名嗢鉢摩華青蓮華也鉢特摩華亦云波頭摩赤蓮華也拘毋陁華亦云俱物頭亦云俱牟陁紅蓮也奔茶利華亦云芬陁利白蓮也堵羅綿柳絮之類即兠羅綿也黒法白法安立黒法感黒異熟所謂地獄傍生鬼界安立白法感白異熟所謂人天安立黒白法感黒白異熟所謂一分傍生鬼界及一分人安立非黒非白法感非黒非白異熟所謂預留果或一來果或不還果多心經偈多心經偈曰掲帝掲帝波羅掲帝波羅僧掲諦菩提薩摩訶又有大明呪經鳩羅什所譯曰竭帝竭帝波羅竭帝波羅僧竭帝菩提僧莎呵天宫寳樹行行相值莖莖相望枝枝相准葉葉相向華華相順實實相當此無量壽經所言天宫寳樹非塵世所有也白分黒分月盈至滿謂之白分月虧至晦謂之黒分白前黒後合為一月又曰日隨月後行至十五日覆月都盡是名黒半日在月前行至十五日具足圓滿是名白半月䨇閏䨇十五夜為半月兩半月為一月三月為一時兩時為一行兩行為一季二年半為一䨇此由閏故以閏月兼本月此謂月䨇非閏䨇也以五年再閏為閏䨇踰繕那一由旬數量之稱謂踰繕那四十里也毗曇論四肘為一弓五百弓為一拘盧舍八拘盧舍為一由旬一弓長八尺五百弓長四百丈一拘盧舍有二里十六里為一由旬七極㣲塵七極㣲塵成一阿耨池上塵七阿耨塵為銅上塵七銅上塵為水上塵七水上塵為兎毫上塵七兎毫上塵為一羊毛上塵七羊毛上塵為一牛毛上塵七牛毛上塵成一嚮遊塵七嚮遊塵成一蟣七蟣成一虱七虱成一穔麥七穔麥為一指三十四指為一肘四肘為一弓宰相贈本生父母官封贈先世自晉宋以來有之迨唐始備然率不過一代其恩延及祖廟者絶鮮亦未嘗至極品郭汾陽二十四考中書令而其父贈止太保權徳輿位宰相其祖贈止郎中唐末五季宰輔貴臣始追榮三代國朝因之李文正公昉本工部郎中超之子出繼從叔紹昉再入相表其事求贈所生父祖官封詔贈祖温太子太保祖母權氏莒國太夫人父超太子太師母謝氏鄭國太夫人可謂異數後不聞繼之者執政贈三代不同文臣封贈三代自初除執政外凢轉㕔皆不再該唯知樞宻院及拜相乃復得之然舊法又不如是歐陽公作程文簡公琳父神道碑歴叙恩典曰琳參知政事贈為太子少師在政事遷左丞係轉一官又贈太子太師罷為資政殿學士又贈太師中書令為宣徽北院使又贈兼尚書令則是轉官與罷政亦褒贈而自宫師得太師中令更為超越它或不然唐孫處約事新唐書來濟傳云初濟與高智周郝處俊孫處約客宣城石仲覽家仲覽衍於財有噐識待四人甚厚私相與言志處俊曰願宰天下濟及智周亦然處約曰宰相或不可冀願為通事舍人足矣後濟領吏部處約始以瀛州書佐入調濟遽注曰如志遂以為通事舍人後皆至公輔高智周傳云智周始與郝處俊來濟孫處約共依江都石仲覽仲覽傾産結四人驩因請各語所期處俊曰丈夫惟無仕仕至宰相乃可智周濟如之處約曰得為舍人在殿中周旋吐納可也後濟居吏部處約以瀛州參軍入調濟曰如志擬通事舍人畢降階勞問平生案兩傳相去才一卷不應重複如此可謂冗長本出韓琬所撰御史臺記而所載自不實處約傳貞觀中為齊王祐記室祐多過失數上書切諌王誅太宗得其書擢中書舍人是嵗十七年癸卯來濟次年亦為中書舍人永徽三年拜相六年檢挍吏部尚書是嵗丁巳去癸卯首尾十五嵗若如兩傳所書大為不合韓琬之說誠謬史氏又失於不考仲覽鄉里一以為宣城一以為江都豈宣城人而家於廣陵也夏侯勝京房兩傳漢書儒林傳欲詳記經學師承故序列唯謹然夏侯勝京房又自有傳儒林云勝其先夏侯都尉以尚書傳族子始昌始昌傳勝勝又事同郡簡卿𫝊兄子建建又事歐陽高而本傳又云從始昌受尚書後事簡卿又從歐陽氏從子建師事勝及歐陽高儒林言房受易梁人焦延壽以明災異得幸為石顯所譖誅凡百餘字而本傳又云治易事梁人焦延夀其說長於災變房用之尤精為石顯告非謗政治誅此兩者近於重複也若其它張禹彭宣王駿倪寛龔勝鮑宣周堪孔光李尋韋賢𤣥成薛廣徳師丹王吉蔡誼董仲舒眭孟貢禹疏廣馬宫翟方進諸人但志姓名及所師耳漢人坐語言獲罪漢昭帝時有大石自立僵柳復起眭孟上書言有從匹夫為天子宜求索賢人禪以帝位而退自封百里霍光惡之論以祅言惑衆伏誅案孟之妄發其死宜矣宣帝信任宦官盖寛饒奏封事言五帝官天下三王家天下家以𫝊子官以傳賢執金吾議以指意欲求禪亦坐死考其所引亦不為無罪楊惲之報孫㑹宗書初無甚怨怒之語其詩曰田彼南山蕪穢不治種一頃豆落而為箕張晏釋以為言朝廷荒亂百官謟諛可謂穿鑿而廷尉當以大逆無道刑及妻子予熟味其詞獨有所謂君父至尊親送其終也有時而既盖宣帝惡其君䘮送終之喻耳莊助論汲黯輔少主守成武帝不怒實係於一時禍福云賈誼劉向談說痛切無忌諱文成二帝未嘗問焉隨筆紀之矣樞宻書史景徳四年命宰臣王旦監修兩朝正史知樞宻院王欽若陳堯叟參知政事趙安仁並修國史後來執政入樞府皆不得提舉修書非故事也知州轉運使為通判今世士大夫既貴不可復賤淳化中北戎入冦以殿前都虞侯曹璨知定州時趙安易官宗正少卿以知州遂就徙通判同時有羅延吉者既知彭祁絳三州而除通判廣州滕中正知興元府而通判河南袁郭知楚鄆二州㑹秦王廷美遷置房州詔崇儀副使閻彦進知州而以郭通判州事范正辭既知戎淄二州而通判棣深又陳若拙歴知單州殿中侍御史西川轉運使召歸㑹李至守洛都表為通判久之柴禹錫鎮涇州復表為通判連下遷而皆非貶降近不復有矣范正辭治饒州范正辭太平興國中以饒州多滯訟選知州事至則宿繫皆决遣之胥史坐淹獄停職者六十三人㑹詔令料州兵送京有王興者懐土憚行以刃故傷其足正辭斬之興妻上訴太宗召見正辭庭辯其事正辭曰東南諸郡饒實繁盛人心易動興敢扇揺茍失控馭則臣無待罪之地矣上壯其敢斷特遷官充江南轉運副使饒州民甘紹者為羣盗所掠州捕繫十四人獄具將死正辭案部至引問之囚皆泣下察其非實命徙他所訊鞫既而民有告盜所在者正辭濳召監軍掩捕之盜覺遁去正辭即單騎出郭二十里追及之賊控弦持矟來逼正辭大呼以鞭擊之中賊䨇目仆之餘賊渡江散走被傷者尚有餘息傍得所弃贓按其姦狀伏法十四人皆得釋此吾鄉里事而郡人多不聞之榮王藏書濮安懿王之子宗綽蓄書七萬卷始與英宗偕學于邸每得異書必轉以相付宗綽家本有岳陽記者皆所賜也此國史本傳所載宣和中其子淮安郡王仲糜進目録三卷忠宣公在燕得其中袟云除監本外冩本印本書籍計二萬二千八百三十六卷觀一袟之目如是所謂七千卷者為不誣矣三館祕府所未有也盛哉秦杜八六子秦少游八六子詞云片片飛花弄晩濛濛殘雨籠晴正銷凝黄鸝又啼數聲語句清峭為名流推激予家舊有建本蘭畹曲集載杜牧之一詞但記其末句云正銷魂梧桐又移翠隂秦公蓋效之似差不及也容齋四筆卷十三欽定四庫全書容齋四筆卷十四十四則宋洪邁撰祖宗親小事太宗朝吕端自諌議大夫開封判官左遷衞尉少卿時羣官有負宿譴者率寘散秩㑹置考課院每引對多泣涕以不免飢寒為請至端即前奏曰臣罪大而幸深茍得潁州副使臣之願也上曰朕自知卿無何復舊官踰月拜參知政事上留意金穀之務一日盡召三司吏李溥等對於崇政殿詢以計事利害溥等願給筆札於是二十七人共上七十一事詔以四十四事付有司奉行十九事下鹽鐡使陳恕等議其可否遣知雜御史監議賜溥等白金緡錢悉補侍禁殿直領其職謂宰相曰溥等條奏事亦頗有所長朕嘗語恕等若文章稽古此輩固不可望卿錢穀利病彼自㓜至長寢處其中必周知根本卿但假以顔色引令剖陳必有所益恕不肯降意詢問旋以職事曠廢上召而責之始頓首謝王賔以供奉官充亳州監軍妻極妬悍時監軍不許挈家至任所妻擅至亳州賔具以白上上召見其妻詰責俾衞士交捽之杖一百配為忠靖卒妻一夕死陳州民張矩殺里中王裕家兩人知州田錫未嘗慮問又詣闕訴寃遣二朝士鞫之皆云非矩所殺裕家寃甚其子福應募為軍因得見曰臣非欲𨽻軍蓋家寃求訴耳太宗怒付御史府治之寘矩于法二朝士皆坐貶錫洎通判郭渭謫為海郢州團練副使饒州卒妻訴理夫死至召知州范正辭庭辯且夫引見散秩庶僚而容其各各有請三司胥吏而引對正殿命以官爵聴其所陳一州都監而得自上奏至召其妻責辱之一卒應募而得入見遂伸家寃為貶責吏萬幾如是安得不理今之言典故者蓋未能盡云王居正封駮紹興五六年間王居正為給事中時王繼先方以醫進中㫖以其壻添監浙江税務録黄過門下居正封還高宗批三省將上及二相進呈聖訓云卿等亦嘗用醫者否對曰皆用之曰所酬如何曰或與酒或與錢或與縑帛隨大小效驗以答其勞上曰然則朕宫中用醫反不得酬謝邪文字闕欲再付出可以喻居正使之書讀丞相退即語居正曰聖意如此是事亦甚小給事不必固執居正唯唯遂請對上語如前而玊色頗厲居正對曰臣庶之家待此輩與朝廷有異量功隨力各致陳謝之禮若朝廷則不然繼先之徒以技術庸流享官榮受禄俸果為何事哉一或失職重則有刑輕則斥逐使其應奉有効僅能塞責而已想金帛之賜固自不少至於無故増創員闕誠為未善臣不願陛下輙起此門上悟曰卿言是也即日下其奏前降㫖揮更不施行居正之直諒有守高宗之聴言納諌史録中恐不備載故敬書之邁頃聞之於張九成王元之論官冗省官之說昔人論之多矣唯王元之兩疏最為切當其一云臣舊知蘇州長洲縣自錢氏納土以來朝廷命官七年無縣尉使主簿兼領之未嘗闕事三年増置尉未嘗立一功以臣詳之天下大率如是誠能省官三千員減俸數千萬以供邉備寛民賦亦大利也其二云開寳中設官至少臣占籍濟上未及第時止有刺史一人李謙􅄎是也司户一人孫賁是也近及一年朝廷别不除吏自後有團練推官一人畢士安是也太平興國中臣及第歸鄉有刺史通判副使判官推官監軍監酒𣙜稅筭又増四員曹官之外更益司理問其租稅減於曩日也問其人民逃於昔時也一州既爾天下可知冗兵耗于上冗吏耗於下此所以盡取山澤之利而不能足也觀此二説以今言之何止於可為長太息哉梁狀元八十二嵗陳正敏遯齋閒覽梁灝八十二嵗雍熈二年狀元及第其謝啓云白首窮經少伏生之八嵗青雲得路多太公之二年後終祕書監卒年九十餘此語既著士大夫亦以為口實予以國史考之梁公字太素雍熈二年廷試甲科景徳元年以翰林學士知開封府暴疾卒年四十二子固亦進士甲科至直史舘卒年三十三史臣謂梁方當委遇中途夭謝又云梁之秀穎中道而摧明白如此遯齋之妄不待攻也太宗恤民曽致堯為兩浙轉運使嘗上言去嵗所部秋租惟湖州一郡督納及期而蘇常潤三州悉有逋負請各按賞罰太宗以江淮頻年水災蘇常特甚致堯所言刻薄不可行因詔戒之使倍加安撫勿得騷擾是事必已編入三朝寳訓中此國史本傳所載也潘游洪沈紹興十三年勑令所進書刪定官五員皆自選人改秩潘良能季成游操存誠沈介徳和伯兄景伯皆拜祕書省正字張表臣正民以無出身除司農丞四正字同日赴館供職少監秦伯陽於㑹食之次謂坐客言一旦增四同舍而姓皆從水傍熺有一句願諸君為對之以成三館異日佳話即云潘游洪沈泛瀛洲坐客合詞賞歎竟無有能對者予因記筆談所載元厚之絳少時曾夢人告之曰異日當為翰林學士須兄弟數人同在禁林厚之自思素無兄弟疑為不然及熈寧中除學士同時相先後入院者韓維持國陳繹和叔鄧綰文約楊繪元素名皆從系始悟兄弟之說欲用絳繹繪維綰綸綍為對然未暇考之史録嵗月果同否也舞鷗游蜻戰國時諸子百家之書所載絶有同者列子黄帝篇云海上之人有好漚音鷗鳥者每旦之海上從漚鳥游漚鳥之至者百數而不止其父曰吾聞漚鳥皆從汝游汝取來吾玩之明日之海上漚鳥舞而不下也吕覽精喻篇云海上人有好蜻蜻蜓也者每朝居海上從蜻游蜻之至者百數而不止前後左右盡蜻也終日玩之而不去其父告之曰聞蜻皆從汝居取而來吾將玩之明日之海上蜻無至者矣此二說如出一手也郎中用資序國朝官制既行除用職事官不問資序高下但隨階品而加行守試以賦祿郎中員外郎亦自為兩等頗因履歴而授之後來相承必欲已關陞知州資序者為郎中於是拜員外郎者具改官後實歴嵗月申吏部不以若干任但通理細滿入考則陞知州乃正作郎中别命詞給告頃常有㫖初除郎官者雖資歴已高且為員外候吏部再申然後陞作郎中近嵗掌故失之故李大性自浙東提刑除吏部時佐自大理正除刑部徐䦎自大府丞除都官岳震自將作少監除度支其告内即云郎中與元指揮戾矣臺諌分職臺諌不相見已書於續筆中其分職不同各自有故實元豐中趙彦若為諌議大夫論大臣不以道徳承聖化而專任小數與郡有司較計短長失具瞻體因言門下侍郎章子厚左丞王安禮不宜處位神宗以彦若侵御史論事左轉祕書監蓋許其論議而責其彈擊為非也元祐初孫覺為諌議大夫是時諌官御史論事有分限毋得越職覺請申唐六典及天禧詔書凡發令造事之未便皆得奏陳然國史所載御史掌糾察官邪肅正綱紀諌官掌規諌諷諭凡朝政闕失大臣至百官任非其人三省至百司事有失當皆得諫正則蓋許之矣唐人朝制大率重諌官而薄御史中丞温造道遇左補闕李虞恚不避捕從者笞擊左拾遺舒元襃等建言故事供奉官惟宰相外無屈避造弃蔑典禮辱天子侍臣遺補雖卑侍臣也中丞雖高法吏也侍臣見陵法吏自恣請得論罪乃詔臺官供奉官共道路聽先後行相值則揖然則居此二雄職者在唐日了不相謀云貞元朝士劉禹錫聴舊宫人穆氏唱歌一詩云曾陪織女度天河記得雲間第一歌休唱貞元供奉曲當時朝士已無多劉在貞元任郎官御史後二紀方再入朝故有是語汪藻始采用之其宣州謝上表云新建武之官儀不圖重見數貞元之朝士今已無多汪在宣和間為館職符寳郎是時紹興十三四年中其用事可謂精切邁常四用之謝侍講修史表云下建武之詔書正爾恢張於治具數貞元之朝士獨憐留落之孤蹤以徳夀慶典曾任兩省官者遷秩蒙轉通奉大夫謝表云供奉當時敢齒貞元之朝士頌歌大業願賡至徳之中興充永思陵橋道頓遞使轉宣奉大夫謝表云武徳文階愧三品維新之澤貞元朝士動一時既徃之悲主上即位明堂禮成謝加恩云考皇祐明堂之故操以舉行念貞元朝士之存今其餘幾亦各隨事引用近者單䕫以知紹興府進文華閣直學士謝表云數甘泉法從之舊真貞元朝士之餘䕫當淳熈中雖為侍郎然一朝名臣尚多又距今才十餘嵗似為未穩貼也表章用兩臣字對表章自叙以兩臣字對說由東坡至汪浮溪多用之然湏要審度君臣之間情義厚薄及姓名眷顧於君前如何乃為合宜坡湖州謝表云知臣愚不適時難以追陪新進察臣老不生事或能牧飬小民登州表云於其黨而觀過謂臣或出於愛君就所短以求長知臣稍習於治郡侍讀謝表云謂臣雖無大過人之才知臣粗有不欺君之實欲使朝夕與於討論潁州表云意其忠義許國故暫召還察其老病畏人復許補外汪謝徽州云謂臣不改嵗寒故起之散地察臣素推月旦故付以夲州為陸藻謝給事中云知臣椎鈍無他故長奉賢王之學憫臣踐揚滋久故亟陞法從之班為汪樞密謝子自虜中歸不令入城降詔奬諭表云知臣齒髪已凋常恐鄧攸之無後憐臣肺肝可見有如去病之辭家凡此所言皆可自表於君前者劉夢得代竇羣容州表有察臣前任事實恕臣本性朴愚之句坡公蓋本諸此近年後生假倩作文不識事體至有碌碌常流乍得一壘亦輙云知臣察臣之類真可笑也劉夢得謝上表郡守謝上表首必云伏奉告命授臣某州已於某月某日到任上訖然後入詞獨劉夢得數表不然和州者曰伏奉去年六月二十五日制書授臣使持節和州諸軍事守和州刺史臣自理巴賨不聞善最恩私忽降慶抃失容臣某中謝伏惟皇帝陛下丕承寳祚光闡鴻猷有漢武天人之姿禀周成叡哲之徳發言合古舉意通神委用得人動植咸悅理平之速從古無倫㣲臣何幸獲覩昌運臣業在辭學早嵗䇿名徳宗尚文擢為御史出入中外歴事五朝累承恩光三換符竹分憂之寄禄秩非輕而素蓄所長効用無口臣聞一物失所前王軫懐今逢聖朝豈患無位臣即以今月二十六日到所任上訖伏以地在江淮俗參吳楚災旱之後綏撫誠難謹當奉宣皇風慰彼黎庶久於其道冀使知方伏乞聖慈俯賜昭鑒首尾叙述皆與他人表不同其䕫州汝州同州蘇州諸篇一體邁長子􅯗常稱誦之及為太平州遂擬其體代作一表其詞云臣邁言伏奉今年九月十七日制書授臣知太平州者一麾出守方切兢危三命滋共弗容控避仰皇天之大造扣丹地以何言中謝恭惟皇帝陛下叡知有臨神武不殺慕舜之孝見堯於墻徳冠古今而獨尊仁並清寧而徧覆明見萬里將大混於車書子來庶民更精求於岳牧臣家本儒素時無令名濫竽宏博之科稅駕清華之地瀛山抱槧郎省握蘭在紹興之季年汚記注於右史龍飛應運鳯厯紀祥不遺細㣲兼取愚頓遂以詞賦之職獲侍清閒之歡雖宿命應仙許暫來於天上而塵心未斷旋即墮於人間一去十八年之中三叨二千石之寄末繇金華郡還紬石室書從珍臺閒館之游勸廣厦細旃之講真拜學士號名私人受九重知己之殊極三入承明之幸使與大議不專斯文而臣弱羽不足以當雄風蹇歩不足以勝重任上恩惜其終棄左符寵其餘生李廣數竒徒羡侯於挍尉汲黯妄發敢歎薄於淮陽臣即以今月二十八日到任上訖伏以郡在江東昔稱道院地隣淮右今謂壯藩謹當宣布恩威奉行寛大求民之瘼問俗所宜緩帶輕裘雖弗賢長城於李勣清心省事敢不避正堂於蓋公庶幾固結本根少復報酬知遇全規模其歩驟然視昔所作猶覺語煩陳簡齋葆真詩自崇寧以來時相不許士大夫讀史作詩何清源至於修入令式本意但欲崇尚經學痛沮詩賦耳於是庠序之間以詩為諱政和後稍復為之而陳去非遂以墨梅絶句擢寘館閣嘗以夏日偕五同舍集葆真宫池上避暑取緑隂生晝靜分韻賦詩陳得靜字其詞曰清池不受暑幽討起予病長安車轍邉有此萬荷柄是身唯可懶共寄無盡興魚游水底涼鳥語林間靜談餘日亭午樹影一時正清風不負客意重百金贈聊將兩鬢蓬起照千丈鏡㣲波喜揺人小立待其定梁王今何許柳色幾衰盛人生行樂耳詩律已具贈邂逅一尊酒它年五君詠重期踏月來夜半嘯煙艇詩成出示坐上皆詫為擅塲朱新仲時親見之云京師無人不傳寫也仙傳圖志荒唐昔人所作神仙傳之類大底荒唐謬悠殊不能略考引史䇿如衞叔卿事云漢儀鳯二年孝武皇帝閒居殿上而見之月支使者事云延和三年武帝幸安定而月支國遣使獻香案儀鳯乃唐高宗紀年名延和乃魏太武唐睿宗紀年名而誕妄若是自餘山經地志徃往皆然近世士大夫采一方傳記及故老談說競為圖志用心甚專用力甚博亦不能免牴牾高䕫守襄陽命僚屬作一書其叙歴代法革云在周為楚鄧鄾諸國据左傳鄾乃鄧邑後巴人伐楚圍鄾蓋楚滅鄧故亦來屬元非列國也又引左傳蔓成然事以蔓為國据成然乃楚大夫靈王奪其邑無所謂蔓國也容齋四筆卷十四欽定四庫全書容齋四筆卷十五十五則宋洪邁撰徽廟朝宰輔蔡京擅國命首尾二十餘年一時士大夫未有不因之以至大用者其後頗采公議與為異同若宰相則趙清獻挺之張無盡商英鄭華原居中劉文憲正夫所行所言世多知之其居執政位者如張康國賔老温益禹弼劉逵公路侯蒙元功者皆有可録康國定元祐黨籍看詳講議司編彚奏牘皆深預密議及後知樞密院始浸為崖異徽宗察京專愎隂令狙伺其姦蓋嘗許以相是時西北邉帥多取部内好官自辟置以力不以才康國曰並塞當擇人以紓憂顧奈何欲私所善乎乃隨闕選用定為格京使御史中丞吳執中擊之康國先知之具以奏益鎮潭州凡元祐逐臣在湖南者悉遭侵困因愛莫助之圖遂為京用至中書侍郎乃時有立異京一日除監司郡守十人將進畫益判其後曰收京使益所厚中書舍人鄭居中問之益曰君在西掖每見所論事舍人得舉職侍郎顧不許邪今丞相所擬十人共皆姻黨耳欲不逆其意得乎逵以附京至中書侍郎京去相逵首勸上碎元祐黨碑寛上書邪籍之禁凡京所行悖理殃民事稍稍釐正之蒙在政地上從容問蔡京何如人對曰使京能正其心術雖古賢相何以加上頷首且使密伺京所為京聞而銜之凡此數端皆見於國史本傳教官掌牋奏所在州郡相承以表奏書啓委教授因而餉以錢酒予官福州但為撰公家謝表及祈謝晴雨文至私禮牋啓小簡皆不作然遇聖節樂語嘗為之因又作他用者三兩篇每以自愧鄒忠公為潁昌教授府守范忠宣公屬撰興龍節致語辭不為范公曰翰林學士亦作此忠公曰翰林學士則可祭酒司業則不可范公敬謝之前輩風節可畏可仰如此經句全文對予初登詞科再至臨安寓於三橋西沈亮功主簿之館沈以予買飯于外謂為不便自取家饌日相供同年湯丞相來訪扣旅食大槩具為言之湯公笑曰主人亦賢矣因戯出一語曰哀王孫而進食豈望報乎良久予應之曰為長者而折枝非不能也公大激賞而去汪聖錫為秘書少監毎食罷㑹茶一同舍輙就枕不至及起亦戯之曰宰予晝寢於予與何誅衆未有言汪曰有一對雖於今事不切然却是一个出處云子貢方人夫我則不暇同舍皆合詞稱美北郊議論三代之禮冬至祀天於南郊夏至祭地於北郊王莽於元始中改為合祭自是以來不可復變元豐中下詔欲復北郊至六年唯以冬至祀天而地祗不及事元祐七年又使博議而許將顧臨范純禮王欽臣孔武仲杜純各為一說逮蘇軾之論出於是羣議盡廢當時諸人之說有六一曰今之寒暑與古無異宣王六月出師則夏至之日何為不可祭二曰夏至不能行禮則遣官攝行亦有故事三曰省去繁文末節則一嵗可以再郊四曰三年一祀天又一年一祭地五曰當郊之嵗以十月神州之祭易夏至之方澤可以免方暑舉事之患六曰當郊之嵗以夏至祀地祗於方澤上不親郊而通爟火於禁中望祀軾皆辟之以為無一可行之理其文載於奏議凡三千言元符中又詔議合祭論者不一唯太常少卿宇文昌齡之議最為簡要曰天地之勢以高卑則異位以禮制則異宜以樂則異數至於衣服之章噐用之具日至之時皆有辨而不亂夫祀者自有以感於無自實以通於虛必以類應類以氣合氣然後可以得而親可以冀其格今祭地於圓丘以氣則非所合以類則非所應而求高厚之來享不亦難乎後竟用其議此兩說之至當如此討論濫賞詞東坡公行香子小詞云清夜無塵月色如銀酒斟時須滿十分浮名浮利休苦勞神歎隙中駒石中火夢中身雖抱文章開口誰親且陶陶樂盡天真不如歸去作箇閒人對一張琴一壺酒一溪雲紹興初范覺民為相以自崇寧以來創立法度例有汎賞如學校茶鹽錢幣保伍農田居飬安濟寺觀開封大理獄空四方邉事御前内外諸司編勑㑹要學制禮制道史等書局掖庭編澤行幸曲恩諸色營繕河埽功役採石木栰花石等綱祥瑞禮樂兩城所公田伎術伶優三山永橋明堂西内八寳元圭種種濫賞不可勝述其曰應奉有勞獻頌可采職事修舉特授特轉者又皆無名直與及白身補官選人改官職名礙格非隨龍而依隨龍人非戰功而依戰功人等每事各為一項建議討論又行下吏部若該載未盡名色並合取朝廷指揮臨時參酌追奪事件遂為畫一規式有至奪十五官者雖公論當然而失職者胥動造謗浮議蜂起無名子因改坡語云清要無因舉選艱辛繫書錢須要十分浮名浮利虛苦勞神歎旅中愁心中悶部中身雖抱文章苦苦推尋更休說誰假誰真不如歸去作箇齊民免一回來一回討一回論至大字書寫貼於内前墻上邏者得之以聞是時偽齊劉豫方盜㨿河南朝論慮或揺人心亟罷討論之舉范公用是為臺諌所攻今章且叟奏藁中正載彈疏竟去相位云尺八唐盧肇為歙州刺史㑹客于江亭請目前取一事為酒令尾有樂噐之名肇令曰遥望漁舟不濶尺八有姚巖傑者飲酒一噐凭欄嘔噦須叟即席還令曰凭欄一吐已覺空喉此語載於摭言又逸史云開元末一狂僧往終南回向寺一老僧令於空房内取尺八來乃玉也謂曰汝主在寺以愛吹尺八謫在人間此常吹者也汝當回可將此付汝主僧進於𤣥宗特取吹之宛是先所御者孫夷中仙隱傳房介然專吹竹笛名曰尺八將死預將管打破告諸人曰可以同將就壙亦謂此云尺八之為樂名今不復有吕才傳云貞觀時祖孝孫増損樂律太宗詔侍臣舉善音者王珪魏徴盛稱才製尺八凡十二枚長短不同與律諧契太宗即召才參論樂事尺八之所出見於此無由曉其形製也爾雅釋樂亦不載三給事相攻元祐中王欽臣仲至自權工部侍郎除給事中為給事姚勔所駮而止大觀中陳亨伯自左司員外郎擢給事中為權官蔡薿所沮而出政和末伯祖仲達在東省以疾暫謁告兩日張天覺復官之命過門下第四㕔給事方㑹論為畏繳駮之故所以託病遂罷知滁州朱藏一詩政和末老蔡以太師魯國公緫治三省年已過七十與少宰王黼爭權相傾朱藏一在館閣和同舍秋夜省宿詩云老火未甘退稚金方力征炎涼分勝負頃刻變隂晴兩人門下士互興譖言以為嘲謗其後黼獨相館職多遷擢朱居官如故而和人菊花詩云紛紛桃李春過眼成枯萎晩榮方耐久造物豈吾欺或又譖於黼以為怨憤是時士論指三館為閙藍蔡京輕用官職蔡京三入相時除用士大夫視官職如糞土蓋欲以天爵市私恩政和六年十月不因赦令侍從以上先縁左降同日遷職者二十人通奉大夫張商英為觀文殿學士中大夫王襄為延康殿學士顯模閣待制李圖南為述古殿學士寳文閣待制蔡薿顯謨閣待制葉夢得並為龍圖閣直學士寳文閣待制張近通奉大夫錢即右文殿修撰王漢之並為顯謨閣直學士中大夫葉祖洽為徽猷閣直學士朝散大夫曾孝藴為天章閣待制朝散郎俞㮚朝議大夫曾孝序中奉大夫范致明右文殿修撰蔡肇大中大夫孫鼛朝議大夫王覺右文殿修撰陳暘並為顯謨閣待制朝請郎蔡懋中奉大夫龐㳟孫朝請郎洪彦昇並為徽猷閣待制至十一月冬祀畢大赦天下仍復推恩節度使改東宫環衞官太祖有天下將收藩鎮威柄故漸行改革至於位至侍中中書令使相者其高僅得東宫官次但居環衞鳯翔王晏為太子太師安逺武行徳為太子太傅䕶國郭從義為左金吾上將軍鳯翔王彦超為右金吾上將軍定國白重贊為左千牛上將軍保太楊廷璋為右千牛上將軍靜難劉重進為羽林統軍若符彦卿者以太師中書令天雄節度使直罷歸洛八年不問亦不别除官其廟謨雄斷如是靖康初以戚里冒政宣恩典多建節鉞乃稽用此制錢景臻以少傅安武節度劉宗元以開府儀同三司鎮安節度並為左金吾上將軍范訥以平涼劉敷以保信劉敏以保成張楙以嚮徳王舜臣以岳陽朱孝孫以應道錢忱以瀘川節度並為右金吾上將軍自後不復舉行矣宰相任怨宰相欲收士譽使恩歸已故只以除用為意而不任職及顯有過舉者亦不肯任怨稍行黜徙文惠公在相位嘗奏言今之監司郡守其無大過者臺諌固不論擊但其間實有疲愞庸老之人依阿留之轉為民害臣欲皆與祠禄理作自陳監司或就移小郡庶幾人有家食之資國無曠官之失孝宗欣然聽許於是湖南轉運判官任詔改知復州廣東提舉鹽事劉景改知南雄州時太常丞闕監左藏庫許子紹欲得之公以大超越諭使小緩子紹宛轉愈力乃白其事出通判靜江府議者私謂若如此則是廟堂而兼臺諌之職殊不思進賢退不肖真宰相之事耳欲擬宫觀三四人未暇而去位子紹之出遂織入言章中近者京丞相以國子録吳仁傑居職未久便欲求遷奏罷歸吏部注簽判亦此意也四李杜漢太尉李固杜喬皆以為相守正為梁冀所殺故掾楊生上書乞李杜二公骸骨使得歸葬梁冀之誅權埶專歸宦官傾動中外白馬令李雲露布上書有帝欲不諦之語桓帝得奏震怒逮雲下北寺獄𢎞農五官掾杜衆傷雲以忠諌獲罪上書願與雲同日死帝愈怒下廷尉皆死獄中其後襄楷上言亦稱為李杜靈帝再治鉤黨范滂受誅母就與之訣曰汝今與李杜齊名死亦何恨謂李膺杜密也李太白杜子美同時著名故韓退之詩云李杜文章在光熖萬丈長凡四李杜云渾脫隊唐中宗時清源尉吕元泰上書言時政曰比見坊邑相率為渾脫隊駿馬胡服名曰蘇幕遮旗鼓相當騰逐喧譟以禮義之朝法胡虜之俗非先王之禮樂而示則於四方書曰謀時寒若何必羸形體讙衢路鼓舞跳躍而索寒焉書聞不報此蓋并論潑寒胡之戱唐史附於宋務光傳吕元泰竟亦不顯近世風俗相尚不問公私宴集皆為耍曲耍舞如勃海樂之類殆猶此也嵗陽嵗名嵗陽嵗名之說始於爾雅太嵗在甲曰閼逢在乙曰旃蒙在丙曰柔兆在丁曰彊圉在戊曰著雍在己曰屠維在庚曰上章在辛曰重光在壬曰𤣥􅘬在癸曰昭陽謂之嵗陽在寅曰攝提格在卯曰單閼在辰曰執徐在巳曰大荒落在午曰敦牂在未曰恊洽在申曰涒灘在酉曰作噩在戌曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若謂之嵗名自後唯太史公歴書用之而或有不同如閼逢為焉逢旃蒙為端蒙柔兆為游兆彊圉為彊梧著雍為徒雍屠維為祝犂上章為商横重光為昭陽𤣥􅘬為横艾昭陽為尚章大荒落為大芒落恊洽為汁洽涒灘為汭漢作噩為作鄂閹茂為淹茂大淵獻困敦更互赤奮若乃為赤奪若此蓋年祀久逺傳寫或訛不必深辨但漢武帝太初元年太嵗丁丑而以為甲寅其失多矣爾雅又有月陽月名月在甲曰畢在乙曰橘在丙曰修在丁曰圉在戊曰厲在己曰則在庚曰窒在辛曰塞在壬曰終在癸曰極正月為陬二月為如三月為寎四月為余五月為臯六月為旦七月為相八月為壯九月為𤣥十月為陽十一月為辜十二月為涂考之典籍唯厯書謂太初十月為畢聚離騷云攝提正干孟陬左氏傳十月曰良月國語至于𤣥月它未嘗稱引郭景純注釋云自嵗陽至月名皆所未詳通者故闕而不論蓋不可強為之說非若律書所言二十八舍十母十二子猶得穿鑿傳致也資治通鑑專取嵗陽嵗名以冠年不可曉解殊不若甲子至癸亥為明白爾韓退之詩嵗在淵獻牽牛中王介甫字說言彊圉自餘亦無說左傳所書嵗在星紀而滛於𤣥枵嵗在降婁降婁中而旦嵗在陬訾之口嵗五及鶉火嵗在顓帝之虛嵗在豕韋嵗在大梁皆用嵗星次舍言之司馬倬跋温公濳虛其末云乾道二年嵗在柔兆閹茂𤣥􅘬執徐月極大淵獻日謂丙戌年壬辰月癸亥日以嵗名施於月日尤為不然漢章不自為文殆是僚寀强解事者所作也官稱别名唐人好以它名標牓官稱今漫疏於此以示子姪之未能盡知者太尉為掌武司徒為五教司空為空土侍中為太貂散騎常侍為小貂御史大夫為亞台為亞相為司憲中丞為獨坐為中憲侍御史為端公南牀横榻雜端又曰脆棃殿中為副端又曰開口椒監察為合口椒諌議為大坡大諫補闕今司諫為中諫又曰補衮拾遺今正言為小諫又曰遺公給事郎為夕郎夕拜知制誥為三字起居郎為左螭舍人為右螭又並為修注吏部尚書為大天禮部為大儀兵部為大戎刑部為大秋工部為大起吏部郎為小選為省眼考功度支為振行禮部為小儀為南省舍人今曰南宫刑部為小秋祠部為􅖅柄㕔比部為比盤又曰昆脚皆頭屯田為田曹水部為水曹諸部郎通曰哀烏依烏太常卿為樂卿少卿為少常奉常光禄為飽卿鴻臚為客卿睡卿司農為走卿大理為棘卿評事為廷平將作監為大匠少監為少匠祕書監為大蓬少監為少蓬左右司為都公太子庶子為宫相宰相呼為堂老兩省相呼為閣老尚書丞郎為曹長御史拾遺為院長下至縣令曰明府丞曰贊府贊公尉曰少府少公少仙此已見前筆容齋四筆卷十五欽定四庫全書容齋四筆卷十六十二則宋洪邁撰漢重蘇子卿漢世待士大夫少恩而獨於蘇子卿加優寵蓋以其奉使持節褒勸忠義也上官安謀反武子元與之有謀坐死武素與上官桀桑𢎞羊有舊數為燕王所訟子又在謀中廷尉奏請逮捕武霍光寢其奏宣帝立録羣臣定䇿功賜爵關内侯者八人劉徳蘇武食邑張宴曰舊關内侯無邑以武守節外國徳宗室俊彦故特令食邑帝閔武年老子坐事死問左右武在匈奴久豈有子乎武曰前發匈奴時胡婦實産一子通國有聲問來願因使者贖之上許焉通國至上以為郎又以武弟子為右曹以武著節老臣令朝朔望稱祭酒甚優寵之皇后父帝舅丞相御史將軍皆敬重武後圖畫中興輔佐有功徳知名者於麒麟閣凡十一人而武得預武終於典屬國蓋以武老不任公卿之故先公縶留絶漠十五年能致顯仁皇太后音書蒙高宗皇帝有蘇武不能過之語而厄於權臣歸國僅陞一職立朝不滿三旬訖於竄謪南荒惡地長子停官追誦漢史可謂痛哭者已又案武夲傳云奉使初還拜為典屬國秩中二千石昭帝時免武官後以故二千石與計謀立宣帝賜爵張安世薦之即時召待詔數進見復為典屬國然則豫定䇿時但以故二千石耳而霍光傳連名奏昌邑王時直稱典屬國宣紀封侯亦然恐誤也昔賢為卒伍三代而上文武不分春秋列國軍將皆命卿處則執政出則將兵載於詩書左傳可考也然此特謂將帥耳乃若卒伍之賤雖賢士亦為之不以為異魯哀公時吳伐魯次于泗上㣲虎欲宵攻王舍私屬徒七百人三踊於幕庭卒三百人有若與焉杜預云卒終也謂於七百人中終得三百人任行也或謂季孫曰不足以害吳而多殺國士不如己也乃止之此蓋後世斫營劫寨之類而有若亦為之齊伐魯冉求帥左師樊遲為右季孫曰須也弱有子曰就用命焉謂雖年少能用命也冉有用矛於齊師故能入其軍杜預云言能以義勇也皆孔門高弟而親卒伍之事後世豈復有之兵家貴於備豫晉盜盧循㨿廣州以其黨徐道覆為始興相循宼建康以為前鋒初道覆遣人伐船材於南康山至始興賤賣之居人爭市之船材大積而人不疑至是悉取以裝艦旬日而辨蕭衍鎮雍州以齊室必亂宻修武備多伐材竹沉之檀溪積茅如岡阜皆不之用中兵叅軍吕僧珍覺其意亦私具櫓數百張衍既起兵出竹木裝艦葺之以茅事皆立辨諸將爭櫓僧珍出先所具者每船付二張爭者乃息魏太武南伐盱眙太守沈璞以郡當衝要乃繕城浚隍積財穀儲矢石為城守之備魏攻之三旬不㧞燒攻具退走古人如此者甚多道覆雖失所從為畔渙之歸然其事固可稱也渠陽蠻俗靖州之地自熈寧九年收復唐溪洞城州元豐四年仍建為誠州元祐二年廢為渠陽軍又廢為寨五年復之崇寧二年改為靖州始時渠陽縣為治所後改屬沅州而治永平其風俗夐與中州異蠻酋自稱曰官謂其所部之長曰都幙邦人稱之曰土官酋官入郭則加冠巾餘皆椎髻能者則以白練布纒之曾殺人者謂之能婦人徒跣不識鞋履以銀錫或竹為釵其長尺有咫通以班紬布為之裳紀嵗不以建寅為首随所處無常月要約以木鐡為契病不謁醫但殺牛祭鬼率以刀斷其咽視死所向以卜多至十百頭凡昏姻兄死弟繼姑舅之昏他人取之必賄男家否則爭甚則讎殺男丁受田於酋長不輸租而服其役有罪則聽其所裁謂之草斷凡貸易之逋甲不能償則掠乙以取直謂之準􅠎長少相犯則少者出物謂之出靣言語相誣則虛者出物謂之裹口田丁之居峭巖重阜大率無十家之聚遇讎殺則立柵布棘以受之各有門欵門欵者猶言伍籍也借牛綵於鄰洞者謂之拽門欵方爭時以首博首獲級一二則潰去明日復來必相當乃止欲解仇則備財物以和謂之陪頭煖心戰之日觀者立其傍和勸之官雖居其中不敢犯也敗則走謂之上坡志在於掠而不在於殺則震以金鼓而挺其一隅縱之逸謂之􅂒敗者屈而歸之掠其財而還其地謂之入地兵噐有甲胄標牌弓弩而刀之鐡尤良弩則傳矢於弦而偏架之謂之偏架弩其利侔中土神臂弓雖暑濕亦可用凡仇殺雖㣲隙必發雖昔釁必報父子兄弟之親不避也子弟為士人者𨽻於學讎殺則歸罷則復來荆湖南北路如武岡桂陽之屬猺民大略如此寄資官内侍之職至于幹辦後苑則為出常調流輩稱之曰苑使又進而幹辦龍圖諸閣曰閣長其上曰門司曰御藥曰御帶又其上為省官謂押班及都知也在法内侍轉至東頭供奉官則止若幹辦御藥院不許寄資當遷官則轉歸吏部司馬公論高居簡云舊制御藥院官至内殿崇班以上即湏出外今獨留四人中外以此竊議言之詳矣後乃不然逮其遷帶御噐械可帶階官然後盡還所寄之資至於宣政宣慶諸使遥郡防團觀察其高者為延福宫景福殿承宣使頃在樞密行府有院吏兵房副承㫖董球於紹興三十二年正月尚未有正官至四月予接伴人使回球通刺字來謁已轉出為武顯大夫問其何以遽得至此曰副承㫖比附武顯郎後用賞故爾蓋亦寄資也親王帶將仕郎薛氏五代史梁太祖開平元年五月皇第五男友雍封賀王及友珪篡位以將仕郎試袐書省挍書郎賀王友雍為銀青光祿大夫撿挍工部尚書兼御史大夫以親王而階將仕郎仍試衘初品雖典章掃地之時恐不應爾也郡縣用隂陽字山南為陽水北為陽穀梁傳之語也若山北水南則為隂故郡縣及地名多用之今畧叙於此山之南者如嵩陽華陽恒陽衡陽鎮陽岳陽嶧陽夏陽城陽陵陽岐陽首陽營陽咸陽櫟陽宜陽山陽屬河内郡大行在北廣陽辟陽河陽魯陽黎陽樅陽零陽巫陽東陽韶陽郴陽掲陽弋陽屬汝南郡弋山在西北當陽青陽黔陽壽陽麻陽雲陽美陽復陽南陽復山之陽上曲陽屬常山下曲陽屬鉅鹿稒陽屬五原原陽屬雲中水之北者馮翊之池陽頻陽郃陽沈陽扶風之杜陽河東之大陽大河之南平陽平河之陽大原之晉陽汾陽及河陽洛陽滎陽偪陽渭陽淮陽汶陽濟陽襄陽􅇭陽漁陽遼陽泗陽伊陽永陽滁陽潮陽灃陽灌陽汧陽洮陽沐陽東郡之濮陽東武陽潁川之潁陽昆陽舞陽汝南之汝陽鮦陽紬陽灈陽滇陽新陽安陽博陽成陽南陽之育陽湼陽堵陽蔡陽筑陽棘陽比陽朝陽湖陽紅陽江夏之西陽廬江之尋陽九江之曲陽濟隂之句陽音鉤句瀆之丘沛郡之穀陽扶陽漂陽魏郡之繁陽鉅鹿之堂陽清河之清陽􅃰郡之高陽饒陽范陽勃海之浮陽濟南之般陽朝陽泰山之東平陽東武陽寧陽北海之膠陽東海之開陽曲陽都陽臨淮之射陽蘭陽丹陽之丹陽陵陽溧陽豫章之鄱陽鄡陽桂陽之耒陽桂陽湞陽武陵之無陽辰陽酉陽零陽零陵之洮陽漢中之旬陽沔陽安陽犍為之江陽武陽漢陽金城之枝陽天水之畧陽阿陽安定之涇陽彭陽北地之泥陽上郡之定陽鴈門之沃陽劇陽上谷之沮陽漁陽之要陽遼西之海陽右北平之夕陽聚陽蒼梧之封陽趙國之易陽膠東之觀陽長沙之益陽已上皆見漢書地理志其水之下必曰在某水之陽合山水之稱陽者百有五六十至隂字則甚少蓋靣勢在背自難立國邑耳山之北者唯華隂山隂龜隂蒙隂鶉隂雕隂襄隂水之南者汾隂蕩隂潁隂汝隂舞隂濟隂漢隂晉隂蒲隂湘隂漯隂河隂湖隂江隂淮隂圜隂僅三十而已若樂陽南陽合陽被陽富陽屬泰山者昌陽建陽屬東海者武陽之類尚多有之莫能知其為山為水也杜畿李泌董晉漢建安中河東太守王邑被召郡掾衞固范先請留之固等外以請邑為名而内實與并州高幹通謀曹操選杜畿為太守固等使兵絶陜津數月不得渡畿曰河東有三萬户非皆欲為亂也吾單車直往出其不意固為人多計而無斷必偽受吾吾得居郡一月以計縻之足矣遂詭道從郖津度固遂奉之畿謂固先曰衞范河東之望也吾仰成而已比數十日諸將斬固等首唐貞元初陜虢兵馬使達奚抱暉殺節度使張勸代揔軍務邀求旌節徳宗遣李泌往欲以神䇿軍送之泌請以單騎入上加泌觀察使泌出潼闗鄜坊歩騎三千布於闗外曰奉密詔送公泌寫宣以却之疾驅而前抱暉不使將佐出迎去城十五里方出謁泌稱其攝事保城壁之功入城視事明日召抱暉至宅語之曰吾非愛汝而不誅恐自今有危疑之地朝廷所命將帥皆不能入故匄汝餘生抱暉遂亡命宣武節度使李萬榮疾病其子迺為兵馬使欲為亂都虞侯鄧惟㳟執送京師詔以東都留守董晉為節度使惟恭權軍事自謂當代萬榮不遣人迎晉晉既受詔即與僕從十餘人赴鎮不用兵衞至鄭州或勸晉且留觀變有自汴州出者言不可入晉不對遂行惟恭以晉來之速不及謀去城十餘里乃帥諸將出迎晉入仍委以軍政久之惟恭内不自安濳謀作亂事覺晉悉捕斬其黨械惟恭送京師觀此三者其危至矣杜畿李泌董晉皆以單車入逆城從容妥定其智勇過人如此唐史猶譏晉為懦弛苟安殆不然也是時朝議以晉柔仁多可恐不能集事用汝州刺史陸長源為行軍司馬以佐之長源性剛刻多更張舊事晉初皆許之案成則命且罷由是軍中得安初劉𤣥佐李萬榮鄧惟恭時士卒驕不能禦乃置腹心之士幕於公庭廡下挾弓執劒以備之時勞賜酒肉晉至之明日悉罷之謂之懦弛實為失當晉在汴三年而薨長源代之即為軍士所殺向使晉聽用其言汴亂久矣又李泌傳但云拜陜虢觀察使開車道至三門及殺淮西亡兵於赴鎮事畧不書亦失之也嚴有翼詆坡公嚴有翼所著藝苑雌黄該洽有識蓋近世博雅之士也然其立說頗務譏詆東坡公予嘗因論玉川子月蝕詩誚其輕發矣又有八端皆近於蚍蜉撼大木招後人攻擊如正娛篇中摭其用五十夲葱為種薤五十夲發丘中郎將為挍尉解摸金扁鵲見長桑君使飲上池之水為倉公飲上池鄭餘慶烝胡蘆為盧懐謹云如此甚多坡詩所謂抉雲漢分天章萬斛泉源不擇地而出若用葱為薤用挍尉為中郎用扁鵲為倉公用餘慶為懐謹不失為名語於理何害公豈一一如學究書生案圖索駿規行矩歩者哉四㓙篇中謂坡稱大史公多見先秦古書四族之誅皆非誅死為無所攷據盧橘篇中謂坡詠枇杷云盧橘是鄉人為何所據而言昌陽篇中昌蒲贊以為信陶隱居之言以為昌陽不曾詳讀夲草妄為此說苦荼篇中謂周詩記苦荼為誤用爾雅如臯篇中謂不向如臯閒射雉與左𫝊杜注不合其誤與江揔暫往如臯路之句同荔枝篇中謂四月食荔枝詩愛其體物之工而坡未嘗到閩中不識真荔枝是特火山耳此數者或是或非固未為深失然皆不必爾也最後一篇遂名曰辨坡謂雪詩云飛花又舞謪仙簷李太白本言送酒即無雪事水底笙歌蛙兩部無笙歌字殊不知坡借花詠雪以鼓吹為笙歌正是妙處坐看青丘吞澤芥青丘已吞雲夢芥用芥字和韻及以澤芥對溪蘋可謂工新乃以為出處曾不蔕芥非草芥之芥知白守黒名曰谷正是老子所言又以為老子只云為天下谷非名曰谷也如此論文章其意見亦淺矣曹馬能收人心曹操自擊烏桓諸將皆諌既破敵而還科問前諌者衆莫知其故人人皆懼操皆厚賞之曰孤前行乘危以徼倖雖得之天所佐也顧不可以為常諸君之諫萬安之計是以相賞後勿難言之魏伐吳三征各獻計詔問尚書傅嘏嘏曰希賞徼功先戰而後求勝非全軍之長䇿也司馬師不從三道擊吳軍大敗朝議欲貶出諸將師曰我不聴公休以至於此此我過也諸將何罪悉宥之弟昭時為監軍唯削昭爵雍州刺史陳泰求敕并州并力討胡師從之未集而二郡胡以逺役遂驚反師又謝朝士曰此我過也非陳雍州之責是以人皆愧恱討諸葛誕於夀春王基始至圍城未合司馬昭敕基斂軍堅壁基累求進討詔引諸軍轉㨿北山基守便宜上疏言若遷移依險人心揺蕩於勢大損書奏報聽及夀春平昭遺基書曰初議者云云求移者甚衆時未臨履亦謂宜然將軍深筭利害獨秉固心上違詔命下拒衆議終於制敵擒賊雖古人所述不過是也然東闗之敗昭問於衆曰誰任其咎司馬王儀曰責在元帥昭怒曰司馬欲委罪於孤邪引出斬之此為謬矣操及師昭之姦逆固不待言然用兵之際以善推人以惡自與并謀兼智其誰不歡然盡心悉力以為之用袁紹不用田豐之計敗於官渡宜罪已謝之不暇乃曰吾不用豐言卒為所笑竟殺之其失國喪師非不幸也取蜀將帥不利自巴蜀通中國之後凡割據擅命者不過一傳再傳而從東方舉兵臨之者雖多以得儁將帥輒不利至於死貶漢代公孫述大將岑彭來歙遭刺客之禍吳漢幾不免魏伐劉禪大將鄧艾鍾㑹皆至族誅唐莊宗伐王衍招討使魏王繼岌大將郭崇韜康延孝皆死國朝伐孟昶大將王全斌崔彦進皆不賞而受黜十年乃復故官李嶠楊再思李嶠楊再思相唐中宗皆以䛕恱保位為世所詆然亦有可稱武后時嶠為給事中來俊臣䧟狄人傑等獄將抵死敕嶠與大理少卿張徳裕侍御史劉憲覆驗徳裕等内知其寃不敢異嶠曰知其枉不申是謂見義不為者卒與二人列其枉忤后㫖出為潤州司馬然仁傑數人竟頼此獲脱嶠此舉可謂至難而資治通鑑不載神龍初要官闕執政以次用其親韋巨源秉筆當除十人再思得其一試問餘授皆諸宰相近属再思喟然曰吾等誠負天下巨源曰時當爾耳再思此言自狀其短觀過知仁亦足稱也容齋四筆卷十六欽定四庫全書}
