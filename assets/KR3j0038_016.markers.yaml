  - {type: variant, offset: 4, length: 4223, content: 卷第十六十九則文章小伎文章一小伎於道未爲尊雖杜子美有激而云然要爲失言不可以訓文章豈小事哉易賁之彖言剛柔交錯天文也文明以止人文也觀乎天文以察時變觀乎人文以化成天下孔子稱帝堯煥乎有文章子貢曰夫子之文章可得而聞詩美衞武公亦云有文章堯舜禹湯文武成康之聖賢桀紂幽厲之昏亂非詩書以文章載之何以傳伏羲畫八卦文王重之非孔子以文章翼之何以傳孔子至言要道託孝經論語之文而傳曽子子思孟子傳聖人心學使無中庸及七篇之書後人何所窺門户老莊絶滅禮學志言去爲而五千言與内外篇極其文藻釋氏之爲禪者謂語言爲累不知大乗諸經可廢乎然則抵爲小伎其理謬矣彼後丗爲詞章者逐其末而忘其夲翫其華而落其實流宕自逺非文章過也杜老所云文章千古事巳似愛文章文章日自負文章實致身文章開宎奥文章憎命達名豈文章著枚乗文章老文章敢自誣海内文章伯文章曹植波瀾闊庾信文章老更成豈有文章驚海内每語見許文章伯文章有神交有道如此之類多指詩而言所見狹矣三長月釋氏以正五九月爲三長月故奉佛者皆茹素其說云天帝釋以大寶鏡輪照四天下寅午戌月正臨南贍部洲故當食素以徼福官司謂之斷月故受驛劵有所謂羊肉者則不支俗謂之惡月士大夫赴官者輒避之或人以謂唐日藩鎮涖事必大享軍屠殺羊豕至多故不欲以其月上事今之它官不當爾也然此說亦無所經見予讀晉書禮志穆帝納后欲用九月九月是忌月北齊書云髙洋謀篡魏其臣宋景業言冝以仲夏受禪或曰五月不可入官犯之終於其位景業曰王爲天子無復下期豈得不終於其位乎乃知此忌相承由來巳乆竟不能曉其義及出何經典也兄弟直西垣秦少㳺集中有與鮮于子駿書云今中書舎人皆以伯仲繼直西垣前丗以來未有其事誠國家之美非特衣冠之盛也除書始下中外欣然舉酒相屬予以其時考之盖元祐二年謂蘇子由曾子開劉貢甫也子由之兄子瞻子開之兄子固子宣貢甫之兄原甫皆經是職故少㳺有此語云紹興二十九年予仲兄始入西省至隆興二年伯兄繼之乾道三年予又繼之相距首尾九歳子作謝表云父子相承四上鑾坡之直弟兄在望三陪鳯閣之㳺比之前賢實爲遭際固爲門户榮事然亦以此自愧也續樹萱録頃在祕閣抄書得續樹萱録一卷其中載隱君子元撰夜見吴王夫差與唐諸詩人吟詠事李翰林詩曰芙蓉露濃紅壓枝幽禽感秋花畔啼玉人一去未回馬梁間燕子三見歸張司業曰緑頭鴨兒咂萍藻采蓮女郞笑花老杜舎人曰鼔鼙夜戰北䆫風霜葉㳂階貼亂紅三人皆全篇杜工部曰紫領寛袍漉酒巾江頭蕭散作閑人白少傅曰不因霜葉辭林去的當山翁未覺秋李賀曰魚鱗甃空排嫩碧露桂梢寒挂團璧三人皆未終篇細味其體格語句往往逼眞後閱秦少㳺集有秋興九首皆擬唐人前所載咸在焉關子東爲秦集序云擬古數篇曲盡唐人之體正謂是也何子楚云續萱録乃王性之所作而託名它人今其書才有三事其一曰賈博喻一曰全若虚一曰元撰詳命名之義盖取諸子虛亡是公云館職名存國朝館閣之選皆天下英俊然必試而後命一經此職遂爲名流其髙者曰集賢殿脩撰史館修撰直龍圖閣直昭文館史館集賢院祕閣次曰集賢祕閣校理官卑者曰館閣校勘史館檢討均謂之館職記注官缺必於此取之非經脩注未有直除知制誥者官至貟外郎則任子中外皆稱爲學士及元豐官制行凡帶職者皆遷一官而罷之而置祕書省官大抵與職事官等反爲留滯政和以後增脩撰直閣貼職爲九等於是材能治辦之吏貴㳺乳臭之子車載斗量其名益輕南度以來初除校書正字往往召試雖曰館職不輕卑然其遷叙反不若寺監之徑捷至推排爲郎即失其故歩混然無別矣南宮适南宮适問羿奡不得其死禹稷有天下言力可賤而德可貴其義巳盡無所可答故夫子俟其出而歎其爲君子奬其尚德至於再言之聖人之意斯可見矣然明道先生云以禹稷比孔子故不荅范淳父以爲禹稷有天下故夫子不敢荅弗敢當也楊龜山云禹稷之有天下不止於躬稼而巳孔子未盡然其言故不荅然而不止之者不責備於其言以沮其尚德之志也與所謂雍之言然則異矣予竊謂南宮之問初無以禹稷比孔子之意不知二先生何爲有是言若龜山之語淺之巳甚獨謝顯道云南宮适知以躬行爲事是以謂之君子知言之要非尚德者不能在當時發問間必有目擊而道存首肯之意非直不荅也其說最爲切當吴王殿漢髙祖五年以長沙豫章象郡桂林南海立番君吴芮爲長沙王十二年以三郡封吴王濞而豫章亦在其中又趙佗先有南海後擊并桂林象郡則芮所有但長沙一郡耳桉芮夲爲秦番陽令故曰番君項羽巳封爲衡山王都邾邾今之黃州也復侵奪其地故髙祖徙之長沙而都臨湘一年薨則其去番也乆矣今吾邦猶指郡正聽爲吴王殿以謂芮爲王時所居牛僧孑焉正玄怪緑載唐元和中饒州刺史齊推女因止州宅誕育爲神人擊死後有仙官治其事云是西漢鄱陽王吴芮今刺史宅是芮昔時所居皆非也王衞尉漢髙祖怒蕭何謂王衞尉曰李斯相秦皇帝有善歸主有惡自予今相國請吾苑以自媚於民故繫治之衞尉曰秦以不聞其過亡天下李斯之分過又何足法哉唐太宗疑三品以上輕魏王責之曰我見隋家諸王一品以下皆不免其躓頓我自不許兒子縱橫耳魏鄭公曰隋髙祖不知禮義寵縱諸子使行非禮㝷皆罪黜不可以爲法亦何足道觀髙祖太宗一時失言二臣能因其所言隨即規正語意旣直於激切中有婉順體可謂得諌争之大義雖微二帝其孰不降心以聽乎前代爲監人臣引古規戒當近取前代則事勢相接言之者有證聽之者足以監詩曰商監不逺在夏后之丗周書曰今惟商墜厥命我其可不大監又曰我不可不監于有商又曰有商受天命惟有歷年惟不敬厥德乃早墜厥命周公作無逸稱商三宗漢祖命羣臣言吾所以有天下項氏所以失天下命陸賈著秦所以失天下張釋之爲文帝言秦漢之間事秦所以失漢所以興賈山借秦爲諭賈誼請人主引商周秦事而觀之魏鄭公上書於太宗云方隋之未亂自謂必無亂方隋之未亡自謂必無亡臣願當今動静以隋爲監馬周云煬帝笑齊魏之失國今之視煬帝亦猶煬帝之視齊魏也張元素諌太宗治洛陽宮曰乾陽畢功隋人解體恐陛下之過甚於煬帝若此役不息同歸于亂耳考詩書所載及漢唐諸名臣之論有國者之龜鏡也議論之臣冝以爲法治盜法不同唐崔安潜爲西川節度使到官不詰盜曰盜非所由通容則不能爲乃出庫錢置三市置牓其上曰告捕一盜賞錢五百緡侣者告捕釋其罪賞同平人未幾有捕盜而至者盜不服曰汝與我同爲盜十七年贓皆平分汝安能捕我安潜曰汝旣知吾有牓何不捕彼以來則彼應死汝受賞矣汝旣爲所先死復何辭立命給捕者錢使盜視之然後殺盜於市於是諸盜與其侣互相疑無地容足夜不及旦散逃出境境内遂無一人之盜予毎讀此事以爲䇿之上者及得李公擇治齊州事則又不然齊素多盜公擇痛治之殊不止它日得黠盜察其可用刺爲兵使直事鈴下間問以盜發輒得而不衰止之故曰此繇冨家爲之囊使盜自相推爲甲乙官吏巡捕及門擒一人以首則免矣公擇曰吾得之矣乃令凡得藏盜之家皆發屋破柱盜賊遂清予乃知治丗間事不可泥紙上陳迹如安潜之法可謂善矣而齊盜反恃此以爲沈命之計則變而通之可不存乎其人哉和詩當和意古人詶和詩必荅其來意非若今人爲次韻所局也觀文選所編何劭張華盧諶劉琨二陸三謝諸人贈荅可知巳唐人尤多不可具載姑取杜集數篇略紀于此高適寄杜公云媿爾東西南北人杜則云東西南北更堪論髙又有詩云草玄今巳畢此外更何言杜則云草玄吾豈敢賦或似相如嚴武寄杜云興發㑹能馳駿馬終須重到使君灘杜則云枉沐旌麾出城府草茅無逕欲教鋤杜公寄嚴詩云何路出巴山重巖細菊班遥知簇鞍馬回首白雲間嚴荅云卧向巴山落月時籬外黃花菊對誰跋馬望君非一度杜送韋迢云洞庭無過鴈書䟽莫相忘迢云相憶無南鴈何時有報章杜又云雖無南去鴈看取北來魚郭受寄杜云春興不知凡幾首杜荅云藥裹關心詩揔廢皆如鐘磬在簴扣之則應往來反復於是乎有餘味矣稷有天下稷躬稼而有天下泰伯三以天下讓文王一怒而安天下之民皆以子孫之事追言之是時稷始封於邰古公方邑于梁山之下文王才有歧周之地未得云天下也禹未甞躬稼因稷而稱之一丗人材一丗人材自可給一丗之用苟有以致之無問其取士之門如何也今之議者多以科舉經義詩賦爲言以爲詩賦浮華無根柢不能致實學故其說常右經而左賦是不然成周之時下及列國皆官人以丗周之劉單召甘晉之韓趙荀魏齊之髙國陳鮑衞之孫寗孔石宋之華向皇樂鄭之罕駟國㳺魯之季孟臧展楚之鬪蔿申屈皆丗不乏賢與國終畢漢以經術及察舉魏晉以州郷中正東晉宋齊以門地唐及本朝以進士而參之以任子皆足以盡一時之才則所謂科目特借以爲梯階耳經義詩賦不問可也王逢原王逢原以學術邢敦夫以文采有盛名於嘉祐元豐間然所爲詩文多怨抑沉憤哀傷涕泣若辛苦憔悴不得其平者故皆不克夀逢原年二十八敦夫才二十天卑其才而嗇其夀吁可惜哉吏文可笑吏文行移只用定本故有絶可笑者如文官批書印紙雖宮觀嶽廟亦必云不曽請假或巳登科級見官臺省清要必云不曽應舉若試刑法予在西掖時漢州申顯惠侯神頃係宣撫司便冝加封昭應公乞換給制書禮寺看詳謂不依元降指揮於一年限内自陳欲符下漢州告示本神知委予白丞相別令勘當乃得改命淳熈六年予以大禮恩澤改奏一歳兒吏部下饒州必欲保官狀内聲說被奏人曽與不曽犯決笞有無翦刺及曽與不曽先經補官因罪犯停廢別行改奏又令供與予係是何服屬父之於子而問何服屬一歳嬰兒而問曽與不曽入仕坐罪豈不大可笑哉靖康時事鄧艾伐蜀劉禪旣降又敕姜維使降於鍾㑹將士咸怒抜刀斫石魏圍燕於中山旣乆城中將士皆思出戰至數千人相率請於燕主慕容隆言之尤力爲慕容麟沮之而罷契丹伐晉連年晉拒之每戰必勝其後杜重威隂謀欲降命將士出陳於外士皆踊躍以爲出戰旣令解甲士皆慟哭聲振原野予頃修靖康實録竊痛一時之禍以堂堂大邦中外之兵數十萬曽不能北向發一矢獲一胡端坐都城束手就斃虎旅雲屯不聞有如蜀燕晉之憤哭者近讀朱新仲詩集有記昔行一篇正叙此時事其中云老种憤死不得戰汝霖疽發何由痊乃知忠義之士丗未甞無之特時運使然耳并韶梁武帝時有交趾人并韶者冨於詞藻詣選求官而吏部尚書蔡撙以并姓無前賢除廣陽門郎韶恥之遂還郷里謀作亂夫用門地族望爲選舉低昻乃晉宋以來弊法蔡撙賢者也不能免俗何哉䜟緯之學圖䜟星緯之學豈不或中然要爲誤人聖賢所不道也眭孟覩公孫病已之文勸漢昭帝求索賢人䄠以帝位而不知宣帝實應之孟以此誅孔熈先知宋文帝禍起骨肉江州當出天子故謀立江州刺史彭城王而不知孝武實應之熈先以此誅當塗髙之䜟漢光武以詰公孫述袁術王浚皆自以姓名或父字應之以取滅亡而其兆爲曹操之魏兩角犢子之䜟周子諒以劾牛仙客李德𥙿以議牛僧孺而其兆爲朱温隋煬帝謂李氏當有天下遂誅李金才之族而唐髙祖乃代隋唐太宗知女武將竊國命遂濫五娘子之誅而阿武婆幾易姓武后謂代武者劉劉無強姓殆流人也遂遣六道使悉殺之而劉幽求佐臨淄王平内難韋武二族皆殄滅晉張華郭璞魏崔伯深皆精於天文卜筮言事如神而不能免於身誅家族況其下者乎眞假皆妄江山登臨之美泉石賞翫之勝丗間佳境也觀者必曰如畫故有江山如畫天開圖盡即江山身在畫圖中之語至於丹青之妙好事君子嗟歎之不足者則又以逼眞目之如老杜人間又見眞乗黃時危安得眞致此悄然坐我天姥下斯須九重眞龍出憑軒忽若無丹青髙堂見生鶻直訝杉松冷兼疑菱荇香之句是也以眞爲假以假爲眞均之爲妄境耳人生萬事如是何特此耶容齋隨筆卷第十六, WYG: ''}
