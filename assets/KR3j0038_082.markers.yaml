  - {type: variant, offset: 4518, length: 0, content: '', WYG: 欽定四庫全書容齋五筆目録卷一十九則天慶諸節虢州兩刺史狐假虎威徐章二先生教人張吕二公文論郎官非時得對王安石棄地雙生以前爲兄風俗通俗語有出昏主棄功臣問故居唐宰相不歴守令張釋之桞渾人臣震主五經秀才陶潜去彭澤羗戎畏服老將古人字只一言卷二十五則二叔不咸官階服章月非望而食慶善橋西漢以來加官吕望非熊唐曹因墓銘唐史省文之失李德裕論命令漢武唐德宗諸公論唐肅宗孫馬二公所言元㣲之詩諫繚綾戲龍羅詳正學士卷三十五則人生五計瀛莫間二禽士大夫避父祖諱元正父子忠死蕭頴士風節石尤風江楓雨菊開元宫嬪相里造先公詩詞州縣名同三衙軍制歐陽公勲封贈典嘉祐四真五方老人祝聖夀卷四九則作詩㫖意平王之孫毛詩語助東坡文章不可學韓文稱名棘寺棘卿晉代遺文漢武帝田蚡公孫𢎞近世文物之殊卷五十五則庾公之斯萬事不可過致仕官上夀桃花笑春風嚴先生祠堂記大言誤國宗室覃恩免觧唐書載韓桞文冥靈社首鳳左傳州郡貧富習常唐用宰相史記簡妙處玉津園喜晴詩虢巨賀蘭卷六十二則鄱陽七談經觧之名卜筮不敬糖霜譜李彦僊守陜姦雄疾勝已者俗語放錢漢書多叙谷永玉堂殿閣漢武帝喜殺人者知人之難舘職遷除卷七十四則盛衰不可常唐賦造語相似張藴古大寳箴國初文籍叙西漢郊祀天地騫鶱二字義訓書麴信陵事貢禹朱暉晩達琵琶行海棠詩東坡不隨人後元白習制科門生門下見門生韓蘇杜公叙馬風災霜旱卷八十二則白蘇詩紀年嵗天將富此翁白公說俸禄白居易出位醉翁亭記酒經白公感石禮部韻略非理唐臣乞贈祖承習用經語誤長慶表章元白制科八種經典卷九十二則畏人索報書不能忘情吟擒鬼章祝文歐公送慧勤詩委蛇字之變東不可名園一二三與壹貳叄同何恙不已兩漢用人人元元字韓公潮州表燕賞逢知己端午貼子詞卷十十二則哀公問社絶句詩不貫穿農父田翁詩衛宣公二子謂端爲疋唐人草堂詩句公穀觧經書日桞應辰押字唐堯無後斯須之敬丙午丁未祖宗命相容齋五筆目録欽定四庫全書容齋五筆卷一十九則宋洪邁撰天慶諸節大中祥符之世諛佞之臣造爲司命天尊下降及天書等事於是降聖天慶天祺天貺諸節並興始時京師宫觀每節齋醮七日旋减為三日一日後不復講百官朝謁之禮亦罷今中都未嘗舉行亦無休假獨外郡必詣天慶觀朝拜遂休務至有前後各一日此為敬事司命過於上帝矣其當䆮明甚惜無人能建白者虢州兩刺史唐韓休為虢州刺史虢於東西京為近州乘輿所至常稅廐芻休請均賦他郡中書令張說曰免虢而與它州此守臣為私惠耳休復執論吏白恐忤宰相意休曰刺史幸知民之弊而不救豈為政哉雖得罪所甘心焉訖如休請盧把為虢州刺史奏言虢有官豕三千爲民患德宗曰徙之沙苑把曰同州亦陛下百姓臣謂食之便帝曰守虢而憂它州宰相才也詔以豕賜貧民遂有意柄任矣俄召入踰年拜相案兩人皆以虢州守臣言公家事而休見疑於名相把受知於猜主遇合有命信哉狐假虎威諺有狐假虎威之語稚子來叩其義因示以戰國策新序所載戰國䇿云楚宣王問羣臣曰吾聞北方之畏昭奚恤也果誠何如羣臣莫對江乙對曰虎求百獸而食之得狐狐曰子無敢食我矣天帝使我長百獸今子食我是逆天帝命也子以我為不信吾為子先行子隨我後觀百獸之見我而敢不走乎虎以為然故遂與之行獸見之皆走虎不知獸畏己而走也以為畏狐也今王之地方五千里帶甲百萬而專屬之昭奚恤故北方之畏奚恤也其實畏王之甲兵也猶百獸之畏虎也新序並同而其後云故人臣而見畏者是見君之威也君不用則威亡矣俗諺盖本諸此徐章二先生教人徐仲車先生為楚州教授每升堂訓諸生曰諸君欲為君子而勞己之力費己之財如此而不為猶之可也不勞己之力不費己之財何不為君子鄉人賤之父母惡之如此而不為可也鄉人榮之父母欲之何不為君子又曰言其所善行其所善思其所善如此而不為君子者未之有也言其不善行其不善思其不善如此而不為小人者未之有也成都冲退處士章詧隠者其學長於易太元為范子功觧述大㫖再復攡詞曰人之所好而不足者善也所醜而有餘者惡也君子能强其所不足而拂其所有餘則太元之道幾矣此子雲仁義之心予之於太元述斯而已或者苦其思艱其言迂溺其所以為數而忘其仁義之大是惡足以語道哉二先生之教人簡易明白學者或未知之故表出於此張吕二公文論張文潜誨人作文以理為主嘗著論云自六經以下至于諸子百氏騷人辯士論述大抵皆將以為寓理之具也故學文之端急於明理如知文而不務理求文之工世未嘗有是也夫決水於江淮河海也順道而行滔滔汨汨日夜不止衝砥柱絶吕梁放於江湖而納之海其舒為淪漣鼓為濤波激之為風飊怒之為雷霆蛟龍魚鼈噴薄出沒是水之竒變也水之初豈若是哉順道而決之因其所遇而變生焉溝瀆東決而西竭下滿而上虚日夜激之欲見其竒彼其所至者蛙蛭之玩耳江河淮海之水理達之文也不求竒而竒至矣激溝瀆而求水之竒此無見於理而欲以言語句讀為竒反覆咀嚼卒亦無有此最文之陋也一時學者仰以為至言予作史采其語著於本傳中又吕南公云士必不得已於言則文不可以不工蓋意有餘而文不足則如吃人之辯訟心未始不虚理未始不直然而或屈者無助於辭而已矣觀書契以來特立之士未有不善於文者士無志於立言則已必有志焉則文何可以卑淺而為之故毅然盡心思欲與古人並此南公與人書如此予亦載之傳中郎官非時得對唐肅宗在靈武闗東獻俘百將即死有歎者司膳員外郎李勉過而問之曰被脅而官非敢反勉入見帝曰冦亂之汙半天下其欲澡心自歸無繇如盡殺之是驅以助賊也帝馳騎全宥以一郎吏之㣲而非時得入對雖唐制不可詳知想兵戈艱難時暫如是耳王安石棄地熈寧七年遼主洪基遣泛使蕭禧來言河東地界未決八年再來必欲以代州天池分水嶺為界詔詢于故相文彦博富弼韓琦曾公亮以可與及不可許之狀皆以為不可王安石當國言曰將欲取之必固與之於是詔不論有無照驗擗撥與之往時界於黄嵬山麓我可以下瞰其應朔武三州既以嶺與之遼遂反瞰忻代凡東西失地七百里案慶厯中遼求闗南十縣朝廷方以西夏為慮猶不過增嵗幣以塞其欲至於土地尺寸弗與熈寧之兵力勝於曩時而用蕭禧堅坐都亭之故輕弃疆場設險要害之處安石果於大言其實無辭以卻之也孫權謂魯肅勸吾借劉𤣥德地云帝王之起皆有驅除闗羽不足忌此子敬内不能辨外為大言耳安石之語亦然雙生以前為兄續筆已書公羊傳注雙生子事茲讀西京雜記得一說甚詳云霍將軍妻一産二子疑所為兄弟或曰前生為兄後生為弟今雖俱日亦宜以先生為兄或曰居上者宜為兄居下者宜為弟居下者前生今宜以前生為弟光曰昔殷王祖甲一産二子以邜日生嚚以巳日生良則以嚚為兄以良為弟若以在上者為兄嚚亦當為弟矣許莊公一産二女曰妖曰茂楚大夫唐勒一産二子一男一女男曰正夫女曰瓊華皆以先生為長近代鄭昌時文長倩並生二男滕公一生二女李黎生一男一女並以前生為長霍氏亦以前生為兄焉此最可證風俗通應劭風俗通雖東漢末所作然所載亦難盡信其叙希姓者曰合浦太守虎旗上郡太守邸杜河内太守遇冲北平太守賤瓊東平太守到質沐寵北平太守卑躬鴈門太守宿詳五原太守督􅀈汝南太守謁渙九江太守荆修東海太守鄐熈𢎞農太守移良南郡太守為昆酒泉太守頻暢北海太守處興巴郡太守鹿旗涿郡太守作顯廬江太守貴遷交趾太守賴先外黄令集一洛陽令諸於單父令即賣烏傷令昔登山陽令職洪髙唐令用虯此二十君子皆是郡守縣令惟移良之名曾見於史恐未必然也俗語有出今人意錢賭博皆以四數之謂之攤案廣韻攤字下云攤蒱四數也竹工謂屋椽上織箔曰篖笪廣韻篖字下云筕篖竹笪也采帛鋪謂剪截之餘曰帵子帵一懽切注裁餘也挑剔燈火之杖曰掭他念切注火杖也李濟翁資暇集云意錢當云攤鋪疾道之訛其音為蒲此說不然昬主棄功臣燕昭王伐齊取其七十城所存者惟莒即墨田單一旦悉復之使齊復為齊而㐮王聼幸臣九子之譛單幾不免秦苻堅舉百萬之師伐晉賴謝安却之而孝武帝聼王國寳之讒安不能立於朝廷之上桓温伐慕容暐暐兵屡挫議欲奔北慕容垂一戰使燕復存乃用慕容評之毀垂竄身符氏國隨以亡朱泚據京師德宗播遷奉天李懐光繼叛李晟孤軍堅壁竟平大難而德宗用張延賞之譛訖罷其兵且百端疑忌至於鞅鞅以死自古昏主不明輕弃功臣如此真可歎也問故居陶淵明問來使詩云爾從山中來早晩發天目我屋南山下今生幾叢菊薔薇葉已抽秋蘭氣當馥歸去來山中山中酒應熟諸集中皆不載惟晁文元家本有之蓋天目疑非陶居處然李太白云陶令歸去來田家酒應熟乃用此耳王摩詰詩曰君自故郷來應知故郷事來日綺牕前寒梅著花未杜公送韋郎歸成都云為問南溪竹抽梢合過墻憶弟云故園花自發春日鳥還飛王介甫云道人北山來問松我東岡舉手指屋脊云今如許長古今詩人懐想故居形之篇詠必以松竹梅菊為比興諸子句皆是也至於杜公將别巫峽贈南郷兄瀼西果園詩云苔竹素所好萍蓬無定居逺遊長兒子幾地别林廬雜蕋紅相對他時錦不如具舟將出峽廵圃念擕鉏每讀至此未嘗不為之凄然寄題草堂云尚念四小松蔓草易拘纒霜骨不甚長永為隣里憐又一篇云四松初移時大抵三尺强别來忽三載離立如人長尤可見一時之懷抱也唐宰相不歴守令唐楊綰崔祐甫杜黄裳李藩裴垍皆稱英宰然攷其履歴皆未嘗為刺史守令綰初補太子正字擢右拾遺起居中書舍人禮吏部侍郎國子祭酒太常卿拜相祐甫初調夀安尉歴藩府判官入為起居中書舍人拜相黄裳初佐朔方府入為侍御史太子賔客太常卿拜相藩佐東都徐州府入為秘書郎郎中給事中拜相垍由美原尉四遷考功員外郎中書舍人户部侍郎拜相五賢行業史䇿書之已詳茲不復論然則後之用人必言踐揚中外諳熟民情始堪大用殆為隘矣張釋之桞渾漢張釋之為廷尉文帝出行有人驚乗輿馬使騎捕之屬廷尉釋之奏當此人犯蹕罰金上怒釋之日方其時上使使誅之則已顔師古謂言初執獲此人天子即令誅之其事即畢唐桞渾為相玉工為德宗作𢃄誤毀一銙工私市它玉足之帝識不類怒其欺詔京兆論死渾曰陛下遽殺之則已若委有司須詳讞乃可於法罪當杖請論如律由是工不死予謂張桞之論可謂善矣然張云上使使誅之則已桞云陛下遽殺之則已無乃啟人主徑殺人之端乎斯一節未為至當也人臣震主人臣立社稷大功負海宇重望久在君側為所敬畏其究必至於招疑毁漢髙祖有天下韓信之力為多}
