  - {type: variant, offset: 4519, length: 0, content: '', WYG: 以挾不賞之功戴震主之威至於誅滅霍光擁昭立宣勢侔人主宣帝謁見髙廟光從驂乗上内嚴憚之若有芒刺在背其家既覆俗傳之曰威震主者不畜霍氏之禍盟於驂乘周亞夫平定七國景帝怒其固争栗太子由此疏之後目送其出曰此鞅鞅非少主臣也訖以無罪殺之謝安却符堅百萬之衆晉室復存功名既盛險詖求進之徒多毀短之孝武稍以疎忌又信㑹稽王道子之姦扇至使避位出外終以至亡齊文宣之簒魏皆髙德政之力德政為相數彊諫帝不恱謂左右曰髙德政恒以精神凌逼人遂殺之并其妻子隋文帝將簒周欲引髙熲入府熲忻然曰願受驅馳縱公事不成亦不辭滅族及帝受禪用為相二十年朝臣莫與為比熲自以為任寄隆重每懐至公無自疑意積為獨孤皇后漢王諒等所譛帝欲成其罪既罷之後至云自其觧落暝然忘之如本無髙熲不可以身要君自云第一也迨于煬帝竟以寃誅郭子儀再造王室以身為天下安危權任既重功名復大德宗即位自外召還朝所領副元帥諸使悉罷之李晟以孤軍復京城不見信於庸主使之晝夜泣目為之腫卒奪其兵百端疑忌幾於不免李德裕功烈光明佐武宗中興威名獨重宣宗立奉冊太極殿帝退謂左右曰向行事近我者非太尉邪每顧我毛髪為之森竪明日罷之終於貶死海外若郭崇韜安重誨皆然也五經秀才唐楊綰為相以進士不鄉舉但試辭賦浮文非取士之實請置五經秀才科李栖筠賈至以綰所言為是然亦不聞施行也陶潜去彭澤晉書及南史陶潜傳皆云潜為彭澤令素簡貴不私事上官郡遣督郵至縣吏白當束帶見之潜歎曰吾不能為五斗米折腰拳拳事郷里小人即日觧印綬去賦歸去來以遂其志案陶集載此辭自有序曰余家貧耕植不足以自給彭澤去家百里故便求之及少日眷然有歸與之情何則質性自然非矯勵所得飢凍雖切違已交病悵然慷慨深愧平生之志猶望一稔當斂裳宵逝尋程氏妹䘮於武昌情在駿奔自免去職在官八十餘日觀其語意乃以妹䘮而去不縁督郵所謂矯勵違已之說疑必有所屬不欲盡言之耳詞中正喜還家之樂略不及武昌自可見也羗戎畏服老將漢先零羗犯塞趙充國往擊之羗豪相數責曰語汝亡反今天子遣趙將軍來年八九十矣善為兵今請欲一閗而死可得邪充國時年七十六訖平之唐代宗時回紇吐蕃合兵入寇郭子儀單騎見回紇復與之和諸酋長皆大喜曰曏以二巫師從軍巫言此行甚安穩不與唐戰見一大人而還今果然矣郭公是時年七十乃知羗戎畏服老將如此班超久在西域思歸故其言云蠻夷之俗畏壯侮老葢有為而云古人字只一言檀弓云幼名冠字五十以伯仲周道也古之人命字一而已矣初曰子巳而為仲為伯又為叔為季其老而尊者為甫蓋無以兩言相連取義若屈原離騷經名余曰正則兮字余曰靈均案史記原字平所謂靈均者釋平之義以縁餙詞章耳下至西漢與周相接故一切皆然除子房子卿子孟子政子孺子長子雲子兄子眞子公子陽子賔子幼之外若仲孺仲卿仲子長卿少卿孺卿君卿客卿游卿翁卿聖卿長君少君穉君游君次君贑君近君曼君王孫翁孫次公少公孟公游公仲公長公君公少叔翁叔長叔中叔子叔長倩曼倩次倩穉季長孺仲孺幼孺少孺次孺翁孺君孺長翁弱翁仲翁少翁君房君賔君倩君敖君蘭君長君仲君孟少季少子少路少游穉賔穉圭穉游穉君臣先巨君長賔長房翁思翁子翁仲之類其義只從一訓極為雅馴至於婦人曰少夫君俠政君君力君弟君之阿君單書一字者若陳勝字渉項籍字羽彭越字仲張歐吳廣枚乗字叔楚元王字交朱雲字游爰盎字絲張釋之字季鄭當時字荘劉德字路眭𢎞字孟迨東漢以下則不盡然容齋五筆卷一欽定四庫全書容齋五筆卷二十五則宋洪邁撰二叔不咸左氏𫝊載富辰之言曰昔周公弔二叔之不咸故封建親戚以藩屛周士大夫多以二叔為管蔡案蔡仲之命云羣叔流言乃致辟管叔于商囚蔡叔降霍叔為庶人蓋三叔也杜預注以為周公傷夏殷之叔世疏其親戚以致滅亡故廣封其兄弟是以方叙說管蔡郕霍十六國其義昭然所言親戚者指兄弟耳官階服章唐憲宗時因數赦官多汎階又帝親郊陪祠者授三品五品不計考使府軍吏以軍功借賜朱紫率十八近臣謝郎官出使多所賜與每朝㑹朱紫滿庭而少衣緑者品服太濫人不以為貴帝亦惡之詔太子少師鄭餘慶條奏懲革淳熈十六年紹熈五年連有覃霈轉官賜服者衆紹熈元年予自當塗徙㑹稽過闕遇起居舍人莫仲謙於漏舍仲謙云比赴景靈行香見朝士百數無一緑袍者又朝議中奉皆直轉行故五品官不勝計頗類元和也月非望而食厯家論日月食自漢太初以來始定日食不在朔則在晦否則二日然甚少月食則有十四十五十六之差葢置望参錯也天體有二交道曰交初曰交中交初者星家以為羅㬋交中者計都也隠暗不可見於是為入交法以求之然不過能求朔望耳若餘日入交則書所不載由漢及唐二十八家暨本朝十一厯皆然姑以慶元丁巳嵗五次月食考之二月望為入交中七月為交初唯十月二十日二十一日連兩夜乃以二更盡月食之既纔兩刻復明十一月十八夜復如之案此三食皆是交中十月二十夜月在張五度而計都在翼二度次夜月在張十七度計都未定相距才四度耳十一月十八夜月在星五度計都在張十九度相距二十度十二月十七夜五更月在星二度入交陽末卯初四刻交甚食六分半八刻退交十八夜四更月在張六度入交中隂初至寅四刻交甚食九分邜五刻退交其騐如此予竊又有疑焉太隂一月一周天必兩值交道今年遂至八食一一如星官厯翁之說仍不拘月望則玉川子之詩不勝作矣當更求其旨趣云頃見太史局官劉孝榮言月本無光受日為明望夜正與日對故一輪光滿或月行有遲疾先後日光所不照處則為食朔旦之日日月同宫如月在日上掩太陽而過則日光為所遮故為日食非此二日則無薄蝕之理其説亦通慶善橋饒州學非范文正公所建予既書之矣城内慶善橋之說亦然比因郡人脩橋拆去舊石見其上鐫云康定庚辰案范公以景祐乙亥為待制丙子知開封府黜知饒州後徙潤越至庚辰歲乃復職帥長安既去此久矣西漢以來加官漢書百官表云侍中左右曹諸吏散騎中常侍皆加官所加或將軍列侯卿大夫將都尉給事中亦加官所加或大夫博士議郎其侍中中常侍得入禁中諸曹受尚書事諸吏得舉法散騎並乘輿車並歩浪反案漢世除授此等稱謂殆若今之兼職者不甚為顯秩然魏相以御史大夫兼給事中它如劉向以宗正散騎給侍中蘇武以右曹典屬國揚雄為諸吏光禄大夫是也至於金日磾以降虜為侍中其子賞建諸孫常敞岑明渉湯融欽皆以左曹諸吏侍中故班史賛之曰七世内侍何其盛也蓋如今時閤門宣賛祗候之類但漢家多用士人武帝所任莊助朱買臣吾􅏀夀王東方朔諸人皆天下選此其所以為人貴重東漢大略亦然晉宋以來又有給事黄門侍郎散騎常侍通直散騎常侍散騎侍郎等皆為兼官但視本秩之髙下已而復以將軍為寵齊高帝以太子詹事何戢領選以戢資重欲加常侍禇淵曰臣與王儉既已左珥若復加戢則八座遂有三貂若帖以驍游亦為不少乃以為吏部尚書加驍騎將軍唐有撿挍官文武散階憲衘乃此制也國朝自眞宗始創學士直學士待制直閣職名尤為仕宦所慕今自觀文殿大學士至直秘閣㡬四十種不刋之典明白易曉非若前代之冗法云吕望非熊自李瀚蒙求有吕望非熊之句後來据以為用然以史䇿攷之六韜第一篇文韜曰文王將田史編布卜曰田於渭陽將大得焉非龍非彲螭非虎非羆兆得公侯天遺汝師文王曰兆致是乎史編曰編之太祖史疇為禹占得臯陶兆史記云吕尚窮困年老以漁釣干西伯西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲霸王之輔後漢崔駰達㫖云漁父見兆於元龜注文乃引史記非龍非彲非熊非羆為證今之史記蓋不然也非熊出處惟此而已唐曹因墓銘慶元三年信州上饒尉陳莊發土得唐碑乃婦人為夫所作其文曰君姓曹名因字鄙夫世為番陽人祖父皆仕於唐髙祖之朝惟公三舉不第居家以禮義自守及卒於長安之道朝廷公卿鄉鄰耆舊無不太息惟予獨不然謂其母曰家有南畆足以飬其親室有遺文足以訓其子肖形天地間範圍隂陽内死生聚散特世態耳何憂喜之有哉予姓周氏公之妻室也歸公八載恩義有奪故贈之銘曰其生也天其死也天苟達此理哀復何言予案唐世上饒本隷饒州其後分為信故曹君為鄱陽人婦人能文達理如此惜其不𫝊故書之以禆圖志之缺唐史省文之失楊虞卿兄弟怙李宗閔勢為人所奔向當時為之語曰欲入舉塲先問蘇張蘇張尚可三楊殺我而新唐書减去先字李德裕賜河北三鎮詔曰勿為子孫之謀欲存輔車之勢新書减去欲字遂使兩者意義為不鏗鏘激越此務省文之失也李德裕論命令李德裕相武宗言從計行韋𢎞質建言宰相不可兼治錢糓德裕奏言管仲明於治國其語曰國之重器莫重於令令重君尊君尊國安治人之本莫要於令故曰虧令者死益令者死不行令者死留令者死不從令者死五者無赦又曰令在上而論可否在下是主威下繫於人也大和後風俗寢敝令出於上非之在下此敝不止無以治國臣謂制置職業人主之柄非小人所得干𢎞質賤臣豈得以非所宜言妄觸天聽是輕宰相也德裕大意欲朝廷尊臣下肅而政出宰相故感憤切言之予謂德裕當國它相取充位而已若如所言則一命一令之出臣下皆不得有言諫官御史給事舍人之職廢矣𢎞質位給事中亦非賤臣宜其一朝去位遂罹抵巇皆自取之也漢武唐德宗漢張湯事武帝舞文巧詆以輔法所治夷滅者多旋以罪受誅上惜湯稍進其子安世擢為尚書令安世宿衛忠正肅敬不怠勤勞國家卒為重臣其可大用不疑而武帝之意乃以父湯故耳唐盧把相德宗姦邪險賊為天下禍以公議不容譴逐致死帝念之不忘擢叙其子元輔至兵部侍郎元輔端静介正能紹其祖奕之忠規陟之臺省要官宜也而德宗之意乃以父把故爾且武帝之世羣臣不幸而誅者如莊助朱買臣吾􅏀夀王諸人及考終名臣如汲黯鄭莊董仲舒卜式未嘗恤其孤德宗輔相之賢如崔祐甫李泌陸䞇皆身沒則已而獨於湯把二人惓惓如此是可歎也諸公論唐肅宗唐肅宗於干戈之際奪父位而代之然尚有可諉者曰欲收復兩京非居尊位不足以制命諸將耳至於上皇還居興慶惡其與外人交通刼徙之西内不復定省竟以怏怏而終其不孝之惡上通於天是時元次山作中興頌所書天子幸蜀太子即位於靈武直指其事殆與洪範云武王勝殷殺受之辭同其詞曰事有至難宗廟再安二聖重歡既言重歡則知其不歡多矣杜子美杜鵑詩我看禽鳥情猶觧事杜䳌傷之至矣顔魯公請立放生池表云一日三朝大明天子之孝問安視膳不改家人之禮東坡以為彼知肅宗有愧於是也黄魯直題磨崖碑尤為深切撫軍監國太子事何乃趣取大物為事有至難天幸耳上皇局脊還京師南内凄凉幾苟活髙將軍去事尤危臣結舂陵二三䇿臣甫杜鵑再拜詩安知忠臣痛至骨世上但賞瓊琚詞所以掲表肅宗之罪極矣孫馬兩公所言盧照鄰有疾問孫思邈曰髙醫愈疾奈何答曰天有四時五行寒暑迭居和為雨怒為風凝為雪霜張為虹蜺天常數也人之四支五藏一覺一􅄰吐納往來流為榮衛章為氣色發為音聲人常數也陽用其形隂用其精天人所同也失則烝生熱否生寒結為瘤贅陷為癰疽奔則喘乏竭則焦稿發乎面動乎形天地亦然五緯縮嬴孛彗飛流其危胗也寒暑不時其烝否也石立土踊是其瘤贅山崩土陷是其癰疽奔風暴雨其喘乏川瀆竭涸其焦稿髙醫𨗳以藥石救以砭劑聖人和以至德輔以人事故體有可愈之疾天有可振之災睿宗召司馬子㣲問其術對曰為道日損損之又損以至於無為夫心目所知見每損之尚不能已况攻異端而增智慮哉帝曰治身則爾治國若何曰國猶身也故游心於淡合氣於漠與物自然而無私焉而天下治孫公司馬所言皆至道妙理之所寓治心飬性宜無出此者矣元㣲之詩唐書藝文志元稹長慶集一百卷小集十卷而傳於今者惟閩蜀刻本為六十卷三舘所藏獨有小集文惠公鎮越以其舊治而文集蓋缺乃求而刻之外春遊一篇云酒户年年减山行漸漸難欲終心懶慢轉恐興闌散鏡水波猶冷稽峰雪尚殘不能辜物色乍可怯春寒逺目傷千里新年思萬端無人知此意閒凭小闌干白樂天書之題云元相公春游錢思公藏其真跡穆父守越時摹刻于蓬萊閣下今不復存集中逸此詩文惠為列之於集外李端民平叔嘗和其韻寄公云東閣經年别窮愁客路難望塵驚岳峙懐舊各雲散茵醉恩逾厚檣歌興未殘馮唐嗟已老范叔敢言寒玉燭調魁柄陽春在筆端應憐掃門役白首滯江干樂天所書予少時得其石刻後亦失之諫繚綾戲龍羅李德裕為浙西觀察使穆宗詔索盤絛繚綾千匹德裕奏言立鵞天馬盤絛掬豹文彩恠麗惟乘輿當御今廣用千匹臣所未諭優詔為停崇寧間中使持御札至成都令轉運使織􅃧龍羅二千繡旗五百副使何常奏旗者軍國之用敢不奉詔戲龍羅唯供御服日衣一匹歲不過三百有奇今乃數倍無益也詔奬其言為减四之三以二事觀之人臣進言於君切而不訐蓋無有不聽者何常所論甚與德裕相類云詳正學士唐太宗時命秘書監魏徴冩四部羣書將藏内府置讐正二十員後又詔虞世南顔師古踵領之功不就顯慶中罷讐正官使散官隨番刋正後詔東臺侍郎趙仁本等充使撿挍置詳正學士以代散官此名甚雅不知何時罷去然秘省自有挍書郎正字使正名責實足矣紹興中以貴臣提舉秘書省而置編定書籍官二員亦其類也容齋五筆卷二欽定四庫全書容齋五筆卷三十五則宋洪邁撰人生五計朱新仲舍人常云人生天地間壽天不齊姑以七十為率十嵗為童兒父母膝下視寒暖燥濕之節調乳哺衣食之宜以須成立其名曰生計二十為丈夫骨强志健問津名利之塲秣馬厲兵以取我勝如驥子伏櫪意在千里其名曰身計三十至四十日夜注思擇利而行位欲髙財欲厚門欲大子息欲盛其名曰家計五十之年心怠力疲俯仰世間智術用盡西山之日漸逼過隙之駒不留當隨縁任運息念休心善刀而藏如􅅙作繭其名曰老計六十以往甲子一周夕陽銜山倐爾就木内觀一心要使絲毫無慊其名曰死計朱公每以語人以身計則喜以家計則大喜以老計則不答以死計則大笑且曰子之計拙也朱既不勝笑者之衆則亦自疑其計之拙曰豈皆惡老而諱死耶因為南華長老作大死庵記遂識其語予之年齡踰七望八當以書諸紳云瀛莫間二禽瀛莫二州之境塘濼之上有禽二種其一類鵠色正蒼而喙長凝立水際不動魚過其下則取之終日無魚亦不易地名曰信天縁其一類鶩奔走水上不閒腐草泥沙唼唼然必盡索乃已無一息少休名曰漫畫信天縁若無能者乃與漫畫均度一日無飢色而反加壯大二禽皆禀性所賦其不同如此士大夫避父祖諱國朝士大夫除官避父祖名諱蓋有不同不諱嫌名二名不偏諱在禮固然亦有出於一時恩㫖免避或旋為改更者建隆創業之初侍衛帥慕容彦釗樞宻使吳廷祚皆拜使相而彦釗父名章廷祚父名璋制麻中為改同中書門下平章事為同二品紹興中沈守約湯進之二丞相父皆名舉於是改提舉書局為提領自餘未有不避者吕希純除著作郎以父名公著而辭然富韓公之父單名言而公以右正言知制誥韓保樞之子忠憲公億孫絳縝皆歴位樞宻未嘗避豈别有説乎元正父子忠死唐安禄山表權臯入幕府臯度禄山且叛以其猜虐不可諫欲行慮禍及親因獻俘京師在道詐死既唅斂而逸去臯母謂實死慟哭感行路故禄山不之虞歸其母臯潜奉侍晝夜南奔既渡江而禄山反天下聞其名爭取以為屬甄濟居青巖山諸府五辟詔十至堅卧不起安禄山入朝求濟於𤣥宗授范陽掌書記濟不得已而起察禄山有反謀不可諫因謁歸陽歐血不支舁歸舊廬祿山反使封刀召之曰即不起斷其首濟引頸待之使以實病告慶緒復使彊輿至東都㑹廣平王平東都詣軍門上謁肅宗使汗賊官羅拜以媿其心唐書列二人於卓行傳襃之至矣有元正者在河南幕府史思明陷河洛輦父匿山中賊以名召之正度事急謂弟曰賊禄不可飬親彼利吾名難免矣然不汙身而死吾猶生也賊既得誘以髙位瞋目固拒兄弟皆遇害父聞仰藥死事平詔録伏節十一姓而正為冠臯濟之終與正皆贈秘書少監予謂臯濟得生而正一門皆并命故當時以為伏節之冠而唐史不列之忠義卓行中但附見於其祖萬頃文藝之末資治通鑑亦不載其事使正之名寂寥不章顯為可恨也白樂天作張諴碑云以左武衛参軍分司東都屬安禄山陷覆洛京以偽職滛刑脅刼士庶公與同官盧巽潜遁於陸渾山食木實飲泉水者二年訖不為逆命所汙肅宗詔河南搜訪不仕賊庭隠藏山谷者得六人以應詔公與巽在焉由是名節聞於朝優詔褒美特授宻縣主簿蕭頴士風節蕭頴士為唐名人後之學者但稱其才華而已至以笞楚童奴為之過予反復考之蓋有風節識量之士也為集賢挍理宰相李林甫欲見之頴士不詣林甫怒其不下已後召詣史舘又不屈愈見疾至免官更調河南参軍安禄山寵恣穎士隂語桞并曰胡人負寵而驕亂不久矣東京其先陷乎即託疾去禄山反往見河南採訪使郭納言禦守計納不用歎曰肉食者以兒戲禦劇賊難矣哉聞封常清陳兵東京往觀之不宿而還身走山南節度使源洧欲退保江陵頴士説曰襄陽乃天下喉襟一日不守則大事去矣公何遽輕土地取天下笑乎洧乃按甲不出洧卒徃客金陵永王璘召之不見劉展反圍雍􅏀副大使李承式遣兵往救大宴賔客陳女樂頴士曰天子暴露豈臣下盡歡時邪夫投兵不測乃使觀聽華麗誰致其死哉弗納頴士之言論操持如此今所稱之者淺矣李太白天下士也特以墮永王亂中為終身累頴士永王召而不見則過之焉石尤風石尤風不知其義意其為打頭逆風也唐人詩好用之陳子昂入峽苦風云故郷今日友歡㑹坐應同寧知巴峽路辛苦石尤風戴叔倫送裴明州云瀟水連湘水千波萬浪中知君未得去慙愧石尤風司空文明留盧秦卿云知有前期在難分此夜中無將故人酒不及石尤風計南朝篇詠必多用之未暇憶也江楓雨菊作詩要有來處則為淵源宗派然字字執泥又為拘澁予於此學無自得之見少年時尤失之琱琢記一聮初云雨深荒病菊江冷落愁楓後以其太險改為雨深人病菊江冷客愁楓比前句㣲有藴藉蓋取崔信明楓落吳江冷杜老雨荒深院菊南菊再逢人卧病嚴武江頭赤葉楓愁客合而用之乃如補衲衣裳殊為可笑聊書之以示兒輩云開元宫嬪自漢以來帝王妃妾之多唯漢靈帝吳歸命侯晉武帝宋蒼梧王齊東昏陳後主晉武至於萬人唐世明皇為盛白樂天長恨歌云後宫佳麗三千人杜子美劎器行云先帝侍女八千人蓋言其多也新唐史所叙謂開元天寳中宫嬪大率至四萬嘻其甚矣隋大業離宫徧天下所在皆置宫女故裴寂為晉陽宫監以私侍髙祖及髙祖義師經過處悉罷之其多可想相里造唐内侍監魚朝㤙怙貴誕肆凡詔㑹羣臣計事折愧坐人出其上雖宰相元載辯彊亦拱黙唯禮部郎中相里造殿中侍御史李衎酬詰往返未始降屈朝㤙不懌黜衎以動造又謀將易執政以震朝廷乃㑹百官都堂且言今水旱不時屯軍饋運困竭天子卧不安席宰相何以輔之不退避賢路尚何賴乎宰相俛首坐皆失色造徙坐從之因曰隂陽不和五糓踊貴皆軍容事宰相何與哉且軍帑不散故天降之沴今京師無事六軍可相權鎮又屯十萬饋糧所以不足百司無稍食軍容為之宰相行文書而已何所歸罪朝恩拂衣去曰南衙朋黨且害我此叚載於唐史宦者𫝊中不能記相里造之本末予謂造當閹侍威權震主生殺在手之時以區區一郎吏而抗身與為敵後來名人議論及叙列忠言鯁詞未見有稱述之者通鑑亦不書聊記於此以章潜德同時劉給事争幸河中亦然先公詩詞先忠宣公好讀書北困松漠十五年南謫嶺表九年重之以風滛末疾而繙閲書䇿早暮不置尤熟於杜詩初歸國到闕命邁作謝賜物一劄子竄定兩句云已為死别偶遂生還謂邁曰此雖不必泥出處然有所本更佳東坡海外表云子孫慟哭於江邊已為死别杜老羗村詩云世亂遭飄蕩生還偶然遂正用其語在郷邦日招兩使者㑹集出所將宣和殿書畫舊物示之提刑洪慶善作詩曰願公十襲勿浪出六丁取將飛辟歴辟歴二字如古文不從雨公和之曰萬里懷歸為公出往事宣和空歴歴邁請其意曰亦出杜詩歴歴開元事分明在目前也紹興丁巳所在始歌江梅引詞不知為誰人所作己未庚申年北庭亦傳之至于壬戌公在燕赴張揔侍御家宴侍妾歌之感其念此情家萬里之句愴然曰此詞殆為我作既歸不寐遂用韻賦四闋時在囚拘中無書可撿但有初學記韓杜蘇白樂天集所引用句語一一有來處北方不識梅花士人罕有知梅事者故皆注所出其一憶江梅云天涯除館憶江梅幾枝開使南來還帶餘杭春信到燕臺准擬寒英聊慰逺隔山水應銷落赴愬誰空凭遐想笑摘蘂斷回腸思故里漫彈緑綺引三弄不覺魂飛更聽胡笳哀怨淚沾衣亂揷繁華須異日待孤諷怕東風一夜吹元注引杜公忽憶兩京梅發時胡笳在樓上哀怨不堪聽安得健歩移逺梅亂揷繁華向晴昊樂天憶杭州梅花三年閒悶在餘杭曾為梅花醉幾塲車駕時在臨安栁子厚欲為萬里贈杳杳山水隔寒英坐銷落何用慰逺客江揔桃李佳人欲相照摘蘂牽花來並笑髙適遥憐故人思故郷梅花滿枝空斷腸盧仝含愁更奏緑綺琴相思一夜梅花發劉方平晩歲芳梅樹繁華四靣同東風吹漸落一夜幾枝空東坡忽見早梅花不飲但孤諷一夜東風吹石裂半隨飛雪度闗山其二訪寒梅云春還消息訪寒梅賞初開梦吟來映雪衘霜清絶繞風臺可怕長洲桃李妬度香逺驚愁眼欲媚誰曽動詩興笑冷蘂效少陵慙下里萬株連綺歎金谷人墜鶯飛引領羅浮翠羽幻青衣月下花神言極麗且同醉休先愁玉笛吹注引李太白聞道春還未相識走傍寒梅訪消息緑珠樓下梅花滿今日曽無一枝在江揔金谷萬株連綺甍梅花隠處藏嬌鶯何遜衘霜當路發映雪擬寒開枝横却月觀花繞凌風臺杜公東閣官梅動詩興還如何遜在揚州未將梅蘂驚愁眼要取楸花媚逺天廵簷索共梅花笑冷蘂疎枝半不禁樂天賞自初開直至落莫怕長洲桃李妬明年好為使君開王昌齡梦中作梅花詩梁簡文賦香隨風而逺度及趙師雄羅浮見美人在梅花下有翠羽啾嘈相顧詩云學粧欲待問花神崔櫓初開已入雕梁畫未落先愁玉笛吹其三憐落梅云重閨佳麗最憐梅牖春開學粧來争粉翻光何遽落梳臺笑坐雕鞍歌古曲催玉柱金巵滿勸阿誰貪為結子藏暗蘂斂蛾眉隔千里舊時羅綺已零散沈謝雙飛不見嬌姿眞悔著單衣若作和羮休訝晩墮煙雨任春風片片吹注引梁簡文賦重閨佳麗貎婉心嫺憐早花之驚節訝春光之遣寒顧影丹墀弄此嬌姿洞開春牖四卷羅幃春風吹梅畏落盡賤妾為此斂蛾眉又爭樓上之落粉奪機中之織素梁王詩翻光同雪舞鮑泉縈窗落梳臺江揔滿酌金巵催玉柱落梅樹下宜歌舞太白千金駿馬邀少妾笑坐雕鞍歌落梅古曲有落梅花又片片吹落春風香謝莊賦隔千里兮共明月庾信早知覓不見眞悔著衣單東坡抱叢暗蘂初含子玉妃謫墮烟雨村王建自是桃花貪結子第四篇失其槀每首有一笑字北人謂之四笑江梅引争傳冩焉州縣名同晉宋以來置立州郡惟以多為貴先是中原陷没時本土遺民或僑寓南方故即其所聚為立郡而方伯所治之州亦仍舊名如南徐南兖南豫南雍州南蘭陵南東海南瑯琊南東莞南魯郡其類不一魏周在北亦如此隋唐不復然國朝之制州名或同則增一字以别之若河北有雄州㤙州故廣東者増南字蜀有劎州故福建者亦增南字以至西和西安州亦然其聲音頗同患於舛誤則俗間稱呼自加上下東西為别故稱岳為上岳鄂為下鄂清州與青類稱為北清郢州與潁類稱為西郢融州與容類稱為西融者是也若縣邑則不問今河南静江府鞏州皆有永寧縣饒卭衡州皆有安仁縣蔡英之眞陽廬汝之梁光台之仙居臨安建昌之新城越筠之新昌婺蜀之永康處吉之龍泉嚴池之建德渭秀之華亭信吉之永豐郴興國之永興衢嘉之龍游施臨江之清江洪萬之武寧福循之長樂郴連之桂陽福桂之永福是也三衙軍制乾道四年正月邁為中書舍人因入對論三衙軍制名稱不正以祖宗之制論之軍職之大者凡八等除都指揮使或不常置外曰殿前副都指揮使馬軍副都指揮使歩軍副都指揮使曰殿前都虞候馬軍都虞候歩軍都虞候曰捧日天武四廂都指揮使龍神衞四廂都指揮使秩秩有序若登梯然不可一級輙廢一或有闕即以功次遞遷降此而下則分營分廂各置都副指揮使如捧日左廂第一軍天武右廂第二軍之類邊境有事命將討捕則旋立總管鈐轄都監之名使各將其所部以出事已則復初累聖相承皆用此術以制軍詰禁自南渡以後觸事草創於是三帥之資淺者始有主管某司公事之稱而都虞候以下不復設置乃以宿衛虎士而與在外諸軍同其名以統制統領為之長又使遥𢃄外路總管鈐轄考之舊制則非法稽之事體則非是以陛下聖明能知人善任使所謂爪牙之士豈無十數人以待用者若法祖宗之制正三衙之名改諸軍為諸廂改統制以下為都虞候指揮使使宿衛之職預有差等士卒之心明有所係異時拜將必無一軍皆驚之舉於以銷壓未萌循名責實則環衛將軍雖不置可也乞下樞宻討論故實圖議其當恐或可以少賛布昭聖武之意讀劄子畢孝宗甚喜即批付樞宻院是時知院虞允文使四川同知劉珙不樂曰舍人要如何行對之以但隨所見敷陳若施行與否自係廟堂處分竟寢不行後閱華陽集王珪撰髙瓊神道碑云王為殿前都指揮使管軍員闕兼領二司王乃言曰臣老矣如有負薪之憂誰為可任者先朝自殿前而下各置副都指揮使及都虞候常有十人職近事親易以第進又使士卒預識其威名緩急臨戎上下得以附習此軍制之大要也有㫖從之據瓊所言如此正合前說歐陽公勲封贈典吉州新刋歐陽公文集於年譜下盡載官爵制詞無一遺落考之今制多有不合雖非事之所以損益謾書於䇿且記典章隨時之異云公自太子中允初加勲便得騎都尉越過驍武飛雲四級自龍圖閣直學士初封爵便得信都縣子越過男一等翰林學士加恩而得五百户初加實封便得二百户及罷政為觀文學士遇郊而加食邑五百户實封二百户薨之後以子登朝遇大禮自太子太師合贈司空而躐贈太尉蓋超空徒保傅四官再贈即為太師仍封國公今殊不然除􅈴官既罷外侍從初封亦從縣男為始每加不過三百户待制侍郎只二百初得實封財百户執政去位但與侍從同均為虛邑三百而已身後加贈只單轉一官兩子升朝乃進二官雖三四人亦不增未有宫師直贈太尉者今太傅也又公任知制誥知潁州轉官而與直龍圖閣知亳州王洙同一詞唐書成進秩五人同制公與宋景文公范文忠公王忠簡公皆帯從官職而宋次道乃集賢挍理耳嘉祐四眞嘉祐中富韓公為宰相歐陽公在翰林包孝肅公為御史中丞胡翼之侍講在太學皆極天下之望一時士大夫相語曰富公眞宰相歐陽永叔眞翰林學士包老真中丞胡公眞先生遂有四眞之目歐陽公之子發棐等叙公事迹載此語可謂公言五方老人祝聖夀聖節所用祝頌樂語外方州縣各當筵致語一篇又有王母像者若教坊唯祝聖而已歐陽公集乃載五方老人祝夀文五首其東方曰但某太山老叟東海真仙溜穿石而增究始終松避雨而備知歲月羲氏定三百六日嘗守寅賔之官夷吾紀七十二君盡覩登封之事遇安期而遺棗笑方朔之偷桃風入律而來自巖前斗指春而光臨洞口昔漢武帝嘗懷三島之勝遊有羨門生欲謁巨公於昭代今則紫庭降聖華渚開祥逺離朝日之方來展望雲之懇千八百國咸歸至治之風億萬斯年共禱無疆之壽其頌只四句西中南北方皆然集中不云何處所作今無復用之容齋五筆卷三欽定四庫全書容齋五筆卷四九則宋洪邁撰作詩㫖意詩三百篇中其譽婦人者至多如叙宗姻之貴者若平王之孫齊侯之子汾王之甥蹶父之子齊侯之子衛侯之妻東宫之妹邢侯之姨譚公維私夸服飾之盛者若副笄六珈如山如河玉之瑱也象之揥也贊容色之美者若唐棣之華華如桃李鬒髪如雲手如柔荑膚如凝脂領如蝤蠐齒如瓠犀螓首蛾眉巧笑倩兮美目盼兮顔如舜華洵美且都語嫁聘之侈者若百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲爛其盈門其詞可謂盡善矣魏晉六朝流連光景不可勝述唐人播之歌詩固亦極摯若態濃意逺淑且眞肌理細膩骨肉勻繡羅衣裳照暮春蹙金孔雀銀麒麟翠㣲㔩葉垂鬢脣珠壓腰衱穩稱身深宫髙樓入紫清金作蛟龍盤繡楹佳人當窗弄白日絃將手語彈鳴筝回眸一笑百媚生六宫粉黛無顔色後宫佳麗三千人三千寵愛在一身金屋粧成嬌侍夜玉樓宴罷醉和春樓上樓前盡珠翠眩轉熒煌照天地此皆李杜元白之麗句也余獨愛朱慶餘閨意一絶句上張籍水部者曰洞房昨夜停紅燭待曉堂前拜舅姑粧罷低聲問夫壻畵眉深淺入時無細味此章元不談量女之容貎而其華艶韶好體態温柔風流醖藉非第一人不足當也歐陽公所謂狀難寫之景如在目前含不盡之意見於言外然後為工斯之謂也慶餘名可久以字行登寳厯進士第而官不達著録於藝文志者只一卷予家有之他不逮此張籍酬其篇云越女新粧出鏡心自知明艶更沉吟齊紈未是人間貴一曲菱歌直萬金其愛之重之可見矣然比之慶餘殊為不及平王之孫周南召南之詩合為二十有五篇自漢以來為之說者必系之文武成康故不無牴牾如何彼穠矣乃美王姬之詩其詞有平王之孫齊侯之子兩句翻覆再言之毛公箋云武王女文王孫適齊侯之子鄭氏不立說考其意葢以平王為平正之王齊侯為齊一之侯若所謂武王載斾成王之孚成王不敢康非指武與成者然證諸春秋經魯莊公元年當周莊王之四年齊襄公之五年書曰單伯送王姬繼之以築王姬之館于外又繼之以王姬歸于齊杜預注云王將嫁女于齊命魯為主莊公在諒闇慮齊侯當親迎不忍便以禮接于廟故築舍於外末書歸于齊者終此一事也十一年又書王姬歸于齊傳言齊侯來逆共姬乃威公也莊王為平王之孫則所嫁王姬當是姊妹齊侯之子即襄公威公也二者必居一于此矣明白如是而以為武王女文王孫於義何取毛詩語助毛詩所用語助之字以為句絶者若之乎焉也者云矣爾兮哉至今作文者皆然他如只且忌止思而何斯旃其之類後所罕用只字如母也天只不諒人只且字如椒聊且逺條且狂童之狂也且既亟只且忌字如叔善射忌又良御忌止字如齊子歸止曷又懷止女心傷止思字如不可求思爾羊來思今我來思而字如俟我於著乎而充耳以素乎而何字如如此良人何如此粲者何斯字如恩斯勤斯鬻子之閔斯彼何人斯旃字如舍旃舍旃其字音基如夜如何其子曰何其皆是也忌惟見於鄭詩而惟見於齊詩楚詞大招一篇全用只字太𤣥經其人有輯抗可與過其至於些字獨招魂用之耳東坡文章不可學東坡作盖公堂記云始吾居郷有病寒而欬者問諸醫醫以為蠱不治且殺人取其百金而治之飲以蠱藥攻伐其腎腸燒灼其體膚禁切其飲食之美者朞月而百疾作内熱惡寒而欬不已纍然眞蠱者也又求於醫醫以為熱授之以寒藥旦夕吐之莫夜下之於是始不能食懼而反之則鍾乳烏喙雜然並進而漂疽癰疥眩瞀之狀無所不至三易醫而病愈甚里老父敎之曰是醫之罪藥之過也子何疾之有人之生也以氣為主食為輔今子終日藥不釋口息味亂於外而百毒戰於内勞其主隔其輔是以病也子退而休之謝醫却藥而進所嗜氣全而食美矣則夫藥之良者可以一飲而效從之朞月而病良已昔之為國者亦然吾觀夫秦自孝公以來至於始皇立法更制以鑴磨鍜鍊其民可謂極矣蕭何曹参親見其斵喪之禍而收其民於百戰之餘知其厭苦憔悴無聊而不可與有為也是以一切與之休息而天下安是時熈寧中公在宻州為此説者以諷王安石新法也其議論病之三易與秦漢之所以興亡治亂不過三百言而盡之張文潜作藥戒僅千言云張子病痞積於中者伏而不能下自外至者捍而不能納從醫而問之曰非下之不可歸而飲其藥既飲而暴下不終日而向之伏者散而無餘向之捍者柔而不支焦膈𨗳達呼吸開利快然若未始有疾者不數日痞復作投以故藥其快然也亦如初自是逾月而痞五作五下每下輒愈然張子之氣一語而三引體不勞而汗股不歩而慄膚革無所耗於外而其中薾然莫知其所來聞楚之南有良醫焉往而問之醫歎曰子無嘆是薾然者也天下之理其甚快於予心者其末必有傷求無傷於終者則初無望於快吾心痞横於胷中其累大矣擊而去之不須臾而除甚大之累和平之物不能為也必將擊搏震撓而後可其功未成而和氣已病則子之痞凡一快者子之和一傷矣不終月而快者五則和平之氣不既索乎且將去子之痞而無害於和乎子歸燕居三月而後予之藥可為也張子歸三月而復請之醫曰子之氣少全矣取藥而授之曰服之三月而疾少平又三月而少康終年而復常且飲藥不得亟進張子歸而行其說其初使人懣然遲之葢三投其藥而三反之也然日不見其所攻久較則月異而時不同蓋終歲而疾平張子謁醫謝而問其故醫曰是治國之說也獨不見秦之治民乎勅之以命捍而不聽令勤之以事放而不畏法令之不聽治之不變則秦之民嘗痞矣商君見其痞也厲以刑法威以斬伐痛剗而力鋤之流蕩四達無敢或拒痞嘗一快矣至於二世凡幾痞而幾快矣積快而不已而秦之四支枵然徒有其物而已民心日離而君孤立于上故匹夫大呼不終日而百疾皆起欲運其手足肩膂而漠然不我應故秦之亡者是好為快者之過也昔者先王之民初亦嘗痞矣先王不敢求快於吾心隂觧其亂而除去其滯使之悠然自趨於平安而不自知於是政成教達悠久而無後患則余之藥終年而愈疾者蓋無足怪也予觀文潜之說盡祖蘇公之緒論而千言之煩不若三百言之簡也故詳書之俾作文立說者知所矜式竊料蘇公之記文潜必未之見是以著此篇若既見之當不復屋下架屋也韓文稱名歐陽公作文多自稱予雖說君上處亦然三筆嘗論之矣歐公取法於韓公而韓不然滕王閣記袁公先廟為尊者所作謙而稱名宜也至於徐泗掌書記壁記科斗書後記李虛中墓誌之類皆曰愈可見其謙以下人後之為文者所應取法也棘寺棘卿今人稱大理為棘寺卿為棘卿丞為棘丞此出周禮秋官朝士掌建邦外朝之法左九棘孤卿大夫位焉右九棘公侯伯子男位焉鄭氏注云植棘以為位者取其赤心而外刺也棘與棗同棘之字兩束相並棗之字兩束相承此所言者今之棗也然孤卿大夫皆同之則難以獨指大理王制云正以獄成告于大司寇大司寇聽之棘木之下料後人藉此而言鄭注亦只引前說此但謂其入朝立治之處若以指刑部尚書亦可也易坎卦係用徽纆寘于叢棘以居險阻囚執為詞其義自别晉代遺文故簏中得舊書一帙題為晉代名臣文集凡十四家所載多不能全真太山一毫芒耳有張敏者太原人仕歴平南参軍太子舍人濟北長史其一篇曰頭責子羽文極為尖新古來文士皆無此作恐藝文類聚文苑英華或有之惜其冺没不傳謾採之以遺博雅君子其序云太原温長仁潁川荀景伯范陽張茂先士郷劉先生南陽鄒潤甫河南鄭思淵余友有秦生者雖有姊夫之尊少而狎之同時昵好張荀之徒數年之中繼踵登朝而此賢身處陋巷屢沽而無善價抗志自若終不衰堕為之慨然又怪諸賢既已在位曾無伐木嚶鳴之聲又違王貢彈冠之義故因秦生容貎之盛為頭責之文以戲之并以嘲六子焉雖似諧謔實有興也文曰維泰始元年頭責子羽曰吾託為子頭萬有餘日矣大塊禀我以精造我以形我為子蒔髪膚置鼻耳安眉額揷牙齒眸子橋光雙權隆起每至出入人間遨遊市里行者辟易坐者竦跽或稱君侯或言將軍捧手傾側佇立﨑嶇如此者故我形之足偉也子冠冕弗戴金銀弗佩艾以當笄幍以代帶百味弗嘗食粟茹菜嵗暮年過曾不自悔子厭我形容我賤子意態若此者必子行已累也子遇我如讐我視子如仇居常不樂兩者俱憂何其鄙哉子欲為仁賢耶則當如咎陶后稷巫咸伊陟保又王家永見封殖子欲為名髙耶則當如許由子臧卞隨務光洗耳逃禄千載流芳子欲為游說也則當如陳軫蒯通陸生鄧公轉禍為福含辭從容子欲為進趨耶則當如賈生之求試終軍之請使砥礪鋒頴以幹王事子欲為恬淡耶則當如老􅅨之守一莊周之自逸漠然離俗志凌雲日子欲為隠遯耶則當如榮期之𢃄索漁父之瀺灂栖遲神岳垂餌巨壑此一介之人所以顯身成名者也今子上不睎道德中不效儒墨塊然窮賤守此愚惑察子之情觀子之志退不為處士進無望三事而徒玩日勞形習為常人之所喜不亦過乎子羽愀然深念而對曰凡所教敕謹聞命矣受性拘係不聞禮義誤以天幸為子所寄今子欲使吾為忠耶當如包胥屈平欲使吾為信耶則當殺身以成名欲使吾為節耶則當赴水火以全貞此四者人之所忌故吾不敢造意頭曰子所謂天刑地網剛德之尤不登山抱木則褰裳赴流吾欲告爾以飬性誨爾以優游而與蟣虱同情不聽我謀悲哉俱御人體而獨為子頭且儗人其倫喻子儕偶曾不如太原温顒潁川荀禹范陽張華士郷劉許南陽鄒湛河南鄭詡此數子者或蹇吃無宫商或尫陋希言語或淹伊多姿態或讙譁少智諝或口如含膠飴或頭如巾虀杵而猶以文采可觀意思詳序攀龍附鳳並登天府夫䑛痔得車沉淵竊珠豈若夫子徒令脣舌腐爛手足沾濡哉居有事之世而耻為權謀譬猶鑿地抱甕難以求富嗟乎子羽何異牢檻之熊深穽之虎石間餓蟹竈中之䑕事雖多而見工甚少宜其卷局煎蹙至老無所睎也支離其形者猶能不困命也夫與子同處其文九百餘言頗有東方朔客難劉孝標絶交論之體集仙傳所載神女成公智瓊傳見於太平廣記盖敏之作也鄒湛姓名因羊叔子而傳而字曰潤甫則見於此漢武帝田蚡公孫𢎞尚論古人者如漢史所書於武帝則譏其好大喜功窮奢極侈置生民於塗炭於田蚡則詆其負貴驕溢以肺腑為相殺竇嬰灌夫於公孫𢎞則云性意忌外寛内深飾詐釣名不為賢大夫所稱述然以予考之三君臣者實有大功於名教自秦始皇焚書坑儒六學散缺髙帝初興未遑庠序之事孝惠髙后時公卿皆武力功臣孝文好刑名孝景不任儒至於武帝田蚡為丞相黜黄老刑名百家之言延文學儒者以百數帝詳延天下多聞之士咸登諸朝令禮官勸學講議洽聞舉遺興禮以為天下先而公孫𢎞以治春秋為丞相天下學士靡然郷風𢎞為學官悼道之鬱滯始請為博士官置弟子郡國有秀才異等輙以名聞請著為令而詩書易禮之學彬彬並興使唐虞三代以來稽古禮文之士得以不廢今之所以識聖人至道之要者實本於此史稱其罷黜百家表章六經號令文章煥焉可述葢已不能盡其美然則武帝奢暴固貽患於一時蚡𢎞之為人得罪於公論而所以扶持聖教者乃萬世之功也平帝元始詔書尚能稱𢎞之率下篤俗但不及此云近世文物之殊國家南渡以來典章文物多不與承平類姑以予所親見者言之蓋月異而歲不同今聊紀從官立班隨駕省試官入院政府呼召百官騶從朝報簡削數項以示子姪侍從常朝紹興中分立於垂拱殿隔門上南北相向以俟追班乾道中猶然暨淳熈則引於殿門上東西對立車駕出常朝文臣自宰相至二史武臣自宗王使相至觀察使以雜壓次序行焉孝宗在普安邸官撿挍少保節度使每出必處正尚書之後而乾道以來兩班分而為二唯使相不然故開府儀同三司皆與執政官聮行而居其上紹興十二年壬戌予寓南山净慈待詞科試見省試官聯騎公服戴帽不加披衫每一員以親事官一人執敕黄行前是時知舉参詳㸃撿官合三十一員最後一中官宣押者入下天竺貢院及三十年庚辰予以吏部郎充参詳官既入内受勑則各各乘馬不同時而赴院至淳熈十四年丁未忝司貢舉則了與昔異三三兩兩自為遲速其乘轎者十人而九矣宰府呼召之禮始時庶僚皆然已而卿監郎官及史局玉牒所縁提舉官屬之故一切得免逮乾道以後宰相益自卑於是館職亦免迄于淳熈則凡職事官悉罷此制朝士騶從至少各得雇募若干取歩軍司名籍而幫錢米於左藏率就雇游手冗卒兩分可供一名如假借於近郡者給其半初猶破省馬并一馭者後不復有焉若乘轎僅能充負荷而已今日以益增雖下列亦占十餘輩進奏院報狀必載外郡謝上或監司到任表與夫慶賀表章一篇凡朝廷除郡守先則除目但云某人差知某州替某人及録黄下吏部則前銜後擬云某官姓名宜差知或權知權發遣某州軍州兼管内勸農營田事替某人到任成資闕或云年滿仍借紫借緋候回日却依舊服色外官求休致則云某州申某官姓名為病乞致仕或兩人三人後云某時已降勑命各守本官致仕今不復行但小報批下或禁小報則無由可知此必一宰相以死為諱者故去之外官表章聞有一二欲士大夫見之者須以屬東省乃可郡守更不報細銜禮文簡脱一至於此容齋五筆卷四欽定四庫全書容齋五筆卷五十五則宋洪邁撰庾公之斯孟子逄蒙學射於羿盡羿之道思天下惟羿為愈已於是殺羿孟子曰是亦羿有罪焉公明儀曰疑若無罪焉曰薄乎云爾惡得無罪此一叚既畢而繼之曰鄭人使子濯孺子侵衛衛使庾公之斯追之子濯孺子曰今日我疾作不可以執弓吾死矣夫問其僕曰追我者誰也其僕曰庾公之斯也曰吾生矣其僕曰庾公之斯衛之善射者也夫子曰吾生何謂也曰庾公之斯學射於尹公之他尹公之他學射於我夫尹公之他端人也其取友必端矣庾公之斯至曰夫子何為不執弓曰今日我疾作不可以執弓曰小人學射於尹公之他尹公之他學射於夫子我不忍以夫子之道反害夫子雖然今日之事君事也我不敢廢抽矢扣輪去其金發乘矢而後反孟子書子濯庾公一叚幾二百字其㫖以謂使羿如子濯得尹公而教之則必無逄蒙之禍然前叚結尾自常為文者處之必云如子濯孺子施教於尹公之他則可不然後段之末必當云以是事觀之羿之不善取友至於殺身其失如此然後文體相屬茲判為兩節若不闗聮而宫商相宣律吕明煥立言之妙是豈歩趨模倣所能仿彿哉人為兒童時便讀此章未必深識其趣故因表出而極論之左氏傳書衛獻公奔齊云尹公他學射於庾公差庾公差學射於公孫丁他與差為孫林父追公公孫丁御公庾公差曰射為背師不射為戮射為禮乎射兩軥而還尹公佗曰子為師我則逺矣乃反之公孫丁授公轡而射之貫佗臂即孟子所引者而名字先後美惡皆不同萬事不可過天下萬事不可過豈特此也雖造化隂陽亦然雨澤所以膏潤四海然過則為霖滛陽舒所以發育萬物然過則為燠亢賞以勸善過則為僣刑以懲惡過則為濫仁之過則為兼愛無父義之過則為為我無君執禮之過反鄰於謟尚信之過至於證父是皆偏而不舉之弊所謂過猶不及者揚子法言云周公以來未有漢公之懿也勤勞則過於阿衡蓋諂王莽也後之議者謂阿衡之事不可過也過則反乃誚莽耳其㫖意固然致仕官上壽國朝大臣及侍從致仕後多居京師熈寧中范蜀公自翰林學士以本官户部侍郎致仕同天節乞隨班上壽許之遂著為令元祐初韓康公以故相判大名府還都拜司空致仕值太皇太后受冊禮畢乞隨班稱賀降詔免赴皆故事也桃花笑春風王荆公集古胡笳詞一章云欲問平安無使來桃花依舊笑春風後章云春風似舊花仍笑人生豈得長年少二者貼合如出一手每歎其精工其上句蓋用崔䕶詩後一句久不見其所出近讀范文正公靈巖寺一篇云春風似舊花猶笑以仍為猶乃此也李義山又有絶句云無賴夭桃靣平明露井東春風為開了却擬笑春風語意兩極其妙嚴先生祠堂記范文正公守桐廬始於釣臺建嚴先生祠堂自為記用屯之初九蠱之上九極論漢光武之大先生之髙纔二百字其歌詞云雲山蒼蒼江水泱泱先生之徳山髙水長既成以示南豐李泰伯泰伯讀之三歎味不已起而言曰公之文一出必將名世某妄意輙易一字以成盛美公瞿然握手叩之答曰雲山江水之語於義甚大於詞甚溥而德字承之乃似趢趚擬換作風字如何公凝坐頷首殆欲下拜張伯玉守河陽作六經閣記先託游士及在職者各為之凡七八本既畢並㑹於府伯玉一一閲之取紙書十四字徧示客曰六經閣諸子史集在焉不書尊經也時曾子固亦預坐驚起摘伏邁頃聞此二事於張子韶不能追憶經閣所在及其文竟就於誰手後之君子當有知之者矣大言誤國隗囂謀畔漢馬援勸止之甚力而其將王元曰今天水全富士馬最强案秦舊迹表裏河山元請以一丸泥為大王東封函谷關囂反遂決至於父子不得其死元竟降漢隋文帝伐陳大軍臨江都官尚書孔範言於後主曰長江天塹古以為限隔南北今日彼軍豈能飛渡邪臣每患官卑彼若渡江臣定作太尉公矣或妄言北軍馬死範曰此是我馬何為而死帝笑以為然故不為深備已而國亡身竄逺裔唐元宗有克復中原之志及下南閩意以謂諸國可指麾而定而事力窮薄且無良將魏岑因侍宴言臣少遊元城好其風物陛下平中原臣獨乞任魏州元宗許之岑趨墀下拜謝人皆以為佞孟蜀通奏使王昭逺居常好大言有雜耕渭上之志聞王師入討對賔客挼手言此送死來爾乘此逐北遂定中原不煩再舉也不兩月蜀亡昭逺為俘此四臣之佞本為爵禄及一時容悦而已亦可悲哉宗室覃恩免觧淳熈十三年光堯太上皇帝以聖壽八十肆赦推恩宇宙之内蒙被甚廣太學諸生至于武學皆得免文觧一次凡該此㤙者千二三百人而宗子在學者不預諸人相率詣宰府且徧謁侍從臺諫各納一劄子叙述大㫖其要以為德壽霈典普天同慶而玉牒支派辱居膠庠顧不獲與布衣書生等竊譬之世俗尊長生日召㑹族姻而本家子孫不享杯酒臠炙外議謂何今厖鴻之澤如此而宗學乃不許厠名於義於禮恐為未愜是時諸公莫肯出手為言邁以待制侍講内宿適蒙宣引因出其紙以奏仍為敷陳此輩所云尊長生日㑹客而本家子弟不得坐譬喻可謂明白孝宗亦笑曰甚是切當有理時所擕只是白劄子蒙徑付出施行遂一例免舉其人名字今不復能記憶矣唐書載韓桞文宋景文修唐書韓文公傳全載其進學觧諫佛骨表潮州謝上表祝鱷魚文皆不甚潤色而但換進學觧數字頗不如本意元云招諸生立館下改招字為召既言先生入學則諸生在前招而誨之足矣何召之為障百川而東之改障字為停本言川流横潰故障之使東若以為停於義甚淺改跋前㚄後為躓後韓公本用狼䟦詩語非躓也其他以爬羅剔抉為杷羅焚膏油為燒以取敗幾時為其敗吳元濟傳書平淮西碑文千六百六十字固有他本不同然才减節輙不穩當明年平夏一句悉芟之平蜀西川减西川字非郊廟祠祀其無用樂减祠其兩字皇帝以命臣愈臣愈再拜稽首减下臣字殊害理汝其以節都統討軍以討為諸尤不然討者如左傳討軍實之義若云諸軍何人不能下此語桞子厚傳載其文章四篇與蕭俛許孟容書正符懲咎賦也孟容書意象歩武全與漢楊惲答孫㑹宗書相似正符倣班孟堅典引而其四者次序或失之至云宗元不得召内閔悼作賦自儆然其語曰逾再嵗之寒暑則謫居日月未為久難以言不得召也資治通鑑但載梓人及郭槖駞𫝊以為其文之有理者其識見取舍非宋景文可比云冥靈社首鳳光堯上仙於梓宫發引前夕合用警場𨗳引鼔吹詞邁在翰苑製撰其六州歌頭内一句云春秋不說楚冥靈常時進入文字立待報者則貼黄批急速未嘗停滯是時首尾越三日又入奏趣請付出太常吏欲習熟歌唱守院門伺候適有表弟沈日新在軍將橋客邸一士人乃上庠舊識忽問楚冥靈出處沈亦不能知來叩予因以莊子語告之急走報此士大喜初孝宗以付巨璫霍汝弼使釋其意此士霍客也故宛轉費日如此又面奉㫖令代作挽詞五章其四云鼎湖龍去逺社首鳳來遲當時不敢宣泄而帯御器械謝純孝宻以為問乃為舉王子年拾遺記蓋周成王事也禁苑文書周悉乃爾左傳州郡左傳魯哀公二年晉趙鞅與鄭戰誓衆曰克敵者上大夫受縣下大夫受郡土田十萬注云周書作雒篇千里百縣縣有四郡然則郡乃𨽻縣而歴代地里郡國志未之或書又傳所載地名從州者凡五魯宣公㑹齊于平州以定其位注云齊地在泰山牟縣西見於正經它如允姓之戎居于𤓰州注今燉煌也楚莊王滅陳復封之郷取一人焉以歸謂之夏州齊子尾使閭邱嬰伐我陽州注魯地後四十年又書魯侵齊門于陽州注攻其門也苫越生子將待事而名之陽州之役獲焉名之曰陽州是齊魯皆有此地也衛莊公登城以望見戎州曰我􅁎姓也何戎之有焉以上唯𤓰州之名至今貧富習常少時見前輩一說云富人有子不自乳而使人棄其子而乳之貧人有子不得自乳而棄之以乳他人之子富人懶行而使人肩輿貧人不得自行而又肩輿人是皆習以為常而不察之也天下事習以為常而不察者推此亦多矣而人不以為異悲夫甚愛其論後乃得之於晁以道客語中故謹書之益廣其傳唐用宰相唐世用宰相不以序其得之若甚易然固有出入大僚歴諸曹尚書御史大夫領方鎮入為僕射東宫師傅而不得相者若顔真卿王起楊於陵馬揔盧鈞韓臯栁公綽公權盧知猷是也如人主所欲用不過侍郞給事中下至郞中博士者才居位即禮絶百僚諫官御史聽命之不暇顧何敢抨彈其失與國朝異矣其先在職者仍許引其同列若姚元崇之引宋璟蕭嵩之引韓休李林甫引牛仙客陳希烈楊國忠引韋見素盧把引闗播李泌引董晉竇參李吉甫引裴垍李徳裕引李回皆然史記簡妙處太史公書不待稱説若云褒贊其髙古簡妙處殆是摹寫星日之光輝多見其不知量也然予每展讀至魏世家蘇秦平原君魯仲連𫝊未嘗不驚呼擊節不自知其所以然魏公子無忌與王論韓事曰韓必徳魏愛魏重魏畏魏韓必不敢反魏十餘語之間五用魏字蘇秦說趙肅侯曰擇交而得則民安擇交而不得則民終身不安齊晉為兩敵而民不得安倚秦攻齊而民不得安倚齊攻秦而民不得安平原君使楚客毛遂願行君曰先生處勝之門下幾年於此矣曰三年於此矣君曰先生處勝之門下三年於此矣左右未有所稱誦勝未有所聞是先生無所有也先生不能先生留遂力請行面折楚王再言吾君在前叱者何也至左手持盤血而右手招十九人於堂下其英姿雄風千載而下尚可想見使人畏而仰之卒定從而歸至於趙平原君曰勝不敢復相士勝相士多者千人少者百數今乃於毛先生而失之毛先生一至楚而使趙重於九鼎大吕毛先生以三寸之舌强於百萬之師勝不敢復相士秦圍趙魯仲連見平原君曰事將奈何君曰勝也何敢言事魏客辛垣衍令趙帝秦今其人在是勝也何敢言事仲連曰吾始以君為天下之賢公子也吾今然後知君非天下之賢公子也客安在平原往見衍曰東國有魯仲連先生者勝請為紹介交之於將軍衍曰吾聞魯仲連先生齊國之髙士也衍人臣也使事有職吾不願見魯仲連先生及見衍衍曰吾視居此圍城之中者皆有求於平原君者也今吾觀先生之玉貌非有求於平原君者也又曰始以先生為庸人吾乃今日知先生為天下之士也是三者重沓熟復如駿馬下注千丈坡其文勢正爾風行於上而水波真天下之至文也玉津園喜晴詩淳熈十二年三月二十六日車駕宿戒幸玉津園命下大雨有㫖許從駕官帶雨具將曉有晴意已而天宇豁然至晩歸邁進一詩歌詠其實云五更猶自雨如麻無限都人仰翠華翻手作雲方悵望舉頭見日共驚嗟天公的有施生妙帝力堪同造物誇上苑春光無盡藏可須羯鼔更催花四月四日扈從詣景靈宫朝獻䝉於幕次賜和篇聖製云比幸玉津園縱觀春事適霽色可喜卿有詩來上因俯同其韻春郊柔緑遍桑麻小駐芳園覽物華應信吾心非暇逸頓回晴意絶咨嗟每思富庶將同樂敢務游畋漫自誇不似華清當日事五家車騎爛如花後二日兵部尚書宇文价内引上舉似此詩曰洪待制用雨如麻字偶思得桑麻可押又其末句用羯鼓催花事故以華清車騎答之价拱手稱贊明日以相告云虢巨賀蘭天下國家不幸而有四郊之警為人臣者當隨其事力悉心盡忠以致尺寸之效茍為叨竊禄位視如秦越一切唯己私之是徇雖千百載後覩其事者猶使人怒髪衝冠也唐天寶禄山之亂可謂極矣虢王巨為河南節度使賀蘭進明繼之擁數道之兵臨要害之地尊為征鎮有民有財而汗漫忌疾非徒無益而反敗之巨在彭城張巡在雍邱以將士有功遣使詣巨請空名告身及賜物巨惟與折衝果毅告身三十通不與賜物巡竟不能立徙於睢陽先是太守許逺積糧六萬石巨以其半給濮陽濟隂逺固争不得二郡得糧遂以城叛而睢陽食盡顔魯公起兵平原合衆十萬既成魏郡堂邑之功矣是時進明為北海太守亦起兵公以書召之并力進明度河公每事咨之軍權始移遂取舍任意以得招討後詣行在因讚房琯自嶺南而易河南張巡受圍困棘遣南霽雲吿急於其所治臨淮相去三百里棄而不救平原睢陽失守實二人之故一時議者皆不以為言使之連据髙位顯為佚罰曽不十年巨斥刺遂州為段子璋所殺進明坐第五琦黨自御史大夫竄謫以死天網恢恢茲焉不漏容齋五筆卷五欽定四庫全書容齋五筆卷六十二則宋洪邁撰鄱陽七談鄱陽素無圖經地志元祐六年餘干進士都頡始作七談一篇叙土風人物云張仁有篇徐濯有說顧雍有論王徳璉有記而未有形於詩賦之流者因作七談其起事則命以建端先生其止語則以畢意子其一章言澹浦彭蠡山川之險勝番君之靈傑其二章言濵湖蒲魚之利膏腴七萬頃柔桑蠶繭之盛其三章言林麓木植之饒水草蔬果之衍魚鼈禽畜之富其四章言銅冶鑄錢陶埴為器其五章言宫寺游觀王遥仙壇吳氏潤泉叔倫戴隄其六章言鄱江之水其七章言堯山之民有陶唐之遺風凡三千餘字自謂八年而成比之太冲十稔平子十年為無慊予偶於故簏中得之惜其不𫝊於世故表著於此其所引張徐王顧所著今不復存更為可恨也經解之名晉唐至今諸儒訓釋六經否則自立佳名蓋各以百數其書曰𫝊曰解曰章句而已若戰國迨漢則其名簡雅一曰故故者通其指義也書有夏侯解故詩有魯故后氏故韓故也毛詩故訓𫝊顔師古謂流俗改故訓𫝊為詁字失真耳小學有杜林蒼頡故二曰㣲謂釋其㣲指如春秋有左氏㣲鐸氏㣲張氏㣲虞卿㣲𫝊三曰通如洼丹易通論名為洼君通班固白虎通應劭風俗通唐劉知幾史通韓滉春秋通凡此諸書唯白虎通風俗通僅有耳又如鄭康成作毛詩箋申明𫝊義他書無用此字者論語之學但曰齊論魯論張侯論後來皆不然也卜筮不敬古者龜為卜筴為筮皆興神物以前民用其用之至嚴其奉之至敬其求之至悉其應之至精齋戒乃請問不相襲故史祝所言其騐若答周史筮陳敬仲知其八世之後莫之與京將必代齊有國史蘇占晉伯姬之嫁而及於為嬴敗姬惠懷之亂至䆳至賾通於神明後世浸以不然今而愈甚至以飲食峱雜之際呼曰者隅坐使之占卜往往不加冠裳一問四五而責其術之不信豈有是理哉善乎班孟堅之論曰君子將有為也將有行也問焉而以言其受命也如響及至衰世懈於齋戒而屢煩卜筮神明不應故筮瀆不告易以為忌龜厭不告詩以為刺謂周易之蒙卦曰初筮告再三瀆瀆則不告詩小旻之章云我龜既厭不我告猶言卜問煩數狎嫚於龜龜靈厭之不告以道也漢世尚爾况在於今未嘗頃刻盡敬而一歸咎於淫巫瞽史其可乎哉糖霜譜糖霜之名唐以前無所見自古食蔗者始為蔗漿宋玉招魂所謂胹鼈羔包有柘漿是也其後為蔗餳孫亮使黄門就中藏吏取交州獻甘蔗餳是也後又為石蜜南中八郡志云笮甘蔗汁曝成飴謂之石蜜本草亦云煉糖和乳為石蜜是也後又為蔗酒唐赤土國用甘蔗作酒雜以紫𤓰根是也唐太宗遣使至摩揭陁國取熬糖法即詔揚州上諸蔗榨瀋如其劑色味愈於西域逺甚然只是今之沙糖蔗之技盡於此不言作霜然則糖霜非古也歴世詩人摹竒冩異亦無一章一句言之惟東坡公過金山寺作詩送遂寧僧圓寶云涪江與中冷共此一味水氷盤薦琥珀何似糖霜美黄魯直在戎州作頌答梓州雍熈長老寄糖霜云逺寄蔗霜知有味勝於崔子水晶鹽正宗掃地從誰說我舌猶能及鼻尖則遂寧糖霜見於文字者實始二公甘蔗所在皆植獨福唐四明番禺廣漢遂寧有糖氷而遂寧為冠四郡所産甚㣲而顆碎色淺味薄纔比遂之最下者亦皆起於近世唐大厯中有鄒和尚者始來小溪之繖山教民黄氏以造霜之法繖山在縣北二十里山前後為蔗田者十之四糖霜户十之三蔗有四色曰杜蔗曰西蔗曰芀蔗本草所謂荻蔗也曰紅蔗本草崑崙蔗也紅蔗止堪生噉芀蔗可作沙糖西蔗可作霜色淺土人不甚貴杜蔗紫嫩味極厚專用作霜凡蔗最困地力今年為蔗田者明年改種五糓以息之霜户器用曰蔗削曰蔗鎌曰蔗凳曰蔗碾曰榨斗曰榨牀曰漆甕各有制度凡霜一甕中品色亦自不同堆疊如假山者為上團枝次之甕鑑次之小顆塊次之沙脚為下紫為上深琥珀次之淺黄又次之淺白為下宣和初王黼創應奉司遂寧常貢外嵗别進數千斤是時所産益竒牆壁或方寸應奉司罷乃不再見當時因之大擾敗本業者居半久而未復遂寧王灼作糖霜譜七篇具載其說予採取之以廣聞見李彦仙守陜靖康末年之旤忠義之士死於守城而得書史𫝊者如汾州之張克戬隆徳之張確懷之霍安國代之史抗建寧寨之楊震振武之朱昭是已惟建炎以來士之得其死者蓋不少茲讀王灼所作李彦仙𫝊雖嘗具表上進然慮實録正史未曽采用謹誌於此彦仙字少嚴本名孝忠其先寧州人也後徙於鞏幼有大志喜談兵習騎射所歴山川形勢必識之尚氣謹然諾非豪俠不交金人南侵郡縣募勤王軍彦仙散家貲得三千人入援京師敵圍太原李綱為宣撫使彦仙上書切詆有司逮捕急乃易今名棄官亡命頃之復從种師中師中敗死仙走陜州守將李彌大問北事條對詳復使扼殽澠間金人再圍汴陜西范致虛總六路兵進援仙請曰殽澠險隘難於立軍前却即衆潰矣宜分道並進伺空以出且留半軍於陜為善後計致虛曰如子言乃逗撓也仙曰兵輕而分正可速達不從争益牢致虛怒罷其職既而敗績卒無功建炎元年四月金人屠陜州經制使王􅊅度不能支引部曲去官吏逃逸仙為石壕尉獨如平時歸者襁屬即徙老穉入土花砦三觜石柱大通諸山拔武鋭者分主之自營三觜諭衆曰敵實易與今得地利若輩堅守足矣少日敵復据陜分軍來攻有健酋升前阜嫚罵仙單騎衝擊挾之以歸始料衆正部伍敵數萬圍三觜仙邀戰伏精兵後崦掩殺萬計奪馬三百敵解去京洛間多爭附者勢益雄張未閱月破敵五十餘壁初敵再入陜官其土人俾招復業者人給符别之仙隂縱麾下往約日内應二年三月引兵直州南城中火起敵方備南壁而水軍自新店夜順流薄城東北䝉泉坡龍堂溝以入表裏夾攻僵尸相藉遂復陜始河東之人倡義拒敵仙約胡夜义者為助假以㳂河提舉意不滿叛趨南原仙誘致殺之奪五千衆邵隆邵雲本其黨欲為復讎仙因客鐫說遂來歸乘勝渡河柵中條諸山蒲解至太原皆響動乃分遣隆雲等取安邑虞郷芮城正平解皆下之蒲幾拔㑹援至不克以功遷閤門宣贊舍人就畀陜兼安撫司公事悉表所俘酋長䕶送行在上咨歎賜袍帶槍劎許直達奏事便宜處決時闗以東獨陜在益増陴疏塹蒐軍繕鎧廣屯田訓農耕作家素留鞏盡取至官曰吾父母妻子同城存亡矣聞者感悦各有固志十二月金帥烏嚕徹拔圍陜仙背城鏖鬭七日敵傷甚跳奔三年羅索貝勒自綘移屯蒲觧諜知之設伏於諸谷鼔噪横突俘馘十八羅索僅以身免制置使王庶檄使輕軍掎角次虞鄉敵以萬甲逆石鍾谷口終日戰斬級二千遷武功大夫寧州觀察使河觧同耀制置使時河東土豪宻附期王師來為應仙益治軍欲請於朝乞詔陜西諸路各助歩騎二萬㑹張浚經略處置川陜弗之許十二月羅索衆十萬復圍陜仙夜使人隧地焚其攻具營部囂亂縱兵乘之敵稍退四年正月益生兵𫝊壘晝夜進攻鵝車天橋火車衝車叢進仙隨機拒敵又為金汁礟火藥所及糜爛無遺而圍不解日慿堞須外援浚為遣軍敵先阻雍不得進則令涇原曲端出鄜坊繞敵後端素嫉仙聲績逾已幸其敗詭託不行丁巳城陷仙挾親軍巷戰矢集身如蝟左臂中刃而殊戰逾力遂死之并其家遇害先是敵嘗許以河南元帥及圍合復言如前約當退師仙叱曰吾寧鬼於宋安用汝富貴為敵惜其才必欲降之城將破先令軍中生致者予萬金仙平時弊衣同士卒及是雜羣伍中死敵不能察其為人面少和色有犯令雖親屬不貸諸將敗事或有他過其外屯者輙封箠遣帳下往皆裸就笞不敢出一詞當是時同華長安盡為敵藪陜斗絶一隅初無朝家素定約束中立孤軍日與敵确但誦忠義感勵其衆每拜君賜暨取敵金貲悉均之毛銖不入已以是精兵三萬大小二百戰皆樂為用軍事獨裁決至郡政必問法所底闔境稱治浚承制贈彰武軍節度使建廟商州邵雲者龍門人城破被執羅索欲命以千户長肆詈不屈乃釘之木架上置觧州東門外惡少撫其背涅文戲曰可鞘吾佩刀雲怒偃架朴之後五日磔解之至抉眼摘肝詈不絶口斷乃已初行刑將剸刃雲叱之失刀而斃其忠勇蓋如此姦雄嫉勝已者自古姦雄得志包藏禍心窺伺神器其勢必嫉士大夫之勝已者故常持寧我負人無人負我之説若蔡伯喈之值董卓孔文舉禰正平楊徳祖之值曹操嵇叔夜阮嗣宗之值司馬昭師溫太真之值王處仲謝安石孟嘉之值桓溫皆可謂不幸矣伯喈僅僅脫卓手終以之隕命正平轉死於黄祖文舉覆宗徳祖被戮叔夜罹東市之害嗣宗沉湎佯狂至為勸進表以逃大咎太真以智挫錢鳳而免其危若蹈虎尾唯謝公以髙名達識表裏至誠故温敬之重之不敢萌相窺之意然尚有為性命忍須臾及晉祚存亡在此一行之虞孟嘉為人夷曠冲黙名冠州里稱盛徳人仕於温府歴征西叅軍從事中郞長史在朝隤然仗正必不效郗超輩輕與温合然自度終不得善其去故放志酒中如龍山落帽豈為不自覺哉温至云人不可以無勢我乃能駕馭卿老賊於是見其肺肝矣嘉雖得全於酒幸以考終然纔享年五十一蓋酒為之累也陶淵明實其外孫傷其道悠運促悲夫俗語放錢今人出本錢以規利入俗語謂之放債又名生放子攷之亦有所來漢書谷永𫝊云至為人起責分利受謝顔師古注曰言富賈有錢假託其名代之為主放與他人以取利息而共分之此放字所起也漢書多叙谷永予亡弟景何少時讀書甚精勤晝夜不釋卷不幸有心疾以至夭逝嘗見梁𢎞夫誦漢書即云惟谷永一人無處不有𢎞夫驗之於史乃服其說今五十餘年矣漫摭永諸所論建以渫予在原之思薛宣為少府御史大夫缺永言宣簡在兩府諫大夫劉輔繫獄永同中朝臣上書救之光禄大夫鄭寛中卒永乞以師傅恩加其禮謚陳湯下獄永上疏訟其功鴻嘉河決永言當觀水勢然後順天心而圖之成帝好鬼神方術永言皆妄人惑衆挾左道以欺罔世主宜距絶此類梁王為有司奏禽獸行永上疏諫止勿治淳于長初封下朝臣議永言長當封段㑹宗復為西域都䕶永憐其老復逺出手書戒之建昭雨雪燕多死永請皇后就宫令衆妾人人更進建始星孛營室永言為後宫懷姙之象彗星加之將有絶繼嗣者永始日食永以易占對言酒亡節之所致次年又食永言民愁怨之所致星隕如雨永言王者失道下將叛去故星叛天而隕以見其象樓䕶𫝊言谷子雲之筆札叙𫝊述其論許班事許皇后𫝊云上采永所言以答書其載於史者詳複如此本𫝊云永善言災異前後所上四十餘事蓋謂是云玉堂殿閣漢谷永對成帝問曰抑損椒房玉堂之盛寵顔師古注椒房皇后所居玉堂嬖幸之舍也按漢書李尋𫝊久汙玉堂之署注玉堂殿在未央宫翼奉疏曰孝文帝時未央宫又無髙門武臺麒麟鳳凰白虎玉堂金華之殿三輔黄圖曰未央宫有殿閣三十二椒房玉堂在其中漢宫閣記云未央宫有玉堂宣室閣又引漢書建章宫南有玉堂壁門三層臺髙二十丈玉堂内殿十二門階階皆玉為之又有玉堂神明堂二十六殿然今漢書郊祀志但云建章宫南有玉堂壁門而無它語晉灼注楊雄解謿上玉堂之句曰黄圖有大玉堂小玉堂殿而今黄圖無此文國朝太宗淳化中賜翰林玉堂之署四字其後以最下一字犯廟諱故元符中只云玉堂紹興末學士周麟之又乞髙宗御書玉堂二字揭於直廬麟之跋語自有所疑已而議者皆謂玉堂乃殿名不得以為臣下直舍當如承明故事請曰玉堂之廬可也今翰林但扁摛文堂三字示不敢居然則其為禁内宫殿明白有殿有閣有臺谷永以配椒房言之意當日亦嘗為燕游之地師古直以為嬖幸之舍與前注自相舛異大誤矣漢武帝喜殺人者漢武帝天資剛嚴聞臣下有殺人者不惟不加之罪更喜而褒稱之李廣以故將軍屏居藍田夜出至亭為霸陵醉尉所辱居無何拜右北平太守請尉與俱至軍而斬之上書自陳謝罪上報曰將軍者國之𤓰牙也怒形則千里竦威振則萬物伏夫報忿除害朕之所圗於將軍也若乃免冠徒跣稽顙請罪豈朕之指哉胡建守軍正丞謂未得真官兼守云也時監軍御史穿北軍壘垣以為賈區建欲誅之當選士馬日御史與䕶軍諸校列坐堂臯上建趨至拜謁因令走卒曵御史下斬之遂上奏曰案軍法正亡屬將軍將軍有罪以聞二千石以下行法焉丞於用法疑臣謹以斬謂丞屬軍正斬御史於法有疑也制曰三王或誓於軍中欲民先成其慮也或誓於軍門之外欲民先意以待事也或將交刃而誓致民志也建又何疑焉建繇是顯名觀此二詔豈不開妄殺之路乎知人之難霍光事武帝但為奉車都尉出則奉車入侍左右雖以小心謹飭親信初未嘗少見於事也一旦位諸百僚之上使之受遺當國金日磾以胡父不降没入官養馬上因游宴見馬於造次頃刻間異其為人即日親近其後遂為光副兩人皆能稱上所委然一日用四人若上官桀桑𢎞羊亦同時輔政幾於欲害霍光茍非昭帝之明社稷危矣則其知人之哲得失相半為未能盡此雖帝堯之聖而以為難也館職遷除建炎南渡稍置館職紹興初始定制除監少丞外以著作郎佐郞秘書郞二員挍書正字通十二員為額倣唐瀛洲十八學士之數其遷出它司非郞官即御史唯林之竒以疾王十朋以論事皆徙越府大宗正丞自乾道以後有㫖須曽任為縣始得除臺察曽任郡守始得為郞三館之士固無有歴此者於是朝廷欲越次擢用者乃以為將作軍器少監旋進為監班在郎上則無所不可為欲徑躋清要者則由著作遷秘郞而拜左右二史不然不過兼權省郎年嵗閒求一郡而去而御史之除皆歸六院矣爾後頗靳其選俟再遷寺監丞簿然後命之向時郡守召用雖自軍壘亦除郞今資淺望輕者但得丞及司直或又再命始入省云容齋五筆卷六欽定四庫全書容齋五筆卷七十四則宋洪邁撰盛衰不可常東坡謂廢興成毀不可得而知予每讀書史追悼古昔未嘗不掩卷而歎伶子于叙趙飛燕𫝊極道其姊弟一時之盛而終之以荒田野草之悲言盛之不可留衰之不可推正此意也國初時工部尚書楊玢長安舊居多為鄰里侵占子弟欲以狀訴其事玢批紙尾有試上含元基上望秋風秋草正離離之句方去唐未百年而故宫殿已如此殆於宗周黍離之詠矣慈恩寺塔有荆叔所題一絶句字極小而端勁最為感人其詞曰漢國河山在秦陵草木深暮雲千里色無處不傷心㫖意髙逺不知為何人必唐世詩流所作也李嶠汾隂行云富貴榮華能幾時山川滿目淚沾衣不見只今汾水上唯有年年秋燕飛明皇聞之至於泣下杜甫觀畵馬圖云憶昔巡幸新豐宫翠華拂天來向東騰驤磊落三萬匹皆與此圖筋骨同君不見金粟堆前松栢裏龍媒去盡鳥呼風公孫大娘弟子舞劍器行云先帝侍女八千人公孫劎器初第一五十年間似反掌風塵澒洞昏王室梨園弟子散如烟女樂餘姿映寒日元㣲之連昌宫詞云兩宫定後六七年却尋家舍行宫前莊園燒盡有枯井行宫門闥樹宛然又云舞榭欹傾基尚在文窗窈窕紗猶緑上皇偏愛臨砌花依然御榻臨堦斜寢殿相連端正樓太真梳洗樓上頭晨光未出簾影黑至今反挂珊瑚鉤指似旁人因慟哭却出宫門淚相續凡此諸篇不可勝紀飛燕别𫝊以為伶元所作又有元自叙及宣譚跋語予竊有疑焉不唯其書太媟至云楊雄獨知之雄貪名矯激謝不興交為河東都尉捽辱決曹班躅躅從兄子彪續司馬史記絀子于無所叙皆恐不然而自云成哀之世為淮南相案是時淮南國絶久矣可昭其妄也因序次諸詩聊載於此唐賦造語相似唐人作賦多以造語為竒杜牧阿房宫賦云明星熒熒開粧鏡也緑雲擾擾梳曉鬟也渭流漲膩棄脂水也烟斜霧横焚椒蘭也雷霆乍驚宫車過也轆轆逺聴杳不知其所之也其比興引喻如此其侈然楊敬之華山賦又在其前叙述尤壯曰見若咫尺田千畝矣見若環堵城千雉矣見若杯水池百里矣見若蟻蛭臺九層矣醯雞往來周東西矣蠛蠓紛紛秦速亡矣蜂窠聮聮起阿房矣俄而復然立建章矣小星奕奕焚咸陽矣纍纍繭栗祖龍藏矣後又有李庾者賦西都云秦址薪矣漢址蕪矣西去一舍鞠為墟矣代逺時移作新都矣其文與意皆不逮楊杜逺甚髙彦休闕史云敬之賦五千字唱在人口賦内之句如上數語杜司徒佑李太尉德裕常所誦念牧之乃佑孫則阿房賦實摹倣楊作也彦休者昭宗時人張藴古大寳箴唐太宗初即位直中書省張藴古上大寳箴凡六百餘言遂擢大理丞新唐史附其姓名於文藝謝偃傳末又不載此文但云諷帝以民畏而未懷其詞挺切而已資治通鑑僅載其略曰聖人受命拯溺亨屯故以一人治天下不以天下奉一人壯九重於内所居不過容膝彼昬不知瑶其臺而瓊其室羅八珍於前所食不過適口惟狂㒺念邱其糟而池其酒勿没没而闇勿察察而明雖冕旒蔽目而視於未形雖黈纊塞耳而聽於無聲然此外尚多規正之語如曰惟辟作福為君實難主普天之下處王公之上任土貢其有求具僚陳其所倡是故恐懼之心日弛邪僻之情轉放豈知事起乎所忽禍生乎無妄大明無私照至公無私親禮以禁其奢樂以防其佚勿謂無知居髙聽卑勿謂何害積小就大樂不可極樂極生哀欲不可縱縱欲成災勿内荒於色勿外荒於禽勿貴難得貨勿聽亡國音内荒伐人性外荒蕩人心難得之貨侈亡國之音滛勿謂我尊而慢賢侮士勿謂我智而拒諫矜已安彼反側如春陽秋露巍巍蕩蕩恢漢髙大度撫兹庶事如履薄臨深戰戰栗栗用周文小心一彼此於胸臆捐好惡於心想如衡如石不定物以限物之懸者輕重自見如水如鏡不示物以情物之鑒者妍媸自生勿渾渾而濁勿皎皎而清勿没没而闇勿察察而明吾王撥亂勘以智力民懼其威未懷其徳我皇撫運扇以淳風民懷其始未保其終使人以心應言以行天下為公一人有慶其文大抵不凡既不為史所書故學者亦罕𫝊誦藴古為丞四年以無罪受戮太宗尋悔之乃有覆奏之㫖𫝊亦不書而以為坐事誅皆失之矣舊唐書全載此箴仍專立傳不知宋景文何為削之也國初文籍國初承五季亂離之後所在書籍印板至少宜其焚煬蕩析了無孑遺然太平興國中編次御覽引用一千六百九十種其綱目並載於首卷而雜書古詩賦又不及具録以今考之無傳者十之七八矣則是承平百七十年翻不若極亂之世姚鉉以大中祥符四年集唐文粹其序有云況今厯代文籍略無亡逸觀鉉所類文集蓋亦多不存誠為可歎叙西漢郊祀天地郊祀合祭分祭之論國朝元豐元祐紹聖中三議之矣莫辯於東坡之立説然其大㫖駁當時議臣謂周漢以來皆嘗合祭及謂夏至之日行禮為不便予固贊美之於四筆矣但熟考漢史猶為未盡自髙皇帝增秦四畤為五以事天地武帝以來至于元成皆郊見甘泉武帝因幸汾隂始立后土祠於睢上率嵗嵗間舉之或隔一嵗常以正月郊泰畤三月祠后土成帝建始元年初立南北郊亦用正月三月辛日而罷甘泉汾隂之祭元豐祐紹三議皆未嘗及此蓋盛夏入廟出郊在漢禮元不然也是時坡公以非議者所起故不暇更為之説似不必深攻合祭為王莽所行庶幾往復考賾不至矛盾當復俟知禮者折衷之焉騫騫二字義訓騫騫二字音義訓釋不同以字書正之騫去乾切注云馬腹縶又虧也今列於禮部韻略下平聲二仙中騫虚言切注云飛皃今列於上平聲二十二元中文人相承以騫騰之騫為軒昂掀舉之義非也其字之下從馬馬豈能掀舉哉閔損字子騫雖古聖賢命名制字未必有所拘泥若如虧少之義則渙然矣其下從鳥則於掀飛之訓為得此字殆廢於今故東坡山谷亦皆押騫字入元字如時來或作鵬騫𫝊非其人恐飛騫之類特不暇毛舉深考耳唯韓公和侯恊律詠筍一聮云得時方張王挾勢欲騰騫乃為得之此固小學瑣瑣尤可以見公之不苟於下筆也書麴信陵事夜讀白樂天秦中吟十詩其立碑篇云我聞望江縣麴令撫惸嫠麴名信陵在官有仁政名不聞京師身殁欲歸塟百姓遮路歧攀轅不得去留塟此江湄至今道其名男女涕皆垂無人立碑碣惟有邑人知予因憶少年寓無錫時從錢伸仲大夫借書正得信陵遺集財有詩三十三首祈雨文三首信陵以正元元年鮑防下及第為四人以六年作望江令讀其投石祝江文云必也私欲之求行於邑里慘黷之政施於黎元令長之罪也神得而誅之豈可移於人以害其嵗詳味此言其為政無愧於神天可見矣至大中十一年寄客郷貢進士姚輦以其文示縣令蕭縝縝輟俸買石刋之樂天十詩作於正元元和之際距其亡十五年耳而名已不𫝊新唐藝文志但記詩一卷略無它說非樂天之詩幾於與草木俱腐乾道二年歴陽陸同為望江令得其詩於汝隂王廉清為刋板而致之郡庫但無祈雨文也貢禹朱暉晩達貢禹壯年仕不遇棄官而歸至元帝初乃召用由諫大夫遷光禄奏言臣犬馬之齒八十一凡有一子年十二則禹入朝時蓋年八十其生子時固已七十嵗矣竟再遷至御史大夫列於三公杜子美云長安卿相多少年富貴應須致身早是不然也朱暉在章帝朝自臨淮太守屏居後召拜僕射復為太守上疏乞留中詔許之因議事不合自繫獄不肯復署議曰行年八十得在機宻當以死報遂閉口不復言帝意解遷為尚書令至和帝時復諫征匈奴計其年當九十矣其忠正非禹比也琵琶行海棠詩白樂天琵琶行一篇讀者但羨其風致敬其詞章至形於樂府詠歌之不足遂以謂真為長安故倡所作予竊疑之唐世法網雖於此為寛然樂天嘗居禁宻且謫官未久必不肯乘夜入獨處婦人船中相從飲酒至於極彈絲之樂中夕方去豈不虞商人者他日議其後乎樂天之意直欲攄冩天涯淪落之恨爾東坡謫黄州賦定惠院海棠詩有陋邦何處得此花無乃好事移西蜀天涯流落俱可念為飲一尊歌此曲之句其意亦爾也或謂殊無一話一言與之相似是不然此真能用樂天之意者何必效常人章摹句冩而後已哉東坡不隨人後自屈原詞賦假為漁父日者問答之後後人作者悉相規倣司馬相如子虛上林賦以子虛烏有先生亡是公揚子雲長楊賦以翰林主人子墨客卿班孟堅兩都賦以西都賔東都主人張平子兩都賦以憑虛公子安處先生左太沖三都賦以西蜀公子東吳王孫魏國先生皆改名換字蹈襲一律無復超然新意稍出於法度規矩者晉人成公綏嘯賦無所賔主必假逸羣父子乃能遣詞枚乘七發本只以楚太子吳客為言而曹子建七啓遂有𤣥㣲子鏡機子張景陽七命有沖漠公子殉華大夫之名言話非不工也而此習根著未之或改若東坡公作後把菊賦破題直云吁嗟先生誰使汝坐堂上稱太守殆如飛龍搏鵬騫翔扶揺於烟霄九萬里之外不可摶詰豈區區巢林翾羽者所能窺探其涯涘哉於詩亦然樂天云醉貌如霜葉雖紅不是春坡則曰兒童誤喜朱顔在一笑那知是酒紅杜老云休將短髪還吹帽笑倩旁人為正冠坡則曰酒力漸消風力軟颼颼破帽多情却戀頭鄭谷十日菊云自縁今日人心别未必秋香一夜衰坡則曰相逢不用忙歸去明日黄花蝶也愁又曰萬事到頭都是夢休休明日黄花蝶也愁正采舊公案而機杼一新前無古人於是為至與夫用見他桃李樹思憶後園春之意以為長因送人處憶得别家時為一僧所嗤者有間矣元白習制科白樂天元㣲之同習制科中第之後白公寄㣲之詩曰皆當少壯日同惜盛明時光景嗟虛擲雲霄竊暗闚攻文朝矻矻講學夜孜孜䇿目穿如札毫鋒銳若錐注云時與㣲之結集策略之目其數至百十各有纎鋒細管筆攜以就試相顧輒笑目為毫錐乃知士子待敵編綴應用自唐以來則然毫錐筆之名起於此也門生門下見門生後唐裴尚書年老致政清泰初其門生馬裔孫知舉放榜後引新進士謁謝於裴裴歡宴永日書一絶云官途最重是文衡天與愚夫作盛名三主禮闈今八十門生門下見門生時人榮之事見蘇耆開譚録予以五代登科記考之裴在同光中三知舉四年放進士八人裔孫預焉後十年裔孫為翰林學士以清泰三年放進士十三人茲所書是已裔孫尋拜相新史亦載此一句云白樂天詩有與諸同年賀座主髙侍郞新拜太常同宴蕭尚書亭子一篇注云座主於蕭尚書下及第予考登科記樂天以正元十六年庚辰中書舍人髙郢下第四人登科郢以寳應二年癸夘禮部侍郞蕭昕下第九人登科迨郢拜太常時幾四十年矣昕自癸夘放進士之後二十四年丁夘又以禮部尚書再知貢舉可謂壽俊觀白公所賦益可見唐世舉子之尊尚主司也韓蘇杜公叙馬韓公人物畫記其叙馬處云馬大者九匹於馬之中又有上者下者焉行者牽者奔者涉者陸者翹者顧者鳴者寢者訛者立者齕者飲者溲者陟者降者痒磨樹者噓者嗅者喜而相戲者怒相踶齧者秣者騎者驟者走者載服物者載狐兔者凡馬之事二十有七焉馬大小八十有三而莫有同者焉秦少游謂其叙事該而不煩故倣之而作羅漢記坡公賦韓幹十四馬詩云二馬並驅攢八蹄二馬宛頸鬉尾齊一馬任前雙舉後一馬却避長鳴嘶老髯奚官騎且顧前身作馬通馬語後有八匹飲且行㣲流赴吻若有聲前者既濟出林鶴後者欲涉鶴俛啄最後一匹馬中龍不嘶不動尾揺風韓生畫馬真是馬蘇子作詩如見畫世無伯樂亦無韓此詩此畫誰當看詩之與記其體雖異其為布置鋪冩則同誦坡公之語蓋不待見畫也余雲林繪監中有臨本畧無小異杜老觀曹將軍畫馬圖云昔日太宗拳毛騧近時郭家獅子花今之新圖有二馬復令識者久歎嗟其餘七匹亦殊絶迥若寒空動烟雪霜蹏蹴踏長楸間馬官厮養森成列可憐九馬争神駿顧視清髙氣深穏其語視東坡似若不及至於斯須九重真龍出一洗萬古凡馬空不妨獨步也杜又有畫馬讚云韓幹畫馬毫端有神驊騮老大騕􅒁清新及四蹄雷雹一日天池瞻彼駿骨實維龍媒之句坡公九馬贊言薛紹彭家藏曹將軍九馬圖杜子美所謂作詩者也其詞云牧者萬嵗繪者惟霸甫為作誦偉哉九馬讀此詩文數篇真能使人方寸超然意氣横出可謂妙絶動宫商矣風災霜旱慶元四年饒州盛夏中時雨頻降六七月之間未嘗請禱農家水車龍具倚之於壁父老以為所未見指其西成有秋當倍常嵗而低下之田遂以潦告餘干安仁乃於八月罹地火之厄地火者蓋苗根及心孽蟲生之莖榦焦枯如火烈烈正古之所謂蟊賊也九月十四日嚴霜連降晩稻未實者皆為所薄不能復生諸縣多然有常産者訴於郡縣郡守孜孜愛民有意蠲租然僚吏多云在法無此兩項又云九月正是霜降節不足為異案白樂天諷諫杜陵叟一篇曰九月霜降秋早寒禾穗未熟皆青乾長吏明知不申破急斂暴征求考課此明證也予因記元祐五年蘇公守杭日與宰相吕汲公書論浙西災傷曰賢哲一聞此言理無不行但恐世俗諂薄成風揣所樂聞與所忌諱争言無災或有災而不甚損八月之末秀州數千人訴風災吏以為法有訴水旱而無訴風災閉拒不納老幼相騰踐死者十一人由此言之吏不喜言災者蓋十人而九不可不察也蘇公及此可謂仁人之言豈非昔人立法之初如所謂風災所謂旱霜之類非如水旱之田可以稽考懼貪民乘時或成冒濫故不輕啓其端今日之計固難添創條式但凡有災傷出於水旱之外者專委良守令推而行之則實惠及民可以救其流亡之禍仁政之上也容齋五筆卷七欽定四庫全書容齋五筆卷八十二則宋洪邁撰白蘇詩紀年嵗白樂天為人誠實洞達故作詩述懷好紀年嵗因閱其集輒抒録之此生知負少年心不展愁眉欲三十莫言三十是少年百嵗三分已一分何況纔中年又過三十二不覺明鏡中忽年三十四我年三十六冉冉昏復旦非老亦非少年過三紀餘行年欲四十有女曰金鑾我今欲四十秋懷亦可知行年三十九嵗暮日斜時忽因時節驚年嵗四十如今欠一年四十為野夫田中學鉏糓四十官七品拙宦非由它毛鬢早改變四十白髪生況我今四十本來形貌羸衰病四十身嬌癡三嵗女自問今年幾春秋四十初四十未為老憂傷早衰惡莫學二郞吟太苦纔年四十鬢如霜下有獨立人年來四十一若為重入華陽院病髪愁心四十三已年四十四又為五品官面瘦頭斑四十四逺謫江州為郡吏行年四十五兩鬢半蒼蒼四十六時三月盡送春争得不殷勤我今四十六衰顇卧江城鬢髪蒼浪牙齒疎不覺身年四十七明朝四十九應轉悟前非四十九年身老日一百五夜月明天衰鬢蹉跎將五十闗河迢遞過三千青山舉眼三千里白髪平頭五十人宦途氣味已諳盡五十不休何日休五十江城守停杯忽自思莫學爾兄年五十蹉跎始得掌絲綸五十未全老尚可且歡娛長慶二年秋我年五十一二月五日花如雪五十二人頭似霜老挍於君合先退明年半百又加三前嵗花前五十二今年花前五十五倘年七十猶强健尚得閒行十五春去時十一二今年五十六我年五十七榮名得幾許我年五十七歸去誠已遲身為三品官年巳五十八五十八翁方有後静思堪喜亦堪嗟半百過九年艷陽殘一日火銷燈盡天明後便見平頭六十人六十河南尹前途足可知不准擬身年六十上山仍未要人扶不准擬身年六十遊春猶自有心情我今悟已晚六十方退閒今嵗日餘二十六來嵗年登六十二心情多少在六十二三人六十三翁頭雪白假如醒黠欲何為行年六十四安得不衰羸我今六十五走若下坡輪年開第七秩屈指幾多人五十八歸來今年六十六無憂亦無喜六十六年春共把十千沽一斗相㸔七十欠三年七十欠四嵗此生那足論六十八衰翁乗衰百疾攻又問年幾何七十行欠二更過今年年七十假如無病亦宜休今日行年將七十猶須慙愧病來遲且喜同年滿七十莫嫌衰病莫嫌貧舊語相𫝊聊自慰世間七十老人稀皤然七十翁亦足稱壽考昨日復今辰悠悠七十春人生七十稀我年幸過之白須如雪五朝臣又入新正第七旬時年七十一行開第八秩可謂盡天年吾今巳年七十一眼昏須白頭風眩七十人難到過三更較稀七十三人難再到今春來是别花來七十三翁旦暮身誓開險路作通津風光抛得也七十四年春夀及七十五俸霑五十千其多如此蘇公素重樂天故閒亦效之如龍鍾三十九勞生已强半嵗暮日斜時還為昔人歎正引用其語又四十豈不知頭顱畏人不出何其愚我今四十二衰髪不滿梳憶在錢塘正如此回頭四十二年非行年四十九還此北窗宿吾年四十九賴此一笑喜嗟我與君皆丙子四十九年窮不死五十之年初過二衰顔記我今如此白髮蒼顔五十三家人强遣試春衫先生年來六十化道眼已入不二門紛紛華髪不足道當返六十過去魂我年六十一頺景薄西山結髮事文史俯仰六十踰與君皆丙子各已三萬日翫味莊誦便如閱年譜也天將富此翁唐劉仁軌任給事中為宰相李義府所惡出為青州刺史及代還欲斥以罪又坐漕船覆没免官其後百濟叛詔以白衣撿挍帶方州刺史仁軌謂人曰天將富貴此翁邪果削平遼海白樂天有自題酒庫一篇云身更求何事天將富此翁此翁何處富酒庫不曽空注云劉仁軌詩天將富此翁以一醉為富也然則唐史以此為仁軌之語而不言其詩為未審耳白公説俸禄白樂天仕宦從壯至老凡俸禄多寡之數悉載於詩雖波及他人亦然其立身廉清家無餘積可以概見矣因讀其集輒叙而列之其為挍書郞曰俸錢萬六千月給亦有餘為左拾遺曰月慚諫紙二千張嵗愧俸錢三十萬兼京兆户曹曰俸錢四五萬月可奉晨昏廩禄二百石嵗可盈倉囷貶江州司馬曰散員足庇身薄俸可資家壁記曰嵗廩數百石月俸六七萬罷杭州刺史曰三年請禄俸頗有餘衣食移家入新宅罷郡有餘資為蘇州刺史曰十萬户州尤覺貴二千石禄敢言貧為賔客分司曰俸錢八九萬給受無虚月嵩洛供雲水朝廷乞俸錢老宜官冷静貧賴俸優饒官優有禄料職散無羈縻官銜依口得俸禄逐身來為河南尹曰厚俸如何用閒居不可忘不赴同州曰誠貪俸錢厚其如身力衰為太子少傅曰月俸百千官二品朝廷雇我作閒人又問俸厚薄百十隨月至七年為少傅品髙俸不薄其致仕曰全家遁此曾無悶半俸資身亦有餘俸隨日計錢盈貫禄逐年支粟滿囷壽及七十五俸占五十千其泛叙曰歴官凡五六禄俸及妻孥料錢隨官用生計逐年營形骸僶俛班行内骨肉匀留俸禄中其他人者如陜州王司馬曰公事閒忙同少尹俸錢多少敵尚書劉夢得罷賔客除秘監禄俸略同曰日望揮金賀新命俸錢依舊又如何歎洛陽長水二縣令曰朱紱洛陽官位屈青袍長水俸錢貧其將下世有達哉樂天行曰先賣南坊十畝園次賣東郭二頃田然後兼賣所居宅髣髴獲緡二三千但恐此錢用不盡即先朝露歸夜泉後之君子試一味其言雖日飲貪泉亦知斟酌矣觀其生涯如是東坡云公廩有餘粟府有餘帛殆亦不然白居易出位白居易為左贊善大夫盜殺武元衡京都震擾居易首上疏請亟捕賊刷朝廷恥以必得為期宰相嫌其出位不悦因是貶江州司馬此唐書本傳語也案是時宰相張𢎞靖韋貫之𢎞靖不足道貫之於是為失矣白集載與楊虞卿書云左降詔下明日而東思欲一陳於左右去年六月盜殺右丞相於通衢中迸血體磔髪肉所不忍道合朝震慄不知所云僕以書籍以來未有此事茍有所見雖畎畆皁隷之臣不當黙黙況在班列而能勝其痛憤邪故武丞相之氣平明絶僕之書奏日午入兩日之内滿城知之其不與者或語以偽言或陷以非語皆曰丞郞給舍諫官御史尚未論請而贊善大夫何反憂國之甚也僕聞此語退而思之贊善大夫誠賤冗耳朝廷有非常事即日獨進封章謂之忠謂之憤亦無愧矣謂之妄謂之狂又敢逃乎以此獲辜顧何如耳況又不以此為罪名乎白之自述如此然則一時指為出位者不但宰相而已也史又曰居易母墜井死而賦新井篇以是左降前書所謂不以此為罪名者是已醉翁亭記酒經歐陽公醉翁亭記東坡公酒經皆以也字為絶句歐陽二十一也字坡用十六也字歐記人人能讀至於酒經知之者蓋無幾坡公嘗云歐陽作此記其詞玩易蓋戲云耳不自以為竒特也而妄庸者作歐語云平生為此文最得意又云吾不能為退之畫記退之不能為吾醉翁亭記此又大妄也坡酒經每一也字上必押韻暗寓於賦而讀之者不覺其激昂淵妙殊非世間筆墨所能形容今盡載於此以示後生輩其詞云南方之氓以糯與秔雜以卉藥而為餅嗅之香嚼之辣揣之枵然而輕此餅之良者也吾始取麵而起肥之和之以姜液烝之使十裂繩穿而風戾之愈久而益悍此麴之精者也米五㪷為率而五分之為三㪷者一為五升者四三㪷者以釀五升者以投三投而止尚有五升之贏也始釀以四兩之餅而每投以二兩之麴皆澤以少水足以散解而均停也釀者必罋按而井泓之三日而井溢此吾酒之萌也酒之始萌也甚烈而㣲苦蓋三投而後平也凡餅烈而麴和投者必屢嘗而增損之以舌為權衡也既溢之三日乃投九日三投通十有五日而後定也既定乃注以㪷水凡水必熟而冷者也凡釀與投必寒之而後下此炎州之令也既水五日乃篘得二㪷有半此吾酒之正也先篘半日取所謂贏者為粥米一而水三之揉以餅麴凡四兩二物并也投之糟中熟撋而再釀之五日壓得㪷有半此吾酒之少勁者也勁正合為四㪷又五日而飲則和而力嚴而不猛也篘絶不旋踵而粥投之少留則糟枯中風而酒病也釀久者酒淳而豐速者反是故吾酒三十日而成也此文如太牢八珍咀嚼不嫌於致力則真味愈雋永然未易為俊快者言也白公感石白樂天有奉和牛思黯以李蘇州所寄太湖石竒狀絶倫因作詩兼呈劉夢得其末云共嗟無此分虛管太湖來注與夢得俱典姑蘇而不獲此石又有感石上舊字云太湖石上鐫三字十五年前陳結之案陳結之並無所經見全不可曉後觀其對酒有懷寄李郎中一絶句曰往年江外抛桃葉去嵗樓中别栁枝寂寞春來一杯酒此情惟有李君知注曰桃葉結之也栁枝樊素也然後結之之義始明樂天以病而去栁枝故作詩云兩枝楊栁小樓中嫋娜多年伴醉翁明日放歸歸去後世間應不要春風因劉夢得有戲之之句又答之云誰能更學孩童戲尋逐春風捉栁花然其鍾情處竟不能忘如云病共樂天相伴住春隨樊子一時歸金羈駱馬近貰却羅袖栁枝尋放還觴詠罷來賔閣閉笙歌散後妓房空皆是也讀之使人悽然禮部韻略非理禮部韻略所分字有絶不近人情者如東之與冬清之與青至於隔韻不通用而為四聲切韻之學者必强立説然終為非是如撰字至列於上去三韻中仍義訓不一頃紹興二十年省闈舉子兼經出易簡天下之理得賦予為參詳官有㸃撿試卷官蜀士杜華云簡字韻甚窄若撰字必在所用然惟撰述之撰乃可爾若雜物撰徳體天地之撰異乎三子者之撰欠伸撰杖屨之類皆不可用予以白知舉請掲榜示衆何通逺諫議初亦難之予曰倘舉塲皆落韻如何出手乃自書一榜榜才出八廂邏卒以為逐舉未嘗有此例即録以報主者士人滿簾前上請予為逐一剖析然後退又静之與靚其義一也而以靜為上聲靚為去聲案漢書賈誼鵩賦澹乎若深淵之靚顔師古注靚與静同史記正作静揚雄甘泉賦暗暗靚深注云靚即靜字耳今析入兩音殊為非理予名雲竹莊之堂曰賞静取杜詩賞静憐雲竹之句也守僧居之頻年三易有道人指曰靜字左傍乃争字以故不定疊於是撤去元扁而改為靚云唐臣乞贈祖唐世贈典唯一品乃及祖餘官只贈父耳而長慶中流澤頗異白樂天制集有户部尚書楊於陵回贈其祖為吏部郎中祖母崔氏為郡夫人馬揔准制贈亡父亦請回其祖及祖母散騎常侍張惟素亦然非常制也是時崔植為相亦有陳情表云亡父嬰甫是臣本生亡伯祐甫臣今承後嗣襲雖移孝心則在自去年以來累有慶澤凡在朝列再䝉追榮或有陳乞皆許回授臣委當寵擢而顯揚之命獨未及於先人今請以在身官秩并前後合叙勲封特乞回充追贈則知其時一切之制如此伯兄文惠執政乞以己合轉官回贈髙祖既已得㫖而為後省封還固近無此比且失於考引唐時故事也承襲用經語誤經傳中事實多有轉相祖述而用初不考其訓故者如邶谷風之詩為淫新昏棄舊室而作其詞曰宴爾新昏以我御窮宴安也言安愛爾之新昏但以我御窮苦之時至於富貴則棄我今人乃以初娶為宴爾非惟於詩意不合且又再娶事豈堪用也抑之詩曰訏謨定命逺猶辰告毛公曰訏大也謨謀也猶道也辰時也猶與猷同鄭箋曰猶圖也言大謀定命為天下逺圖庶事而以嵗時告施之如正月始和布政也案此特謂上告下之義今詞臣乃用於制詔以屬臣下而臣下於表章中亦用之不知其與入告爾后之告不侔也生民之詩曰誕彌厥月毛公曰誕大也彌終也鄭箋言后稷之在其母終人道十月而生案訓彌為終其義亦未易曉至俾爾彌爾性似先公酋矣既釋彌為終又曰酋終也頗涉頻複生民凡有八誕字誕寘之隘巷誕寘之平林誕寘之寒氷誕實匍匐誕后稷之穡誕降嘉種誕我祀如何若悉以誕為大於義亦不通它如誕先登于岸之類新安朱氏以為發語之辭是已莆田鄭氏云彌只訓滿謂滿此月耳今稱聖節曰降誕曰誕節人相稱曰誕日誕辰慶誕皆為不然但承習膠固無由可革雖東坡公亦云仰止誕彌之慶未能免俗書之於此使子弟後生輩知之左傳王使宰孔賜齊侯胙齊侯將下拜孔曰天子使孔曰以伯舅耋老無下拜對曰天威不違顔咫尺敢不下拜下拜登受謂拜於堂下而受胙於堂上今人簡牘謝饋者輒曰謹已下拜猶未為甚失若天威不違顔咫尺則上四字為天子設下三字為人臣設故注言天鑒察不逺威嚴常在顔面之前今士大夫往往於表奏中言違顔或曰咫顔咫尺之顔全與本指爽戾如用龍顔聖顔天顔之類自無害也長慶表章唐自大厯以河北三鎮為悍藩所據至元和中田𢎞正以魏歸國長慶初王承元劉緫去鎮幽於是河北畧定而穆宗以昏君崔植杜元穎王播以庸相不能建久長之䇿輕徙田𢎞正以啓王庭湊之亂繆用張𢎞靖以啓朱克融之亂朝廷以諸道十五萬衆裴度元臣宿望烏重嗣李光顔當時名將屯守踰年竟無成功財竭力盡遂以節鉞授二賊再失河朔訖于唐亡觀一時事勢何止可為痛哭而宰相請上尊號表云陛下自即大位及此二年無巾車汗馬之勞而坐平鎮冀無亡弓遺鏃之費而立定幽燕以謂威靈四及請為神武君臣上下其亦云無羞恥矣此表乃白居易所作又翰林學士元稹求為宰相恐裴度復有功大用妨己進取多從中沮壞之度上表極陳其狀帝不得已解稹翰林恩遇如故稹怨度欲解其兵柄勸上罷兵未幾拜相居易代作謝表其略云臣遭遇聖明不因人進擢居禁内訪以宻謀恩奬太深讒謗並至雖内省行事無所愧心然上黷宸聰合當死責其文過飾非如此居易二表誠為有玷盛徳元白制科元白習制科其書後分為四卷命曰策林其䇿頭䇿項各二道䇿尾三道此外曰美謙遜塞人望教必成不勞而理風行澆朴復雍熈感人心之類凡七十五門言所應對者百不用其一二備載於文集云八種經典開示悟入諸佛知見以了義度無邊以圓教垂無窮莫尊於妙法蓮華經凡六萬九千五百五字證無生忍造不二門住不可思議解脫莫極於維摩經凡二萬七千九十二字攝四生九類入無餘涅槃實無得度者莫先於金剛般若波羅宻經凡五千二百八十七字壞罪集福淨一切惡道莫急於佛頂尊勝陀羅尼經凡三千二十字應念順願願生極樂土莫疾於阿彌陁經凡一千八百字用正見觀真相莫出於觀音普賢菩薩法行經凡六千九百九十字詮自性認本覺莫深於實相法宻經凡三千一百五字空法塵依佛智莫過於般若波羅宻多心經凡二百五十八字是八種經具十二部合一十一萬六千八百五十七字三乘之要㫖萬佛之秘藏盡矣唐長慶三年蘇州重𤣥等法華院石壁所刻金字經白樂天為作碑文其叙如此予竊愛其簡明潔亮故備録之容齋五筆卷八欽定四庫全書容齋五筆卷九十二則宋洪邁撰畏人索報書士大夫得交朋書問有懶傲不肯即答者記白樂天老慵一絶句曰豈是交親向我疎老慵自愛閉門居近來漸喜知聞斷免惱嵇康索報書案嵇康與山濤絶交書云素不便書又不喜作書而人間多事堆案盈几不相酬答則犯教傷義欲自勉强則不能久樂天所云正此也乃知畏於答書其來久矣不能忘情吟予既書白公鍾情蠻素於前卷今復見其不能忘情吟一篇尤為之感歎輒載其文因以自警其序云樂天既老又病風乃録家事㑹經費去長物妓有樊素者年二十餘綽綽有歌舞態善唱楊栁枝人多以曲名名之由是名聞洛下籍在經費中將放之馬有駱者籍在長物中將鬻之馬出門驤首反顧素聞馬嘶慘然立且拜婉孌有辭辭畢涕下余亦愍然不能對且命反袂飲之酒自飲一盃快吟數十聲聲成文文無定句予非聖達不能忘情又不至於不及情者事來攪情情動不可柅因自哂題其篇曰不能忘情吟吟曰鬻駱馬兮放楊栁枝掩翠黛兮頓金羈馬不能言兮長鳴而却顧楊栁枝再拜長跪而致辭辭曰素事主十年凡三千有六百日巾櫛之間無違無失今素貌雖陋未至衰摧駱力猶壯又無虺隤即駱之力尚可以代主一歩素之歌亦可以送主一杯一旦雙去有去無回故素將去其辭也苦駱將去其鳴也哀此人之情也馬之情也豈主君獨無情哉予俯而歎仰而咍且曰駱駱爾勿嘶素素爾勿啼駱反廐素反閨吾疾雖作年雖頽幸未及項籍之將死亦何必一日之内棄騅兮而别虞兮乃目素兮素兮為我歌楊栁枝我姑酌彼金罍我與爾歸醉郷去來觀公之文固以遣情適意耳素竟去也此文在一集最後卷故讀之者未必記憶東坡猶以為栁枝不忍去因劉夢得春盡絮飛之句方知之於是美朝雲之獨留為之作詩有不似楊枝别樂天恰如通徳伴伶𤣥之語然不及二年而病亡為可歎也擒鬼章祝文東坡在翰林作擒鬼章奏告永裕陵祝文云大獮獲禽必有指蹤之自豐年多廩孰知耘耔之勞昔漢武命將出師而呼韓來庭効于甘露憲宗厲精講武而河湟恢復見于大中其意蓋以神宗有平唃氏之志至於元祐乃克有成故告陵歸功謂武帝憲宗亦經營於初而績效在於二宣之世其用事精切如此今蘇氏眉山功徳寺所刻大小二本及季真給事在臨安所刻并江州本麻沙書坊大全集皆只自耘耔句下便接憬彼西戎古稱右臂正是好處却芟去之豈不可惜惟成都石本法帖真跡獨得其全坡集奏議中登州上殿三劄皆非是司馬季思知泉州刻温公集有作中丞日彈王安石章尤可笑温公以治平四年解中丞還翰林而此章乃熈寧三年者二集皆出本家子孫而為妄人所誤季真季思不能察耳坡内制有温公安塟祭文云元豐之末天步為艱社稷之衛中外所屬惟是一老屏予一人名髙當世行滿天下措國於太山之安下令於流水之源嵗月未周綱紀略定天若相之又復奪之殄瘁之哀古今所共知之者神考用之者聖母馴致其道太平可期長為宗臣以表後世往奠其塟庶知予懷而石本頗不同其詞云元豐之末天步惟艱社稷之衛存者有幾惟是一老屏予一人措國於太山之安下令於流水之原嵗未及期綱紀畧定道之將行非天而誰天既予之又復奪之惟聖與賢莫如天何然其所立天亦不能亡也知之者神考用之者聖母馴致其道終於太平永為宗臣與國無極於其塟也告諸其柩今莫能攷其所以異也歐公送慧勤詩國朝承平之時四方之人以趨京邑為喜蓋士大夫則用功名進取係心商賈則貪舟車南北之利後生嬉戲則以紛華盛麗而恱夷考其實非南北比也讀歐陽公送僧慧勤歸餘杭之詩可知矣曰越俗僣宫室傾貲事雕牆佛屋尤其侈耽耽儗侯王文彩瑩丹漆四壁金焜煌上懸百寶盖宴坐以方牀胡為棄不居棲身客京坊辛勤營一室有類燕巢梁南方精飲食菌筍比羔羊飯以玉粒粳調之甘露漿一饌費千金五品羅成行晨興未飯僧日昃不敢嘗乃茲隨北客枯粟充飢腸東南地秀絶山水澄清光餘杭幾萬家日夕焚清香烟霏四面起雲霧雜芬芳豈如車馬塵鬢髪染成霜三者孰苦樂子奚勤四方觀此詩中所謂吳越宫室飲食山水三者之勝昔日固如是矣公又有山中之樂三章送之歸勤後識東坡為作詩集序者委蛇字之變歐公樂郊詩云有山在其東有水出逶夷近嵗丁朝佐辨正謂其字參古今之變必有所據余因其說而悉索之此二字凡十二變一曰委蛇本於詩羔羊退食自公委蛇委蛇毛公注行可從跡也鄭箋委曲自得之皃委於危反蛇音移左傳引此句杜注云順皃莊子載齊威公澤中所見其名亦同二曰委他詩君子偕老委委佗佗毛注委委者行可委曲從跡也佗者徳平易也三曰逶迱韓詩釋上文云公正貌説文逶迤斜去貌四曰倭遲詩四牡騑騑周道倭遲注歴逺之貌五曰倭夷韓詩之文也六曰威夷潘岳詩迴谿縈曲阻峻坂路威夷孫綽天台山賦既克隮於九折路威夷而修通李善注引韓詩周道威夷薛君曰威夷險也七曰委移離騷經載雲旗之委蛇一本作逶迤一本作委移注雲旗委移長也八曰逶移劉向九歎遵江曲之逶移九曰逶蛇後漢費鳳碑君有逶蛇之節十曰蜲蛇張衡西京賦女娥坐而長歌聲清暢而蜲蛇李善注蜲蛇聲餘詰曲也十一曰􅂒迆漢逄盛碑當遂􅂒迆立號建基十二曰倭遲劉夢得詩栁動御溝清威遲堤上行韓公南海廟碑蜿蜿蛇蛇亦然也則歐公正用韓詩朝佐不暇尋繹之爾東不可名園今人亭館園池多即其方隅以命名如東園東亭西池南館北榭之類固為簡雅然有當避就處歐陽公作真州東園記最顯案漢書百官表將作少府掌治宫室屬官有東園主章注云章謂大材也主章掌大材以供東園大匠紹興三十年予為省試參詳官主司委出詞科題同院或欲以東園主章為箴予曰君但知漢表耳霍光傳光之喪賜東園温明服䖍曰東園處此器以鏡置其中以懸尸上師古曰東園署名也屬少府其署主作此器董賢傳東園秘器以賜賢注引漢舊儀東園秘器作棺如是豈佳處乎同院驚謝而退然則以東名園是為不可予有兩園適居東西故扁西為西園而以東為東圃蓋避此也一二三與壹貳叄同古書及漢人用字如一之與壹二之與貳三之與叄其義皆同鳲鳩序刺不壹也又云用心之不壹也而正文其儀一兮表記節以壹惠注言聲譽雖有衆多者節以其行一大善者為謚耳漢華山碑五載壹巡狩祠孔廟碑恢崇壹變祝睦碑非禮壹不得犯而後碑云非禮之常一不得當則與壹通用也孟子市價不貳趙岐注云無二賈者也本文用大貳字注用小二字則二與貳通用也易繫辭參天兩地釋文云參七南反又如字音三周禮設其參注參謂卿三人則三與參通用也九之與久十之與拾百之與栢亦然予頃在英州訪隣人利秀才利新作茅齋頗淨潔從予乞名其前有兩髙松因為誦藍田壁記命之曰二松其季請曰是使大貳字否坐者皆哂蓋其人不知書信口輒言以貽譏笑若以古字論之亦未為失也文惠公名流杯亭曰一詠而采借隷法扁為壹詠讀者多以為疑顧第弗深考耳何恙不已公孫𢎞為丞相以病歸印上報曰君不幸罹霜露之疾何恙不已顔師古注恙憂也何憂於疾不止也禮部韻略訓恙字亦曰憂也初無訓病之義盖既云罹疾矣不應復云病師古之説甚為明白而世俗相承至問人病為貴恙謂輕者為㣲恙心疾為心恙風疾為風恙根著已深無由可改西漢用人人元元字前漢書好用人人字如文帝紀人人自以為得之者以萬數又曰人人自安難動揺元帝紀人人自以得上意食貨志人人自愛而重犯法韓信傳人人自以為得大將曹參傳齊故諸儒以百數言人人殊張良𫝊人人自堅叔孫通𫝊吏人人奉職賈誼𫝊人人各如其意所出楊雄𫝊人人自以為咎繇鮑宣𫝊人人牽引所私韓延壽𫝊人人問以謠俗人人為飲張騫傳人人有言輕重李尋傳人人自賢王莽𫝊人人延問嚴安傳人人自以為更生王吉傳人人自制是也後漢書亦閒有之如崔駰傳人人有以自優五行志人人莫不畏憲吳漢傳諸將人人多請之申屠剛傳人人懷憂王允傳人人自危荀彧傳人人自安吕强傳諸常侍人人求退是也又元元二字考之六經無所見而兩漢書多用之如前漢文帝紀全天下元元之户武紀燭幽隠勸元元所以化元元宣紀不忘元元元紀元元失望元元何辜元元太困元元之民勞於耕耘元元騷動元元安所歸命成紀元元寃失職者衆哀紀元元不贍刑法志罹元元之不逮嚴安傳元元黎民得免於戰國嚴助傳使元元之民安生樂業賈捐之傳保全元元東方朔傳元元之民各得其所魏相傳尉安元元惟陛下留神元元鮑宣傳為天牧養元元蕭育傳安元元而已康衡薛宣傳哀閔元元王嘉傳憂閔元元谷永傳以慰元元之心匈奴傳元元萬民是也後漢光武紀下為元元所歸賊害元元元元愁恨惠茲元元章紀誠欲元元去末歸本元元未諭深元元之愛和紀愛養元元下濟元元順紀元元被害質紀元元嬰此困毒桓紀害及元元鄧后紀劉毅傳垂恩元元王昌傳元元創痍耿弇傳元元叩心郞顗傳𢎞濟元元貸贍元元曹襃𫝊仁濟元元范升傳元元焉所呼天免元元之急鍾離意傳憂念元元何敞傳元元怨恨安濟元元楊終𫝊以濟元元虞詡傳遭元元無妄之災皇甫規𫝊平志畢力以慶元元是也予謂元元者民也而上文又言元元之民元元黎民元元萬民近於複重矣故顔注或云元元善意也韓公潮州表韓文公諫佛骨表其詞切直至云凡有殃咎宜加臣身上天監臨臣不怨悔坐此貶潮州刺史而謝表云臣於當時之文未有過人者至論陛下功徳與詩書相表裏作為歌詩薦之郊廟雖使古人復生臣亦未肯多遜而負罪嬰釁自居海島懷痛窮天死不閉目伏惟天地父母哀而憐之考韓所言其意乃望召還憲宗雖有武功亦未至編之詩書而無愧至於紀太山之封鏤白玉之牒東巡奏功明示得意等語摧挫獻佞大與諫表不侔當時李漢輩編定文集惜不能為之除去東坡自黄州量移汝州上表云伏讀訓詞有人材實難不忍終棄之語臣昔在常州有田租給饘粥欲望許令常州居住輒叙徐州守河及獲妖賊事庶因功過相除得從所便讀者謂與韓公相類是不然二表均為歸命君上然其情則不同坡自列往事皆其實跡而所乞不過見地耳且略無一佞詞真為可服燕賞逢知己白樂天為河南尹日有答舒員外云員外游香山寺數日不歸兼辱尺書大誇勝事時正值坐衙慮囚之際走筆題長句以贈之曰黄菊繁時好客到碧雲合處佳人來謂遣英蒨二妓與舒君同遊也酡顔一笑夭桃綻清泠秋聲寒玉哀軒騎逶迤棹容與留連三日不能囬白頭老尹府中坐早衙纔退暮衙催謝希深歐陽公官洛陽同遊嵩山歸暮抵龍門香山雪作留守錢文僖公遣吏以厨𫝊歌妓至此勞之曰山行良勞當少留龍門賞雪府事簡無遽歸也王定國訪東坡公於彭城一日棹小舟與顔長道擕盼英卿三子游泗水南下百歩洪吹笛飲酒乘月而來坡時以事不得往夜著羽衣佇立黄樓上相視而笑以為李太白死世間無此樂三百餘年矣定國既去逾月復與參寥師泛舟洪下追憶曩游作詩曰輕舟弄水買一笑醉中蕩槳肩相摩歸來笛聲滿山谷明月正照金叵羅味此三游之勝今之燕賔者寧復有之蓋亦值知己也端午貼子詞唐世五月五日揚州於江心鑄鏡以進故國朝翰苑撰端午貼子詞多用其事然遣詞命意工拙不同王禹玉云紫閣曈曨隠曉霞瑶墀九御薦菖華何時又進江心鑑試與君王卻衆邪李邦直云艾葉成人後榴花結子初江心新得鏡龍瑞䕶仙居趙彦若云揚子江中方鑄鏡未央宫裏更飛符菱花欲共朱靈合驅盡神姦又得無又揚子江中百鍊金寶奩疑是月華沈争如聖后無私鑑明照人間萬善心又江心百鍊青銅鏡架上雙紉翠縷衣李士美云何須百鍊鑑自勝五兵符𫝊墨卿云百鍊鑑從江上鑄五時花向帳前施許冲元云江中今日成龍鑑苑外多年廢鷺坡合照乾坤共作鏡放生河海盡為池蘇子由云揚子江中冩鏡龍波如細縠不摇風宫中驚捧秋天月長照人間助至公大槩如此唯東坡不然曰講餘交翟轉回廊始覺深宫夏日長揚子江心空百鍊只將無逸監興亡其輝光氣焰可畏而仰也若白樂天諷諫百鍊鏡篇云江心波上舟中鑄五月五日日午時背有九五飛天龍人人呼為天子鏡又云太宗常以人為鏡監古監今不監容乃知天子别有鏡不是揚州百鍊銅用意正與坡合予亦嘗有一聯云願儲醫國三年艾不愽江心百鍊銅然去之逺矣端午故事莫如楚人競渡之的蓋以其非吉祥不可施諸祝頌故必用鏡事云容齋五筆卷九欽定四庫全書容齋五筆卷十十二則宋洪邁撰哀公問社哀公問社於宰我宰我對曰夏后以松殷人以栢周人以栗曰使民戰栗子聞之曰成事不説遂事不諫既往不咎古人立社但若因其土地所宜木為之初非求異而取義於彼也哀公本不必致問既聞用栗之言遂起使民戰栗之語其意謂古者弗用命戮於社所以威民然其實則非也孔子責宰我不能因事獻可替否既非成事尚為可說又非遂事尚為可諫且非既往何咎之云或謂使民戰栗一句亦出於宰我記之者欲與前言有别故加曰字以起之亦是一説然戰栗之對使出於我則𨗳君於猛顯為非宜出於哀公則便即時正救以杜其始兩者皆失之無所逃於聖人之責也哀公欲以越伐魯而去三家不克成卒為所逐以至失邦其源盖在於此何休注公羊傳云松猶容也想見其容貌而事之主人正之意也栢猶迫也親而不逺主地正之意也栗猶戰栗謹敬貌主天正之意也然則戰栗之説亦有所本公羊云虞主用桑練主用栗則三代所奉社其亦以松栢栗為神之主乎非植此木也程伊川之説有之絶句詩不貫穿夜凉吹笛千山月路暗迷人百種花碁罷不知人換世酒闌無奈客思家此歐陽公絶妙之語然以四句各一事似不相貫穿故名之曰夢中作永嘉士人薛韶喜論詩嘗立一説云老杜近體律詩精深妥貼雖多至百韻亦首尾相應如常山之蛇無閒斷齟齬處而絶句乃或不然五言如遲日江山麗春風花草香泥融飛燕子沙暖睡鴛鴦急雨梢溪足斜暉轉樹腰隔巢黄鳥並飜藻白魚跳江動月移石溪虛雲傍花鳥栖知故道帆過宿誰家鑿井交棕葉開渠斷竹根扁舟輕􅒁纜小徑曲通村日出籬東水雲生舍北泥竹髙鳴翡翠沙僻舞鵾雞釣艇收緡盡昏鴉接翅稀月生初學扇雲細不成衣舍下笋穿壁庭中藤刺簷地晴絲冉冉江白草纎纎七言如糝徑楊花鋪白氈㸃溪荷葉疊青錢筍根稚子無人見沙上鳬雛傍母眠兩個黄鸝鳴翠栁一行白鷺上青天窗含西嶺千秋雪門泊東吳萬里船之類是也予因其説以唐人萬絶句攷之但有司空圖雜題云驛步堤縈閣軍城鼔振橋鷗鳴湖鴈下雪隔嶺梅飄舴艋猿偷上蜻蜓燕競飛樵香燒桂子苔濕挂蓑衣農父田翁詩張碧農父詩云運鋤耕斸侵晨起隴畔豐盈滿家喜到頭禾黍屬他人不知何處抛妻子杜荀鶴田翁詩云白髪星星筋骨衰種田猶自伴孫兒官苗若不平平納任是豐年也受飢讀之使人愴然以今觀之何啻倍蓰也衛宣公二子衛宣公二子之事詩與左𫝊所書始末甚詳乘舟之詩為伋壽而作也左傳云宣公烝於庶母夷姜生伋子為之娶於齊而美公取之生壽及朔宣姜與公子朔譖伋子宣姜者宣公所納伋之妻翻譖其過公使諸齊使盜待諸莘將殺之壽子告之使行不可壽子載其旌以先盜殺之遂兄弟并命案宣公以魯隠四年十二月立至桓十二年十一月卒凡十有九年姑以即位之始便成烝亂而伋子即以次年生勢須十五嵗然後娶既娶而奪之又生壽朔朔已能同母譛兄壽又能代為使者以越境非十嵗以下兒所能辦也然則十九年之間如何消破此最為難曉也謂端為匹今人謂縑帛一匹為壹端或緫言端匹案左傳幣錦二兩注云二丈為一端二端為一兩所謂匹也二兩二匹也然則以端為匹非矣湘山野録載夏英公鎮襄陽遇大禮赦恩賜致仕官束帛以絹十匹與胡旦旦笑曰奉還五匹請撿韓詩外傳及諸儒韓康伯等所解束帛戔戔之義自可見證英公撿之果見三代束帛束脩之制若束帛則卷其帛為二端五匹遂見十端正合此説也然周易正義及王弼注韓詩外傳皆無其語文瑩多妄誕不足取信案春秋公羊傳乘馬束帛注云束帛謂𤣥三纁二𤣥三法天纁二法地若文瑩以此為證猶之可也唐人草堂詩句予於東圃作草堂欲采唐人詩句書之壁而未暇也姑録之于此杜公云西郊向草堂昔我去草堂草堂少花今欲栽草堂塹西無樹林白公有别草堂三絶句又云身出草堂心不出劉夢得傷愚溪云草堂無主燕飛回元㣲之和裴挍書云清江見底草堂在錢起有暮春歸故山草堂詩又云暗歸草堂靜半入花源去朱慶餘稱著朱衣入草堂李涉草堂曽與雪為鄰顧況不作草堂招逺客郎士元草堂竹徑在何處張籍草堂雪夜擕琴宿又云西峯月猶在遥憶草堂前武元衡多君能寂寞共作草堂游陸龜蒙草堂祗待新秋景又云草堂盡日留僧坐司空圖草堂舊隠猶招我韋莊今來空訝草堂新子蘭䇿杖吟詩上草堂皎然有題湖上草堂云山居不買剡中山湖上千峰處處閒芳草白雲留我住世人何事得相闗公穀解經書日孔子作春秋以一字為褒貶大抵志在尊王至於紀年叙事只因舊史杜預見汲家書魏國史記謂其著書文意大似春秋經推此足以見古者國史䇿書之常也所謂書日不書日在輕重事體本無所系而公羊穀梁二𫝊每事斷之以日故窒而不通左氏唯有公子益師卒公不與小斂故不書日一説其它亦鮮今表二傳之語以示兒曹公羊云益師卒何以不日逺也塟者不及時而日渴塟也不及時而不日慢塟也過時而日隠之也過時而不日謂之不能塟也當時而不日正也當時而日危不得塟也庚寅入邴其日何難也取邑不日桓之盟不日信之也甲寅齊人伐衛伐不日此何以日至之日也壬申公朝于王所其日何録乎内也辛巳晉敗秦于殽詐戰不日此何以日盡也甲戌敗狄于鹹其日何大之也子卒何以不日隠之也即位不日穀梁最多卑者之盟不日大夫日卒正也諸侯日卒正也日入惡入者也外盟不日取邑不日大閱崇武故謹而日之前定之盟不日公敗齊師不日疑戰也公敗宋師其日成敗之也齊人滅遂其不日㣲國也公㑹齊侯盟于柯桓盟雖内與不日信也媵陳人之婦其不日數渝惡之也癸亥塟紀叔姬不日卒而日塟閔紀之亡也子卒日正也不日故也有所見則日戊辰盟于葵邱桓盟不日此何以日美之也辛夘沙鹿崩其日重變也戊申隕石于宋是月六鶂退飛石無知故日之鶂㣲有知之物故月之乙亥齊侯小白卒此以正其日之何也壬申公朝于王所其日以其再致天子故謹而日之日繫於月月繫於時其不月失其所繫也丁未商臣弑其君髠日髠之卒所以謹商臣之弑也乙巳及晉處父盟不言公諱也何以知其與公盟以其日也甲戌取須句取邑不日此其日何也不正其再取故謹而日之也辛丑塟襄王日之甚矣其不塟之辭也乙夘晉楚戰于邲日其事敗也癸夘晉滅潞滅國有三術中國謹日卑國月夷狄不日其日潞子賢也甲戌楚子卒夷狄卒而不日日少進也癸酉戰于鞌其日或曰日其戰也或曰日其悉也梁山崩不日何也髙者有崩道也鼷䑕食郊牛角不言日急辭也庚申莒潰惡之故謹而日之也秋公至自㑹不日至自伐鄭也丙戌鄭伯卒于操其日未踰竟也乙亥臧孫紇出奔邾其日正紇之出也蔡世子弑其君其不日子奪父政是謂夷之冬十月塟蔡景公不日卒而月塟不塟者也四月楚公子比弑其君弑君者日不日比不弑也甲戌同盟于平邱其日善是盟也内之大事日即位君之大事也其不日何也以年決者不以日決也定之即位何以日也著之也它釋時月者亦然通經之士可以默諭矣沙鹿梁山為兩說尤不然蘇子由春秋論云公羊穀梁之𫝊日月土地皆所以為訓夫日月之不知土地之不詳何足以為喜怒其意蓋亦如此栁應辰押字予頃因見鄂州南樓土中磨崖碑其一刻栁字下一字不可識後訪得其人名應辰而云是唐末五代時湖北人也既載之四筆中今始究其實栁之名是已蓋以國朝寳元元年吕溱榜登甲科今浯溪石上有大押字題云押字起於心心之所記人不能知大宋熈寧七年甲寅嵗刻尚書都官員外郎武陵栁應辰時為永州通判仍有詩云浯溪石在大江邊心記閒將此地鐫自有後人來屈指四千六百甲寅年有閬中陳思者跋云右栁都官欲以怪取名所至留押字盈丈莫知其何為押字古人書名之草者施於文記閒以自别識耳今應辰鐫刻廣愽如許已怪矣好事者從而為之說謂能祛逐不祥真大可笑予得此帖乃恨前疑之非石旁又有蔣世基述夢記云至和三年八月知永州職方員外郎栁拱辰受代歸闕祁陽縣令齊述送行至白水夢一儒衣冠者曰我元結也今栁公游浯溪無詩而去子盍求之覺而心異之遂獻一詩栁依韻而和其語不工拱辰以天聖八年王拱辰榜登科殆應辰兄也輒并記之唐堯無後堯舜之子不肖等耳舜之後雖不有天下而傳至於陳及田齊幾二千載惟堯之後當舜在位時即絶故禹之戒舜曰毋若丹朱傲用殄厥世又作戒曰惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡原丹朱之惡固在所絶方舜禹之世顧不能别訪賢胄為之立繼乎左傳載子産之辭曰唐人是因以服事夏商其季世曰唐叔虞謂唐人之季非周武王子封於晉者成王滅唐而封太叔又蔡墨曰陶唐氏既衰其後有劉累氏曰御龍范宣子曰匃之祖自虞以上為陶唐氏在夏御龍氏然則封國雖絶尚有子孫武王滅商封帝堯之後於薊而未嘗一見於簡䇿史趙言楚之滅陳曰盛徳必百世祀虞之世數未也臧文仲聞蓼與六二國亡曰臯陶庭堅不祀忽諸堯之盛徳豈出舜臯之下而爵邑不能及孫何也斯須之敬今公私宴㑹稱與主人對席者曰席面古者謂之賔謂之客是已儀禮燕禮篇射人請賔公曰命某為賔賔少進禮辭又命之賔許諾左傳季氏飲大夫酒臧紇為客宋公兼享晉楚之大夫趙孟為客杜預云客一坐所尊也乾道二年十一月薛季益以權工部侍郞受命使金國侍從共餞之於吏部尚書㕔陳應求主席自六部長貳之外兩省官皆預凡㑹者十二人薛在部位最下應求揖之為客辭不就曰常時固自有次第奈何今日不然諸公言此席正為侍郞設何辭之為薛終不可予時為右史最居末坐給事中王日嚴目予曰景盧能倉卒間應對願出一轉語折衷之予笑謂薛曰孟子不云乎庸敬在兄斯須之敬在郷人侍郎姑處斯須之敬可也明日以往不妨復如常時薛無以對諸公皆稱善遂就席丙午丁未丙午丁未之嵗中國遇此輒有變故非禍生於内則夷狄外侮三代逺矣姑摭漢以來言之髙祖以丙午崩權歸吕氏幾覆劉宗武帝元光元年為丁未長星見蚩尤旗亘天其春戾太子生始命將出征匈奴自是之後師行三十年屠夷死滅不可勝數及於巫蠱之禍太子子父皆敗昭帝元平元年丁未帝崩昌邑立而復廢一嵗再易主成帝永始二年三年為丙午丁未王氏方盛封莽為新都侯立趙飛燕為皇后由是國統三絶􅗛業遂頽雖光武建武之時海内無事然勾引南匈奴稔成劉淵亂華之釁正是嵗也殤帝安帝之立值此二年東漢政亂實基於此威帝終於永康丁未孝靈繼之漢室滅矣魏文帝以黄初丙午終明帝嗣位司馬氏奪國兆於此時晉武太康六年七年惠帝正在東宫元海毒亂此其源也東晉訖隋南北分裂九縣飈回在所不論唐太宗正觀之季武氏已在後宫中宗神龍景龍其事可見代宗大厯元年大盗初平而置其餘孽於河北强藩悍鎮卒以亡唐寳厯丙午敬宗遇弑大和丁未是為文宗甘露之悲至於不可救藥僖宗光啓之際天下固已大亂而中官刼幸興元襄王煴僣立石晉開運遺禍至今皇朝敬德方脫契丹之擾而明年祥符神仙宫觀之役崇熾海内虛耗治平丁未王安石入朝愲亂宗社靖康丙午都城受圍逮於丁未汴失守矣淳熈丁未髙宗上仙揔而言之大抵丁未之災又惨於丙午昭昭天象見於運行非人力之所能為也祖宗命相祖宗進用宰相惟意所屬初不以内外髙卑為主若召故相則率置諸見當國者之上太平興國中薛文惠公居正薨盧多遜沈倫在相位而趙韓王普以太子太保散秩而拜昭文咸平四年李文靖公沆為集賢而召故相吕文穆公䝉正為昭文景徳元年文靖薨王文正公旦文穆公欽若為參政不次補而畢文簡公士安由侍讀學士寇忠愍公凖由三司使並命為史館集賢畢公雖歴參政不及一月至和二年陳恭公執中罷劉沆在位而外召文富二公文公復為昭文富為集賢而沆遷史館熈寧三年韓獻肅公絳王荆公安石同拜韓在上而先罷荆公越四年亦罷韓復為館相明年荆公再入遂拜昭文居韓之上元祐元年召文潞公於洛司馬公自門下侍郎拜左僕射固辭乞令彦愽以太師兼侍中行左僕射而已為右以佐之宣仁不許曰彦愽豈可居卿上欲命兼侍中行右僕射㑹臺諫有言彦愽不可居三省長官於是但平章軍國重事崇寧以後蔡京凡四入輒為首台此非可論典故也隆興元年冬湯岐公思退為右僕射張魏公浚為樞宻使孝宗欲命張為左請於徳壽髙宗曰湯思退元是左相張浚元是右相只仍其舊可也於是出命容齋五筆卷十}
