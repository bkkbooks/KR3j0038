  - {type: line-break, offset: 0, content: '', id: KR3j0038_SBCK_048-1a01}
  - {type: variant, offset: 0, length: 269, content: 容齋三筆卷第十二眄泰秋娘三女白樂天鷰子樓詩序云徐州故張尚書有愛妓曰眄眄善歌舞稚多風態尚書旣殁彭城有舊第第中有小樓名鷰子眄眄念舊愛而不嫁居是樓十餘年幽獨塊然白公嘗識之感舊游作三絶句首章云滿䆫明月滿簾霜𬒳冷燈殘拂卧牀鷰子樓中霜月苦秋來只爲一人長末章云今春有客洛陽回曽到尚書冡上來見說白楊堪作柱爭教紅粉不成灰讀者傷惻劉夣得泰娘歌云泰娘本韋尚書家主謳者尚書爲呉郡得之誨以琵琶使之歌且舞携歸京師尚書薨出居民間爲蘄州刺史張愻所得愻謫居武陵而卒泰娘無所歸地荒且逺無有能知其容與藝者故日抱樂器而哭劉公爲歌其事云繁華一旦有消歇題劒無光履聲絶蘄州刺史張公子白, WYG: ''}
