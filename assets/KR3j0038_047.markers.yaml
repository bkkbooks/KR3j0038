  - {type: line-break, offset: 0, content: '', id: KR3j0038_SBCK_047-1a01}
  - {type: variant, offset: 0, length: 1963, content: 容齋三筆卷第十一十六則碑誌不書名碑誌之作本孝子慈孫欲以稱揚其父祖之功德播之當時而垂之後世當直存其名字無所避隱然東漢諸銘載其先代多只書官如淳于長夏承碑云東萊府君之孫太尉掾之中子右中郎將之弟李翊碑云䍧柯太守曽孫謁者孫從事君元子之類是也自唐及本朝名人文集所志往往只稱君諱某字某至於記序之文亦然王荆公爲多殆與求文揚名之旨爲不相契東坡先生送路都曹詩首言乖崖公在蜀有録事參軍老病廢事公責之遂求去以詩留别所謂秋光都似宦情薄山色不如歸意農者公驚謝之曰吾過矣同僚有詩人而吾不知因留而慰薦之坡㓜時聞父老言恨不問其姓名及守潁州而都曹路君以小疾求致仕誦此語留之不可乃采前人意作詩送之其詩大略云結髪空百戰市人看先封誰能搔白首抱關望夕烽則路君之賢而不遇可知矣然亦不書其名使之少獲表見又爲可惜也漢文帝不用兵史記律書云高祖厭苦軍事偃武休息孝文即位將軍陳武等議曰南越朝鮮擁兵阻阸選蠕觀望宜及士民樂用征討逆黨以一封疆孝文曰朕能任衣冠念不到此㑹吕氏之亂誤居正位常戰戰慄慄恐事之不終且兵凶器雖克所願動亦耗病謂百姓逺方何今匈奴内侵邊吏無功邊民父子荷兵日乆朕常爲動心傷痛無日忘之願且堅邊設候結和通使休寧北陲爲功多矣且無議軍故百姓無内外之繇得息肩於田畒天下富盛粟至十餘錢予謂孝文之仁德如此與武帝黷武窮兵爲霄壤不侔矣然班史略不及此事資治通鑑亦不編入使其事不甚暴白惜哉帝王諱名帝王諱名自周世始有此制然只避之於本廟中耳克昌厥後駿發爾私成王時所作詩昌發不爲文武諱也宣王名誦而吉甫作誦之句正在其時厲王名胡而胡爲虺蜴胡然厲矣之句在其孫幽王時小國曰胡亦自若也襄王名鄭而鄭不改封至於出居其國使者告于秦晉曰鄙在鄭地受晉文公朝而鄭伯傅王唯秦始皇以父莊襄王名楚稱楚曰荆其名曰政自避其嫌以正月爲一月蓋巳非周禮矣漢代所謂邦之字曰國盈之字曰滿徹之字曰通雖但諱本字而吏民犯者有刑唐太宗名丗民在位之日不偏諱故戴胄唐儉爲民部尚書虞世南李世勣在韓至于高宗始改民部爲戸部世勣但爲勣諱公諱辨云今上書及詔不聞諱滸勢秉饑惟宦官宫妾乃不敢言喻及機以爲觸犯此數者皆其先世嫌名也本朝尚文之習大盛故禮官討論每欲其多廟諱遂有五十字者舉埸試卷小渉疑似士人輙不敢用一或犯之往往暗行黜落方州科舉尤甚此風殆不可革然太祖諱下字内有从木从匀者廣韻於進字中亦收張魏公以名其子而音爲進太宗諱字內有从耳从火者又有梗音今爲人姓如故高宗諱内从勹从口者亦然眞宗諱从小从亘音胡登切若缺其下畫則爲恒遂并恒字不敢用而易爲常矣家諱中字士大夫除官於官稱及州府曹局名犯家諱者聽回避此常行之法也李燾仁甫之父名中當贈中奉大夫仁甫請於朝謂當告家廟與自身不同乞用元豐以前官制贈光禄卿丞相頗欲許之予在西垣聞其說爲諸公言今一變成式則它日贈中大夫必爲祕書監贈太中大夫必爲諌議矣決不可行遂止李愿爲江東提刑以父名中所部遂呼爲通議蓋近世率妄稱太中也李自稱只以本秩曰朝散黄通老資政之子爲臨安通判府中亦稱爲通議而受之自如記張元事自古夷狄之臣來入中國者必爲人用由余入秦穆公以霸金日磾仕漢脫武帝五柞之厄唐世尤多執失思力阿史那社爾李臨淮高仙芝渾瑊李懷光􅎤跌光顔朱耶克用皆立大功名不可殫紀然亦在朝廷所以御之否則爲郭藥師矣儻使中國英雋翻致力於異域忌壯士以資敵國者固亦多有賈季在狄晉六卿以爲難日至亘温不能留王猛使爲符堅用唐莊宗不能知韓延徽使爲阿保機用皆是也西夏曩霄之叛其謀皆出於華州士人張元與呉昊而其事本末國史不書比得田晝承君集實紀其事云張元吳昊姚嗣宗皆關中人負氣倜儻有縱横才相與友善嘗薄遊塞上觀覘山川風俗有經略西鄙意姚題詩崆峒山寺壁在兩界間云南粤干戈未息肩五原金鼓又轟天崆峒山叟笑無語飽聽松聲春晝眠范文正公廵邊見之大驚又有踏破賀蘭石掃清西海塵之句張爲鸚鵡詩卒章曰好着金籠收拾取莫教飛去别人家吳亦有詩將謁韓范二帥恥自屈不肯往乃礱大石刻詩其上使壯夫拽之於通衢三人從後哭之欲以鼓動二帥旣而果召與相見躊躇未用間張吳徑走西夏范公以急騎追之不及乃表姚入幕府張吳旣至夏國夏人倚爲謀主以抗朝廷連兵十餘年西方至爲疲弊職此二人爲之時二人家屬羈縻隨州間使諜者矯中國詔釋之人未有知者後乃聞西人臨境作樂迎此二家而去自是邊帥始待士矣姚又有述懐詩曰大開雙白眼只見一青天張有雪詩曰五丁仗劒決雲霓直取銀河下帝畿戰死玉龍三十萬敗鱗風卷滿天飛吳詩獨不傳觀此數聮可想見其人非池中物也承君所記如此予謂張吳在夏國然後舉事不應韓范作帥日尚猶在關中豈非記其歳時先後不審乎姚張詩筆談諸書頗亦紀載張吳之名正與羌酋二字同蓋非偶然也宫室土木秦始皇作阿房宫寫蜀荆地材至關中役徒七十萬人隋煬帝營宫室近山無大木皆致之逺方二千人曵一柱以木爲輪則戞摩火出乃鑄鐵爲轂行一二里轂輙破别使數百人齎轂隨而易之盡日不過行二三十里計一柱之費巳用數十萬功大中祥符間姦佞之臣罔眞宗以符瑞大興土木之役以爲道宫玉清昭應之建丁謂爲修宫使凡役工日至三四萬所用有秦隴歧同之松嵐石汾隂之栢潭, WYG: ''}
