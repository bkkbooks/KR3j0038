  - {type: punctuation, offset: 4050, content: (, id: KR3j0038_krp_047-bkkpn395}
  - {type: variant, offset: 4050, length: 0, content: '', WYG: 欽定四庫全書容齋三筆卷十二十六則宋洪邁撰眄泰秋娘三女白樂天鷰子樓詩序云徐州故張尚書有愛妓曰眄眄善歌舞雅多風態尚書既殁彭城有舊第第中有小樓名鷰子眄眄念舊愛而不嫁居是樓十餘年幽獨塊然白公嘗識之感舊游作二絶句首章云滿䆫明月滿簾霜被冷燈殘拂卧牀鷰子樓中霜月苦秋來只為一人長末章云今春有客洛陽回曾到尚書冡上來見說白楊堪作柱爭教紅粉不成灰讀者傷惻劉夢得泰娘歌云泰娘本韋尚書家主謳者尚書為呉郡得之誨以琵琶使之歌且舞携歸京師尚書薨出居民間為蘄州刺史張愻所得愻謫居武陵而卒泰娘無所歸地荒且逺無有能知其容與藝者故日抱樂器而哭劉公為歌其事云繁華一旦有消歇題劍無光履聲絶蘄州刺史張公子白馬新到銅駝里自言買笑擲黄金月墮雲中從此始山城少人江水碧斷鴈哀絃風雨夕朱弦已絶為知音雲鬢未秋私自惜舉目風煙非舊時夢尋歸路多參差如何將此千行淚更灑湘江斑竹枝杜牧之張好好詩云牧佐故吏部沈公在江西幕好好年十三以善歌來樂籍中隨公移置宣城後為沈著作所納見之於洛陽東城感舊傷懐題詩以贈曰君為豫章姝十三纔有餘主公再三歎謂言天下無自此每相見三日已為踈身外任塵土尊前極歡娯飄然集仙客載以紫雲車爾來未㡬嵗散盡髙陽徒洛陽重相見綽綽為當壚朋遊今在否落拓更能無問館慟哭後水雲秋景初洒盡滿襟淚短歌聊一書予謂婦人女子華落色衰至於失主無依如此多矣是三人者特見紀於英辭鴻筆故名𫝊到今況於士君子}
