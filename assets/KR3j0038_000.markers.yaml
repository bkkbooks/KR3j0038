  - {type: line-break, offset: 0, content: '', id: KR3j0038_SBCK_000-1a01}
  - {type: variant, offset: 0, length: 2007, content: 容齋隨筆五集緫序知贑州寺簿洪公伋以書來曰從祖文敏公由右史岀守是邦今四十餘年矣伋何幸逺繼其後官閑無事取文敏隨筆紀録自一至四各十六卷五則絶筆之書僅有十卷悉鋟木于郡齋用以示邦人焉想像抵掌風流宛然如在公其爲我識之僕頃備數憲幕留贑二年至之日文敏去才旬月不及識也而經行之地筆墨飛動人誦其書家有其像平易近民之政悉能言之有訴不平者如訴之於其父而謁其所欲者如謁之於其母後十五年文敏爲翰苑出鎭淛東㒒適後至濫吹朝列相隔又旬月竟不及識而與其子太社􅯗其孫參軍偃相從甚乆得其文愈多而所謂隨筆者僅見一二今所有太半出於淛東歸休之後冝其不盡見也可以稽典故可以廣聞見可以證訛謬可以膏筆端實爲儒生進學之地何止慰贑人去後之思㒒又甞風陳日華盡得夷堅十志與支志三志及四志之二共三百二十卷就摘其間詩詞雜著藥餌符呪之屬以類相從編刻于湖隂之計臺䟽爲十卷覽者便之㒒因此搜索志中欲取其不渉神怪近於人事資鑒戒而佐辯博非夷堅所冝収者別爲一書亦可得十卷俟其成也規以附刻于章貢可乎寺簿方以課最就持憲節威行谿洞折其萌芽民實隂受其賜願少留於此它日有餘力則經紀文敏之家子孫未振家集大全恐馴致散失再爲収拾實難今盤洲小隱二集士夫珍藏墨本已乆獨野處未焉寺簿推廣隨筆之用心願有以亟圖之可也嘉定壬申仲冬𥘉吉寶謨閣直學士太中大夫提舉隆興府玉隆萬壽宮臨川何異謹序容齋隨筆目録第一卷二十五則歐率更帖羅處士誌唐平蠻碑半擇迦六十四種惡口八月端午􅐌公少公郭璞葬地黃魯直詩禹治水敕勒歌淺妄書五臣注文選文煩簡有當地險史記丗次解釋經旨坤動也剛樂天侍兒白公詠史十年爲一秩裴晉公稧事司字作入聲樂天新居詩黃紙除書白用杜句唐人重服章詩䜟不然靑龍寺詩第二卷二十四則唐重牡丹長歌之哀韋蘇州古行宮詩隔是張良無後周亞夫漢輕族人漏泄禁中語田叔孟舒魏尚秦用他國人曹參趙括信近於義剛毅近仁忠恕違道求爲可知里仁漢采衆議漢母后田千秋郅惲戾太子灌夫任安單于朝漢第三卷二十一則進士試題儒人論佛書和歸去來四海一也李太白太白雪讒冉有問衞君商頌俗語有所本鄱陽學國忌休務漢昭順二帝三女后之賢賢父兄子弟蔡君謨帖親王與從官往還三傳記事張嘉貞張九齡作牛公碑唐人告命典章輕廢第四卷二十三則張浮休書温公客位牓李頎詩詩中用茱茰字鬼宿度河府名軍額馬融皇甫規孟蜀避唐諱翰苑親近寧馨阿堵鳯毛牛米石鼔歌過實送孟東野序噴嚏野史不可信謗書王文正公晉文公南夷服諸葛二䟽􅐌李宓伐南詔浮梁陶器第五卷二十五則漢唐八相六卦有坎晉之亡與秦隋異上官桀金日磾漢宣帝忌昌邑王平津侯韓信周瑜漢武賞功明白周召房杜三代書同文周丗中國地李後主梁武帝詩什易舉正其惟聖人乎易說卦元二之災聖人汙廿􅞀字字省文負劒辟珥國初人至誠史館玉牒所稗沙門第六卷十九則建武中元帶職人轉官上下四方魏相蕭望之姓氏不可考畏無難緑竹靑靑孔子欲討齊韓退之誕節受賀左氏書事狐突言詞有味宣髮邾文公楚昭王杜悰唐書丗系表魯昭公州縣失故名嚴州當爲莊第七卷十八則孟子書百里奚韓柳爲文之旨李習之論文魏鄭公諌語虞丗南七發將軍官稱北道主人洛中盱江八賢王導小名漢書用字姜嫄簡狄羌慶同音佐命元臣名丗英宰檀弓誤字薛能詩漢晉太常第八卷十五則諸葛公沐浴佩玉談叢失實石砮陶淵明東晉將相賞魚袋浯溪留題皇甫湜詩人物以義爲名人君壽考韓文公佚事論韓公文治生從宦眞宗末年第九卷二十八則霍光賞功尺棰取半漢文失材陳軫之說踈顔率兒童之見皇甫湜正閏論簡師之賢老人推恩唐三傑忠義出天資劉歆不孝漢法惡誕謾漢官名五胡亂華石宣爲彗三公改它官帶職致仕朋友之義髙科得人辛慶忌楚懷王范増非人傑翰苑故事唐楊州之盛張祜詩古人無忌諱宰我不詐李益盧綸詩第十卷二十則楊彪陳羣袁盎温嶠日飲亡何爰盎小人唐書判古彝器玉蘂杜䳌禮寺失職徐凝詩梅花橫參致仕之失南班宗室省郎稱謂水衡都尉二事程嬰杵臼戰國自取亡臨敵易將司空表聖詩漢丞相冊禮不講第十一卷十六則將帥貪功漢二帝治盜漢唐封禪漢封禪記楊虞卿屯蒙二卦漢誹謗法誼向觸諱小貞大貞唐詩戯語何進高叡南郷掾史漢景帝忍殺燕昭漢光武之明周南召南易中爻第十二卷十八則利渉大川光武弃馮衍恭顯議蕭望之􅏯錯張湯逸詩書刑罰四卦巽爲魚三省長官王珪李靖虎䕫藩曹操用人漢士擇所從劉公榮元豐官制耳餘袁劉周末存國曹操殺楊脩古人重國體第十三卷十八則諌說之難韓馥劉璋蕭房知人俞似詩吴激小詞君子爲國兌爲羊晏子楊雄一以貫之裴潛陸俟拔亡爲存孫吴四英將東坡羅浮詩魏明帝容諌漢丗謀於衆國朝會要孫臏減竈蟲鳥之智第十四卷十七則張文潛論詩漢祖三詐有心避禍蹇解之險士之處丗張全義治洛博古圖士大夫論利害舒元輿文絶唱不可和贈典輕重揚之水李陵詩大曲伊涼元次山元子次山謝表光武仁君第十五卷十九則張文潛哦蘇杜詩任安田仁杜延年杜欽范曅作史唐詩人名不顯者蘇子由詩呼君爲爾汝丗事不可料蔡君謨帖語孔氏野史有若張天覺爲人爲文論事連昌宫詞二士共談張子韶祭文京師老吏曹操唐莊宗雲中守魏尚第十六卷十九則文章小伎三長月兄弟直西垣續樹萱録館職名存南宫适吴王殿王衞尉前代爲監治盜法不同和詩當和意稷有天下一丗人材王逢原吏文可笑靖康時事并韶䜟緯之學眞假皆妄, WYG: ''}
