  - {type: line-break, offset: 0, content: '', id: KR3j0038_SBCK_035-1a01}
  - {type: variant, offset: 0, length: 520, content: 㑹通館印正容齋隨筆序博學而詳說之將以反說約也然博而不約者有矣未有不博而能至於約也容齋隨筆書之博者也提綱挈領博而能約者也書成於宋學士洪景盧學者歆羡而未得其眞者乆矣太醫院醫士吳郡盛用美得之於京師士夫欲版其行邑宰邢君陽民用而未行適僉憲雷公水利江南廵行吾錫遂致禮㑹通館以逹君志嗚呼燧生當文明之運而活字銅版樂天之成苟以是心至應之惟謹况士夫以稽古爲事君以愛民爲心而公禮意兼至者乎雖然學者徒務其博而不能反說以至於約則是書爲糟粕豈公之所望於人者哉弘治八年中秋錫山華燧序容齋三筆序王右將軍逸少晉宋閒第一流人也遺情軒冕擺落世故蓋其生平雅懷自去㑹稽内史遂不肯復出自誓於父母墓下詞致確苦予味其言而深悲之又讀所與謝萬石書云坐而獲逸遂其宿心比嘗與安石東游山海頥養閑暇之餘欲與親故時共懽宴銜杯引滿語田里所行故以爲撫掌之資其爲得意可勝言邪常依依陸賈班嗣之處世老夫忘願盡於此也案是時逸少春秋財五十餘耳史氏不能賞取其高乃屑屑以爲坐王懷祖之故待之淺矣予亦從㑹稽解組還里于今六年仰瞻昔賢猶駑蹇之視天驥本非倫儗而年齡之運踰七望八法當挂神虎之衣冠無假於誓墓也幸方寸未渠昏於寛閑寂寞之濵窮勝樂時之暇時時捉筆据几隨所趣而志之雖無甚竒論然意到即就亦殊自喜於是容齋三筆成累月矣稚子云不可無序引, WYG: ''}
