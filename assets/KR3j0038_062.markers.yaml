  - {type: variant, offset: 3783, length: 0, content: '', WYG: 定命逺猶辰告毛公曰訏大也謨謀也猶道也辰時也猶與猷同鄭箋曰猶圖也言大謀定命為天下逺圖庶事而以嵗時告施之如正月始和布政也案此特謂上告下之義今詞臣乃用於制詔以屬臣下而臣下於表章中亦用之不知其與入告爾后之告不侔也生民之詩曰誕彌厥月毛公曰誕大也彌終也鄭箋言后稷之在其母終人道十月而生案訓彌為終其義亦未易曉至俾爾彌爾性似先公酋矣既釋彌為終又曰酋終也頗涉頻複生民凡有八誕字誕寘之隘巷誕寘之平林誕寘之寒氷誕實匍匐誕后稷之穡誕降嘉種誕我祀如何若悉以誕為大於義亦不通它如誕先登于岸之類新安朱氏以為發語之辭是已莆田鄭氏云彌只訓滿謂滿此月耳今稱聖節曰降誕曰誕節人相稱曰誕日誕辰慶誕皆為不然但承習膠固無由可革雖東坡公亦云仰止誕彌之慶未能免}
