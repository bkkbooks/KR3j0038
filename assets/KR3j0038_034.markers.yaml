  - {type: variant, offset: 4842, length: 0, content: '', WYG: 欽定四庫全書卷容齋三筆目録卷一十四則晁景迃經說邳肜酈商武成之書象載瑜管晏之言共工氏漢志之誤漢將軍在御史上上元張燈七夕用六日宰相叅政員數朱崖遷客張士貴宋璟韓歐文語卷二十六則漢宣帝不用儒國家府庫劉項成敗占術致禍絳侯萊公無名殺臣下平天冠介推寒食進士訴黜落後漢書載班固文趙充國馬援漢人希姓絳灌題詠絶唱秀才之名魏收作史卷三十九則兎葵燕麥黔黎遭兵之苦太守刺史贈吏民官李元亮詩啓元魏改功臣姓氏東坡和陶詩孔戣鄭穆陳季常文用謚字高唐神女賦其言明且清侍從轉官曹子建七啓姦鬼爲人禍監司待廵撿十二分野公孫五樓薦士稱字著年兄弟邪正卷四十五則三豎子樞密稱呼從官事體九朝國史銀牌使者省錢百陌舊官銜冗贅吏胥侮洗文書宣告錯誤軍中抵名爲官禍福有命眞宗北征宰相不次補外制之難文臣換武使卷五十七則舜事瞽叟孔子正名濳火字誤永興天書王裒嵇紹張詠傳緋紫假服樞密名稱更易過稱官品仁宗立嗣郎官員數東坡慕樂天縛雞行油汚衣詩金主誅宗王州郡書院何韓同姓卷六十五則蕨萁養人賢士隱居者張籍陳無已詩杜詩誤字東坡詩用老字杜詩命意擇福莫若重用人文字之失李衛公輞川圖䟦白公夜聞歌者謝朏志節琵琶亭詩減損入官人韓蘇文章譬喻唐昭宗贈諫臣官卷七十四則執政辭轉官宗室補官孫宣公諫封禪等赦恩爲害代宗崇尚釋氏光武苻堅周武帝宣帝唐觀察使冗濫除官節度使稱太尉五代濫刑太一推筭趙丞相除拜唐昭宗恤録儒士卷八五則徽宗薦嚴疏文忠宣公謝表四六名對吾家四六唐賢啓狀卷九十六則樞密兩長官赦放債負馮道王溥周𤣥豹相鈷鉧滄浪司封失典故老人該恩官封學士中丞漢高祖父母姓名君臣事跡屏風僧道科目射佃逃田周世宗好殺孟字義訓向巨原詩葉晦叔詩卷十十七則詞學科目唐夜試進士納紬絹尺度朱梁輕賦坎離隂陽前執政爲尚書河伯娶婦六經用字鄂州興唐寺鍾禰衡輕曹操禁中文書老子之言孔叢子小星詩桃源行司封贈典之失辰巳之巳卷十一十六則碑誌不書名漢文帝不用兵帝王諱名家諱中字記張元事宫室土木歳月日風雷雄雌東坡三詩天文七政符讀書城南致政官上壽五經字義相反鎭星爲福東坡引用史傳兩莫愁何公橋詩卷十二十六則眄泰秋娘三女顏魯公祠堂詩閔子不名曾晳待子不慈具圓復詩人當知足淵明孤松饒州刺史紫極觀鍾兼中書令作文字要㸃撿侍從兩制片言解禍忠言嘉謨免直學士院大賢之後卷十三十三則鍾鼎銘識犧尊象尊再書博古圖碌碌七字占測天星政和宫室僧官試卿大觀筭學十八鼎四朝史志宗室參選元豐庫五俗字卷十四十七則三教論衡夫兄爲公政和文忌瞬息須臾神宗待文武臣緑竹王芻親除諫官撿放災傷檀弓注文左傳有害理處夫人宗女請受蜀茶法判府知府歌扇舞衣官會折閱飛鄰望鄰衙參之禮卷十五十八則内職命詞蔡京除吏題宣聖廟詩季文子魏獻子尊崇聖字媵字訓周禮奇字大禹之言隨巢胡非子别國方言縱臾揔持寺唐勑牒禁旅遷補六言詩難工杯水救車薪詘一人之下秦漢重縣令客之字訓變卷十六二十則蹇氏父子神臂弓勑令格式顏魯公戲吟紀年用先代名中舍多赦長惡奏讞疑獄醫職濫冗切脚語唐世辟寮佐有詞高子允謁刺蔡君謨書碑楊渉父子佛胷卍字蘇渙詩歲後八日門焉閨焉郡縣主壻官樂府詩引喻容齋三筆目録}
