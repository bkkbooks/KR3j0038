  - {type: variant, offset: 100, length: 328, content: 名殺臣下介推寒食進士訴黜落趙充國馬援後漢書載班固文漢人希姓絳灌秀才之名題詠絶唱魏收作史第三卷十九則兎葵燕麥北狄俘虜之苦太守刺史贈吏民官李元亮詩啓東坡和陶詩元魏改功臣姓氏孔戣鄭穆陳季常高唐神女賦文用謚字其言明且清侍從轉官姦鬼爲人禍曹子建七啓監司待廵檢十二分野薦士稱字著年公孫五樓兄弟邪正第四卷十五則三竪子從官事體樞密稱呼九朝國史銀牌使者舊官銜冗贅省錢百陌吏胥侮洗文書宣告錯誤禍福有命軍中抵名爲官眞宗北征宰相不次𥙷文臣換武使外制之難第五卷十七則舜事瞽叟濳火字誤孔子正名永興天書王裒嵇紹緋紫假服張詠傳樞密名更易過稱官品郎官貟數仁宗立嗣東坡慕樂天縳雞行北虜誅宗王油汚衣詩州郡書院何韓同姓第六卷十五則蕨萁養人張籍陳無巳詩賢士隱居者杜詩誤字東坡詩用老字擇福莫若重杜詩命, WYG: 甚奇論然}
