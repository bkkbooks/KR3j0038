  - {type: variant, offset: 2, length: 1, content: 卷, WYG: 流人也遺情軒冕擺落世故蓋其生平雅懷自去會稽内史遂不肯復出自誓於父母墓下詞致確苦予味其言而深悲之又讀所與謝萬石書云坐而獲逸遂其宿心比嘗與安石東游山海頥養閒暇之餘欲與親知時共歡宴銜盃引滿語田里所行故以爲撫掌之資其爲得意可勝言邪常依依陸賈班嗣之處世老夫志願盡於此也按是時逸少春秋纔五}
