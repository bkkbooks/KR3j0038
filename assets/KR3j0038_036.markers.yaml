  - {type: variant, offset: 429, length: 777, content: 用人文字之失李衞公輞川圖跋白公夜聞歌者謝朏志節琵琶亭詩韓蘇文章譬喻減損入官人唐昭宗贈諌臣官第七卷十四則執政辤轉官宗室補官孫宣公諌封禪等赦恩爲害光武符堅代宗崇尚釋氏周武帝宣帝唐觀察使節度使稱太尉冗濫除官五代濫刑太一推筭趙丞相除拜唐昭宗恤録儒士第八卷五則徽宗薦嚴䟽文四六名對忠宣公謝表吾家四六唐賢啓狀第九卷十六則樞密兩長官馮道王溥赦放債負周玄豹相鈷鉧滄浪老人該恩官封司封失典故學士中丞漢高祖父母姓名君臣事迹屏風僧道科目射佃逃田孟字義訓周世宗好殺向巨原詩葉晦叔詩第十卷十七則詞學科目納紬絹尺度唐夜試進士朱梁輕賦坎離陽隂河伯娶婦前執政爲尚書六經用字鄂州興唐寺鍾禁中文書禰衡輕曹操老子之言孔叢子桃源行小星詩司封贈典之失辰巳之巳第十一卷十六則碑誌不書名帝王諱名漢文帝不用兵家諱中字記張元事宫室土木歳月日風雷雄雌東坡三詩符讀書城南天文七政致仕官上壽五經字義相反東坡引用史傳鎮星爲福兩莫愁何公橋詩第十二卷眄㤗秋娘三女閔子不名顔魯公詞堂詩曽晳待子不慈具圎復詩淵明孤松人當知足饒州刺史紫極觀鍾作文字要點檢兼中書令侍從兩制片言解禍免直學士院忠言嘉謨大賢之後第十三卷鍾鼎銘識再書博古圗犧尊象尊碌碌七字占測天星僧官試卿政和宫室大觀筭學十八鼎宗室參選四朝史志元豐庫五俗字第十四卷三教論衡政和文忌夫兄爲公瞬息須臾神宗待文武臣親除諌官緑竹王芻檢放災傷檀弓注文夫人宗女請受左傳有害理處蜀茶法判府知府官㑹折閱歌扇舞衣飛鄰望鄰衙參之禮第十五卷十八則内職命詞題先聖廟詩蔡京除吏季文子魏獻公尊崇聖字周禮竒字媵字訓大禹之書隨巢胡非子縱臾别國方言揔持寺唐勑牒禁旅遷補杯水救車薪六言詩難工詘一人之下秦漢重縣令客之字訓變第十六卷二十則蹇氏父子勑令格式神臂弓顔魯公戲吟紀年用先代名多赦長惡中舎奏讞疑獄醫職冗濫切脚語唐世辟寮佐有詞髙子允謁刺楊渉父子蔡君謨書碑佛胷卍字蘇渙詩門焉閨焉歳後八日郡縣主壻官樂府詩引喻, WYG: 到即就亦殊自喜於是}
