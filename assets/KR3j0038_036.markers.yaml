  - {type: variant, offset: 25, length: 2, content: 言漢, WYG: 淺矣予亦從會稽解組還里于今六年仰瞻昔賢猶駑蹇之視天驥本非倫擬而年齡之運踰七望八法當挂神虎之衣冠無暇於誓墓也幸方寸未渠昏於寛閒寂寞之濵窮勝樂時之暇時時捉筆据几隨所趣而}
