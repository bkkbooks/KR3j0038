  - {type: variant, offset: 1328, length: 0, content: '', WYG: 容齋四筆目録容齋四筆序始予作容齋一筆首尾十八年二筆十三年三筆五年而四筆之成不費一歲身益老而著書益速蓋有其説曩自越府歸謝絶外事獨弄筆紀述之習不可掃除故捜采異聞但緒夷堅志於議論雌黄不復關抱而稚子櫰毎見夷堅滿紙輒曰隨筆夷堅皆大人素所游戲今隨筆不加益不應厚於彼而薄於此也日日立案旁必俟草一則乃退重逆其意則裒所憶而書之櫰嗜讀書雖就寢猶置一編枕畔旦則與之俱興而天嗇其付年且弱冠聰明殊未開以彼其勤殆必有日丈夫愛憐少子此乎見之於是占抒為序并奬其志云慶元三年九月二十四日序容齋四筆序欽定四庫全書}
