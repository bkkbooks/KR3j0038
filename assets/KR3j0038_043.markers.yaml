  - {type: variant, offset: 4435, length: 1, content: 終, WYG: 欽定四庫全書容齋三筆卷八五則宋洪邁撰徽宗薦嚴䟽文徽宗以紹興乙卯嵗升遐時忠宣公奉使未反命滯留冷山遣使臣沈珍往燕山建道塲於開泰寺作功徳䟽曰千嵗厭世莫遂乘雲之僊四海遏音同深䘮考之戚況故宫為禾黍改館徒饋於泰牢新廟游衣冠招䰟漫歌於楚此雖置河東之賦莫止江南之哀遺民失望而痛心孤臣久縶惟歐血伏願盛徳之祀𫝊百世以彌昌在天之靈繼三后而不朽北人讀之亦墮淚爭相傳誦其後梓宫南還公已徙燕率故臣之不忘國恩者出迎於城北搏膺大慟虜俗最重忠義不以為罪也忠宣公謝表建炎三年先忠宣公銜命使北方以淮甸賊蠭起除兼淮南京東等路撫諭使俾李成以兵䕶至南京公遣書抵成成方與耿堅圍楚州答書曰汴涸虹有紅巾非五千騎不可往軍食絶不克唯命公隂遣客說堅堅强成歛兵公行未至泗諜云有迎騎甲而來副使龔璹憚之送兵亦不肯前遂返斾即上䟽言李成以餽餉稽緩有引衆納命建康之語今靳賽薛慶方横萬一三叛連衡何以待之方含垢養晦之時宜選辯士諭意優加撫納䟽奏髙宗即遣使撫諭成給米五萬斛初公戒所遣持奏吏須䟽從中出乃詣政事堂白副封時方禁直逹忤宰輔意以託事滯留為罪特貶兩秩而許出滁陽路紹興十三年使回始復元官時已出知饒州命予作謝表直敘其故曰論事見從猶獲稽留之戾出疆滋久屢沾曠蕩之恩始拜明綸得仍舊秩伏念臣頃繇乏使不敢辭難值三盜之連衡阻兩淮而荐食深虞猖獗之患或起呼吸之間輒露便宜冀加勤䘏雖璽書賜報樂聞充國之建言而吏議不容見謂陳湯之生事虧除官簿緜歴嵗}
