  - {type: variant, offset: 2016, length: 297, content: 五胡亂華劉聦乗晉之衰盜竊中土身死而嗣滅男女無少長皆戕於靳凖劉曜承其後不能十年身爲人禽石勒甞盛矣子奪於虎虎盡有秦魏燕齊韓趙之地死不一年而後嗣屠戮無一遺種慕容儁乗石氏之亂跨據河山亦僅終其身至子而滅符堅之興又非劉石比然不能自免社稷爲墟慕容垂乘符氏之亂盡復燕祚死未期年基業傾覆此七人者皆夷狄亂華之巨擘也而不能乆如此今之北虜爲國八十年傳數酋矣未亡何邪石宣爲彗石虎將殺其子宣佛圖澄諌曰陛下若加慈恕福祚猶長若必誅之宣當爲彗星下埽鄴宫虎不從眀年虎死二年國亡晉史書之以爲澄言之驗予謂此乃石氏窮凶極虐爲天所弃豈一逆子便能上干玄象起彗孛乎宣殺其弟韜又欲行冒頓之事寜有不問之理澄言旣妄史氏誤信而載之資治通鑑亦失於不刪也, WYG: ''}
