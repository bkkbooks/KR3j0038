  - {type: indent, offset: 15, content: 　　, id: KR3j0038_krp_054-bkkind2}
  - {type: variant, offset: 16, length: 0, content: '', WYG: 則盛衰不可常唐賦造語相似張藴古大寳箴國初文籍叙西漢郊祀天地騫鶱二字義訓書麴信陵事貢禹朱暉晩達琵琶行海棠詩東坡不隨人後元白習制科門生門下見門生韓蘇杜公叙馬風災霜旱}
  - {type: page-break, offset: 16, content: '', id: KR3j0038_WYG_070-4b, image: WYG0851/WYG0851-0792d.png}
