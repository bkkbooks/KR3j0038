  - {type: substitution, offset: 18, original: 齋, replacement: 齊, reason: scribal-variant-collapsed, mapping: {identifier: 'bkk:mapping/variant-fold-v1', hash: 'sha256:366e8ec95655b72d3205b878dc416602f82ff8a6b5dd240168f5ee5a7c65a61e', entry: vf-3904}}
  - {type: variant, offset: 19, length: 291, content: 先生文敏洪公之所紀述也筆爲卷各十六咸冠以叙五獨十卷而無題辭蓋未及成而絶筆也先生父子伯仲以文籙相襌屹爲一代詩書禮樂宗主論中興人物巨擘當首屈也蒙知四朝眡儀兩地大而裁成國史作宋一經次而代言坡掖雷風鼔動其它高文大冊昈分兩稾而是書所載又翰墨之餘力也其爲書也隂陽象緯是鈎是索經籍傳註是紏是砭古事於我乎發敭古人於我乎品藻正譌攷異核僞剖微若典故沿革若姓族譜諜文有町畦詩有胎骨源而委葉而根下逮僊梵毉數亦時罔羅爲之量齊千彚萬狀而道以貫之卒歸乎一也圭璋璧琮旅敶位置而犀象珠貝鐘磬彛鬲又錯其中麗其側也今江右祥刑使者寺簿公視先生爲從祖贑㫺作屏依然遺愛聞孫紹最因任乗軺亦旣出潢池赤子勞徠而枕席之臺府文書益省廼裒, WYG: ''}
