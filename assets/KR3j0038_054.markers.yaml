  - {type: indent, offset: 17, content: 　　, id: KR3j0038_krp_054-bkkind3}
  - {type: variant, offset: 17, length: 0, content: '', WYG: 八十二則白蘇詩紀年嵗天將富此翁白公說俸禄白居易出位醉翁亭記酒經白公感石禮部韻略非理唐臣乞贈祖承習用經語誤長慶表章元白制科八種經典卷九十二則畏人索報書不能忘情吟擒鬼章祝文歐公送慧勤詩委蛇字之變東不可名園一二三與壹貳叄同何恙不已兩漢用人人元元字韓公潮州表燕賞逢知己端午貼子詞卷十十二則哀公問社絶句詩不貫穿農父田翁詩衛宣公二子謂端爲疋唐人草堂詩句公穀觧經書日桞應辰押字唐堯無後斯須之敬丙午丁未祖宗命相}
  - {type: page-break, offset: 17, content: '', id: KR3j0038_WYG_070-5a, image: WYG0851/WYG0851-0793a.png}
  - {type: page-break, offset: 17, content: '', id: KR3j0038_WYG_070-5b, image: WYG0851/WYG0851-0793b.png}
