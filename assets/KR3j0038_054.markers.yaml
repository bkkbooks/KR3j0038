  - {type: variant, offset: 0, length: 2, content: 自隨, WYG: 容齋五}
  - {type: variant, offset: 3, length: 2, content: 權輿, WYG: 目録卷一十九則天慶諸節虢州兩刺史狐假虎威徐章二先生教人張吕二公文論郎官非時得對王安石棄地雙生以前爲兄風俗通俗語有出昏主棄功臣問故居唐宰相不歴守令張釋之桞渾人臣震主五經秀才陶潜去彭澤羗戎畏服老將古人字只一言卷二十五則二叔不咸官階服章月非望}
  - {type: page-break, offset: 3, content: '', id: KR3j0038_WYG_070-1b, image: WYG0851/WYG0851-0791b.png}
  - {type: variant, offset: 6, length: 1, content: 續, WYG: 食慶善橋西漢以來加官吕望非熊唐曹因墓銘唐史省文}
  - {type: page-break, offset: 6, content: '', id: KR3j0038_WYG_070-2a, image: WYG0851/WYG0851-0791c.png}
  - {type: variant, offset: 8, length: 1, content: 次, WYG: 失李德裕論命令漢武唐德宗諸公論唐肅宗孫馬二公所言元㣲之詩諫繚綾戲龍羅詳正學士卷}
  - {type: variant, offset: 10, length: 1, content: 至, WYG: 十}
  - {type: variant, offset: 12, length: 1, content: 合, WYG: 則人生五計瀛莫間二禽士大夫避父祖諱元正父子忠死蕭頴士風節石尤風江楓雨菊開元宫嬪相里造先公詩詞州縣名同三衙軍制歐陽公勲封贈典嘉祐四真五方老人祝聖夀卷四九則作詩㫖意平王之孫毛詩語助東坡文章不可學韓文稱名棘寺棘卿晉代遺文漢武帝田蚡公孫𢎞近世文物之殊卷五十五則庾公之斯萬事不可過致仕官上夀桃花笑春風嚴先生祠堂記大言誤國宗室覃恩免觧唐書載韓桞文冥靈社首鳳左傳州郡貧富習常唐用宰相史記簡妙處玉津園喜晴詩虢巨賀蘭卷六十二則鄱陽七談經觧之名卜筮不敬糖霜譜李彦僊守陜姦雄疾勝已者俗語放錢漢書多叙谷永玉堂殿閣漢武帝喜殺人者知人之難舘職遷除卷}
  - {type: page-break, offset: 12, content: '', id: KR3j0038_WYG_070-2b, image: WYG0851/WYG0851-0791d.png}
  - {type: page-break, offset: 12, content: '', id: KR3j0038_WYG_070-3a, image: WYG0851/WYG0851-0792a.png}
  - {type: page-break, offset: 12, content: '', id: KR3j0038_WYG_070-3b, image: WYG0851/WYG0851-0792b.png}
  - {type: page-break, offset: 12, content: '', id: KR3j0038_WYG_070-4a, image: WYG0851/WYG0851-0792c.png}
