  - {type: variant, offset: 0, length: 356, content: 容齋五筆目録第一卷十九則天慶諸節狐假虎威虢州兩刺史徐章二先生教人張吕二公文論王安石弃地郎官非時得對雙生以前爲兄風俗通昏主弃功臣俗語有出問故居唐宰相不歷守令人臣震主張釋之栁渾五經秀才陶濳去彭澤古人字只一言羌戎畏服老將第二卷十五則二叔不咸月非望而食官階服章慶善橋西漢以來加官唐曹因墓銘吕望非熊唐史省文之失李德裕論命令諸公論唐肅宗漢武唐德宗孫馬二公所言元微之詩詳正學士諌繚綾戯龍羅第三飬十五則人生五計士大夫避父祖諱瀛莫閒二禽元正父子忠死蕭頴士風節江楓雨菊石尤風開元宫嬪相里造州縣名同先公詩詞三衙軍制歐陽公勲封贈典五方老人祝聖壽嘉祐四眞第四卷九則作詩旨意毛詩語助平王之孫東坡文章不可學韓文稱名晉代遺文棘寺棘卿漢武帝田蚡公孫弘近世文物之殊第五卷十五則庾公之斯致仕官上壽萬事不可過桃花笑春風嚴先生祠堂記宗室覃恩免解大言誤國唐, WYG: ''}
