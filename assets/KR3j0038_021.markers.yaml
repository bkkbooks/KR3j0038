  - {type: variant, offset: 3033, length: 0, content: '', WYG: 論時政失當為侍御史李光所駮今兩者合為一府居同門出同幕與故事異而執政祭祠行事與監祭御史不相見云執政四入頭國朝除用執政多從三司使翰林學士知開封府御史中丞進拜俗呼為四入頭固有盡厯四職而不用如張文定公謂仁英朝至神宗初始用王宣徽之類者趙淸獻公自成都召還知諫院大臣言故事近臣自成都還將大用必更省府謂三司使開封府不為諫官以是知一朝典章其嚴如此至若以權侍郎方受告即為參樞如施鉅鄭仲熊者盖}
