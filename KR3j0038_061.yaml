body:
  text: 容齊五筆卷第七十四則盛衰不可常東坡謂廢興成毀不可得而知豫每讀書史追悼古昔未嘗不掩卷而歎伶子于叙趙飛燕傳極道其姊弟一時之盛而終之以荒田野草之悲言盛之不可留衰之不可推正此意也國𥘉時工部尚書楊玢長安舊居多為鄰里侵占子弟欲以狀訴其事玢批紙尾有試上含元基上望秋風秋草正離離之句方去唐未百年而故宫殿巳如此殆於宗周黍離之詠矣慈恩寺塔有荆叔所題一絶句字極小而端徑最為惑人其詞曰漢國河山在秦陵草樹深暮雲千里色無處不傷心旨意高遠不知為何人必唐世詩流所作也李嶠汾隂行云富貴榮華能幾時山川滿目淚沾衣不見只今汾上水唯有年年秋鴈飛明皇聞之至於泣下杜甫觀畫馬圖云憶昔巡幸新豐宫翠華拂天來向東騰驤磊落三萬匹皆與此圖筋骨同君不見金粟堆前松柏裏龍媒去盡鳥呼風公孫大娘弟子舞劒器行云先帝侍女八千人公孫劒器𥘉第一五十年閒似反掌風塵澒洞昏王室梨園弟子散如煙女樂餘姿映寒日元微之連昌宫詞云兩宫定後六七年却尋家舍行宫前莊園燒盡有枯井行宫門闥樹宛然又云舞榭歌傾基尚在文窗窈窕紗猶緑上皇偏愛臨砌花依然御榻臨階斜寢殿相連端正樓太真梳洗樓上頭晨光未出簾影黑至今反挂珊瑚鈎指似傍人因慟哭却出宫門淚相續凡此諸篇不可勝紀飛燕别傳以為伶玄所作又有玄自叙及宣談跋語豫切有疑焉不唯其書太媟至云楊雄獨知之雄貪名矯激謝不與交為河東都尉捽辱決曹班躅躅從兄子彪續司馬史記絀子于無所叙録皆恐不然而自云成哀之世為淮南相案是時淮南國絶久矣可照其妄也因序次諸詩聊載於此唐賦造語相似唐人作賦多以造語為竒杜牧阿房宫賦云明星熒熒開粧鏡也緑雲擾擾梳曉鬟也渭流漲膩棄脂水也煙斜霧橫焚椒蘭也雷霆作驚宫車過也轆轆遠聽杳不知其所之也其比興引喻如是其侈然楊敬之華山賦又注其前叙述尤壯曰見若咫尺田千畒矣見若環堵城千雉矣見若杯水池百里矣見若蟻垤臺九層矣醯雞往來周東西矣蠛蠓紛紛秦速亡矣蜂窠聮聮起阿房矣俄而復然立建章矣小星奕奕焚咸陽矣纍纍繭栗祖龍藏矣後又有李庾者賦西都云秦址薪矣漢址蕪矣西去一舍鞠為墟矣代遠時移作新都矣其文與意皆不逮楊杜遠甚高彥休闕史云敬之賦五千字唱在人口賦內之句如上數語杜司徒佑李太尉德裕常所誦念牧之乃佑孫則阿房賦實模倣楊作也彥休者昭宗時人張藴古大寶針唐太宗𥘉即位直中書省張藴古上大寶針凡六百餘言遂擢大理丞新唐史雖具姓名於文藝謝偃傳未又不載此文但云諷帝以民畏而末懷其辭挺切而巳資治通鑑僅載其略曰聖人受命拯溺亨屯故以一人治天下不以天下奉一人壯九重於內所居不過容膝彼昏不知瑶其臺而瓊其室羅八珍於前所食不過適口惟狂罔念丘其糟而池其酒勿汶汶而暗勿察察而明雖冕旒蔽目而視於未形雖黈纊塞耳而聽於無聲然此外尚多規正之語如曰惟辟作福惟君實難宅普天之下處王公之上任土貢其有求具寮陳其所唱是故恐懼之心日弛邪僻之情轉放豈知事起乎所忽禍生乎無妄大明無私照至公無私親禮以禁其奢樂以防其佚勿謂無知居高聽卑勿謂何害積小就大樂不可極樂極生哀欲不可縱縱欲成災勿內荒於色勿外荒於禽勿貴難得貨勿聽亡國音內荒伐人性外荒蕩人心難得之貨侈亡國之音淫勿謂我尊而慢賢侮士勿謂我智而拒諌矜巳安彼反側如春陽秋露巍巍蕩蕩恢漢高大度撫兹庶事如履薄臨深戰戰栗栗用周文小心一彼此於胸臆捐好惡於心想如衡如石不定物以限物之懸者輕重自見如水如鏡不示物以情物之鍳者妍蚩自生勿渾渾而濁勿皎皎而清勿汶汶而暗勿察察而明吾王撥亂戡以智力民懼其威未懷其德我皇撫運扇以淳風民懷其始未保其終使人以公應言以行天下為公一人有慶其文大抵不凡既不為史所書故學者亦罕傳誦藴古為丞四年以無罪受戮太宗尋悔之乃有覆奏之旨傳亦不書而以為坐事誅皆失之矣舊唐書全載此針仍專立傳不知宋景文何為削之也國𥘉文籍國𥘉承五季亂離之後所在書籍印板至少宜其焚煬蕩析了無孑遺然太平興國中編次御覽引用一千六百九十鍾其綱目並載于首卷而雜書古詩賦又不及具録以今考之無傳者十之七八矣則是承平百七十年翻不若極亂之世姚鉉以大中祥符四年集唐文粹其序有云況今歷代墳籍略無亡逸觀鉉所類文集蓋亦多不存誠為可歎叙西漢郊祀天地郊祀合祭分祭之論國朝元豐元祐紹聖中三議之矣莫辨於東坡之立說然其大旨駁當時議臣謂周漢以來皆嘗合祭及謂夏至之日行禮為不便豫固贊美之於四筆矣但熟考漢史猶為未盡自高皇帝增秦四畤為五以事天地武帝以來至于元成皆郊見甘泉武帝因幸汾隂始立后土祠於睢上率歲歲閒舉之或隔一歲常以正月郊泰畤三月祠后土成帝建始元年初立南北郊亦用正月三月辛日而罷甘泉汾隂之祭元豐祐紹三議皆未嘗及此蓋盛夏入廟出郊在漢禮元不然也是時坡公以非議者所起故不暇更為之說似不必深攻合祭為王莽所行庶幾往復考賾不至矛盾當復俟知禮者折衷之焉騫鶱二字義訓騫鶱二字音義訓釋不同以字書正之騫去乾切注云馬腹縶又虧也今列於禮部韻略下平聲二仙中鶱虛言切注云飛貌今列於上平聲二十二元中文人相承以騫騰之騫為軒昻掀舉之義非也其字之下從馬馬豈能掀舉哉閔損字子騫雖古聖賢命名制字未必有所拘泥若如虧少之義則渙然矣其下從鳥則於掀飛之訓為得此字殆廢於今故東坡山谷亦皆押騫字入元字如時來或作鵬騫傳非其人恐飛騫之類特不暇毛舉深考耳唯韓公和侯協律詠筍一聮云得時方張王挾勢欲騰鶱乃為得之此固小學瑣瑣尤可以見公之不茍於下筆也書麴信陵事夜讀白樂天秦中吟十詩其立碑篇云我聞望江縣麴令撫惸嫠在官有仁政名不聞京師身殁欲歸葬百姓遮路岐攀轅不得去留葬此江湄至今道其名男女涕皆垂無人立碑碣唯有邑人知豫因憶少年寓無錫時從錢伸仲大夫信書正得言陵遺集財有詩三十三首祈雨文三首信陵以正元元年鮑防下及第為四人以六年作望江令讀其投石祝江文云必也私欲之求行於邑里慘黷之政施於黎元令長之罪也神得而誅之豈可移於入以害其歲詳味此言其為政無愧於神天可見矣至大中十一年寄客鄉貢進士姚輦以其文示縣令蕭縝縝輟俸買石刋之樂天十詩作於正元元和之際距其亡十五年耳而名已不傳新唐藝文志但記詩一卷略無它說非樂天之詩幾於與草木俱腐乾道二年歷陽陸同為望江令得其詩於汝隂王廉清為刋板而致之郡庫但無祈雨文也貢禹朱暉晚逹貢禹壯年仕不遇棄官而歸至元帝𥘉乃召用由諌大夫遷光祿奏言臣犬馬之齒八十一凡有一子年十二則禹入朝時蓋年八十其生子時固巳七十歲矣竟再遷至御史大夫列於三公杜子美云長安卿相多少年富貴應須致身早是不然也朱暉在章帝朝自臨淮太守屏居後召拜僕射復為太守上疏乞留中詔許之因議事不合自繫獄不肯復署議曰行年八十得在機密當以死報遂閉口不復言帝意解遷為尚書令至和帝時復諌征胸奴計其年當九十矣其忠正非禹比也琵琶行海棠詩白樂天琵琶行一篇讀者但羡其風致敬其詞章至形於樂府詠歌之不足遂以謂真為長安故倡所作豫竊疑之唐世法網雖於此為寬然樂天嘗居禁密且謫官未久必不肯乘夜入獨處婦人船中相從飲酒至於極彈絲之樂中夕方去豈不虞商人者它日議其後乎樂天之意直欲攄寫天涯淪落之恨爾東坡謫黃州賦定憲院海棠詩有陋邦何處得此花無乃好事移西蜀天涯流落俱可念為飲一尊歌此曲之句其意亦爾也或謂殊無一話一言與之相似是不然此真能用樂天之意者何必效常人章摹句寫而後巳哉東坡不隨人後自屈原詞賦假為漁父日者問答之後後人作者悉相規倣司馬相如子虛上林賦子虛烏有先生亡是公楊子雲長楊賦以翰林主人子墨客卿班孟堅兩都賦以西都賔東都主人張平子兩都賦以慿虛公子安處先生左太冲三都賦以西蜀公子東吳王孫魏國先生皆改名換字蹈襲一律無復超然新意稍出於法度規矩者晉人成公綏嘯賦無所賔主必假逸群父子乃能遣詞枚乘七發本只以楚太子吳客為言而曹子建七啓遂有玄微子鏡機子張景陽七命有冲漠公子殉華大夫之各言話非不工也而此習根著未之或改若東坡公作後𣏌菊賦破題直云吁嗟先生誰使汝坐堂上稱太守殆如飛龍搏鵬鶱翔扶搖於煙霄九萬里之外不可搏詰豈區區巢林翾羽者所能窺探其涯涘哉於詩亦然樂天云醉貌如霜葉雖紅不是春坡則曰兒童誤喜朱顔在一笑那知是酒紅杜老云休將短髮還吹帽笑倩傍人為正冠坡則曰酒力漸消風力軟颼颼破帽多情却戀頭鄭谷十日菊云自緣今日人心别未必秋香一夜衰坡則曰相逢不用忙歸去明日黃花蝶也愁又曰萬事到頭都是夢休休明日黃花蝶也愁正采舊公案而機杼一新前無古人於是為至與夫用見他桃李樹思憶後園春之意以為長因送人處憶得别家時為一僧所􅥾者有閒矣元白習制科白樂天元微之同習制科中第之後白公寄微之詩曰皆當少壯日同惜盛明時光景嗟虛擲雲霄竊暗窺攻文朝矻矻講學夜孜孜䇿目穿如札毫鋒鋭若錐注云時與微之結集䇿略之目其數至百十各有纎鋒細管筆攜以就試相顧輒笑目為毫錐乃知士子待敵編綴應用自唐以來則然毫錐筆之名起於此也門生門下見門生後唐裴尚書年老致政清泰初其門生馬裔孫知舉放榜後引新進士謁謝於裴裴勸宴永日書一絶云宦途最重是文衡天與愚夫作盛名三主禮闈今八十門生門下見門生時人榮之事見蘇耆開談録豫以白樂天詩有與諸同年賀座主高侍郎新拜太常同宴蕭尚書亭子一篇注云座主於蕭尚書下及第豫考登科記樂天以正元十六年庚辰中書舍人高郢下第四人登科郢以寶應二年癸卯禮部侍郎蕭昕下第九人登科逮郢拜太常時幾四十年矣昕自癸卯放進士之後二十四年丁卯又以禮部尚書再知貢舉可謂壽俊觀白公所賦益可見唐世舉子之尊尚主司也以五代登科記考之裴在同光中三知舉四年放進士八人裔孫預焉後十年裔孫為翰林學士以清泰三年放進士十三人兹所書是巳裔孫尋拜相新史亦載此一句云韓蘇杜公叙馬韓公人物畫記其叙馬處云馬大者九匹於馬之中又有上者下者焉行者牽者奔者涉者陸者翹者顧者鳴者寢者訛者立者齕者飲者溲者陟者降者癢磨樹者噓者嗅者喜而相戲者怒相踶齧者秣者騎者驟者走者載服物者載狐兔者凡馬之事二十有七焉馬大小八十有三而莫有同者焉秦少游謂其叙事該而不煩故倣之而作羅漢記坡公賦韓幹十四馬詩云二馬並驅攢八蹄二馬宛頸鬃尾齊一馬任前雙舉後一馬却避長鳴嘶老􅐖奚官騎且顧前身作馬通馬語後有八匹飲且行微流赴吻若有聲前者既濟山林鶴後者欲涉鶴俯啄最後一匹馬中龍不嘶不動尾搖風韓生畫馬真是馬蘇子作詩如見畫世無伯樂亦無韓此詩此畫誰當看詩之與記其體雖異其為布置鋪寫則同誦坡公之語蓋不待見畫也豫雲林繪監中有臨本略無小異杜老觀曹將軍畫馬圖云昔日太宗拳毛騧近時郭家師子花今之新圖有二馬復令識者久歎嗟其餘七匹亦殊絶逈若寒空動煙雪霜蹄蹴踏長楸間馬官厮養森成列可憐九馬爭神駿顧視清高氣深穩其語視東坡似若不及至於斯須九重真龍出一洗萬古凡馬空不妨獨步也杜又有畫馬讃云韓幹畫馬毫端有神驊騮老大騕􅒁清新及四蹄雷雹一日天地瞻彼駿骨實惟龍媒之句坡公九馬贊言薛紹彭家藏曹將軍九馬圖杜子美所為作詩者也其詞云牧者萬歲繪者惟霸甫為作誦偉哉九馬讀此詩文數篇真能使人方寸超然意氣橫出可謂妙絶動宫墻矣風災霜旱慶元四年饒州盛夏中時雨頻降六七月之間未嘗請禱農家水車龍具倚之於壁父老以為所未見指期西成有秋當倍常歲而低下之田遂以潦告餘干安仁乃於八月罹地火之厄地火者蓋苗根及心孽蟲生之莖幹焦枯如火烈烈正古之所謂蟊賊也九月十四曰嚴霜連降晚稻未實者皆為所薄不能復生諸縣多然有常産者訴于郡縣郡守孜孜愛民有意蠲租然僚吏多云在法無此兩項又云九月正是霜降節不足為異案白樂天諷諌杜陵叟一篇曰九月霜降秋早寒禾穗未熟皆青乾長吏明知不申破急斂暴征求考課此明證也豫因記元祐五年蘇公守杭日與宰相吕汲公書論浙西災傷曰賢哲一聞此言理無不行但恐世俗諂薄成風揣所樂聞與所忌諱爭言無災或有災而不甚損八月之末秀州數千人訴風災吏以為法有訴水旱而無訴風災閉拒不納老幼相騰踐死者十一人由此言之吏不喜言災者蓋十人而九不可不察也蘇公及此可謂仁人之言豈非昔人立法之初如所謂風災所謂早霜之類非如水旱之田可以稽考懼貪民乘時或成冒濫故不輕啓其端今日之計固難添創條式但凡有災傷出於水旱之外者專委良守令推而行之則實惠及民可以救其流亡之禍仁政之上也容齊五筆卷第七終
