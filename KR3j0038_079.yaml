body:
  text: 容齋四筆卷第十三二十四則科舉之弊不可革法禁益煩姦偽滋熾唯科埸最然其尤者莫如銓試代筆有禁也禁之愈急則代之者獲賂謝愈多其不幸而敗者百無一二正使得之元未嘗致法吏部長二簾試之制非不善也而文具兒戲抑又甚焉議論奉公臣朝夕建明然此風如決流偃草未嘗少革或以謂失於任法而不任人之故殊不思所任之人渠肯一意向方見惡輒取於事無益而禍謗先集于厥身矣聞寶中太子賔客邊光範掌選太廟齋郎李宗訥赴吏部銓光範見其年少意未能屬辭語之曰茍援筆成六韻雖不試書判可入等矣宗訥曰非唯學詩亦嘗留心詞賦即試詩賦二首數刻而就甚嘉賞之翌日擬授祕書省正字今之世寧復有是哉宰執子弟廷試太宗朝吕文穆公蒙正之弟蒙亨舉進士禮部高等薦名既廷試與李文正公昉之子宗諤並以父兄在中書罷之國史許仲宣傳云仲宣子待問雍熙二年舉進士與李宗諤吕蒙亨王扶並預廷試宗諤即宰相昉之子蒙亨參知政事蒙正之弟扶鹽鐵使明之子上曰斯並勢家與孤寒競進縱以藝升人亦謂朕有私也皆下第正此事也仲宣時為度支使仁宗朝韓忠憲公億為參知政事子維以進士奏名禮部不肯試大廷受蔭入官唐質肅公介參政子義問鎖廳試禮部用舉者召試祕閣介引嫌罷之舊制嚴於宰執子弟如此與夫秦益公柄國而子熺孫塤皆於省殿試輒冠多士者異矣國𥘉救弊國朝削併僭偽救民水火之中然亦有因仍舊弊未暇更張者故須賴於賢士大夫昌言之江左𥘉平太宗選張齊賢為江南西路轉運使諭以民間不便事令一一條奏先是諸州罪人多錮送闕下緣路非理而死者常十五六齊賢至蘄州見南劒州吏送罪人者索得州帖視之二人皆逢販私鹽者為荷鹽籠得鹽二斤又六人皆嘗見販鹽而不告者並黥決傳送而五人巳死于路江州司理院自正月至二月經過寄禁罪人計三百二十四人建州民二人本田家客戶嘗於主家塘內以錐刺得魚一斤半並杖脊黥靣送闕下齊賢上言之俟至京擇官慮問如顯有負屈者本州官吏量加懲罰自今只令發遣正身及虔州送三囚嘗市得牛肉并家屬十二人悉詣闕而殺牛賊不獲齊賢憫之即遣其妻子還自是江南送罪人者減太半是皆相循習所致也一賢改為其利民如此齊賢以太平興國二年方登斜六年為使者八年還朝由密學拜執政可謂迅用也房玄齡名字舊唐書目録書房元齡而本傳云房喬字玄齡新唐書列傳房玄齡字禹而宰相世系表玄齡字喬松三者不同趙明誠金石録得其神道碑禇遂良書名字與新史傳同豫記先公自燕還有房碑一册于志寧撰乃玄齡字禹松本欽宗在東宫時所藏其後猶有一印曰伯志西齋今亦不存矣二朱詩詞朱載上舒州桐城人為黃州教授有詩云官間無一事胡蝶飛上階東坡公見之稱賞再三遂為知已中書舍人新仲其次子也有家學十八歲時戲作小詞所謂流水泠泠斷橋斜路梅枝亞者朱希真見而書諸扇今人遂以為希真所作又有摺疊扇詞云宫紗蜂趕梅寶扇鸞開翅數摺聚清風一捻生秋意搖搖雲母輕裊裊瓊枝細莫解玉連環怕作飛花墜公親書藁固存亦因張安國書扇而載於于湖集中其詠五月菊詞云玉臺金盞對炎光全似去年香有意莊嚴端午不應忘却重陽菖蒲九節金英蒲把同泛瑶觴舊日東籬陶令北窗正傲羲皇淵明於五六月高卧北窗之下風颯至自謂羲皇上人用此事於五月菊詩家嘆其精切云金剛經四句偈今世所行金剛經用姚秦鳩摩羅什所譯其四句偈曰一切有為法如夢幻泡影如露亦如電應作如是觀又曰若以色見我以音聲求我是人行邪道不能見如來豫博觀它本頗有不同元魏天竺三藏菩提流支譯云一切有為法如星翳燈幻露泡夢電雲應作如是觀而不能見如來之下更有四句云彼如來妙體即法身諸佛法體不可見彼識不能知陳天竺三藏真諦譯云如如不動恆有正説應觀有為法如暗翳燈幻露泡夢電雲若以色見我以音聲求我是人行邪道不應得見我由法應見佛詞御法為身此法非識境法如深難見唐三藏玄奘譯云諸和合所為如星翳燈幻露泡夢電雲應作如是觀諸以色見我以音聲尋我彼生履邪斷不能當見我應觀佛法性即導師法身法性非所識故彼不能了唐沙門義淨譯前四句與魏菩提本同而後云若以色見我以音聲求我是人起邪觀不能當見我後四句與玄奘本同豫案今人稱六如東坡以名堂者謂夢幻泡影露電也而此四譯乃知有九如大般若經第八會世尊頌第九會能斷金剛分二頌亦與玄奘所譯同四蓮華之名嗢鉢摩華青蓮華也鉢特摩華亦云波頭摩赤蓮華也拘母陀華亦云俱物頭亦云俱牟陀紅蓮也奔荼利華亦云芬陀利白蓮也堵羅綿桞絮之類即兜羅綿也黑法白法安立黑法感黑異熟所謂地獄傍生鬼界安立白法感白異熟所謂人天安立黑白去感黑白異熟所謂一分傍生鬼界及一分人安立非黑非白法感非黑非白異熟所謂預留果或一來果或不還果多心經偈多心經偈曰揭帝揭帝波羅揭帝波羅僧揭諦菩提薩摩訶又有大明呪經鳩羅什所譯曰竭帝竭帝波羅竭帝波羅僧竭帝菩提僧莎呵天宫寶樹行行相值莖莖相望枝枝相準葉葉相向華華相順實實相當此無量壽經所言天宫寶樹非塵世所有也白分黑分月盈至滿謂之白分月虧至晦謂之黑分白前黑後合為一月又曰日隨月後行至十五日覆月都盡是名黑半日在月前行至十五日具足圎滿是名白半月雙閏雙十五夜為半月兩半月為一月三月為一時兩時為一行兩行為一季二年半為一雙此由閏故以閏月兼本月此謂月雙非閏雙也以五年再閏為閏雙踰繕那一由旬數量之稱謂踰繕那四十里也毗曇論四肘為一弓五百弓為一拘盧舍八拘盧舍為一由旬一弓長八尺五百弓長四百丈一拘盧舍有二里十六里為一由旬七極微塵七極微塵成一阿耨池上塵七阿耨塵為銅上塵七銅上塵為水上塵七水上塵為兔毫上塵七兔毫上塵為一羊毛上塵七羊毛上塵為一牛毛上塵七牛毛上塵成一嚮遊塵七嚮遊塵成一蟣七蟣成一虱七虱成穔麥七穔麥為一指二十四指為一肘四肘為一弓宰相贈本生父母官封贈先世自晉宋以來有之逮唐始備然率不過一代其恩延及祖廟者絶鮮亦未嘗至極品郭汾陽二十四考中書令而其父贈止太保權德輿位宰相其祖贈止郎中唐末五季宰輔貴臣始追榮三代國朝因之李文正公昉本工部郎中超之子出繼從叔沼昉再入相表其事求贈所生父祖官封詔贈祖溫太子太保祖母權氏莒國太夫人父超太子太師母謝氏鄭國太夫人可謂異數後不聞繼之者執政贈三代不同文臣封贈三代自𥘉除執政外凡轉廳皆不再該唯知樞密院及拜相乃復得之然舊法又不如是歐陽公作程文簡公琳父神道碑歷敘恩典曰琳參知政事贈為太子少師在政事遷左丞又贈太子太師罷為資政殿學士又贈太師中書令為宣徽北院使又贈兼尚書令則是轉官與罷政亦褒贈而自宫師得太師中令更為超越它或不然唐孫處約事新唐書來濟傳云初濟與高智周郝處俊孫處約客宣城石仲覽家仲覽衍於財有器識待四人甚厚私相與言志處俊曰願宰天下濟及智周亦然處約曰宰相或不可冀願為通事舍人足矣後濟領吏部處約始以瀛州書佐入調濟遽注曰如志遂以為通事舍人後皆至公輔高智周傳云智周始與郝處俊來濟孫處約共依江都石仲覽仲覽傾産結四人歡因請各語所期處俊曰丈夫惟無仕仕至宰相乃可智周濟如之處約曰得為舍人在殿中周旋吐納可也後濟居吏部處約以瀛州參軍入調濟曰如志擬通事舍人畢降階勞問平生案兩傳相去才一卷不應重復如此可謂冗長本出韓琬所撰御史臺記而所載自不實處約傳正觀中為齊王祐記室祐多過失數上書切諌王誅太宗得其書擢中書舍人是歲十七年癸卯來濟次年亦為中書舍人永徽三年拜相六年檢校吏部尚書是歲丁巳去癸卯首尾十五歲若如兩傳所書大為不合韓琬之説誠謬史氏又失於不考仲覽鄉里一以為宣城一以為江都豈宣城人而家於廣陵也夏侯勝京房兩傳漢書儒林傳欲詳記經學師承故序列唯謹然夏侯勝京房又自有傳儒林云勝其先夏侯都尉以尚書傳族子始昌始昌傳勝勝又事同郡簡卿傳兄子建建又事歐陽高而本傳又云從始昌受尚書後事簡卿又從歐陽氏從子建師事勝及歐陽高儒林言房受易梁人焦延壽以明災里得幸為石顯所譛誅凡百餘字而本傳又云治易事梁人焦延壽其説長於災變房用之尤精為石顯告非謗政治誅此兩者近於重復也若其它張禹彭宣王駿倪寬龔勝鮑宣周堪孔光李尋韋賢玄成薛廣德師丹王吉蔡誼董仲舒眭孟貢禹疏廣馬宫翟方進諸人但志姓名及所師耳漢人坐語言獲罪漢昭帝時有大石自立僵桞復起眭孟上書言有從匹夫為天子宜求索賢人禪以帝位而退自封百里霍光惡之論以祅言惑衆伏誅案孟之妄發其死宜矣宣帝信任宦官蓋寬饒奏封事言五帝官天下三王家天下家以傳子官以傳賢執金吾議以指意欲求禪亦坐死考其所引亦不為無罪楊惲之報孫會宗書初無甚怨怒之語其詩曰田彼南山蕪穢不治種一頃豆落而為萁張晏釋以為言朝廷荒亂百官諂諛可謂穿鑿而廷尉當以大逆無道刑及妻子豫熟味其詞獨有所謂君父至尊親送其終也有時而既蓋宣帝惡其君喪送終之喻耳莊助論汲黯輔少主守成武帝不怒實係於一時禍福云賈誼劉向談説痛切無忌諱文成二帝未嘗問焉隨筆紀之矣樞密書史景德四年命宰臣王旦監修兩朝正史知樞密院王欽若陳堯叟參知政事趙安仁並修國史後來執政入樞府皆不得提舉修書非故事也知州轉運使為通判今世士大夫既貴不可復賤淳化中北戎入寇以殿前都虞候曹璨知定州時趙安易官宗正少卿巳知州遂就徙通判同時有羅延吉者既知彭祁絳三州而除通判廣州滕中正知興元府而通判河南袁郭知楚鄆二州會秦王廷美遷置房州詔崇儀副使閻産進知州而以郭通判州事范正辭既知戎淄二州而通判棣深又陳若拙歷知單州殿中侍御史西川轉運使召歸會李至守洛都表為通判久之柴禹錫鎮涇州復表為通判連下遷而皆非貶降近不復有矣范正辭治饒州范正辭太平興國中以饒州多滯訟選知州事至則宿繫皆決遣之胥史坐淹獄停職者六十三人會詔令科州兵送京有王興者懷土憚行以刃故傷其足正辭斬之興妻上訴太宗召見正辭庭辨其事正辭曰東南諸郡饒實繁盛人心易動興敢扇搖茍失控馭則臣無待罪之地矣上壯其敢斷特遷官充江南轉運副使饒州民甘紹者為群盜所掠州捕繫十四人獄具將死正辭案部至引問之四皆泣下察其非實命徙他所訊鞠既而民有告盜所在者正辭濳召監軍掩捕之盜覺遁去正辭即單騎出郭二十里追及之賊控弦持矟來逼正辭大呼以鞭擊之中賊雙目仆之餘賊渡江散走被傷者尚有餘息旁得所棄贓按其姦狀伏法十四人皆得釋此吾鄉里事而郡人多不聞之榮王藏書濮王懿王之子宗綽蓄書七萬卷始與英宗偕學于邸每得異書必轉以相付宗綽家本有嶽陽記者皆所賜也此國史本傳所載宣和中其子淮安郡王仲糜進目録三卷忠宣公在燕得其中秩云除監本外寫本印本書籍計二萬二千八百三十六卷觀一秩之目如是所謂七萬卷者為不誣矣三館祕府所未有也盛哉秦杜八六子秦少遊八六子詞云片片飛花弄晚濛濛殘雨籠晴正銷凝黃鸝又啼數聲語句清峭為名流推激豫家舊有建本蘭畹曲集載杜牧之一詞但記其末句云正銷魂梧桐又移翠隂秦公蓋效之似差不及也容齋四筆卷第十三終
