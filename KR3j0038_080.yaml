body:
  text: 容齋四筆卷第十四十四則祖宗親小事太宗朝吕端自諌議大夫開封判官左遷衛尉少卿時群官有負宿譴者率置散秩會置考課院每引對多泣涕以不免飢寒為請至端即前奏曰臣罪大而幸深苟得潁州副使臣之願也上曰朕自知卿無何復舊官踰月拜參知政事上留意金榖之務一日盡召三司吏李溥等對於崇政殿詢以計司利害溥等願給筆札於是二十七人共上七十一事詔以四十四事付有司奉行十九事下鹽鐵使陳恕等議其可否遣知雜御史監議賜溥等白金緡錢悉輔侍禁殿直領其職謂宰相曰溥等條奏事亦頗有所長朕嘗語恕等若文章稽古此輩固不可望卿錢榖利病彼自幼至長寢處其中必周知根本卿但假以顔色引令剖陳必有所益恕不肯降意詢問旋以職事曠廢上召而責之始頓首謝王賔以供奉官充亳州監軍妻極妬悍時監軍不許挈家至任所妻擅至亳州賔具以白上上召見其妻詰責俾衛士交捽之杖一百配為忠靖卒妻一夕死陳州民張矩殺里中王裕家兩人知州田錫未嘗慮問又詣闕訴冤遣二朝士鞠之皆云非矩所殺裕家冤甚其子福應募為軍因得見曰臣非欲隸軍蓋家冤求訴耳太宗怒付御史府治之置矩于法二朝士皆坐貶錫洎通判郭渭謪為海郢州團練副使饒州卒妻訴理夫死至召知州范正辭庭辨且夫引見散秩庶僚而容其各各有請三司胥吏而引對正殿命以官爵聽其所陳一州都監而得自上奏至召其妻責辱之一卒應募而得入見遂伸家冤為貶責吏萬幾如是安得不理今之言典故者蓋未能盡云王居正封駮紹興五六年間王居正為給事中時王繼先方以醫進中旨以其壻添監浙江稅務録黃過門下居正封還髙宗批三省將上及二相進呈聖訓云卿等亦嘗用醫者否對曰皆用之曰所酬如何曰或與酒或與錢或與縑帛隨大小效驗以答其勞上曰然則朕宫中用醫反不得酬謝邪文字未欲再付出可以喻居正使之書讀丞相退即語居正曰聖意如此是事亦甚小給事不必固執居正唯唯遂請對上語如前而玉色頗厲居正對曰臣庶之家待此輩與朝廷有異量功隨力各致陳謝之禮若朝廷則不然繼先之徒以技術庸流享官榮受祿俸果為何事哉一或失職重則有刑輕則斥逐使其應奉有效僅能塞責而巳想金帛之賜固自不少至於無故增創貟闕誠為未善臣不願陛下輒起此門上悟曰卿言是也即日下其奏前降旨揮更不施行居正之直諒有守髙宗之聽言納諌史録中恐不備載故敬書之頃聞之於張九成王元之論官冗省官之説昔人論之多矣唯王元之兩疏最為切當其一云臣舊知蘇州長洲縣自錢氏納土以來朝廷命官七年無縣尉使主簿兼領之未嘗闕事三年增置尉未嘗立一功以臣詳之天下大率如是誠能省官三千貟減俸數千萬以供邊備寬民賦亦大利也其二云開寶中設官至少臣占籍濟上未及第時止有刺史一人李謙漙是也司戶一人孫賁是也近及一年朝廷别不除吏自後有團練推官一人畢士安是也太平興國中臣及第歸鄉有刺史通判副使判官推官監軍監酒榷稅算又增四貟曹官之外更益司理問其租稅減於曩日也問其人民逃於昔時也一州既爾天下可知冗兵耗于上冗吏耗于下此所以盡取山澤之利而不能足也觀此二説以今言之何止於可為長太息哉梁狀元八十二歲陳正敏遁齋間覽梁灝八十二歲雍熙二年狀元及第其謝啓云白首窮經少伏生之八歲青雲得路多太公之二年後終祕書監卒年九十餘此語既著士大夫亦以為口實豫以國史考之梁公字太素雍熙二年廷試甲科景德元年以翰林學士知開封府暴疾卒年四十二子固亦進士甲科至直史館卒年三十三史臣謂梁方當委遇中途夭謝又云梁之秀穎中道而摧明白如此遁齋之妄不待攻也太宗恤民曽致堯為兩浙轉運使嘗上言去歲所部秋租惟湖州一郡督納及期而蘇常潤三州悉有逋負請各按賞罰太宗以江淮頻年水災蘇常特甚致堯所言刻薄不可行因詔戒之使倍加安撫勿得騷擾是事必已編入三朝寶訓中此國史本傳所載也潘遊洪沈紹興十三年勑令所進書刪定官五貟皆自選人改秩潘良能季成遊操存誠沈介德和伯兄景伯皆拜祕書省正字張表臣正民以無出身除司農丞四正字同日赴館供職少監秦伯陽於會食之次謂坐客言一旦增四同舍而姓皆從水傍熺有一句願諸君為對之以成三館異日佳話即云潘遊洪沈泛瀛洲坐客合詞賞歎竟無有能對者豫因記筆談所載元厚之絳少時曽夢人告之曰異日當為翰林學士須兄弟數人同在禁林厚之自思素無兄弟疑為不然及熙寧中除學士同時相先後入院者韓維持國陳繹和叔鄧綰文約楊繪元素名皆從糸始悟兄弟之説欲用絳繹繪維綰綸綍為對然未暇考之史録歲月果同否也舞鷗遊蜻戰國時諸子百家之書所載絶有同者列子黃帝篇云海上之人有好漚鳥者每旦之海上從漚鳥遊漚鳥之至者百數而不止其父曰吾聞漚鳥皆從汝遊汝取來吾玩之明日之海上漚鳥舞而不下也吕覽精喻篇云海上人有好蜻者每朝居海上從蜻遊蜻之至者百數而不止前後左右盡蜻也終日玩之而不去其父告之曰聞蜻皆從汝居取而來吾將玩之明日之海上蜻無至者矣此二説如出一手也郎中用資序國朝官制既行除用職事官不問資序高下但隨階品而加行守試以賦祿郎中員外郎亦自為兩等頗因履歷而授之後來相承必欲已關升知州資序者為郎中於是拜員外郎者具改官後實歷歲月申吏部不以若干任但通理細滿八考則升知州乃正作郎中别命詞給告頃嘗有旨初除郎官者雖資歷已高且為貟外候吏部再申然後升作郎中近歲掌故失之故李大性自浙東提刑除吏部時佐自大理正除刑部徐閌自太府丞除都官嶽震自將作少監除度支其告內即云郎中與元旨揮戾矣臺諌分職臺諌不相見巳書於續筆中其分職不同各自有故實元豐中趙彥若為諌議大夫論大臣不以道德承聖化而專任小數與群有司校計短長失具瞻體因言門下侍郎章子厚左丞王安禮不宜處位神宗以彥若侵御史論事左轉祕書監蓋許其論議而責其彈擊為非也元祐𥘉孫覺為諌議大夫是時諌官御史論事有分限母得越職覺請申唐六典及天禧詔書凡發造令事之未便皆得奏陳然國史所載御史掌紏察官邪肅正綱紀諌官掌規諌諷諭凡朝政闕失大臣至百官任非其人三省至百司事有失當皆得諌正則蓋許之矣唐人朝制大率重諌官而薄御史中丞溫造道遇左補闕李虞恚不避捕從者笞辱左拾遺舒元褒等建言故事供奉官惟宰相外無屈避造棄蔑典禮辱天子侍臣遺補雖卑侍臣也中丞雖高法吏也侍臣見陵法吏自恣請得論罪乃詔臺官供奉官共道路聽先後行相值則揖然則居此二雄識者在唐日了不相謀云正元朝士劉禹錫聽舊宫人穆氏唱歌一詩云曽陪織女度天河記得雲間第一歌休唱正元供奉曲當時朝士已無多劉在正元任郎官御史後二紀方再入朝故有是語汪藻始采用之其宣州謝上表云新建武之官儀不圖重見數正元之朝士今已無多汪在宣和間為館職符寶郎是時紹興十三四年中其用事可謂精切嘗四用之謝侍講修史表云下建武之詔書正尓恢張於治具數正元之朝士獨憐留落之孤蹤以德壽慶典曽任兩省官者遷秩蒙轉通奉大夫謝表云供奉當時敢齒正元之朝士頌歌大業願賡至德之中興充永思陵橋道頓遞使轉宣奉大夫謝表云武德文階愧三品維新之澤正元朝士動一時既往之悲主上即位明堂禮成謝加恩云考皇祐明堂之故操以舉行念正元朝士之存今其餘幾亦各隨事引用近者單蘷以知紹興府進華文閣直學士謝表云數甘泉法從之舊真正元朝士之餘夔當淳熙中雖為侍郎然一朝名臣尚多又距今才十餘歲似為未穩貼也表章用兩臣字對表章自敘以兩臣字對説由東坡至汪浮溪多用之然須要審度君臣之間情義厚薄及姓名眷顧於君前如何乃為合宜坡湖州謝表云知臣愚不適時難以追陪新進察臣老不生事或能牧養小民登州表云於其黨而觀過謂臣或出於愛君就所短以求長知臣稍習於治郡侍讀謝表云謂臣雖無大過人之才知臣粗有不欺君之實欲使朝夕與於討論潁州表云意其忠義許國故暫召還察其老病畏人復許補外汪謝徽州云謂臣不改歲寒故起之散地察臣素推月旦故付以本州為陸藻謝給事中云知臣椎鈍無他故長奉賢王之學憫臣踐揚滋久故亟升法從之班為汪樞密謝子自虜中歸不令入城降詔獎論表云知臣齒髮已凋常恐鄧攸之無後憐臣肺肝可見有如去病之辭家凡此所言皆可自表於君前者劉夢得代竇羣容州表有察臣前任事實恕臣本性朴愚之句坡公蓋本諸此近年後生假倩作文不識事體至其碌録常流乍得一壘亦輒云知臣察臣之類真可笑也劉夢得謝上表郡守謝上表首必云伏奉告命授臣某州巳於某月某日到任上訖然後入詞獨劉夢得數表不然和州者曰伏奉去年六月二十五日制書授臣使持節和州諸軍事守和州刺史臣自理巴賨不聞善最恩私忽降慶抃失容臣某中謝伏惟皇帝陛下丕承寶祚光閳鴻猷有漢武天人之姿稟周成睿哲之德發言今古舉意通神委用得人動植咸恱理平之速從古無倫微臣何幸獲覩昌運臣業在辭學早歲䇿名德宗尚文擢為御史出入中外歷事五朝纍承恩光三換符竹分憂之寄祿秩非輕而素蓄所長效用無日臣聞一物失所前王軫懷今逢聖朝豈患無位臣即以今月二十六日到所任上訖伏以地在江淮俗參吳楚災旱之後綏撫誠難謹當奉宣皇風慰彼黎庶久於其道冀使知方伏乞聖慈俯賜昭鑒首尾敘述皆與他人表不同其夔州汝州同州蘇州諸篇一體長子􅯗常稱誦之及為太平州遂擬其體代作一表其詞云臣言伏奉今年九月十七日制書授臣知太平州者一麾出守方切兢危三命滋共弗容控避仰皇天之大造扣丹地以何言中謝恭惟皇帝陛下睿知有臨神武不殺慕舜之孝見堯於墻德冠古今而獨尊仁並清寧而遍覆明見萬里將大混於車書子來庶民更精求於嶽牧臣家本儒素時無令名濫竽宏博之科説駕清華之地瀛山抱槧郎省握蘭在紹興之季年汚記注於右史龍飛應運鳯歷紀祥不遺細微兼取愚頓遂以詞賦之職獲侍清間之歡雖宿命應仙許暫來於天上而塵心未斷旋即墮於人間一去十八年之中三叨二千石之寄末繇金華郡還紬石室書從珍臺間館之遊勸廣厦細旃之講真拜學士號名私人受九重知己之殊極三入承明之幸使與大議不專斯文而臣弱羽不足以當雄風蹇步不足以勝重任上恩惜其終棄左符寵其餘生李廣數竒徒羡侯於校尉汲黯妄發敢歎薄於淮陽臣即以今月二十八日到任上訖伏以郡在江東昔稱道院地鄰淮右今謂壯藩謹當宣布恩威奉行寬大求民之瘼問俗所宜緩帶輕裘雖弗賢長城於李績清心省事敢不避正堂於蓋公庶幾固結本根少復報酬知遇全規模其步驟然視昔所作猶覺語煩陳簡齋葆真詩自崇寧以來時相不許士大夫讀史作詩何清源至於修入令式本意但欲崇尚經學痛沮詩賦耳於是庠序之間以詩為諱政和後稍復為之而陳去非遂以墨梅絶句擢置館閣嘗以夏日偕五同舍集葆真宫池上避暑取緑隂生晝靜分韻賦詩陳得靜字其詞曰清池不受暑幽討起豫病長安車轍邊有此萬荷柄是身唯可懶共寄無盡興魚遊水砥涼鳥語林間靜談餘日亭午樹影一時正清風不負客意重百金贈聊將兩鬢蓬起照千丈鏡微波喜搖人小立待其定梁王今何許桞色幾衰盛人生行樂耳詩律巳其賸邂逅一尊酒它年五君詠重期踏月來夜半嘯煙艇詩成出示坐上皆詫為擅埸朱新仲時親見之云京師無人不傳寫也仙傳圖志荒唐昔人所作神仙傳之類大底荒唐謬悠殊不能略考引史䇿如衛叔卿事云漢儀鳯二年孝武皇帝間居殿上而見之月支使者事云延和三年武帝幸安定而月支國遣使獻香案儀鳯乃唐高宗紀年名延和乃魏太武唐睿宗紀年名而誕妄若是自餘山經地志往往皆然近世士大夫采一方傳記及故老談説競為圖志用心甚專用力甚博亦不能免抵牾高夔守襄陽命僚屬作一書其敘歷代沿革云在周為楚鄧鄾諸國據左傳鄾乃鄧邑後巴人伐楚圍鄾蓋楚滅鄧故亦來屬元非列國也又引左傳蔓成然事以蔓為國據成然乃楚大夫靈王奪其邑無所謂蔓國也容齋四筆卷第十四終
