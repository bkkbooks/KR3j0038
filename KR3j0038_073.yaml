body:
  text: 容齋四筆卷第七十四則天咫黃魯直和王定國詩聞蘇子由病卧績溪云湔祓瘴霧姿朝趨去天咫蜀士任淵注引天威不違顔咫尺豫案國語楚靈王築三城使子晢問范無宇無宇不可王曰是知天咫安知民則韋昭曰咫者少也言少知天道耳酉陽雜爼有天咫篇黃詩蓋用此徐師川喜王秀才見過小酌玩月四言曰君家近市所見天咫庭戶之間容光能幾菰蒲之中江湖之涘一碧萬頃長空千里正祖述黃所用云縣尉為少仙隨筆載縣尉為少公豫後得晏幾道叔原一帖與通叟少公者正用此也杜詩有野望因過常少仙一篇所謂落盡高天日幽人未遣回者蜀士注曰少仙應是言縣尉也縣尉謂之少府而梅福為尉有神仙之稱少仙二字尤為清雅與今俗呼為仙尉不侔矣杜詩用受覺二字杜詩所用受覺二字皆絶竒今托其受字云修竹不受暑勿受外嫌猜莫受二毛侵監河受貸粟輕燕受風斜能事不受相促迫野航恰受兩三人一雙白魚不受釣雄姿未受伏櫪恩其覺字云巳覺糟床注身覺省郎在自覺成老醜更覺松竹幽日覺死生忙最覺潤龍鱗喜覺都城動更覺老隨人每覺升元輔覺而行步奔尚覺王孫貴含悽覺汝賢厨煙覺遠庖詩成覺有神已覺披衣慣自覺酒須賖早覺仲容賢城泀未覺喧無人覺來往人才覺弟優直覺巫山暮重覺在天邊行遲更覺仙深覺負平生秋覺追隨盡追隨不覺晚熊羆覺自肥自覺坐能堅巳覺良宵永更覺綵衣春已覺氣與嵩華敵未覺千金蒲髙價梅花欲開不自覺胡來不覺潼關隘自得隨珠覺夜明放箸未覺金盤空東歸貪路自覺難更覺良工心獨苦始覺屏障生光輝不覺前賢畏後生吏情更覺滄洲逺我獨覺子神充實習池未覺風流盡用之雖多然每字命意不同又雜於千五百篇中學者讀之唯見其新工也若陳簡齋亦好用此二字未免頻復者蓋只在數百篇內所以見其多如未受風作惡不受珠璣絡不受折簡呼不受人招麾不受安危侵飽受今日間却扇受景風語聞受遠響坐受世故驅庭柏不受寒可復受憂戚寧受此酸辛滔滔江受風坐受世𥚹迫清池不受暑平池受細雨窮村受春晚不受急景催肯受元規塵了不受榮悴意間不受榮與辱獨自人間不受寒枯木無知不受寒天馬何妨略受鞿來禽花高不受折不受隂晴與寒暑長林巨木受軒輊未覺懶相先未覺壯心休未覺身淹留未覺墉隂遲未覺欠孟嘉未覺有等倫未覺風來遲未覺經旬久欲往還覺非獨覺賦詩難稍覺夜月添菰蒲覺風入未覺此計非高處覺眼新意定覺景多未覺徐娘老未覺有榮辱未覺飢腸虛未覺平生與願違村空更覺水潺湲眼中微覺欠扁舟居夷更覺中原好便覺杯觴耐薄寒墻頭花定覺風闌可謂多矣蓋喜用其字自不知下筆所著也西太一宫六言楊桞鳴蜩緑暗荷花落日紅酣三十六陂春水白頭想見江南荆公題西太一宫六言首篇也今臨川刻本以楊桞為桞葉其意欲與荷花為切對而語句遂不佳此猶未足問至改三十六陂春水為三十六宫煙水則極可笑公本意以在京華中故想見江南景物何預於宫禁哉不學者妄意塗竄殊為害也彼蓋以太一宫為廷離宫爾禁由與猶同新唐書藩鎮傳序云其人自視由羌狄然據字義由當為猶故吳縝作唐書音訓有紏謬一篇正指其失彼元不深究孟子也文惠公頃與豫作唐書輔過嘗駮其説豫作文每用之輒為人所疑問今為詳載於此如以齊王由反手也由弓人而恥為弓王由足用為善是由惡醉而強酒由巳溺之由已飢之由射於百步之外見且由不得亟其義皆然蓋由與猶通用也人焉廋哉孔子論人之善惡始之曰視其所以繼之以觀其所由察其所安然後重言之曰人焉廋哉人焉廋哉蓋以上之三語詳察之也而孟氏一斷以眸子其言曰存乎人者莫良於眸子眸子不能掩其惡胸中正則眸子瞭焉胸中不正則眸子眊焉聽其言也觀其眸子人焉廋哉説者謂人與物接之時其神在目故胸中正則神精而明不正則神散而昏心之所發并此而觀則人之邪正不可匿矣言猶可以偽為眸子則有不容偽者孔聖既巳發之於前孟子知言之要續為之説故簡亮如此舊身王季明云太學士子嘗戲作一論其略曰知人焉廋哉之義然後知人焉廋哉人焉廋哉之義知人焉廋哉人焉廋哉之義然後知人焉廋哉之義孔子所云人焉廋哉人焉廋哉者詳言之也孟子所云人焉廋哉者略言之也孔子之所謂人焉廋哉人焉廋哉即孟子之所謂人焉廋哉也孟子之所謂人焉廋哉即孔子之所謂人焉廋哉人焉廋哉也繼又疊三語為一云夫人焉廋哉人焉廋哉人焉廋哉雖曰不同而其所以為人焉廋哉人焉廋哉人焉廋哉未始不同演而成數百字可資一笑亦幾於侮聖言矣久而俱化天生萬物久而與之俱化固其理焉無間於有情無情有知無知也豫得雙鴈於衢人鄭伯膺純白色極馴擾可玩置之雲壑不遠飛翔未幾隕其一其一塊獨無儔因念白鵝正同色又性亦相類乃取一隻與同處始也兩下不相賔接見則東西分背雖一盆伺榖不肯並啜如是五日漸復相就踰旬之後怡然同群但形體有大小而色澤飛鳴則一久之鴈不自知其為鴈鵝不自知其為鵝宛如同巢而生者與之俱化於是驗焉今人呼鵝為舒鴈或稱家鴈其褐色者為鴈鵝鴈之最大者曰天鵝唐太宗時吐蕃録東贊上書以謂聖功遠被雖鴈飛于天無是之速鵝猶鴈也遂鑄金為鵝以獻蓋二禽一種也黃文江賦晚唐士人作律賦多以古事為題寓悲傷之旨如吳融徐寅諸人是也黃滔字文江亦以此擅名有明皇回駕經馬嵬坡隔句云日慘風悲至玉顔之死處花愁露泣認朱臉之啼䀶褒雲萬疊斷腸新出於啼猿秦樹千層比翼不如於飛鳥羽衛參差擁翠華而不發天顔愴恨覺紅袖以難留神仙表態忽零落以無歸雨露成波已沾濡而不及六馬歸秦却經過於此地九泉隔􅚼幾悽惻於平生景陽井云理昧納隍處窮泉而詎得誠乖馭朽攀素綆以胡顔青銅有限也從零落於秋風碧浪無情寧解流傳於夜壑荒涼四靣花朝而不見朱顔滴瀝千尋雨夜而空啼碧溜莫可追尋玉樹之歌聲邈矣最堪惆悵金瓶之咽處依然館娃宫云花顔縹眇欺樹裏之春風銀熖熒煌却城頭之曉色恨留山鳥啼百卉之春紅愁寄壠雲鎖四天之暮碧遺堵塵空幾踐羣遊之鹿滄洲月在寧銷怒濁之濤陳皇后因賦復寵云已為無雨之期空懸夢寐終自凌雲之製能致煙霄秋色云空三楚之暮天樓中歷歷滿六朝之故地草際悠悠白日上升云較美古今列子之乘風固劣論功晝夜姮娥之奔月非優凡此數十聮皆研確有精致若夫格律之卑則自當時體如此耳沈季長進言沈季長元豐中為崇政殿説書考開封進士既罷入見神宗曰論不以智治國誰為此者對曰李定所為上曰聞定意譏朕季長曰定事陸下有年頃者御史言定乃人倫所棄陛下力排羣議而定始得為人如𥘉繼又擢用不次定雖懷利尚當知恩臣以此敢謂無譏陛下意詩序曰言之者無罪聞之者足以戒書曰小人怨汝詈汝則皇自敬德陛下自視豈任智者不知何自慊疑乃信此為譏也上曰卿言甚善朕今已釋然矣卿長者乃喜為人辨謗對曰臣非為人辨謗乃為陛下辨譖耳它日上語及前代君臣因曰漢武帝學神仙不死之術卿曉其意否此乃貪生以固位耳故其晚年舉措謬戾禍貽骨肉幾覆宗社且人主固位其禍猶爾則為人臣而固位者其患亦何所不至故朕每患天下之士能輕爵祿者少季長曰士而輕爵祿為士言之則可為國言之則非福也人主有尊德樂道之志士皆以不得爵祿為恥寧有輕爵祿者哉至於言違諌怫士有去志故以爵祿為輕上曰誠如卿言案季長雖嘗至修起居注其後但終於庶僚史不立傳王和甫銘其墓載此兩論豫在史院時未之見也其子銖為侍從恨不獲附見之故表出於是繁遏渠國語魯叔孫穆子曰金奏肆夏繁遏渠天子所以饗元侯也韋昭注曰繁遏渠肆夏之三也禮有九夏皆篇名昭雖曉其義而不詳釋案周禮春官鍾師掌金奏以鍾鼓奏九夏鄭氏注引吕叔玉云肆夏繁遏渠皆周頌也肆夏時也繁遏執競也渠思文也又曰繁多也遏止也言福祿止於周之多也故執競曰降福穰穰降福簡簡渠大也言以后稷配天王道之大也故思文曰思文后稷克配彼天豫謂此説亦近於鑿替戾岡坡公遊鶴林招隱有岡字韻詩凡作七首最後云背城借一吾何敢切勿樽前替戾岡小兒問三字所出案晉書佛圖澄傳澄能聽鈴音以知吉凶往投石勒及劉曜攻洛陽勒將救之其羣下咸諌以為不可勒以訪澄澄曰相輪鈴音云秀支替戾岡僕谷劬秃當此羯語也秀支軍也替戾岡出也僕谷劉曜胡位也劬秃當捉也此言軍出捉得曜也勒遂擒曜坡公正用此云文潞公平章重事文潞公元豐六年以太師致仕時七十八歲矣後二年哲宗即位太皇太后垂簾同聽政用司馬公為門下侍郎公奏乞召潞公置之百寮之首以鎮安四海后遣中使梁惟簡宣諭曰彥博名位巳重又得人心今天子幼沖恐其有震主之威且於輔相中無處安排又巳致仕難為復起公當時以新入不敢復言元祐元年三月公拜左僕射乃再上奏曰書曰人惟求舊蓋以其歷年之多也彥博沉敏有謀略知國家治體能斷大事自仁宗以來出將入相功效顯著天下所共知年踰八十精力尚強臣𥘉曽奏陳尋蒙宣諭切惟彥博一書生爾年逼桑榆富貴已極夫復何求非有兵權死黨可畏懼也假使為相一旦欲罷之止煩召一學士授以詞頭白麻既出則一匹夫爾何難制之有震主之威防慮太過若依今官制用之為相以太師兼侍中行左僕射有何不可儻不欲以劇務煩老臣則凡常程文書只委右僕射以下簽書發遣惟事有難決者方就彥博咨稟自古致仕復起蓋非一人彥博今年八十一不過得其數年之力願急用之臣但以門下侍郎助彥博恐亦時有小補今不以彥博首相而以臣處之是猶捨騏驥而策駑駘也切為朝廷惜之若以除臣左僕射難為無故以他人易之則臣欲露表舉其自代奏入不許給事中范純仁亦勸乞召致留為師臣未幾右僕射韓縝求去后始賜司馬公密詔欲除彥博兼侍中行右僕射事其合行恩禮令相度條具公以名體未正不敢居其上乞以行左僕射自守右僕射詔曰使彥博居卿上非豫所以待卿之意卿更思之公執奏言臣為京官時彥博已為宰相今使彥博列位在下非所以正大倫也於是召赴闕既而御史中丞劉摯左正言朱光庭右正言王覿俱上言彥博春秋高不可為三省長官司馬公又言若令以正太師平章軍國重事亦足以老尊成矣四月遂下制如公言詔一月兩赴經筵六日一入朝因至都堂與執政商量事朝廷有大政令即與輔臣共議潞公此命可謂鄭重費力蓋本不出於主意也然居位越五年屢謝病乃得歸竟坐此貽紹聖之貶考課之法廢唐制尚書考功掌內外文武官吏之考課凡應考之官家具録當年功過行能本司及本州長官對衆讀議其優劣定為九等考第然後送省别勑定京官位望高者二人一校京官考一校外官考又定給事中中書舍人各一人一監京官考一監外官考郎中判京官考貟外郎判外官考凡考課之法有四善二十七最一最以上有四善為上上有三善或無最而有四善為上中有二善或無最而有三善為上下其末至於居官諂詐貪濁有壯為下下外州則司録録事參軍主之各據之以為黜陟國朝此法尚存慶曆皇祐中黃亞夫佐一府三州幕其集所載考詞十四篇黃司理者曰治許獄歲再周矣論其罪棄市者五十四流若徒三百十有四杖百八十六皆得其情無有冤隱不伸非才也其孰能其考可書中舞陽尉者曰舞陽大約地廣它盜往往囊槖於其間居一歲為竊與強者凡十一前件官捕得之其亡者一而巳矣非才焉固不能可書中法曹劉昭遠者曰法者禮之防也其用之以當人情為得刻者為之則拘而少恩前件官以通經舉進士始掾於此若老於為法者每抱具獄必傳之經義然後處故無一不當其情其考可書中它皆類此不知其制廢於何時今但付之士案吏據定式書於印紙比者又令郡守定縣令臧否高下人亦不知所從出若使稍復舊貫似為得冝雖未必人人盡公得實然思過半矣小官受俸沈存中筆談書國𥘉時州縣之小官俸入至薄故有五貫九百六十奉省錢且作足錢用之語黃亞夫皇祐間自序其所為伐檀集云歷佐一府三州皆為從事踰十年郡之政巨細無不與大抵止於簿書獄訟而巳其心之所存可以效於君輔於國資於民者曽未有一事可以自見然月廩於官粟麥常兩斛錢常七千問其所為乃一常人皆可不勉而能兹素餐昭昭矣遂以伐檀名其集且識其愧豫謂今之仕宦雖主簿尉蓋或七八倍於此然常有不足之歎若兩斛七千秪可祿一書吏小校耳豈非風俗日趨於浮靡人用日以汰物價日以滋致於不能贍足乎亞夫之立志如此真可重也山谷先生乃其子云容齋四筆卷第七終
