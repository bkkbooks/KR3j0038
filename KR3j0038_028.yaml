front:
  text: 容濟續筆卷第十十七則
  hash: sha256:beaf7a2c10467a442228ffdc42f1ff95868a2f46e0ed22988041d5ee570ae0a9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_028-1a}
body:
  text: 經傳煩簡左傳蔡聲子謂楚子木曰善爲國者賞不僭而刑不濫賞僣則懼及淫人刑濫則懼及善人若不幸而過寧僣無濫與其失善寧其利淫其語夲於大禹謨罪疑惟輕功疑惟重與其殺不辜寧失不經也晉叔向詒鄭子産書曰先王議事以制誨之以忠聳之以行教之以務使之以和臨之以敬涖之以彊斷之以剛猶求聖哲之上明察之官忠信之長慈惠之師其語夲於呂刑惟良折獄哲人惟刑也旨意則同而經傳煩簡爲不侔矣曹參不薦士曹參代蕭何爲漢相國日夜飲酒不事事自云髙皇帝與何定天下法令旣明遵而勿失不亦可乎是則然矣然以其時考之承暴秦之後髙帝創業尚淺日不暇給豈無一事可關心者哉其初相齊聞膠西蓋公善治黃老言使人厚幣請之蓋公爲言治道貴清淨而民自定參於是避正堂以舎之其治要用黃老術故相齊九年齊國安集然入相漢時未甞引蓋公爲助也齊處士東郭先生梁石君隱居深山蒯徹爲參客或謂徹曰先生之於曹相國拾遺舉過顯賢進能二人者丗俗所不及何不進之於相國乎徹以告參參皆以爲上賔徹善齊人安其生甞干項羽羽不能用其策羽欲封此兩人兩人卒不受凡此數賢參皆不之用若非史策失其傳則參不薦士之過多矣漢初諸將官漢初諸將所領官多爲丞相如韓信𥘉拜大將軍後爲左丞相擊魏又拜相國擊齊周勃以將軍遷太尉後以相國代樊噲擊燕樊噲以將軍攻韓王信遷爲左丞相以相國擊燕酈啇爲將軍以右丞相擊陳豨以丞相擊黥布尹恢以右丞相備守淮陽陳㳙以丞相定齊地然百官公卿表皆不載蓋蕭何巳居相位諸人者未甞在朝廷特使假其名以爲重耳後丗使相之官夲諸此也漢官名漢官名旣古雅故書於史者皆可誦味如朝臣齗齗不可光禄勲誰可以爲御史大夫者御史大夫言可聽郎中令善媿人丞相議不可用太尉不足與計大將軍尊貢誠重大將軍有揖客京兆尹可立得大夫乗私車來邪大官丞日晏不來謝田大夫曉大司農大司馬欲用是忿恨後將軍數畫軍冊光禄大夫太中大夫耆艾二人以老病罷駙馬都尉安所受此語之類又如所書路中大夫韓御史大夫叔孫太傳鄭尚書鮑司􅊢趙將軍張廷尉亦燁然有法後漢書執金吾擊郾大司馬當擊宛大司馬習用歩騎等語尚有前史餘味漢唐輔相前漢宰相四十五人自蕭曹魏丙之外如陳平王陵周勃灌嬰張蒼申屠嘉以髙帝故臣陶青劉舎許昌薛澤莊青翟趙周以功臣侯子孫竇嬰田蚡公孫賀劉屈氂以宗戚衛綰李蔡以士伍唯王陵申屠嘉及周亞夫王啇王嘉有剛直之節薛宣翟方進有材具餘皆容身保位無所建明至於御史大夫名爲亞相尤録録不足數劉向所謂御史大夫未有如兒寛者蓋以餘人可稱者少也若唐宰相三百餘人自房杜姚宋之外如魏證王珪禇遂良狄仁傑魏元忠韓休張九齡楊綰崔祐甫陸䞇杜黃裳裴垍李絳李藩裴度崔羣韋處厚李德𥙿鄭畋皆爲一時名宰考其行事非漢諸人可比也漢武留意郡守漢武帝天資髙明政自已出故輔相之任不甚擇人若但使之奉行文書而巳其於除用郡守尤所留意莊助爲㑹稽太守數年不聞問賜書曰君厭承明之廬懷故士出爲郡吏間者闊焉乆不聞問吾丘壽王爲東郡都尉上以壽王爲都尉不復置太守詔賜璽書曰子在朕前之時知略輻湊及至連十餘城之守任四千石之重職事並廢盗賊從橫甚不稱在前時何也汲黯拜淮陽太守不受印綬上曰君薄淮陽邪吾今召君矣顧淮陽吏民不相得吾徒得君重卧而治之觀此三者則知郡國之事無細大未甞不深知之爲長吏者常若親臨其上又安有不盡力者乎惜其爲征伐奢侈所移使民間不見德澤爲可恨耳苦蕒菜吴歸命侯天紀三年八月有鬼目菜生工人黃耇家有買菜生工人呉平家髙四尺厚三分如枇杷形上廣尺八寸下莖廣五寸兩邊生葉緑色東觀案圖名鬼目作芝草買菜作平慮草以耇爲侍芝郎平爲平慮郎皆銀印青綬唐五行志中宗景龍二年岐州郿縣民王上賔家有苦賈菜髙三尺餘上廣尺餘厚二分說者以爲草妖予案買菜即苦蕒今俗呼爲苦䔍者是也天紀景龍之事甚相類歸命次年亡國中宗後二年遇害雖事非此致亦可謂妖矣乎慮草不知何狀楊雄甘泉賦并閭注如淳曰并閭其葉隨時政政平則平政不平則傾也顔師古曰如氏所說自是平慮耳然則亦異草也鬼目見爾雅郭璞云今江東有鬼目草莖似葛葉貟而毛如耳璫也赤色叢生廣志曰鬼目似梅南人以飲酒南方草木狀曰鬼目樹大者如木子小者如鴨子七月八月熟色黃味酸以蜜煑之滋味柔嘉交趾諸郡有之交州記曰髙大如木瓜而小傾邪不周正夲草曰鬼目一名東方宿一名連蟲陸名羊蹄唐諸生束脩唐六典國子生𥘉入置束帛一篚酒一壷脩一案爲束脩之禮太學四門律學書學筭學皆如國子之法其習經有暇者命習􅊢書并國語說文字林三蒼爾雅每旬前一日則試其所習業乃知唐丗士人多工書蓋在六館時以爲常習其說文字林蒼雅諸書亦欲責以結字合於古義不特銓選之時方取楷法遒美者也束脩之禮乃於此見之開元禮載皇子束條束帛一篚五匹酒一壷二斗脩一案三脡皇子服學生之服至學門外陳三物於西南少進曰某方受業於先生敢請見執篚者以篚授皇子皇子跪奠篚再拜博士荅再拜皇子還避遂進跪取篚博士受幣皇子拜訖乃出其儀如此州縣學生亦然范德孺帖范德孺有一帖云純粹忝冒固多尤是家兄北歸遂解倒懸之念慶快安幸此外何求四月末雇舟離均借人至鄧夲待家兄之來今家兄雖得歸潁昌而尚未聞來耗巳累遣人禀問所行路及相見之期人尚未還未知果能如約否蓋恐太原接人非乆到此法留半月則湏北去也予以其時考之元符三年四月德孺除知太原是月二十一日忠宣公自鄧州分司復故秩許歸潁昌府則此帖當在五月間忠宣猶未離永州也德孺自均州守擢帥河東至於雇舟借人以行又云接人法留半月過此則須北去雖欲待其兄亦不可得今丗爲長吏雖居蕞爾小壘而欲送還兵士唯意所須若接人之來視其私計辦否爲遲速耳未甞顧法令以自儆策使申固要束稍整攝之置士大夫於無過之地亦所以善風俗也民不畏死老子曰民常不畏死奈何以死懼之若使人常畏死則爲竒者吾得執而殺之孰敢讀者至此多以爲老氏好殺夫老氏豈好殺者哉旨意蓋以戒時君丗主視民爲至愚至賤輕盡其命若刈草菅使之知民情狀人人能與我爲敵國懍乎常有朽索馭六馬之懼故繼之曰常有司殺者殺夫代司殺者殺是代大匠斵夫代大匠斵希有不傷其手矣下篇又曰人之輕死以其生生之厚是以輕死且人情莫不欲壽雖衰貧至骨瀕於餓隷其與受僇而死有間矣烏有不畏者哉自古以來時運俶擾至於空天下而爲盗賊及夷考其故亂之始生民未嘗有不靖之心也秦漢隋唐之末土崩魚爛比屋可誅然凶暴如王仙芝黃巢不過僥覬一官而巳使君相御之得其道豈復有滔天之患哉龔遂之清渤海馮異之定關中髙仁厚之平蜀盗王先成之說王宗侃民情可見丗之君子能深味老氏之訓思過半矣天下有竒士天下未嘗無魁竒智略之士當亂離之際雖一旅之聚數城之地必有策策知名者出其間史傳所書尚可考也鄭燭之武弦髙從容立計以存其國後丗至不可勝紀在唐尤多姑摭其小小者數人載于此武德𥘉北海賊帥綦公順攻郡城爲郡兵所敗後得劉蘭成以爲謀主才用數十百人出竒再奮北海即降海州臧君相帥衆五萬來争蘭成以敢死士二十人夜襲之掃空其衆徐圎㓪據海岱或說之曰有劉丗徹者才略不丗出名髙東夏若迎而奉之天下指揮可定圎㓪使迎之丗徹至巳有衆數千圎㓪使徇譙𣏌東人素聞其名所向皆下裘甫亂浙東朝廷遣王式往討其黨劉暀勸甫引兵取越慿城郭據府庫循浙江築壘以拒之得間則長驅進取浙西過大江掠楊州還修石頭城而守之宣歙江西必有響應者别以萬人循海而南襲取福建則國家貢賦之地盡入于我矣甫不能用髙駢之將畢師鐸攻駢乞師於宣州秦彦彦兵至遂下楊州師鐸遣使趣彦過江將奉以爲主或說之曰僕射順衆心爲一方去害冝復奉髙公而佐之揔其兵權誰敢不服且秦司空爲節度使廬州壽州其肯爲之下乎切恐功名成敗未可知也不若亟止秦司空勿使過江彼若粗識安危必未敢輕進就使他日責我以負約猶不失爲髙氏忠臣也師鐸不以爲然明日以告鄭漢章漢章曰此智士也求之弗獲王建鎭成都攻楊晟於彭州乆不下民皆竄匿山谷諸寨日出抄掠之王先成往說其將王宗侃曰民入山谷以俟招安今乃從而掠之與盗賊無異旦出淘虜薄暮乃返曾無守備之意萬一城中有智者爲之畫䇿使乗虚奔突先伏精兵於門内望淘虜者稍逺出弓弩手礮各百人攻寨之一面又於三面各出耀兵諸寨咸自備禦無暇相救如此能無敗乎宗侃矍然先成爲條列七事爲狀以白王建建即施行之榜至三日山中之民競出如歸市浸還故業觀此五者則其他姓名不傳與草木俱腐者蓋不可勝計矣易卦四德易元亨利貞謂之四德唯乾坤爲能盡之若屯隨二卦但大亨貞臨无妄革三卦皆大亨以正而巳有亨利貞者十一蒙同人離咸兊恒遯萃渙小過旣濟也元亨利者一蠱也利貞者八大畜大壯明夷家人中孚蹇損漸也亨貞者三需困旅也元亨者三大有升鼎也亨利者五賁復大過巽噬嗑也亨者九小畜履泰謙節坎震豐未濟也利者五訟豫解益夬也貞者四師比否頥也唯八卦皆無之觀剥晉睽姤歸妹并艮也若以卦象索之如剥睽姤猶可強爲之辤它則不復容擬議矣孫堅起兵董卓盗國柄天下共興義兵討之惟孫堅以長沙太守先至爲卓所憚獨爲有功故裴松之謂其最有忠烈之稱然長沙爲荆州屬部受督於刺史王叡叡先與堅共擊零桂賊以堅武官言頗輕之及叡舉兵欲討卓堅乃承案行使者詐檄殺之以償曩忿南陽太守張咨鄰郡二千石也以軍資不具之故又收斬之是以區區一郡將乗一時兵威輒害方伯鄰守豈得爲勤王乎劉表在荆州乃心王室袁術志於逆亂堅乃奉其命而攻之自速其死皆可議也孫權封兄䇿孫權即帝位追尊兄䇿爲長沙王封其子爲呉侯案孫氏奄有江漢皆䇿之功權特承之耳而報之之禮不相冝稱故陳壽評云割據江東䇿之基兆也而權尊崇未至子止侯爵於義儉矣而孫盛乃云權逺思盈虚之數正本定名防微於未兆可謂爲之于未有治之于未亂其說迃謬如此漢室中興出於伯升光武感其功業之不終建武二年首封其二子爲王而帝子之封乃在一年之後司馬昭繼兄師秉魏政以次子攸爲師後常云天下者景王之天下欲以大業歸攸以孫權視之不可同日論也踰年改元自漢武帝建元紀年之後嗣君紹統必踰年乃改元雖安帝繼殤帝亦終延平而爲永𥘉威帝繼質帝亦終本𥘉而爲建和唐宣宗以叔繼姪亦終㑹昌六年而改大中獨本朝太祖以開寶九年十月二十日上仙太宗嗣位是年十二月二十二日改爲太平興國元年去新歲纔八日耳意當時星辰曆象考卜兆祥必有其說而國史傳記皆失傳切計嶺蜀之逺制書到時巳是二年之春是時宰相薛居正沈倫盧多遜失於不考引故實致行之弗審使人君即位而無元年尤爲不可也若唐順宗以正元二十一年正月嗣位至八月辛丑改元永正蓋巳稱太上皇嫌於獨無紀年故亟更之耳劉禪孫亮石宏符生李璟未踰年而改此不足責晉惠帝改武帝太熈爲永熈而以爲欲長奉先皇之制亦非也唐中宗仍武后神龍梁末帝追承太祖乾化孟昶仍父知祥明德漢劉知逺追用晉天福隱帝仍父乾祐周丗宗仍太祖顯德皆非禮之正無足議者唐哀帝仍昭宗天祐蓋畏朱温而不敢云賊臣遷都自漢以來賊臣竊國命將欲移鼎必先遷都以自便董卓以山東兵起謀徙都長安驅民數百萬口更相蹈藉悉燒宫廟官府居家二百里内無復雞犬髙歡自洛陽遷魏於鄴四十萬户狼狽就道朱全忠自長安遷唐於洛驅徙士民毀宫室百司及民間廬舎長安自是丘墟卓不旋踵而死曹操迎天子都許卒覆劉氏魏唐之祚竟爲髙朱所傾凶盜設心積慮由來一揆也輿地道里誤古今輿地圖志所記某州至某州若干里多有差誤偶閱元祐九域志姑以吾郷饒州證之饒西至洪州三百八十里而志云西至州界一百七十里自界首至洪五百六十八里於洪州書至饒又衍二十里是爲七百六十里也饒至信州三百七十里而志云東南至本州界二百九十里自界首至信州三百五十里是爲六百四十里也饒至池州四百八十里而志云北至州界一百九十里自界首至池州三百八十里是爲五百七十里也唐賈耽皇華四達記所紀中都至外國尤爲詳備其書䖍州西南一百十里至潭口驛又百里至南康縣然今䖍至潭口纔四十里又五十里即至南康比之所載不及半也以所經行處驗之知其它不然者多矣容齋續筆卷第十
