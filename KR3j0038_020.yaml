  text: 容齋續筆卷第二十八則
  hash: sha256:f7aa9bd86688cccf1a4cb9a2129e978e05ca120b2523e92d5735ace57d734daf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_020-1a}
body:
  text: 權若訥馮澥唐中宗既流殺五王再復武氏陵廟右補闕權若訥上疏以為天地日月等字皆則天能事賊臣敬暉等輕紊前規削之無益於淳化存之有光於孝理又神龍制書一事以上並依正觀故事豈可近捨母儀逺尊祖德疏奏手制褒美欽宗在位懲王安石蔡京之誤國政事悉以仁宗為法左諫議大夫馮澥上言仁宗皇帝陛下之高祖也神宗皇帝陛下之祖也子孫之心寧有厚薄王安石司馬光皆天下之大賢其優劣等差自有公論願無作好惡允執厥中則是非自明矣詔榜朝堂侍御史李光駮之不聽復為右正言崔鶠所擊宰相不復問而遷澥吏部侍郎桉若訥與澥兩人議論操持絶相似蓋澥在崇寧中首上書乞廢元祐皇后自選人除寺監丞其始終大節不論可見建炎初元乃超居政地公議憤之歲旦飲酒今人元日飲屠酥酒自小者起相傳巳久然固有來處後漢李膺杜密以黨人同繫獄值元日於獄中飲酒曰正旦從小起時鏡新書晉董勛云正旦飲酒先飲小者何也勛曰俗以小者得歲故先酒賀之老者失時故後飲酒初學記載四民月令云正旦進酒次第當從小起以年小者起先唐劉夢得白樂天元日舉酒賦詩劉云與君同甲子壽酒讓先杯白云與君同甲子歲酒合誰先白又有歲假內命酒一篇云歲酒先拈辭不得𬒳君推作少年人顧況云不覺老將春共至更悲携手幾人全還丹寂寞羞明鏡手把屠蘇讓少年裴夷直云自知年幾偏應少先把屠蘇不讓春儻更數年逢此日還應惆悵羡他人成文幹云戴星先捧祝堯觴鏡裏堪驚兩鬢霜好是燈前偷失笑廜應不得先嘗方干云才酌屠蘇定年齒坐中皆笑鬢毛斑然則尚矣東坡亦云但把窮愁博長健不辭最後飲屠酥其義亦然存殁絶句杜子美有存殁絶句二首云席謙不見近彈棊畢曜仍傳舊小詩玉局他年無限笑白楊今日幾人悲鄭公粉繪隨長夜曹霸丹青巳白頭天下何曾有山水人間不解重驊騮每篇一存一沒蓋席謙曹霸存畢鄭殁也黃魯直荆江亭即事十首其一云閉門覔句陳無巳對客揮毫秦少遊正字不知溫飽未西風吹淚古藤州乃用此體時少遊殁而無巳存也近歲新安胡仔著漁隱叢話謂魯直以今時人形入詩句蓋取法於少陵遂引此句實失於詳究云湯武之事湯武之事古人言之多矣惟漢轅固黃生爭辨最詳黃生曰湯武非受命乃殺也固曰不然桀紂荒亂天下之心皆歸湯武湯武因天下之心而誅桀紂不得巳而立非受命為何黃生曰冠雖敝必加於首履雖新必貫於足今桀紂雖失道君上也湯武雖聖臣下也反因過而誅之非殺而何景帝曰食肉母食馬肝未為不知味言學者母言湯武受命不為愚遂罷顔師古注云言湯武為殺是背經義故以馬肝為喻也東坡志林云武王非聖人也昔者孔子蓋罪湯武伯夷叔齊不食周粟而孔子豫之其罪武王也甚矣至孟軻始亂之使當時有良史南巢之事必以叛書牧野之事必以弒書湯武仁人也必將為法受惡可謂至論然豫切考孔子之序書明言伊尹相湯伐桀成湯放桀于南巢武王伐商武王勝商殺受各蔽以一語而大指皎如所謂六藝折衷無待於良史復書也張釋之傳誤漢書紀傳志表矛盾不同非一然唯張釋之為甚本傳云釋之為騎郎事文帝十年不得調亡所知名欲免歸中郎將袁盎惜其去請徙補謁者後拜為廷尉逮事景帝歲餘為淮南相而百官公卿表所載文帝即位三年釋之為廷尉至十年書廷尉昌廷尉嘉又二人凡歷十三年景帝乃立而張驅為廷尉則是釋之未嘗十年不調及未嘗以廷尉事景帝也張于二廷尉張釋之為廷尉天下無寃民于定國為廷尉人自以不寃此漢史所稱也兩人在職皆十餘年周勃就國人上書告勃欲反下廷尉逮捕吏稍侵辱之勃以千金與獄吏吏使以公主為證太后亦以為無反事乃得赦出釋之正為廷尉不能救但申理犯蹕盜環一二細事耳楊惲為人告驕奢不悔過下廷尉桉驗始得所豫孫會宗書定國當惲大逆無道惲坐要斬惲之罪何至於是其徇主之過如此傳所謂決疑平法務在哀矝者果何為哉漢唐置郵趙充國在金城上書言先零罕羌事六月戊申奏七月甲寅璽書報從其計案金城至長安一千四百五十里往反倍之中間更下公卿議臣而自上書至得報首尾才七日唐開元十年八月巳卯夜權楚璧等作亂時明皇幸洛陽相去八百餘里壬午遣河南尹王怡如京師桉問宣慰首尾才三日置郵傳命既如此其速而廷臣共議蓋亦未嘗淹久後丗所不及也龍且張步韓信擊趙李左車勸陳餘勿與戰餘曰今如此避弗擊諸侯謂吾怯而輕來伐我遂與信戰身死國亡是時信方為漢將始攻下魏代威聲猶未暴白陳餘易之尚不足訝及滅趙服燕則關東六國既定其四矣信伐齊楚使龍且來救或言漢兵不可當龍且曰吾平生知韓信為人易與耳不足畏也何為而止一戰而沒項隨以亡耿弇討張步斬其大將軍費邑走邑之弟敢進攻西安臨淄拔其城又走其弟藍勢如破竹先是弇巳破尤來大槍延岑彭寵冨平獲索矣時步所盜齊地太半為弇所得然步猶曰以尤來大肜十餘萬衆吾皆即其營而破之今弇兵少於彼又皆疲勞何足摧乎竟出兵大戰兄弟成禽兵法云知彼知己百戰不殆龍且張步豈復識此哉梁臨川王宏伐魏魏元英禦之宏停軍不前魏人勸英進據洛水英曰蕭臨川雖騃其下有良將韋裴之屬未可輕也冝且觀形勢勿與交鋒宏卒敗退英之識見非前人可比也然遂進軍圍鍾離魏邢巒以為不可魏主召使還英表稱必克為曹景宗韋睿所挫失亡二十餘萬人智於前而昧於後為可恨耳義理之説無窮經典義理之説最為無窮以故解釋傳疏自漢至今不可槩舉至有一字而數説者姑以周易革卦言之巳日乃孚革而信之自王輔嗣以降大抵謂即日不孚巳日乃孚巳字讀如矣音蓋其義亦止如是耳唯朱子發讀為戊巳之已豫昔與易僧曇瑩論及此問之曰或讀作己音紀日如何瑩曰豈唯此也雖作巳音似日亦有義乃言曰天元十干自甲至已然後為庚庚者革也故已日乃孚猶云從此而革也十二辰自子至巳六陽數極則變而之隂於是為午故巳日乃孚猶云從此而變也用是知好竒者欲穿鑿附會固各有説云開元五王唐明皇兄弟五王兄申王撝以開元十二年寧王憲邠王守禮以二十九年弟𡵨王範以十四年薛王業以二十二年薨至天寶時巳無存者楊太真以三載方入宫而元稹連昌宮詞六百官隊仗避𡵨薛楊氏諸姨車鬪風李商隱詩云夜半宴歸官漏永薛王沉醉壽王醒皆失之也巫蠱之禍漢丗巫蠱之禍雖起於江充然事會之來蓋有不可曉者武帝居建章宮親見一男子帶劒入中龍華門疑其異人命收之男子捐劒走逐之弗獲上怒斬門候閉長安城門大索十一日巫蠱始起又嘗晝寢夢木人數千持杖欲擊己乃驚寤因是體不平遂苦忽忽善忘此兩事可謂異矣木將腐蠧實生之物將壞蟲實生之是時帝春秋巳髙忍而好殺李陵所謂法令無常大臣無罪夷滅者數十家由心術既荒隨念招妄男子木人之兆皆迷不復開則謫見於天鬼瞰其室禍之所被以妻則衛皇后以子則戾園以兄子則屈氂以女則諸邑陽石公主以婦則史良娣以孫則史皇孫骨肉之酷如此豈復顧他人哉且兩公主實衛后所生太子未敗數月前皆巳下獄誅死則其母與兄豈有全理固不待於江充之譖也唐詩無諱避唐人歌詩其於先丗及當時事直辭詠寄略無避隱至宫禁嬖昵非外間所應知者皆反復極言而上之人亦不以為罪如白樂天長恨歌諷諫諸章元微之連昌宫詞始末皆為明皇而發杜子美尤多如兵車行前後出塞新安吏潼關吏石壕吏新婚別垂老別無家別哀王孫悲陳陶哀江頭麗人行悲青阪公孫舞劒器行終篇皆是其它波及者五言如憶昨狼狽初事與古先別不聞夏啇衰中自誅褒妲是時妃嬪戮連為糞土叢中宵焚九廟雲漢為之紅先帝正好武寰海未凋枯拓境功未巳元和辭大爐內人紅袖泣王子白衣行毁廟天飛雨焚宮火徹明南內開元曲常時弟子傳法歌聲變轉滿座涕潺湲御氣雲樓敞含風綵仗髙仙人張內樂王母獻宫桃須為下殿走不可好樓居固無牽白馬幾至著青衣奪馬悲公主登車泣貴嬪兵氣凌行在妖星下直廬落日留王母微風倚少兒能畫毛延壽投壷郭舍人鬪雞初賜錦舞馬更登牀驪山絶望幸花萼罷登臨殿瓦鴛鴦坼宫簾翡翠虛七言如關中小兒壞紀綱張后不樂上為忙天子不在咸陽宫得不哀痛塵再蒙曾貌先帝照夜白龍池十日飛霹靂要路何日罷長戟戰自青羌連白蠻豈謂盡煩回紇馬翻然逺救朔方兵如此之類不能悉書此下如張祜賦連昌宫元日仗千秋樂大酺樂十五夜燈熱戲樂上巳樂邠王小管李謨笛退宫人玉環琵琶春鶯囀寧哥來容兒鉢頭邠娘羯鼓耍娘歌悖拿兒舞華清宫長門怨集靈臺阿鴇湯馬嵬歸香囊子散花樓雨霖鈴等三十篇大抵詠開元天寶間事李義山華清宫馬嵬驪山龍池諸詩亦然今之詩人不敢爾也李晟傷國體將帥握重兵居閫外當國家多事時其奉上承命尤當以恭順為主唐李晟在德宗朝破朱泚復長安功名震耀蓋社稷宗臣也然嘗將神䇿軍戍蜀及還以營妓自隨節度使張延賞追而返之由是有隙晟既立大功上召延賞入相晟表陳其過惡上重違其意乃止後歲餘上命韓滉諭旨於晟使釋怨滉因使晟表薦延賞遂為相然則輔相之拜罷皆大將得制之其傷國體甚矣德宗猜忌刻薄渠能釋然晟之失兵柄正緣此耳國學武成王廟本列晟於十哲乾道中有旨退於從祀壽皇聖意豈非出此乎元和六學士白樂天分司東都有詩上李留守相公其序言公見過池上泛舟舉酒話及翰林舊事因成四韻後兩聮云白首故情在青雲往事空同時六學士五相一漁翁此詩蓋與李絳者其詞正紀元和二年至六年事豫以其時考之所謂五相者裴垍王涯杜元穎崔羣及絳也紹興二十八年三月豫入館明年八月除吏部郎官一時同舍袐書丞虞雍公并甫著作郎陳魏公應求袐書郎史魏公直翁校書郎王魯公季海皆至宰相汪莊敏公明逺至樞密使恩數與宰臣等甚類元和事云二傳誤後丗自左氏載石碏事有大義滅親之語後丗援以為説殺子孫害兄弟如漢章帝廢太子慶魏孝文殺太子恂唐髙宗廢太子賢者不可勝數公羊書魯隱公威公事有子以母貴母以子貴之語後丗援以為説廢長立少以妾為后妃如漢哀帝尊傅昭儀為皇太太后光武廢太子強而立東海王陽唐髙宗廢太子忠而立孝敬者亦不可勝數卜子夏魏文侯以卜子夏為師案史記所書子夏少孔子四十四歲孔子卒時子夏年二十八矣是時周敬王四十一年後一年元王立歷正定王考王至威烈王二十三年魏始為侯去孔子卒時七十五年文侯為大夫二十二年而為侯又十六年而卒姑以始侯之歲計之則子夏已百三歲矣方為諸侯師豈其然乎父子忠邪漢王氏擅國王章梅福嘗言之唯劉向勤勤貇貇上封事極諫至云事藝不兩大王氏與劉氏亦且不並立陛下為人子孫守持宗廟而令國祚移於外親降為皂隸為後嗣愛昭昭甚明其言痛切如此而子歆乃用王莽舉為侍中為莽典文章倡導在位褒揚功德安漢宰衡之名皆所共謀馴致攝篡卒之身亦不免魏陳矯事曹氏三丗為之盡忠明帝憂社稷問曰司馬懿忠正可謂社稷之臣乎矯曰朝廷之望社稷未知也懿竟竊國柄至孫炎篡魏為晉而矯之子騫乃用佐命勳位極公輔晉郗愔忠於王室而子超黨於桓氏為溫建廢立之謀超死愔哀悼成疾後見超書一箱悉與溫往反密計遂大怒曰小子死恨晚更不復哭晉史以為有大義之風向矯愔之忠如是三子不勝誅矣蘇張説六國蘇秦張儀同學於鬼谷而其從橫之辨如冰炭水火之不同蓋所以設心者異耳蘇欲六國合從以擯秦故言其強謂燕地方二千餘里帶甲數十萬車六百乘騎六千匹謂趙地亦方二千餘里帶甲數十萬車千乘騎萬匹謂韓地方九百里帶甲數十萬天下之強弓徑弩皆從韓出韓卒之勇一人當百謂魏地方千里卒七十萬齊地方二千餘里臨災之卒固巳二十一萬楚地方五千里帶甲百萬車千乘騎萬匹至於張儀則欲六國為橫以事秦故言其弱謂梁地方不過千里卒不過三十萬韓地險惡卒不過二十萬臨災即墨非齊之有斷趙右肩黔巫非楚有易水長城非燕有然而六王皆聳聽敬從舉國而付之未嘗有一語相折難者彼皆長君持國之日久逮其臨事乃顧如桔槹隨人俯仰得不危亡幸矣哉且一國之勢猶一家也今夫主一家之政者較量生理名田若干頃歲收榖粟若干藝園若干畒歲收桑麻若干邸舍若干區為錢若干下至牛羊犬雞莫不有數自非童騃孱愚之人未有不能件析而枚數者何待於踈逺遊客為吾借箸而籌哉苟一以為多一以為寡將遂挈挈然舉而信之乎􅏯錯説景帝曰髙帝大封同姓齊七十餘城楚四十餘城吳五十餘城分天下半以漢之廣三國渠能分其半此錯欲削諸侯故盛言其大爾膠西王將與吳反羣臣諫曰諸侯地不能當漢十二為叛逆非計也是時反者即吳楚諸齊此膠西臣欲止王之謀故盛言其小爾二者視蘇張之言疑若相似而用心則否聽之者惟能知彼知已則善矣容齋續筆卷第二
