body:
  text: 髙德儒唐髙祖起兵太原使子建成丗民將兵擊西河郡執郡丞髙德儒丗民數之曰汝指野鳥爲鸞以欺人主取髙官吾興義兵正爲誅佞人耳遂斬之自餘不戮一人讀史不熟者但以爲史氏虚設此語以與指鹿爲馬作對耳案隋大業十一年有二孔雀飛集寶城朝堂前親衞校尉髙德儒等十餘人見之奏以爲鸞時孔雀巳飛去無可得驗詔以德儒誠心冥㑹肇見嘉祥擢拜朝散大夫餘人皆賜束帛仍於其地造儀鸞殿距此時財二年餘蓋唐温大雅所著創業起居注載之不追書前事故也新唐書太宗紀但書云率兵徇西河斬其郡丞髙德儒尤爲簡略賴通鑑盡紀其詳范氏唐鑑只論其被誅一節云唐朝士俸微唐丗朝士俸錢至微除一項之外更無所謂料劵添給之類者白樂天爲校書郎作詩曰幸逢太平代天子好文儒小才難大用典校在袐書俸錢萬六千月給亦有餘遂使少年心日日常晏如及爲翰林學士當遷官援姜公輔故事但乞兼京兆府户曹參軍旣除此職喜而言志至云詔授户曹掾捧詔感君恩弟兄俱簮笏新婦儼衣巾羅列髙堂下拜慶正紛紛喧喧車馬來賀客滿我門置酒延賀客不復憂空罇而其所得者亦俸錢四五萬廩禄二百石而巳今之主簿尉占優飫處固有倍簁於此者矣亦未甞以爲足古今異冝不可一槩論也楊文公在眞宗朝爲翰林學士而云虚忝甘泉之從臣終作若敖之餒鬼盖是時尚爲鮮薄非後來比也計然意林漢書貨殖傳粤王句踐困於㑹稽之上迺用范蠡計然遂報彊吴孟康注曰姓計名然越臣也蔡謨曰計然者范蠡所著書篇名耳非人也謂之計然者所計而然也群書所稱句踐之賢佐種蠡爲首豈復聞有姓計名然者乎若有此人越但用半策便以致霸是功重於范蠡而書籍不見其名史遷不述其傳乎顔師古曰蔡說謬矣古今人表計然列在第四等一名計研班固賔戲研桑心計於無垠即謂此耳計然者濮上人也甞南遊越范蠡卑身事之其書則有萬物録事見皇覽及晉中經簿又吴越春秋及越絶書並作計倪此則倪研及然聲皆相近實一人耳何云書籍不見哉予案唐正元中馬揔所述意林一書抄類諸子百餘十二卷云計然者葵丘濮上人姓辛字文子其先晉國之公子也爲人有内無外狀貌似不及人少而明學隂陽見微知著其志沈沈不肯自顯天下莫知故稱曰計然時遨游海澤號曰漁父范蠡請其見越王計然曰越王爲人鳥喙不可與同利也據此則計然姓名出處皎然可見裴駰注史記亦知引范子北史蕭大圜云留侯追蹤於松子陶朱成術於辛文正用此事曹子建表引文子李善注以爲計然師古蓋未能盡也而文子十二卷李暹注其序以謂范子所稱計然但其書一切以老子爲宗略無與范蠡謀議之事意林所編文子正與此同所謂范子乃别是一書亦十二卷馬揔只載其叙計然及它三事云餘並隂陽曆數故不取則與文子了不同李暹之說誤也唐蓺文志范子計然十五卷注云范蠡問計然答列於農家其是矣而今不存唐丗未知尊孟氏故意林亦列其書而有差不同者如伊尹不以一衣與人亦不取一衣於人之類其它所引書如胡非子隨巢子纏子王孫子公孫尼子阮子正部姚信士緯殷興通語牟子周生烈子秦菁子梅子任弈子魏㓪子唐滂子鄒子孫氏成敗志蔣子譙子鍾子張儼黙記裴氏新言袁淮正書袁子正論蘇子陸子張顯析言干子顧子諸葛子陳子要言符子諸書今皆不傳於丗亦有不知其名者思潁詩士大夫發跡壠畒貴爲公卿謂父祖舊廬爲不可居而更新其宅者多矣復以醫藥弗便飲膳難得自村疃而遷於邑自邑而遷於郡者亦多矣唯翩然委而去之或逺在數百千里之外自非有大不得巳則舉動爲不冝輕若夫以爲得計又從而詠歌夸詡之著于詩文是其一時思慮誠爲不審雖名公鉅人未能或之免也歐陽公吉州廬陵人其父崇公葬于其里之瀧岡公自爲阡表紀其平生而公中年乃欲居潁其思潁詩序云予自廣陵得請來潁愛其民淳訟簡土厚水甘慨然有終焉之志爾來思潁之念未甞少忘於心而意之所存亦時時見於文字乃發舊槀得南京以後詩十餘篇皆思潁之作以見予拳拳於潁者非一日也又續詩序云自丁家難服除入翰林爲學士忽忽八年間歸潁之志雖未遂然未甞一日少忘焉至于今年六十有四免并得蔡蔡潁連疆因得以爲歸老之漸又得在亳及青十有七篇附之時熈寧三年也公次年致仕又一年而薨其逍遥於潁蓋無幾時惜無一語及于松楸之思崇公惟一子耳公生四子皆爲潁人瀧岡之上遂無復有子孫臨之是因一代貴達而墳墓乃隔爲它壤予毎讀二序輒爲太息嗟乎此文不作可也若東坡之居冝興乃因免汝州居住而至其後自海外北還無以爲歸復暫至常州巳而捐館文定公雖居許而治命反葬於眉山云劉蕡下第唐文宗太和二年三月親策制舉人賢良方正劉蕡對策極言宦官之禍旣而裴休李郃等二十二人中第皆除官考官左散騎常侍馮宿太常少卿賈餗庫部郎中龐嚴見蕡策皆歎服而畏宦官不敢取詔下物論囂然稱屈諫官御史欲論奏執政抑之李郃曰劉蕡下第我輩登科能無厚顔乃上䟽以爲蕡所對策漢魏以來無與爲比今有司以蕡指切左右不敢以聞恐忠良道窮綱紀遂絶臣所對不及蕡逺甚乞回臣所授以旌蕡直不報予案是時宰相乃裴度韋處厚竇易直易直不足言裴韋之賢顧獨失此至於抑言者使勿論奏豈不有愧於心乎蕡旣由此不得仕於朝而李郃亦不顯蓋無敢用之也令狐楚牛僧孺乃能表蕡入幕府待以師禮竟爲宦人所嫉誣貶柳州司户李商隱贈以詩曰漢廷急詔誰先入楚路髙歌自欲翻萬里相逢歡復泣鳯巢西隔九重門及蕡卒復以二詩哭之曰一叫千回首天髙不爲聞又曰巳爲秦逐客復作楚寃魂併將添恨淚一洒問乾坤其悲之至矣甘露之事相去財七年未知蕡及見之否乎酒肆旗望今都城與郡縣酒務及凡鬻酒之肆皆掲大帘於外以青白布數幅爲之微者隨其髙卑小大村店或挂缾瓢標箒秆唐人多詠於詩然其制蓋自古以然矣韓非子云宋人有酤酒者斗槩甚平遇客甚謹爲酒甚美懸幟甚髙而酒不售遂至於酸所謂懸幟者此也賢宰相遭讒一代宗臣當代天理物之任君上委國而聽之固爲社稷之福然必不使邪人參其間乃可不然必爲所勝姑以唐丗及本朝之事顯顯者言之若禇遂良長孫無忌之遭李義府許敬宗張九齡之遭李林甫是巳裴晉公相憲宗立淮蔡青鄆之功唐之威令紀綱旣壞而復振可謂名宰矣皇甫鎛一共政則去不旋踵迨穆敬文三宗主旣不明而元稹李逢吉宗閔更撼之使不得一日安厥位趙韓王以佐命元勲而爲盧多遜所勝冦萊公爲丁謂所勝杜祁公韓范爲陳執中賈昌朝所勝冨韓公爲王介甫所勝范忠宣爲章子厚所勝趙忠簡爲秦㑹之所勝大抵皆然也宋齊丘自用兵以來令民間以見錢紐納稅直旣爲不堪然於其中所謂和買折帛尤爲名不正而歛最重偶閱大中祥符間太常博士許載著吴唐拾遺録所載多諸書未有者其勸農桑一篇正云吴順義年中差官興版簿定租稅厥田上上者每一頃稅錢二貫一百文中田一頃稅錢一貫八百下田一頃千五百皆足陌見錢如見錢不足許依市價折以金銀并計丁口課調亦科錢宋齊丘時爲貟外郎上策乞虚擡時價而折紬綿絹本色曰江淮之地唐季巳來戰爭之所今兵革乍息黎甿始安而必率以見錢折以金銀此非民耕鑿可得也無興販以求之是爲教民弃本逐末耳是時絹毎匹市賣五百文紬六百文綿毎兩十五文齊丘請絹毎匹擡爲一貫七百紬爲二貫四百綿爲四十文皆足錢丁口課調亦請蠲除朝議喧然沮之謂虧損官錢萬數不少齊丘致書于徐知誥曰明公揔百官理大國督民見錢與金銀求國富庶所謂擁篲救火撓水求清欲火滅水清可得乎知誥得書曰此勸農上策也即行之自是不十年間野無閑田桑無隙地自吴變唐自唐歸宋民到于今受其賜齊丘之事美矣徐知誥亟聽而行之可謂賢輔相而九國志齊丘傳中略不書資治通鑑亦佚此事今之君子爲國唯知浚民以益利豈不有靦於偏閏之臣乎齊丘平生在所不論也鹹杬子玉篇唐韻釋杬字云木名出豫章煎汁藏果及卵不壞異物志云杬子音元鹽鴨子也以其用杬木皮汁和鹽漬之今吾郷處處有此乃如蒼耳益母莖幹不純是木小人爭鬪者取其葉挼摖皮膚輒作赤腫如被傷以誣賴其敵至藏鴨卵則又以染其外使若赭色云月中桂兎酉陽雜爼天咫篇載月星神異數事其命名之義取國語楚靈王曰是知天咫安知民則之說其紀月中蟾桂引釋氏書言須彌山南面有閻扶樹月過樹影入月中或言月中蟾桂地影也空處水影也予記東坡公鑒空閣詩云明月本自明無心孰爲境挂空如水鑑寫此山河影我觀大瀛海巨浸與天永九州居其間無異蛇盤鏡空水兩無質相照但耿耿妄云桂兎蟇俗說皆可屏正用此說其詩在集中題爲和黃秀才頃予游南海西歸之日泊舟金利山下登崇福寺有閣枕江流標爲鑒空正見詩牌揭其上蓋當時臨賦處也唐二帝好名唐正觀中忽有白鵲營巢於寢殿前槐樹上其巢合歡如腰鼔左右拜舞稱賀太宗曰我常笑隋煬帝好祥瑞瑞在得賢此何足賀乃命毀其巢放鵲於野外明皇初即位以風俗奢靡制乗輿服御金銀器玩令有司銷毁以供軍國之用其珠玉錦繡焚於殿前天下母得復采織罷兩京織錦坊予謂二帝皆唐之明主所言所行足以垂訓于後然大要出於好名鵲巢之異左右從而獻䛕叱而去之可也何必毀其巢珠玉錦繡勿珍而尚之可也何必焚之殿前明以示外使家至户曉哉治道貴於執中是二者懼不可以爲法其後楊貴妃有寵織繡之工專供妃院者七百人中外爭獻器服珍玩嶺南經略使張九皐廣陵長史王翼以所獻精靡九章加三品翼入爲户部侍郎天下從風而靡明皇之始終一何不同如此哉周禮非周公書周禮一書丗謂周公所作而非也昔賢以爲戰國隂謀之書考其實蓋出於劉歆之手漢書儒林傳盡載諸經專門師授此獨無傳至王莽時歆爲國師始建立周官經以爲周禮且置博士而河南杜子春受業於歆還家以教門徒好學之士鄭興及其子衆往師之此書遂行歆之處心積慮用以濟莽之惡莽據以毒痡四海如五均六筦市官賖貨諸所興爲皆是也故當其時公孫禄旣巳斥歆顚倒六經毀師法矣歷代以來唯宇文周依六典以建官至於治民發政亦未甞循故轍王安石欲變亂祖宗法度乃尊崇其言至與詩書均匹以作三經新義其序略曰其人足以任官其官足以行法莫盛乎成周之時其法可施於後丗其文有見於載籍莫具乎周官之書自周之衰以至于今太平之遺迹掃蕩幾盡學者所見無復全經於是時也乃欲訓而發之臣知其難也以訓而發之之難則又以知夫立政造事追而復之之爲難則安石所學所行實於此乎出遂謂一部之書理財居其半又謂泉府凡國之財用取具焉歳終則㑹其出入而納其餘則非特搉兼并救貧阨因以足國事之財用夫然故雖有不庭不虞民不加賦而國無乏事其後吕嘉問法之而置市易由中及外害徧生靈嗚呼二王託周官之名以爲政其歸於禍民一也醉尉亭長李廣免將軍爲庶人屏居藍田甞夜從一騎出從人田間飲還至亭霸陵尉醉呵止廣後廣拜右北平太守請尉與俱至軍而斬之上書自陳謝罪武帝報曰報忿除害朕之所圖於將軍也王莽竊位尤備大臣抑奪下權大司空士夜過奉常亭亭長苛之告以官名亭長醉曰寧有符傳邪士以馬箠擊亭長亭長斬士亡郡縣逐之家上書莽曰亭長奉公勿逐大司空王邑斥士以謝予觀此兩亭尉長其醉等耳霸陵尉但呵止李廣而廣殺之武帝不問奉常亭長殺宰士而王莽反以奉公免之亦可笑也三易之名三易之名一曰連山二曰歸藏三曰周易皆以兩字爲義今人但稱周易曰易非也夏曰連山其卦以純艮爲首艮爲山山上山下是名連山雲氣出内於山故名易爲連山商曰歸藏以純坤爲首坤爲地萬物莫不歸而藏於中故名爲歸藏周曰周易以純乾爲首乾爲天天能周帀於四時故名易爲周也大蔟爲人統寅爲人正夏以十三月爲正人統人無爲卦首之理艮漸正月故以艮爲首林鍾爲地統未之衝丑故爲地正商以十二月爲正地統故以坤爲首黃鍾爲天統子爲天正周以十一月爲正天統故以乾爲天首此本出唐賈公彦周禮正義之說予整齊而紀之所謂十三月者承十二月而言即正月耳後漢陳寵論之甚詳本出尚書大傳忠臣名不傳古今忠臣義士其名載於史策者萬丗不朽然有不幸而泯没無傳者南唐後主淫於浮圖氏二人繼踵而諫一獲徒一獲流歙人汪煥爲第三諫極言請死云梁武事佛刺血寫佛經散髮與僧踐捨身爲佛奴屈膝禮和尚及其終也餓死于臺城今陛下事佛未見刺血踐髮捨身屈膝臣恐他日猶不得如梁武之事後主覽書赦而官之又有淮人李雄當王師弔伐出守西偏不遇其敵雄以國城重圍不忍端坐遂東下以救之陣于溧陽與王師遇父子俱没諸子不從行者亦死他所死者凡八人李氏訖亡不霑襃贈其事僅見於吴唐拾遺録頃甞有㫖合九朝國史爲一書他日史官爲列之於李煜傳庶足以慰二人於泉下歐陽公作吴某墓誌云李煜時爲彭澤主簿曹彬破池陽遣使者招降郡縣其令欲以城降某曰吾能爲李氏死爾乃殺使者爲煜守煜巳降某爲游兵執送軍中主將責以殺使者曰固當如是主將義而釋之其事雖粗見而集中只云諱某爲可惜也如靖康之難朱昭等數人死於震武城之類予得朱并所作忠義録於其子栐乃爲作傳於四朝史中蓋惜其無傳也唐人酒令白樂天詩鞍馬呼教住骰盤喝遣輸長驅波卷白連擲采成盧注云骰盤卷白波莫走鞍馬皆當時酒令予桉皇甫松所著醉郷日月三卷載骰子令云聚十隻骰子齊擲自出手六人依采飲焉堂印本采人勸合席碧油勸擲外三人骰子聚於一處謂之酒星依采聚散骰子令中改易不過三章次改鞍馬令不過一章又有旗􅜖令閃擪令抛打令今人不復曉其法矣唯優伶家猶用手打令以爲戲云容齋續筆卷第十六
