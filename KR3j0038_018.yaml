body:
  text: 右容齋随筆續筆三十二卷宋嘉㝎刊本每半葉十行行廿一字高七寸二分廣五寸五分白口口上有刻上姓名題下四格卷後書名空兩行皆宋板例日本鞠山文庫所藏荆州田監督伏侯載以歸以馬刻校之止十三卷中落一行续茟目錄落一目及總目後凡二百四十九則一條續茟卷十四尹文子條葢晉宋時細人所作細不作衲卷十六計然意林條如伊尹不以一衣與人亦不取一衣扵人衣不作介今意林作介後人以孟子改之此爲至善是書向以李瀚本㑹通館活字本最善馬本自序云向淂沁水李公不全本又淂友人殘本彚而刻之乃其校訂並不甚謬亦可見前輩用力之勤矣學部圖書館止存二冊一随筆苐四卷一四筆苐五卷行歀冋而有大德乙亥補板中貞元貞觀貞㝎貞惠並作正桓公作烕公魏公徵作魏證殷武作商武顓頊作顓帝慎戒作謹戒完顔亮作元顔亮至匡朗勖樹玄弘讓殷徴則缺筆慎貞桓缺二畫与他宋本不同冩如先朝諱号提行上字有提行有不提行二筆銅雀瓦硯先公亦提行例均不一惜止存兩筆不知天壤問尚有全部否江陰繆荃孫跋時年七有五
