body:
  text: 容齊五筆卷第十十二則哀公問社哀公問社於宰我宰我對曰夏后以松殷人以柏周人以栗曰使民戰栗子聞之曰成事不說遂事不諌既往不咎古人立社但各因其土地所冝木為之𥘉非求異而取義於彼也哀公本不必致問既聞用栗之言遂起使民戰栗之語其意謂古者弗用命戮于社所以威民然其實則非也孔子責宰我不能因事獻可㬱否既非成事尚為可說又非遂事尚為可諌且非既往何咎之云或謂使民戰栗一句亦出於宰我記之者欲與前言有别故加曰字以起之亦是一說然戰栗之對使出於我則導君於猛顯為非宜出於哀公則便即時正救以杜其始兩者皆失之無所逃於聖人之責也哀公欲以越伐魯而去三家不克成卒為所逐以至失邦其源蓋在於此何休注公羊傳云松猶容也想見其容貌而事之主人正之意也柏猶迫也親而不遠主地正之意也栗猶戰栗謹敬貌主天正之意也然則戰栗之說亦有所本公羊云虞主用桑練主用栗則三代所奉社其亦以松柏栗為神之主乎非植此木也程伊川之說有之絶句詩不貫穿夜凉吹笛千山月路暗迷人百種花棊罷不知人換世酒䦨無奈客思家此歐陽公絶妙之語然以四句各一事似不相貫穿故名之曰夢中作永嘉士人薛韶喜論詩嘗立一說云老杜近體律詩精深妥帖雖多至百韻亦首尾相應如常山之蛇無間斷齟齬處而絶句乃或不然五言如遲日江山麗春風花草香泥融飛燕子沙暖睡鴛鴦急雨梢溪足斜暉轉樹腰隔巢黃鳥並翻藻白魚跳江動月移石溪虛雲傍花鳥棲知故道帆過宿誰家鑿井交棕葉開渠斷竹根扁舟輕裊纜小徑曲通村日出籬東水雲生舍北泥竹高鳴翡翠沙僻舞鵾雞釣艇收緡盡昏鴉接翅稀月生初學扇雲細不成衣舍下笋穿壁庭中藤刺簷地晴絲冉冉江白草纎纎七言如糝徑楊花鋪白氊點溪荷葉疊青錢筍根雉子無人見沙上鳬雛傍母眠兩箇黃鸝鳴翠柳一行白鷺上青天窗含西嶺千秋雪門泊東吳萬里船之類是也豫因其說以唐人萬絶句考之但有司空圖雜題云驛步堤縈閣軍城鼓振橋鷗和湖鴈下雪隔嶺梅飄舴艋猿偷上蜻蜓燕競飛樵香燒桂子苔濕挂莎衣農父田翁詩張碧農父詩云運鋤耕斸侵星起隴畔豐盈滿家喜到頭禾黍屬他人不知何處拋妻子杜荀鶴田翁詩云白髮星星筋力衰種田猶自伴孫兒官苗若不平平納任是豐年也受飢讀之使人愴然以今觀之何啻倍蓰也衛宣公二子衛宣公二子之事詩與左傳所書始末甚詳乘舟之詩為伋壽而作也左傳云宣公蒸於庶母夷姜生急子為之娶於齊而美公取之生壽及朔宣姜與公子朔譛急子宣姜者宣公所納伋之妻翻譖其過公使諸齊使盜待諸莘將殺之壽子告之使行不可壽子載其旌以先盜殺之遂兄弟并命案宣公以魯隱四年十二月立至桓十二年十一月卒凡十有九年姑以即位之始便成蒸亂而急子即以次年生勢須十五歲然後娶既娶而奪之又生壽朔朔巳能同母譖兄壽又能代為使者以越境非十歲以下兒所能辦也然則十九年之問如何消破此最為難曉也謂端為匹今人謂縑帛一匹為一端或總言端匹按左傳幣錦二兩注云二丈為一端二端為一兩所謂匹也二兩二匹也然則以端為匹非矣湘山野録載夏英公鎮襄陽遇大禮赦恩賜致仕官束帛以絹十匹與胡旦旦笑曰奉還五匹請檢韓詩外傳及諸儒韓康伯等所解束帛戔戔之義自可見證英公檢之果見三代束帛束修之制若束帛則卷其帛為二端五匹遂見一端正合此說也然周易正義及王弼注韓詩外傳皆無其語文瑩多妄誕不足取信案春秋公羊傳乘馬束帛法云束帛謂玄三纁二玄三法天纁二法地若文瑩以此為證猶之可也唐人草堂詩句豫於東圃作草堂欲采唐人詩句書之壁而未暇也姑録之于此杜公云西郊向草堂昔我去草堂草堂少花今欲栽草堂塹西無樹林白公有别草堂三絶句又云身出草堂心不出劉夢得傷愚溪云草堂無主燕飛回元微之和裴校書云清江見砥草堂在錢起有暮春歸故山草堂詩又云暗歸草堂靜半入花源去朱慶餘稱著朱衣入草堂李涉草堂曽與雪為鄰顧况不作草堂招遠客郎士元草堂竹徑在何處張籍草堂雪夜携琴宿又云西峯月猶在遙憶草堂前武元衡多君能寂寞共作草堂游陸龜蒙草堂秪待新秋景又云草堂盡日留僧坐司空圖草堂舊隱猶招我韋莊今來空訝草堂新子蘭䇿杖吟詩上草堂皎然有題湖上草堂云山居不買剡中山湖上千峯處處間芳草白雲留我住世人何事得相關公榖解經書日孔子作春秋以一字為褒貶大氏志在尊王至於紀年叙事只因舊史杜預見汲冢書魏國史記謂其著書文意大似春秋經椎此足以見古者國史䇿書之常也所謂書日不書日在輕重事體本無所系而公羊榖梁二傳每事斷之以日故窒而不通左氏惟有公子益師卒公不與小斂故不書日一說其它亦鮮今表二傳之語以示兒曹公羊云益師卒何以不日遠也葬者不及時而日渴葬也不及時而不日慢葬也過時而日隱之也過時而不日謂之不能葬也當時而不日正也當時而日危不得葬也庚寅入邴其日何難也取邑不日桓之盟不日信之也甲寅齊人伐衛伐不日此何以日至之日也壬申公朝于壬所其日何録乎內也辛巳晉敗秦于殽詐戰不日此何以日盡也甲戍敗狄于鹹其日何大之也子卒何以不日隱之也即位不日榖梁最多卑者之盟不日大夫日卒正也諸侯日卒正也日入惡入者也外盟不日取邑不日大閲崇武故謹而日之前定之盟不日公敗齊師不日疑戰也公敗宋師其日成敗之也齊人滅遂其不日微國也公㑹齊侯盟于柯桓盟雖內與不曰信也媵陳人之婦其不日數渝惡之也癸亥葬紀叔姬不日卒而日葬閔紀之亡也子卒日正也不日故也有所見則日戊辰盟于葵丘桓盟不日此何以日美之也辛卯沙鹿崩其日重變也戊申隕石于宋是月六鶂退飛石無知故日之鶂微有知之物故月之乙亥齊侯小白卒此以正其日之何也壬申公朝于王所其日以其再致天子故謹而日之日繫於月月繫於時其不月失其所繫也丁未商臣弒其君髠日髠之卒所以謹商臣之弒也已巳及晉處父盟不言公諱也何以知其與公盟以其日也甲戍取須句取邑不日此其日何也不正其再取故謹而日之也辛丑葬襄王日之甚矣其不葬之辭也乙卯晉楚戰于邲日其事敗也癸卯晉滅潞滅國有三術中國謹日卑國月夷狄不日其日潞子賢也甲戍楚子卒夷狄卒而不日日少進也癸酉戰于鞍其日或曰日其戰也或曰日其悉也梁山崩不日何也髙者有崩道也鼷鼠食郊牛角不言日急辭也庚申莒潰惡之故謹而日之也秋公至自㑹不日至自伐鄭也丙戍鄭伯卒于操其日未踰竟也乙亥臧孫紇出奔邾其日正紇之出也蔡世子弒其君其不日子奪父政是謂夷之冬十月葬蔡景公不日卒而月葬不葬者也四月楚公子比弒其君弒君者日不日比不弒也甲戍同盟干平丘其日善是盟也內之大事日即位君之大事也其不日何也以年決者不以日決也定之即位何以日也著之也它釋時月者亦然通經之士可以默諭矣沙鹿梁山為兩說尤不然蘇子由春秋論云公羊榖梁之傳日月土地皆所以為訓夫日月之不知土地之不祥何足以為喜怒其意蓋亦如此桞應辰押字豫頃因見鄂州南樓土中磨崖碑其一刻栁字下一字不可識後訪得其人名應辰而云是唐末五代時湖北人也既載之四筆中今始究其實栁之名是巳蓋以國朝寶元元年吕溱榜登甲科今浯溪石上有大押字題云押字起於心心之所記人不能知大宋熙寧七年甲寅歲刻尚書都官貟外郎武陵栁應辰時為永州通判仍有詩云浯溪石在大江邊心記間將此地鐫自有後人來屈指四千六百甲寅年有閬中陳思者跋云右栁都官欲以怪取名所至留押字盈丈莫知其何為押字古人書名之草者施於文記間以自别識耳今應辰鐫刻廣博如許已怪矣好事者從而為之說謂能祛逐不祥真大可笑豫得此帖乃恨前疑之非石傍又有蔣世基述夢記云至和三年八月知永州職方貟外郎栁拱辰受代歸闕祁陽縣令齊術送行至白水夢一儒衣冠者曰我元結也今桞公游浯溪無詩而去子盍求之覺而心異之遂獻一詩柳依韻而和其語不工拱辰以天聖八年王拱辰榜登科殆應辰兄也輒并記之唐堯無後堯舜之子不肖等耳舜之後雖不有天下而傳至於陳及田齊幾二千載惟堯之後當舜在位時即絶故禹之戒舜曰母若丹朱傲用殄厥世又作戒曰惟彼陶唐有此冀方今失厥道亂其紀綱乃底滅亡源丹朱之惡固在所絶方舜禹之世顧不能别訪賢胄為之立繼乎左傳載子産之辭曰唐人是因以服事夏商其季世曰唐叔虞成王滅唐而封太叔又蔡墨曰陶唐氏既衰其後有劉纍氏曰御龍范宣子曰丐之祖自虞以上為陶唐氏在夏為御龍氏然則封國雖絶尚有子孫武王滅商封帝堯之後於薊而未嘗一見於簡䇿史趙言楚之滅陳曰盛德必百世祀虞之世數未也臧文仲聞蓼與六二國亡曰臯陶庭堅不祀忽諸堯之盛德豈出舜臯之下而爵邑不能及孫何也斯須之敬今公私宴㑹稱與主人對席者曰席靣古者謂之賔謂之客是已儀禮燕禮篇射人請賔公曰命某為賔賔少進禮辭又命之賔許諾左傳季氏飲大夫酒臧紇為客宋公兼享晉楚之大夫趙孟為客杜預云客一坐所尊也乾道二年十一月薛季益以權工部侍郎受命使金國侍從共餞之於吏部尚書廳陳應求主席自六部長二之外兩省官皆預凡㑹者十二人薛在部位最下應求揖之為客辭不就曰常時固自有次第奈何今日不然諸公言此席正為侍郎設何辭之為薛終不可豫時為右史最居末坐給事中王日嚴目豫曰景盧能倉卒閒應對願出一轉語折衷之豫笑謂薛曰孟子不云乎庸敬在兄斯須之敬在鄉人侍郎姑處斯須之敬可也明日以往不妨復如常時薛無以對諸公皆稱善遂就席丙午丁未丙午丁未之歲中國遇此輒有變故非禍生於內則夷狄外侮三代遠矣姑托漢以來言之高祖以丙午崩權歸吕氏幾覆劉宗武帝元光元年為丁未長星見蚩尤旗亘天其春戾太子生始命將出征胸奴自是之後師行三十年屠夷死滅不可勝數及於巫蠱之禍太子子父皆敗昭帝元平元年丁未帝崩昌邑立而復廢一歲再易主成帝永始二年三年為丙午丁未王氏方盛封莽為新都侯立趙飛燕為皇后由是國統三絶漢業遂頽雖光武建武之時海內無事然勾引南胸奴稔成劉淵亂華之釁正是歲也殤帝安帝之立值此二年東漢政亂實基於此威帝終於永康丁未孝靈繼之漢室滅矣魏文帝以黃𥘉丙午終明帝嗣位司馬氏奪國兆於此時晉武太康六年七年惠帝正在東宫五胡毒亂此其源也東晉訖隋南北分裂九縣飈回在所不論唐太宗正觀之季武氏巳在後宫中宗神龍景龍其事可見代宗大曆元二大盜𥘉平而置其餘孽於河北強藩悍鎮卒以亡唐寶曆丙午敬宗遇弒大和丁未是為文宗甘露之悲至於不可救藥僖宗光啓之際天下固已大亂而中官劫幸興元襄王煴僭立石晉開運遺禍至今皇朝景德方脫契丹之擾而明年祥符神仙宫觀之役崇熾海內虛耗治平丁未王安石入朝愲亂宗社靖康丙午都城受圍逮于丁未汴失守矣淳熙丁未高宗上仙揔而言之大抵丁未之災又慘於丙午昭昭天象見於運行非人力之所能為也祖宗命相祖宗進用宰相惟意所屬𥘉不以內外高卑為主若召故相則率置諸見當國者之上太平興國中薛文惠公居正薨盧多遜沈倫在相位而趙韓王普以太子太保散秩而拜昭文咸平四年李文靖公沆為集賢而召故相吕文穆公蒙正為昭文景德元年文靖薨王文正公旦文穆公欽若為參政不次補而畢文簡公士安由侍讀學士寇忠愍公凖由三司使並命為史館集賢畢公雖歷參政不及一月至和二年陳恭公執中罷劉沆在位而外召文富二公文公復為昭文富為集賢而沆遷史館熙寧三年韓獻肅公絳王荆公安石同拜韓在上而先罷荆公越四年亦罷韓復為館相明年荆公再入遂拜昭文居韓之上元祜元年召文潞公於洛司馬公自門下侍郎拜左僕射固辭乞令彥博以太師兼侍中行左僕射而已為右以佐之宣仁不許曰彥博豈可居卿上欲命兼侍中行右僕射㑹臺諌有言彥博不可居三省長官於是但平章軍國重事崇寧以後蔡京凡四入輒為首台此非可論典故也隆興元年冬湯岐公思退為右僕射張魏公浚為樞密使孝宗欲命張為左請於德壽高宗曰湯思退元是左相張浚元是右相只仍其舊可也於是出命容齊五筆卷第十終
