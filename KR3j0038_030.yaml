body:
  text: 婦人英烈婦人女子婉孌閨房以柔順靜專為德其遇哀而悲臨事而惑蹈死而懼蓋所當然爾至於能以義斷恩以智決策斡旋大事視死如歸則幾於烈丈夫矣齊湣王失國王孫賈從王失王之處其母曰汝朝出而晚來則吾倚門而望汝暮出而不還則吾倚閭而望汝今事王不知王處汝尚何歸賈乃入市呼市人攻殺淖齒而齊亡臣相與求王子立之卒以復國馬超叛漢殺刺史太守涼州參軍楊阜出見薑敘於歷城與議討賊敘母曰韋使君遇難亦汝之負但當速發勿復顧我敘乃與趙昻合謀超取昻子月為質昻謂妻異曰當奈月何異曰雪君父之大恥喪元不足為重況一子哉超襲歷城得敘母母罵之曰汝背父殺君天地豈久容汝敢以面目視人乎超殺之月亦死晉卞壼拒蘇峻戰死二子隨父後亦赴敵而亡其母拊尸哭曰父為忠臣子為孝子夫何恨乎秦符堅將伐晉所幸張夫人引禹稷湯武事以諌曰朝野之人皆言晉不可伐陛下獨決意行之堅不聽曰軍旅之事非婦人所當預也劉𥙿起兵討逆同謀孟昶謂妻周氏曰我決當作賊幸早離絶周氏曰君父母在堂欲建非常之謀豈婦人所能諫事之不成當於奚官中奉養大家義無歸志也昶起周氏追昶坐曰觀君舉措非謀及婦人者不過欲得財物耳指懷中兒示之曰此而可賣亦當不惜遂傾資以給之何無忌夜草檄文其母劉牢之姊也登橙密窺之泣曰汝能如此吾復何恨問所與同謀者曰劉𥙿母尤喜因為言舉事必有成之理以勸之竇建德救王丗充唐拒之於虎牢建德妻曹氏勸使乘唐國之虛西抄關中唐必還師自救建德曰此非女子所知李克用困於上源驛左右先脫歸者以汴人為變告其妻劉氏劉神色不動立斬之隂召大將約束謀保軍以還克用歸欲勒兵攻汴劉氏曰公當訴之朝廷若擅舉兵相攻天下孰能辨其曲直克用乃止黃巢死時溥獻其姬妾僖宗宣問曰汝曹皆勳貴子女何為從賊其居首者對曰狂賊凶逆國家以百萬之衆失守宗祧今陛下以不能拒賊責一女子置公卿將帥於何地乎上不復問戮之於市餘人皆悲怖昏醉獨不飲不泣至於就刑神色肅然唐莊宗臨斬劉守光守光悲泣哀祈不巳其二妻李氏祝氏譙之曰事巳如此生復何益妾請先死即伸頸就戮劉仁贍守壽春幼子崇諫夜泛舟渡淮北仁贍命斬之監軍使求救於夫人夫人曰妾於崇諫非不愛也然軍法不可私若貸之則劉氏為不忠之門矣趣命斬之然後成喪王師圍金陵李後主以劉澄為潤州節度使澄開門降越後主誅其家澄女許嫁未適欲活之女曰叛逆之餘義不求生遂就死此十餘人者義風英氣尚凜凜有生意也雖載於史策聊表出之至於唐髙祖起兵太原女平陽公主在長安其夫柴紹曰尊公將以兵淸京師我欲往恐不能偕奈何主曰公往矣我自為計即奔鄠發家資招南山亡命諭降羣盜申法誓衆勒兵七萬威振關中與秦王會渭北分定京師此其偉烈又非它人比也無用之用莊子云人皆知有用之用而莫知無用之用又云知無用而始可與言用矣夫地非不廣且大也人之所用容足耳然則廁足而墊之致黃泉所謂無用之為用也亦明矣此義本起於老子三十輻共一轂當其無有車之用一章學記鼓無當於五聲五聲弗得不備水無當於五色五色弗得不章其理一也今夫飛者以翼為用縶其足則不能飛走者以足為用縛其手則不能走舉埸較藝所務者才也而拙鈍者亦為之用戰陳角勝所先者勇也而老怯者亦為之用則有用無用若之何而可分别哉故為國者其勿以無用待天下之士則善矣龍筋鳯髓判唐史稱張鷟早惠絶倫以文章瑞朝廷屬文下筆輒成八應制舉皆甲科今其書傳於丗者朝野僉載龍筋鳯髓判也僉載紀事皆瑣尾擲裂且多媟語百判純是當時文格全類俳體但知堆垜故事而於蔽罪議法處不能深切殆是無一篇可讀一聮可味如白樂天甲乙判則讀之愈多使人不厭聊載數端於此甲去妻後妻犯罪請用子蔭贖罪甲不許判云不安爾室盡孝猶慰母心薄送我畿贖罪寧辭子蔭縱下山之有恕曷陟屺之無情辛夫遇盜而死求殺盜者而為之妻或責其失節不伏判云夫讎不報未足為非婦道有虧誠宜自恥詩著靡它之誓百代可知禮垂不嫁之文一言以蔽景居喪年老毀瘠或非其過禮曰哀情所鍾判云況血氣之既衰老夫耄矣縱哀情之罔極吾子忍之景妻有喪景於妻側奏樂妻責之不伏判云儼衰麻之在躬是吾憂也調絲竹以盈耳於汝安乎甲夜行所由執之辭云有公事欲早趨朝所由以犯禁不聽判云非巫馬為政焉用出以戴星同宣子俟朝胡不退而假寐乙貴達有故人至坐之堂下進以僕妾之食曰故辱而激之判云安實敗名重耳竟慙於臼犯感而成事張儀終謝於蘇奏景娶妻無子父母將出之辭曰歸無所從判云雖配無生育誠合比於斷絃而歸靡適從庶可同於束緼乙為三品見本州刺史不拜或非之稱品同判云或商周不敵敢不盡禮事君今晉鄭同儕安得降階卑我若此之類不背人情合於法意援經引史比喻甚明非青錢學士所能及也元微之有百餘判亦不能工余襄公集中亦有判兩卷粲然可觀張鷟字文成史云調露中登進士第考功貟外郎騫味道見所對稱天下無雙案登科記乃上元二年去調露尚六歲是年進士四十五人鷟名在二十九既以為無雙而不列髙第神龍元年中才膺管樂科於九人中為第五景雲二年中賢良方正科於二十人中為第三所謂制舉八中甲科者亦不然也唐制舉科目唐丗制舉科目猥多徒異其名爾其實與諸科等也張九齡以道侔伊吕策髙第以登科記及會要考之蓋先天元年九月明皇初即位宣勞使所舉諸科九人經邦治國材可經國才堪刺史賢良方正與此科各一人藻思清華興化變俗科各二人其道侔伊吕策問殊平平但云興化致理必俟得人求賢審官莫先任舉欲逺循漢魏之規復存州郡之選慮牧守之明不能必鑒次及越騎佽飛皆出畿甸欲均井田於要服遵丘賦於革車并安人重榖編户農桑之事殊不及為天下國家之要道則其所以待伊吕者亦狹矣九齡於神龍二年中材堪經邦科本傳不書計亦此類耳淵有九名莊子載壷子見季咸事云鯢旋之審為淵止水之審為淵流水之審為淵淵有九名此處三焉其詳見於列子黃帝篇盡載其目曰鯢旋之潘為淵止水之潘為淵流水之潘為淵濫水之潘為淵沃水之潘為淵汍水之潘為淵雍水之潘為淵汧水之潘為淵肥水之潘為淵是為九淵案爾雅云濫水正出即檻泉也沃泉下出汍泉穴出灉者反入汧者出不流又水決之澤為汧肥者出同而歸異皆禹所名也爾雅之書非周公所作蓋是訓釋三百篇詩所用字不知列子之時巳有此書否細碎蟲魚之文列子決不肯留意得非偶相同邪淮南子有九琁之淵許叔重云至深也賈誼弔屈賦襲九淵之神龍顔師古曰九淵九旋之川言至深也與此不同東坡論莊子東坡先生作莊子祠堂記辨其不詆訾孔子嘗疑盜跖漁父則真若詆孔子者至於讓王説劒皆淺陋不入於道反復觀之得其寓言之終曰陽子居西遊於秦遇老子其往也舍者將迎其家公執席妻執巾櫛舍者避席煬者避竈其反也與之爭席矣去其讓王説劒漁父盜跖四篇以合於列禦寇之篇曰列禦寇之齊中道而反曰吾驚焉吾食於十漿而五漿先餽然後悟而笑曰是固一章也莊子之言未終而昧者勦之以入其言爾東坡之識見至矣盡矣故其祭徐君猷文云爭席滿前無復十漿而五餽用為一事今之莊周書寓言第二十七繼之以讓王盜跖説劒漁父乃至列禦寇為第三十二篇讀之者可以渙然冰釋也豫案列子書第二篇內首載禦寇餽漿事數百言即綴以楊朱爭席一節正與東坡之旨異丗同符而坡公記不及此豈非作文時偶忘之乎陸德明釋文郭子玄云一曲之才妄竄竒説若閼奕意修之首危言遊鳬子胥之篇凡諸巧雜十分有三漢藝文志莊子五十二篇即司馬彪孟氏所注是也言多詭誕或似山海經或類占夢書故注者以意去取其內篇衆家並同豫參以此説坡公所謂昧者其然乎閼奕遊鳬諸篇今無復存矣列子書事列子書事簡徑宏妙多出莊子之右其言惠盎見宋康王王曰寡人之所説者勇有力也客將何以教寡人盎曰臣有道於此使人雖勇刺之不入雖有力擊之弗中王曰善此寡人之所欲聞也盎曰夫刺之不入擊之不中此猶辱也臣有道於此使人雖有勇弗敢刺雖有力弗敢擊夫弗敢非無其志也臣有道於此使人本無其志也夫無其志也未有愛利之心也臣有道於此使天下丈夫女子莫不歡然皆欲愛利之此其賢於勇有力也四纍之上也觀此一假語宛轉四反非數百言曲而暢之不能了而潔淨粹白如此後人筆力渠復可到耶三不欺之義正與此合不入不中者不能欺也弗敢刺擊者不敢欺也無其志者不忍欺也魏文帝論三者優劣斯言足以蔽之天生對偶舊説以紅生白熟腳色手紋寬焦薄脆之屬為天生偶對觸類而索之得相傳名句數端亦有經前人紀載者聊疏于此以廣多聞如三川太守四目老翁相公公相子人主主人公泥肥禾尚瘦晷短夜差長斷送一生惟有破除萬事無過北斗七星三四點南方萬壽十千年迅雷風烈風雷雨絶地天通天地人筵上枇杷本是無聲之樂草間蚱蜢還同不繫之舟皆絶工者又有用書語兩句而證以俗諺者如堯之子不肖舜之子亦不肖諺曰外甥多似舅吾力足以舉百鈞而不足以舉一羽諺曰便重不便輕之類是也銅爵灌硯相州古鄴都魏太祖銅雀臺在其處今遺址髣佛尚存瓦絶大艾城王文叔得其一以為硯餉黃魯直東坡所為作銘者也其後復歸王氏硯之長幾三尺闊半之先公自燕還亦得二硯大者長尺半寸闊八寸中為瓢形背有隱起六隸字甚清徑曰建安十五年造魏祖以建安九年領冀州牧治鄴始作此臺云小者規範全不逮而其腹亦有六篆字曰大魏興和年造中皆作小簇花團興和乃東魏孝靜帝紀年是時正都鄴與建安相距三百年其至于今亦六百餘年矣二者皆藏姪孫僴處豫為銘建安者曰鄴瓦所范嘻其是邪幾九百年來隨漢槎淬爾筆鋒肆其滂葩僴實寶此以昌我家銘興和者曰魏元之東狗腳于鄴吁其瓦存亦禪千劫上林得鴈獲貯歸笈玩而銘之衰淚棲睫贑州雩都縣故有灌嬰廟今不復存相傳左地嘗為池耕人往往於其中耕出古瓦可􅑆為硯豫向來守郡日所得者刓缺兩角猶重十斤瀋墨如發硎其光沛然色正黃考德儀年又非銅雀比亦嘗刻銘于上曰范土作瓦既埴既巳何斷制於火而卒以囿水廟于漢侯今千幾年何址蹶祀歇而此獨也存縣贑之雩曰若灌池研為我得而銘以章之蓋紀實也崔斯立崔立之字斯立在唐不登顯仕它亦無傳而韓文公推獎之備至其藍田丞壁記云種學績文以蓄其有泓涵演迤日大以肆其贈崔評事詩云崔侯文章苦捷敏髙浪駕天輸不盡頃從關外來上都隨身卷軸車連軫朝為百賦猶鬱怒暮作千詩轉遒緊才豪氣猛易語言往往蛟螭雜螻蚓其寄崔二十六詩云西城貟外丞心迹兩崛竒往歲戰詞賦不將勢力隨傲兀坐試席深叢見孤羆文如翻水成初不用意為四坐各低面不敢捩眼窺佳句喧衆口考官敢瑕疵連年收科第若摘頷底髭其美之如是但記云正元初挾其能戰藝於京師再進再屈于人而詩以為連年收科第何其自為異也豫按杭本韓文作再屈千人蜀本作再進屈千人文苑亦然蓋它本誤以千字為于也又登科記立之以正元三年第進士七年中宏詞科正與詩合觀韓公所言崔作詩之多可知矣而無一篇傳于今豈非螻蚓之雜惟敏速而不能工邪漢書注冗顔師古注漢書評較諸家之是非最為精盡然有失之贅冗及不煩音釋者其始遇字之假借從而釋之既云他皆類此則自是以降固不煩申言然於循行字下必云行音下更反於給復字下必云復音方目反至如説讀曰恱繇讀曰徭鄉讀曰嚮解讀曰懈與讀曰豫又讀曰歟雍讀曰壅道讀曰導畜讀曰蓄視讀曰示艾讀曰乂竟讀曰境飭與勑同繇與由同驅與驅同暗與暗同婁古屢字墬古地字餉古餉字奔古奔字之類各以百數解三代曰夏商周中都官曰京師諸官府失職者失其常業其重復亦然貸曰假也休曰美也烈曰業也稱曰副也靡曰無也滋曰益也蕃曰多也圖曰謀也耗曰減也卒曰終也悉曰盡也給曰足也􅎊曰漸也則曰法也風曰化也永曰長也省曰視也仍曰頻也疾曰速也比曰頻也諸字義不深祕既為之辭而又數出至同在一板內再見者此類繁多不可勝載其豁仇恢坐邾陜治脫攘藝垣綰顓擅酣侔重禺俞選等字亦用切腳皆為可省志所注尤為煩蕪項羽一傳伯讀曰霸至於四言之若相國何相國參太尉勃太尉亞夫丞相平丞相吉亦注為蕭何曹參威文顔閔必注為齊威晉文顔淵閔子騫之類讀是書者要非童蒙小兒夫豈不曉何煩於屢注哉顔自著敘例云至如常用可知不涉疑昧者衆所共曉無煩翰墨殆是與今書相矛盾也古迹不可考郡縣山川之古迹朝代變更陵谷推遷蓋巳不可復識如堯山歷山所在多有之皆指為堯舜時事編之圖經會稽禹墓尚云居髙丘之顚至於禹穴則強名一罅不能容指不知司馬子長若之何可探也舜都蒲坂實今之河中所謂舜城者宜歷丗奉之唯謹案張藝叟河中五廢記云蒲之西門所由而出者兩門之間即舜城也廟居其中唐張洪靖守蒲嘗修飾之至熙寧之初垣墉尚固曽不五年而為埏陶者盡矣舜城自是遂廢又河之中泠一洲島名曰中灘所以限橋不知其所起或云汾陽王所為以鐵為基上有河伯祠水環四周喬木蔚然嘉祐八年秋大水馮襄了無遺迹中灘自此遂廢顯顯者若此它可知矣東坡在鳯翔作凌虛臺記云嘗試登臺而望其東則秦穆之祈年橐泉其南則漢武之長楊五柞其北則隋之仁壽唐之九成也計其一時之盛宏傑詭麗堅固而不可動然數丗之後欲求其髣佛而破瓦頽垣無復存者謂物之廢興成毀皆不可得而知則區區泥於陳迹而必欲求其是蓋無此理也漢書地理志扶風雍縣有橐泉宫秦孝公起祈年宫惠公起不以為穆公容齋續筆卷第十二
