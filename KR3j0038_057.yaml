body:
  text: 容齊五筆卷第三十五則人生五計朱新仲舍人常云人生天地閒壽夭不齊姑以七十為率十歲為童兒父母膝下視寒暖燥濕之節調乳哺衣食之宜以須成立其名曰生計二十為丈夫骨強志健問津名利之場秣馬厲兵以取我勝如驥子伏櫪意在千里其名曰身計三十至四十日夜注思擇利而行位欲高財欲厚門欲大子息欲盛其名曰家計五十之年心怠力疲俯仰世閒智術用盡西山之曰漸逼過隙之駒不留當隨緣任運息念休心善刀而藏如𧖟作繭其名曰老計六十以往甲子一周夕陽銜山倐爾就木內觀一心要使絲毫無慊其名曰死計朱公每以語人以身計則喜以家計則大喜以老計則不答以死計則大笑且曰子之計拙也朱既不勝笑者之衆則亦自疑其計之拙曰豈皆惡老而韓死邪因為南華長老作大死庵記遂識其語豫之年齡踰七望八當以書諸紳云瀛莫間二禽瀛莫二州之境塘濼之上有禽二種其一類鵠色正蒼而喙長凝立水際不動魚過其下則取之終曰無魚亦不易地名曰信天緣其一類鶩奔走水上不閒腐草泥沙唼唼然必盡索乃巳無一息少休名曰漫畫信天緣若無能者乃與漫畫均度一日無飢色而反加壯大二禽皆禀性所賦其不同如此士大夫避父祖諱國朝士大夫除官避父祖名諱蓋有不同不諱嫌名二名不偏諱在禮固然亦有出於一時恩旨免避或旋為改更者建隆創業之初侍衛帥慕容彥釗樞密使吳廷祚皆拜使相而彥釗父名章廷祚父名璋制麻中為改同中書門下平章事為同二品紹興中沈守約湯進之二丞相父皆名舉於是改提舉書局為提領自餘未有不避者吕希純除著作郎以父名公著而辭然富韓公之父單名言而公以右正言知制誥韓保樞之子忠憲公億孫絳縝皆歷位樞密未嘗避豈别有說乎元正父子忠死唐安祿山表權臯入幕府臯度祿山且叛以其猜虐不可諌欲行慮禍及親因獻俘京師在道詐死既唅斂而逸去臯母謂實死慟哭感行路故祿山不之虞歸其母臯潜奉侍晝夜南奔既渡江而祿山反天下聞其名爭取以為屬甄濟居青巖山諸府五辟詔十至堅卧不起安祿山入朝求濟於玄宗授范陽掌書記濟不得巳而起察祿山有反謀不可諌因謁歸陽歐血不支舁歸舊廬䘵山反使封刀召之曰即不起斷其首濟引頸待之使以實病告慶緒復使輿輿至東都㑹廣平王平東都詣軍門上謁肅宗使汙賊官羅拜以愧其心唐書列二人於卓行傳褒之至矣有元正者在河南幕府史思明陷河洛輦父匿山中賊以名召之正度事急謂弟曰賦祿不可養親彼利吾名難免矣然不汙身而死吾猶生也賊既得誘以高位瞋目固拒兄弟皆遇害父聞仰藥死事平詔録伏節十一姓而正為冠臯濟之終與正皆贈祕書少監豫謂臯濟得生而正一門皆并命故當時以為伏節之冠而唐史不列之忠義卓行中但附見於其祖萬頃文藝之末資治通鑑亦不載其事使正之名寂寥不章顯為可恨也白樂天作張諴碑云以左武衛參軍分司東都屬安祿山陷覆洛京以僞􅕄淫刑脅劫士庶公與同官盧巽濳遁于陸渾山食木實飲泉水者二年訖不為逆命所汙肅宗詔河南搜訪不仕賊庭隱藏山谷者得六人以應詔公與巽在焉繇是名節聞于朝優詔褒美特授密縣主簿蕭頴士風節蕭頴士為唐名人後之學者但稱其才華而巳至以笞楚童奴為之過豫反復考之蓋有風節識量之士也為集賢校理宰相李林甫欲見之頴士不詣林甫怒其不下已後召詣史館又不屈愈見疾至免官更調河南參軍安祿山寵恣頴士隂語桞并曰胡人負寵而驕亂不久矣東京其先陷乎即託疾去祿山反往見河南採訪使郭納言禦守計納不用歎曰肉食者以兒戲禦劇賊難矣哉聞封常清陳兵東京往觀之不宿而還身走山南節度使源洧欲退保江陵頴士說曰襄陽乃天下喉襟一日不守則大事去矣公何遽輕土地取天下笑乎洧乃按甲不出洧卒往客金陵永王璘召之不見劉展反圍雍丘副大使李承式遣兵往救大宴賔客陳女樂頴士曰天子暴露豈臣下盡歡時邪夫投兵不測乃使觀聽華麗誰致其死哉弗納頴士之言論操持如此今所稱之者淺矣李太白天下士也特以墮永王亂中為終身纍頴士永王召而不見則過之焉石尤風石尤風不知其義意其為打頭逆風也唐人詩好用之陳子昻入峽苦風云故鄉今日友歡㑹坐應同寧知巴峽路辛苦石尤風戴叔倫送裴明州云瀟水連湘水千波萬浪中知君未得去慙愧石尤風司空文明留盧秦卿云知有前期在難分此夜中無將故人酒不及石尤風計南朝篇詠必多用之未暇憶也江楓雨菊作詩要有來處則為淵源宗派然字字執泥又為拘澀豫於此學無自得之見少年時尢失之雕琢記一聮𥘉云雨深荒病菊江冷落愁楓後以其太險改為雨深人病菊江冷客愁楓比前句微有藴藉蓋取崔信明楓落吳江冷杜老雨荒深院菊南菊再逢人卧病嚴武江頭赤葉楓愁客合而用之乃如補衲衣裳殊為可笑聊書之以示兒輩云開元宫嬪自漢以來帝王妃妾之多唯漢靈帝吳歸命侯晉武帝宋蒼梧王齊東昏陳後主晉武至於萬人唐世明皇為盛白樂天長恨歌云後宫佳麗三千人杜子美劒器行云先帝侍女八千人蓋言其多也新唐史所叙謂開元天寶中宫嬪大率至四萬嘻其甚矣隋大業離宫遍天下所在皆置宫女故裴寂為晉陽宫蓋以私侍高祖及高祖義師經過處悉罷之其多可想相里造唐內侍監魚朝恩怙貴誕肆凡詔㑹羣臣計事折愧坐人出其上雖宰相元載辨彊亦拱默唯禮部郎中相里告殿中侍御史李衎酬詰往返未始降屈朝恩不懌黜衎以動造又謀將易執政以震朝廷乃㑹百官都堂且言今水旱不時屯軍饋運困竭天子卧不安席宰相何以輔之不退避賢路尚何須乎宰相俯首坐皆失色造徙坐從之因曰隂陽不和五榖踊貴皆軍容事宰相何與哉且軍拿不散故天降之沴今京師無事六軍可相維鎮又屯十萬饋糧所以不足百司無稍食軍容為之宰相行文書而已何所歸罪朝恩拂衣去曰南衙朋黨且害我此假載於唐史宦者傳中不能記相里造之本末豫謂造當閹侍威權震主生殺在手之時以區區一郎吏而抗身與為敵後來名人議論及叙列忠言鯁詞未見有稱述之者通鑑亦不書聊紀於此以章濳德同時劉給事爭幸河中亦然先公詩詞先忠宣公好讀書北困松漠十五年南謫嶺表九年重之以風淫末疾而翻閲書䇿早暮不置尤熟於杜詩𥘉歸國到闕命作謝賜物一劄子竄定兩句云巳為死别偶遂生還謂曰此雖不必泥出處然有所本更佳東坡海外表云子孫慟哭於江邊巳為死别杜老羌村詩云世亂遭飄蕩生還偶然遂正用其語在鄉邦日招兩使者㑹集出所將宣和殿書畫舊物示之提刑洪慶善作詩曰願公十襲勿浪出六丁取將飛辟歷辟歷二字如古文不從雨公和之曰萬里懷歸為公出往事宣和空歷歷請其意曰亦出杜詩歷歷開元事分明在目前也詔興丁巳所在始歌江梅引詞不知為誰人所作己未庚申年北庭亦傳之至于壬戌公在燕赴張揔侍御家宴侍妾歌之感其念此情家萬里之句愴然曰此詞殆為我作既歸不寐遂用韻賦四闋時在囚拘中無書可檢但有𥘉學記韓杜蘇白樂天集所引用句語一一有來處北方不識梅花士人罕有知梅事者故皆注所出其一憶江梅云天涯除館憶江梅幾枝開使南來還帶餘杭春信到燕臺准擬寒英聊慰遠隔山水應銷落赴訴誰空恁遐想笑摘蘂斷回腸思故里漫彈緣綺引三弄不覺魂飛更聽胡笳哀怨淚沾衣亂插繁華須異日待孤諷怕東風一夜吹元注引杜公忽憶兩京梅發時胡笳在樓上哀怨不堪聽安得健步移逺梅亂插繁華向晴漢樂天憶杭州梅花三年間悶在餘杭曽為梅花醉幾埸車駕時在臨安栁子厚欲為萬里贈杳杳山水隔寒英坐銷落何用慰遠客江揔桃李佳人欲相照摘蘂牽花來並笑高適遙憐故人思故鄉梅花滿技空斷腸盧同含愁更奏緑綺琴相思一夜梅花發劉方平晚歲芳梅樹繁花四靣同東風吹漸落一夜幾枝空東坡忽見早梅花不飲但孤諷一夜東風吹石裂半隨飛雪度關山其二訪寒梅云春還消息訪寒梅賞𥘉開夢吟來映雪銜霜清絶繞風臺可怕長洲桃李妬度香遠驚愁眼欲媚誰曽動詩興笑冷蘂效少陵慙下里萬株連綺歎金谷人墜鶯飛引領羅浮翠羽幻青衣月下花神言極麗且同醉休先愁玉笛吹注引李太白聞道春還未相識走傍寒梅訪消息緑珠樓下梅花滿今日曽無一枝在江揔金谷萬株連綺甍梅花隱處藏嬌鶯何遜銜霜當路發映雪擬寒開枝橫却月觀花繞凌風臺杜公東閣官梅動詩興還如何遜在楊州未將梅蘂驚愁眼要取楸花媚逺天巡簷索共梅花笑冷蘂踈枝半不禁樂天賞自𥘉開直至落莫怕長洲桃李妬明年好為使君開王昌齡夢中作梅花詩梁簡文賦香隨風而遠度及趙師雄羅浮見美人在梅花下有翠羽啾嘈相顧詩云學粧欲待問花神崔櫓𥘉開巳入雕梁畫未落先愁玉笛吹其三憐落梅云重閨佳麗最憐梅牖春開學粧來爭粉翻光何遽落梳臺笑坐雕鞍歌古曲催玉柱金巵滿勸阿誰貪為結子藏暗蘂斂娥眉隔千里舊時羅綺巳零散沈謝雙飛不見嬌姿真悔著單衣若作和羹休訝晚墮煙雨任春風片片吹注引梁簡文賦重閨佳麗貌婉心嫺憐早花之驚節訝春光之遣寒顧影丹墀弄此嬌姿洞開春牑四卷羅帷春風吹梅畏落盡賤妾為比斂娥眉又爭樓上之落粉奪機中之織素梁王詩翻光同雪舞鮑泉縈窗落梳臺江揔滿酌金巵催玉柱落梅樹下宜歌舞太白千金駿馬邀少妾笑坐雕鞍歌落梅古曲有落梅花又片片吹落春風香謝莊賦隔千里兮共明月庾信早知覔不見真悔著衣單東坡抱叢暗蘂初含子玉妃謫墮煙雨村王建自是桃花貪結子第四篇失其槖每首有一笑字北人謂之四笑江梅引爭傳寫焉州縣名同晉宋以來置立州郡惟以多為貴先是中原陷胡羯本土遺民或僑寓南方故即其所聚為立郡而方伯所治之州亦仍舊名如南徐南兖南豫南雍州南蘭陵南東海南琅邪南東莞南魯郡其類不一魏周在北亦如此隋唐不復然國朝之制州名或同則增一字以别之若河北有雄州恩州故廣東者增南字蜀有劒州故福建者亦增南字以至西和西安州亦然其聲音頗同患於舛誤則俗閒稱呼自加上下東西為别故稱嶽為上嶽鄂為下鄂清州與青類稱為北清郢州與潁類稱為西郢融州與容類稱為西融者是也若縣邑則不問今河南靜江府鞏州皆有永寧縣饒卭衡州皆有安仁縣蔡英之真陽廬汝之梁光台之仙居臨安建昌之新城越筠之新昌婺蜀之永康處吉之龍泉嚴池之建德渭秀之華亭信吉之永豐郴興國之永興衢嘉之龍游施臨江之清江洪萬之武寧福循之長樂郴連之桂陽福桂之永福是也三衙軍制乾道四年正月為中書舍人因入對論三衙軍制名稱不正以祖宗之制論之軍職之大者凡八等除都指揮使或不常置外曰殿前副都指揮使馬軍副都指揮使步軍副都指揮使曰殿前都虞候馬軍都虞候步軍都虞候曰捧日天武四廂都指揮使龍神衛四廂都指揮使秩秩有序若登梯然不可一級輒廢一或有闕即以功次遞遷降此而下則分營分廂各置都副指揮使如捧日左廂第一軍天武右廂第二軍之類邊境有事命將討捕則旋立總管鈐轄都監之名使各將其所部以出事巳則復初纍聖相承皆用此術以制軍詰禁自南渡以後觸事草創於是三帥之資淺者始有主管某司公事之稱而都虞候以下不復設置乃以宿衛虎士而與在外諸軍同其名以統制統領為之長又使遙帶外路總管訡轄考之舊制則非法稽之事體則非是以陛下聖明能知人善任使所謂爪牙之士豈無十數人以待用者若法祖宗之制正三衙之名改諸軍為諸廂改統制以下為都虞候指揮使使宿衛之職預有差等士卒之心明有所係異時拜將必無一軍皆驚之舉於以銷壓未萌循名責實則環衛將軍雖不置可也乞下樞密院討論故實圖議其當恐或可以少􅐌布昭聖武之意讀劄子畢孝宗甚喜即批付樞密院是時知院虞允文使四川同知劉琪不樂曰舍人要如何行對之以但隨所見敷陳若施行與否自係廟堂處分竟寢不行後閲華陽集王圭撰高瓊神道碑云王為殿前都指揮使管軍貟闕兼領二司王乃言曰臣老矣如有負薪之憂誰為可任者先朝自殿前而下各置副都指揮使及都虞候常有十人職近事親易以第進又使士卒預識其威名緩急臨戎上下得以附習此軍制之大要也有旨從之據瓊所言如此正合前說歐陽公勳封贈典吉州新刋歐陽公文集於年譜下盡載官爵制詞無一遺落考之今制多有不合雖非事之所以損益謾書於䇿且記典章隨時之異云公自太子中允𥘉加勳便得騎都尉越過驍武飛雲四級自龍圖閣直學士𥘉封爵便得信都縣子越過男一等翰林學士加恩而得五百戶𥘉加實封便得二百戶及罷政為觀文學士遇郊而加食邑五百戶實封二百戶薨之後以子登朝遇大禮自太子太師合贈司空而躐贈太尉蓋超空徒保傅四官再贈即為太師仍封國公今殊不然除勳官既罷外侍從初封亦從縣男為始每加不過三百戶初得實封財百戶藝政去位但與侍從同均為虛邑三百而已身後加贈只單轉一官兩子升朝乃進二官雖三四人亦不增未有宫師直贈太尉者又公任知制誥知潁州轉官而與直龍圖閣知亳州王洙同一詞唐書成進秩五人同制公與宋景文公范文忠公王忠簡公皆帶從官職而宋次道乃集賢校理耳嘉祐四真嘉祐中冨韓公為宰相歐陽公在韓林包孝肅公為御史中丞胡翼之侍講在太學皆極天下之望一時士大夫相語曰富公真宰相歐陽永叔真翰林學士包老真中丞胡公真先生遂有四真之目歐陽公之子發棐等叙公事迹載此語可謂公言五方老人祝聖壽聖節所用祝頌樂語外方州縣各當筵致語一篇又有王母隊者若教坊唯祝聖而巳歐陽公集乃載五方老人祝壽文五首其東方曰但某太山老叟東海真仙溜穿石而曽究始終松避雨而備知歲月羲氏定三百六日嘗守寅賔之官夷吾紀七十二君盡覩登封之事遇安期而遺棗笑方朔之偷桃風入律而來自巖前斗指春而光臨洞口昔漢武帝嘗懷三島之勝遊有羡門生欲謁巨公於昭代今則紫庭降聖華渚開祥遠離朝日之方來展望雲之懇千八百國咸歸至治之風億萬斯年共禱無疆之壽其頌只四句西中南北方皆然集中不云何處所作今無復用之容齊五筆卷第三終
