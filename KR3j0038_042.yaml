body:
  text: 容齋三筆卷第六十五則蕨萁養人自古凶年飢歲民無以食往往隨所值以為命如范蠡謂吳人就蒲螺於東海之濵蘇子卿掘野鼠所去􅋄實及齧雪與旃毛并咽之王莾教民煮木為酪南方人飢餓羣入野澤掘鳬茈鄧禹軍士食藻菜建安中咸陽人拔取酸棗藜藿以給食晉郗鑒在鄒山兖州百姓掘野鼠蟄燕幽州人以桑椹為糧魏道武亦以供軍岷蜀食芋如此而巳吾州外邑􅰔崌山在樂平德興境李羅萬斛山在浮梁樂平鄱陽境皆綿亘百餘里山出蕨萁乾道辛卯紹熙癸丑歲旦村民無食爭往取其根率以昧旦荷鉏往掘深至四五尺壯者日可得六十斤持歸搗取粉水澄細者煮食之如粔籹狀每根二斤可充一夫一日之食冬晴且暖田野間無不出者或不逺數十里多至數千人自九月至二月終蕨抽拳則根無力於是始止蓋救餓羸者半年天之生物為人世之利至矣古人不知用之傳記亦不載豈他邦不産此乎賢士隱居者士子修已篤學獨善其身不求知於人人亦莫能知者所至或有之豫每惜其無傳比得上虞李孟傳録示四事故謹書之其一曰慈溪蔣季莊當宣和間鄙王氏之學不事科舉閉門窮經不妄與人接高抑崇居明州城中率一歲四五訪其廬季莊聞其至必倒屣出迎相對小室極意講論自晝竟夜殆忘寢食告去則送之數里相得歡甚或問抑崇曰蔣君不多與人周旋而獨厚於公公亦惓惓於彼願聞其故抑崇曰閌終歲讀書凡有疑而未判與所缺而未知者每積至數十輒一扣之無不迎刃而解而蔣之所長他人未必能知之世之所謂知已其是乎其二曰王茂剛居明之林村在巖壑深處有弟不甚學問使顓治生以糊口而刻意讀書足迹未嘗妄出尤邃於周易沈煥通判州事嘗訪之其見趣絶出於傳注之外云氣象嚴重窺其所得蓋進而未巳也其三曰顧主簿不知何許人南渡後寓于慈溪廉介有常安於貧賤不蘄人之知至於踐履間雖細事不苟也平旦起俟賣菜者過門問菜把直幾何隨所言酬之它飲食布帛亦然久之人皆信服不忍欺茍一曰之用足則玩心墳典不事交遊里中有不安其分武斷強忮者相與譏之曰汝豈顧主簿耶其四曰周日章信州永豐人操行介潔為邑人所敬開門授徒僅有以自給非其義一毫不取家至貧常終日絶食鄰里或以薄少致餽時時不繼寧與妻子忍餓卒不以求人隆寒披紙裘客有就訪亦欣然延納望其容貌聽其論議莫不聳然縣尉謝生遺以襲衣曰先生未嘗有求吾自欲致其勤勤耳受之無傷也日章笑答曰一衣與萬鍾等耳儻無名受之是不辨禮義也卒辭之汪聖錫亦知其賢以為近於古之所謂獨行者是四君子真可書史䇿云張籍陳無已詩張籍在他鎮幕府鄆帥李師古又以書幣辟之籍却而不納而作節婦吟一章寄之曰君知妾有夫贈妾雙明珠感君纏綿意繫在紅羅𥜗妾家高樓連苑起良人執戟明光裏知君用心如日月事夫誓擬同生死還君明珠雙淚垂何不相逢未嫁時陳無巳為潁州教授東坡領郡而陳賦妾薄命篇言為曽南豐作其首章云主家十二樓一身當三千古來妾薄命事主不盡年起舞為主壽相送南陽阡忍著主衣裳為人作春妍有聲當徹天有淚當徹泉死者恐無知妾身長自憐全用籍意或謂無巳輕坡公是不然前此無巳官於彭城坡公由翰林出守杭無巳越境見之於宋都坐是免歸故其詩云一代不數人百年能幾見昔為馬首銜今為禁門鍵一雨五月涼中宵大江滿風帆目力短江空歲年晚其尊敬之盡矣薄命擬况蓋不忍師死而遂倍之忠厚之至也杜詩誤字李適之在明皇朝為左相為李林甫所擠去位作詩曰避賢初罷相樂聖且銜杯為問門前客今朝幾箇來故杜子美飲中八仙歌云在相日興費萬錢飲如長鯨吸百川銜杯樂聖稱避賢正詠適之也而今所行本誤以避賢為世賢絶無意義兼世字是太宗諱豈敢用哉秦州雨晴詩云天永秋雲薄從西萬里風謂秋天遼永風從萬里而來可謂廣大而集中作天水此乃秦州郡名若用之入此篇其致思淺矣和李表丈早春作云力疾坐清曉來詩悲早春正答其意而集中作來時殊失所謂和篇本旨東坡詩用老字東坡賦詩用人姓名多以老字足成句如壽州龍潭云觀魚并記老莊周病不赴會云空對親春老孟光看潮云猶似浮江老阿童贈黃山人云説禪長笑老浮屠元長老納裙云乞與佯狂老萬回東軒云挂冠知有老蕭郎侍立邇英云定似香山老居士贈李道士云知是香山老居士蒜山亭云竒逸多聞老敬通汶公東堂云一帖空存老遂良次韻韶守云華髮蕭蕭老遂良遊羅浮云還須略報老同叔贈辨才云中有老法師寄子由云青山老從事贈眼醫云忘言老尊宿妙高臺中老比丘謝惠酒云青州老從事射餉魚云誰似老方朔贈吳子野扇云得之老月師次韻李端叔云此是老牛戩是皆以為助語非真謂其老也大抵七言則於第五字用之五言則於第三字用之若其它錯出如再説走老瞞故人餘老龐老濞宫粧傳父祖便腹從人笑老韶老可能為竹寫真不知老奘幾時歸之類皆隨語勢而然白樂天云每被老元偷格律蓋亦有自來矣杜詩命意杜公詩命意用事旨趣深逺若隨口一讀往往不能曉解姑紀一二篇以示好事者如能畫毛延壽投壷郭舍人每蒙天一笑復似物皆春政化平如水皇恩斷若神時時用抵戲亦未雜風塵第三聮意味頗與前語不相聮貫讀者或以為疑按杜之旨本謂技藝倡優不應蒙人主顧眄賞接然使政化如水皇恩若神為治大要既無所損則時時用此輩亦亡害也又如亂後碧井廢時清瑶殿深銅瓶未失水百丈有哀音側想美人意應悲寒甃沈蛟龍半缺落猶得折黃金此篇蓋見故宫井內汲者得銅瓶而作然首句便説廢井則下文翻覆鋪敘為難而曲折宛轉如是它人畢一生模不能到也又一篇云鬪雞初賜錦舞馬既登床簾下宫人出樓前御桞長仙遊終一閟女樂久無香寂寞驪山道清秋草木黃先忠宣公在北方得唐人畫驪山宫殿圖一軸華清宫居山顚殿外垂簾宫人無數穴簾隙而窺一時伶官戲劇品類雜沓皆列于下杜一詩真所謂親見之也擇福莫若重國語載范文子曰擇福莫若重擇禍莫若輕且士君子樂天知命全身逺害避禍就福安有逮于禍至擇而處之之理哉韋昭注云有兩福擇取其重有兩禍擇取其輕蓋以不幸而與禍會勢不容但已則權其輕重順受其一焉莊子養生主篇云為善無近名為惡無近刑夫孳孳為善君子之所固然何至於縱意為惡而特以不麗於刑為得計哉是又有説矣其所謂惡者蓋與善相對之辭雖於德為愆義非若小人以身試禍自速百殃之比也故下文云可以全生可以保身可以盡年其旨昭矣用人丈字之失士人為文或采巳用語言當深究其旨意苟失之不考則必詒論議詔興七年趙忠簡公重修哲録書成轉特進制詞云惟宣仁之誣謗未明致哲廟之憂勤不顯此蓋用范忠宣遺表中語兩句但易兩字而甚不然范之辭云致保佑之憂勤不顯專指母后以言正得其實今以保佑為哲廟則了非本意矣紹興十九年豫為福州教授為府作謝曆日表頌德一聮云神祗祖考既安樂於太平歲月日時又明章於庶證至乾道中有外郡亦上表謝曆蒙其采取用之讀者以為駢儷精切豫笑謂之曰此大有利害今光堯在德壽所謂考者何哉坐客皆縮頸信乎不可不審也李衛公輞川圗跋輞川圗一軸李趙公題其末云藍田縣鹿苑寺主僧子良贄於豫且曰鹿苑即王右丞輞川之第也右丞篤志奉佛妻死不再娶潔居逾三十載母夫人卒表宅為寺今冡墓在寺之西南隅其圗實右丞之親筆豫閲玩珍重永為家藏弘憲題其前一行云元和四年八月十三日弘憲題弘憲者吉甫字也其後衛公又跋云乘間閲篋書中得先公相國所收王右丞畫輞川圗實家世之寶也先公凡更三十六鎮故所藏書畫多用方鎮印記大和二年戊申正月四日浙江西道觀察等使檢校禮部尚書兼潤州刺史李德裕恭題又一行云開成二年秋七月望日文饒記前後五印曰淮南節度使印浙江西道觀察處置等使之印劒南西川節度使印山南西道節度使印鄭滑節度使印并贊皇二字又內合同印建業文房之印集賢院藏書印此三者南唐李氏所用故後一行曰升元二年十一月三日雖今所傳云臨本然正自超妙但衛公所志殊為可疑唐書李吉甫傳云德宗以來姑息藩鎮有終身不易地者吉甫為相歲餘凡易三十六鎮吉甫平生只為淮南節度耳今乃言身更三十六鎮誠大不然所用印記如浙西西川山西鄭滑皆衛公所歷也且書其父手澤不言第幾子而有李字又自標其字皆非是蓋好事者妄為之白樂天詩所説青涼寺即輞川云洪慶善作丹陽洪氏家譜序云丹陽之洪本姓弘避唐諱改有弘憲者元和四年跋輞川圖亦大錯也白公夜聞歌者白樂天琵琶行蓋在尋陽江上為啇人婦所作而啇乃買茶於浮梁婦對客奏曲樂天移船夜登其舟與飲了無所忌豈非以其長安故倡女不以為嫌邪集中又有一篇題云夜聞歌者時自京城謫潯陽宿於鄂州又在琵琶之前其詞曰夜泊鸚鵡洲秋江月澄徹鄰船有歌者發調堪愁絶歌罷繼以泣泣聲通復咽尋聲見其人有婦顔如雪獨倚帆檣立娉婷十七八夜淚似真珠雙雙墮明月借問誰家婦歌泣何淒切一問一霑襟低眉終不説陳鴻長恨傳序云樂天深於詩多於情者也故所遇必寄之吟詠非有意於漁色然鄂州所見亦一女子獨處夫不在焉瓜田李下之疑唐人不議也今詩人罕談此章聊復表出謝朏志節荀彧佐魏武帝劉穆之佐宋高祖高德政佐齊文宣高熲佐隋文帝劉文靜佐唐高祖終之篡漢晉魏周及取隋其功不細矣彧以不言伏后事與勸止九錫飲鴆而死穆之居守丹陽宋祖北伐而九錫之旨從北來愧懼而卒德政以精神凌逼為楊愔所譖熲以為相畜妾為獨孤后所譛文靜以妾弟告變為裴寂所譖皆不免於誅蕭道成謀纂宋欲引謝朏參贊大業屏人與之語朏無言道成必欲引參佐命以為左長史從容間道石苞事諷之朏訖不順指及受宋禪方為侍中不肯解璽綬引枕而卧步出府門道成之子頥欲殺之道成畏得罪於公議曰殺之適成其名正當容之度外耳遂廢于家海陵王之世復為侍中宣城王鸞謀繼大統多引朝廷名士朏心不願乃求出為吳興太守其弟瀹為吏部尚書朏致酒與之曰可力飲此無預人事其心蓋惡鸞而末如之何也朏之志節行義凛凛如此司馬溫公猶以為譏斯亦可恕也巳續筆於士丐韓厥下略及之故復詳論于此琵琶亭詩江州琵琶亭下臨江津國朝以來往來者多題詠其工者輒為人所傳淳熙已亥歲蜀士郭明復以中元日至亭賦古風一章其前云白樂天流落湓浦作琵琶行其放懷適意視憂患死生禍福得喪為何物非深於道者能之乎賈傅謪長沙抑鬱致死陸相竄南賔屏絶人事至從狗竇中度食飲兩公猶有纍乎世未能如樂天逍遙自得也豫過九江維舟琵琶亭下為賦此章香山居士頭欲白秋風吹作湓城客眼看世事等虛空雲夢胸中無一物舉觴獨醉天為家詩成萬象遭梳􅐡不管時人皆欲殺夜深江上聽琵琶賈胡老婦兒女語淚濕青衫如著雨此公豈作少狂夢與世浮沉聊爾汝我來後公三百年潯陽至今無管絃長安不見遺音寂依舊康廬翠掃天郭君成都人隆興癸未登科仕不甚逹但賈誼自長沙召還後為梁王傅乃卒前所云少誤矣吾州餘干縣東干越亭有琵琶洲在下唐劉長卿張祐輩皆留題紹興中王洋元勃一絶句云塞外風煙能記否天涯淪落自心知眼中風物參差是只欠江州司馬詩真佳句也減損入宫人唐開元十七年國子祭酒楊瑒上言省司奏限天下明經進士及第每年不過百人竊見流外出身每歲二千餘人而明經進士不能居其什一則是服勤道業之士不如胥吏之得仕也若以出身人太多則應諸色裁損不應獨抑明經進士當時以其言為然淳熙九年大減任子貟數是時吏部四選開具以三年為率文班進士大約三四百人任子文武亦如之而恩幸流外蓋過二千之數甚與開元類也韓蘇文章譬喻韓蘇兩公為文章用譬喻處重復聮貫至有七八轉者韓公送石洪序云論人高下事後當成敗若河決下流東注若駟馬駕輕車就熟路而王良造父為之先後也若燭照數計而龜卜也盛山詩序云儒者之於患難其拒而不受於懷也若築河隄以障屋霤其容而消之也若水之於海氷之於夏日其玩而忘之以文辭也若奏金石以破蟋蟀之鳴蟲飛之聲蘇公百步洪詩云長洪斗落生跳波輕舟南下如投梭水師絶呌鳬鴈起亂石一線爭蹉磨有如兔走鷹隼落駿馬下注千丈坡斷絃離柱箭脫手飛電過隙珠翻荷之類是也唐昭宗贈諌臣官唐僖宗幸蜀政事悉出內侍田令孜之手左拾遺孟昭圖右補闕常濬上疏論事昭圗坐貶令孜遣人沉之於蟇頥津賜濬死資治通鑑記其事豫讀昭宗實録即位之初贈昭圗起居郎濬禮部貟外郎以其直諌被戮故褒之方時艱危救亡不暇而𥘉政及此通鑑失書之亦可惜也容齋三筆卷第六終
