body:
  text: 容齊三筆卷第四十五則三竪子趙為秦所圍使平原君求救於楚楚王未肯定從毛遂曰白起小竪子耳興師以與楚戰舉鄢郢燒夷陵辱王之先人此百世之􅶄也是時起巳數立大功且勝於長平矣人告韓信反漢祖以問諸將皆曰亟發兵坑竪子耳帝默然唯陳平以為兵不如楚精請將用兵不能及信英布反書聞上召諸將問計又曰發兵擊之坑竪子耳夫白起信布之為人材能不可掩以此三人為竪子是天下無復有壯士也毛遂之言秪欲激怒楚王使之知合從之利害故不得不以起為懦夫至如高帝諸將不過周勃樊噲之儔韓信因執而歸棲棲然處長安為列侯蓋一匹夫也而噲喜其過己趨拜送迎言稱臣况於據有全楚萬乘之地事力強弱安可同日而語英布固嘗言諸將獨患淮隂彭越今皆巳死餘不足畏則竪子之對可謂勇而無謀殆與張儀詆蘇秦為反覆之人相似高帝默然顧深知其非也至於陳平則不然矣若乃韓信謂魏將柏直為竪子則誠然柏直庸庸無所知名漢王亦稱其口尚乳臭真一竪子也阮籍登廣武歎曰時無英雄使竪子成名蓋歎是時無英雄如昔人者俗士不逹以為籍譏漢祖雖李太白亦有是言失之矣樞密稱呼樞密使之名起於唐本以宦者為之蓋內諸司之貴者耳五代始以士大夫居其職遂與宰相等自此接于本朝又有副使知院事同知院事簽書同簽書之别雖品秩有高下然均稱為樞密明道中王沂公自故相召為檢校太師樞密使李文定公為集賢相以書迎之於國門稱曰樞密太師相公豫家藏此帖紹興五年高宗車駕幸平江過秀州執政從行者四人在前者傳呼宰相趙忠簡也次呼樞密張魏公也時為知院事次呼參政沈必先也最後又呼樞密則簽書權朝美云豫為撿詳時葉審言黃繼道為長二亦同一稱而二三十年以來遂有知院同知之目𥘉出於典謁街卒之口久而朝士亦然名不雅古莫此為甚從官事體國朝優待侍從故事體名分多與庶僚不同然有處之合宜及肆意者如任知州申發諸司公狀不繫街與安撫監司序官往還用大狀不書年引接用朱衣通判入都㕔之類皆雜著於令式其明載國史者尚可考大中祥符五年六月詔尚書丞郎兩省給諌知州府而本部郎中貟外郎及兩省六品以下官充本路轉運使副者承前例須申報雖職當統攝方委於事權而官有等差宜明於品級自今知制誥觀察使以上知州府處所申轉運司狀並止簽案檢令通判以下具銜供申張詠以禮部尚書知升州上言臣官忝六曹祠部乃本行司局而例申公狀似未合宜望自今尚書丞郎知州者除申省外其本行曹局止簽案檢從之紹興中范同以前執政知太平州官係中大夫不帶職申諸司狀繫銜提刑張絢封還之范竟不改次年轉太中再任始去之劉焞為江西運判移牒屬郡知通云請聮銜具報時以太中守贑以於式不可乃作公劄同通判簽書劉邦翰曽任權侍郎以朝議大夫集英修撰知饒州趙燁以承議郎提點刑獄欲居其上劉不校趙又畏人議已於是遇朝拜國忌日先後行香王十朋自侍御史徙權吏部侍郎不拜除集撰知饒州自處如庶官林大中亦自侍御史改吏侍不曽供職除直寶文閣知贑州全街猶帶權知兼勸農事借紫而盡用從官禮數黃渙為通判入都㕔為之不平鄭汝諧除權侍郎為東省所繳不得供職而以祕撰知池州公狀至提刑司不繫銜為鄧馹牒問唐瑑以司農少卿王佐以中書檢正皆暫兼權戶侍及出知湖饒二州悉用朱衣雙引此數君皆失於討問典章非故為尊大也陳居仁以大中集撰知鄂州只用一朱衣蓋在法學士乃雙引人以為得體邁頃守贑建官職與居仁等而誤用兩朱殊以自悔又如監司見前執政雖本路並客位下馬伯氏以故相帶觀文學士帥越提舉宋藻穿㦸門訶殿云浙東監司如何不得穿紹興府門將至㕔事始若勉就客位者主人亟令掖以還九朝國史本朝國史凡三書太祖太宗真宗曰三朝仁宗英宗曰兩朝神宗哲宗徽宗欽宗曰四朝雖各自紀事至於諸志若天文地理五行之類不免煩復元豐中三朝巳就兩朝且成神宗專以付曽鞏使合之鞏奏言五朝舊史皆纍世公卿道德文學朝廷宗工所共凖裁既巳勒成大典豈宜輒議損益詔不許始謀纂定㑹以憂去不克成其後神哲各自為一史紹興初以其是非褒貶皆失實廢不用淳熙乙巳邁承乏修史丙午之冬成書進御遂請合九朝為一壽皇即以見屬嘗奏云臣所為區區有請者蓋以二百年間典章文物之盛分見三書倉卒討究不相貫屬及纍代臣僚名聲相繼當如前史以子係父之體類聚歸一若夫制作之事則巳經先正名臣之手是非褒貶皆有有据依不容妄加筆削乞以此奏下之史院俾後來史官知所以編纘之意無或輒將成書擅行刪改上曰如有未隱處改削無害既奉詔開院亦修成三十餘卷矣而有永思攢宫之役才歸即去國尤袤以高宗皇帝實録為辭請權罷史院於是遂巳祥符中王旦亦曽修撰兩朝史今不傳銀牌使者金國每遣使出外貴者佩金牌次佩銀牌俗呼為金牌銀牌郎君北人以為契丹時如此牌上若篆字六七或云阿骨打花押也殊不知此本中國之制五代以來庶事草創凡乘置奉使於外但給樞密院牒國朝太平興國三年因李飛雄矯乘廄馬詐稱使者欲作亂既捕誅之乃詔自今乘驛者皆給銀牌國史云始復舊制然則非起於虜也端拱二年復詔先是馳驛使臣給篆書銀牌自今宜罷之復給樞密院牒省錢百陌用錢為幣本皆足陌梁武帝時以鐵錢之故商賈浸以姦詐自破嶺以東八十為百名曰東錢江郢以上七十為百名曰西錢京師以九十為百名曰長錢大同元年詔通用足陌詔下而人不從錢陌益少至于末年遂以三十五為百唐之盛際純用足錢天祐中以兵亂窘乏始令以八十五為百後唐天成又减其五漢乾祐中王章為三司使復减三皇朝因漢制其輸官者亦用八十或八十五然諸州私用猶有隨俗至於四十八錢太平興國二年始詔民閒緡錢定以七十七為百自是以來天下承用公私出納皆然故名省錢但數十年來有所謂頭子錢每貫五十六除中都及軍兵俸料外自餘州縣官民所當得其出者每百才得七十一錢四分其入者每百為八十二錢四分元無所謂七十七矣民閒所用多寡又益不均云舊官銜冗贅國朝官制㳂晚唐五代餘習故階銜失之冗贅豫固巳數書之比得皇祐中李端願所書雪竇山三大字其左云鎮潼軍節度觀察留後金紫光祿大夫檢校刑部尚書使持節華州諸軍事華州刺史兼御史大夫上柱國凡四十一字自元豐以後更使名罷文散階檢校官持節憲銜勳官只云鎮潼軍承宣使六字比舊省去三十五可謂簡要㑹稽禹廟有唐天復年越王錢鏐所立碑其全銜九十五字尤為冗也吏胥侮洗文書郡縣胥史揩易簿案鄉司尤甚民巳輸租稅朱批於戶下矣有所求不遂復洗去之邑官不能察而又督理比其持赤鈔為證則追逮橫費為害巳深此特小小者耳臺省亦然豫除翰林日所被告命後擬云可特授依前正奉大夫充翰林學士蓋初書黃時全文故官告院據以為式其制當爾而告身全銜亦云告正奉大夫充翰林學士豫以語吏部蕭照鄰尚書曰如此則學士繫銜在官下於故事有戾今欲書謝表當如何蕭悚然旋遣部主事與告院書吏至乞借元告以去明日持來則巳改正移職居官上但減一充字於行內微覺踈其外印文濃淡了無異其妙至此宣告錯誤士大夫告命閒有錯誤如文官則猶能自言書鋪亦不敢大有邀索獨右列為可憐而軍伍中出身者尤甚豫檢詳密院諸房曰有涇原副都軍頭乞換授而所持宣內添注副字為房吏所沮都頭者不能自明兩樞密以事見付豫視所添字與正文一體以白兩樞曰使訴者為姦當妄增品級不應肯以都頭而自降為副其為寫宣房之失無可疑也樞以為然乃為改正武翼郎李青當磨勘尚左驗其文書其始為大李青吏為罔冒青無而詞以答周茂振權尚書閲其告命十餘通其一告前云大李青而告身誤去大字故後者相承只云李青即日放行遷秩且給公據付之兩人者幾困於吏手幸而獲直用是以知枉鬱不伸者多矣軍中抵名為官紹興以來兵革務煩軍中將校除官者大帥盡藏其告命只語以所居官其有事故亡沒者亦不關申省部除籍或徑以付它人至或從白身便為郎大夫者楊和王為殿帥罷一統領使歸部而申樞密院云此人元姓名曰許超只是校尉偶有修武郎李立告使之鼎名因得冒轉續以戰功積纍今為武顯大夫既已離軍自合依本姓名及元職位超詣院訴而不能為之詞豫檢詳兵房為言曰一時冒與自是主將之命修武以前固非此人當得若武翼之後皆用軍功使其戰死於陳則性命須要超承當今但當尅除不應得九官而理還其餘資庶合人情於理為順兩樞密甚然豫說即奏行之禍福有命秦氏顓國得志益厲刑辟以箝制士大夫一言語之過差一文詞之可議必起大獄竄之嶺海於是惡子之無俚者恃告訐以進趙超然以君子之澤五世而斬責汀州吳仲寶以夏二子傳流容州張淵道以張和公生日詩幾責桞而幸脫皆是也豫教授福州日因訪何大圭忽問君識天星乎答曰未之學曰豈不能認南方中夏所見列宿乎曰此却粗識一二大圭曰君今夕試仰觀熒惑何在是時正見於南斗之西後月餘再相見時連旬多隂所謂火曜巳至斗魁之東矣大圭曰使此星入南斗自有故事豫聞其語固巳竦然明日來相訪曰吾曹元不洞曉天文昨晚葉子廉見顧言及於比蹙頞云是名魏星無人能識非熒惑也豫曰十二國星只在牛女之下經星不動安得轉移圭曰乾象欲示變何所不可子廉云後漢建安二十五年亦曽出蓋秦正封魏國公圭意比之曹操豫大駭不復敢酬應它日與謝景思葉晦叔言之且曰使為小人告訐之舉有所不能萬一此假彰露為之奈何謝葉曰可以言命矣與是人相識便是不幸不如靜以待之時歲在已巳又六年秦亡豫知免禍乃始不恐真宗北征真宗親征契丹幸澶淵以成却敵之功是時景德元年甲辰决此計者寇萊公也然前五歲當咸平二年已亥契丹冦北邊上自將禦之至澶州大名府聞范廷召破虜於莫州北乃還京時張文定公李文靖公為相不知何人贊此決而後來不傳用是以知真宗非宴安鴆毒而有所畏者故冦公易以進言宰相不次𥙷景德元年七月宰相李沆薨時無它相中書有參知政事王旦王欽若不次補寇準為三司使真宗欲相之患其素剛難獨任乃先以翰林侍讀學士畢士安為參政才二月並命士安準為相而士安居上旦欽若各遷官而巳凖在太宗朝已兩為執政今士安乃由侍從超用惟辟作福圗任大臣蓋不應循循歷階而升也外制之難中書舍人所承受詞頭自唐至本朝皆只就省中起草付吏逮於告命之成皆未嘗越日故其職為難其以敏捷稱者如韋承慶下筆輒成未嘗起草陸扆初無思慮揮翰如飛顔蕘草制數十無妨談笑鄭畋動無滯思同僚閣筆劉敞臨出局倚馬一揮九制皆見書於史䇿其遲鈍窘擾者如陸餘慶至晚不能裁一言和㠓閉戶精思遍討群籍與夫斫窗舍人紫微失却張君房之類蓋以必欲速成故也周廣順初中書舍人劉濤責授少府少監分司西京坐遣男頊代草制詞也頊時為監察御史亦責復州司戶自南渡以來典故散失每除書之下先以省劄授之而續給告以是遷延稽滯假拂居官時才還家即掩關謝客畏其促詞命也先公使虜歸除徽猷閣直學士時劉才邵當制日於漏舍囑之至先公出知饒州幾將一月猶未受告其它倩諉朋舊俾之假手者多矣故膺此選者不覺其難殊與昔異文臣換武使祖宗之世文臣換授武使皆不越級錢若水自樞密副使罷守工部侍郎後除帥并州乃換鄧州觀察使王嗣宗以中丞侍郎李士衡以三司使李維以尚書王素以端明左丞亦皆觀察慶曆初以陜西四帥方禦夏羌欲優其俸賜故韓琦范仲淹王沿龐籍皆以樞密龍圖直學士換為廉車自南渡以來始大不然張澄以端明學士楊倓以敷文學士便為節度近者趙師夔吳琚以待制而換承宣使不數月閒遇恩即建節鉞師揆師垂以祕閣修撰換觀察使皆度越彛憲誠異恩也容齊三筆卷第四終
