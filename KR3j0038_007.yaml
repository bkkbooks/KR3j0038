  text: 容齋隨筆卷第七
  hash: sha256:1315fe9355880a733c92ff7d74c55f49e0a437400222e256c72eaa7682cd653d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_007-1a}
body:
  text: 孟子書百里奚柳子厚復杜温夫書云生用助字不當律令所謂乎歟耶哉夫也者疑辤也矣耳焉也者決辤也今生則一之冝考前聞人所使用與吾言類且異精思之則益也予讀孟子百里奚一章曰曽不知以食牛干秦繆公之爲汙也可謂智乎不可諌而不諌可謂不智乎知虞公之將亡而先去之不可謂不智也時舉於秦知繆公之可與有行也而相之可謂不智乎味其所用助字開闔變化使人之意飛動此難以爲温夫輩言也韓柳爲文之旨韓退之自言作爲文章上規姚姒盤誥春秋易詩左氏莊騷太史子雲相如閎其中而肆其外柳子厚自言每爲文章本之書詩禮春秋易參之榖梁氏以厲其氣參之孟荀以暢其支參之莊老以肆其端參之國語以博其趣參之離騷以致其幽參之太史公以著其㓗此韓柳爲文之旨要學者冝思之本習之論文李習之荅朱載言書論文最爲明白周盡云六經創意造言皆不相師故其讀春秋也如未甞有詩也其讀詩也如未甞有易也其讀易也如未甞有書也其讀屈原莊周也如未甞有六經也如山有岱華嵩衡焉其同者髙也其草木之榮不必均也如瀆有濟淮河江焉其同者出源到海也其曲直淺深不必均也天下之語文章有六說焉其尚異者曰文章詞句竒險而巳其好理者曰文章叙意苟通而巳溺於時者曰文章必當對病於時者曰文章不當對愛難者曰冝深不當易愛易者曰冝通不當難此皆情有所偏滯未識文章之所主也義不深不至於理而詞句怪麗者有之矣劇秦美新王襃僮約是也其理往往有是者而詞章不能工者有之矣王氏中說俗傳太公家教是也古之人能極於工而巳不知其辤之對與否易與難也憂心悄悄愠于群小非對也遘閔旣多受侮不少非不對也朕聖讒說殄行震驚朕師菀彼桑柔其下侯旬捋采其劉非易也光被四表格于上下十畒之間兮桑者閑閑兮非難也六經之後百家之言興老聃列莊至于劉向楊雄皆自成一家之文學者之所師歸也故義雖深理雖當詞不工者不成文冝不能傳也其論於文者如此後學冝志之魏鄭公諌語魏鄭公諌止唐太宗封禪中間數語引喻剴切曰今有人十年長患療治且愈此人應皮骨僅存便欲使負米一石日行百里必不可得隋氏之亂非止十年陛下爲之良醫疾苦雖巳乂安未甚充實告成天地臣切有疑太宗不能奪此語見於公諌録及舊唐書而新史不載資治通監記其諌事亦刪此一節可惜也虞丗南虞丗南卒後太宗夜夢見之有若平生翌日下制曰丗南奄隨物化倐移歳序昨因夜夢忽覩其人追懷遺美良増悲歎冝資冥助申朕思舊之情可於其家爲設五百僧齋并爲造天尊像一軀夫太宗之夢丗南盖君臣相與之誠所致冝恤其子孫厚其恩典可也齋僧造像豈所應作形之制書著在國史惜哉太宗而有此也七發枚乗作七發創意造端麗旨腴詞上薄騷些盖文章領袖故爲可喜其後繼之者如傅毅七激張衡七辯崔駰七依馬融七廣曹植七啓王粲七釋張恊七命之類規倣太切了無新意傅玄又集之以爲七林使人讀未終篇往往弃諸几格柳子厚晉問乃用其體而超然别立新機杼激越清壯漢晉之間諸文士之弊於是一洗矣東方朔荅客難自是文中傑出楊雄擬之爲解嘲尚有馳騁自得之妙至於崔駰達旨班固賔戯張衡應間皆屋下架屋章摹句冩其病與七林同及韓退之進學解出於是一洗矣毛穎傳初成丗人多笑其怪雖裴晉公亦不以爲可惟柳子獨愛之韓子以文爲戯本一篇耳妄人旣附以革華傳至於近時羅文江瑶葉嘉陸吉諸傳紛紜雜呇皆託以爲東坡大可笑也將軍官稱前漢書百官表將軍皆周末官秦因之予案國語鄭文公以詹伯爲將軍又吴夫差十旌一將軍左傳豈將軍食之而有不足檀弓衛將軍文子魯使愼子爲將軍然則其名乆矣彭寵爲奴所縛呼其妻曰趣爲諸將軍辦裝東漢書注云呼奴爲將軍欲其赦已也今吴人語猶謂小蒼頭爲將軍盖本諸此北道主人秦晉圍鄭鄭人謂秦盍舎鄭以爲東道主盖鄭在秦之東故云今丗稱主人爲東道者此也東漢載北道主人乃有三事常山太守鄧晨會光武於鉅鹿請從擊邯鄲光武曰偉卿以一身從我不如以一郡爲我北道主人又光武至薊將欲南歸耿弇以爲不可官屬腹心皆不肯光武指弇曰是我北道主人也彭寵將反光武問朱浮浮曰大王倚寵爲北道主人今旣不然所以失望後人罕引用之洛中盱江八賢司馬温公序賻禮書閭閻之善者五人吕南公作不欺述書三人皆以卑微不見於史氏予頃脩國史將以綴于孝行傳而不果成聊紀之於此温公所書皆陜州夏縣人曰醫劉太居親喪不飲酒食肉終三年以爲今丗士大夫所難能其弟永一尤孝友廉謹夏縣有水災民溺死者以百數永一執竿立門首他人物流入門者輒擿出之有僧寓錢數萬於其室而死永一詣縣自陳請以錢歸其弟子郷人負債不償者毀其劵曰周文粲其兄耆酒仰弟爲生兄或時酗歐粲鄰人不平而唁之粲怒曰兄未甞歐我汝何離間吾兄弟也曰蘇慶文者事繼母以孝聞常語其婦曰汝事吾母小不謹必逐汝繼母少寡而無子由是安其室終身曰臺亨者善畫朝廷修景靈宮調天下畫工詣京師事畢詔選試其優者留翰林授官禄亨名第一以父老固辤歸養於田里南公所書皆建昌南城人曰陳策甞買騾得不可被鞍者不忍移之它人命養於野廬俟其自斃其子與猾駔計因經過官人喪馬即磨破騾背以衒賈之旣售矣策聞自追及告以不堪官人疑策愛也祕之策請試以鞍亢亢終日不得被始謝還焉有人從䇿買銀器若羅綺者策不與羅綺其人曰向見君帑有之今何靳䇿曰然有質錢而没者歳月巳乆絲力糜脆不任用聞公欲以嫁女安可以此物病公哉取所當與銀器投熾炭中曰吾恐受質人或得銀之非眞者故爲公驗之曰危整者買鮑魚其駔舞秤權隂厚整魚人去身留整傍請曰公買止五斤巳爲公密倍入之願卑我酒整大驚追魚人數里返之醻以直又飲駔醇酒曰汝所欲酒而巳何欺寒人爲曰曽叔卿者買陶器欲轉易於北方而不果行有人從之併售者叔卿與之巳納價猶問曰今以是何之其人對欲効公前謀耳叔卿曰不可吾縁北方新有災荒是故不以行今豈冝不告以誤君乎遂不復售而叔卿家苦貧妻子飢寒不恤也嗚呼此八人者賢乎哉王導小名顔魯公書逺祖西平靖侯顔含碑晉李闡之文也云含爲光禄大夫馮懷欲爲王導降禮君不從曰王公雖重故是吾家阿龍君是王親丈人故呼王小字晉書亦載此事而不書小字丗說王丞相拜司空桓廷尉歎曰人言阿龍超阿龍故自超呼三公小字晉人浮虚之習如此漢書用字太史公陳渉丗家今亡亦死舉大計亦死等死死國可乎又曰戍死者固什六七且壯士不死即巳死即舉大名耳疊用七死字漢書因之漢溝洫志載賈讓治河䇿云河從河内北至黎陽爲石隄激使東抵東郡平剛又爲石隄使西北抵黎陽觀下又爲石隄使東北抵東郡津北又爲石隄使西北抵魏郡昭陽又爲石隄激使東北百餘里間河再西三東凡五用石隄字而不爲冗複非後人筆墨畦徑所能到也姜嫄簡狄毛公注生民詩姜嫄生后稷履帝武敏歆之句曰從於髙辛帝而見於天也玄鳥詩天命玄鳥降而生商之句曰春分玄鳥降簡狄配髙辛帝帝與之祈于郊禖而生契故本其爲天所命以玄鳥至而生焉其說本自明白至鄭氏箋始云帝上帝也敏拇也祀郊禖時有大人之迹姜嫄履之足不能滿履其拇指之處心體歆歆然如有人道感已者遂有身後則生子又謂鳦遺卵簡狄吞之而生契其說本於史記謂姜嫄出野見巨人跡忻然踐之因生稷簡狄行浴見燕墮卵取吞之因生契此二端之怪妄先賢辭而闢之多矣歐陽公謂稷契非髙辛之子毛公於史記不取履迹之怪而取其訛繆之丗次案漢書毛公趙人爲河間獻王博士然則在司馬子長之前數十年謂爲取史記丗次亦不然盖丗次之說皆出於丗本故荒唐特甚其書今亡夫適野而見巨迹人將走避之不暇豈復故故踐履以求不可知之禨祥飛鳥墮卵知爲何物而遽取吞之以古揆今人情一也今之愚人未必爾而謂古聖人之后妃爲之不待辨而明矣羌慶同音王觀國彦賔吴棫材老有學林及叶韻補注毛詩音二書皆云詩易太玄凡用慶字皆與陽字韻叶盖羌字也引蕭該漢書音義慶音羌又曰漢書亦有作羌者班固幽通賦慶未得其云巳文選作羌而它未有明證予案楊雄傳所載反離騷慶天顦而喪榮注云慶辭也讀與羌同最爲切据佐命元臣盛王創業必有同德之英輔成垂丗乆長之計不如是不足以爲一代宗臣伊尹周公之事見於詩書可考也漢蕭何佐髙祖其始入關即収秦丞相御史律令圖書以周知天下阸塞戸口多少強弱處民所疾苦髙祖失職爲漢王欲攻項羽周勃灌嬰樊噲皆勸之何獨曰今衆弗如百戰百敗願王王漢中收用巴蜀然後還定三秦王用其言此劉氏興亡至計也進韓信爲大將使當一面定魏趙燕齊髙祖得顓心與楚确無北顧憂且死引曹參代已而畫一之法成約三章以蠲秦暴拊百姓以申漢德四百年基業此焉肇之唐房元齡佐太宗初在秦府已獨收人物致幕下與諸將密相申結引杜如晦與參籌帷及爲宰相粲然興起洽功以州縣成天下之治以租庸調天下之財以八百府十六衞本天下之兵以諌爭付王魏以兵事付靖勣御夷狄有道用賢材有術三百年基業此焉肇之其後制節度使而州縣之治壞更二稅法而租庸之理壞變府兵爲彍騎諸衞爲神䇿而軍政壞雖有名臣良輔不能救也趙韓王佐藝祖監方鎭之勢削支郡以損其彊置轉運通判使掌錢榖以奪其冨參命京官知州事以分其黨禄諸大功臣於環衞而不付以兵收天下驍銳於殿巖而不使外重建法立制審官用人一切施爲至于今是賴此三君子之後代天理物碩大光明者丗有其人所謂一時之相爾蕭之孫有罪及無子凡六絶國漢輒紹封之國朝褎録韓王苗裔未甞或忘唯房公之亡未十年以其子故奪襲爵停配享訖唐之丗不復續唐家亦少恩哉名丗英宰曹參爲相國日夜飲醇酒不事事而畫一之歌興王導輔佐三丗無日用之益而歳計有餘末年略不復省事自歎曰人言我憒憒後人當思我憒憒謝安石不存小察經逺無競唐之房杜傳無可載之功趙韓王得士大夫所投利害文字皆寘二大甕滿則焚之李文靖以中外所陳一切報罷云以此報國此六七君子盖非揚已取名瞭然使戸曉者眞名丗英宰也豈曰不事事哉檀弓誤字檀弓載吴侵陳事曰陳太宰嚭使於師夫差謂行人儀曰是夫也多言盍甞問焉師必有名人之稱斯師也者則謂之何太宰嚭曰其不謂之殺厲之師與案嚭乃吴夫差之宰陳遣使者正用行人則儀乃陳臣也記禮者簡策差互故更錯其名當云陳行人儀使於師夫差使太宰嚭問之乃善忠宣公作春秋詩引斯事亦甞辯正云薛能詩薛能者晚唐詩人格調不能髙而妄自尊大其海棠詩序云蜀海棠有聞而詩無聞杜子美於斯興象不出没而有懷天之厚余謹不敢讓風雅盡在蜀矣吾其庶幾然其語不過曰青苔浮落處暮柳間開時帶醉逰人挿連隂彼叟移晨前清露濕晏後惡風吹香少傳何許妍多畫半遺而巳又有荔枝詩序曰杜工部老居兩蜀不賦是詩豈有意而不及歟白尚書曽有是作興旨卑泥與無詩同子遂爲之題不愧不負將來作者以其荔枝首唱愚其庶幾然其語不過曰顆如松子色如櫻未識蹉跎欲半生歳抄監州曽見樹時新入座乆聞名而巳又有折楊柳十首叙曰此曲盛傳爲詞者甚衆文人才子各衒其能莫不條似舞腰葉如眉翠出口皆然頗爲陳熟能專於詩律不愛隨人搜難抉新誓脫常態雖欲勿伐知音者其舎諸然其詞不過曰華清髙樹出離宫南陌柔條帶暖風誰見輕隂是良夜瀑泉聲畔月明中洛橋晴影覆江船羌笛秋聲濕塞烟閑想習池公宴罷水蒲風絮夕陽天而巳别有柳枝詞五首最後一章曰劉白蘇臺揔近時當初章句是誰推纎腰舞盡春楊柳未有儂家一首詩自注云劉白二尚書繼爲蘇州刺史皆賦楊柳枝詞丗多傳唱雖有才語但文字太僻宫商不髙耳能之大言如此但稍推杜陵視劉白以下蔑如也今讀其詩正堪一笑劉之詞云城外春風吹酒旗行人揮𬒮日西時長安陌上無窮樹唯有垂楊管别離白之詞云紅板江橋清酒旗館娃宮暖日斜時可憐雨歇東風定萬樹千條各自垂其風流氣槩豈能所可髣髴哉漢晉太常漢自武帝以後丞相無爵者乃封侯其次雖御史大夫亦不以爵封爲間唯太常一卿必以見侯居之而職典宗廟園陵動輒得咎由元狩以降以罪廢斥者二十人意武帝隂欲損侯國故使居是官以困之爾表中所載鄼侯蕭壽成坐犠牲瘦蓼侯孔臧坐衣冠道橋壤鄲侯周仲居坐不收赤側錢繩侯周平坐不繕園屋雎陵侯張昌坐乏祠陽平侯杜相坐擅役鄭舞人廣阿侯任越人坐廟酒酸江鄒侯靳石坐離宮道橋苦惡戚侯李信成坐縱丞相侵神道俞侯欒賁坐雍犠牲不如令山陽侯張當居坐擇博士弟子不以實成安侯韓延年坐留外國文書新畤侯趙弟坐鞫獄不實牧丘侯石德坐廟牲瘦當塗侯魏不害坐孝文廟風發瓦轑陽侯江德坐廟郎夜飲失火蒲侯蘇昌坐泄官書弋陽侯任宮坐人盜茂陵園物建平侯杜緩坐盜賊多自鄼侯至牧丘十四侯皆奪國武帝時也自當塗至建平五侯但免官昭宣時也下及晉丗此風猶存惠帝元康四年大風廟闕屋瓦有數枚傾落免太常荀㝢五年大風蘭臺主者求索阿棟之間得瓦小邪十五處遂禁止太常復興刑獄陵上荆一枝圍七寸二分者被斫司徒太常犇走道路太常禁止不解盖循習漢事云容齋隨筆卷第七
