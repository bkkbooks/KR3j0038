body:
  text: 容齊四筆序始豫作容齊隨筆首尾十八年續筆十三年三筆五年而四筆之成不費一歲身益老而著書益速蓋有其說曩自越府歸謝絶外事獨弄筆紀𫐠之習不可掃除故搜采異聞但緒夷堅諸志於議論雌黃不復關抱而稚豫櫰每見夷堅滿𥿄輒曰隨筆夷堅皆大人素所游戲今隨筆不加益不應厚於彼而薄於此也日日立案傍必俟草一則乃退重逆其意則裒所憶而書之櫰嗜讀書雖就寢猶置一編枕畔旦則與之俱興而天嗇其付年且弱冠聰明殊未開以彼其勤殆必有日丈夫愛憐少子此乎見之於是占抒為序并獎其志云慶元三年九月二十四日序
