body:
  text: 顔魯公顔魯公忠義大節照映今古豈唯唐朝人士罕見比倫自漢以來殆可屈指也考其立朝出處在明皇時爲楊國忠所惡由殿中侍御史出東都平原肅宗時以論太廟築壇事爲宰相所惡由御史大夫出馮翊爲李輔國所惡由刑部侍郞貶蓬州代宗時以言祭器不飭元載以爲誹謗由刑部尚書貶峽州德宗時不容於楊炎由吏部尚書換東宫散秩盧杞之擅國也欲去公數遣人問方鎭所便公往見之責其不見容由是銜恨切骨是時年七十有五竟墮杞之詭計而死議者痛之嗚呼公旣知杞之惡己盍因其方鎭之問欣然從之不然則髙舉逺引挂冠東去𣏌之所甚欲也而乃眷眷京都終不自爲去就以蹈危機春秋責備賢者斯爲可恨司空圖隱於王官谷柳璨以詔書召之圖陽爲衰野墮笏失儀得放還山璨之姦惡過於杞圖非公比也卒全身於大亂之丗然則公之委命賊手豈不大可惜也哉雖然公囚困於淮西屢折李希烈卒之捐身徇國以激四海義烈之氣正元反正實爲有助焉豈天欲全卑公以萬丗之名故使一時墮於橫逆以成始成終者乎戒石銘爾俸爾禄民膏民脂下民易虐上天難欺太宗皇帝書此以賜郡國立於聽事之南謂之戒石銘案成都人景煥有野人閑話一書乾德三年所作其首篇頒令箴載蜀王孟昶爲文頒諸邑云朕念赤子旰食宵衣言之令長撫養惠綏政存三異道在七絲驅雞爲理留犢爲規寛猛得所風俗可移無令侵削無使瘡痍下民易虐上天難欺賦輿是切軍國是資朕之賞罰固不踰時爾俸爾禄民膏民脂爲民父母莫不仁慈勉爾爲戒體朕深思凡二十四句昶區區愛民之心在五季諸僭僞之君爲可稱也但語言皆不工唯經表出者詞簡理盡遂成王言蓋詩家所謂奪胎換骨法也雙生子今時人家雙生男女或以後生者爲長謂受胎在前或以先生者爲長謂先後當有序然固有經一日或亥子時生則弟乃先兄一日矣辰時爲弟巳時爲兄則弟乃先兄一時矣桉春秋公羊摶隱公元年立適以長不以賢立子以貴不以長何休注云子謂左右媵及姪娣之子質家親親先立娣文家尊尊先立姪其雙生也質家据見立先生文家据本意立後生乃知長㓜之次自商周以來不同如此李建州建安城東二十里有梨山廟相傳爲唐刺史李公祠子守郡日因作祝文曰亟回哀眷書吏持白回字犯相公名請改之蓋以爲李回也後讀文藝李頻傳懿宗時頻爲建州刺史以禮法治下時朝政亂盜興相椎􅐁而建賴頻以安卒官下州爲立廟梨山歳祠之乃證其爲頻繼往禱而祝之云俟獲感應則當刻石紀實巳而得雨遂爲作碑偶閱唐末人石文德所著唐朝新纂一書正紀頻事云除建州牧卒於郡曹松有詩悼之曰出旌臨建水謝丗在公堂苦集休藏篋清資罷轉郎瘴中無子奠嶺外一妻孀恐是浮吟骨東歸就故郷其身後事落拓如此傳又云頻喪歸壽昌父老相與扶柩葬之天下亂盜發其冡縣人隨加封掩則無後可見云稽神録載一事亦以爲回徐鉉失於不審也侍從官自觀文殿大學士至待制爲侍從官令文所載也紹興三十一年元顔亮死于廣陵車駕將幸建康從官列銜上奏乞同班入對時湯𡵨公以大觀文爲行宮留守寄聲欲聮名衆以名位不同爲辭𡵨公曰思退亦侍從也然竟不克從紹熈二年吏部鄭尚書僑上章乞薦士詔令在内近臣臺諌在外侍從各舉六人堪充朝士者吏部遍牒伹及内任從官與在外待制以上而前宰相執政皆不預安有從官得薦人而舊弼乃不然有司之失也存亡大計國家大䇿係於安危存亡方變故交切幸而有智者陳至當之謀其聽而行之當如捧漏罋以沃焦釡而愚荒之主暗於事幾且惑於䛕佞孱懦者之言不旋踵而受其禍敗自古非一也曹操自將征劉備田豐勸袁紹襲其後紹辭以子疾不行操征烏戎劉備說劉表襲許表不能用後皆爲操所滅唐兵征王丗充於洛陽竇建德自河北來救太宗屯虎牢以扼之建德不得進其臣凌敬請悉兵濟河攻取懷州河陽踰太行入上黨徇汾晉趣蒲津蹈無人之境取勝可以萬全關中駭震則鄭圍自解諸將曰凌敬書生何爲知戰事其言豈可用建德乃謝敬其妻曹氏又勸令乗唐國之虚連營漸進以取山北西抄關中唐必還師自救鄭圍何憂不解建德亦不從引衆合戰身爲人擒國隨以滅唐莊宗旣取河北屯兵朝城梁之君臣謀數道大舉令董璋引陜虢澤潞之兵趣太原霍彦威以汝洛之兵㓂鎭定王彦章以禁軍攻鄆州叚凝以大軍當莊宗莊宗聞之深以爲憂而叚凝不能臨機決䇿梁主又無斷遂以致亡石敬瑭以河東叛耶律德光赴救敗唐兵而圍之廢帝問䇿於群臣時德光兄賛華因爭國之故亡歸在唐吏部侍郎龍敏請立爲契丹主令天雄盧龍二鎭分兵送之自幽州趣西樓朝廷露檄言之虜必有内顧之慮然後選募精銳以擊之此解圍一䇿也帝深以爲然而執政恐其無成議竟不決唐遂以亡皇家靖康之難胡騎犯闕孤軍罙入後無重援亦有出竒計乞用師擣燕者天未悔禍噬齊弗及可勝歎哉唐人詩不摶韓文公送李礎序云李生温然爲君子有詩八百篇傳詠於時又盧尉墓誌云君能爲詩自少至老詩可録傳者在紙凡千餘篇無書不讀然止用以資爲詩任登封尉盡冩所爲詩投留守鄭餘慶鄭以書薦於宰相觀此則李盧二子之詩多而可傳又裴迪與王維同賦輞川諸絶載於維集此外更無存者杜子美有寄裴十詩云知君苦思縁詩痩乃迪也其能詩可知今考之唐史藝文志凡别集數百家無其書其姓名亦不見於他人文集諸類詩文中亦無一篇白樂天作元宗簡集序云著格詩一百八十五律詩五百九至悼其死曰遺文三十軸軸軸金玉聲謂其古常而不鄙新竒而不怪今丗知其名者寡矣而況於詩乎乃知前賢遺稾湮没非一眞可惜也泰誓四語孔安國古文尚書自漢以來不列於學官故左氏傳所引者杜預輒注爲逸書劉向說苑臣術篇一章云泰誓曰附下而罔上者死附上而罔下者刑與聞國政而無益於民者退在上位而不能進賢者逐此所以勸善而黜惡也漢武帝元朔元年詔責中外不興廉舉孝有司奏議曰夫附下罔上者死附上罔下者刑與聞國政而無益於民者斥在上位而不能進賢者退此所以勸善黜惡也其語與說苑所載正同而諸家注釋至于顔師古皆不能援以爲證今之泰誓初未甞有此語也漢宣帝時河内女子得泰誓一篇獻之然年月不與序相應又不與左傳國語孟子衆書所引泰誓同馬鄭王肅諸儒皆疑之今不復可考重陽上巳改日唐文宗開成元年歸融爲京兆尹時兩公主出降府司供帳事繁又俯近上巳曲江賜宴奏請改日上曰去年重陽取九月十九日未失重陽之意今改取十三日可也且上巳重陽皆有定日而至展一旬乃知鄭谷所賦十日菊詩云自縁今日人心別未必秋香一夜衰亦爲未盡也唯東坡公有菊花開時即重陽之語故記其在海南蓺菊九畹以十一月望與客泛酒作重九云田宅契劵取直隋書志晉自過江凡貨賣奴婢馬牛田宅有文劵率錢一萬輸估四百入官賣者三百買者一百無文劵者隨物所堪亦百分收四名爲散估歷宋齊梁陳如此以爲常以人競商販不爲田業故使均輸欲爲懲勸雖以此爲辭其實利在侵削也今之牙契投稅正出於此田宅所係者大奉行唯謹至於奴婢馬牛雖著於令甲民不復問然官所取過多并郡邑導行之費盖百分用其十五六又皆買者獨輸故爲數多者率隱減價直賖立歳月坐是招激訐訴頃甞因奏對上章乞蠲其半使民不作僞以息爭則自言者必多亦以與爲取之義旣下有司而户部引條制沮其說公子奚斯閟宮詩曰新廟奕奕奚斯所作其辭只謂奚斯作廟義理甚眀鄭氏之說亦云作姜嫄廟也而楊子法言乃曰正考甫甞睎尹吉甫公子奚斯睎正考甫宋咸注文以謂奚斯慕考甫而作魯頌蓋子雲失之於前而宋又成其過耳故吴祕又巧爲之說曰正考甫商頌盖美禘祀之事而奚斯能作閔公之廟亦睎詩之教也而魯頌美之於義迂矣司馬温公亦以謂奚斯作閟宫之詩兼正考甫只是得商頌於周大師耳初非自作也班固王延壽亦云奚斯頌魯後漢曹襃曰奚斯頌魯考甫詠商注引薛君韓詩傳云是詩公子奚斯所作皆相承之誤唐藩鎭幕府唐丗士人初登科或未仕者多以從諸藩府辟置爲重觀韓文公送石洪温造二處士赴河陽幕序可見禮節然其職甚勞苦故亦或不屑爲之杜子美從劒南節度嚴武辟爲參謀作詩二十韻呈嚴公云胡爲來幕下只合在舟中束縛酬知己蹉跎效小忠周防期稍稍太簡遂怱怱曉入朱扉啓昬歸畫角終不成㝷別業未敢息微躬會希全物色時放倚梧桐而其題曰遣悶意可知矣韓文公從徐州張建封辟爲推官有書上張公云受牒之明日使院小吏持故事節目十餘事夾其中不可者自九月至二月皆晨入夜歸非有疾病事故輒不許出若此者非愈之所能也若寛假之使不失其性寅而入盡辰而退申而入終酉而退率以爲常亦不廢事苟如此則死於執事之門無悔也杜韓之旨大略相似云文中子門人王氏中說所載門人多正觀時知名卿相而無一人能振師之道者故議者往往致疑其最所稱髙第曰程仇董薛考其行事程元仇璋董常無所見獨薛收在唐史有列傳蹤跡甚爲明白收以父道衡不得死於隋不肯仕聞唐髙祖興將應義舉郡通守堯君素覺之不得去及君素東連王丗充遂挺身歸國正在丁丑戊寅歳中丁丑爲大業十三年又爲義寧元年戊寅爲武德元年是年三月焬帝遇害於江都盖大業十四年也而杜淹所作文中子丗家云十三年江都難作子有疾召薛收謂曰吾夣顔回稱孔子歸休之命乃寢疾而終殊與收事不合歳年亦不同是爲大可疑者也又稱李靖受詩及問聖人之道靖旣云丈夫當以功名取冨貴何至作章句儒恐必無此也今中說之後載文中次子福畤所録云杜淹爲御史大夫與長孫太尉有隙予按淹以正觀二年卒後二十一年髙宗即位長孫無忌始拜太尉其不合於史如此故或者疑爲阮逸所作如所謂薛收元經傳亦非也晉燕用兵萬事不可執一法而兵爲甚晉文公圍曹攻門者多死曹人尸諸城上晉侯患之聽輿人之謀曰稱舎於墓言若將發冡者師遷焉曹人兇懼因其兇而攻之遂入曹燕將騎刼攻齊即墨田單縱反閒言吾懼燕人掘吾城外冡墓燕軍乃盡掘冡墓燒死人齊人望見皆涕泣其欲出戰怒自十倍巳而果敗燕軍觀晉燕之所以用計則同而其成敗頓異者何邪晉但舎於墓陽爲若將發冡故曹人懼而燕眞爲之以激怒齊人故爾李衞公帖李衛公在朱崖表弟某侍郎遣人餉以衣物公有書答謝之曰天地窮人物情所弃雖有骨肉亦無音書平生舊知無復弔問閣老至仁念舊再降專人兼賜衣服器物茶藥至多開緘發紙涕咽難勝大海之中無人拯恤資儲蕩盡家事一空百口嗷然往往絶食塊獨窮悴終日若飢唯恨垂没之年須作餒而之鬼十月末伏枕七旬藥物陳裛又無醫人委命信天幸而自活書後云閏十一月二十日從表兄崖州司户參軍同正李德𥙿狀侍郞十九弟案德𥙿以大中二年十月自潮州司馬貶崖州所謂閠十一月正在三年盖到崖才十餘月爾而窮困苟生巳如是唐書本傳云貶之明年卒則是此書旣發之後旋踵下丗也當是時宰相皆其怨仇故雖骨肉之親平生之舊皆不敢復通音問而某侍郎至於再遣專使其爲髙義絶俗可知惜乎姓名不可得而考耳此帖藏禁中後出付袐閣今勒石于道山堂西紹興中趙忠簡公亦謫朱崖士大夫畏秦氏如虎無一人敢輒寄聲張淵道爲廣西帥屢遣兵校持書及藥石酒麪爲餽公甞答書云鼎之爲己爲人一至於此其述酸寒苦厄之狀略與衛公同旣而亦終於彼手札今尚存于張氏姚崇曾孫勗爲李公厚善及李譛逐擿索支黨無敢通勞問旣居海上家無資病無湯劑勗數饋餉候問不傅時爲厚薄其某侍郎之徒與王孫賦王延壽王孫賦載於古文苑其辭有云顔狀類乎老翁軀體似乎小兒謂猴也乃知杜詩顔狀老翁爲盖出諸此漢郡國諸官西漢鹽鐵膳羞陂湖工服之屬郡縣各有司局斡之其名甚多然居之者罕甞見於史傳今略以地理所載言之凡鐵官三十八鹽官二十九工官九皆不暇紀其處自餘若京兆有船司空爲主船官太原有挏馬官主牧馬元名家馬官遼東有牧師官交趾有羞官南郡有發弩官嚴道有木官丹陽有銅官桂陽有金官南海有洭浦官南郡江夏有雲夢官九江有陂官湖官朐忌魚復有橘官鄱陽黃金采主采金亦有官在内則奉常之均官食官司農之斡官少府之大官主膳食湯官主餅餌導官主擇米如是者蓋以百數漢獄名漢以廷尉主刑獄而中都它獄亦不一宗正屬官有左右都司空鴻臚有別火令丞郡邸獄少府有若盧獄令考工共工獄執金吾有寺互都船獄又有上林詔獄水司空掖受袐獄暴室請室居室徒官之名張湯傳蘇林曰漢儀注獄二十六所東漢志云孝武帝所置丗祖皆省之東漢洎唐雖鞫囚非一處然不至如是其多國朝但有大理及臺獄元豐紹聖閒蔡確章子厚起同文館獄之類非故事也容齋續筆卷第一
