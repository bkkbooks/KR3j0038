front:
  text: 容齋續筆卷第一十八則是書先巳成十六卷淳熙十四年八月在禁林日入侍至尊壽皇聖帝清間之燕聖語忽云近見甚齋隨筆邁竦而對曰是臣所著容齋隨筆無足采者上曰晒有好議論邁起謝退而詢之乃婺女所刻賈人販鬻于書坊中貴人買以入遂塵乙覽書生遭遇可謂至榮因復裒臆説綴于後懼與前書相亂故別以一二數而目曰續亦十六卷云紹熙三年三月十日邁序
