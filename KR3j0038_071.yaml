  text: 容齊四筆卷第五十四則
  hash: sha256:5c3de6bee19edf6d18f3682615533c5fead1112fd569b49f963f96dffab8dba0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_071-1a}
body:
  text: 土木偶人趙德夫作金石録其跋漢居攝墳壇二刻石云其一上谷府卿墳壇其一祝其卿墳壇曰墳壇者古未有土木像故為壇以祀之兩漢時皆如此豫案戰國䇿所載蘇秦謂孟嘗君曰有土偶人與桃梗相語桃梗曰子西岸之土也挺子以為人雨下水至則汝殘矣土偶曰子東國之桃梗也刻削子以為人雨降水至流子而去矣所謂土木為偶人非像而何漢至寓龍寓車馬皆謂以木為之象其真形謂之兩漢未有則不可也饒州風俗嘉祐中吳孝宗子經者作餘干縣學記云古者江南不能與中土等宋受天命然後七閩二浙與江之西東冠帶詩書翕然大肆人才之盛遂甲於天下江南既為天下甲而饒人喜事又甲於江南蓋饒之為州壤土肥而飬生之物多其民家冨而户羡蓄百金者不在冨人之列又當寬平無事之際而天性好善為父兄者以其子與弟不文為咎為母妻者以其子與夫不學為辱其美如此豫觀今之饒民所謂家富户羡了非昔時而髙甍巨棟連阡亘陌者又皆數十年來寓公所擅而好善為學亦不盡如吳記所言故録其語以寄一歎禽畜菜茄色不同禽畜菜茄之色所在不同如江浙間豬黑而羊白至江廣吉州以西二者則反是蘇秀間鵝皆白或有一斑褐者則呼為鴈鵝頗異而畜之若吾鄉凡鵝皆鴈也小兒至取浙中白者飼飬以為湖沼觀美浙西常茄皆皮紫其皮白者為水茄吾鄉常茄皮白而水茄則紫其異如是伏龍肝本草伏龍肝陶隱居云此竈中對釡月下黃土也以竈有神故呼為伏龍肝并以迃隱為名爾雷公云凡使勿誤用竈下土其伏龍肝是十年已來竈額內火氣積自結如赤色石中黃其形貌八稜豫嘗見臨安醫官陳輿大夫言當以砌竈時納猪肝一具於土中俟其積久與土為一然後用之則稍與名相應比讀後漢書隂識傳云其先隂子方臘曰晨炊而竈神形見注引雜五行書曰冝市買猪肝泥竈令婦孝然則輿之說亦有所本云廣濟曆亦有此說又列作竈忌日云伏龍在不可移作所謂伏龍者竈之神也勇怯無常民無常勇亦無常怯有氣則實實則勇無氣則虛虛則怯怯勇虛實其由甚微不可不知勇則戰怯則北戰而勝者戰其勇者也戰而北者戰其怯者也怯勇無常倏忽往來而莫知其方惟聖人獨見其所由然此吕氏春秋决勝篇之語子愛而書之趙德甫金石録東武趙明誠德甫清憲丞相中子也著金石録三十篇上自三代下訖五季鼎鍾甗鬲槃匜尊爵之欵識豐碑大碣顯人晦士之事蹟見于石刻者皆是正僞謬去取褒貶凡為卷二千其妻易安李居士平生與之同志趙沒後愍悼舊物之不存乃作後序極道遭罹變故本末今龍舒郡庫刻其書而此序不見取比獲見元藁於王順伯因為撮述大槩云豫以建中辛巳歸趙氏時丞相作吏部侍郎家素貧儉德甫在太學每朔望謁告出質衣取半千錢步入相國寺市碑文果實歸相對展玩咀嚼後二年從官便有窮盡天下古文竒字之志傳寫未見書買名人書畫古竒器有持徐熙牡丹圗求錢二十萬留信宿計無所得捲還之夫婦相向惋悵者數曰及連守兩郡竭俸入以事鉛槧每獲一書即曰勘校裝緝得名畫彛器亦摩玩舒卷指摘疵病盡一燭為率故紙扎精緻字畫全整冠於諸家每飯罷坐歸來堂烹茶指堆積書史言某事在某書某卷第幾葉第幾行以中否勝負為飮茶先後中則舉否大笑或至茶覆懷中不得飲而起凡書史百家字不刓缺本不誤者輒市之儲作副本靖康丙午德甫守淄川聞虜犯京師盈箱溢篋戀戀悵悵知其必不為巳物建炎丁未奔太夫人喪南來既長物不能盡載乃先去書之印本重大者畫之多幅者器之無欵識者巳又去書之監本者畫之平常者器之重大者所載尚十五車連艫渡淮江其青州故第所鎖十間屋期以明年具舟載之又化為煨燼巳酉歲六月德甫駐家池陽獨赴行都自岸上望舟中告別豫意甚惡呼曰如傳聞城中緩急奈何遙應曰從衆必不得巳先弃輜重次衣衾次書冊次卷軸次古器獨宋器者可自負抱與身俱存亡勿忘之徑馳馬去秋八月德甫以病不起時六宫往江西豫遣二吏部所存書二萬卷金石刻二千本先往洪州至冬虜陷洪遂盡委弃所謂連艫渡江者又散為雲煙矣獨餘輕小卷軸寫本李杜韓栁集丗說鹽鐡論石刻數十副軸鼎鼐十數及南唐書數篋偶在卧內巋然獨存上江既不可往乃之台溫之衢之越之杭寄物於􅌘縣庚戌春官軍收叛卒悉取去入故李將軍家巋然者十失五六猶有五七簏挈家寓越城一夕為盜穴壁負五簏去盡為吳說運使賤價得之僅有不成部帙殘書䇿數種忽閲此書如見故人因憶德甫在東萊靜治堂裝褾𥘉就藝籖縹帶束十卷作一帙日校二卷跋一卷此二千卷有題跋者五百二卷耳今手澤如新墓木巳拱乃知有有必有無有聚必有散亦理之常又胡足道所以區區記其終始者亦欲為後丗好古博雅者之戒云時紹興四年也易安年五十二矣自叙如此豫讀其文而悲之為識於是書韓文公薦士唐丗科舉之柄顓付之主司仍不糊名又有交朋之厚者為之助謂之通榜故其取人也畏於譏議多公而審亦或脅於權勢或撓於親故或纍於子弟皆常情所不能免者若賢者臨之則不然未引試之前其去取髙下固巳定於胸中矣韓文公與祠部陸貟外書云執事與司貢士者相知識彼之所望於執事者至而無間彼之職在乎得人執事之職在乎進賢如得其人而授之所謂兩得矣愈之知者有侯喜侯雲長劉述古韋群玉托言作紓此四子者可以當首薦而極論期於成而後止可也沈𣏌張苰科記又作弘尉遲汾李紳張後餘李翊皆出群之才與之足以收人望而得才實主司廣求焉則以告之可也往者陸相公司貢士愈時幸在得中所與及第者皆赫然有聲原其所以亦由梁𥙷闕肅王郎中礎佐之梁舉八人無有失者其餘則王皆與謀焉陸相於王與梁如此不疑也至今以為美談此書在集中不注歲月案托言云正元十八年權德輿主文陸傪貟外通榜韓文公薦十人於傪權公凡三榜共放六人餘不出五年內皆捷以登科記考之正元十八年德輿以中書舍人知舉放進士二十三人尉遲汾侯雲長韋紓沈𣏌李翊登第十九年以禮部侍郎放二十人侯喜登第永正元年放二十九人劉述古登第通三榜共七十二人而韓所薦者預其七元和元年崔邠下放李紳二年又放張後餘張弘皆與托言合陸傪在正元間時名最著韓公敬重之其行難一篇為傪作也曰陸先生之賢聞於天下是是而非非自越州召拜祠部京師之人日造焉先生曰今之用人也不詳位于朝者吾取某與某而巳在下者多于朝凡吾與者若干人又送其刺歙州序曰君出刺歙州朝廷耆舊之賢都邑游居之良齎咨涕洟咸以為不當去則傪之以人物為巳任久矣其刺歙以十八年二月權公放榜時既以去國而用其言不替其不負公議而采人望蓋與陸宣公同韓公與書時方為四門博士居百寮底殊不以其薦為犯分故公作權公碑云典貢士薦士於公者其言可信不以其人布衣不用即不可信雖大官勢人交言一不以綴意又云前後考第進士及庭所䇿試士踊相躡為宰相逹官其餘布處臺閣外府凡百餘人梁肅及傪皆為後進領䄂一時龍門惜其位不通顯也豈非汲引善士為當國者所忌乎韓公又有答劉正夫書云舉進士者於先進之門何所不往先進之於後輩苟見其至寧可以不答其意邪來者則接之舉城士大夫莫不皆然而愈不幸獨有接後進名以是觀之韓之留意人士可見也王勃文章王勃等四子之文皆精切有本原其用駢儷作記序碑碣蓋一時體格如此而後來頗議之杜詩云王楊盧駱當時體輕薄為文哂未休爾曹身與名俱滅不廢江河萬古流正謂此耳身名俱滅以責輕薄子江河萬古流指四子也韓公滕王閣記云江南多游觀之美而滕王閣獨為第一及得王所為序賦記等壯其文辭注謂王勃作游閣序又云中丞命為記竊喜載名其上詞列三王之次有榮耀焉則韓之所以推勃亦為不淺矣勃之文今存者二十卷云吕覽引詩書吕氏春秋有始覽諭大篇引夏書曰天子之德廣運乃神乃武乃文又引商書曰五世之廟可以觀怪萬夫之長可以生謀髙誘注皆曰逸書也廟者鬼神之所在五世久逺故於其所觀魅物之怪異也豫謂吕不韋作書時秦未有詩書之禁何因所引訛謬如此髙誘注文怪異之說一何不典之甚邪又孝行覽亦引商書曰刑三百罪莫重於不孝今安得有此文亦與孝經不合又引周書曰若臨深淵若履薄氷注云周書周文公所作尤妄也又以普天之下莫非王土率土之濵莫非王臣為舜自作詩子惠思我褰裳涉洧子不我思豈無他士為子産答叔向之詩不知是時國風雅頌何所定也􅑔戚飯牛歌髙誘全引碩鼠三章又為可笑藍田丞壁記韓退之作藍田縣丞㕔壁記桞子厚作武功縣丞㕔壁記二縣皆京兆屬城在唐為畿甸事體正同而韓文雄拔超峻光前絶後以栁視之殆猶武夫之與美玉也莆田方嵩卿得蜀本數處與今文小異其破崖岸而為文一句繼以丞㕔故有記蜀本無而字考其語脉乃破崖岸為文丞是句絶文丞者猶言文具備貟而巳語尤竒崛若以丞字屬下句則既是丞廳記矣而又云丞㕔故有記雖𥘉學為文者不肯爾也此篇之外不復容後人出手姪孫倬頃丞宣城後生頗有意斯道自作題名記示豫豫曉之曰他文尚可隨力工拙下筆至如此記豈冝犯不韙哉倬時巳勒石深悔之近日亦見有為之者吾家孫姪多京官調選再轉必為丞慮其復有效尤者故書以戒之錢武肅三改元歐陽公五代史叙列國年譜云聞於故老謂吳越亦嘗稱帝改元而求其事迹不可得頗疑吳越後自諱之及旁采諸國書與吳越往來者多矣皆無稱帝之事獨得其封落星石為寶石山制書稱寶正六年辛卯耳王順伯收碑有臨安府石屋崇化寺尊勝幢云時天寶四年歲次辛未四月某日元帥府府庫使王某又明慶寺白傘蓋陀羅尼幢云吳越國女弟子吳氏十五娘建其發願文序曰十五娘生忝霸朝貴彰國懿天寶五年太歲壬申月日題順伯考其歲年知非唐天寶而辛未乃梁開平五年其五月改乾化壬申乃二年梁以丁卯篡唐武肅是歲猶用唐天祐次年自建元也錢唐湖廣潤龍王廟碑云錢鏐正明二年丙子正月建新功臣禪院碑封睦州墻下神廟勑皆正明中登聖寺磨崖梁龍德元年歲次辛巳錢鏐建又有龍德三年上宫詩是歲梁亡九里松觀音尊勝幢寶大二年歲次乙酉建衢州司馬墓志云寶大二年八月殁順伯案乙酉乃唐莊宗同光三年其元年當在甲申蓋自壬申以後用梁紀元至後唐革命復自立正朔也又水月寺幢云寶正元年丙戌十月具位錢鏐建是年為明宗天成招賢寺幢云丁亥寶正二年又小昭慶金牛碼瑙等九幢皆二年至五年所刻貢院前橋柱刻寶正六年歲在辛卯造然則寶大止二年而改寶正寶正盡六年次年壬辰有天竺日觀庵經幢復稱長興三年八月用唐正朔其年三月武肅薨方寢疾語其子元瓘曰子孫善事中國勿以易姓廢事大之禮於是以遺命去國儀用藩鎮法然則有天寶寶大寶正三名歐陽公但知其一耳通鑑亦然自是歷晉漢周及本朝不復建元今猶有清泰天福開運㑹同係契丹年乾祐廣順顯德石刻存者三四十種固未嘗稱帝也黃庭換鵝李太白詩云山隂道士如相見應寫黃庭換白鵝蓋用王逸少事也前賢或議之曰逸少寫道德經道士舉鵝群以贈之元非黃庭以為太白之誤豫謂太白眼髙四海衝口成章必不規規然旋檢閲晉史看逸少傳然後落筆正使誤以道德為黃庭於理正自無害議之過矣東坡雪堂既毀紹興𥘉黃州一道士自捐錢粟再營建士人何頡斯舉作上梁文其一聮云前身化鶴曽陪赤壁之游故事換鵝無復黃庭之字乃用太白詩為出處可謂竒語案張彥逺法書要録載禇遂良右軍書目正書有黃庭經云注六十行與山隂道士真蹟故在又武平一徐氏法書記云武后曝太宗時法書六十餘函有黃庭又徐季海古跡記元宗時大王正書三卷以黃庭為第一皆不云有道德經則知乃晉傳誤也宋桑林左傳宋公享晉侯於楚丘請以桑林注桑林者殷天子之樂名舞師題以旌夏晉侯懼而退及著雍疾卜桑林見荀偃士丐欲奔請禱焉荀罃不可豫案吕氏春秋云武王勝殷立成湯之後於宋以奉桑林髙誘注曰桑山之林湯所禱也故使奉之淮南子云湯旱以身禱於桑山之林許叔重注曰桑山之林能興雲致雨故禱之桑林二說不同杜預注左傳不曽引用豈非是時未見其書乎馮夷姓字張衡思玄賦號馮夷俾清津兮櫂龍舟以濟豫李善注文選引青令傳曰河伯姓馮氏名夷浴於河中而溺死是為河伯太公金匱曰河伯姓馮名修裴氏新語謂為馮夷莊子曰馮夷得之以游大川淮南子曰馮夷服夷石而水仙後漢張衡傳注引聖賢冡墓記曰馮夷者弘農華隂潼鄉隄首里人服八石得水仙為河伯又龍魚河圖曰河伯姓吕名公子夫人姓馮名夷唐碑有河侯新祠頌秦宗撰文曰河伯姓馮名夷字公子數說不同然皆不經之傳也蓋本於屈原逺遊篇所謂使湘靈鼓瑟兮令海若舞馮夷前此未有用者淮南子原道訓又曰馮夷大丙之御也乘雲車入雲霓許叔重云皆古之得道能御隂陽者此自別一馮夷也容齊四筆卷第五
