body:
  text: 容齊五筆卷第二十五則二叔不咸左氏傳載冨辰之言曰昔周公弔二叔之不咸故封建親戚以蕃屏周士大夫多以二叔為管蔡案蔡仲之命云羣叔流言乃致辟管叔于啇囚蔡叔降霍叔為庶人蓋三叔也杜預注以為周公傷夏殷之叔世疏其親戚以至滅亡故廣封其兄弟是以方叙說管蔡郕霍十六國其義昭然所言親戚者指兄弟耳官階服章唐憲宗時因數赦官多泛階又帝親郊陪祠者授三品五品不計考使府軍吏以軍功借賜朱紫率十八近臣謝郎官出使多所賜與每朝㑹朱紫滿庭而少衣緑者品服太濫人不以為貴帝亦惡之詔太子少師鄭餘慶條奏懲革淳熙十六年紹熙五年連有覃霈轉官賜服者衆紹熙元年豫自當塗徙㑹稽過闕遇起居舍人莫仲謙於漏舍仲謙云比赴景靈行香見朝士百數無一緑𫀆者又朝議中奉皆直轉行故五品官不勝計頗類元和也月非望而食曆家論日月食自漢太初以來始定日食不在朔則在晦否則二日然甚少月食則有十四十五十六之差蓋置望參錯也天體有二交道曰交初曰交中交𥘉者星家以為羅睺交中者計都也隱暗不可見於是為入交法以求之然不過能求朔望耳若餘日入交則書所不載由漢及唐二十八家暨本朝十一曆皆然姑以慶元丁巳歲五次月食考之二月望為入交中七月為交𥘉唯十月二十日二十一日連兩夜乃以二更盡月食之既才兩刻復明十一月十八夜復如之案此三食皆是交中十月二十夜月在張五度而計都在翼二度次夜月在張十七度計都未動相距才四度耳十一月十八夜月在星五度計都在張十九度相距二十度十二月十七夜五更月在星二度入交陽末卯初四刻交甚食六分半八刻退交十八夜四更月在張六度入交中隂初至寅四刻交甚食九分卯五刻退交其驗如此豫竊又有疑焉太隂一月一周天必兩值交道今年遂至八食一一如星官曆翁之說仍不拘月望則玉川子之詩不勝作矣當更求其旨趣云頃見太史局官劉孝榮言月本無光受日為明望夜正與日對故一輪光滿或月行有遲疾先後日光所不照處則為食朔旦之日日月同宫如月在日上掩太陽而過則日光為所遮故為日食非此二日則無薄食之理其說亦通慶善橋饒州學非范文正公所建豫既書之矣城內慶善橋之說亦然比因郡人修橋拆去舊石見其上鐫云康定庚辰案范公以景祐乙亥為待制丙子知開封府黜知饒州後徙潤越至庚辰歲乃復職帥長安既去此久矣西漢以來加官漢書百官表云侍中左右曹諸吏散騎中常侍皆加官所加或將軍列侯卿大夫將都尉紿事中亦加官所加或大夫博士議郎其侍中中常侍得入禁中諸曹受尚書事諸吏得舉法散騎並乘輿車案漢世除授此等稱謂殆若今之兼職者不甚為顯秩然魏相以御史大夫而給事中它如劉向以宗正散騎給事中蘇武以右曹典屬國楊雄為諸吏光祿大夫是也至於金日磾以降虜為侍中其子賞建諸孫常敞岑明涉湯融欽皆為左曹諸吏侍中故班史贊之云七世內侍何其盛也蓋如今時閣門宣贊祗候之類但漢家多用士人武帝所任莊助朱買臣吾丘壽王東方朔諸人皆天下選此其所以為人貴重東漢大略亦然晉宋以來又有給事黃門侍郎散騎常侍通直散騎常侍散騎侍郎等皆為兼官但視本秩之高下巳而復以將軍為寵齊高帝以太子詹事何戢領選以戢資重欲加常侍禇淵曰臣與王儉既巳左珥若復加戢則八座遂有三貂若帖以驍游亦為不少乃以為吏部尚書加驍騎將軍唐有檢校官文武散階憲銜乃此制也國朝自真宗始創學士直學士待制直閣職名尤為仕宦所慕今自觀文殿大學士至直祕閣幾四十種不刋之典明白易曉非若前代之冗泛云吕望非熊自李翰蒙求有吕望非熊之句後來据以為用然以史䇿考之六韜第一篇文韜曰文王將田使編布卜曰田於渭陽將大得焉非龍非彲非虎非羆兆得公侯天遺汝師文王曰兆致是乎史編曰編之太祖史疇為禹占得臯陶比史記云吕尚窮困年老以漁釣千西伯西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲霸王之輔後漢崔駰逹旨云漁父見兆於元龜注文乃引史記非龍非驪非熊非羆為證今之史記蓋不然也非熊出處惟此而巳唐曹因墓銘慶元三年信州上饒尉陳莊發土得唐碑乃婦人為夫所作其文云君姓曹名因字鄙夫世為鄱陽人祖父皆仕於唐高祖之朝惟公三舉不第居家以禮義自守及卒於長安之道朝廷公卿鄉鄰耆舊無不太息惟豫獨不然謂其母曰家有南畒足以養其親室有遺文足以訓其子肖形天地間範圍隂陽內死生聚散特世態耳何憂喜之有哉豫姓周氏公之妻室也歸公八載恩義有奪故贈之銘曰其生也天其死也天茍逹此理哀復何言豫案唐世上饒本隸饒州其後分為信故曹君為鄱陽人婦人能文逹理如此惜其不傳故書之以裨圖志之缺唐史省文之失楊虞卿兄弟怙李宗閔勢為人所奔向當時為之語曰欲入舉場先問蘇張蘇張尚可三楊殺我而新唐書减去先字李德裕賜河北三鎮詔曰勿為子孫之謀欲存輔車之勢新書减去欲字遂使兩者意義為不鏗鏘激越此務省文之失也李德裕論命令李德𥙿相武宗言從計行韋弘質建言宰相不可兼治錢榖德裕奏言管仲明於治國其語曰國之重器莫重於令令重君尊君尊國安治人之本莫要於令故曰虧令者死益令者死不行令者死留令者死不從令者死五者無赦又曰令在上而論可否在下是主威下繫於人也大和後風俗寖敝令出於上非之在下此敝不止無以治國臣謂制置職業人主之柄非小人所得干弘質賤臣豈得以非所宜言妄觸天聽是輕宰相也德裕大意欲朝廷尊臣下肅而政出宰相故感憤切言之豫謂德裕當國它相取充位而已若如所言則一命一令之出臣下皆不得有言諌官御史給事舍人之職廢矣弘質位給事中亦非賤臣宜其一朝去位遂罹抵巇皆自取之也漢武唐德宗漢張湯事武帝舞文巧詆以輔法所治夷滅者多旋以罪受誅上惜湯稍進其子安世擢為尚書令安世宿衛忠正肅敬不怠勤勞國家卒為重臣其可大用不疑而武帝之意乃以父湯故爾唐盧𣏌相德宗姦邪險賊為天下禍以公議不容譴逐致死帝念之不忘擢叙其子元輔至兵部侍郎元輔端靜介正能紹其祖奕之忠規陟之臺省要官宜也而德宗之意乃以父𣏌故爾且武帝之世羣臣不幸而誅者如莊助朱買臣吾丘壽王諸人及考終名臣如汲黯鄭莊董仲舒卜式未嘗恤其孤德宗輔相之賢如崔祐甫李泌陸贄皆身沒則巳而獨於湯𣏌二人飬卷如此是可歎也諸公論唐肅宗唐肅宗於干戈之際奪父位而代之然尚有可諉者曰欲收復兩京非居尊位不足以制命諸將耳至於上皇還居興慶惡其與外人交通劫徙之西內不復定省竟以怏怏而終其不孝之惡上通於天是時元次山作中興頌所書天子幸蜀太子即位於靈武直指其事殆與洪範云武王勝殷殺受之辭同其詞曰事有至難宗廟再安二聖重歡既言重歡則知其不歡多矣杜子美杜䳌詩我看禽鳥情猶解事杜䳌傷之至矣顔魯公請立放生池表云一日三朝大明天子之孝問安視膳不改家人之禮東坡以為彼知肅宗有愧於是也黃魯直題磨崖碑尤為深切撫軍監國太子事何乃趣取大物為事有至難天幸爾上皇局脊還京師南內淒涼幾苟活高將軍去事尤危臣結春秋二三䇿臣甫杜䳌再拜詩安知忠臣痛至骨世上但賞瓊琚詞所以揭表肅宗之罪極矣孫馬兩公所言盧照鄰有疾問孫思邈曰高醫愈疾奈何答曰天有四時五行寒暑迭居和為雨怒為風凝為雪霜張為虹霓天常數也人之四支五藏一覺一寐吐納往來流為榮衛章為氣色發為音聲人常數也陽用其形隂用其精天人所同也失則蒸生熱否生寒結為瘤贅陷為癰疽奔則喘乏竭則焦槁發乎靣動乎形天地亦然五緯縮贏孛彗飛流其危診也寒暑不時其蒸否也石立土踊是其瘤贅山崩土陷是其癰疽奔風暴雨其喘乏川瀆竭涸其焦槁高醫導以藥石救以砭劑聖人和以至德輔以人事故體有可愈之疾天有可振之災睿宗召司馬子微問其術對曰為道日損損之又損以至於無為夫心目所知見每損之尚不能巳况攻異端而增智慮哉帝曰治身則爾治國若何曰國猶身也故游心於淡合氣於漠與物自然而無私焉而天下治孫公司馬所言皆至道妙理之所寓治心養性宜無出此者矣元微之詩唐書藝文志元稹長慶集一百卷小集十卷而傳於今者惟閩蜀刻本為六十卷三館所藏獨有小集文惠公鎮越以其舊治而文集蓋缺乃求而刻之外春游一篇云酒戶年年減山行漸漸難欲終心懶慢轉恐興䦨散鏡水波猶冷稽峯雪尚殘不能辜物色乍可怯春寒逺目傷千里新年思萬端無人知此意間憑小欄干白樂天書之題云元相公春游錢思公藏其真跡穆父守越時摹刻于蓬萊閣下今不復存集中逸此詩文惠為列之於集外李端民平叔嘗和其韻寄公云東閣經年别窮愁客路難望塵驚嶽峙懷舊各雲散茵醉恩逾厚檣歌興未殘馮唐嗟巳老范叔敢言寒玉燭調魁柄陽春在筆端應憐掃門役白首滯江干樂天所書豫少時得其石刻後亦失之諌繚綾戲龍羅李德裕為浙西觀察使穆宗詔索盤絛繚綾千匹德裕奏言立鵝天馬盤絛掬豹文彩怪麗惟乘輿當御今廣用千匹臣所未諭優詔為停崇寧閒中使持御札至成都令轉運司織戲龍羅二千繡旗五百副使何常奏旗者軍國之用敢不奉詔戲龍羅唯供御服日衣一匹歲不過三百有竒今乃數倍無益也詔獎其言為減四之三以二事觀之人臣進言於君切而不訐蓋無有不聽者何常所論甚與德裕相類云詳正學士唐太宗時命祕書監魏證寫四部羣書將藏內府置讎正二十貟後又詔虞世南顔師古踵領之功不就顯慶中罷讎正官使散官隨畨刋正後詔東臺侍郎趙仁本等充使檢校置詳正學士以代散官此名甚雅不知何時罷去然祕省自有校書郎正字使正名責實足矣紹興中以貴臣提舉祕書省而置編定書籍官二貟亦其類也容齊五筆卷第二終
