body:
  text: 漢唐八相蕭曹丙魏房杜姚宋爲漢唐名相不待誦說然前六君子皆終于位而姚宋相明皇皆不過三年姚以二子及親吏受賂其罷猶有說宋但以嚴禁惡錢及疾負罪而妄訴不巳者明皇用優人戯言而罷之二公終身不復用宋公罷相時年才五十八後十七年乃薨繼之者如張嘉貞張說源乾曜王晙宇文融裴光庭蕭嵩牛仙客其才可睹矣唯杜暹李元紘爲賢亦清介齪齪自守者釋騏驥而不乗焉皇皇而更索可不惜哉蕭何且死所推賢唯曹參魏丙同心輔政房喬毎議事必曰非如晦莫能籌之姚崇避位薦宋公自代唯賢知賢冝後人之莫及也六卦有坎易乾坤二卦之下繼之以屯蒙需訟師比六者皆有坎聖人防患備險之意深矣晉之亡與秦隋異自堯舜及今天下裂而復合者四周之末爲七戰國秦合之漢之末分爲三國晉合之晉之亂分爲十餘國爭戰三百年隋合之唐之後又分爲八九國本朝合之然秦始皇一傳而爲胡亥晉武帝一傳而爲惠帝隋文帝一傳而爲煬帝皆破亡其社稷獨本朝九傳百七上年乃不幸有靖康之禍盖三代以下治安所無也秦晉隋皆相似然秦隋一亡即掃地晉之東雖曰牛繼馬後終爲守司馬氏之祀亦百有餘年盖秦隋毒流四海天實誅之晉之八王擅兵孽后盜政皆本於惠帝昏蒙非得罪於民故其亡也與秦隋獨異上官桀漢上官桀爲未央廏令武帝甞體不安及愈見馬馬多瘦上大怒令以我不復見馬邪欲下吏桀頓首曰臣聞聖體不安日夜憂懼意誠不在馬言未卒泣數行下上以爲忠由是親近至於受遺詔輔少主義縱爲右内史上幸鼎湖病乆巳而卒起幸甘泉道不治上怒曰縱以我爲不行此道乎銜之遂坐以它事弃市二人者其始獲罪一也桀以一言之故超用而縱及誅可謂幸不幸矣金日磾金日磾没入宮輸黃門養馬武帝㳺宴見馬後宮滿側日磾等數十人牽馬過殿下莫不竊視至日磾獨不敢日磾容皃甚嚴馬又肥好上竒焉即日拜爲馬監後受遺輔政日磾與上官桀皆因馬而受知武帝之取人可謂明而不遺矣漢宣帝忌昌邑玉漢廢昌邑王賀而立宣帝賀居故國帝心内忌之賜山陽太守張敞璽書戒以謹備盜賊敞條奏賀居處著其廢亡之効上知賀不足忌始封爲列侯光武廢太子彊爲東海王而立顯宗顯宗即位待彊彌厚宣顯皆雜霸道治尚剛嚴獨此事顯優於宣多矣平津侯公孫平津本傳稱其意忌内深殺主父偃徙董仲舒皆其力然其可稱者兩事武帝置蒼海朔方之郡平津數諌以爲罷弊中國以奉無用之地願罷之上使朱買臣等難之乃謝曰山東鄙人不知其便若是願罷西南夷專奉朔方上乃許之卜式上書願輸家財助邊盖迎合主意上以語平津對曰此非人情不軌之臣不可以爲化而亂法願勿許乃罷式當武帝好大喜功而能如是㮣之後丗足以爲賢相矣惜不以式事載本傳中韓信周瑜丗言韓信伐趙趙廣武君請以竒兵塞井陘口絶其糧道成安君不聽信使間人窺知其不用廣武君䇿還報則大喜乃敢引兵遂下遂勝趙使廣武計行信且成禽信盖自言之矣周瑜拒曹公於赤壁部將黃盖獻火攻之䇿會東南風急悉燒操舡軍遂敗使天無大風黃盖不進計則瑜未必勝是二說者皆不善觀人者也夫以韓信敵陳餘猶以猛虎當羊豕爾信與漢王語請北舉燕趙正使井陘不得進必有它竒䇿矣其與廣武君言曰向使成安君聽子計僕亦禽矣盖謙以求言之詞也方孫權問計於周瑜瑜巳言操冒行四患將軍禽之冝在今日劉備見瑜恨其兵少瑜曰此自足用豫州但觀瑜破之正使無火攻之說其必有以制勝矣不然何以爲信瑜漢武賞功明白衛青爲大將軍霍去病始爲校尉以功封侯青失兩將軍亡翕侯功不多不益封其後各以五萬騎深入去病益封五千八百户禆校封侯益邑者六人而青不得益封吏卒無封者武帝賞功必視法如何不以貴賤爲髙下其明白如此後丗處此必曰青乆爲上將俱出塞致命正不厚賞亦當有以尉其心不然它日無以使人盖失之矣周召房杜召公爲保周公爲師相成王爲左右觀此二相則刑措四十年頌聲作于下不言可知唐正觀三年二月房元齡爲左僕射杜如晦爲右僕射魏證參預朝政觀此三相則三百年基業之盛槩可見矣三代書同文三代之時天下書同文故春秋左氏所載人名字不以何國大氐皆同鄭公子歸生魯公孫歸父蔡公孫歸生楚仲歸齊析歸父皆字子家楚成嘉鄭公子嘉皆字子孔鄭公孫叚印叚宋禇師叚皆字子石鄭公子喜宋樂喜皆字子罕楚公子黒肱鄭公孫黒孔子弟子狄黒皆字子晢魯公子翬鄭公孫揮皆字子羽邾子克楚鬪克周王子克宋司馬之臣克皆字曰儀晉籍偃荀偃鄭公子偃吴言偃皆字曰㳺晉羊舌赤魯公西赤皆字曰華楚公子側魯孟之側皆字曰反魯冉耕宋司馬耕皆字曰牛顔無繇仲由皆字曰路周丗中國地成周之丗中國之地最狹以今地里考之吴越楚蜀閩皆爲蠻淮南爲羣舒秦爲戎河北眞定中山之境乃鮮虞肥鼔國河東之境有赤狄甲氏留吁鐸辰潞國洛陽爲王城而有楊拒泉皐蠻氏陸渾伊雒之戎京東有萊牟介莒皆夷也𣏌都雍丘今汴之屬邑亦用夷禮邾近於魯亦曰夷其中國者獨晉衞齊魯宋鄭陳許而巳通不過數十州盖於天下特五分之一耳李後主梁武帝東坡書李後主去國之詞云最是蒼皇辤廟日教坊猶奏别離歌揮淚對宫娥以爲後主失國當慟哭於廟門之外謝其民而後行乃對宫娥聽樂形於詞句予觀梁武帝啓侯景之禍塗炭江左以致覆亡乃曰自我得之自我失之亦復何恨其不知罪巳亦甚矣竇嬰救灌夫其夫人諌止之嬰曰侯自我得之自我捐之無所恨梁武用此言而非也詩什詩二雅及頌前三卷題曰某詩之什陸德明釋云歌詩之作非止一人篇數旣多故以十篇編爲一卷名之爲什今人以詩爲篇什或稱譽它人所作爲佳什非也易舉正唐蘇州司户郭京有周易舉正三卷云曽得王輔嗣韓康伯手冩注定傳授眞本比校今丗流行本及國學郷貢舉人等本或將經入注用注作經小象中間以下句反居其上爻辭注内移後義却處於前兼有脫遺兩字顚倒謬誤者並依定本舉正其訛凡一百三節今略取其明白者二十處載於此坤初六履霜堅氷至象曰履霜隂始凝也馴致其道至堅氷也今本於象文霜字下誤増堅氷二字屯六三象曰即鹿無虞何以從禽也今本脫何字師六五田有禽利執之无咎元本之字行書向下引脚稍類言字轉冩相仍故誤作言觀注義亦全不作言字釋也比九五象曰失前禽舎逆取順也今本誤倒其句賁亨不利有攸往今本不字誤作小字剛柔交錯天文也文明以止人文也注云剛柔交錯而成文焉天之文也今本脫剛柔交錯一句坎卦習坎上脫坎字姤九四包失魚注二有其魚故失之也今本誤作无魚蹇九三往蹇來正今本作來反困初六象曰入于幽谷不明也今本谷字下多幽字鼎彖聖人亨以享上帝以養聖賢注云聖人用之上以享上帝而下以養聖賢今本正文多而大亨三字故注文亦誤増大亨二字震彖曰不喪匕鬯出可以守宗廟社稷以爲祭主也今本脫不喪匕鬯一句漸象曰君子以居賢德善風俗注云賢德以止巽則居風俗以止巽乃善今本正文脫風字豐九四象遇其夷主吉志行也今文脫志字中孚彖豚魚吉信及也今本及字下多豚魚二字小過彖柔得中是以可小事也今本脫可字而事字下誤增吉字六五象曰密雲不雨巳止也注陽巳止下故也今本正文作巳上故注亦誤作陽巳上故止也旣濟彖曰旣濟亨小小者亨也今本脫一小字繫辭二多譽四多懼注云懼近也今本誤以近也字爲正文而注中又脫懼字雜卦蒙稚而著今本稚誤作雜字予頃於福州道藏中見此書而傳之及在後省見晁公武所進易解多引用之丗罕有其書也其惟聖人乎乾卦其惟聖人乎魏王肅本作愚人後結句始作聖人見陸德明釋文易說卦易說卦荀爽九家集解乾爲木果之下更有四曰爲龍爲車爲衣爲言坤後有八曰爲牝爲迷爲方爲囊爲裳爲黃爲帛爲漿震後有三曰爲王爲鵠爲鼔巽後有二曰爲楊爲鸛坎後有八曰爲宫爲律爲可爲棟爲叢棘爲狐爲蒺藜爲桎梏離後有一曰爲牝牛艮後有三曰爲鼻爲虎爲狐兌後有二曰爲常爲輔頰注云常西方神也陸德明以其與王弼本不同故載於釋文案震爲龍與乾同故虞翻干寶本作駹元二之災後漢鄧騭傳拜爲大將軍時遭元二之災人士飢荒死者相望盜賊羣起四夷侵畔章懷注云元二即元元也古書字當再讀者即於上字之下爲小二字言此字當兩度言之後人不曉遂讀爲元二或同之陽九或附之百六良由不悟致斯乖舛今歧州石敱銘凡重言者皆爲二字明驗也漢碑有楊孟文石門頌云中遭元二西夷虐殘孔耽碑云遭元二轗軻人民相食趙明誠金石跋云若讀爲元元不成文理疑當時自有此語漢注未必然也案王充論衡恢國篇云今上嗣位元二之間嘉德布流三年零陵生芝草四年甘露降五縣五年芝復生六年黃龍見盖章帝時事考之本紀所書建初三年以後諸瑞皆同則知所謂元二者謂建初元年二年也旣稱嘉德布流以致祥瑞其爲非災眚之語益可决疑安帝永初元年二年先零滇羌㓂叛郡國地震大水鄧騭以二年十一月拜大將軍則知所謂元二者謂永初元年二年也凡漢碑重文不皆用小二字豈有范史一部唯獨一處如此予兄丞相作隷釋論之甚詳予脩國史日撰欽宗紀賛用靖康元二之禍實本于此聖人汙孟子曰宰我子貢有若智足以知聖人汙不至阿其所好趙𡵨注云三人之智足以識聖人汙下也言三人雖小汙不平亦不至於其所好阿私所愛而空譽之詳其文意足以識聖人是一句汙下也自是一節盖以下字訓汙也其義明甚而老蘇先生乃作一句讀故作三子知聖人汙論謂三子之智不足以及聖人髙深幽絶之境徒得其下焉耳此說竊謂不然夫謂夫子賢於堯舜自生民以來未有可謂大矣猶以爲汙下何哉程伊川云有若等自能知夫子之道假使汙下必不爲阿好而言其說正與趙氏合大抵漢人釋經子或省去語助如鄭氏箋毛詩奄觀銍艾云奄乆觀多也盖以乆訓奄以多訓觀近者黃啓宗有補禮部韻略於淹字下添奄字注云乆勸也亦是誤以箋中五字爲一句廿卉􅞀字今人書二十字爲廿三十字爲卉四十爲􅞀皆說文本字也廿音入二十并也卉音先合反三十之省便古文也􅞀音先立反數名今直以爲四十字案秦始皇凡刻石頌德之辭皆四字一句泰山辭曰皇帝臨位二十有六年琅邪臺頌曰維二十六年皇帝作始之罘頌曰維二十九年時在中春東觀頌曰維二十九年皇帝春㳺會稽頌曰德惠脩長三十有七年此史記所載每稱年者輒五字一句甞得泰山詞石本乃書爲廿有六年想其餘皆如是而太史公誤易之或後人傳冩之訛耳其實四字句也字省文今人作字省文以禮爲礼以處爲処以與爲与凡章奏及程文書冊之類不敢用然其實皆說文本字也許叔重釋礼字云古文処字云止也得几而止或從處与字云賜予也与與同然則當以省文者爲正負劒辟咡曲禮記童子事曰負劒辟咡詔之鄭氏注云負謂置之於背劒謂挾之於旁辟咡詔之謂傾頭與語口旁曰咡歐陽公作其父瀧岡阡表云回顧乳者劒汝而立于旁正用此義今廬陵石刻由存衢州所刋六一集巳得其眞或者不曉遂易劒爲抱可歎也國初人至誠眞宗時并州謀帥上謂輔臣曰如張齊賢温仲舒皆可任但以其甞歷樞近或有固辤冝召至中書詢問願往則授之及召二人至齊賢辤以恐爲人所讒仲舒曰非敢有辤但在尚書班巳十年若得改官端揆賜都部署添給敢不承命輔臣以聞上曰是皆不欲往也勿彊之王元之自翰林學士以本官刑部郎中知黃州遣其子嘉祐獻書于中書門下以爲朝廷設官進退必以禮一失錯置咎在廊廟某一任翰林學士三任制誥舎人以國朝舊事言之或得給事中或得侍郎或爲諌議大夫某獨異於斯斥去不轉一級與錢榖俗吏混然無别執政不言人將安仰予謂仲舒甞爲二府至於自求遷轉及増請給元之一代剛正名臣至於公移牋書引例乞轉唯其至誠不矯僞故也後之人外爲大言避寵辤禄而隂有營求失其本真者多矣風俗使然也史館玉牒所國朝熙寧以前祕書省無著作局故置史館設脩撰直館之職元豐官制行有祕書官則其職歸於監少及著作郎佐矣而紹興中復置史館脩撰檢討是與本省爲二也宗正寺脩玉牒官亦然官制旣行其職歸於卿丞矣而紹興中復差侍從爲脩牒又以它官兼檢討是與本寺爲二也然則今有户部可别置三司有吏刑部可别置審官審刑院矣又玉牒舊制每十年一進謂甲子歳進書則甲戍甲申歳復然今乃從建隆以來再行補脩毎及十年則一進以故不過三二年輒一行賞書局僣賞此最甚焉稗沙門寶積經說僧之無行者曰譬如麥田中生稗麥其形似麥不可分别爾時田夫作如是念謂此稗麥盡是好麥後見穟生爾乃知非如是沙門在於衆中似是持戒有德行者施主見時謂盡是沙門而彼癡人實非沙門是名稗沙門此喻甚佳而文士鮮曽引用聊志於此容齋隨筆卷第五
