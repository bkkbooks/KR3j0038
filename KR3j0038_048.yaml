body:
  text: 容齋三筆卷第十二眄泰秋娘三女白樂天鷰子樓詩序云徐州故張尚書有愛妓曰眄眄善歌舞稚多風態尚書旣殁彭城有舊第第中有小樓名鷰子眄眄念舊愛而不嫁居是樓十餘年幽獨塊然白公嘗識之感舊游作三絶句首章云滿䆫明月滿簾霜𬒳冷燈殘拂卧牀鷰子樓中霜月苦秋來只爲一人長末章云今春有客洛陽回曽到尚書冡上來見說白楊堪作柱爭教紅粉不成灰讀者傷惻劉夣得泰娘歌云泰娘本韋尚書家主謳者尚書爲呉郡得之誨以琵琶使之歌且舞携歸京師尚書薨出居民間爲蘄州刺史張愻所得愻謫居武陵而卒泰娘無所歸地荒且逺無有能知其容與藝者故日抱樂器而哭劉公爲歌其事云繁華一旦有消歇題劒無光履聲絶蘄州刺史張公子白顔魯公祠堂詩予家藏雲林繪監冊有顔魯公畫象徐師川題詩曰公生開元間壯及天寳亂捐軀范陽胡竟死蔡州叛其賢似魏證天下非正觀四帝數十年一身逢百難少時讀書史此事心巳斷老來鬢髪衰慨歎功名晚嗟哉忠義途捷去不可緩𥘉無當年悲只令後世歎一朝絶霖雨南畒常亢旱小夫計雖得斯民蓋塗炭長歌詠君節千載勇夫愞敬書張紳庶幾古人半師川以詩鳴江西然此篇不爲工嘗記李德逺舉似童敏德游湖州題公祠堂長句曰挂㠶一縱疾於鳥長興發呉興暁杖藜上訪魯公祠一見目明心皦皦未說邦人懷使君且爲前古惜忠臣德宗更用盧𣏌相出當斯世誠艱辛生逆龍鱗死虎口要與乃兄同不朽狂童希烈何足罪姦邪嫉忠假渠手乃知成仁或殺身保身不必皆哲人此公安得世復有洗空凡馬須騏驎童之詩語意皆超拔亦臨川人而終身不得仕爲可惜也閔子不名論語所記孔子與人語及門弟子并對其人問荅皆斥其名未有稱字者雖顔冉高弟亦曰回曰雍唯至閔子獨云子騫終此書無指名昔賢謂論語出於曽子有子之門人予意亦出於閔氏觀所言閔子侍側之辭與冉有子貢子路不同則可見矣曽晳待子不慈傳記所載曽晳待其子參不慈至云因鉏菜誤傷瓜以大杖擊之仆地孔子謂參不能如虞舜小杖則受大杖則避以爲䧟父於不義戒門人曰參來勿内予切疑無此事殆戰國時學者妄爲之辭且曽晳與子路冉有公西華侍坐有浴乎沂風乎舞雩之言涵泳聖教有超然獨見之妙於四人之中獨蒙吾與之襃則其爲人之賢可知矣有子如此而幾寘之死地庸人且猶不忍而謂晳爲之乎孟子稱曽子養曽晳酒肉養志未嘗有此等語也具圎復詩吳僧法具字圎復有能詩聲予乃紀之於夷堅志中殊爲不類比於福州僧智恢處見其詩藁一紙字體効王荆公其送僧一篇云灘聲嘈嘈雜雨聲舍北舎南春水平拄杖穿花出門去五湖風浪白鷗輕送翁士特云朝入羊腸暮鹿頭十三官驛是荆州具車秣馬暁將發寒燭燒殘語未休竹軒云老竹排簷誰手種山日未斜寒翠重六月散髮葉底眠冷雨斜風頻入夢冬凋峰木雪縞廬落眼青青却笑渠花時吹笋排林上呉州還見竹溪圖和子蒼三馬圖云從來畫馬稱神妙至今只說江都王將軍曹霸實季仲沙苑丞相猶諸郎龍眠居士善畫馬獨與二子遥相望兩馬駢立眞驌驦一馬脫去仍騰驤浣花老人今已亡嗚呼三馬誰平章飽知畫肉亦畫骨妙處不減黄無雙又一篇云燒燈過了客思家獨立衡門數暝鴉燕子未歸梅落盡小䆫明月屬梨花皆可咀嚼也吳門僧惟茂住天台山一禪刹喜其旦暮見山作絶句曰四靣峯巒翠入雲一溪流水漱山根老僧只恐山移去日午先教掩寺門甚有詩家風旨而或者謂山若欲去豈容人掩住蓋呉人癡獃習氣也其說可謂不知音人當知足予年過七十法當致仕紹熈之末以新天子臨御未敢遽有請故玉隆滿秩只以本官職居里鄕衮趙子直不忍使絶禄粟俾之因任方用贅食太倉爲愧而親朋謂予爵位不逮二兄以爲耿耿予誦白樂天𥘉授拾遺詩以語之曰奉詔登左掖束帶參朝議何言初命卑且脫風塵吏杜甫陳子昂才名括天地當時非不遇尚無過斯位其安分知足之意終身不渝因略考國朝以來名卿偉人負一時重望而不隮大用者如王黄州禹稱楊文公億李章武宗諤張乖崖詠孫宣公奭晁少保逈劉子儀筠宋景文祁范蜀公鎭鄭毅夫獬滕元發甫東坡先生范淳父祖禹曽子開肇彭器資汝礪劉原甫敞蔡君謨襄孫莘老覺近世汪彦章藻孫仲益覿諸公皆不過尚書學士或中年即世或遷謫流落或無田以食或無宅以居况若我忠宣公者尚忍言之則予之忝竊亦巳多矣淵明孤松淵明詩文率皆紀實雖寓興花竹間亦然歸去來辭云景翳翳以將入撫孤松而盤旋其飲酒詩二十首中一篇云青松在東園衆草没其姿凝霜殄異類卓然見高枝連林人不覺獨樹衆乃竒所謂孤松者是巳此意蓋以自况也饒州刺史饒州良牧守自吳至今以政績著者有九賢郡圃立祠以事此外知名者蓋鮮白樂天集有呉府君碑云君諱丹字眞存以進士第入官讀書數千卷著文數萬言生四五歳所作戯輙象道家法事旣冠喜道書奉眞籙每專氣入靜不粒食者數歳飄然有出世心旣壯在家爲長屬有三㓜弟八稚姪不忍見其飢寒慨然有干禄意求名得名家無長物澹乎自處與天和始終享壽命八十二歳無室家累無子孫憂終于饒州官次大略如此呉君在饒雖無遺事可紀以其邦君之故姑志於書吳爲人清凈恬寂所謂逹士然年過八十尚領郡符又非爲妻子計者良不可曉唐之治不播棄黎老故其居職不自以爲過云紫極觀鍾饒州紫極觀有唐鍾一口形製清堅非近世工鑄可比刻銘其上曰天寳九載歳次庚寅二月庚申朔十五日癸酉造通直郎前監察御史貶樂平貟外尉李逢年銘前鄕貢進士薛彦偉述序給事郎行參軍趙從一書中大夫使持節鄱陽郡諸軍事檢校鄱陽郡太守天水郡開國公上官經野妻扶風郡君韋氏奉爲開元天地大寳聖文神武應道皇帝敬造洪鍾一口其後列録事參軍司功司法司士參軍各一人司戸參軍二人參軍三人録事一人鄱陽縣令一人尉二人又專檢校官鄱陽縣丞宋守靜專檢校内供奉道士王朝隱又道士七人銘文亦雅潔字畫不俗但月朔庚申則癸酉日當是十四日鐫之金石而誤如此浮洲開福院亦有呉武義年一鍾然非此比也兼中書令紹熈五年十二月二十二日宣麻制除嗣秀王伯圭兼中書令此官乆不除學士大夫多不知本末至或疑爲當入都堂治事邸報至外郡尤所不曉考之典故侍中中書令爲兩省長官自唐以來居眞宰相之位而中令在侍中上肅宗以後始以處大將故郭子義僕固懷恩朱泚李晟韓弘皆爲之其在京則入政事堂然不預國事懿僖昭之時貟浸多率由平章事遷兼侍中繼兼中書令又遷守中書令三者均稱使相皆大勑繫銜而下書使字五代尤多國朝創業之𥘉尚仍舊貫於是呉越國王錢俶天雄節度符彦卿雄武王景武寜郭從義保大武行德成德郭崇昭義李筠淮南李重進永興李洪義鳯翔王彦超定難李彞興荆南高保融武平周行逢武寜王晏武勝侯章歸義曹元忠十五人同時兼中書令太宗朝唯除石守信而趙普以故相拜眞宗但以處親王嘉祐未除宗室東平王允弼襄陽王允良元豐中除曹佾與允弼允良相去十七八年爵秩固存沈括筆談謂有司以佾新命言自來不曽有活中書令請俸則例蓋妄也官制行改三使相並爲開府儀同三司元祐以後不復有之雖崇觀政宣輕用名器且改爲左輔右弼然蔡京三爲公相亦不敢居乾道中詔於録黄及告命内除去侍中中書令遂廢此官今當先降指揮復置則於事體尤愜當也嗣王終不敢當於是寢前命而賜贊拜不名作文字要點檢作文字不問工拙小大要之不可不著意點檢若一失事體雖遣詞超卓亦云未然前輩宗工亦有所不免歐陽公作仁宗御書飛白記云予將赴亳假道於汝隂因得閱書于子履之室而雲章爛然輝映日月爲之正冠肅容再拜而後敢仰視蓋仁宗皇帝之御飛白也曰此寳文閣之所藏也胡爲乎子之室乎曰曩者天子燕從臣于羣玉而賜以飛白予幸得預賜焉烏有記君上宸翰而彼此稱予且呼陸經之字又登眞觀御書閣記言太宗飛帛亦自稱予外制集序歷道慶曆更用大臣稱吕夷簡夏竦韓琦范仲淹冨弼皆斥姓名而曰顧予何人亦與其選又曰予時掌誥命又曰予方與修祖宗故事凡稱予者七東坡則不然爲王誨亦作此記其語云故太子少傅安簡王公諱舉正臣不及見其人矣云云是之謂知體侍從兩制國朝官稱謂大學士至待制爲侍從謂翰林學士中書舍人爲兩制言其掌行内外制也舍人官未至者則云知制誥故稱美之爲三字謂尚書侍郎爲六部長貳謂散騎常侍給事諌議爲大兩省其名稱如此今盡以在京職事官自尚書至權侍郎及學士待制均爲侍從蓋相承不深考耳予家藏王㳂春秋通義一書至和元年鄧州繳進二年有旨送兩制看詳於是具奏者十二人皆列名銜學士七人曰學士承旨禮部侍郎楊察翰林學士中書舍人趙槩楊偉刑部郎中胡宿吏部郎中歐陽脩起居舍人吕溱禮部郎中王洙知制誥五人曰起居舎人王珪右司諌賈黯兵部貟外郎韓絳起居舍人吳奎右正言劉敞而他官弗預此可見也翰林本以六貟爲額劉沆作相典領温成后喪事以王洙司其越禮建明於是貟外用之嘗爲一時言者所論正此時云片言解禍自古將相大臣遭罹譖毀觸君之怒墮身於危棘將死之域而以一人片言轉禍爲福蓋投機中的使聞之者曉然易寤然非遭値明主不能也蕭何爲民請上林苑中空地高祖大怒以爲多受賈人財物下何廷尉械繫之王衞尉曰陛下距楚數歳陳豨黥布反時相國守關中不以此時爲利乃利賈人之金乎上不懌即日赦出何絳侯周勃免相就國人上書告勃欲反廷尉逮捕勃治之薄太后謂文帝曰絳侯綰皇帝璽將兵於北軍不以此時反今居一小縣顧欲反邪帝即赦勃此二者可謂至危不容救而於立談間見効如此蕭望之受遺輔政爲許史恭顯所嫉奏望之與周堪劉更生朋黨請召致廷尉元帝不省爲下獄也可其奏巳而悟其非令出視事史高言上新即位未以德化聞於天下而先驗師傅旣下九卿大夫獄宜因決免於是免爲庶人髙祖文帝之明而受言元帝之昏而遂非於是可見忠言嘉謨楊子法言或問忠言嘉謨曰言合稷契謂之忠謨合臯陶謂之嘉如子雲之說則言之與謨忠之與嘉分而爲二傳注者皆未嘗爲之辭然則稷契不能嘉謨臯陶不能忠言乎三聖賢遺語可傳於後世者唯虞書存五篇之中臯陶天謨多矣稷與契𥘉無一話一言可考不知子雲何以立此論乎不若魏鄭公但云良臣稷契臯陶乃爲通論免直學士院慶元元年正月一日鄭湜以起居郎直學士院二月二十三日趙汝愚罷相制乃湜所草議者指爲襃詞太過二十五日有旨免兼直院或以爲故事所無案熈寜𥘉王益柔以知制誥兼直學士院嘗奏中書熟狀加董氊階官之誤宰相怒其不申堂用他事罷其兼直已而遷龍圖閣直學士湜亦以罷直求去不許越三月而遷權刑部侍郎甚相類也大賢之後杜詩云大賢之後竟陵遲蕩蕩古今同一體乃贈狄梁公曽孫者至云飄泊岷漢干謁王侯則其衰微可知矣近見餘干寓客李氏子云本朝三李相文正公昉文靖公沆文定公迪皆一時名宰子孫亦相繼逹宦然數世之後益爲蕭條又經南渡之厄今三裔並居餘干無一人在仕版文定濮州之族今有居越者雖曰不顯猶簪纓僅傳而文正文靖無聞可爲太息容齋三筆卷第十二終
