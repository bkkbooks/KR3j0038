body:
  text: 容齊三筆卷第十二眄泰秋娘三女白樂天燕子樓詩序云徐州故張尚書有愛妓曰眄眄善歌舞稚多風態尚書既殁彭城有舊第第中有小樓名燕子眄眄念舊愛而不嫁居是樓十餘年幽獨塊然白公嘗識之感舊游作三絶句首章云滿窗明月滿簾霜𬒳冷燈殘拂卧牀燕子樓中霜月苦秋來只為一人長末章云今春有客洛陽回曽到尚書冡上來見說白楊堪作柱爭教紅粉不成灰讀者傷惻劉夢得泰娘歌云泰娘本韋尚書家主謳者尚書為吳郡得之誨以琵琶使之歌且舞携歸京師尚書薨出居民間為蘄州刺史張遜所得遜謫居武陵而卒泰娘無所歸地荒且逺無有能知其容與藝者故日抱樂器而哭劉公為歌其事云繁華一旦有消歇題劒無光履聲絶蘄州刺史張公子白顔魯公祠堂詩豫家藏雲林繪監冊有顔魯公畫象徐師川題詩曰公生開元間壯及天寶亂捐軀范陽胡竟死蔡州叛其賢似魏證天下非正觀四帝數十年一身逢百難少時讀書史此事心巳斷老來鬢髮衰慨歎功名晚嗟哉忠義途捷去不可緩𥘉無當年悲只令後世歎一朝絶霖雨南畒常亢旱小夫計雖得斯民蓋塗炭長歌詠君節千載勇夫愞敬書張紳庶幾古人半師川以詩鳴江西然此篇不為工嘗記李德逺舉似童敏德游湖州題公祠堂長句曰挂帆一縱疾於鳥長興發吳興曉杖藜上訪魯公祠一見目明心皎皎未說邦人懷使君且為前古惜忠臣德宗更用盧𣏌相出當斯世誠艱辛生逆龍鱗死虎口要與乃兄同不朽狂童希烈何足罪姦邪嫉忠假渠手乃知成仁或殺身保身不必皆哲人此公安得世復有洗空凡馬須騏驎童之詩語意皆超拔亦臨川人而終身不得仕為可惜也閔子不名論語所記孔子與人語及門弟子并對其人問答皆斥其名未有稱字者雖顔冉高弟亦曰回曰雍唯至閔子獨云子騫終此書無指名昔賢謂論語出於曽子有子之門人豫意亦出於閔氏觀所言閔子侍側之辭與冉有子貢子路不同則可見矣曽晳待子不慈傳記所載曽晳待其子參不慈至云因鉏菜誤傷瓜以大杖擊之仆地孔子謂參不能如虞舜小杖則受大杖則避以為陷父於不義戒門人曰參來勿內豫切疑無此事殆戰國時學者妄為之辭且曽晳與子路冉有公西華侍坐有浴乎沂風乎舞雩之言涵泳聖教有超然獨見之妙於四人之中獨蒙吾與之褒則其為人之賢可知矣有子如此而幾置之死地庸人且猶不忍而謂晳為之乎孟子稱曽子養曽晳酒肉養志未嘗有此等語也具圎復詩吳僧法具字圎復有能詩聲豫乃紀之於夷堅志中殊為不類比於福州僧智恢處見其詩藁一紙字體效王荆公其送僧一篇云灘聲嘈嘈雜雨聲舍北舍南春水平拄杖穿花出門去五湖風浪白鷗輕送翁士特云朝入羊腸暮鹿頭十三官驛是荆州具車秣馬曉將發寒燭燒殘語未休竹軒云老竹排簷誰手種山日未斜寒翠重六月散髮葉底眠冷雨斜風頻入夢冬凋峰木雪縞廬落眼青青却笑渠花時吹笋排林上吳州還見竹溪圖和子蒼三馬圖云從來畫馬稱神妙至今只說江都王將軍曹霸實季仲沙苑丞相猶諸郎龍眠居士善畫馬獨與二子遙相望兩馬駢立真驌驦一馬脫去仍騰驤浣花老人今已亡嗚呼三馬誰平章飽知畫肉亦畫骨妙處不減黃無雙又一篇云燒燈過了客思家獨立衡門數暝鴉燕子未歸梅落盡小窗明月屬梨花皆可咀嚼也吳門僧惟茂住天台山一禪剎喜其旦暮見山作絶句曰四靣峯巒翠入雲一溪流水漱山根老僧只恐山移去日午先教掩寺門甚有詩家風旨而或者謂山若欲去豈容人掩住蓋吳人癡呆習氣也其說可謂不知音人當知足豫年過七十法當致仕紹熙之末以新天子臨御未敢遽有請故玉隆滿秩只以本官職居里鄉衮趙子直不忍使絶祿粟俾之因任方用贅食太倉為愧而親朋謂豫爵位不逮二兄以為耿耿豫誦白樂天𥘉授拾遺詩以語之曰奉詔登左掖束帶參朝議何言初命卑且脫風塵吏杜甫陳子昂才名括天地當時非不遇尚無過斯位其安分知足之意終身不渝因略考國朝以來名卿偉人負一時重望而不隮大用者如王黃州禹稱楊文公億李章武宗諤張乖崖詠孫宣公奭朝少保逈劉子儀筠宋景文祁范蜀公鎮鄭毅夫獬滕元發甫東坡先生范淳父祖禹曽子開肇彭器資汝礪劉原甫敞蔡君謨襄孫莘老覺近世汪彥章藻孫仲益覿諸公皆不過尚書學士或中年即世或遷謫流落或無田以食或無宅以居况若我忠宣公者尚忍言之則豫之忝竊亦巳多矣淵明孤松淵明詩文率皆紀實雖寓興花竹間亦然歸去來辭云景翳翳以將入撫孤松而盤旋其飲酒詩二十首中一篇云青松在東園衆草沒其姿凝霜殄異類卓然見高枝連林人不覺獨樹衆乃竒所謂孤松者是巳此意蓋以自况也饒州刺史饒州良牧守自吳至今以政績著者有九賢郡圃立祠以事此外知名者蓋鮮白樂天集有吳府君碑云君諱丹字真存以進士第入官讀書數千卷著文數萬言生四五歲所作戲輒象道家法事既冠喜道書奉真籙每專氣入靜不粒食者數歲飄然有出世心既壯在家為長屬有三幼弟八稚姪不忍見其飢寒慨然有干祿意求名得名家無長物淡乎自處與天和始終享壽命八十二歲無室家纍無子孫憂終于饒州官次大略如此吳君在饒雖無遺事可紀以其邦君之故姑志於書吳為人清淨恬寂所謂逹士然年過八十尚領郡符又非為妻子計者良不可曉唐之治不播棄黎老故其居職不自以為過云紫極觀鍾饒州紫極觀有唐鍾一口形製清堅非近世工鑄可比刻銘其上曰天寶九載歲次庚寅二月庚申朔十五日癸酉造通直郎前監察御史貶樂平貟外尉李逢年銘前鄉貢進士薛彥偉述序給事郎行參軍趙從一書中大夫使持節鄱陽郡諸軍事檢校鄱陽郡太守天水郡開國公上官經野妻扶風郡君韋氏奉為開元天地大寶聖文神武應道皇帝敬造洪鍾一口其後列録事參軍司功司法司士參軍各一人司戶參軍二人參軍三人録事一人鄱陽縣令一人尉二人又專檢校官鄱陽縣丞宋守靜專檢校內供奉道士王朝隱又道士七人銘文亦雅潔字畫不俗但月朔庚申則癸酉日當是十四日鐫之金石而誤如此浮洲開福院亦有吳武義年一鍾然非此比也兼中書令紹熙五年十二月二十二日宣麻制除嗣秀王伯圭兼中書令此官久不除學士大夫多不知本末至或疑為當入都堂治事邸報至外郡尤所不曉考之典故侍中中書令為兩省長官自唐以來居真宰相之位而中令在侍中上肅宗以後始以處大將故郭子義僕固懷恩朱泚李晟韓弘皆為之其在京則入政事堂然不預國事懿僖昭之時貟浸多率由平章事遷兼侍中繼兼中書令又遷守中書令三者均稱使相皆大勑繫銜而下書使字五代尤多國朝創業之𥘉尚仍舊貫於是吳越國王錢俶天雄節度符彥卿雄武王景武寧郭從義保大武行德成德郭崇昭義李筠淮南李重進永興李洪義鳯翔王彥超定難李彞興荆南高保融武平周行逢武寧王晏武勝侯章歸義曹元忠十五人同時兼中書令太宗朝唯除石守信而趙普以故相拜真宗但以處親王嘉祐未除宗室東平王允弼襄陽王允良元豐中除曹佾與允弼允良相去十七八年爵秩固存沈括筆談謂有司以佾新命言自來不曽有活中書令請俸則例蓋妄也官制行改三使相並為開府儀同三司元祐以後不復有之雖崇觀政宣輕用名器且改為左輔右弼然蔡京三為公相亦不敢居乾道中詔於録黃及告命內除去侍中中書令遂廢此官今當先降指揮復置則於事體尤愜當也嗣王終不敢當於是寢前命而賜贊拜不名作文字要點檢作文字不問工拙小大要之不可不著意點檢若一失事體雖遣詞超卓亦云未然前輩宗工亦有所不免歐陽公作仁宗御書飛白記云豫將赴亳假道於汝隂因得閲書于子履之室而雲章爛然輝映日月為之正冠肅容再拜而後敢仰視蓋仁宗皇帝之御飛白也曰此寶文閣之所藏也胡為乎子之室乎曰曩者天子燕從臣于羣玉而賜以飛白豫幸得預賜焉烏有記君上宸翰而彼此稱豫且呼陸經之字又登真觀御書閣記言太宗飛帛亦自稱豫外制集序歷道慶曆更用大臣稱吕夷簡夏竦韓琦范仲淹冨弼皆斥姓名而曰顧豫何人亦與其選又曰豫時掌誥命又曰豫方與修祖宗故事凡稱豫者七東坡則不然為王誨亦作此記其語云故太子少傅安簡王公諱舉正臣不及見其人矣云云是之謂知體侍從兩制國朝官稱謂大學士至待制為侍從謂翰林學士中書舍人為兩制言其掌行內外制也舍人官未至者則云知制誥故稱美之為三字謂尚書侍郎為六部長二謂散騎常侍給事諌議為大兩省其名稱如此今盡以在京職事官自尚書至權侍郎及學士待制均為侍從蓋相承不深考耳豫家藏王㳂春秋通義一書至和元年鄧州繳進二年有旨送兩制看詳於是具奏者十二人皆列名銜學士七人曰學士承旨禮部侍郎楊察翰林學士中書舍人趙槩楊偉刑部郎中胡宿吏部郎中歐陽修起居舍人吕溱禮部郎中王洙知制誥五人曰起居舍人王圭右司諌賈黯兵部貟外郎韓絳起居舍人吳奎右正言劉敞而他官弗預此可見也翰林本以六貟為額劉沆作相典領溫成后喪事以王洙司其越禮建明於是貟外用之嘗為一時言者所論正此時云片言解禍自古將相大臣遭罹譖毀觸君之怒墮身於危棘將死之域而以一人片言轉禍為福蓋投機中的使聞之者曉然易寤然非遭值明主不能也蕭何為民請上林苑中空地高祖大怒以為多受賈人財物下何廷尉械繫之王衛尉曰陛下距楚數歲陳豨黥布反時相國守關中不以此時為利乃利賈人之金乎上不懌即日赦出何絳侯周勃免相就國人上書告勃欲反廷尉逮捕勃治之薄太后謂文帝曰絳侯綰皇帝璽將兵於北軍不以此時反今居一小縣顧欲反邪帝即赦勃此二者可謂至危不容救而於立談間見效如此蕭望之受遺輔政為許史恭顯所嫉奏望之與周堪劉更生朋黨請召致廷尉元帝不省為下獄也可其奏巳而悟其非令出視事史高言上新即位未以德化聞於天下而先驗師傅既下九卿大夫獄宜因決免於是免為庶人髙祖文帝之明而受言元帝之昏而遂非於是可見忠言嘉謨楊子法言或問忠言嘉謨曰言合稷契謂之忠謨合臯陶謂之嘉如子雲之說則言之與謨忠之與嘉分而為二傳注者皆未嘗為之辭然則稷契不能嘉謨臯陶不能忠言乎三聖賢遺語可傳於後世者唯虞書存五篇之中臯陶天謨多矣稷與契𥘉無一話一言可考不知子雲何以立此論乎不若魏鄭公但云良臣稷契臯陶乃為通論免直學士院慶元元年正月一日鄭湜以起居郎直學士院二月二十三日趙汝愚罷相制乃湜所草議者指為褒詞太過二十五日有旨免兼直院或以為故事所無案熙寧𥘉王益柔以知制誥兼直學士院嘗奏中書熟狀加董氊階官之誤宰相怒其不申堂用他事罷其兼直已而遷龍圖閣直學士湜亦以罷直求去不許越三月而遷權刑部侍郎甚相類也大賢之後杜詩云大賢之後竟陵遲蕩蕩古今同一體乃贈狄梁公曽孫者至云飄泊岷漢干謁王侯則其衰微可知矣近見餘干寓客李氏子云本朝三李相文正公昉文靖公沆文定公迪皆一時名宰子孫亦相繼逹宦然數世之後益為蕭條又經南渡之厄今三裔並居餘干無一人在仕版文定濮州之族今有居越者雖曰不顯猶簪纓僅傳而文正文靖無聞可為太息容齊三筆卷第十二終
