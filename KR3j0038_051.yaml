body:
  text: 容齋三筆卷第十五十八則内職命詞内庭婦職遷叙皆出中旨至中書命詞如尚書内省官固知其爲長年習事如司字典字掌字知其爲主守之微者至於紅紫霞帔郡國夫人則其年齡之長少爵列之崇􅋻無由可以測度紹興二十八年九月仲兄以左史直前奏事時兼權中書舍人高宗聖訓云有一事待與卿說昨有宫人宫正者封夫人乃宫中管事人六十餘歳非是嬪御恐卿不知兄奏云係王剛中行詞剛中除蜀帥係臣書黄容臣别撰入上頷首後四日經筵留身奏事奏言前日靣蒙宣諭永嘉郡張夫人告詞旣得聖旨即時傳旨三省欲别撰進昨日宰臣傳聖旨令不須别撰上曰乃皇后閤中老管事人今六十六歳宫正乃執事者昨日宰執奏欲換告亦無妨礙不須别進今已年老多病但欲得稱呼耳蓋昨訓詞中稱其容色云蔡京除吏唐天寳之季楊國忠以右相兼吏部尚書大集選人注擬於私第故事注官訖過門下侍中給事中國忠呼左相陳希烈於座隅給事中在列曰旣對注擬過門下了矣吏部侍郎二人與郎官同咨事趨走於前國忠誇謂諸妹曰兩箇紫袍主事何如史䇿書此以見國忠顓政舞權也然猶令侍中給事同坐以明非矯若蔡京之盗弄威柄則又過之政和中以太師領三省事得治事于家弟卞以開府在經筵嘗挾所親將仕郎吳說往見坐于便室設一卓陳筆硯置玉版紙闊三寸者數十片于上卞言常州教授某人之淹滯曰自初登科作教官今巳朝奉郎尚未脫故職京問何以處之卞曰須與一提學京取一紙書其姓名及提舉學事字而缺其路分顧曰要何處卞曰其家極貧非得俸入優厚處不可於是書河北西路字付老兵持出俄别有一兵齎一雙緘及紫匣來乃福建轉運判官直龍圖閣鄭可簡以新茶獻即就可漏上書祕撰運副四字授之卞方語及吳說曰是安中司諌之子頗能自立且王逢原外孫與舒王夫人姻眷其母老欲求一見闕省局京問吳曽踏逐得未對曰打套局適缺又書一紙付出少頃卞目吳使先退呉之從姊嫁門下侍郎薛昻因館其家才還舎具以告昻歎所見除目之迅速昻曰此三者巳節次書黄矣始知國忠猶落第二義也題先聖廟詩兖州先聖廟壁嘗有題詩者云靈光殿古生秋草曲阜城荒噪晚鴉惟有孔林殘照日至今猶屬仲尼家不顯姓名頗爲士大夫傳誦予頃在福州於吕虚已處見邵武上官校書詩一冊内一篇題爲州西行州西者蔡京所居處也注云靖康元年作時京謫湖湘子孫分竄外郡所居第摧毀索寞殆無人跡故爲古調以傷之凡三十餘韻今但記其末聮云君不見喬木參天獨樂園至今仍是温公宅其意甚與前相類紹興二十五年冬秦檜死空其賜宅明年開河役夫輦泥土堆于墻下天台士人左君作詩云格天閣在人何在偃月堂深恨亦深不見洛陽圖白髮但知郿塢積黄金直言動便遭羅織舉目寜知有照臨炙手附炎俱不見可憐泥滓滿墻隂語雖紀實然太露䈥骨不若前兩章渾成也左頗有才最善謔二十八年楊和王之子偰除權工部侍郎時張循王之子子顔子正皆帶集英脩撰且進待制矣㑹葉審言自侍御史楊元老自給事中徙爲吏兵侍郎蓋以繳論之故左用歇後語作絶句曰木易巳爲工部侍弓長肯作集英脩如今臺省無楊葉豚犬超陞卒未休左居西湖上好事請謁人或畏其口後竟終於布衣季文子魏獻公擬人必於其倫後世之說也古人則不然魯季文子出一莒僕而歷引舜舉十六相去四㐫曰舜有大功二十而爲天子今行父雖未獲一吉人去一㐫矣於舜之功二十之一也晉魏獻子爲政以其子戊爲梗陽大夫謂成􅡈曰吾與戊也縣人其以我爲黨乎􅡈誦大雅文王克明克類克長克君克順克比于文王之句而以爲九德不愆勤施無私曰類擇善而從之曰比言主之舉也近文德矣且季孫行父之視舜魏舒之視文王何啻天壤之不侔而行父以自比舒受人之䛕不以爲嫌乃知孟子所謂顔淵曰舜何人也予何人也有爲者亦若是非過論也尊崇聖字自孔子贊易孟子論善信之前未甚以聖爲尊崇雖詩書禮經所載亦然也書稱堯舜之德但曰聦明文思欽明文思濬哲文明温恭允塞至益之對舜始有乃聖乃神之語洪範睿作聖與恭作肅從作乂明作哲聦作謀同列於五事其究但曰聖時風若咎證至以蒙爲對惟聖罔念作狂惟狂克念作聖則以狂與聖爲善悪之對也詩曰國雖靡止或聖或否則以聖與否爲對也下文或肅或謀或哲或艾蓋與五事略同人之齊聖不過飲酒温克而巳左傳八愷齊聖廣淵明允篤誠周官六德知仁聖義忠和皆混於諸字中了無所異以故魯以臧武仲爲聖人伯夷伊尹桞下惠皆曰聖而孟子以爲否媵字訓媵之義爲送春秋所書晉人衛人來媵皆送女也楚辭九章云波滔滔兮來迎魚鱗鱗兮媵予其義亦同周易咸卦象曰咸其輔頰舌滕口說也釋文云滕逹也九家皆作乗而鄭康成虞翻作媵而亦訓爲送云周禮奇字六經用字固亦間有奇古者然唯周禮一書獨多予謂前賢以爲此書出於劉歆歆常從楊子雲學作奇字故用以入經如法爲灋柄爲枋邪爲衰美爲􅍇呼爲嘑拜爲􅽊韶爲㲈怪爲傀暴爲虣獨爲簎風爲飌鮮爲鱻槁爲薧螺爲蠃蜱爲蠯魚爲䱷埋爲貍吹爲龡陔爲裓暗爲韽柝爲柝探爲撢趐爲翨摘爲硩駭爲駴擊爲轚辜爲橭掬爲輂羃爲榠藻爲薻􅉴爲原叩爲敂艱爲囏魅爲鬽與夫庮皫胖鱐齍眂劀酏㮚臡箈䰞柶絼疈爂㯺􅉧之類皆他經鮮用予前巳書之而不詳悉若考工記之字又不可勝載也大禹之書夏書五子之歌述大禹之戒其前三章是也禹之謨訓捨虞夏二書外他無所載漢藝文志雜家者流有大三十七篇云傳言禹所作其文以後世語命古禹字也意必依倣而作之者然亦周漢間人所爲今寂而無傳亦可惜也隨巢胡非子漢書藝文志墨家者流有隨巢子六篇胡非子三篇皆云墨翟弟子也二書今不復存馬揔意林所述各有一卷隨巢之言曰大聖之行兼愛萬民踈而不絕賢者欣之不肖者憐之賢而不欣是賤德也不肖不憐是忍人也又有鬼神賢於聖人之論其於兼愛明鬼爲墨之徒可知胡非之言曰勇有五等負長劒赴榛薄折兕豹搏熊羆此獵徒之勇也負長劒赴深淵折蛟龍搏黿鼉此漁人之勇也登髙危之上鵠立四望顔色不變此陶匠之勇也剽必刺視必殺此五刑之勇也齊威公以魯爲南境魯憂之曹劌匹夫之士一怒而劫萬乘之師存千乘之國此君子之勇也其說亦卑陬無過人處别國方言今世所傳楊子雲輶軒使者絶代語釋别國方言凡十三卷郭璞序而解之其末又有漢成帝時劉子駿與雄書從取方言及雄答書以予考之殆非也雄自序所爲文漢史本傳但云經莫大於易故作太玄傳莫大於論語作法言史篇莫善於倉頡作訓纂箴莫善於虞箴作州箴賦莫深於離騷反而廣之辭莫麗於相如作四賦雄平生所爲文盡於是矣𥘉無所謂方言漢蓺文志小學有訓纂一篇儒家有雄所序三十八篇注云太玄十九法言十三樂四箴二雜賦有雄賦十二篇亦不載方言觀其答劉子駿書稱蜀人嚴君平案君平本姓莊漢顯宗諱莊始改曰嚴法言所稱蜀莊沈㝠蜀莊之才之珍吾珍莊也皆是本字何獨至此書而曰嚴又子駿只從之求書而答云必欲脅之以威陵之以武則縊死以從命也何至是哉旣云成帝時子駿與雄書而其中乃云孝成皇帝反覆抵牾又書稱汝頴之間先漢人無此語也必漢魏之際好事者爲之云縱臾史記衡山王傳日夜從容王密謀反事漢書傳云日夜縱臾王謀反事如淳曰臾讀曰勇縱臾猶言勉強也顔師古曰縱音子勇反縱臾謂獎勸也楊雄方言云食閻慫慂勸也南楚凡已不欲喜而旁人說之不欲怒而旁人怒之謂之食閻亦謂之慫慂今禮部韻略收入漢注皆不引用揔持寺唐勑牒唐世符帖文書今存者亦少隆興府城内揔持寺有一碑其前一紙乾符三年洪州都督府牒僧仲暹次一紙中和五年監軍使帖僧神遇第三紙光啓三年十一月中書門下牒江西觀察使其後列銜者二十四人曰中書侍郎兼兵部尚書平章事杜遜能門下侍郎兼吏部尚書平章事孔緯此後檢校左僕射一人檢校司空二人檢校司徒八人檢校太保三人檢校太傅一人檢校太尉三人檢校太師一人皆帶平章事著姓太保兼侍中昭度不書韋字檢校太師兼侍中一人太師兼中書令一人皆不著姓捨杜孔韋三正相之外餘皆小書使字蓋使相也後又有節度使鍾傳兩牒字畫端勁有法如士人札翰今時臺省吏文不能及也嘉祐二年雒陽人職方貟外郎李上交來豫章東湖見所藏眞蹟爲辨之云二十一人者乃張濬朱玟李福李可舉李罕之陳敬瑄王處存王徽曹誠李康威李茂正王重榮楊守亮王鎔樂彦祺朱全忠張全義拓㧞思恭時溥王鐸高駢也而注云見僖宗紀及實録以予考之自三相及拓㧞樂彦祺時溥張濬朱全忠李茂正諸人外如李克用朱瑄王行瑜皆是時使相不應缺而朱玫王鐸王重榮李福皆巳死所謂太師中書令者史䇿不載唯陳敬瑄檢校此官而兼中令最後者其是歟它皆不復可究質矣禁旅遷補國朝宿衞禁旅遷補之制以歳月功次而遞進者謂之排連大禮後次年殿庭較藝乘輿臨軒曰推垜子其歳滿當去者隨其本資高者以正任團練使刺史補外州緫管鈐轄小者得州郡監當留者於軍職内陞𥙷謂之轉貟唯推垜之日以疾不趂赴者爲害甚重紹興三十二年四月予以右史午對時將有吏事與上介張才甫同飯於皇城司有一老兵幞頭執黒杖子拜辭皇城幹辦官劉知閤泣涕哽噎劉亦爲惻然予問其故兵以杖相示滿其上皆揭記士卒姓名營屯事件云身是天武第一軍都指揮使曽立戰功積官至遥郡團練使今年滿當出職若御前呈試了便得正任使名而爲近郡緫管不幸小疾遂遭揀汰只可降移外藩將校在身官位一切除落方伏事州都監聽管營部轄三十年勤勞一旦如掃薄命不偶至於如是坐者同歎息憐之案崇寜四年有詔諸班直嘗備宿衛病告滿尚可療者殿前指揮使補外牢城指揮使蓋舊法也六言詩難工唐張繼詩今人所傳者唯楓橋夜泊一篇荆公詩選亦但别有兩首樂府有塞孤一篇而皇甫冉集中載其所寄六言曰京口情人别乆楊州估客來踈潮至潯陽回去相思無處通書冉酬之而序言懿孫予之舊好祗役武昌有六言詩見憶今以七言裁荅蓋拙於事者繁而費冉之意以六言爲難工故衍六爲七然自有三章曰江上年年春早津頭日日人行借問山隂逺近猶聞薄暮鍾聲水流絶澗終日草長深山暮雲犬吠雞鳴幾處條桑種杏何人門外水流何處天邊樹繞誰家山絶東西多少朝朝幾度雲遮皆清絶可畫非拙而不能也予編唐人絶句得七言七千五百首五言二千五百首合爲萬首而六言不滿四十信乎其難也杯水救車薪孟子曰仁之勝不仁也如水勝火今之爲仁者猶以一杯水救一車薪之火也不熄則謂之水不勝火予讀文子其書有云水之勢勝火一勺不能救一車之薪金之勢勝木一刃不能殘一林上之勢勝水一塊不能塞一河文子周平王時人孟氏之言蓋本於此詘一人之下蕭何諌高祖受漢王之封曰夫能詘於一人之下而信於萬乘之上者湯武是也六韜云文王在岐召太公曰吾地小太公曰天下有粟賢者食之天下有民賢者牧之屈於一人之下則申於萬人之上唯聖人能爲之然則蕭何之言其出於此而漢書注釋諸家皆不曽引證秦漢重縣令客秦漢之時郡守縣令之權極重雖一令之微能生死人故爲之賔客者邑人不敢不敬單父人吕公善沛令辟仇從之客沛中豪桀吏聞令有重客皆往賀謂以禮物相慶也司馬相如游梁歸蜀素與臨卭令王吉相善來過之舍於都亭臨邛冨人卓王孫程鄭相謂曰令有貴客爲具召之并召令相如竊王孫女歸成都以貧困復如臨卭王孫杜門不出昆弟諸公更謂王孫曰長卿人材足依且又令客柰何相辱如此注云言縣令之客不可以辱也是時爲令客者如此今士大夫爲守令故人往見者雖未必皆賢豈復蒙此禮敬稍或戾於法制微有干託其累主人必矣之字訓變漢高祖諱邦荀恱云之字曰國惠帝諱盈之字曰滿謂臣下所避以相代也蓋之字之義訓變左傳周史以周易見陳侯者陳侯使筮之遇觀之否謂觀六四變而爲否也佗皆倣容齋三筆卷第十五終
