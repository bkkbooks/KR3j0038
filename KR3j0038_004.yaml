  text: 容齋隨筆卷第四
  hash: sha256:730d70aa2bd0eb5e1c6b6630f0312c61ae46724a7eb16af8be854668958c6833
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_004-1a}
body:
  text: 張浮休書張芸叟與石司理書云頃㳺京師求謁先達之門每聽歐陽文忠公司馬温公王荆公之論於行義文史爲多唯歐陽公多談吏事旣乆之不免有請大凡學者之見先生莫不以道德文章爲欲聞者今先生多教人以吏事所未諭也公曰不然吾子皆時才異日臨事當自知之大抵文學止於潤身政事可以及物吾昔貶官夷陵方壯年未厭學欲求史漢一觀公私無有也無以遣日因取架閣陳年公案反覆觀之見其枉直乖錯不可勝數以無爲有以枉爲直違法徇情滅親害義無所不有且夷陵荒逺褊小尚如此天下固可知也當時仰天誓心曰自爾遇事不敢忽也是時蘇明允父子亦在焉甞聞此語又有荅孫子發書多論資治通鑑其略云温公甞曰吾作此書唯王勝之甞閱之終篇自餘君子求乞欲觀讀未終紙巳欠伸思睡矣書十九年方成中間受了人多少語言陵藉云云此兩事士大夫罕言之浮休集百卷無此二篇今豫章所刋者附之集後温公客位牓司馬温公作相日親書牓稾掲于客位曰訪及諸君若覩朝政闕遺庶民疾苦欲進忠言者請以奏牘聞於朝廷光得與同僚商議擇可行者進呈取旨行之若但以私書寵諭終無所益若光身有過失欲賜規正即以通封書簡分付吏人令傳入光得内自省訟佩服改行至於整㑹官職差遣理雪罪名凡干身計並請一面進狀光得與朝省衆官公議施行若在私第垂訪不請語及某再拜咨白乾道九年公之曽孫伋出鎭廣州道過贑獲觀之李頎詩歐陽公好稱誦唐嚴維詩柳塘春水慢花塢夕陽遲及楊衡竹徑通幽處禪房花木深之句以爲不可及予絶喜李頎詩云逺客坐長夜雨聲孤寺秋請量東海水看取淺深愁且作客渉逺適當窮秋暮投孤村古寺中夜不能寐起坐凄惻而聞簷外雨聲其爲一時襟抱不言可知而此兩句十字中盡其意態海水喻愁非過語也詩中用茱茰字劉夢得云詩中用茱茰字者凡三人杜甫云醉把茱茰子細看王維云挿遍茱茰少一人朱放云學他年少挿茱茰三君所用杜公爲優予觀唐人七言用此者又十餘家漫録于後王昌齡茱茰揷鬢花冝壽戴叔倫挿鬢茱茰來未盡盧綸茱茰一朶映華簪權德輿酒泛茱茰晚易曛白居易舞鬟擺落茱茰房茱茰色淺未經霜楊衡強揷茱茰隨衆人張諤茱茰凡作幾年新耿湋髮希那敢挿茱茰劉商郵筒不解獻茱茰崔櫓茱茰冷吹溪口香周賀茱茰城裏一尊前比之杜句眞不侔矣鬼宿度河宋蒼梧王當七夕夜令楊玉夫伺織女度河曰見當報我不見當殺汝錢希白洞微志載蘇德哥爲徐肈祀其先人曰當夜半可巳盖俟鬼宿度河之後翟公巽作祭儀十卷云或祭於昏或祭於旦皆非是當以鬼宿渡河爲候而鬼宿渡河常在中夜必使人仰占以俟之葉少藴云公巽博學多聞援證皆有据不肯碌碌同衆所見必過人子案天上經星終古不動鬼宿隨天西行春昏見於南夏晨見於東秋夜半見於東冬昏見於東安有所謂渡河及常在中夜之理織女昏晨與鬼宿正相反其理則同蒼梧王荒悖小兒不足笑錢翟葉三公皆名儒碩學亦不深攷如此杜詩云牛女漫愁思秋期猶渡河牛女年年度何曽風浪生梁劉孝儀詩云欲待黃昏至含嬌淺渡河唐人七夕詩皆有此說此自是牽俗遣詞之過故杜老又有詩云牽牛出河西織女處其東萬古永相望七夕誰見同神光竟難候此事終蒙朧盖自洞曉其實非它人比也府名軍額雍州軍額曰永興府曰京兆而守臣以知永興軍府事兼京兆府路安撫使結銜鎭州軍額曰成德府曰眞定而守臣以知成德軍府事兼眞定府路安撫使結銜政和中始正以府額爲稱荆州軍額曰荆南府曰江陵而守臣則曰知荆南通判曰通判荆南自餘掾幕縣官則曰江陵府淳熈四年始盡以江陵爲稱孟州軍額曰河陽三城無府額而守臣曰知河陽軍州事陜州無府額而守臣曰知陜州軍府事法令行移亦曰陜府馬融皇甫規漢順帝時西羌叛遣征西將軍馬賢將十萬人討之武都太守馬融上䟽曰賢處處留滯必有潰叛之變臣願請賢所不用關東兵五千裁假部隊之號盡力率厲三旬之中必克破之不從賢果與羌戰敗父子皆没羌遂宼三輔燒園陵詔武都太守趙沖督河西四郡兵追擊安定上計掾皇甫規上䟽曰臣比年以來數陳便宜羌戎未動䇿其將反馬賢始岀知其必敗願假臣屯列坐食之兵五千出其不意與沖共相首尾土地山谷臣所曉習可不煩方寸之印尺帛之賜可以滌患帝不能用趙沖擊羌不利羌冦充斥涼部震恐沖戰死累年然後定案馬融皇甫規之言曉然易見而所請兵皆不過五千然訖不肯從乃知宣帝納用趙充國之冊爲不易得所謂明主可爲忠言也孟蜀避唐諱蜀本石九經皆孟昶時所刻其書淵丗民三字皆缺畫盖爲唐髙祖太宗諱也昶父知祥甞爲莊宗明宗臣然於存勗嗣源字乃不諱前蜀王氏巳稱帝而其所立龍興寺碑言及唐諸帝亦皆平闕乃知唐之澤逺矣翰苑親近白樂天渭村退居寄錢翰林詩叙翰苑之親近云曉從朝興慶春陪宴栢梁分庭皆命婦對院即儲皇貴主冠浮動親王轡閙裝金鈿相照耀朱紫間熒煌毬簇桃花騎歌廵竹葉觴窪銀中貴帶昂黛内人粧賜禊東城下頒酺曲水傍樽罍分聖酒妓樂借仙倡盖唐丗宫禁與外廷不至相隔絶故杜子美詩户外昭容紫袖垂雙瞻御座引朝儀又云舎人退食收封事宫女開函近御筵而學士獨稱内相至於與命婦分庭見貴主冠服内人黛粧假仙倡以佐酒它司無此也寧馨阿堵寧馨阿堵晉宋間人語助耳後人但見王衍指錢云舉阿堵物却又山濤見衍曰何物老媪生寧馨兒今遂以阿堵爲錢寧馨兒爲佳兒殊不然也前軰詩語言少味無阿堵氷雪相看有此君又家無阿堵物門有寧馨兒其意亦如此宋廢帝之母王太后疾篤帝不往視后怒謂侍者取刀來剖我腹那得生寧馨兒觀此豈得爲佳顧長康畫人物不點目精曰傳神冩照正在阿堵中猶言此處也劉眞長譏殷淵源曰田舎兒強學人作爾馨語又謂桓温曰使君如馨地寧可鬪戰求勝王導與何充語曰正自爾馨王恬撥王胡之手曰冷如鬼手馨彊來捉人臂至今吴中人語言尚多用寧馨字爲問猶言若何也劉夢得詩爲問中華學道者幾人雄猛得寧馨盖得其義以寧字作平聲讀鳯毛宋孝武嗟賞謝鳯之子超宗曰殊有鳯毛今人以子爲鳯毛多謂出此桉丗說王劭風姿似其父導桓温曰大奴固自有鳯毛其事在前與此不同牛米燕慕容皝以牛假貧民使佃苑中稅其什之八自有牛者稅其七參軍封𥙿諌以爲魏晉之丗假官田牛者不過稅其什六自有牛者中分之不取其七八也予觀今吾郷之俗募人耕田十取其五而用主牛者取其六謂之牛米盖晉法也爲文矜夸過實文士爲文有矜夸過實雖韓文公不能免如石鼔歌極道宣王之事偉矣至云孔子西行不到秦掎摭星宿遺羲娥陋儒編詩不收拾二雅褊迫無委蛇是謂三百篇皆如星宿獨此詩如日月也二雅褊迫之語尤非所冝言今丗所傳石鼔之詞尚在豈能出吉日車攻之右安知非經聖人所刪乎送孟東野序韓文公送孟東野序云物不得其平則鳴然其文云在唐虞時咎陶禹其善鳴者而假之以鳴䕫假於韶以鳴伊尹鳴殷周公鳴周又云天將和其聲而使鳴國家之盛然則非所謂不得其平也噴嚏今人噴嚏不止者必噀唾祝云有人說我婦人尤甚子案終風詩寤言不寐願言則嚏鄭氏箋云我其憂悼而不能寐女思我心如是我則嚏也今俗人嚏云人道我此古之遺語也乃知此風自古以來有之野史不可信野史雜說多有得之傳聞及好事者縁飾故類多失實雖前軰不能免而士大夫頗信之姑摭眞宗朝三事于左魏泰東軒録云眞宗次澶淵語㓂萊公曰虜騎未退何人可守天雄軍公言參知政事王欽若退即召王於行府諭以上意授勑俾行王未及有言公遽酌大白飲之命曰上馬盃且曰參政勉之回日即爲同列也王馳騎入魏越十一日虜退召爲同中書門下平章事或云王公數進疑詞於上前故萊公因事出之予案澶淵之役乃景德元年九月是時萊公爲次相欽若爲參政閠九月欽若判天雄二年四月罷政三年萊公罷相欽若復知樞密院至天禧始拜相距景德凡十四年其二事者沈括筆談云向文簡拜右僕射眞宗謂學士李昌武曰朕自即位以來未甞除僕射敏中應甚喜昌武退朝往候之門闌悄然明日再對上笑曰向敏中大耐官職存中自注云向公拜僕射年月未曽考於國史因見中書記是天禧元年八月而是年二月王欽若亦加僕射予案眞宗朝自敏中之前拜僕射者六人吕端李沆王旦皆自宰相轉陳堯叟以罷摳密使拜張齊賢以故相拜王欽若自樞密使轉及敏中轉右僕射與欽若加左僕射同日降制是時李昌武死四年矣昌武者宗諤也其三事者存中筆談又云時丁晉公從眞宗巡幸禮成詔賜輔臣玉帶時輔臣八人行在祗候庫止有七帶尚衣有帶謂之比玉價直數百萬上欲以足其數公心欲之而位在七人之下度必不及已乃諭有司某自有小私帶可服候還京别賜可也旣各受賜而晉公一帶僅如指闊上顧近侍速易之遂得尚衣御帶予按景德元年眞宗巡幸西京大中祥符元年巡幸泰山四年幸河中丁謂皆爲行在三司使未登政府七年幸亳州謂始以參知政事從時輔臣六人王旦向敏中爲宰相王欽若陳堯叟爲樞密使皆在謂上謂之下尚有樞密副使馬知節即不與此說合且旣爲玉帶而又名比玉尤可笑魏泰無足論沈存中不應爾也謗書司馬遷作史記於封禪書中述武帝神仙鬼竈方士之事甚備故王允謂之謗書國朝景德祥符間治安之極王文穆陳文忠陳文僖丁晉公諸人造作天書符瑞以爲固寵容恱之計及眞宗上仙王沂公懼貽後丗譏議故請藏天書於梓宫以滅迹而實録之成乃文穆監脩其載崇奉宫廟祥雲芝鶴唯恐不詳遂爲信史之累盖與太史公謗書意異而實同也王文正公祥符以後凡天書禮文宫觀典冊祭祀巡幸祥瑞頌聲之事王文正公旦實爲參政宰相無一不預官自侍郎至太保公心知得罪於清議而固戀患失不能決去及其臨終乃欲削髮僧服以歛何所補哉魏野贈詩所謂西祀東封今巳了好來相伴赤松㳺可謂君子愛人以德其箴戒之意深矣歐陽公神道碑悉隱而不書盖不可書也雖持身公清無一可議然特張禹孔光胡廣之流云晉文公晉公子重耳自狄適它國凡七衞成公曹共公鄭文公皆不禮焉齊桓公妻以女宋襄公贈以馬楚成王享之秦穆公納之卒以得國衞曹鄭皆同姓齊宋秦楚皆異姓非所謂豈無他人不如同姓也晉文公卒未葬秦師伐鄭滅滑無預晉事晉先軫以爲秦不哀吾喪而伐吾同姓背秦大惠使襄公墨衰絰而伐之雖幸勝於殽終啓焚舟之戰兩國交兵不復修睦者數百年先軫是年死於狄至孫縠而誅滅天也南夷服諸葛蜀劉禪時南中諸郡叛諸葛亮征之孟獲爲夷漢所服七戰七擒曰公天威也南人不復反矣蜀志所載止於一時之事國朝淳化中李順亂蜀招安使雷有終遣嘉州士人辛怡顯使於南詔至姚州其節度使趙公美以書來迎云當境有瀘水昔諸葛武侯戒曰非貢獻征討不得輒渡此水若必欲過須致祭然後登舟今遣本部軍將賫金龍二條金錢三十文并設酒脯請先祭享而渡乃知南夷心服雖千年如𥘉嗚呼可謂賢矣事見怡顯所作雲南録二䟽賛作議論文字湏考引事實無差忒乃可傳信後丗東坡先生作二踈圖賛云孝宣中興以法馭人殺篕韓楊盖三良臣先生憐之振袂脫屣使知區區不足驕士其立意超卓如此然以其時考之元康三年二踈去位後二年篕寛饒誅又三年韓延壽誅又三年楊惲誅方二踈去時三人皆亡恙盖先生文如傾河不復効常人㝷閱質究也李宓伐南詔唐天寶中南詔叛劒南節度使鮮于仲通討之喪士卒六萬人楊國忠掩其敗狀仍叙其戰功時募兵擊南詔人莫肯應募國忠遣御史分道捕人連枷送詣軍所行者愁怨所在哭聲振野至十三載劒南留後李宓將兵七萬往擊南詔南詔誘之深入閉壁不戰宓糧盡士卒瘴疫及飢死什七八乃引還蠻追擊之宓被擒全軍皆没國忠隱其敗更以捷聞益發兵討之此通鑑所紀舊唐書云李宓率兵擊蠻於西洱河糧盡軍旋馬足陷橋爲閤羅鳯所擒新唐書亦云宓敗死於西洱河子案髙適集中有李宓南征蠻詩一篇序云天寶十一載有詔伐西南夷丞相楊公兼節制之寄乃奏前雲南太守李宓渉海自交趾擊之往復數萬里十二載四月至于長安君子是以知廟堂使能而李公効節子忝斯人之舊因賦是詩其略曰肅穆廟堂上深沉節制雄遂令感激士得建非常功鼔行天海外轉戰蠻夷中長驅大浪破急擊群山空餉道忽巳逺縣軍垂欲窮野食掘田䑕晡餐兼僰僮收兵列亭候拓地彌西東瀘水夜可渉交州今始通歸來長安道召見甘泉宮其所稱述如此雖詩人之言未必皆實然當時之人所賦其事不應虚言則宓盖歸至長安未甞敗死其年又非十三載也味詩中掘䑕餐僮之語則知糧盡危急師非勝歸明甚浮梁陶器彭器資尚書文集有送許屯田詩曰浮梁巧燒甆顔色比瓊玖因官射利疾衆喜君獨不父老爭歎息此事古未有注云浮梁父老言自來作知縣不買甆器者一人君是也作饒州不買者一人今程少卿嗣宗是也惜乎不載許君之名容齋隨筆卷第四
