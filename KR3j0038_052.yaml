body:
  text: 容齊三筆卷第十六二十則蹇氏父子蹇周輔立江西福建茶法以害兩路其子序辰在紹聖中乞編類元祐章疏案牘人為一帙置在二府由是搢紳之禍無一得脫此猶未足言及居元符遏密中肆音樂自娛後守蘇州以天寧節與其父忌日同輒於前一日設宴及節日不張樂其無人臣之義如是蓋舉世未聞也神臂弓神臂弓出於弩遺法古未有也熙寧元年民李宏始獻之入內副都知張若水方受旨料簡弓弩取以進其法以檿木為身檀為弰鐵為蹬子鎗頭銅為馬靣牙發麻繩札絲為弦弓之身三尺有二寸弦長二尺有五寸箭木羽長數寸射二百四十餘步入榆木半笴神宗閲試甚善之於是行用而他弓矢弗能及紹興五年韓世忠又侈大其制更名克敵弓以與金虜戰大獲勝捷十二年詞科試日主司出克敵弓銘為題云勑令格式法令之書其别有四勑令格式是也神宗聖訓曰禁於未然之謂勑禁於已然之謂令設於此以待彼之至謂之格設於此使彼效之謂之式凡入笞杖徒流死自例以下至斷獄十有二門麗刑名輕重者皆為勑自品官以下至斷獄三十五門約束禁止者皆為令命官庶人之等倍全分釐之給有等級高下者皆為格表奏帳籍關牒符檄之類有體制模楷者皆為式元豐編勑用此後來雖數有修定然大體悉循用之今假寧一門實載於格而公私文書行移並名為式假則非也顔魯公戲吟陶淵明作間情賦寄意女色蕭統以為白玉微瑕宋廣平作梅花賦皮日休以為鐡心石腸人而亦風流艷冶如此顔魯公集有七言聮句四絶其目曰大言樂語饞語醉語於樂語云苦河既濟真僧喜新知滿坐笑相視戍客歸來見妻子學生放假偷向市饞語云拈䭔䑛指不知休欲炙侍立涎交流過屠大嚼肯知羞食店門外強淹留醉語云逢糟遇麯便酪酊覆車墜馬皆不醒倒著接籬髮垂領狂心亂語無人並以公之剛介守正而作是詩豈非以文滑稽乎然語意平常無可咀嚼豫疑非公詩也紀年用先代名唐德宗以建中興元之亂思太宗正觀明皇開元為不可跂及故改年為正元各取一字以法象之高宗建炎之元欲法建隆而下字無所本孝宗以來始一切用正元故事隆興以建隆紹興乾道以乾德至道淳熙以淳化雍熙紹熙以紹興淳熙慶元以慶曆元祐也中舍官制未改之前𥘉升朝官有出身人為太子中允無出身人為太子中舍皆今通直郎也近時士大夫或不能曉乃稱中書舍人曰中舍殊可笑云蘇子美在進奏院㑹館職有中舍者欲預席子美曰樂中既無筝琶篳笛坐上安有國舍虞比國謂國子博士舍謂中舍虞謂虞部比謂比部貟外郎中皆任子官也多赦長惡熙寧七年旱神宗欲降赦時巳兩赦矣王安石曰湯旱以六事自責曰政不節與若一歲三赦是政不節非所以弭災也乃止安石平生持論務與衆異獨此說為至公近者六年之間再行覃霈婺州富人盧助教以刻核起家因至田僕之居為僕父子四人所執投置杵臼內搗碎其軀為肉泥既鞫治成獄而遇已酉赦恩獲免至復登盧氏之門笑侮之曰助教何不下莊收榖兹事可為冤憤而州郡失於奏論紹熙甲寅歲至於四赦凶盜殺人一切不死惠姦長惡何補於治哉奏讞疑獄州郡疑獄許奏讞蓋朝廷之仁恩然不問所犯重輕及情理蠧害一切縱之則為壞法耿延年提點江東刑獄專務全活死囚其用心固善然南康婦人謀殺其夫甚明曲貸其命纍勘官翻以失入𬒳罪豫守贑一將兵逃至外邑殺村民於深林民兄後知之畏申官之費即焚其尸事發係獄以殺時無證尸不經驗奏裁刑寺輒定為斷配豫持勑不下復奏論之未下而此兵死於獄因記元豐中宣州民葉元以同居兄亂其妻而殺之又殺兄子而彊其父與嫂約契不訟於官鄰里發其事州以情理可憫為上請審刑院奏欲貸神宗曰罪人巳前死姦亂之事特出於葉元之口不足以定罪且下民雖為無知抵冒法禁固宜哀矜然以妻子之愛既殺其兄仍戕其姪又罔其父背逆天理傷敗人倫宜以毆兄至死律論此旨可謂至明矣醫職冗濫神宗董正治官立醫官額止於四貟及宣和中自和安大夫至翰林醫官凡一百十七人直局至祗候凡九百七十九人冗濫如此三年五月始詔大夫以二十貟郎以三十貟醫效至祗候以三百人為額而額外人免改正但不許作官戶見帶遙郡人並依元豐舊制然竟不能循守也乾道三年正月隨龍醫官平和大夫階州團練使潘攸差判太醫局請給依能誠例支破時在西掖取㑹能誠全支本色因依誠係和安大夫潭州觀察使月請米麥百餘碩錢數百千春冬綿絹之屬比他人十倍因上章極論之乞將攸合得請給令戶部照條支破孝宗聖諭云豈惟潘攸不合得并能誠亦合住了即日御筆批依仍改正能誠巳得真俸之旨旋又罷醫官局切腳語世人語音有以切腳而稱者亦閒見之於書史中如以蓬為勃籠槃為勃䦨鐸為突落叵為不可團為突欒鉦為丁寧頂為滴𩕳角為矻落蒲為勃盧精為即零螳為突郎諸為之乎旁為步廊茨為蒺藜圈為屈攣錮為骨露窠為窟駝是也唐世辟寮佐有詞唐世節度觀察諸使辟置僚佐以至州郡差掾屬牒語皆用四六大略如告詞李商隱樊南甲乙集顧雲編稿羅隱湘南雜稿皆有之故韓文公送石洪赴河陽幕府序云撰書辭具馬幣李肇國史補載崖州差故相韋執誼攝軍事衙推亦有其文非若今時只以吏牘行遣也錢武肅在鎮牒鍾廷翰攝安吉主簿云勑淮南鎮海鎮東等軍節度使牒將仕郎試祕書省校書郎鍾廷翰牒奉處分前件官儒素修身早升官緒寓居霅水纍歷星霜克循廉謹之規備顯溫恭之道今者願求録用特議掄材安吉屬城印曹闕吏俾期差攝勉效公方儻聞佐理之能豈吝超升之獎事須差攝安吉縣主簿牒舉者故牒貞明二年三月日牒後銜云使尚父守尚書令吳越王押此牒今藏於王順伯家其字畫端嚴有法其文則掌書記所撰殊為不工但印記不存矣謂主簿為印曹亦佳高子允謁刺王順伯藏昔賢墨帖至多其一曰髙子允諸公謁刺凡十六人時公美徐振甫余中龔深父元耆寧秦少游黃魯直張文潜朝無咎司馬公休李成季葉致逺黃道夫廖明略彭器資陳祥道皆元祐四年朝士唯器資為中書舍人餘皆館職其刺字或書官職或書郡里或稱姓各或只稱名既手書之又斥主人之字且有同舍尊兄之目風流氣味宛然可端拜非若後之士大夫一付筆吏也蔡忠惠公帖亦有其二一曰襄奉候子石兄起居朔旦謹謁一曰襄別洪州少卿學士蓋又在前帖三十年之先也蔡君謨書碑歐陽公作蔡君謨墓志云公工於書畫頗自惜不妄與人書仁宗尤愛稱之御製元舅隴西王碑文詔公書之其後命學士撰溫成皇后碑文又勑公書則辭不肯曰此待詔職也國史傳所載蓋用其語比見蔡與歐陽一帖云嚮者得侍陛下清光時有天旨令寫御撰碑文宫寺題榜至有勳德之家干請朝廷出勑令書襄謂近世書寫碑志則有資利若朝廷之命則有司存焉待詔其職也今與待詔爭利其可乎力辭乃已蓋辭其可辭其不可辭者不辭也然後知蔡公之旨意如此雖勳德之家請於朝出勑令書者亦辭之不止一溫成碑而巳其清介有守後世或未知之故載於此楊涉父子唐楊涉為人和厚恭謹哀帝時自吏部侍郎拜相時朱全忠擅國涉聞當為相與家人相泣謂其子凝式曰此吾家之不幸也必為汝纍後二年全忠篡逆涉為押傳國寶使凝式曰大人為唐宰相而國家至此不可謂之無過况手持天子璽綬與人雖保冨貴奈千載何盍辭之涉大駭曰汝滅吾族神色為之不寧者數日此一楊涉也方其且相則對其子有不幸之語及持國寶與逆賊則駭其子勸止之請一何前後之不相侔也鄙夫患失又懲白馬之禍喪其良心甘入六臣之列其可羞也甚矣凝式病其父失節託於心疾歷五代十二君佯狂不仕亦賢乎哉佛胸卍字法苑珠林叙佛之𥘉生云開卍字於胸前躡千輪於足下又占相部云如來至真常於胸前自然卍字大人相者乃往古世蠲除穢濁不善行故豫於夷堅丁志中載蔡京胸字言京死後四十二年遷葬皮肉消化巳盡獨心胸上隱起一卍字高二分許如鐫刻所就正與此同以大姦誤國之人而有此祥誠不可曉也豈非天崩地坼造化定數故産此異物以為宗社之禍邪蘇渙詩杜子美贈蘇渙詩序云蘇大侍御渙靜者也旅寓于江側凡是不交州府之客人事都絶久矣肩輿江浦忽訪老夫請誦近詩肯吟數首才力素壯詞句動人涌思雷出書篋几杖之外殷殷留金石聲賦八韻記異亦記老夫傾倒於蘇至矣詩有再聞誦新作突過黃初詩之語又有一篇寄裴道州并呈蘇渙侍御云附書與裴因示蘇此生巳愧須人扶致君堯舜付公等早據要路思捐軀其褒重之如此唐藝文志有渙詩一卷云渙少喜剽盜善用白弩巴蜀商人苦之稱白跖以比莊蹻後折節讀書進士及第湖南崔瓘辟從事繼走交廣與哥舒晃反伏誅然則非所謂靜隱者也渙在廣州作變律詩十九首上廣府帥其一曰養𧖟為素絲葉盡蠶不老頃筐對空床此意向誰道一女不得織萬夫受其寒一夫不得意四海行路難禍亦不在大禍亦不在先世路險孟門吾徒當勉旃其二曰毒蜂一巢成高挂惡木枝行人百步外目斷魂為飛長安大道邊挾彈誰家兒手持黃金丸引滿無所疑一中紛下來勢若風雨隨身如萬箭攢宛轉送所之徒有疾惡心奈何不知機讀此二詩可以知其人矣杜贈渙詩名為記異語意不與它等厥有旨哉歲後八日東方朔占書歲後八日一為雞二為犬三為豕四為羊五為牛六為馬七為人八為榖謂其日晴則所主之物育隂則災杜詩云元日到人日未有不隂時用此也八日為榖所係尤重而人罕知者故書之門焉閨焉左氏傳好用門焉字如晉侯圍曹門焉齊侯圍龍盧蒲就魁門焉吳伐巢吳子門焉冨陽人啓門諸侯之士門焉及蔡公孫翩以兩矢門之門于師之梁門于陽州之類皆竒葩之語也然公羊傳云入其大門則無人門焉者入其閨則無人閨焉者上其堂則無人焉又傑出有味何休注堂無人焉之下曰但言焉絶語辭堂不設守視人故不言焉者休之學可謂精切能盡立言之深意郡縣主壻官本朝宗室袒免親女出嫁如壻係白身人得文解者為將仕郎否則承節承信郎妻雖死夫為官如故案唐正元中故懷澤縣主壻檢校贊善大夫竇克紹狀言臣頃以國親超受寵祿及縣主薨逝臣宫遂停臣陪位出身未授檢校官自有本官伏乞宣付所司許取前銜婺州司戶參軍隨例調集詔許赴集仍委所司比類前任正貟官依資注擬自今巳後郡縣主壻除丁憂外有曽任正貟官停檢校官俸料後者準此處分乃知壻官不停者恩厚於唐世多矣紹興中高士轟尚僞福國長公主至觀察使及公主事發誅死猶得故宫可謂優渥樂府詩引喻自齊梁以來詩人作樂府子夜四時歌之類每以前句比興引喻而後句實言以證之至唐張祐李商隱溫庭筠陸龜蒙亦多此體或四句皆然今略書十數聮于䇿其四句者如高山種芙蓉復經黃蘖塢未得一蓮時流離嬰辛苦窗外山魈立知渠腳不多三更機底下模著是誰梭淮上能無兩回頭揔是情蒲帆渾未織爭得一歡成其兩句者如風吹荷葉動無夜不搖蓮空織無經緯求匹理自難圍棋燒敗襖著子故依然理絲入殘機何悟不成匹攡門不安橫無復相關意黃蘖向春生苦心日日長明燈照空局悠然未有期玉作彈棋局中心最不平剪刀橫眼底方覺淚難裁中劈庭前棗教郎見赤心千尋葶藶枝爭奈長長苦愁見蜘蛛織尋思直到明雙燈俱暗盡奈許兩無由三更書石闕憶子夜啼悲芙蓉腹裏萎憐汝從心起朝看暮牛跡知是宿啼痕梳頭入黃泉分作兩死計石闕生口中銜悲不能語桑𧖟不作繭晝夜長懸絲皆是也龜蒙又有風人詩四首云十萬全師出遙知正憶君一心如瑞麥長作兩歧分破蘖供朝㸑須知是苦辛曉天窺落宿誰識獨醒人旦日思雙屨明時願早諧丹青傳四瀆難寫是秋懷聞道更新幟多應廢舊期征衣無伴搗獨處自然悲皮日休和其三章云刻石書離恨因成别後悲莫言春繭薄猶有萬重思鏤出容刀飾親逢巧笑難日中騷客珮爭奈即䦨干江上秋聲起從來浪得名逆風猶挂席苦不㑹凡情劉采春所唱云不是厨中串爭知炙裏心井邊銀釧落展轉恨還深簳蠟為紅燭情知不自由細絲斜結網爭奈眼相鈎尤為明白七言亦間有之如東邊日出西邊雨道是無情又有情玲瓏骰子安紅豆入骨相思知也無合歡桃核真堪恨裏許元來别有人是也近世鄙詞如一落索數闋蓋效此格語意亦新工恨太俗耳然非才士不能為世傳東坡一絶句云蓮子擘開須見薏楸枰著盡更無棊破衫却有重縫處一飯何曽忘却匙蓋是文與意並見一句中又非前比也集中不載容齊三筆卷第十六
