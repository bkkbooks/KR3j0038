front:
  text: 容齋四筆卷第四十五則
  hash: sha256:9617de28e69ff8c7c1271c60d6b83ee8d405de174cacab6fd48c28fa54591aa9
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_070-1a}
body:
  text: 今日官冗元豐中曽鞏判三班院今侍右也上疏言國朝景德墾田百七十萬頃官萬貟皇祐二百二十五萬頃官二萬貟治平四百三十萬頃官二萬四千貟田日加辟官日加多而後之郊費視前一倍以三班三年之籍較之其入籍者幾七百人而死亡免退不能二百是年增歲溢未見其止則用財之端入官之門當令有司講求其故使天下之入如治平而財之用官之數同景德以三十年之通可以餘十年之蓄矣是時海內全盛倉庫多有椿積猶有此懼慶元二年四月有朝臣奏對極言云曩在乾道間京朝官三四千貟選人七八千貟紹熙二年四選名籍尚左京官四千一百五十九貟尚右大使臣五千一百七十三貟侍左選人一萬二千八百六十九貟侍右小使臣一萬一千三百十五貟合四選之數共三萬三千五百十六貟冗倍於國朝全盛之際近者四年之間京官未至增添外選人增至一萬三千六百七十貟比紹熙增八百一貟大使臣六千五百二十五貟比紹熙增一千三百四十八貟小使臣一萬八千七百餘貟比紹熙增七千四百貟而今年科舉明年奏薦不在焉通無慮四萬三千貟比四年之數增萬貟矣可不為之寒心哉蓋連有覃霈慶典屢行而宗室推恩不以服派近逺為間斷特奏名三舉皆值異恩雖助教亦出官歸正人每州以數十百病在膏盲正使俞跗扁鵲持上池良藥以救之亦無及巳欒城和張安道詩張文定公在蜀一見蘇公父子即以國士許之熙寧中張守陳州南都辟子由莫府元豐𥘉東坡謪齊安子由貶監筠酒稅與張別張悽然不樂酌酒相命手寫一詩曰可憐萍梗飄蓬客自歎匏瓜老病身從此空齋挂塵榻不知重掃待何人後七年子由召還猶復見之於南都及元符末自龍川還許昌因姪叔黨出坡遺墨再讀張所贈時其薨巳十年泣下不能巳乃追和之曰少年便識成都尹中歲仍為幕下賔待我江西徐孑焉正子一生知己有斯人兩詩皆哀而不怨使人至今有感於斯文今丗薄夫受人異恩轉眼若不相識況於一死一生卷卷如此忠厚之至殆可端拜也和范杜蘇四公晉相和凝以唐長興四年知貢舉取范質為苐十三人唐故事知貢舉者所放進士以已及第時名次為重謂之傳衣鉢蓋凝在梁正明中居此級故以處質且云它日當如我後皆至宰相封魯國公官至太子太傅當時以為榮凝夀止五十八質止五十四三朝史質本傳亦書之而新五代史和凝傳誤為第五以登科記考之而非也社祁公罷相以太子少師致仕後以南郊免陪位恩連進至太子太師年八十而薨蘇子容𥘉筮仕為南京判官杜公方里居告以平生出處本末曰子異日所至亦如老夫及蘇更踐中外名德殊與之相似集中有謝杜公書正敘此事其罷相也亦以太子少師致仕進太保年八十二而薨昔賢謂貴人往往善相人以所閲多之故也此二者併官爵年壽皆前知異矣外臺祕要外臺祕要載制虎方云到山下先閉氣三十五息所在山神將虎來到吾前乃存吾肺中有白帝出收取虎兩目塞吾下部中乃吐肺氣上自通冠一山林之上於是良久又閉氣三十五息兩平捻都監目作三步步皆以右足在前乃止祝曰李耳李耳圗汝非李耳邪汝盜黃帝之犬黃帝教我問汝云何畢便行一山虎不可得見若卒逢之者因正靣立大張左手五指側之極勢跳手上下三度於跳中大喚咄曰虎北斗君使汝去虎即走子謂人卒逢虎魂魄驚怖竄伏之不暇豈能雍容步趍仗呪語七字而脫邪因讀此方聊書之以發一笑此書乃唐王圭之孫燾所作本傳云燾視母疾數從髙醫遊遂窮其術因以所學作書討繹精明世寶焉蓋不深考也六枳關盤州種枳六本以為藩籬之限立小門名曰六枳關每為人問其所出倦於酬應今取馮衍顯志賦中語書於此衍云楗六枳而為籬案東觀漢記作八枳逸周書小開篇云嗚呼汝何敬非時何擇非德德枳維大人大人枳維公公枳維卿卿枳維大夫大夫枳維士登登皇皇維在國枳國枳維都都枳維邑邑枳維家家枳維欲無疆言上下相維遞為藩蔽也其數有八與東觀記司豫詳考之乃九枳也宋景文公賀宰相啓式維公枳蓋用此云王荆公上書并詩王荆公議論高竒果於自用嘉祐𥘉為度支判官上萬言書以為今天下財力日以困窮風俗日以衰壞患在不知法度不法先王之政故也法先王之政者法其意而已法其意則吾所改易更革不至乎傾駭天下之耳目而固巳合矣因天下之力以生天下之財取天下之財以供天下之費自古治丗未嘗以不足為公患也患在治財無其道爾在位之人才既不足而閭巷草野之間亦少可用之材社稷之託封疆之守陛下其能久以天幸為常而無一旦之憂乎願監苟且因循之敝明詔大臣為之以漸期為合於當丗之變臣之所稱流俗之所不講而議者以為迂闊而熟爛者也當時冨韓二公在相位讀之不樂知其得志必生事後安石當國其所注措大氐皆祖此書又不忍貧民而深疾冨民志欲破冨以惠貧嘗賦兼并詩一篇曰三代子百姓公私無異財人主擅操柄如天持斗魁賦豫皆自我兼并乃姦回姦回法有誅勢亦無自來後丗始倒持黔首遂難裁秦王不知此更築懷清臺禮義曰巳偷聖經久堙埃法尚有存者欲言時所咍俗吏不知方掊克乃為才俗儒不知變兼并可無摧利孔至百出小人司闔開有司與之爭民愈可憐哉其語絶不工逮其得政設青苗法以奪冨民之利民無貧冨兩稅之外皆重出息十二吕惠卿復作手實之法民遂大病其禍源於此詩蘇子由以為昔之詩病未有若此其酷也痛哉左黃州表唐肅宗時王璵以祠禱見寵驟得宰相帝嘗不豫璵遣女巫乘傳分禱天下名山大川巫皆盛服中人護領所至干託州縣賂遺狼籍時有一巫美而豔以惡少年數十自隨尤憸狡不法馳入黃州刺史左震晨至館請事門鐍不啓震怒破鐍入取巫斬廷下悉誅所從少年籍其贓得十餘萬因遣還中人璵不能詰帝亦不加罪震剛決如此而史不記其他事豫讀元次山集有左黃州表一篇云乾元巳亥贊善大夫左振出為黃州刺史下車黃人歌曰我欲逃鄉里我欲去墳墓左公今既來誰忍棄之去後一歲又歌曰吾鄉有鬼巫惑人人不知天子正尊信左公能殺之蓋此巫黃人也振在州三遷侍御史判金州刺史將去黃人多去思故為作表豫謂振即震也為政冝民見於歌頌史官當特書之於循吏中而僅能不沒其實故為標顯於此巳亥者乾元二年璵以元年五月自太常少卿拜中書相二年三月罷本紀及宰相表同而新史本傳以為三年自太常卿拜相明日罷失之矣乃承舊史之誤也李郭詔書唐代宗即位郭汾陽為近昵所搖懼禍之及表上自靈武河北至于絳州兩朝所詒詔書一千餘卷家傳載其表語其多如是又讀韋端符所撰李衛公故物記云三原令座中有客曰李丞者衛公之胄藏文帝賜書二十通多言征討事厚勞苦其兵事節度皆付公吾不從中治也暨公疾親詔者數四其一曰有晝夜視公病大老嫗令一人來吾欲熟知公起居狀權文公視此詔常泣曰君臣之際乃如是耶新史載其事云靖五代孫彥芳大和中為鳯翔司録參軍以髙祖太宗賜靖詔書數函上之天子悉留禁中又勑摹詔本還賜彥芳即二事觀之唐丗之所以眷禮名將相者綢繆熟復至此漢晉以來所不及也兩道出師國家用兵行師異道並出其勝敗功罪當隨其實而處之則賞信罰明人知勸戒漢武帝遣衛青霍去病伐胸奴去病以功益封又封部將四人為列侯而青不得益封軍吏卒皆無封侯者宣帝遣田廣明等五將軍擊胸奴又以常惠護烏孫兵共出五將皆無功而廣明及田順以罪誅獨常惠奉使克獲封侯宋文帝伐魏雍州諸將栁元景等既拔弘農陜城戍潼關矣而上以東軍王玄謨敗退皆召還其後玄謨貶黜元景受賞紹興七年淮西大帥劉少師罷湖北嶽少保以母憂去纍辭起復之命朝廷以兵部尚書吕安老侍郎張淵道分使兩部巳而正除宣撫遂掌其軍嶽在九江憂兵柄一失不容再得亟兼程至鄂有旨復故任而召淵道為樞密都承旨安老在廬遭變言者論罷張魏公淵道亦繼坐斥隆興中北虜再動兵張公為督帥遣李顯忠邵宏淵攻符離失利而退一府皆貶秩是時汪莊敏以參知政事督視荆襄東西不相為謀乃亦坐譴古今不侔如此杜韓用歇後語杜韓二公作詩或用歇後語如悽其望吕葛仙鳥仙花吾友于友于皆挺拔再接再礪乃僮僕誠自劊為爾惜居諸誰謂貽厥無基趾之類是巳唐明皇賜二相物唐明皇以李林甫為右相顓付大政而左相牛仙客李適之陳希烈前後同列皆拱手備貟林甫死楊國忠代之其寵遇愈甚天寶十三載上御躍龍殿門張樂宴群臣賜右相絹一千五百匹綵羅三百匹綵綾五百匹而賜左相絹三百羅綾各五十而巳其多寡不侔至於五倍如希烈庸才知上恩意安得不奴事之乎冝其甘心臣於祿山也一百五日今人謂寒食為一百五者以其自冬至之後至清明歷節氣五凡為一百七日而先兩日為寒食故云它節皆不然也杜老有鄜州一百五日夜對月一篇江西宗派詩云一百五日足風雨三十六峯勞夢魂一百五日寒食雨二十四畨花信風之類是也吾州城北芝山寺為禁煙遊賞之地寺僧欲建華嚴閣請豫作勸緣疏其末一聮云大善知識五十三永壯人天之仰寒食清明一百六鼎來道俗之觀或問一百六所出應之曰元微之連昌宫詞𥘉過寒食一百六店舍無煙宫樹緑是以用之老杜寒山詩老杜春日憶李曰詩云白也詩無敵飄然思不群清新庾開府俊逸鮑參軍嘗有武辨議其失曰既是無敵又却似庾鮑或折之曰庾清新而不能俊逸鮑俊逸而不能清新太白兼之所以為無敵也今集別本一作無數殆好事者更之乎寒山子詩云吾心似秋月碧潭清皎潔無物堪比倫教我如何説人亦有言既似秋月碧潭乃以為無物堪比何也蓋其意謂若無二物比倫當如何説耳讀者當以是求之礜石之毒讀黃伯思東觀餘論內評王大令書一節曰靜息帖云礜石深是可疑事兄患喜散輒發癰散者寒食散之類散中蓋用礜石是性極熱有毒故云深可疑也劉表在荆州與王粲登障山見一岡不生百草粲曰此必古冡其人在丗服生礜石熱蒸出外故草木焦滅鑿看果墓礜石滿塋又今洛水冬月不氷古人謂之溫洛下亦有礜石今取此石置甕水中水亦不氷又鸛伏卵以助暖氣其烈酷如此固不冝餌服子敬之語實然淮南子曰人食礜石死蠶食之而不飢豫仲兄文安公鎮金陵因秋暑減食當塗醫湯三益教以服礜石圓巳而飲啖日進遂加意服之越十月而毒作鼻衄血斗餘自是數數不止竟至精液皆竭逮於捐館偶見其語使人追痛因書之以戒未來者會合聮句韻略上聲二腫字險窄豫向作汪莊敏銘詩八十句唯蕭敏中讀之曰押盡一韻今考之猶有十字越用一董內韻其詞曰維天生材萬彚傾竦侯王將相曽是有種公家江東丗繹耕壟桃溪之涘是播是孰丰厥培蓻此圭珙公羈未奮逸駕思駷沈酣春秋蹈迪周孔徑䇿名第稍辭泄䢇橫經湘沅士敬如捧蓬萊方丈佩飾有琫應龍天飛薈蔚雲滃千官在序摩厲從臾吾惟片言借箸泉湧正冠霜臺過者卞悚顔顔殿戺聲氣不動顯仁東攢巫史呼洶昌言一下恩浹千冡薰粥孔熾邊戒毛氄媕婀當位左掣右壅公云當今沸渭混澒天威震耀誰不憤踊遂遷中司西柄是董出關啓斾籌檄倥偬業業荆襄將懦曰拱投𬒮電赴如尊乃勇鄧唐蔡陳馳捷系踵佛狸歸胔民恃不恐璽書賜朝百揆參揔亞勛贊册國勢尊鞏督軍載西寄責罙重方規許洛事援秦隴符離罔功竒畫膠拲鈞樞建使宰席亢寵還臨西州夾道歡擁有銜未鬯病癖且腫曽不憖遺使我心懵湘湖髙丘草木蔚蓊維水容裔維山巃嵸矢其銘詩詞費以冗奈何乎公萬祀母聳若韓孟籍徹會合聮句三十四韻除蛹二字韻略不收外餘皆不出二腫中雄竒激越如大川洪河不見涯涘非瑣瑣潢汙行潦之水所可同語也其詩曰離別言無期會合意罙重病添兒女戀老喪丈夫勇劒心知未死詩思猶孤聳愁去劇箭飛歡來若泉涌析言多新貫攄抱無昔壅念難須勤追悔易勿輕踵吟巴山犖嶨説楚波堆壟馬辭虎豹怒舟出蛟鼉恐狂鯨時孤軒幽狖雜百種瘴衣常腥膩蠻器多踈冗剝苔吊斑林角飯餌沉溕忽爾銜逺命歸歟舞新寵鬼窟脫幽妖天居覿清拱京遊步方振謪夢意猶恟詩書誇舊知酒食接新奉嘉言寫清越愈病失疣腫夏隂偶髙庇宵魂接虛擁雪弦寂寂聽茗碗纎纎捧馳輝燭浮螢幽響泄潛蛬詩老獨何心江疾有餘腫我家本瀍穀有地介臯鞏休迹憶沉冥峩冠慙闟升朝髙轡逸振物群聽悚徒言濯幽泌誰與剃荒茸朝紳鬱青緑馬飾曜圭珙國讎未銷鑠我志蕩卭隴君才誠倜儻時論方洶溶格言多彪蔚縣解無梏拲張生得淵源寒色拔山冡堅如撞群金眇若抽獨蛹伊余何所擬跛鱉詎能踊塊然墮嶽石飄爾罥巢氄龍斾垂天衢雲韶凝禁甬君胡眠安然朝鼓聲洶洶其間或有纇句然衆手立成理如是也容齋四筆卷第四
