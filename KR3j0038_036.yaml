front:
  text: 容齋三筆目録
  hash: sha256:18499d4b42c9f5cd984af63b52cedba0f945076375915a49d174c7ae23a5deb3
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_036-1a}
body:
  text: 第一卷十四則晁景迃經說武成之書邳彤酈啇象載瑜管晏之言漢志之誤共工氏漢將軍在御史上上元張燈宰相參政貟數七夕用六日朱崖遷客張士貴宋璟韓歐文語第二卷十六則漢宣帝不用儒劉項成敗國家府庫占術致禍絳侯萊公平天冠無名殺臣下介推寒食進士訴黜落趙充國馬援後漢書載班固文漢人希姓絳灌秀才之名題詠絶唱魏收作史第三卷十九則兎葵燕麥北狄俘虜之苦太守刺史贈吏民官李元亮詩啓東坡和陶詩元魏改功臣姓氏孔戣鄭穆陳季常高唐神女賦文用謚字其言明且清侍從轉官姦鬼爲人禍曹子建七啓監司待廵檢十二分野薦士稱字著年公孫五樓兄弟邪正第四卷十五則三竪子從官事體樞密稱呼九朝國史銀牌使者舊官銜冗贅省錢百陌吏胥侮洗文書宣告錯誤禍福有命軍中抵名爲官眞宗北征宰相不次𥙷文臣換武使外制之難第五卷十七則舜事瞽叟濳火字誤孔子正名永興天書王裒嵇紹緋紫假服張詠傳樞密名更易過稱官品郎官貟數仁宗立嗣東坡慕樂天縳雞行北虜誅宗王油汚衣詩州郡書院何韓同姓第六卷十五則蕨萁養人張籍陳無巳詩賢士隱居者杜詩誤字東坡詩用老字擇福莫若重杜詩命意用人文字之失李衞公輞川圖跋白公夜聞歌者謝朏志節琵琶亭詩韓蘇文章譬喻減損入官人唐昭宗贈諌臣官第七卷十四則執政辤轉官宗室補官孫宣公諌封禪等赦恩爲害光武符堅代宗崇尚釋氏周武帝宣帝唐觀察使節度使稱太尉冗濫除官五代濫刑太一推筭趙丞相除拜唐昭宗恤録儒士第八卷五則徽宗薦嚴䟽文四六名對忠宣公謝表吾家四六唐賢啓狀第九卷十六則樞密兩長官馮道王溥赦放債負周玄豹相鈷鉧滄浪老人該恩官封司封失典故學士中丞漢高祖父母姓名君臣事迹屏風僧道科目射佃逃田孟字義訓周世宗好殺向巨原詩葉晦叔詩第十卷十七則詞學科目納紬絹尺度唐夜試進士朱梁輕賦坎離陽隂河伯娶婦前執政爲尚書六經用字鄂州興唐寺鍾禁中文書禰衡輕曹操老子之言孔叢子桃源行小星詩司封贈典之失辰巳之巳第十一卷十六則碑誌不書名帝王諱名漢文帝不用兵家諱中字記張元事宫室土木歳月日風雷雄雌東坡三詩符讀書城南天文七政致仕官上壽五經字義相反東坡引用史傳鎮星爲福兩莫愁何公橋詩第十二卷眄㤗秋娘三女閔子不名顔魯公詞堂詩曽晳待子不慈具圎復詩淵明孤松人當知足饒州刺史紫極觀鍾作文字要點檢兼中書令侍從兩制片言解禍免直學士院忠言嘉謨大賢之後第十三卷鍾鼎銘識再書博古圗犧尊象尊碌碌七字占測天星僧官試卿政和宫室大觀筭學十八鼎宗室參選四朝史志元豐庫五俗字第十四卷三教論衡政和文忌夫兄爲公瞬息須臾神宗待文武臣親除諌官緑竹王芻檢放災傷檀弓注文夫人宗女請受左傳有害理處蜀茶法判府知府官㑹折閱歌扇舞衣飛鄰望鄰衙參之禮第十五卷十八則内職命詞題先聖廟詩蔡京除吏季文子魏獻公尊崇聖字周禮竒字媵字訓大禹之書隨巢胡非子縱臾别國方言揔持寺唐勑牒禁旅遷補杯水救車薪六言詩難工詘一人之下秦漢重縣令客之字訓變第十六卷二十則蹇氏父子勑令格式神臂弓顔魯公戲吟紀年用先代名多赦長惡中舎奏讞疑獄醫職冗濫切脚語唐世辟寮佐有詞髙子允謁刺楊渉父子蔡君謨書碑佛胷卍字蘇渙詩門焉閨焉歳後八日郡縣主壻官樂府詩引喻容齋三筆目録終
