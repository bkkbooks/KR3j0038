body:
  text: 容齋三筆卷第十四三教論衡唐德宗以誕日歲歲詔佛老者大論麟德殿并召給事中徐岱及趙需許孟容韋渠牟講説始三家若矛楯然卒而同歸于善帝大恱賚豫有差此新書列傳所載也白樂天集有三教論衡一篇云太和元年十月皇帝降誕日奉勑召入麟德殿內道埸對御三教談論略録大端第一座祕書監白居易安國寺引駕沙門義林太清宫道士楊弘元其序曰談論之先多陳三教讚揚演説以啓談端臣學淺才微猥登講座竊以義林法師明大小乘通內外學於大衆中能師子吼臣稽先王典籍假陛下威靈發問既來敢不響答然豫觀義林所問首以毛詩稱六義論語列四科請備陳名數而巳居易對以孔門之徒三千其賢者列為四科毛詩之篇三百其要者分為六義然後言六義之數四科之目十哲之名復引佛法比方以六義可比十二部經四科可比六度以十哲可比十大弟子僧難云曽參至孝百行之先何故不列於四科居易又為辨析乃曰儒書奧義既已討論釋典微言亦宜發問然所問者不過芥子納須彌山一節而巳後問道士黃庭經中養氣存神長生久視之道道士却問敬一人而千萬人恱觀其問答旨意初非幽深微妙不可測知唐帝歲以此為誕日上儀殊為可省國朝命僧升座祝聖蓋本於此夫兄為公婦人呼夫之兄為伯於書無所載豫頃使金國時辟景孫弟輔行弟婦在家許齋醮及還家賽願豫為作青詞云頃因兄伯出使夫壻從行雖借用陳平傳兄伯之語而自不以為然偶憶爾雅釋親篇曰婦稱夫之兄為兄公夫之弟為叔於是改兄伯字為兄公視前所用大為不侔矣玉篇妐字音鍾注云夫之兄也然於義訓不若前語政和文忌蔡京顓國以學校科舉箝制多士而為之鷹犬者又從而羽翼之士子程文一言一字稍涉疑忌必暗黜之有鮑輝卿者言今州縣學考試未校文學精弱先問時忌有無苟語涉時忌雖甚工不敢取若曰休兵以息民節用以豐財罷不急之役清入仕之流諸如此語熙豐紹聖間試者共用不以為忌今悉絀之所宜禁止詔可政和三年臣僚又言比者試文有以聖經之言輒為時忌而避之者如曰大哉堯之為君君哉舜也與夫制治于未亂保邦于未危吉凶悔吝生乎動吉凶與民同患以為哉音與災同而危亂凶悔非人樂聞皆避今當不諱之朝豈宜有此詔禁之以二者之言考之知當時試文無辜而坐黜者多矣其事載於四朝志瞬息須臾瞬息須臾頃刻皆不久之辭與釋氏一彈指間一剎那頃之義同而釋書分別甚備新婆沙論云百二十剎那成一怛剎那六十怛剎那成一臘縛二十臘縳成一牟呼麥多三十牟呼麥多成一晝夜又毗曇論云一剎那者翻為一念一怛剎翻為一瞬六十怛剎那為一息一息為一羅婆三十羅婆為一摩睺羅翻為一須臾又僧祇律云二十念為一瞬二十瞬名一彈指二十彈指名一羅預二十羅預名一須臾一日一夜有三十須臾神宗待文武臣元豐三年詔知州軍不應舉京官職官者許通判舉之蓋諸州守臣有以小使臣為之而通判官入京朝故許之薦舉今以小使臣守沿邊小郡而公然薦人改官蓋有司不舉行故事也神宗初即位以刑部郎中劉述久不磨勘特命為吏部郎中樞密院言左藏庫副使陳昉恬靜久應磨勘不肯自言帝曰右職若效朝士養名而獎進之則將習以為高非便也翌日以兵部貟外郎張問十年不磨勘特遷禮部郎中其旌賞駕御各自有宜此所以為綜核名實之善政緑竹王芻隨筆中載毛公釋緑竹王芻以為北人不見竹故分緑竹為二物以緑為王芻熙寧𥘉右贊善大夫吳安度試舍人院巳入等有司以安度所賦緑竹詩背王芻古説而直以為竹遂黜不取冨韓公為相言史記敘載淇園之竹正衛産也安度語有據遂賜進士出身豫又記前賢所紀仁宗時賈邊試當仁不避於師論以師為衆謂其背先儒訓釋特黜之蓋是時士風淳厚論者皆不喜新竒之説非若王氏之學也親除諌官仁宗慶曆三年用歐陽修余靖王素為諌官當時名士作詩有御筆新除三諌宫之句元豐八年詔范純仁為諌議大夫唐淑問蘇轍為司諌朱光庭范祖禹為正言宣仁后問宰執此五人者如何僉曰外望惟允章子厚獨曰故事諌官皆薦諸侍從然後大臣稟奏今詔除出中得無有近習援引乎此門寖不可啓后曰大臣實皆言之非左右也子厚曰大臣當明揚何為密薦由是有以親嫌自言者吕公著以范祖禹韓縝司馬光以范純仁子厚曰臺諌所以紏大臣之越法者故事執政初除苟有親戚及嘗𬒳薦引者見為臺臣則皆他徙今天子幼沖太皇同聽萬幾故事不可違光曰純仁祖禹實宜在諌列不可以臣故妨賢寧臣避位子厚曰縝光公著必不私他日有懷姦當國者例此而引其親黨恐非國之福後改除純仁待制祖禹著作佐郎然此制亦不能常常恪守也檢放災傷水旱災傷農民陳訴郡縣不能體朝廷德意或慮減放苗米則額外加耗之入為之有虧故往往從窄比年以來但有因賑濟虛數而冒賞者至於蠲租失實於民不便者未嘗小懲宣和之世執政不能盡賢而其所施行蓋有慰人意京西運判李祜奏房州民數百人陳言災傷知州李悝取其為首者杖而徇之城市以戒妄訴用此其州蠲稅不及一釐詔李悝除名簽書官皆勒停祜又奏唐鄧州蠲災賑乏悉如法令均房州不盡減稅致有盜賊詔均房州守令悉罷唐鄧守二各增一官秩百姓見憂出於徽宗聖意而大臣能將順也檀弓注文檀弓上下篇皆孔門高第弟子在戰國之前所論次其文章雄健精工雖楚漢間諸人不能及也而鄭康成所注又特為簡當旨意出於言外今載其兩章以示同志衛司冦惠子之喪子遊為之麻衰壯麻絰注云惠子廢適立庶為之重服以譏之文子辭曰子辱與彌牟之弟遊又辱為之服敢辭子遊曰禮也文子退反哭注子遊名習禮文子亦以為當然未覺其所譏子遊趨而就諸臣之位注深譏之文子又辭曰子辱與彌牟之弟遊又辱為之服又辱臨其喪敢辭子遊曰固以請文子退扶適子南靣而立曰子辱與彌牟之弟遊又辱為之服又辱臨其喪虎也敢不復位注覺所譏也子遊趨而就客位注所譏行案此一事儻非注文明言殆不可曉今用五譏字詞意渙然至最後覺所譏所譏行六字尤為透徹也季孫之母死哀公弔焉曽子與子貢弔焉閽人為君在弗內也曽子與子貢入於其廄而修容焉子貢先入􅕡人曰鄉者巳告矣注既不敢止以言下之曽子後入閽人辟之注見兩賢相隨彌益恭也今人讀此段直如親立季氏之庭親見當時之事注文尤得其要領云左傳有害理處左傳議論遣辭頗有害理者以文章富豔之故後人一切不復言今略疏數端以針其失傳云鄭武公莊公為平王卿士王二於虢杜氏謂不復專任鄭伯也周公閼與王孫蘇爭政王叛王孫蘇杜氏曰叛者不與也夫以君之於臣而言二與叛豈理也哉晉平戎於王單襄公如晉拜成劉康公徼戎將遂伐之叔服曰背盟而欺大國不義晉范吉射趙鞅交兵劉氏范氏世為昏姻萇弘事劉文公故周與范氏趙鞅以為討夫以天子之使出聘侯國而言拜成謂周於晉為欺大國諸侯之卿跋扈於天子而言討皆於名分為不正其他如晉邢侯殺叔魚叔魚兄叔向數其惡而尸諸市其於兄弟之誼為弗篤矣而託仲尼之語云殺親益榮杜氏又謂榮名益已以弟陳尸為兄榮尤為失也夫人宗女請受戚里宗婦封郡國夫人宗女封郡縣主皆有月俸錢米春冬絹綿其數甚多嘉祐祿令所不備載頃見張掄娶仲儡女封遂安縣主月入近百千內人請給除糧料院幫勘左藏庫所支之外內帑又有添給外庭不復得知因記熙寧𥘉神宗與王安石言今財賦非不多但用不節何由給足宫中一私身之奉有及八十貫者嫁一公主至用七十萬緡沈貴妃料錢月八百貫聞太宗時宫人惟繫皂紬襜元德皇后嘗以金線緣幨而怒其奢仁宗𥘉定公主俸料以問獻穆大主再三如言其𥘉僅得五貫耳異時中官月有止七百錢者禮與其奢寧儉自是美事也一時旨意如此不聞奉行以今度之何止百十倍也蜀茶法蜀道諸司惟茶馬一臺最為富盛茶之課利多寡與夫民間利疚它邦無由可知豫記東坡集有送周朝議守漢州詩云茶為西南病氓俗記二李何人折其鋒矯矯六君子注二李𣏌與稷也六君子謂思道與姪正孺張永徽吳醇翁吕元鈞宋文輔也初熙寧七年遣三司幹當公事李𣏌經畫買茶以蒲宗閔同領其事蜀之茶園不殖五榖惟宜種茶賦稅一例折輸錢三百折絹一匹三百二十折紬一匹十錢折綿一兩二錢析草一圍凡稅額總三十萬𣏌創設官埸歲增息為四十萬其輸受之際往往壓其斤重侵其加直𣏌以疾去都官郎中劉佐體量多其條畫於是宗閔乃議民茶息收十之三盡賣於官場蜀茶盡榷民始病矣知彭州吕陶言天下茶法既通蜀中獨行禁榷况川峽四路所出茶貨比方東南諸處十不及一諸路既許通商兩川却為禁地虧損治體莫甚於斯且盡榷民茶隨買隨賣或今日買十千明日即作十三千賣之比至歲終不可勝算豈止三分而已佐𣏌宗閔作為敝法以困西南生聚佐坐罷去以國子博士李稷代之陶亦得罪侍御史周尹復極論榷茶為害罷為湖北提點刑獄利路漕臣張宗諤張升卿復建議廢茶埸司依舊通商稷劾其踈謬皆坐貶秩茶埸司行劄子督綿州彰明縣知縣宋大章繳奏以為非所當用稷又詆其賣直釣竒坐衝替一歲之間通課利及息耗至七十六萬緡有竒詔録李𣏌前勞而官其子後稷死於永樂城其代陸師閔言其治茶五年獲淨息四百二十八萬緡詔賜田十頃凡上所書皆見於國史坡公所稱思道乃周尹永徽乃二張之一元鈞乃吕陶文輔乃大章也正孑焉正醇翁之事不著判府知府國朝著令僕射宣徽使使相知州府者為判其後改僕射為特進官稱如昔時唯章子厚罷相守越制詞結尾云依前特進知越州雖曰黜典亦學士院之誤同時執政蔣頴叔以手簡與之猶呼云判府而章質夫只云知府蓋從其實豫所藏名公法書册有之吾鄉彭公器資有遺墨一帖不知與何人其辭曰某頓首知郡相公閣下是必知州者故亦不以府字借稱今世蕞爾小壘區區一朝官承乏作守吏民稱為判府彼固偃然居之不疑風俗淳澆之異一至於此歌扇舞衣唐李義有詩云鏤月為歌扇裁雲作舞衣同時人張懷慶竊為已作各增兩字云生情鏤月為歌扇出性裁雲作舞衣致有生吞活剝之誚豫又見劉希夷代閨人春日一聮云池月憐歌扇山雲愛舞衣絶相似杜老亦云江清歌扇底野曠舞衣前儲光羲云竹吹留歌扇蓮香入舞衣然則唐詩人好以歌扇舞衣為對也官會折閲官會子之作始於紹興三十年錢端禮為戶部侍郎委徽州創樣撩造紙五十萬邊幅皆不翦裁𥘉以分數給朝士俸而於市肆要閙處置五場輦見錢收換每一千别輸錢十以為吏卒用啇賈入納外郡綱運悉同見錢無欠數陪償及腳乘之費公私便之既而印造益多而實錢浸少至於十而損一未及十年不勝其弊壽皇念其弗便出內庫銀二百萬兩售於市以錢易楮焚棄之僅解一時之急時乾道三年也淳熙十二年自婺召還見臨安人揭小帖以七百五十錢兊一楮因入對言之喜其復行天語云此事惟卿知之朕以會子之故幾乎十年睡不著然是後曩弊又生且偽造者所在有之及其敗獲又未嘗正治其誅故行用愈輕逮慶元乙卯多換六百二十朝廷以為憂詔江浙諸道必以七百七十錢買楮幣一道此意固善而不深思用錢易紙非有微利誰肯為之因記崇寧四年有旨在京市戶市啇人交子凡一千許損至九百五十外路九百七十得貿鬻如法母得輒損願增價者聽蓋有所􅑿縮則可通行此理固易曉也飛鄰望鄰自古所謂四鄰蓋指東西南北四者而言耳蓋貪虐害民者一切肆其私心元豐以後州縣榷賣坊場而收淨息以募役行之浸久弊從而生往往鬻其抵産柳配四鄰四鄰貧乏則散及飛鄰望鄰之家不復問逺近必得償乃止飛鄰望鄰之説誠所未聞元祐元年殿中侍御史吕陶奏疏論之雖嘗暫革至紹聖又復然衙參之禮今監司郡守初上事既受官吏參謁至晡時僚屬復伺於客次胥吏列立廷下通刺曰衙以聽進退之命如是者三日如主人免此禮則翌旦又通謝刺此禮之起不知何時唐岑參為虢州上佐有一詩題為衙郡守還其辭曰世事何反覆一身難可料頭白翻折腰還家私自笑所嗟無産業妻子嫌不調五斗米留人東溪憶垂釣然則由來久矣韓詩曰如今便別官長去直到新年衙日來疑是謂月二日也容齋三筆卷第十四終
