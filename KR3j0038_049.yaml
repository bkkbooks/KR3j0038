body:
  text: 容齊三筆卷第十三鍾鼎銘識三代鍾鼎彞器存於今者其間款識唯眉壽萬年子子孫孫永寶用之語差可辨認餘皆茫昧不可讀談者以為古文質朴固如此豫切有疑焉商周文章見於詩書三盤五誥雖詰曲聱牙尚可精求其義它皆坦然明白如與人言自武王丹書諸銘外其見於經傳者如湯之盤銘曰苟日新日日新又日新讒鼎之銘曰昧旦㔻顯後世猶怠正考父鼎銘曰一命而僂再命而傴三命而俯循墻而走亦莫余敢侮饘於是鬻於是以糊余口㮚氏量銘曰時文思索允臻其極嘉量既成以觀四國永啓厥後兹器維則祭射侯辭曰惟若寧侯母或若女不寧侯不屬于王所故抗而射女衛禮至銘曰余掖殺國子莫余敢止孔悝鼎銘曰六月丁亥公假于大廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難于漢陽即宫于宗周奔走無射啓若獻公獻公乃命成叔纂乃祖服乃考文叔興舊嗜欲作率慶士躬恤衛國其勤公家夙夜不解民咸曰休哉公曰叔舅豫女銘若纂乃考服悝拜稽首曰對揚以辟之勤大命施于蒸鼎彞扶風美陽鼎銘曰王命尸臣官此栒邑賜爾旗鸞黼黻雕戈尸臣拜手稽首曰敢對揚天子丕顯休命此諸銘未嘗不粲然何為傳於今者艱澀無緒乃爾漢去周未逺武宣以來郡國每獲一鼎至於薦告宗廟羣臣上壽竇憲出征南單于遺以古鼎容五斗其銘曰仲山甫鼎其萬年子子孫孫永保用憲乃上之蓋以其難得故也今世去漢千年而器寶之出不可勝計又為不可曉巳武帝獲汾隂雎上鼎無𣢾識而備禮迎享宣帝獲美陽鼎下羣臣議張敞乃以有𣢾識之故絀之又何也犧尊象尊周禮司尊彞祼用雞彞鳥彞其朝獻用兩獻尊其再獻用兩象尊漢儒注曰雞彞鳥彞謂刻而畫之為雞鳯皇之形獻讀為犧犧尊飾以翡翠象尊以象鳯凰或曰以象骨飾尊又云獻音娑有婆娑之義惟王肅云犧象二尊並全牛象之形而鑿背為尊陸德明釋周禮獻尊之獻音素何反而於左氏傳犧象不出門釋犧為許宜反又素何反豫案今世所存故物宣和博古圖所寫犧尊純為牛形象尊純為象形而尊在背正合王肅之說然則犧字只當讀如本音鄭司農諸人所云殊與古製不類則知目所未覩而臆為之說者何止此哉又今所用爵除太常禮器之外郡縣至以木刻一雀別置杯於背以承酒不復有兩柱三足隻耳侈口之狀向在福州見之尤為可笑也再書博古圖豫昔年因得漢匜讀博古圖嘗載其序述可笑者數事於隨筆近復盡觀之其謬妄不可殫舉當政和宣和間蔡京為政禁士大夫不得讀史而春秋三傳真束高閣故其所引用絶為乖盾今一切記之於下以示好事君子與我同志者啇之癸鼎只一癸字釋之曰湯之父主癸也父癸尊之說亦然至父癸匜則又以為齊癸公之子乙鼎銘有乙毛兩字釋之曰商有天乙祖乙小乙武乙太丁之子乙今銘乙則太丁之子也父已鼎曰父己者雍已也繼雍已者乃其弟太戊豈非繼其後者乃為之子邪至父已尊則直云雍已之子太戊為其父作豫案以十干為名商人無貴賤皆同而必以為君所謂癸即父癸已即雍已是六七百年中更無一人同之者矣商公非鼎銘只一字曰非釋之曰據史記有非子者為周孝王主馬其去商逺甚惟公劉五世孫曰公非考其時當為公非也夫以一非字而必強推古人以證之可謂無理周益鼎曰春秋文公六年有梁氏益昭公六年有文公益未知孰是豫案左傳文八年所紀乃梁益耳而𣏌文公名益姑周絲駒父鼎曰左傳有駒伯為郤克軍佐駒其姓也此曰駒父其同駒伯為姓邪豫案左傳駒伯者卻錡也錡乃克之子是時郤氏三卿錡曰駒伯犨曰苦成叔至曰溫季皆其食采邑名耳豈得以為姓哉叔液鼎曰考諸前代叔液之名不見於經傳惟周八士有叔夜豈其族歟夫伯仲叔季為兄弟之稱古人皆然而必指為叔夜之族是以叔為氏也周州卣曰州出於來國後以州為氏在晉則大夫州綽在衛則大夫州吁其為氏則一耳豫案來國之名無所著見而州吁乃衛公子正不讀春秋豈不知衛詩國風乎遂以為氏尤可哂也周髙克尊曰高克者不見於它傳惟周末衛文公時有高克將兵疑克者乃斯人蓋衛物也豫案元銘文但云伯克𥘉無高字高克鄭清人之詩兒童能誦之乃以為衛文公時又言周末此書局學士蓋不曽讀毛詩也周毀敦曰銘云伯和父和者衛武公也武公平戎有功故周平王命之為公豫案一時列國雖子男之微未有不稱公者安得平王獨命衛武之事周慧季鬲曰慧與惠通春秋有惠伯惠叔􅉑姜敦有惠仲而此鬲銘之為惠季豈非惠為氏而伯仲叔季者乃其序邪豫案惠伯惠叔正與莊伯戴伯平仲敬仲武叔穆叔成季相類皆上為諡而下為字烏得以為氏哉齊侯鎛鐘銘云咸有九州處禹之都釋之曰齊之封域有臨淄東萊北海高密膠東泰山樂安濟南平原蓋九州也豫案銘語正謂禹九州耳今所指言郡名周世未有豈得便以為州乎宋公䪫鐘銘云宋公成之䪫鐘釋之曰宋自微子有國二十世而有共公固成又一世而有平公成又七世而有剔公成未知孰是豫案宋共公名史記以為瑕春秋以為固𥘉無曰固成者且父既名成而其子復名之可乎剔成君為弟偃所逐亦非名成也周雲雷磬曰春秋魯饑臧文仲以玉磬告糴于齊案經所書但云臧孫辰告糴于齊左傳亦無玉磬之說漢定陶鼎曰漢𥘉有天下以定陶之地封彭越為梁王越既叛命乃以封高祖之子恢是為定陶共王豫案恢正封梁王後徙趙所謂定陶共王者元帝之子哀帝之父名康者也碌碌七字今人用碌碌字本出老子云不欲碌碌如玉落落如石孫愐唐韻引此句及王弼别本以為琭琭然又為録録娽娽鹿鹿陸陸祿祿凡七字史記毛遂云公等録録因人成事唐韻以為娽娽漢書蕭何贊云録録未有竒節顔師古注録録猶鹿鹿言在凡庶之中也馬援傳今更共陸陸占測天星國朝星官曆翁之伎殊愧漢唐故其占測荒茫幾於可笑偶讀四朝史天文志云元祐八年十月戊申星出東壁西慢流至羽林軍沒主擢用文士賢臣在位紹聖元年二月丙午星出壁東慢流入濁沒主天下文章士登用賢臣在位元符元年六月癸巳星出室至壁東沒主文士入國賢臣用二年二月癸卯星出靈臺北行至軒轅沒主賢臣在位天子有子孫之喜案是時宣仁上仙國是丕變一時正人以次竄斥章子厚在相位蔡卞輔之所謂四星之占豈不可笑也子孫之說蓋隂諂劉后云政和宫室自漢以來宫室士木之盛如漢武之甘泉建章陳後主之臨春結綺隋煬帝之洛陽江都唐明皇之華清連昌巳載史冊國朝祥符中姦臣導諛為玉清昭應㑹靈祥源諸宫議者固以崇侈勞費為戒然未有若政和蔡京所為也京既固位竊國政招大璫童貫楊戩賈詳藍從熙何欣五人分任其事於是始作延福宫有穆清成平㑹寧睿謨凝和崑玉羣玉七殿東邊有蕙馥報瓊蟠桃春錦疊瓊芬芳麗玉寒香拂雲偃蓋翠葆鉛英雲錦蘭薰摘金十五閣西邊有繁英雪香披芳鉛華瓊華文綺絳蕚穠華緑綺瑶碧清音秋香叢玉扶玉絳雲亦十五閣又疊石為山建明春閣其高十一丈宴春閣廣十二丈鑿圎池為海橫四百尺縱二百六十七尺鶴莊鹿寨孔翠諸柵蹄尾以數千計五人者各自為制度不相沿襲爭以華靡相誇勝故名延福五位其後復營萬歲山艮嶽山周十餘里最高一峯九十尺亭堂樓館不可磾記徽宗𥘉亦喜之巳而悟其過有厭惡語由是力役稍息靖康遭變詔取山禽水鳥十餘萬投諸汴渠拆屋為薪翦石為炮伐竹為笓籬大鹿數千頭悉殺之以啖衛士僧官試卿唐代宗以胡僧不空為鴻臚卿開府儀同三司豫巳論之矣自其後習以為常至本朝尚爾元豐三年詳定官制所言譯經僧官有授試光祿鴻臚卿少卿者請自今試卿者改賜三藏大法師試少卿者賜三藏法師詔試卿改賜六字法師少卿四字並冠以譯經三藏久之復罷大觀算學大觀中置算學如庠序之制三年三月詔以文宣王為先師兖鄒荆三國公配饗十哲從祀而列自昔著名算數之人繪像於兩廊加賜五等之爵於是中書舍人張邦昌定其名風后大橈隸首容成箕子商高常僕鬼臾區巫咸九人封公史蘇卜徒父卜偃梓真卜楚丘史趙史墨禆竈榮方甘德石申鮮于妄人耿壽昌夏侯勝京房翼奉李尋張衡周興單揚樊英郭璞何承天宋景業蕭吉臨孝恭張曽元王朴二十八人封伯鄧平劉洪管輅趙逹祖沖之殷紹信都芳許遵耿詢劉焯劉炫傅仁均王孝通瞿曇羅李淳風王希明李鼎祚邊罔郎顗襄楷二十人封子司馬季主洛下閎嚴君平劉徽姜岌張立建夏侯陽甄鸞盧太翼力人封男考其所條具固有於傳記無聞者而高下等差殊為乖謬如司馬季主嚴君平止於男爵鮮于妄人洛下閎同定太初曆而妄人封伯下閎封男尤可笑也十一月又改以黃帝為先師云十八鼎夏禹鑄九鼎唯見於左傳王孫滿對楚子及靈王欲求鼎之言其後史記乃有鼎震及淪入于泗水之說且以秦之強暴視衰周如機上肉何所畏而不取周亦何辭以却報王之亡盡以寶器入秦而獨遺此以神器如是之重決無淪沒之理泗水不在周境內使何人般舁而往寧無一人知之以告秦邪始皇使人沒水求之不獲蓋亦為傳聞所誤三禮經所載鍾彛名數詳矣獨未嘗一及之詩易所書固亦可考以豫揣之未必有是物也唐武后始復置于通天宫不知何時而毀國朝崇寧三年用方士魏漢津言鑄鼎四年三月成於中太一宫之南為殿名曰九成宫中央曰帝鼐北方曰寶鼎東北曰牡鼎東方曰蒼鼎東南曰罔鼎南方曰彤鼎西南曰阜鼎西方曰晶鼎西北曰魁鼎奉安之日以蔡京為定鼎禮儀使大觀三年又以鑄鼎之地作寶成宫政和六年復用方士王仔昔議建閣於天章閣西徙鼎奉安改帝鼐為隆鼐餘八鼎皆改焉名閣曰圎象徽調閣七年又鑄神霄九鼎一曰太極飛雲洞劫之鼎二曰蒼壷祀天貯醇之鼎三曰山嶽五神之鼎四曰精明洞淵之鼎五曰天地隂陽之鼎六曰混沌之鼎七曰浮光洞天之鼎八曰靈光晃曜錬神之鼎九曰蒼龜大蛇蟲魚金輪之鼎明年鼎成置于上清寶籙宫神霄殿遂為十八鼎繼又詔罷九鼎新名悉復其舊今人但知有九鼎而十八之數唯朱忠靖公秀水間居録略紀之故詳載于此四朝史志四朝國史本紀皆為編修官日所作至於淳熙乙巳丙午又成列傳百三十五卷惟志二百卷多出李燾之手其彚次整理殊為有工然亦時有失點檢處蓋文書廣博於理固然職官志云使相以待勳賢故老及宰相久次罷政者惟趙普得之明道末吕夷簡罷始復加使相其後王欽若罷日亦除遂以為例案趙普之後寇凖陳堯叟王欽若皆祥符間自樞密使罷而得之欽若以天聖𥘉再入相終於位夷簡乃在其後十餘年今言欽若用夷簡故事則非也因記新唐書所載李泌相德宗加崇文館大學士泌建言學士加大始中宗時及張說為之固辭乃以學士知院事至崔圎復為大學士亦引泌為讓而止案崔圎乃肅宗朝宰相泌之相也相去三十年反以為圓引泌為讓甚類前失也宗室參選吏部貟多闕少今為益甚而選人當注職官簿尉輒為宗室所奪蓋以盡壓巳到部人之故案宣和七年八月臣僚論祖宗時宗室無參選法至崇寧初大啓僥幸遂使任意出官又優為之法參選一日即在闔選名次之上以天支之貴其間不為無人而膏粱之習貪淫縱恣出為民害者不少議者頗欲懲革罷百十人之私恩為億萬人之公利誠為至當若以親愛未忍姑乞與在部人通理名次從之靖康元年八月又奏云祖宗時未有宗室參部之法神宗時始選擇差注一二崇寧初立法太優宗室參選之日在本部名次之上既壓年月深逺勞效顯著之人復占名州大縣優便豐厚之處議者頗欲懲革不注郡守縣令與在部人通理名次有㫖從之此二假元未嘗衝改不知何時復紊也元豐庫神宗常憤北狄倔彊慨然有恢復幽燕之志於內帑置庫自製四言詩曰五季失圖檢狁孔熾藝祖造邦思有懲艾爰設內府基以募士曽孫保之敢忘厥志凡三十二庫每庫以一字揭之儲積皆滿又别置庫賦詩二十字分揭於上曰每䖍夕惕心妄意遵遺業顧豫不武資何日成戎捷其用志如此國家帑藏之富可知熙寧元年以奉宸庫珠子付河北緣邊於四榷埸鬻錢銀凖備買馬其數至於二千三百四十三萬顆乾道以來有封樁南庫所貯金銀楮劵合為四千萬緡孝宗尤所垂意入紹興以來頗供好賜之用似聞日减於舊云五俗字書字有俗體一律不可復改者如沖涼況減決五字悉以水為冰雖士人札翰亦然玉篇正收入於水部中而冰部之末亦存之而皆注云俗乃知由來久矣唐張參五經文字亦以為訛容齊三筆卷第十三終
