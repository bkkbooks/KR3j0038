front:
  text: 容齋隨筆卷第八十五則
  hash: sha256:37f8e55d2487475b8665310afae7080d433a5f517138cab4cab4f4ce282bbaff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_008-1a}
body:
  text: 諸葛公諸葛孔明千載人其用兵行師皆本於仁義節制自三代以降未之有也蓋其操心制行一出於誠生於亂丗躬耕壠畒使無徐庶之一言玄德之三顧則苟全性命不求聞達必矣其始君玄德論曹操不可與爭鋒孫氏可與為援而不可圖唯荆益可以取言如蓍龜終身不易二十餘年之間君信之士大夫仰之夷夏服之敵人畏之上有以取信於主故玄德臨終至云嗣子不才君可自取後主雖庸懦無立亦舉國聽之而不疑下有以見信於人故廢廖立而立垂泣廢李嚴而嚴致死後主左右姦辟側佞充塞于中而無一人有心害疾者魏盡據中州乘操丕積威之後猛士如林不敢西向發一矢以臨蜀而公六出征之使魏畏蜀如虎司馬懿案行其營壘處所歎為天下竒才鍾會伐蜀使人至漢川祭其廟禁軍士不得近墓樵采是豈智力䇿慮所能致哉魏延每隨公出輒欲請兵萬人與公異道會于潼關公制而不許又欲請兵五千循秦嶺而東直取長安以為一舉而咸陽以西可定史臣謂公以為危計不用是不然公真所謂義兵不用詐謀竒計方以數十萬之衆據正道而臨有罪建旗鳴鼓直指魏都固將飛書告之擇日合戰豈復翳行竊步事一旦之譎以規咸陽哉司馬懿年長於公四歲懿存而公死才五十四耳天不祚漢非人力也霸氣西南歇雄圖歷數屯杜詩盡之矣沐浴佩玉石駘仲卒有庶子六人卜所以為後者曰沐浴佩玉則兆五人者皆沐浴佩玉石祁子曰孰有執親之喪而沐浴佩玉者乎不沐浴佩玉此檀弓之文也今之為文者不然必曰沐浴佩玉則兆五人者如之祁子獨不可曰孰有執親之喪若此者乎似亦足以盡其事然古意衰矣談叢失實後山陳無巳著談叢六卷髙簡有筆力然所載國朝事失於不考究多爽其實漫析數端於此其一云吕許公惡韓冨范三公欲廢之而不能及西軍罷盡用三公及宋莒公夏英公于二府皆其仇也吕既老大事猶問遂請出大臣行三邊既建議乃數出道者院宿范公奉使陜西宿此院相見云云案吕公罷相詔有同議大事之旨公辭乃慶曆三年三月至九月致仕矣四年七月冨范始奉使又三公入二府時莒公自在外英公拜樞密使而中輟後二年莒方復入安有五人同時之事其二云杜正獻丁文簡為河東宣撫任布之子上書歷詆執政至云至於臣父亦出遭逢謂其非德選也杜戲丁曰賢郎亦要牢籠丁深銜之其後二公同在政府蘇子美進奏事作杜避嫌不預丁論以深文子美坐廢為民杜亦罷去一言之謔貽禍如此案杜公以執政使河東時丁以學士為副慶曆四年十一月進奏獄起杜在相位五年正月罷至五月丁公方從翰林參知政事安有深丈論子美之説且杜公重厚當無以人父子為謔之理丁公長者也肯追仇一言陷賢士大夫哉其三云張乖崖自成都召為參知政事既至而腦疽作求補外乃知杭州而疾愈上使中人往伺之言且將召也丁晉公以白金賂使者還言如故乃不召案張兩知成都其初還朝為戶部使中丞始知杭州是時丁方在侍從其後自蜀知升州丁為三司使豈有如前所書之事其四云乖崖在陳聞晉公逐萊公知禍必及已乃延三大戶與之博出彩骰子勝其一坐乃買田宅為歸計以自汚晉公聞之亦不害也案張公以祥符六年知陳州八年卒後五年當天禧四年寇公方罷相旋坐貶豈有所謂乖崖自汚之事兹四者所係不細乃誕漫如此蓋前輩不家藏國史好事者肆意飾説為美聽疑若可信故誤人紀述後山之書必傳於後丗懼詒千載之惑豫是以辨之石砮東坡作石砮記云禹貢荆州貢礪砥砮丹及􅙪簵楛梁州貢砮磬至春秋時隼集于陳廷楛矢貫之石砮長尺有咫問於孔子孔子不近取之荆梁而逺取之肅愼則荆梁之不貢此久矣顔師古曰楛木堪為笴今豳以北皆用之以此考之用楛為矢至唐猶然而用石為砮則自春秋以來莫識矣案晉書挹婁傳有石砮楛矢國有山出石其利入鐵周武王時獻其矢砮魏景元末亦來貢晉元帝中興又貢石砮後通貢於石虎虎以夸李壽者也唐書黑水靺鞨傳其矢石鏃長二寸蓋楛砮遺法然則東坡所謂春秋以來莫識恐不考耳子家有一砮正長二寸豈黑水物乎陶淵明陶淵明髙簡間靖為晉宋第一輩人語其飢則簞瓢屢空瓶無儲粟其寒則短褐穿結絺綌冬陳其居則環堵蕭然風日不蔽窮困之狀可謂至矣讀其與子儼等疏云恨室無萊婦抱兹苦心汝等雖曰同生當思四海皆兄弟之義管仲鮑叔分財無猜他人尚爾況同父之人哉然則猶有庶子也責子詩云雍端年十三此兩人必異母爾淵明在彭澤悉令公四種秫曰吾常得醉於酒足矣妻子固請種粳乃使二頃五十畒種秫五十畒種粳其自敘亦云公田之利足以為酒故便求之猶望一稔而逝然仲秋至冬在官八十餘日即自免去職所謂秫粳蓋未嘗得顆粒到口也悲夫東晉將相西晉南度國勢至弱元帝為中興主巳有雄武不足之譏餘皆童幼相承無足稱算然其享國百年五胡雲擾竟不能窺江漢符堅以百萬之衆至於送死肥水後以強臣擅政鼎命乃移其於江左之勢固自若也是果何術哉嘗考之矣以國事付一相而不二其任以外寄付方伯而不輕其權文武二柄既得其道餘皆可槩見矣百年之間會稽王昱道子元顯以宗室王敦二桓以逆取姑置勿言卞壼陸玩郗鑒陸曄王彪之坦之不任事其真託國者王導庾亮何充庾冰蔡謨殷浩謝安劉𥙿八人而巳方伯之任莫重於荆徐荆州為國西門刺史常都督七八州事力雄強分天下半自度江訖于太元八十餘年荷閫寄者王敦陶侃庾氏之亮翼桓氏之溫豁沖石民八人而巳非終於其軍不輒易將士服皆於下敵人畏敬於外非忽去忽來兵不適將將不適兵之比也頃嘗為主上論此蒙欣然領納特時有不同不能行爾賞魚袋衡山有唐開元二十年所建南嶽真君碑衡州司馬趙頥貞撰荆府兵曹蕭誠書末云别駕賞魚袋上柱國光大晊賞魚袋之名不可曉它處未之見也浯溪留題永州浯溪唐人留題頗多其一云太僕卿分司東都韋瓘大中二年過此余大和中以中書舍人謪宦康州逮今十六年去冬罷楚州刺史今年二月有桂林之命才經數月又蒙除替行次靈川聞改此官分司優間誠為忝幸案新唐書瓘仕纍中書舍人與李德𥙿善李宗閔惡之德𥙿罷相貶為明州長史終桂管觀察使以題名證之乃自中書謪康州又不終於桂史之誤如此瓘所稱十六年前正當大和七年是時德𥙿方在相位八年十一月始罷然則瓘之去國果不知坐何事也皇甫湜詩皇甫湜李翶雖為韓門弟子而皆不能詩浯溪石間有湜一詩為元結而作其詞云次山有文章可惋只在碎然長於指敘約潔多餘態心語適相應出句多分外於諸作者間拔戟成一隊中行雖冨劇粹美君可蓋子昂感遇佳未若君雅裁退之全而神上與千年對李杜才海翻髙下非可槩文於一氣間為物莫與大先王路不荒豈不仰吾輩石屏立衙衙溪口揚素瀨我思何人知徙倚如有待味此詩乃論唐人文章耳風格殊無可采也人物以義為名人物以義為名者其別最多仗正道曰義義師義戰是也衆所尊戴者曰義義帝是也與衆共之曰義義倉義社義田義學義役義井之類是也至行過人曰義義士義俠義姑義夫義婦之類是也自外入而非正者曰義義父義兒義兄弟義服之類是也衣裳器物亦然在首曰義髻在衣曰義襴義領合中小合曰義子之類是也合衆物為之則有義漿義墨義酒禽畜之賢則有義犬義烏義鷹義鶻人君壽考三代以前人君壽考有過百年者自漢晉唐三國南北下及五季凡百三十六君唯漢武帝吳大帝唐髙祖至七十一玄宗七十八梁武帝八十三自餘至五六十者亦鮮即此五君而論之梁武召侯景之禍幽辱告終旋以亡國玄宗身致大亂播遷失意飲恨而沒享祚久長翻以為害固巳不足言漢武末年巫蠱事起自皇太子公主皇孫皆不得其死悲傷愁沮羣臣上壽拒不舉觴以天下付之八歲兒吳大帝廢太子和殺愛子魯王霸唐髙祖以秦王之故兩子十孫同日併命不得已而禪位其方寸為如何然則五君者雖有崇髙之位享耆耋之夀竟何益哉若光堯太上皇帝之福真可於天人中求之韓文公佚事韓文公自御史貶陽山新舊二唐史皆以為坐論宫市事案公赴江陵塗中詩自敘此事甚詳云是年京師旱田畒少所收有司恤經費未免煩誅求傳聞閭里間赤子棄渠溝我時出衢路餓者何其稠適會除御史誠當得言秋拜疏移閣門為忠寧自謀上陳人疾苦無令絶其喉下言畿甸內根夲理冝優積雪驗豐熟幸寬待蠶牟天子惻然感司空歎綢繆謂言即施設乃反遷炎洲皇甫湜作公神道碑云關中旱飢人死相枕藉吏刻取恩先生列言天下根夲民急如是請寬民徭而免田租專政者惡之遂貶然則不因論宫市明甚碑又書三事云公為河南令魏鄆幽鎮各為留邸貯潛卒以橐罪亡公將擲其禁斷民署吏俟旦發留守尹大恐遽止之是後鄆邸果謀反將屠東都以應淮蔡及從討元濟請於裴度須精兵千人間道以入必擒賊未及行李訴自文城衣入得元濟三軍之士為公恨復謂度曰今藉聲勢王承宗可以辭取不煩兵矣得柏耆口授其詞使耆執筆書之持以入鎮州承宗遂割德棣二州以獻李翺作公行狀所載略同而唐書並逸其事且以鎮州之功專歸柏耆豈非未嘗見湜文集乎資治通監亦僅言耆以䇿于愈愈為白度為書遣之耳論韓公文劉夢得李習之皇甫持正李漢皆稱誦韓公之文各極其摯劉之語云髙山無窮太華削成人文無窮夫子挺生鸞鳯一鳴蜩螳革音手持文柄髙視寰海權衡低昂瞻我所在三十餘年聲名塞天習之云建武以還文卑質喪氣萎體敗剽剝不讓撥去其華得其本根包劉越嬴並武同殷六經之風絶而復新學者有歸大變于文又云公每以為自楊雄之後作者不出其所為文未嘗效前人之言而固與之並後進之士有志於古文者莫不視以為法皇甫云先生之作無圓無方主是歸工抉經之心執聖之權尚友作者跋邪抵異以扶孔子存皇之極茹古涵今無有端涯鯨鏗春麗驚耀天下栗密窈眇章妥句適精能之至鬼入神出姬氏以來一人而巳又云屬文意語天出業孔子孟軻而侈其文焯焯烈烈為唐之章又云如長江秋注千里一道然施於灌激或爽於用此論似為不知公者漢之語云詭然而蛟龍翔蔚然而虎鳯躍鏘然而韶鈞鳴日光玉潔周情孔思千態萬貌卒澤於道德仁義炳如也是四人者所以推髙韓公可謂盡矣及東坡之碑一出而後衆説盡廢其略云匹夫而為百丗師一言而為天下法是皆有以參天地之化關盛衰之運自東漢以來道喪文弊歷唐正觀開元而不能救獨公談笑而麾之天下靡然從公復歸於正文起八代之衰道濟天下之溺豈非參天地而獨存者乎騎龍白雲之詩蹈厲發越直到雅頌所謂若捕龍蛇搏虎豹者大哉言乎治生從宦韓詩曰居間食不足從仕力難任兩事皆害性一生常苦心然治生從宦自是兩塗未嘗有兼得者張釋之以資為郎十年不得調曰久官減兄仲之産不遂欲免歸司馬相如亦以訾為郎因病免家貧無以自業至從故人於臨卭及歸成都家徒四壁立而巳真宗末年真宗末年屬疾每視朝不多語言命令間或不能周審前輩雜傳記多以為權臣矯制而非也錢文僖在翰林有天禧四年筆録紀逐日瑣細家事及一時奏對并它所聞之語今略載於此寇萊公罷相之夕錢公當制上問與何官得錢奏云王欽若近出除太子太保上曰近上是甚云太子太傅上曰與太子太傅又云更與一優禮錢奏但請封國公而已時樞密有五貟而中書只參政李迪一人後月餘召學士楊大年宣云馮拯與吏書李迪吏侍更無它言楊奏若只轉官合中書命詞唯樞密使平章事却學士院降制上云與樞密使平章事楊亦憂慮而不復審退而草制以迪為吏部侍郎集賢相拯為樞密相又四日召知制誥晏殊殊退乃召錢上問馮拯如何商量錢奏外論甚美只為密院却有三貟正使三貟副使中書依舊一貟以此外人疑訝上云如何安排錢奏若却令拯入中書即是彰昨來錯誤但於曹利用丁謂中選一人過中書即並不妨事上云誰得錢奏丁謂是文官合入中書上云入中書遂奏授同平章事又奏兼玉清宫使又奏兼昭文國史又乞加曹利用平章事上云與平章事案此際大除拜本真宗啓其端至於移改曲折則其柄乃係詞臣可以舞文容姦不之覺也寇公免相四十日周懷政之事方作溫公記聞蘇子由龍川志范蜀公東齋記事皆誤以為因懷政而罷非也豫嘗以錢録示李燾燾采取之又誤以召晏公為寇罷之夕亦非也容齋隨筆卷第八
