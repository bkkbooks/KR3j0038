body:
  text: 孔廟位次自唐以來相傳以孔門髙弟顔淵至子夏為十哲故坐祀於廟堂上其後升顔子配享則進曽子於堂居子夏之次以𥙷其闕然顔子之父路曽子之父點乃在廡下從祀之列子處父上神靈有知何以自安所謂子雖齊聖不先父食正謂是也又孟子配食與顔子並而其師子思子思之師曽子亦在下此兩者於禮於義實為未然特相承既久莫之敢議耳周三公不特置周成王董正治官立太師太傅太保兹惟三公而云官不必備惟其人以書傳考之皆兼領六卿未嘗特置也周公既為師然猶位冢宰尚書所載召公以太保領冢宰芮伯為司徒􅊮伯為宗伯畢公以太師領司馬衛侯為司冦毛公以太傅領司空是巳其所次第惟以六卿為先後而師傅之尊乃居太保下也周公作金縢尚書孔氏所傳五十九篇皆有序其出於史官者不言某人作如虞書五篇紀一時君臣吁謨都俞及識其政事如說命武成顧命康王之誥召誥自惟二月既望至越自乃御事洛誥自戊辰王在新邑至篇終蔡仲之命自惟周公位冢宰至邦之蔡皆然如指言某人所作則伊尹作伊訓太甲咸有一德盤庚三篇周公作大誥康誥酒誥梓材多士無逸君奭多方立政是也惟金縢之篇首尾皆叙事而直以為周公作案此篇除冊祝三王外餘皆周史之詞如公乃自以為功公歸納冊公將不利於孑焉正子公乃為詩以貽王王亦未敢誚公公命我勿敢言天動威以彰周公之德公勤勞王家之語出郊反風之異决非周公所自為今不復可質究矣雲夢澤雲夢楚澤藪也列於周禮職方氏鄭氏云在華容漢志有雲夢官然其實雲也夢也各為一處禹貢所書雲土夢作又注云在江南惟左傳得其詳如䢵夫人弃子文于夢中注云夢澤名在江夏安陸縣城東南楚子田江南之夢注云楚之雲夢跨江南北楚子濟江入于雲中注入雲澤中所謂江南之夢然則雲在江之北夢在其南也上林賦楚有七澤嘗見其一名曰雲夢特其小小者耳方九百里此乃司馬長卿夸言今為縣隸德安詢諸彼人巳不能的指疆域職方氏以夢為瞢前漢叙傳子文投於瞢中音皆同關雎不同關雎為國風首毛氏列之於三百篇之前大序云后妃之德也而魯詩云后夫人雞鳴佩玉去君所周康王后不然故詩人歎而傷之後漢皇后紀序康王晏朝關雎作諷蓋用此也顯宗永平八年詔云昔應門失守關雎刺丗注引春秋說題辭曰人主不正應門失守故歌關雎以感之宋均云應門聽政之處也言不以政事為務則有宣淫之心關雎樂而不淫思得賢人與之共化修應門之政者也薛氏韓詩章句曰詩人言雎鳩正潔敬匹以聲相求隱蔽于無人之處故人君退朝入于私宫后妃御見有度應門擊柝鼓人上堂退反燕處體安志明今時大人內傾于色賢人見其萌故詠關雎之說淑女正容儀以刺時三說不同如此黍離之詩列於王國風之首周大夫所作也而齊詩以為衛宣公之子壽閔其兄伋之且見害作憂思之詩黍離之詩是也此說龍為可議迷癡厥撥柔詞諂笑專取容恱丗俗謂之迷癡亦曰迷嬉中心有愧見諸顔靣者謂之緬靦舉措脫略觸事乖忤者謂之厥撥雖為俚言然其說皆有所本列子云墨杘單至嘽咺憋懯四人相與游於丗又云眠娗諈諉勇敢怯疑四人亦相與游張湛注云墨音眉杘勑夷反方言江淮之間謂之無賴眠音緬娗音殄方言欺謾之語也郭璞云謂以言相輕嗤弄也所釋雖不同然大略具是矣曲禮衣母撥足母蹶鄭氏注云撥發揚貌蹶行遽貌大抵亦指其荒率也三館祕閣國朝儒館仍唐制有四曰昭文館曰史館曰集賢院曰袐閣率以上相領昭文大學士其次監修國史其次領集賢若只兩相則首廳兼國史唯袐閣最低故但以兩制判之四局各置直官均謂之館職皆稱學士其下則為校理檢討校勘地望清切非名流不得處范景仁為館閣校勘當遷校理宰相龐籍言范鎮有異才恬於進取乃除直袐閣司馬公作詩賀之曰延閣屹中天積書雲漢連神宗重其選謂太宗也國士比為仙玉檻鉤陳上丹梯北斗邊帝容瞻日角宸翰照星躔職秩曽無貴光華在得賢其重如此自熙寧以來或頗用賞勞元豐官制行不置昭文集賢以史館入著作局而直祕閣只為貼職至崇寧政宣以處大臣子弟姻戚其濫及於錢穀文俗吏士大夫不復貴重然除此職者必詣館下拜閣乃具盛筵邀見在三館者宴集秋曰暴書宴皆得預席若餘日則不許至隨筆有館職名存一則云亭榭立名立亭榭名最易蹈襲既不可近俗而務為竒澀亦非是東坡見一客云近看晉書問之曰曽尋得好亭子名否蓋謂其難也秦楚材在宣城於城外並江作亭目之曰知有用杜詩巳知出郭少塵事更有澄江消客愁之句也王仲衡在㑹稽於後山作亭目之曰白涼亦用杜詩越女天下白鑑湖五月涼之句二者可謂甚新然要為未當廬山一寺中有亭頗幽勝或標之曰不更歸取韓詩末句亦可笑也十十錢市肆間交易論錢陌者云十十錢言其足數滿百無蹺減也其語至俗然亦有所本後漢書襄楷傳引宫崇所獻神書其太平經興帝王篇云開其玉户施種於中比若春種於地也十十相應和而生其施不以其時比若十月種物於地也十十盡死固無生者其書不傳於今唐章懷太子注釋之時尚猶存也此所謂十十蓋言十種十生無一失耳其盡死之義亦然與錢陌之事殊然其字則同也犀舟張衡應間云犀舟徑楫後漢注引前書羌戎弓矛之兵器不犀利音義曰今俗謂刀兵利為犀犀堅也犀舟甚新竒然為文者未嘗用亦慮子所見之不博也畢仲游二書元祐𥘉司馬溫公當國盡改王荆公所行政事士大夫言利害者以千百數聞朝廷更化莫不歡然相賀唯畢仲游一書究盡本末其略云昔安石以興作之說動先帝而患財之不足也故凡政之可以得民財者無不用蓋散青苗置市易斂役錢變鹽法者事也而欲興作患不足者情也苟未能杜其興作之情而徒欲禁其散斂變置之事是以百說而百不行今遂欲廢青苗罷市易蠲役錢去鹽法凡號為財利而傷民者一掃而更之則向來用事於新法者必不喜矣不喜之人必不但曰青苗不可廢市易不可罷役錢不可蠲鹽法不可去必探不足之情言不足之事以動上意雖致石人而使聽之猶將動也如是則廢者可復散罷者可復置蠲者可復斂去者可復存矣則不足之情可不預治哉為今之䇿當大舉天下之計深明出入之數以諸路所積之錢粟一歸地官使經費可支二十年之用數年之間又將十倍於今日使天子曉然知天下之餘於財也則不足之論不得陳於前然後所謂新法者始可永罷而不復行矣昔安石之居位也中外莫非其人故其法能行今欲救前日之敝而左右侍從職司使者十有七八皆安石之徒雖起二三舊臣用六七君子然纍百之中存其十數烏在其勢之可為也勢未可為而欲為之則青苗雖廢將復散況未廢乎市易雖罷且復置況未罷乎役錢鹽法亦莫不然以此救前日之敝如人久病而少間其父兄子弟喜見顔色而未敢賀者意其病之在也先是東坡公在館閣頗因言語文章規切時政仲游憂其及禍貽書戒之曰孟軻不得巳而後辨孔子欲無言古人所以精謀極慮固功業而養壽命者未嘗不出乎此君自立朝以來禍福利害繫身者未嘗言顧直惜其言爾夫言語之纍不特出口者為言其形于詩歌贊于賦頌託于碑銘著于序記者亦言也今知畏於口而未畏於文是其所是則見是者喜非其所非則蒙非者怨喜者未能濟君之謀而怨者或巳敗君之事矣天下論君之文如孫臏之用兵扁鵲之醫疾固所指名者矣雖無是非之言猶有是非之疑又况其有耶官非諌臣職非御史而非人所未非是人所未是危身觸諱以游其間殆由抱石而救溺也二公得書聳然竟如其慮豫頃修史時因得其集讀二書思欲為之表見故官雖不顯亦為之立傳云列子與佛經相參張湛序列子云其書大略明群有以至虛為宗萬品以終滅為驗神惠以凝寂常全想念以著物自喪生覺與夢化等情所明往往與佛經相參豫讀天瑞篇載林類答子貢之言曰死之與生一往一反故死於是者安知不生於彼故吾知其不相若矣吾又安知吾今之死不愈昔之生乎此一節所謂與佛經相參者也又云商太宰問孔子三王五帝三皇聖者歟孔子皆曰弗知太宰曰然則孰者為聖孔子曰西方之人有聖者焉不治而不亂不言而自信不化而自行蕩蕩乎民無能名焉丘疑其為聖弗知真為聖歟真不聖歟其後論者以為列子所言乃佛也寄於孔子云韋孟詩乖踈漢書韋賢傳載韋孟詩二篇及其孫元成詩一篇皆深有三百篇風致但韋孟諷諌云肅肅我祖國自豕韋總齊群邦以翼大啇至于有周歷丗㑹同王赧聽譛實絶我邦我邦既絶厥政斯逸賞罰之行非繇王室庶尹群后靡扶靡衛五服崩離宗周以隊應劭曰王赧聽讒受譛絶豕韋氏自是政教逸漏不由王者觀孟之自叙乃祖而乖踈如是周至赧王僅存七邑救亡不暇豈能絶侯邦乎周之積微久矣非因絶豕韋一國然後五服崩離也其妄固不待攻而應劭又從而實之尤為可笑左傳書范宣子之言曰丐之祖在啇為豕韋氏在周為唐杜氏杜預曰豕韋國於東郡白馬縣殷末國於唐周成王滅之此最可證惜顔師古之不引用也康衡守正漢元帝時貢禹奏言天子七廟親盡之廟冝毀及郡國廟不應古禮冝正定天子下其議未及施行而禹卒後乃下詔先罷郡國廟其親盡寢園皆無復修巳而上寢疾夢祖宗譴罷郡國廟詔問丞相康衡議欲復之衡深言不可上疾久不平衡皇恐禱髙祖孝文孝武廟曰親廟冝一居京師今皇帝有疾不豫乃夢祖宗見戒以廟皇帝悼懼即詔臣衡復修立如誠非禮義之中違祖宗之心咎盡在臣衡當受其殃又告謝毀廟曰遷廟合祭久長之䇿今皇帝乃有疾願復修立承祀臣衡等咸以為禮不得如不合諸帝后之意罪盡在臣衡等當受其咎今詔中朝臣具復毀廟之文臣衡以為天子之祀義有所斷無所依緣以作其文事如失措罪乃在臣衡豫案衡平生佞諛專附石顯以取大位而此一節獨据經守禮其禱廟之文殆與金縢之冊祝相似而不為後丗所稱述漢史又不書於本傳憎而知其善可也郊祀志南山巫祠秦中秦中者二丗皇帝也以其彊死魂魄為厲故祠之成帝時康衡奏罷之亦可書西極化人列子載周穆王時西極之國有化人來王敬之若神化人謁王同游王執化人之祛騰而上者中天乃止暨及化人之宫自以居數十年不思其國復謁王同游意迷精喪請化人求還既寤所坐猶嚮者之處侍御猶嚮者之人視其前則酒未清肴未䀟王問所從來左右曰王默存耳穆王自失者三月復問化人化人曰吾與王神游也形奚動哉豫然後知唐人所著南柯太守黃粱夢櫻桃青衣之類皆本乎此詔令不可輕出人君一話一言不冝輕發況於詔令形播告者哉漢光武𥘉即位既立郭氏為皇后矣時隂麗華為貴人帝欲崇以尊位后固辭以郭氏有子終不肯當建武九年遂下詔曰吾以貴人有母儀之美冝立為后而固辭不敢當列於媵妾朕嘉其義讓許封諸弟乃追爵其父及弟為侯皆前丗妃嬪所未有至十七年竟廢郭后及太子彊而立貴人為后蓋九年之詔既行主意移奪巳見之矣郭后豈得安其位乎戰國䇿劉向序戰國䇿言其書錯亂相揉莒本字多誤脫為半字以趙為肖以齊為立如此類者多豫案今傳於丗者大抵不可讀其韓非子新序說苑韓詩外傳髙士傳史記索隱太平御覽北堂書鈔藝文類聚諸書所引用者多今本所無向博極群書但擇焉不精不止於文字脫誤而巳惟太史公史記所采之事九十有三則明白光艷悉可稽考視向為有間矣范曅漢志沈約作宋書謝儼傳曰范曅所撰十志一皆託儼搜撰隨畢遇曅敗悉蠟以覆車宋文帝令丹陽尹徐湛之就儼尋求巳不復得一代以為恨其志今闕曅本傳載曅在獄中與諸生姪書曰既造後漢欲遍作諸志前漢所有者悉令備雖事不必多且使見文得盡又欲因事就卷內發論以正一代得失意復不果此說與儼傳不同然儼傳所云乃范紀第十卷公主注中引之今宋書却無殊不可曉劉昭注𥙷志三十卷至本朝乾興元年判國子監孫奭始奏以備前史之闕故淳化五年監中所刋後漢書凡九十卷惟帝后紀十卷列傳八十卷而無志云新唐書藝文志劉昭𥙷注後漢書五十八卷不知昭為何代人所謂志三十卷當在其中也繕修犯土今丗俗營建宅舍或小遭疾厄皆云犯土故道家有謝土司章醮之文按後漢書來歷傳所載安帝時皇太子驚病不安避幸乳母野王君王聖舍太子厨監邴吉以為聖舍新繕修犯土禁不可久御然則古有其說矣容齊四筆卷第一
