body:
  text: 容齋四筆卷第十一十七則京丞相轉官慶元二年朝廷奉上三宫徽稱册寶繼又進勑令玉牒實録大臣遷秩于再于三蓋自崇寧至于紹熙未之有也於是京右丞相以十月受册寶賞由正議轉宣奉十二月用勑局賞當得兩官以一回授一轉光祿三年二月用提舉玉牒實録院及禮儀使賞有旨三項各轉兩官辭之至四五詔減為四官其半回授其二遂轉金紫四月之間陟五華資仍回授三帙在法宰執轉官與除拜同故得給使恩百二十年而入流者二十有四記淳熙十四年王左相進玉牒并充國史禮儀使梁右相進四朝史傳國朝會要并充玉牒禮儀使詔各與轉兩官所謂各者指二相也時梁公誤認為三者各兩官巳係特進謂如此則序進太師矣中批只共為兩官復辭之詔許回授又辭但令加恩亦辭適巳罷相在經筵訖於分毫不受唯王公獨加恩今日之事全相類而又巳有去冬二賞矣有司不諳練故實徑準昔年中旨行出聞京公殊不自安然無説可免惜乎東閣賢賔客不告以十年內親的故事以成其美頃居翰苑答王梁諸詔嘗上章開析論列是以竊識其詳熙寧司農牟利熙寧元豐中聚斂之臣專務以利為國司農遂粥天下祠廟官既得錢聽民為賈區廟中慢侮穢踐無所不至南京有閼伯微子兩廟一歲所得不過七八千張文定公判應天府上言曰宋王業所基也而以火王閼伯封於啇丘以主大火微子為宋始封此二祠者獨不得免乎乞以公使庫錢代其歲入神宗震怒批出曰慢神辱國無甚於斯於是天下祠廟皆得不粥又有議前代帝王陵寢許民請射耕墾司農可之唐之諸陵因此悉見芟刈昭陵喬木翦伐無遺御史中丞鄧潤甫言熙寧著令本禁樵采遇郊祀則勑吏致祭德意可謂遠矣小人掊克不顧大體使其所得不資猶為不可况至為淺鮮者哉願絀創議之人而一切如故於是未耕之地僅得免二者可謂前古未有一日萬幾蓋無由盡知之也文與可樂府今人但能知文與可之竹石惟東坡公稱其詩騷又表出美人却扇坐羞落庭下花之句豫常恨不見其全比得蜀本石室先生丹淵集蓋其遺文也於樂府雜詠有秦王卷衣篇曰咸陽秦王家宫闕明曉霞丹文映碧鏤光采相鈎加銅螭逐銀猊壓屋驚蟠拏洞戶鎖日月其中光景賖春風動珠箔鸞額金窠斜美人却扇坐羞落庭下花間弄玉指環輕氷扼紅牙君王顧之笑為駐七寶車自卷金縷衣龍鸞蔚紛葩持以贈所愛結歡期無涯其語意罙入騷人閫域又有王昭君三絶句云絶艷生殊域芳年入內庭誰知金屋寵只是信丹青幾歲後宫塵今朝絶國春君王重恩信不欲遣他人極目胡沙滿傷心漢月圎一生埋沒恨長入四條絃令人讀之縹縹然感槩無巳也譏議遷史大儒立言著論要當使後人無復擬議乃為至當如王氏中説謂陳壽有志於史依大議而削異端使壽不美於史遷固之罪也又曰史之失自遷固始也記繁而志寡王氏之意直以壽之書過於漢史矣豈其然乎元經續詩書猶有存者不知能出遷固之右乎蘇子由作古史謂太史公易編年之法為本紀世家列傳後世莫能易之然其人淺近而不學踈略而輕信故因遷之舊别為古史今其書固在果能盡矯前人之失乎指司馬子長為淺近不學貶之已甚後之學者不敢謂然常何唐太宗正觀五年以旱詔文武官極言得失時馬周客遊長安舍於中郎將常何之家何武人不學不知所言周代之陳便宜二十餘條上怪其能以問何對曰此非臣所能家客馬周為臣具草耳上即召周與語甚悅以何為知人賜絹三百匹常何後亦不顯莫知其所以進豫案李密傳密從翟讓與張須陀戰率驍勇常何等二十人為遊騎遂殺須陀常何之名蓋見於此唐史亦采於劉仁軌行年河洛記也李密詩李密在隋大業中從楊玄感起兵𬒳獲以計得脫變姓名為劉智逺教授諸生自給鬱鬱不得志哀吟泣下唐史所書如此劉仁軌行年河洛記專載密事云密往來諸賊帥之間説以舉大討莫肯從者因作詩言志曰金風蕩初節玉露垂晚林此夕窮途土鬱陶傷寸心平野葭葦合荒村葵藿深眺聽良多感徙倚獨沾襟沾襟何所為悵然懷古意秦洛既未平漢道將何冀樊噲市井屠蕭何刀筆吏一朝逢時會千載傳名諡寄言世上雄虛生真可愧諸將見詩漸敬之豫意此篇正其哀吟中所作也寺監主簿自元豐官制行九寺五監各置主簿專以掌鉤考簿書為職它不得預紹聖初韓粹彥為光祿主簿自言今輒預寺事非先帝意也請如元豐詔書從之如玉牒修書主簿不預見於王定國雜録豫猶及見紹興中太府寺公狀文移惟卿丞繫銜後來掌故之吏昧於典章遂一切與丞等今百官庶府背戾官制非特此一事也溫大雅兄弟名字新唐書溫大雅字彥弘弟彥博字大臨大有字彥將舊史不載彥博字它皆同三溫兄弟也而兩人以大為名彥為字一以彥為名大為字宰相世系表則云彥將字大有而博惟與傳同讀者往往致疑歐陽公集古録引顔思魯制中書舍人彥將行證表為是然則唯彥博異耳故或以為誤豫少時因文惠公得歐率更所書虞恭公志銘乃彥博也其名字實然後見大唐創業起居注大雅所撰其中云煬帝遣使夜至太原溫彥將宿於城西門樓上首先見之報兄彥弘馳以啓帝帝方卧聞而驚起執彥弘手而笑據此則三溫之名皆從彥而此書首題乃云大雅奉勑撰不應於其間敢自稱字巳而詳考之高宗太子弘為武后所鴆追尊為孝敬皇帝廟曰義宗列於太廟故諱其名如弘文館改為昭文弘農縣改為恆農徐弘敏改為有功韋私機但為機李含光本姓弘易為李曲阿弘氏易為洪則大雅之名後人追改之也顔魯公作顔勤禮碑敘顔溫二家之盛曰思魯大雅愍楚彥博遊秦彥將以雅為名亦由避諱耳錢聞詩左太學以此為䇿問而言歐陽作傳戾於聞見彼蓋不察宋子京之作云册府元龜真宗𥘉命儒臣編修君臣事迹後謂輔臣曰昨見宴享門中録唐中宗宴飲韋庶人等預會和詩與臣寮馬上口摘含桃事皆非禮也已令削之又曰所編事迹蓋欲垂為典法異端小説咸所不取可謂盡善而編修官上言近代臣僚自述揚歷之事如李德裕文武兩朝獻替記李石開成承詔録韓偓金鑾密記之類又有子孫追述先德敘家世如李繁鄴侯傳桞氏序訓魏公家傳之類或隱已之惡或攘人之善並多溢美故匪信書并僭偽諸國各有著撰如偽吳録孟知祥實録之類自矜本國事或近誣其上件書並欲不取餘有三十國春秋河洛記壷關録之類多是正史巳有秦記燕書之類出自偽邦商藝小説談藪之類俱是談諧小事河南志邠志平剡録之類多是故吏賔從述本府戎帥征伐之功傷於煩碎西京雜記明皇雜録事多語怪奉天録尤是虛詞盡議采收恐成蕪穢並從之及書成賜名册府元龜首尾十年皆王欽若提總凡一千卷其所遺棄既多故亦不能暴白如資治通鑑則不然以唐朝一代言之敘王世充李密事用河洛記魏鄭公諌爭用諌録李絳議奏用李司空論事睢陽事用張中丞傳淮西事用涼公平蔡録李泌事用鄴侯家傳李德裕太原澤潞回鶻事用兩朝獻替記大中吐蕃尚婢婢等事用林恩後史補韓偓鳯翔謀畫用金鑾密記平龐勛用彭門紀亂討裘甫用平剡録記畢師鐸吕用之事用廣陵妖亂志皆本末粲然然則雜史瑣説家傳豈可盡廢也漢高帝祖稱豐公前漢書高祖紀贊云劉氏自秦獲於魏秦滅魏遷大梁都于豐故周市説雍齒曰豐故梁徙也是以頌高祖云漢帝本系出自唐帝降及于周在秦作劉涉魏而東遂為豐公豐公蓋太上皇父案上六句皆韻語不知何人作此頌諸家注釋大氏闕如豫自少時讀班史今六七十年何啻百遍用朱點句亦須十本初不記憶高帝之祖稱豐公比再閲之恍然若昧平生聊表見於此舊書不厭百回讀信哉樞密行香唐世樞密使專以內侍為之與它使均稱內諸司五代以來始參用士大夫遂同執政案實録所載景德二年三月元德皇后忌中書樞密院文武百官並赴相國寺行香𥘉樞密院言舊例國忌行香唯樞密使副依內諸司例不赴恐有虧恭恪今欲每遇大忌日與中書門下同赴行香從之樞密使副翰林樞密直學士並赴自兹始也然則樞密之同內諸司久矣隆興以來定朝臣四參之儀自宰臣至于郎官御史皆班列殿庭拜舞惟樞密立殿上不預亦此意云船名三翼文選張景陽七命曰浮三翼戲中沚其事出越絶書李善注頗言其略蓋戰船也其書云闔閭見子胥問船運之備對曰船名大翼小翼突胃樓船橋船大翼者當陵軍之車小翼者當陵軍之輕車又水戰兵法內經曰大翼一艘廣一丈五尺三寸長十丈中翼一艘廣一丈三尺五寸長九丈小翼一艘廣一丈二尺長五丈六尺大抵皆巨戰船而昔之詩人乃以為輕舟梁元帝云日華三翼舸又云三翼自相追張正見云三翼木蘭船元微之云光隂三翼過其它亦鮮用之者東坡誨葛延之江隂葛延之元符間自鄉縣不逺萬里省蘇公於儋耳公留之一月葛請作文之法誨之曰儋州雖數百家之聚而州人之所須取之市而足然不可徒得也必有一物以攝之然後為已用所謂一物者錢是也作文亦然天下之事散在經子史中不可徒使必得一物以攝之然後為已用所謂一物者意是也不得錢不可以取物不得意不可以用事此作文之要也葛拜其言而書諸紳嘗以親製龜冠為獻公受之而贈以詩曰南海神龜三千歲兆叶朋從生慶喜智能周物不周身未死人鑽七十二誰能用尓作小冠􅒖嶁耳孫創其製今君此去寧復來欲慰相思時整視今集中無此詩葛常之延之三從弟也嘗見其親筆用書雲之誤今人以冬至日為書雲至用之於表啓中雖前輩或不細考然皆非也左氏傳僖公五年正月辛亥朔日南至公既視朔遂登觀臺以望而書禮也凡分至啓閉必書雲物為備故也杜預注云周正月今十一月分春秋分也至冬夏至也啓者立春立夏閉者立秋立冬雲物者氣色災變也蓋四時凡八節其禮並司漢明帝永平二年春正月辛未宗祀光武畢登靈臺觀雲物尤可為證而但讀左傳前兩三句故遂顓以指冬至云今太史局官每至此八日則為一狀若立春則曰風從艮位上來春分則曰風從震位上來它皆倣此只是定本元非托實起居注隨即修入顯為文具蓋古之書雲意也張鷟譏武后濫官武后革命濫授人官故張鷟為諺以譏之曰補闕連車載拾遺平斗量杷推侍御史捥脫校書郎唐新舊史亦載其語但泛言之案天授二年二月以十道使所舉人石艾縣令王山輝等六十一人並授拾遺補闕懷州録事參軍霍獻可等二十四人並授侍御史并州録事參軍徐昕等二十四人授著作郎內黃縣尉崔宣道等二十三人授衛佐校書凡百三十二人同日而命試官自此始也其濫如此劉子玄傳武后詔九品以上陳得失子玄言君不虛授臣不虛受今羣臣無功遭遇輒遷至都下有車載斗量杷推碗脫之諺正為此設然只是自外官便除此四職非所謂輒遷子玄之言失之矣唐王府官猥下唐自高宗以後諸王府官益輕惟開元二十三年加榮王以下官爵悉拜王府官屬浸又減省僅有一傅一友一長史亦但備貟至與其府王不相見寶曆中瓊王府長史裴簡求具狀言諸王府本在宣平坊多年摧毀後付莊宅使收管遂為公局每聖恩除授無處禮上王官為衆所輕府既不存官同虛設伏乞賜官宅一區乃詔賜延康坊宅豫因閲九經字樣一書開成中唐玄度所纂其官階云朝議郎知沔王友充翰林待詔沔王名恂憲宗之子而以書吏為友其餘可知案文武宣昭四宗皆自藩王登大位剛明果斷為史所稱蓋出於天性然非資於師友成就也御史風聞御史許風聞論事相承有此言而不究所從來以豫考之蓋自晉宋以下如此齊沈約為御史中丞奏彈王源曰風聞東海王源蘇冕會要云故事御史臺無受詞訟之例有詞狀在門御史採狀有可彈者即略其姓名皆云風聞訪知其後疾惡公方者少遞相推倚通狀人頗壅滯開元十四年始定受事御史人知一日劾狀遂題告事人名乖自古風聞之義然則向之所行今日之短卷是也二字本見尉他傳唐御史遷轉定限唐元和中御史中丞王播奏監察御史舊例在任二十五月轉準具貟不加今請仍舊其殿中侍御史舊十二月轉具貟加至十八月今請減至十五月侍御史舊十月轉加至十三月今請減至十二月從之案唐世臺官雖職在抨彈然進退從違皆出宰相不若今之雄緊觀其遷敘定限可知矣國朝未改官制之前任監察滿四年而轉殿中又四年轉侍御又四年解臺職始轉司封貟外郎元豐五年以後升沉逈别矣容齋四筆卷第十一終
