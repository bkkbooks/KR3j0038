  text: 容齋續筆卷第四十七則
  hash: sha256:4e6ac588bc5261412d3aeda441d02c414d10a63567ef5443ba6e9441db96135d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_022-1a}
body:
  text: 淮南守備周丗宗舉中原百郡之兵南征李景當是時周室方彊李氏政亂以之討伐云若易然而自二年之冬訖五年之春首尾四年至於乗輿三駕僅得江北先是河中李守正叛漢遣其客朱元來唐求救遂仕於唐樞密使查文徽妻之以女是時請兵復諸州即取舒和後以恃功偃蹇唐將奪其兵元怒而降周景械其妻欲戮之文徽方執政表乞其命景批云只斬朱元妻不殺查家女竟斬于市郭廷謂不能守濠州以家在江南恐爲唐所種族遣使詣金陵稟命然後出降則知周師所以乆者景法度猶存尚能制將帥死命故也紹興之季虜􅀐犯淮踰月之間十四郡悉陷予親見沿淮諸郡守盡掃府庫儲積分寓京口云預被旨許令移治是乃平時無虞則受極邊之賞一有緩急委而去之宼退則反了無分毫絓於吏議豈復肯以固守爲心也哉周丗宗周丗宗英毅雄傑以衰亂之丗區區五六年間威武之聲震懾夷夏可謂一時賢主而享年不及四十身没半歳國隨以亡固天方授宋使之驅除然考其行事失於好殺用法太嚴羣臣職事小有不舉往往寘之極刑雖素有才幹聲名無所開宥此其所短也薛居正舊史紀載翰林醫官馬道元進狀訴壽州界被賊殺其子獲正賊見在宿州本州不爲勘斷帝大怒遣竇儀乗馹往桉之及獄成坐族死者二十四人儀奉辭之日帝旨甚峻故儀之用刑傷於深刻知州趙礪坐除名此事本只馬氏子一人遭殺何至於族誅二十四家其它可以􅀋推矣太祖實録竇儀傳有此事史臣但歸咎於儀云竇正固竇正固漢隱帝相也周丗罷政以司徒就第後范質用此官在中書乃歸洛陽常與編户課役正固不能堪訴於留守向拱拱不聽熈寧初富韓公爲相神宗甞對大臣稱知河南府李中師治狀公以中師厚結中人因對曰陛下何從知之中師銜其沮己及再尹河南富公巳老乃籍其户令出免役錢與富民等乃知君子失勢之時小人得易而侮之如向拱李中師軰固不乏也鄭權唐穆宗時以工部尚書鄭權爲嶺南節度使卿大夫相率爲詩送之韓文公作序言權功德可稱道家屬百人無數畒之宅僦屋以居可謂貴而能貧爲仁者不富之效也舊唐史權傳云權在京師以家人數多奉入不足求爲鎭有中人之助南海多珍貨權頗積聚以遺之大爲朝士所嗤又薛廷老傳云鄭權因鄭注得廣州節度權至鎭盡以公家珍寶赴京師以酬恩地廷老以右拾遺上䟽請桉權罪中人由是切齒然則其爲人乃貪邪之士爾韓公以爲仁者何邪黨錮牽連之賢漢黨錮之禍知名賢士死者以百數海内塗炭其名迹章章者並載于史而一時牽連獲罪甘心以受刑誅皆節義之士而位行不顯僅能附見者甚多李膺死門生故吏並被禁錮侍御史景毅之子爲膺門徒未有録牒不及於譴毅􅁣然曰本謂膺賢遣子師之豈可以漏籍苟安遂自表免歸髙城人巴肅被收自載詣縣縣令欲解印綬與俱去肅不可范滂在征羌詔下急捕督郵吴導至縣抱詔書閉傳舎伏床而泣滂自詣獄縣令郭揖大驚出解印綬引與俱亡滂曰滂死則禍塞何敢以罪累君張儉亡命困迫遁走所至破家相容其所經歷伏重誅者以十數復流轉東萊上李篤家外黃令毛欽操兵到門篤謂曰張儉亡非其罪縱儉可得寧忍執之乎欽撫篤曰蘧伯玉恥獨爲君子足下如何自專仁義歎息而去儉得免後數年上禄長和海上言黨人錮及五族非經常之法由是自從祖以下皆得解釋此數君子之賢如是東漢尚名節斯其驗歟漢代文書式漢代文書臣下奏朝廷朝廷下郡國有漢官典儀漢舊儀等所載然不若金石刻所著見者爲明白史晨祠孔廟碑前云建寧二年三月癸卯朔七日己酉魯相臣晨長史臣謙頓首死罪上尚書臣晨頓首頓首死罪死罪末云臣晨誠惶誠恐頓首頓首死罪死罪上尚書副言太傅太尉司徒司空大司農府樊毅復華下民租碑前後與此同無極山碑光和四年某月辛卯朔廿二日壬子太常臣耽丞敏頓首上尚書末云臣耽愚戅頓首頓首上尚書制曰可大尚讀爲大常承書從事某月十七日丁丑尚書令忠奏雒陽宫光和四年八月辛酉朔十七日丁丑尚書令忠下又云光和四年八月辛酉朔十七日丁丑大常耽丞敏下常山相孔廟碑前云司徒臣雄司空臣戒稽首言末云臣雄臣戒愚戅誠惶誠恐頓首頓首死罪死罪臣稽首以聞制曰可元嘉三年三月廿七日壬寅奏雒陽宮元嘉三年三月丙子朔廿七日壬寅司徒雄司空戒下魯相又云永興元年六月甲辰朔十八日辛酉魯相平行長史事卞守長擅叩頭死罪敢言之司徒司空府末云平惶恐叩頭死罪死罪上司空府此碑有三公奏天子朝廷下郡國郡國上公府三式始末詳備文惠公􅀠釋有之無極山祠事以丁丑日奏雒陽宮是日下大常孔廟事以壬寅日奏雒陽宮亦以是日下魯相又以見漢丗文書之不滯留也資治通鑑司馬公修資治通鑑辟范夢得爲官屬甞以手帖論纉述之要大氐欲如左傳叙事之體又云凡年號皆以後來者爲定如武德元年則從正月便爲唐髙祖更不稱隋義寧二年梁開平元年正月便不稱唐天祐四年故此書用以爲法然究其所窮頗有窒而不通之處公意正以春秋定公爲例於未即位即書正月爲其元年然昭公以去年十二月薨則次年之事不得復係於昭故定雖未立自當追書兼經文至簡不過一二十字一覽可以了解若通鑑則不侔隋煬帝大業十三年便以爲恭皇帝上直至下卷之末恭帝立始改義寧後一卷則爲唐髙祖蓋凡渉歷三卷而煬帝固存方書其在江都時事明皇後卷之首標爲肅宗至德元載至一卷之半方書太子即位代宗下卷云上方勵精求治不次用人乃是德宗也莊宗同光四年便係於天成以爲明宗而卷内書命李嗣源討鄴至次卷首莊宗方殂潞王清泰三年便標爲􅀳髙祖而卷内書石敬瑭反至卷末始爲􅀳天福凡此之􅀋殊費分􅀃此外如􅀳宋諸胡僣國所封建王公及除拜卿相纎悉必書有至二百字者又如西秦丞相南川宣公出連乞都卒魏都坐大官章安侯封懿天部大人白馬文正公崔宏冝都文成王穆觀鎭逺將軍平舒侯燕鳯平昌宣王和其奴卒皆無關於社稷治亂而周勃薨乃不書及書漢章帝行幸長安進幸槐里􅄮山又幸長平御池陽宮東至髙陵十二月丁亥還宮又乙未幸東阿北登太行山至天井關夏四月乙卯還宮又書魏主七月戊子如魚池登青岡原甲午還宮八月已亥如彌澤甲寅登牛頭山甲子還宮如此行役無歳無之皆可省也弱小不量力楚莊王伐蕭蕭人囚熊相冝僚及公子丙王曰勿殺吾退蕭人殺之王怒遂滅蕭楚伐莒莒人囚楚公子平楚人曰勿殺吾歸而俘莒人殺之楚師圍莒莒潰遂入鄆齊侯伐魯圍龍頃公之嬖人盧蒲就魁門焉龍人囚之齊侯曰勿殺吾與而盟無入而封弗聽殺而膊諸城上齊遂取龍夫以齊楚之大而莒一小國蕭一附庸龍一邊邑方受攻之際幸能囚執其人強敵許以勿殺而退師乃不度德量力致怨於彼至於亡滅可謂失計傳稱子産善相小國使當此時必有以處之矣田橫吕布田橫旣敗竄居海﨩中髙帝遣使召之曰橫來大者王小者乃侯耳横遂與二客詣雒陽將至謂客曰橫始與漢王俱南面稱􅀌今漢王爲天子而橫迺爲亡虜北面事之其媿固巳甚矣即自剄橫不顧王侯之爵視死如歸故漢祖流涕稱其賢班固以爲雄材韓退之道出其墓下爲文以弔曰自古死者非一夫子至今有耿光其英烈凜然至今猶有生氣也吕布爲曹操所縛將死之際乃語操曰明公之所患不過於布今巳服矣令布將􅀐明公將歩天下不足定也操竟殺之布之材未必在橫下而欲忍恥事讎故東坡詩曰猶勝白門窮吕布欲將鞍馬事曹暪蓋􅀏之也劉守光以燕敗爲􅀳王所擒旣知不免猶呼曰王將復唐室以成霸業何不赦臣使自效此又庸奴下才無足責者中山冝陽戰國事雜出於諸書故有不可考信者魏文侯使樂羊伐中山克之以封其子故任座云君得中山不以封君之弟而以封君之子翟璜云中山巳拔無使守之臣進李克而趙丗家書武靈王以中山􅀒齊之強侵暴其地銳欲報之至於變胡服習􅀐射累年乃與齊燕共滅之遷其王於膚施此去魏文侯時巳百年中山不應旣亡而復存且膚施屬上郡本魏地爲秦所取非趙可得而置它人誠不可曉惟樂毅傳云魏取中山後中山復國趙復滅之史記六國表威烈王十二年中山武公初立徐廣曰周定王之孫西周桓公之子此尤不然冝陽於韓爲大縣顯王三十四年秦伐韓拔之故屈冝臼云前年秦拔冝陽正是昭侯時歷宣惠王襄王而秦甘茂又抜冝陽相去幾三十年得非韓甞失此邑旣而復取之乎相六畜莊子載徐無􅀑見魏武侯告之以相狗馬荀子論堅白同異云曾不如好相雞狗之可以爲名也史記禇先生於日者傳後云黃直丈夫也陳君夫婦人也以相馬立名天下留長孺以相􅇾立名滎陽禇氏以相牛立名皆有髙丗絶人之風今時相馬者間有之相牛者殆絶所謂雞狗􅇾者不復聞之矣劉向七略相六畜三十八卷謂骨法之度數今無一存􅁲筮不同洪範七稽疑擇建立􅁲筮人有􅀛從筮逆之􅀃禮記􅁲筮不相襲謂􅁲不吉則又筮筮不吉則又􅁲以爲瀆􅀛筴左傳􅀳獻公欲以驪􅁎爲夫人􅁲之不吉筮之吉公曰從筮􅁲人曰筮短􅀛長不如從長魯穆姜徙居東宫筮之遇艮之八史曰是謂艮之隨杜預注云周禮太卜掌三易雜用連山歸藏二易皆以七八爲占故言遇艮之八史疑古易遇八爲不利故更以周易占變爻得隨卦也漢武帝時聚會占家問之某日可取婦乎五行家曰可堪輿家曰不可建除家曰不吉叢辰家曰大凶曆家曰小凶天人家曰小吉太一家曰大吉辯訟不決以狀聞制曰避諸死忌以五行爲主則曆卜諸家自古蓋不同矣唐吕才作廣濟隂陽百忌曆丗多用之近又有三曆會同集蒐羅詳盡姑以擇日一事論之一年三百六十日若泥而不通殆無一日可用也日者墨子書貴義篇云子墨子北之齊遇日者日者曰帝以今日殺黒龍於北方而先生之色黑不可以北子墨子不聽遂北至淄水不遂而反日者曰我謂先生不可以北子墨子曰南之人不得北北之人不得南其色有黒者有白者何故皆不遂也且帝以甲乙殺青龍於東方以丙丁殺赤龍於南方以庚辛殺白龍於西方以壬癸殺黒龍於北方若子之言不可用也史記作日者列傳蓋本於此徐廣曰古人占􅃸􅁲筮通謂之日者如以五行所直之日而殺其方龍不知其旨安在亦可謂怪矣柳子厚黨叔文柳子厚劉夢得皆坐王叔文黨廢黜劉頗飾非解謗而柳獨不然其答許孟容書云早歳與􅀒罪者親善始竒其能謂可以共立仁義裨教化暴起領事人所不信射利求進者百不一得一旦快意更恣怨讟詆訶萬狀盡爲敵讎及爲叔文母劉夫人墓銘極其稱誦謂叔文堅明直亮有文武之用待詔禁中道合儲后獻可朁否有康弼調護之勤訏謨定命有扶翼經緯之績將明出納有彌綸通變之勞内􅐌謨畫不廢其位利安之道將施于人而夫人終于堂知道之士爲蒼生惜焉其語如此夢得自作傳云順宗即位時有寒儁王叔文以善奕棋得通籍博望因間􅂩得言及時事上大竒之叔文自言猛之後有逺祖風唯吕温李景儉柳宗元以爲信然三子皆與予厚善日夕過言其能叔文實工言治道能以口辯移人旣得用其所施爲人不以爲當上素被疾詔下内禪宮掖事袐功歸貴臣於是叔文貶死韓退之於兩人爲執友至修順宗實録直書其事云叔文密結有當時名欲僥倖而速進者劉禹錫柳宗元等十數人定爲死交蹤跡詭袐旣得志劉柳主謀議唱和采聽外事及敗其黨皆斥逐此論切當雖朋友之義不能以少蔽也漢武心術史記􅀛䇿傳今上即位博開蓺能之路悉延百端之學通一技之士咸得自效數年之間太卜大集會上欲擊匈奴西攘大宛南收百越卜筮至預見表象先圖其利及猛將推鋒執節獲勝於彼而蓍龜時日亦有力於此上尤加意賞賜至或數千萬如丘子明之屬富溢貴寵傾於朝廷至以卜筮射蠱道巫蠱時或頗中素有眦睚不快因公行誅恣意所傷以破族滅門者不可勝數百僚蕩恐皆曰􅀛策能言後事覺姦窮亦誅三族漢書音義以爲史遷没後十篇闕有録無書元成之間禇先生補闕言辭鄙陋日者􅀛䇿列傳在焉故後人頗薄其書然此卷首言今上即位則是史遷指武帝其載巫蠱之寃如是今之論議者略不及之資治通鑑亦棄不取使丘子明之惡不復著見此由武帝博采異端馴致斯禍儻心術趨於正當不如是之酷也禁天髙之稱周宣帝自稱天元皇帝不聽人有天髙上大之稱官名有犯皆改之改姓髙者爲姜九族稱髙祖者爲長祖政和中禁中外不許以龍天君玉帝上聖皇等爲名字於是毛友龍但名友葉天將但名將樂天作但名作句龍如淵但名句如淵衞上達賜名仲達葛君仲改爲師仲方天任爲大任方天若爲元若余聖求爲應求周綱字君舉改曰元舉程振字伯玉改曰伯起程瑀亦字伯玉改曰伯禹張讀字聖行改曰彦行蓋蔡京當國遏絶史學故無有知周事者宣和七年七月手詔以昨臣僚建請士庶名字有犯天玉君聖及主字者悉禁旣非上帝名諱又無經據諂佞不根貽譏後丗罷之宣和冗官宣和元年蔡京將去相位臣僚方䟽官僚冗濫之敝大略云自去歳七月至今年三月遷官論賞者五千餘人如辰州招弓弩手而樞密院支差房推恩者八十四人兖州陞爲府而三省兵房推恩者三百三十六人至有入仕才二年而轉十官者今吏部兩選朝奉大夫至朝請大夫六百五十五貟橫行右武大夫至通侍二百二十九貟修武郎至武功大夫六千九百九十一貟小使臣二萬三千七百餘貟選人一萬六千五百餘貟吏貟猥冗差注不行詔三省樞密院令遵守成法然此詔以四月庚子下而明日辛丑以賞西陲誅討之功太師蔡京宰相余深王黼知樞密院鄧洵武各與一子官執政皆遷秩天子命令如是即日廢格之京之罪惡至矣容齋續筆卷第四
