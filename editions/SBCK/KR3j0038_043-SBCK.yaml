body:
  text: 容齋三筆卷第七十四則執政辤轉官眞宗天禧元年合􅀕天地禮畢推恩百僚宰相以下遷官一等時參知政事三人陳彭年自刑部侍郎遷兵部王曽自左諌議大夫遷給事中張知白自給事中遷工部侍郎而知白獨豤辤數四上敷諭終不能奪王曽聞之亦乞􅃦恩命上曰知白無他意但以卿爲諌議大夫班在上已爲給事中在下所以固辤欲品秩有序爾於是從知白所請而優加名數進階金紫光禄大夫併賜功臣爵邑元祐三年四月宰執七人自文彦博仍前太師外右僕射吕公著除司空同平章軍國事中書侍郎吕大防除左僕射同知樞密院范純仁除右僕射尚書左丞劉摯除中書侍郎右丞王存除左丞唯知樞密院安燾不遷乃自正議大夫特轉右光禄燾上章辤令學士院降詔不允學士蘇軾以爲朝廷豈以執政六人五人進用故加遷秩以慰其心旣無授受之名僅似姑息之政欲奉命草詔不知所以爲詞伏望從其所請御寳批可且用一意度作不許詔書進入燾竟辤始免紹興三十一年陳康伯自右相拜左相朱倬自參政拜右相時葉義問知樞密院元居倬上不得遷朝論謂宜進爲使學士何溥靣受草制之旨曽以爲言高宗不許紹熈五年七月主上登極拜知樞密院趙汝愚爲右相參政陳騤除知院同知院事余端禮除參政而左丞相留正以少保進少傅乃係特遷且非覃恩正固辭乃止宗室補官壽皇聖帝登極赧恩凡宗子不以服屬逺近人數多少其曽􅀗文解兩次者並直赴殿試略通文墨者所在州量試即􅀘承信郎由是入仕者過千人以上淳熈十六年二月紹熈五年七月二赦皆然故皇族得官不可以數計偶閱唐昭宗實録載一事云宗正少卿李克助奏准去年十一月赦書皇三等以上親無官者毎父下放一人出身皇五等以上親未有出身陪位者與出身寺司起請承前舊例九廟子孫陪位者毎父下放一人出身共放三百八十人其諸房宗室等各赴陪位納到文狀共一千二十七人除元不赴陪位及不納到狀及違寺司條流不取宗室充係落下外係三百八十人合放出身勑准赦書處分予案昭宗以文德元年即位次年十一月南郊禮畢肆赦其文略云皇三等以上親委中書門下各擇有才行者量與改官無官者毎父下放一人出身皇五等以上親未有出身陪位者與出身然則亦有三等五等親陪位與不陪位之差别也孫宣公諌封禪等景德祥符之閒北戎結好宇内乂寜一時邪䛕之臣唱爲瑞應祺祥以罔明主王欽若陳彭年軰實主張之天書旣降於是東封西祀太清之行以次丕講滿朝􅂄老方正之士鮮有肯啓昌言以遏其姦熖雖冦萊公亦爲之而孫宣公奭獨上䟽爭救于再于三眞録出於欽􅀂提綱故不能盡載以故後人罕稱之予略摘其大槩紀於此一章論西祀曰汾隂后土事不經見漢都雍去汾隂至近河東者唐王業所起之地且又都雍故武帝明皇行之今陛下經重關越險阻逺離京師根本之固其爲不可甚矣古者聖王先成民而後致力於神今土木之功累年未息水旱作沴饑饉居多乃欲勞民事神神其享之乎明皇嬖寵害政姦佞當塗以至身播國屯今議者引開元故事以爲盛烈臣切不取今之姦臣以先帝詔停封禪故贊陛下以爲繼承先志且先帝欲北平幽朔西取繼遷則未嘗獻一謀畫一䇿以佐陛下而乃卑辭重幣求和於契丹蹙國縻爵姑息於保吉謂主辱臣死爲空言以誣下罔上爲巳任撰造祥瑞假託􅀑神􅂊畢東封便議西幸以祖宗艱難之業爲佞邪僥倖之資臣所以長歎而痛哭也二章論爭言符瑞曰今野鵰山鹿並形奏簡秋旱冬雷率皆稱賀將以欺上天則上天不可欺將以愚下民則下民不可愚將以惑後世則後世必不信腹非竊笑有識盡然三章論將幸亳州曰國家近日多效唐明皇所爲且明皇非令德之君觀其禍敗足爲深戒而陛下反希慕之近臣知而不諌得非姦佞乎明皇奔至馬嵬楊國忠旣誅乃諭軍士曰朕識理不明􅀉任失所近亦覺寤然則巳晚矣陛下宜早覺寤斥逺邪佞不襲危亂之迹社稷之福也四章論朱能天書曰姦憸小人妄言符瑞而陛下崇信之屈至尊以迎拜歸祕殿以奉安百僚黎庶痛心疾首反脣腹非不敢直言臣不避死亡之誅聽之罪之惟在聖斷昔漢文成五利妄言不讎漢武誅之先帝時侯莫陳利用方術姦發誅於鄭州唐明皇得靈符寳劵皆王鉷田同秀等所爲不能顯戮今日見老君於閣上明日見老君於山中大臣尸禄以將迎端士畏威而緘黙及禄山兆亂輔國刼遷大命旣傾前功併棄今朱能所爲是已願逺思漢武之雄材近法先帝之英斷中鍳明皇之召禍庶幾災害不生禍亂不作奭之論諌雖魏鄭公陸宣公不能過也赦恩爲害赦過宥罪自古不廢然行之太頻則惠姦長惡引小人於大譴之域其爲害固不勝言矣唐莊宗同光二年大赦前云罪無輕重常赦所不原者咸赦除之而又曰十惡五逆屠牛鑄錢故殺人合造毒藥持仗行刼官典犯贓不在此限此制正得其中當亂離之朝乃能如是亦可取也而今時或不然代宗崇尚釋氏唐代宗好祠祀未甚重佛元載王縉杜鴻漸爲相三人皆好佛上嘗問以佛言報應果爲有無載等奏國家運祚靈長非宿植福業何以致之福業已定雖時有小災終不能爲害所以安史有子禍僕固病死回紇吐蕃不戰而退此皆非人力所及上由是深信之常於禁中飯僧有寇至則令僧講仁王經以禳之宼去則厚加賞賜胡僧不空官至卿􅁥爵爲國公出入禁闥􅀔移權貴此唐史所載也予家有嚴郢撰三藏和尚碑徐季海書乃不空也云西域人氏族不聞於中夏玄肅代三朝皆爲國師代宗初以特進大鴻臚襃表之及示疾又就卧内加開府儀同三司肅國公旣亡廢朝三日贈司空其恩禮之寵如此同時又有僧大濟爲帝常脩功德至殿中􅁥贈其父惠恭兖州刺史官爲營辨葬事有勑葬碑今存時兵革未盡息元勲宿將賞功賦職不過以此處之顧施之一僧繆濫甚矣光武符堅漢光武建武三十年群臣請封禪泰山詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎􅀂郡縣逺遣吏上壽盛稱虚美必髠令屯田於是羣臣不敢復言其英斷如此然財二年閒乃因讀河圗㑹昌符詔索河雒䜟文言九世當封禪者遂爲東封之舉可謂自相矛盾矣符堅禁圖䜟之學尚書郎王佩讀䜟堅殺之學䜟者遂絶及季年爲慕容氏所困於長安自讀䜟書云帝出五將乆長得乃出奔五將山甫至而爲姚萇所執始禁人爲䜟學終乃以此喪身亡國乆長得之兆豈非言乆當爲姚萇所得乎又姚與遥同亦乆也光武與堅非可同日語特其事偶可議云周武帝宣帝周武帝平齊中原盡入輿地陳國不足平也而雅志節儉至是愈篤後宫唯置妃二人世婦三人御妻三人則其下保林良使軰度不過數十耳一傳而至宣帝奢􅁋酣縱自比於天廣搜美女以實後宫儀同以上女不許輙嫁遂同時立五皇后父子之賢否不同一至於此唐觀察使唐丗於諸道置按察使後改爲采訪處置使治於所部之大郡旣又改爲觀察其有戎旅之地即置節度使分天下爲四十餘道大者十餘州小者二三州但令訪察善惡舉其大綱然兵甲財賦民俗之事無所不領謂之都府權􅀔不勝其重能生殺人或專私其所領州而虐視支郡元結爲道州刺史作春陵行以爲諸使誅求符牒二百餘通又作賊退示官吏一篇以爲忍苦裒歛陽城守道州賦稅不時觀察使數誚責又遣判官督賦城自囚於獄判官去復遣官來按舉韓愈送許郢州序云爲刺史者􅁪私於其民不以實應乎府爲觀察使者常急於其賦不以情信乎州財巳竭而歛不休人巳窮而賦愈急韓臯爲浙西觀察使封杖決安吉令孫澥至死一時所行大抵􅀋此然毎道不過一使臨之耳今之州郡控制按刺者率五六人而臺省不預毀譽善否隨其意好又非唐日一觀察使比也冗濫除官自漢以來官曹冗濫之極者如更始竈下養中郎將爛羊頭關内侯晉趙王倫貂不足狗尾續北史周世貟外常侍道上比肩唐武后補闕連車拾遺平斗之諺皆顯顯著見者中葉以後尤爲泛濫張廵在雍丘才領一縣千兵而大將六人官皆開府特進然則大將軍告身愽一醉誠有之矣德宗避難於奉天渾瑊之童奴曰黄芩力戰即封勃海郡王至於僖昭之世遂有捉船郭使君看馬李僕射周行逢據湖湘境内有漫天司空遍地太保之譏李茂正在鳯翔内外持管籥者亦呼爲司空太保韋莊浣花集有贈僕者楊金詩云半年勤苦葺荒居不獨單寒腹亦虚努力且爲田舎客它年爲爾覔金魚是時人奴腰金曵紫者蓋不難致也節度使稱太尉唐節度使帶檢校官其初只左右散􅀐常侍如李愬在唐鄧時所稱者也後乃轉尚書及僕射司空司徒能至此者蓋少僖昭以降藩鎭盛彊武夫得志􅂊建節􅃏其資級已高於是復升太保太傅太尉其上惟有太師故將帥悉稱太尉元豐定官制尚如舊貫崇寜中改三公爲少師少傅少保而以太尉爲武階之冠以是凡管軍者猶悉稱之紹興閒葉夢得自觀文殿學士張澄自端明殿學士皆拜節度葉嘗任執政以暮年擁旄爲儒者之榮自稱葉太尉張微時用鄧洵武給使恩出身羞爲武職但稱尚書如故其相反如此五代濫刑五代之際時君以殺爲嬉視人命如草芥唐明宗頗有仁心獨能斟酌悛救天成三年京師廵檢軍使渾公兒口奏有百姓二人以竹竿習戰􅃲之事帝即傳宣令付石敬瑭處置敬瑭殺之次日樞宻使安重誨敷奏方知悉是㓜童爲戯下詔自咎以爲失刑減常膳十日以謝幽􅁈罰敬瑭一月俸渾公兒削官杖􅆃配流登州小兒骨肉賜絹五十匹粟夌各百碩便令如法埋葬仍戒諸道州府凡有極刑並須子細裁遣此事見舊五代史新書去之太一推筭熈寜六年司天中官正周琮言據太一經推筭熈寜七年甲寅歳太一陽九百六之數至是年復元之初故經言太歳有陽九之災太一有百六之厄皆在入元之終或復元之􅀄陽九百六當癸丑甲寅之歳爲災厄之㑹而得五福太一移入中都可以消災爲祥􅀼詳五福太一自雍熈甲申歳入東南巽宫故修東太一宫于蘇村天聖已巳歳入西南坤位故修西太一宫于八角鎭朢稽詳故事崇建宫宇詔度地于集禧觀之東於是爲中太一宫時王安石擅國盡變亂祖宗法度爲宗社之禍蓋自此始雖太一照臨亦不能救也紹熈四年癸丑五年甲寅朝廷之閒殊爲多事壽皇聖帝厭代泰安以乆疾退處人情業業皆有憂葵恤緯之慮時無星官曆翁考歩推􅄨庸詎知非入元復元之際乎趙丞相除拜紹熈五年七月十六日宣麻制以太中大夫知樞宻院事趙汝愚爲特進右丞相議者或謂國朝無宗室宰相且轉官九級非故事趙上章力辭不肯入都堂涖職越六日詔改除樞密使依宰臣超三官又二日制除正議大夫樞密使攷按故實宣和二年王黼自通議大夫中書侍郎拜特進少宰凡遷八官黼受之靖康元年呉敏自中大夫知樞宻院拜銀青光禄大夫少宰亦遷八官敏辭之但以通議就職秦檜當國以其子熺爲中大夫知樞密院巳而除觀文殿學士恩數如右僕射遂暗轉通奉大夫踰年加大學士徑超七秩爲特進熺處之不疑捨此三人外蓋未之有若自宰相改樞密使唯夏竦一人是時以陳執中爲昭文相竦爲集賢相御史言竦向在陜西與執中議論不恊不可同寅政地於是貼麻改命而初制不出今汝愚先報相麻後報樞制乃是經日巳乆因固辭以然又桉國史明道二年宰臣張士遜樞宻使楊崇勲同日罷士遜以左僕射判河南府崇勲以節度使平章事判許州明日入謝崇勲班居上仁宗問之士遜奏曰崇勲係使相臣官只僕射當在下即再鎻院以士遜爲使相是時學士盛度當制猶用士遜作相銜論者非之謂應用僕射河南爲前銜也乾道二年葉顒以前參知政事召還爲知樞密院未受告而拜左相當制以新除知樞密院結銜今汝愚拜相宣麻巳閱八日故稱新除特進右丞相二者皆是也唐昭宗恤録儒士唐昭宗光化三年十二月左補闕韋莊奏詞人才子時有遺賢不霑一命於聖明没作千年之恨骨據臣所知則有李賀皇甫松李羣玉陸􅀛􅀩趙光逺温廷筠劉德仁陸逵傅錫平曽賈島劉稚珪羅鄴方干俱無顯過皆有竒才麗句清詞徧在詞人之口衘􅁈抱恨竟爲􅁳路之塵伏望追賜進士及第各贈補闕拾遺見存唯羅隱一人亦乞特賜科名録升三署勑􅅄莊而令中書門下詳酌處分次年天復元年赦文又令中書門下選擇新及第進士中有乆在名場才沾科級年齒巳高者不拘常例各授一官於是禮部侍郎杜德祥奏㨂到新及第進士陳光問年六十九曹松年五十四王希羽年七十三劉象年七十柯崇年六十四鄭希顔年五十九詔光問松希羽可祕書省正字象崇希顔可太子校書案登科記是年進士二十六人光問第四松第八希羽第十二崇象希顔居末級昭宗當斯時離亂極矣尚能眷眷於寒儒其可書也摭言云上新平内難聞放新進士喜甚特授官制詞曰念爾登科之際當予反正之年宜降異恩各膺寵命時謂此舉爲五老牓容齋三筆卷第七終
