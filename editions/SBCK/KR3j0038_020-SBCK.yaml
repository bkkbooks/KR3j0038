  text: 容齋續筆卷第二十八則
  hash: sha256:f7aa9bd86688cccf1a4cb9a2129e978e05ca120b2523e92d5735ace57d734daf
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_020-1a}
body:
  text: 權若訥馮澥唐中宗旣流殺五王再復武氏陵廟右補闕權若訥上䟽以爲天地日月等字皆則天能事賊臣敬暉等輕紊前規削之無益於淳化存之有光於孝理又神龍制書一事以上竝依正觀故事豈可近捨母儀逺尊祖德䟽奏手制襃美欽宗在位懲王安石蔡京之誤國政事悉以仁宗爲法左諫議大夫馮澥上言仁宗皇帝陛下之高祖也神宗皇帝陛下之祖也子孫之心寧有厚薄王安石司馬光皆天下之大賢其優劣等差自有公論願無作好惡允執厥中則是非自明矣詔牓朝堂侍御史李光駮之不聽復爲右正言崔鶠所擊宰相不復問而遷澥吏部侍郎桉若訥與澥兩人議論操持絶相似盖澥在崇寧中首上書乞廢元祐皇后自選人除寺監丞其始終大節不論可見建炎初元乃超居政地公議憤之歳旦飲酒今人元日飲屠酥酒自小者起相傳巳乆然固有來處後漢李膺杜密以黨人同繫獄值元日於獄中飲酒曰正旦從小起時鏡新書􅀳董勛云正旦飲酒先飲小者何也勛曰俗以小者得歳故先酒賀之老者失時故後飲酒初學記載四民月令云正旦進酒次第當從小起以年小者起先唐劉夢得白樂天元日舉酒賦詩劉云與君同甲子壽酒讓先杯白云與君同甲子歳酒合誰先白又有歳假内命酒一篇云歳酒先拈辭不得􅀍君推作少年人顧況云不覺老將春共至更悲携手幾人全還丹寂寞羞明鏡手把屠蘇讓少年裴夷直云自知年幾偏應少先把屠蘇不讓春儻更數年逢此日還應惆悵羨他人成文幹云戴星先捧祝堯觴鏡裏堪驚兩􅁂霜好是燈前偷失􅀏廜應不得先甞方干云纔酌屠蘇定年齒坐中皆􅀏􅁂毛斑然則尚矣東坡亦云但把窮愁博長健不辭最後飲屠酥其義亦然存殁絶句杜子美有存殁絶句二首云席謙不見近彈棊畢曜仍傳舊小詩玉局他年無限􅀏白楊今日幾人悲鄭公粉繪隨長夜曹霸丹青巳白頭天下何曾有山水人間不解重驊騮毎篇一存一没盖席謙曹霸存畢鄭殁也黄魯直荆江亭即事十首其一云閉門覔句陳無巳對客揮毫秦少游正字不知温飽未西風吹淚古藤州乃用此體時少游殁而無巳存也近歳新安胡仔著漁隱叢話謂魯直以今時人形入詩句盖取法於少陵遂引此句實失於詳究云湯武之事湯武之事古人言之多矣惟漢轅固黃生爭辯最詳黃生曰湯武非受命迺殺也固曰不然桀紂荒亂天下之心皆歸湯武湯武因天下之心而誅桀紂不得巳而立非受命爲何黃生曰冠雖敝必加於首履雖新必貫於足今桀紂雖失道君上也湯武雖聖臣下也反因過而誅之非殺而何景帝曰食肉母食馬肝未爲不知味言學者母言湯武受命不爲愚遂罷顔師古注云言湯武爲殺是背經義故以馬肝爲喻也東坡志林云武王非聖人也昔者孔子盖罪湯武伯夷叔齊不食周粟而孔子予之其罪武王也甚矣至孟軻始亂之使當時有良史南巢之事必以叛書牧野之事必以弑書湯武仁人也必將爲法受惡可謂至論然予切考孔子之序書明言伊尹相湯伐桀成湯放桀于南巢武王伐商武王勝商殺受各蔽以一語而大指皦如所謂六蓺折衷無待於良史復書也張釋之傳誤漢書紀傳志表矛盾不同非一然唯張釋之爲甚本傳云釋之爲􅀐郎事文帝十年不得調亡所知名欲免歸中郞將􅀽盎惜其去請徙補謁者後拜爲廷尉逮事景帝歳餘爲淮南相而百官公卿表所載文帝即位三年釋之爲廷尉至十年書廷尉昌廷尉嘉又二人凡歷十三年景帝乃立而張敺爲廷尉則是釋之未甞十年不調及未甞以廷尉事景帝也張于二廷尉張釋之爲廷尉天下無寃民于定國爲廷尉人自以不寃此漢史所稱也兩人在職皆十餘年周勃就國人上書告勃欲反下廷尉逮捕吏稍侵辱之勃以千金與獄吏吏使以公主爲證太后亦以爲無反事乃得赦出釋之正爲廷尉不能救但申理犯蹕盜環一二細事耳楊惲爲人告驕奢不悔過下廷尉桉驗始得所予孫會宗書定國當惲大逆無道惲坐要斬惲之罪何至於是其徇主之過如此傳所謂決疑平法務在哀矝者果何爲哉漢唐置郵趙充國在金城上書言先零䍐羌事六月戊申奏七月甲寅璽書報從其計案金城至長安一千四百五十里往反倍之中間更下公卿議臣而自上書至得報首尾才七日唐開元十年八月巳卯夜權楚璧等作亂時明皇幸洛陽相去八百餘里壬午遣河南尹王怡如京師桉問宣慰首尾才三日置郵傳命旣如此其速而廷臣共議蓋亦未甞淹乆後丗所不及也龍且張歩韓信擊趙李左車勸陳餘勿與戰餘曰今如此避弗擊諸侯謂吾怯而輕來伐我遂與信戰身死國亡是時信方爲漢將始攻下魏代威聲猶未暴白陳餘易之尚不足訝及滅趙服燕則關東六國旣定其四矣信伐齊楚使龍且來救或言漢兵不可當龍且曰吾平生知韓信爲人易與耳不足畏也何爲而止一戰而没項隨以亡耿弇討張歩斬其大將軍費邑走邑之弟敢進攻西安臨淄拔其城又走其弟藍勢如破竹先是弇巳破尤來大槍延岑彭寵冨平獲索矣時歩所盜齊地太半爲弇所得然歩猶曰以尤來大肜十餘萬衆吾皆即其營而破之今弇兵少於彼又皆疲勞何足摧乎竟出兵大戰兄弟成禽兵法云知彼知己百戰不殆龍且張歩豈復識此哉梁臨川王宏伐魏魏元英禦之宏停軍不前魏人勸英進據洛水英曰蕭臨川雖騃其下有良將韋裴之屬未可輕也冝且觀形勢勿與交鋒宏卒敗退英之識見非前人可比也然遂進軍圍鍾離魏邢巒以爲不可魏主召使還英表稱必克爲曹景宗韋叡所挫失亡二十餘萬人智於前而昧於後爲可恨耳義理之􅀃無窮經典義理之􅀃最爲無窮以故解釋傳䟽自漢至今不可槩舉至有一字而數􅀃者姑以周易革卦言之巳日乃孚革而信之自王輔嗣以降大抵謂即日不孚巳日乃孚巳字讀如矣音盖其義亦止如是耳唯朱子發讀爲戊巳之已予昔與易僧曇瑩論及此問之曰或讀作己音紀日如何瑩曰豈唯此也雖作巳音似日亦有義乃言曰天元十干自甲至已然後爲庚庚者革也故已日乃孚猶云從此而革也十二辰自子至巳六陽數極則變而之隂於是爲午故巳日乃孚猶云從此而變也用是知好竒者欲穿鑿附會固各有􅀃云開元五王唐明皇兄弟五王兄申王撝以開元十二年寧王憲邠王守禮以二十九年弟􅄮王範以十四年薛王業以二十二年薨至天寶時巳無存者楊太眞以三載方入宫而元稹連昌宮詞六百官隊仗避􅄮薛楊氏諸姨車􅃲風李商隱詩云夜半宴歸官漏永薛王沉醉壽王醒皆失之也巫蠱之禍漢丗巫蠱之禍雖起於江充然事會之來盖有不可曉者武帝居建章宮親見一男子帶劒入中龍華門疑其異人命收之男子􅂢劒走逐之弗獲上怒斬門􅃸閉長安城門大索十一日巫蠱始起又甞晝寢夢木人數千持杖欲擊己乃驚寤因是體不平遂苦忽忽善忘此兩事可謂異矣木將腐蠧實生之物將壞蟲實生之是時帝春秋巳髙忍而好殺李陵所謂法令無常大臣無罪夷滅者數十家由心術旣荒隨念招妄男子木人之兆皆迷不復開則謫見於天􅀑瞰其室禍之所被以妻則衞皇后以子則戾園以兄子則屈􅈊以女則諸邑陽石公主以婦則史良娣以孫則史皇孫骨肉之酷如此豈復顧他人哉且兩公主實衞后所生太子未敗數月前皆巳下獄誅死則其母與兄豈有全理固不待於江充之􅉲也唐詩無諱避唐人歌詩其於先丗及當時事直辭詠􅀉略無避隱至宫禁嬖昵非外間所應知者皆反復極言而上之人亦不以爲罪如白樂天長恨歌諷諫諸章元微之連昌宫詞始末皆爲明皇而發杜子美尤多如兵車行前後出塞新安吏潼關吏石壕吏新㛰別垂老別無家別哀王孫悲陳陶哀江頭麗人行悲青阪公孫舞劒器行終篇皆是其它波及者五言如憶昨狼狽初事與古先別不聞夏啇衰中自誅襃妲是時妃嬪戮連爲糞土叢中宵焚九廟雲漢爲之紅先帝正好武寰海未凋枯拓境功未巳元和辭大鑪内人紅袖泣王子白衣行毁廟天飛雨焚宮火徹明南内開元曲常時弟子傳法歌聲變轉滿座涕潺湲御氣雲樓敞含風綵仗髙仙人張内樂王母獻宫桃須爲下殿走不可好樓居固無牽白馬幾至著青衣奪馬悲公主登車泣貴嬪兵氣凌行在妖星下直廬落日留王母微風􅀝少兒能畫毛延壽投壷郭舎人􅃲雞初賜錦舞馬更登牀驪山絶望幸花萼罷登臨殿瓦鴛鴦坼宫簾翡翠虛七言如關中小兒壞紀綱張后不樂上爲忙天子不在咸陽宫得不哀痛塵再蒙曾貌先帝照夜白龍池十日飛霹靂要路何日罷長㦸戰自青羌連白蠻豈謂盡煩回紇馬翻然逺救朔方兵如此之􅀋不能悉書此下如張祜賦連昌宫元日仗千秋樂大酺樂十五夜燈熱戲樂上巳樂邠王小管李謨笛退宫人玉環琵琶春鶯囀寧哥來容兒鉢頭邠娘羯鼓耍娘歌悖挐兒舞華清宫長門怨集靈臺阿䳰湯馬嵬歸香囊子散花樓雨霖鈴等三十篇大抵詠開元天寶間事李義山華清宫馬嵬驪山龍池諸詩亦然今之詩人不敢爾也李晟傷國體將帥握重兵居閫外當國家多事時其奉上承命尤當以恭順爲主唐李晟在德宗朝破朱泚復長安功名震耀蓋社稷宗臣也然甞將神䇿軍戍蜀及還以營妓自隨節度使張延賞追而返之由是有􅂩晟旣立大功上召延賞入相晟表陳其過惡上重違其意乃止後歳餘上命韓滉諭旨於晟使釋怨滉因使晟表薦延賞遂爲相然則輔相之拜罷皆大將得制之其傷國體甚矣德宗猜忌刻薄渠能釋然晟之失兵柄正縁此耳國學武成王廟本列晟於十哲乾道中有旨退於從祀壽皇聖意豈非出此乎元和六學士白樂天分司東都有詩上李留守相公其序言公見過池上汎舟舉酒話及翰林舊事因成四韻後兩聮云白首故情在青雲往事空同時六學士五相一漁翁此詩蓋與李絳者其詞正紀元和二年至六年事予以其時考之所謂五相者裴垍王涯杜元穎崔羣及絳也紹興二十八年三月予入館明年八月除吏部郎官一時同舎袐書丞虞雍公并甫著作郎陳魏公應求袐書郎史魏公直翁校書郎王魯公季海皆至宰相汪莊敏公明逺至樞密使恩數與宰臣等甚􅀋元和事云二傳誤後丗自左氏載石碏事有大義滅親之語後丗援以爲􅀃殺子孫害兄弟如漢章帝廢太子慶魏孝文殺太子恂唐髙宗廢太子賢者不可勝數公羊書魯隱公威公事有子以母貴母以子貴之語後丗援以爲􅀃廢長立少以妾爲后妃如漢哀帝尊傅昭儀爲皇太太后光武廢太子彊而立東海王陽唐髙宗廢太子忠而立孝敬者亦不可勝數卜子夏魏文侯以卜子夏爲師案史記所書子夏少孔子四十四歳孔子卒時子夏年二十八矣是時周敬王四十一年後一年元王立歷正定王考王至威烈王二十三年魏始爲侯去孔子卒時七十五年文侯爲大夫二十二年而爲侯又十六年而卒姑以始侯之歳計之則子夏已百三歳矣方爲諸侯師豈其然乎父子忠邪漢王氏擅國王章梅福甞言之唯劉向勤勤貇貇上封事極諫至云事埶不兩大王氏與劉氏亦且不並立陛下爲人子孫守持宗廟而令國祚移於外親降爲皁􅀠爲後嗣愛昭昭甚明其言痛切如此而子歆乃用王莽舉爲侍中爲莽典文章倡導在位襃􅀭功德安漢宰衡之名皆所共謀馴致攝篡卒之身亦不免魏陳矯事曹氏三丗爲之盡忠明帝憂社稷問曰司馬懿忠正可謂社稷之臣乎矯曰朝廷之望社稷未知也懿竟竊國柄至孫炎篡魏爲􅀳而矯之子騫乃用佐命勲位極公輔􅀳郗愔忠於王室而子超黨於桓氏爲温建廢立之謀超死愔哀悼成疾後見超書一箱悉與温往反密計遂大怒曰小子死恨晚更不復哭􅀳史以爲有大義之風向矯愔之忠如是三子不勝誅矣蘇張􅀃六國蘇秦張儀同學於􅀑谷而其從橫之辯如冰炭水火之不同盖所以設心者異耳蘇欲六國合從以擯秦故言其彊謂燕地方二千餘里帶甲數十萬車六百乗􅀐六千匹謂趙地亦方二千餘里帶甲數十萬車千乗􅀐萬匹謂韓地方九百里帶甲數十萬天下之強弓勁弩皆從韓出韓卒之勇一人當百謂魏地方千里卒七十萬齊地方二千餘里臨菑之卒固巳二十一萬楚地方五千里帶甲百萬車千乗􅀐萬匹至於張儀則欲六國爲橫以事秦故言其弱謂梁地方不過千里卒不過三十萬韓地險惡卒不過二十萬臨菑即墨非齊之有斷趙右肩黔巫非楚有易水長城非燕有然而六王皆聳聽敬從舉國而付之未甞有一語相折難者彼皆長君持國之日乆逮其臨事乃顧如桔槹隨人俯仰得不危亡幸矣哉且一國之勢猶一家也今夫主一家之政者較量生理名田若干頃歳收榖粟若干蓺園若干畒歳收桑麻若干邸舎若干區爲錢若干下至牛羊犬雞莫不有數自非童騃孱愚之人未有不能件析而枚數者何待於踈逺游客爲吾借箸而籌哉苟一以爲多一以爲寡將遂挈挈然舉而信之乎􅏯錯􅀃景帝曰髙帝大封同姓齊七十餘城楚四十餘城吴五十餘城分天下半以漢之廣三國渠能分其半此錯欲削諸侯故盛言其大爾膠西王將與吴反羣臣諫曰諸侯地不能當漢十二爲叛逆非計也是時反者即吴楚諸齊此膠西臣欲止王之謀故盛言其小爾二者視蘇張之言疑若相似而用心則否聽之者惟能知彼知已則善矣容齋續筆卷第二
