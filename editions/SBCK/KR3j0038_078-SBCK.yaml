body:
  text: 容齋四筆卷第十二十三則小學不講古人八歳入小學教之六書周官保氏之職實掌斯事厥後浸廢蕭何著法太史試學童諷書九千字乃得爲吏以六體試之吏人上書字或不正輙有舉劾劉子正父子校中祕書自史籕以下凡十家序爲小學次於六藝之末許叔重收集􅂐籕古文諸家之學就􅀠爲訓注謂之說文蔡伯喈以經義分散傳記交亂訛僞相􅀩乃請刋定五經備體刻石立于太學門外謂之石經後有吕忱又集說文之所漏略著字林五篇以補之唐制國子􅁥置書學愽士立說文石經字林之學舉其文義歳登下之而考功禮部課試貢舉許以所習爲通人茍趍便不求當否大曆十年司業張參纂成五經文字以􅀋相從至開成中翰林待詔唐玄度又加九經字様補參之所不載晉開運末􅀕酒田敏合二者爲一編並以考正俗體訛謬今之世不復詳考雖士大夫作字亦不能悉如古法矣韓子曰凡爲文辭宜略識字又云阿買不識字頗知書八分安有不識字而能書蓋所謂識字者如上所云也予采張氏田氏之書擇今人所共昧者謾載於此以訓子孫本字從木一在其下今爲大十者非休字象人息於木隂加􅀧者非美从羊从大今从犬从火者非字古者以車戰故軍从勹下車後相承作軍義無所取看字从手凡視物不審則以手􅃒目看之作看者非揚州取輕揚之義从木者非梁从木作梁者非乾有干䖍二音爲字一體今俗分别作乹字音䖍而乾音干者非尊从酋下寸作尊者非奠从酋从丌作奠者非夷从弓从夫作夷者訛耆从旨作老下目者訛漆泰黍􅀺下並从水相承省作小今从小从小者訛決沖況涼盗並从水作冫者訛饑飢二字上榖不熟下餓也今多誤用至於果芻韭之加草岡加山􅂝之作携鉏作鋤惡作􅁖霸作覇筍作笋頿作髭須加髟或从水祕从禾簡作簡寳从尓趨从多衡合从角从大而从魚啓从又及弋肇从文徹从去麤作麁蟲作虫墮許規反俗作隳又以爲惰幡作幡怪爲恠爲􅀜炙从夕閒从日㓛从力兹合从二玄而作兹升作􅅩輩从北妬从戸姦爲姧纛从毒吝作􅈔冤上加􅀧鄰作隣牟从干互作㸦元从􅀧古从干蓋作盖京作亰皎从日次从冫鼓从皮濳􅉲􅆫从替出作二山覺从與游於以方爲才皁爲皂􅂚爲曷匹爲疋收作牧叙作叙臥从臣从人而以人爲卜改从戊已之已而以爲巳凢作凡允作􅁢館作舘覽作覧祭合从月从又而作􅀕瞻作瞻緥从衣􅁋从􅇲徧作遍徼作僥漾作􅃞琴瑟之弦从系輕作輕如是者皆非也主臣漢文帝問陳平決獄錢榖平謝曰主臣史記漢書皆同張晏曰􅀂今人謝曰惶恐也文頴曰惶恐之辭猶今言死罪也晉灼曰主擊也臣服也言其擊服惶恐之辭馬融龍虎賦曰勇怯見之莫不主臣正用此意文選載梁任昉奏彈曹景宗先叙其罪然後繼之曰景宗即主臣仍繼之曰謹案某官臣景宗又彈劉整亦曰整即主臣齊沈約彈王源文亦然李善捨史漢所書而引王隱晉書􅁃純自劾以謂然以主爲句則臣當下讀殊爲非是不知所謂某人即主有何義哉景華御苑崔德符坐元符上書邪黨困於崇寧後監洛南稻田務嘗送客於㑹節園是時冬暮梅花已􅄏明年春􅁥修大内閹官容佐取以爲景華御􅁐德符不知也至春晚復􅀐痩馬與老兵游園内坐梅下賦詩其詞曰去年白玉花結子深枝閒小憇藉清影低顰啄微酸故人不可見春事今巳䦨繞樹㝷履跡空餘土花班次日佐入園見地上馬糞知爲德符是時府官事佐如不及而德符未嘗謁之佐即具奏劾以擅入御􅁐作踐有旨勒停家素貧傳食於諸賢之舍乆乃歸陽翟德符没於靖康官卑不應立傳予詳考本末爲特書之頗憶此叚事擬載於傳中其悼君子之不幸且知馬永卿􅂴眞録中有之而求不可得漫紀于此州陞府而不爲鎭州郡之名莫重於府雖節鎭不及焉固未有稱府而不爲節度者比年以來陞蜀州爲崇慶府劒州爲隆慶府恭州爲重慶府嘉州爲嘉定府秀州爲嘉興府英州爲英德府蜀劒旣有崇慶普安軍之額而恭嘉以下獨未然故幕職官仍云某府軍事判官推官大與府不相稱皆有司之失也信陽軍一小壘耳而司戸參軍銜内帶兼節推尤爲可􅀏頃在中都時毎爲天官主者言之云亦不必白朝廷只本案檢舉改正申知足矣乃曰乆例如此竟相承到今文安公嘗爲左選侍郎是時未知此也漢唐三君知子英明之君見其子有材者必愛而稱之漢高祖謂趙王如意􅀋已欲以易孝惠以大臣諌而止宣帝以淮陽王欽壯大好經書法律聦逹有材數嗟嘆曰眞我子也常有意欲立爲嗣而用太子起於微細且蚤失母故弗忍唐太宗以呉王恪英果􅀋我欲以代雉奴其後如意爲吕母所􅆷恪爲長孫無忌所害欽䧟張博之事殆於不免此三王行事無由表見然孝惠之仁弱幾遭吕氏之覆宗孝元之優柔不斷權移於閽寺漢業遂衰高宗之庸懦受制㐫后爲李氏禍尤慘其不能繼述固巳灼然高祖宣帝太宗蓋本三子之材而言之非專指其容貌也可謂知子矣彼明崇儼謂英王哲貌􅀋太宗張說謂太宗畫像雅􅀋忠王此惟取其形似也􅀂以材言之中宗之視太宗天壤相隔矣漢成帝所幸妾曹宫産子曰我兒額上有壯髪􅀋孝元皇帝使其眞是孝元亦何足道而况於嬰孺之狀邪當官營繕元豐元年范純粹自中書檢正官謪知徐州􅅬縣一新公堂吏舍凡百一十有六間而寢室未治非嫌於奉巳也曰吾力有所未暇而巳是時新法正行御士大夫如束濕雖任二千石之重而一錢粒粟不敢輙用否則必著丹書東坡公歎其然適爲徐守故爲作記其略曰至於宫室蓋有所從受而傳之無窮非獨以自養也今日不治後日之費必倍而比年以來所在務爲儉陋尤諱土木營造之功欹仄腐壞轉以相付不敢擅易一椽此何義也是記之出新進趨時之士􅎱疾以惡之恭覧國史開寳二年二月詔曰一日必葺昔賢之能事如聞諸道藩鎭郡邑公宇及倉庫凡有􅈥壞弗即繕脩因循歳時以至頽毀及僝工兖役則倍増勞費自今節度觀察防禦團練使刺史知州通判等罷任其治所􅅟舍有無隳壞及所増修著以爲籍迭相符授幕職州縣官受代則對書於考課之曆損壞不全者殿一選修葺建置而不煩民者加一選太祖創業方十年而聖意下逮克勤小物一至於此後之當官者小復留意以興仆植僵爲務則暗於事體不好稱人之善者往往翻指爲妄作名色盗隱官錢至於使之束手諱避忽傾視陋逮於不可柰何而後巳殊不思貪墨之吏欲爲姦者無施不可何必假於營造一節乎治歷明時易革之􅂏曰天地革而四時成湯武革命順乎天而應乎人魏晉而降凡及禪代者必据以爲說案漢轅固與黄生爭論湯武於景帝前但評受命之是非不引易爲證卦之象曰君子以治歷明時其義了不相渉偃孫頗留意歷學云按唐一行大衍曆日度議曰顓帝歷上元甲寅正月甲寅晨初合朔立春七曜皆直艮維之首湯作殷歷更以十一月合朔冬至爲上元周人因之此謂治歷也至於三統之建夏以寅爲歳首得人統殷以丑爲得地統周武王改從子爲得天統此謂明時也其革命之說劉歆作三統歷及譜引革􅂏湯武革命又曰治歷明時所以和人道也如是而已其前又引逸書曰先其革命顔師古曰言王者統業先立筭數以命百事也推此而伸之所云革命蓋謂是耳非論其取天下也況大衍之用四十有九一行以之起歷而革卦之序在周易正當四十九然則專爲歷甚明考其上句尤極顯白然諸儒贊易皆不及此王弼亦無一言仕宦捷疾唐傅遊藝以期年之中歷衣青緑朱紫時人謂之四時仕宦言其速也國朝惟緑緋紫三等而紫袍者除武臣外文官之制其别有六庶僚黒角帶佩金魚未至侍從而特賜帶者爲荔枝五子不佩魚中書舍人諌議待制權侍郎紅鞓黒犀帶佩魚權尚書御史中丞資政端明殿閣學士直學士正侍􅀰給事中金御仙花帶不佩魚謂之横金翰林學士以上正尚書御仙帶佩魚謂之重金執政官宰相方團毬文帶俗謂之笏頭者是也其叙如此􅀂孟進躐得者則不然紹興中宋樸自侍御史遷中丞施鉅自中書檢正鄭仲熊自右正言並遷權侍郎三人皆受告日易服以正謝日拜執政樸鉅以緋仲熊以緑服紫之次日而賜毬文帶蓋侍從以下俟正謝乃易帶而執政命才下即遣中使齎賜遂服之而赴都堂供職可謂捷疾矣􅀂李綱則又異於是宣和七年十二月二十九日自太常少卿除兵部侍郎未謝間靖康元年正月四日胡􅀐將至京城綱以邊事求見宰執奏事未退綱語知閤門事朱孝莊曰有急切公事欲與宰執廷辯孝荘曰舊例未有宰執未退而從官求對者綱曰此何時而用例邪孝莊即具奏詔引綱立於執政之末時宰執議欲奉鑾輿出狩襄鄧綱請固守上曰誰可將者綱曰願以死報第人微官卑恐不足以鎭服士卒白時中乞以爲禮部尚書綱曰亦只是侍從即命除尚書右丞綱曰臣未正謝猶衣緑非所以示中外即靣賜袍帶并笏綱服之以謝且言方時艱難臣不敢辤此爲不經緋紫而極其服章未之有也詞臣益輕治平以前謂翰林學士及知制誥爲兩制自翰林罷補外者得端明殿學士謂之換識熈寜之後乃始爲龍圖紹興以來愈不及矣􅁱起居注者序遷知制誥其次及辭不爲者乃爲待制趙康靖馮文簡曽魯公司馬公吕正獻公是也學士闕則次􅀘或爲宰相所不樂者猶得侍讀學士劉原甫是也在職未乆而外除者爲樞密直學士韓魏公是也亦爲龍圖直學士歐陽公是也後來襃擢者僅得待制王時亨是也餘以善去者集英脩撰而止耳夏英公好處夏英公旣失時譽且以慶曆聖唐頌之故不正之名愈彰然固自有好處夏羌之叛英公爲四路經略安撫招討使韓魏公副之賊犯山外韓公令大將任福自懐遠城趨得勝寨出賊後如未可戰即据險置伏要其歸戒之至再又移檄申約苟違節度雖有功亦斬福竟爲賊誘没于好水川朝論歸咎於韓英公使人收散兵得韓檄於福衣帶間言罪不在韓故但奪一官英公此事賢矣而後來士大夫未必知也予是以表岀之祖宗用人祖宗用人進退遲速不執一端茍其材可任則超資越級曽不少靳非拘拘於愛惜名器也宋琪自貟外郎以正月擢拜諌議大夫三月參知政事太宗將用李昉時昉官工部尚書七月特遷琪刑書遂並命爲相而琪居昉上自外郎歳中至此石熈載以太平興國四年正月自右補闕爲兵部貟外郎樞密直學士才七日簽書院事四月拜給事中爲副樞十月遷刑部侍郎六年遷戸部尚書爲使八年罷爲右僕射從􅀄至此五歳用今時階秩言之乃是朝奉郎而爲特進也當日職名唯有密直多從庶僚得之旋即大用張齊賢王􅃆皆自補闕直史舘遷郎中充學士越半歳並遷諌議簽樞温仲舒㓂準皆自正言直舘遷郎中充職二年並爲樞密副使向敏中自工部郎中以本官充職􅚼三月同知密院錢􅀂水自同州推官入直史舘踰年擢知制誥二年除翰林學士遂以諌議同知密院首尾五年至道九老李文正公罷相後只居京師以司空致仕至道元年年七十一矣思白樂天洛中九老之㑹適交游中有此數曰太子中􅁢張好問年八十五太常少卿李運年八十故相吏部尚書宋琪廬州節度副使武􅁢成皆七十九吳僧贊寧年七十八郢州刺史魏丕年七十六左諌議大夫楊徽之年七十五水部郎中朱昻與昉皆七十一欲繼其事爲宴集㑹蜀㓂起而罷其中兩宰相乃著一僧唐世及元豐􅂄英所無也次年李公即世此事竟不成耋老康寧相與燕嬉於升平之世而雅懷弗遂造物豈亦吝此耶李文正兩罷相宰相拜罷恩典重輕詞臣受旨者得以高下其手李正公昉太平興國八年以工部尚書爲集賢史舘相端拱元年爲布衣翟馬周所訟太宗召學士賈黄中草制罷爲右僕射令詔書切責黄中言僕射百寮師長今自工書拜乃爲殊遷非黜責之義􅀂以均勞逸爲辭斯爲得體上然之其詞略云端揆崇資非賢不授昉素高問望乆展謨猷謙和乗君子之風純懿擅吉人之美輟從三事揔彼六􅀸用資鎭俗之清規式表尊賢之茂典其美如此淳化二年復歸舊㕔四年又罷優加左僕射學士張洎言近者霖霔百餘日昉職在爕和隂陽不能決意引退僕射之重右減於左位望不侔因而授之何以示勸上批洎奏尾止令罷守本官洎遂草制峻詆腦詞云爕和隂陽輔相天地此宰相之任也茍或依違在位啓沃無聞雖居廊廟之崇草著彌綸之効宜敷朝旨用罷鼎司昉自處機衡曽無規畫擁化源而滋乆孤物望以何深俾長中臺尚爲優渥可依前尚書右僕射罷知政事歷考前後制麻只言可某官其云罷知政事者洎創増之也國史昉傳云昉厚善洎及昉罷洎草制乃如此紹興二十九年沈該罷制學士周麟之於結句後添入可罷尚書左僕射同平章事蓋用此云容齋四筆卷第十二終
