body:
  text: 科舉恩數國朝科舉取士自太平興國以來恩典始重然各出一時制㫖未甞輒同士子隨所得而受之初不以官之大小有所祈訴也太平之二年進士一百九人吕蒙正以下四人得將作丞餘皆大理評事充諸州通判三年七十四人胡旦以下四人將作丞餘並爲評事充通判及監當五年一百二十一人蘇易簡以下二十三人皆將作丞通判八年二百三十九人自王丗則以下十八人以評事知縣餘授判司簿尉未幾丗則等移通判簿尉改知令録明年並遷守評事雍熈二年二百五十八人自梁顥以下二十一人才得節察推官端拱元年二十八人自程宿以下但權知諸縣簿尉二年一百八十六人陳堯叟曾㑹至得光禄丞直史館而第三人姚揆但防禦推官淳化三年三百五十三人孫何以下二人將作丞二人評事第五人以下皆吏部注擬咸平元年孫僅但得防推二年孫曁以下伹免選注官蓋此兩榜眞宗在諒闇禮部所放故殺其禮及三年陳堯咨登第然後六人將作丞四十二人評事第二甲一百三十四人節度推官軍事判官第三甲八十人防團軍事推官下第再試太宗雍熈二年巳放進士百七十九人或云下第中甚有可取者乃令復試又得洪湛等七十六人而以湛文采遒麗特升正牓第三端拱元年禮部所放程宿等二十八人進士葉齊打皷論牓遂再試復放三十一人而諸科因此得官者至於七百一時待士可謂至矣然太平興國末孟州進士張雨光以試不合格縱酒大罵於街衢中言渉指斥上怒斬之同保九輩永不得赴舉恩威並行至於如此試賦用韻唐以賦取士而韻數多寡平側次叙元無定格故有三韻者花萼樓賦以題爲韻是也有四韻者蓂莢賦以呈瑞聖朝舞馬賦以奏之天廷丹甑賦以國有豐年泰階六符賦以元亨利正爲韻是也有五韻者金莖賦以日華川上動爲韻是也有六韻者止水魍魎人鏡三統指歸信及豚魚洪鍾待撞君子聽音東郊朝日蜡日祈天宗樂德訓胄子諸篇是也有七韻者日再中射己之鵠觀紫極舞五聲聽政諸篇是也八韻有二平六側者六瑞賦以儉故能廣被褐懷玉日五色賦以日麗九華聖符土德徑寸珠賦以澤浸四荒非寶逺物爲韻是也有三平五側者宣耀門觀試舉人以君聖臣肅謹擇多士懸法象魏以正月之吉懸法象魏􅀇酒以薦天明德有古遺味五色土以王子畢封依以建社通天臺以洪臺獨出浮景在下幽蘭以逺芳襲人悠乆不絶日月合璧以兩曜相合候之不差金柅以直而能一斯可制動爲韻是也有五平三側者金用礪以商髙宗命傅􅀃之官爲韻是也有六平二側者旗賦以風日雲舒軍容淸肅爲韻是也自太和以後始以八韻爲常唐莊宗時甞覆試進士翰林學士承旨盧質以后從諫則聖爲賦題以堯舜禹湯傾心求過爲韻舊例賦韻四平四側質所出韻乃五平三側大爲識者所誚豈非是時巳有定格乎國朝太平興國三年九月始詔自今廣文館及諸州府禮部試進士律賦並以平側次用韻其後又有不依次者至今循之正元制科唐德宗正元十年賢良方正科十六人裴垍爲舉首王播次之隔一名而裴度崔羣皇甫鏄繼之六名之中連得五相可謂盛矣而邪正夐不侔度羣同爲元和宰相而鏄以聚歛賄賂亦居之度羣極陳其不可度恥其同列表求自退兩人竟爲鏄所毀而去且三相同時登科不可謂無事分而玉石雜糅薫蕕同器若黙黙充位則是固寵患失以私妨公裴崔之賢􅁩難以處也本朝韓康公王􅄮公王荆公亦同年聮名熈寧間康公荆公爲相􅄮公參政故有一時同牓用三人之語頗􅀋此云貽子録先公自燕歸得龍圖閣書一策曰貽子録有御書兩印存不言撰人姓名而序云愚叟受知南平王政寛事簡意必髙從誨擅荆渚時賔僚如孫光憲輩者所編皆訓儆童蒙其修進一章云咸通年中盧子期箸初舉子一卷細大無遺就試三􅂣避國諱宰相諱主文諱士人家小子弟忌用熨斗時把帛慮有拽白之嫌燭下寫試無誤筆即題其後云並無揩改塗乙注如有即言字數其下小書名同年小録是􅀟􅃗先輩各一人分寫宴上長少分􅀟􅃗相向而坐元以東爲上儭以西爲首給舎貟外遺􅀘多來突宴東先輩不遷而西先輩避位及吏部給春關牒便稱前郷貢進士大略有與今制同者獨避宰相主文諱不復講􅀟􅃗先輩之名它無所見其林園一章謂茄爲酪酥亦甚新金花帖子唐進士登科有金花帖子相傳巳乆而丗不多見予家藏咸平元年孫僅牓盛京所得小録猶用唐制以素綾爲軸貼以金花先列主司四人銜曰翰林學士給事中楊兵部郎中知制誥李右司諫直史館梁袐書丞直史館朱皆押字次書四人甲子年若干某月某日生祖諱某父諱某私忌某日然後書狀元孫僅其所紀與今正同别用髙四寸綾闊二寸書盛京二字四主司花書于下粘於卷首其規範如此不知以何年而廢也但此牓五十人自第一至十四人惟第九名劉燁爲河南人餘皆貫開封府其下又二十五人亦然不應都人士中選若是之多疑亦外方人􅀉名託籍以爲進取之便耳四主司乃楊礪李若拙梁顥朱台符皆只爲同知舉物之小大列禦宼莊周大言小言皆出於物理之外列子所載夏革曰㴾海之東幾億萬里有大壑焉實惟无底之谷中有五山髙下周旋三萬里山之中間相去七萬里而五山之根无所連著帝使巨鼇十五舉首而戴之迭爲三番六萬歳一交焉而龍伯之國有大人舉尺不盈數千而曁山所一釣而連六鼇合負而趣歸其國於是岱輿貟嶠二山沈於大海張湛注云以髙下周圍三萬里山而一鼇頭之所戴而六鼇復爲一釣之所引龍伯之人能并而負之計此人之形當百餘萬里鯤鵬方之猶蚊蚋蚤虱耳太虚之所受亦奚所不容哉莊子逍遙遊首著鯤鵬事云北冥有魚其名爲鯤鯤之大不知其幾千里也化而爲鳥其名爲鵬鵬之徙於南冥水擊三千里摶扶搖而上者九萬里二子之語大若此至於小言則莊子謂有國於蝸之左角曰觸氏右角曰蠻氏相與爭地而戰伏尸數万逐北旬有五日而後反列子曰江浦之間生麽蟲其名曰焦螟羣飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也黃帝與容成子同齋三月徐以神視塊然見之若嵩山之阿徐以氣聽砰然聞之若電霆之聲二子之語小如此釋氏維摩詰長者居丈室而容九百萬菩薩并師子座一芥子之細而能納須彌皆一理也張湛不悟其寓言而竊竊然以太虚無所不容爲􅀃亦隘矣若吾儒中庸之書但云天地之大也人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉則明白洞達歸於至當非二氏之學一偏所及也郭令公唐人功名富貴之盛未有出郭汾陽之右者然至其女孫爲憲宗正妃歷五朝母天下終以不得志於宣宗而死自是支胄不復振及本朝慶曆四年訪求厥後僅得裔孫元亨於布衣中以爲永興軍助教歐陽公知制誥行其詞曰繼絶丗襃有功非惟推恩以及逺所以勸天下之爲人臣者焉況爾先王名載舊史勲德之厚冝其流澤於無窮而其後裔不可以廢往服新命以榮厥家且以二十四考中書令之門而需一助教以爲榮吁亦淺矣乃知丗禄不朽如春秋諸國至數百年者後代不易得也紀年兆祥自漢武建元以來千餘年間改元數百其附㑹離合爲之辤者不可勝書固亦有曉然而易見者如􅀳元帝永昌郭璞以爲有二日之象果至冬而亡亘靈寶大亨識者以爲一人二月了果以仲春敗蕭棟武陵王紀同歳竊位皆爲天正以爲二人一年而止其後皆然齊文宣天保爲一大人只十果十年而終然梁明帝蕭巋亦用此而盡二十三年或又云巋蕞爾一􅀖故非禨祥所係齊後主隆化爲降死安德王延宗德昌爲得二日周武帝宣政爲宇文亡日宣帝大象爲天子􅃁蕭琮􅀳出帝廣運爲軍走隋􅌆帝大業爲大苦末唐僖宗廣明爲唐去丑口而著黃家日月以兆巢賊之禍欽宗靖康爲立十二月康果在位滿歳而髙宗由康邸建中興之業熈寧之末將改元近臣撰三名以進曰平成曰美成曰豐亨神宗曰成字負戈美成者犬羊負戈亨字爲子不成不若去亨而加元遂爲元豐若隆興則取建隆紹興各一字與唐正元取正觀開元之義同巳而嫌與顔亮正隆相近故二年即改乾道及甲午改純熈旣巳布告天下予時守贑賀表云天永命而開中興方茂卜年之統時純熈而用大介載新紀號之文迨詔至乃爲淳熈蓋以出處有告成大武之語故不欲用民俗火葬自釋氏火化之􅀃起於是死而焚尸者所在皆然固有炎暑之際畏其穢泄歛不終日肉未及寒而就爇者矣魯夏父弗忌獻逆祀之議展禽曰必有殃雖壽而没不爲無殃旣其葬也焚煙徹于上謂巳葬而火焚其棺椁也吳伐楚其師居麋楚司馬子期將焚之令尹子西曰父兄親􅁀骨焉不能收又焚之不可謂前年楚人與吳戰多死麋中不可并焚也衛人掘禇師定子之墓焚之于平莊之上燕􅀐刼圍齊即墨掘人􅃁墓燒死人齊人望見涕泣怒自十倍王莽作焚如之刑燒陳良等則是古人以焚尸爲大僇也列子曰楚之南有炎人之國其親戚死㱙其肉而棄之然後埋其骨秦之西有儀渠之國其親戚死聚祡積而焚之燻則煙上謂之登遐然後成爲孝子此上以爲政下以爲俗而未足爲異也蓋是時其風未行於中國故列子以儀渠爲異至與㱙肉者同言之㱙音寡太史日官周禮春官之屬曰太史掌建􅀖之六典以逆􅀖國之治正歳年以序事頒之于官府及都鄙頒告朔于􅀖國小史掌􅀖國之志奠繫丗辨昭穆鄭氏注云太史日官也引左傳天子有日官諸侯有日御爲􅀃志謂記也史官主書國語所謂鄭書及帝繫丗本之屬是也小史主定之然則周之史官日官同一職耳故司馬談爲漢太史令而子長以爲文史星曆近乎卜祝之間固主上所戲弄倡優畜之流俗之所輕也今太史局正星曆卜祝輩所聚其長曰太史局令而􅀠袐書省有太史案主之蓋其源流有自來矣汲􅃁周書汲冡周書今七十篇殊與尚書體不相􅀋所載事物亦多過實其克商解云武王先入適紂所在射之三發而後下車擊之以輕吕劒名斬之以黃􅃏縣諸大白商二女旣縊又射之三發擊之以輕吕斬之以􅀇鉞縣諸小白越六日朝至于周以三首先馘入燎于周廟又用紂于南郊夫武王之伐紂應天順人不過殺之而巳紂旣死何至梟戮俘馘且用之以祭乎其不然者也又言武王狩事尤爲淫侈至於擒虎二十有二貓二麋五千二百三十五犀十有三􅈊七百二十有一熊百五十一羆百十八豕三百五十有二狢十有八麂十有六麝五十鹿三千五百有二遂征四方凡憝國九十有九國馘磨億有十萬七千七百七十有九其多如是雖注家亦云武王以不殺爲仁無縁所馘如此蓋大言也王㑹篇皆大㑹諸侯及四夷事云唐叔荀叔周公在左太公在右堂下之右唐公虞公南面立焉堂下之左商公夏公立焉四公者堯舜禹湯後商夏即􅂎宋也又言俘商寶玉億有百萬所紀四夷國名頗古奥獸畜亦竒崛以肅眞爲稷眞獩人爲穢人樂浪之夷爲良夷姑蔑爲姑妹東甌爲且甌渠捜爲渠叟髙句麗爲髙夷所叙穢人前兒若彌猴立行聲似小兒良夷在子獸名弊身人首脂其腹炙之藿則鳴揚州禺禺魚人鹿青丘狐九尾東南夷白民乗黃乗黃者似騏背有兩角東越海􅧳海陽盈車大蟹西南戎曰央林以酋耳酋耳者身若虎豹渠叟以䶂犬䶂犬者露犬也能飛食虎豹區陽戎以鼈封鼈封者若􅇾前後有首蜀人以文翰文翰者若皐雞康民以稃苡其實如李食之宜子北狄州靡費費其形人身枝踵自􅀏笑則上脣翕其目食人都郭亦北狄生生若黃狗人面能言竒幹亦北狄善芳頭若雄雞佩之令人不眯正東髙夷嵰羊嗛羊者羊而四角西方之戎曰獨鹿卭卭距虚犬戎文馬而赤縞身目若黃金名古皇之乗白州比閭比閭者其華若羽以其木爲車終行不敗篇末引伊尹朝獻商書云湯問伊尹使爲四方獻令伊尹請令正東以魚皮之鞞鰂醬蛟瞂利劒正南以珠璣瑇瑁象齒文犀正西以丹靑白旄江歷珠名龍角正北以橐駝騊駼駃騠良弓爲獻湯曰善凡此皆無所質信姑録之以貽博雅者唐太宗時逺方諸國來朝貢者甚衆服裝詭異顔師古請圖以示後作王㑹圖蓋取諸此漢書所引天予不取反受其咎母爲權首將受其咎以爲逸周書此亦無之然則非全書也曹子建論文曹子建與楊德祖書云丗人著述不能無病僕常好人譏彈其文有不善應時改定昔丁敬禮常作小文使僕潤飾之僕自以才不過若人辤不爲也敬禮謂僕卿何所疑難文之佳麗吾自得之後丗誰相知定吾文者邪吾常歎此達言以爲美談子建之論善矣任昉爲王儉主簿儉出自作文令昉􅀧正昉因定數字儉歎曰後丗誰知子定吾文正用此語今丗俗相承所作文或爲人詆訶雖未形之於辭色及退而怫然者皆是也歐陽公作尹師魯銘文不深辯其獲罪之寃但稱其爲文章簡而有法或以爲不盡公怒至詒書它人深數責之曰簡而有法惟春秋可當之脩於師魯之文不薄矣又述其學曰通知古今此語若必求其可當者惟孔孟也而丗之無識者乃云云此文所以慰吾亡友爾豈恤小子輩哉王荆公爲錢公輔銘母夫人蔣氏墓不稱公輔甲科但云子官於朝豐顯矣里巷之士以爲太君榮後云孫七人皆㓜不書其名公輔意不滿以書言之公復書曰比蒙以銘文見屬輒爲之而不辤不圖乃猶未副所欲欲有所増損鄙文自有意義不可改也冝以見還而求能如足下意者爲之如得甲科爲通判何足以爲太夫人之榮一甲科通判茍粗知爲辭賦雖市并小人皆可以得之何足道哉故銘以謂閭巷之士以爲太夫人榮明天下有識者不以置榮辱也至於諸孫亦不足列孰有五子而無七孫者乎二公不喜人之議其文亦如此􅀨水清明曆家以􅀨水爲正月中氣驚蟄爲二月節清明爲三月節榖􅀨爲三月中氣而漢丗之初仍周秦所用驚蟄在􅀨水之前榖􅀨在清明之前至于太初始正之云容齋續筆卷第十三
