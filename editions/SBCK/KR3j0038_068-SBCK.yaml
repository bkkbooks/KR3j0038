  text: 容齋四筆卷第二二十則
  hash: sha256:3a627ed0dbbcb09f04ad7cd34d3c7080baefb3708aa5d1f58c39105b602cb5ff
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_068-1a}
body:
  text: 諸家經學興廢稚子問漢儒所傳授諸經各名其家而今或存或不存請書其本末爲四筆一則乃爲采摭班史及陸德明經典釋文并它書刪取綱要詳載於此周易傳自啇瞿始至漢􅀄田何以之顓門其後爲施讎孟喜梁丘賀之學又有京房費直髙相三家至後漢髙氏巳微晉永嘉之亂梁丘之易亡孟京費氏人無傳者唯鄭康成王弼所注行于丗江左中興欲置鄭易博士不果立而弼猶爲丗所重韓康伯等十人竝注繫辭今唯韓傳尚書自漢文帝時伏生得二十九篇其後爲大小夏侯之學古文者武帝時出於孔壁凡五十九篇詔孔安國作傳遭巫蠱事不􅀗以聞遂不列於學官其本殆􅅸是以馬鄭杜預之徒皆謂之逸書王肅嘗爲注解至晉元帝時孔傳始出而亡舜典一篇乃取肅所注堯典分以續之學徒遂盛及唐以來馬鄭王注遂廢今以孔氏爲正云詩自子夏之後至漢興分而爲四魯申公曰魯詩齊轅固生旦齊詩燕韓嬰曰韓詩皆列博士毛詩者出於河間人大毛公爲之故訓以授小毛公爲獻王博士以不在漢朝不列於學鄭衆賈逵馬融皆作詩注及鄭康成作箋三家遂廢齊詩乆亡魯詩不過江東韓詩雖在人無傳者唯毛詩鄭箋獨立國學今所遵用漢髙堂生傳士禮十七篇即今之儀禮也古禮經五十六篇后蒼傳十七篇曰后氏曲臺記所餘三十九篇名爲逸禮戴德刪古禮二百四篇爲八十五篇謂之大戴禮戴聖又刪爲四十九篇謂之小戴禮馬融盧植考諸家異同附戴聖篇章去其煩重及所缺略而行於丗即今之禮記也王莽時劉歆始建立周官經以爲周禮在三禮中最爲晚出左氏爲春秋傳又有公羊􅂖梁鄒氏夾氏鄒氏無師夾氏無書公羊興於景帝時􅂖梁盛於宣帝時而左氏終西漢不顯迨章帝乃令賈逵作訓詁自是左氏大興二傳漸微矣古文孝經二十二章丗不復行只用鄭注十八章本論語三家魯論語者魯人所傳即今所行篇次是也齊論語者齊人所傳凢二十二篇古論語者出自孔壁凡二十一篇各有章句魏何晏集諸家之說爲集解今盛行於丗漢人姓名西漢名人如公孫弘董仲舒朱買臣丙吉王褒貢禹皆有異丗與之同姓名者戰國䇿及吕氏春秋齊有公孫弘與秦王孟嘗君言者明帝時又有幽州從事公孫弘交通楚王英見於虞延傳髙祖時又有謁者貢禹梁元帝時有武昌太守朱買臣尚書左僕射王襃後漢安帝時有太子廚監邴吉南齊武帝之子巴東王子響爲荆州刺史要直閣將軍董蠻與同行蠻曰殿下癲如雷敢相隨耶子響曰君敢出此語亦復竒癲上聞而不恱曰人名蠻復何容得醖藉乃改爲仲舒謂曰今日仲舒何如昔日仲舒荅曰昔日仲舒出自私庭今日仲舒降自先帝以此言之勝昔遠矣然此人後不復見輕浮稱謂南齊陸慧曉立身清肅爲諸王長史行事僚佐以下造詣必起迎之或曰長史貴重不冝妄自謙屈荅曰我性惡人無禮不容不以禮處人未嘗卿士大夫或問其故慧曉曰貴人不可卿而賤者乃可卿人生何容立輕重於懷抱終身常呼人位今丗俗浮薄少年或身爲卑官而與尊者言話稱其儕流必曰某丈談其所事牧伯監司亦然至於當他人父兄尊長之前語及其子孫甥壻亦云某丈或妄稱宰相執政貴人之字皆大不識事分者習慣以然元非簡傲也予常以戒兒軰云􅀑谷子書􅀑谷子與􅂫秦張儀書曰二足下功名赫赫但春華至秋不得乆茂今二子好朝露之榮忽長乆之功輕喬松之永延貴亘之浮爵夫女愛不極席男歡不畢輪痛哉天君戰國䇿楚江乙謂安陵君曰以財交者財盡而交絶以色交者華落而愛渝是㠯嬖女不敝席寵臣不敝軒吕不韋說華陽夫人曰以色事人者色衰而愛弛詩氓之序曰華落色衰復相棄背是諸說大氐意同皆以色而爲喻士之􅄝進而不知自反者尚監兹哉有美堂詩東坡在杭州作有美堂㑹客詩頷聮云天外黒風吹海立浙東飛雨過江來讀者疑海不􅀎立黄魯直曰盖是爲老杜所誤因舉三大禮賦朝獻太清宫云九天之雲下垂四海之水皆立以告之二者皆句語雄峻前無古人坡和陶停雲詩有雲屯九河雪立三江之句亦用此也張天覺小􅂤張天覺熈寜中爲渝州南川宰章子厚經制䕫夷狎侮州縣吏無人敢與共語部使者念獨張可亢之檄至䕫子厚詢人才使者以告即呼入同食張著道士服長揖就坐子厚肆意大言張隨機折之落落出其上子厚大喜延爲上客歸而薦諸王介甫遂得召用政和六年張在荆南與子厚之子致平一帖云老夫行年七十有四日閱佛書四五卷早晚食米一升麵五兩􅁏八兩魚酒佐之以此爲常亦不服煖藥唯以呼吸氣晝夜合天度而巳數數夢見先相公語論如平生豈其人在天仙閒而老夫定中神遊或遇之乎嗟乎安得竒男子如先相公者一快吾􅅐中哉此帖藏致平家其曽孫簡刻諸石予今年亦七十四歳姪孫偲於長興得墨本以相示聊記之云城狐社䑕城狐不灌社䑕不燻謂其所棲穴者得所慿依此古語也故議論者率指人君左右近習爲城狐社䑕予讀說苑所載孟嘗君之客曰狐者人之所攻也䑕者人之所燻也臣未嘗見稷狐見攻社鼠見燻何則所託者然也稷狐之字甚竒且新用兵爲臣下利冨公奉使契丹虜主言欲舉兵公曰北朝與中國通好則人主專其利而臣下無所􅀗􅀂用兵則利歸臣下而人主任其禍故北朝群臣争勸舉兵者此皆其自謀非國計也勝􅀒未可知就使其勝所亡士馬群臣當之歟抑人主當之歟是時語録傳於四方􅂫明􅁢讀至此曰此一叚議論古人有之否東坡年未十歳在傍對曰記得嚴安上書云今徇南夷朝夜郎略歳州建城邑深入匈奴燔其龍城議者美之此人臣之利非天下之長䇿也正是此意明允以爲然予又記魏太武時南邊諸將表稱宋人大嚴將入冦請先其未發逆擊之魏公卿皆以爲當崔伯深曰朝廷群臣及西北守將從陛下征伐西平赫連北破蠕蠕多􅀗美女珍寶南邊諸將聞而慕之亦欲南鈔以取資財皆營私計爲國生事不可從也魏主乃止其論亦然誌文不可冗東坡爲張文定公作墓誌銘有荅其子厚之一書云志文路中巳作得太半到此百冗未絶筆計得十日半月乃成然書大事略小節巳有六千餘字􅀂纎悉盡書萬字不了古無此例也知之知之蓋當時恕之意但欲務多耳又一帖云志文謁告數日方冩得了謹遣持納衰病眼􅅭辭翰皆不佳不知可用否今誌文正本凡七千一百字銘詩百六十字云予郷士作一列大夫小郡守行狀九千言衢州士人詣闕上書二萬言使讀之者豈不厭倦作文者冝戒之坡帖藏梁氏竹齋趙晉臣鐫石於湖南憲司楚觀趙殺鳴犢漢書劉輔傳谷永等上書曰趙簡子殺其大夫鳴犢孔子臨河而還張晏注曰簡子欲分晉國故先殺鳴犢又聘孔子孔子聞其死至河而還也顔師古曰戰國䇿說二人姓名云鳴犢鐸犨而史記及古今人表並以爲鳴犢竇犨蓋鐸犢及竇其聲相近故有不同耳今永等指鳴犢一人不論竇犨也韓退之將歸操亦云孔子之趙聞殺鳴犢作予案今本史記孔子丗家乃以爲竇鳴犢舜華說苑權謀篇云晉有澤鳴犢犨其不同如此五帝官天下漢蓋寛饒奏封事引韓氏易傳言五帝官天下三王家天下家以傳子官以傳賢􅀂四時之運成功者去坐指意欲求禪而死故或云自後稱天子爲官家蓋出於此今丗無韓氏易諸家注釋漢書皆無一語惟說苑至公篇云秦始皇帝旣吞天下召群臣議五帝禪賢三王丗繼孰是博士鮑令之對曰天下官則選賢是也天下家則丗繼是也故五帝以天下爲官三王以天下爲家始皇帝歎曰吾德出于五帝吾將官天下誰可使代我後者此說可以爲證輙記之以􅀘漢注之缺蔣濟萬機論亦有官天下家天下之語黃帝李法漢書胡建傳黄帝李法􅂫林曰獄官名也天文志左角李右角將顔師古曰李者法官之號也其書曰李法唐丗系表李氏自臯陶爲堯大理歷虞夏商丗丗作此官以官命族爲理氏至紂之時逃難於伊侯之墟食木子得全遂改理爲李氏予案今本漢書天文志􅀐官左角理乃用理字而史記天官書則爲李說苑載胡建事亦爲理法然則理李一也故左傳數云行李徃來杜預注曰行李使人也至鄭子産與晉盟于平丘則曰行理之命注亦云行理使人通聘問者其義益明臯陶作大理傳子孫不改迨啇之季幾千二百年丗官乆任倉氏庫氏不足道矣表系疑不可信抄傳文書之誤今代所傳文書筆吏不謹至於成行脫漏予在三館假􅁃自直􅀋文先以正本􅀧檢中有數卷皆以後板爲前予令書庫整頓然後録之他多􅀋此周益公以􅂫魏公集付太平州鏤板亦先爲勘校其所作東山長老語録序云側定政宗無用所以爲用因蹄得兎忘言而後可言以上一句不明白又與下不對折簡來問予憶莊子曰地非不廣且大也人之所用容足爾然而廁足而墊之致黃泉知無用而後可以言用矣始驗側定政宗當是廁足致泉正與下文相應四字皆誤也因記曽紘所書陶淵明讀山海經詩云形夭無千歳猛志固常在疑上下文義􅀂不貫遂取山海經參校則云刑天獸名也口中好銜干戚而舞乃知是刑天舞干戚故與下句相應五字皆訛以語友人岑公休晁之道皆撫掌驚歎亟取所藏本是正之此一節甚􅀋􅂫集云二十八􅀫二十八􅀫􅀫音秀􅀂考其義則止當讀如本音嘗記前人有說如此說苑辯物篇曰天之五星運氣於五行所謂􅀫者日月五星之所􅀫也其義昭然大觀元夕詩大觀􅀄年京師以元夕張燈開宴時再復湟鄯徽宗賦詩賜群臣其頷聮云午夜笙歌連海嶠春風燈火過湟中席上和者皆莫及開封尹宋喬年不能詩密走介求援於其客周子雍得句云風生閶闔春來早月到蓬萊夜未中爲時軰所稱子雍汝隂人曽受學於陳無巳故有句法則作文爲詩者可無師承乎顔魯公帖顔魯公忠義氣節史䇿略盡偶閱臨汝石刻見一帖云政可守不可不守吾去歳中言事得罪又不能逆道茍時爲千古罪人也雖貶居逺方終身不耻汝曹當湏謂吾之志不可不守也此是獨赴謫地而與其子孫者無由考其歳月千載之下使人讀之尚可畏而仰也文潞公奏除改官制自熈寧以來士大夫資歷之法日趨於壞歳甚一歳乆而不可復清近年愈甚綜核之制未嘗能守偶見文潞公在元祐中任平章軍國重事宣仁靣諭令具自來除授官職次序一本進呈公遂具除改舊制節目以奏其一云吏部選兩任親民有舉主升通判通判兩任滿有舉主升知州軍謂之常調知州軍有績効或有舉薦名實相副者特擢升轉運使副判官或提􅀧刑獄府推判官謂之出常調轉運使有路分輕重逺近之差河北陜西河東三路爲重路歳滿多任三司使副或發運使發運任滿亦充三司副使成都路次三路京東西淮南又其次江東西荆湖兩浙又次之二廣福建梓利䕫路爲逺小巳上三等路分轉運任滿或就移近上次等路分或歸任省府判官漸次擢充三路重任内提􅀧刑獄則不拘路分輕重除授潞公所奏乃是治平以前常行今一切蕩然矣京朝官未嘗肯兩任親民才爲通判便望州郡至於監司旣無輕重遠近之間不復以序升擢云待制知制誥慶曆七年曾魯公公亮自脩起居注除天章閣待制時陳恭公獨爲相其弟婦王氏冀公孫女曽出也當月旦出拜恭公迎語之曰六新婦曽三做從官想甚喜應聲對曰三舅荷伯伯提挈極驩喜只是外婆不樂恭公問故曰外婆見三舅來謝責之曰汝第五人及第當過詞掖想是全廢學故朝廷如此處汝㳟公黙然自失後竟改知制誥蓋恭公不由科第不諳典故致受譏於女子而此女對答之時元未嘗徃外家也其警慧如此國家故事修注官次􅀘必知制誥惟趙康靖公以歐陽公位在下而欲先遷司馬公以力辭三字皆除待制其雜壓先後可見云裴行儉景陽裴行儉爲定襄道大緫管討突厥大軍次單于北暮巳立營塹壕旣周更命徙營髙岡吏白士安堵不可擾不聽促徙之比夜風雨􅁀至前占營所水深丈餘衆莫不駭歎問何以知之行儉曰自今第如我節制母問我所以知也案戰國䇿云齊韓魏共攻燕楚王使景陽將而救之暮舎使左右司馬各營壁地巳植表景陽怒曰女所營者水皆至滅表此焉可以舎乃令徙明日大雨山水大出所營者水皆滅表軍吏乃服二事正同而景陽之事不傳北人重甘蔗甘蔗只生於􅀯方北人嗜之而不可得魏太武至彭城遣人於武陵王處求酒及甘蔗郭汾陽在汾上代宗賜甘蔗二十條子虚賦所云諸柘巴且諸柘者甘蔗也盖相如指言楚雲夣之物漢郊祀歌泰尊柘漿亦謂取甘蔗汁以爲飲容齋四筆卷第二
