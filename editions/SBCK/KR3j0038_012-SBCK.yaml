body:
  text: 利渉大川易卦辭稱利渉大川者七不利渉者一爻辭稱利渉者二用渉者一不可渉者一需訟未濟指坎體而言益中孚指巽體而言渙指坎巽而言盖坎爲水有大川之象而巽爲木木可爲舟楫以濟川故益之􅂏曰木道乃行中孚之􅂏曰乗木舟虚渙之􅂏曰乗木有功又舟楫之利實取諸渙正合二體以取象也謙蠱則中爻有坎同人大畜則中爻有巽頥之反對大過方有巽體五去之逺所以言不可渉上則變而之對卦故利渉云光武弃馮衍漢室中興固皆光武之功然更始旣即天子位光武受其爵秩北面爲臣矣及平王郎定河北詔令罷兵辭不受召於是始貳焉更始方困於赤眉而光武殺其將謝躬苗曽取洛陽下河東翻爲腹心之疾後丗以成敗論人故不復議予謂光武知更始不材必敗大業逆取順守尚爲有辭彼鮑永馮衍始堅守并州不肯降下聞更始巳亡乃罷兵來歸曰誠慙以其衆幸冨貴其忠義之節凛然可稱光武不能顯而用之聞其言而不恱永後以它立功見用而衍終身擯斥羣臣亦無爲之言者吁可歎哉恭顯議蕭望之􅀪恭石顯議置蕭望之於牢獄漢元帝知其不肯就吏而訖可其奏望之果自殺帝召顯等責問以議不詳皆免冠謝乃巳王氏五侯奢僣成帝内銜之一旦赫怒詔尚書奏誅薄昭故事然特欲恐之實無意誅也竇憲恃宫掖聲􅀔奪公主園章帝切責有􅀌雛腐䑕之比然竟不繩其罪三君之失政前史固深譏之矣司馬公謂元帝始疑望之不肯就獄恭顯以爲必無憂其欺旣明終不能治可謂易欺而難寤也予謂師傅大臣進退罪否人主當决之於心何爲謀及宦者且望之先時巳甞下廷尉矣使其甘於再辱忍恥對吏將遂以恭顯之議爲是耶望之死與不死不必論也成帝委政外家先漢顛覆章帝仁柔無斷後漢遂衰皆無足責􅏯錯張湯鼂錯爲内史言事輒聽幸傾九卿及爲御史大夫權任出丞相右張湯爲御史每朝奏事國家用日旰丞相取充位天下事皆決湯蕭望之爲御史意輕丞相遇之無禮三人者賢否雖不同然均爲非􅁩各以它事至死抑有以致之邪逸詩書逸書逸詩雖篇名或存旣亡其辭則其義不復可考而孔安國注尚書杜預注左傳必欲強爲之說書汨作注云言其治民之功咎單作明居注云咎單主土地之官作明居民法左傳國子賦轡之柔矣注云義取寛政以安諸侯若柔轡之御剛馬如此之􅀋予頃教授福州日林之竒少穎爲書學諭講帝釐下土數語曰知之爲知之堯典舜典之所以可言也不知爲不知九共稾飫略之可也其􅀃最純明可喜林君有書解行於丗而不載此語故爲表出之刑罰四卦易六十四卦而以刑罰之事著於大象者凡四焉噬嗑曰先王以明罰勑法豐曰君子以折獄致刑賁曰君子以明庶政無敢折獄旅曰君子以明慎用刑而不留獄噬嗑旅上卦爲離豐賁下卦爲離離明也聖人知刑獄爲人司命故設卦觀象必以文明爲主而後丗付之文法俗吏何邪巽爲魚易中所言魚皆指巽也姤卦巽下乾上故九二有魚九四無魚井内卦爲巽故二有射鮒之象中孚外卦爲巽故曰豚魚吉剥卦五隂而一陽方一隂自下生變乾爲姤其下三爻乃巽體也二隂生而爲遯則六二九三九四乃巽體三隂生而爲否則六三九四九五乃巽體四隂生而爲觀則上三爻乃巽體至五隂爲剥則巽始亡故六五之爻辭曰貫魚盖指下四爻皆從巽來如魚駢頭而貫也或曰􅀃卦不言巽爲魚今何以知之曰以􅀋而知之􅀃卦所不該者多矣如長子長女中女少女見於震巽離兊中而坎艮之下不言爲中男爲少男之􅀋它可推也三省長官中書尚書令在西漢時爲少府官屬與大官湯官上林諸令品秩略等侍中但爲加官在東漢亦屬少府而秩稍增尚書令爲千石然銅印墨綬雖居幾要而去公卿甚逺至或出爲縣令魏晉以來浸以華重唐初遂爲三省長官居眞宰相之任猶列三品大曆中乃升正二品入國朝其位益尊叙班至在太師之上然只以爲親王及使相兼官無單拜者見任宰相帶侍中者才五人范魯公質趙韓王普丁晉公謂馮魏公拯韓魏王􅄾尚書令又最貴除宗王外不以假人趙韓王韓魏王始贈眞令韓公官止司徒及贈尚令乃詔自今更不加贈盖不欲以三師之官贅其稱也政和初蔡京改侍中中書令爲左輔右弼而不置尚書令以爲太宗皇帝曽任此官殊不知乃唐之太宗爲之故郭子儀不敢拜非本朝也王珪李靖杜子美送重表姪王評事詩云我之曽老姑爾之髙祖母爾祖未顯時歸爲尙書婦隋朝大業末房杜俱交友長者來在門荒年自餬口家貧無供給客位但箕帚俄頃羞頗珍寂寥人散後云云上云天下亂冝與英俊厚向竊窺數公經綸亦俱有次問最少年虬髯十八九子等成大名皆因此人手下云風雲合龍虎一吟吼願展丈夫雄得辭兒女醜秦王時在坐真氣驚戸牖及乎正觀初尚書踐台斗夫人常肩輿上殿稱萬壽至尊均嫂叔盛事垂不朽觀此詩疑指王珪珪相唐太宗贈禮部尚書然細考其事大不與史合蔡條詩話引唐書列女傳云珪母盧氏識房杜必貴質之此詩則珪母乃杜氏也桐江詩話云不特不姓盧乃珪之妻非母也予案唐列女傳元無此事珪傳末只云始隱居時與房􅀇齡杜如晦善二人過其家母李窺之知其必貴蔡說妄云有傳又誤以李爲盧皆不足辨但唐髙祖在位日太子建成與秦王不睦以權相傾珪爲太子中允說建成曰秦王功盖天下中外歸心殿下但以長年位居東宫無大功以鎮服海内今劉黒闥散云之餘冝自擊之以取功名建成乃請行其後楊文幹之事起髙祖責以兄弟不睦歸罪珪等而流之太宗即位乃召還任用乆之宴近臣於丹霄殿長孫無忌曰王珪魏徵昔爲􅄷讎不謂今日得同此宴上曰珪徵盡心所事我故用之然則珪與太宗非素交明矣唐書載李氏事亦采之小􅀃恐未必然而杜公稱其祖姑事不􅀿不實且太宗時宰相別無姓王者真不可曉也又有杜光庭虬鬚客傳云惰煬帝幸江都命楊素留守西京李靖以布衣往謁竊其一妓道遇異人與俱至太原因劉文静以見州將之子言其眞英主傾家資與靖使助創業之舉即太宗也按史載唐公擊突厥靖察有非常志自囚上急變後髙祖定京師將斬之而止必無先識太宗之事且煬帝在江都時楊素死已十餘年矣此一傳大抵皆妄云虎夔藩黃魯直宿舒州太湖觀音院詩云汲烹寒泉窟伐燭古松根相戒莫浪出月黒虎夔藩夔字甚新其意盖言抵觸之義而莫究所出惟杜工部課伐木詩序云課􅀠人入谷斬隂木晨征暮返我有藩籬是鈌是補旅次于小安山有虎知禁若恃爪牙之利必昏黒摚突􅇪人屋壁列樹白桃鏝焉墻實以竹示式遏爲與虎近混淪乎無良賔客其詩句有云藉汝跨小籬乳獸待人肉虎穴連里閭乆客懼所觸乃知魯直用此序中語然杜公在夔府所作詩所謂夔人者述其土俗耳本無抵觸之義魯直盖誤用之又寺齋睡起絶句云人言九事八爲律儻有江船吾欲東按主父偃傳上書言九事其八事爲律令一事諌伐匈奴謂八事爲律令而言則爲字當作去聲讀今魯直似以爲平聲恐亦誤也曹操用人曹操爲漢􅀑蜮君子所不道然知人善任使實後丗之所難及荀彧荀攸郭嘉皆腹心謀臣共濟大事無待賛􅀃其餘智效一官權分一郡無小無大卓然皆稱其職恐關中諸將爲害則屬司􅀠校尉鍾繇以西事而馬騰韓遂遣子入侍當天下亂離諸軍乏食則以􅀥祗任峻建立屯田而軍國饒􅁉遂芟群雄欲復鹽官之利則使衛覬鎮撫關中而諸將服河東未定以杜畿爲太守而衞固范先束手离戮并州初平以梁習爲刺史而邊境肅清揚州陷於孫權獨有九江一郡付之劉馥而恩化大行馮翊困於鄜盜付之鄭渾而民安㓂滅代郡三單于恃力驕恣裴潜單車之郡而單于讋服方得漢中命杜襲督留事而百姓自樂出徙於洛鄴者至八萬口方得馬超之兵聞當發徙驚駭欲變命趙儼爲護軍而相率還降致於東方者亦二萬口凡此十者其爲利豈不大哉張遼走孫權於合肥郭淮拒蜀軍於陽平徐晃却關羽於樊皆以少制衆分方面憂操無敵於建安之時非幸也漢士擇所從漢自中平黃巾之亂天下震擾士大夫莫不擇所從以爲全身逺害之計然非豪傑不能也荀彧少時以潁川四戰之地勸父老亟避之郷人多懐土不能去彧獨率宗族往兾州􅀽紹待以上賔之禮彧度紹終不能定大業去而從曹操其郷人留者多爲賊所殺􅀽紹遣使迎汝南士大夫和洽獨往荆州劉表以上客待之洽曰所以不從本初避争地也昏丗之主不可黷近乆而不去䜛慝將興遂南之武陵其留者多爲表所害曹操牧兖州陳留太守張邈與之親友郡士髙柔獨以爲邈必乗間爲變率郷人欲避之衆皆以曹張相親不然其言柔舉宗適河北邈果叛操郭嘉初見􅀽紹謂其謀臣辛評等曰智者審於量主􅀽公多端寡要好謀無決難與共濟大難吾將更舉以求主子盍去乎評等曰􅀽氏今最強去將何之嘉不復言遂去依曹操操召見與論天下事出曰真吾主也杜襲趙儼繁欽避亂荆州欽數見竒於表襲曰所以俱來者欲全身以待時耳子若見能不巳非吾徒也及天子都許儼曰曹鎮東必能濟華夏吾知歸矣遂詣操河間邢顒在無終聞操定兾州謂田疇曰聞曹公法令嚴民厭亂矣亂極則平請以身先遂裝還郷里疇曰顒天民之先覺者也孫䇿定丹陽吕範請暫領都督䇿曰子衡巳有大衆豈冝復屈小職範曰今捨夲土而託將軍者欲濟丗務也譬猶同舟渉海一事不牢即俱受其敗此亦範計非但將軍也策從之周瑜聞策聲問便推結分好及策卒權立瑜謂權可與共成大業遂委心服事焉諸葛亮在襄陽劉表不能起一見劉備事之不疑此諸人識見如是安得困於亂丗哉劉公榮王戎詣阮籍時兖州刺史劉昶字公榮在坐阮謂王曰偶有二斗美酒當與君共飲彼公榮者無預焉二人交觴酬酢公榮遂不得一杯而言語談戲三人無異或有問之者阮曰勝公榮者不得不與飲酒不如公榮者不可不與飲酒唯公榮可不與飮酒此事見戎傳而丗􅀃爲詳又一事云公榮與人飲酒雜􅁾非􅀋人或譏之答曰勝公榮者不可不與飮不如公榮者亦不可不與飲是公榮軰者又不可不與飲故終日共飲而醉二者稍不同公榮待客如是費酒多矣顧不䝉一杯於人乎東坡詩云未許低頭拜東野徒言共飮勝公榮盖用前事也元豐官制元豐官制初成欲以司馬公爲御史大夫又將俟建儲時以公及吕申公爲保傅元祐初起文潞公於旣老議處以侍中中書令爲言者所攻乃改平章軍國重事自後習以爲制不復除此等官以謂前無故事其實不然也紹興二十五年中批右正言張扶除太常卿執政言自來太常不置卿遂改宗正復言之乃以爲國子祭酒近歳除莫濟祕書監濟辭避累日然後就職巳而李燾陳騤鄭丙皆爲之均曰職事官何不可除之有耳餘􅀽劉張耳陳餘少時爲刎頸交其後争權相與致死地而不厭盖􅀔利之極其究必然韓馥舉兾州以迎􅀽紹而終以懼死劉璋開門延劉備坐失益州翟讓提兵授李密而舉族不免爾朱兆以六鎮之衆付髙歡而卒斃於歡手紹密歡忘其所自不足深責孰謂􅀇德之長者而忍爲此邪周漢存國周之初諸侯千八百國至王赧之亡所存者才八國耳七戰國與衞也然趙韓魏分晉而立齊田氏代姜而興其有土各不及二百年俱非舊􅀖秦始皇乃吕氏子楚幽王乃黃氏子所謂嬴芈之先當不歆非􅀋然則惟燕衛二􅁎姓存而衞至胡亥丗乃絶若以爲召公康叔之德則周公豈不及乎漢列侯八百餘人及光武而存者平陽建平冨平三侯耳建平以先降梁王永奪國平陽爲曹參之後冨平爲張安丗之後參猶有創業之功若安丗則湯子也史稱其推賢􅀭善固冝有後然輕重其心殺人亦多矣獨無餘殃乎漢侯之在王莽朝皆不奪國光武乃但許宗室復故餘皆除之雖鄼侯亦不紹封不知曹張兩侯何以能獨全也曹操殺楊脩曹操殺楊脩之後見其父彪問曰公何瘦之甚對曰愧無日磾先見之明猶懷老牛舐犢之愛操爲之改容古文􅁐載操與彪書數脩之罪以爲恃豪父之􅀔每不與吾同懷將延足下尊門大累便令刑之且贈彪錦裘二領八節角桃杖一枝青牸牛二頭八百里驊騮馬一匹四望通幰七香車一乘驅使二人又遺其妻裘鞾有心青衣二人錢絹甚厚卞夫人亦與􅀽夫人書云賢郎有盖丗文才闔門欽敬明公性急輒行軍法以衣服文絹房子官錦香車送之彪及􅀽夫人皆答書引愆致謝是時漢室將亡政在曹氏袁公四丗宰相爲漢宗臣固操之所忌彪之不死其手幸矣嗚呼危哉古人重國體古人爲􅀖以國體爲急初無小大強弱之異也其所以自待及以之待人亦莫不然故執言脩辭非賢大夫不能盡楚申舟不假道于宋而聘齊宋華元止之曰過我而不假道鄙我也鄙我亡也殺其使者必伐我伐我亦亡也亡一也乃殺之及楚子圍宋旣急猶曰城下之盟有以國斃不能從也鄭三卿爲盗所殺餘盗在宋鄭人納賂以請之師慧曰以千乘之相易滛樂之矇宋無人焉故也子罕聞之固請而歸其賂晉韓宣子有環在鄭商謁諸鄭伯子産弗與曰大國之求無禮以斥之何饜之有吾且爲鄙邑則失位矣若大國令而共無藝鄭鄙邑也亦弗爲也晉合諸侯于平丘子産争貢賦之次子大叔咎之子産曰國不競亦陵何國之爲鄭駟偃娶于晉偃卒鄭人舎其子而立其弟晉人來問子産對客曰若寡君之二三臣其即丗者晉大夫而專制其位是晉之縣鄙也何國之爲楚囚鄭印堇父獻于秦鄭以貨請之子産曰不獲受楚之功而取貨于鄭不可謂國秦不其然若曰鄭國微君之惠楚師其猶在敝邑之城下弗從秦人不予更幣從子産而後獲之讀此數事知春秋列國各數百年其必有道矣容齋隨筆卷第十二
