body:
  text: 容齋五筆卷第八十二則白蘇詩紀年歳白樂天爲人誠實洞逹故作詩述懷好紀年歳因閱其集輙抒録之此生知􅀒少年心不展愁眉欲三十莫言三十是年少百歳三分已一分何况􅂊中年又過三十二不覺明鏡中忽年三十四我年三十六冉冉昬復旦非老亦非少年過三紀餘行年欲四十有女曰金鑾我今欲四十秋懷亦可知行年三十九歳暮日斜時忽因時節驚年歳四十如今欠一年四十爲野夫田中學鉏榖四十官七品拙宦非由它毛􅁂早改變四十白髪生况我今四十本來形皃羸衰病四十身嬌癡三歳女自問今年幾春秋四十初四十未爲老憂傷早衰􅁖莫學二郎吟太苦纔年四十􅁂如霜下有獨立人年來四十一􅀂爲重入華陽院病髪愁心四十三已年四十四又爲五品官靣瘦頭斑四十四逺謫江州爲郡吏行年四十五兩􅁂半蒼蒼四十六時三月盡送春爭得不殷勤我今四十六衰顇卧江城􅁂髪蒼浪牙齒踈不覺身年四十七明朝四十九應轉悟前非四十九年身老日一百五夜月明天衰􅁂蹉跎將五十闗河迢遞過三千青山舉眼三千里白髪平頭五十人宦途氣味已諳盡五十不休何日休五十江城守停杯忽自思莫學爾兄年五十蹉跎始得掌絲綸五十未全老尚可且歡娯長慶二年秋我年五十一二月五日花如雪五十二人頭似霜老校於君合先退明年半百又加三前歳花前五十二今年花前五十五倘年七十猶強徤尚得閑行十五春去時十一二今年五十六我年五十七榮名得幾許我年五十七歸去誠巳遲身爲三品官年已五十八五十八翁方有後靜思堪喜亦堪嗟半百過九年艷陽殘一日火銷燈盡天明後便見平頭六十人六十河南尹前途足可知不准擬身年六十上山仍未要人扶不准擬身年六十遊春猶自有心情我今悟巳晩六十方退閑今歳日餘二十六來歳年登六十二心情多少在六十二三人六十三翁頭雪白假如醒􅀧欲何爲行年六十四安得不衰羸我今六十五走􅀂下坡輪年開第七秩屈指幾多人五十八歸來今年六十六無憂亦無喜六十六年春共把十千沽一斗相看七十欠三年七十欠四歳此生那足論六十八衰翁乘衰百疾攻又問年幾何七十行欠二更過今年年七十假如無病亦宜休今日行年將七十猶須慙愧病來遲且喜同年滿七十莫嫌衰病莫嫌貧舊語相傳聊自慰世間七十老入稀皤然七十翁亦足稱壽考昨日復今辰悠悠七十春人生七十稀我年幸過之白須如雪五朝臣又入新正第七旬時年七十一行開第八秩可謂盡天年吾今巳年七十一眼昬須白頭風眩七十人難到過三更較稀七十三人難再到今春來是别花來七十三翁旦暮身誓開險路作通津風光抛得也七十四年春壽及七十五俸霑五十千其多如此蘇公素重樂天故間亦効之如龍鍾三十九勞生已強半歳莫日斜時還爲昔人歎正引用其語又四十豈不知頭顱畏人不出何其愚我今四十二衰髮不滿梳憶在錢塘正如此回頭四十二年非行年四十九還此北䆫宿吾年四十九頼此一􅀏喜嗟我與君皆丙子四十九年窮不死五十之年初過二衰顔記我今如此白髪蒼顔五十三家人強遣試春衫先生年來六十化道眼巳入不二門紛紛華髮不足道當返六十過去魂我年六十一頽景薄西山結髪事文史俯仰六十踰與君皆丙子各巳三萬日翫味莊誦便如閱年譜也天將富此翁唐劉仁􅁤任給事中爲宰相李義府所惡出爲青州刺史及代還欲斥以罪又坐漕船覆没免官其後百濟叛詔以白衣檢校帶方州刺史仁􅁤謂人曰天將富貴此翁邪果削平遼海白樂天有自題酒庫一篇云身更求何事天將富此翁此翁何處富酒庫不曽空注云劉仁􅁤詩天將富此翁以一醉爲富也然則唐吏以此爲仁􅁤之語而不言其詩爲未審耳白公說俸禄白樂天仕宦從壯至老凡俸禄多寡之數悉載於詩雖波及它人亦然其立身廉清家無餘積可以槩見矣因讀其集輙叙而列之其爲校書郎曰俸錢萬六千月給亦有餘爲左拾遺曰月慚諌􅁓二千張歳愧俸錢三十萬兼京兆戸曹曰俸錢四五萬月可奉晨昏廪禄二百石歳可盈倉囷貶江州司馬曰散員足庇身薄俸可資家壁記曰歳廪數百石月俸六七萬罷杭州刺史曰三年請禄俸頗有餘衣食移家入新宅罷郡有餘資爲蘇州刺史曰十萬戸州尤覺貴二千石禄敢言貧爲賔客分司曰俸錢八九萬給受無虛月嵩洛供雲水朝廷乞俸錢老宜官泠靜貧頼俸優饒官優有禄料職散無羈縻官銜依口得俸禄逐身來爲河南尹曰厚俸如何用閑居不可忘不赴同州曰誠貪俸錢厚其如身力衰爲太子少傅曰月俸百千官二品朝廷雇我作閑人又問俸厚薄百千隨月至七年爲少傅品高俸不薄其致仕曰全家遁此曽無悶半俸資身亦有餘俸隨日計錢盈貫禄逐年支粟滿囷壽及七十五俸占五十千其泛叙曰歴官凡五六禄俸及妻孥料錢隨官用生計逐年營形骸僶俛班行內骨肉勾留俸禄中其它人者如陜州王司馬曰公事閑忙同少尹俸錢多少敵尚書劉夢得罷賔客除祕􅁥禄俸略同曰日望揮金賀新命俸錢依舊又如何歎洛陽長水二縣令曰朱紱洛陽官位屈青袍長水俸錢貧其將下世有逹哉樂天行曰先賣南坊十畒園次賣東郭五頃田然後兼賣所居宅髣髴􅀗緡二三千但恐此錢用不盡即先朝露歸夜泉後之君子試一味其言雖日飲貪泉亦知斟酌矣觀其生涯如是東坡云公廩有餘粟府有餘帛殆亦不然白居易出位白居易爲左贊善大夫盗殺武元衡京都震擾居易首上䟽請亟捕賊刷朝廷耻以必得爲期宰相嫌其出位不恱因是貶江州司馬此唐書本傳語也案是時宰相張弘靖韋貫之弘靖不足道貫之於是爲失矣白集載與楊虞卿書云左降詔下明日而東思欲一陳於左右去年六月盗殺右丞相於通衢中迸血體磔髪肉所不忍道合朝震慄不知所云僕以書籍以來未有此事苟有所見雖畎畒皁􅀠之臣不當黙黙况在班列而能勝其痛憤耶故武丞相之氣平明絶僕之書奏日午入兩日之内滿城知之其不與者或語以僞言或䧟以非語皆曰丞郎給舍諌官御史尚未論請而贊善大夫何反憂國之甚也僕聞此語退而思之贊善大夫誠賤冗耳朝廷有非常事即日獨進封章謂之忠謂之憤亦無愧矣謂之妄謂之狂又敢逃乎以此􅀗辜頋何如耳况又不以此爲罪名乎白之自述如此然則一時指爲出位者不但宰相而已也史又曰居易母墜井死而賦新井篇以是左降前書所謂不以此爲罪名者是巳醉翁亭記酒經歐陽公醉翁亭記東坡公酒經皆以也字爲絶句歐用二十一也字坡用十六也字歐記人人能讀至於酒經知之者蓋無幾坡公嘗云歐陽作此記其詞玩易蓋戯云耳不自以爲竒特也而妄庸者作歐語云平生爲此文最得意又云吾不能爲退之畫記退之不能爲吾醉公亭記此又大妄也坡酒經毎一也字上必押韻暗寓於賦而讀之者不覺其激昂淵妙殊非世閒筆墨所能形容今盡載于此以示後生軰其詞云南方之氓以糯與秔雜以卉藥而爲餅嗅之香嚼之辣揣之枵然而輕此餅之良者也吾始取􅋗而起肥之和之以姜液烝之使十裂繩穿而風戾之愈乆而益悍此麴之精者也米五㪷爲率而五分之爲三㪷者一爲五升者四三㪷者以釀五升者以投三投而止尚有五升之贏也始釀以四兩之餅而毎投以二两之麴皆澤以少水足以散解而匀停也釀者必罋按而井泓之三日而井溢此吾酒之萌也酒之始萌也甚烈而微苦蓋三投而後平也凡餅烈而麴和投者必屢嘗而増損之以舌爲權衡也旣溢之三日乃投九日三投通十有五日而後定也旣定乃注以㪷水凡水必熟而冷者也凡釀與投必寒之而後下此炎州之令也旣水五日乃篘得二㪷有半此吾酒之正也先篘半日取所謂贏者爲粥米一而水三之揉以餅麴凡四兩二物并也投之糟中熟撋而再釀之五日壓得㪷有半此吾酒之少勁者也勁正合爲四㪷又五日而飲則和而力嚴而不猛也篘絶不旋踵而粥投之少留則糟枯中風而酒病也釀乆者酒醇而豐速者反是故吾酒三十日而成也此文如太牢八珍咀爵不嫌於致力則眞味愈雋永然未易爲俊快者言也白公感石白樂天有奉和牛思黯以李蘇州所􅀉太湖石竒􅃺絕倫因作詩兼呈劉夢得其末云共嗟無此分虛管太湖來注與夢得俱典姑蘇而不􅀗此石又有感石上舊字云太湖石上䥴三字十五年前陳結之案陳結之並無所經見全不可曉後觀其對酒有懷􅀉李郎中一絶句曰徃年江外抛挑葉去歳樓中别柳枝寂寞春來一盃酒此情唯有李君知注云桃葉結之也栁枝樊素也然後結之之義始明樂天以病而去栁枝故作詩云兩枝楊桞小樓中嫋娜多年伴醉翁明日放歸歸去後世間應不要春風因劉夣得有戯之之句又荅之云誰能更學孩童戯㝷逐春風捉柳花然其鍾情處竟不能忘如云病共樂天相伴住春隨樊子一時歸金覊駱馬近貰􅁍羅袖栁枝㝷放還觸詠罷來賔閤閉笙歌散後妓房空是也讀之使人悽然禮部韻略非理禮部韻略所分字有絶不近人情者如東之與冬清之與青至於隔韻不通用而爲四聲切韻之學者必強立說然終爲非是如撰字至列於上去三韻中仍義訓不一頃紹興三十年省闈舉子兼經出易簡天下之理得賦予爲參詳官有􅀧檢試卷官蜀士杜莘云簡字韻甚窄􅀂撰字必在所用然唯撰述之撰乃可爾如雜物撰德體天地之撰異夫三子者之撰欠伸撰杖屨之􅀋皆不可用予以白知舉請揭榜示衆何通遠諌議􅀄亦難之予曰倘舉場皆落韻如何出手乃自書一榜榜才出八廂邏卒以爲逐舉未嘗有此例即錄以報主者士人滿簾前上請予爲逐一剖析然後退又靜之與靚其義一也而以靜爲上聲靚爲去聲案漢書賈誼服賦澹虖􅀂深淵之靚顔師古注靚與靜同史記正作靜楊雄甘泉賦暗暗靚深注云靚即靜字耳今淅入兩音殊爲非理予名雲竹莊之堂曰賞靜取杜詩賞靜憐雲竹之句也守僧居之頻年三易有道人指曰靜之左傍乃爭字以故不定疊於是撤去元扁而改爲靚云唐臣乞贈祖唐世贈典唯一品乃及祖餘官只贈父耳而長慶中流澤頗異白樂天制集有戸部尚書楊於陵回贈其祖爲吏部郎中祖母崔氏爲郡夫人馬揔准制贈亡父亦請回其祖及祖母散􅀐常侍張惟素亦然非常制也是時崔植爲相亦有陳情表云亡父嬰甫是臣本生亡伯祐甫臣今承後嗣襲雖移孝心則在自去年以來累有慶澤凢在朝列再蒙追榮或有陳乞皆許回授臣猥當寵擢而顯􅀭之命獨未及於先人今請以在身官秩并前後合叙勲封特乞回充追贈則知其時一切之制如此伯兄文惠執政乞以已合轉官回贈高祖旣巳得旨而爲後省封還固近無此比且失於考引唐時故事也承習用經語誤經傳中事實多有轉相祖述而用􅀄不考其訓故者如邶谷風之詩爲􅁋新昬棄舊室而作其詞曰宴爾新昏以我御窮宴安也言安愛爾之新昏但以我御窮苦之時至於富貴則棄我今人乃以􅀄娶爲宴爾非惟於詩意不合且又再娶事豈堪用也抑之詩曰訏謨俗書之於此使子弟後生軰知之左傳王使宰孔賜齊侯胙齊侯將下拜孔曰天子使孔曰以伯舅耋老無下拜對曰天威不違顔咫尺敢不下拜下拜登受謂拜於堂下而受胙於堂上今人簡牘謝饋者輙曰謹巳下拜猶未爲甚失􅀂天威不違顔咫尺則上四字爲天子設下三字爲人臣設故注言天鍳察不遠威嚴常在顔靣之前今士大夫往往於表奏中言違顔或曰咫顔咫尺之顔全與本指爽戾如用龍顔聖顔天顔之􅀋自無害也長慶表章唐自大曆以河北三鎭爲悍藩所據至元和中田弘正以魏歸國長慶初王承元劉緫去鎭幽於是河北略定而穆宗以昏君崔植杜元潁王播以庸相不能建乆長之䇿輕徙田弘正以啓王庭湊之亂繆用張弘靖以啓朱克融之亂朝廷以諸道十五萬衆裴度元臣宿望烏重嗣李光顔當時名將屯守踰年竟無成功財竭力盡遂以節􅃏授二賊再失河朔訖于唐亡觀一時事􅀔何止可爲痛哭而宰相請上尊號表云陛下自即大位及此二年無巾車汗馬之勞而坐平鎭冀無亡弓遺鏃之費而立定幽燕以謂威靈四及請爲神武君臣上下其亦云無羞恥矣此表乃白居易所作又翰林學士元稹求爲宰相恐裴度復有功大用妨巳進取多從中沮壞之度上表極陳其狀帝不得已解稹翰林恩遇如故稹怨度欲解其兵柄勸上罷兵未幾拜相居易代作謝表其略云臣遭遇盛明不因人進擢居禁内訪以宻謀恩􅅄太深䜛謗並至雖内省行事無所愧心然上黷宸聦合當死責其文過飾非如此居易二表誠爲有玷盛德元白制科元白習制科其書後分爲四卷命曰䇿林其䇿頭䇿項各二道䇿尾三道此外曰美謙遜塞人望政必成不勞而理風化澆朴復雍熈感人心之􅀋凡七十五門言所應對者百不用其一二備載於文集云八種經典開士悟入諸佛知見以了義度無􅁁以圎教垂無窮莫尊於妙法蓮華經凡六萬九千五百五字證無生忍造不二門住不可思議解脫莫極於維摩經凡二萬七千九十二字攝四生九􅀋入無餘􅄺槃實無得度者莫先於金剛般􅀂波羅密經凡五千二百八十七字壞罪集福淨一切惡道莫急於佛頂尊勝陀羅尼經凡三千二十字應念順願願生極樂土莫疾於阿彌陀經凢一千八百字用正見觀眞相莫出於觀音普賢菩薩法行經凡六千九百九十字詮自性認本覺莫深於實相法密經凢三千一百五字空法塵依佛智莫過於般􅀂渡羅密多心經凢二百五十八字是八種經具十二部合一十一萬六千八百五十七字三乗之要旨萬佛之祕藏盡矣唐長慶二年蘇州重玄寺法華院石壁所刻金字經白樂天爲作碑文其叙如此予切愛其簡明㓗亮故備録之容齋五筆卷第八終
