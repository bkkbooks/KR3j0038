front:
  text: 容齋續筆卷第三十八則
  hash: sha256:9748f79e8097b0e02cff5ae0d49fc2f9bb699a0e9a5528236a6618c0af58cba7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_021-1a}
body:
  text: 一定之計人臣之遇明主於始見之際圖事揆策必有一定之計据以爲決然後終身不易其言則史策書之足爲不朽東坡序范文正公之文蓋論之矣伊尹起於有莘應湯三聘將使君爲堯舜之君民爲堯舜之民卒之相湯伐夏俾厥后惟堯舜格于皇天傅􅀃在巖野爰立作相三篇之書皎若星日雖史籍乆逺不詳紀其行事而髙宗克􅀑方伐荆楚嘉靖商􅀖禮陟配天載于易之旣濟書之無逸詩之商武商代之君莫盛焉罔俾阿衡專美有商於是爲允蹈矣管仲以其君霸商君基秦爲強雖聖門羞稱後丗所賤然考其爲政蓋未甞一戾於始謀韓信勸漢祖任天下武勇以城邑封功臣以義兵從思東歸之士傳檄而定三秦下魏之後請北舉燕趙東擊齊南絶楚糧道西會滎陽至於滅楚無一言不酬鄧禹見光武於河北知更始無成􅀃帝延攬英雄務恱民心立髙祖之業救萬民之命帝與定計議終濟大業耿弇與光武同討王郎願歸幽州益發精兵定彭寵取張豐還收冨平獲索東攻張歩以平齊地帝常以爲落落難合而事竟成諸葛亮論曹操挾天子令諸侯難與爭鋒孫權據有江東可與爲援而不可圖荆州用武之國益州沃野千里勸劉備跨有荆益外觀時變則霸業可成漢室可興及南方巳定則表奬率三軍北定中原巳而盡行其􅀃至於用師未戰而身先死則天也房喬杖策謁太宗爲記室即收人物致幕府與諸將密相申結輔成大勲至於爲相號令典章盡岀其手雖數百年猶蒙其功王朴事周丗宗當五季草創之際上平邊策以爲唐失吴蜀􅀳失幽并當知所以平之之術當今吴易圖可橈之地二千里攻虛擊弱則所向無前江北諸州乃國家之有也旣得江北江之南亦不難平得吴則桂廣皆爲内臣岷蜀可飛書而召之不至則四面並進席卷而蜀平矣吴蜀平幽可望風而至唯并必死之宼􅃸其便則一削以平之丗宗用其䇿功未集而殂至於國朝掃平諸方先後次第皆不岀朴所料獨幽州之舉旣至城下而諸將不能成功若乃王安石顓國言聽計從以身任天下之重而師慕商鞅爲人苟可以取民者無不盡遂詒後丗之害則在所不論也秋興賦宋玉九辯詞云憭慄兮若在逺行登山臨水兮送將歸潘安仁秋興賦引其語繼之曰送歸懷慕徒之戀逺行有羇旅之憤臨川感流以歎逝登山懷逺而悼近彼四慼之疚心遭一塗而難忍蓋暢演厥旨而下語之工拙較然不侔也太史慈三國當漢魏之際英雄虎爭一時豪傑志義之士礌礌落落皆非後人所能冀然太史慈者尤爲可稱慈少仕東萊本郡爲奏曹吏郡與州有隙州章劾之慈以計敗其章而郡得直孔融在北海爲賊所圍慈爲求救於平原突圍直出竟得兵解融之難後劉繇爲􅀭州刺史慈往見之會孫策至或勸繇以慈爲大將軍繇曰我若用子義許子將不當􅀏我邪但使慈偵視輕重獨與一􅀐卒遇策便前􅃲正與策對得其兠鍪及繇奔豫章慈爲策所執捉其手曰寧識神亭時邪又稱其烈義爲天下智士釋縛用之命撫安繇之子經理其家孫權代策使爲建昌都尉遂委以南方之事督治海昬至卒時纔年四十一葬于新吴今洪府奉新縣也邑人立廟敬事乾道中封靈惠侯予在西掖當制其詞云神蚤赴孔融雅謂青州之烈士晚從孫策遂爲吳國之信臣立廟至今作民司命㩜一同之言狀擇二美以建侯庶幾江表之間尚憶神亭之事蓋爲是也謚法先王謚以尊名節以壹惠語出表記然不云起於何時今丗傳周公謚法故自文王武王以來始有謚周之政尚文斯可驗矣如堯舜禹湯皆名皇甫謐之徒附會爲􅀃至於桀紂亦表以四字皆非也周王謚以一字至威烈正定益以兩而衛武公曰叡聖武公見於楚語孔文子曰正惠文子見於檀弓各三字意當時尚多有之唐諸帝謚經三次加􅁽由髙祖至明皇皆七字其後多少不齊代宗以四字肅順憲以九字餘以五字唯宣宗獨十八字曰元聖至明成武獻文睿智章仁神聦懿道大孝國朝祖宗謚十六字唯神宗二十字曰體元顯道法古立憲帝德王功英文烈武欽仁聖孝蓋蔡京所定也漢文帝受言漢文帝即位十三年齊太倉令淳于意有罪當刑其女緹縈年十四隨至長安上書願没入爲官婢以贖父刑罪帝憐悲其意即下令除肉刑丞相張蒼御史大夫馮敬議請定律當斬右止者反弃市笞者杖背五百至三百亦多死徒有輕刑之名實多殺人其三族之罪又不乗時建明以􅀒天子德意蒼敬可謂具臣矣史稱文帝止輦受言今以一女子上書躬自省覽即除數千載所行之刑曾不留難然則天下事豈復有稽滯不決者哉所謂集上書囊以爲殿帷蓋凡囊封之書必至前也丹青引杜子美丹青引贈曹將軍霸云先帝天馬玉花騘畫工如山貌不同是日牽來赤墀下迥立閶闔生長風詔謂將軍拂絹素意匠慘澹經營中斯須九重眞龍出一洗萬古凡馬空玉花却在御榻上榻上廷前屹相向至尊含􅀏催賜金圉人太僕皆惆悵讀者或不曉其㫖以爲畫馬奪眞圉人太僕所爲不樂是不然圉人太僕蓋牧養官曹及馭者而黃金之賜乃畫史得之是以惆悵杜公之意深矣又觀曹將軍畫馬圖云曾皃先帝照夜白龍池十日飛霹靂内府殷紅碼碯盤婕妤傳詔才人索亦此意也詩國風秦中事周召二南􅃎風皆周文武成王時詩其所陳者秦中事也所謂沼沚洲澗之水蘋蘩藻荇之菜疑非所有旣化行江漢故并江之永漢之廣率皆得言之歟摽有梅之詩不注釋梅而秦風終南詩終南何有有條有梅毛氏云梅枏也箋云名山髙大冝有茂木今之梅與枏異亦非茂木蓋毛鄭北人不識梅耳若上林賦所引江蘺蘼蕪揭車蘘荷蓀若薠芧之􅀋自是侈辭過實與所謂八川東注太湖者等也詩文當句對唐人詩文或於一句中自成對偶謂之當句對蓋起於楚辭蕙烝蘭藉桂酒椒漿桂櫂蘭枻斵冰積雪自齊梁以來江文通􅁃子山諸人亦如此如王勃宴滕王閣序一篇皆然謂若襟三江帶五湖控蠻荆引甌越龍光牛斗徐孺陳蕃騰蛟起鳯紫電青霜鶴汀鳬渚桂殿蘭宮鍾鳴鼎食之家青雀黃龍之軸落霞􅀌鶩秋水長天天髙地迥興盡悲來宇宙盈虛丘墟巳矣之辭是也于公異破朱泚露布亦然如堯舜禹湯之德統元立極之君卧鼔偃旗養威蓄銳夾川陸而左旋右抽抵丘陵而浸􅁋布濩聲塞宇宙氣雄鉦鼔貙兕作威風雲動色乗其跆藉取彼鯨鯢自卯及酉來拒復攻山傾河泄霆􅃲雷馳自比徂南輿尸折首左武右文銷鋒鑄鏑之辭是也杜詩小院回廊春寂寂浴鳬飛鷺睌悠悠清江錦石傷心麗嫩蘂濃花滿目班書籤藥裹封蛛網野店山橋送馬蹄戎馬不如歸馬逸千家今有百家存犬羊曾爛漫官闕尚蕭條蛟龍引子過荷芰逐花低干戈況復塵隨眼􅁂髮還應雪滿頭百萬傳深入寰區望匪他象床玉手萬草千花落絮遊絲隨風照日青袍白馬金谷銅駝竹寒沙碧菱刺藤梢長年三老捩柂開頭門巷荆􅁄底君臣犲虎邊養拙干戈全生麋鹿捨舟策馬拖玉腰金高江急峽翠木蒼藤古廟杉松歳時伏臘三分割據萬古雲霄伯仲之間指揮若定桃蹊李徑梔子紅椒􅁃信羅含春來秋去楓林橘樹􅃨道重樓之􅀋不可勝舉李義山一詩其題曰當句有對云密邇平陽接上蘭秦樓鴛瓦漢宮盤池光不定花光亂日氣初涵露氣乾但覺游蜂饒舞蝶豈知􅀌鳯憶離鸞三星自轉三山逺紫府程遥碧落寛其他詩句中如青女素娥對月中霜裏黃葉風雨對青樓管絃骨肉書題對蕙蘭蹊徑花鬚柳眼對紫蝶黃蜂重吟細把對巳落猶開急鼔踈鍾對休燈滅燭江魚朔鴈對秦樹嵩雲萬户千門對風朝露夜如是者甚多東坡明正東坡明正一篇送于伋失官東歸云子之失官有爲子悲如子之自悲者乎有如子之父兄妻子之爲子悲者乎子之所以悲者惑於得也父兄妻子之所以悲者惑於愛也案戰國策齊鄒忌謂妻曰我孰與城北徐公美其妻曰君美甚徐公何能及公也復問其妾與客皆言徐公不若君之美暮寢而思之曰吾妻之美我者私我也妾之美我者畏我也客之美我者欲有求於我也東坡之斡旋蓋取諸此然四菩薩閣記云此􅀞乃先君之所嗜旣免喪以施浮圖惟簡曰此唐明皇帝之所不能守者而況於余乎余惟自度不能長守此也是以與子而其末云軾之以是與子者凡以爲先君捨也與初辭意蓋不同晚學所不曉也臺諫不相見嘉祐六年司馬公以修起居注同知諫院上章乞立宗室爲繼嗣對畢詣中書略爲宰相韓公言其旨韓公攝饗明堂殿中侍御史陳洙監祭公問洙聞殿院與司馬舎人甚熟洙答以頃年曾同爲直講又問近日曾聞其上殿言何事洙答以彼此臺諫官不相往來不知言何事此一項温公私記之甚詳然則國朝故實臺諌官元不相見故趙清獻公爲御史論陳恭公而范蜀公以諌官與之爭元豐中又不許兩省官相往來鮮于子駿乞罷此禁元祐中諫官劉器之梁況之等論蔡新州而御史中丞以下皆以無章䟽罷黜靖康時諫議大夫馮澥秦檜所用云無望之禍自古無望之禍玉石俱焚者釋氏謂之刼數然固自有幸不幸者漢武帝以望氣者言長安獄中有天子氣於是遣使者分條中都官詔獄繫者亡輕重一切皆殺之獨郡邸獄繫者賴丙吉得生隋煬帝令嵩山道士潘誕合鍊金丹不成云無石膽石髓若得童男女膽髓各三斛六斗可以代之帝怒斬誕其後方士言李氏當爲天子勸帝盡誅海内李姓以煬帝之無道嗜殺人不啻草莽而二􅀃偶不行唐太宗以李淳風言女武當王巳在宫中欲取疑似者盡殺之賴淳風諫而止以太宗之賢尚如此豈不云幸不幸哉燕􅀃黃魯直和張文潜八詩其二云談經用燕􅀃束棄諸儒傳濫觴雖有罪末沠瀰九縣大意指王氏新經學也燕􅀃出於韓非子曰先王有郢書而後丗多燕􅀃又引其事曰郢人有遺燕相國書者夜書火不明謂持燭者曰舉燭已而誤書舉燭二字非書本意也燕相受書曰舉燭者尚明也尚明者舉賢而用之遂以白王王大􅀃國以治治則治矣非書意也魯直以新學多穿鑿故有此句折檻行杜詩折檻行云千載少似朱雲人至今折檻空嶙峋婁公不語宋公語尚憶先皇容直臣此篇專爲諫爭而設謂婁師德宋璟也人多疑婁公旣無一語何得爲直臣錢伸仲云朝有闕政或婁公不語則宋公語但師德乃是武后朝人璟爲相時其亡乆矣杜有祭房相國文言羣公間出魏杜婁宋亦併二公稱之詩言先皇意爲明皇帝也婁氏別無顯人有聲開元間爲不可曉朱雲陳元達朱雲見漢成帝請斬馬劒斷張禹首上大怒曰罪死不赦御史將雲下雲攀殿檻檻折御史遂將雲去辛慶忌叩頭以死爭上意解然後得巳及後當治檻上曰勿易因而輯之輯與集同謂􅀘合之以旌直臣劉聦爲劉后起䳨儀殿陳元達諫聦怒命將出斬之時在逍遥園李中堂元達先鎻􅆎而入即以鎻繞堂下樹左右曳之不能動劉氏聞之私勑左右停刑手䟽切諫聦乃解引元達而謝之易園爲納賢園堂爲媿賢堂兩人之事甚相􅀋雲之免於死而慶忌即時爭救之故差易爲力若元達之命在須􅁷間聦之急暴且盛怒何暇延留數刻而容劉氏得以草䟽乎脫使就刎其首或令武士擊殺亦可何恃於鎻􅆎哉是爲可疑也成帝不易檻以旌雲直而不能命以一官乃不若聦之待元達也至今宫殿正中一間橫檻獨不施欄楯謂之折檻蓋自漢以來相傳如此矣杜老不忘君前軰謂杜少陵當流離顚沛之際一飯未甞忘君今略紀其數語云萬方頻送喜無乃聖躬勞至今勞聖主何以報皇天獨使至尊憂社稷諸君何以答􅂛平天子亦應厭奔走群公固合思升平如此之􅀋非一栽松詩白樂天栽松詩云小松未盈尺心愛手自移蒼然澗底色雲濕烟霏霏栽植我年晚長成君性遲如何過四十種此數寸枝得見成隂否人生七十稀予治圃於郷里乾道已丑歳正年四十七矣自伯兄山居手移穉松數十本其髙僅四五寸植之雲壑石上擁土以爲固不能保其必活也過二十年蔚然成林皆有干霄之勢偶閱白公集感而書之烏鵲鳴北人以烏聲爲喜鵲聲爲非南人聞鵲噪則喜聞烏聲則唾而逐之至於弦弩挾彈擊使逺去北齊書奚永洛與張子信對坐有鵲正鳴於庭樹間子信曰鵲言不善當有口舌事今夜有喚必不得往子信去後髙儼使召之且云勑喚永洛詐稱墮馬遂免於難白樂天在江州答元郎中楊貟外喜烏見􅀉曰南宮鴛鴦地何忽烏來止故人錦帳郎聞烏􅀏相視疑烏報消息望我歸郷里我歸應待烏頭白慙愧元郎誤歡喜然則鵲言固不善而烏亦能報喜也又有和元微之大觜烏一篇云老巫生姦計與烏意潛通云此非凡鳥遥見起敬恭千歳乃一出喜賀主人翁此烏所止家家産日夜豐上以致壽考下可冝田農案微之所賦云巫言此烏至財産日豐冝主人一心惑誘引不知疲轉見烏來集自言家轉孳專聽烏喜怒信受若長離今之烏則然也丗有傳隂陽局鴉經謂東方朔所著大略言凡占烏之鳴先數其聲然後定其方位假如甲日一聲即是甲聲第二聲爲乙聲以十干數之乃辨其急緩以定吉凶蓋不專於一􅀃也容齋續筆卷第三
