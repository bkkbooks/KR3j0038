body:
  text: 秦隋之惡自三代訖于五季爲天下君而得罪於民爲萬丗所麾斥者莫若秦與隋豈二氏之惡浮於桀紂哉蓋秦之後即爲漢隋之後即爲唐皆享國乆長一時論議之臣指引前丗必首及之信而有證是以其事暴白於方來彌逺彌彰而不可蓋也甞試裒舉之張耳曰秦爲亂政虐刑殘滅天下北爲長城之役南有五領之戍外内騷動頭會箕歛重以苛法使父子不相聊張良曰秦爲無道故沛公得入關爲天下除殘去賊陸賈曰秦任刑法不變卒滅嬴氏王衞尉曰秦以不聞其過亡天下張釋之曰秦任刀筆之吏爭以亟疾苛察相髙以故不聞其過陵夷至于二丗天下土崩賈山借秦爲喻曰爲宫室之麗使其後丗曾不得聚廬而託處爲馳道之麗後丗不得邪徑而託足爲葬薶之麗後丗不得蓬顆而託葬以千八百國之民自養力罷不能勝其役財盡不能勝其求人與之爲怨家與之爲讎天下巳壞而弗自知身死纔數月耳而宗廟滅絶賈􅁩曰商君遺禮􅁩棄仁恩并心於進取行之二歳秦俗日敗滅四維而不張君臣乖亂六親殃戮萬民離叛社稷爲虚又曰使趙髙傅胡亥而教之獄今日即位明日射人其視殺人若刈草菅然置天下於法令刑罰德澤亡一有而怨毒盈於丗下憎惡之如仇讎􅏯錯曰秦發卒戍邊有萬死之害而亡銖兩之報天下明知禍烈及己也陳勝首倡天下從之如流水又曰任不肖而信讒賊民力罷盡矜奮自賢法令煩􅉃刑罰暴酷親踈皆危外内咸怨絶祀亡丗董仲舒曰秦重禁文學不得挾書弃􅂢禮􅁩而惡聞之其心欲盡滅先聖之道而顓爲自恣苟簡之治自古以來未甞有以亂濟亂大敗天下之民如秦者也又曰師申商之法行韓非之􅀃憎帝王之道以貪狼爲俗賦歛亡度竭民財力羣盜並起死者相望而姦不息淮南王安曰秦使尉屠睢攻越鑿渠通道曠日引乆發適戍以備之往者莫反亡逃相從羣爲盜賊於是山東之難始興吾丘夀王曰秦廢王道立私議去仁恩而任刑戮至於赭衣塞路羣盜滿山主父偃曰秦任戰勝之威功齊三代務勝不休暴兵露師百姓靡敝􅀌寡老弱不能相養死者相望天下始叛徐樂曰秦之末丗民困而主不恤下怨而上不知俗巳亂而政不脩陳渉之所以爲資也此之謂土崩嚴安曰秦一海内之政壞諸侯之城爲知巧權利者進篤厚忠正者退法嚴令苛意廣心逸兵禍北結於胡南挂於越宿兵於無用之地進而不得退天下大畔滅丗絶祀司馬相如曰二丗持身不謹亡國失勢信讒不寤宗廟滅絶伍被曰奉爲無道百姓欲爲亂者十室而五使徐福入海欲爲亂者十室而六使尉佗攻百越欲爲亂者十室而七作阿房之宫欲爲亂者十室而八路温舒曰秦有十失其一尚存治獄之吏是也賈􅂢之曰興兵逺攻貪外虛内天下潰畔禍卒在於二丗之末劉向曰始皇葬於驪山下錮三泉多殺宫人生薶工匠計以萬數天下苦其役而反之梅福曰秦爲無道削仲尼之迹絶周公之軌禮壞樂崩王道不通張誹謗之罔以爲漢敺除谷永曰秦所以二丗十六年而亡者養生泰奢奉終泰厚也劉歆曰燔經書殺儒士設挾書之法行是古之罪道術由是遂滅凡漢人之論秦惡者如此唐髙祖曰隋氏以主驕臣諂亡天下孫伏伽曰隋以惡聞其過亡天下薛收傳秦王平洛陽觀隋宫室歎曰煬帝無道殫人力以事夸侈收曰後主奢虐是矜死一夫之手爲後丗􅀏張元素曰自古未有如隋亂者得非君自專法日亂乎造乾陽殿伐木於豫章一材之費已數十萬工乾陽畢功隋人解體魏證曰煬帝信虞丗基賊徧天下而不得聞又曰隋唯貴不獻食或供奉不精爲此無限而至於亡方其未亂自謂必無亂未亡自謂必不亡所以甲兵亟動傜役不息又曰恃其富強不虞後患役萬物以自奉養子女玉帛是求宫室臺榭是飾外示威重内行險忌上下相蒙人不堪命以致隕匹夫之手又曰文帝驕其諸子使至夷滅馬周曰貯積者固有國之常要當人有餘力而後收之豈人勞而強歛之以資宼邪隋貯洛口倉而李密因之積布帛東都而王丗充據之西京府庫亦爲國家之用陳子昂曰煬帝恃四海之富鑿渠決河疲生人之力中國之難起身死人手宗廟爲墟楊相如曰煬帝自恃其彊不憂時政言同堯舜迹如桀紂舉天下之大一擲弃之吳兢曰煬帝驕矜自􅀒以爲堯舜莫己若而諱亡憎諫乃曰有諫我者當時不殺後必殺之自是謇諤之士去而不顧外雖有變朝臣鉗口帝不知也柳宗元曰隋氏環四海以爲鼎跨九垠以爲鑪爨以毒燎煽以虐焰沸湧灼爛號呼騰蹈李珏曰隋文帝勞於小務以疑待下故二丗而亡凡唐人之論隋惡者如此漢唐二武東坡云古之君子必憂治丗而危明主明主有絶人之資而治丗無可畏之防美哉斯言漢之武帝唐之武后不可謂不明而巫蠱之禍羅織之獄天下塗炭后妃公卿交臂就戮後丗聞二武之名則憎惡之蔡確作詩用郝甑山上元間事宣仁謂以吾比武后蘇轍用武帝奢侈窮兵虚耗海内爲諫䟽哲宗謂至引漢武上方先朝皆以之得罪人君之立政可不監兹玉川子韓退之􅀉盧仝詩云玉川先生洛城裏破屋數間而巳矣一奴長須不裹頭一婢赤脚老無齒昨晚長須來下狀隔墻惡少惡難似毎􅀐屋山下窺瞰渾舎驚怕走折趾立召賊曹呼五百盡取䑕軰尸諸市夫姦盜固不義然必有謂而發非貪慕貨財則挑暴子女如玉川之貧至於鄰僧乞米隔墻居者豈不知之若爲色而動窺見室家之好是以一赤脚老婢隕命也惡少可謂枉箸一死予讀韓詩至此不覺失􅀏仝集中有所思一篇其略云當時我醉美人家美人顔色嬌如花今日美人弃我去青樓珠箔天之涯夢中醉卧巫山雲覺來淚滴湘江水湘江兩岸花木深美人不見愁人心相思一夜梅花發忽到䆫前疑是君則其風味殊不淺韓詩當亦含譏諷乎銀青階唐自肅代以後賞人以官爵乆而浸濫下至州郡胥吏軍班校伍一命便帶銀青光禄大夫階殆與無官者等明宗長興二年詔不得薦銀青階爲州縣官賤之至矣􅀳天福中中書舎人李詳上䟽以爲十年以來諸道職掌皆許推恩藩方薦論動踰數百乃至蔵典書吏優伶奴僕初命則至銀青階被服皆紫袍象笏名器􅆫濫貴賤不分請自今節度州聽奏大將十人它州止聽奏都押牙都虞􅀱孔目官從之馮拯之父俊當周太祖時補安逺鎭將以銀青光禄檢校太子賔客兼御史大夫至夲朝端拱中拯登朝遇郊恩始贈大理評事子八丗從祖師暢暢子漢卿卿子膺圖在南唐時皆得銀青階至檢校尚書祭酒然樂平縣帖之全稱姓名其差傜正與里長等元豐中李清臣論官制奏言國朝踵襲近代因循之弊牙校有銀青光禄大夫階卒長開國而有食邑蓋爲此也今除授蕃官猶用此制紹興二十八年廣西經略司申安化三州蠻蒙全計等三百十八人進奉乞補官勲皆三班借差三班差使悉帶銀青祭酒而等第加勲文安公在西垣爲之命詞買馬牧馬國家買馬南邊於邕管西邊於岷黎皆置使提督歳所綱發者蓋踰萬匹使臣將校得遷秩轉資沿道數十州驛程劵食廄圉薪芻之費其數不貲而江淮之間本非􅀐兵所能展奮又三衙遇暑月放牧於蘇秀以就水草亦爲逐處之患因讀五代舊史云唐明宗問樞密使范延光內外馬數對曰三萬五千匹帝歎曰太祖在太原􅀐軍不過七千先皇自始至終馬纔及萬今有鐵馬如是而不能使九州混一是吾養士練將之不至也延光奏曰國家養馬太多計一􅀐士之費可贍歩軍五人三萬五千􅀐抵十五萬歩軍旣無所施虚耗國力帝曰誠如卿言肥􅀐士而瘠吾民民何負哉明宗出於蕃戎猶能以愛民爲念李克用父子以馬上立國制勝然所蓄只如此今蓋數倍之矣尺寸之功不建可不惜哉且明宗都洛陽正臨中州尚以爲􅀐士無所施然則今雖純用歩卒亦未爲失計也杜詩用字律詩用自字相字共字獨字誰字之􅀋皆是實字及彼我所稱當以爲對故杜老未甞不然今略紀其句于此徑石相縈帶川雲自去留山花相映發水鳥自􅀌飛衰顔聊自哂小吏最相輕髙城秋自落雜樹晚相迷百鳥各相命􅀌雲無自心勝地初相引徐行得自娱雲裏相呼疾沙邊自宿稀暗飛螢自照水宿鳥相呼猿挂時相學鷗行烱自如自吟詩送老相勸酒開顔俱飛蛺蝶元相逐並蒂芙蓉本自􅀟自去自來堂上燕相親相近水中鷗此時對雪遥相憶送客逢春可自由梅花欲開不自覺棣萼一別永相望桃花氣暖眼自醉春渚日落夢相牽此以自字對相字也自須開竹徑誰道避雲蘿自􅀏燈前舞誰憐醉後歌死去憑誰報歸來始自憐哀歌時自短醉舞爲誰醒離別人誰在經過老自休永夜角聲悲自語中天月色好誰看此以自字對誰字也野人時獨往雲木曉相參正月鶯相見非時鳥共聞江上形容吾獨老天涯風俗病相親縱飲乆判人共弃懶朝眞與丗相違此日此時人共得一談一􅀏俗相看此以共字獨字對相字也唐虞象刑虞書象刑惟明象者法也漢文帝詔始云有虞氏之時畫衣冠異章服以爲戮而民弗犯武帝詔亦云唐虞畫象而民不犯白虎通云畫象者其衣服象五刑也犯墨者蒙巾犯劓者赭著其衣犯髕者以墨蒙其髕犯宫者屝屝草屨也大辟者布衣無領其􅀃雖未必然楊雄法言唐虞象刑惟明􅀃者引前詔以證然則唐虞之所以齊民禮義榮辱而巳不專於刑也秦之末年赭衣半道而姦不息國朝之制減死一等及胥吏兵卒配徒者􅄺其面而刺之本以示辱且使人望而識之耳乆而益多毎郡牢城營其額常溢殆至十餘萬兇盜處之恬然蓋習熟而無所恥也羅隱讒書云九人冠而一人髽則髽者慕而冠者勝九人髽而一人冠則冠者慕而髽者勝正謂是歟老子曰民常不畏死柰何以死懼之若使民常畏死則爲惡者吾得執而殺之孰敢可謂至言荀卿謂象刑爲治古不然亦正論也崔常牛李士大夫一時論議自各有是非不當二校其平生賢否也常衮爲宰相唐德宗初立議羣臣喪服衮以爲遺詔云天下吏人三日釋服古者卿大夫從君而服皇帝二十七日而除在朝羣臣亦當如之祐甫以爲遺詔無朝臣庶人之別凡百執事孰非吏人皆應三日釋服相與力爭衮不能堪奏貶祐甫巳而衮坐欺罔貶祐甫代之議者以祐甫之賢逺出衮右故不復評其事然揆之以理則衮之言爲然李德􅁉爲西川節度使吐蕃維州副使悉怛謀請降德􅁉遣兵據其城具奏其狀欲因是擣西戎腹心百官議皆請如德􅁉策宰相牛僧孺曰吐蕃之境四面各萬里失一維州未能損其勢比來修好約罷戍兵彼若來責失信上平涼坂萬􅀐綴回中怒氣直辭不三日至咸陽橋此時西南數千里外得百維州何所用之文宗以爲然詔以城歸吐蕃由是德􅁉怨僧孺益深議者亦以德􅁉賢於僧孺咸謂牛李私憾不釋僧孺嫉德􅁉之功故沮其事然以今觀之則僧孺爲得司馬温公斷之以義利兩人曲直始分盜賊怨官吏陳勝初起兵諸郡縣苦秦吏暴爭殺其長吏以應勝􅀳安帝時孫恩亂東土所至醢諸縣令以食其妻子不肯食者輒支解之隋大業末羣盜蜂起得隋官及士族子弟皆殺之黃巢陷京師其徒各出大掠殺人滿街巢不能禁尤憎官吏得者皆殺之宣和中方臘爲亂陷數州凡得官吏必斷臠支體探其肺腸或熬以膏油叢鏑亂射備盡楚毒以償怨心杭卒陳通爲逆每獲一命官亦即梟斬豈非貪殘者爲吏􅀝勢虐民比屋抱恨思一有所出乆矣故乗時肆志人自爲怒乎作詩先賦韻南朝人作詩多先賦韻如梁武帝華光殿宴飲連句沈約賦韻曹景宗不得韻啓求之乃得競病兩字之􅀋是也予家有陳後主文集十卷載王師獻捷賀樂文思預席羣僚各賦一字仍成韻上得盛病柄令橫映夐併鏡慶十字宴宣猷堂得迮格白赫易夕擲斥坼啞十字幸舎人省得日謐一瑟畢訖橘質帙實十字如此者凡數十篇今人無此格也后妃命數左傳所載鄭文公之子十餘人其母皆貴胄而子多不得其死惟賤妾燕姞生穆公獨繼父有國子孫蕃衍盛大與鄭存亡薄􅁎入漢王宫歳餘不得幸其所善管夫人趙子兒先幸漢王爲言其故王即召幸之歳中生文帝自有子後希見及吕后幽諸幸􅁎不得出宫而薄氏以希見故得從子之代爲代太后終之承漢大業者文帝也景帝召程􅁎程􅁎有所避不願進而飾侍者唐兒使夜往上醉不知而幸之遂有身生長沙王發以母微無寵故王卑濕貧國漢之宗室十有餘萬人而中興炎祚成四百年之基者發之五丗孫光武也元帝爲太子所愛司馬良娣死怒諸娣妾莫得進見宣帝令皇后擇後宫家人子五人虞侍太子后令旁長御問所欲太子殊無意於五人者不得巳於皇后彊應曰此中一人可乃王政君也壹幸有身生成帝自有子後希復進見然歷漢四丗爲天下母六十餘載觀此四后妃者可謂承恩有限而光華啓佑與同軰遼絶政君遂爲先漢之禍天之所命其亦各有數乎徽宗皇帝有子三十人唯髙宗皇帝再復大業顯仁皇后在宫掖時亦不肯與同列爭進甚􅀋薄太后云公爲尊稱柳子厚房公銘隂曰天子之三公稱公王者之後稱公諸侯之入爲王卿士亦曰公尊其道而師之稱曰公古之人通謂年之長老曰公而大臣罕能以姓配公者唐之最著者曰房公東坡墨君亭記云凡人相與稱呼者貴之則曰公范曄漢史惟三公乃以姓配之未甞或紊如鄧禹稱鄧公吴漢稱吴公伏公湛宋公宏牟公融􅀽公安李公固陳公寵橋公玄劉公寵崔公烈胡公廣王公龔楊公彪荀公爽皇甫公嵩曹公操是也三國亦有諸葛公司馬公顧公張公之目其在本朝唯韓公冨公范公歐陽公司馬公蘇公爲最著也臺城少城􅀳宋間謂朝廷禁省爲臺故稱禁城爲臺城官軍爲臺軍使者爲臺使卿士爲臺官法令爲臺格需科則曰臺有求須調發則曰臺所遣兵劉夢得賦金陵五詠故有臺城一篇今人於它處指言建康爲臺城則非也􅀳益州刺史治太城蜀郡太守治少城皆在成都猶云大城小城耳杜子美在蜀日賦詩故有東望少城之句今人於它處指成都爲少城則非也容齋續筆卷第五
