body:
  text: 容齋三筆卷第十十七則詞學科目熈寧罷詩賦元祐復之至紹聖又罷於是學者不復習爲應用之文紹聖二年始立宏詞科除詔誥制勑不試外其章表露布檄書頌箴銘序記誡諭凡九種以四題作兩場引試唯進士得預而專用國朝及時事爲題毎取不得過五人大觀四年改立詞學兼茂科増試制詔内二篇以歷代史故事毎歳一試所取不得過三人紹興三年工部侍郎李擢又乞取兩科裁訂别立一科遂増爲十二體曰制曰誥曰詔曰表曰露布曰檄曰箴曰銘曰記曰贊曰頌曰序凡三埸試六篇毎􅂣一古一今而許卿大夫之任子亦就試爲博學宏詞科所取不得過五人任子中選者賜進士第雖用唐時科目而所試文則非也自乙卯至于紹熈癸丑二十牓或三人或二人或一人并之三十三大而紹熈庚戍闕不取其以任子進者湯岐公至宰相王日嚴至翰林承旨李獻之學士陳子象兵部侍郎湯朝美右史陳峴方進用而予兄弟居其閒文惠公至宰相文安公至執政予冒處翰􅁐此外皆係已登科人然擢用者唯周益公至宰相周茂振執政沈德和莫子齊倪正父莫仲謙趙大本傅景仁至侍從葉伯益季元衡至左右史餘多碌碌而見存未顯者陳宗召也然則吾家所􅀩亦云過矣唐夜試進士唐進士入舉􅂣得用燭故或者以爲自平旦至通宵劉虚白有二十年前此夜中一般燈燭一般風之句及三條燭盡之􅀃按舊五代史選舉志云長興二年禮部貢院奏當司奉堂帖夜試進士有何條格者勑旨秋來赴舉備有常程夜後爲文曽無舊制王道以明規是設公事須白晝顯行耳進士並令排門齊入就試至閉門時試畢内有先了者上曆畫時旋令先出其入䇿亦須晝試應諸科對䇿並依此例則晝試進士非前例也清泰二年貢院又請進士試雜文並􅀧門入省經宿就試至晉開運元年又因禮部尚書知貢舉竇正固奏自前考試進士皆以三條燭爲限并諸色舉人有懷藏書􅁽不令就試未知於何時復有更革白樂天集中奏狀云進士許用書􅁽兼得通宵但不明言入試朝暮也納紬絹尺度周顯德三年勑舊制織造絁紬絹布綾羅錦綺紗縠等幅闊二尺起來年後並須及二尺五分宜令諸道州府來年所納官絹毎匹須及一十二兩其絁紬只要夾宻停勻不定斤兩其納官紬絹依舊長四十二尺乃知今之稅絹尺度長短闊狹斤兩輕重頗本於此朱梁輕賦朱梁之惡最爲歐陽公五代史記所斥詈然輕賦一事舊史取之而新書不爲拈出其語云梁祖之開國也屬黄巢大亂之餘以夷門一鎭外嚴烽候内辟汙萊厲以耕桑薄其租賦士雖苦戰民則樂輸二紀之閒俄成霸業及末帝與莊宗對壘于河上河南之民雖困於輦運亦未至流亡其義無他蓋賦歛輕而丘園可戀故也及莊宗平定梁室任吏人孔謙爲租庸使峻法以剥下厚歛以奉上民産雖竭軍食尚􅃜加之以兵革因之以饑饉不四三年以致顚隕其義無他蓋賦役重而寰區失望故也予以事考之此論誠然有國有家者之􅀛鑑也資治通鑑亦不載此一節坎離隂陽坎位正北當幽隂肅殺之地其象於易爲水爲月董仲舒所謂隂常居大冬而積於空虚不用之處然而謂之陽離位正南當文明赫赫之地於易爲日爲火仲舒所謂陽常居大夏而以生育長養爲事然而謂之隂豈非以隂生於午陽生於子故邪司馬正云天是陽而南是陽位故木亦是陽所以木正爲南正也火是地正亦稱北正者火數二二地數地隂主北方故火正亦稱北正究其極摯頗似難曉聖人無所云古先名儒以至于今亦未有論之者前執政爲尚書祖宗朝曽爲執政其後入朝爲它官者甚多自元豐改官制後但爲尚書曽孝寛自簽書樞密去位復拜吏部尚書韓忠彦自知樞密院出藩以吏書召李清臣蒲宗孟王存皆嘗爲左丞而清臣存復拜吏書宗孟兵書先是元祐六年清臣除目下爲給事中范祖禹封還朝廷未決繼又進擬宗孟兵部右丞蘇轍言不如且止左僕射吕大防於簾前奏諸部乆闕尚書見在人皆資淺未可用又不可關官須至用前執政轍曰尚書闕官已數年何嘗闕事遂巳胡宗愈嘗爲右丞召拜禮書吏書自崇寜巳來乃不復然河伯娶婦史記禇先生所書魏文侯時西門豹爲鄴令問民所疾苦長老曰吾爲河伯娶婦以故貧豹問其故對曰鄴三老廷􅁺常歳賦歛百姓錢得數百萬用其二三十萬爲河伯娶婦與祝巫分其餘錢持歸巫行視小家女好者即聘取爲治齋宫河上粉飾女浮之河中而没其人家有好女者多持女逺逃亡以故城中益空無人豹曰至娶婦時吾亦往送遂投大巫嫗及三弟子并三老於河乃罷去從是以後不敢復言爲河伯娶婦予案此事蓋出於一時雜傳記疑未必有實而六國表秦獻公八年初以君甥妻河言􅀄者自此年而始不知止於何時注家無􅀃司馬正史記索隱乃云初以君主妻河謂􅀄以此年取他女爲君主君主猶公主也妻河謂嫁之河伯故魏俗猶爲河伯娶婦蓋其遺風然則此事秦魏皆有之矣六經用字六經之道同歸旨意未嘗不一而用字則有不同者如佑祐右三字一也而在書爲佑在易爲祐在詩爲右惟維唯一也而在書爲惟在詩爲維在易爲唯左傳亦然又如易之无字周禮之灋眡薧鱻齍辠􅘋㮚斞閷簭等字他經皆不然今人書无咎无妄多作無失之矣孝宗􅀄登極以濳邸爲佑聖觀令玉􅁽官􅂐牌奏云􅂐法佑字無立人只單作右字道士力爭以爲觀名去人恐不可安跡有旨特増之鄂州興唐寺鍾鄂州城北鳯凰山之隂有佛刹曰興唐寺其小閣有鍾題誌云大唐天祐二年三月十五日新鑄勒官階姓名者兩人一曰金紫光禄大檢校尚書左僕射兼御史大陳知新一曰銀青光禄大檢校尚書右僕射兼御史大楊琮大字之下皆當有夫字而悉削去觀者莫能曉五代新舊史九國志並無其􅀃唯劉道原十國紀年載楊行密之父名怤怤與夫同音是時行密據淮南方破杜洪於鄂而有其地故將佐爲諱之行密之子渭建國之後改文散諸大夫爲大卿御史大夫爲御史大憲更可證也鄱陽浮洲寺有吳武義二年銅鍾安國寺有順義三年鍾皆刺史吕師造題官稱曰光禄大卿檢校太保兼御史大卿然則亦非大憲也王得臣麈史嘗辨此事而云行密遣劉存破鄂州知新琮不預志傳皆略而不書予又案楊溥時劉存以鄂岳觀察使爲都招討使知新以岳州刺史爲團練使同將兵擊楚爲所執殺則知新乃存偏裨非不預也禰衡輕曹操孔融薦禰衡以爲淑質正亮英才卓礫志懷霜雪疾惡􅀂讎任座史魚殆無以過􅀂衡等輩不可多得數稱述於曹操操欲見之衡素相輕疾不肯往而數有恣言操懷忿因召之擊皷祼身辱之融爲見操􅀃其狂疾求得自謝操喜勑門者有客便通待之極晏衡乃坐於營門言語悖逆操怒送與劉表衡爲融所薦東坡謂融視操特􅀑蜮之雄其􅀔決不兩立非融誅操則操害融而衡平生佳善融及楊脩常稱曰大兒孔文舉小兒楊德祖融脩皆死於操手衡無由得全漢史言其尚氣剛傲矯時慢物此蓋不知其鄙賤曹操故䧟身危機所謂語言狂悖者必誦斥其有􅆫􅆲之志耳劉表復不能容以與黄祖觀其所著鸚鵝賦專以自况一篇之中三致意焉如云嬉游高峻栖峙幽深飛不妄集翔必擇林雖周旋於羽毛固殊智而異心配鸞皇而等美焉比翼於衆禽又云彼賢哲之逢患猶棲遲以羈旅矧禽鳥之微物能馴擾以安處又云嗟禄命之衰薄奚遭時以嶮􅇖豈言語以階亂將不密以致危又云顧六翮之殘毀雖􅁬迅其焉如心懷歸而弗果徒怨毒於一隅卒章云苟竭心於所事敢背惠以忘初期守死以報德甘盡辤以効愚予毎三復其文而悲傷之李太白詩云魏帝營八極蟻觀一禰衡黄祖斗筲人殺之受惡名吳江賦鸚鵡落筆超羣英鏘鏘振金石句句欲飛鳴摯鶚啄􅀌鳯千春傷我情此論最爲精當也禁中文書韓魏公爲相宻與仁宗議定立嗣公曰事􅀂行不可中止陛下斷自不疑乞内中批出帝意不欲宫人知曰只中書行足矣淳熈十四年十月二十二日壽皇聖帝自德壽持喪還宫二十五日有㫖召對與吏部尚書蕭燧同引中使先諭旨曰教内翰留身旣對乃旋於東華門内先廊下夾一素幄御榻後出一紙録唐正觀中太子承乾監國事以相示蕭先退上與言欲令皇太子參決萬幾使條具合行事宜仍戒云進入文字須是密奏言當親自書寫實封詣通進司上曰也只翦開不如分付近上一箇内臣又言臣無由可與内臣相聞知惟御藥是學士院承受文字㝷常只是公家文書傳逹今則不可欲俟檢索典故了日却再乞對靣納上曰極好於是七日閒三得從容乃知禁廷機事深畏漏泄如此老子之言老子之言大抵以無爲無名爲本至於絶聖棄智然所云將欲歙之必固張之將欲弱之必固強之將欲廢之必固興之將欲奪之必固與之乃似於用機械而有心者微言淵奥固莫探其旨也孔叢子前漢枚乘與呉王濞書曰夫以一縷之任係千鈞之重上縣無極之高下垂不測之淵雖甚愚之人猶知哀其將絶也馬方駭鼓而驚之係方絶又重鎭之係絶於天不可復結隊入深淵難以復出孔叢子嘉言篇載子貢之言曰夫以一縷之任繫千鈞之重上縣之於無極之高下垂之於不測之深旁人皆哀其絶而造之者不知其危馬方駭鼓而驚之係方絶重而鎭之繫絶於高墜入於深其危必矣枚叔全用此語漢書注諸家皆不引證唯李善注文選有之予案孔叢子一書漢蓺文志不載蓋劉向父子所未見但於儒家有太常蓼侯孔臧十篇今此書之末有連叢子上下二卷云孔臧著書十篇疑即是巳然所謂叢子者本陳渉博士孔鮒子魚所論集凡二十一篇爲六卷唐以前不爲人所稱至嘉祐四年宋咸始爲注釋以進遂傳於世今讀其文畧無楚漢閒氣骨豈非齊梁以來好事者所作乎孔子家語著録於漢志二十七卷顔師古云非今所有家語也小星詩詩序不知何人所作或是或非前人論之多矣唯小星一篇顯爲可議大序云惠及下也而繼之曰夫人惠及賤妾進御於君故毛鄭從而爲之辭而鄭箋爲甚其釋肅肅宵征抱衾與禂兩句謂諸妾肅肅然而行或早或夜在於君所以次序進御又云裯者牀帳也謂諸妾夜行枹被與牀帳待進御且諸侯有一國其宫中嬪妾雖云至下固非閭閻賤微之比何至於抱衾而行况於牀帳􅀔非一巳之力所能致者其􅀃可謂陋矣此詩本是詠使者逺適夙夜征行不敢慢君命之意與殷其靁之指同桃源行陶淵明作桃源記云源中人自言先世避秦時亂率妻子邑人來此絶境不復出焉乃不知有漢無論魏晉系之以詩曰嬴氏亂天紀賢者避其世黄綺之啇山伊人亦云逰願言躡輕風高舉㝷吾契自是之後詩人多賦桃源行不過稱贊仙家之樂唯韓公云神仙有無何渺茫桃源之􅀃誠荒唐世俗那知僞爲眞至今傳者武陵人亦不及淵明所以作記之意按宋書本傳云濳自以曽祖晉世宰輔恥復屈身後代自宋髙祖王業漸隆不復肯仕所著文章皆題其年月義熈以前則書晉氏年號自永􅀄以來唯云甲子而巳故五臣注文選用其語又繼之云意者恥事二姓故以異之此􅀃雖經前軰所記然予切意桃源之事以避秦爲言至云無論魏晉乃寓意於劉裕託之於秦借以爲喻耳近時胡宏仁仲一詩屈折有竒味大略云靖節先生絶世人柰何記僞不考眞先生高歩窘未代雅志不肯爲秦民故作斯文冩幽意要似寰海離風塵其􅀃得之矣司封贈典之失前所書司封失典故偶復憶一事尤爲可笑紹興二十八年郊祀赦恩資政殿學士樓炤父巳贈少師乞加贈司封以資政殿學士係只封贈一代父旣至少師不合加贈獨改封其母范氏歐陽氏爲秦國魏國夫人蓋樓公雖嘗爲執政而見居宫職須大學士乃恩及二代故但用侍從常格資政殿學士施鉅父仲􅀃已贈太子太保加爲宫􅀓亦不及祖也乾道六年仲兄以端明殿學士知太平州是年郊赦伯兄巳贈祖爲太保而轉運司移牒太平州云準吏部牒取㑹本路曽任執政官合封贈二代者仲兄旣具以報又再行下時祖母及父母巳至極品於是以祖爲言遂復贈太傅命詞給告殊非端殿所當得不知省部一時何所據也辰巳之已律書釋十母十二子之義大略與今所言同唯至四月云其於十二子爲巳巳者言陽氣之巳盡也據此則辰巳之巳乃爲矣音其它引二十八宿謂柳爲注畢爲濁昴爲留亦見於毛詩注及左氏傳如詩謂營室爲定星也容齋三筆卷第十終
