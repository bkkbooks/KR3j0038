body:
  text: 容齋四筆卷第六十五則韓文公逸詩唐五竇聮珠集載竇牟爲東都判官陪韓院長韋河南同㝷劉師不遇分韻賦詩都官貟外郎韓愈得㝷字其語云秦客何年駐仙源此地深還隨躡鳬􅀐來訪馭雲􅁭院閉青霞入松高老鶴㝷猶疑隱形坐敢起竊桃心今諸本韓集皆不載近者莆田方崧􅀸考證訪頥甚至猶取聮珠中竇庠酬退之登岳陽樓一大篇顧獨遺此何也竇叔向詩不存竇氏聮珠序云五竇之父叔向當代宗朝善五言詩名冠流輩時屬正懿皇后山陵上注意哀挽即時進三章内考首出傳諸人口有命婦羞蘋葉都人挿柰花禁兵環素帟宫女哭寒雲之句可謂佳唱而略無一首存於今荆公百家詩選亦無之是可惜也予嘗得故呉良嗣家所抄唐詩僅有叔向六篇皆竒作念其不傳於丗今悉録之夏夜宿表兄話舊云夜合花開香滿庭夜深微􅀨醉􅀄醒遠書珍重何時逹舊事淒涼不可聽去日兒童皆長大昔年親友半凋零明朝又是孤舟别愁見河橋酒幔青秋砧送包大夫云斷續長門夜清冷逆旅秋征夫應待信寒女不勝愁帶月飛城上因風散陌頭離居偏入聽况復送歸舟春日早朝應制云紫殿俯千官春松應合歡御爐香熖暖馳道玉聲寒乳燕翻珠綴祥烏集露盤宫花一萬樹不敢舉頭看過檐石湖云暁發魚門伐晴看檐石湖日銜高浪岀天入四空無只尺分洲鳬纎毫指舳艫渺然從此去誰念客帆孤正懿挽歌二首云二陵恭婦道六寢盛皇情禮遜生前貴恩追殁後榮㓜王親捧土愛女復連塋東望長如在誰云向玉京後庭攀畫柳上陌咽清笳命婦羞蘋葉都人挿柰花壽宫星月異仙路往來賖縱有迎神術終悲隔絳紗第三篇亡叔向字遺直仕至左拾遺出爲溧水令唐書亦稱其以詩自名云用柰花事竇叔向所用柰花事出晉史云成帝時三吳女子相與簮白花望之如素柰傳言天公織女死爲之著服巳而杜皇后崩其言遂驗紹興五年寧德皇后訃音從北庭來知徽州唐煇使休寧尉陳之茂撰䟽文有語云十年罹難終弗返於蒼梧萬國銜􅁈徒盡􅆪於白柰是時正從徽宗􅀩塵其對偶精確如此王廖兒良賈誼過秦論曰六國之士呉起孫臏帶他兒良王廖田忌廉頗趙奢之朋制其兵漢書注家皆無所釋顔師古但音兒爲五奚又廖爲聊而巳此八人者帶他兒良王廖不知其何國人獨吕氏春秋云老耽貴柔孔子貴仁墨翟貴廉關尹貴清子列子貴虚陳駢貴齊陽朱貴已孫臏貴􅀔王廖貴先兒良貴後而注云王廖謀兵事貴先建茅也兒良作兵謀貴後雖僅見二人之名然亦莫能詳也廖良列於孔老之末而漢四種兵書有良權謀一篇又賈誼首稱寗􅚼杜赫爲之謀漢書亦不注吕氏云孔墨􅇞越皆布衣之士也越中牟人也周威公師之又稱杜赫以安天下說周昭文君則越赫善謀可以槩見漫書之以補漢注之缺徙木僨表啇鞅變秦法恐民不信乃募民徙三丈之木而予五十金有一人徙之輙予金乃下令呉起治西河欲諭其信於民夜置表於南門之外令於邑中曰有人能僨表者仕之長大夫民相謂曰此必不信有一人曰試往僨表不得賞而巳何傷往僨表來謁呉起起仕之長大夫自是之後民信起之賞罰予謂鞅本魏人其徙木示信蓋以効起而起之事不傳建武中元續書隨筆所書建武中元一則文惠公作􅀠釋於蜀郡守何君閣道碑一篇中以爲不然比得蜀士袁夣麒應祥漢制叢録亦以紀志傳不同爲惑而云近歳稚州榮經縣治之西有得蜀郡治道記於崖壁閒者記末云建武中元二年六月就於是千載之疑渙然冰釋予觀何君閣道正建武中元二年六月就袁君所言榮經崖壁之記蓋是此耳但以出於近歳恨不得質之文惠爲之惻然草駒聾蟲今人謂野收馬爲草馬淮南子脩務訓曰馬之爲草駒之時跳躍􅀭蹏翹尾而走人不能制注云馬五尺已下爲駒放在草中故曰草駒蓋今之所稱者是也下文曰形之於馬馬不可化其可駕御教之所爲也馬聾蟲也而可以通氣志猶待教而成又况人乎注云蟲喻無知也聾蟲之名甚竒記李履中二事崇寧中蔡京當國欲洗邢恕誣謗宗廟之罪旣􅋞拭用之又欲令立􅁁功以進身於是以爲涇原經略使遂謀用車戰法及造舟五百艘將直抵興靈以空夏國詔以付熈河漕臣李復復長安人乆居兵閒習熟戎事力上䟽詆切之予頃書之於國史恕列傳中比得上饒所刋潏水集正復所爲文得此兩奏歎其能以區區外官而排斥上相之客如此恨史傳爲不詳盡乃録于此其乞罷造戰車䟽云奉聖旨令本司製造戰車三百兩臣嘗覧載籍古者師行固嘗用車蓋兵不妄動征戰有禮不爲詭遇多在平原易野故車可以行今盡之極邊戎狄乘􅀔而來雖鷙鳥飛翥不如是之迅捷下寨駐軍各以保險爲利其徃也車不及期居而保險車不能登歸則虜多襲逐爭先奔趍不暇回顧車安能收非􅀂古昔於中國爲用臣聞此議出於許彦圭彦圭因姚麟而獻說朝廷遂然之不知彦圭劇爲輕妄唐之房琯嘗用車戰大敗於陳濤斜十萬義軍無有脫者畿邑平地且如此况今欲用於峻阪溝谷之閒乎又戰車比常車闊六七寸運不合轍牽拽不行昨來兵夫典賣衣物自賃牛具終日方進五七里遂致兵夫逃亡棄車於道大爲諸路之患今乞便行罷造如别路已有造者乞更不牽拽前來其乞罷造舡奏云邢恕乞打造舡五百􅃗於黄河順流放下至㑹州西小河内藏放有旨專委臣􅁥督限一年了當契勘本路只有舡匠一人須乞於荆江淮浙和雇又丁線物料亦非本路所出觀恕奏請實是兒戯且造舡五百􅃗􅀂目今工料並備亦須數年自蘭州駕放至㑹州約三百里北岸是敵境豈可容易㑹州之西小河鹹水其闊不及一丈深止於一二尺豈能藏船黄河過㑹州入韋精山石峽險窄自上垂流直下高數十尺船豈可過至西安州之東大河分爲六七道水淺灘磧不勝舟載一船所載不過五馬二十人雖到興州又何能爲又不知幾月得至此聲􅀂出必爲夏國侮笑臣未敢便依㫖揮擘畫恐虚費錢物終誤大事䟽旣上徽宗察其言忠遂罷二役復字履中爲關内名儒官至中大夫集英殿􅁱撰李昭玘嘗贈詩云結交頼有紫􅐖翁鶴骨嶄嶄爛脩目五言長城屹千丈萬卷書樓聊一讀可知其人矣乾寜覆試進士唐昭宗乾寧二年試進士刑部尚書崔凝下二十五人放牓後宣詔翰林學士陸扆祕書監馮渥入内各贈衣一副及氊􅀍於武德殿前覆試但放十五人自狀頭張貽範以下重落其六人許再入舉場四人所試最下不許再入蘇楷其一也故挾此憾至於駮昭宗聖文之謚崔凝坐貶合州刺史是時國祚如贅斿悍鎭強藩請隧問鼎之不暇顧卷卷􅀂此其再試也詩賦各兩篇内良弓獻問賦以太宗問工人木心不正脉理皆邪􅀂何道理十七字皆取五聲字依輪次以􅀟周隔句爲韻限三百二十字成貽範等六人訖唐末不復綴牓蓋是時不糊名一黜之後主司不敢再收拾也有黄滔者是年及第閩人也九世孫沃爲吉州永豐宰刋其遺文􅀄試覆試凡三賦皆在焉曲直不相入賦以題中曲直兩字爲韻釋云邪正殊途各有好惡終篇只押兩韻良弓獻問賦取五聲字次第用各隨聲爲賦格於是第一韻尾句云資國祥之崇崇上平聲也第二韻垂寳􅍈於緜緜下平聲也第三韻曽非唯唯上聲也第四韻露其言而粲粲去聲也而闕入聲一韻賦韻如是前所未有國將亡必多制亦云可􅀏矣信州永豐人王正白時再試中選郡守爲改所居坊名曰進賢且减戸稅亦後來所無臨海蠏圖文登吕亢多識草木蟲魚守官台州臨海命工作蠏圖凡十有二種一曰蝤蛑乃蠏之巨者兩螯大而有細毛如苔八足亦皆有微毛二曰撥棹子狀如蝤蛑螯足無毛後兩小足薄而微闊􅀋人之所食者然亦頗異其大如升南人皆呼爲蠏八月閒盛出人採之與人􅃲其螯甚巨往往能害人三曰擁劒狀如蠏而色黄其一螯偏長三寸餘有光四曰彭螖螯微毛足無毛以鹽藏而貨於市爾雅曰彭蠌小者蟧云小蠏也蠌音澤蟧音勞吳人呼爲彭越搜神記言此物嘗通人夢自稱長卿今臨海人多以長卿呼之五曰竭朴大於彭螖殻黒斑有文章螯正赤常以大螯障目小螯取食六曰沙狗似彭螖壤沙爲穴見人則走屈折易道不可得七曰望潮殻白色居則背坎外向潮欲來皆出坎舉螯如望不失常期八曰􅀝望亦大如彭螖居常東西顧睨行不四五又舉兩螯以足起望惟入穴乃止九曰石蜠大於常蟹八足殻通赤狀􅀂鵝卵十曰蜂江如蟹兩螯足極小堅如石不可食十一曰蘆虎似彭蜞正赤不可食十二曰彭蜞大於螖小於常蟹吕君云此皆常所見者北人罕見故繪以爲圖又海啇言海中􅔢鼊島之東一島多蟹種􅀋甚異有虎頭者有翅能飛者有能捕魚者有殻大兼尺者以非親見故不畫李履中得其一本爲作記予家楚宦游二浙閩廣所識蟹屬多矣亦不悉與前說同而所謂黄甲白蟹蟳蠘諸種吕圖不載豈名謂或殊乎故紀其詳以示博雅者東坡作碑銘東坡祭張文定文云軾於天下未嘗銘墓獨銘五人皆盛德故以文集考之凡七篇􅀂富韓公司馬温公趙清獻公范蜀公并張公坡所自作此外趙康靖􅅬元發二誌乃代張公者故不列於五人之數眉州小集有元祐中奏稾云臣近準勑差撰故固知樞密院事趙瞻神道碑并書者臣平生本不爲人撰行狀埋銘墓碑士大夫所共知只因近日撰司馬光行狀蓋爲光曾爲臣亡母程氏撰埋銘又爲范鎭撰墓誌蓋爲鎭與先臣某平生交契至深不可不撰及奉詔撰司馬光冨弼等墓碑不可固辤然終非本志况臣老病廢學文詞鄙陋不稱人子所欲顯􅀭其親之意伏望聖慈别擇能者特許辤免觀此一奏可印公心而杭本奏議十五卷中不載洗兒金錢車駕都錢塘以來皇子在邸生男及女則戚里三衙浙漕京尹皆有餉獻隨即致荅自金幣之外洗児錢果動以十數合極其珍巧􅀂揔而言之殆不可勝算莫知其事例之所起劉原甫在嘉祐中因論無故踈決云在外羣情皆云聖意以皇女生故施此慶恐非王者之令典也又聞多作金銀犀象玉石琥珀玳􅈘擅香等錢及鑄金銀爲花果賜予臣下自宰相臺諌皆受此賜無益之費無名之賞殆無甚於此􅀂欲夸示奢麗爲世俗之觀則可矣非所以􅁤物訓儉也宰相臺諌以道德輔主柰何空受此賜曽無一言遂事不諌臣願深執恭儉以荅上天之貺不宜行姑息之恩以損政體偉哉劉公之論其勁切如此歐陽公銘墓畧而不書予爲國史亦不知載於本傳比方讀其奏章故敬紀之韓偓金鑾密記云天復二年大駕在岐皇女生三日賜洗兒果子金銀錢銀葉坐子金銀鋌子予謂唐昭宗於是時尚復講此而在庭無一言蓋宫掖相承欲罷不能也告命失故事祖宗時知制誥六貟故朝廷除授雖京官磨勘選人改秩奏薦門客恩科助教率皆命詞然有官列巳崇而有司不舉者多出時相之意劉原甫掌外制以任顓落職不降誥詞曽奏陳以爲非故事得旨即施行之巳而劉元瑜王琪降宫直以勑牒劉又言非朝廷賞罰訓誥毖重之意今觀劉集有太平州文學袁嗣立改江州文學制云昔先王簡不帥教而不變者屏之裔土終身不齒􅀂爾之行豈足顧哉然猶假以仕板徙之善郡不貲之恩也勉思自新無重其咎未幾嗣立又徙洪州制云爾頃冒憲典遷之㝷陽復以親嫌於法當避天薄志節寡廉耻者固不可使處有嫌之地益徙豫章思自湔滌嗣立之事微矣乃費兩誥讀此命書可知其人漫書之以發一笑扁字二義扁音薄典切唐韻二義其一曰扁署門戸其一曰姓也此外無它說案鶡冠子云五家爲伍十伍爲里四里爲扁扁爲之長十扁爲鄕其上爲縣爲郡其不奉上令者以告扁長蓋如遂黨都保之稱諸書皆不載娑羅樹世俗多指言月中桂爲娑羅樹不知所起案酉陽雜爼云巴陵有寺僧房宋下忽生一木隨伐而長外國僧見曰此娑羅也元嘉中出花如蓮唐天寳初安西進娑羅枝狀言臣所管四鎭㧞汗郍國有娑羅樹特爲竒絶不芘凡草不止惡禽近采得樹枝二百莖以進予比得楚州淮隂縣唐開元十一年海州刺史李邕所作娑羅樹碑云非中夏物土所宜有者婆娑十畒蔚暎千人惡禽翔而不集好鳥止而不巢深識者雖徘徊仰止而莫知􅄀植􅀶物者雖沈吟稱引而莫辯嘉名隨所方靣頗證靈應東瘁則青郊苦而歳不稔西茂則白藏泰而秋有成嘗有三藏義浄還自西域齋戒瞻嘆於是邑宰張松質請邕述文建碑觀邕所言惡禽不集正與上說同又有松質一書荅邕云此土玉像爰及石􅀛一離淮隂百有餘載前後抗表尚不能稱頼公威德備聞所以還歸故里謹遣僧三人父老七人賁狀拜謝宣和中向子諲過淮隂見此樹今有二本方廣丈餘蓋非故物蔣潁叔云玉像石􅀛不知今安在然則娑羅之異世間無别種也吳興芮燁國器有從沈文伯乞娑羅樹碑古風一首云楚州淮隂娑羅樹霜露榮悴今何如能令草木死不朽當時爲有北海書荒碑􅀨侵澁苔蘚尚想墨本傳東吳正賦此也歐陽公有定力院七葉木詩云伊洛多佳木娑羅舊得名常於佛家見宜在月宫生釦砌隂鋪靜虚堂子落聲亦此樹耳所謂七葉者未詳容齋四筆卷第六終
