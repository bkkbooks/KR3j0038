body:
  text: 霍光賞功漢武帝外事四夷出爵勸賞凡將士有軍功無問貴賤未有不封侯者及昭帝時大鴻臚田廣明平益州夷斬首捕虜三萬但賜爵關内侯盖霍光爲政務與民休息故不欲求邊功益州之師不得巳耳與唐宋璟抑郝靈佺斬黙啜之意同然數年之後以范明友擊烏桓傅介子刺樓蘭皆即侯之則爲非是盖明友光女婿也尺棰取半莊子載惠子之語曰一尺之棰日取其半萬世不竭雖爲寓言然此理固具盖但取其半正碎爲微塵餘半猶存雖至於無窮可也特所謂􅆑有毛雞三足大可以爲羊馬有夘火不􅀬􅀛長於蛇飛鳥之景未嘗動如是之􅀋非詞說所能了也漢文失材漢文帝見李廣曰惜廣不逢時令當髙祖世萬戸侯豈足道哉賈山上書言治亂之道借秦爲諭其言忠正明白不下賈􅁩曽不得一官史臣猶賛美文帝以爲山言多激切終不加罰所以廣諫争之路觀此二事失材多矣吴楚反時李廣以都尉戰昌邑下顯名以梁王授廣將軍印故賞不行武帝時五爲將軍擊匈奴無尺寸功至不得其死三朝不遇命也夫陳軫之􅀃踈戰國權謀之士㳺􅀃從橫皆趨一時之利殊不顧義理曲直所在張儀欺楚懷王使之絶齊而獻商於之地陳軫諌曰張儀必􅀒王商於不可得而齊秦合是北絶齊交西生秦患其言可謂善矣然至云不若隂合而陽絶於齊使人隨張儀苟與吾地絶齊未晚是軫不深計齊之可絶與否但以得地爲意耳及秦􅀒約楚王欲攻之軫又勸曰不如因賂之以一名都與之并兵而攻齊是我亡地於秦取償於齊也此䇿尤乖謬不義且秦加亡道於我乃欲賂以地齊本與國楚無故而絶之冝割地致幣卑詞謝罪復求其授而反欲攻之軫之􅀃於是踈矣乃知魯仲連虞卿爲豪傑之士非軫軰所能企及也顔率兒童之見秦興師臨周而求九鼎周君患之顔率請借救於齊乃詣齊王許以鼎齊爲發兵救周而秦兵罷齊將求鼎周君又患之顔率復詣齊曰願獻九鼎不識何塗之從而致之齊齊王將􅀉徑於梁於楚率皆以爲不可齊乃止戰國䇿首載此事盖以爲竒謀予謂此特兒童之見爾争戰雖急要當有信今一紿齊可也獨不計後日諸侯來伐誰復肯救我乎疑必無是事好事者飾之爾故史託通監皆不取皇甫湜正閏論晉魏以來正閏之􅀃紛紛前人論之多矣盖以宋繼晉則至陳而無所終由隋而推之爲周爲魏則上無所起故司馬公於通監取南朝承晉訖于陳亡然後係之隋開皇九年姑藉其年以紀事無所抑揚也唯皇甫湜之論不然曰晉之南遷與平王避戎之事同而元魏種實匈奴自爲中國之位號謂之滅邪晉實未改謂之禪耶巳無所傳而往之著書者有帝元今之爲録者皆閏晉失之逺矣晉爲宋宋爲齊齊爲梁江陵之滅則爲周矣陳氏自樹而奪無容於言故自唐推而上唐受之隋隋得之周周取之梁推梁而上以至于堯舜爲得天下統則陳僣於南元閏於北其不昭昭乎此􅀃亦有理然予復考之滅梁江陵者魏文帝也時歲在甲戍又三年丁丑周乃代魏不得云江陵之滅則爲周也簡師之賢皇甫持正集有送簡師序云韓侍郎貶潮州浮圖之士懽快以抃師獨憤起訪余求序行資適潮不顧蛇山鱷水萬里之嶮毒若將朝得進拜而夕死者師雖佛其名而儒其行雖夷狄其衣服而人其知不猶愈於冠儒冠服朝服惑溺於經怪之􅀃以斁彞倫邪予讀其文想見簡師之賢而惜其名無傳於後世故表而出之老人推恩唐世赦宥推恩於老人絶優開元二十三年耕籍田侍老百歳以上版授上州刺史九十以上中州刺史八十以上上州司馬二十七年赦百歳以上下州刺史婦人郡君九十以上上州司馮婦人縣君八十以上縣令婦人郷君天寳七載京城七十以上本縣令六十以上縣丞天下侍老除官與開元等國朝之制百􅀊者始得初品官封比唐不侔矣淳熈三年以太上皇帝慶壽之故推恩稍優遂有增年詭籍以冒榮命者使如唐日將如何哉唐三傑漢髙祖以蕭何張良韓信爲人傑此三人者真足以當之也唐明皇同日拜宋璟張􅀃源乾曜三故相官帝賦三傑詩自冩以賜其意盖以比蕭張等也說與乾曜豈璟比哉明皇可謂不知臣矣忠義出天資忠義守節之士出於天資非關居位貴賤受恩深淺也王莽移漢祚劉歆以宗室之儁導之爲逆孔光以宰相輔成其事而龔勝以故大夫守􅁩以死郭欽蔣詡以刺史郡守栗融禽慶曹竟􅂫章以儒生皆去官不仕陳咸之家至不用王氏臘蕭道成􅆲宋禇淵王儉奕世逹宦身爲帝甥主壻所以縱􅁷滅劉唯恐不速而死節者乃王藴􅁲伯興黃回任􅀱伯之軰耳安禄山朱泚之變陳希烈張均張垍喬琳李忠臣皆以宰相丗臣爲之丞弼而甄濟權臯劉海賔叚秀實或以莫府小吏或以廢斥列卿􅂢身立節名震海内人之賢不肖相去何止天冠地屨乎劉歆不孝事親孝故忠可移於君是以求忠臣必於孝子之門劉歆事父雖不載不孝之迹然其議論每與向異同故向拳拳於國家欲抑王氏以崇劉氏而歆乃力贊王莽唱其凶逆至爲之國師公又改名秀以應圖䜟竟亦不免爲莽所誅子棻女愔皆以戮死使天道毎如是不善者其知懼乎漢法惡誕謾李廣以私忿殺霸陵尉上書自陳謝罪武帝報之曰報忿除害朕之所圖於將軍也若乃免冠徒跣稽顙請罪豈朕之指哉張敞殺絮舜上書曰臣待罪京兆絮舜本臣素所厚吏以臣有章劾當免受記考事謂臣五日京兆背恩忘義臣竊以舜無狀枉法以誅之臣賊殺不辜鞠獄故不直死無所恨宣帝引拜爲刺史漢丗法令最惡誕謾罔上廣敞雖妄殺人一語陳情則赦之不問所以開臣下不敢爲欺之路也武帝待張湯非不厚及問魯謁居事謂其懷詐面欺殺之不貸真得御臣之法漢官名漢官名有不書於百官表而因事乃見者如行􅁈獄使者因張敞殺絮舜而見美俗使者因何並代嚴詡而見河隄使者因王延丗塞决河而見直指使者因暴勝之而見豈非因事置官事巳即罷乎五胡亂華劉聦乗晉之衰盜竊中土身死而嗣滅男女無少長皆􅆷於靳凖劉曜承其後不能十年身爲人禽石勒甞盛矣子奪於虎虎盡有秦魏燕齊韓趙之地死不一年而後嗣屠戮無一遺種慕容儁乗石氏之亂跨據河山亦僅終其身至子而滅符堅之興又非劉石比然不能自免社稷爲墟慕容垂乘符氏之亂盡復燕祚死未期年基業傾覆此七人者皆夷狄亂華之巨擘也而不能乆如此今之北虜爲國八十年傳數酋矣未亡何邪石宣爲彗石虎將殺其子宣佛圖澄諌曰陛下若加慈恕福祚猶長若必誅之宣當爲彗星下埽鄴宫虎不從眀年虎死二年國亡晉史書之以爲澄言之驗予謂此乃石氏窮凶極虐爲天所弃豈一逆子便能上干􅀇象起彗孛乎宣殺其弟韜又欲行冒頓之事寜有不問之理澄言旣妄史氏誤信而載之資治通鑑亦失於不刪也三公改它官國􅀄以來宰相帶三公官居位及罷去多有改它官者范質自司徒侍中改太子太傅王溥自司空改太子太保吕􅀩正自司空改太子太師是也天禧以前唯趙普王旦乃依舊公師仍復遷秩天聖而後恩典始􅂭張士遜致仕至以兵部尚書得太傅云帶職致仕熙寜以前待制學士致仕者率遷官而解其職若有疾就閑者亦換爲集賢院學士盖不以近職處散地也帶職致仕方自熙寜中王素始後改集賢學士爲修撰政和中又改爲右文云朋友之義朋友之義甚重天下之達道五君臣父子兄弟夫婦而至朋友之交故天子至于庶人未有不湏友以成者天下俗薄而朋友道絶見於詩不信乎朋友弗􅀗乎上見於中庸孟子朋友信之孔子之志也車馬衣裘與朋友共子路之志也與朋友交而信曽子之志也周禮六行五曰任謂信於友也漢唐以來猶有范張陳雷元白劉柳之徒始終相與不以死生貴賤易其心本朝百年間此風尙存嗚呼今亡矣髙科得人國朝自太平與國以來以科舉羅天下士士之策名前列者或不十年而至公輔吕文穆公䝉正張文定公齊賢之徒是也及嘉祐以前亦指日在清顯東坡送章子平序以謂仁宗一朝十有三牓數其上之三人凡三十有九其不至於公卿者五人而巳盖爲士者知其身必逹故自愛重而不肯爲非天下公望亦以鼎貴期之故相與愛惜成就以待其用至嘉祐四年之制前三名始不爲通判第一人才得評事簽判代還升通判又任滿始除館職王安石爲政又殺其法恩數既削得人亦衰矣觀天聖􅀄牓宋鄭公郊葉清臣鄭文肅公戩髙文莊公若訥曽魯公公亮五人連名二宰相二執政一三司使第二牓王文忠公堯臣韓魏公􅄾趙康靖公槩連名第二牓王宣徽拱辰劉相沆孫文懿公抃連名楊寘牓寘不幸即死王􅄮公珪韓康公絳王荆公安石連名劉煇牓煇不顯胡右丞宗愈安門下燾劉忠肅公摯章申公惇連名其盛如此治平以後第一人作侍從盖可數矣辛慶忌漢成帝將立趙飛燕爲皇后怒劉輔直諌囚之掖廷獄左將軍辛慶忌等上書救輔遂得減死朱雲請斬張禹上怒將殺之慶忌免冠解印綬叩頭殿下曰此臣素著狂直臣敢以死争叩頭流血上意解然後得巳慶忌此兩事可與汲黯王章同科班史不書於本傳但言其爲國虎臣匈奴西域敬其威信而巳方争朱雲時公卿在前曽無一人助之以請爲可羞也楚懷王秦漢之際楚懷王以牧羊小兒爲項氏所立首尾才三年以事攷之東坡所謂天下之賢主也項梁之死王并吕臣項羽軍自將之羽不敢争見宋義論兵事即以爲上將軍而羽乃爲次將擇諸將入關羽怨秦奮􅀔願與沛公西王以羽慓悍禍賊不許獨遣沛公羽不敢違及秦旣亡羽使人還報王王曰如約令沛公王關中此數者皆能自制命非碌碌孱王受令於強臣者故終不能全於項氏然遣將救趙滅秦至於有天下皆出其手太史公作史記當爲之立夲紀繼於秦後迨其亡則次以漢髙祖可也而乃立項羽本紀義帝之事特附見焉是直以羽爲代秦也其失多矣髙祖嘗下詔以秦皇帝楚隱王亡後爲置守冢并及魏齊趙三王而義帝乃髙祖故君獨鈌不問豈簡䇿脱佚乎范増非人傑丗謂范増爲人傑予以爲不然夷考平生盖出戰國從橫之餘見利而不知義者也始勸項氏立懷王及羽奪王之地遷王於郴巳而弑之増不能引君臣大􅁩争之以死懷王與諸將約先入關中者王之沛公旣先定關中則當如約増乃勸羽殺之又徙之蜀漢羽之伐趙殺上將宋義増爲末將坐而視之坑秦降卒殺秦降王燒秦宫室増皆親見之未嘗聞一言也至於榮陽之役身遭反間然後發怒而去嗚呼踈矣哉東坡公論此事偉甚猶未盡也翰􅁐故事翰􅁐故事今廢弃無餘唯學士入朝猶有朱衣院吏雙引至朝堂而止及景靈宫行香則引至立班處公文至三省不用申狀但尺紙直書其事右語云諮報尚書省伏􅀱裁旨月日押謂之諮報此兩事僅存唐楊州之盛唐丗鹽鐵轉運使在楊州盡斡利權判官多至數十人商賈如織故諺稱楊一益二謂天下之盛楊爲一而蜀次之也杜牧之有春風十里珠簾之句張祜詩云十里長街市井連月明橋上看神仙人生只合楊州死禪智山光好墓田王建詩云夜市千燈照碧雲髙樓紅袖客紛紛如今不似時平日猶自笙歌徹暁聞徐凝詩云天下三分明月夜二分無賴是楊州其盛可知矣自畢師鐸孫儒之亂蕩爲丘墟楊行密復葺之稍成壯藩又燬於顯德本朝承平百七十年尚不能及唐之什一今日眞可酸鼻也張祜詩唐開元天寳之盛見於傳記歌詩多矣而張祜所詠尤多皆它詩人所未甞及者如正月十五夜燈云千門開鎻萬燈明正月中旬動帝京三百内人連袖舞一時天上著詞聲上巳樂云猩猩血染繫頭標天上齊聲舉畫橈却是内人争意切六宫紅袖一時招春鶯囀云興慶池南柳未開太眞先把一枝梅内人巳唱春鶯囀花下傞傞軟舞來又有大酺樂邠王小管李謨笛寜哥來邠娘羯鼔退宮人耍娘歌悖拏兒舞阿䳰湯雨霖鈴香囊子等詩皆可補開天遺事弦之樂府也古人無忌諱古人無忌諱如季武子成寢杜氏之葬在西階之下請合葬焉許之入宫而不敢哭武子命之哭曽子與客立於門側其徒有父死將出哭於巷者曽子曰反哭於爾次北面而弔焉伯髙死於衞赴於孔子孔子曰夫由賜也見我吾哭諸賜氏遂哭於子貢寢門之外命子貢爲之主曰爲爾哭也來者拜之夫以國卿之寢階許外人入哭而葬巳所居室而令門弟子哭其親朋友之喪而受哭於寢門之外今人必不然者也聖賢所行固爲盡禮季孫􅀫亦能如是以古方今相去何直千萬也宰我不詐宰我以三年之喪爲乆夫子以食稻衣錦問之曰於女安乎曰安後人以是譏宰我謂孔門髙第乃如是殊不知其由􅂨之言不爲詐隱所以爲孔門髙第也魯悼公之喪孟敬子曰食粥天下之達禮也吾三臣者之不能居公室也四方莫不聞矣勉而爲瘠母乃使人疑夫不以情居瘠者乎哉我則食食樂正子春之母死五日而不食曰吾悔之自吾母而不得吾情吾惡乎用吾情謂勉强過禮也夫不情之惡賢者所深戒雖孟敬子之不臣寜廢禮食食不肯不情而爲瘠盖先王之澤未逺故不肖者亦能及之李益盧綸詩李益盧綸皆唐大曆十才子之傑者綸於益爲内兄甞秋夜同宿益贈綸詩曰丗故中年別餘生此㑹同却將悲與病獨對朗陵翁綸和曰戚戚一西東十年今始同可憐風雨夜相問兩衰翁二詩雖絶句讀之使人悽然皆竒作也容齋隨筆卷第九
