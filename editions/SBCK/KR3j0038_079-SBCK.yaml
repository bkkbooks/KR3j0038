body:
  text: 容齋四筆卷第十三二十四則科舉之弊不可革法禁益煩姦僞滋熾唯科􅂣最然其尤者莫如銓試代筆有禁也禁之愈急則代之者􅀗賂謝愈多其不幸而敗者百無一二正使得之元未嘗致法吏部長貳簾試之制非不善也而文具兒戯抑又甚焉議論奉公臣朝夕建明然此風如決流偃草未嘗少革或以謂失於任法而不任人之故殊不思所任之人渠肯一意向方見惡輙取於事無益而禍謗先集于厥身矣聞寳中太子賔客􅁁光範掌選太廟齋郎李宗訥赴吏部銓光範見其年少意未能屬辭語之曰茍援筆成六韻雖不試書判可入等矣宗訥曰非唯學詩亦嘗留心詞賦即試詩賦二首數刻而就甚嘉賞之翌日擬授祕書省正字今之世寧復有是哉宰執子弟廷試太宗朝吕文穆公蒙正之弟􅀩亨舉進士禮部高等薦名旣廷試與李文正公昉之子宗諤並以父兄在中書罷之國史許仲宣傳云仲宣子待問雍熈二年舉進士與李宗諤吕􅀩亨王扶並預廷試宗諤即宰相昉之子􅀩亨參知政事蒙正之弟扶鹽鐵使明之子上曰斯並􅀔家與孤寒競進縱以藝升人亦謂朕有私也皆下第正此事也仲宣時爲度支使仁宗朝韓忠憲公億爲參知政事子維以進士奏名禮部不肯試大廷受䕃入官唐質肅公介參政子義問鎻㕔試禮部用舉者召試祕閣介引嫌罷之舊制嚴於宰執子弟如此與夫秦益公柄國而子熺孫塤皆於省殿試輙冠多士者異矣國􅀄救弊國朝削併僭僞救民水火之中然亦有因仍舊弊未暇更張者故須賴於賢士大夫昌言之江左􅀄平太宗選張齊賢爲江南西路轉運使諭以民閒不便事令一一條奏先是諸州罪人多錮送闕下縁路非理而死者常十五六齊賢至蘄州見南劒州吏送罪人者索得州帖視之二人皆逢販私鹽者爲荷鹽籠得鹽二斤又六人皆嘗見販鹽而不告者並黥决傳送而五人巳死于路江州司理院自正月至二月經過􅀉禁罪人計三百二十四人建州民二人本田家客戸嘗於主家塘内以錐刺得魚一斤半並杖脊黥靣送闕下齊賢上言之俟至京擇官慮問如顯有􅀒屈者本州官吏量加懲罰自今只令發遣正身及䖍州送三囚嘗市得牛肉并家屬十二人悉詣闕而殺牛賊不􅀗齊賢憫之即遣其妻子還自是江南送罪人者減太半是皆相循習所致也一賢改爲其利民如此齊賢以太平興國二年方登斜六年爲使者八年還朝由宻學拜執政可謂迅用也房玄齡名字舊唐書目録書房元齡而本傳云房喬字玄齡新唐書列傳房玄齡字禹而宰相世系表玄齡字喬松三者不同趙明誠金石録得其神道碑禇遂良書名字與新史傳同予記先公自燕還有房碑一􅁽于志寧撰乃玄齡字禹松本欽宗在東宫時所藏其後猶有一印曰伯志西齋今亦不存矣二朱詩詞朱載上舒州桐城人爲黄州教授有詩云官閑無一事胡蝶飛上階東坡公見之稱賞再三遂爲知已中書舍人新仲其次子也有家學十八歳時戯作小詞所謂流水泠泠斷橋斜路梅枝亞者朱希眞見而書諸扇今人遂以爲希眞所作又有摺疊扇詞云宫紗蜂趕梅寳扇鸞開翅數摺聚清風一捻生秋意揺揺雲母輕裊裊瓊枝細莫解玉連環怕作飛花墜公親書藁固存亦因張安國書扇而載於于湖集中其詠五月菊詞云玉臺金盞對炎光全似去年香有意莊嚴端午不應忘却重陽菖蒲九節金英蒲把同泛瑶觴舊日東籬陶令北䆫正傲羲皇淵明於五六月高卧北䆫之下風颯至自謂羲皇上人用此事於五月菊詩家嘆其精切云金剛經四句偈今世所行金剛經用姚秦鳩摩羅什所譯其四句偈曰一切有爲法如夣幻泡影如露亦如電應作如是觀又曰􅀂以色見我以音聲求我是人行邪道不能見如來予博觀它本頗有不同元魏天竺三藏菩提流支譯云一切有爲法如星翳燈幻露泡夣電雲應作如是觀而不能見如來之下更有四句云彼如來妙體即法身諸佛法體不可見彼識不能知陳天竺三藏眞諦譯云如如不動􅁪有正說應觀有爲法如暗翳燈幻露泡夣電雲􅀂以色見我以音聲求我是人行邪道不應得見我由法應見佛詞御法爲身此法非識境法如深難見唐三藏玄奘譯云諸和合所爲如星翳燈幻露泡夣電雲應作如是觀諸以色見我以音聲㝷我彼生履邪斷不能當見我應觀佛法性即導師法身法性非所識故彼不能了唐沙門義浄譯前四句與魏菩提本同而後云􅀂以色見我以音聲求我是人起邪觀不能當見我後四句與玄奘本同予案今人稱六如東坡以名堂者謂夢幻泡影露電也而此四譯乃知有九如大般􅀂經第八㑹世尊頌第九㑹能斷金剛分二頌亦與玄奘所譯同四蓮華之名嗢鉢摩華青蓮華也鉢特摩華亦云波頭摩赤蓮華也拘母陁華亦云俱物頭亦云俱牟陁紅蓮也奔荼利華亦云芬陁利白蓮也堵羅綿桞絮之􅀋即兠羅綿也黒法白法安立黒法感黒異熟所謂地獄傍生􅀑界安立白法感白異熟所謂人天安立黒白去感黒白異熟所謂一分傍生􅀑界及一分人安立非黒非白法感非黒非白異熟所謂預留果或一來果或不還果多心經偈多心經偈曰揭帝揭帝波羅掲帝波羅僧揭諦菩提薩摩訶又有大明呪經鳩羅什所譯曰竭帝竭帝波羅竭帝波羅僧竭帝菩提僧莎呵天宫寳樹行行相值莖莖相望枝枝相准葉葉相向華華相順實實相當此無量壽經所言天宫寳樹非塵世所有也白分黒分月盈至滿謂之白分月􅃜至晦謂之黒分白前黒後合爲一月又曰日隨月後行至十五日覆月都盡是名黒半日在月前行至十五日具足圎滿是名白半月􅀟閏􅀟十五夜爲半月兩半月爲一月三月爲一時兩時爲一行兩行爲一季二年半爲一􅀟此由閏故以閏月兼本月此謂月􅀟非閏􅀟也以五年再閏爲閏􅀟踰繕那一由旬數量之稱謂踰繕那四十里也毗曇論四肘爲一弓五百弓爲一拘盧舍八拘盧舍爲一由旬一弓長八尺五百弓長四百丈一拘盧舍有二里十六里爲一由旬七極微塵七極微塵成一阿耨池上塵七阿耨塵爲銅上塵七銅上塵爲水上塵七水上塵爲兎毫上塵七兎毫上塵爲一羊毛上塵七羊毛上塵爲一牛毛上塵七牛毛上塵成一嚮遊塵七嚮遊塵成一蟣七蟣成一虱七虱成穔麥七穔麥爲一指二十四指爲一肘四肘爲一弓宰相贈本生父母官封贈先世自晉宋以來有之迨唐始備然率不過一代其恩延及祖廟者絶鮮亦未嘗至極品郭汾陽二十四考中書令而其父贈止太保權德輿位宰相其祖贈止郎中唐末五季宰輔貴臣始追榮三代國朝因之李文正公昉本工部郎中超之子岀繼從叔沼昉再入相表其事求贈所生父祖官封詔贈祖温太子太保祖母權氏莒國太夫人父超太子太師母謝氏鄭國太夫人可謂異數後不聞繼之者執政贈三代不同文臣封贈三代自􅀄除執政外凡轉㕔皆不再該唯知樞密院及拜相乃復得之然舊法又不如是歐陽公作程文簡公琳父神道碑歷叙恩典曰琳參知政事贈爲太子少師在政事遷左丞又贈太子太師罷爲資政殿學士又贈太師中書令爲宣徽北院使又贈兼尚書令則是轉官與罷政亦襃贈而自宫師得太師中令更爲超越它或不然唐孫處約事新唐書來濟傳云初濟與高智周郝處俊孫處約客宣城石仲覧家仲覧衍於財有器識待四人甚厚私相與言志處俊曰願宰天下濟及智周亦然處約曰宰相或不可冀願爲通事舍人足矣後濟領吏部處約始以瀛州書佐入調濟遽注曰如志遂以爲通事舍人後皆至公輔高智周傳云智周始與郝處俊來濟孫處約共依江都石仲覧仲覧傾産結四人驩因請各語所期處俊曰丈夫惟無仕仕至宰相乃可智周濟如之處約曰得爲舍人在殿中周旋吐納可也後濟居吏部處約以瀛州參軍入調濟曰如志擬通事舍人畢降階勞問平生案兩傳相去才一卷不應重複如此可謂冗長本岀韓琬所撰御史臺記而所載自不實處約傳正觀中爲齊王祐記室祐多過失數上書切諌王誅太宗得其書擢中書舍人是歳十七年癸卯來濟次年亦爲中書舍人永徽三年拜相六年檢校吏部尚書是歳丁巳去癸卯首尾十五歳􅀂如兩傳所書大爲不合韓琬之說誠謬史氏又失於不考仲覽郷里一以爲宣城一以爲江都豈宣城人而家於廣陵也夏侯勝京房兩傳漢書儒林傳欲詳記經學師承故序列唯謹然夏侯勝京房又自有傳儒林云勝其先夏侯都尉以尚書傳族子始昌始昌傳勝勝又事同郡簡卿傳兄子建建又事歐陽高而本傳又云從始昌受尚書後事簡卿又從歐陽氏從子建師事勝及歐陽高儒林言房受易梁人焦延壽以明災里得幸爲石顯所譛誅凡百餘字而本傳又云治易事梁人焦延壽其說長於災變房用之尤精爲石顯告非謗政治誅此兩者近於重􅃨也􅀂其它張禹彭宣王駿倪寛龔勝鮑宣周堪孔光李㝷韋賢玄成薛廣德師丹王吉蔡􅁩董仲舒眭孟貢禹䟽廣馬宫翟方進諸人但志姓名及所師耳漢人坐語言􅀗罪漢昭帝時有大石自立僵桞復起眭孟上書言有從疋夫爲天子宜求索賢人䄠以帝位而退自封百里霍光惡之論以祅言惑衆伏誅案孟之妄發其死宜矣宣帝信任宦官蓋寛饒奏封事言五帝官天下三王家天下家以傳子官以傳賢執金吾議以指意欲求禪亦坐死考其所引亦不爲無罪楊惲之報孫㑹宗書初無甚怨怒之語其詩曰田彼南山蕪穢不治種一頃豆落而爲萁張晏釋以爲言朝廷荒亂百官謟䛕可謂穿鑿而廷尉當以大逆無道刑及妻子予熟味其詞獨有所謂君父至尊親送其終也有時而旣蓋宣帝惡其君喪送終之喻耳莊助論汲黯輔少主守成武帝不怒實係於一時禍福云賈􅁩劉向談說痛切無忌諱文成二帝未嘗問焉隨筆紀之矣樞密書史景德四年命宰臣王旦監修兩朝正史知樞密院王欽若陳堯叟參知政事趙安仁並修國史後來執政入樞府皆不得提舉修書非故事也知州轉運使爲通判今世士大夫旣貴不可復賤淳化中北戎入㓂以殿前都虞候曹璨知定州時趙安易官宗正少卿巳知州遂就徙通判同時有羅延吉者旣知彭祁絳三州而除通判廣州􅅬中正知興元府而通判河南􅀽郭知楚鄆二州㑹秦王廷美遷置房州詔崇儀副使閻産進知州而以郭通判州事范正辭旣知戎淄二州而通判棣深又陳􅀂拙歷知單州殿中侍御史西川轉運使召歸㑹李至守洛都表爲通判乆之柴禹錫鎭涇州復表爲通判連下遷而皆非貶降近不復有矣范正辭治饒州范正辭太平興國中以饒州多滯訟選知州事至則宿繋皆決遣之胥史坐淹獄停職者六十三人㑹詔令科州兵送京有王興者懷土憚行以刃故傷其足正辭斬之興妻上訴太宗召見正辭庭辯其事正辭曰東南諸郡饒實䌓盛人心易動興敢扇揺茍失控馭則臣無待罪之地矣上壯其敢斷特遷官充江南轉運副使饒州民甘紹者爲群盗所掠州捕繋十四人獄具將死正辭案部至引問之四皆泣下察其非實命徙他所訊鞠旣而民有告盗所在者正辭濳召􅁥軍掩捕之盗覺遁去正辭即單􅀐出郭二十里追及之賊控弦持矟來逼正辭大呼以鞭撃之中賊􅀟目仆之餘賊渡江散走被傷者尚有餘息旁得所弃贓按其姦狀伏法十四人皆得釋此吾鄕里事而郡人多不聞之榮王藏書濮王懿王之子宗綽蓄書七萬卷始與英宗偕學于邸毎得異書必轉以相付宗綽家本有岳陽記者皆所賜也此國史本傳所載宣和中其子淮安郡王仲糜進目録三卷忠宣公在燕得其中秩云除監本外寫本印本書籍計二萬二千八百三十六卷觀一秩之目如是所謂七萬卷者爲不誣矣三舘祕府所未有也盛哉秦杜八六子秦少游八六子詞云片片飛花弄晚濛濛殘􅀨籠晴正銷凝黄鸝又啼數聲語句清峭爲名流推激予家舊有建本蘭畹曲集載杜牧之一詞但記其末句云正銷魂梧桐又移翠隂秦公蓋効之似差不及也容齋四筆卷第十三終
