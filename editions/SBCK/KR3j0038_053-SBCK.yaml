  text: 容齋五筆目録
  hash: sha256:1158ffd269537ca839a0cbbee2d85a62c76c4a6fed6d0cb086bbc34e601f0699
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_053-1a}
body:
  text: 第一卷十九則天慶諸節狐假虎威虢州兩刺史徐章二先生教人張吕二公文論王安石弃地郎官非時得對􅀟生以前爲兄風俗通昏主弃功臣俗語有出問故居唐宰相不歷守令人臣震主張釋之栁渾五經秀才陶濳去彭澤古人字只一言羌戎畏服老將第二卷十五則二叔不咸月非望而食官階服章慶善橋西漢以來加官唐曹因墓銘吕望非熊唐史省文之失李德裕論命令諸公論唐肅宗漢武唐德宗孫馬二公所言元微之詩詳正學士諌繚綾戯龍羅第三飬十五則人生五計士大夫避父祖諱瀛莫閒二禽元正父子忠死蕭頴士風節江楓􅀨菊石尤風開元宫嬪相里造州縣名同先公詩詞三衙軍制歐陽公勲封贈典五方老人祝聖壽嘉祐四眞第四卷九則作詩旨意毛詩語助平王之孫東坡文章不可學韓文稱名晉代遺文􅁄寺􅁄􅀸漢武帝田蚡公孫弘近世文物之殊第五卷十五則􅁃公之斯致仕官上壽萬事不可過桃花笑春風嚴先生祠堂記宗室覃恩免解大言誤國唐書載韓柳文􅄀靈社首鳯貧富習常左傳州郡唐用宰相史記淵妙處虢巨賀蘭玉津園喜晴詩第六卷十二則鄱陽七談卜筮不敬經解之名糖霜譜李彦仙守陜俗語放錢姦雄疾勝已者漢書多叙谷永玉堂殿閣知人之難漢武帝喜殺人者館職遷除第乙卷十四則盛衰不可常張藴古大寳箴唐賦造語相似國􅀄文籍叙西漢郊祀天地書麴信陵事騫鶱二字義訓貢禹朱暉晚逹琵琶行海棠詩元白習制科東坡不隨人後門生門下見門生韓蘇杜公叙馬風災霜旱第八卷十二則白蘇詩紀年歳白公說俸禄天將富此翁白居易出位醉翁亭記酒經禮部韻略非理白公感石唐臣乞贈祖承習用經語誤元白制科長慶表章八種經典第九卷十二則畏人索報書擒􅀑章祝文不能忘情吟歐公送慧勤詩委蛇字之變東不可名園一二三與壹貳叄同何恙不巳兩漢用人人元元字韓公潮州表端午貼子詞燕賞逢知已第十卷十二則哀公問社農父田翁詩絶句詩不貫穿衞宣公二子謂端爲匹公榖解經書日唐人草堂詩句桞應辰押字唐堯無後丙午丁未斯須之敬祖宗命相容齋五筆目録終
