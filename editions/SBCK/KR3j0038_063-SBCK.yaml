body:
  text: 容齋五筆卷第九十二則畏人索報書士大夫得交朋書問有􅂴傲不肯即答者記白樂天老慵一絶句曰豈是交親向我踈老慵自愛閉門居近來漸喜知聞斷免惱嵇康索報書案嵇康與山濤絶交書云素不便書又不喜作書而人閒多事堆案盈几不相酬答則犯教傷義欲自勉強則不能乆樂天所云正此也乃知畏於答書其來乆矣不能忘情吟予旣書白公鍾情蠻素於前卷今復見其不能忘情吟一篇尤爲之感歎輙載其文因以自警其序云樂天旣老又病風乃録家事㑹經費去長物妓有樊素者年二十餘綽綽有歌舞態善唱楊桞枝人多以曲名名之由是名聞洛下籍在經費中將放之馬有駱者籍在長物中將鬻之馬出門驤首反顧素聞馬嘶慘然立見拜婉孌有辭辭畢涕下予亦愍黙不能對且命反􅃑飲之酒自飲一盃快吟數十聲聲成文文無定句予非聖逹不能忘情又不至於不及情者事來攪情情動不可柅因自哂題其篇曰不能忘情吟吟曰鬻駱馬兮放楊栁枝掩翠黛兮頓金覊馬不能言兮長鳴而􅁍顧楊栁枝再拜長跪而致辭辭曰素事主十年凡三千有六百日巾櫛之問無違無失今素貌雖陋未至衰摧駱力猶壯又無虺隤即駱之力尚可以代主一歩素之歌亦可以送主一盃一旦􅀟去有去無回故素將去其辭也苦駱將去其鳴也哀此人之情也馬之情也豈主君獨無情哉予俯而歎仰而咍且曰駱駱爾勿嘶素素爾勿啼駱反廐素反閨吾疾雖作年雖頽幸未及項籍之將死亦何必一日之内棄騅兮而别虞兮乃目素兮素兮爲我歌楊栁枝我姑酌彼金罍我與爾歸醉鄕去來觀公之文固以遣情釋意耳素竟去也此文在一集最後卷故讀之者未必記憶東坡猶以爲栁枝不忍去因劉夣得春盡絮飛之句方知之於是美朝雲之獨留爲之作詩有不似楊枝别樂天恰如通德伴伶玄之語然不及二年而病亡爲可歎也擒􅀑章祝文東坡在翰林作擒􅀑章奏告永裕陵祝文云大獮􅀗禽必有指蹤之自豐年多廪孰知耘耔之勞昔漢武命將出師而呼韓來庭効于甘露憲宗厲精講武而河湟恢復見于大中其意蓋以神宗有平唃氏之志至于元祐乃克有成故告陵歸功謂武帝憲宗亦經營於􅀄而績効在於二宣之世其用事精切如此今蘇氏眉山功德寺所刻大小二本及季眞給事在臨安所刋并江州本麻沙書坊大全集皆只自耘耔句下便接憬彼西戎古稱右臂正是好處却芟去之豈不可惜唯成都石本法帖眞跡獨得其全坡集奏議中登州上殿三劄皆非是司馬季思知泉州刻温公集有作中丞日彈王安石章尤可笑温公以治平四年解中丞還翰林而此章乃熈寜三年者二集皆出本家子孫而爲妄人所誤季眞季思不能察耳坡内制有温公安葬祭文云元豐之末天歩爲艱社稷之衞中外所屬惟是一老屏予一人名高當世行滿天下措國於太山之安下令於流水之源歳月未周綱紀畧定天􅀂相之又復奪之殄瘁之哀古今所共知之者神考用之者聖母馴致其道太平可期長爲宗臣以表後世往奠其葬庶知予懷而石本頗不同其詞云元豐之末天歩惟艱社稷之衞存者有幾惟是一老屏予一人措國於太山之安下令於流水之原歳未及朞綱紀畧定道之將行非天而誰天旣予之又復奪之惟聖與賢莫如天何然其所立天亦不能亡也知之者神考用之者聖母馴致其道終於太平永爲宗臣與國無極於其葬也告諸其柩今莫能攷其所以異也歐公送慧勤詩國朝承平之時四方之人以趨京邑爲喜蓋士大夫則用功名進取係心啇賈則貪舟車南北之利後生嬉戯則以紛華成麗而恱夷攷其實非南方比也讀歐陽公送僧慧勤歸餘杭之詩可知矣曰越俗􅆫宫室傾貲事雕墻佛屋尤其侈耽耽擬侯王文彩瑩丹漆四壁金焜煌上懸百寳蓋宴坐以方牀胡爲棄不居棲身客京坊辛勤營一室有􅀋燕巢梁南方精飲食􅌲筍比羔羊飯以玉粒粳調之甘露漿一饌費千金百品羅成行晨興未飯僧日昃不敢嘗乃兹隨北客枯粟充餞腸東南地秀絕山水澄清光餘杭幾萬家日夕焚清香煙霏四靣起雲霧􅄂芬芳豈如車馬塵􅁂髮染成霜三者孰苦樂子奚勤四方觀此詩中所謂呉越宫室飲食山水三者之勝昔日固如是矣公又有山中之樂三章送之歸勤後識東坡爲作詩集序者委蛇字之變歐公樂郊詩云有山在其東有水出逶夷近歳丁朝佐辨正謂其字參古今之變必有所據予因其說而悉索之此二字凡十二變一曰委蛇本於詩羔羊退食自公委蛇委蛇毛公注行可從跡也鄭箋委曲自得之皃委危反蛇音移左傳引此句杜注云順貌莊子載齊威公澤中所見其名亦同二曰委他詩君子偕老委委佗佗毛注委委者行可委曲從迹也佗者德平易也三曰逶迱韓詩釋上文云公正貌說文逶迤斜去貌四曰倭遲詩四牡騑騑周道倭遲注歷逺之貌五曰倭夷韓詩之文也六曰威夷潘岳詩廻谿縈曲阻峻阪路威夷孫綽天台山賦旣克隮於九折路威夷而脩通李善注引韓詩周道威夷薛君曰威夷險也七曰委移離騷經載雲旗之委蛇一本作逶迤一本作委移注雲旗委移長也八曰逶移劉向九歎遵江曲之逶移九曰逶蛇後漢費凰碑君有逶蛇之節十曰蜲蛇張衡西京賦女娥坐而長歌聲清暢而蜲蛇李善注蜲蛇聲餘詰曲也十一曰迆漢逄盛碑當遂迆立號建基十二曰威遲劉夣得詩桞動御溝清威遲堤上行韓公南海廟碑蜿蜿蛇虹亦然也則歐公正用韓詩朝佐不暇㝷繹之爾東不可名園今人亭館園池多即其方隅以命名如東園東亭西池南館北榭之􅀋固爲簡雅然有當避就處歐陽公作眞州東園記最顯案漢書百官表將作少府掌治宫室屬官有東園主章注云章謂大材也主章掌大材以供東園大匠紹興三十年予爲省試參詳官主司委出詞科題同院或欲以東園主章爲箴予曰君但知漢表耳霍光傳元之喪賜東園温明服䖍曰東園處此器以鏡置其中以懸尸上師古曰東園署名也屬少府其署主作此器董賢傳東園祕器以賜賢注引漢舊儀東園袐器作棺􅀂是豈佳處乎同院驚謝而退然則以東名園是爲不可予有兩園適居東西故扁西爲西園而以東爲東圃蓋避此也一二三與壹貳叄同古書及漢人用字如一之與壹二之與貳三之與叄其義皆同鳲鳩序刺不壹也又云用心之不壹也而正文其儀一兮表記節以壹惠注言聲譽雖有衆多者節以其行一大善者爲謚耳漢華山碑五載壹巡狩祠孔廟碑恢崇壹變祝睦碑非禮壹不得犯而後碑云非禮之常一不得當則與壹通用也孟子市價不貳趙岐注云無二賈者也本文用大貳字注用小二字則二與貳通用也易繋辭叄天兩地釋文云參七南反又如字音三周禮設其參注參謂卿三人則三與參通用也九之與乆十之與拾百之與栢亦然予頃在英州訪鄰人利秀才利新作茅齋頗凈潔從予乞名其前有兩高松因爲誦藍田壁記命之曰二松其季請曰是使大貳字否坐者皆哂蓋其人不知書信口輙言以貽譏笑􅀂以古字論之亦未爲失也文惠公名流杯亭曰一詠而采借􅀠法扁爲壹咏讀者多以爲疑顧弟弗深考耳何恙不巳公孫弘爲丞相以病歸印上報曰君不幸罹霜露之疾何恙不已顔師古注恙憂也何憂於疾不止也禮部韻略訓恙字亦曰憂也初無訓病之義蓋旣云罹疾矣不應復云病師古之說甚爲明白而世俗相承至問人病爲貴恙謂輕者爲微恙心疾爲心恙風疾爲風恙根著巳深無由可改西漢用人人元元字前漢書好用人人字如文帝紀人人自以爲得之者以萬數又曰人人自安難動揺元帝紀人人自以得上意食貨志人人自愛而重犯法韓信傳人人自以爲得大將曹參傳齊故諸儒以百數言人人殊張良傳人人自堅叔孫通傳吏人人奉職賈誼傳人人各如其意所出􅀭推傳人人自以爲咎繇鮑宣傳人人牽引所私韓延壽傳人人問以謡俗人人爲飲張騫傳人人有言輕重李㝷傳人人自賢王莾傳人人延問嚴安傳人人自以爲更生王吉傳人人自制是也後漢書亦閒有之如崔駰傳人人有以自優五行志人人莫不畏憲吳漢傳諸將人人多請之申屠剛傳人人懷憂王允傳人人自危荀彧傳人人自安吕強傳諸常侍人人求退是也又元元二字考之六經無所見而兩漢書多用之如前漢文帝紀全天下元元之尸武紀燭幽隱勸元元所以化元元宣紀不忘元元元紀元元失望元元何辜元元大困元元之民勞於耕耘元元騷動元元安所歸命成紀元元􅁈失職者衆哀紀元元不贍刑法志罹元元之不逮嚴安傳元元黎民得免於戰國嚴助傳使元元之民安生樂業賈􅂢之傳保全元元東方朔傳元元之民各得其所魏相傳尉安元元唯陛下留神元元鮑宣傳爲天牧養元元蕭育傳安元元而已康衡薛宣傳哀閔元元王嘉傳憂閔元元谷永傳以慰元元之心匈奴傳元元萬民是也後漢光武紀下爲元元所歸賊害元元元元愁恨惠兹元元章紀誠欲元元去未歸本元元未諭深元元之愛和紀愛養元元下濟元元順紀元元􅀍害質紀元元嬰此困毒桓紀害及元元鄧后紀劉毅傳垂恩元元王昌傳元元創痍耿弇傳元元叩心郎顗傳弘濟元元貸贍元元曹襃傳仁濟元元范升傳元元焉所呼天免元元之急鍾離意傳憂念元元何敞傳元元怨恨安濟元元楊終傳以濟元元虞詡傳遭元元無妄之災皇甫規傳平志畢力以慶元元是也予謂元元者民也而上文又言元元之民元元􅀺民元元萬民近於􅃨重矣故顔注或云元元善意也韓公潮州表韓文公諌佛骨表其詞切直至云凡有殃咎宜加臣身上天􅁥臨臣不怨悔坐此貶潮州刺史而謝表云臣於當時之文未有過人者至論陛下功德與詩書相表裏作爲歌詩薦之郊廟雖古人復生臣亦未肯多遜而􅀒罪嬰釁自拘海島懷痛窮天死不閉目伏惟天地父母哀而憐之考韓所言其意乃望召還憲宗雖有武功亦未至編之詩書而無愧至於紀泰山之封鏤白玉之牒東巡奏功明示得意等語摧挫獻佞大與諌表不侔當時李漢軰編定文集惜不能爲之除去東坡自黄州量移汝州上表云伏讀訓詞有人材實難不忍終棄之語臣昔在常州有田粗給饘粥欲望許令常州居住輙叙徐州守河及􅀗妖賊事庶因功過相除得從所便讀者謂與韓公相􅀋是不然二表均爲歸命君上然其情則不同坡自列往事皆其實跡而所乞不過見地耳且略無一佞詞眞爲可服燕賞逢知已白樂天爲河南尹日有荅舒貟外云貟外游香山寺數日不歸兼辱尺書大誇勝事時正值坐衙慮囚之際走筆題長句以贈之曰黄菊繁時好客到碧雲合處佳人來酡顔一􅀏夭桃綻清泠秋聲寒玉哀軒􅀐逶迤棹容與留連三日不能回白頭老尹府中坐早衙纔退暮衙催謝希深歐陽公官洛陽同游嵩山歸暮抵龍門香山雪作留守錢文僖公遣吏以厨傳歌妓至且勞之曰山行良勞當少留龍門賞雪府事簡無遽歸也王定國訪東坡公於彭城一日棹小舟與顔長道携盼卿三子游泗水南下百歩洪吹笛飲酒乗月而來坡時以事不得往夜著羽衣佇立黄樓上相視而笑以爲李太白死世間無此樂三百餘年矣定國旣去逾月復與參寥師泛舟洪下追憶曩游作詩曰輕舟弄水買一笑醉中蕩漿肩相摩歸來笛聲滿山谷明月正照金叵羅味此三游之勝今之燕賔者寜復有之蓋亦值知已也端午貼子詞唐世五月五日揚州於江心鑄鏡以進故國朝翰􅁐撰端午貼子詞多用其事然遣詞命意工拙不同王禹玉云紫閤瞳矓隱曉霞瑶墀九御薦菖華何時又進江心鑑試與君王郤衆邪李􅀖直云艾葉成人後榴花結子􅀄江心新得鏡龍瑞護仙居趙彦􅀂云揚子江中方鑄鏡未央宫裏更飛符菱花欲共朱靈合驅盡神姦又得無又陽子江中百錬金寳奩疑是月華沉爭如聖后無私鑑明照人閒萬善心又江心百錬青銅鏡架上􅀟紉翠縷衣李十美云何須百錬鑑自勝五兵符傅墨􅀸云百錬鑑從江上鑄五時花向帳前施許沖元云江中今日成龍鑑苑外多年廢鷺陂合照乾坤共作鏡放生河海盡爲池蘇子由云揚子江中寫鏡龍波如細縠不揺風宫中驚捧秋天月長照人間助至公大槩如此唯東坡不然曰講餘交翟轉回廊始覺深宫夏日長楊子江心空百錬只將無逸監興亡其輝光氣熖可畏而仰也􅀂白樂天諷諌百錬鏡篇云江心波上舟中鑄五月五日日午時背有九五飛天龍人人呼爲天子鏡又云太宗常以人爲鏡􅁥古􅁥今不監容乃知天子别有鏡不是􅀭州百錬銅用意正與坡合予亦嘗有一聮云願儲醫國三年艾不愽江心百錬銅然去之遠矣端午故事莫如楚人競渡之的蓋以其非吉祥不可施諸祝頌故必用鏡事云容齋五筆卷第九終
