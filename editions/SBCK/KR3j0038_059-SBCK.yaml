body:
  text: 容齋五筆卷第五十五則􅁃公之斯孟子逄􅀩學射於羿盡羿之道思天下惟羿爲愈巳於是殺羿孟子曰是亦羿有罪焉公明儀曰疑􅀂無罪焉曰薄乎云爾􅁖得無罪此一叚旣畢而繼之曰鄭人使子濯孺子侵衞衛使􅁃公之斯追之子濯孺子曰今日我疾作不可以執弓吾死矣夫問其僕曰追我者誰也其僕曰􅁃公之斯也曰吾生矣其僕曰􅁃公之斯衞之善射者也夫子曰吾生何謂也曰􅁃公之斯學射於尹公之他尹公之他學射於我夫尹公之他端人也其取友必端矣􅁃公之斯至曰夫子仕爲不執弓曰今日我疾作不可以執弓曰小人學射於尹公之他尹公之他學射於夫子我不忍以夫子之道反害夫子雖然今日之事君事也我不敢廢抽矢扣輪去其金發乗矢而後反孟子書子濯􅁃公一叚幾二百字其旨以謂使羿如子濯得尹公而教之則必無逄蒙之禍然前叚結尾自常爲文者處之必云如子濯孺子施教於尹公之他則可不然後叚之末必當云以是事觀之羿之不善取友至於殺身其失如此然後文體相屬兹判爲兩節􅀂不關聮而宫商相宣律吕明煥立言之妙是豈歩趨模倣所能彷彿哉人爲兒童時便讀此章未必深識其趣故因表出而極論之左氏傳書衛獻公奔齊云尹公他學射於􅁃公差􅁃公差學射於公孫丁他與差爲孫林父追公公孫丁御公􅁃公差曰射爲背師不射爲戮射爲禮乎射兩軥而還尹公佗曰子爲師我則逺矣乃反之公孫丁授公轡而射之貫佗臂即孟子所引者而名字先後美惡皆不同萬事不可過天下萬事不可過豈特此也雖造化隂陽亦然􅀨澤所以膏潤四海然過則爲霖淫陽舒所以發育萬物然過則爲燠亢賞以勸善過則爲僭刑以懲惡過則爲濫仁之過則爲兼愛無父義之過則爲爲我無君執禮之過反鄰於謟尚信之過至於證父是皆偏而不舉之弊所謂過猶不及者楊子法言云周公以來未有漢公之懿也勤勞則過於阿衡蓋謟王莽也後之議者謂阿衡之事不可過也過則反乃誚莽耳其旨意固然致仕官上壽國朝大臣及侍從致仕後多居京師熈寜中范蜀公自翰林學士以本官戸部侍郎致仕同天節乞隨班上壽許之遂著爲令元祐􅀄韓康公以故相判大名府還都拜司空致仕值太皇太后受􅁽禮畢乞隨班稱賀降詔免赴皆故事也桃花笑春風王荆公集古胡笳詞一章云欲問平安無使來桃花依舊笑春風後章云春風似舊花仍笑人生豈得長年少二者貼合如出一手毎歎其精工其上句蓋用崔護詩後一句乆不見其所出近讀范文正公靈巖寺一篇云春風似舊花猶笑以仍爲猶乃此也李義山又有絶句云無頼夭桃靣平明露井東春風爲開了却擬􅀏春風語意兩極其妙嚴先生祠堂記范文正公守桐廬始於釣臺建嚴先生祠堂自爲記用屯之􅀄九蠱之上九極論漢光武之大先生之高財二百字其歌詞云雲山蒼蒼江水泱泱先生之德山高水長旣成以示南豐李泰伯㤗伯讀之三歎味不巳起而言曰公之文一出必將名世某妄意輙易一字以成盛美公瞿然握手扣之荅曰雲山江水之語於義甚大於詞甚溥而德字承之乃似趢趚擬換作風字如何公凝坐頷首殆欲下拜張伯玉守河陽作六經閣記先託游士及在職者各爲之凡七八本旣畢並㑹於府伯玉一一閱之取􅁓書十四字徧示客曰六經閣諸子史集在焉不書尊經也時曽子固亦預坐驚起􅎥伏頃聞此二事於張子韶不能追憶經閣所在及其文竟就於誰手後之君子當有知之者矣大言誤國隗􅅝謀畔漢馬援勸止之甚力而其將王元曰今天水全富士馬最強案秦舊迹表裏河山元請以一寸泥爲大王東封凾谷關􅅝反遂决至於父子不得其死元竟降漢隋文帝伐陳大軍臨江都官尚書孔範言於後主曰長江天塹古以爲限隔南北今日虜軍豈能盡度邪臣毎患官卑虜􅀂渡江臣定作太尉公矣或妄言北軍馬死範曰此是我馬何爲而死帝笑以爲然故不爲深備巳而國亡身竄遠裔唐元宗有克復中原之志及下南閩意以謂諸國可指麾而定而事力窮薄且無良將魏岑因侍宴言臣少遊元城好其風物陛下平中原臣獨乞任魏州元宗許之岑趨墀下拜謝人皆以爲佞孟蜀通奏使王昭遠居常好太言有雜耕渭上之志聞王師入討對賔客挼手言此送死來爾乘此逐北遂定中原不煩再舉也不兩月蜀亡昭遠爲俘此四臣之佞本爲爵禄及一時容恱而巳亦可悲哉宗室覃恩免解淳熈十三年光堯太上皇帝以聖壽八十肆赦推恩宇宙之内􅀩􅀍甚廣太學諸生至于武學皆得免文解一次凡該此恩者千二三百人而宗子在學者不預諸人相率詣宰府且偏謁侍從臺諌各納一劄子叙述大旨其要以爲德壽霈典普天同慶而玉牒支派辱居膠庠顧不􅀗與布衣書生等竊譬之世俗尊長生日召㑹族姻而本家子孫不享杯酒臠炙外議謂何今厖鴻之澤如此宗學乃不許厠各於義於禮恐爲未愜是時諸公莫肯出手爲言以待制侍講内宿適􅀩宣引因出其􅁓以奏仍爲敷陳此輩所云尊長生日㑹客而本家子弟不得坐譬諭可謂明白孝宗亦􅀏曰甚是切當有理時所携只是白劄子蒙徑付出施行遂一例免舉其人名字今不復能記憶矣唐書載韓桞文宋景文修唐書韓文公傳全載其進學解諌佛骨表潮州謝上表祝鱷魚文皆不甚潤色而但換進學解數字頗不如本意元云招諸生立館下改招字爲召旣言先生入學則諸生在前招而誨之足矣何召之爲障百川而東之改障字爲停本言川流横潰故障之使東􅀂以爲停於義甚淺改跋前㚄後爲躓後韓公本用狼跋詩語非躓也其他以爬羅剔抉爲杷羅焚膏油爲燒以取敗幾時爲其敗呉元濟傳書平淮西碑文千六百六十字固有他本不同然才減節輙不隱當明年平夏一句悉芟之平蜀西川減西川字非郊廟祠祀其無用樂減祠其兩字皇帝以命臣愈臣愈再拜稽首減下臣字殊害理汝其以節都統討軍以討爲諸尤不然討者如左傳討軍實之義􅀂云諸軍何人不能下此語栁子厚傳載其文章四篇與蕭俛許孟容書正符懲咎賦也孟容書意象歩武全與漢楊惲荅孫㑹宗書相似正符倣班孟堅典引而其四者次序或失之至云宗元不得召内閔悼作賦自儆然其語曰逾再歳之寒暑則責居日月未爲乆難以言不得召也資治通鑑但載梓人及郭槖駞傳以爲其文之有理者其識見取舍非宋景文可比云􅁳靈社首鳯光堯上仙於梓宫發引前夕合用警埸導引鼔吹詞在翰􅁐製撰其六州歌頭内一句云春秋不說楚􅄀靈常時進入文字立待報者則貼黄批急速未嘗停滯是時首尾越三日又入奏趣請付出太常吏欲習熟歌唱守院門伺候適有表弟沈日新在軍將橋客邸一士人乃上庠舊識忽問楚􅁳靈出處沈亦不能知來扣予因以莊子語告之急走報此士大喜初孝宗以付巨璫霍汝弼使釋其意此士霍客也故宛轉費日如此又靣奉旨令代作挽詩五章其四云鼎湖龍去遠社首鳯來遲當時不敢宣泄而帶御器械謝純孝宻以爲問乃爲舉王子年拾遺記蓋周成王事也禁􅁐文書周悉乃爾左傳州郡左傳魯哀公二年晉趙鞅與鄭戰誓衆曰克敵者上大夫受縣下大夫受郡土田十萬注云周書作雒篇千里百縣縣有四郡然則郡乃􅀠縣而歴代地理郡國志未之或書又傳所載地名從州者凡五魯宣公㑹齊於平州以定其位注云齊地在泰山牟縣西見於正經它如允姓之姦居于瓜州注今燉煌也楚莊王滅陳復封之鄕取一人焉以歸謂之夏州齊子尾使閭丘嬰伐我陽州注魯地後四十年又書魯侵齊門于陽州注攻其門也苫越生子將待事而名之陽州之役􅀗焉名之曰陽州是齊魯皆有此地也衞莊公登城以望見戎州曰我􅁎姓也何戎之有焉以上唯瓜州之名至今貧富習常少時見前軰一說云富人有子不自乳而使人棄其子而乳之貧人有子不得自乳而棄之以乳他人之子富人􅂴行而使人肩輿貧人不得自行而又肩輿人是皆習以爲常而不察之也天下事習以爲常而不察者推此亦多矣而人不以爲異悲夫甚愛其論後乃得之於晁以道客語中故謹書之益廣其傳唐用宰相唐世用宰相不以序其得之􅀂甚易然固有出入大僚歷諸曹尚書御史大夫領方鎭入爲僕射東宫師傳而不得相者􅀂顔眞卿王起揚於陵馬揔盧鈞韓臯柳公綽公權盧知猷是也如人主所欲用不過侍郎給事中下至郎中愽士者才居位即禮絶百僚諌官御史聽命之不暇頋何敢輙抨彈其失與國朝異矣其先在職者仍許引其同列􅀂姚元崇之引宋璟蕭嵩之引韓休李林甫引牛仙客陳希烈楊國忠引韋見素盧􅂎引關播李泌引董晉竇參李吉甫引裴垍李德裕引李回皆然史記淵妙處太史公書不待稱說􅀂云褒贊其高古簡妙處殆是摹寫星日之光輝多見其不知量也然予毎展讀至魏世家蘇秦平原君魯仲連傳未嘗不驚呼撃節不自知其所以然魏公子無忌與王論韓事曰韓必德魏愛魏重魏畏魏韓必不敢反魏十餘語之間五用魏字蘇秦說趙肅侯曰擇交而得則民安擇交而不得則民終身不安齊秦爲兩敵而民不得安􅀝秦攻齊而民不得安􅀝齊攻秦而民不得安平原君使楚客毛遂願行君曰先生處勝之門下幾年于此矣曰三年于此矣君曰先生處勝之門下三年於此矣左右未有所稱誦勝未有所聞是先生無所有也先生不能先生留遂力請行而折楚王再言吾君在前叱者何也至左手持盤血而右手招十九人於堂下其英姿雄風千載而下尚可想見使人畏而仰之卒定從而歸至於趙平原君曰勝不敢復相士勝相士多者千人寡者百數今乃於毛先生而失之毛先生一至楚而使趙重於九鼎大吕毛先生以三寸之舌強於百萬之師勝不敢復相士秦圍趙魯仲連見平原君曰事將柰何君曰勝也何敢言事魏客新垣衍今趙帝秦今其人在是勝也何敢言事仲連曰吾始以君爲天下之賢公子也吾今然後知君非天下之賢公子也梁客在平原往見衍曰東國有魯仲連先生者勝請爲紹介交之於將軍衍曰吾聞魯仲連先生齊國之高士也衍人臣也使事有職吾不願見魯仲連先生及見衍衍曰吾視居此圍城之中者皆有求於平原君者也今吾觀先生之玉貌非有求於平原君者也又曰始以先生爲庸人吾乃今日知先生爲天下之士也是三者重沓熟復如駿馬下駐千丈坡其文􅀔正爾風行於上而水波眞天下之至文也玉津園喜晴詩淳熈十二年三月二十六日車駕宿戒幸玉津園命下大雨有旨許從駕官帶雨具將曉有晴意巳而天宇豁然至晩歸進一詩歌詠其實云五更猶自􅀨如麻無限都人仰翠華翻手作雲方悵望舉頭見日共驚嗟天公的有施生妙帝力堪同造物誇上􅁐春光無盡藏可湏羯皷更催花四月四日扈從詣景靈宫朝獻蒙於幕次賜和篇聖製云比幸玉津園縱觀春事適霽色可喜卿有詩來上因俯同其韻春郊柔緑通桑麻小駐芳園覧物華應信吾心非暇逸頓回晴意絶咨嗟毎思富庶將同樂敢務游畋漫自誇不似華清當日事五家車􅀐爛如花後二日兵部尚書宇文价内引上舉似此詩曰洪待制用雨如麻字偶思得桑麻可押又其末句用羯皷催花事故以華清車􅀐荅之价拱手稱贊明日以相告云虢巨賀蘭天下國家不幸而有四郊之警爲人臣者當隨其事力悉心盡忠以致尺寸之效茍爲叨竊禄位視如秦越一切惟已私之是徇雖千百載後覩其事者猶使人怒髪衝冠也唐天寳禄山之亂可謂極矣虢王巨爲河南節度使賀蘭進明繼之擁數道之兵臨要害之地尊爲征鎭有民有財而汗漫忌疾非徒無益而反敗之巨在彭城張廵在雍丘以將士有功遣使詣巨請空名告身及賜物巨惟與折衝果毅告身三十通不與賜物巡竟不能立徙于睢陽先是太守許遠積糧六萬石巨以其半給濮陽濟隂遠固爭不得二郡得糧遂以城叛而睢陽食盡顔魯公起兵平原合衆十萬旣成魏郡堂邑之功矣是時進明爲北海太守亦起兵公以書召之并力進明度河公每事咨之軍權始移遂取捨任意以得招討後詣行在因譖房琯自嶺南而易河南張巡受圍困􅁄遣南霽雲告急於其所治臨淮相去三百里弃而不救平原睢陽失守實二人之故一時議者皆不以爲言使之連据高位顯爲佚罰曽不十年巨斥刻遂州爲叚子璋所殺進明坐弟五􅄾黨自御史大夫竄謫以死天網恢恢兹焉不漏容齋五筆卷第五終
