body:
  text: 容齋三筆卷第二十六則漢宣帝不用儒漢宣帝不好儒至云俗儒不逹時宜好是古非今使人眩於名實不知所守何足委任康衡爲平原文學學者多上書薦衡經明當世少􅀟不宜在逺方事下蕭望之梁丘賀望之奏衡經學精習􅀃有師道可觀覽宣帝不甚用儒遣衡歸故官司馬温公謂俗儒誠不可與爲治獨不可求眞儒而用之乎且是古非今之􅀃秦始皇李斯所禁也何爲而効之邪旣不用儒生而專委中書宦官弘恭石顯因以擅政事卒爲後世之禍人主心術可不戒哉國家府庫眞宗嗣位之初有司所上天下每歳賦入大數是時至道三年也凡收榖二千一百七十萬碩錢四百六十五萬貫絹紬一百九十萬疋絲綿六百五十八萬兩茶四十九萬斤黄蠟三十萬斤自後多寡不常然大畧具此方國家全盛民力充足故於征輸未能爲害今之事力與昔者不可同日而語所謂緡錢之入殆過十倍民日削月朘未知救弊之術爲可慮耳黄蠟一項今不聞有此數劉項成敗漢高帝項羽起兵之始相與北靣共事懷王及入關破秦子嬰出降諸將或言誅秦王高帝曰始懷王遣我固以能寛容且人已服降殺之不祥乃以屬吏至羽則不然旣殺子嬰屠咸陽使人致命於懷王王使如􅀄約先入關者王其地羽廼曰懷王者吾家武信君所立耳非有功伐何以得顓主約今定天下皆將相諸君與籍力也懷王亡功固當分其地而王之於是陽尊王爲義帝卒至殺之觀此二事高帝旣成功猶敬佩王之戒羽背主約其末至於如此成敗之端不待智者而後知也高帝微時嘗繇咸陽縱觀秦皇帝喟然太息曰大丈夫當如此矣至羽觀始皇則曰彼可取而代也雖史家所載容有文飾然其大旨固可見云占術致禍吉凶禍福之事蓋未嘗不先見其祥然固有知之信之而翻取殺身亡族之害者漢昭帝時昌邑石自立上林僵柳復起蟲食葉曰公孫病巳立眭孟上書言當有從疋夫爲天子者􅂆帝索賢人而䄠位孟坐祅言誅而其應乃在孝宣正名病巳哀帝時夏賀良以爲漢歴中衰當更受命遂有陳聖劉太平皇帝之事賀良坐不道誅及王莽􅆲􅀼自謂陳後而光武實應之宋文帝時孔熈先以天文圗䜟知帝必以非道晏駕由骨肉相殘江州當出天子遂謀大逆欲奉江州刺史彭城王義康熈先旣誅義康亦􅀍害而帝竟有子禍孝武帝乃以江州起兵而即尊位薄􅁎在魏王豹宫許􅀒相之當生天子豹聞言心喜因背漢致夷滅而其應乃在漢文帝唐李錡據潤州反有相者言丹陽鄭氏女當生天子錡聞之納爲侍人錡敗没入掖庭得幸憲宗而生宣宗五代李守正爲河中節度使有術者善聽人聲聞其子婦符氏聲驚曰此天下之母也守正曰吾婦猶爲天下母吾取天下復何疑哉於是決反巳而覆亡而符氏乃爲周世宗后絳侯萊公漢周勃誅諸吕立文帝以安劉氏及爲丞相朝罷趨出意得甚上禮之恭常目送之爰盎進曰丞相何如人也上曰社稷臣盎曰絳侯所謂功臣非社稷臣社稷臣主在與在主亡與亡方吕后時諸吕用事擅相王絳侯爲太尉本兵柄弗能正吕后崩大臣相與共誅諸吕太尉主兵適㑹其成功所謂功臣非社稷臣丞相如有驕主色陛下謙遜臣主失禮竊爲陛下弗取也後朝上益莊丞相益畏乆之勃遂有逮繫廷尉之禍幾於不免宼萊公決澶淵之䇿眞宗待之極厚王欽若深害之一日㑹朝準先退欽􅀂進曰陛下敬畏冦準爲其有社稷功邪上曰然欽若曰臣不意陛下出此言澶淵之役不以爲恥而謂準有社稷功何也上愕然曰何故對曰城下之盟雖春秋時小國猶恥之今以萬乗之貴而爲比舉是盟於城下也其何恥如之上愀然不能荅由是顧準稍衰旋即罷相終海康之貶嗚呼絳侯萊公之功揭􅀂日月而盎與欽􅀂以從容一言移兩明主意訖致二人於罪斥䜛言罔極吁可畏哉無名殺臣下傳曰欲加之罪其無辭乎古者置人於死地必求其所以死然固有無罪殺之而必爲之名者張湯爲漢武造白鹿皮幣大農顔異以爲本末不相稱天子不恱湯又與異有􅂩異與客語初令下有不便者異不應微反脣湯奏當異九卿見令不便不入言而腹非論死自是後有腹非之法曹操始用崔琰後爲人所譛罰爲徒􅊢使人視之詞色不撓操令曰琰雖見刑而對賔客虬須直視若有所瞋遂賜琰死隋􅌆帝殺高熲之後議新令乆不決薛道衡謂朝士曰向使高熲不死令決當乆行有人奏之帝怒付執灋者推之裴藴奏道衡有無君之心推惡於國妄造禍端論其罪名似如隱昧原其情意深爲悖逆帝曰公論其逆妙體本心遂令自盡􅁈哉此三臣之死也平天冠祭服之冕自天子至于下士執事者皆服之特以梁數及旒之多少爲别俗呼爲平天冠蓋指言至尊乃得用范純禮知開封府中旨鞠淳澤村民謀逆事審其故乃嘗入戯場觀優歸塗見匠者作桶取而戴於首曰與劉先主如何遂爲匠擒明曰入對徽宗問何以處對曰愚人村野無所知若以叛逆蔽罪恐辜好生之德以不應爲杖之足矣案後漢輿服志蔡邕注冕冠曰鄙人不識謂之平天冠然則其名之傳乆矣介推寒食左傳晉文公反國賞從亡者介之推不言禄禄亦弗及推遂與母偕隱而死晉侯求之不􅀗以綿上爲之田曰以志吾過綿上者西河界休縣地也其事始末只如此史記則曰子推從者書宫門有一蛇獨怨之語文公見其書使人召之則亡聞其入綿上山中於是環山封之名曰介山雖與左傳稍異而大略亦同至劉向新序始云子推怨於無爵齒去而之介山之上文公待之不肯出以謂焚其山宜出遂不出而焚死是後雜傳記如汝南先賢傳則云太原舊俗以介子推焚骸一月寒食鄴中記云并州俗冬至後一百五日爲子推斷火冷食三日魏武帝以太原上黨西河鴈門皆􅴟寒之地令人不得寒食亦爲冬至後百有五日也案後漢周舉傳云太原一郡舊俗以介子推焚骸有龍忌之禁至其亡月咸言神靈不樂舉火由是士民毎冬中輙一月寒食莫敢烟㸑舉爲并州刺史乃作吊書置子推廟言盛冬去火殘損民命非賢者之意宣示愚民使還温食於是衆惑稍解風俗頗革然則所謂寒食乃是冬中非今節令二三月閒也進士訴黜落天禧三年京西轉運使胡則言滑州進士楊世質等訴本州黜落即取元試卷付許州通判崔立看詳立以爲世質等所試不至紕繆巳牒滑州依例解發詔轉運司具析不先奏裁直令解發縁由以聞其試卷仰本州繳進世質等仍未得解發及取到試卷詔貢院定奪乃言詞理低次不合充薦復黜之而劾胡則崔立之罪蓋是時貢舉條制猶未堅定故有被黜而來訴其枉者至於省試亦然如葉齊之􅀋由此登第後來無此風矣後漢書載班固文班固著漢書制作之工如英莖咸韶音節超詣後之爲史者莫能及其髣髴可謂盡善矣然至後漢中所載固之文章斷然如出兩手觀謝夷吾傳云第五倫爲司徒使固作奏薦之其辭至有才兼四科行包九德之語其他比喻引稷契咎陶傅􅀃伊吕周召管晏此爲一人之身而唐虞商周聖賢之盛者皆無以過而夷吾乃在方術傳中所學者風角占候而已固之言一何太過歟趙充國馬援前漢先零羌犯塞趙充國平之初置金城屬國以處降羌西邊遂定成帝命楊雄頌其圗畫至比周之方虎後漢光武時西羌入居塞内來歙奏言隴西侵殘非馬援莫能定乃拜援太守追討之羌來和親於是隴右清靜而自永平以後訖于靈帝十世之閒羌患未嘗少息故范曄著論以爲二漢御戎之方爲失其本先零侵境趙充國遷之内地當煎作過馬文淵徙之三輔貪其暫安之埶信其馴服之情計日用之權宜忘經世之逺略豈夫識微者之爲乎援徙當煎於三輔不見其事西羌傳云援破降先零徙置天水隴西扶風三郡事巳具援傳然援本傳蓋無其語唯叚紀明與張奐爭討東羌奏䟽正謂趙馬之失至今爲梗充國文淵爲漢名臣叚貶之如此故曄據而用之豈其然乎漢人希姓兩漢書所載人姓氏有後世不著見者甚多漫紀于此以助氏族書之脫遺複姓如公上不害合傅胡害室中同昭渉掉尾單父右軍陽城延息夫躬游水發根吾丘壽王落下閎梁丘賀五鹿充宗公戸滿意堂谿惠申章昌告星賜闕門慶忌安國少季馬適建都尉朝母將隆紅陽長仲烏氏蠃周陽由勝屠公母鹽氏歐侯氏士孫喜索盧恢屠門少􅀲田儀工師喜駮馬少伯公乘歙鮭陽鴻弓里游公沙穆胡母班周生豐友通期公緒恭公族進階水丘岑叔先雄單姓如繒賀蟲逹靈常賁赫其石旅卿祕彭祖革朱樛樂冷豐􅄀都澓中翁蒯徹直不疑閎􅐐使樂成桮育制氏猗頓義縱雋不疑䟽廣云敞枚乘終軍鹵公孺食子公馯臂倗宗衡胡乘宏蕳卿快欽所忠假倉眭孟䠠惲塗惲射姓后倉姓偉如氏苴氏百政免公髪福質氏濁賢稽發萬章瞷氏佗羽繡君賔漕中叔栩丹帛敞遲招平汝臣駒幾稱忠逯普臺崇沐茂匽氏勞丙抗徐闕宣沮儁卑整編訢亶誦尋穆夜龍弓林行巡祋諷角閎芳丹堅鐔錫光傜偉重異力子都維汜詩索繇延夷長公防廣鐔顯移良緱玉蕃嚮渠穆臨孝存脂習笮融茨充處興興渠具爰諒輔騰是卿仲遼謁煥矯眞晃華洼丹禰衡絳灌漢書陳平傳絳灌等讒平顔師古注云舊􅀃云絳絳侯周勃也灌灌嬰也而楚漢春秋高祖之臣别有絳灌疑昧之文不可據也賈誼傳絳灌東陽侯之屬盡害之注亦以爲勃嬰案史記陳平世家曰絳侯灌嬰等咸䜛平則其爲兩人明甚師古不必爲疑辭也楚漢春秋陸賈所作皆書當時事而所言多與史不合師古蓋屢辯之矣史漢外戚竇皇后傳實書絳侯灌將軍此最的證也夏侯嬰爲滕令故稱􅅬公而史并灌嬰書爲􅅬灌賈􅁩所稱亦然甚與絳灌相􅀋楚漢春秋一書今不復見李善注文選劉歆移博士書云楚漢春秋曰漢已定天下論羣臣破敵禽將活死不衰絳灌樊噲是也功成名立臣爲爪牙世世相屬百出無邪絳侯周勃是也然則絳灌自一人非絳侯與灌嬰師古所謂疑昧之文者此耳張耳歸漢即立爲趙王子敖廢爲侯敖子偃嘗爲魯王文帝封爲南宫侯而楚漢春秋有南宫侯張耳淮隂舎人告韓信反史記表云欒􅀃漢表云樂􅀃而楚漢以爲謝公其誤可見題詠絶唱錢伸仲大夫於􅃬山所居􅃮塘村作四亭自其先人巳有􅁲築之意而不克就故名曰遂初先壠在其上名曰望雲種桃數百千株名曰芳美鑿地涌泉或以爲與惠山泉同味名曰通惠求詩於一時名流自􅁑魯卿汪彦章孫仲益旣各極其妙而母舅蔡載天任四絶獨擅􅂣遂初亭曰結廬傍林泉偶與􅀄心期佳處時自領未應魚鳥知望雲亭曰白雲來何時英英冠山椒西風莫吹去使我心揺揺芳美亭曰高人不惜地自種無邊春莫隨流水去恐汙世閒塵通惠亭曰水行天地閒萬􅂀同一指胡爲穿石來要洗巢由耳四篇旣出諸公皆自以爲弗及也呉傅朋游絲書賦詩者以百數汪彦章五言數十句多用翰墨故事固已超㧞而劉子翬彦冲古風一篇蓋爲絶唱其辭云圎清無瑕二三月時見游絲轉空闊誰人冩此一叚竒著􅁓春風吹不脫紛紜紏結疑非書安得龍蛇如許臞神蹤政喜縈不斷老眼只愁看若無定知苗裔出飛白古人妙處君濳得勿輕漠漠一縷浮力遒可挂千鈞石眷予弟兄情不忘軸之逺􅀉悠然堂謝公遺髯凛若活衞后落鬒揺人光翻思長安夜飛蓋醉哦聲落南山外亂離契闊四十秋筆意與人俱老大政成着脚明河津外家風流今絶倫文章固自有機杼戯事豈足勞心神此章尤爲馳騁痛快且卒章含譏諷正中傅朋之癖予少時見二公所作殊敬愛之至今五十年尚能記憶懼其益乆而不傳故紀於此秀才之名秀才之名自宋魏以後實爲貢舉科目之最而今人恬於習玩毎聞以此稱之輙指爲輕巳因閱北史杜正玄傳載一事云隋開皇十五年舉秀才試䇿高第曹司以䇿過左僕射楊素素怒曰周孔更生尚不得爲秀才刺史何忽妄舉此人乃以䇿抵地不視時海内唯正玄一人應秀才曹司重以啓素素志在試退正玄乃使擬相如上林賦王褒聖主得賢臣頌班固燕然山銘張載劒閣銘白鸚鵡賦曰我不能爲君住宿可至未時令就正玄及時竝了素讀數徧大驚曰誠好秀才命曹司録奏蓋其重如此又正玄弟正藏次年舉秀才時蘇威􅁥選試擬賈誼過秦論尚書湯誓匠人箴連理樹賦几賦弓銘亦應時竝就又無􅀧竄然則可謂難矣唐書杜正倫傳云隋世重舉秀才天下不十人而正倫一門三秀才皆高第乃此也魏收作史魏收作元魏一朝史修史諸人多被書録飾以美言夙有怨者多没其善每言何物小子敢共魏收作色舉之則使上天案之當使入地故衆口喧然稱爲穢史諸家子孫前後投訴云遺其家世職位或云不見記録或云妄有非毀至於坐謗史而􅀗罪編配因以致死者其書今存視南北八史中最爲冗謬其自序云漢初魏無知封高良侯子均均子恢恢子彦彦子歆歆子恱恱子子建子建子收無知於收爲七代祖而世之相去七百餘年其妄如是則其述他人世系與夫事業可知矣容齋三筆卷第二終
