seq: 69
front:
  text: 三十六則宋洪邁撰
  hash: sha256:ad1a57be8bec64980555736e77e936b7dfefaf4a960e05c952dca3edfbcb188d
body:
  text: 韓退之張籍書韓公集中有答張籍二書其前篇曰吾子所論排釋老不若著書若僕之見則有異乎此請待五六十然後為之吾子又譏吾與人為無實駮雜之說此吾所以為戲耳若商論不能下氣或似有之博塞之譏敢不承教後篇曰二氏行乎中土蓋六百年非可以朝令而夕禁俟五六十為之未失也謂吾與人商論不能下氣若好勝者雖誠有之抑非好已勝也好己之道勝也駮雜之譏前書盡之昔者夫子猶有所戲烏害於道哉大略籍所論四事乞著書譏駮雜諌商論好勝及博塞也今得籍所與書前篇曰漢之衰浮圖之法入中國黄老之術相㳂而熾盍為一書以興存聖人之道執事多尚駮雜無實之説使人陳之前以為懽此有累於盛徳又商論之際或不容人之短如任私尚勝者亦有所累也况為博塞之戲與人競財乎廢棄日時不識其然願絶博塞之好棄無實之談𢎞慮以接士嗣孟軻揚雄之作使聖人之道復見於唐後篇曰老釋惑於生人乆矣執事可以任著書之事君子汲汲於所欲為若皆待五十六十而後有所為則或有遺恨矣君子發言舉足不逺於禮未聞以駮雜無實之說以為戲也執事毎見其說則拊抃呼笑是撓氣害性不得其正矣籍之二書甚勁而直但稱韓公為執事不曰先生考其時乃云執事參於戎府按韓公以貞元十二年為汴州推官時年二十有九十五年為徐州推官時年三十有二年位未盛籍未以師禮事之云韓公稱李杜新唐書杜甫傳贊曰昌黎韓愈於文章重許可至歌詩獨推曰李杜文章在光熖萬丈長誠可信云予讀韓詩其稱李杜者數端聊䟽於此石鼓歌曰少陵無人謫僊死才薄将柰石鼓何酬盧雲夫曰髙揖羣公謝名譽逺追甫白感至諴薦士曰勃興得李杜萬類困凌暴醉留東野曰昔年因讀李白杜甫詩長恨二人不相從感春曰近憐李杜無撿束爛漫長醉多文辭并唐志所引蓋六用之此日足可惜韓退之此日足可惜一首贈張籍凡百四十句雜用東冬江陽庚青六韻及其亡也籍作詩祭之凡百六十六句用陽庚二韻其語鏗鏘震厲全倣韓體所謂乃出二侍女合彈琵琶箏者是也粉白黛黑韓退之為文章不肯蹈襲前人一言一句故其語曰惟陳言之務去戞戞乎其難哉獨粉白黛緑四字似有所因列子周穆王築中天之臺簡鄭衞之處子娥媌靡曼者粉白黛黑以滿之戰國策張儀謂楚王曰鄭周之女粉白黛黒立於衢閒見者以為神屈原大招粉白黛黑施芳澤只司馬相如靚莊刻飾郭璞曰粉白黛黑也淮南子毛嬙西施施芳澤正娥眉設笄珥衣阿錫粉白黛黑笑目流眺韓公以黑為緑其㫖則同李杜徃來詩李太白杜子美在布衣時同游梁宋為詩酒㑹心之友以杜集考之其稱太白及懷贈之篇甚多如李侯金閨彦脫身事幽討南尋禹宂見李白道甫問訊今何如李白一㪷詩百篇自稱臣是酒中僊近來海内為長句汝與山東李白好昔者與髙李晩登單父臺李侯有佳句徃徃似隂鏗憶與髙李輩論交入酒壚白也詩無敵飄然思不羣昔年有狂客號爾謫僊人落月滿屋梁猶疑照顔色三夜頻夢君情親見君意秋來相顧尚飄蓬未就丹砂愧葛洪寂寞書齋裏終朝獨爾思凉風起天末君子意如何不見李生乆佯狂真可哀凡十四五篇至於太白與子美詩略不見一句或謂堯祠亭别杜補闕者是已乃殊不然杜但為右拾遺不曽任補闕兼自諫省出為華州司功迤邐避難入蜀未嘗復至東州所謂飯顆山頭之嘲亦好事者所撰耳李太白怖州佐李太白上安州裴長史書云白竊慕髙義得趨末塵何圖謗言忽生衆口攢毁将恐投杼下客震於嚴威若使事得其實罪當其身則将浴蘭沐芳自屏於烹鮮之地惟君侯死生之願君侯惠以大遇洞開心顔終乎前恩再辱英眄必能使精誠動天長虹貫日若赫然作威加以大怒即膝行而前再拜而去耳裴君不知何如人至譽其貴而且賢名飛天京天才超然度越作者稜威雄雄下慴羣物予謂白以白衣入翰林其蓋世英姿能使髙力士脫鞾於殿上豈拘拘然怖一州佐者邪蓋時有屈伸正自不得不爾大賢不偶神龍困於螻蟻可勝歎哉白此書自敘其平生云昔與蜀中友人吳指南死於洞庭之上白􅎭服慟哭炎月伏屍猛虎前臨堅守不動遂權殯於湖側數年來觀筋骨尚在雪泣持刃躬申洗削褁骨徒步負之而趨寢興攜持無輟身手遂丐貸營葬於鄂城其存交重義如此又與逸人東巖子隱於岷山巢居數年不跡城市養竒禽千計呼皆就掌取食了無驚猜其養髙忘機如此而史傳不為書之亦為未盡祝不勝詛齊景公有疾梁邱據請誅祝史晏子曰祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能勝億兆人之詛晉中行寅将亡召其太祝欲加罪曰子為我祝齋戒不敬使吾國亡祝簡對曰今舟車飾賦斂厚民怨謗詛多矣茍以為祝有益於國則詛亦将為損一人祝之一國詛之一祝不勝萬詛國亡不亦宜乎祝其何罪此二説若出一口真藥石之言也吕子論學吕子曰天生人而使其耳可以聞不學其聞則不若聾使其目可以見不學其見則不若盲使其口可以言不學其言則不若喑使其心可以智不學其智則不若狂故凡學非能益之也逹天性也能全天之所生而勿敗之可謂善學者矣此說甚美而罕為學者所稱故書以自戒曽太皇太后唐徳宗即位訪求其母沈太后厯順宗及憲宗時為曽祖母故稱為曽太皇太后蓋别於祖母也舊新二唐書紀皆載之今慈福太皇太后在夀康太上時已加尊稱若於主上則為曽祖母當用唐故事加曽字向者嘗以告宰相而省吏以為典故所無天子逮事三世安得有前比亦可謂不知禮矣又嗣濮王士歆在隆興為從叔祖在紹熈為曽叔祖慶元為髙叔祖矣而仍稱皇叔祖如故士歆視嗣秀王伯圭為從祖今圭稱皇伯祖而歆但為皇叔祖乃是弟爾禮寺亦以為國朝以來無稱曽髙者彼蓋不知累朝尊屬元未之有也中天之臺中天之臺有二其一列子曰西極化人見周穆王王為之改築宫室土木之功赭堊之色無遺巧焉五府為虚而臺始成其髙千仞臨終南之上名曰中天之臺其一新序曰魏王将起中天臺許綰負操鍤入曰臣能商臺王曰若何曰天與地相去萬五千里今王因而半之當起七千五百里之臺髙既如是其趾須方八千里盡王之地不足以為臺趾必起此臺先以兵伐諸侯盡有其地又伐四夷得方八千里乃足以為臺趾度八千里之外當定農畝之地足以奉給王之臺者臺具以備乃可以作王黙然無以應乃罷起臺實年官年士大夫敘官閥有所謂實年官年兩說前此未嘗見於官文書大抵布衣應舉必減歲數蓋少壯者欲藉此為求昏地不幸潦倒塲屋勉從特恩則年未六十始許入仕不得不豫為之圖至公卿任子欲其早列仕籍或正在童孺故率増擡庚甲有至數歲者然守義之士猶曰兒曹甫策名委質而父祖先導之以挾詐欺君不可也比者以朝臣屢言年及七十者不許任監司郡守搢紳多不自安爭引年以決去就江東提刑李信甫雖春秋過七十而官年損其五堅乞致仕有㫖官年未及與之外祠知房州章騆六十八歲而官年増其三亦求罷去諸司以其精力未衰援實為請有㫖聽終任知嚴州秦焴乞祠之䟽曰實年六十五而官年已踰七十遂得去齊慶胄寧國乞歸亦曰實年七十而官年六十七於是實年官年之字形於制書播告中外是君臣上下公相為欺也掌故之野甚矣此豈可紀於史録哉雷公炮炙論雷公炮炙論載一藥而能治重疾者今醫家罕用之聊志於此其説云髮眉墮落塗半夏而立生目辟眼􅀈有五花而自正脚生肉栨裩繋菪根囊皺漩多夜煎竹木體寒腹大全賴鸕鷀血泛經過飲調𤓰子咳逆數數酒服熟雄遍體􅇙風冷調生側腸虚泄利須假草零乆渴心煩宜投竹瀝除癥去塊全仗硝硇益食加觴須煎蘆朴强筋健骨湏是蓯鱓駐色延年精蒸神錦知瘡所在口㸃隂膠産後肌浮甘皮酒服腦痛鼻投硝末心痛速覔延胡凡十八項謂眉髮墮落者煉生半夏莖取涎塗髮落處立生五花者五加皮也葉有雄雌三葉為雄五葉為雌須使五葉者作末酒浸用之目􅀈者正脚有肉栨者取莨菪根繋裩帶上永痊多小便者煎萆薢服之永不夜起若患腹大如鼓米飲調鸕鷀末服立枯如故血泛行者搗甜𤓰子仁作末去油飲調服之立絶咳逆者天雄炮過以酒調一錢匕服􅇙風者側子附子傍生者作末冷酒服虚泄者搗五倍子末熟水下之癥塊者以硇砂硝石二味乳鉢中研作粉同煆了酒服神効不飲者并飲酒少者煎逆水蘆根并厚朴二味湯服之蓯蓉并鱓魚作末以黄精汁圓服之可力倍常日也黄精自然汁拌細研神錦於柳木甑中蒸七日了以蜜圓服顔貌可如㓜女之容色隂膠即是甑中氣垢㸃少許於口中即知臟腑所起直徹至住處知痛足可醫也産後肌浮酒服甘皮立枯頭痛者以硝石作末内鼻中立止心痛者以延胡索作散酒服之治藥捷法藥有至賤易得人所常用而難於修製者如香附子莵絲子艾葉之類醫家昧其節度或終日疲勞而不能成本草云凡莵絲子煖湯淘汰去沙土漉乾煖酒漬經一宿漉出暴微白搗之不盡者更以酒漬經三五日乃出更晒㣲乾搗之須㬰悉盡極易碎蓋以其顆細難施工其說亦殊勞費然自有捷法但撚紙條數枚寘其閒則馴帖成粉香附子洗去皮毛炒之焦熟然後舉投水鉢内候浸漬透徹漉出暴日中㣲燥乃入搗臼悉應手糜碎艾葉柔軟不可著力若入白茯苓三五片同碾則即時可作細末陳翠說燕后趙左師觸龍說太后使長安君出質用愛憐少子之說以感動之予嘗論之於隨筆中其事載於戰國策史記資治通鑑而燕語中又有陳翠一段甚相似云陳翠合齊燕将令燕王之弟為質於齊太后大怒曰陳公不能為人之國則亦已矣焉有離人子母者翠遂入見后曰人主之愛子也不如布衣之甚也非徒不愛子也又不愛丈夫子獨甚太后曰何也對曰太后嫁女諸侯奉以千金今王願封公子羣臣曰公子無功不當封今以公子為質且以為功而封之也太后弗聽是以知人主之不愛丈夫子獨甚也且太后與王幸而在故公子貴太后千秋之後王棄國家而太子即位公子賤於布衣故非及太后與王封公子則終身不封矣太后曰老婦不知長者之計乃命為行具此語與觸龍無異而史記不書通鑑不取學者亦未嘗言燕非强國北燕在春秋時最為僻小能自見於中國者不過三四大率制命於齊七雄之際為齊所取後賴五國之力樂毅為将然後勝齊然卒於得七十城不能守也故蘇秦說趙王曰趙北有燕燕固弱國不足畏也燕王曰寡人國小西迫強秦南近齊趙齊趙彊國也又曰天下之戰國七而燕處弱焉獨戰則不能有所附則無不重昭王謂郭隗曰孤極知燕弱小不足以報齊蘇代曰一齊之彊燕猶不能支奉陽君曰燕弱國也東不如齊西不如趙趙長平之敗壯者皆死燕以二千乗攻之為趙所敗太子丹謂荆軻曰燕小弱數困於兵何足以當秦楚漢之初趙王武臣為燕軍所得趙廝養卒謂其将曰一趙尚易燕况以兩賢王滅燕易矣彭寵以漁陽叛即時夷滅十六國之起戎狄亂華稱燕稱趙者多矣未嘗有只據幽薊之地者也獨安禄山以三十年節制之威又兼領河東乗天寳政亂出不意而舉兵史思明繼之雖為天下之禍旋亦殄滅至於藩鎮擅地所謂范陽盧龍固常受制於天雄成徳也劉仁恭守光父子僭竊一方唐莊宗遣周徳威攻之克取巡屬十餘州如拾地芥石晉割賂契丹仍其舊國恃以為强然晉開運陽城之戰徳光幾不免周世宗小振之立下三關但太平興國失於輕舉又不治敗将䘮師之罪致令披猖以迄于今若以謂幽燕為用武之地則不然也水旱祈禱海内雨暘之數郡異而縣不同為守為令能以民事介心必自知以時禱祈不待上命也而省部循案故例但視天府為節下之諸道轉運司使巡内州縣各詣名山靈祠精㓗致禱然固難以一槩論乾道九年秋贑吉連雨暴漲予守贑方多備土囊壅諸城門以杜水入凡二日乃退而臺符令禱雨予格之不下但據實報之已而聞吉州於小㕔設祈晴道塲大㕔祈雨問其故郡守曰請霽者本郡以淫潦為灾而請雨者朝㫖也其不知變如此殆為威侮神天幽冥之下将何所据慿哉俚語笑林謂兩商人入神廟其一陸行欲晴許賽以猪頭其一水行欲雨許賽羊頭神顧小鬼言晴乾喫猪頭雨落吃羊頭有何不可正謂此耳坡詩云耕田欲雨刈欲晴去得順風來者怨若使人人禱輒遂造物應須日千變此意未易為庸俗道也容齋四筆卷三欽定四庫全書容齋四筆卷
