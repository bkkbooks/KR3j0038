front:
  text: 四十五則
  hash: sha256:1db7c57bc107e77bed00d67b4444b8de1c3f03c673a6f7621238f5b9c3ce234f
body:
  text: 宋洪邁撰三豎子趙爲秦所圍使平原君求救於楚楚王未肯定從毛遂曰白起小豎子耳興師以與楚戰舉鄢郢燒夷陵辱王之先人此百世之怨也是時起已數立大功且勝於長平矣人告韓信反漢祖以問諸將皆曰亟發兵坑豎子耳帝黙然唯陳平以爲兵不如楚精諸將用兵不能及信英布反書聞上召諸將問計又曰發兵擊之阬豎子耳夫白起信布之爲人材能不可揜以此三人爲豎子是天下無復有壯士也毛遂之言秖欲激怒楚王使之知合從之利害故不得不以起爲懦夫至如高帝諸將不過周勃樊噲之儔韓信因執而歸棲棲然處長安爲列侯蓋一匹夫也而噲喜其過已趨拜送迎言稱臣況於據有全楚萬乘之地事力强弱安可同日而語英布固嘗言諸將獨患淮陰彭越今皆已死餘不足畏則豎子之對可謂勇而無謀殆與張儀詆蘇秦爲反覆之人相似高帝黙然顧深知其非也至於陳平則不然矣若乃韓信謂魏將栢直爲豎子則誠然栢直庸庸無所知名漢王亦稱其口尚乳臭眞一豎子也阮籍登廣武歎曰時無英雄使豎子成名蓋歎是時無英雄如昔人者俗士不達以爲籍譏漢祖雖李太白亦有是言失之矣樞宻稱呼樞宻使之名起於唐本以宦者爲之蓋内諸司之貴者耳五代始以士大夫居其職遂與宰相等自此接于本朝又有副使知院事同知院事簽書同簽書之别雖品秩有高下然均稱爲樞宻明道中王沂公自故相召爲撿校太師樞宻使李文定公爲集賢相以書迎之於國門稱曰樞宻太師相公予家藏此帖紹興五年高宗車駕幸平江過秀州執政從行者四人在前者傳呼宰相趙忠簡也次呼樞密張魏公也時爲知院事次呼參政沈必先也最後又呼樞密則簽書權朝美云予爲撿詳時葉審言黃繼道爲長貳亦同一稱而二三十年以來遂有知院同知之目初出於典謁街卒之口乆而朝士亦然名不雅古莫此爲甚從官事體國朝優待侍從故事體名分多與庶僚不同然有處之合宜及肆意者如任知州申發諸司公狀不繫銜與安撫監司序官徃還用大狀不書年引接用朱衣通判入都㕔之類皆雜著於令式其明載國史者尚可考大中祥符五年六月詔尚書丞郎兩省給諫知州府而本部郎中員外郎及兩省六品以下官充本路轉運使副者承前例須申報雖職當統攝方委於事權而官有等差宜明於品級自今知制誥觀察使以上知州府處所申轉運司狀並止簽案撿令通判以下具銜供申張詠以禮部尚書知昇州上言臣官忝六曹祠部乃本行司局而例申公狀似未合宜望自今尚書丞郎知州者除申省外其本行曹局止簽案撿從之紹興中范同以前執政知太平州官係中大夫不帶職申諸司狀繫銜提刑張絢封還之范竟不改次年轉太中再任始去之劉焞爲江西運判移牒屬郡知通云請聮銜具報邁時以太中守贑以於式不可乃作公劄同通判簽書劉邦翰曾任權侍郎以朝議大夫集英修撰知饒州趙􅀈以承議郎提㸃刑獄欲居其上劉不挍趙又畏人議已於是遇朝拜國忌日先後行香王十朋自侍御史徙權吏部侍郎不拜除集撰知饒州自處如庶官林大中亦自侍御史改吏侍不曾供職除直寳文閣知贑州全銜猶帶權知兼勸農事借紫而盡用從官禮數黃渙爲通判入都㕔爲之不平鄭汝諧除權侍郎爲東省所繳不得供職而以祕撰知池州公狀至提刑司不繫銜爲鄧馹牒問唐瑑以司農少卿王佐以中書撿正皆暫兼權户侍及出知湖饒二州悉用朱衣䨇引此數君皆失於討問典章非故爲尊大也陳居仁以大中集撰知鄂州只用一朱衣蓋在法學士乃雙引人以爲得體邁頃守贑建官職與居仁等而誤用兩朱殊以自悔又如監司見前執政雖本路並客位下馬伯氏以故相帶觀文學士帥越提舉宋藻穿㦸門訶殿云浙東監司如何不得穿紹興府門將至㕔事始若勉就客位者主人亟令掖以還九朝國史本朝國史凡三書太祖太宗眞宗曰三朝仁宗英宗曰兩朝神宗哲宗徽宗欽宗曰四朝雖各自紀事至於諸志若天文地理五行之類不免煩複元豐中三朝已就兩朝且成神宗專以付曽鞏使合之鞏奏言五朝舊史皆累世公卿道徳文學朝廷宗工所共凖裁旣已勒成大典豈宜輒議損益詔不許始謀篹定會以憂去不克成其後神哲各自爲一史紹興初以其是非褒貶皆失實廢不用淳熈乙巳邁承乏修史丙午之冬成書進御遂請合九朝爲一壽皇即以見屬嘗奏云臣所爲區區有請者蓋以二百年閒典章文物之盛分見三書倉卒討究不相貫屬及累代臣僚名聲相繼當如前史以子係父之體類聚歸一若夫制作之事則已經先正名臣之手是非褒貶皆有据依不容妄加筆削乞以此奏下之史院俾後來史官知所以編纘之意無或輒將成書擅行刪改上曰如有未穩處改削無害邁旣奉詔開院亦修成三十餘卷矣而有永思攢宫之役纔歸即去國尤袤以高宗皇帝實録爲辤請權罷史院於是遂已祥符中王旦亦曾修撰兩朝史今不傳銀牌使者金國每遣使出外貴者佩金牌次佩銀牌俗呼爲金牌銀牌郎君北人以爲契丹時如此牌上若篆字六七或云阿骨打花押也殊不知此本中國之制五代以來庶事草創凡乘置奉使於外但給樞密院牒國朝太平興國三年因李飛雄矯乘廐馬詐稱使者欲作亂旣捕誅之乃詔自今乘驛者皆給銀牌國史云始復舊制然則非起於虜也端拱二年復詔先是馳驛使臣給篆書銀牌自今宜罷之復給樞密院牒省錢百陌用錢爲幣本皆足陌梁武帝時以鐵錢之故商賈浸以姦詐自破嶺以東八十爲百名曰東錢江郢以上七十爲百名曰西錢京師以九十爲百名曰長錢大同元年詔通用足陌詔下而人不從錢陌益少至于末年遂以三十五爲百唐之盛際純用足錢天祐中以兵亂窘乏始令以八十五爲百後唐天成又減其五漢乾祐中王章爲三司使復減三皇朝因漢制其輸官者亦用八十或八十五然諸州私用猶有隨俗至於四十八錢太平興國二年始詔民閒緍錢定以七十七爲百自是以來天下承用公私出納皆然故名省錢但數十年來有所謂頭子錢每貫五十六除中都及軍兵俸料外自餘州縣官民所當得其出者每百纔得七十一錢四分其入者每百爲八十二錢四分元無所謂七十七矣民閒所用多寡又益不均云舊官銜冗贅國朝官制沿晩唐五代餘習故階銜失之冗贅予固已數書之比得皇祐中李端愿所書雪竇山三大字其左云鎭潼軍節度觀察留後金紫光禄大夫撿校刑部尚書使持節華州諸軍事華州刺史兼御史大夫上柱國凡四十一字自元豐以後更使名罷文散階撿校官持節憲銜勲官只云鎭潼軍承宣使六字比舊省去三十五可謂簡要會稽禹廟有唐天復年越王錢鏐所立碑其全銜九十五字尤爲冗也吏胥侮洗文書郡縣胥史揩易簿案鄉司尤甚民已輸租稅朱批於户下矣有所求不遂復洗去之邑官不能察而又督理比其持赤鈔爲證則追逮橫費爲害已深此特小小者耳臺省亦然予除翰林日所被告命後擬云可特授依前正奉大夫充翰林學士蓋初書黃時全文故官告院據以爲式其制當爾而告身全銜亦云告正奉大夫充翰林學士予以語吏部蕭照鄰尚書曰如此則學士繫銜在官下於故事有戾今欲書謝表當如何蕭悚然旋遣部主事與告院書吏至乞借元告以去明日持來則已改正移職居官上但減一充字於行内微覺踈其外印文濃淡了無異其妙至此宣告錯誤士大夫告命閒有錯誤如文官則猶能自言書舖亦不敢大有邀索獨右列爲可憐而軍伍中出身者尤甚予撿詳宻院諸房日有涇原副都軍頭乞換授而所持宣内添注副字爲房吏所沮都頭者不能自明兩樞宻以事見付予視所添字與正文一體以白兩樞曰使訴者爲姦當妄增品級不應肯以都頭而自降爲副其爲寫宣房之失無可疑也樞以爲然乃爲改正武翼郎李靑當磨勘尚左驗其文書其始爲大李靑吏以爲罔冒靑無詞以答周茂振權尚書閱其告命十餘通其一告前云大李靑而告身誤去大字故後者相承只云李靑即日放行遷秩且給公據付之兩人者幾困於吏手幸而獲直用是以知枉鬱不伸者多矣軍中抵名爲官紹興以來兵革務煩軍中將校除官者大帥盡藏其告命只語以所居官其有事故亡没者亦不關申省部除籍或徑以付他人至或從白身便爲郎大夫者楊和王爲殿帥罷一統領使歸部而申樞宻院云此人元姓名曰許超只是校尉偶有修武郎李立告使之鼎名因得冒轉續以戰功積累今爲武顯大夫旣已離軍自合依本姓名及元職位超詣院訴而不能爲之詞予撿詳兵房爲言曰一時冒與自是主將之命修武以前固非此人當得若武翼之後皆用軍功使其戰死於陣則性命須要超承當今但當剋除不應得九官而理還其餘資庶合人情於理爲順兩樞宻甚然予說即奏行之禍福有命秦氏顓國得志益厲刑辟以箝制士大夫一言語之過差一文詞之可議必起大獄竄之嶺海於是惡子之無俾者恃告訐以進趙超然以君子之澤五世而斬責汀州吳仲寶以夏二子傳流容州張淵道以張和公生日詩幾責柳而幸脫皆是也予教授福州日因訪何大圭忽問君識天星乎答曰未之學曰豈不能認南方中夏所見列宿乎曰此却粗識一二大圭曰君今夕試仰觀熒惑何在是時正見於南斗之西後月餘再相見時連旬多隂所謂火曜已至斗魁之東矣大圭曰使此星入南斗自有故事予聞其語固已竦然明日來相訪曰吾曹元不洞曉天文昨晩葉子廉見顧言及於此蹙頞云是名魏星無人能識非熒惑也予曰十二國星只在牛女之下經星不動安得轉移圭曰乾象欲示變何所不可子廉云後漢建安二十五年亦曾出蓋秦正封魏國公圭意比之曹操予大駭不復敢酬應他日與謝景思葉晦叔言之且曰使邁爲小人告訐之舉有所不能萬一此段彰露爲之柰何謝葉曰可以言命矣與是人相識便是不幸不如靜以待之時歳在己巳又六年秦亡予知免禍乃始不恐眞宗北征眞宗親征契丹幸澶淵以成却敵之功是時景徳元年甲辰決此計者宼萊公也然前五歳當咸平二年己亥契丹宼北邊上自將禦之至澶州大名府聞范廷召破之於莫州北乃還京時張文定公李文靖公爲相不知何人贊此決而後來不傳用是以知眞宗非宴安酖毒而有所畏者故宼公易以進言宰相不次補景徳元年七月宰相李沆薨時無他相中書有參知政事王旦王欽若不次補宼準爲三司使眞宗欲相之患其素剛難獨任乃先以翰林侍讀學士畢士安爲參政纔一月並命士安凖爲相而士安居上旦欽若各遷官而已凖在太宗朝已兩爲執政今士安乃由侍從超用惟辟作福圖任大臣蓋不應循循厯階而升也外制之難中書舍人所承受詞頭自唐至本朝皆只就省中起草付吏逮於告命之成皆未嘗越日故其職爲難其以敏捷稱者如韋承慶下筆輒成未嘗起草陸扆初無思慮揮翰如飛顔蕘草制數十無妨談笑鄭畋動無滯思同僚閣筆劉敞臨出局倚馬一揮九制皆見書於史䇿其遲鈍窘擾者如陸餘慶至晩不能裁一言和㠓閉戸精思徧討羣籍與夫斵䆫舍人紫微失却張君房之類蓋以必欲速成故也周廣順初中書舍人劉濤責授少府少監分司西京坐遣男頊代草制詞也頊時爲監察御史亦責復州司户自南渡以來典故散失每除書之下先以省劄授之而續給告以是遷延稽滯段拂居官時纔還家即掩關謝客畏其趣詞命也先公使虜歸除徽猷閣直學士時劉才邵當制日於漏舍囑之至先公出知饒州幾將一月猶未受告其他倩諉朋舊俾之假手者多矣故膺此選者不覺其難殊與昔異文臣換武使祖宗之世文臣換授武使皆不越級錢若水自樞密副使罷守工部侍郎後除帥并州乃換鄧州觀察使王嗣宗以中書侍郎李士衡以三司使李維以尚書王素以端明左丞亦皆觀察慶厯初以陜西四帥方禦夏羌欲優其俸賜故韓琦范仲淹王沿龎籍皆以樞宻龍圖直學士換爲廉車自南渡以來始大不然張澄以端明學士楊倓以敷文學士便爲節度近者趙師夔吳琚以待制而換承宣使不數月閒遇恩即建節鉞師揆師垂以祕閣修撰換觀察使皆度越彞憲誠異恩也容齋三筆卷四欽定四庫全書卷容齋三筆卷
