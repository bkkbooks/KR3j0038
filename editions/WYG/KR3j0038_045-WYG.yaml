front:
  text: 九十六則
  hash: sha256:008f56a87d0905ffebe65c65434e181f1147e3680b36d2a8878e61659ca85c95
body:
  text: 宋洪邁撰樞密兩長官趙汝愚初拜相陳騤自參知政事除知樞密院趙辭不受相印乃改樞密使而陳已供職累日朝論謂兩樞長又名稱不同為無典故按熙寧元年觀文殿學士新知大名府陳升之過闕留知樞密院故事樞密使與知院事不並置時文彦博吕公弼既為使神宗以升之三輔政欲稍異其禮且王安石意在抑彦博故特命之然則自有故事也赦放債負淳熙十六年二月登極赦凡民間所欠債負不以久近多少一切除放遂有方出錢旬日未得一息而并本盡失之者人不以為便何澹為諫大夫嘗論其事遂令只償本錢小人無義㡬至喧譟紹熙五年七月覃赦乃只為蠲三年以前者按晉髙祖天福六年八月赦云私下債負取利及一倍者並放此最為得又云天福五年終以前殘稅並放而今時所放官物常是以前二年為斷則民已輸納無及於惠矣唯民間房賃欠負則從一年以前皆免比之區區五代翻有所不若也馮道王溥馮道為宰相歴數朝當漢隠帝時著長樂老自敘云余先自燕亡歸河東事莊宗明宗愍帝清泰帝晉髙祖少帝契丹主漢髙祖今上三世贈至師傅階自將仕郎至開府儀同三司職自幽州巡官至武勝軍節度使官自試大理評事至兼中書令正官自中書舍人至戎太傅漢太師爵自開國男至齊國公孝於家忠於國已無不道之言門無不義之貨下不欺於地中不欺於人上不欺於天其不足者不能為大君致一統定八方誠有愧於歴官何以答乾坤之施老而自樂何樂如之道此文載於范質五代通録歐陽公司馬温公嘗詆誚之以為無廉恥矣王溥自周太祖之末為相至國朝乾徳二年罷嘗作自問詩述其踐歴其序云予年二十有五舉進士甲科從周祖征河中改太常丞登朝時同年生尚未釋褐不日作相在廊廟凡十有一年歴事四朝去春恩制改太子太保每思菲陋當此榮遇十五年間遂躋極品儒者之幸殆無以過今行年四十三嵗自朝請之暇但宴居讀佛書歌詠承平因作自問詩十五章以志本末此序見三朝史本𫝊而詩不𫝊頗與長樂敘相類亦可議也周𤣥豹相唐莊宗時術士周𤣥豹以相法言人事多中時明宗為内衙指揮使安重誨使他人易服而坐召𤣥豹相之𤣥豹曰内衙貴將也此不足當之乃指明宗於下坐曰此是也因為明宗言其後貴不可言明宗即位思𤣥豹以為神將召至京師宰相趙鳯諌乃止觀此事則𤣥豹之方術可知然馮道初自燕歸太原監軍使張承業辟為本院巡官甚重之𤣥豹謂承業曰馮生無前程不可過用書記盧質曰我曽見杜黄裳寫真圖道之狀貌酷類焉將來必副大用𤣥豹之言不足信也承業於是薦道為霸府從事其後位極人臣考終牖下五代諸臣皆莫能及則𤣥豹未得擅唐許之譽也道在晉天福中為上相詔賜生辰器幣道以㓜屬亂離早䘮父母不記生日懇辭不受然則道終身不可問命獨有形狀可相而善工亦失之如此鈷鉧滄浪柳子厚鈷鉧潭西小邱記云邱之小不能一畝問其主曰唐氏之棄地貨而不售問其價曰止四百予憐而售之以兹邱之勝致之澧水鄠杜則貴游之士爭買者日増千金而愈不可得今棄是州也農夫漁父過而陋之賈四百連嵗不能售蘇子羙滄浪亭記云予游呉中過郡學東顧草樹鬱然崇阜廣水不類乎城中並水得微徑於雜花修竹之間東趨數百歩有棄地三向皆水旁無民居左右皆林木相虧蔽予愛而裴回遂以錢四萬得之予謂二境之勝絶如此至於人棄不售安知其後卒為名人賞踐如滄浪亭者今為韓蘄王家所有價直數百萬矣但鈷鉧復埋没不可識士之處世遇與不遇其亦如是哉司封失典故南渡之後臺省胥吏舊人多不存後生習學加以省記不復諳悉典章而司封以閒曹之故尤為不謹舊法大卿監以上贈父至太尉止餘官至吏部尚書止今司封法餘官至金紫光禄大夫盖昔之吏書也而中散以上贈父至少師止按政和以前太尉在太傅上其上唯有太師故凡稱攝太尉者皆為攝太傅則贈者亦應如此不應但許至少師也生為執政其身後但有子升朝則累贈可至極品大國公歐陽公位參知政事太子少師後以諸子恩至太師兖國公而其子棐亦不過朝大夫耳見於蘇公祭文及黄門所撰神道碑比年汪莊敏公任樞密使以子贈太師當封國公而司封以為須一子為侍從乃可竟不肯施行不知其說載於何法也朱漢章却以子贈至大國公舊少卿監遇恩封開國男食邑三百户自後再該加封則每次増百户無止法今一封即止舊學士待制食邑千五百户以上每遇恩則加實封若虚邑五百者其實封加二百虚邑三百二百者實封加一百今復不然雖前執政亦只加虚邑三百耳故侍從官多至實封百户即止尤可笑也老人該恩官封晁無咎作積善堂記云大觀元年大赦天下民百嵗男子官婦人封仕而父母年九十官封如民百嵗於是故漳州軍事判官晁仲康之母黄氏年九十一矣其第四子仲詢走京師狀其事省中為漳州請漳州雖没赦令初不異往者丞相以為可而上之封夀光縣大君今自乾道以來慶典屢下仕者之父母年七十八十即得官封而子已没者其家未嘗陳理為可惜也學士中丞淳熙十四年九月予以雜學士除翰林學士蔣世修以諫議大夫除御史中丞時施聖與在政府語同列云此二官不常置今咄咄逼人吾輩當自㸃撿盖謂其必大用也已而皆不然因考紹興中所除者不暇縷述姑從夀皇聖帝以後至于紹熙五年枚數之為學士者九人仲兄文安公史魏公伯兄文惠公劉忠肅王日嚴王魯公周益公及予其後李獻之也二兄史劉王周皆擢執政日嚴以耆老拜端明致仕唯予出補郡獻之遂踵武為中丞者六人辛企李姚令則黄徳潤蔣世修謝昌國何自然也辛姚黄皆執政唯蔣補郡昌國徙權尚書即去國自然以本生母憂持服云漢髙祖父母姓名漢髙祖父曰太公母曰媪見於史者如是而已皇甫謐王符始撰為竒語云太公名執嘉又名燸媪姓王氏唐洪文館學士司馬貞作史記索隠云母温氏是時打得班固泗水亭長古石碑文其字分明作温云母温氏與賈膺復徐彦伯魏奉古等執對反覆深嘆古人未聞聊記異見予竊謂固果有此明證何不載之於漢紀疑亦後世好事者如皇甫之徒所増加耳又嘗在嶺外見康州龍媪廟碑亦云姓温氏則指媪為温者不一也唐小說纂異記載三史王生醉入髙祖廟見髙祖云朕之中外泗州亭長碑昭然具載外族温氏盖不根誕妄之說君臣事迹屏風唐憲宗元和二年製君臣事跡上以天下無事留意典墳每覽前代興亡得失之事皆三復其言遂采尚書春秋後傳史記漢書三國志晏子春秋呉越春秋新序說苑等書君臣行事可為龜鑑者集成十四篇自製其序寫於屏風列之御座之右書屏風六扇於中宣示宰臣李藩等皆進表稱賀白居易翰林制詔有批李夷簡及百寮嚴綬等賀表其畧云取而作鑑書以為屏與其散在圗書心存而景慕不若列之繪素目覩而躬行庶將為後事之師不獨觀古人之象又云森然在目如見其人論列是非既庶㡬為坐隅之戒發揮獻納亦足以開臣下之心居易代言可謂詳盡又以見唐世人主作一事而中外至於表賀又答詔勤渠如此亦㡬於叢脞矣憲宗此書有辨邪正去奢泰兩篇而末年用皇甫鎛而去裴度荒於遊宴死於宦侍之手屏風本意果安在哉僧道科目唐末帝清泰二年二月功徳使奏每年誕節諸州府奏薦僧道其僧尼欲立講論科講經科表白科文章應制科持念科襌科聲贊科道士經法科講論科文章應制科表白科聲贊科焚修科以試其能否從之此事見舊五代史記不知曽行與否至何時而罷也盖是時猶未鬻賣祠部度牒耳周世宗廢併寺院有詔約束云男年十五以上念得經文一百紙或讀得五百紙女年十三以上念得經文七十紙或讀得三百紙者經本府陳狀乞剃頭委録事參軍本判官試驗兩京大名京兆府青州各起置戒壇候受戒時兩京委祠部差官引試其三處祇委判官逐處聞奏侯勑下委祠部給付憑由方得剃頭受戒其防禁之詳如此非若今時只納錢于官便可出家也念經讀經之異疑為背誦與對本云射佃逃田漢之法制大抵因秦而随宜損益不害其為炎漢唐之法制大抵因隋小加振飾不害其為盛唐國家當五季衰亂之後其究不下秦隋然一時設施固亦有可采取按周世宗顯徳二年詔應逃戸莊田並許人請射承佃供納税租如三周年内本戸來歸者其桑田不計荒熟並交還一半五周年内歸業者三分交還一分如五周年外除本戸墳塋外不在交付之限其近北諸州䧟蕃人户來歸業者五周年内三分交還二分十周年内還一半十五周年内三分還一此外者不在交還之限其㫖明白人人可曉非若今之令式文書盈於几閣為猾吏舞文之具故有捨去物業三五十年妄人詐稱逃戸子孫以錢買吏而奪見佃者為可歎也周世宗好殺史稱周世宗用法太嚴羣臣職事小有不舉往往置之極刑予既書于續筆矣薛居正舊史記載其事甚備而歐陽公多芟去今畧記于此樊愛能何徽以用兵先潰軍法當誅無可言者其他如宋州巡檢供奉官竹奉璘以捕盜不獲左羽林大將軍孟漢卿以監納取耗刑部員外郎陳渥以撿田失實濟州馬軍都指揮使康儼以橋道不謹内供奉官孫延希以督修永福殿而役夫有就瓦中噉飯者密州防禦副使侯希進以不奉使者命撿視夏苗左藏庫使符令光以造軍士袍襦不辦楚州防禦使張順以隠落税錢皆抵極刑而其罪有不至死者孟字義訓一字數義固有之矣若孟字只是最長最先之稱如所謂孟侯孟孫元妃孟子孟春孟夏之類是也國語優施謂里克妻曰主孟㗖我注云大夫之妻稱主從夫稱也而謂孟為里克妻字則非矣又云孟一作盍史記吕后本紀注中引此句而司馬貞索隱乃云孟者且也言且㗖我物其說無所據班固幽通賦盍孟晉以迨羣李善乃注孟為勉蜀王衍書其臣徐延瓊宅壁為孟言蜀語謂孟為弱故以戯之其後孟知祥得蜀館于徐第以為已䜟此義又為無稽也東坡與歐陽叔弼詩云主孟當㗖我玉鱗金鯉魚正用優施語魯之寳刀曰孟勞不詳其義向巨原詩亡友向巨原自少時能作詩予初識之於梁宏夫坐上未深知之也是日偕二友從呉傅朋游芝山登五老亭以駕言出游分韻賦詩巨原得駕字其語云兹山何巍巍氣欲等嵩華從公二三子勝日飽閒暇躋攀謝車輿自辦兩不借捫蘿覔幽隥行椒得孤榭側送夕陽移俯視髙鳥下登臨記曩昔嵗月驚代謝却數一周星復命千里駕身從泛梗流事與浮雲化朅來共一尊似為天所赦明發還問塗合離足悲咤詩成觀者皆服傅朋游絲詩卷數百篇巨原獨不深嘆羙之頗記其數句曰先生著名節百世追延陵我評先生賢不以能書稱功成磨蒼崖盛徳頌日昇勿書陵雲榜華顛踏髙層句格超峻其㫖皆有規諷與前所紀劉彦冲古風相類也後裒其平生所作數千篇目為葵齋雜藁倩予為序時予在章貢及序成持寄之則已卧病僅能於枕上一讀而已巨原初見韓子蒼得一詩曰老子真祠地君來覔紙題文如士衡俊年與正平齊聞說鍾陵郡官居章水西涪翁詩律在佳處可時携而韓集佚不收但見序中耳葉晦叔詩亡友葉黯晦叔嘗除勅令所刪定官紹興十九年為福建帥屬予嘗因春補諸生白于府主邀與同考校鎻宿貢院兩旬予作長句云沈沈廣厦清如水市聲人聲不到耳一間十日豈天賜慙愧紛紛白袍子相逢更得金玉人久矣眼中無此士連牀夜語不成寐往往雞聲忽驚起是中差樂真難名昔者相過安得此但憐時節不相謀正墮清明寒食裏梨花已空海棠謝外閒物色知餘㡬只恐雨風摧折之負此一春吾過矣謝公尋山飽閒暇應笑腐儒黏故紙錦囊得句應已多萬一相思頻寄似時謝景思為參議官故卒章簡之晦叔和篇云文章萬言抵杯水世上虚名徒爾耳我常自笑一生癡那更將癡笑羣子大屋沈沈餘百年到今所閱知㡬士看渠得失自偶然其間悲喜從何起君聞我言亦大笑為說萬事揔如此缺兩句急須了却公家事門外不知春有㡬缺三句飛雨時聞打䆫紙他年萬一復相從未必從容今日似其語意超新惜不能盡憶又嘗云五十六言大抵多引韻起若以側句入尤峻健如老杜幽棲地僻經過少老病人扶再拜難是也然此猶是作對若以散句起又佳如苦憶荆州醉司馬謫官樽爼定常開是也故予自福倅滿歸晦叔以二詩送别正用此體一章云一門伯仲知誰似四海文章正數君何事與予如舊識由來於世兩相聞閒官各喜光隂賸勝地空多物色分忽復翩然從此去便應變化上青雲二章云此地相從驚嵗晚登臨况是客歸時却將襟抱向誰可正爾艱難惟子知情到中年工作惡别於生世易為悲梅花盡醉清江上黯澹西風凍雨垂可謂竒作然相别不兩年即下世每誦味其語輒為悽然因刻所作容齋記嘗識于末容齋三筆卷九欽定四庫全書容齋三筆卷
