front:
  text: 時敢自意於來歸遂悉還於所奪茲盖忘人之過與天同功念臣昔麗於微文蔽罪本無於他意故從數赦俾獲自新書印既畢父兄復共議秦檜方擅國見此表語言未必不怒乃别草一通引咎曰使指稽留宜速虧除之戾聖恩深厚卒從抆拭之科仰服矜憐唯知感戴伏念臣早繇乏使遂俾行成值巨宼之臨衝欲搏人而肆毒仗節宜圖於報稱引車何事於逡巡徐偃出疆既失受辭之體申舟假道初無必死之心雖蒙貶秩以小懲尚許立功而自贖徒行萬里無補一毫敢妄冀於隆寛乃悉還於舊貫茲盖忘人之過撫下以仁陽為徳而隂為刑未嘗私意賞有功而赦有罪皆本好生坐使孤臣盡湔宿負云云前後奉使無有不轉官者先公以朝散郎被命不沾恩凡十五年而歸僅復所貶而合磨勘五官刑部皆不引用秦志也遂終於此階
