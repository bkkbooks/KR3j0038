body:
  text: 四六名對四六駢儷於文章家為至淺然上自朝廷命令詔册下而縉紳之閒牋書祝䟽無所不用則屬辭比事固宜警䇿精切使人讀之激卬諷味不厭乃為得體姑摭前輩及近時綴緝工緻者十數聮以詒同志王元之擬李靖平突厥露布其敘頡利求降且復謀竄曰穽中餓虎暫為掉尾之求韝上饑鷹終有背人之意蘄州謝上表曰宣室鬼神之問敢望生還茂陵封禪之書已期身後范文正公微時嘗冐姓朱及後歸本宗作啟曰志在逃秦入境遂稱於張禄名非霸越乗舟偶効於陶朱用范睢范蠡皆當家故事鄧潤甫行貴妃制曰關雎之得淑女無險詖私謁之心雞鳴之思賢妃有警戒相成之道紹聖中百僚請御正殿表曰皇矣上帝必臨下而觀四方大哉乾元當統天而始萬物東坡坤成節䟽曰至哉坤元徳既超於載籍養以天下福宜冠於古今慰國哀表曰大哉孔子之仁泫然流涕至矣顯宗之孝夢若平生謝賜帶馬表曰枯羸之質匪伊垂之而帶有餘歛退之心非敢後也而馬不進王履道大燕樂語曰五百里采五百里衞外包有截之區八千嵗春八千嵗秋上祝無疆之夀除少宰余深制曰盖四方其訓以無競維人必三后協心而同底于道時并蔡京為三相也執政以邊功轉官詞曰惟皇天付予庶其在此率寧人有指敢弗于從翟公巽行外國王加恩制曰宗祀明堂所以教諸侯之孝大賚四海不敢遺小國之臣知越州日以擅發常平倉米救荒降官謝表曰敢効秦人坐視越人之瘠既安劉氏理知晁氏之危孫仲益試詞科日代髙麗國王謝賜燕樂表曰玉帛萬國干舞已格於七旬簫韶九成肉味遽忘於三月又曰蕩蕩乎無能名雖莫見宫墻之羙欣欣然有喜色咸豫聞管籥之音自中書舍人知和州既壓境見任者拒不納以啟答郡僚曰雖文書銜袖大人不以為疑然君命在門將軍為之不受鄰郡不發上供錢米受㫖推究為平亭其事鄰守馳啟來謝答之曰包茅不入敢加問楚之師輔車相依自作全虞之計汪彦章作靖康册康王文曰漢家之厄十世宜光武之中興獻公之子九人惟重耳之尚在為中書舍人試潭州進士何烈卷子内稱臣及聖問不舉覺坐罷職謝表曰謂子路使門人為臣雖誠誖理而徐邈云酒中有聖初亦何心又曰書馬者與尾而五常負譴憂網禽而去面之三永銜生賜宋齊愈坐於金虜立諸臣狀中輒書張邦昌字送御史臺責詞曰義重於生雖匹夫不可奪志士失其守或一言㡬於䘮邦又曰眭孟五行之說豈所宜言袁宏九錫之文兹焉安忍責張邦昌詞曰雖天奪其𠂻坐愚至此然君異於器代匱可乎知徽州其鄉郡也謝啟曰城郭重來疑千載去家之鶴交游半在或一時同隊之魚何掄除祕書少監未㡬以口語出守卭謝啟曰雲外三山風引舟而莫近海濱八月槎犯斗以空還楊政除太尉湯岐公草制曰逺覽漢京𫝊楊氏者四世近稽唐室書系表者七人謂楊震子秉秉子賜賜子彪四世為太尉李徳裕辭太尉云國朝重惜此官二百年間纔七人其用事精確如此蔣子禮拜右相王詗賀啟曰早登黄閣獨見明公之妙年今得舊儒何憂左轄之虚位皆用杜詩語扈聖登黄閣明公獨妙年左轄頻虚位今年得舊儒亦可稱吾家四六乾道初年張魏公以右相都督江淮議者謂兩淮保障不可恃公親往視之㑹詔歸朝未至而免相文惠公當制其詞曰棘門如兒戯耳庸謹秋防衮衣以公歸兮庶聞辰告所謂兒戯者指邊將也而讀者乃以為詆魏公其尾句曰春秋責備賢者慨功業之惟艱天子加禮大臣固始終之不替所以悵惜之意至矣王太寳致仕詞曰閔勞以事聖王隆待下之仁歸絜其身君子盡遺榮之羙大寳有遺泄之疾或又謂有所譏而實不然罷相後起帥浙東謝表曰上丞相之印方事退藏懐㑹稽之章遽叨進用謝生日詩詞啟曰五十當貴適買臣治越之年八千為秋辱莊子大椿之譽時正五十嵗也紹興壬戍詞科代樞密使謝賜玉帶表文安公曰有璞於此必使琢恍驚制作之工匪伊垂之則有餘允謂便蕃之賜主司喜焉擢為第一乙丑年代謝賜御書周易尚書表予曰八卦之說謂之索奉以周旋百篇之義莫得聞坦然明白尾句曰但驚奎壁之輝從天而下莫測龜龍之祕行地無疆亦忝此選代福州謝歴日表曰神祗祖考既安樂於太平嵗月日時又明章於庶證正用詩鳬鷖序太平之君子能持盈守成神祗祖考安樂之也洪範庶徴嵗月日時無易百榖用成乂用明俊民用章皆上下聫文未嘗輒增一字淵聖乾龍節䟽曰應天而行早得尊於大有象日之動偶蒙難於明夷易大有卦柔得尊位應乎天而時行左𫝊叔孫豹筮遇明夷象日之動故曰君子于行彖辭云内文明而外柔順以蒙大難亦純用本文乾道丁亥南郊赦文曰皇天后土監于成命之詩藝祖太宗昭我思文之配讀者以為壯後語曰天地設位而聖人成能既撲緼紛之況雷雨作解而君子赦過式流汪􅐮之恩此文先三日鎻院所作冬至日適有雷雪之異殆成䜟云葉子昻參知政事為諫議大夫林安宅所擊罷去林遂副樞密已而置獄治其言皆無實林責居筠葉召拜左揆予草制曰既從有北之投亟下居東之召有欲為王留者孰明去就之忠無以我公歸兮大慰瞻儀之望本意用公歸之句指邦人而言也故云瞻儀而御史單時疑之謂人君而稱臣為我公彼盖不詳味詞理耳子昻坐冬雷罷相予又當制曰調隂陽而遂萬物所嗟論道之非因灾異而劾三公實負應天之愧盖因有諷諫也嗣濮王加恩制曰天神明而照知四方既下臨於精意王孫子而本支百世兹載錫於蕃釐又曰春秋享祀獨冠周家之宗盟老成典刑蔚為劉氏之祭酒士衎制曰克羞饋祀事其先而萬國歡心肅倡和聲行於郊而百神受職賜宰臣辭免提舉聖政書成轉官詔曰為天子父尊之至永惟傳序之恩問聖人徳何以加莫越重華之孝賜葉資政辭召命詔曰見晛曰消顧何傷於日月得時則駕宜亟㑹於風雲賜史大觀文以新蜀帥改越辭免詔曰王陽為孝子敢煩益部之行莊助留侍中姑奉㑹稽之計呉璘在興元修塞兩縣決壊渠為田奬諭詔曰刻石立作三犀牛重見離堆之利復陂誰云兩黄鵠詎煩鴻郤之謡用老杜石犀行云秦時蜀太守刻石立作三犀牛及翟方進壊鴻卻陂童謡云反乎覆陂當復誰云者兩黄鵠等語也劉共甫自潭帥除翰林學士答詔曰不見賈生兹趣長沙之召既還陸贄宜膺内相之除批執政辭經修哲宗寳訓轉官曰念疊矩重規當賢聖之君七作而立經陳紀在謨訓之文百篇哲廟正為第七主而寳訓百卷也答蔣丞相辭免曰永惟萬事之統知非艱而行惟艱有不二心之臣帥以正則罔不正禮部為宰臣以顯仁皇后小祥請吉服奏曰練而慨然禮應順變期可已矣懼或過中又曰漢中天二百而興益隆大業舜至孝五十而慕獨耀前徽時髙宗聖夀五十四也辛巳親征詔曰惟天惟祖宗方共扶於基緒有民有社稷敢自佚於宴安又曰嵗星臨於呉分定成肥水之勲鬭士倍於晉師可決韓原之勝是時嵗星在楚故云檄書曰為劉氏左袒飽聞思漢之忠徯湯后東征必慰戴商之望又曰侯王寧有種乎人皆可致富貴是所欲也時不再來紫宸大宴致語曰廟謨先定百官修輔而厥后惟明黼坐端臨五帝神聖而其臣莫及修聖政轉官詞曰念五馬浮江之後光啟中興述六龍御天以來式時猷訓又曰薦於天而天是受永言覆幬之恩問諸朝而朝不知詎測形容之妙汪觀文復官詞曰作雷雨之解而宥罪在法當原如日月之食而及更於明何損歩帥陳敏制曰亞夫持重小棘門霸上之將軍不識將屯冠長樂未央之衞尉呉挺興州制曰能得士心呉起固西河之守差彊人意廣平開東漢之興起復知金州制曰惟天不弔壊萬里之長城有子而賢作三軍之元帥蕭鷓巴詞曰隨㑹在秦晉國起六卿之懼日磾仕漢秺侯𫝊七葉之芳姚仲復官制曰李廣數竒應恨封侯之相孟明一眚終酬拜賜之師追封皇第四子郡王詞曰舉漢武三王之策方茂徽章念周文十子之宗獨留遺恨時已封建三王也趙忠簡諡制曰見夷吾於江左共知晉室之何憂還徳裕於崖州豈待令狐之復夢王彦贈官詞曰申帶礪以丹書之誓方休甲第之功臣挂衣冠於神虎之門竟失戍營之校尉向起贈官詞曰馳至金城郡方思充國之忠生入玉門關竟負班超之望李師賢贈官制曰青天上蜀道久嚴分閫之權黒水惟梁州愴失安邊之傑襄帥王宣贈官詞曰黄河如帶莫申劉氏之盟漢水為池空墮羊公之淚王瀹以太常少卿朔祭太廟忘設象尊犧尊降官詞曰犧象不設已廢司彞之供餼羊空存殊乖告朔之禮潼川神加封詞曰駕飛龍兮靈之斿具嚴渙命驅厲鬼兮山之左終相此邦青城山蠶叢氏封侯詞曰想青神侯國之封自今以始雖白帝公孫之盛於我何加陽山龍母詞曰居然生子乗雲氣以為龍惟爾有神時雨暘而利物魏丞相贈父詞曰大名之後必大非此其身和戎如樂之和幸哉有子魏盖以使虜定和議旋致大用贈母詞曰藏盟府之國功不殊魏絳成外家之宅相重見陽元封妻姜氏詞曰筮氏于晉曰魏方開門户之祥取妻必齊之姜孰盛閨闈之羙虞丞相贈父詞曰活千人有封非其身者在其子徳百世必祀畸於人者侔於天同周仁贈父詞曰有子能賢髙舉而集呉地受予顯服㑹同而朝漢京用東方朔非有先生傳髙舉逺引來集呉地及兩京賦春王三朝㑹同漢京也奬諭呉挺詔曰闑外制將軍方有成於東鄉舟中皆敵國應無慮於西河梁丞相醴泉使兼侍讀制曰珍臺閒館獨冠臯伊之倫魁廣厦細旃尚論唐虞之盛際又答詔曰一言可以興邦念為臣之不易三宿而後出晝勉為王而留行王丞相進玉牒加恩制曰載籍之傳五三壯太祖太宗之立極賢聖之君六七耀永昭永厚之詒謀批以旱得雨請御殿曰念七月之間則旱咎證已深雖三日已往為霖憂端未貰餘不勝書唯記從兄在泉幕淮東使者其友婿也發京狀薦之為作謝啟曰襟袂相連夙愧末親之孤陋雲泥懸望分無通貴之哀憐皆用杜詩其下句人人知之上句乃贈李十五丈云孤陋忝末親等級敢比肩人生意氣合相與襟袂連此事適著題而與前送韋書記詩句偶可整齊用之故併紀于此但以傳示子孫甥姪而已不足為外人道也唐賢啟狀故書中有唐賢啟狀一册皆汎汎緘題其間標為獨孤常州及劉信州太真陸中丞長源吕衡州温者各數十篇亦無可𫝊誦時人以其名士故流行至今獨孤有與第五相公書云垂示送邱郎中兩詩詞清興深常情所不及隂天聞斷鴈夜浦送歸人醴麗閒逺之外文句窈窕悽惻比頃來所示者才又加等但吟誦歎詠大談於呉中文人耳又云昨見送梁侍御六韻清麗妍雅妙絶今時掩映風騷吟諷不足按第五琦乃聚歛之臣不以文稱而獨孤奬重之如此觀表出十字誠為佳句乃知唐人工詩者多不必專門名家而後可稱也容齋三筆卷八欽定四庫全書容齋三筆卷
