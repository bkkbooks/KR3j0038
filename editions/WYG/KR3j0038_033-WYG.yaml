front:
  text: 十五十三則
  hash: sha256:f00cec34650c25e215d61522e31b6c77b78acc5416177866539da59ed65723a5
body:
  text: 宋洪邁撰紫閣山村詩宣和閒朱勔挾花石進奉之名以固寵規利東南部使者郡守多出其門如徐鑄應安道王仲􅂒輩濟其惡豪奪漁取士民家一石一木稍堪翫即領健卒直入其家用黄封表誌而未即取護視㣲不謹則被以大不恭罪及發行必撤屋決墻而出人有一物小異共指為不祥唯恐芟夷之不速楊戬李彦創汝州西城所任輝彦李士渙王滸毛孝立之徒亦助之發物供奉大抵類勔而又有甚焉者徽宗患其擾屢禁止之然覆出為惡不能絶也偶讀白樂天紫閣山北村詩乃知唐世固有是事漫録于此晨㳺紫閣峯暮宿山下村村老見予喜為予開一罇舉盃未及飲暴卒來入門紫衣挾刀斧草草十餘人奪我席上酒掣我盤中飱主人退後立斂手反如賔中庭有竒樹種來三十春主人惜不得持斧斷其根口稱采造家身屬神䇿軍主人切勿語中尉正承恩蓋貞元元和閒也李林甫秦檜李林甫為宰相妬賢嫉能以裴耀卿張九齡在已上以李適之爭權設詭計去之若其所引用如牛仙客至終于位陳希烈及見其死皆共政六七年雖兩人伴食謟事所以能乆然林甫以忮心賊害亦不朝愠暮喜尚能容之秦檜則不然其始也見其能助我自冗散小官不三二年至執政史才由御史撿法官超右正言遷諫議大夫遂簽書樞宻施鉅由中書撿正鄭仲熊由正言同除權吏部侍郎方受告正謝施即參知政事鄭為簽樞宋樸為殿中侍御史欲驟用之令臺中申稱本臺缺撿法主簿須長貳乃可辟即就状奏除侍御史許薦舉遽拜中丞謝日除簽樞其捷如此然數人者不能數月而罷楊愿最善佞至飲食動作悉效之秦嘗因食噴􅅉失笑愿於倉卒間亦陽噴飯而笑左右侍者哂焉秦察其奉己愈喜既歴嵗亦厭之諷御史排擊而預告之愿涕淚交頥秦曰士大夫出處常事耳何至是愿對曰愿起賤㣲致身此地已不啻足但受太師生成恩過於父母一旦别去何時復望車塵馬足邪是所以悲也秦益憐之使以本軄奉祠僅三月起知宣州李若谷罷參政或曰胡不效楊原仲之泣李河北人有直氣笑曰便打殺我亦撰眼淚不出秦聞而大怒遂有江州居住之命秦嘗以病謁告政府獨有余堯弼因奏對髙宗訪以機務一二不能答秦病愈入見上曰余堯弼既參大政朝廷事亦宜使之與聞秦退扣余曰比日榻前所詢何事余具以告秦呼省吏取公牘閱視皆以書押責之曰君既書押了安得言弗知是故欲相賣耳余離席辯析不復應明日臺評交章叚拂為人憒憒一日秦在前開陳頗乆遂俯首瞌睡秦退始覺殊窘怖上猶慰拊之且詢其鄉里少頃還殿廊幕中秦閉目誦佛典客贊揖至三乃答歸政事堂窮詰其語無以對旋遭劾至於責居湯思退在樞府上偶回顧有所問秦是日所奏㣲不合即云陛下不以臣言為然乞問湯思退上曰此事朕豈不曉何用問他湯思退秦還省見湯已不樂謀去之㑹其病迨於亡遂免考其所為蓋出偃月堂之上也注書難注書至難雖孔安國馬融鄭康成王弼之解經杜元凱之解左𫝊顔師古之注漢書亦不能無失王荆公詩新經八月剥棗觧云剥者剥其皮而進之所以養老也毛公本注云剥擊也陸徳明音普卜反公皆不用後從蒋山郊歩至民家問其翁安在曰去撲􅀥始悟前非即具奏乞除去十三字故今本無之洪慶善注楚辭九歌東君篇縆瑟兮交鼓簫鐘兮瑶簴引儀禮鄉飲酒章閒歌魚麗笙由庚歌南有嘉魚笙崇邱為比云簫鐘者取二樂聲之相應者互奏之既鏤板置于墳庵一蜀客過而見之曰一本簫作􅀈廣韻訓為擊也蓋是擊鐘正與縆瑟為對耳慶善謝而亟改之政和初蔡京禁蘇氏學蘄春一士獨杜門注其詩不與人徃還錢伸仲為黄岡尉因考挍上舎徃來其鄉三進謁然後得見首請借閱其書士人指案側巨編數十使隨意抽讀適得和楊公濟梅花十絶月地雲階漫一尊玊奴終不負東昏臨春結綺荒荆棘誰信幽香是返魂注云玉奴齊東昏侯潘妃小字臨春結綺者陳後主三閣之名也伸仲曰所引止於此耳曰然伸仲曰唐牛僧孺所作周秦行紀記入薄太后廟見古后妃輩所謂月地雲階見洞仙東昏以玉兒故身死國除不擬負他乃是此篇所用先生何為沒而不書士人恍然失色不復一語顧其子然紙炬悉焚之伸仲勸使姑留之竟不可曰吾枉用工夫十年非君㡬貽士林嗤笑伸仲每談其事以戒後生但玉奴乃楊貴妃自稱潘妃則名玉兒也剥棗之說得於吳說傅朋簫鐘則慶善自言也紹興初又有傅洪秀才注坡詞鏤板錢塘至於不知天上宫闕今夕是何年不能引共道人間惆悵事不知今夕是何年之句笑怕薔薇罥學畫鴉黄未就不能引南部煙花錄如此甚多書易脫誤經典遭秦火之餘脫亡散落其僅存於今者相傳千嵗雖有錯誤無由復改漢藝文志載劉向以中古文易經挍施孟梁邱經或脫去无咎悔亡唯費氏經與古文同以尚書挍歐陽夏侯三家經文酒誥脫簡一召誥脫簡二率簡二十五字者脫亦二十五字簡二十二字者脫亦二十二字今世所存者獨孔氏古文故不見二篇脫處周易雜卦自乾坤以至需訟皆以兩兩相從而明相反之義若大過至夬八卦則否蓋傳者之失也東坡始正之元本云大過顛也姤遇也柔遇剛也漸女歸待男行也頥養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也坡改云頥養正也大過顛也姤遇也柔遇剛也夬決也剛決柔也君子道長小人道憂也漸女歸待男行也歸妹女之終也既濟定也未濟男之窮也謂如此而相從之次相反之義煥然若合符節矣尚書洪範四五紀一曰嵗二曰月三曰日四曰星辰五曰厯數使合繼之以王省惟嵗卿士惟月師尹惟日至於月之從星則以風雨一章乃接五皇極亦以簡編脱誤故失其先後之次五皇極之中蓋亦有雜九五福之文者如斂時五福用敷錫厥庶民凡厥正人既富方穀汝弗能使有好于而家時人斯其辜于其無好徳汝雖錫之福其作汝用咎及上文而康而色曰予攸好徳汝則錫之福是也康誥自惟三月哉生魄至乃洪大誥治四十八字乃是洛誥合在篇首周公拜手之前武成一篇王荆公始正之自王朝歩自周于征伐商即繼以底商之罪告于皇天后土至一戎衣天下大定乃繼以厥四月哉生明至予小子其承厥志然後及乃反商政以訖終篇則首尾亦粲然不紊南陔六詩南陔白華華黍由庚崇邱由儀六詩毛公為詩詁訓傳各置其名述其義而亡其辭鄉飲酒燕禮云笙入堂下磬南北面立樂奏南陔白華華黍乃閒歌魚麗笙由庚歌南有嘉魚笙崇邱歌南山有臺笙由儀乃合樂周南關睢葛覃卷耳召南鵲巢采蘋采蘩切詳文意所謂歌者有其辭所以可歌如魚麗嘉魚闗睢以下是也亡其辭者不可歌故以笙吹之南陔至于由儀是也有其義者謂孝子相戒以養萬物得由其道之義亡其辭者元未嘗有辭也鄭康成始以為及秦之世而亡之又引燕禮升歌鹿鳴下管新宫為比謂新宫之詩亦亡按左傳宋公享叔孫昭子賦新宫杜注為逸詩則亦有辭非諸篇比也陸徳明音義云此六篇蓋武王之詩周公制禮用為樂章吹笙以播其曲孔子刪定在三百一十一篇内及秦而亡蓋祖鄭說耳且古詩經刪及逸不存者多矣何獨列此六名於大序中乎束晳補亡六篇不作可也左傳叔孫豹如晉晉侯享之金奏肆夏韶夏納夏工歌文王大明緜鹿鳴四牡皇皇者華三夏者樂曲名擊鐘而奏亦以樂曲無辭故以金奏若六詩則工歌之矣尤可證也紹聖廢春秋五聲本於五行而徴音廢四瀆源於四方而濟水絶周官六典所以布治而司空之書亡是固出於無可柰何非人力所䏻為也乃若六經載道而王安石欲廢春秋紹聖中章子厚作相蔡卞執政遂明下詔罷此經誠萬世之罪人也王韶熈河王韶取熈河國史以為嘗游陜西采訪邊事遂詣闕上書偶讀晁以道集與熈河錢經略書云熈河一道曹南院棄而不城者也其後夏英公喜功名欲城之其如韓范之論何又其後有一王長官韶者薄游陽翟偶見英公神道碑所載云云遂竊以為策以干丞相時丞相是謂韓公視王長官者稚而狂之若河外數州則又王長官棄而不城者也彼木征之志不淺鬼章之睥睨尤近而著者隴拶似若無能頗聞有子存實有不可不懼者此書蓋是元祐初年然則韶之本指乃如此予修史時未得其說也英公碑王岐公所作但云嘗上十策若通唃厮囉之屬羌當時施用之餘皆不書不知晁公所指為何也書籍之厄梁元帝在江陵蓄古今圖書十四萬卷将亡之夕盡焚之隋嘉則殿有書三十七萬卷唐平王世充得其舊書於東都浮舟泝河盡覆於砥柱貞觀開元募借繕寫兩都各聚書四部禄山之亂尺簡不藏代宗文宗時復行搜采分藏于十二庫黄巢之亂存者蓋尠昭宗又於諸道求訪及徙洛陽蕩然無遺今人觀漢隋唐經籍藝文志未嘗不茫然太息也晁以道記本朝王文康初相周世宗多有唐舊書今其子孫不知何在李文正所藏既富而且闢學館以延學士大夫不待見主人而下馬直入讀書供牢餼以給其日力與衆共利之今其家僅有敗屋數楹而書不知何在也宋宣獻家兼有畢文簡楊文莊二家之書其富蓋有王府不及者元符中一夕災為灰燼以道自謂家五世於兹雖不敢與宋氏爭多而挍讐是正未肯自遜政和甲午之冬火亦告譴唯劉壯輿家於廬山之陽自其祖凝之以来遺子孫者唯圖書也其書與七澤俱富矣於是為作記今劉氏之在廬山者不聞其人則所謂藏書殆亦羽化乃知自古到今神物亦於斯文為靳靳也宣和殿太清樓龍圖閣御府所儲靖康蕩析之餘盡歸於燕置之祕書省乃有幸而得存者焉逐貧賦韓文公送窮文栁子厚乞巧文皆擬揚子雲逐貧賦韓公進學解擬東方朔客難栁子晉問篇擬枚乘七發正符擬劇秦羙新黄魯直跛奚移文擬王子淵僮約皆極文章之妙逐貧一賦㡬五百言文選不收初學記所載纔百餘字今人蓋有未之見者輒錄於此云揚子遁世離俗獨處左鄰崇山右接曠野鄰垣乞兒終貧且窶禮薄義弊相與羣聚惆悵失志呼貧與語汝在六極投棄荒遐好為庸卒刑戮是加匪惟㓜稚嬉戲土沙居非近鄰接屋連家恩輕毛羽義薄輕羅進不由徳退不受訶乆為滯客其意若何人皆文繡余褐不全人皆稻粱我獨藜飡貧無寳玩何以接歡宗室之宴為樂不槃徒行負賃出處易衣身服百役手足胼胝或耘或耔霑體露肌朋友道絶進官凌遲厥咎安在職女之為舎女逺竄崑崙之顛爾復我随翰飛戾天舎爾登山巖宂隐藏爾復我随陟彼髙岡舎爾入海汎彼栢舟爾復我随載沉載浮我行爾動我静爾休豈無他人從我何求今汝去矣勿復乆㽞貧曰唯唯主人見逐多言益嗤心有所懐願得盡辭昔我乃祖崇其明徳克佐帝堯誓為典則土喈茅茨匪雕匪飾爰及季世縱其昏惑饕餮之羣貧富茍得鄙我先人乃傲乃驕瑶臺瓊室華屋崇髙流酒為池積肉為崤是用鵠逝不踐其朝三省吾身謂予無諐處君之家福祿如山忘其大徳思我小怨堪寒能暑少而習焉寒暑不忒等壽神仙桀跖不顧貪類不干人皆重蔽子獨露居人皆怵惕子獨無虞言辭既罄色厲目張攝齊而興降階下堂誓将去汝適彼首陽孤竹之子與我連行余乃避席辭謝不直請不貳過聞義則服長與爾居終無厭極貧遂不去與我遊息唐宣宗時有文士王振自稱紫邏山人有送窮辭一篇引韓吏部為説其文意亦工澗松山苗詩文當有所本若用古人語意别出機杼曲而暢之自足以傳示来世左太冲詠史詩曰鬱鬱澗底松離離山上苗以彼徑寸莖䕃此百尺條世胄躡髙位英俊沉下僚地勢使之然由来非一朝白樂天續古一篇全用之曰雨露長纎草山苗髙入雲風雪折勁木澗松摧為薪風摧此何意雨長彼何因百尺澗底死寸莖山上春語意皆出太冲然其含蓄頓挫則不逮也男子運起寅今之五行家學凡男子小運起於寅女子小運起於申莫知何書所載淮南子汜論訓篇云禮三十而娶許叔重注曰三十而娶者隂陽未分時俱生於子男從子數左行三十年立於已女從子數右行二十年亦立於已合夫婦故聖人因是制禮使男子三十而娶女二十而嫁其男子自已數左行十得寅故人十月而生於寅故男子數從寅起女自已數右行得申亦十月而生於申故女子數從申起此說正為起運也宰我作難史記稱宰我為齊臨菑大夫與田常作難以夷其族孔子恥之蘇子由作古史精為辯之以為子我者闞止也與田常爭齊政為常所殺以其字亦曰子我故戰國之書誤以為宰予此論既出聖門髙弟得免非義之謗東坡又引李斯諫書謂田常隂取齊國殺宰予於庭是其不從田常故為所殺也予又考之子路之死孔子曰由也死矣又曰天祝予哭於中庭使人覆醢其悲之如是不應宰我遇禍略無一言孟子所載三子論聖人賢於堯舜等語疑是夫子沒後所談不然師在而各出意見議之無復質正恐非也然則宰我不死於田常更可證矣而淮南子又有一說云将相攝威擅勢私門成黨而使道不行故使陳成田常鴟夷子皮得成其難使吕氏絶祀子皮謂范蠡也蠡浮海變姓名游齊時簡公之難已十餘年矣說苑亦云田常與宰我爭宰我将攻之鴟夷子皮告田常遂殘宰我此說尤為無稽是以蠡為助田氏為齊禍其不分賢逆如此古人占夢漢藝文志七略雜占十八家以黄帝長栁占夢十一卷甘徳長栁占夢二十卷為首其説曰雜占者紀百家之象候善惡之證衆占非一而夢為大故周有其官周禮太卜掌三夢之法一曰致夢二曰觭夢三曰咸陟鄭氏以為致夢夏后氏所作觭夢商人所作咸陟者言夢之皆得周人作焉而占夢専為一官以日月星辰占六夢之吉凶其别曰正曰噩曰思曰寤曰喜曰懼季冬聘王夢獻吉夢于王王拜而受之乃舎萌于四方以贈惡夢舎萌者猶釋采也贈者送之也詩書禮經所載髙宗夢得説周文王夢帝與九齡武王伐紂夢叶朕卜宣王考牧牧人有熊羆虺蛇之夢召彼故老訊之占夢左傳所書尤多孔子夢坐奠于兩楹然則古之聖賢未嘗不以夢為大是以見於七略者如此魏晉方技猶時時或有之今人不復留意此卜雖市井妄術所在如林亦無一箇以占夢自名者其學殆絶矣容齋續筆卷十五欽定四庫全書容齋續筆卷
