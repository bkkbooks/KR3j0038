body:
  text: 容齋五筆目録卷一十九則天慶諸節虢州兩刺史狐假虎威徐章二先生教人張吕二公文論郎官非時得對王安石棄地雙生以前爲兄風俗通俗語有出昏主棄功臣問故居唐宰相不歴守令張釋之桞渾人臣震主五經秀才陶潜去彭澤羗戎畏服老將古人字只一言卷二十五則二叔不咸官階服章月非望而食慶善橋西漢以來加官吕望非熊唐曹因墓銘唐史省文之失李德裕論命令漢武唐德宗諸公論唐肅宗孫馬二公所言元㣲之詩諫繚綾戲龍羅詳正學士卷三十五則人生五計瀛莫間二禽士大夫避父祖諱元正父子忠死蕭頴士風節石尤風江楓雨菊開元宫嬪相里造先公詩詞州縣名同三衙軍制歐陽公勲封贈典嘉祐四真五方老人祝聖夀卷四九則作詩㫖意平王之孫毛詩語助東坡文章不可學韓文稱名棘寺棘卿晉代遺文漢武帝田蚡公孫𢎞近世文物之殊卷五十五則庾公之斯萬事不可過致仕官上夀桃花笑春風嚴先生祠堂記大言誤國宗室覃恩免觧唐書載韓桞文冥靈社首鳳左傳州郡貧富習常唐用宰相史記簡妙處玉津園喜晴詩虢巨賀蘭卷六十二則鄱陽七談經觧之名卜筮不敬糖霜譜李彦僊守陜姦雄疾勝已者俗語放錢漢書多叙谷永玉堂殿閣漢武帝喜殺人者知人之難舘職遷除卷七十四則盛衰不可常唐賦造語相似張藴古大寳箴國初文籍叙西漢郊祀天地騫鶱二字義訓書麴信陵事貢禹朱暉晩達琵琶行海棠詩東坡不隨人後元白習制科門生門下見門生韓蘇杜公叙馬風災霜旱卷八十二則白蘇詩紀年嵗天將富此翁白公說俸禄白居易出位醉翁亭記酒經白公感石禮部韻略非理唐臣乞贈祖承習用經語誤長慶表章元白制科八種經典卷九十二則畏人索報書不能忘情吟擒鬼章祝文歐公送慧勤詩委蛇字之變東不可名園一二三與壹貳叄同何恙不已兩漢用人人元元字韓公潮州表燕賞逢知己端午貼子詞卷十十二則哀公問社絶句詩不貫穿農父田翁詩衛宣公二子謂端爲疋唐人草堂詩句公穀觧經書日桞應辰押字唐堯無後斯須之敬丙午丁未祖宗命相容齋五筆目録欽定四庫全書
