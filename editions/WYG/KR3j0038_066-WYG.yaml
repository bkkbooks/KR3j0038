front:
  text: 容齋四筆目録
  hash: sha256:2a2db0a9521bc6a1d465ce85921e2ea9fa7d1e33f9e3f9ac6680c9675f28965a
body:
  text: 卷一孔廟位次周三公不特置周公作金縢雲夢澤關雎不同迷癡厥撥三館祕閣亭榭立名十十錢犀舟畢仲游二書列子與佛經相參韋孟詩乖踈匡衡守正西極化人詔令不可輕出戰國策范煜漢志繕修犯土卷二諸家經學興廢漢人姓名輕浮稱謂鬼谷子書有美堂詩張天覺小簡城狐社䑕用兵為臣下利誌文不可冗趙殺鳴犢五帝官天下黄帝李法抄傳文書之誤二十八宿大觀元夕詩顔魯公帖文潞公奏除改官制待制知制誥裴行儉景陽北人重甘蔗卷三韓退之張籍書韓公稱李杜此日足可惜粉白黛黑李杜徃來詩李太白怖州佐祝不勝詛吕子論學曾太皇太后中天之臺實年官年雷公炮炙論治藥捷法陳翠説燕后燕非強國水旱祈禱卷四今日官冗欒城和張安道詩和范杜蘇四公外臺祕要六枳關王荆公上書并詩左黄州表李郭詔書兩道出師杜韓用歇後語唐明皇賜二相物一百五日老杜寒山詩礜石之毒㑹合聮句卷五􅁟木偶人饒州風俗禽畜菜茄不同伏龍肝勇怯無常趙徳甫金石録韓文公薦士王勃文章吕覽引詩書藍田丞壁記錢武肅三改元黄庭換鵞宋桑林馮夷姓字卷六韓文公逸詩竇叔向詩不存用柰花事王廖兒良徙木僨表建武中元續書草駒聾蟲記李履中二事乾寧覆試進士臨海蠏圖東坡作碑銘洗兒金錢告命失故事扁字二義娑羅樹卷七天咫縣尉為少仙杜詩用受覺二字西太一宫六言由與猶同人焉廋哉乆而俱化黄文江賦沈季長進言繁遏渠替戾岡文潞公平章重事考課之法廢小官受俸卷八庫路真得意失意詩狄監盧尹項韓兵書承天塔記穆護歌省試取人額通印子魚夀亭侯印茸附治疽漏莆田荔枝雙陸不勝華元入楚師公羊用疊語文書誤一字厯代史本末賢者一言解疑譖卷九蒋魏公逸史沈慶之曹景宗詩藍尾酒歐陽公辭官南北語音不同南舟北帳魏冉罪大辨秦少游義倡姓源韻譜譽人過實作文句法書簡循習健訟之誤用史語之失文字書簡謹日更衣卷十過所露布東坡題潭帖山公啓事親王回庶官書責降考試官青蓮居士閩俗詭祕殺人富公遷官唐藩鎮行墨勑吏部循資格五行納音五行化真錢忠懿判語王逸少為藝所累鄂州南樓磨崖賞魚袋出處卷十一京丞相轉官熈寧司農牟利文與可樂府譏議遷史常何李宻詩寺監主簿温大雅兄弟名字册府元龜漢髙帝祖稱豐公樞宻行香船名三翼東坡誨葛延之用書雲之誤張鷟譏武后濫官唐王府官猥下御史風聞唐御史遷轉定限卷十二小學不講主臣景華御苑州陞府而不為鎮漢唐三君知子當官營繕治厯明時仕宦捷疾詞臣益輕夏英公好處神宗用人至道九老李文正兩罷相卷十三科舉之弊不可革宰執子弟廷試國初救弊房元齡名字二朱詩詞金剛經四句偈四蓮華之名黑法白法多心經偈天宮寳樹白分黑分月雙閏雙踰繕那一由旬七極微塵宰相贈本生父母官執政贈三代不同唐孫處約事夏侯勝京房兩傳漢人坐語言獲罪樞宻書史知州轉運使為通判范正辤治饒州榮王藏書秦杜八六子卷十四祖宗親小事王居正封駮王元之論官冗梁狀元八十二歲太祖恤民潘游洪沈舞鷗游蜻郎中用資序臺諌分職正元朝士表章用兩臣字對劉夢得謝上表陳簡齋葆真詩仙傳圖志荒唐卷十五徽廟朝宰輔教官掌箋奏經句全文對北郊議論討論濫賞詞尺八三給事相攻朱藏一詩蔡京輕用官職節度使改東宮環衞官宰相任怨四李杜渾脫隊歲陽歲名官稱别名卷十六漢重蘇子卿昔賢為卒伍兵家貴於備豫渠陽蠻俗寄資官親王帶將仕郎郡縣用隂陽字杜畿李泌董晉嚴有翼詆坡公曹馬能收人心取蜀將帥不利李嶠楊再思容齋四筆目録容齋四筆序始予作容齋一筆首尾十八年二筆十三年三筆五年而四筆之成不費一歲身益老而著書益速蓋有其説曩自越府歸謝絶外事獨弄筆紀述之習不可掃除故捜采異聞但緒夷堅志於議論雌黄不復關抱而稚子櫰毎見夷堅滿紙輒曰隨筆夷堅皆大人素所游戲今隨筆不加益不應厚於彼而薄於此也日日立案旁必俟草一則乃退重逆其意則裒所憶而書之櫰嗜讀書雖就寢猶置一編枕畔旦則與之俱興而天嗇其付年且弱冠聰明殊未開以彼其勤殆必有日丈夫愛憐少子此乎見之於是占抒為序并奬其志云慶元三年九月二十四日序容齋四筆序欽定四庫全書
