front:
  text: 三十八則
  hash: sha256:51ae963b220e5974311a13b0f766372a799db5adeb501fd017821ff3012adf5b
body:
  text: 宋洪邁撰一定之計人臣之遇明主於始見之際圖事揆䇿必有一定之計据以為決然後終身不易其言則史䇿書之足為不朽東坡序范文正公之文盖論之矣伊尹起於有莘應湯三聘將使君為堯舜之君民為堯舜之民卒之相湯伐夏俾厥后惟堯舜格于皇天傅說在巖野爰立作相三篇之書皎若星日雖史籍乆逺不詳紀其行事而髙宗克鬼方伐荆楚嘉靖商邦禮陟配天載于易之既濟書之無逸詩之殷武商代之君莫盛焉罔俾阿衡專美有商於是為允蹈矣管仲以其君霸商君基秦為強雖聖門羞稱後世所賤然考其為政盖未嘗一戾於始謀韓信勸漢祖任天下武勇以城邑封功臣以義兵從思東歸之士傳檄而定三秦下魏之後請北舉燕趙東擊齊南絶楚糧道西㑹滎陽至於滅楚無一言不酬鄧禹見光武於河北知更始無成說帝延攬英雄務恱民心立髙祖之業救萬民之命帝與定計議終濟大業耿弇與光武同討王郎願歸幽州益發精兵定彭寵取張豐還收富平獲索東攻張歩以平齊地帝常以為落落難合而事竟成諸葛亮論曹操挾天子令諸侯難與争鋒孫權據有江東可與為援而不可圖荆州用武之國益州沃野千里勸劉備跨有荆益外觀時變則霸業可成漢室可興及南方已定則表􅅄率三軍北定中原已而盡行其說至於用師未戰而身先死則天也房喬杖䇿謁太宗為記室即收人物致幕府與諸將密相申結輔成大勲至於為相號令典章盡出其手雖數百年猶蒙其功王朴事周世宗當五季草創之際上平邊䇿以為唐失吳蜀晉失幽并當知所以平之之術當今吳易圖可撓之地二千里攻虛擊弱則所向無前江北諸州乃國家之有也既得江北江之南亦不難平得吳則桂廣皆為内臣岷蜀可飛書而召之不至則四面並進席卷而蜀平矣吳蜀平幽可望風而至唯并必死之寇候其便則一削以平之世宗用其䇿功未集而殂至於國朝掃平諸方先後次第皆不出朴所料獨幽州之舉既至城下而諸將不能成功若乃王安石顓國言聽計從以身任天下之重而師慕商鞅為人茍可以取民者無不盡遂詒後世之害則在所不論也秋興賦宋玉九辯詞云憭慄兮若在逺行登山臨水兮送將歸潘安仁秋興賦引其語繼之曰送歸懷慕徒之戀逺行有羇旅之憤臨川感流以歎逝登山懷逺而悼近彼四慼之疚心遭一塗而難忍盖暢演厥㫖而下語之工拙較然不侔也太史慈三國當漢魏之際英雄虎争一時豪傑志義之士礌礌落落皆非後人所能冀然太史慈者尤為可稱慈少仕東萊本郡為奏曹吏郡與州有隙州章劾之慈以計敗其章而郡得直孔融在北海為賊所圍慈為求救於平原突圍直出竟得兵解融之難後劉繇為揚州刺史慈往見之㑹孫䇿至或勸繇以慈為大將軍繇曰我若用子義許子將不當笑我邪但使慈偵視輕重獨與一騎卒遇䇿便前鬭正與䇿對得其兠鍪及繇奔豫章慈為䇿所執捉其手曰寧識神亭時邪又稱其烈義為天下智士釋縛用之命撫安繇之子經理其家孫權代䇿使為建昌都尉遂委以南方之事督治海昏至卒時纔年四十一葬于新吳今洪府奉新縣也邑人立廟敬事乾道中封靈惠侯予在西掖當制其詞云神蚤赴孔融雅謂靑州之烈士晩從孫䇿遂為吳國之信臣立廟至今作民司命檻一同之言狀擇二美以建侯庻幾江表之間尚憶神亭之事盖為是也諡法先王諡以尊名節以壹惠語出表記然不云起於何時今世傳周公諡法故自文王武王以來始有諡周之政尚文斯可驗矣如堯舜禹湯皆名皇甫諡之徒附㑹為説至於桀紂亦表以四字皆非也周王諡以一字至威烈貞定益以兩而衞武公曰叡聖武公見於楚語孔文子曰貞惠文子見於檀弓各三字意當時尚多有之唐諸帝諡經三次加冊由高祖至明皇皆七字其後多少不齊代宗以四字肅順憲以九字餘以五字唯宣宗獨十八字曰元聖至明成武獻文睿智章仁神聰懿道大孝國朝祖宗諡十六字唯神宗二十字曰體元顯道法古立憲帝德王功英文烈武欽仁聖孝盖蔡京所定也漢文帝受言漢文帝即位十三年齊太倉令淳于意有罪當刑其女緹縈年十四隨至長安上書願没入為官婢以贖父刑罪帝憐悲其意即下令除肉刑丞相張蒼御史大夫馮敬議請定律當斬右趾者反棄市笞者杖背五百至三百亦多死徒有輕刑之名實多殺人其三族之罪又不乘時建明以負天子德意蒼敬可謂具臣矣史稱文帝止輦受言今以一女子上書躬自省覽即除數千載所行之刑曾不留難然則天下事豈復有稽滯不決者哉所謂集上書囊以為殿帷盖凡囊封之書必至前也丹靑引杜子美丹靑引贈曹將軍霸云先帝天馬玉花驄畫工如山貌不同是日牽來赤墀下迴立閶闔生長風詔謂將軍拂絹素意匠慘澹經營中斯須九重真龍出一洗萬古凢馬空玉花却在御榻上榻上廷前屹相向至尊含笑催賜金圉人太僕皆惆悵讀者或不曉其㫖以為畫馬奪真圉人太僕所為不樂是不然圉人太僕盖牧養官曹及馭者而黄金之賜乃畫史得之是以惆悵杜公之意深矣又觀曹將軍畫馬圖云曽貌先帝照夜白龍池十日飛霹靂内府殷紅碼碯盤婕妤傳詔才人索亦此意也詩國風秦中事周召二南􅃎風皆周文武成王時詩其所陳者秦中事也所謂沼沚洲澗之水蘋蘩藻荇之菜疑非所有既化行江漢故并江之永漢之廣率皆得言之歟摽有梅之詩不注釋梅而秦風終南詩終南何有有條有梅毛氏云梅柟也箋云名山高大宜有茂木今之梅與柟異亦非茂木盖毛鄭北人不識梅耳若上林賦所引江蘺蘼蕪揭車蘘荷蓀若薠芧之類自是侈辭過實與所謂八川東注太湖者等也詩文當句對唐人詩文或於一句中自成對偶謂之當句對盖起於楚辭蕙烝蘭藉桂酒椒漿桂櫂蘭枻斵冰積雪自齊梁以來江文通庾子山諸人亦如此如王勃宴滕王閣序一篇皆然謂若襟三江帶五湖控蠻荆引甌越龍光牛斗徐孺陳蕃騰蛟起鳯紫電靑霜鶴汀鳬渚桂殿蘭宫鍾鳴鼎食之家靑雀黄龍之軸落霞孤騖秋水長天天高地迥興盡悲來宇宙盈虛邱墟已矣之辭是也于公異破朱泚露布亦然如堯舜禹湯之德統元立極之君卧鼓偃旗養威蓄銳夾川陸而左旋右抽抵邱陵而浸淫布濩聲塞宇宙氣雄鉦鼓貙兕作威風雲動色乘其跆藉取彼鯨鯢自卯及酉來拒復攻山傾河泄霆鬭雷馳自北徂南輿尸折首左武右文銷鋒鑄鏑之辭是也杜詩小院囘廊春寂寂浴鳬飛鷺晩悠悠淸江錦石傷心麗嫩蘂濃花滿目斑書籖藥裹封蛛網野店山橋送馬蹄戎馬不如歸馬逸千家今有百家存犬羊曽爛漫宫闕尚蕭條蛟龍引子過荷芰逐花低干戈況復塵隨眼鬢髮還應雪滿頭百萬傳深入寰區望匪他象牀玉手萬草千花落絮遊絲隨風照日靑袍白馬金谷銅駝竹寒沙碧菱刺藤梢長年三老捩柂開頭門巷荆棘底君臣􅉘虎邊養拙干戈全生麋鹿捨舟䇿馬拖玉腰金髙江急峽翠木蒼藤古廟杉松歲時伏臘三分割據萬古雲霄伯仲之閒指揮若定桃蹊李徑梔子紅椒庾信羅含春來秋去楓林橘樹複道重樓之類不可勝舉李義山一詩其題曰當句有對云密邇平陽接上蘭秦樓鴛瓦漢宫盤池光不定花光亂日氣初涵露氣乾但覺㳺蜂饒舞蝶豈知孤鳯憶離鸞三星自轉三山逺紫府程遙碧落寛其他詩句中如靑女素娥對月中霜裏黄葉風雨對靑樓管絃骨肉書題對蕙蘭蹊徑花鬚柳眼對紫蝶黄蜂重吟細把對已落猶開急鼓踈鐘對休燈滅燭江魚朔鴈對秦樹嵩雲萬户千門對風朝露夜如是者甚多東坡明正東坡明正一篇送于伋失官東歸云子之失官有為子悲如子之自悲者乎有如子之父兄妻子之為子悲者乎子之所以悲者惑於得也父兄妻子之所以悲者惑於愛也按戰國䇿齊鄒忌謂妻曰我孰與城北徐公美其妻曰君美甚徐公何能及公也復問其妾與客皆言徐公不若君之美暮寢而思之曰吾妻之美我者私我也妾之美我者畏我也客之美我者欲有求於我也東坡之斡旋盖取諸此然四菩薩閣記云此畫乃先君之所嗜既免喪以施浮圖惟簡曰此唐明皇帝之所不能守者而况於余乎余惟自度不能長守此也是以與子而其末云軾之以是與子者凡以為先君捨也與初辭意盖不同晩學所不曉也臺諫不相見嘉祐六年司馬公以修起居注同知諫院上章乞立宗室為繼嗣對畢詣中書略為宰相韓公言其㫖韓公攝饗明堂殿中侍御史陳洙監祭公問洙聞殿院與司馬舍人甚熟洙答以頃年曽同為直講又問近日曽聞其上殿言何事洙答以彼此臺諫官不相徃來不知言何事此一項温公私記之甚詳然則國朝故實臺諫官元不相見故趙淸獻公為御史論陳恭公而范蜀公以諫官與之争元豐中又不許兩省官相往來鮮于子駿乞罷此禁元祐中諫官劉器之梁況之等論蔡新州而御史中丞以下皆以無章疏罷黜靖康時諫議大夫馮澥論時政失當為侍御史李光所駮今兩者合為一府居同門出同幕與故事異而執政祭祠行事與監祭御史不相見云執政四入頭國朝除用執政多從三司使翰林學士知開封府御史中丞進拜俗呼為四入頭固有盡厯四職而不用如張文定公謂仁英朝至神宗初始用王宣徽之類者趙淸獻公自成都召還知諫院大臣言故事近臣自成都還將大用必更省府謂三司使開封府不為諫官以是知一朝典章其嚴如此至若以權侍郎方受告即為參樞如施鉅鄭仲熊者盖秦檜所用云無望之禍自古無望之禍玉石俱焚者釋氏謂之劫數然固自有幸不幸者漢武帝以望氣者言長安獄中有天子氣於是遣使者分條中都官詔獄繫者亡輕重一切皆殺之獨郡邸獄繫者賴丙吉得生隋煬帝令嵩山道士潘誕合鍊金丹不成云無石膽石髓若得童男女膽髓各三斛六斗可以代之帝怒斬誕其後方士言李氏當為天子勸帝盡誅海内李姓以煬帝之無道嗜殺人不啻草莽而二說偶不行唐太宗以李淳風言女武當王已在宫中欲取疑似者盡殺之賴淳風諫而止以太宗之賢尚如此豈不云幸不幸哉燕說黄魯直和張文􅅗八詩其二云談經用燕說束棄諸儒傳濫觴雖有罪末𣲖瀰九縣大意指王氏新經學也燕說出於韓非子曰先王有郢書而後世多燕說又引其事曰郢人有遺燕相國書者夜書火不明謂持燭者曰舉燭已而誤書舉燭二字非書本意也燕相受書曰舉燭者尚明也尚明者舉賢而用之遂以白王王大說國以治治則治矣非書意也魯直以新學多穿鑿故有此句折檻行杜詩折檻行云千載少似朱雲人至今折檻空嶙峋婁公不語宋公語尚憶先皇容直臣此篇專為諫争而設謂婁師德宋璟也人多疑婁公既無一語何得為直臣錢伸仲云朝有闕政或婁公不語則宋公語但師德乃是武后朝人璟為相時其亡久矣杜有祭房相國文言羣公閒出魏杜婁宋亦併二公稱之詩言先皇意為明皇帝也婁氏别無顯人有聲開元閒為不可曉朱雲陳元達朱雲見漢成帝請斬馬劒斷張禹首上大怒曰罪死不赦御史將雲下雲攀殿檻檻折御史遂將雲去辛慶忌叩頭以死争上意解然後得已及後當治檻上曰勿易因而輯之輯與集同謂補合也以旌直臣劉聰為劉后起䳨儀殿陳元達諫聰怒命將出斬之時在逍遙園李中堂元達先鎖腰而入即以鎻繞堂下樹左右曳之不能動劉氏聞之私勑左右停刑手疏切諫聰乃解引元達而謝之易園為納賢園堂為媿賢堂兩人之事甚相類雲之免於死由慶忌即時争救之故差易為力若元達之命在須􅁷閒聰之急暴且盛怒何暇延留數刻而容劉氏得以草疏乎脫使就刎其首或令武士擊殺亦可何恃於鎻腰哉是為可疑也成帝不易檻以旌雲直而不能命以一官乃不若聰之待元達也至今宫殿正中一閒横檻獨不施欄楯謂之折檻盖自漢以來相傳如此矣杜老不忘君前輩謂杜少陵當流離顛沛之際一飯未嘗忘君今略紀其數語云萬方頻送喜無乃聖躬勞至今勞聖主何以報皇天獨使至尊憂社稷諸君何以答昇平天子亦應厭奔走羣公固合思昇平如此之類非一栽松詩白樂天栽松詩云小松未盈尺心愛手自移蒼然澗底色雲濕煙霏霏栽植我年晚長成君性遲如何過四十種此數寸枝得見成陰否人生七十稀予治圃於鄉里乾道己丑歲正年四十七矣自伯兄山居手移穉松數十本其髙僅四五寸值之雲壑石上擁土以為固不能保其必活也過二十年蔚然成林皆有干霄之勢偶閲白公集感而書之烏鵲鳴北人以烏聲為喜鵲聲為非南人聞鵲噪則喜聞烏聲則唾而逐之至於弦弩挾彈擊使逺去北齊書奚永洛與張子信對坐有鵲正鳴於庭樹閒子信曰鵲言不善當有口舌事今夜有喚必不得往子信去後髙儼使召之且云勑喚永洛詐稱墮馬遂免於難白樂天在江州答元郎中楊員外喜烏見寄曰南宫鴛鴦地何忽烏來止故人錦帳郎聞烏笑相視疑烏報消息望我歸鄉里我歸應待烏頭白慙愧元郎誤歡喜然則鵲言固不善而烏亦能報喜也又有和元微之大觜烏一篇云老巫生姦計與烏意􅅗通云此非凢鳥遙見起敬恭千歲乃一出喜賀主人翁此烏所止家家産日夜豐上以致壽考下可宜田農按微之所賦云巫言此烏至財産日豐宜主人一心惑誘引不知疲轉見烏來集自言家轉孳專聽烏喜怒信受若長離今之烏則然也世有傳陰陽局鴉經謂東方朔所著大略言凡占烏之鳴先數其聲然後定其方位假如甲日一聲即是甲聲第二聲為乙聲以十干數之乃辨其急緩以定吉凶盖不專於一説也容齋續筆卷三欽定四庫全書容齋續筆卷
