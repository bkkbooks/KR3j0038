front:
  text: 九十四則
  hash: sha256:7e12a48ca60e2ae952b85f069783c803945b5bd4a83a9ce63e3fb887e8f314ff
body:
  text: 宋洪邁撰三家七穆春秋列國卿大夫世家之盛無越魯三家鄭七穆者魯之公族如臧氏展氏施氏子叔氏叔仲氏東門氏郈氏之類固多唯孟孫叔孫季孫實出於桓公其𫝊序累代皆秉國政與魯相為乆長若揆之以理則桓公弑兄奪國得罪於天顧使有後如此鄭靈公亡無嗣國人立穆公之子子良子良辭以公子堅長乃立堅是為襄公襄公将去穆氏子良爭之願與偕亡乃舎之皆為大夫其後位卿大夫而𫝊世者罕駟豐印游國良故曰七穆然則諸家不逐而獲存子良之力也至其孫良霄乃先覆族而六家為卿如故此又不可觧也貢薛韋匡漢元帝紀贊云貢薛韋匡迭為宰相謂貢禹薛廣徳韋元成匡衡也四人皆握娖自好當優柔不斷之朝無所規救衡專附石顯最為邪臣廣徳但有諌御樓船一事禹𫝊稱在位數言得失書數十上元成𫝊稱為相七年守正持重不及父賢而文采過之皆不著其有過按劉向𫝊宏恭石顯白逮更生下獄下太傅韋元成諌大夫貢禹與廷尉雜考劾更生前為九卿坐與蕭望之周堪謀排許史毁離親戚欲退去之而獨專權為臣不忠幸不伏誅復䝉恩召用不悔前過而教令人言變事誣罔不道更生坐免為庶人若以漢法論之更生死有餘罪幸元帝不殺之耳京房𫝊房欲行考功法石顯及韋丞相皆不欲行然則韋貢之所以進用皆隂附恭顯而得之班史隠而不論唯於石顯𫝊云貢禹明經著節顯使人致意深自結納因薦禹天子歴位九卿至御史大夫正在望之死後也兒寛張安世漢史有當書之事本𫝊不載者武帝時兒寛有重罪繫按道侯韓説諌曰前吾邱夀王死陛下至今恨之今殺寛後将復大恨矣上感其言遂貰寛復用之宣帝時張安世嘗不快上所為不可上意上欲誅之趙充國以為安世本持橐簪筆事孝武帝數十年見謂忠謹宜全度之安世用是得免二事不書於寛及安世𫝊而於劉向充國𫝊中見之豈非以二人之賢為諱之邪韓説能以一言救賢臣於垂死而不於説𫝊書之以揚其善為可惜也深溝髙壘韓信伐趙趙陳餘聚兵井陘口禦之李左車說餘曰信乗勝而去國逺闘其鋒不可當願假竒兵從間道絶其輜重而深溝髙壘勿與戰彼前不得鬬退不得還不至十日信之頭可致麾下餘不聼一戰成擒七國反周亞夫将兵往擊㑹兵滎陽鄧都尉曰呉楚兵鋭甚難與争鋒願以梁委之而東北壁昌邑深溝髙壘使輕兵塞其饟道以全制其極亞夫從之呉果敗亡李鄧之䇿一也而用與不用則異耳秦軍武安西以攻閼與趙奢救之去邯鄲三十里堅壁二十八日不行復益増壘既乃卷甲而趨之大破秦軍奢之將略所謂玩敵於股掌之上雖未合戰而勝形已著矣前所云鄧都尉者亞夫故父絳侯客也􅏯錯𫝊云錯已死謁者僕射鄧公為挍尉擊呉楚為将還上書言軍事拜為城陽中尉鄧公者豈非鄧都尉乎亞夫𫝊以為此䇿乃自請而後行顔師古疑其不同然以事料之必非出於已也生之徒十有三老子出生入死章云出生入死生之徒十有三死之徒十有三人之生動之死地十有三夫何故以其生生之厚王弼注曰十有三猶云十分有三分取其生道全生之極十分有三耳取死之道全死之極十分亦有三耳而民生生之後更之無生之地焉其說甚淺且不觧釋後一節唯蘇子由以謂生死之道以十言之三者各居其三矣豈非生死之道九而不生不死之道一而已乎老子言其九不言其一使人自得之以寄無思無為之妙其論可謂盡矣臧氏二龜臧文仲居蔡孔子以為不智蔡者國君之守龜出蔡地因以為名焉左𫝊所稱作虚器正謂此也至其孫武仲得罪於魯出奔邾使告其兄賈於鑄且致大蔡焉曰紇之罪不及不祀子以大蔡納請其可葢請為先人立後也賈再拜受龜使弟為為已請遂自為也乃立臧為為之子曰昭伯嘗如晉從弟㑹竊其寳龜僂句龜所出地名以卜為信與僭僭吉僭不信也㑹如晉昭伯問内子與母弟皆不對㑹之意欲使昭伯疑其若有他故者歸而察之皆無之執而戮之逸奔郈及昭伯從昭公孫于齊季平子立㑹為臧氏後㑹曰僂句不余欺也臧氏二事皆以龜故皆以弟而奪兄位亦異矣有扈氏夏書甘誓啓與有扈大戰於甘以其威侮五行怠棄三正天用勦絶其命為辭孔安國𫝊云有扈與夏同姓恃親而不恭其罪如此耳而淮南子齊俗訓曰有扈氏為義而亡知義而不知宜也髙誘注云有扈夏啓之庶兄也以堯舜舉賢禹獨與子故伐啓啓亡之此事不見於他書不知誘何以知之𫝊記散軼其必有以為據矣荘子以為禹攻有扈國為虚厲非也太公丹書太公丹書今罕見於世黄魯直於禮書得其諸銘而書之然不著其本始予讀大戴禮武王踐阼篇載之甚備故悉紀録以遺缺古君子云武王踐阼三日召士大夫而問焉曰惡有藏之約行之行萬世可以為子孫常者乎皆曰未得聞也然後召師尚父而問焉曰黄帝顓帝之道可得見與師尚父曰在丹書王欲聞之則齋矣王齋三日尚父端冕奉書道書之言曰敬勝怠者吉怠勝敬者滅義勝欲者從欲勝義者凶凡事不強則枉弗敬則不正枉者滅廢敬者萬世藏之約行之行可以為子孫常者此言之謂也又曰以仁得之以仁守之其量百世以不仁得之以仁守之其量十世以不仁得之以不仁守之必及其世王聞書之言愓若恐懼退而為戒書於席之四端為銘前左端曰安樂必敬前右端曰無行可悔後左端曰一反一側亦不可以忘後右端曰所監不逺視爾所代几之銘曰皇皇惟敬口口生敬口生㖃口戕口鑑之銘曰見爾前慮爾後盥盤之銘曰與其溺於人也寜溺於淵溺於淵猶可㳺也溺於人不可救也楹之銘曰母曰胡殘其禍将然母曰胡害其禍将大母曰胡傷其禍将長杖之銘曰惡乎危於忿㚄惡乎失道於嗜欲惡乎相忘於富貴帶之銘曰火滅脩容謹戒必共共則夀屨之銘曰謹之勞勞則富觴豆之銘曰食自杖食自杖戒之憍憍則逸户之銘曰夫名難得而易失無勤弗志而曰我知之乎無勤弗及而曰我杖之乎擾阻以泥之若風将至必先揺揺雖有聖人不能為謀也牖之銘曰随天之時以地之財敬祀皇天敬以先時劒之銘曰帶之以為服動必行徳行徳則興倍徳則崩弓之銘曰屈申之義發之行之無忘自過矛之銘曰造矛造矛少閒勿忍終身之羞予一人所聞以戒後世子孫凡十六銘賈誼政事書所陳教太子一節千餘言皆此書保傅篇之文然及胡亥趙髙之事則為漢儒所作可知矣漢昭帝紀通保傅傳文頴注曰賈誼作在禮大戴記其此書乎荀卿議兵篇敬勝怠則吉怠勝敬則滅計勝欲則從欲勝計則凶盖出諸此左傳晉斐豹著於丹書謂以丹書其罪也其名偶與之同耳漢祖有丹書鐵契以待功臣葢又不同也漢景帝漢景帝為人甚有可議􅏯錯為内史門東出不便更穿一門南出南出者太上皇廟堧垣也丞相申屠嘉聞錯穿宗廟垣為奏請誅錯錯恐夜入宫上謁自歸上至朝嘉請誅錯上曰錯所穿非真廟垣乃外堧垣且又我使為之錯無罪臨江王榮以皇太子廢為王坐侵太宗廟壖地為宫詣中尉府對簿責訊王遂自殺兩者均為侵宗廟榮以廢黜失寵至於殺之錯方貴幸故略不問罪其不公不慈如此及用袁盎一言錯即夷族其寡恩忍殺復如此蕭何先見韓信從項梁居戲下無所知名又屬羽數以䇿干羽羽勿用乃亡歸漢陳平事項羽羽使擊降河内已而漢攻下之羽怒将誅定河内者平懼誅乃降漢信與平固能擇所從然不若蕭何之先見何為泗水卒史事第一秦御史欲入言召何何固請得毋行則當秦之未亡已知其不能乆矣不待獻䇿弗用及懼罪且誅然後去之也史漢書法史記前漢所書髙祖諸将戰功各為一體周勃傳攻開封先至城下為多攻好畤最擊咸陽最攻曲遇最破臧荼所将卒當馳道為多擊胡騎平城下所将卒當馳道為多夏侯嬰傳破李由軍以兵車趣攻戰疾從擊章邯以兵車趣攻戰疾擊秦軍雒陽東以兵車趣攻戰疾灌嬰傳破秦軍於杠里疾闘攻曲遇戰疾力戰於藍田疾力擊項佗軍疾戰又書擊項冠於魯下所将卒斬司馬騎将各一人擊破王武軍所将卒斬樓煩将五人擊武别将所将卒斬都尉一人擊齊軍於歴下所将卒虜将軍将吏四十六人擊田横所将卒斬騎将一人從韓信卒斬龍且所将之卒身生得周蘭破薛郡身虜騎将擊項籍陳下所将卒斬樓煩将二人追至東城所将卒共斬籍擊胡騎晉陽下所将卒斬白題将一人攻陳豨卒斬特将五人破黥布身生得左司馬一人所将卒斬小将十人傅寛傳屬淮隂擊破歴下軍屬相國參殘博屬太尉勃擊陳豨酈商𫝊與鍾離昧戰受梁相國印定上谷受趙相國印五人之𫝊書法不同如此灌嬰事尤為複重然讀之了不覺細𤨏史筆超㧞髙古范曄以下豈能窺其籬奥哉又史記灌嬰𫝊書受詔别擊楚軍後受詔将郎中騎兵受詔将車騎别追項籍受詔别降樓煩以北六縣受詔并将燕趙車騎受詔别攻陳豨凡六書受詔字漢減其三云薄昭田蚡周勃為人告欲反下廷尉逮捕吏稍侵辱之初勃以誅諸吕功益封賜金盡以予太后弟薄昭及繫急昭為言太后后以語文帝廼得釋王恢坐為将軍不出擊匈奴單于輜重下廷尉當斬恢行千金於丞相田蚡蚡不敢言上而言於太后后以蚡言告上上竟誅恢蚡者王太后同母弟也漢世母后豫聞政事故昭蚡憑之以招權納賄其史所不書者當非一事也神宗熈寕七年天下大旱帝對朝嗟歎欲盡罷法度之不善者王安石怫然爭之帝曰比兩宫泣下憂京師亂起以為更失人心安石曰兩宫有言乃向經曹佾所為耳是時安石力行新法以為民害向經曹佾能獻忠於母后可謂賢戚里矣而安石非沮之使遇薄昭田蚡當如何哉髙遵裕坐西征失律抵罪宣仁聖烈后臨朝宰相蔡確乞復其官后曰遵裕靈武之役塗炭百萬得免刑誅幸矣吾何敢顧私恩而違天下公議其聖如此雖有昭蚡百軰何所容其姦乎文字結尾老子道經孔徳之容一章其末云吾何以知衆甫之然哉以此盖用二字結之左𫝊叔孫武叔使郈馬正侯犯殺郈宰公若藐弗能其圉人曰吾以劒過朝公若必曰誰之劒也吾稱子以告必觀之吾偽固而授之末則可殺也使如之孟子載齊人一妻一妾而處室者其良人出必厭酒肉而後反問所與飲食者則盡富貴也妻瞯其所之乃之東郭墦間之祭者乞其餘歸告其妾曰良人者所仰望而終身也今若此此二事反復數十百語而但以使如之及今若此各三字結之史記封禪書載武帝用方士言神祠長陵神君李少君謬忌少翁㳺水發根欒大公孫卿史寛舒丁公王朔公玊帶越人勇之之屬所言祠竈化丹沙求蓬萊安期生立太一壇作甘泉宫臺室栢梁仙人掌夀宫神君闘棊小方㤗帝神鼎雲陽羙光緱氏城僊人跡太室呼萬嵗老父牽狗白雲起封中徳星出越祠雞卜通天臺明堂昆侖建章宫五城十二樓凡數十事三千言而其末云然其效可睹矣則武帝所興為者皆堕誕罔中不待一二論說也文字結尾之簡妙至此國初古文歐陽公書韓文後云予少家漢東有大姓李氏者其子堯輔頗好學予㳺其家見其敝篋貯故書在壁間發而視之得唐昌黎先生文集六卷脱落顛倒無次序因乞以歸讀之是時天下未有道韓文者予亦方舉進士以禮部詩賦為事後官於洛陽而尹師魯之徒皆在遂相與作為古文因出所藏昌黎集而補綴之其後天下學者亦漸趨於古韓文遂行于世又作蘇子羙集序云子羙之齒少於予而予學古文反在其後天聖之間學者務以言語聲偶擿裂以相誇尚子羙獨與其兄才翁及穆恭軍伯長作為古歌詩雜文時人頗共非笑之而子羙不顧也其後學者稍趨於古獨子羙為於舉世不為之時可謂特立之士也栁子厚集有穆脩所作後叙云予少嗜觀韓栁二家之文栁不全見於世韓則雖目其全至所缺墜亡字失句獨於集家為甚凡用力二紀文始幾定時天聖九年也予讀張景集中栁開行状云公少誦經籍天水趙生老儒也持韓愈文僅百篇授公曰質而不麗意若難曉子詳之何如公一覽不能捨歎曰唐有斯文哉因為文章直以韓為宗尚時韓之道獨行於公遂名肩愈字紹先韓之道大行於今自公始也又云公生於晉末長於宋初扶百世之大教續韓孟而助周孔兵部侍郎王祜得公書曰子之文出於今世真古之文章也兵部尚書楊昭儉曰子之文章世無如者已二百年矣開以開寳六年登進士第景作行状時咸平三年開序韓文云予讀先生之文自年十七至於今凡七年然則在國初開已得昌黎集而作古文去穆伯長時數十年矣蘇歐陽更出其後而歐陽略不及之乃以為天下未有道韓文者何也范文正公作尹師魯集序亦云五代文體薄弱皇朝栁仲塗起而麾之洎楊大年專事藻餙謂古道不適於用廢而勿學者乆之師魯與穆伯長力為古文歐陽永叔從而振之由是天下之文一變而古其論最為至當容齋續筆卷九欽定四庫全書容齋續筆卷
