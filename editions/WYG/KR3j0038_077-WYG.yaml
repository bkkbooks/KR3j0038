front:
  text: 京丞相轉官慶元二年朝廷奉上三宫徽稱冊寳繼又進勑令玉牒實録大臣遷秩于再于三蓋自崇寧至于紹熈未之有也於是京右丞相以十月受􅁽寳賞由正議轉宣奉十二月用勑局賞當得兩官以一回授一轉光禄三年二月用提舉玊牒實録院及禮儀使賞有㫖三項各轉兩官辭之至四五詔減為四官其半回授其二遂轉金紫四月之間陟五華資仍回授三帙在法宰執轉官與除拜同故得給使㤙百二十年而入流者二十有四邁記淳熈十四年王左相進玉牒并充國史禮儀使梁右相進四朝史傳國朝㑹要并充玊牒禮儀使詔各與轉兩官所謂各者指二相也時梁公誤認為三者各兩官已係特進謂如此則序進太師矣中批只共為兩官復辭之詔許回授又辭但令加恩亦辭適已罷相在經筵訖於分毫不受惟王公獨加恩今日之事全相類而又已有去冬二賞矣有司不諳練故實徑凖昔年中㫖行出聞京公殊不自安然無說可免惜乎東閤賢賔客不告以十年内親的故事以成其美邁頃居翰苑荅王梁諸詔嘗上章開析論列是以竊識其詳
