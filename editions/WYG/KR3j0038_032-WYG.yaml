seq: 32
front:
  text: 十四十七則
  hash: sha256:0032f1b90dc7d59ca95d935e7486833d64567b22a9afb646a31efbe593674af5
body:
  text: 宋洪邁撰尹文子漢藝文志名家内有尹文子一篇云說齊宣王先公孫龍劉歆云其學本於黄老居稷下與宋鈃彭䝉田駢等同學於公孫龍今其書分為上下兩卷蓋漢末仲長統所銓次也其文僅五千言議論亦非純本黄老者大道篇曰道不足以治則用法法不足以治則用術術不足以治則用權權不足以治則用勢勢不足則反權權用則反術術用則反法法用則反道道用則無為而自治又曰為善使人不能得從此獨善也為巧不能使人得為此獨巧也未盡善巧之理為善與衆行之為巧與衆能之此善之善者巧之巧者也故所貴聖人之治不貴其獨治貴其能與衆共治貴工倕之巧不貴其獨巧貴其能與衆共巧也今世之人行欲獨賢事欲獨能辯欲出羣勇欲絶衆獨行之賢不足以成化獨能之事不足以周務出羣之辯不可為户說絶衆之勇不可與正陳凡此四者亂之所由生聖人任道立法使賢愚不相棄能鄙不相遺此正治之術也詳味其言頗流而入於兼愛荘子末章敘天下之治方術者曰不累於俗不飾於物不茍於人不忮於衆願天下之安寜以活民命人我之飬畢足而止以此白心古之道術有在於是者宋鈃尹文聞其風而恱之作為華山之冠以自表雖天下不取強聒而不舎者也其為人太多其自為太少蓋亦盡其學云荀卿非十二子有宋鈃而文不預又别一書曰尹子五卷共十九篇其言論膚淺多及釋氏蓋晉宋時衲人所作非此之謂也帝王訓儉帝王創業垂統規以節儉貽訓子孫必其繼世象賢而後可以循其教不然正足取侮笑耳宋孝武大治宫室壊髙祖所居隂室於其處起玊燭殿與羣臣觀之牀頭有土障上挂葛燈籠麻蠅拂侍中袁顗因盛稱髙祖儉素之徳上不答獨曰田舎翁得此以為過矣唐髙力士於太宗陵寝宫見梳箱一柞木梳一黒角箆一草根刷子一歎曰先帝親正皇極以致升平随身服用唯留此物将欲𫝊示子孫永存節儉具以奏聞明皇詣陵至寝宫問所留示者何在力士捧跪上上跪奉肅敬如不可勝曰夜光之珍垂棘之璧将何以愈此即命史官書之典册是時明皇履位未乆厲精為治故見太宗故物而􅅥然有感及侈心一動窮天下之力不足以副其求尚何有於此哉宋孝武不足責也若齊髙帝周武帝陳髙祖隋文帝皆有儉徳而東昏天元叔寳煬帝之淫侈浮於桀紂又不可以語此云用計臣為相唐自貞觀定制以省臺寺監理天下之務官脩其方未之或改明皇因時極盛好大喜功於財利之事尤切故宇文融韋堅楊矜王鉷皆以聚斂刻剥進然其職不出户部也楊國忠得志乃以御史大夫判度支權知太府卿及兩京司農太府出納是時猶未立判使之名也肅宗以後兵興費廣第五琦劉晏始以户部侍郎判諸使因之拜相於是鹽鐵有使度支有判元琇班宏裴延齡李巽之徒踵相躡遂浸浸以他官主之權任益重憲宗季年皇甫鎛由判度支程异由衛尉卿鹽鐵使並命為相公論沸騰不恤也逮於宣宗率由此塗大用馬植裴休夏侯孜以鹽鐵盧商崔元式周墀崔龜從蕭鄴劉瑑以度支魏扶魏謩崔謹由蒋伸以户部自是計相不可勝書矣惟裴度判度支上言調兵食非宰相事請以歸有司其識量宏正不可同日語也州縣牌額州縣牌額率係於吉凶以故不敢輕為改易嚴州分水縣故額草書分字縣令有作聦明者謂事體非宜自真書三字刻而立之是年邑境惡民持刄殺人者衆蓋分字為八刀也徽州之山水清逺素無火災紹熈元年添差通判盧瑢悉以所作隷字換郡下扁牓自譙樓儀門凡亭榭臺觀之類一切趨新郡人以為字多燥筆而於州牌尤為不嚴重私切憂之次年四月火起於郡庫經一日兩夕乃止官舎民廬一空盧知猷唐之末世王綱絶紐學士大夫逃難解散畏死之不暇非有扶顛持危之計能支大廈於将傾者出力以佐時則當委身山棲往而不反為門户性命慮可也白馬之禍豈李振栁璨􅁆凶子所能害哉亦裴崔獨孤諸公有以自取耳偶讀司空表聖集太子太師盧知猷神道碑見其仕於僖昭更歴榮級至尚書右僕射以一品致仕可以歸矣然由閒關跋履從昭宗播遷自華幸洛天祐二年九月乃終享年八十有六其得沒於牖下亦云幸也新唐書有𫝊附於父後甚略云昭宗為劉季述所幽感憤而卒按昭宗以光化三年遭季述之禍天復元年反正至知猷亡時相去五年𫝊云子文度亦貴顯而碑載嗣子刑部侍郎膺亦不同表聖乃盧幕客當時作誌必不誤矣昭宗實録光化四年三月華州奏太子太師盧知猷卒以劉季述之變感憤成疾卒年七十五正與新唐𫝊同蓋唐武宣以後諸録乃宋敏求補撰簡牘當有散脫者皆當以司空之碑為正又按是年四月改元天復舊唐紀十一月車駕幸鳯翔朱全忠趨長安文武百寮太子太師盧知猷已下出迎又為可證宰相世系表知猷生丈度而同族曰渥渥之子膺刑部侍郎二者矛盾如此忌諱諱惡周禮春官小史詔王之忌諱鄭氏曰先王死日為忌名為諱禮記王制太史典禮執簡記奉諱惡注云諱者先王名惡者忌日若子夘惡烏路反左𫝊叔弓如滕子服椒為介及郊遇懿伯之忌叔弓不入懿伯椒之叔父忌怨也椒曰公事有公利無私忌椒請先入觀此乃知忌諱之明文漢人表䟽如東方朔有不知忌諱之類皆戾本㫖今世俗語言多云無忌諱及不識忌諱蓋非也陳渉不可輕揚子法言或問陳勝吳廣曰亂曰不若是則秦不亡曰亡秦乎恐秦未亡而先亡矣李軌以為輕用其身而要乎非命之運不足為福先適足以為禍始予謂不然秦以無道毒天下六王皆萬乗之國相踵滅亡豈無孝子慈孫故家遺俗皆奉頭䑕伏自張良狙擊之外更無一人敢西向窺其鋒者陳勝出於戍卒一旦奮發不顧海内豪傑之士乃始雲合響應並起而誅之數月之閒一戰失利不幸隕命於御者之手身雖已死其所置遣侯王将相竟亡秦項氏之起江東亦矯稱陳王之令而度江秦之社稷為墟誰之力也且其稱王之初萬事草創能從陳餘之言迎孔子之孫鮒為博士至尊為太師所與謀議皆非庸人崛起者可及此其志豈小小者哉漢髙帝為之置守冢於碭血食二百年乃絶子雲指以為亂何也若乃殺呉廣誅故人寡恩忘舊無帝王之度此其所以敗也士匄韓厥晉厲公既殺卻氏三卿羣臣疑懼欒書荀偃執公召士匄匄辭不往召韓厥厥辭曰古人有言曰殺老牛莫之敢尸而况君乎二三子不能事君焉用厥也二子竟弑君而不敢以匄厥為罪豈非畏敬其忠正乎唐武徳之季秦王與建成元吉相忌害長孫無忌髙士亷侯君集尉遲敬徳等日夜勸王誅之王猶豫未決問於李靖靖辭問於李世勣世勣辭王由是重二人及至登天位皆任為将相知其有所守也晉唐四賢之識見略等而無有稱述者唐史至不書其事殆非所謂發潛徳之幽光也蕭道成将革命欲引時賢參贊大業夜召謝朏屏人與語朏竟無一言及王儉禇淵之謀既定道成必欲引朏參佐命朏亦不肯從遂不仕齊世其亦賢矣孔墨墨翟以兼愛無父之故孟子辭而辟之至比於禽獸然一時之論迨於漢世徃徃以配孔子列子載惠盎見宋康王曰孔邱墨翟無地而為君無官而為長天下丈夫女子莫不延頸舉踵而願安利之鄒陽上書於梁孝王曰魯聼季孫之說逐孔子宋任子冉之計囚墨翟以孔墨之辯不能自免於䜛䛕賈誼過秦云非有仲尼墨翟之知徐樂云非有孔曽墨子之賢是皆以孔墨為一等列鄒之書不足議而誼亦如此韓文公最為發明孟子之學以為功不在禹下者正以辟楊墨耳而著讀墨子一篇云儒墨同是堯舜同非桀紂同脩身正心以治天下國家孔子必用墨子墨子必用孔子不相用不足為孔墨此又何也魏鄭公南史梁論亦有抑揚孔墨之語玊川月蝕詩盧同月蝕詩唐史以謂譏切元和逆黨考韓文公效仝所作云元和庚寅嵗十一月是年為元和五年去憲宗遇害時尚十載仝云嵗星主福徳官爵奉董秦説者謂董秦即李忠臣嘗為将相而臣朱泚至於亡身故仝鄙之東坡以為當秦之鎮淮西日代宗避吐蕃之難出狩追諸道兵莫有至者秦方在鞠塲趣命治行諸将請擇日秦曰父母有急難而欲擇日乎即倍道以進雖末節不終似非無功而食禄者近世有嚴有翼者著藝苑雌黄謂坡之言非也秦守節不終受泚偽官為賊居守何功之足云詩譏刺當時故言及此坡乃謂非無功而食禄謬矣有翼之論一何輕發至詆坡公為非為謬哉予按是時秦之死二十七年矣何為而追刺之使仝欲譏逆黨則應首及禄山與泚矣竊意元和之世吐突承璀用事仝以為嬖倖擅位故用董賢秦宫輩喻之本無預李忠臣事也記前人似亦有此說而不能省憶其詳詩要㸃撿作詩至百韻詞意既多故有失於㸃撿者如杜老夔府詠懐前云滿坐涕潺湲後又云伏臘涕漣漣白公寄元㣲之既云無盃不共持又云笑勸迃辛酒華樽逐勝移觥飛白玊巵飲訝卷波遲歸鞍酩酊馳酡顔烏帽側醉袖玊鞭垂白醪充夜酌嫌醒自啜醨不飲長如醉一篇之中説酒者十一句東坡賦中隠堂五詩各四韻亦有坡垂似伏鼇崩崖露伏龜之語近於意重周蜀九經唐貞觀中魏徴虞世南顔師古繼為祕書監請募天下書選五品以上子孫工書者為書手繕寫予家有舊監本周禮其末云大周廣順三年癸丑五月雕造九經書畢前鄉貢三禮郭嵠書列宰相李榖范質判監田敏等銜于後經典釋文末云顯徳六年己未三月太廟室長朱延熈書宰相范質王溥如前而田敏以工部尚書為詳勘官此書字畫端嚴有楷法更無舛誤舊五代史漢隠帝時國子監奏周禮儀禮公羊糓梁四經未有印板欲集學官考挍雕造從之正尚武之時而能如是蓋至此年而成也成都石本諸經毛詩儀禮禮記皆祕書省祕書郎張紹文書周禮者祕書省挍書郎孫朋古書周易者國子博士孫逢吉書尚書者校書郎周徳政書爾雅者簡州平泉令張徳昭書題云廣政十四年蓋孟昶時所鐫其字體亦皆精謹兩者並用士人筆札猶有貞觀遺風故不庸俗可以傳逺唯三傳至皇祐元年方畢工殊不逮前紹興中分命兩淮江東轉運司刻三史板其兩漢書内凡欽宗諱並小書四字曰淵聖御名或徑易為威字而他廟諱皆只缺畫愚而自用為可笑也蜀三𫝊後列知益州樞宻直學士右諫議大夫田況銜大書為三行而轉運使直史館曹頴叔提㸃刑獄屯田員外郎孫長卿各細字一行又差低於況今雖執政作牧監司亦與之鴈行也冡宰治内周禮天官冡宰其屬有宫正實掌王宫之戒令紏禁内宰以隂禮教六宫以隂禮教九嬪蓋宫中官之長也故自后夫人之外九嬪世婦女御以下無不列於屬中後世宫掖之事非上宰可得而聞也禮記内則篇記男女事父母舅姑細瑣畢載而首句云后王命冡宰降徳于衆兆民則以其治内故也宰相爵邑國朝宰相初不用爵邑為輕重然亦嘗以代陞黜王文康曽任司空後為太子太師經太宗登極恩但封祁國公吕文穆自司徒謝事為太子太師經東封西祀恩不復再得三公但封徐國許國公而已寇忠愍罷相學士錢惟演以太子太傅處之真宗令更與些恩數惟演但乞封國公王冀公欽若食邑已過萬戸及謫為司農卿於銜内盡除去後再拜相乃悉還之湯岐公以大觀文免相因御史言落職鐫爵趙衛公坐舉官犯贓見為使相但降封益川郡公削二千户今周益公亦然皆故實所無也王婺相元封冀嫌其與欽若同屢欲改適有進國史賞予為擬進韓國制詞用有此冀方莫如韓樂既播告矣而刪定官馮震武以為真宗故封不許用遂貼麻為魯雖著於司封格馮蓋不知富韓公已用之矣是時婺相以食邑過二萬户為辭夀皇遣中使至邁所居宣示令具前此有無體例及合如何施行事理擬定聞奏遂以邑戸無止法復命乃竟行下楊子一毛孟子曰楊子取為我㧞一毛而利天下不為也楊朱之書不𫝊於今其語無所考惟列子所載楊朱曰伯成子髙不以一毫利物舎國而隠耕古之人損一毫利天下不與也人人不損一毫不利天下天下治矣禽子問楊朱曰去子體之一毛以濟一世汝為之乎楊子曰世固非一毛之所濟禽子曰假濟為之乎楊子弗應禽子出語孟孫陽陽曰有侵若肌膚獲萬金者若為之乎曰為之曰有斷若一節得一國子為之乎禽子黙然陽曰積一毛以成肌膚積肌膚以成一節一毛固一體萬分中之一物柰何輕之觀此則孟氏之言可證矣李長吉詩李長吉有羅浮山人詩云欲翦湘中一尺天呉娥莫道呉刀澁正用杜老題王宰書山水圖歌焉得并州快翦刀翦取呉松半江水之句長吉非蹈襲人後者疑亦偶同不失自為好語也子夏經學孔子弟子惟子夏於諸經獨有書雖𫝊記雜言未可盡信然要為與他人不同矣於易則有傳於詩則有序而毛詩之學一云子夏授髙行子四傳而至小毛公一云子夏𫝊曽申五傳而至大毛公於禮則有儀禮䘮服一篇馬融王肅諸儒多為之訓說於春秋所云不能贊一辭蓋亦嘗從事於斯矣公羊髙實受之於子夏糓梁赤者風俗通亦云子夏門人於論語則鄭康成以為仲弓子夏等所撰定也後漢徐防上䟽曰詩書禮樂定自孔子發明章句始於子夏斯其證云容齋續筆卷十四欽定四庫全書容齋續筆卷
