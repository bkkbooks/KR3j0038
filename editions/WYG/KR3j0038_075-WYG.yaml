seq: 75
front:
  text: 九十六則宋洪邁撰
  hash: sha256:1be28537ebc123dc6df8513779ab4e66e5c3c03960a0cc45c42dacb3fd1de5bd
body:
  text: 蔣魏公逸史蔣魏公逸史二十卷頴叔所著也多紀當時典章文物云舊有數百冊兵火間盡失之其曽孫芾始攟摭遺藁而成此書將以奏御以其副上之太史且板行之傳之天下後世既而不果蔣公在熈寧元祐崇寧時名為博聞強識然閲其論述頗有可議恨不及丞相在日與之言其一云行守試視其官品之高下除者必𢃄夲官吕晦叔除守司空而不𢃄金紫光禄大夫者此翰林之失也既不𢃄官不當著守字故晦叔辨之遂去守字為正司空議者謂超過特進東宫三太儀同矣予謂行守試必𢃄正官固也然自改官制以後既為司空自不應復𢃄階官吕從金紫遷只是超特進一級耳東宫三太何嘗以為宰相官儀同又係使相也吕亦無自辨之說其二云文潞公既為真太師矣其罷也乃加守字潞公怏怏諸公欲為去之議者謂非典故潞公之意止欲以真太師致仕耳諸公曰如此可乎曰不可為真太師則在宰相之上竟不去守字但出劄子令權去之案潞公夲以開府儀同三司守太師河東節度使致仕入為平章軍國重事故繫銜只云太師及再致仕悉還舊稱當時有㫖於制詞内除去守字以嘗正任太師也所謂劄子權去恐或不然其三云舊制執政䨇轉謂自工部侍郎轉刑部刑部轉兵部兵部轉工部尚書惟宰相對轉工部侍郎直轉工書比執政三遷也予考舊制執政轉官與學士等六侍郎則升兩曹以工禮刑户兵吏為叙至兵侍者轉右丞至吏侍者轉左丞皆轉工書然後細遷今言兵侍即轉工書非也宰相為侍郎者升三曹為尚書者䨇轉如工侍轉户侍禮侍轉兵侍若係户侍當改二丞而宰相故事不立丞故直遷尚書今言工侍對轉工書非也其四云楊察為翰林學士一夜當三制劉沆以叅知政事富弼以宣徽使皆除宰相宣徽在參政下則富當在劉下乃誤以居上人皆不覺其失惟學士李淑知之揚言其事遂貼麻改之予考國史至和元年八月劉沆以叅知政事拜集賢相二年六月以忠武軍節度使知永興軍文彦博為昭文相位第一劉沆遷史館相位第二宣徽南院使判并州富弼為集賢相位第三其夕三制是已而劉先一年已在相位初無失誤貼改之說其五云有四儀同一曰開府儀同三司二曰儀同三司三曰左儀同三司四曰右儀同三司案自漢鄧隲始為儀同三司魏晉以降但有開府儀同三司之目周隋又増上字為一階又改儀同三司為儀同大將軍又有開府上開府儀同上儀同班列益卑未嘗有左右之稱也後進不當輙議前輩因孫偃有問書以示之沈慶之曹景宗詩宋孝武嘗令羣臣賦詩沈慶之手不知書毎恨眼不識字上逼令作詩慶之曰臣不知書請口授師伯上即令顔師伯執筆慶之口授之曰㣲生遇多幸得逢時運昌朽老筋力盡徒歩還南岡辭榮此聖世何愧張子房上甚恱衆坐并稱其辭意之美梁曹景宗破魏軍還振旅凱入武帝宴飲聯句令沈約賦韻景宗不得韻意色不平啓求賦詩帝曰卿伎能甚多人才英㧞何必止在一詩景宗已醉求作不已時韻已盡唯餘競病二字景宗便操筆其辭曰去時兒女悲歸來笳皷競借問行路人何如霍去病帝歎不已約及朝賢驚嗟竟日予謂沈曹二公未必能辨此疑好事者為之然正可為一佳對曰辭榮聖世何愧子房借問路人何如去病若全用後兩句亦自的切藍尾酒白樂天元日對酒詩云三盃藍尾酒一楪膠牙􅄳又云老過占他藍尾酒病餘收得到頭身嵗盞後推藍尾酒春盤先勸膠牙􅄳荆楚嵗時記云膠牙者取其堅固如膠也而藍尾之義殊不可曉河東記載申屠澄與路傍茅舍中老父嫗及處女環火而坐嫗自外挈酒壺至曰以君冐寒且進一盃澄因揖遜曰始自主人翁即廵澄當婪尾盖以藍為婪當婪尾者謂最在後飲也葉少藴石林燕語云唐人言藍尾多不同藍字多作啉出於侯白酒律謂酒廵匝末坐者連飲三盃為藍尾盖末坐遠酒行到常遲故連飲以慰之以啉為貪婪之意或謂啉為燷如鐡入火貴其出色此尤無稽則唐人自不能曉此義葉之說如此予謂不然白公三盃之句只為酒之廵數耳安有連飲者哉侯白滑稽之語見於啓顔録唐藝文志白有啓顔録十卷雜語五卷不聞有酒律之書也蘇鶚演義亦引其說歐陽公辭官歐陽公自亳州除兵部尚書知青州辭免至四云恩典超優遷轉頗􅂾臣近自去春由吏部侍郎轉左丞未踰兩月又超轉三資除刑部尚書今纔踰嵗又超轉兩資尚書六曹一嵗之間超轉其五累降詔不從其請此是熈寧元年未改官制時今人多不能曉盖昔者左右丞在尚書下所謂左丞超三資除刑書者謂厯工禮乃至刑也下云又超兩資者謂厯户部乃至兵也其上唯有吏部故言尚書六曹超轉其五云南北語音不同南北語音之異至於不能相通故噐物花木之屬雖人所常用固有不識者如毛鄭釋詩以梅為柟竹為王芻簍為翹翹之草是矣顔師古注漢書亦然淮南王安諫武帝伐越書曰輿轎而隃領服䖍曰轎音橋謂隘道輿車也臣瓚曰今竹輿車也江表作竹輿以行項昭曰陵絶水曰轎音旗廟反師古曰服音瓚說是也項氏謬矣此直言以轎過領耳何云陵絶水乎旗廟之音無所依㨿又武帝紀戈船將軍張晏曰越人於水中負人船又有蛟龍之害故置戈於船下因以為名瓚曰伍子胥書有戈船以載干戈因謂之戈船也師古曰以樓船之例言之則非為載干戈也此盖船下安戈㦸以禦蛟鼉水蟲之害張說近之二說皆為三劉所破云今南方竹輿正作旗廟音項亦未為全非顔乃西北人隨其方言遂音橋又云船下安戈㦸既難厝置又不可以行且今造舟船甚多未嘗有置戈者顔北人不知行船項說是也子謂項音轎字是也而云陵絶水則謬故劉公以為未可全非張晏云越人於水中負船尤可笑南舟北帳頃在豫章遇一遼州僧於上藍與之閒談曰南人不信北方有千人之帳北人不信南人有萬斛之舟盖土俗然也法苑珠林云山中人不信有魚大如木海上人不信有木大如魚胡人見錦不信有蟲食樹吐絲所成吳人身在江南不信有千人氊帳及來河北不信有二萬碩船遼僧之談合於此魏冉罪大自漢以來議者謂秦之亡由商鞅李斯鞅更變法令使民不見徳斯焚燒詩書欲人不知古其事固然予觀秦所以得罪於天下後世皆自挾詐失信故耳其始也以商於六百里啖楚絶齊繼約楚懐王入武闗辱為藩臣竟留之至死及其喪歸楚人皆憐之如悲親戚諸侯由是不直秦未及百年三户亡秦之語遂騐而為此謀者張儀魏冉也儀之惡不待言而冉之計頗隠故不為士君子所誅當秦武王薨諸弟爭立唯冉力能立昭王冉者昭王母宣太后之弟也昭王少太后自治事任冉為政威震秦國才六年而詐留楚王又怒其立太子復取十六城是時王不過十餘嵗為此者必冉也後冉為范睢所間而廢逐司馬公以為冉援立昭王除其災害使諸侯稽首而事秦秦益彊大者冉之功也盖公不細考之云又嘗請趙王㑹澠池處心積慮亦與詐楚同頼藺相如折之是以無所成不然與楚等耳冉區區匹夫之見徒能為秦一時之功而貽秦不義不信之名萬世不滅者冉之罪誠大矣辯秦少游義倡夷堅已志載潭州義倡事謂秦少游南遷過潭與之徃來後倡竟為秦死常州教授鍾將之得其說於李結次山為作傳予反復思之定無此事當時失於審訂然悔之不及矣秦將赴杭倅時有妾邉朝華既而以妨其學道割愛去之未㡬罹黨禍豈復眷戀一倡女哉予記國史所書温益知潭州當紹聖中逐臣在其廵内若范忠宣劉仲馮韓川原伯吕希純子進吕陶元鈞皆為所侵困鄒公南遷過潭暮投宿村寺益即時遣州都監將數卒夜出城逼使登舟竟凌風絶江去㡬於覆舟以是觀之豈肯容少游欵眤累日此不待辯而明已志之失著矣姓源韻譜姓氏之書大抵多謬誤如唐貞觀氏族志今已亡其夲元和姓纂誕妄最多國朝所修姓源韻譜尤為可笑姑以洪氏一項考之云五代時有洪昌洪杲皆為參知政事予按二人乃五代南漢僭主劉龑之子及晟嗣位用為知政事其兄弟本連𢎞字以夲朝國諱故五代史追改之元非姓洪氏也此與洪慶善序丹陽𢎞氏云有𢎞憲者元和四年嘗䟦輞川圖不知𢎞憲乃李吉甫之字耳其誤正同三筆已載此說譽人過實稱譽人過實最為作文章者之疵病班孟堅尚不能免如薦謝夷吾一書予盖論之於三筆矣柳子厚復杜温夫書云三辱生書書皆逾千言抵吾必曰周孔周孔安可當也語人必於其倫生來柳州見一刺史即周孔之今而去我道連而謁於潮又得二周孔去之京師京師顯人為文詞立聲名以千數又宜得周孔千百何吾生胸中擾擾焉多周孔哉是時劉夢得在連韓退之在潮故子厚云然此文人人能誦然今之好為諛者固自若也予表出之以為子孫戒張說賀魏元忠衣紫曰公居伊周之任即為二張所䜛幾於隕命此但形於語言之間耳作文句法作文㫖意句法固有規倣前人而音節鏘亮不嫌於同者如前漢書贊云豎牛奔仲叔孫卒郈伯毁季昭公逐費忌納女楚建走宰嚭譖胥夫差喪李園進妹春申斃上官訴屈懐王執趙高敗斯二世縊伊戾坎盟宋痤死江充造蠱太子殺息夫作姦東平誅新唐書効之云三宰嘯㐫牝奪辰林甫將蕃黄屋奔鬼質敗謀興元戲崔柳倒持李宗覆劉夢得因論儆舟篇云越子膝行吳君忽晉宣尸居魏臣怠白公厲劒子西哂李園飬士春申易以効班史語也然其模範本自荀子成相篇書簡循習近代士人相承於書尺語言浸渉竒獧雖有賢識不能自改如小􅂤問委自言所在必求新異之名予守贑時屬縣興國宰貽書云㶑水有驅策乞疏下㶑水者彼邑一水耳郡中未嘗知此不足以為工當言下邑屬邑足矣為縣丞者無不采藍田壁記語云負丞某處哦松無補渉筆承之皆厭爛陳言至稱丞曰藍田殊為可笑初赴州郡與人書必言前政頺靡倉庫匱乏未知所以善後㳂習一律正使真如所陳讀者亦不之信予到當塗日謝執政書云郡雖小而事簡庫錢倉粟自可枝梧得坐嘯道院誠為至幸周益公答云從前得外郡太守書未有不以窘冗為詞獨創見來緘如此盖覺其與它異也此兩者皆狃熟成俗故紀述以戒子弟輩健訟之誤破句讀書之誤根着于人殆不可復正在易彖之下先釋卦義然後承以本名者凡八卦蒙卦曰蒙山下有險險而止蒙以止字為句絶乃及於蒙始係以蒙亨以亨行訟卦曰訟上剛下險險而健訟以健字為句絶乃及於訟始係以訟有孚豫卦剛應而志行順以動豫隨卦剛來而下柔動而説隨蠱卦剛上而柔下㢲而止蠱恒卦㢲而動剛柔皆應恒解卦解險以動動而免乎險解井卦巽乎水而上水井皆是卦名之上為句絶而童蒙入學之初其師㸃句輙混於上遂以健訟相連此下說隨二字尚為有說若止蒙動豫之類將如之何凡謂頑民好訟者曰嚚訟曰終訟可也黄魯直江西道院賦云細民險而健以終訟為能筠獨不嚚於訟是已同人卦柔得中而應乎乾曰同人同人曰同人于野亨据其文義正與諸卦同但多下一曰字王弼以為乾之所行故特曰同人曰程伊川以為衍三字恐不然也用史語之失今之牽引史語者亦未免有失張釋之言便宜事文帝曰卑之毋甚高論令今可行也遂言秦漢之間事帝稱善顔師古云令其議論依附時事予謂不欲使為甚高難行之論故令少卑之爾而今之語者直以言議不足采為無甚高論又文帝問上林令禽獸簿不能對虎圏嗇夫從旁代對帝曰吏不當如此邪薛廣徳諫元帝御樓船曰宜從橋且有血汚車輪之訐張猛曰乘船危就橋安上曰曉人不當如是耶師古謂諫爭之言當如猛之詳婉也按兩帝之語皆是褒嘉之詞猶云獨不當如是乎今乃指人引諭非理或直述其私曰曉人不當如是又韓公送諸葛覺徃徐州讀書詩云鄴侯家多書挿架三萬軸一一懸牙籖新若手未觸為人強記覽過眼不再讀偉哉羣聖文磊落載其腹鄴侯盖謂李繁時為隨州刺史藏書既多且記性警敏故籖軸嚴整如是今人或指言雖名為收書而未嘗過目者輙曰新若手未觸亦非也文字書簡謹日作文字紀月日當以實言若拘拘然必以節序則為牽強乃似麻沙書坊桃源居士輩所䟦耳至於徃還書問不可不繫日而性率者一切不書予有婿生子遣報云今日巳時得一子更不知為何日或又失之好竒外姻孫鼎臣毎致書必題其後曰某節至云小暑前一日驚蟄前兩日之類文惠公常笑云看孫鼎臣書須著置歴日於案上盖自元正人日三元上已中秋端午七夕重九除夕外雖寒食冬至亦當謹識之况於小小氣候後生宜戒更衣雅志堂後小室名之曰更衣以為姻賔憇息地稚子數請所出因錄班史語示之灌夫𫝊坐乃起更衣顔注更改也凡久坐者皆起更衣以其寒暖或變也田延年起至更衣顔注古者延賔必有更衣之處衞皇后𫝊帝起更衣子夫侍尚衣容齋四筆卷九欽定四庫全書容齋四筆卷
