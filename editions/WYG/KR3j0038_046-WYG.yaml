seq: 46
front:
  text: 十十七則
  hash: sha256:ab2be8ef78c03fc854ee70aef942670d264a0efb6f804bc5f9edcc27e3d29a7a
body:
  text: 宋洪邁撰詞學科目熈寧罷詩賦元祐復之至紹聖又罷於是學者不復習為應用之文紹聖二年始立宏詞科除詔誥制勅不試外其章表露布檄書頌箴銘序記誡諭凡九種以四題作兩塲引試唯進士得預而專用國朝及時事為題每取不得過五人大觀四年改立詞學兼茂科增試制詔内二篇以歴代史故事每嵗一試所取不得過三人紹興三年工部侍郎李擢又乞取兩科裁訂别立一科遂增為十二體曰制曰誥曰詔曰表曰露布曰檄曰箴曰銘曰記曰贊曰頌曰序凡三塲試六篇每塲一古一今而許卿大夫之任子亦就試為博學宏詞科所取不得過五人任子中選者賜進士第雖用唐時科目而所試文則非也自乙卯至于紹熙癸丑二十牓或三人或二人或一人并之三十三人而紹熙庚戌闕不取其以任子進者湯岐公至宰相王日嚴至翰林承㫖李獻之學士陳子象兵部侍郎湯朝羙右史陳峴方進用而予兄弟居其間文惠公至宰相文安公至執政予冐處翰苑此外皆係已登科人然擢用者惟周益公至宰相周茂振執政沈徳和莫子齊倪正父莫仲謙趙大本傅景仁至侍從葉伯益季元衡至左右史餘多碌碌而見存未顯者陳宗召也然則吾家所蒙亦云過矣唐夜試進士唐進士入舉塲得用燭故或者以為自平旦至通宵劉虚白有二十年前此夜中一般燈燭一般風之句及三條燭盡之說按舊五代史選舉志云長興二年禮部貢院奏當司奉堂帖夜試進士有何條格者勅㫖秋來赴舉備有常程夜後為文曾無舊制王道以明規是設公事須白晝顯行其進士並令排門齊入就試至閉門時試畢内有先了者上歴晝時旋令先出其入䇿亦須晝試應諸科對䇿並依此例則晝試進士非前例也清泰二年貢院又請進士試雜文並㸃門入省經宿就試至晉開運元年又因禮部尚書知貢舉竇正固奏自前考試進士皆以三條燭為限并諸色舉人有懐藏書册不令就試未知於何時復有更革白樂天集中奏狀云進士許用書册兼得通宵但不明言入試朝暮也納紬絹尺度周顯徳三年勅舊制織造絁紬絹布綾羅錦綺紗縠等幅闊二尺起來年後並須及二尺五分宜令諸道州府來年所納官絹每匹須及一十二兩其絁紬只要夾密停匀不定斤兩其納官紬絹依舊長四十二尺乃知今之稅絹尺度長短闊狹斤兩輕重頗本於此朱梁輕賦朱梁之惡最為歐陽公五代史記所斥詈然輕賦一事舊史取之而新書不為拈出其語云梁祖之開國也屬黄巢大亂之餘以夷門一鎮外嚴烽候内辟汙萊厲以耕桑薄以租賦士雖苦戰民則樂輸二紀之間俄成霸業及末帝與莊宗對壘于河上河南之民雖困於輦運亦未至流亡其義無他盖賦歛輕而邱園可戀故也及莊宗平定梁室任吏人孔謙為租庸使峻法以剥下厚斂以奉上民産雖竭軍食尚虧加之以兵革因之以饑饉不四三年以致顛隕其義無他盖賦役重而寰區失望故也予以事考之此論誠然有國有家者之龜鑑也資治通鑑亦不載此一節坎離隂陽坎位正北當幽隂肅殺之地其象於易為水為月董仲舒所謂隂常居大冬而積於空虚不用之處然而謂之陽離位正南當文明赫赫之地於易為日為火仲舒所謂陽常居大夏而以生育長養為事然而謂之隂豈非以隂生於午陽生於子故邪司馬正云天是陽而南是陽位故木亦是陽所以木正為南正也火是地正亦稱北正者火數二二地數地隂主北方故火正亦稱北正究其極摯頗似難曉聖人無所云古先名儒以至于今亦未有論之者前執政為尚書祖宗朝曾為執政其後入朝為他官者甚多自元豐改官制後但為尚書曾孝寛自簽書樞密去位復拜吏部尚書韓忠彦自知樞密院出藩以吏書召李清臣蒲宗孟王存皆嘗為左丞而清臣存復拜吏書宗孟兵書先是元祐六年清臣除目下為給事中范祖禹封還朝廷未決繼又進擬宗孟兵部右丞蘇轍言不如且止左僕射吕大防於簾前奏諸部久闕尚書見在人皆資淺未可用又不可闕官須至用前執政轍曰尚書闕官已數年何嘗闕事遂已胡宗愈嘗為右丞召拜禮書吏書自崇寧已來乃不復然河伯娶婦史記褚先生所書魏文侯時西門豹為鄴令問民所疾苦長老曰吾為河伯娶婦以故貧豹問其故對曰鄴三老廷掾常嵗賦斂百姓錢得數百萬用其二三十萬為河伯娶婦與祝巫分其餘錢持歸巫行視小家女好者即聘娶為治齋宫河上粉飾女浮之河中而没其人家有好女者多持女逺逃亡以故城中益空無人豹曰至娶婦時吾亦往送遂投大巫嫗及三弟子并三老於河乃罷去從是以後不敢復言為河伯娶婦予按此事盖出於一時雜𫝊記疑未必有實而六國表秦靈公八年初以君主妻河言初者自此年而始不知止於何時注家無說司馬貞史記索隱乃云初以君主妻河謂初以此年取他女為君主君主猶公主也妻河謂嫁之河伯故魏俗猶為河伯娶婦盖其遺風然則此事秦魏皆有之矣六經用字六經之道同歸㫖意未嘗不一而用字則有不同者如佑祐右三字一也而在書為佑在易為祐在詩為右惟維唯一也而在書為惟在詩為維在易為唯左𫝊亦然又如易之无字周禮之灋眡薧鱻齍辠􅈄㮚斞閷􅗺等字他經皆不然今人書无咎无妄多作無失之矣孝宗初登極以濳邸為佑聖觀令玉册官篆牌奏云篆法佑字無立人只單作右字道士力爭以為觀名去人恐不可安跡有㫖特增之鄂州興唐寺鄂州城北鳯凰山之隂有佛刹曰興唐寺其小閣有鐘題誌云大唐天祐二年三月十五日新鑄勒官階姓名者兩人一曰金紫光禄大撿挍尚書左僕射兼御史大陳知新一曰銀青光禄大撿挍尚書右僕射兼御史大楊琮大字之下皆當有夫字而悉削去觀者莫能曉五代新舊史九國志並無其說唯劉道原十國紀年載楊行密之父名怤怤與夫同音是時行密據淮南方破杜洪於鄂而有其地故將佐為諱之行密之子渭建國之後改文散諸大夫為大卿御史大夫為御史大憲更可證也鄱陽浮洲寺有呉武義二年銅鐘安國寺有順義三年鐘皆刺史吕師造題官稱曰光禄大卿撿挍太保兼御史大卿然則亦非大憲也王得臣塵史嘗辨此事而云行宻遣劉存破鄂州知新琮不預志𫝊皆略而不書予又按楊溥時劉存以鄂岳觀察使為都招討使知新以岳州刺史為團練使同將兵擊楚為所執殺則知新乃存偏禆非不預也禰衡輕曹操孔融薦禰衡以為淑質正亮英才卓躒志懐霜雪疾惡若讐任座史魚殆無以過若衡等輩不可多得數稱述於曹操操欲見之衡素相輕疾不肯往而數有恣言操懐忿因召之擊鼓裸身辱之融為見操說其狂疾求得自謝操喜勅門者有客便通待之極宴衡乃坐於營門言語悖逆操怒送與劉表衡為融所薦東坡謂融視操特鬼蜮之雄其勢决不兩立非融誅操則操害融而衡平生唯善融及楊修常稱曰大兒孔文舉小兒楊徳祖融修皆死於操手衡無由得全漢史言其尚氣剛傲矯時慢物此蓋不知其鄙賤曹操故䧟身危機所謂語言狂悖者必誦斥其有僭簒之志耳劉表復不能容以與黄祖觀其所著鸚鵡賦専以自況一篇之中三致意焉如云嬉游髙峻栖峙幽深飛不妄集翔必擇林雖周旋於羽毛固殊智而異心配鸞皇而等羙焉比翼於衆禽又云彼賢哲之逢患猶棲遲以羈旅矧禽鳥之微物能馴擾以安處又云嗟禄命之衰薄奚遭時以嶮巇豈言語以階亂將不密以致危又云顧六翮之殘毁雖奮迅其焉如心懐歸而弗果徒怨毒於一隅卒章云茍竭心於所事敢背惠以忘初期守死以報徳甘盡辭以効愚予每三復其文而悲傷之李太白詩云魏帝營八極蟻觀一禰衡黄祖斗筲人殺之受惡名呉江賦鸚鵡落筆超羣英鏘鏘振金石句句欲飛鳴摯鶚啄孤鳯千春傷我情此論最為精當也禁中文書韓魏公為相密與仁宗議定立嗣公曰事若行不可中止陛下斷自不疑乞内中批出帝意不欲宫人知曰只中書行足矣淳熈十四年十月二十二日夀皇聖帝自徳壽持䘮還宫二十五日有㫖召對與吏部尚書蕭燧同引中使先諭㫖曰教内翰留身既對乃旋於東華門内行廊下夾一素幄御榻後出一紙録唐貞觀中太子承乾監國事以相示蕭先退上與邁言欲令皇太子參決萬㡬使條具合行事宜仍戒云進入文字須是密邁奏言當親自書寫實封詣通進司上曰也只翦開不如分付近上一箇内臣邁又言臣無由可與内臣相聞知惟御藥是學士院承受文字尋常只是公家文書𫝊達今則不可欲俟撿索典故了日却再乞對面納上曰極好於是七月間三得從容乃知禁廷機事深畏漏泄如此其詳見於所記見聞事實老子之言老子之言大抵以無為無名為本至於絶聖棄智然所云將欲歙之必固張之將欲弱之必固强之將欲廢之必固興之將欲奪之必固與之乃似於用機械而有心者微言淵奥固莫探其㫖也孔叢子前漢枚乗與呉王濞書曰夫以一縷之任係千鈞之重上縣無極之髙下垂不測之淵雖甚愚之人猶知哀其將絶也馬方駭鼓而驚之係方絶又重鎮之係絶於天不可復結墜入深淵難以復出孔叢子嘉言篇載子貢之言曰夫以一縷之任繫千鈞之重上縣之於無極之髙下垂之於不測之深旁人皆哀其絶而造之者不知其危馬方駭鼓而驚之係方絶重而鎮之繫絶於髙墜入於深其危必矣枚叔全用此語漢書注諸家皆不引證唯李善注文選有之予按孔叢子一書漢蓺文志不載蓋劉向父子所未見但於儒家有太常蓼侯孔臧十篇今此書之末有連叢子上下二卷云孔臧著書十篇疑即是已然所謂叢子者本陳渉博士孔鮒子魚所論集凡二十一篇為六卷唐以前不為人所稱至嘉祐四年宋咸始為注釋以進遂𫝊於世今讀其文略無楚漢閒氣骨豈非齊梁以來好事者所作乎孔子家語著録於漢志二十七卷顔師古云非今所有家語也小星詩詩序不知何人所作或是或非前人論之多矣唯小星一篇顯為可議大序云惠及下也而繼之曰夫人惠及賤妾進御於君故毛鄭從而為之辭而鄭箋為甚其釋肅肅宵征抱衾與裯兩句謂諸妾肅肅然而行或早或夜在於君所以次序進御又云裯者牀帳也謂諸妾夜行抱被與牀帳待進御且諸侯有一國其宫中嬪妾雖云至下固非閭閻賤微之比何至于抱衾而行況於牀帳勢非一己之力所能致者其說可謂陋矣此詩本是詠使者逺適夙夜征行不敢慢君命之意與殷其靁之指同桃源行陶淵明作桃源記云源中人自言先世避秦時亂率妻子邑人來此絶境不復出焉乃不知有漢無論魏晉系之以詩曰嬴氏亂天紀賢者避其世黄綺之商山伊人亦云逝願言躡輕風髙舉尋吾契自是之後詩人多賦桃源行不過稱贊仙家之樂唯韓公云神仙有無何渺茫桃源之說誠荒唐世俗那知偽為真至今𫝊者武陵人亦不及淵明所以作記之意按宋書本𫝊云濳自以曾祖晉世宰輔恥復屈身後代自宋高祖王業漸隆不復肯仕所著文章皆題其年月義熈以前則書晉氏年號自永初以來唯云甲子而已故五臣注文選用其語又繼之云意者恥事二姓故以異之此說雖經前輩所詆然予竊意桃源之事以避秦為言至云無論魏晉乃寓意於劉裕託之於秦借以為喻耳近時胡宏仁仲一詩屈折有竒味大略云靖節先生絶世人柰何記偽不考真先生髙歩窘末代雅志不肯為秦民故作斯文寫幽意要似寰海離風塵其說得之矣司封贈典之失前所書司封失典故偶復憶一事尤為可笑紹興二十八年郊祀赦恩資政殿學士樓炤父已贈少師乞加贈司封以資政殿學士係只封贈一代父既至少師不合加贈獨改封其母范氏歐陽氏為秦國魏國夫人蓋樓公雖嘗為執政而見居官職須大學士乃恩及二代故但用侍從常格資政殿學士施鉅父仲說已贈太子太保加為宫傅亦不及祖也乾道六年仲兄以端明殿學士知太平州是年郊赦伯兄已贈祖為太保而轉運司移牒太平州云準吏部牒取會本路曽任執政官合封贈二代者仲兄既具以報又再行下時祖母及父母已至極品於是以祖為言遂復贈太傅命詞給告殊非端殿所當得不知省部一時何所據也辰巳之巳律書釋十母十二子之義大略與今所言同唯至四月云其於十二子為己巳者言陽氣之己盡也據此則辰巳之己乃為矣音其他引二十八宿謂柳為注畢為濁昴為留亦見於毛詩注及左氏𫝊如詩謂營室為定星也容齋三筆卷十欽定四庫全書容齋三筆卷十一十六則宋洪邁撰碑誌不書名碑誌之作本孝子慈孫欲以稱揚其父祖之功徳播之當時而垂之後世當直存其名字無所避隱然東漢諸銘載其先代多只書官如淳于長夏承碑云東萊府君之孫太尉掾之中子右中郎將之弟李翊碑云䍧牱太守曾孫謁者孫從事君元子之類是也自唐及本朝名人文集所志往往只稱君諱某字某至於記序之文亦然王荆公為多殆與求文揚名之㫖為不相契東坡先生送路都曹詩首言乖崖公在蜀有録事參軍老病廢事公責之遂求去以詩留别所謂秋光都似宦情薄山色不如歸意濃者公驚謝之曰吾過矣同僚有詩人而吾不知因留而慰薦之坡㓜時聞父老言恨不問其姓名及守潁州而都曹路君以小疾求致仕誦此語留之不可乃采前人意作詩送之其詩大略云結髮空百戰市人看先封誰能搔白首抱關望夕烽則路君之賢而不遇可知矣然亦不書其名使之少獲表見又為可惜也漢文帝不用兵史記律書云髙祖厭苦軍事偃武休息孝文即位將軍陳武等議曰南越朝鮮擁兵阻阸選蠕觀望宜及士民樂用征討逆黨以一封疆孝文曰朕能任衣冠念不到此會吕氏之亂誤居正位常戰戰慄慄恐事之不終且兵凶器雖克所願動亦耗病謂百姓逺方何今匈奴内侵邊吏無功邊民父子荷兵日久朕常為動心傷痛無日忘之願且堅邊設候結和通使休寧北陲為功多矣且無議軍故百姓無内外之繇得息肩於田畝天下富盛粟至十餘錢予謂孝文之仁徳如此與武帝黷武窮兵為霄壤不侔矣然班史略不及此事資治通鑑亦不編入使其事不甚暴白惜哉帝王諱名帝王諱名自周世始有此制然只避之於本廟中耳克昌厥後駿發爾私成王時所作詩昌發不為文武諱也宣王名誦而吉甫作誦之句正在其時厲王名胡而胡為虺蜴胡然厲矣之句在其孫幽王時小國曰胡亦自若也襄王名鄭而鄭不改封至於出居其國使者告于秦晉曰鄙在鄭地受晉文公朝而鄭伯傅王唯秦始皇以父莊襄王名楚稱楚曰荆其名曰政自避其嫌以正月為一月盖已非周禮矣漢代所謂邦之字曰國盈之字曰滿徹之字曰通雖但諱本字而吏民犯者有刑唐太宗名世民在位之日不偏諱故戴胄唐儉為民部尚書虞世南李世勣在朝至于髙宗始改民部為户部世勣但為勣韓公諱辨云今上書及詔不聞諱滸勢秉饑惟宦官宫妾乃不敢言喻及機以為觸犯此數者皆其先世嫌名也本朝尚文之習大盛故禮官討論每欲其多廟諱遂有五十字者舉塲試卷小渉疑似士人輒不敢用一或犯之往往暗行黜落方州科舉尤甚此風殆不可革然太祖諱下字内有从木从勻者廣韻於進字中亦收張魏公以名其子而音為進太宗諱字内有从耳从火者又有梗音今為人姓如故髙宗諱内从勻从口者亦然真宗諱从心从亘音胡登切若缺其一畫則為􅁪遂并􅁪字不敢用而易為常矣家諱中字士大夫除官於官稱及州府曹局名犯家諱者聽回避此常行之法也李燾仁甫之父名中當贈中奉大夫仁甫請於朝謂當告家廟與自身不同乞用元豐以前官制贈光禄卿丞相頗欲許之予在西垣聞其說為諸公言今一變成式則他日贈中大夫必為祕書監贈太中大夫必為諫議矣法不可行遂止李愿為江東提刑以父名中所部遂呼為通議盖近世率妄稱太中也李自稱只以本秩曰朝散黄通老資政之子為臨安通判府中亦稱為通議而受之自如記張元事自古外國之臣來入中國者必為人用由余入秦穆公以霸金日磾仕漢脫武帝五柞之厄唐世尤多執失思力阿史那社爾李臨淮髙仙芝渾瑊李懐光􅎤跌光顔朱耶克用皆立大功名不可殫紀然亦在朝廷所以御之否則為郭藥師矣儻使中國英儁翻致力於異域忌壯士以資敵國者固亦多有賈季在狄晉六卿以為難日至桓温不能留王猛使為苻堅用唐莊宗不能知韓延徽使為阿保機用皆是也西夏曩霄之叛其謀皆出於華州士人張元與呉昊而其事本末國史不書比得田晝承君集實紀其事云張元呉昊姚嗣宗皆關中人負氣倜儻有縱横才相與友善嘗薄遊塞上觀覘山川風俗有經略西鄙意姚題詩崆峒山寺壁在兩界閒云南粤干戈未息肩五原金􅈜又轟天崆峒山叟笑無語飽聽松聲春晝眠范文正公巡邊見之大驚又有踏破賀蘭石掃清西海塵之句張為鸚鵡詩卒章曰好著金籠收拾取莫教飛去别人家呉亦有詩將謁韓范二帥恥自屈不肯往乃礱大石刻詩其上使壯夫拽之於通衢三人從後哭之欲以鼓動二帥既而果召與相見躊躇未用閒張呉徑走西夏范公以急騎追之不及乃表姚入幕府張呉既至夏國夏人倚為謀主以抗朝廷連兵十餘年西方至為疲弊職此二人為之時二人家屬羈縻隨州閒使諜者矯中國詔釋之人未有知者後乃聞西人臨境作樂迎此二家而去自是邊帥始待士矣姚又有述懐詩曰大開雙白眼只見一青天張有雪詩曰五丁仗劍決雲霓直取銀河下帝畿戰死玉龍三十萬敗鱗風卷滿天飛呉詩獨不𫝊觀此數聮可想見其人非池中物也承君所記如此予謂張呉在夏國然後舉事不應韓范作帥日尚猶在闗中豈非記其嵗時先後不審乎姚張詩筆談諸書頗亦紀載張呉之名正與羌酋二字同蓋非偶然也宫室土木秦始皇作阿房宫寫蜀荆地材至關中役徒七十萬人隋煬帝營宫室近山無大木皆致之逺方二千人曵一柱以木為輪則戞摩火出乃鑄鐵為轂行一二里轂輒破别使數百人齎轂隨而易之盡日不過行二三十里計一柱之費已用數十萬功大中祥符閒姦佞之臣罔真宗以符瑞大興土木之役以為道宫玉清昭應之建丁謂為修宫使凡役工日至三四萬所用有秦隴岐同之松嵐石汾隂之栢潭衡道永鼎吉之梌柟櫧温台衢吉之檮永澧處之槻樟潭柳明越之杉鄭淄之青石衡州之碧石萊州之白石絳州之斑石呉越之奇石洛水之石卵宜聖庫之銀朱桂州之丹砂河南之赭土衢州之朱土梓信之石青石碌磁相之黛秦階之雌黄廣州之藤黄孟澤之槐華虢州之鉛丹信州之土黄河南之胡粉衞州之白堊鄆州之蚌粉兖澤之墨歸歙之漆萊蕪興國之鐵其木石皆遣所在官部兵民入山谷伐取又於京師置局化銅為鍮治金薄鍜鐵以給用凡東西三百一十歩南北百四十三歩地多黒土䟽惡於京東北取良土易之自三尺至一丈有六等起二年四月至七年十一月宫成總二千六百一十區不及二十年天火一夕焚􅅡但存一殿是時役徧天下而至尊無窮兵黷武聲色苑囿嚴刑峻法之舉故民間樂從無一違命視秦隋二代萬萬不侔矣然一時賢識之士猶為盛世
