front:
  text: 四九則
  hash: sha256:7196be823cde63d0779f1cc8e98619e3324a45e1d203be38e0329c75c5b575ee
body:
  text: 宋洪邁撰作詩㫖意詩三百篇中其譽婦人者至多如叙宗姻之貴者若平王之孫齊侯之子汾王之甥蹶父之子齊侯之子衛侯之妻東宫之妹邢侯之姨譚公維私夸服飾之盛者若副笄六珈如山如河玉之瑱也象之揥也贊容色之美者若唐棣之華華如桃李鬒髪如雲手如柔荑膚如凝脂領如蝤蠐齒如瓠犀螓首蛾眉巧笑倩兮美目盼兮顔如舜華洵美且都語嫁聘之侈者若百兩彭彭八鸞鏘鏘不顯其光諸娣從之祁祁如雲爛其盈門其詞可謂盡善矣魏晉六朝流連光景不可勝述唐人播之歌詩固亦極摯若態濃意逺淑且眞肌理細膩骨肉勻繡羅衣裳照暮春蹙金孔雀銀麒麟翠㣲㔩葉垂鬢脣珠壓腰衱穩稱身深宫髙樓入紫清金作蛟龍盤繡楹佳人當窗弄白日絃將手語彈鳴筝回眸一笑百媚生六宫粉黛無顔色後宫佳麗三千人三千寵愛在一身金屋粧成嬌侍夜玉樓宴罷醉和春樓上樓前盡珠翠眩轉熒煌照天地此皆李杜元白之麗句也余獨愛朱慶餘閨意一絶句上張籍水部者曰洞房昨夜停紅燭待曉堂前拜舅姑粧罷低聲問夫壻畵眉深淺入時無細味此章元不談量女之容貎而其華艶韶好體態温柔風流醖藉非第一人不足當也歐陽公所謂狀難寫之景如在目前含不盡之意見於言外然後為工斯之謂也慶餘名可久以字行登寳厯進士第而官不達著録於藝文志者只一卷予家有之他不逮此張籍酬其篇云越女新粧出鏡心自知明艶更沉吟齊紈未是人間貴一曲菱歌直萬金其愛之重之可見矣然比之慶餘殊為不及平王之孫周南召南之詩合為二十有五篇自漢以來為之說者必系之文武成康故不無牴牾如何彼穠矣乃美王姬之詩其詞有平王之孫齊侯之子兩句翻覆再言之毛公箋云武王女文王孫適齊侯之子鄭氏不立說考其意葢以平王為平正之王齊侯為齊一之侯若所謂武王載斾成王之孚成王不敢康非指武與成者然證諸春秋經魯莊公元年當周莊王之四年齊襄公之五年書曰單伯送王姬繼之以築王姬之館于外又繼之以王姬歸于齊杜預注云王將嫁女于齊命魯為主莊公在諒闇慮齊侯當親迎不忍便以禮接于廟故築舍於外末書歸于齊者終此一事也十一年又書王姬歸于齊傳言齊侯來逆共姬乃威公也莊王為平王之孫則所嫁王姬當是姊妹齊侯之子即襄公威公也二者必居一于此矣明白如是而以為武王女文王孫於義何取毛詩語助毛詩所用語助之字以為句絶者若之乎焉也者云矣爾兮哉至今作文者皆然他如只且忌止思而何斯旃其之類後所罕用只字如母也天只不諒人只且字如椒聊且逺條且狂童之狂也且既亟只且忌字如叔善射忌又良御忌止字如齊子歸止曷又懷止女心傷止思字如不可求思爾羊來思今我來思而字如俟我於著乎而充耳以素乎而何字如如此良人何如此粲者何斯字如恩斯勤斯鬻子之閔斯彼何人斯旃字如舍旃舍旃其字音基如夜如何其子曰何其皆是也忌惟見於鄭詩而惟見於齊詩楚詞大招一篇全用只字太𤣥經其人有輯抗可與過其至於些字獨招魂用之耳東坡文章不可學東坡作盖公堂記云始吾居郷有病寒而欬者問諸醫醫以為蠱不治且殺人取其百金而治之飲以蠱藥攻伐其腎腸燒灼其體膚禁切其飲食之美者朞月而百疾作内熱惡寒而欬不已纍然眞蠱者也又求於醫醫以為熱授之以寒藥旦夕吐之莫夜下之於是始不能食懼而反之則鍾乳烏喙雜然並進而漂疽癰疥眩瞀之狀無所不至三易醫而病愈甚里老父敎之曰是醫之罪藥之過也子何疾之有人之生也以氣為主食為輔今子終日藥不釋口息味亂於外而百毒戰於内勞其主隔其輔是以病也子退而休之謝醫却藥而進所嗜氣全而食美矣則夫藥之良者可以一飲而效從之朞月而病良已昔之為國者亦然吾觀夫秦自孝公以來至於始皇立法更制以鑴磨鍜鍊其民可謂極矣蕭何曹参親見其斵喪之禍而收其民於百戰之餘知其厭苦憔悴無聊而不可與有為也是以一切與之休息而天下安是時熈寧中公在宻州為此説者以諷王安石新法也其議論病之三易與秦漢之所以興亡治亂不過三百言而盡之張文潜作藥戒僅千言云張子病痞積於中者伏而不能下自外至者捍而不能納從醫而問之曰非下之不可歸而飲其藥既飲而暴下不終日而向之伏者散而無餘向之捍者柔而不支焦膈𨗳達呼吸開利快然若未始有疾者不數日痞復作投以故藥其快然也亦如初自是逾月而痞五作五下每下輒愈然張子之氣一語而三引體不勞而汗股不歩而慄膚革無所耗於外而其中薾然莫知其所來聞楚之南有良醫焉往而問之醫歎曰子無嘆是薾然者也天下之理其甚快於予心者其末必有傷求無傷於終者則初無望於快吾心痞横於胷中其累大矣擊而去之不須臾而除甚大之累和平之物不能為也必將擊搏震撓而後可其功未成而和氣已病則子之痞凡一快者子之和一傷矣不終月而快者五則和平之氣不既索乎且將去子之痞而無害於和乎子歸燕居三月而後予之藥可為也張子歸三月而復請之醫曰子之氣少全矣取藥而授之曰服之三月而疾少平又三月而少康終年而復常且飲藥不得亟進張子歸而行其說其初使人懣然遲之葢三投其藥而三反之也然日不見其所攻久較則月異而時不同蓋終歲而疾平張子謁醫謝而問其故醫曰是治國之說也獨不見秦之治民乎勅之以命捍而不聽令勤之以事放而不畏法令之不聽治之不變則秦之民嘗痞矣商君見其痞也厲以刑法威以斬伐痛剗而力鋤之流蕩四達無敢或拒痞嘗一快矣至於二世凡幾痞而幾快矣積快而不已而秦之四支枵然徒有其物而已民心日離而君孤立于上故匹夫大呼不終日而百疾皆起欲運其手足肩膂而漠然不我應故秦之亡者是好為快者之過也昔者先王之民初亦嘗痞矣先王不敢求快於吾心隂觧其亂而除去其滯使之悠然自趨於平安而不自知於是政成教達悠久而無後患則余之藥終年而愈疾者蓋無足怪也予觀文潜之說盡祖蘇公之緒論而千言之煩不若三百言之簡也故詳書之俾作文立說者知所矜式竊料蘇公之記文潜必未之見是以著此篇若既見之當不復屋下架屋也韓文稱名歐陽公作文多自稱予雖說君上處亦然三筆嘗論之矣歐公取法於韓公而韓不然滕王閣記袁公先廟為尊者所作謙而稱名宜也至於徐泗掌書記壁記科斗書後記李虛中墓誌之類皆曰愈可見其謙以下人後之為文者所應取法也棘寺棘卿今人稱大理為棘寺卿為棘卿丞為棘丞此出周禮秋官朝士掌建邦外朝之法左九棘孤卿大夫位焉右九棘公侯伯子男位焉鄭氏注云植棘以為位者取其赤心而外刺也棘與棗同棘之字兩束相並棗之字兩束相承此所言者今之棗也然孤卿大夫皆同之則難以獨指大理王制云正以獄成告于大司寇大司寇聽之棘木之下料後人藉此而言鄭注亦只引前說此但謂其入朝立治之處若以指刑部尚書亦可也易坎卦係用徽纆寘于叢棘以居險阻囚執為詞其義自别晉代遺文故簏中得舊書一帙題為晉代名臣文集凡十四家所載多不能全真太山一毫芒耳有張敏者太原人仕歴平南参軍太子舍人濟北長史其一篇曰頭責子羽文極為尖新古來文士皆無此作恐藝文類聚文苑英華或有之惜其冺没不傳謾採之以遺博雅君子其序云太原温長仁潁川荀景伯范陽張茂先士郷劉先生南陽鄒潤甫河南鄭思淵余友有秦生者雖有姊夫之尊少而狎之同時昵好張荀之徒數年之中繼踵登朝而此賢身處陋巷屢沽而無善價抗志自若終不衰堕為之慨然又怪諸賢既已在位曾無伐木嚶鳴之聲又違王貢彈冠之義故因秦生容貎之盛為頭責之文以戲之并以嘲六子焉雖似諧謔實有興也文曰維泰始元年頭責子羽曰吾託為子頭萬有餘日矣大塊禀我以精造我以形我為子蒔髪膚置鼻耳安眉額揷牙齒眸子橋光雙權隆起每至出入人間遨遊市里行者辟易坐者竦跽或稱君侯或言將軍捧手傾側佇立﨑嶇如此者故我形之足偉也子冠冕弗戴金銀弗佩艾以當笄幍以代帶百味弗嘗食粟茹菜嵗暮年過曾不自悔子厭我形容我賤子意態若此者必子行已累也子遇我如讐我視子如仇居常不樂兩者俱憂何其鄙哉子欲為仁賢耶則當如咎陶后稷巫咸伊陟保又王家永見封殖子欲為名髙耶則當如許由子臧卞隨務光洗耳逃禄千載流芳子欲為游說也則當如陳軫蒯通陸生鄧公轉禍為福含辭從容子欲為進趨耶則當如賈生之求試終軍之請使砥礪鋒頴以幹王事子欲為恬淡耶則當如老􅅨之守一莊周之自逸漠然離俗志凌雲日子欲為隠遯耶則當如榮期之𢃄索漁父之瀺灂栖遲神岳垂餌巨壑此一介之人所以顯身成名者也今子上不睎道德中不效儒墨塊然窮賤守此愚惑察子之情觀子之志退不為處士進無望三事而徒玩日勞形習為常人之所喜不亦過乎子羽愀然深念而對曰凡所教敕謹聞命矣受性拘係不聞禮義誤以天幸為子所寄今子欲使吾為忠耶當如包胥屈平欲使吾為信耶則當殺身以成名欲使吾為節耶則當赴水火以全貞此四者人之所忌故吾不敢造意頭曰子所謂天刑地網剛德之尤不登山抱木則褰裳赴流吾欲告爾以飬性誨爾以優游而與蟣虱同情不聽我謀悲哉俱御人體而獨為子頭且儗人其倫喻子儕偶曾不如太原温顒潁川荀禹范陽張華士郷劉許南陽鄒湛河南鄭詡此數子者或蹇吃無宫商或尫陋希言語或淹伊多姿態或讙譁少智諝或口如含膠飴或頭如巾虀杵而猶以文采可觀意思詳序攀龍附鳳並登天府夫䑛痔得車沉淵竊珠豈若夫子徒令脣舌腐爛手足沾濡哉居有事之世而耻為權謀譬猶鑿地抱甕難以求富嗟乎子羽何異牢檻之熊深穽之虎石間餓蟹竈中之䑕事雖多而見工甚少宜其卷局煎蹙至老無所睎也支離其形者猶能不困命也夫與子同處其文九百餘言頗有東方朔客難劉孝標絶交論之體集仙傳所載神女成公智瓊傳見於太平廣記盖敏之作也鄒湛姓名因羊叔子而傳而字曰潤甫則見於此漢武帝田蚡公孫𢎞尚論古人者如漢史所書於武帝則譏其好大喜功窮奢極侈置生民於塗炭於田蚡則詆其負貴驕溢以肺腑為相殺竇嬰灌夫於公孫𢎞則云性意忌外寛内深飾詐釣名不為賢大夫所稱述然以予考之三君臣者實有大功於名教自秦始皇焚書坑儒六學散缺髙帝初興未遑庠序之事孝惠髙后時公卿皆武力功臣孝文好刑名孝景不任儒至於武帝田蚡為丞相黜黄老刑名百家之言延文學儒者以百數帝詳延天下多聞之士咸登諸朝令禮官勸學講議洽聞舉遺興禮以為天下先而公孫𢎞以治春秋為丞相天下學士靡然郷風𢎞為學官悼道之鬱滯始請為博士官置弟子郡國有秀才異等輙以名聞請著為令而詩書易禮之學彬彬並興使唐虞三代以來稽古禮文之士得以不廢今之所以識聖人至道之要者實本於此史稱其罷黜百家表章六經號令文章煥焉可述葢已不能盡其美然則武帝奢暴固貽患於一時蚡𢎞之為人得罪於公論而所以扶持聖教者乃萬世之功也平帝元始詔書尚能稱𢎞之率下篤俗但不及此云近世文物之殊國家南渡以來典章文物多不與承平類姑以予所親見者言之蓋月異而歲不同今聊紀從官立班隨駕省試官入院政府呼召百官騶從朝報簡削數項以示子姪侍從常朝紹興中分立於垂拱殿隔門上南北相向以俟追班乾道中猶然暨淳熈則引於殿門上東西對立車駕出常朝文臣自宰相至二史武臣自宗王使相至觀察使以雜壓次序行焉孝宗在普安邸官撿挍少保節度使每出必處正尚書之後而乾道以來兩班分而為二唯使相不然故開府儀同三司皆與執政官聮行而居其上紹興十二年壬戌予寓南山净慈待詞科試見省試官聯騎公服戴帽不加披衫每一員以親事官一人執敕黄行前是時知舉参詳㸃撿官合三十一員最後一中官宣押者入下天竺貢院及三十年庚辰予以吏部郎充参詳官既入内受勑則各各乘馬不同時而赴院至淳熈十四年丁未忝司貢舉則了與昔異三三兩兩自為遲速其乘轎者十人而九矣宰府呼召之禮始時庶僚皆然已而卿監郎官及史局玉牒所縁提舉官屬之故一切得免逮乾道以後宰相益自卑於是館職亦免迄于淳熈則凡職事官悉罷此制朝士騶從至少各得雇募若干取歩軍司名籍而幫錢米於左藏率就雇游手冗卒兩分可供一名如假借於近郡者給其半初猶破省馬并一馭者後不復有焉若乘轎僅能充負荷而已今日以益增雖下列亦占十餘輩進奏院報狀必載外郡謝上或監司到任表與夫慶賀表章一篇凡朝廷除郡守先則除目但云某人差知某州替某人及録黄下吏部則前銜後擬云某官姓名宜差知或權知權發遣某州軍州兼管内勸農營田事替某人到任成資闕或云年滿仍借紫借緋候回日却依舊服色外官求休致則云某州申某官姓名為病乞致仕或兩人三人後云某時已降勑命各守本官致仕今不復行但小報批下或禁小報則無由可知此必一宰相以死為諱者故去之外官表章聞有一二欲士大夫見之者須以屬東省乃可郡守更不報細銜禮文簡脱一至於此容齋五筆卷四欽定四庫全書容齋五筆卷
