front:
  text: 六十二則
  hash: sha256:c8cc8ed0c9de4eb22b44b5fbe4448a002ad0c5a61f294037016960d125c71705
body:
  text: 宋洪邁撰鄱陽七談鄱陽素無圖經地志元祐六年餘干進士都頡始作七談一篇叙土風人物云張仁有篇徐濯有說顧雍有論王徳璉有記而未有形於詩賦之流者因作七談其起事則命以建端先生其止語則以畢意子其一章言澹浦彭蠡山川之險勝番君之靈傑其二章言濵湖蒲魚之利膏腴七萬頃柔桑蠶繭之盛其三章言林麓木植之饒水草蔬果之衍魚鼈禽畜之富其四章言銅冶鑄錢陶埴為器其五章言宫寺游觀王遥仙壇吳氏潤泉叔倫戴隄其六章言鄱江之水其七章言堯山之民有陶唐之遺風凡三千餘字自謂八年而成比之太冲十稔平子十年為無慊予偶於故簏中得之惜其不𫝊於世故表著於此其所引張徐王顧所著今不復存更為可恨也經解之名晉唐至今諸儒訓釋六經否則自立佳名蓋各以百數其書曰𫝊曰解曰章句而已若戰國迨漢則其名簡雅一曰故故者通其指義也書有夏侯解故詩有魯故后氏故韓故也毛詩故訓𫝊顔師古謂流俗改故訓𫝊為詁字失真耳小學有杜林蒼頡故二曰㣲謂釋其㣲指如春秋有左氏㣲鐸氏㣲張氏㣲虞卿㣲𫝊三曰通如洼丹易通論名為洼君通班固白虎通應劭風俗通唐劉知幾史通韓滉春秋通凡此諸書唯白虎通風俗通僅有耳又如鄭康成作毛詩箋申明𫝊義他書無用此字者論語之學但曰齊論魯論張侯論後來皆不然也卜筮不敬古者龜為卜筴為筮皆興神物以前民用其用之至嚴其奉之至敬其求之至悉其應之至精齋戒乃請問不相襲故史祝所言其騐若答周史筮陳敬仲知其八世之後莫之與京將必代齊有國史蘇占晉伯姬之嫁而及於為嬴敗姬惠懷之亂至䆳至賾通於神明後世浸以不然今而愈甚至以飲食峱雜之際呼曰者隅坐使之占卜往往不加冠裳一問四五而責其術之不信豈有是理哉善乎班孟堅之論曰君子將有為也將有行也問焉而以言其受命也如響及至衰世懈於齋戒而屢煩卜筮神明不應故筮瀆不告易以為忌龜厭不告詩以為刺謂周易之蒙卦曰初筮告再三瀆瀆則不告詩小旻之章云我龜既厭不我告猶言卜問煩數狎嫚於龜龜靈厭之不告以道也漢世尚爾况在於今未嘗頃刻盡敬而一歸咎於淫巫瞽史其可乎哉糖霜譜糖霜之名唐以前無所見自古食蔗者始為蔗漿宋玉招魂所謂胹鼈羔包有柘漿是也其後為蔗餳孫亮使黄門就中藏吏取交州獻甘蔗餳是也後又為石蜜南中八郡志云笮甘蔗汁曝成飴謂之石蜜本草亦云煉糖和乳為石蜜是也後又為蔗酒唐赤土國用甘蔗作酒雜以紫𤓰根是也唐太宗遣使至摩揭陁國取熬糖法即詔揚州上諸蔗榨瀋如其劑色味愈於西域逺甚然只是今之沙糖蔗之技盡於此不言作霜然則糖霜非古也歴世詩人摹竒冩異亦無一章一句言之惟東坡公過金山寺作詩送遂寧僧圓寶云涪江與中冷共此一味水氷盤薦琥珀何似糖霜美黄魯直在戎州作頌答梓州雍熈長老寄糖霜云逺寄蔗霜知有味勝於崔子水晶鹽正宗掃地從誰說我舌猶能及鼻尖則遂寧糖霜見於文字者實始二公甘蔗所在皆植獨福唐四明番禺廣漢遂寧有糖氷而遂寧為冠四郡所産甚㣲而顆碎色淺味薄纔比遂之最下者亦皆起於近世唐大厯中有鄒和尚者始來小溪之繖山教民黄氏以造霜之法繖山在縣北二十里山前後為蔗田者十之四糖霜户十之三蔗有四色曰杜蔗曰西蔗曰芀蔗本草所謂荻蔗也曰紅蔗本草崑崙蔗也紅蔗止堪生噉芀蔗可作沙糖西蔗可作霜色淺土人不甚貴杜蔗紫嫩味極厚專用作霜凡蔗最困地力今年為蔗田者明年改種五糓以息之霜户器用曰蔗削曰蔗鎌曰蔗凳曰蔗碾曰榨斗曰榨牀曰漆甕各有制度凡霜一甕中品色亦自不同堆疊如假山者為上團枝次之甕鑑次之小顆塊次之沙脚為下紫為上深琥珀次之淺黄又次之淺白為下宣和初王黼創應奉司遂寧常貢外嵗别進數千斤是時所産益竒牆壁或方寸應奉司罷乃不再見當時因之大擾敗本業者居半久而未復遂寧王灼作糖霜譜七篇具載其說予採取之以廣聞見李彦仙守陜靖康末年之旤忠義之士死於守城而得書史𫝊者如汾州之張克戬隆徳之張確懷之霍安國代之史抗建寧寨之楊震振武之朱昭是已惟建炎以來士之得其死者蓋不少茲讀王灼所作李彦仙𫝊雖嘗具表上進然慮實録正史未曽采用謹誌於此彦仙字少嚴本名孝忠其先寧州人也後徙於鞏幼有大志喜談兵習騎射所歴山川形勢必識之尚氣謹然諾非豪俠不交金人南侵郡縣募勤王軍彦仙散家貲得三千人入援京師敵圍太原李綱為宣撫使彦仙上書切詆有司逮捕急乃易今名棄官亡命頃之復從种師中師中敗死仙走陜州守將李彌大問北事條對詳復使扼殽澠間金人再圍汴陜西范致虛總六路兵進援仙請曰殽澠險隘難於立軍前却即衆潰矣宜分道並進伺空以出且留半軍於陜為善後計致虛曰如子言乃逗撓也仙曰兵輕而分正可速達不從争益牢致虛怒罷其職既而敗績卒無功建炎元年四月金人屠陜州經制使王􅊅度不能支引部曲去官吏逃逸仙為石壕尉獨如平時歸者襁屬即徙老穉入土花砦三觜石柱大通諸山拔武鋭者分主之自營三觜諭衆曰敵實易與今得地利若輩堅守足矣少日敵復据陜分軍來攻有健酋升前阜嫚罵仙單騎衝擊挾之以歸始料衆正部伍敵數萬圍三觜仙邀戰伏精兵後崦掩殺萬計奪馬三百敵解去京洛間多爭附者勢益雄張未閱月破敵五十餘壁初敵再入陜官其土人俾招復業者人給符别之仙隂縱麾下往約日内應二年三月引兵直州南城中火起敵方備南壁而水軍自新店夜順流薄城東北䝉泉坡龍堂溝以入表裏夾攻僵尸相藉遂復陜始河東之人倡義拒敵仙約胡夜义者為助假以㳂河提舉意不滿叛趨南原仙誘致殺之奪五千衆邵隆邵雲本其黨欲為復讎仙因客鐫說遂來歸乘勝渡河柵中條諸山蒲解至太原皆響動乃分遣隆雲等取安邑虞郷芮城正平解皆下之蒲幾拔㑹援至不克以功遷閤門宣贊舍人就畀陜兼安撫司公事悉表所俘酋長䕶送行在上咨歎賜袍帶槍劎許直達奏事便宜處決時闗以東獨陜在益増陴疏塹蒐軍繕鎧廣屯田訓農耕作家素留鞏盡取至官曰吾父母妻子同城存亡矣聞者感悦各有固志十二月金帥烏嚕徹拔圍陜仙背城鏖鬭七日敵傷甚跳奔三年羅索貝勒自綘移屯蒲觧諜知之設伏於諸谷鼔噪横突俘馘十八羅索僅以身免制置使王庶檄使輕軍掎角次虞鄉敵以萬甲逆石鍾谷口終日戰斬級二千遷武功大夫寧州觀察使河觧同耀制置使時河東土豪宻附期王師來為應仙益治軍欲請於朝乞詔陜西諸路各助歩騎二萬㑹張浚經略處置川陜弗之許十二月羅索衆十萬復圍陜仙夜使人隧地焚其攻具營部囂亂縱兵乘之敵稍退四年正月益生兵𫝊壘晝夜進攻鵝車天橋火車衝車叢進仙隨機拒敵又為金汁礟火藥所及糜爛無遺而圍不解日慿堞須外援浚為遣軍敵先阻雍不得進則令涇原曲端出鄜坊繞敵後端素嫉仙聲績逾已幸其敗詭託不行丁巳城陷仙挾親軍巷戰矢集身如蝟左臂中刃而殊戰逾力遂死之并其家遇害先是敵嘗許以河南元帥及圍合復言如前約當退師仙叱曰吾寧鬼於宋安用汝富貴為敵惜其才必欲降之城將破先令軍中生致者予萬金仙平時弊衣同士卒及是雜羣伍中死敵不能察其為人面少和色有犯令雖親屬不貸諸將敗事或有他過其外屯者輙封箠遣帳下往皆裸就笞不敢出一詞當是時同華長安盡為敵藪陜斗絶一隅初無朝家素定約束中立孤軍日與敵确但誦忠義感勵其衆每拜君賜暨取敵金貲悉均之毛銖不入已以是精兵三萬大小二百戰皆樂為用軍事獨裁決至郡政必問法所底闔境稱治浚承制贈彰武軍節度使建廟商州邵雲者龍門人城破被執羅索欲命以千户長肆詈不屈乃釘之木架上置觧州東門外惡少撫其背涅文戲曰可鞘吾佩刀雲怒偃架朴之後五日磔解之至抉眼摘肝詈不絶口斷乃已初行刑將剸刃雲叱之失刀而斃其忠勇蓋如此姦雄嫉勝已者自古姦雄得志包藏禍心窺伺神器其勢必嫉士大夫之勝已者故常持寧我負人無人負我之説若蔡伯喈之值董卓孔文舉禰正平楊徳祖之值曹操嵇叔夜阮嗣宗之值司馬昭師溫太真之值王處仲謝安石孟嘉之值桓溫皆可謂不幸矣伯喈僅僅脫卓手終以之隕命正平轉死於黄祖文舉覆宗徳祖被戮叔夜罹東市之害嗣宗沉湎佯狂至為勸進表以逃大咎太真以智挫錢鳳而免其危若蹈虎尾唯謝公以髙名達識表裏至誠故温敬之重之不敢萌相窺之意然尚有為性命忍須臾及晉祚存亡在此一行之虞孟嘉為人夷曠冲黙名冠州里稱盛徳人仕於温府歴征西叅軍從事中郞長史在朝隤然仗正必不效郗超輩輕與温合然自度終不得善其去故放志酒中如龍山落帽豈為不自覺哉温至云人不可以無勢我乃能駕馭卿老賊於是見其肺肝矣嘉雖得全於酒幸以考終然纔享年五十一蓋酒為之累也陶淵明實其外孫傷其道悠運促悲夫俗語放錢今人出本錢以規利入俗語謂之放債又名生放子攷之亦有所來漢書谷永𫝊云至為人起責分利受謝顔師古注曰言富賈有錢假託其名代之為主放與他人以取利息而共分之此放字所起也漢書多叙谷永予亡弟景何少時讀書甚精勤晝夜不釋卷不幸有心疾以至夭逝嘗見梁𢎞夫誦漢書即云惟谷永一人無處不有𢎞夫驗之於史乃服其說今五十餘年矣漫摭永諸所論建以渫予在原之思薛宣為少府御史大夫缺永言宣簡在兩府諫大夫劉輔繫獄永同中朝臣上書救之光禄大夫鄭寛中卒永乞以師傅恩加其禮謚陳湯下獄永上疏訟其功鴻嘉河決永言當觀水勢然後順天心而圖之成帝好鬼神方術永言皆妄人惑衆挾左道以欺罔世主宜距絶此類梁王為有司奏禽獸行永上疏諫止勿治淳于長初封下朝臣議永言長當封段㑹宗復為西域都䕶永憐其老復逺出手書戒之建昭雨雪燕多死永請皇后就宫令衆妾人人更進建始星孛營室永言為後宫懷姙之象彗星加之將有絶繼嗣者永始日食永以易占對言酒亡節之所致次年又食永言民愁怨之所致星隕如雨永言王者失道下將叛去故星叛天而隕以見其象樓䕶𫝊言谷子雲之筆札叙𫝊述其論許班事許皇后𫝊云上采永所言以答書其載於史者詳複如此本𫝊云永善言災異前後所上四十餘事蓋謂是云玉堂殿閣漢谷永對成帝問曰抑損椒房玉堂之盛寵顔師古注椒房皇后所居玉堂嬖幸之舍也按漢書李尋𫝊久汙玉堂之署注玉堂殿在未央宫翼奉疏曰孝文帝時未央宫又無髙門武臺麒麟鳳凰白虎玉堂金華之殿三輔黄圖曰未央宫有殿閣三十二椒房玉堂在其中漢宫閣記云未央宫有玉堂宣室閣又引漢書建章宫南有玉堂壁門三層臺髙二十丈玉堂内殿十二門階階皆玉為之又有玉堂神明堂二十六殿然今漢書郊祀志但云建章宫南有玉堂壁門而無它語晉灼注楊雄解謿上玉堂之句曰黄圖有大玉堂小玉堂殿而今黄圖無此文國朝太宗淳化中賜翰林玉堂之署四字其後以最下一字犯廟諱故元符中只云玉堂紹興末學士周麟之又乞髙宗御書玉堂二字揭於直廬麟之跋語自有所疑已而議者皆謂玉堂乃殿名不得以為臣下直舍當如承明故事請曰玉堂之廬可也今翰林但扁摛文堂三字示不敢居然則其為禁内宫殿明白有殿有閣有臺谷永以配椒房言之意當日亦嘗為燕游之地師古直以為嬖幸之舍與前注自相舛異大誤矣漢武帝喜殺人者漢武帝天資剛嚴聞臣下有殺人者不惟不加之罪更喜而褒稱之李廣以故將軍屏居藍田夜出至亭為霸陵醉尉所辱居無何拜右北平太守請尉與俱至軍而斬之上書自陳謝罪上報曰將軍者國之𤓰牙也怒形則千里竦威振則萬物伏夫報忿除害朕之所圗於將軍也若乃免冠徒跣稽顙請罪豈朕之指哉胡建守軍正丞謂未得真官兼守云也時監軍御史穿北軍壘垣以為賈區建欲誅之當選士馬日御史與䕶軍諸校列坐堂臯上建趨至拜謁因令走卒曵御史下斬之遂上奏曰案軍法正亡屬將軍將軍有罪以聞二千石以下行法焉丞於用法疑臣謹以斬謂丞屬軍正斬御史於法有疑也制曰三王或誓於軍中欲民先成其慮也或誓於軍門之外欲民先意以待事也或將交刃而誓致民志也建又何疑焉建繇是顯名觀此二詔豈不開妄殺之路乎知人之難霍光事武帝但為奉車都尉出則奉車入侍左右雖以小心謹飭親信初未嘗少見於事也一旦位諸百僚之上使之受遺當國金日磾以胡父不降没入官養馬上因游宴見馬於造次頃刻間異其為人即日親近其後遂為光副兩人皆能稱上所委然一日用四人若上官桀桑𢎞羊亦同時輔政幾於欲害霍光茍非昭帝之明社稷危矣則其知人之哲得失相半為未能盡此雖帝堯之聖而以為難也館職遷除建炎南渡稍置館職紹興初始定制除監少丞外以著作郎佐郞秘書郞二員挍書正字通十二員為額倣唐瀛洲十八學士之數其遷出它司非郞官即御史唯林之竒以疾王十朋以論事皆徙越府大宗正丞自乾道以後有㫖須曽任為縣始得除臺察曽任郡守始得為郞三館之士固無有歴此者於是朝廷欲越次擢用者乃以為將作軍器少監旋進為監班在郎上則無所不可為欲徑躋清要者則由著作遷秘郞而拜左右二史不然不過兼權省郎年嵗閒求一郡而去而御史之除皆歸六院矣爾後頗靳其選俟再遷寺監丞簿然後命之向時郡守召用雖自軍壘亦除郞今資淺望輕者但得丞及司直或又再命始入省云容齋五筆卷六欽定四庫全書容齋五筆卷
