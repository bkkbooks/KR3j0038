seq: 81
front:
  text: 十五十五則宋洪邁撰
  hash: sha256:ac125cee39c607d79b3da858054d52724fb8106a303995933c1dae283ef47bd4
body:
  text: 徽廟朝宰輔蔡京擅國命首尾二十餘年一時士大夫未有不因之以至大用者其後頗采公議與為異同若宰相則趙清獻挺之張無盡商英鄭華原居中劉文憲正夫所行所言世多知之其居執政位者如張康國賔老温益禹弼劉逵公路侯蒙元功者皆有可録康國定元祐黨籍看詳講議司編彚奏牘皆深預密議及後知樞密院始浸為崖異徽宗察京專愎隂令狙伺其姦蓋嘗許以相是時西北邉帥多取部内好官自辟置以力不以才康國曰並塞當擇人以紓憂顧奈何欲私所善乎乃隨闕選用定為格京使御史中丞吳執中擊之康國先知之具以奏益鎮潭州凡元祐逐臣在湖南者悉遭侵困因愛莫助之圖遂為京用至中書侍郎乃時有立異京一日除監司郡守十人將進畫益判其後曰收京使益所厚中書舍人鄭居中問之益曰君在西掖每見所論事舍人得舉職侍郎顧不許邪今丞相所擬十人共皆姻黨耳欲不逆其意得乎逵以附京至中書侍郎京去相逵首勸上碎元祐黨碑寛上書邪籍之禁凡京所行悖理殃民事稍稍釐正之蒙在政地上從容問蔡京何如人對曰使京能正其心術雖古賢相何以加上頷首且使密伺京所為京聞而銜之凡此數端皆見於國史本傳教官掌牋奏所在州郡相承以表奏書啓委教授因而餉以錢酒予官福州但為撰公家謝表及祈謝晴雨文至私禮牋啓小簡皆不作然遇聖節樂語嘗為之因又作他用者三兩篇每以自愧鄒忠公為潁昌教授府守范忠宣公屬撰興龍節致語辭不為范公曰翰林學士亦作此忠公曰翰林學士則可祭酒司業則不可范公敬謝之前輩風節可畏可仰如此經句全文對予初登詞科再至臨安寓於三橋西沈亮功主簿之館沈以予買飯于外謂為不便自取家饌日相供同年湯丞相來訪扣旅食大槩具為言之湯公笑曰主人亦賢矣因戯出一語曰哀王孫而進食豈望報乎良久予應之曰為長者而折枝非不能也公大激賞而去汪聖錫為秘書少監毎食罷㑹茶一同舍輙就枕不至及起亦戯之曰宰予晝寢於予與何誅衆未有言汪曰有一對雖於今事不切然却是一个出處云子貢方人夫我則不暇同舍皆合詞稱美北郊議論三代之禮冬至祀天於南郊夏至祭地於北郊王莽於元始中改為合祭自是以來不可復變元豐中下詔欲復北郊至六年唯以冬至祀天而地祗不及事元祐七年又使博議而許將顧臨范純禮王欽臣孔武仲杜純各為一說逮蘇軾之論出於是羣議盡廢當時諸人之說有六一曰今之寒暑與古無異宣王六月出師則夏至之日何為不可祭二曰夏至不能行禮則遣官攝行亦有故事三曰省去繁文末節則一嵗可以再郊四曰三年一祀天又一年一祭地五曰當郊之嵗以十月神州之祭易夏至之方澤可以免方暑舉事之患六曰當郊之嵗以夏至祀地祗於方澤上不親郊而通爟火於禁中望祀軾皆辟之以為無一可行之理其文載於奏議凡三千言元符中又詔議合祭論者不一唯太常少卿宇文昌齡之議最為簡要曰天地之勢以高卑則異位以禮制則異宜以樂則異數至於衣服之章噐用之具日至之時皆有辨而不亂夫祀者自有以感於無自實以通於虛必以類應類以氣合氣然後可以得而親可以冀其格今祭地於圓丘以氣則非所合以類則非所應而求高厚之來享不亦難乎後竟用其議此兩說之至當如此討論濫賞詞東坡公行香子小詞云清夜無塵月色如銀酒斟時須滿十分浮名浮利休苦勞神歎隙中駒石中火夢中身雖抱文章開口誰親且陶陶樂盡天真不如歸去作箇閒人對一張琴一壺酒一溪雲紹興初范覺民為相以自崇寧以來創立法度例有汎賞如學校茶鹽錢幣保伍農田居飬安濟寺觀開封大理獄空四方邉事御前内外諸司編勑㑹要學制禮制道史等書局掖庭編澤行幸曲恩諸色營繕河埽功役採石木栰花石等綱祥瑞禮樂兩城所公田伎術伶優三山永橋明堂西内八寳元圭種種濫賞不可勝述其曰應奉有勞獻頌可采職事修舉特授特轉者又皆無名直與及白身補官選人改官職名礙格非隨龍而依隨龍人非戰功而依戰功人等每事各為一項建議討論又行下吏部若該載未盡名色並合取朝廷指揮臨時參酌追奪事件遂為畫一規式有至奪十五官者雖公論當然而失職者胥動造謗浮議蜂起無名子因改坡語云清要無因舉選艱辛繫書錢須要十分浮名浮利虛苦勞神歎旅中愁心中悶部中身雖抱文章苦苦推尋更休說誰假誰真不如歸去作箇齊民免一回來一回討一回論至大字書寫貼於内前墻上邏者得之以聞是時偽齊劉豫方盜㨿河南朝論慮或揺人心亟罷討論之舉范公用是為臺諌所攻今章且叟奏藁中正載彈疏竟去相位云尺八唐盧肇為歙州刺史㑹客于江亭請目前取一事為酒令尾有樂噐之名肇令曰遥望漁舟不濶尺八有姚巖傑者飲酒一噐凭欄嘔噦須叟即席還令曰凭欄一吐已覺空喉此語載於摭言又逸史云開元末一狂僧往終南回向寺一老僧令於空房内取尺八來乃玉也謂曰汝主在寺以愛吹尺八謫在人間此常吹者也汝當回可將此付汝主僧進於𤣥宗特取吹之宛是先所御者孫夷中仙隱傳房介然專吹竹笛名曰尺八將死預將管打破告諸人曰可以同將就壙亦謂此云尺八之為樂名今不復有吕才傳云貞觀時祖孝孫増損樂律太宗詔侍臣舉善音者王珪魏徴盛稱才製尺八凡十二枚長短不同與律諧契太宗即召才參論樂事尺八之所出見於此無由曉其形製也爾雅釋樂亦不載三給事相攻元祐中王欽臣仲至自權工部侍郎除給事中為給事姚勔所駮而止大觀中陳亨伯自左司員外郎擢給事中為權官蔡薿所沮而出政和末伯祖仲達在東省以疾暫謁告兩日張天覺復官之命過門下第四㕔給事方㑹論為畏繳駮之故所以託病遂罷知滁州朱藏一詩政和末老蔡以太師魯國公緫治三省年已過七十與少宰王黼爭權相傾朱藏一在館閣和同舍秋夜省宿詩云老火未甘退稚金方力征炎涼分勝負頃刻變隂晴兩人門下士互興譖言以為嘲謗其後黼獨相館職多遷擢朱居官如故而和人菊花詩云紛紛桃李春過眼成枯萎晩榮方耐久造物豈吾欺或又譖於黼以為怨憤是時士論指三館為閙藍蔡京輕用官職蔡京三入相時除用士大夫視官職如糞土蓋欲以天爵市私恩政和六年十月不因赦令侍從以上先縁左降同日遷職者二十人通奉大夫張商英為觀文殿學士中大夫王襄為延康殿學士顯模閣待制李圖南為述古殿學士寳文閣待制蔡薿顯謨閣待制葉夢得並為龍圖閣直學士寳文閣待制張近通奉大夫錢即右文殿修撰王漢之並為顯謨閣直學士中大夫葉祖洽為徽猷閣直學士朝散大夫曾孝藴為天章閣待制朝散郎俞㮚朝議大夫曾孝序中奉大夫范致明右文殿修撰蔡肇大中大夫孫鼛朝議大夫王覺右文殿修撰陳暘並為顯謨閣待制朝請郎蔡懋中奉大夫龐㳟孫朝請郎洪彦昇並為徽猷閣待制至十一月冬祀畢大赦天下仍復推恩節度使改東宫環衞官太祖有天下將收藩鎮威柄故漸行改革至於位至侍中中書令使相者其高僅得東宫官次但居環衞鳯翔王晏為太子太師安逺武行徳為太子太傅䕶國郭從義為左金吾上將軍鳯翔王彦超為右金吾上將軍定國白重贊為左千牛上將軍保太楊廷璋為右千牛上將軍靜難劉重進為羽林統軍若符彦卿者以太師中書令天雄節度使直罷歸洛八年不問亦不别除官其廟謨雄斷如是靖康初以戚里冒政宣恩典多建節鉞乃稽用此制錢景臻以少傅安武節度劉宗元以開府儀同三司鎮安節度並為左金吾上將軍范訥以平涼劉敷以保信劉敏以保成張楙以嚮徳王舜臣以岳陽朱孝孫以應道錢忱以瀘川節度並為右金吾上將軍自後不復舉行矣宰相任怨宰相欲收士譽使恩歸已故只以除用為意而不任職及顯有過舉者亦不肯任怨稍行黜徙文惠公在相位嘗奏言今之監司郡守其無大過者臺諌固不論擊但其間實有疲愞庸老之人依阿留之轉為民害臣欲皆與祠禄理作自陳監司或就移小郡庶幾人有家食之資國無曠官之失孝宗欣然聽許於是湖南轉運判官任詔改知復州廣東提舉鹽事劉景改知南雄州時太常丞闕監左藏庫許子紹欲得之公以大超越諭使小緩子紹宛轉愈力乃白其事出通判靜江府議者私謂若如此則是廟堂而兼臺諌之職殊不思進賢退不肖真宰相之事耳欲擬宫觀三四人未暇而去位子紹之出遂織入言章中近者京丞相以國子録吳仁傑居職未久便欲求遷奏罷歸吏部注簽判亦此意也四李杜漢太尉李固杜喬皆以為相守正為梁冀所殺故掾楊生上書乞李杜二公骸骨使得歸葬梁冀之誅權埶專歸宦官傾動中外白馬令李雲露布上書有帝欲不諦之語桓帝得奏震怒逮雲下北寺獄𢎞農五官掾杜衆傷雲以忠諌獲罪上書願與雲同日死帝愈怒下廷尉皆死獄中其後襄楷上言亦稱為李杜靈帝再治鉤黨范滂受誅母就與之訣曰汝今與李杜齊名死亦何恨謂李膺杜密也李太白杜子美同時著名故韓退之詩云李杜文章在光熖萬丈長凡四李杜云渾脫隊唐中宗時清源尉吕元泰上書言時政曰比見坊邑相率為渾脫隊駿馬胡服名曰蘇幕遮旗鼓相當騰逐喧譟以禮義之朝法胡虜之俗非先王之禮樂而示則於四方書曰謀時寒若何必羸形體讙衢路鼓舞跳躍而索寒焉書聞不報此蓋并論潑寒胡之戱唐史附於宋務光傳吕元泰竟亦不顯近世風俗相尚不問公私宴集皆為耍曲耍舞如勃海樂之類殆猶此也嵗陽嵗名嵗陽嵗名之說始於爾雅太嵗在甲曰閼逢在乙曰旃蒙在丙曰柔兆在丁曰彊圉在戊曰著雍在己曰屠維在庚曰上章在辛曰重光在壬曰𤣥􅘬在癸曰昭陽謂之嵗陽在寅曰攝提格在卯曰單閼在辰曰執徐在巳曰大荒落在午曰敦牂在未曰恊洽在申曰涒灘在酉曰作噩在戌曰閹茂在亥曰大淵獻在子曰困敦在丑曰赤奮若謂之嵗名自後唯太史公歴書用之而或有不同如閼逢為焉逢旃蒙為端蒙柔兆為游兆彊圉為彊梧著雍為徒雍屠維為祝犂上章為商横重光為昭陽𤣥􅘬為横艾昭陽為尚章大荒落為大芒落恊洽為汁洽涒灘為汭漢作噩為作鄂閹茂為淹茂大淵獻困敦更互赤奮若乃為赤奪若此蓋年祀久逺傳寫或訛不必深辨但漢武帝太初元年太嵗丁丑而以為甲寅其失多矣爾雅又有月陽月名月在甲曰畢在乙曰橘在丙曰修在丁曰圉在戊曰厲在己曰則在庚曰窒在辛曰塞在壬曰終在癸曰極正月為陬二月為如三月為寎四月為余五月為臯六月為旦七月為相八月為壯九月為𤣥十月為陽十一月為辜十二月為涂考之典籍唯厯書謂太初十月為畢聚離騷云攝提正干孟陬左氏傳十月曰良月國語至于𤣥月它未嘗稱引郭景純注釋云自嵗陽至月名皆所未詳通者故闕而不論蓋不可強為之說非若律書所言二十八舍十母十二子猶得穿鑿傳致也資治通鑑專取嵗陽嵗名以冠年不可曉解殊不若甲子至癸亥為明白爾韓退之詩嵗在淵獻牽牛中王介甫字說言彊圉自餘亦無說左傳所書嵗在星紀而滛於𤣥枵嵗在降婁降婁中而旦嵗在陬訾之口嵗五及鶉火嵗在顓帝之虛嵗在豕韋嵗在大梁皆用嵗星次舍言之司馬倬跋温公濳虛其末云乾道二年嵗在柔兆閹茂𤣥􅘬執徐月極大淵獻日謂丙戌年壬辰月癸亥日以嵗名施於月日尤為不然漢章不自為文殆是僚寀强解事者所作也官稱别名唐人好以它名標牓官稱今漫疏於此以示子姪之未能盡知者太尉為掌武司徒為五教司空為空土侍中為太貂散騎常侍為小貂御史大夫為亞台為亞相為司憲中丞為獨坐為中憲侍御史為端公南牀横榻雜端又曰脆棃殿中為副端又曰開口椒監察為合口椒諌議為大坡大諫補闕今司諫為中諫又曰補衮拾遺今正言為小諫又曰遺公給事郎為夕郎夕拜知制誥為三字起居郎為左螭舍人為右螭又並為修注吏部尚書為大天禮部為大儀兵部為大戎刑部為大秋工部為大起吏部郎為小選為省眼考功度支為振行禮部為小儀為南省舍人今曰南宫刑部為小秋祠部為􅖅柄㕔比部為比盤又曰昆脚皆頭屯田為田曹水部為水曹諸部郎通曰哀烏依烏太常卿為樂卿少卿為少常奉常光禄為飽卿鴻臚為客卿睡卿司農為走卿大理為棘卿評事為廷平將作監為大匠少監為少匠祕書監為大蓬少監為少蓬左右司為都公太子庶子為宫相宰相呼為堂老兩省相呼為閣老尚書丞郎為曹長御史拾遺為院長下至縣令曰明府丞曰贊府贊公尉曰少府少公少仙此已見前筆容齋四筆卷十五欽定四庫全書容齋四筆卷
