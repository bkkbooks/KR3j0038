body:
  text: 張浮休書張芸叟與石司理書云頃游京師求謁先逹之門每聴歐陽文忠公司馬温公王荆公之論於行義文史為多唯歐陽公多教吏事旣乆之不免有請大凡學者之見先生莫不以道徳文章為欲聞者今先生多教人以吏事所未諭也公曰不然吾子皆時才異日臨事當自知之大抵文學止於潤身政事可以及物吾昔貶官夷陵方壮年未厭學欲求史漢一觀公私無有也無以遣日因取架閣陳年公案反覆觀之見其枉直乖錯不可勝數以無為有以枉為直違法狥情滅親害義無所不有且夷陵荒逺褊小尚如此天下固可知也當時仰天誓心曰自爾遇事不敢忽也是時蘇明允父子亦在焉嘗聞此語又有答孫子發書多論資治通鑑其略云温公嘗曰吾作此書唯王勝之嘗閱之終篇自餘君子求乞欲觀讀未終紙已欠伸思睡矣書十九年方成中間受了人多少語言陵藉云云此兩事士大夫罕言之浮休集百卷無此二篇今豫章所刋者附之集後温公客位牓司馬温公作相日親書牓槀揭于客位曰訪及諸君若覩朝政闕遺庶民疾苦欲進忠言者請以奏牘聞于朝廷光得與同僚商議擇可行者進呈取㫖行之若但以私書寵諭終無所益若光身有過失欲賜規正即以通封書簡分付吏人令傳入光得内自省訟佩服改行至於整㑹官職差遣理雪罪名凡干身計並請一面進状光得與朝省衆官共議施行若在私第垂訪不請語及某再拜咨白乾道九年公之曽孫伋出鎮廣州道過贑獲觀之李頎詩歐陽公好稱誦唐嚴維詩柳塘春水漫花塢夕陽遲及楊衡竹徑通幽處禪房花木深之句以為不可及予絶喜李頎詩云逺客坐長夜雨聲孤寺秋請量東海水看取淺深愁且作客涉逺適當窮秋暮投孤村古寺中夜不能寐起坐凄惻而聞簷外雨聲其為一時襟抱不言可知而此兩句十字中盡其意態海水喻愁非過語也詩中用茱萸字劉夢得云詩中用茱萸字者凡三人杜甫云醉把茱萸子細看王維云挿遍茱萸少一人朱放云學他年少挿茱茰三人所用杜公為優予觀唐人七言用此者又十餘家漫録于後王昌齡茱萸挿鬢花宜夀戴叔倫挿鬢茱萸來未盡盧綸茱萸一朶映華簪權徳輿酒泛茱萸晚易曛白居易舞鬟擺落茱茰房茱萸色淺未經霜楊衡强挿茱萸隨衆人張諤茱萸凡作㡬年新耿湋髪希那敢挿茱萸劉商郵筒不觧獻茱萸崔櫓茱萸冷吹溪口香周賀茱萸城裏一尊前比之杜句真不侔矣鬼宿渡河宋蒼梧王當七夕夜令楊玉夫伺織女度河曰見當報我不見當殺汝錢希白洞微志載蘇徳哥為徐肇祀其先人曰當夜半可已蓋俟鬼宿度河之後翟公巽作祭儀十卷云或祭於昏或祭於旦皆非是當以鬼宿渡河為候而鬼宿渡河常在中夜必使人仰占以俟之葉少藴云公巽博學多聞援證皆有据不肯碌碌同衆所見必過人予按天上經星終古不動鬼宿隨天西行春昏見於南夏晨見於東秋夜半見於東冬昏見於東安有所謂渡河及常在中夜之理織女昏晨與鬼宿正相反其理則同蒼梧王荒悖小兒不足笑錢翟葉三公皆名儒碩學亦不深攷如此杜詩云牛女漫愁思秋期猶渡河牛女年年渡何曽風浪生梁劉孝儀詩云欲待黄昏至含嬌淺渡河唐人七夕詩皆有此說此自是牽俗遣詞之過故杜老又有詩云牽牛出河西織女處其東萬古永相望七夕誰見同神光竟難候此事終蒙朧蓋自洞曉其實非他人比也府名軍額雍州軍額曰永興府曰京兆而守臣以知永興軍府事兼京兆府路安撫使結衘鎮州軍額曰成徳府曰真定而守臣以知成徳軍府事兼真定府路安撫使結衘政和中始正以府額為稱荆州軍額曰荆南府曰江陵而守臣則曰知荆南通判曰通判荆南自餘掾幕縣官則曰江陵府淳熈四年始盡以江陵為稱孟州軍額曰河陽三城無府額而守臣曰知河陽軍州事陜州無府額而守臣曰知陜州軍府事法令行移亦曰陜府馬融皇甫規漢順帝時西羌叛遣征西將軍馬賢將十萬人討之武都太守馬融上疏曰賢處處留滯必有潰叛之變臣願請賢所不用關東兵五千裁假部隊之號盡力率厲三旬之中必克破之不從賢果與羌戰敗父子皆没羌遂寇三輔燒園陵詔武都太守趙沖督河西四郡兵追擊安定上計掾皇甫規上䟽曰臣比年以來數陳便宜羌戎未動䇿其將反馬賢始出知其必敗願假臣屯列坐食之兵五千出其不意與沖共相首尾土地山谷臣所曉習可不煩方寸之印尺帛之賜可以滌患帝不能用趙沖擊羌不利羌寇充斥涼部震恐沖戰死累年然後定按馬融皇甫規之言曉然易見而所請兵皆不過五干然訖不肯從乃知宣帝納用趙充國之冊為不易得所為明主可為忠言也孟蜀避唐諱蜀本石九經皆孟昶時所刻其書淵世民三字皆缺畫蓋為唐高祖太宗諱也昶父知祥嘗為荘宗明宗臣然於存朂嗣源字乃不諱前蜀王氏已稱帝而其所立龍興寺碑言及唐諸帝亦皆半闕乃知唐之澤逺矣翰苑親近白樂天渭村退居寄錢翰林詩叙翰苑之親近云曉從朝興慶春陪宴栢梁分庭皆命婦對院即儲皇貴主冠浮動親王轡閙装金鈿相照耀朱紫閒熒煌毬簇桃花騎歌廵竹葉觴窪銀中貴帶昂黛内人粧賜禊東城下頒酺曲水傍樽罍分聖酒妓樂借仙倡蓋唐世宫禁與外廷不至相隔絶故杜子美詩戸外昭容紫袖垂雙瞻御座引朝儀又云舍人退食収封事宫女開函近御筵而學士獨稱内相至於與命婦分庭見貴主冠服内人黛粧假仙倡以佐酒他司無比也寧馨阿堵寧馨阿堵晉宋閒人語助耳後人但見王衍指錢云舉阿堵物却又山濤見衍曰何物老媪生寧馨兒今遂以阿堵為錢寧馨兒為佳兒殊不然也前輩詩語言少味無阿堵冰雪相看有此君又家無阿堵物門有寧馨兒其意亦如此宋廢帝之母王太后疾篤帝不徃視后怒謂侍者取刀來剖我腹那得生寧馨兒觀此豈得為佳顧長康畫人物不㸃目精曰傳神寫照正在阿堵中猶言此處也劉真長譏殷淵源曰田舍兒强學人作爾馨語又謂桓温曰使君如馨地寧可鬪戰求勝王導與何充語曰正自爾馨王恬撥王胡之手曰冷如鬼手馨彊來捉人臂至今吳中人語言尚多用寧馨字為問猶言若何也劉夢得詩為問中華學道者幾人雄猛得寧馨蓋得其義以寧字作平聲讀鳯毛宋孝武嗟賞謝鳯之子超宗曰殊有鳯毛今人以子為鳯毛多謂出此按世說王劭風姿似其父導桓温曰大奴固自有鳯毛其事在前與此不同牛米燕慕容皝以牛假貧民使佃苑中稅其什之八自有牛者稅其七參軍封裕諌以為魏晉之世假官田牛者不過稅其什六自有牛者中分之不取其七八也予觀今吾鄉之俗募人耕田十取其五而用主牛者取其六謂之牛米蓋晉法也為文矜夸過實文士為文有矜夸過實雖韓文公不能免如石􅈜歌極道宣王之事偉矣至云孔子西行不到秦掎摭星宿遺羲娥陋儒編詩不収拾二雅褊廹無委蛇是謂三百篇皆如星宿獨此詩如日月也二雅褊廹之語尤非所宜言今世所傳石鼓之詞尚在豈能出吉日車攻之右安知非經聖人所刪乎送孟東野序韓文公送孟東野序云物不得其平則鳴然其文云在唐虞時咎陶禹其善鳴者而假之以鳴䕫假於韶以鳴伊尹鳴殷周公鳴周又云天将和其聲而使鳴國家之盛然則非所謂不得其平也噴􅅉今人噴􅅉不止者必噀唾祝云有人說我婦人尤甚予按終風詩寤言不寐願言則􅅉鄭氏箋云我其憂悼而不能寐女思我心如是我則􅅉也今俗人􅅉云人道我此古之遺語也乃知此風自古以來有之野史不可信野史雜說多有得之傳聞及好事者縁餙故類多失實雖前輩不能免而士大夫頗信之姑摭真宗朝三事於左魏泰東軒録云真宗次澶淵語寇萊公曰敵騎未退何人可守天雄軍公言參知政事王欽若退即召王於行府諭以上意授勑俾行王未及有言公遽酌大白飲之命曰上馬盃且曰參政勉之回日即為同列也王馳騎入魏越十一日敵退召為同中書門下平章事或云王公數進疑詞於上前故萊公因事出之予按澶淵之役乃景徳元年九月是時萊公為次相欽若為參政閏九月欽若判天雄二年四月罷政三年萊公罷相欽若復知樞密院至天禧元年始拜相距景徳初元凡十四年其二事者沈括筆談云向文簡拜右僕射真宗謂學士李昌武曰朕自即位以來未嘗除僕射敏中應甚喜昌武退朝徃候之門䦨悄然明日再對上笑曰向敏中大耐官職存中自注云向公拜僕射年月未曽考於國史因見中書記是天禧元年八月而是年二月王欽若亦加僕射予按真宗朝自敏中之前拜僕射者六人吕端李沆王旦皆自宰相轉陳堯叟以罷樞密使拜張齊賢以故相拜王欽若自樞密使轉及敏中轉右僕射與欽若加左僕射同日降制是時李昌武死四年矣昌武者宗諤也其三事者存中筆談又云時丁晉公從真宗廵幸禮成詔賜輔臣玉帶時輔臣八人行在祇候庫止有七帶尚衣有帶謂之比玊價直數百萬上欲以足其數公心欲之而位在七人之下度必不及己乃諭有司某自有小私帶可服候還京别賜可也既各受賜而晉公一帶僅如指濶上顧近侍速易之遂得尚衣御帶予按景徳元年真宗廵幸西京大中祥符元年廵幸泰山四年幸河中丁謂皆為行在三司使未登政府七年幸亳州謂始以參知政事從時輔臣六人王旦向敏中為宰相王欽若陳堯叟為樞密使皆在謂上謂之下尚有樞密副使馬知節即不與此說合且既為玉帶而又名比玉尤可笑魏泰無足論沈存中不應爾也謗書司馬遷作史記於封禪書中述武帝神仙鬼竈方士之事甚備故王允謂之謗書國朝景徳祥符間治安之極王文穆陳文忠陳文僖丁晉公諸人造作天書符瑞以為固寵容恱之計及真宗上仙王沂公懼貽後世譏議故請藏天書於梓宫以滅跡而實録之成乃文穆監修其載崇奉宫廟􅖤雲芝鶴唯恐不詳遂為信史之累葢與太史公謗書意異而實同也王文正公祥符以後凡天書禮文宫觀典冊祭祀廵幸祥瑞頌聲之事王文正公旦實為參政宰相無一不預官自侍郎至太保公心知得罪於清議而固戀患失不能決去及其臨終乃欲削髪僧服以歛何所補哉魏野贈詩所謂西祀東封今已了好來相伴赤松遊可謂君子愛人以徳其箴戒之意深矣歐陽公神道碑悉隠而不書葢不可書也雖持身公清無一可議然特張禹孔光胡廣之流云晉文公晉公子重耳自狄適他國凡七衞成公曹共公鄭文公皆不禮焉齊桓公妻以女宋襄公贈以馬楚成王享之秦穆公納之卒以得國衛曹鄭皆同姓齊宋秦楚皆異姓非所謂豈無他人不如同姓也晉文公卒未葬秦師伐鄭滅滑無預晉事晉先軫以為秦不哀吾䘮而伐吾同姓背秦大惠使襄公墨衰絰而伐之雖幸勝於殽終啓焚舟之戰兩國交兵不復修睦者數百年先軫是年死於狄至孫縠而誅滅天也南夷服諸葛蜀劉禪時南中諸郡叛諸葛亮征之孟獲為夷漢所服七戰七擒曰公天威也南人不復反矣蜀志所載止於一時之事國朝淳化中李順亂蜀招安使雷有終遣嘉州士人辛怡顯使於南詔至姚州其節度使趙公美以書來迎云當境有瀘水昔諸葛武侯戒曰非貢獻征討不得輒渡此水若必欲過須致祭然後登舟今遣本部軍将賫金龍二條金錢二千文并設酒脯請先祭享而渡乃知南夷心服雖千年如初嗚呼可謂賢矣事見怡顯所作雲南録二疏贊作議論文字須考引事實無差忒乃可傳信後世東坡先生作二䟽圖贊云孝宣中興以法馭人殺蓋韓楊蓋三良臣先生憐之振袂脫屣使知區區不足驕士其立意超卓如此然以其時考之元康三年二䟽去位後二年葢寛饒誅又三年韓延夀誅又三年楊惲誅方二䟽去時三人皆亡恙葢先生文如傾河不復效常人尋閱質究也李宓伐南詔唐天寳中南詔叛劒南節度使鮮于仲通討之䘮士卒六萬人楊國忠掩其敗狀仍叙其戰功時募兵擊南詔人莫肯應募國忠遣御史分道捕人連枷送詣軍所行者愁怨所在哭聲振野至十三載劒南留後李宓将兵七萬徃擊南詔南詔誘之深入閉壁不戰宓糧盡士卒瘴疫及饑死什七八乃引還蠻追擊之宓被擒全軍皆没國忠隠其敗更以捷聞益發兵討之此通鑑所紀舊唐書云李宓率兵擊蠻於西洱河糧盡軍旋馬足䧟橋為閤羅鳯所擒新唐書亦云宓敗死於西洱河予按髙適集中有李宓南征蠻詩一篇序云天寳十一載有詔伐西南夷丞相楊公兼節制之寄乃奏前雲南太守李宓渉海自交趾擊之徃復數萬里十二載四月至於長安君子是以知廟堂使能而李公效節予忝斯人之舊因賦是詩其略曰肅穆廟堂上深沉節制雄遂令感激士得建非常功鼓行天海外轉戰蠻夷中長驅大浪破急擊群山空餉道忽已逺縣軍垂欲窮野食掘田䑕晡餐兼僰僮収兵列亭候拓地彌西東瀘水夜可渉交州今始通歸來長安道召見甘泉宫其所稱述如此雖詩人之言未必皆實然當時之人所賦其事不應虚言則宓蓋歸至長安未嘗敗死其年又非十三載也味詩中掘䑕餐僮之語則知糧盡危急師非勝歸明甚浮梁陶器彭器資尚書文集有送許屯田詩曰浮梁巧燒甆顔色比瓊玖因官射利疾衆喜君獨不父老爭歎息此事古未有注云浮梁父老言自來作知縣不買甆器者一人君是也作饒州不買者一人今程少卿嗣宗是也惜乎不載許君之名容齋隨筆卷四欽定四庫全書容齋隨筆卷五二十五則宋洪邁撰
