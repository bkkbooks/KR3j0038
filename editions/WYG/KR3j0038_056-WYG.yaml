seq: 56
front:
  text: 二十五則
  hash: sha256:a64c6d6d6c7a1db83a5a5ea8572a30c57dd0fff2d6409916c22fa6ea93a56033
body:
  text: 宋洪邁撰二叔不咸左氏𫝊載富辰之言曰昔周公弔二叔之不咸故封建親戚以藩屛周士大夫多以二叔為管蔡案蔡仲之命云羣叔流言乃致辟管叔于商囚蔡叔降霍叔為庶人蓋三叔也杜預注以為周公傷夏殷之叔世疏其親戚以致滅亡故廣封其兄弟是以方叙說管蔡郕霍十六國其義昭然所言親戚者指兄弟耳官階服章唐憲宗時因數赦官多汎階又帝親郊陪祠者授三品五品不計考使府軍吏以軍功借賜朱紫率十八近臣謝郎官出使多所賜與每朝㑹朱紫滿庭而少衣緑者品服太濫人不以為貴帝亦惡之詔太子少師鄭餘慶條奏懲革淳熈十六年紹熈五年連有覃霈轉官賜服者衆紹熈元年予自當塗徙㑹稽過闕遇起居舍人莫仲謙於漏舍仲謙云比赴景靈行香見朝士百數無一緑袍者又朝議中奉皆直轉行故五品官不勝計頗類元和也月非望而食厯家論日月食自漢太初以來始定日食不在朔則在晦否則二日然甚少月食則有十四十五十六之差葢置望参錯也天體有二交道曰交初曰交中交初者星家以為羅㬋交中者計都也隠暗不可見於是為入交法以求之然不過能求朔望耳若餘日入交則書所不載由漢及唐二十八家暨本朝十一厯皆然姑以慶元丁巳嵗五次月食考之二月望為入交中七月為交初唯十月二十日二十一日連兩夜乃以二更盡月食之既纔兩刻復明十一月十八夜復如之案此三食皆是交中十月二十夜月在張五度而計都在翼二度次夜月在張十七度計都未定相距才四度耳十一月十八夜月在星五度計都在張十九度相距二十度十二月十七夜五更月在星二度入交陽末卯初四刻交甚食六分半八刻退交十八夜四更月在張六度入交中隂初至寅四刻交甚食九分邜五刻退交其騐如此予竊又有疑焉太隂一月一周天必兩值交道今年遂至八食一一如星官厯翁之說仍不拘月望則玉川子之詩不勝作矣當更求其旨趣云頃見太史局官劉孝榮言月本無光受日為明望夜正與日對故一輪光滿或月行有遲疾先後日光所不照處則為食朔旦之日日月同宫如月在日上掩太陽而過則日光為所遮故為日食非此二日則無薄蝕之理其説亦通慶善橋饒州學非范文正公所建予既書之矣城内慶善橋之說亦然比因郡人脩橋拆去舊石見其上鐫云康定庚辰案范公以景祐乙亥為待制丙子知開封府黜知饒州後徙潤越至庚辰歲乃復職帥長安既去此久矣西漢以來加官漢書百官表云侍中左右曹諸吏散騎中常侍皆加官所加或將軍列侯卿大夫將都尉給事中亦加官所加或大夫博士議郎其侍中中常侍得入禁中諸曹受尚書事諸吏得舉法散騎並乘輿車並歩浪反案漢世除授此等稱謂殆若今之兼職者不甚為顯秩然魏相以御史大夫兼給事中它如劉向以宗正散騎給侍中蘇武以右曹典屬國揚雄為諸吏光禄大夫是也至於金日磾以降虜為侍中其子賞建諸孫常敞岑明渉湯融欽皆以左曹諸吏侍中故班史賛之曰七世内侍何其盛也蓋如今時閤門宣賛祗候之類但漢家多用士人武帝所任莊助朱買臣吾􅏀夀王東方朔諸人皆天下選此其所以為人貴重東漢大略亦然晉宋以來又有給事黄門侍郎散騎常侍通直散騎常侍散騎侍郎等皆為兼官但視本秩之髙下已而復以將軍為寵齊高帝以太子詹事何戢領選以戢資重欲加常侍禇淵曰臣與王儉既已左珥若復加戢則八座遂有三貂若帖以驍游亦為不少乃以為吏部尚書加驍騎將軍唐有撿挍官文武散階憲衘乃此制也國朝自眞宗始創學士直學士待制直閣職名尤為仕宦所慕今自觀文殿大學士至直秘閣㡬四十種不刋之典明白易曉非若前代之冗法云吕望非熊自李瀚蒙求有吕望非熊之句後來据以為用然以史䇿攷之六韜第一篇文韜曰文王將田史編布卜曰田於渭陽將大得焉非龍非彲螭非虎非羆兆得公侯天遺汝師文王曰兆致是乎史編曰編之太祖史疇為禹占得臯陶兆史記云吕尚窮困年老以漁釣干西伯西伯將出獵卜之曰所獲非龍非彲非虎非羆所獲霸王之輔後漢崔駰達㫖云漁父見兆於元龜注文乃引史記非龍非彲非熊非羆為證今之史記蓋不然也非熊出處惟此而已唐曹因墓銘慶元三年信州上饒尉陳莊發土得唐碑乃婦人為夫所作其文曰君姓曹名因字鄙夫世為番陽人祖父皆仕於唐髙祖之朝惟公三舉不第居家以禮義自守及卒於長安之道朝廷公卿鄉鄰耆舊無不太息惟予獨不然謂其母曰家有南畆足以飬其親室有遺文足以訓其子肖形天地間範圍隂陽内死生聚散特世態耳何憂喜之有哉予姓周氏公之妻室也歸公八載恩義有奪故贈之銘曰其生也天其死也天苟達此理哀復何言予案唐世上饒本隷饒州其後分為信故曹君為鄱陽人婦人能文達理如此惜其不𫝊故書之以禆圖志之缺唐史省文之失楊虞卿兄弟怙李宗閔勢為人所奔向當時為之語曰欲入舉塲先問蘇張蘇張尚可三楊殺我而新唐書减去先字李德裕賜河北三鎮詔曰勿為子孫之謀欲存輔車之勢新書减去欲字遂使兩者意義為不鏗鏘激越此務省文之失也李德裕論命令李德裕相武宗言從計行韋𢎞質建言宰相不可兼治錢糓德裕奏言管仲明於治國其語曰國之重器莫重於令令重君尊君尊國安治人之本莫要於令故曰虧令者死益令者死不行令者死留令者死不從令者死五者無赦又曰令在上而論可否在下是主威下繫於人也大和後風俗寢敝令出於上非之在下此敝不止無以治國臣謂制置職業人主之柄非小人所得干𢎞質賤臣豈得以非所宜言妄觸天聽是輕宰相也德裕大意欲朝廷尊臣下肅而政出宰相故感憤切言之予謂德裕當國它相取充位而已若如所言則一命一令之出臣下皆不得有言諫官御史給事舍人之職廢矣𢎞質位給事中亦非賤臣宜其一朝去位遂罹抵巇皆自取之也漢武唐德宗漢張湯事武帝舞文巧詆以輔法所治夷滅者多旋以罪受誅上惜湯稍進其子安世擢為尚書令安世宿衛忠正肅敬不怠勤勞國家卒為重臣其可大用不疑而武帝之意乃以父湯故耳唐盧把相德宗姦邪險賊為天下禍以公議不容譴逐致死帝念之不忘擢叙其子元輔至兵部侍郎元輔端静介正能紹其祖奕之忠規陟之臺省要官宜也而德宗之意乃以父把故爾且武帝之世羣臣不幸而誅者如莊助朱買臣吾􅏀夀王諸人及考終名臣如汲黯鄭莊董仲舒卜式未嘗恤其孤德宗輔相之賢如崔祐甫李泌陸䞇皆身沒則已而獨於湯把二人惓惓如此是可歎也諸公論唐肅宗唐肅宗於干戈之際奪父位而代之然尚有可諉者曰欲收復兩京非居尊位不足以制命諸將耳至於上皇還居興慶惡其與外人交通刼徙之西内不復定省竟以怏怏而終其不孝之惡上通於天是時元次山作中興頌所書天子幸蜀太子即位於靈武直指其事殆與洪範云武王勝殷殺受之辭同其詞曰事有至難宗廟再安二聖重歡既言重歡則知其不歡多矣杜子美杜鵑詩我看禽鳥情猶觧事杜䳌傷之至矣顔魯公請立放生池表云一日三朝大明天子之孝問安視膳不改家人之禮東坡以為彼知肅宗有愧於是也黄魯直題磨崖碑尤為深切撫軍監國太子事何乃趣取大物為事有至難天幸耳上皇局脊還京師南内凄凉幾苟活髙將軍去事尤危臣結舂陵二三䇿臣甫杜鵑再拜詩安知忠臣痛至骨世上但賞瓊琚詞所以掲表肅宗之罪極矣孫馬兩公所言盧照鄰有疾問孫思邈曰髙醫愈疾奈何答曰天有四時五行寒暑迭居和為雨怒為風凝為雪霜張為虹蜺天常數也人之四支五藏一覺一􅄰吐納往來流為榮衛章為氣色發為音聲人常數也陽用其形隂用其精天人所同也失則烝生熱否生寒結為瘤贅陷為癰疽奔則喘乏竭則焦稿發乎面動乎形天地亦然五緯縮嬴孛彗飛流其危胗也寒暑不時其烝否也石立土踊是其瘤贅山崩土陷是其癰疽奔風暴雨其喘乏川瀆竭涸其焦稿髙醫𨗳以藥石救以砭劑聖人和以至德輔以人事故體有可愈之疾天有可振之災睿宗召司馬子㣲問其術對曰為道日損損之又損以至於無為夫心目所知見每損之尚不能已况攻異端而增智慮哉帝曰治身則爾治國若何曰國猶身也故游心於淡合氣於漠與物自然而無私焉而天下治孫公司馬所言皆至道妙理之所寓治心飬性宜無出此者矣元㣲之詩唐書藝文志元稹長慶集一百卷小集十卷而傳於今者惟閩蜀刻本為六十卷三舘所藏獨有小集文惠公鎮越以其舊治而文集蓋缺乃求而刻之外春遊一篇云酒户年年减山行漸漸難欲終心懶慢轉恐興闌散鏡水波猶冷稽峰雪尚殘不能辜物色乍可怯春寒逺目傷千里新年思萬端無人知此意閒凭小闌干白樂天書之題云元相公春游錢思公藏其真跡穆父守越時摹刻于蓬萊閣下今不復存集中逸此詩文惠為列之於集外李端民平叔嘗和其韻寄公云東閣經年别窮愁客路難望塵驚岳峙懐舊各雲散茵醉恩逾厚檣歌興未殘馮唐嗟已老范叔敢言寒玉燭調魁柄陽春在筆端應憐掃門役白首滯江干樂天所書予少時得其石刻後亦失之諫繚綾戲龍羅李德裕為浙西觀察使穆宗詔索盤絛繚綾千匹德裕奏言立鵞天馬盤絛掬豹文彩恠麗惟乘輿當御今廣用千匹臣所未諭優詔為停崇寧間中使持御札至成都令轉運使織􅃧龍羅二千繡旗五百副使何常奏旗者軍國之用敢不奉詔戲龍羅唯供御服日衣一匹歲不過三百有奇今乃數倍無益也詔奬其言為减四之三以二事觀之人臣進言於君切而不訐蓋無有不聽者何常所論甚與德裕相類云詳正學士唐太宗時命秘書監魏徴冩四部羣書將藏内府置讐正二十員後又詔虞世南顔師古踵領之功不就顯慶中罷讐正官使散官隨番刋正後詔東臺侍郎趙仁本等充使撿挍置詳正學士以代散官此名甚雅不知何時罷去然秘省自有挍書郎正字使正名責實足矣紹興中以貴臣提舉秘書省而置編定書籍官二員亦其類也容齋五筆卷二欽定四庫全書容齋五筆卷
