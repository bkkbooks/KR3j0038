front:
  text: 容齋五筆卷一十九則
  hash: sha256:d7d74f71b117a614d8aa17cd1dec24c8fb9000ca77a4be6201b0b4fdd8c430b9
body:
  text: 宋洪邁撰天慶諸節大中祥符之世諛佞之臣造爲司命天尊下降及天書等事於是降聖天慶天祺天貺諸節並興始時京師宫觀每節齋醮七日旋减為三日一日後不復講百官朝謁之禮亦罷今中都未嘗舉行亦無休假獨外郡必詣天慶觀朝拜遂休務至有前後各一日此為敬事司命過於上帝矣其當䆮明甚惜無人能建白者虢州兩刺史唐韓休為虢州刺史虢於東西京為近州乘輿所至常稅廐芻休請均賦他郡中書令張說曰免虢而與它州此守臣為私惠耳休復執論吏白恐忤宰相意休曰刺史幸知民之弊而不救豈為政哉雖得罪所甘心焉訖如休請盧把為虢州刺史奏言虢有官豕三千爲民患德宗曰徙之沙苑把曰同州亦陛下百姓臣謂食之便帝曰守虢而憂它州宰相才也詔以豕賜貧民遂有意柄任矣俄召入踰年拜相案兩人皆以虢州守臣言公家事而休見疑於名相把受知於猜主遇合有命信哉狐假虎威諺有狐假虎威之語稚子來叩其義因示以戰國策新序所載戰國䇿云楚宣王問羣臣曰吾聞北方之畏昭奚恤也果誠何如羣臣莫對江乙對曰虎求百獸而食之得狐狐曰子無敢食我矣天帝使我長百獸今子食我是逆天帝命也子以我為不信吾為子先行子隨我後觀百獸之見我而敢不走乎虎以為然故遂與之行獸見之皆走虎不知獸畏己而走也以為畏狐也今王之地方五千里帶甲百萬而專屬之昭奚恤故北方之畏奚恤也其實畏王之甲兵也猶百獸之畏虎也新序並同而其後云故人臣而見畏者是見君之威也君不用則威亡矣俗諺盖本諸此徐章二先生教人徐仲車先生為楚州教授每升堂訓諸生曰諸君欲為君子而勞己之力費己之財如此而不為猶之可也不勞己之力不費己之財何不為君子鄉人賤之父母惡之如此而不為可也鄉人榮之父母欲之何不為君子又曰言其所善行其所善思其所善如此而不為君子者未之有也言其不善行其不善思其不善如此而不為小人者未之有也成都冲退處士章詧隠者其學長於易太元為范子功觧述大㫖再復攡詞曰人之所好而不足者善也所醜而有餘者惡也君子能强其所不足而拂其所有餘則太元之道幾矣此子雲仁義之心予之於太元述斯而已或者苦其思艱其言迂溺其所以為數而忘其仁義之大是惡足以語道哉二先生之教人簡易明白學者或未知之故表出於此張吕二公文論張文潜誨人作文以理為主嘗著論云自六經以下至于諸子百氏騷人辯士論述大抵皆將以為寓理之具也故學文之端急於明理如知文而不務理求文之工世未嘗有是也夫決水於江淮河海也順道而行滔滔汨汨日夜不止衝砥柱絶吕梁放於江湖而納之海其舒為淪漣鼓為濤波激之為風飊怒之為雷霆蛟龍魚鼈噴薄出沒是水之竒變也水之初豈若是哉順道而決之因其所遇而變生焉溝瀆東決而西竭下滿而上虚日夜激之欲見其竒彼其所至者蛙蛭之玩耳江河淮海之水理達之文也不求竒而竒至矣激溝瀆而求水之竒此無見於理而欲以言語句讀為竒反覆咀嚼卒亦無有此最文之陋也一時學者仰以為至言予作史采其語著於本傳中又吕南公云士必不得已於言則文不可以不工蓋意有餘而文不足則如吃人之辯訟心未始不虚理未始不直然而或屈者無助於辭而已矣觀書契以來特立之士未有不善於文者士無志於立言則已必有志焉則文何可以卑淺而為之故毅然盡心思欲與古人並此南公與人書如此予亦載之傳中郎官非時得對唐肅宗在靈武闗東獻俘百將即死有歎者司膳員外郎李勉過而問之曰被脅而官非敢反勉入見帝曰冦亂之汙半天下其欲澡心自歸無繇如盡殺之是驅以助賊也帝馳騎全宥以一郎吏之㣲而非時得入對雖唐制不可詳知想兵戈艱難時暫如是耳王安石棄地熈寧七年遼主洪基遣泛使蕭禧來言河東地界未決八年再來必欲以代州天池分水嶺為界詔詢于故相文彦博富弼韓琦曾公亮以可與及不可許之狀皆以為不可王安石當國言曰將欲取之必固與之於是詔不論有無照驗擗撥與之往時界於黄嵬山麓我可以下瞰其應朔武三州既以嶺與之遼遂反瞰忻代凡東西失地七百里案慶厯中遼求闗南十縣朝廷方以西夏為慮猶不過增嵗幣以塞其欲至於土地尺寸弗與熈寧之兵力勝於曩時而用蕭禧堅坐都亭之故輕弃疆場設險要害之處安石果於大言其實無辭以卻之也孫權謂魯肅勸吾借劉𤣥德地云帝王之起皆有驅除闗羽不足忌此子敬内不能辨外為大言耳安石之語亦然雙生以前為兄續筆已書公羊傳注雙生子事茲讀西京雜記得一說甚詳云霍將軍妻一産二子疑所為兄弟或曰前生為兄後生為弟今雖俱日亦宜以先生為兄或曰居上者宜為兄居下者宜為弟居下者前生今宜以前生為弟光曰昔殷王祖甲一産二子以邜日生嚚以巳日生良則以嚚為兄以良為弟若以在上者為兄嚚亦當為弟矣許莊公一産二女曰妖曰茂楚大夫唐勒一産二子一男一女男曰正夫女曰瓊華皆以先生為長近代鄭昌時文長倩並生二男滕公一生二女李黎生一男一女並以前生為長霍氏亦以前生為兄焉此最可證風俗通應劭風俗通雖東漢末所作然所載亦難盡信其叙希姓者曰合浦太守虎旗上郡太守邸杜河内太守遇冲北平太守賤瓊東平太守到質沐寵北平太守卑躬鴈門太守宿詳五原太守督􅀈汝南太守謁渙九江太守荆修東海太守鄐熈𢎞農太守移良南郡太守為昆酒泉太守頻暢北海太守處興巴郡太守鹿旗涿郡太守作顯廬江太守貴遷交趾太守賴先外黄令集一洛陽令諸於單父令即賣烏傷令昔登山陽令職洪髙唐令用虯此二十君子皆是郡守縣令惟移良之名曾見於史恐未必然也俗語有出今人意錢賭博皆以四數之謂之攤案廣韻攤字下云攤蒱四數也竹工謂屋椽上織箔曰篖笪廣韻篖字下云筕篖竹笪也采帛鋪謂剪截之餘曰帵子帵一懽切注裁餘也挑剔燈火之杖曰掭他念切注火杖也李濟翁資暇集云意錢當云攤鋪疾道之訛其音為蒲此說不然昬主棄功臣燕昭王伐齊取其七十城所存者惟莒即墨田單一旦悉復之使齊復為齊而㐮王聼幸臣九子之譛單幾不免秦苻堅舉百萬之師伐晉賴謝安却之而孝武帝聼王國寳之讒安不能立於朝廷之上桓温伐慕容暐暐兵屡挫議欲奔北慕容垂一戰使燕復存乃用慕容評之毀垂竄身符氏國隨以亡朱泚據京師德宗播遷奉天李懐光繼叛李晟孤軍堅壁竟平大難而德宗用張延賞之譛訖罷其兵且百端疑忌至於鞅鞅以死自古昏主不明輕弃功臣如此真可歎也問故居陶淵明問來使詩云爾從山中來早晩發天目我屋南山下今生幾叢菊薔薇葉已抽秋蘭氣當馥歸去來山中山中酒應熟諸集中皆不載惟晁文元家本有之蓋天目疑非陶居處然李太白云陶令歸去來田家酒應熟乃用此耳王摩詰詩曰君自故郷來應知故郷事來日綺牕前寒梅著花未杜公送韋郎歸成都云為問南溪竹抽梢合過墻憶弟云故園花自發春日鳥還飛王介甫云道人北山來問松我東岡舉手指屋脊云今如許長古今詩人懐想故居形之篇詠必以松竹梅菊為比興諸子句皆是也至於杜公將别巫峽贈南郷兄瀼西果園詩云苔竹素所好萍蓬無定居逺遊長兒子幾地别林廬雜蕋紅相對他時錦不如具舟將出峽廵圃念擕鉏每讀至此未嘗不為之凄然寄題草堂云尚念四小松蔓草易拘纒霜骨不甚長永為隣里憐又一篇云四松初移時大抵三尺强别來忽三載離立如人長尤可見一時之懷抱也唐宰相不歴守令唐楊綰崔祐甫杜黄裳李藩裴垍皆稱英宰然攷其履歴皆未嘗為刺史守令綰初補太子正字擢右拾遺起居中書舍人禮吏部侍郎國子祭酒太常卿拜相祐甫初調夀安尉歴藩府判官入為起居中書舍人拜相黄裳初佐朔方府入為侍御史太子賔客太常卿拜相藩佐東都徐州府入為秘書郎郎中給事中拜相垍由美原尉四遷考功員外郎中書舍人户部侍郎拜相五賢行業史䇿書之已詳茲不復論然則後之用人必言踐揚中外諳熟民情始堪大用殆為隘矣張釋之桞渾漢張釋之為廷尉文帝出行有人驚乗輿馬使騎捕之屬廷尉釋之奏當此人犯蹕罰金上怒釋之日方其時上使使誅之則已顔師古謂言初執獲此人天子即令誅之其事即畢唐桞渾為相玉工為德宗作𢃄誤毀一銙工私市它玉足之帝識不類怒其欺詔京兆論死渾曰陛下遽殺之則已若委有司須詳讞乃可於法罪當杖請論如律由是工不死予謂張桞之論可謂善矣然張云上使使誅之則已桞云陛下遽殺之則已無乃啟人主徑殺人之端乎斯一節未為至當也人臣震主人臣立社稷大功負海宇重望久在君側為所敬畏其究必至於招疑毁漢髙祖有天下韓信之力為多終以挾不賞之功戴震主之威至於誅滅霍光擁昭立宣勢侔人主宣帝謁見髙廟光從驂乗上内嚴憚之若有芒刺在背其家既覆俗傳之曰威震主者不畜霍氏之禍盟於驂乘周亞夫平定七國景帝怒其固争栗太子由此疏之後目送其出曰此鞅鞅非少主臣也訖以無罪殺之謝安却符堅百萬之衆晉室復存功名既盛險詖求進之徒多毀短之孝武稍以疎忌又信㑹稽王道子之姦扇至使避位出外終以至亡齊文宣之簒魏皆髙德政之力德政為相數彊諫帝不恱謂左右曰髙德政恒以精神凌逼人遂殺之并其妻子隋文帝將簒周欲引髙熲入府熲忻然曰願受驅馳縱公事不成亦不辭滅族及帝受禪用為相二十年朝臣莫與為比熲自以為任寄隆重每懐至公無自疑意積為獨孤皇后漢王諒等所譛帝欲成其罪既罷之後至云自其觧落暝然忘之如本無髙熲不可以身要君自云第一也迨于煬帝竟以寃誅郭子儀再造王室以身為天下安危權任既重功名復大德宗即位自外召還朝所領副元帥諸使悉罷之李晟以孤軍復京城不見信於庸主使之晝夜泣目為之腫卒奪其兵百端疑忌幾於不免李德裕功烈光明佐武宗中興威名獨重宣宗立奉冊太極殿帝退謂左右曰向行事近我者非太尉邪每顧我毛髪為之森竪明日罷之終於貶死海外若郭崇韜安重誨皆然也五經秀才唐楊綰為相以進士不鄉舉但試辭賦浮文非取士之實請置五經秀才科李栖筠賈至以綰所言為是然亦不聞施行也陶潜去彭澤晉書及南史陶潜傳皆云潜為彭澤令素簡貴不私事上官郡遣督郵至縣吏白當束帶見之潜歎曰吾不能為五斗米折腰拳拳事郷里小人即日觧印綬去賦歸去來以遂其志案陶集載此辭自有序曰余家貧耕植不足以自給彭澤去家百里故便求之及少日眷然有歸與之情何則質性自然非矯勵所得飢凍雖切違已交病悵然慷慨深愧平生之志猶望一稔當斂裳宵逝尋程氏妹䘮於武昌情在駿奔自免去職在官八十餘日觀其語意乃以妹䘮而去不縁督郵所謂矯勵違已之說疑必有所屬不欲盡言之耳詞中正喜還家之樂略不及武昌自可見也羗戎畏服老將漢先零羗犯塞趙充國往擊之羗豪相數責曰語汝亡反今天子遣趙將軍來年八九十矣善為兵今請欲一閗而死可得邪充國時年七十六訖平之唐代宗時回紇吐蕃合兵入寇郭子儀單騎見回紇復與之和諸酋長皆大喜曰曏以二巫師從軍巫言此行甚安穩不與唐戰見一大人而還今果然矣郭公是時年七十乃知羗戎畏服老將如此班超久在西域思歸故其言云蠻夷之俗畏壯侮老葢有為而云古人字只一言檀弓云幼名冠字五十以伯仲周道也古之人命字一而已矣初曰子巳而為仲為伯又為叔為季其老而尊者為甫蓋無以兩言相連取義若屈原離騷經名余曰正則兮字余曰靈均案史記原字平所謂靈均者釋平之義以縁餙詞章耳下至西漢與周相接故一切皆然除子房子卿子孟子政子孺子長子雲子兄子眞子公子陽子賔子幼之外若仲孺仲卿仲子長卿少卿孺卿君卿客卿游卿翁卿聖卿長君少君穉君游君次君贑君近君曼君王孫翁孫次公少公孟公游公仲公長公君公少叔翁叔長叔中叔子叔長倩曼倩次倩穉季長孺仲孺幼孺少孺次孺翁孺君孺長翁弱翁仲翁少翁君房君賔君倩君敖君蘭君長君仲君孟少季少子少路少游穉賔穉圭穉游穉君臣先巨君長賔長房翁思翁子翁仲之類其義只從一訓極為雅馴至於婦人曰少夫君俠政君君力君弟君之阿君單書一字者若陳勝字渉項籍字羽彭越字仲張歐吳廣枚乗字叔楚元王字交朱雲字游爰盎字絲張釋之字季鄭當時字荘劉德字路眭𢎞字孟迨東漢以下則不盡然容齋五筆卷一欽定四庫全書容齋五筆卷
