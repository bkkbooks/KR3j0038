front:
  text: 鼎銘識三代鐘鼎彞器存於今者其間欵識唯眉夀萬年子子孫孫永寳用之語差可辨認餘皆茫昩不可讀談者以為古文質朴固如此予竊有疑焉商周文章見於詩書三盤五誥雖詰曲聱牙尚可精求其義他皆坦然明白如與人言自武王丹書諸銘外其見於經𫝊者如湯之盤銘曰茍日新日日新又日新讒鼎之銘曰昧旦丕顯後世猶怠正考父鼎銘曰一命而僂再命而傴三命而俯循墻而走亦莫余敢侮饘於是鬻於是以餬余口㮚氏量銘曰時文思索允臻其極嘉量既成以觀四國永啟厥後兹器維則祭射侯辭曰惟若寧侯毋或若女不寧侯不屬于王所故抗而射女衞禮至銘曰余掖殺國子莫余敢止孔悝鼎銘曰八月丁亥公假于太廟公曰叔舅乃祖莊叔左右成公成公乃命莊叔隨難于漢陽即宫于宗周奔走無射啟右獻公獻公乃命成叔纂乃祖服乃考文叔興舊嗜欲作率慶士躬恤衞國其勤公家夙夜不解民咸曰休哉公曰叔舅予女銘若纂乃考服悝拜稽首曰對揚以辟之勤大命施于烝鼎􅂜扶風羙陽鼎銘曰王命尸臣官此栒邑賜爾旂鸞黼黻琱戈尸臣拜手稽首曰敢對揚天子不顯休命此諸銘未嘗不粲然何為𫝊於今者艱澁無緒乃爾漢去周未逺武宣以來郡國每獲一鼎至於薦告宗廟羣臣上夀竇憲出征南單于遺以古鼎容五斗其銘曰仲山甫鼎其萬年子子孫孫永保用憲乃上之蓋以其難得故也今世去漢千年而器寳之出不可勝計又為不可曉已武帝獲汾隂脽上鼎無欵識而備禮迎享宣帝獲羙陽鼎下羣臣議張敞乃以有欵識之故絀之又何也
