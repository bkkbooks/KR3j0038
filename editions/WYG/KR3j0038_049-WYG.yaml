body:
  text: 犧尊象尊周禮司尊彞祼用雞彞鳥􅂜其朝獻用兩獻尊其再獻用兩象尊漢儒注曰雞彞鳥彞謂刻而畫之為雞鳯凰之形獻讀為犧犧尊飾以翡翠象尊以象鳯凰或曰以象骨飾尊又云獻音娑有婆娑之義惟王肅云犧象二尊並全牛象之形而鑿背為尊陸徳明釋周禮獻尊之獻音素何反而於左氏𫝊犧象不出門釋犧為許宜反又素何反予按今世所存故物宣和博古圖所寫犧尊純為牛形象尊純為象形而尊在背正合王肅之說然則犧字只當讀如本音鄭司農諸人所云殊與古製不類則知目所未覩而臆為之說者何止此哉又今所用爵除太常禮器之外郡縣至以木刻一雀别置杯於背以承酒不復有兩柱三足隻耳侈口之狀向在福州見之尤為可笑也再書博古圗予昔年因得漢匜讀博古圗嘗載其序述可笑者數事於一筆近復盡觀之其謬妄不可殫舉當政和宣和間蔡京為政禁士大夫不得讀史而春秋三𫝊真束髙閣故其所引用絶為乖盾今一切記之於下以示好事君子與我同志者商之癸鼎只一癸字釋之曰湯之父主癸也父癸尊之說亦然至父癸匜則又以為齊癸公之子乙鼎銘有乙毛兩字釋之曰商有天乙祖乙小乙武乙太丁之子乙今銘乙則太丁之子也父已鼎曰父已者雍己也繼雍己者乃其弟太戊豈非繼其後者乃為之子邪至父已尊則直云雍己之子太戊為其父作予按以十干為名商人無貴賤皆同而必以為君所謂癸即報癸巳即雍己是六七百年中更無一人同之者矣商公非鼎銘只一字曰非釋之曰據史記有非子者為周孝王主馬其去商逺甚惟公劉五世孫曰公非考其時當為公非也夫以一非字而必强推古人以證之可謂無理周益鼎曰春秋文公六年有梁氏益昭公六年有文公益未知孰是予按左𫝊文八年所紀乃梁益耳而把文公名益姑周絲駒父鼎曰左𫝊有駒伯為郤克軍佐駒其姓也此曰駒父其同駒伯為姓邪予按左𫝊駒伯者卻錡也錡乃克之子是時卻氏三卿錡曰駒伯犨曰苦成叔至曰温季皆其食采邑名耳豈得以為姓哉叔液鼎曰考諸前代叔液之名不見於經𫝊惟周八士有叔夜豈其族歟夫伯仲叔季為兄弟之稱古人皆然而必指為叔夜之族是以叔為氏也周州卣曰州出於來國後以州為氏在晉則大夫州綽在衞則大夫州吁其為氏則一耳予按來國之名無所著見而州吁乃衞公子正不讀春秋豈不知衞詩國風乎遂以為氏尤可哂也周髙克尊曰髙克者不見於他𫝊惟周末衞文公時有髙克將兵疑克者迺斯人蓋衞物也予按元銘文但云伯克初無髙字髙克鄭清人之詩兒童能誦之乃以為衞文公時又言周末此書局學士蓋不曾讀毛詩也周毁敦曰銘云伯和父和者衞武公也武公平戎有功故周平王命之為公予按一時列國雖子男之微未有不稱公者安得平王獨命衞武之事周慧季鬲曰慧與惠通春秋有惠伯惠叔虢姜敦有惠仲而此鬲名之為惠季豈非惠為氏而伯仲叔季者乃其序邪予按惠伯惠叔正與莊伯戴伯平仲敬仲武叔穆叔成季相類皆上為謚而下為字烏得以為氏哉齊侯鎛鐘銘云咸有九州處禹之都釋之曰齊之封域有臨淄東萊北海髙宻膠東泰山樂安濟南平原蓋九州也予按銘語正謂禹九州耳今所指言郡名周世未有豈得便以為州乎宋公䪫鐘銘曰宋公成之䪫鐘釋之曰宋自微子有國二十世而有共公固成又一世而有平公成又七世而有剔公成未知孰是予按宋共公名史記以為瑕春秋以為固初無曰固成者且父既名成而其子復名之可乎剔成君為弟偃所逐亦非名成也周雲雷磬曰春秋魯饑臧文仲以玉磬告糴于齊按經所書但云臧孫辰告糴于齊左𫝊亦無玉磬之說漢定陶鼎曰漢初有天下以定陶之地封彭越為梁王越既叛命乃以封髙祖之子恢是為定陶共王予按恢正封梁王後徙趙所謂定陶共王者元帝之子哀帝之父名康者也碌碌七字今人用碌碌字本出老子云不欲碌碌如玉落落如石孫愐唐韻引此句及王弼别本以為琭琭然又為録録娽娽鹿鹿陸陸禄禄凡七字史記毛遂云公等録録因人成事唐韻以為娽娽漢書蕭何贊云録録未有竒節顔師古注録録猶鹿鹿言在凡庶之中也馬援𫝊今更共陸陸莊子漁父篇禄禄而受變於俗後生或不盡知占測天星國朝星官歴翁之伎殊愧漢唐故其占測荒茫㡬於可笑偶讀四朝史天文志云元祐八年十月戊申星出東壁西慢流至羽林軍没主擢用文士賢臣在位紹聖元年二月丙午星出壁東慢流入濁没主天下文章士登用賢臣在位元符元年六月癸巳星出室至壁東没主文士入國賢臣用二年二月癸卯星出靈臺北行至軒轅没主賢臣在位天子有子孫之喜按是時宣仁上仙國是丕變一時正人以次竄斥章子厚在相位蔡卞輔之所謂四星之占豈不可笑也子孫之說蓋隂謟劉后云政和宫室自漢以來宫室土木之盛如漢武之甘泉建章陳後主之臨春結綺隋煬帝之洛陽江都唐明皇之華清連昌已載史策國朝祥符中姦臣導䛕為玉清昭應會靈祥源諸宫議者固以崇侈勞費為戒然未有若政和蔡京所為也京既固位竊國政招大璫童貫楊戩賈詳藍從熈何訢五人分任其事於是始作延福宫有穆清成平會寧睿謨凝和崑玉羣玉七殿東邊有蕙馥報瓊蟠桃春錦疊瓊芬芳麗玉寒香拂雲偃盖翠葆鈆英雲錦蘭薫摘金十五閣西邊有繁英雪香披芳鈆華瓊華文綺絳蕚穠華緑綺瑶碧清音秋香叢玉扶玉絳雲亦十五閣又疊石為山建明春閣其髙十一丈宴春閣廣十二丈鑿圎池為海横四百尺縱二百六十七尺鶴莊鹿砦孔翠諸栅蹄尾以數千計五人者各自為制度不相㳂襲爭以華靡相誇勝故名延福五位其後復營萬嵗山艮嶽山周十餘里最髙一峯九十尺亭堂樓館不可殫記徽宗初亦喜之已而悟其過有厭惡語由是力役稍息靖康遭變詔取山禽水鳥十餘萬投諸汴渠拆屋為薪剪石為砲伐竹為笓籬大鹿數千頭悉殺之以㗖衞士僧官試卿唐代宗以胡僧不空為鴻臚卿開府儀同三司予已論之矣自其後習以為常至本朝尚爾元豐三年詳定官制所言譯經僧官有授試光禄鴻臚卿少卿者請自今試卿者改賜三藏大法師試少卿者賜三藏法師詔試卿改賜六字法師少卿四字並冠以譯經三藏久之復罷大觀筭學大觀中置筭學如庠序之制三年三月詔以文宣王為先師兖鄒荆三國公配饗十哲從祀而列自昔著名筭數之人繪像於兩廊加賜五等之爵於是中書舍人張邦昌定其名風后大橈隷首容成箕子商髙常僕鬼臾區巫咸九人封公史蘇卜徒父卜偃梓慎卜楚丘史趙史墨禆竈榮方甘徳石申鮮于妄人耿夀昌夏侯勝京房翼奉李尋張衡周興單颺樊英郭璞何承天宋景業蕭吉臨孝恭張曾元王朴二十八人封伯鄧平劉洪管輅趙達祖沖之殷紹信都芳許遵耿詢劉焯劉炫傅仁均王孝通瞿曇羅李淳風王希明李鼎祚邊罔郎顗襄楷二十人封子司馬季主洛下閎嚴君平劉徽姜岌張立建夏侯陽甄鸞盧太翼九人封男考其所條具固有於𫝊記無聞者而髙下等差殊為乖謬如司馬季主嚴君平止於男爵鮮于妄人洛下閎同定太初歴而妄人封伯下閎封男尤可笑也十一月又改以黄帝為先師云十八鼎夏禹鑄九鼎唯見於左𫝊王孫滿對楚子及靈王欲求鼎之言其後史記乃有鼎震及淪入于泗水之說且以秦之强暴視衰周如机上肉何所畏而不取周亦何辭以却赧王之亡盡以寳器入秦而獨遺此以神器如是之重決無淪没之理泗水不在周境内使何人般舁而往寧無一人知之以告秦邪始皇使人没水求之不獲蓋亦為𫝊聞所誤三禮經所載鐘􅂜名數詳矣獨未嘗一及之詩易所書固亦可考以予揣之未必有是物也唐武后始復置于通天宫不知何時而毁國朝崇寧三年用方士魏漢津言鑄鼎四年三月成於中太一宫之南為殿名曰九成宫中央曰帝鼐北方曰寳鼎東北曰牡鼎東方曰蒼鼎東南曰罔鼎南方曰彤鼎西南曰阜鼎西方曰晶鼎西北曰魁鼎奉安之日以蔡京為定鼎禮儀使大觀三年又以鑄鼎之地作寳成宫政和六年復用方士王仔昔議建閣於天章閣西徙鼎奉安改帝鼐為隆鼐餘八鼎皆改焉名閣曰圓象徽調閣七年又鑄神霄九鼎一曰太極飛雲洞劫之鼎二曰蒼壺祀天貯醇之鼎三曰山嶽五神之鼎四曰精明洞淵之鼎五曰天地隂陽之鼎六曰混沌之鼎七曰浮光洞天之鼎八曰靈光晃曜錬神之鼎九曰蒼龜大蛇蟲魚金輪之鼎明年鼎成置于上清寳籙宫神霄殿遂為十八鼎繼又詔罷九鼎新名悉復其舊今人但知有九鼎而十八之數唯朱忠靖公秀水閒居録略紀之故詳載于此四朝史志四朝國史本紀皆邁為編修官日所作至於淳熙乙巳丙午又成列𫝊百三十五卷惟志二百卷多出李燾之手其彚次整理殊為有工然亦時有失㸃撿處蓋文書廣博於理固然職官志云使相以待勲賢故老及宰相久次罷政者惟趙普得之明道末吕夷簡罷始復加使相其後王欽若罷日亦除遂以為例按趙普之後宼準陳堯叟王欽若皆祥符間自樞宻使罷而得之欽若以天聖初再入相終於位夷簡乃在其後十餘年今言欽若用夷簡故事則非也因記新唐書所載李泌相徳宗加崇文館大學士泌建言學士加大始中宗時及張說為之固辭乃以學士知院事至崔圎復為大學士亦引泌為讓而止按崔圎乃肅宗朝宰相泌之相也相去三十年反以為圎引泌為讓甚類前失也宗室參選吏部員多闕少今為益甚而選人當注職官簿尉輒為宗室所奪盖以盡壓已到部人之故按宣和七年八月臣僚論祖宗時宗室無參選法至崇寧初大啟僥倖遂使任意出官又優為之法參選一日即在闔選名次之上以天支之貴其間不為無人而膏梁之習貪􅁋縱恣出為民害者不少議者頗欲懲革罷百十人之私恩為億萬人之公利誠為至當若以親愛未忍姑乞與在部人通理名次從之靖康元年八月又奏云祖宗時未有宗室參部之法神宗時始選擇差注一二崇寧初立法大優宗室參選之日在本部名次之上既壓年月深逺勞效顯著之人復占名州大縣優便豐厚之處議者頗欲懲革不注郡守縣令與在部人通理名次有㫖從之此二段元未嘗衝改不知何時復紊也元豐庫神宗常憤北狄倔彊慨然有恢復幽燕之志於内帑置庫自製四言詩曰五季失圗獫狁孔熾藝祖造邦思有懲艾爰設内府基以募士曾孫保之敢忘厥志凡三十二庫每庫以一字掲之儲積皆滿又别置庫賦詩二十字分掲於上曰每䖍夕惕心妄意遵遺業顧予不武資何日成戎㨗其用志如此國家帑藏之富可知熙寧元年以奉宸庫珠子付河北縁邊於四𣙜塲鬻錢銀準備買馬其數至於二千三百四十三萬顆乾道以來有封樁南庫所貯金銀楮劵合為四千萬緍孝宗尤所垂意入紹興以來頗供好賜之用似聞日減於舊云五俗字書字有俗體一律不可復改者如沖涼況減決五字悉以水為冫筆陵切與冰同雖士人札翰亦然玉篇正收入於水部中而冫部之末亦存之而皆注云俗乃知由來久矣唐張參五經文字亦以為訛容齋三筆卷十三欽定四庫全書容齋三筆卷十四宋洪邁撰
