body:
  text: 容齋三筆序王右將軍逸少晉宋閒第一流人也遺情軒冕擺落世故蓋其生平雅懷自去會稽内史遂不肯復出自誓於父母墓下詞致確苦予味其言而深悲之又讀所與謝萬石書云坐而獲逸遂其宿心比嘗與安石東游山海頥養閒暇之餘欲與親知時共歡宴銜盃引滿語田里所行故以爲撫掌之資其爲得意可勝言邪常依依陸賈班嗣之處世老夫志願盡於此也按是時逸少春秋纔五十餘耳史氏不能賞取其高乃屑屑以爲坐王懷祖之故待之淺矣予亦從會稽解組還里于今六年仰瞻昔賢猶駑蹇之視天驥本非倫擬而年齡之運踰七望八法當挂神虎之衣冠無暇於誓墓也幸方寸未渠昏於寛閒寂寞之濵窮勝樂時之暇時時捉筆据几隨所趣而志之雖無甚奇論然意到即就亦殊自喜於是容齋三筆成累月矣稚子云不可無序引因攄寫所懷并發逸少之孤標破晉史之妄以詔兒姪冀爲四筆他日嘉話慶元二年六月晦日序欽定四庫全書卷
