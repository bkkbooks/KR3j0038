front:
  text: 八十二則
  hash: sha256:47aa47c6160f64ae26983c59a3d506c05d77135b6cdc6d4440bca19c5984497c
body:
  text: 宋洪邁撰白蘇詩紀年嵗白樂天為人誠實洞達故作詩述懷好紀年嵗因閱其集輒抒録之此生知負少年心不展愁眉欲三十莫言三十是少年百嵗三分已一分何況纔中年又過三十二不覺明鏡中忽年三十四我年三十六冉冉昏復旦非老亦非少年過三紀餘行年欲四十有女曰金鑾我今欲四十秋懷亦可知行年三十九嵗暮日斜時忽因時節驚年嵗四十如今欠一年四十為野夫田中學鉏糓四十官七品拙宦非由它毛鬢早改變四十白髪生況我今四十本來形貌羸衰病四十身嬌癡三嵗女自問今年幾春秋四十初四十未為老憂傷早衰惡莫學二郞吟太苦纔年四十鬢如霜下有獨立人年來四十一若為重入華陽院病髪愁心四十三已年四十四又為五品官面瘦頭斑四十四逺謫江州為郡吏行年四十五兩鬢半蒼蒼四十六時三月盡送春争得不殷勤我今四十六衰顇卧江城鬢髪蒼浪牙齒疎不覺身年四十七明朝四十九應轉悟前非四十九年身老日一百五夜月明天衰鬢蹉跎將五十闗河迢遞過三千青山舉眼三千里白髪平頭五十人宦途氣味已諳盡五十不休何日休五十江城守停杯忽自思莫學爾兄年五十蹉跎始得掌絲綸五十未全老尚可且歡娛長慶二年秋我年五十一二月五日花如雪五十二人頭似霜老挍於君合先退明年半百又加三前嵗花前五十二今年花前五十五倘年七十猶强健尚得閒行十五春去時十一二今年五十六我年五十七榮名得幾許我年五十七歸去誠已遲身為三品官年巳五十八五十八翁方有後静思堪喜亦堪嗟半百過九年艷陽殘一日火銷燈盡天明後便見平頭六十人六十河南尹前途足可知不准擬身年六十上山仍未要人扶不准擬身年六十遊春猶自有心情我今悟已晚六十方退閒今嵗日餘二十六來嵗年登六十二心情多少在六十二三人六十三翁頭雪白假如醒黠欲何為行年六十四安得不衰羸我今六十五走若下坡輪年開第七秩屈指幾多人五十八歸來今年六十六無憂亦無喜六十六年春共把十千沽一斗相㸔七十欠三年七十欠四嵗此生那足論六十八衰翁乗衰百疾攻又問年幾何七十行欠二更過今年年七十假如無病亦宜休今日行年將七十猶須慙愧病來遲且喜同年滿七十莫嫌衰病莫嫌貧舊語相𫝊聊自慰世間七十老人稀皤然七十翁亦足稱壽考昨日復今辰悠悠七十春人生七十稀我年幸過之白須如雪五朝臣又入新正第七旬時年七十一行開第八秩可謂盡天年吾今巳年七十一眼昏須白頭風眩七十人難到過三更較稀七十三人難再到今春來是别花來七十三翁旦暮身誓開險路作通津風光抛得也七十四年春夀及七十五俸霑五十千其多如此蘇公素重樂天故閒亦效之如龍鍾三十九勞生已强半嵗暮日斜時還為昔人歎正引用其語又四十豈不知頭顱畏人不出何其愚我今四十二衰髪不滿梳憶在錢塘正如此回頭四十二年非行年四十九還此北窗宿吾年四十九賴此一笑喜嗟我與君皆丙子四十九年窮不死五十之年初過二衰顔記我今如此白髮蒼顔五十三家人强遣試春衫先生年來六十化道眼已入不二門紛紛華髪不足道當返六十過去魂我年六十一頺景薄西山結髮事文史俯仰六十踰與君皆丙子各已三萬日翫味莊誦便如閱年譜也天將富此翁唐劉仁軌任給事中為宰相李義府所惡出為青州刺史及代還欲斥以罪又坐漕船覆没免官其後百濟叛詔以白衣撿挍帶方州刺史仁軌謂人曰天將富貴此翁邪果削平遼海白樂天有自題酒庫一篇云身更求何事天將富此翁此翁何處富酒庫不曽空注云劉仁軌詩天將富此翁以一醉為富也然則唐史以此為仁軌之語而不言其詩為未審耳白公説俸禄白樂天仕宦從壯至老凡俸禄多寡之數悉載於詩雖波及他人亦然其立身廉清家無餘積可以概見矣因讀其集輒叙而列之其為挍書郞曰俸錢萬六千月給亦有餘為左拾遺曰月慚諫紙二千張嵗愧俸錢三十萬兼京兆户曹曰俸錢四五萬月可奉晨昏廩禄二百石嵗可盈倉囷貶江州司馬曰散員足庇身薄俸可資家壁記曰嵗廩數百石月俸六七萬罷杭州刺史曰三年請禄俸頗有餘衣食移家入新宅罷郡有餘資為蘇州刺史曰十萬户州尤覺貴二千石禄敢言貧為賔客分司曰俸錢八九萬給受無虚月嵩洛供雲水朝廷乞俸錢老宜官冷静貧賴俸優饒官優有禄料職散無羈縻官銜依口得俸禄逐身來為河南尹曰厚俸如何用閒居不可忘不赴同州曰誠貪俸錢厚其如身力衰為太子少傅曰月俸百千官二品朝廷雇我作閒人又問俸厚薄百十隨月至七年為少傅品髙俸不薄其致仕曰全家遁此曾無悶半俸資身亦有餘俸隨日計錢盈貫禄逐年支粟滿囷壽及七十五俸占五十千其泛叙曰歴官凡五六禄俸及妻孥料錢隨官用生計逐年營形骸僶俛班行内骨肉匀留俸禄中其他人者如陜州王司馬曰公事閒忙同少尹俸錢多少敵尚書劉夢得罷賔客除秘監禄俸略同曰日望揮金賀新命俸錢依舊又如何歎洛陽長水二縣令曰朱紱洛陽官位屈青袍長水俸錢貧其將下世有達哉樂天行曰先賣南坊十畝園次賣東郭二頃田然後兼賣所居宅髣髴獲緡二三千但恐此錢用不盡即先朝露歸夜泉後之君子試一味其言雖日飲貪泉亦知斟酌矣觀其生涯如是東坡云公廩有餘粟府有餘帛殆亦不然白居易出位白居易為左贊善大夫盜殺武元衡京都震擾居易首上疏請亟捕賊刷朝廷恥以必得為期宰相嫌其出位不悦因是貶江州司馬此唐書本傳語也案是時宰相張𢎞靖韋貫之𢎞靖不足道貫之於是為失矣白集載與楊虞卿書云左降詔下明日而東思欲一陳於左右去年六月盜殺右丞相於通衢中迸血體磔髪肉所不忍道合朝震慄不知所云僕以書籍以來未有此事茍有所見雖畎畆皁隷之臣不當黙黙況在班列而能勝其痛憤邪故武丞相之氣平明絶僕之書奏日午入兩日之内滿城知之其不與者或語以偽言或陷以非語皆曰丞郞給舍諫官御史尚未論請而贊善大夫何反憂國之甚也僕聞此語退而思之贊善大夫誠賤冗耳朝廷有非常事即日獨進封章謂之忠謂之憤亦無愧矣謂之妄謂之狂又敢逃乎以此獲辜顧何如耳況又不以此為罪名乎白之自述如此然則一時指為出位者不但宰相而已也史又曰居易母墜井死而賦新井篇以是左降前書所謂不以此為罪名者是已醉翁亭記酒經歐陽公醉翁亭記東坡公酒經皆以也字為絶句歐陽二十一也字坡用十六也字歐記人人能讀至於酒經知之者蓋無幾坡公嘗云歐陽作此記其詞玩易蓋戲云耳不自以為竒特也而妄庸者作歐語云平生為此文最得意又云吾不能為退之畫記退之不能為吾醉翁亭記此又大妄也坡酒經每一也字上必押韻暗寓於賦而讀之者不覺其激昂淵妙殊非世間筆墨所能形容今盡載於此以示後生輩其詞云南方之氓以糯與秔雜以卉藥而為餅嗅之香嚼之辣揣之枵然而輕此餅之良者也吾始取麵而起肥之和之以姜液烝之使十裂繩穿而風戾之愈久而益悍此麴之精者也米五㪷為率而五分之為三㪷者一為五升者四三㪷者以釀五升者以投三投而止尚有五升之贏也始釀以四兩之餅而每投以二兩之麴皆澤以少水足以散解而均停也釀者必罋按而井泓之三日而井溢此吾酒之萌也酒之始萌也甚烈而㣲苦蓋三投而後平也凡餅烈而麴和投者必屢嘗而增損之以舌為權衡也既溢之三日乃投九日三投通十有五日而後定也既定乃注以㪷水凡水必熟而冷者也凡釀與投必寒之而後下此炎州之令也既水五日乃篘得二㪷有半此吾酒之正也先篘半日取所謂贏者為粥米一而水三之揉以餅麴凡四兩二物并也投之糟中熟撋而再釀之五日壓得㪷有半此吾酒之少勁者也勁正合為四㪷又五日而飲則和而力嚴而不猛也篘絶不旋踵而粥投之少留則糟枯中風而酒病也釀久者酒淳而豐速者反是故吾酒三十日而成也此文如太牢八珍咀嚼不嫌於致力則真味愈雋永然未易為俊快者言也白公感石白樂天有奉和牛思黯以李蘇州所寄太湖石竒狀絶倫因作詩兼呈劉夢得其末云共嗟無此分虛管太湖來注與夢得俱典姑蘇而不獲此石又有感石上舊字云太湖石上鐫三字十五年前陳結之案陳結之並無所經見全不可曉後觀其對酒有懷寄李郎中一絶句曰往年江外抛桃葉去嵗樓中别栁枝寂寞春來一杯酒此情惟有李君知注曰桃葉結之也栁枝樊素也然後結之之義始明樂天以病而去栁枝故作詩云兩枝楊栁小樓中嫋娜多年伴醉翁明日放歸歸去後世間應不要春風因劉夢得有戲之之句又答之云誰能更學孩童戲尋逐春風捉栁花然其鍾情處竟不能忘如云病共樂天相伴住春隨樊子一時歸金羈駱馬近貰却羅袖栁枝尋放還觴詠罷來賔閣閉笙歌散後妓房空皆是也讀之使人悽然禮部韻略非理禮部韻略所分字有絶不近人情者如東之與冬清之與青至於隔韻不通用而為四聲切韻之學者必强立説然終為非是如撰字至列於上去三韻中仍義訓不一頃紹興二十年省闈舉子兼經出易簡天下之理得賦予為參詳官有㸃撿試卷官蜀士杜華云簡字韻甚窄若撰字必在所用然惟撰述之撰乃可爾若雜物撰徳體天地之撰異乎三子者之撰欠伸撰杖屨之類皆不可用予以白知舉請掲榜示衆何通逺諫議初亦難之予曰倘舉塲皆落韻如何出手乃自書一榜榜才出八廂邏卒以為逐舉未嘗有此例即録以報主者士人滿簾前上請予為逐一剖析然後退又静之與靚其義一也而以靜為上聲靚為去聲案漢書賈誼鵩賦澹乎若深淵之靚顔師古注靚與静同史記正作静揚雄甘泉賦暗暗靚深注云靚即靜字耳今析入兩音殊為非理予名雲竹莊之堂曰賞静取杜詩賞静憐雲竹之句也守僧居之頻年三易有道人指曰靜字左傍乃争字以故不定疊於是撤去元扁而改為靚云唐臣乞贈祖唐世贈典唯一品乃及祖餘官只贈父耳而長慶中流澤頗異白樂天制集有户部尚書楊於陵回贈其祖為吏部郎中祖母崔氏為郡夫人馬揔准制贈亡父亦請回其祖及祖母散騎常侍張惟素亦然非常制也是時崔植為相亦有陳情表云亡父嬰甫是臣本生亡伯祐甫臣今承後嗣襲雖移孝心則在自去年以來累有慶澤凡在朝列再䝉追榮或有陳乞皆許回授臣委當寵擢而顯揚之命獨未及於先人今請以在身官秩并前後合叙勲封特乞回充追贈則知其時一切之制如此伯兄文惠執政乞以己合轉官回贈髙祖既已得㫖而為後省封還固近無此比且失於考引唐時故事也承襲用經語誤經傳中事實多有轉相祖述而用初不考其訓故者如邶谷風之詩為淫新昏棄舊室而作其詞曰宴爾新昏以我御窮宴安也言安愛爾之新昏但以我御窮苦之時至於富貴則棄我今人乃以初娶為宴爾非惟於詩意不合且又再娶事豈堪用也抑之詩曰訏謨定命逺猶辰告毛公曰訏大也謨謀也猶道也辰時也猶與猷同鄭箋曰猶圖也言大謀定命為天下逺圖庶事而以嵗時告施之如正月始和布政也案此特謂上告下之義今詞臣乃用於制詔以屬臣下而臣下於表章中亦用之不知其與入告爾后之告不侔也生民之詩曰誕彌厥月毛公曰誕大也彌終也鄭箋言后稷之在其母終人道十月而生案訓彌為終其義亦未易曉至俾爾彌爾性似先公酋矣既釋彌為終又曰酋終也頗涉頻複生民凡有八誕字誕寘之隘巷誕寘之平林誕寘之寒氷誕實匍匐誕后稷之穡誕降嘉種誕我祀如何若悉以誕為大於義亦不通它如誕先登于岸之類新安朱氏以為發語之辭是已莆田鄭氏云彌只訓滿謂滿此月耳今稱聖節曰降誕曰誕節人相稱曰誕日誕辰慶誕皆為不然但承習膠固無由可革雖東坡公亦云仰止誕彌之慶未能免俗書之於此使子弟後生輩知之左傳王使宰孔賜齊侯胙齊侯將下拜孔曰天子使孔曰以伯舅耋老無下拜對曰天威不違顔咫尺敢不下拜下拜登受謂拜於堂下而受胙於堂上今人簡牘謝饋者輒曰謹已下拜猶未為甚失若天威不違顔咫尺則上四字為天子設下三字為人臣設故注言天鑒察不逺威嚴常在顔面之前今士大夫往往於表奏中言違顔或曰咫顔咫尺之顔全與本指爽戾如用龍顔聖顔天顔之類自無害也長慶表章唐自大厯以河北三鎮為悍藩所據至元和中田𢎞正以魏歸國長慶初王承元劉緫去鎮幽於是河北畧定而穆宗以昏君崔植杜元穎王播以庸相不能建久長之䇿輕徙田𢎞正以啓王庭湊之亂繆用張𢎞靖以啓朱克融之亂朝廷以諸道十五萬衆裴度元臣宿望烏重嗣李光顔當時名將屯守踰年竟無成功財竭力盡遂以節鉞授二賊再失河朔訖于唐亡觀一時事勢何止可為痛哭而宰相請上尊號表云陛下自即大位及此二年無巾車汗馬之勞而坐平鎮冀無亡弓遺鏃之費而立定幽燕以謂威靈四及請為神武君臣上下其亦云無羞恥矣此表乃白居易所作又翰林學士元稹求為宰相恐裴度復有功大用妨己進取多從中沮壞之度上表極陳其狀帝不得已解稹翰林恩遇如故稹怨度欲解其兵柄勸上罷兵未幾拜相居易代作謝表其略云臣遭遇聖明不因人進擢居禁内訪以宻謀恩奬太深讒謗並至雖内省行事無所愧心然上黷宸聰合當死責其文過飾非如此居易二表誠為有玷盛徳元白制科元白習制科其書後分為四卷命曰策林其䇿頭䇿項各二道䇿尾三道此外曰美謙遜塞人望教必成不勞而理風行澆朴復雍熈感人心之類凡七十五門言所應對者百不用其一二備載於文集云八種經典開示悟入諸佛知見以了義度無邊以圓教垂無窮莫尊於妙法蓮華經凡六萬九千五百五字證無生忍造不二門住不可思議解脫莫極於維摩經凡二萬七千九十二字攝四生九類入無餘涅槃實無得度者莫先於金剛般若波羅宻經凡五千二百八十七字壞罪集福淨一切惡道莫急於佛頂尊勝陀羅尼經凡三千二十字應念順願願生極樂土莫疾於阿彌陁經凡一千八百字用正見觀真相莫出於觀音普賢菩薩法行經凡六千九百九十字詮自性認本覺莫深於實相法宻經凡三千一百五字空法塵依佛智莫過於般若波羅宻多心經凡二百五十八字是八種經具十二部合一十一萬六千八百五十七字三乘之要㫖萬佛之秘藏盡矣唐長慶三年蘇州重𤣥等法華院石壁所刻金字經白樂天為作碑文其叙如此予竊愛其簡明潔亮故備録之容齋五筆卷八欽定四庫全書容齋五筆卷
