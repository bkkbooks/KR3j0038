front:
  text: 顔魯公祠堂詩予家藏雲林繪監册有顔魯公畫像徐師川題詩曰公生開元間壯及天寳亂捐軀范陽胡竟死蔡州叛其賢似魏徴天下非貞觀四帝數十年一身逢百難少時讀書史此事心已斷老來鬢髪衰慨歎功名晚嗟哉忠義途捷去不可緩初無當年悲只令後世歎一朝絶霖雨南畝常亢旱小夫計雖得斯民蓋塗炭長歌詠君節千載勇夫愞敬書子張紳庶㡬古人半師川以詩鳴江西然此篇不為工嘗記李徳逺舉似童敏徳游湖州題公祠堂長句曰掛㠶一縱疾於鳥長興夜發呉興曉杖藜上訪魯公祠一見目明心皦皦未說邦人懐使君且為前古惜忠臣徳宗更用盧把相出當斯位誠艱辛生逆龍鱗死虎口要與乃兄同不朽狂童希烈何足罪姦邪嫉忠假渠手乃知成仁或殺身保身不必皆哲人此公安得世復有洗空凡馬須騏驎童之詩語意皆超㧞亦臨川人而終身不得仕為可惜也
  hash: sha256:a286d4a6f68b4a5e29666a0243884855de6e487cca78344ed844b0e7e95baf2a
