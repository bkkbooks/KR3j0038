body:
  text: 閔子不名論語所記孔子與人語及門弟子并對其人問答皆斥其名未有稱字者雖顔冉髙第亦曰回曰雍唯至閔子獨云子騫終此書無損名昔賢謂論語出於曽子有子之門人予意亦出於閔氏觀所言閔子侍側之辭與冉有子貢子路不同則可見矣曾晳待子不慈𫝊記所載曽晳待其子參不慈至云因鉏菜誤傷𤓰以大杖擊之仆地孔子謂參不能如虞舜小杖則受大杖則避以為䧟父於不義戒門人曰參來勿内予竊疑無此事殆戰國時學者妄為之辭且曽晳與子路冉有公西華侍坐有浴乎沂風乎舞雩之言涵泳聖教有超然獨見之妙於四人之中獨蒙吾與之褒則其為人之賢可知矣有子如此而㡬置之死地庸人且猶不忍而謂晳為之乎孟子稱曾子養曽晳酒肉養志未嘗有此等語也具圎復詩呉僧法具字圎復有能詩聲予乃紀之於夷堅志中殊為不類比於福州僧智恢處見其詩藁一紙字體效王荆公其送僧一篇云灘聲嘈嘈雜雨聲舍北舍南春水平拄杖穿花出門去五湖風浪白鷗輕送翁士特云朝入羊腸暮鹿頭十三官驛是荆州具車秣馬曉將發寒燭燒殘語未休竹軒云老竹排簷誰手種山日未斜寒翠重六月散髮葉底眠冷雨斜風頻入夢冬凋峰木雪縞廬落眼青青却笑渠花時吹笋排林上呉州還見竹溪圖和子蒼三馬圖云從來畫馬稱神妙至今只說江都王將軍曹霸實季仲沙苑丞相猶諸郎龍眠居士善畫馬獨與二子遥相望兩馬駢立真驌驦一馬脫去仍騰驤浣花老人今已亡嗚呼五馬誰平章飽知畫肉亦畫骨妙處不減黄無雙又一篇云燒燈過了客思家獨立衡門數瞑鴉燕子未歸梅落盡小䆫明月屬梨花皆可咀嚼也呉門僧惟茂住天台山一禪刹喜其旦暮見山作絶句曰四面峰巒翠入雲一溪流水漱山根老僧只恐山移去日午先教掩寺門甚有詩家風㫖而或者謂山若欲去豈容人掩住蓋呉人癡獃習氣也其說可謂不知音人當知足予年過七十法當致仕紹熈之末以新天子臨御未敢遽有請故玉隆滿秩只以本官職居里鄉衮趙子直不忍使絶禄粟俾之因任方用贅食太倉為愧而親朋謂予爵位不逮二兄以為耿耿予誦白樂天初授拾遺詩以語之曰奉詔登左掖束帶參朝議何言初命卑且脫風塵吏杜甫陳子昂才名括天地當時非不遇尚無過斯位其安分知足之意終身不渝因畧考國朝以來名卿偉人負一時重望而不躋大用者如王黄州禹偁楊文公億李章武宗諤張乖崖詠孫宣公奭晁少保逈劉子儀筠宋景文祁范蜀公鎮鄭毅夫獬滕元發甫東坡先生范淳父祖禹曽子開肇彭器資汝礪劉原甫敞蔡君謨襄孫莘老覺近世汪彦章藻孫仲益覿諸公皆不過尚書學士或中年即世或遷謫留落或無田以食或無宅以居况若我忠宣公者尚忍言之則予之忝竊亦已多矣淵明孤松淵明詩文率皆紀實雖寓興花竹間亦然歸去來辭云景翳翳以將入撫孤松而盤旋其飲酒詩二十首中一篇云青松在東園衆草没其姿凝霜殄異類卓然見髙枝連林人不見獨樹衆乃竒所謂孤松者是已此意蓋以自况也饒州刺史饒州良牧守自呉至今以政績著者有九賢郡圃立祠以事此外知名者盖鮮白樂天集有呉府君碑云君諱丹字真存以進士第入官讀書數千卷著文數萬言生四五嵗所作戲輒象道家法事既冠喜道書奉真籙每専氣入靜不粒食者數嵗飄然有出世心既壯在家為長屬有三㓜弟八稚姪不忍見其饑寒慨然有干禄意求名得名家無長物澹乎自處與天和始終享夀命八十二嵗無室家累無子孫憂終于饒州官次大略如此呉君在饒雖無遺事可紀以其邦君之故姑志於書呉為人清淨恬寂所謂逹士然年過八十尚領郡符又非為妻子計者良不可曉唐之治不播棄黎老故其居職不自以為過云紫極觀鐘饒州紫極觀有唐鐘一口形製清堅非近世工鑄可比刻銘其上曰天寳九載嵗次庚寅二月庚申朔十五日癸酉造通直郎前監察御史貶樂平員外尉李逢年銘前鄉貢進士薛彦偉述序給事郎行參軍趙從一書中大夫使持節鄱陽郡諸軍事撿挍鄱陽郡太守天水郡開國公上官經野妻扶風郡君韋氏奉為開元天地大寳聖文神武應道皇帝敬造洪鐘一口其後列録事參軍司功司法司士參軍各一人司户參軍二人參軍二人録事一人鄱陽縣令一人尉二人又専撿挍官鄱陽縣丞宋守靜専撿挍内供奉道士王朝隱又道士七人銘文亦雅㓗字畫不俗但月朔庚申則癸酉日當是十四日鐫之金石而誤如此浮洲開福院亦有呉武義年一鐘然非此比也兼中書令紹熙五年十二月二十二日宣麻制除嗣秀王伯圭兼中書令此官久不除學士大夫多不知本末至或疑為當入都堂治事邸報至外郡尤所不曉邁考之典故侍中中書令為兩省長官自唐以來居真宰相之位而中令在侍中上肅宗以後始以處大將故郭子儀僕固懐恩朱泚李晟韓宏皆為之其在京則入政事堂然不預國事懿僖昭之時員浸多率由平章事遷兼侍中繼兼中書令又遷守中書令三者均稱使相皆大勑繫銜而下書使字五代尤多國朝創業之初尚仍舊貫於是呉越國王錢俶天雄節度符彦卿雄武王景武寧郭從義保大武行徳成徳郭崇昭義李筠淮南李重進永興李洪義鳯翔王彦超定難李彞興荆南髙保融武平周行逢武寧王晏武勝侯章歸義曹元忠十五人同時兼中書令太宗朝唯除石守信而趙普以故相拜真宗但以處親王嘉祐末除宗室東平王允弼襄陽王允良元豐中除曹佾與允弼允良相去十七八年爵秩固存沈括筆談謂有司以佾新命言自來不曽有活中書令請俸則例蓋妄也官制行改三使相並為開府儀同三司元祐以後不復有之雖崇觀政宣輕用名器且改為左輔右弼然蔡京三為公相亦不敢居乾道中詔於録黄及告命内除去侍中中書令遂廢此官今當先降指揮復置則於事體尤惬當也嗣王終不敢當於是寢前命而賜贊拜不名作文字要㸃撿作文字不問工拙小大要之不可不着意㸃撿若一失事體雖遣詞超卓亦云未然前輩宗工亦有所不免歐陽公作仁宗御書飛自記云予將赴亳假道於汝隂因得閱書于子履之室而雲章爛然輝映日月為之正冠肅容再拜而後敢仰視蓋仁宗皇帝之御飛白也曰此寳文閣之所藏也胡為乎子之室乎曰曩者天子燕從臣于羣玉而賜以飛白予幸得預賜焉烏有記君上宸翰而彼此稱予且呼陸經之字又登貞觀御書閣記言太宗飛白亦自稱予外制集序歴道慶歴更用大臣稱吕夷簡夏竦韓琦范仲淹富弼皆斥姓名而曰顧予何人亦與其選又曰予時掌誥命又曰予方與修祖宗故事凡稱予者七東坡則不然為王誨亦作此記其語云故太子少傅安簡王公諱舉正臣不及見其人矣云云是之謂知體侍從兩制國朝官稱謂大學士至待制為侍從謂翰林學士中書舍人為兩制言其掌行内外制也舍人官未至者則云知制誥故稱羙之為三字謂尚書侍郎為六部長貳謂散騎常侍給事諫議為大兩省其名稱如此今盡以在京職事官自尚書至權侍郎及學士待制均為侍從蓋相承不深考耳予家藏王㳂春秋通義一書至和元年鄧州繳進二年有㫖送兩制看詳於是具奏者十二人皆列名銜學士七人曰學士承㫖禮部侍郎楊察翰林學士中書舍人趙槩楊偉刑部郎中胡宿吏部郎中歐陽修起居舍人吕溱禮部郎中王洙知制誥五人曰起居舍人王珪右司諫賈黯兵部員外郎韓絳起居舍人呉奎右正言劉敞而他官弗預此可見也翰林本以六員為額劉沆作相典領温成后䘮事以王洙同其越禮建明於是員外用之嘗為一時言者所論正此時云片言解禍自古將相大臣遭罹􅉲毁觸君之怒墮身於危棘將死之域而以一人片言轉禍為福蓋投機中的使聞之者曉然易寤然非遭值明主不能也蕭何為民請上林苑中空地髙祖大怒以為多受賈人財物下何廷尉械繫之王衛尉曰陛下距楚數嵗陳豨黥布反時相國守關中不以此時為利乃利賈人之金乎上不懌即日赦出何絳侯周勃免相就國人上書告勃欲反廷尉逮捕勃治之薄太后謂文帝曰絳侯綰皇帝璽將兵於北軍不以此時反今居一小縣顧欲反邪帝即赦勃此二者可謂至危不容救而於立談間見效如此蕭望之受遺輔政為許史恭顯所嫉奏望之與周堪劉更生朋黨請召致廷尉元帝不省為下獄也可其奏已而悟其非令出視事史髙言上新即位未以徳化聞於天下而先驗師傅既下九卿大夫獄宜因決免於是免為庶人髙祖文帝之明而受言元帝之昏而遂非於是可見忠言嘉謨揚子法言或問忠言嘉謨曰言合稷契謂之忠謨合臯陶謂之嘉如子雲之說則言之與謨忠之與嘉分而為二𫝊注者皆未嘗為之辭然則稷契不能嘉謨臯陶不能忠言乎三聖賢遺語可𫝊於後世者唯虞書存五篇之中臯陶矢謨多矣稷與契初無一話一言可考不知子雲何以立此論乎不若魏鄭公但云良臣稷契臯陶乃為通論免直學士院慶元元年正月一日鄭湜以起居郎直學士院二月二十三日趙汝愚罷相制乃湜所草議者指為褒詞太過二十五日有㫖免兼直院或以為故事所無按熙寧初王益柔以知制誥兼直學士院嘗奏中書熟狀加董氊階官之誤宰相怒其不申堂用他事罷其兼直已而遷龍圗閣直學士湜亦以罷直求去不許越三月而遷權刑部侍郎甚相類也大賢之後杜詩云大賢之後竟陵遲蕩蕩古今同一體乃贈狄梁公曾孫者至云飄泊岷漢干謁王侯則其衰微可知矣近見餘干寓客李氏子云本朝三李相文正公昉文靖公沆文定公迪皆一時名宰子孫亦相繼逹宦然數世之後益為蕭條又經南渡之厄今三裔並居餘干無一人在仕版文定濮州之族今有居越者雖曰不顯猶簪纓僅𫝊而文正文靖無聞可為太息容齋三筆卷十二欽定四庫全書容齋三筆卷十三十三則宋洪邁撰鐘
