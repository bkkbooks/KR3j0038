front:
  text: 十十七則
  hash: sha256:ab2be8ef78c03fc854ee70aef942670d264a0efb6f804bc5f9edcc27e3d29a7a
body:
  text: 宋洪邁撰經𫝊煩簡左𫝊蔡聲子謂楚子木曰善為國者賞不僭而刑不濫賞僭則懼及淫人刑濫則懼及善人若不幸而過寜僭無濫與其失善寜其利淫其語本於大禹謨罪疑惟輕功疑惟重與其殺不辜寜失不經也晉叔向詒鄭子産書曰先王議事以制誨之以忠聳之以行教之以務使之以和臨之以敬涖之以彊斷之以剛猶求聖哲之上眀察之官忠信之長慈恵之師其語本於吕刑惟良折獄哲人惟刑也㫖意則同而經𫝊煩簡為不侔矣曹參不薦士曹參代蕭何為漢相國日夜飲酒不事事自云髙皇帝與何定天下法令既眀遵而勿失不亦可乎是則然矣然以其時考之承暴秦之後髙帝創業尚淺日不暇給豈無一事可闗心者哉其初相齊聞膠西盖公善治黄老言使人厚幣請之葢公為言治道貴清浄而民自定參於是避正堂以舎之其治要用黄老術故相齊九年齊國安集然入相漢時未嘗引葢公為助也齊處士東郭先生梁石君隠居深山蒯徹為參客或謂徹曰先生之於曹相國拾遺舉過顯賢進能二人者世俗所不及何不進之於相國乎徹以告參參皆以為上賓徹善齊人安其生嘗干項羽羽不能用其䇿羽欲封此兩人兩人卒不受凡此數賢參皆不之用若非史䇿失其𫝊則參不薦士之過多矣漢初諸将官漢初諸将所領官多為丞相如韓信初拜大将軍後為左丞相擊魏又拜相國擊齊周勃以将軍遷太尉後以相國代樊噲擊燕樊噲以将軍攻韓王信遷為左丞相以相國擊燕酈商為将軍以右丞相擊陳豨以丞相擊黥布尹恢以右丞相備守淮陽陳涓以丞相定齊地然百官公卿表皆不載盖蕭何已居相位諸人者未嘗在朝廷特使假其名以為重耳後世使相之官本諸此也漢官名漢官名既古雅故書於史者皆可誦味如朝臣齗齗不可光禄勲誰可以為御史大夫者御史大夫言可聼郎中令善媿人丞相議不可用太尉不足與計大将軍尊貴誠重大将軍有揖客京兆尹可立得大夫乘私車來邪天官丞日晏不來謝田大夫曉大司農大司馬欲用是忿恨後将軍數畫軍冊光禄大夫大中大夫耆艾二人以老病罷駙馬都尉安所受此語之類又如所書路中大夫韓御史大夫叔孫太傅鄭尚書鮑司𨽻趙将軍張廷尉亦􅂱然有法後漢書執金吾擊郾大司馬當擊宛大司馬習用歩騎等語尚有前史餘味漢唐輔相前漢宰相四十五人自蕭曹魏丙之外如陳平王陵周勃灌嬰張蒼申屠嘉以髙帝故臣陶青劉舎許昌薛澤荘青翟趙周以功臣侯子孫竇嬰田蚡公孫賀劉屈氂以宗戚衛綰李蔡以士伍唯王陵申屠嘉及周亞夫王商王嘉有剛直之節薛宣翟方進有材其餘皆容身保位無所建明至於御史大夫名為亞相尤録録不足數劉向所謂御史大夫未有如兒寛者盖以餘人可稱者少也若唐宰相三百餘人自房杜姚宋之外如魏徴王珪禇遂良狄仁傑魏元忠韓休張九齡楊綰崔祐甫陸䞇杜黄裳裴垍李絳李藩裴度崔羣韋處厚李徳裕鄭畋皆為一時名宰考其行事非漢諸人可比也漢武留意郡守漢武帝天資髙明政自已出故輔相之任不甚擇使若但使之奉行文書而已其於除用郡守尤所留意嚴助為㑹稽太守數年不聞問賜書曰君厭承明之廬懐故土出為郡吏間者濶焉乆不聞問吾邱夀王為東郡都尉上以夀王為都尉不復置太守詔賜璽書曰子在朕前之時知略輻湊及至連十餘城之守任四千石之重職事並廢盗賊從横甚不稱在前時何也汲黯拜淮陽太守不受印綬上曰君薄淮陽邪吾今召君矣顧淮陽吏民不相得吾徒得君重臥而治之觀此三者則知郡國之事無細大未嘗不深知之為長吏者常若親臨其上又安有不盡力者乎惜其為征伐奢侈所移使民間不見徳澤為可恨耳苦蕒菜吳歸命侯天紀三年八月有鬼目菜生工人黄耉家有蕒菜生工人吳平家髙四尺厚三分如枇杷形上廣尺八寸下莖廣五寸兩邊生葉緑色東觀按圗名鬼目作芝草蕒菜作平慮草以耉為侍芝郎平為平慮郎皆銀印青綬唐五行志中宗景龍二年岐州郿縣民王上賓家有苦蕒菜髙三尺餘上廣尺餘厚二分説者以為草妖予按蕒菜即苦蕒今俗呼為苦䔍者是也天紀景龍之事甚相類歸命次年亡國中宗後二年遇害雖事非此致亦可謂妖矣平慮草不知何状揚雄甘泉賦并閭注如淳曰并閭其葉随時改政平則平政不平則傾也顔師古曰如氏所説自是平慮耳然則亦異草也鬼目見爾雅郭璞云今江東有鬼目草莖似葛葉圓而毛如耳璫也赤色叢生廣志曰鬼目似梅南人以飲酒南方草木状曰鬼目樹大者如木子小者如鴨子七月八月熟色黄味酸以蜜煑之滋味柔嘉交趾諸郡有之交州記曰髙大如木𤓰而小傾邪不周正本草曰鬼目一名東方宿一名連蟲亦名羊蹄唐諸生束脩唐六典國子生初入置束帛一篚酒一壺脩一案為束脩之禮太學四門律學書學筭學皆如國子之法其習經有暇者命習𨽻書并國語説文字林三蒼爾雅毎旬前三日則試其所習業乃知唐世士人多攻書缺二字六館時以為常習其説文字林蒼雅諸書亦欲責以結字合於古義不特銓選之時方取楷法遒美者也束脩之禮乃於此見之開元禮載皇子束脩束帛一篚五匹酒一壺二斗脩一案三脡皇子服學生之服至學門外陳三物於西南少進曰某方受業於先生敢請見執篚者以篚授皇子皇子跪奠篚再拜博士答再拜皇子還避遂進跪取篚博士受幣皇子拜訖乃出其儀如此州縣學生亦然范徳孺帖范徳孺有一帖云純粹忝冐固多尤是家兄北歸遂觧倒懸之念慶快安幸此外何求四月末雇舟離均借人至鄧本待家兄之來今家兄雖得歸潁昌而尚未聞來耗已累遣人禀問所行路及相見之期人尚未還未知果能如約否盖恐太原接人非乆到此法留半月則湏北去也予以其時考之元符三年四月徳孺除知太原是月二十一日忠宣公自鄧州分司復故秩許歸潁昌府則此帖當在五月間忠宣猶未離永州也徳孺自均州守擢帥河東至於雇舟借人以行又云接人法留半月過此則湏北去雖欲待其兄亦不可得今世為長吏雖居蕞爾小壘而欲送還兵士唯意所湏若接人之來視其私計辦否為遲速耳未嘗顧法令以自儆䇿使申固要束稍整攝之置士大夫於無過之地亦所以善風俗也民不畏死老子曰民常不畏死奈何以死懼之若使人常畏死則為竒者吾得執而殺之孰敢讀者至此多以為老氏好殺夫老氏豈好殺者哉㫖意盖以戒時君世主視民為至愚至賤輕盡其命若刈草菅使之知民情状人人能與我為敵國懔乎常有朽索馭六馬之懼故繼之曰常有司殺者殺夫代司殺者殺是代大匠斵夫代大匠斵希有不傷其手矣下篇又曰人之輕死以其生生之厚是以輕死且人情莫不欲夀雖衰貧至骨瀕於餓𨽻其與受僇而死有間矣烏有不畏者哉自古以來時運俶擾至於空天下而為盗賊及夷考其故亂之始生民未嘗有不靖之心也秦漢隋唐之末土崩魚爛比屋可誅然凶暴如王仙芝黄巢不過僥覬一官而已使君相御之得其道豈復有滔天之患哉龔遂之清渤海馮異之定闗中髙仁厚之平蜀盗王先成之說王宗侃民情可見世之君子能深味老氏之訓思過半矣天下有竒士天下未嘗無魁竒智略之士當亂離之際雖一旅之聚數城之地必有䇿䇿知名者出其間史傳所書尚可考也鄭燭之武弦髙從容立計以存其國後世至不可勝紀在唐尤多姑摭其小小者數人載於此武徳初北海賊帥綦公順攻郡城為郡兵所敗後得劉蘭成以為謀主才用數十百人出竒再奮北海即降海州臧君相帥衆五萬來爭蘭成以敢死士二十人夜襲之掃空其衆徐圓朗據海岱或說之曰有劉世徹者才略不世出名髙東夏若迎而奉之天下指揮可定圓朗使迎之世徹至已有衆數千圓朗使徇譙杞東人素聞其名所向皆下裘甫亂浙東朝廷遣王式往討其黨劉􅙬勸甫引兵取越憑城郭據府庫循浙江築壘以拒之得間則長驅進取浙西過大江掠揚州還修石頭城而守之宣歙江西必有響應者别以萬人循海而南襲取福建則國家貢賦之地盡入於我矣甫不能用髙駢之将畢師鐸攻駢乞師於宣州秦彦彦兵至遂下揚州師鐸遣使趣彦過江将奉以為主或說之曰僕射順衆心為一方去害宜復奉髙公而佐之緫其兵權誰敢不服且秦司空為節度使廬州夀州其肯為之下乎切恐功名成敗未可知也不若亟止秦司空勿使過江彼若粗識安危必未敢輕進就使他日責我以負約猶不失為髙氏忠臣也師鐸不以為然明日以告鄭漢章漢章曰此智士也求之勿獲王建鎮成都攻楊晟於彭州乆不下民皆竄匿山谷諸寨日出抄掠之王先成徃說其将王宗侃曰民入山谷以俟招安今乃從而掠之與盗賊無異旦出淘虜薄暮乃返曽無守偹之意萬一城中有智者為之畫䇿使乗虚奔突先伏精兵於門内望淘虜者稍逺出弓弩手礮各百人攻寨之一面又於三面各出耀兵諸寨咸自備禦無暇相救如此能無敗乎宗侃矍然先成為條列七事為状以白王建建即施行之榜至三日山中之民競出如歸市浸還故業觀此五者則其他姓名不傳與草木俱腐者盖不可勝計矣易卦四徳易元亨利貞謂之四徳唯乾坤為能盡之若屯随二卦但大亨貞臨无妄革三卦皆大亨以正而已有亨利貞者十一䝉同人離咸兊恒遯萃渙小過既濟也元亨利者一蠱也利貞者八大畜大壮明夷家人中孚蹇損漸也亨貞者三需困旅也元亨者三大有升鼎也亨利者五賁復大過巽噬嗑也亨者九小畜履㤗謙節坎震豐未濟也利者五訟豫觧益夬也貞者四師比否頥也唯八卦皆無之觀剥晉睽姤歸妹井艮也若以卦象索之如剥睽姤猶可強為之辭他則不復容擬議矣孫堅起兵董卓盗國柄天下共興義兵討之惟孫堅以長沙太守先至為卓所憚獨為有功故裴松之謂其最有忠烈之稱然長沙為荆州屬部受督於刺史王叡叡先與堅共擊零桂賊以堅武官言頗輕之及叡舉兵欲討卓堅乃承案行使者詐檄殺之以償曩忿南陽太守張咨鄰郡二千石也以軍資不具之故又収斬之是以區區一郡將乗一時兵威輙害方伯鄰守豈得為勤王乎劉表在荆州乃心王室袁術志於逆亂堅乃奉其命而攻之自速其死皆可議也孫權封兄䇿孫權即帝位追尊兄䇿為長沙王封其子為吳侯按孫氏奄有江漢皆䇿之功權特承之耳而報之之禮不相宜稱故陳夀評云割據江東䇿之基兆也而權尊崇未至子止侯爵於義儉矣而孫盛乃云權逺思盈虚之數正本定名防㣲於未兆可謂為之于未有治之于未亂其說迂謬如此漢室中興出於伯升光武感其功業之不終建武二年首封其二子為王而帝子之封乃在一年之後司馬昭繼兄師秉魏政以次子攸為師後常云天下者景王之天下欲以大業歸攸以孫權視之不可同日論也踰年改元自漢武帝建元紀年之後嗣君紹統必踰年乃改元雖安帝繼殤帝亦終延平而為永初桓帝繼質帝亦終本初而為建和唐宣宗以叔繼姪亦終㑹昌六年而改大中獨本朝太祖以開寳九年十月二十日上仙太宗嗣位是年十二月二十二日改為太平興國元年去新嵗纔八日耳意當時星辰厯象考卜兆祥必有其説而國史傳記皆失傳竊計嶺蜀之逺制書到時已是二年之春是時宰相薛居正沈倫盧多遜失於不考引故實致行之弗審使人君即位而無元年尤為不可也若唐順宗以貞元二十一年正月嗣位至八月辛丑改元永正盖已稱太上皇嫌於獨無紀年故亟更之耳劉禪孫亮石宏苻生李璟未踰年而改此不足責晉惠帝改武帝太熈為永熈而以為欲長奉先王之制亦非也唐中宗仍武后神龍梁末帝追承太祖乾化孟昶仍父知祥明徳漢劉知逺追用晉天福隠帝仍父乾祐周世宗仍太祖顯徳皆非禮之正無足議者唐哀帝仍昭宗天祐盖畏朱温而不敢云賊臣遷都自漢以來賊臣竊國命将欲移鼎必先遷都以自便董卓以山東兵起謀徙都長安驅民數百萬口更相蹈藉悉燒宫廟官府居家二百里内無復雞犬髙歡自洛陽遷魏於鄴四十萬户狼狽就道朱全忠自長安遷唐於洛驅徙士民毁宫室百司及民間廬舎長安自是邱墟卓不旋踵而死曹操迎天子都許卒覆劉氏魏唐之祚竟為髙朱所傾凶盗設心積慮由來一揆也輿地道里誤古今輿地圖志所記某州至某州若干里多有差誤偶閱元祐九域志姑以吾鄉饒州證之饒西至洪州三百八十里而志云西至州界一百七十里自界首至洪五百六十八里於洪州書至饒又衍二十里是為七百六十里也饒至信州三百七十里而志云東南至本州界二百九十里自界首至信州三百五十里是為六百四十里也饒至池州四百八十里而志云北至州界一百九十里自界首至池州三百八十里是為五百七十里也唐賈耽皇華四達記所紀中都至外國尤為詳備其書䖍州西南一百十里至潭口驛又百里至南康縣然今䖍至潭口纔四十里又五十里即至南康比之所載不及半也以所經行處驗之知其他不然者多矣容齋續筆卷十欽定四庫全書容齋續筆卷
