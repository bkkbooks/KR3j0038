front:
  text: 五十五則
  hash: sha256:f9b59d51cbdca8edad58619ead6a0da288bfa15b4f0f31db960dadc91abba56d
body:
  text: 宋洪邁撰庾公之斯孟子逄蒙學射於羿盡羿之道思天下惟羿為愈已於是殺羿孟子曰是亦羿有罪焉公明儀曰疑若無罪焉曰薄乎云爾惡得無罪此一叚既畢而繼之曰鄭人使子濯孺子侵衛衛使庾公之斯追之子濯孺子曰今日我疾作不可以執弓吾死矣夫問其僕曰追我者誰也其僕曰庾公之斯也曰吾生矣其僕曰庾公之斯衛之善射者也夫子曰吾生何謂也曰庾公之斯學射於尹公之他尹公之他學射於我夫尹公之他端人也其取友必端矣庾公之斯至曰夫子何為不執弓曰今日我疾作不可以執弓曰小人學射於尹公之他尹公之他學射於夫子我不忍以夫子之道反害夫子雖然今日之事君事也我不敢廢抽矢扣輪去其金發乘矢而後反孟子書子濯庾公一叚幾二百字其㫖以謂使羿如子濯得尹公而教之則必無逄蒙之禍然前叚結尾自常為文者處之必云如子濯孺子施教於尹公之他則可不然後段之末必當云以是事觀之羿之不善取友至於殺身其失如此然後文體相屬茲判為兩節若不闗聮而宫商相宣律吕明煥立言之妙是豈歩趨模倣所能仿彿哉人為兒童時便讀此章未必深識其趣故因表出而極論之左氏傳書衛獻公奔齊云尹公他學射於庾公差庾公差學射於公孫丁他與差為孫林父追公公孫丁御公庾公差曰射為背師不射為戮射為禮乎射兩軥而還尹公佗曰子為師我則逺矣乃反之公孫丁授公轡而射之貫佗臂即孟子所引者而名字先後美惡皆不同萬事不可過天下萬事不可過豈特此也雖造化隂陽亦然雨澤所以膏潤四海然過則為霖滛陽舒所以發育萬物然過則為燠亢賞以勸善過則為僣刑以懲惡過則為濫仁之過則為兼愛無父義之過則為為我無君執禮之過反鄰於謟尚信之過至於證父是皆偏而不舉之弊所謂過猶不及者揚子法言云周公以來未有漢公之懿也勤勞則過於阿衡蓋諂王莽也後之議者謂阿衡之事不可過也過則反乃誚莽耳其㫖意固然致仕官上壽國朝大臣及侍從致仕後多居京師熈寧中范蜀公自翰林學士以本官户部侍郎致仕同天節乞隨班上壽許之遂著為令元祐初韓康公以故相判大名府還都拜司空致仕值太皇太后受冊禮畢乞隨班稱賀降詔免赴皆故事也桃花笑春風王荆公集古胡笳詞一章云欲問平安無使來桃花依舊笑春風後章云春風似舊花仍笑人生豈得長年少二者貼合如出一手每歎其精工其上句蓋用崔䕶詩後一句久不見其所出近讀范文正公靈巖寺一篇云春風似舊花猶笑以仍為猶乃此也李義山又有絶句云無賴夭桃靣平明露井東春風為開了却擬笑春風語意兩極其妙嚴先生祠堂記范文正公守桐廬始於釣臺建嚴先生祠堂自為記用屯之初九蠱之上九極論漢光武之大先生之髙纔二百字其歌詞云雲山蒼蒼江水泱泱先生之徳山髙水長既成以示南豐李泰伯泰伯讀之三歎味不已起而言曰公之文一出必將名世某妄意輙易一字以成盛美公瞿然握手叩之答曰雲山江水之語於義甚大於詞甚溥而德字承之乃似趢趚擬換作風字如何公凝坐頷首殆欲下拜張伯玉守河陽作六經閣記先託游士及在職者各為之凡七八本既畢並㑹於府伯玉一一閲之取紙書十四字徧示客曰六經閣諸子史集在焉不書尊經也時曾子固亦預坐驚起摘伏邁頃聞此二事於張子韶不能追憶經閣所在及其文竟就於誰手後之君子當有知之者矣大言誤國隗囂謀畔漢馬援勸止之甚力而其將王元曰今天水全富士馬最强案秦舊迹表裏河山元請以一丸泥為大王東封函谷關囂反遂決至於父子不得其死元竟降漢隋文帝伐陳大軍臨江都官尚書孔範言於後主曰長江天塹古以為限隔南北今日彼軍豈能飛渡邪臣每患官卑彼若渡江臣定作太尉公矣或妄言北軍馬死範曰此是我馬何為而死帝笑以為然故不為深備已而國亡身竄逺裔唐元宗有克復中原之志及下南閩意以謂諸國可指麾而定而事力窮薄且無良將魏岑因侍宴言臣少遊元城好其風物陛下平中原臣獨乞任魏州元宗許之岑趨墀下拜謝人皆以為佞孟蜀通奏使王昭逺居常好大言有雜耕渭上之志聞王師入討對賔客挼手言此送死來爾乘此逐北遂定中原不煩再舉也不兩月蜀亡昭逺為俘此四臣之佞本為爵禄及一時容悦而已亦可悲哉宗室覃恩免觧淳熈十三年光堯太上皇帝以聖壽八十肆赦推恩宇宙之内蒙被甚廣太學諸生至于武學皆得免文觧一次凡該此㤙者千二三百人而宗子在學者不預諸人相率詣宰府且徧謁侍從臺諫各納一劄子叙述大㫖其要以為德壽霈典普天同慶而玉牒支派辱居膠庠顧不獲與布衣書生等竊譬之世俗尊長生日召㑹族姻而本家子孫不享杯酒臠炙外議謂何今厖鴻之澤如此而宗學乃不許厠名於義於禮恐為未愜是時諸公莫肯出手為言邁以待制侍講内宿適蒙宣引因出其紙以奏仍為敷陳此輩所云尊長生日㑹客而本家子弟不得坐譬喻可謂明白孝宗亦笑曰甚是切當有理時所擕只是白劄子蒙徑付出施行遂一例免舉其人名字今不復能記憶矣唐書載韓桞文宋景文修唐書韓文公傳全載其進學觧諫佛骨表潮州謝上表祝鱷魚文皆不甚潤色而但換進學觧數字頗不如本意元云招諸生立館下改招字為召既言先生入學則諸生在前招而誨之足矣何召之為障百川而東之改障字為停本言川流横潰故障之使東若以為停於義甚淺改跋前㚄後為躓後韓公本用狼䟦詩語非躓也其他以爬羅剔抉為杷羅焚膏油為燒以取敗幾時為其敗吳元濟傳書平淮西碑文千六百六十字固有他本不同然才减節輙不穩當明年平夏一句悉芟之平蜀西川减西川字非郊廟祠祀其無用樂减祠其兩字皇帝以命臣愈臣愈再拜稽首减下臣字殊害理汝其以節都統討軍以討為諸尤不然討者如左傳討軍實之義若云諸軍何人不能下此語桞子厚傳載其文章四篇與蕭俛許孟容書正符懲咎賦也孟容書意象歩武全與漢楊惲答孫㑹宗書相似正符倣班孟堅典引而其四者次序或失之至云宗元不得召内閔悼作賦自儆然其語曰逾再嵗之寒暑則謫居日月未為久難以言不得召也資治通鑑但載梓人及郭槖駞𫝊以為其文之有理者其識見取舍非宋景文可比云冥靈社首鳳光堯上仙於梓宫發引前夕合用警場𨗳引鼔吹詞邁在翰苑製撰其六州歌頭内一句云春秋不說楚冥靈常時進入文字立待報者則貼黄批急速未嘗停滯是時首尾越三日又入奏趣請付出太常吏欲習熟歌唱守院門伺候適有表弟沈日新在軍將橋客邸一士人乃上庠舊識忽問楚冥靈出處沈亦不能知來叩予因以莊子語告之急走報此士大喜初孝宗以付巨璫霍汝弼使釋其意此士霍客也故宛轉費日如此又面奉㫖令代作挽詞五章其四云鼎湖龍去逺社首鳳來遲當時不敢宣泄而帯御器械謝純孝宻以為問乃為舉王子年拾遺記蓋周成王事也禁苑文書周悉乃爾左傳州郡左傳魯哀公二年晉趙鞅與鄭戰誓衆曰克敵者上大夫受縣下大夫受郡土田十萬注云周書作雒篇千里百縣縣有四郡然則郡乃𨽻縣而歴代地里郡國志未之或書又傳所載地名從州者凡五魯宣公㑹齊于平州以定其位注云齊地在泰山牟縣西見於正經它如允姓之戎居于𤓰州注今燉煌也楚莊王滅陳復封之郷取一人焉以歸謂之夏州齊子尾使閭邱嬰伐我陽州注魯地後四十年又書魯侵齊門于陽州注攻其門也苫越生子將待事而名之陽州之役獲焉名之曰陽州是齊魯皆有此地也衛莊公登城以望見戎州曰我􅁎姓也何戎之有焉以上唯𤓰州之名至今貧富習常少時見前輩一說云富人有子不自乳而使人棄其子而乳之貧人有子不得自乳而棄之以乳他人之子富人懶行而使人肩輿貧人不得自行而又肩輿人是皆習以為常而不察之也天下事習以為常而不察者推此亦多矣而人不以為異悲夫甚愛其論後乃得之於晁以道客語中故謹書之益廣其傳唐用宰相唐世用宰相不以序其得之若甚易然固有出入大僚歴諸曹尚書御史大夫領方鎮入為僕射東宫師傅而不得相者若顔真卿王起楊於陵馬揔盧鈞韓臯栁公綽公權盧知猷是也如人主所欲用不過侍郞給事中下至郞中博士者才居位即禮絶百僚諫官御史聽命之不暇顧何敢抨彈其失與國朝異矣其先在職者仍許引其同列若姚元崇之引宋璟蕭嵩之引韓休李林甫引牛仙客陳希烈楊國忠引韋見素盧把引闗播李泌引董晉竇參李吉甫引裴垍李徳裕引李回皆然史記簡妙處太史公書不待稱説若云褒贊其髙古簡妙處殆是摹寫星日之光輝多見其不知量也然予每展讀至魏世家蘇秦平原君魯仲連𫝊未嘗不驚呼擊節不自知其所以然魏公子無忌與王論韓事曰韓必徳魏愛魏重魏畏魏韓必不敢反魏十餘語之間五用魏字蘇秦說趙肅侯曰擇交而得則民安擇交而不得則民終身不安齊晉為兩敵而民不得安倚秦攻齊而民不得安倚齊攻秦而民不得安平原君使楚客毛遂願行君曰先生處勝之門下幾年於此矣曰三年於此矣君曰先生處勝之門下三年於此矣左右未有所稱誦勝未有所聞是先生無所有也先生不能先生留遂力請行面折楚王再言吾君在前叱者何也至左手持盤血而右手招十九人於堂下其英姿雄風千載而下尚可想見使人畏而仰之卒定從而歸至於趙平原君曰勝不敢復相士勝相士多者千人少者百數今乃於毛先生而失之毛先生一至楚而使趙重於九鼎大吕毛先生以三寸之舌强於百萬之師勝不敢復相士秦圍趙魯仲連見平原君曰事將奈何君曰勝也何敢言事魏客辛垣衍令趙帝秦今其人在是勝也何敢言事仲連曰吾始以君為天下之賢公子也吾今然後知君非天下之賢公子也客安在平原往見衍曰東國有魯仲連先生者勝請為紹介交之於將軍衍曰吾聞魯仲連先生齊國之髙士也衍人臣也使事有職吾不願見魯仲連先生及見衍衍曰吾視居此圍城之中者皆有求於平原君者也今吾觀先生之玉貌非有求於平原君者也又曰始以先生為庸人吾乃今日知先生為天下之士也是三者重沓熟復如駿馬下注千丈坡其文勢正爾風行於上而水波真天下之至文也玉津園喜晴詩淳熈十二年三月二十六日車駕宿戒幸玉津園命下大雨有㫖許從駕官帶雨具將曉有晴意已而天宇豁然至晩歸邁進一詩歌詠其實云五更猶自雨如麻無限都人仰翠華翻手作雲方悵望舉頭見日共驚嗟天公的有施生妙帝力堪同造物誇上苑春光無盡藏可須羯鼔更催花四月四日扈從詣景靈宫朝獻䝉於幕次賜和篇聖製云比幸玉津園縱觀春事適霽色可喜卿有詩來上因俯同其韻春郊柔緑遍桑麻小駐芳園覽物華應信吾心非暇逸頓回晴意絶咨嗟每思富庶將同樂敢務游畋漫自誇不似華清當日事五家車騎爛如花後二日兵部尚書宇文价内引上舉似此詩曰洪待制用雨如麻字偶思得桑麻可押又其末句用羯鼓催花事故以華清車騎答之价拱手稱贊明日以相告云虢巨賀蘭天下國家不幸而有四郊之警為人臣者當隨其事力悉心盡忠以致尺寸之效茍為叨竊禄位視如秦越一切唯己私之是徇雖千百載後覩其事者猶使人怒髪衝冠也唐天寶禄山之亂可謂極矣虢王巨為河南節度使賀蘭進明繼之擁數道之兵臨要害之地尊為征鎮有民有財而汗漫忌疾非徒無益而反敗之巨在彭城張巡在雍邱以將士有功遣使詣巨請空名告身及賜物巨惟與折衝果毅告身三十通不與賜物巡竟不能立徙於睢陽先是太守許逺積糧六萬石巨以其半給濮陽濟隂逺固争不得二郡得糧遂以城叛而睢陽食盡顔魯公起兵平原合衆十萬既成魏郡堂邑之功矣是時進明為北海太守亦起兵公以書召之并力進明度河公每事咨之軍權始移遂取舍任意以得招討後詣行在因讚房琯自嶺南而易河南張巡受圍困棘遣南霽雲吿急於其所治臨淮相去三百里棄而不救平原睢陽失守實二人之故一時議者皆不以為言使之連据髙位顯為佚罰曽不十年巨斥刺遂州為段子璋所殺進明坐第五琦黨自御史大夫竄謫以死天網恢恢茲焉不漏容齋五筆卷五欽定四庫全書容齋五筆卷
