front:
  text: 八十五則
  hash: sha256:65b79943119bda2218546d4c911c5e13da9561ecdec5cd2de3a1d0d497f0b185
body:
  text: 宋洪邁撰蓍龜卜筮古人重卜筮其究至於通神龜為卜蓍為筮故曰假爾泰龜有常假爾泰筮有常定天下之吉凶成天下之亹亹所以使民信時日敬鬼神畏法令舜之命禹武王之伐紂召公相宅周公營成周未嘗不昆命元龜襲祥考卜然筮短龜長則龜卜猶在易筮之上漢藝文志劉向所輯七略自龜書夏龜之屬凡十五家至四百一卷後世無傳焉今之揲蓍者率多流入於影象所謂龜䇿惟市井細人始習此藝其得不過數錢士大夫未嘗過而問也伎術標牓所在如織五星六壬衍禽三命軌析太一洞微紫微太素遁甲人人自以為君平家家自以為季主毎況愈下由是藉手于達官要人舟車交錯於道路毁譽紛紜而術益隱矣周禮大卜掌三兆之灋一曰玉兆二曰瓦兆三曰原兆杜子春云玉兆顓帝之兆瓦兆帝堯之兆原兆有周之兆經兆之體皆百有二十其頌皆千有二百又掌三易之灋曰連山曰歸藏曰周易其經卦皆八其别皆六十有四今獨周易之書存他不復可見世謂文王重易六爻為六十四卦然則夏商之易已如是矣左氏傳所載懿氏占曰鳯皇于飛和鳴鏘鏘有媯之後將育于姜成季之卜曰其名曰友在公之右同復于殳敬如君所晉獻公驪姬之繇曰專之渝攘公之羭嫁伯姬之繇曰車說其輹火焚其旗寇張之弧姪其從姑秦伯伐晉曰千乘三去三去之餘獲其雄狐文公納王遇黄帝戰于阪泉之兆鄢陵之戰晉侯筮曰南國䠞射其元王中厥目宋伐鄭趙鞅卜救之遇水適火史龜曰是謂沈陽可以興兵利以伐姜不利子商史墨曰盈水名子水位名位敵不可干也杜氏謂鞅姓盈宋姓子盖言嬴與盈同也史趙曰是謂如川之滿不可游也衞莊公卜夢曰如魚尾衡流而方羊裔焉闔門塞竇乃自後踰此十占皆不可得其說故杜元凱云凡筮者用周易則其象可推非此而往則臨時占者或取於象或取於氣或取於時日王相以成其占若盡附㑹以爻象則架虛而不經可為通論然亦安知非連山歸藏所載乎地名異音郡邑之名有與本字大不同者顔師古以為土俗各有别稱者是也姑以漢書地理志言之馮翊之櫟陽為藥陽蓮勺為輦酌太原之慮虒為廬夷上黨之沾為添河内之隆慮為林廬蕩陰為湯陰潁川之不羮為不郎南陽之酈為擲堵陽為者陽酇為讚沛之酇為嵯鄲為多淸河之鄃為輸汝南之平輿為平預濟陰之宛句為寃劬江夏之沙羨為沙夷九江之橐臯為拓姑廬江之雩婁為吁閭山陽之方與為房豫琅邪之不其為不基東海之承為證長沙之承陽為烝陽臨淮之取慮為秋廬㑹稽之諸暨為諸既太末為闥末豫章之餘汗為餘干廣漢之汁方為十方蜀郡之徙為斯益州之味為昧金城之允吾為鉛牙允街為鉛街武威之樸􅯑為蒲環張掖之番禾為盤和安定之烏氏為烏支上郡之龜茲為邱慈西河之鵠澤為梏澤代郡之狋民為權精遼西之且慮為趄廬令支為鈴祗遼東之番汗為盤寒樂浪之黏蟬為黏提南海之番禺為潘隅蒼梧之荔浦為肄浦交趾之羸􅖮為蓮簍九真之都龎為都聾日南之西捲為西權淮陽之陽夏為陽賈魯國之蕃為皮皆不可求之於義訓字書亦不盡載也韓嬰詩前漢書儒林傳敘詩云漢興申公作魯詩后蒼作齊詩韓嬰作韓詩又云申公為詩訓故而齊轅固燕韓生皆為之傳或取春秋采雜說咸非其本義與不得已魯最為近之嬰為文帝博士景帝時至常山太傅推詩人之意作外傳數萬言其語頗與齊魯閒殊然歸一也武帝時與董仲舒論於上前精悍分明仲舒不能難其後韓氏有王吉食子公長孫順之學藝文志韓家詩經二十八卷韓故三十六卷内傳四卷外傳六卷韓說四十一卷今惟存外傳十卷慶厯中將作監主簿李用章序之命工刋刻于杭其末又題云蒙文相公改正三千餘字予家有其書讀首卷第二章曰孔子南遊適楚至於阿谷有處子佩瑱而浣者孔子曰彼婦人其可與言矣乎抽觴以授子貢曰善為之辭子貢曰吾將南之楚逢天暑願乞一飲以表我心婦人對曰阿谷之水流而趨海欲飲則飲何問婦人乎受子貢觴迎流而挹之置之沙上曰禮固不親授孔子抽琴去其軫子貢往請調其音婦人曰吾五音不知安能調琴孔子抽絺綌五兩以授子貢子貢曰吾不敢以當子身敢置之水浦婦人曰子年甚少何敢受子子不早去今竊有狂夫守之者矣詩曰南有喬木不可休息漢有游女不可求思此之謂也觀此章乃謂孔子見處女而敎子貢以微詞三挑之以是說詩可乎其謬戾甚矣他亦無足言五行衰絶字木絶於申故柛字之訓為木自斃水土絶於已故汜字之訓說文以為窮瀆圯字之訓為岸圯及覆火衰於戍故烕為滅金衰於丑故鈕為鍵閉製字之義昭矣漢表所記事漢書功臣表所記列侯功狀有紀傳所軼者韓信擊魏以木罌缶度軍表云祝阿侯高邑以將軍屬淮陰擊魏罌度軍作缻盖此計由邑所建也信謀發兵襲吕后其舍人得罪信信囚欲殺之舍人弟上書變告信欲反晉灼注曰楚漢春秋云謝公也表有滇陽侯樂說史記作欒說以淮陰舍人告反侯盖非謝公也須昌侯趙衍從漢王起漢中雍軍塞渭上上計欲還衍言從他道道通中牟侯單右車始高祖微時有急給髙祖馬故得侯邔侯黄極忠以羣盜長為臨江將已而為漢擊臨江王祁侯繒賀從擊項籍漢王敗走賀擊楚迫騎以故不得進漢王顧謂賀祁王史記作侯顔師古曰謂之祁王盖嘉其功故寵褒之許以為王也他復有與傳小異者史記張良傳項梁立韓王成以良為韓申徒徐廣云申徒即司徒語音訛轉也而漢表良以韓申都下韓師古云韓申都即韓王信也楚漢春秋作信都古信申同字按良與韓王信了不相干顔注誤矣自司徒訛為申徒自申徒為申都自申都為信都展轉相傳古書豈復可以字義求也韓信歸漢為治粟都尉表以為票客師古曰與紀傳參錯不同或者以其票疾而賔客禮之故云票客也史記作典客索隱以為粟客此外又有官名非史所載者如孔聚以執盾從周竈以長鉟都尉郭蒙以户衞宣虎以重將重將者主將領輜重也耏跖以門尉棘邱侯襄以執盾隊史郭亭以塞路塞路者主遮塞要路以備敵寇也丁禮以中涓騎爰類以慎將謂以謹慎為將也許盎以駢隣說衞駢隣者二馬曰駢謂並兩騎為軍翼也說讀曰稅稅衞者軍行初舍止之時主為衞也許瘛以趙右林將林將者將士林猶言羽林之將也淸侯以弩將留肹以客吏馮解散以代大與大與主爵禄之官也史記作太尉靳彊以郎中騎千人之類聊紀於此以示讀史者云蕭何紿韓信黥布為其臣賁赫告反高祖以語蕭相國相國曰布不宜有此恐仇怨妄誣之請繫赫使人微驗淮南布遂反韓信為人告反吕后欲召恐其不就乃與蕭相國謀詐令人稱陳豨已破紿信曰雖病强入賀信入即被誅信之為大將軍實蕭何所薦今其死也又出其謀故俚語有成也蕭何敗也蕭何之語何尚能救黥布而翻忍於信如此豈非以高祖出征吕后居内而急變從中起已為留守故不得不亟誅之非如布之事尚在疑似之域也彭越無罪韓信英布彭越皆以謀反誅夷信乘高祖自將征陳豨之時欲詐赦諸官徒發兵襲吕后太子布見漢使驗問即發兵東取荆西擊楚對高祖言欲為帝其為反逆已明唯越但以稱病不親詣邯鄲之故上既赦以為庻人而吕后令人告越復謀反遂及禍三人之事越獨為寃且扈輒勸越反越不聽有司以越不誅輒為反形已具然則貫高欲殺高祖張敖不從其事等耳乃以為不知狀而敖得釋何也樂說告信賁赫告布皆得封列侯而梁大僕告越不論賞豈非漢朝亦知其故耶欒布為越大夫使於齊而越死還奏事越頭下上召罵布欲烹之布謂越反形未見而帝以苛細誅之上乃釋布拜為都尉然則高祖於用刑為有負於越矣傷哉蜘蛛結網佛經云蠢動含靈皆有佛性莊子云惟蟲能蟲惟蟲能天盖雖昆蟲之微天機所運其善巧方便有非人智慮技解所可及者蠶之作繭蜘蛛之結網蜂之累房燕之營巢蟻之築垤螟蛉之祝子之類是已雖然亦各有幸不幸存乎其間蛛之結網也布絲引經捷急上下其始為甚難至於緯而織之轉盻可就踈密分寸未嘗不齊門檻及花梢竹間則不終日必為人與風所敗唯閒屋垝垣人迹罕至乃可乆乆而享其安故燕巢幕上季子以為至危李斯見吏舍厠中鼠食不潔近人犬數驚恐之倉中之鼠食積粟居大廡之下不見人犬之面歎曰人之賢不肖譬如鼠矣在所自處耳豈不信哉孫權稱至尊陳壽三國志固多出於一時雜史然獨吳書稱孫權為至尊方在漢建安為將軍時已如此至於諸葛亮周瑜見之於文字間亦皆然周瑜病困與權書曰曹公在北劉備寄寓此至尊垂慮之日也魯肅破曹公還權迎之肅曰願至尊威德加乎四海吕蒙遣鄧𤣥之說郝普曰關羽在南郡至尊身自臨之又曰至尊遣兵相繼於道蒙謀取闗羽密陳計䇿曰羽所以未便東向者以至尊聖明蒙等尚存也陸遜謂蒙曰下見至尊宜好為計甘寧欲圖荆州曰劉表慮既不逺兒子又劣至尊當早規之權為張遼掩襲賀齊曰至尊人主常當持重權欲以諸葛恪典掌軍糧諸葛亮書與陸遜曰家兄年老而恪性疎糧穀軍之要最足下特為啓至尊轉之遜以白權凡此之類皆非所宜稱若以為陳壽作史虛辭則魏蜀不然也康山讀書杜子美贈李太白詩康山讀書處頭白好歸來說者以為即廬山也吳曽能改齋漫録内辨誤一卷正辨是事引杜田杜詩補遺云范傳正李白新墓碑云白本宗室子厥先避仇客蜀居蜀之彰明太白生焉彰明綿州之屬邑有大小康山白讀書于大康山有讀書堂尚存其宅在淸亷鄉後廢為僧房稱隴西院盖以太白得名院有太白像吳君以是證杜句知康山在蜀非廬山也予按當塗所刋太白集其首載新墓碑宣歙池等州觀察使范傳正撰凡千五百餘字但云自國朝已來編於屬籍神龍初自碎葉還廣漢因僑為郡人初無補遺所紀七十餘言豈非好事者偽為此書如開元遺事之類以附㑹杜老之詩邪歐陽忞輿地廣記云彰明有李白碑白生於此縣盖亦傳說之誤當以范碑為正列國城門名郡縣及城門名用一字者為雅馴近古今獨姑蘇曰吳郡吳縣有盤門閶門葑門婁門齊門他皆不然春秋時列國門名見於左氏傳者鄭最多曰渠門純門時門將門閨門皇門鄟門墓門又有師之梁梏柣之門周曰圉門魯曰雩門雉門稷門萊門鹿門又有子駒之門公羊傳有争門吏門宋曰耏門桐門盧門曹門澤門揚門桑林之門邾曰魚門范門衞曰閱門盖獲之門齊曰雍門亦有揚門鹿門稷門吳曰胥門宋垤澤之門見孟子緇塵素衣陳簡齋墨梅絶句一篇云粲粲江南萬玉妃别來幾度見春歸相逢京洛渾依舊只恨緇塵染素衣語意皆妙絶晉陸機為顧榮贈婦詩云京洛多風塵素衣化為緇齊謝元暉酬王晉安詩云誰能乆京洛緇塵染素衣正用此也去國立後齊高氏食邑于盧高弱以盧叛齊閭邱嬰圍之弱曰茍使高氏有後請致邑齊人立高酀弱致盧而出奔晉魯臧氏食邑于防臧紇得罪使來告曰茍守先祀敢不辟邑乃立臧為紇致防而奔齊按弱紇二人據地要君故孔子曰臧武仲以防求後于魯雖曰不要君吾不信也然齊魯之君竟如其請不以要君之故而背之盖當是時先王之澤未熄非若戰國務為詐力權謀之比所謂殺人之中又有禮焉者也降及末世遂有帶甲約降既解甲即圍而殺之者不仁孰甚焉詩詞改字王荆公絶句云京口𤓰洲一水閒鍾山秖隔數重山春風又緑江南岸明月何時照我還吳中士人家藏其草初云又到江南岸圈去到字注曰不好改為過復圈去而改為入旋改為滿凡如是十許字始定為緑黄魯直詩歸燕略無三月事高蟬正用一枝鳴用字初曰抱又改曰占曰在曰帶曰要至用字始定予聞於錢伸仲大夫如此今豫章所刻本乃作殘蟬猶占一枝鳴向巨原云元不伐家有魯直所書東坡念奴嬌與今人歌不同者數處如浪淘盡為浪聲沉周郎赤壁為孫吳赤壁亂石穿空為崩雲驚濤拍岸為掠岸多情應笑我早生華髪為多情應是笑我生華髪人生如夢為如寄不知此本今何在也姑舅為婚姑舅兄弟為婚在禮法不禁而世俗不曉按刑統户婚律云父母之姑舅兩姨姊妹及姨若堂姨母之姑堂姑已之堂姨及再從姨堂外甥女女壻姊妹並不得為婚姻議曰父母姑舅兩姨姊妹於身無服乃是父母緦麻據身是尊故不合娶及姨又是父母大功尊若堂姨雖於父母無服亦是尊屬母之姑堂姑並是母之小功以上尊巳之堂姨及再從姨堂外甥女亦謂堂姊妹所生者女壻姊妹於身雖並無服據理不可為婚並為尊卑混亂人倫失序之故然則中表兄弟姊妹正是一等其於婚娶了無所妨予記政和八年知漢陽軍王大夫申明此項勑局看詳以為如表叔取表姪女從甥女嫁從舅之類甚為明白徽州法司編類續降有全文今州縣官書判至有將姑舅兄弟成婚而斷離之者皆失於不能細讀律令也惟西魏文帝時禁中外及從母兄弟姊妹為婚周武帝又詔不得娶母同姓以為妻妾宣帝詔母族絶服外者聽婚皆偏閏之制漫附於此容齋續筆卷八欽定四庫全書容齋續筆卷
