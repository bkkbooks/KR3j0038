  text: 六十九則
  hash: sha256:f33154635af13c2949d2c236a8f0f19ca0666c53bbe79c78328ee9d28e10eff3
body:
  text: 宋洪邁撰建武中元成都有漢蜀郡太守何君造尊楗閣碑其末云建武中元二年六月按范史本紀建武止三十一年次年改為中元直書為中元元年觀此所刻乃是雖别為中元猶冠以建武如文景帝中元後元之類也又祭祀志載封禪後赦天下詔明言云以建武三十二年為建武中元元年東夷倭國傳云建武中元二年來奉貢援据甚明而宋莒公作紀年通譜乃云紀志所載不同必傳寫脫誤學者失於精審以意刪去殆亦不深考耳韓莊敏家一銅斗銘云新始建國天鳯上戊六年又紹興中郭金州得一鉦銘云新始建國地皇上戊二年按王莽始建國之後改天鳳又改地皇兹二器各冠以始元者自莽之制如此亦猶其改易郡名不常每下詔猶繫其故名之類耳不可用中元為比也帶職人轉官紹興中王浚明以右奉直大夫直祕閣乞磨勘吏部擬朝議大夫時相以為既帶職則朝議奉直為一等遂超轉中奉其後曽慥踵之紹興末向伯奮亦用此繼而續觱復然後省有言不應驀三級自是但得朝議予按故事官制未行時前行郎中遷少卿有出身得太常無出身司農繼轉光禄即今奉直朝議也自少卿遷大卿監有出身得光禄卿無出身歴司農卿少府監衛尉卿然後至光禄若帶職則自少農以上徑得光禄不渉餘級至有超五資者然則浚明等不為過蓋昔日職名不輕與人故恩典亦異又自承務郎至奉議詞人但三轉而帶職者乃與餘人同作六階不小異乃有司之失也上下四方上下四方不可窮竟正雜莊列釋氏之寓言曼衍不能說也列子商湯問於夏革曰上下八方有極盡乎革曰不知也湯固問革曰无則无極有則有盡朕何以知之然无極之外復无无極无盡之中復无无盡无極復无无極无盡復无无盡朕是以知其元極无盡也而不知其有極有盡也焉知天地之表不有大天地者乎大集經風住何處曰風住虚空又問虚空為何所住答言虚空住於至處又問至處復何所住答言至處何所住者不可宣說何以故逺離一切諸處所故一切處所所不攝故非數非稱不可量故是故至處無有住處二家之說如是而已魏相蕭望之趙廣漢之死由魏相韓延夀之死由蕭望之魏蕭賢公卿也忍以其私陷二材臣於死地乎楊惲坐語言怨望而廷尉當以為大逆不道以其時考之乃于定國也史稱定國為廷尉民自以不寃豈其然乎宣帝治尚嚴而三人者又從而輔翼之為可恨也姓氏不可考姓氏所出後世茫不可考不過證以史傳然要為難曉自姚虞唐杜姜田范劉之外餘蓋紛然雜出且以左傳言之申氏出於四岳周有申伯然鄭又有申侯楚有申舟及有申公巫臣魯有申繻申棖晉有申書齊有申鮮虞賈氏􅁎姓之國以國氏然晉有賈華又狐射姑亦曰賈季齊有賈舉黄氏嬴姓之國然金天氏之後又有沈姒蓐黄之黄晉有黄淵孔氏出於商孔子其後也然衛有孔逹宋有孔父鄭有孔叔陳有孔寜齊有孔虺而鄭子孔之孫又為孔張髙氏出於齊然子尾之後又為髙彊鄭有髙克宋有髙哀國氏亦出於齊然邢有國子鄭子國之孫又為國參晉有慶鄭齊有慶克陳有慶虎衛有石碏齊有石之紛如鄭有石􅎢周有石尚宋有石彄晉有陽處父楚有陽丐魯有陽虎孫氏出於衛而楚有叔敖齊有孫書呉有孫武郭氏出於虢而晉有郭偃齊有郭最又有所謂郭公者千載之下遙遙世祚將安所質究乎畏無難聖人不畏多難而畏無難故曰惟有道之主能持勝使秦不并六國二世未亡隋不一天下服四夷煬帝不亡苻堅不平涼取蜀滅燕翦代則無肥水之役唐莊宗不滅梁下蜀則無嗣源之禍李景不取閩并楚則無淮南之失緑竹靑靑毛公解衛詩淇奥分緑竹為二物曰緑王芻也竹萹竹也韓詩竹字作􅗨音徒沃反亦以為萹筑郭璞云王芻今呼白腳莎即菉蓐豆也萹竹似小藜赤莖節好生道旁可食又云有草似竹髙五六尺淇水側人謂之菉竹按此諸說皆北人不見竹之語耳漢書下淇園之竹以為楗宼恂為河内太守伐淇園竹為矢百餘萬衛詩又有籊籊竹竿以釣于淇之句所謂緑竹豈不明甚若白腳莎菉豆安得云猗猗青青哉孔子欲討齊陳成子弑齊簡公孔子告於魯哀公請討之公曰告夫三子者之三子告不可左傳曰孔子請伐齊公曰魯為齊弱乆矣子之伐之將若之何對曰陳常弑其君民之不與者半以魯之衆加齊之半可伐也說者以為孔子豈較力之強弱但明其義而已能順人心而行天討何患不克使魯君從之孔子其使於周請命乎天子正名其罪至其所以勝齊者孔子之餘事也予以為魯之不能伐齊三子之不欲伐齊周之不能討齊通國知之矣孔子為此舉豈真欲以魯之半力敵之哉蓋是時三子無君與陳氏等孔子上欲悟哀公下欲警三子使哀公悟其意必察三臣之擅國思有以制之起孔子而付以政其正君君臣臣之分不難也使三子者警必將曰魯小於齊齊臣弑君而欲致討吾三臣或如是彼齊晉大國肯置而不問乎惜其君臣皆不識聖人之深㫖自是二年孔子亡又十一年哀公竟偪於三子而孫於越比之簡公僅全其身爾韓退之舊唐史韓退之傳初言愈常以為魏晉已還為文者多拘偶對而經誥之指歸不復振起故所為文抒意立言自成一家新語後學之士取為師法當時作者甚衆無以過之故世稱韓文而又云時有恃才肆意亦盭孔孟之㫖若南人妄以栁宗元為羅池神而愈撰碑以實之李賀父名晉不應進士而愈為賀作諱辯令舉進士又為毛穎傳譏戲不近人情此文章之甚紕繆者撰順宗實録繁簡不當敘事拙於取捨頗為當代所非裴晉公有寄李翺書曰昌黎韓愈僕知之舊矣其人信美材也近或聞諸儕類云恃其絶足往往奔放不以文立制而以文為戲可矣乎今之不及之者當大為防焉爾舊史謂愈為紕繆固不足責晉公亦有是言何哉考公作此書時名位猶未逹其末云昨弟來欲度及時干進度昔嵗取名不敢自髙今孤焭若此遊宦謂何是不能復從故人之所勉耳但寘力田園苟過朝夕而已然則公出征淮西請愈為行軍司馬又令作碑蓋在此累年之後相知已深非復前此也誕節受賀唐穆宗即位之初年詔曰七月六日是朕載誕之辰其日百寮命婦宜於光順門進名參賀朕於門内與百寮相見明日又勑受賀儀宜停先是左丞韋綬奏行之宰臣以古無降誕受賀之禮奏罷之然次年復行賀禮誕節之制起於明皇令天下宴集休假三日肅宗亦然代徳順三宗皆不置節名及文宗以後始置宴如初則受賀一事蓋自長慶年至今用之也左氏書事左傳書晉惠公背秦穆公事曰晉侯之入也秦穆􅁎屬賈君焉且曰盡納羣公子晉侯烝於賈君又不納羣公子是以穆􅁎怨之晉侯許賂中大夫既而皆背之賂秦伯以河外列城五東盡虢略南及華山内及解梁城既而不與晉饑秦輸之粟秦饑晉閉之糴故秦伯伐晉觀此一節正如獄吏治囚蔽罪議法而臯陶聽之何所伏竄不待韓原之戰其曲直勝負之形見矣晉厲公絶秦數其五罪書詞鏗訇極文章􅈜吹之妙然其實皆誣秦故傳又書云秦桓公既與晉厲公為令狐之盟而又召狄與楚欲道以伐晉杜元凱注云據此三事以正秦罪左氏於文反復低昻無所不究其至觀秦晉争戰二事可窺一斑矣狐突言詞有味晉侯使太子申生伐東山臯落氏以十二月出師衣之偏衣佩之金玦左氏載狐突所歎八十餘言而詞義五轉其一曰時事之徴也衣身之章也佩衷之旗也其二曰敬其事則命以始服其身則衣之純用其𠂻則佩之度其三曰今命以時卒閟其事也衣之尨服逺其躬也佩以金玦棄其𠂻也其四曰服以逺之時以閟之其五曰尨涼冬殺金寒玦離其宛轉有味皆可咀嚼國語亦多此體有至六七轉然大抵緩而不切宣髮考工記車人之事半矩謂之宣注頭髪顥落曰宣易巽為宣髪宣字本或作寡周易巽為寡髪釋文云本又作宣黑白雜為宣髪宣髮二字甚竒邾文公楚昭王邾文公卜遷于繹史曰利於民而不利於君邾子曰命在養民死之短長時也民茍利矣遷也吉莫如之遂遷于繹未幾而卒君子曰知命楚昭王之季年有雲如衆赤鳥夾日以飛三日周太史曰其當王身乎若禜之可移於令尹司馬王曰除腹心之疾而寘諸股肱何益不榖不有大過天其天諸有罪受罰又焉移之遂弗禜孔子曰楚昭王知大道矣其不失國也宜哉按宋景公出人君之言三熒惑為之退舍邾文楚昭之言亦是物也而終不蒙福天道逺而不可知如此杜悰唐懿宗咸通二年二月以杜悰為相一日兩樞宻使詣中書宣徽使楊公慶繼至獨揖悰受宣三相起避公慶出書授悰發之乃宣宗大漸時宦官請鄆王監國奏也且曰當時宰相無名者當以反法處之悰反復讀復封以授公慶曰主上欲罪宰相當於延英面示聖㫖公慶去悰謂兩樞宻曰内外之臣事猶一體今主上新踐阼固當以仁愛為先豈得遽贊成殺宰相事若習以性成則中尉樞宻豈得不自憂乎兩樞宻相顧黙然徐曰當具以公言白至尊非公重徳無人及此三相復來見悰㣲請宣意悰無言三相惶怖乞存家族悰曰勿為他慮既而寂然及延英開上色甚恱此資治通鑑所載也新唐史云宣宗世䕫王處大明宫而鄆王居十六宅帝大漸遺詔立夔王而中尉王宗貫迎鄆王立之是為懿宗乆之遣樞宻使楊慶詣中書獨揖悰他宰相畢誠杜審權蔣伸不敢進乃授悰中人請帝監國奏因諭悰劾大臣名不在者悰語之如前所云慶色沮去帝怒亦釋予以史考之懿宗即位之日宰相四人曰令狐綯曰蕭鄴曰夏侯孜曰蔣伸至是時唯有伸在三人者罷去矣諴及審權乃懿宗自用者無由有斯事蓋野史之妄而二書誤采之温公以唐事屬之范祖禹其審取可謂詳盡尚如此信乎修史之難哉唐書世系表新唐宰相世系表皆承用逐家譜牒故多有謬誤内沈氏者最可笑其略云沈氏出自姬姓周文王子聃叔季字子揖食采於沈今汝南平輿沈亭是也魯成公八年為晉所滅沈子生逞字脩之奔楚遂為沈氏生嘉字惟良嘉生尹戍戍生諸梁諸梁子尹射字脩文其後入漢有為齊王太傅敷徳侯者有為驃騎將軍者有為彭城侯者宋書沈約自敘云金天氏之後沈國在汝南平輿定公四年為蔡所滅秦末有逞者徴丞相不就其後頗與唐表同按聃季所封自是一國與沈了不相渉春秋成公八年晉侵沈獲沈子揖昭二十三年呉敗頓胡沈蔡之師于雞父沈子逞滅定四年蔡滅沈殺沈子嘉今表云聃季字子揖成八年為晉所滅是文王之子夀五百餘嵗矣逞為呉所殺而表云奔楚宋書云秦召為丞相沈尹戍為楚將戰死於栢舉正與嘉之死同時而以為嘉之子尹射書於左傳三十四年始書諸梁乃以為其子又春秋時人立字皆從子及伯仲豈有脩之惟良脩文之比漢列侯表豈有所謂敷徳彭城侯百官表豈有所謂驃騎將軍沈逹者沈約稱一時文宗妄譜其上世名氏官爵固可蚩誚又不分别兩沈國其金天氏之裔沈姒蓐黄之沈封於汾川晉滅之春秋之沈封於汝南蔡滅之顧合而為一豈不讀左氏乎歐陽公略不筆削為可恨也魯昭公春秋之世列國之君失守社稷其國皆即日改立君無虚位以俟者惟魯昭公為季孫意如所逐而孫于齊又適晉凡八年乃沒意如在國攝事主祭嵗具從者之衣屨而歸之于乾侯公薨之明年䘮還故國然後其弟公子宋始即位他國無此比也豈非魯秉周禮雖不幸逐君猶存厥位而不敢絶之乎其後哀公孫于越左傳終於是年不知悼公以何時立也州縣失故名今之州縣以累代移徙改割之故往往或失其故名或州異而縣不同者如建昌軍在江西而建昌縣乃隷南康南康軍在江東而南康縣乃𨽻南安南安軍在江西而南安縣乃隷泉州韶州為始興郡而始興縣外屬贑州為南康郡而南康縣外屬鬱林縣隷貴州桂陽為軍而桂陽縣隷郴州此類不可悉數嚴州當為莊嚴州本名睦州宣和中以方寇之故改焉雖以威嚴為義然實取嚴陵灘之意也殊不考子陵乃莊氏東漢避顯宗諱以莊為嚴故史家追書以為嚴光後世當從實可也容齋隨筆卷六欽定四庫全書容齋隨筆卷七十八則宋洪邁撰孟子書百里奚栁
