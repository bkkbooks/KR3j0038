front:
  text: 十一十五則
  hash: sha256:67e3525c85a3f8b2e2a8cbe3760053dc7aa2d4061bf24f423aeb3f530baa44a9
body:
  text: 宋洪邁撰古錞于周禮鼓人掌教六鼔四金之音聲以節聲樂四金者錞鐲鐃鐸也以金錞和鼓鄭氏注云錞錞于也圜如碓頭大上小下樂作鳴之與鼓相和賈公彦䟽云錞于之名出於漢之大予樂官南齊始興王鑑為益州刺史廣漢什邡民段祚以錞于獻鑑古禮器也髙三尺六寸六分圍二尺四寸圓如筩銅色黒如漆甚薄上有銅馬以䋲縣馬令去地尺餘灌之以水又以器盛水於下以芒莖當心跪注錞于以手振芒則其聲如雷清響良乆乃絶古所以節樂也周斛斯徴精三禮為太常卿自魏孝武西遷雅樂廢缺樂有錞于者近代絶無此器或有自蜀得之皆莫之識徴曰此錞于也衆弗之信遂依干寳周禮注以芒筒捋之其聲極振乃取以合樂焉宣和博古圖說云其製中虚椎首而殺其下王黼亦引叚祚所獻為證云今樂府金錞就擊於地灌水之制不復考矣是時有虎龍錞一山紋錞一圜花錞一縶馬錞一龜魚錞一魚錞二鳯錞一虎錞七其最大者重五十一斤小者七斤淳熈十四年澧州慈利縣周赧王墓旁五里山摧盖古冡也其中藏器物甚多予甥余玠宰是邑得一錞髙一尺三寸上徑長九寸五分濶八寸下口長徑五寸八分濶五寸虎鈕髙一寸二分濶寸一分并尾長五寸五分重十三斤紹熈三年予仲子簽書峽州判官於長楊縣又得其一甚大髙二尺上徑長一尺六分濶一尺四寸二分下口長徑九寸五分濶八寸虎鈕髙二寸五分足濶三寸四分并尾長一尺重三十五斤皆虎錞也予家蓄古彛器百種此遂為之冠小錞無損缺扣之其聲清越以長大者破處五寸許聲不能渾全然亦可考擊也後復得一枚與大者無小異自峽來寘諸篛籠中取者不謹斷其鈕匠以藥銲而柵之遂両両相對若三禮圖景祐大樂圖所畫形製皆非東坡志林記始興王鑑一節云記者能道其尺寸之詳如此而拙於遣詞使古器形制不可復得其髣髴甚可恨也正為此云孫玉汝韓荘敏公縝字玊汝盖取君子以玉比徳縝宻以栗及王欲玊汝之義前人未嘗用最為古雅按唐登科記㑹昌四年及第進士有孫玊汝李景讓為御史大夫劾罷侍御史孫玊汝㑹稽大慶寺碑咸通十一年所立云衢州刺史孫玊汝記榮王宗綽書目有南北史選練十八卷云孫玉汝撰盖其人也唐人避諱唐人避家諱甚嚴固有出於禮律之外者李賀應進士舉忌之者斥其父名晉肅以晉與進字同音賀遂不敢試韓文公作諱辯論之至切不能觧衆惑也舊唐史至謂韓公此文為文章之紕繆者則一時横議可知矣杜子羙有送李二十九弟晉肅入蜀詩盖其人云裴徳融諱臯髙鍇以禮部侍郎典貢舉徳融入試鍇曰伊諱臯向某下就試與及第困一生事後除屯田員外郎與同除郎官一人同參右丞盧簡求到宅盧先屈前一人入前人啓云某與新除屯田裴員外同祗候盧使驅使官𫝊語曰員外是何人下及第偶有事不得奉見裴蒼遽出門去觀此事尤為乖剌鍇簡求皆當世名流而所見如此語林載崔殷夢知舉吏部尚書歸仁晦託弟仁澤殷夢唯唯而已無何仁晦復詣託之至於三四殷夢斂色端笏曰某見進表讓此官矣仁晦始悟已姓殷夢諱也按宰相世系表其父名龜從此又與髙相類且父名晉肅子不得舉進士父名臯子不得於主司姓髙下登科父名龜從子不列姓歸人於科籍揆之禮律果安在哉後唐天成初盧文紀為工部尚書新除郎中于鄴公參文紀以父名嗣業與同音竟不見鄴憂畏太過一夕雉經于室文紀坐謫石州司馬此又可怪也髙鍇取士髙鍇為禮部侍郎知貢舉閱三嵗頗得才實始嵗取四十人才益少詔減十人猶不能滿此新唐書所載也按登科記開成元年中書門下奏進士元額二十五人請加至四十人奉勑依奏是年及二年三年鍇在禮部毎舉所放各四十人至四年始令每年放三十人為定則唐書所云誤矣摭言載鍇第一牓裴思謙以仇士良闗節取状頭鍇庭譴之思謙回顧厲聲曰明年打􅆃取状頭第二年鍇知舉誡門下不得受書題思謙自携士良一緘入貢院既而易紫衣趨至堦下白曰軍容有状薦裴思謙秀才鍇接之書中與求巍峩鍇曰状元已有人此外可副軍容意㫖思謙曰卑吏奉軍容處分裴秀才非状元請侍郎不放鍇俛首良乆曰然則略要見裴學士思謙曰卑吏便是也鍇不得已遂從之思謙及第後宿平康里賦詩云銀釭斜背觧明璫小語低聲賀玉郎從此不知蘭麝貴夜來新惹桂枝香然則思謙亦踈俊不覊之士耳鍇徇凶璫之意以為舉首史謂頗得才實恐未盡然先是大和三年鍇為考功員外郎取士有不當監察御史姚中立奏停考功别頭試六年侍郎賈餗又奏復之事見選舉志兵部名存唐因隋制尚書置六曹吏部兵部分掌銓選文屬吏部武屬兵部自三品以上官冊授五品以上制授六品以下勑授皆委尚書省奏擬兩部各列三銓曰尚書銓尚書主之曰東銓曰西銓侍郎二人主之吏居左兵居右是為前行故兵部班級在户刑禮之上睿宗初政以宋璟為吏部尚書李乂盧從愿為侍郎姚元之為兵部尚書陸象先盧懐謹為侍郎六人皆名臣二選稱治其後用人不能悉得賢然兵部為甚其變而為三班流外銓不知自何時元豐官制行一切更改凡選事無論文武悉以付吏部蘇東坡當元祐中拜兵書謝表云恭惟先帝復六卿之名本欲後人識三代之舊古今殊制閒劇異宜武選𨽻於天官兵政揔於樞輔故司馬之職獨省文書盖紀其實也今本曹所掌惟諸州廂軍名籍及毎大禮則書寫蕃官加恩告雖有所轄司局如金吾街仗司騏驥車輅象院法物庫儀鸞司不過毎季郎官一徃耳名存實亡一至於是武官名不正文官郎大夫武官将軍校尉自秦漢以來有之至於階秩品著則由晉魏至唐始定唐文散階二十九自開府特進之下為大夫者十一為郎者十六武散階四十五為将軍者十二為挍尉者十六此外懐化歸徳大将軍訖于司戈執㦸皆以待蕃戎之君長臣僕本朝因之元豐正官制廢文散階而易舊省部寺監名稱為郎大夫曰寄禄官政和中改選人七階亦為郎欲以将軍挍尉易横行以下諸使至三班借軄而西班用事者嫌其塗轍太殊亦請改為郎大夫於是以卒伍厮圉玷汙此名又以節度使至刺史專為武臣正任且郎大夫漢以處名流觀察使在唐為方伯刺史在漢為監司在唐為郡守豈介冑恩倖所得處哉此其名尤不正者也名将晚謬自古威名之将立盖世之勲而晩謬不克終者多失於恃功矜能而輕敵也關羽手殺袁紹二将顔良文醜於萬衆之中及攻曹仁於樊于禁等七軍皆沒羽威震華夏曹操議徙許都以避其銳其功名盛矣而不悟吕蒙陸遜之詐竟堕孫權計中父子成禽以敗大事西魏王思政鎮守玉壁髙歡連營四十里攻圍之饑凍而退及思政徙荆州舉韋孝寛代已歡舉山東之衆來攻凡五十日復以敗歸皆思政功也其後欲以長社為行臺治所致書於崔猷猷曰襄城控帶京洛當今要地如其動静易相應接潁川鄰冦境又無山川之固莫若頓兵襄城而遣良将守潁川則表裏俱固人心易安縱有不虞豈足為患宇文㤗令依猷䇿思政固請且約賊水攻期年陸攻三年之内朝廷不煩赴救已而陷於髙澄身為俘虜慕容紹宗挫敗侯景一時将帥皆莫及而攻圍潁川不知進退赴水而死呉明徹當陳國衰削之餘北伐髙齊将略人才公卿以為舉首師之所至前無堅城數月之間盡復江北之地然其後攻周彭城為王軌所困欲遏歸路蕭摩訶請擊之明徹不聼曰搴旗陷陣将軍事也長筭逺略老夫事也一旬之間水路遂斷摩訶又請潜軍突圍復不許遂為周人所執将士三萬皆沒焉此四人之過如出一轍唐帝稱太上皇唐諸帝稱太上皇者髙祖睿宗明皇順宗凡四君順宗以病廢之故不能臨政髙祖以秦王殺建成元吉明皇幸蜀為太子所奪唯睿宗上畏天戒發於誠心為史册所表然以事考之睿宗以先天元年八月傳位於皇太子猶五日一受朝三品以上除授及大刑政皆自決之故皇帝之子嗣直嗣謙嗣昇封王皆以上皇誥而出命又遣皇帝廵邊二年七月甲子太平公主誅明日乙丑即歸政然則猶有不獲已也若夫與堯舜合其徳則我髙宗皇帝至尊夀皇聖帝為然楊倞注荀子唐楊倞注荀子乃元和十三年然臣道篇所引書曰從命而不拂㣲諌而不倦為上則明為下則遜注以為伊訓篇今元無此語致士篇所引曰義刑義殺勿庸以即汝惟曰未有順事注以為康誥而不言其有不同者昭宗相朱朴唐昭宗出幸華州方強藩悍鎮逺近為梗思得特起竒士任之以成中興之業水部郎中何迎表薦國子博士朱朴才如謝安朴所善方士許巖士得幸出入禁中亦言朴有經濟才上連日召對朴有口辯上恱之曰朕雖非太宗得卿如魏徴矣上憤天下之亂朴自言得為宰相月餘可致太平遂拜為相制出中外大驚唐制詔有制詞學士韓儀所撰曰夢傅巖而得真相則商道中興獵渭濵而載獻臣則周朝致理朕自逢多難渇竚英賢暗禱鬼神明祈日月果得哲輔契子勤求朱朴學業優深識用精敏乆徊翔而不振彌貞吉以自多朕知其才遂召與語理亂立分於言下聞所未聞兵農皆在於術中得所未得不覺前席為之改容須委化權用昌衰運自我拔竒寜拘品秩百度羣倫俟爾康濟其美如此儀者偓之兄所謂暗禱鬼神明祈日月之語必當時所授㫖意也朴為相纔半年而罷後貶栁州司户叅軍制云不為自審之謀茍竊相援之力實因姦幸潜致顯榮亦謂術可弭兵學能活國冐半嵗容身之資無一朝輔政之功唯辱中台頗興羣論嗚呼昭宗當王室艱難之際無知人之名拔朴於庶僚中位諸公衮以今觀之適足貽後人譏笑新史贊謂捭豚臑而拒貙牙趣亡而已悲夫楊國忠諸使楊國忠為度支郎領十五餘使至宰相凡領四十餘使第署一字不能盡胥吏因是恣為姦欺新舊唐史皆不詳載其職按其拜相制前銜云御史大夫判度支權知太府卿事兼蜀郡長史劒南節度支度營田等副大使本道兼山南西道采訪處置使兩京太府司農出納監倉祠祭木炭宫市長春九成宫等使關内道及京畿采訪處置使拜右相兼吏部尚書集賢殿崇文館學士脩國史太清太微宫使自餘所領又有管當租庸鑄錢等使以是觀之槩可見矣宫市之事咸謂起於徳宗貞元不知天寳中已有此名且用宰臣充使也韓文公作順宗實錄但云舊事宫中有要市外物令官吏主之與人為市随給其直貞元末以宦者為使亦不及天寳時已有之也祖宗朝宰輔祖宗朝宰輔名為禮絶百僚雖樞宻副使亦在太師一品之上然至其罷免歸班則與庶位等李崇矩自樞宻使罷為鎮國軍節度使旋改左衛大将軍遂為廣南西道都巡撿使未幾遣使齎詔徙海南四州都巡撿使皆非降黜在南累年入判金吾街仗司而卒猶贈太尉趙安仁嘗參知政事而判登聞鼓院張鎔嘗知樞密院而監諸司庫務曾孝寛以簽書樞密服闋而判司農事張宏李惟清皆自見任樞宻副使徙御史中丞其他以前執政而為三司使中丞者數人官制既行猶多除六曹尚書自崇寜以來乃始不然百官避宰相劉器之以待制為樞宻都承㫖道遇執政出尚書省相從歸府第劉去席帽涼衫斂馬遣人𫝊語相揖而過左相吕汲公歸呼門下省法吏問從官道逢宰相如何吏撿條但有尚書省官避令僕兩省官各避其官長而無兩制避宰相之法汲公乃止而心甚不樂劉以此語人以為有所據然以事體揆之侍從不避宰相恐為不然亦無所謂只避官長法劉公蓋飾說耳按天聖編勑諸文武官與宰相相遇於路皆退避見樞宻使副參知政事避路同宰相其文甚明不應元祐時不行用也百官見宰相天聖編勑載文武百官見宰相儀文明殿學士至龍圗閣直學士列班於都堂階上堂吏贊云請不拜班首前致詞訖退歸位列拜宰相答拜兩省官相次同學士之儀上将軍大将軍将軍御史臺官及南班文武百官序班於中書門外應節度使至刺史並綴本班中丞揖訖入宰相降階南向立於位乃稱班文東武西並北上臺官南行北向東上贊云百寮拜宰相答拜訖退内客省使至閤門使見宰相樞宻使並階上列行拜不答拜見參知政事樞宻副使宣徽使客禮展拜皇城使以下諸司使横行副使見宰相樞宻使並階上連姓稱職展拜不答拜見參政副樞並列行拜若諸司副使閤門祗候見參樞亦不答拜國朝上下等威其嚴如此已而浸廢文潞公富韓公至和中自外鎮拜相詔百官班迎於門言者乃謂隆之以虚禮元豐定官制王禹玊蔡持正為僕射上日始用此禮其後復不行乾道初魏仲昌以樞宻吏寅緣得副承㫖毎謁公府與侍從同席升車而去葉子昂為相獨抑之使與卿監旅進送之于右序不索馬及王抃以國信所典儀吏為都承㫖且正任觀察使禮遂均從官矣東坡自引所為文東坡為文潞公作徳威堂銘云元祐之初起公以平章軍國重事期年乃求去詔曰昔西伯善養老而太公自至魯穆公無人子思之側則長者去之公自為謀則善矣獨不為朝廷惜乎又曰唐太宗以干戈之事尚能起李靖於既老而穆宗文宗以燕安之際不能用裴度於未病治亂之效於斯可見公讀詔聳然不敢言去按此二詔蓋元祐二年三月潞公乞致仕不允批答皆坡所行也又繳還乞罷青苗状云近日謫降吕惠卿告詞云首建青苗次行助役亦坡所作張文定公墓誌載嘗論次其文凡三百二十字結之云世以軾為知言又述諫用兵云老臣且死見先帝地下有以藉口矣亦其所作也并引責吕惠卿詞亦然乾道中邁直翰苑答陳敏歩帥詔云亞夫持重小棘門霸上之将軍不識将屯冠長樂未央之衛尉後為敏作神道碑亦引之正以為法也容齋續筆卷十一欽定四庫全書容齋續筆卷十二十一則宋洪邁撰
