front:
  text: 十三十四則
  hash: sha256:7f90ffcd79c968954928107c91665a846ae4ad3439ab4b81b5fd59a2bccce60a
body:
  text: 宋洪邁撰科舉恩數國朝科舉取士自太平興國以來恩典始重然各出一時制㫖未嘗輙同士子隨所得而受之初不以官之大小有所祈訴也太平之二年進士一百九人吕䝉正以下四人得将作丞餘皆大理評事充諸州通判三年七十四人胡旦以下四人将作丞餘並為評事充通判及監當五年一百二十一人蘇易簡以下二十三人皆将作丞通判八年二百三十九人自王世則以下十八人以評事知縣餘授判司簿尉未幾世則等移通判簿尉改知令録明年並遷守評事雍熈二年二百五十八人自梁顥以下二十一人纔得節察推官端拱元年二十八人自程宿以下但權知諸縣簿尉二年一百八十六人陳堯叟曽㑹至得光禄丞直史館而第三人姚揆但防禦推官淳化三年三百五十三人孫何以下二人将作丞二人評事第五人以下皆吏部注擬咸平元年孫僅但得防推二年孫暨以下但免選注官盖此兩榜真宗在諒闇禮部所放故殺其禮及三年陳堯咨登第然後六人将作丞四十二人評事第二甲一百三十四人節度推官軍事判官第三甲八十人防團軍事推官下第再試太宗雍熈二年已放進士百七十九人或云下第中甚有可取者乃令復試又得洪湛等七十六人而以湛文采遒麗特升正榜第三端拱元年禮部所放程宿等二十八人進士葉齊打鼓論榜遂再試復放三十一人而諸科因此得官者至於七百一時待士可謂至矣然太平興國末孟州進士張兩光以試不合格縱酒大罵於街衢中言渉指斥上怒斬之同保九輩永不得赴舉恩威並行至於如此試賦用韻唐以賦取士而韻數多寡平側次敘元無定格故有三韻者花萼樓賦以題為韻是也有四韻者蓂莢賦以呈瑞聖朝舞馬賦以奏之天廷丹甑賦以國有豐年泰階六符賦以元亨利正為韻是也有五韻者金莖賦以日華川上動為韻是也有六韻者止水魍魎人鏡三統指歸信及豚魚洪鐘待撞君子聼音東郊朝日蜡日祈天宗樂徳訓胄子諸篇是也有七韻者日再中射已之鵠觀紫極舞五聲聼政諸篇是也八韻有二平六側者六瑞賦以儉故能廣被褐懐玊日五色賦以日麗九華聖符土徳徑寸珠賦以澤浸四荒非寳逺物為韻是也有三平五側者宣耀門觀試舉人以君聖臣肅謹擇多士懸法象魏以正月之吉懸法象魏𤣥酒以薦天明徳有古遺味五色土以王子畢封依以建社通天臺以洪臺獨出浮景在下幽蘭以逺芳襲人悠乆不絶日月合璧以兩曜相合候之不差金柅以直而能一斯可制動為韻是也有五平三側者金用礪以商髙宗命傅說之官為韻是也有六平二側者旗賦以風日雲舒軍容清肅為韻是也自大和以後始以八韻為常唐荘宗時嘗覆試進士翰林學士承㫖盧質以后從諫則聖為賦題以堯舜禹湯傾心求過為韻舊例賦韻四平四側質所出韻乃五平三側大為識者所詴豈非是時已有定格乎國朝太平興國三年九月始詔自今廣文館及諸州府禮部試進士律賦並以平側次用韻其後又有不依次者至今循之正元制科唐徳宗正元十年賢良方正科十六人裴垍為舉首王播次之隔一名而裴度崔羣皇甫鎛繼之六名之中連得五相可謂盛矣而邪正夐不侔度羣同為元和宰相而鎛以聚斂賄賂亦居之度羣極陳其不可度恥其同列表求自退兩人竟為鎛所毁而去且三相同時登科不可謂無事分而玊石雜糅薫蕕同器若黙黙充位則是固寵患失以私妨公裴崔之賢誼難以處也本朝韓康公王岐公王荆公亦同年聮名熈寜間康公荆公為相岐公參政故有一時同榜用三人之語頗類此云貽子録先公自燕歸得龍圖閣書一䇿曰貽子録有御書兩印存不言撰人姓名而序云愚叟受知南平王政寛事簡意必髙從誨擅荆渚時賔僚如孫光憲輩者所編皆訓儆童蒙其修進一章云咸通年中盧子期著初舉子一卷細大無遺就試三場避國諱宰相諱主文諱士人家小子弟忌用熨斗時把帛慮有拽白之嫌燭下寫試無誤筆即題其後云並無揩改塗乙注如有即言字數其下小書名同年小録是䨇隻先輩各一人分寫宴上長少分雙隻相向而坐元以東為上儭以西為首給舎員外遺補多來突宴東先輩不遷而西先輩避位及吏部給春闗牒便稱前鄉貢進士大略有與今制同者獨避宰相主文諱不復講雙隻先輩之名他無所見其林園一章為茄為酪酥亦甚新金花帖子唐進士登科有金花帖子相𫝊已乆而世不多見予家藏咸平元年孫僅榜盛京所得小録猶用唐制以素綾為軸貼以金花先列主司四人銜曰翰林學士給事中楊兵部郎中知制誥李右司諫直史館梁祕書丞直史館朱皆押字次書四人甲子年若干某月某日生祖諱某父諱某私忌某日然後書状元孫僅其所紀與今正同别用髙四寸綾濶二寸書盛京二字四主司花書于下粘於卷首其規範如此不知以何年而廢也但此榜五十人自第一至十四人惟第九名劉􅂱為河南人餘皆貫開封府其下又二十五人亦然不應都人士中選若是之多疑於方外人寄名託籍以為進取之便耳四主司乃楊礪李若拙梁顥朱台符皆只為同知舉物之小大列禦寇荘周大言小言皆出於物理之外列子所載夏革曰渤海之東幾億萬里有大壑焉實惟無底之谷中有五山髙下周旋三萬里山之中間相去七萬里而五山之根無所連著帝使巨鼇十五舉首而戴之迭為三畨六萬嵗一交焉而龍伯之國有大人舉足不盈數千而暨山所一釣而連六鼇合負而趣歸其國於是岱輿員嶠二山沈於大海張湛注云以髙下周圍三萬里山而一鼇頭之所載而六鼇復為一釣之所引龍伯之人能并而負之計此人之形當百餘萬里鯤鵬方之猶蚊蚋蚤虱耳太虚之所受亦奚所不容哉荘子逍遥逰首著鯤鵬事云北溟有魚其名為鯤鯤之大不知其幾千里也化而為鳥其名為鵬鵬之徙於南溟水擊三千里摶扶搖而上者九萬里二子之語大若此至於小言則荘子謂有國於蝸之左角曰觸氏右角曰蠻氏相與爭地而戰伏尸數萬逐北旬有五日而後反列子曰江浦之間生麽蟲其名曰焦螟羣飛而集於蚊睫弗相觸也栖宿去來蚊弗覺也黄帝與容成子同齋三月徐以神視塊然見之若嵩山之阿徐以氣聼砰然聞之若電霆之聲二子之語小如此釋氏維摩詰長者居丈室而容九百萬菩薩并師子座一芥子之細而能納須彌皆一理也張湛不悟其寓言而竊竊然以太虚無所不容為說亦隘矣若吾儒中庸之書但云天地之大也人猶有所憾故君子語大天下莫能載焉語小天下莫能破焉則明白洞達歸於至當非二氏之學一偏所及也郭令公唐人功名富貴之盛未有出郭汾陽之右者然至其女孫為憲宗正妃歴五朝母天下終以不得志於宣宗而死自是支胄不復振及本朝慶歴四年訪求厥後僅得裔孫元亨於布衣中以為永興軍助教歐陽公知制誥行其詞曰繼絶世褒有功非惟推恩以及逺所以勸天下之為人臣者焉況爾先王名載舊史勲徳之厚宜其流澤於無窮而其後裔不可以廢徃服新命以榮厥家且以二十四考中書令之門而需一助教以為榮吁亦淺矣乃知世禄不朽如春秋諸國至數百年者後代不易得也紀年兆祥自漢武建元以來千餘年間改元數百其附㑹離合為之辭者不可勝書固亦有曉然而易見者如晉元帝永昌郭璞以為有二日之象果至冬而亡桓靈寳大亨識者以為一人二月了果以仲春敗蕭棟武陵王紀同嵗竊位皆為天正以為二人一年而止其後皆然齊文宣天保為一大人只十果十年而終然梁明帝蕭巋亦用此而盡二十三年或又云巋蕞爾一邦故非禨祥所係齊後主隆化為降死安徳王延宗徳昌為得二日周武帝宣政為宇文亡日宣帝大象為天子冢蕭琮晉出帝廣運為軍走隋煬帝大業為大苦末唐僖宗廣明為唐去丑口而著黄家日月以兆巢賊之禍欽宗靖康為立十二月康果在位滿嵗而髙宗由康邸建中興之業熈寜之末将改元近臣撰三名以進曰平成曰美成曰豐亨神宗曰成字負戈美成者犬羊負戈亨字為子不成不若去亨而加元遂為元豐若隆興則取建隆紹興各一字與唐貞元取貞觀開元之義同已而嫌與顔亮貞隆相近故二年即改乾道及甲午改純熈既已布吿天下予時守贑賀表云天永命而開中興方茂卜年之統時純熈而用大介載新紀號之文迨詔至乃為淳熈蓋以出處有告成大武之語故不欲用民俗火葬自釋氏火化之說起於是死而焚尸者所在皆然固有炎暑之際畏其穢泄斂不終日肉尚未寒而就爇者矣魯夏父弗忌獻逆祀之議展禽曰必有殃雖夀而沒不為無殃既其葬也焚煙徹于上謂已葬而火焚其棺椁也吳伐楚其師居麋楚司馬子期将焚之令尹子西曰父兄親暴骨焉不能収又焚之不可謂前年楚人與呉戰多死麋中不可并焚也衛人掘禇師定子之墓焚之于平荘之上燕騎劫圍齊即墨掘人冢墓燒死人齊人望見涕泣怒自十倍王莽作焚如之刑燒陳良等則是古人以焚尸為大僇也列子曰楚之南有炎人之國其親戚死㱙其肉而棄之然後埋其骨秦之西有儀渠之國其親戚死聚柴積而焚之燻則煙上謂之登遐然後成為孝子此上以為政下以為俗而未足為異也蓋是時其風未行於中國故列子以儀渠為異至與㱙肉者同言之㱙音寡太史日官周禮春官之屬曰太史掌建邦之六典以逆邦國之治正嵗年以序事頒之于官府及都鄙頒告朔于邦國小史掌邦國之志奠繫世辨昭穆鄭氏注云太史日官也引左𫝊天子有日官諸侯有日御為說志謂記也史官主書國語所謂鄭書及帝繫世本之屬是也小史主定之然則周之史官日官同一職耳故司馬談為漢太史令而子長以為文史星歴近乎卜祝之間固主上所戲弄倡優畜之流俗之所輕也今太史局正星厯卜祝輩所聚其長曰太史局令而隷祕書省有太史案主之蓋其源流有自來矣汲冡周書汲冡周書今七十篇殊與尚書體不相類所載事物亦多過實其克商解云武王先入適紂所在射之三發而後下車擊之以輕吕劍名斬之以黄鉞縣諸大白商二女既縊又射之三發擊之以輕吕斬之以𤣥鉞縣諸小白越六日朝至於周以三首先馘入燎于周廟又用紂于南郊夫武王之伐紂應天順人不過殺之而已紂既死何至梟戮俘馘且用之以祭乎其不然者也又言武王狩事尤為滛侈至於擒虎二十有二猫二麋五千二百三十五犀十有三氂七百二十有一熊百五十一羆百十八豕三百五十有二狢十有八麂十有六麝五十鹿三千五百有二遂征四方凡憝國九十有九國馘磨億有十萬七千七百七十有九其多如是雖注家亦云武王以不殺為仁無緣所馘如此蓋大言也王㑹篇皆大㑹諸侯及四夷事云唐叔荀叔周公在左太公在右堂下之右唐公虞公南面立焉堂下之左商公夏公立焉四公者堯舜禹湯後商夏即杞宋也又言俘商寳玊億有百萬所紀四夷國名頗古奥獸畜亦竒崛以肅慎為稷慎獩人為穢人樂浪之夷為良夷姑蔑為姑妹東甌為且甌渠搜為渠叟髙句麗為髙夷所敘穢人前兒若彌猴立行聲似小兒良夷在子獸名弊身人首脂其腹炙之藿則鳴揚州禺禺魚人鹿青邱狐九尾東南夷白民乘黄乘黄者似騏背有兩角東越海􅧳海陽盈車大蟹西南戎曰央林以酋耳酋耳者身若虎豹渠叟以䶂犬䶂犬者露犬也能飛食虎豹區陽戎以鼈封鼈封者若彘前後有首蜀人以文翰文翰者若臯雞康民以稃苡其實如李食之宜子北狄州靡費費其形人身枝踵自笑笑則上唇翕其目食人都郭亦北狄生生若黄狗人面能言竒幹亦北狄善芳頭若雄雞佩之令人不眯正東髙夷嵰羊嗛羊者羊而四角西方之戎曰獨鹿卭卭距虚犬戎文馬而赤􅀢縞身目若黄金名古皇之乗白州北閭北閭者其華若羽以其木為車終行不敗篇末引伊尹朝獻商書云湯問伊尹使為四方獻令伊尹請令正東以魚皮之鞞鰂醤蛟瞂利劒正南以珠璣玳瑁象齒文犀正西以丹青白旄江歴珠名龍角正北以橐駝騊駼駃騠良弓為獻湯曰善凡此皆無所質信姑録之以貽博雅者唐太宗時逺方諸國來朝貢者甚衆服装詭異顔師古請圖以示後作王㑹圖蓋取諸此漢書所引天予不取反受其咎母為權首将受其咎以為逸周書此亦無之然則非全書也曹子建論文曹子建與楊徳祖書云世人著述不能無病僕常好人譏彈其丈有不善應時改定昔丁敬禮常作小文使僕潤飾之僕自以才不過若人辭不為也敬禮謂僕卿何所疑難文之佳麗吾自得之後世誰相知定吾文者邪吾常歎此達言以為美談子建之論善矣任昉為王儉主簿儉出自作文令昉㸃正昉因定數字儉歎曰後世誰知子定吾文正用此語今世俗相承所作文或為人詆訶雖未形之於辭色及退而怫然者皆是也歐陽公作尹師魯銘文不深辯其獲罪之寃但稱其為文章簡而有法或以為不盡公怒至詒書他人深數責之曰簡而有法惟春秋可當之脩於師魯之文不薄矣又述其學曰通知古今此語若必求其可當者惟孔孟也而世之無識者乃云云此文所以慰吾亡友爾豈恤小子輩哉王荆公為錢公輔銘母夫人蒋氏墓不稱公輔甲科但云子官於朝豐顯矣里巷之士以為太君榮後云孫七人皆㓜不書其名公輔意不滿以書言之公復書曰比䝉以銘文見屬輒為之而不辭不圖乃猶未副所欲欲有所増損鄙文自有意義不可改也宜以見還而求能如足下意者為之如得甲科為通判何足以為太夫人之榮一甲科通判茍粗知為辭賦雖市井小人皆可以得之何足道哉故銘以謂閭巷之士以為太夫人榮明天下有識者不以置榮辱也至於諸孫亦不足列孰有五子而無七孫者乎二公不喜人之議其文亦如此雨水清明厯家以雨水為正月中氣驚蟄為二月節清明為三月節榖雨為三月中氣而漢世之初仍周秦所用驚蟄在雨水之前榖雨在清明之前至於太初始正之云容齋續筆卷十三欽定四庫全書容齋續筆卷
