front:
  text: 十二十三則宋洪邁撰
  hash: sha256:d5643a4a131ba31abc5c3d3ad06853f0b9829b59d72e9702f0cd18e4af1f0c29
body:
  text: 小學不講古人八嵗入小學教之六書周官保氏之職實掌斯事厥後浸廢蕭何著法太史試學童諷書九千字乃得為吏以六體試之吏人上書字或不正輙有舉劾劉子正父子校中祕書自史籕以下凡十家序為小學次於六藝之末許叔重收集篆籕古文諸家之學就𨽻為訓注謂之說文蔡伯喈以經義分散𫝊記交亂訛偽相䝉乃請刋定五經備體刻石立于太學門外謂之石經後有吕忱又集說文之所漏畧著字林五篇以補之唐制國子監置書學博士立說文石經字林之學舉其文義嵗登下之而考功禮部課試貢舉許以所習為通人茍趨便不求當否大厯十年司業張參纂成五經文字以類相從至開成中翰林待詔唐𤣥度又加九經字様補參之所不載晉開運末祭酒田敏合二者為一編並以考正俗體訛謬今之世不復詳考雖士大夫作字亦不能悉如古法矣韓子曰凡為文辭宜畧識字又云阿買不識字頗知書八分安有不識字而能書蓋所謂識字者如上所云也予采張氏田氏之書擇今人所共昧者漫載於此以訓子孫本字從木一在其下今為大十者非休字象人息於木隂加㸃者非美从羊从大今从犬从火者非􅂒字古者以車戰故軍从勹下車後相承作軍義無所取看字从手凡視物不審則以手遮目看之作㸔者非揚州取輕揚之義从木者非梁从木作梁者非乾有干䖍二音為字一體今俗分别作乹字音䖍而乾音干者非尊从酋下寸作尊者非奠从酋从丌作奠者非夷从弓从大作夷者訛耆从㫖作老下目者訛漆泰黍黎下並从水相承省作小今从小从小者訛決沖況涼盜並从水作冫者訛饑飢二字上穀不熟下餓也今多誤用至於果芻韭之加草岡加山攜之作携鉏作鋤惡作􅁖霸作覇筍作笋頿作髭須加髟或从水祕从禾簡作蕑寶从尔趨从多衡合从角从大而从魚啓从又及弋肈从文徹从去麤作鹿蟲作虫墮許規反俗作隳又以為惰幡作幡怪為恠關為關炙从夕閒从日功从力兹合从二𤣥而作兹升作􅅩輩从北妬从户姦為姧􅀢从毒吝作􅈔寃上加㸃鄰作隣牟从午互作㸦元从㸃舌从千蓋作盖京作亰皎从日次从冫鼓从皮濳譖僭从替出作二山覺从與游於以方為才皁為皂曷為曷匹為疋收作収叙作叙臥从臣从人而以人為卜改从戊巳之巳而以為巳凢作凡允作允館作舘覽作覧祭合从月从又而作祭瞻作瞻緥从衣滛从缶徧作遍徼作僥漾作漾琴瑟之弦从糸輕作輕如是者皆非也主臣漢文帝問陳平決獄錢穀平謝曰主臣史記漢書皆同張晏曰若今人謝曰惶恐也文頴曰惶恐之辭猶今言死罪也晉灼曰主擊也臣服也言其擊服皇恐之辭馬融龍虎賦曰勇怯見之莫不主臣正用此意文選載梁任昉奏彈曹景宗先叙其罪然後繼之曰景宗即主臣仍繼之曰謹案某官臣景宗又彈劉整亦曰整即主臣齊沈約彈王源文亦然李善捨漢史所書而引王隠晉書庾純自劾以謂然以主為句則臣當下讀殊為非是不知所謂某人即主有何義哉景華御苑崔徳符坐元符上書邪黨困於崇寧後監洛南稻田務嘗送客於㑹節園是時冬暮梅花已開明年春監修大内閹官容佐取以為景華御苑徳符不知也至春晩復騎瘦馬與老兵游園内坐梅下賦詩其詞曰去年白玉花結子深枝間小憇籍清影低顰啄㣲酸故人不可見春事今已䦨繞樹尋履跡空餘􅁟花斑次日佐入園見地上馬糞知為徳符是時府官事佐如不及而徳符未嘗謁之佐即具奏劾以擅入御苑作踐有㫖勒停家素貧𫝊食於諸賢之舍久乃歸陽翟徳符没於靖康官卑不應立𫝊予詳考本末為特書之頗憶此段事擬載於傳中以悼君子之不幸且知馬永卿􅂴真錄中有之而求不可得漫紀于此州陞府而不為鎮州郡之名莫重於府雖節鎮不及焉固未有稱府而不為節度者比年以來陞蜀州為崇慶府劒州為隆慶府㳟州為重慶府嘉州為嘉定府秀州為嘉興府英州為英徳府蜀劒既有崇慶普安軍之額而恭嘉以下獨未然故幕職官仍云某府軍事判官推官大與府不相稱皆有司之失也信陽軍一小壘耳而司户叅軍銜内𢃄兼節推尤為可笑頃在中都時每為天官主者言之云亦不必白朝廷只本案檢舉改正申知足矣乃曰久例如此竟相承到今文安公嘗為左選侍郎是時未知此也漢唐三君知子英明之君見其子有材者必愛而稱之漢高祖謂趙王如意類已欲以易孝惠以大臣諫而止宣帝以淮陽王欽壯大好經書法律聦逹有材數嗟嘆曰真我子也常有意欲立為嗣而因太子起於㣲細且早失母故弗忍唐太宗以吳王恪英果類我欲以代雉奴其後如意為吕母所戕恪為長孫無忌所害欽陷張博之事殆於不免此三王行事無由表見然孝惠之仁弱幾遭吕氏之覆宗孝元之優柔不斷權移於閽寺漢業遂衰高宗之庸懦受制㐫后為李氏禍尤惨其不能繼述固已灼然高祖宣帝太宗蓋本三子之材而言之非専指其容貎也可謂知子矣彼明崇儼謂英王哲即中宗也貎類太宗張說謂太宗畫像雅類忠王即肅宗也此惟取其形似也若以材言之中宗之視太宗天壤相隔矣漢成帝所幸妾曹宫産子曰我兒額上有壯髪類孝元皇帝使其真是孝元亦何足道而況於嬰孺之狀耶當官營繕元豐元年范純粹自中書撿正官謫知徐州滕縣一新公堂吏舍凡百一十有六間而寢室未治非嫌於奉己也曰吾力有所未暇而已是時新法正行御史大夫如束濕雖任二千石之重而一錢粒粟不敢輙用否則必著冊書東坡公歎其廉適為徐守故為作記其略曰至於宫室蓋有所從受而𫝊之無窮非獨以自飬也今日不治後日之費必倍而比年以來所在務為儉陋尤諱土木營造之功欹仄腐壊轉以相付不敢擅易一椽此何義也是記之出新進趨時之士媢疾以惡之恭覽國史開寳二年二月詔曰一日必葺昔賢之能事如聞諸道藩鎮郡邑公宇及倉庫凡有墮壊弗即繕修因循嵗時以至頽毁及僝工充役則倍增勞費目今節度觀察防禦團練使刺史知州通判等罷任其治所廨舍有無隳壊及所増修著以為籍迭相符授幕職州縣官受代則對書於考課之厯損壊不全者殿一選修葺建置而不煩民者加一選太祖創業方十年而聖意下逮克勤小物一至於此後之當官者不復留意以興仆植僵為務則暗於事體不好稱人之善者徃徃翻指為妄作名色盜隠官錢至於使之束手諱避忽視傾陋逮於不可奈何而後已殊不思貪墨之吏欲為姦者無施不可何必假於營造一節乎治厯明時易革之彖曰天地革而四時成湯武革命順乎天而應乎人魏晉而降凡及禪代者必据以為說案漢轅固與黄生爭論湯武於景帝前但評受命之是非不引易為證卦之象曰君子以治厯明時其義了不相渉偃孫頗留意厯學云按唐一行大衍厯日度議曰顓帝厯上元甲寅正月甲寅晨初合朔立春七曜皆直艮維之首湯作殷厯更以十一月合朔冬至為上元周人因之此謂治厯也至於三統之建夏以寅為嵗首得人統殷以丑為得地統周武王改從子為得天統此謂明時也其革命之說劉歆作三統厯及譜引革彖湯武革命又曰治厯明時所以和人道也如是而已其前又引逸書曰先其革命顔師古曰言王者統業先立筭數以命百事也推此而伸之所云革命蓋謂是耳非論其取天下也況大衍之用四十有九一行以之起厯而革卦之序在周易正當四十九然則專為厯甚明考其上句尤極顯白然諸儒贊易皆不及此王弼亦無一言仕宦捷疾唐傳遊藝以期年之中厯衣青綠朱紫時人謂之四時仕宦言其速也國朝惟綠緋紫三等而紫袍者除武臣外文官之制其别有六庶僚黒角𢃄佩金魚未至侍從而特賜𢃄者為荔枝五子不佩魚中書舍人諫議待制權侍郎紅鞓黒犀𢃄佩魚權尚書御史中丞資政端明殿閣學士直學士正侍郎給事中金御仙花帶不佩魚謂之横金翰林學士以上正尚書御仙𢃄佩魚謂之重金執政官宰相方團毬文𢃄俗謂之笏頭者是也其叙如此若猛進躐得者則不然紹興中宋樸自侍御史遷中丞施鉅自中書檢正鄭仲熊自右正言並遷權侍郎三人皆受告日易服以正謝日拜執政樸鉅以緋仲熊以綠服紫之次日而賜毬文帶蓋侍從以下俟正謝乃易帶而執政命才下即遣中使齎賜遂服之而赴都堂供職可謂捷疾矣若李綱則又異於是宣和七年十二月二十九日自太常少卿除兵部侍郎未謝閒靖康元年正月四日胡騎將至京城綱以邊事求見宰執奏事未退綱語知閤門事朱孝莊曰有急切公事欲與宰執廷辯孝莊曰舊例未有宰執未退而從官求對者綱曰此何時而用例邪孝莊即具奏詔引綱立於執政之末時宰執議欲奉鑾輿出狩襄鄧綱請固守上曰誰可將者綱曰願以死報第人㣲官卑恐不足以鎮服士卒白時中乞以為禮部尚書綱曰亦只是侍從即命除尚書右丞綱曰臣未正謝猶衣綠非所以示中外即靣賜袍帶并笏綱服之以謝且言方時艱難臣不敢辭此為不經緋紫而極其服章未之有也詞臣益輕治平以前謂翰林學士及知制誥為兩制自翰林罷補外者得端明殿學士謂之換職熈寧之後乃始為龍圖紹興以來愈不及矣修起居注者序遷知制誥其次及辭不為者乃為待制趙康靖馮文簡曾魯公司馬公吕正獻公是也學士闕則次補或為宰相所不樂者猶得侍讀學士劉元甫是也在職未久而外除者為樞宻直學士韓魏公是也亦為龍圖直學士歐陽公是也後來褒擢者僅得待制王時亨是也餘以善去者集英修撰而止耳夏英公好處夏英公既失時譽且以慶厯聖徳頌之故不正之名愈彰然固自有好處夏羗之叛英公為四路經畧安撫招討使韓魏公副之賊犯山外韓公令大將任福自懐逺城趨得勝寨出賊後如未可戰即踞險置伏要其歸戒之至再又移檄申約茍違節度雖有功必斬福竟為賊誘没于好水川朝論歸咎於韓英公使人收散兵得韓檄於福衣帶間言罪不在韓故但奪一官英公此事賢矣而後來士大夫未必知也予是以表出之神宗用人神宗用人進退遲速不執一端茍其材可任則超資越級曾不少靳非拘拘於愛惜名噐也宋琪自員外郎以正月擢拜諫議大夫三月參知政事太宗將用李昉時昉官工部尚書七月特遷琪刑書遂並命為相而琪居昉上自外郎嵗中至此石熈載以太平興國四年正月自右補闕今朝奉郎為兵部員外郎今朝請郎樞宻直學士才七日簽書院事四月拜給事中今通議大夫為副樞十月遷刑部侍郎今正議六年遷户部尚書今銀青光禄為使八年罷為右僕射今特進從初至此五嵗用今時階秩言之乃是朝奉郎而為特進也當日職名唯有宻直多從庻僚得之旋即大用張齊賢王沔皆自補闕直史舘遷郎中充學士越半嵗並遷諌議簽樞温仲舒冦凖皆自正言今承議郎直館遷郎中充職二年並為樞宻副使向敏中自工部郎中以本官充職越三月同知宻院錢若水自同州推官入直史館踰年擢知制誥二年除翰林學士遂以諌議同知宻院首尾五年至道九老李文正公昉罷相後只居京師以司空致仕至道元年年七十二矣思白樂天洛中九老之㑹適交游中有此數曰太子中允張好問年八十五太常少卿李運年八十故相吏部尚書宋琪廬州節度副使武允成皆七十九吳僧贊寧年七十八郢州刺史魏丕年七十六左諌議大夫楊徽之年七十五水部郎中朱昻與昉皆七十一欲繼其事為宴集㑹蜀冦起而罷其中兩宰相乃著一僧唐世及元豐耆英所無也次年李公即世此事竟不成耋老康寧相與燕嬉於升平之世而雅懐弗遂造物豈亦吝此耶李文正兩罷相宰相拜罷恩典重輕詞臣受㫖者得以高下其手李文正公昉太平興國八年以工部尚書為集賢史館相端拱元年為布衣翟馬周所訟太宗召學士賈黄中草制罷為右僕射令詔書切責黄中言僕射百寮師長今自工書拜乃為殊遷非黜責之義若以均勞逸為辭斯為得體上然之其詞略云端揆崇資非賢不授昉素高聞望久展謨猷謙和秉君子之風純懿擅吉人之美輟從三事揔彼六卿用資鎮俗之清規式表尊賢之茂典其美如此淳化二年復歸舊㕔四年又罷優加左僕射學士張洎言近者霖霔百餘日昉職在爕和隂陽不能決意引退僕射之重右減於左位望不侔因而授之何以示勸上批洎奏尾止令罷守夲官洎遂草制峻詆腦詞云爕和隂陽輔相天地此宰相之任也茍或依違在位啓沃無聞雖居廊廟之崇莫著彌綸之効宜敷朝㫖用罷鼎司昉自處機衡曾無規畫擁化源而滋久孤物望以何深俾長中䑓尚為優渥可依前尚書右僕射罷知政事歴考前後制麻只言可某官其云罷知政事者洎創增之也國史昉𫝊云昉厚善洎及昉罷洎草制乃如此紹興二十九年沈該罷制學士周麟之於結句後添入可罷尚書左僕射同平章事盖用此云容齋四筆卷十二欽定四庫全書容齋四筆卷
