body:
  text: 韓栁為文之㫖韓退之自言作為文章上規姚姒盤誥春秋易詩左氏莊騷太史子雲相如閎其中而肆其外栁子厚自言每為文章本之書詩禮春秋易參之榖梁氏以厲其氣參之孟荀以暢其支參之莊老以肆其端參之國語以博其趣參之離騷以致其幽參之太史公以著其潔此韓栁為文之㫖要學者宜思之李習之論文李習之答朱載言書論文最為明白周盡云六經創意造言皆不相師故其讀春秋也如未嘗有詩也其讀詩也如未嘗有易也其讀易也如未嘗有書也其讀屈原莊周也如未嘗有六經也如山有岱華嵩衡焉其同者髙也其草木之榮不必均也如瀆有濟淮河江焉其同者出源到海也其曲直淺深不必均也天下之語文章有六說焉其尚異者曰文章詞句竒險而已其好理者曰文章敘意苟通而已溺於時者曰文章必當對病於時者曰文章不當對愛難者曰宜深不當易愛易者曰宜通不當難此皆情有所偏滯未識文章之所主也義不深不至於理而辭句怪麗者有之矣劇秦美新王襃僮約是也其理往往有是者而詞章不能工者有之矣王氏中說俗傳太公家教是也古之人能極於工而已不知其辭之對與否易與難也憂心悄悄愠于羣小非對也遘閔既多受侮不少非不對也朕堲讒說殄行震驚朕師菀彼桑柔其下侯旬捋采其劉非易也光被四表格于上下十畝之閒兮桑者閑閑兮非難也六經之後百家之言興老聃列莊至於劉向揚雄皆自成一家之文學者之所師歸也故義雖深理雖當詞不工者不成文宜不能傳也其論於文者如此後學宜志之魏鄭公諫語魏鄭公諫止唐太宗封禪中閒數語引喻剴切曰今有人十年長患療治且愈此人應皮骨僅存便欲使負米一石日行百里必不可得隋氏之亂非止十年陛下為之良醫疾苦雖已乂安未甚充實告成天地臣切有疑太宗不能奪此語見於公諫録及舊唐書而新史不載資治通鑑記其諫事亦刪此一節可惜也虞世南虞世南卒後太宗夜夢見之有若平生翌日下制曰世南奄随物化倐移嵗序昨因夜夢忽覩其人追懐遺美良増悲歎宜資冥助申朕思舊之情可於其家為設五百僧齋并為造天尊像一軀夫太宗之夢世南蓋君臣相與之誠所致宜恤其子孫厚其恩典可也齋僧造像豈所應作形之制書著在國史惜哉太宗而有此也七發枚乗作七發創意造端麗㫖腴詞上薄騷些蓋文章領袖故為可喜其後繼之者如傅毅七激張衡七辯崔駰七依馬融七廣曹植七啓王粲七釋張協七命之類規倣太切了無新意傅𤣥又集之以為七林使人讀未終篇往往棄諸几格栁子厚晉問乃用其體而超然别立新機杼激越清壯漢晉之閒諸文士之弊於是一洗矣東方朔答客難自是文中傑出揚雄擬之為解嘲尚有馳騁自得之妙至於崔駰逹㫖班固賔戲張衡應閒皆屋下架屋章摹句寫其病與七林同及韓退之進學解出於是一洗矣毛頴傳初成世人多笑其怪雖裴晉公亦不以為可惟栁子獨愛之韓子以文為戲本一篇耳妄人既附以革華傳至於近時羅文江瑤葉嘉陸吉諸傳紛紜雜沓皆託以為東坡大可笑也將軍官稱前漢書百官表將軍皆周末官秦因之予按國語鄭文公以詹伯為將軍又呉夫差十旌一將軍左傳豈將軍食之而有不足檀弓衛將軍文子魯使慎子為將軍然則其名乆矣彭寵為奴所縛呼其妻曰趣為諸將軍辦裝東漢書注云呼奴為將軍欲其赦己也今吳人語猶謂小蒼頭為將軍蓋本諸此北道主人秦晉圍鄭鄭人謂秦盍舎鄭以為東道主蓋鄭在秦之東故云今世稱主人為東道者此也東漢載北道主人乃有三事常山太守鄧晨㑹光武於鉅鹿請從擊邯鄲光武曰偉卿以一身從我不如以一郡為我北道主人又光武至薊將欲南歸耿弇以為不可官屬腹心皆不肯光武指弇曰是我北道主人也彭寵將反光武問朱浮浮曰大王倚寵為北道主人今既不然所以失望後人罕引用之洛中盱江八賢司馬温公序賻禮書閭閻之善者五人吕南公作不欺述書三人皆以卑㣲不見於史氏予頃修國史將以綴于孝行傳而不果成聊紀之於此温公所書皆陕州夏縣人曰醫劉太居親䘮不飲酒食肉終三年以為今世士大夫所難能其弟永一尤孝友亷謹夏縣有水灾民溺死者以百數永一執竿立門首他人物流入門者輒擿出之有僧寓錢數萬於其室而死永一詣縣自陳請以錢歸其子弟鄉人負債不償者毁其劵曰周文粲其兄嗜酒仰弟為生兄或時酗毆粲鄰人不平而唁之粲怒曰兄未嘗毆我汝何離閒吾兄弟也曰蘇慶文者事繼母以孝聞常語其婦曰汝事吾母小不謹必逐汝繼母少寡而無子由是安其室終身曰臺亨者善畫朝廷修景靈宫調天下畫工詣京師事畢詔選試其優者留翰林授官禄亨名第一以父老固辭歸養於田里南公所書皆建昌南城人曰陳䇿嘗買騾得不可被鞍者不忍移之他人命養於野廬俟其自斃其子與猾駔計因經過官人䘮馬即磨破騾背以衒賈之既售矣䇿聞自追及告以不堪官人疑䇿愛也祕之策請試以鞍亢亢終日不得被始謝還焉有人從䇿買銀器若羅綺者䇿不與羅綺其人曰向見君帑有之今何靳䇿曰然有質錢而沒者嵗月已乆絲力糜脆不任用聞公欲以嫁女安可以此物病公哉取所當與銀器投熾炭中曰吾恐受質人或得銀之非真者故為公驗之曰危整者買鮑魚其駔舞秤權隂厚整魚人去身留整傍請曰公買止五斤巳為公宻倍入之願畀我酒整大驚追魚人數里返之醻以直又飲駔醇酒曰汝所欲酒而已何欺寒人為曰曽叔卿者買陶器欲轉易於北方而不果行有人從之併售者叔卿與之巳納價猶問曰今以是何之其人對欲効公前謀耳叔卿曰不可吾縁北方新有灾荒是故不以行今豈宜不告以誤君乎遂不復售而叔卿家苦貧妻子饑寒不恤也嗚呼此八人者賢乎哉王導小名顔魯公書逺祖西平靖侯顔含碑晉李闡之文也云含為光禄大夫馮懐欲為王導降禮君不從曰王公雖重故是吾家阿龍君是王親丈人故呼王小字晉書亦載此事而不書小字世說王丞相拜司空桓廷尉歎曰人言阿龍超阿龍故自超呼三公小字晉人浮虚之習如此漢書用字太史公陳渉世家今亡亦死舉大計亦死等死死國可乎又曰戍死者固什六七且壯士不死即已死即舉大名耳疊用七死字漢書因之漢溝洫志載賈讓治河䇿云河從河内北至黎陽為石隄激使東抵東郡平剛又為石隄使西北抵黎陽觀下又為石隄使東北抵東郡津北又為石隄使西北抵魏郡昭陽又為石隄激使東北百餘里閒河再西三東凡五用石隄字而不為冗複非後人筆墨畦徑所能到也姜嫄簡狄毛公注生民詩姜嫄生后稷履帝武敏歆之句曰從於髙辛帝而見於天也𤣥鳥詩天命𤣥鳥降而生商之句曰春分𤣥鳥降簡狄配髙辛帝帝與之祈于郊禖而生契故本其為天所命以𤣥鳥至而生焉其說本自明白至鄭氏箋始云帝上帝也敏拇也祀郊禖時有大人之迹姜嫄履之足不能滿履其拇指之處心體歆歆然如有人道感巳者遂有身後則生子又謂鳦遺卵簡狄吞之而生契其說本於史記謂姜嫄出野見巨人跡忻然踐之因生稷簡狄行浴見燕堕卵取吞之因生契此二端之怪妄先賢辭而闢之多矣歐陽公謂稷契非髙辛之子毛公於史記不取履迹之怪而取其訛繆之世次按漢書毛公治詩為河閒獻王博士然則在司馬子長之前數十年謂為取史記世次亦不然蓋世次之說皆出於世本故荒唐特甚其書今亡夫適野而見巨迹人將走避之不暇豈復故欲踐履以求不可知之禨祥飛鳥墮卵知為何物而遽取吞之以古揆今人情一也今之愚人未必爾而謂古聖人之后妃為之不待辨而明矣羌慶同音王觀國彦賔呉棫材老有學林及叶韻補注毛詩音二書皆云詩易太𤣥凡用慶字皆與陽字韻叶蓋𦍑字也引蕭該漢書音義慶音羌又曰漢書亦有作羌者班固幽通賦慶未得其云已文選作羌而他未有明證予按揚雄傳所載反離騷慶夭顦而䘮榮注云慶辭也讀與羌同最為切据佐命元臣盛王創業必有同徳之英輔成垂世乆長之計不如是不足以為一代宗臣伊尹周公之事見於詩書可考也漢蕭何佐髙祖其始入關即收秦丞相御史律令圖書以周知天下阸塞戸口多少強弱處民所疾苦髙祖失職為漢王欲攻項羽周勃灌嬰樊噲皆勸之何獨曰今衆弗如百戰百敗願王王漢中收用巴蜀然後還定三秦王用其言此劉氏興亡至計也進韓信為大將使當一面定魏趙燕齊髙祖得顓心與楚角無北顧憂且死引曹參代已而畫一之法成約三章以蠲秦暴拊百姓以申漢徳四百年基業此焉肇之唐房元齡佐太宗初在秦府已獨收人物致幕下與諸將宻相申結引杜如晦與參籌帷及為宰相粲然興起治功以州縣成天下之治以租庸調天下之財以八百府十六衛本天下之兵以諫争付王魏以兵事付靖勣御夷狄有道用賢材有術三百年基業此焉肇之其後制節度使而州縣之治壊更二稅法而租庸之理壊變府兵為彍騎諸衛為神䇿而軍政壊雖有明臣良輔不能救也趙韓王佐藝祖監方鎮之勢削支郡以損其彊置轉運通判使掌錢榖以奪其富參命京官知州事以分其黨禄諸大功臣於環衛而不付以兵收天下驍銳於殿巖而不使外重建法立制審官用人一切施為至於今是頼此三君子之後代天理物碩大光明者世有其人所謂一時之相爾蕭之孫有罪及無子凡六絶國漢輒紹封之國朝褎録韓王苖裔未嘗或忘唯房公之亡未十年以其子故奪襲爵停配享訖唐之世不復續唐家亦少恩哉名世英宰曹參為相國日夜飲醇酒不事事而畫一之歌興王導輔佐三世無日用之益而嵗計有餘末年畧不復省事自歎曰人言我憒憒後人當思我憒憒謝安石不存小察經逺無競唐之房杜傳無可載之功趙韓王得士大夫所投利害文字皆寘二大甕滿則焚之李文靖以中外所陳一切報罷云以此報國此六七君子蓋非揚已取名瞭然使戸曉者真名世英宰也豈曰不事事哉檀弓誤字檀弓載呉侵陳事曰陳太宰嚭使於師夫差謂行人儀曰是夫也多言盍嘗問焉師必有名人之稱斯師也者則謂之何太宰嚭曰其不謂之殺厲之師與按嚭乃呉夫差之宰陳遣使者正用行人則儀乃陳臣也記禮者簡䇿差互故更錯其名當云陳行人儀使於師夫差使太宰嚭問之乃善忠宣公作春秋詩引斯事亦嘗辯正云薛能詩薛能者晩唐詩人格調不能髙而妄自尊大其海棠詩序云蜀海棠有聞而詩無聞杜子美於斯興象不出沒而有懐天之厚余謹不敢讓風雅盡在蜀矣吾其庶幾然其語不過曰青苔浮落處暮栁閒開時帶醉遊人挿連隂彼叟移晨前清露濕晏後惡風吹香少傳何許妍多畫半遺而已又有荔枝詩序曰杜工部老居兩蜀不賦是詩豈有意而不及歟白尚書曽有是作興㫖卑泥與無詩同予遂為之題不愧不負將來作者以其荔枝首唱愚其庶幾然其語不過曰顆如松子色如櫻未識蹉跎欲半生嵗杪監州曽見樹時新入座乆聞名而已又有折楊栁十首敘曰此曲盛傳為詞者甚衆文人才子各衒其能莫不條似舞腰葉如眉翠出口皆然頗為陳熟能專於詩律不愛随人搜難抉新誓脫常態雖欲勿伐知音者其舎諸然其詞不過曰華清髙樹出離宫南陌柔條帶暖風誰見輕隂是良夜瀑泉聲畔月明中洛橋晴影覆江船羌笛秋聲濕塞煙閒想習池公宴罷水蒲風絮夕陽天而已别有栁枝詞五首最後一章曰劉白蘇臺總近時當初章句是誰推纎腰舞盡春楊栁未有儂家一首詩自注云劉白二尚書繼為蘇州刺史皆賦楊栁枝詞世多傳唱雖有才語但文字太僻宫商不高耳能之大言如此但稍推杜陵視劉白以下蔑如也今讀其詩正堪一笑劉之詞曰城外春風吹酒旗行人揮袂日西時長安陌上無窮樹唯有垂楊管别離白之詞云紅板江橋清酒旗館娃宫暖日斜時可憐雨歇東風定萬樹千條各自垂其風流氣槩豈能所髣髴哉漢晉太常漢自武帝以後丞相無爵者乃封侯其次雖御史大夫亦不以爵封為閒唯太常一卿必以見侯居之而職典宗廟園陵動輒得咎由元狩以降以罪廢斥者二十人意武帝隂欲損侯國故使居是官以困之爾表中所載酇侯蕭壽成坐犧牲瘦蓼侯孔臧坐衣冠道橋壊鄲侯周仲居坐不收赤側錢繩侯周平坐不繕園屋睢陵侯張昌坐乏祠陽平侯杜相坐擅役鄭舞人廣阿侯任越人坐廟酒酸江鄒侯靳石坐離宫道橋苦惡戚侯李信成坐縱丞相侵神道俞侯欒賁坐雍犧牲不如令山陽侯張當居坐擇博士弟子不以實成安侯韓延年坐留外國文書新畤侯趙弟坐鞫獄不實牧丘侯石徳坐廟牲瘦當塗侯魏不害坐孝文廟風發瓦轑陽侯江徳坐廟郎夜飲失火蒲侯蘇昌坐泄官書弋陽侯任宫坐人盜茂陵園物建平侯杜緩坐盜賊多自酇侯至牧丘十四侯皆奪國武帝時也自當塗至建平五侯但免官昭宣時也下及晉世此風猶存惠帝元康四年大風廟闕屋瓦有數枚傾落免太常荀㝢五年大風蘭臺主者來索阿棟之閒得瓦小邪十五處遂禁止太常復興刑獄陵上荆一枝圍七寸二分者被斫司徒太常奔走道路太常禁止不解蓋循習漢事云容齋随筆卷七欽定四庫全書容齋隨筆卷
