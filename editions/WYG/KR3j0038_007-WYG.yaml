front:
  text: 子厚復杜温夫書云生用助字不當律令所謂乎歟耶哉夫也者疑辭也矣耳焉也者決辭也今生則一之宜考前聞人所使用與吾言類且異精思之則益也予讀孟子百里奚一章曰曽不知以食牛干秦繆公之為汙也可謂智乎不可諫而不諫可謂不智乎知虞公之將亡而先去之不可謂不智也時舉於秦知繆公之可與有行也而相之可謂不智乎味其所用助字開闔變化使人之意飛動此難以為温夫輩言也
