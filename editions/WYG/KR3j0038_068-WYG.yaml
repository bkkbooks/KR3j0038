seq: 68
front:
  text: 二二十則宋洪邁撰
  hash: sha256:eb36164a89ea3e9d86cadbc92024dd2fea6c7dc85bfe14d5a7fd3c28fcc9ff02
body:
  text: 諸家經學興廢稚子問漢儒所傳授諸經各名其家而今或存或不存請盡其本末為四筆一則乃為采摭班史及陸徳明經典釋文并他書刪取綱要詳載於此周易傳自商瞿始至漢初田何以之顓門其後為施讐孟喜梁邱賀之學又有京房費直髙相三家至後漢髙氏已微晉永嘉之亂梁邱之易亡孟京費氏人無傳者唯鄭康成王弼所注行于世江左中興欲置鄭易博士不果立而弼猶為世所重韓康伯等十人並注繋辭今唯韓傳尚書自漢文帝時伏生得二十九篇其後為大小夏侯之學古文者武帝時出於孔壁凡五十九篇詔孔安國作傳遭巫蠱事不獲以聞遂不列於學官其本殆絶是以馬鄭杜預之徒皆謂之逸書王肅嘗為注解至晉元帝時孔傳始出而亡舜典一篇乃取肅所注堯典分以續之學徒遂盛及唐以來馬鄭王注遂廢今以孔氏為正云詩自子夏之後至漢興分而為四魯申公曰魯詩齊轅固生曰齊詩燕韓詩皆列博士毛詩者出於河閒人大毛公為之故訓以授小毛公為獻王博士以不在漢朝不列於學鄭衆賈逵馬融皆作詩注及鄭康成作箋三家遂廢齊詩乆亡魯詩不過江東韓詩雖在人無傳者唯毛詩鄭箋獨立國學今所遵用漢髙堂生傳士禮十七篇即今之儀禮也古禮經五十六篇后蒼傳十七篇曰后氏曲臺記所餘二十九篇名為逸禮戴徳刪古禮二百四篇為八十五篇謂之大戴禮戴聖又刪為四十九篇謂之小戴禮馬融盧植考諸家異同附戴聖篇章去其煩重及所缺略而行於世即今之禮記也王莽時劉歆始建立周官經以為周禮在三禮中最為晚出左氏為春秋傳又有公羊糓梁鄒氏夾氏鄒氏無師夾氏無書公羊興於景帝時縠梁盛於宣帝時而左氏終西漢不顯迨章帝乃令賈逵作訓詁自是左氏大興二傳漸微矣古文孝經二十二章世不復行只用鄭注十八章本論語三家魯論語者魯人所傳即今所行篇次是也齊論語者齊人所傳凡二十二篇古論語者出自孔壁凡二十一篇各有章句魏何晏集諸家之説為集解今盛行於世漢人姓名西漢名人如公孫宏董仲舒朱買臣丙吉王褒貢禹皆有異世與之同姓名者戰國策及呂氏春秋齊有公孫宏與秦王孟嘗君言者明帝時又有幽州從事公孫宏交通楚王英見於虞延傳髙祖時又有謁者貢禹梁元帝時有武昌太守朱買臣尚書左僕射王褒後漢安帝時有太子㕑監邴吉南齊武帝之子巴東王子響為荆州刺史要直閣將軍董蠻與同行蠻曰殿下癲如雷敢相隨耶子響曰君敢出此語亦復竒癲上聞而不悦曰人名蠻復何容得醖藉乃改為仲舒謂曰今日仲舒何如昔日仲舒答曰昔日仲舒出自私庭今日仲舒降自先帝以此言之勝昔逺矣然此人後不復見輕浮稱謂南齊陸慧曉立身清肅為諸王長史行事僚佐以下造詣必起迎之或曰長史貴重不宜妄自謙屈答曰我性惡人無禮不容不以禮處人未嘗卿士大夫或問其故慧曉曰貴人不可卿而賤者乃可卿人生何容立輕重於懷抱終身常呼人位今世俗浮薄少年或身為卑官而與尊者言話稱其儕流必曰某丈談其所事牧伯監司亦然至於當他人父兄尊長之前語及其子孫甥壻亦云某丈或妄稱宰相執政貴人之字皆大不識事分者習慣以然元非簡傲也子常以戒兒輩云鬼谷子書鬼谷子與蘇秦張儀書曰二足下功名赫赫但春華至秋不得乆茂今二子好朝露之榮忽長乆之功輕喬松之永延貴一旦之浮爵夫女愛不極席男歡不畢輪痛哉夫君戰國策楚江乙謂安陵君曰以財交者財盡而交絶以色交者華落而愛渝是以嬖女不敝席寵臣不敝軒吕不韋說華陽夫人曰以色事人者色衰而愛弛詩氓之序曰華落色衰復相棄背是諸說大抵意同皆以色而為喻士之嗜進而不知自反者尚監兹哉有美堂詩東坡在杭州作有美堂㑹客詩頷聮云天外黑風吹海立浙東飛雨過江來讀者疑海不能立黄魯直曰蓋是為老杜所誤因舉三大禮賦朝獻太清宮云九天之雲下垂四海之水皆立以告之二者皆句語雄峻前無古人坡和陶停雲詩有雲屯九河雪立三江之句亦用此也張天覺小簡張天覺熈寧中為渝州南川宰章子厚經制夔夷狎侮州縣吏無人敢與共語部使者念獨張可亢之檄至夔子厚詢人才使者以告即呼入同食張著道士服長揖就坐子厚肆意大言張隨機折之落落出其上子厚大喜延為上客歸而薦諸王介甫遂得召用政和六年張在荆南與子厚之子致平一帖云老夫行年七十有四日閱佛書四五卷早晩食米一升麵五兩肉八兩魚酒佐之以此為常亦不服煖藥唯以呼吸氣晝夜合天度而已數數夢見先相公語論如平生豈其人在天仙間而老夫定中神遊或遇之乎嗟乎安得竒男子如先相公者一快吾胸中哉此帖藏致平家其曽孫簡刻諸石予今年亦七十四歲姪孫偲於長興得墨本以相示聊記之云城狐社䑕城狐不灌社䑕不燻謂其所棲宂者得所憑依此古語也故議論者率指人君左右近習為城狐社䑕予讀說苑所載孟嘗君之客曰狐者人之所攻也䑕者人之所燻也臣未嘗見稷狐見攻社䑕見燻何則所託者然也稷狐之字甚竒且新用兵為臣下利富公奉使契丹國主言欲舉兵公曰北朝與中國通好則人主專其利而臣下無所獲若用兵則利歸臣下而人主任其禍故北朝羣臣爭勸舉兵者此皆其自謀非國計也勝負未可知就使其勝所亡士馬羣臣當之歟抑人主當之歟是時語録傳於四方蘇明允讀至此曰此一叚議論古人有之否東坡年未十歲在傍對曰記得嚴安上書云今徇南夷朝夜郎略薉州建城邑深入匈奴燔其龍城議者美之此人臣之利非天下之長策也正是此意明允以為然予又記魏太武時南邊諸將表稱宋人大嚴將入寇請先其未發逆擊之魏公卿皆以為當崔伯深曰朝廷羣臣及西北守將從陛下征伐西平赫連北破蠕蠕多獲美女珍寶南邊諸將聞而慕之亦欲南鈔以取資財皆營私計為國生事不可從也魏主乃止其論亦然誌文不可冗東坡為張文定公作墓誌銘有答其子厚之一書云志文路中已作得太半到此百冗未絶筆計得十日半月乃成然書大事略小節已有六千餘字若纎悉盡書萬字不了古無此例也知之知之蓋當時厚之意但欲務多耳又一帖云志文謁告數日方冩得了謹遣持納衰病眼眩辭翰皆不佳不知可用否今誌文正本凡七千一百字銘詩百六十字云予鄉士作一列大夫小郡守行狀九千言衢州士人詣闕上書二萬言使讀之者豈不厭倦作文者宜戒之坡帖藏梁氏竹齋趙晉臣鐫石於湖南憲司楚觀趙殺鳴犢漢書劉輔傳谷永等上書曰趙簡子殺其大夫鳴犢孔子臨河而還張晏注曰簡子欲分晉國故先殺鳴犢又聘孔子孔子聞其死至河而還也顔師古曰戰國策說二人姓名云鳴犢鐸犨而史記及古今人表並以為鳴犢竇犨蓋鐸犢及竇其聲相近故有不同耳今永等指鳴犢一人不論竇犨也韓退之將歸操亦云孔子之趙聞殺鳴犢作予按今本史記孔子世家乃以為竇鳴犢舜華說苑權謀篇云晉有澤鳴犢犨其不同如此五帝官天下漢蓋寛饒奏封事引韓氏易傳言五帝官天下三王家天下家以傳子官以傳賢若四時之運成功者去坐指意欲求禪而死故或云自後稱天子為官家蓋出於此今世無韓氏易諸家注釋漢書皆無一語惟說苑至公篇云秦始皇帝既吞天下召羣臣議五帝禪賢三王世繼孰是博士鮑令之對曰天下官則選賢是也天下家則世繼是也故五帝以天下為官三王以天下為家始皇帝歎曰吾徳出于五帝吾將官天下誰可使代我後者此說可以為證輒記之以補漢注之缺蒋濟萬機論亦有官天下家天下之語黄帝李法漢書胡建傳黄帝李法蘇林曰獄官名也天文志左角李右角將顔師古曰李者法官之號也其書曰李法唐世系表李氏自臯陶為堯大理厯虞夏商世世作此官以官命族為理氏至紂之時逃難於伊侯之墟食木子得全遂改理為李氏予按今本漢書天文志騎官左角理乃用理字而史記天官書則為李說苑載胡建事亦為理法然則理李一也故左傳數云行李徃來杜預注曰行李使人也至鄭子産與晉盟于平邱則曰行理之命注亦云行理使人通聘問者其義益明臯陶作大理傳子孫不改迨商之季幾千二百年世官乆任倉氏庫氏不足道矣表系疑不可信抄傳文書之誤今代所傳文書筆吏不謹至於成行脫漏予在三館假庾自直類文先以正本㸃撿中有數卷皆以後板為前予令書庫整頓然後錄之他多類此周益公以蘇魏公集付太平州鏤板亦先為勘挍其所作東山長老語錄序云側定政宗無用所以為用因蹄得兎忘言而後可言以上一句不明白又與下不對折簡來問予億莊子曰地非不廣且大也人之所用容足爾然而厠足而墊之致黄泉知無用而後可以言用矣始驗側定政宗當是厠足致泉正與下文相應四字皆誤也因記曽紘所書陶淵明讀山海經詩云形夭無千歲猛志固常在疑上下文義若不貫遂取山海經參挍則云刑天獸名也口中好銜干戚而舞乃知是刑天舞干戚故與下句相應五字皆訛以語友人岑公休晁之道皆撫掌驚歎亟取所藏本是正之此一節甚類蘇集云二十八宿二十八宿宿音秀若考其義則止當讀如本音嘗記前人有說如此説苑辯物篇曰天之五星運氣於五行所謂宿者日月五星之所宿也其義昭然大觀元夕詩大觀初年京師以元夕張燈開宴時再復湟鄯徽宗賦詩賜羣臣其頷聮云午夜笙歌連海嶠春風燈火過湟中席上和者皆莫及開封尹宋喬年不能詩密走介求援於其客周子雍得句云風生閶闔春來早月到蓬萊夜未中為時輩所稱子雍汝隂人曽受學於陳無已故有句法則作文為詩者可無師承乎顔魯公帖顔魯公忠義氣節史策略盡偶閱臨汝石刻見一帖云政可守不可不守吾去歲中言事得罪又不能逆道茍時為千古罪人也雖貶居逺方終身不恥汝曹當須謂吾之志不可不守也此是獨赴謫地而與其子孫者無由考其歲月千載之下使人讀之尚可畏而仰也文潞公奏除改官制自熈寧以來士大夫資厯之法日趨於壞歲甚一歲乆而不可復清近年愈甚綜核之制未嘗能守偶見文潞公在元祐中任平章軍國重事宣仁面諭令具自來除授官職次序一本進呈公遂具除改舊制節目以奏其一云吏部選兩任親民有舉主升通判通判兩任滿有舉主升知州軍謂之常調知州軍有績効或有舉薦名實相副者特擢升轉運使副判官或提㸃刑獄府推判官謂之出常調轉運使有路分輕重逺近之差河北陜西河東三路為重路歲滿多任三司使副或發運使發運任滿亦充三司副使成都路次三路京東西淮南又其次江東西荆湖兩浙又次之二廣福建梓利夔路為逺小已上三等路分轉運任滿或就移近上次等路分或歸任省府判官漸次擢充三路重任内提㸃刑獄則不拘路分輕重除授潞公所奏乃是治平以前常行今一切蕩然矣京朝官未嘗肯兩任親民纔為通判便望州郡至於監司既無輕重逺近之閒不復以序升擢云待制知制誥慶厯七年曽魯公公亮自脩起居注除天章閣待制時陳恭公獨為相其弟婦王氏冀公孫女曽出也當月旦出拜恭公迎語之曰六新婦曽三做從官想甚喜應聲對曰三舅荷伯伯提挈極驩喜只是外婆不樂恭公問故曰外婆見三舅來謝責之曰汝第五人及第當過詞掖想是全廢學故朝廷如此處汝恭公黙然自失後竟改知制誥蓋恭公不由科第不諳典故致受譏於女子而此女對答之時元未嘗徃外家也其警慧如此國家故事修注官次補必知制誥惟趙康靖公以歐陽公位在下而欲先遷司馬公以力辭三字皆除待制其雜壓先後可見云裴行儉景陽裴行儉為定襄道大緫管討突厥大軍次單于北暮已立營塹壕既周更命徙營髙岡吏白士安堵不可擾不聽促徙之比夜風雨暴至前占營所水深丈餘衆莫不駭歎問何以知之行儉曰自今第如我節制毋問我所以知也按戰國策云齊韓魏共攻燕楚王使景陽将而救之暮舍使左右司馬各營壁地已植表景陽怒曰女所營者水皆至滅表此焉可以舍乃令徙明日大雨山水大出所營者水皆滅表軍吏乃服二事正同而景陽之事不傳北人重甘蔗甘蔗只生於南方北人嗜之而不可得魏太武至彭城遣人於武陵王處求酒及甘蔗郭汾陽在汾上代宗賜甘蔗二十條子虚賦所云諸柘巴且諸柘者甘柘也蓋相如指言楚雲夢之物漢郊祀歌泰尊柘漿亦謂取甘蔗汁以為飲容齋四筆卷二欽定四庫全書卷容齋四筆卷
