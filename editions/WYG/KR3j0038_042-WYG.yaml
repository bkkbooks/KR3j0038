front:
  text: 六十五則
  hash: sha256:9abb5007513693a6bb28a766560d63054fc8fea33204395e34894eeb4effaee2
body:
  text: 宋洪邁撰蕨萁養人自古凶年饑歳民無以食徃徃隨所值以爲命如范蠡謂吳人就蒲蠃於東海之濵蘇子卿掘野鼠所去草實及齧雪與旃毛并咽之王莽教民煮木爲酪南方人饑餓羣入野澤掘鳬茨鄧禹軍士食藻菜建安中咸陽人㧞取酸棗藜藿以給食晉郗鑒在鄒山兖州百姓掘野鼠蟄燕幽州人以桑椹爲糧魏道武亦以供軍岷蜀食芋如此而已吾州外邑􅰔崌山在樂平徳興境李羅萬斛山在浮梁樂平鄱陽境皆緜亘百餘里山出蕨萁乾道辛卯紹熈癸丑歳旱村民無食爭徃取其根率以昧旦荷鉏徃掘深至四五尺壯者日可得六十斤持歸搗取粉水澄細者煮食之如粔籹狀每根二斤可充一夫一日之食冬晴且暖田野閒無不出者或不逺數十里多至數千人自九月至二月終蕨抽拳則根無力於是始止蓋救餓羸者半年天之生物爲人世之利至矣古人不知用之傳記亦不載豈他邦不產此乎賢士隱居者士子脩已篤學獨善其身不求知於人人亦莫能知者所至或有之予每惜其無傳比得上虞李孟傳録示四事故謹書之其一曰慈溪蔣季莊當宣和閒鄙王氏之學不事科舉閉門窮經不妄與人接高抑崇閒居明州城中率一歳四五訪其廬季莊聞其至必倒屣出迎相對小室極意講論自晝竟夜殆忘寢食告去則送之數里相得驩甚或問抑崇曰蔣君不多與人周旋而獨厚於公公亦惓惓於彼願聞其故抑崇曰閌終歳讀書凡有疑而未判與所缺而未知者每積至數十輒一扣之無不迎刃而解而蔣之所長他人未必能知之世之所謂知己其是乎其二曰王茂剛居明之林村在巖壑深處有弟不甚學問使顓治生以餬口而刻意讀書足跡未嘗妄出尤􅃉於周易沈煥通判州事嘗訪之其見趣絶出於傳注之外云氣象嚴重窺其所得蓋進而未已也其三曰顧主簿不知何許人南渡後寓于慈溪廉介有常安於貧賤不蘄人之知至於踐履閒雖細事不苟也平旦起俟賣菜者過門問菜把直幾何隨所言酬之他飲食布帛亦然乆之人皆信服不忍欺苟一日之用足則玩心墳典不事交游里中有不安其分武斷彊忮者相與譏之曰汝豈顧主簿耶其四曰周日章信州永豐人操行介㓗爲邑人所敬開門授徒僅有以自給非其義一毫不取家至貧常終日絶食鄰里或以薄少致餽時時不繼寧與妻子忍餓卒不以求人隆寒披紙裘客有就訪亦欣然延納望其容貌聽其論議莫不聳然縣尉謝生遺以襲衣曰先生未嘗有求吾自欲致其勤勤耳受之無傷也日章笑答曰一衣與萬鍾等耳儻無名受之是不辨禮義也卒辭之汪聖錫亦知其賢以爲近於古之所謂獨行者是四君子眞可書史策云張籍陳無已詩張籍在他鎭幕府鄆帥李師古又以書幣辟之籍却而不納而作節婦吟一章寄之曰君知妾有夫贈妾雙明珠感君纒綿意繫在紅羅襦妾家高樓連苑起良人執㦸明光裏知君用心如日月事夫誓擬同生死還君明珠雙淚垂何不相逢未嫁時陳無已爲潁州教授東坡領郡而陳賦妾薄命篇言爲曾南豐作其首章云主家十二樓一身當三千古來妾薄命事主不盡年起舞爲主壽相送南陽阡忍著主衣裳爲人作春妍有聲當徹天有淚當徹泉死者恐無知妾身長自憐全用籍意或謂無已輕坡公是不然前此無已官於彭城坡公由翰林出守杭無已越境見之於宋都坐是免歸故其詩云一代不數人百年能幾見昔爲馬首銜今爲禁門鍵一雨五月涼中宵大江滿風㠶目力短江空歳年晩其尊敬之盡矣薄命擬况蓋不忍師死而遂倍之忠厚之至也杜詩誤字李適之在明皇朝爲左相爲李林甫所擠去位作詩曰避賢初罷相樂聖且銜盃爲問門前客今朝幾箇來故杜子美飲中八仙歌云左相日興費萬錢飲如長鯨吸百川銜盃樂聖稱避賢正詠適之也而今所行本誤以避賢爲世賢絶無意義兼世字是太宗諱豈敢用哉秦州雨晴詩云天永秋雲薄從西萬里風謂秋天遼永風從萬里而來可謂廣大而集中作天水此乃秦州郡名若用之入此篇其致思淺矣和李表文早春作云力疾坐淸曉來詩悲早春正答其意而集中作來時殊失所謂和篇本㫖東坡詩用老字東坡賦詩用人姓名多以老字足成句如壽州龍潭云觀魚并記老莊周病不赴會云空對親舂老孟光看潮云猶似浮江老阿童贈黃山人云說禪長笑老浮屠元長老衲裙云乞與佯狂老萬回東軒云挂冠知有老蕭郎侍立邇英云定是香山老居士贈李道士云知是香山老居士蒜山亭云奇逸多聞老敬通汶公東堂云一帖空存老遂良次韻韶守云華髪蕭蕭老遂良㳺羅浮云還須略報老同叔贈辯才云中有老法師寄子由云靑山老從事贈眼醫云忘言老尊宿妙高臺中老比邱謝惠酒云靑州老從事謝餉魚云誰似老方朔贈吳子野扇云得之老月師次韻李端叔云此是老牛戬是皆以爲助語非眞謂其老也大抵七言則於第五字用之五言則於第三字用之若其他錯出如再說走老瞞故人餘老龎老濞宫粧傳父祖便腹從人笑老韶老可能爲竹寫眞不知老奘幾時歸之類皆隨語勢而然白樂天云每被老元偷格律蓋亦有自來矣杜詩命意杜公詩命意用事㫖趣深逺若隨口一讀徃徃不能曉解姑紀一二篇以示好事者如能畫毛延壽投壺郭舍人每蒙天一笑復似物皆春政化平如水皇恩斷若神時時用抵戱亦未雜風塵第三聮意味頗與前語不相聮貫讀者或以爲疑按杜之㫖本謂技藝倡優不應蒙人主顧眄賞接然使政化如水皇恩若神爲治大要旣無所損則時時用此輩亦亡害也又如亂後碧井廢時淸瑶殿深銅缾未失水百丈有哀音側想美人意應悲寒甃沉蛟龍半缺落猶得折黃金此篇蓋見故宫井内汲者得銅缾而作然首句便說廢井則下文翻覆鋪叙爲難而曲折宛轉如是他人畢一生模寫不能到也又一篇云闘雞初賜錦舞馬旣登牀簾下宫人出樓前御柳長仙游終一閟女樂乆無香寂寞驪山道淸秋草木黃先忠宣公在北方得唐人畫驪山宫殿圖一軸華淸宫居山顚殿外垂簾宫人無數宂簾隙而窺一時伶官戲劇品類雜沓皆列于下杜一詩眞所謂親見之也擇福莫若重國語載范文子曰擇福莫若重擇禍莫若輕且士君子樂天知命全身逺害避禍就福安有迨于禍至擇而處之之理哉韋昭注云有兩福擇取其重有兩禍擇取其輕蓋以不幸而與禍會勢不容但已則權其輕重順受其一焉莊子養生主篇云爲善無近名爲惡無近刑夫孳孳爲善君子之所固然何至於縱意爲惡而特以不麗於刑爲得計哉是又有說矣其所謂惡者蓋與善相對之辭雖於徳爲愆義非若小人以身試禍自速百殃之比也故下文云可以全生可以保身可以盡年其㫖昭矣用人文字之失士人爲文或采已用語言當深究其㫖意苟失之不考則必詒論議紹興七年趙忠簡公重脩哲録書成轉特進制詞云惟宣仁之誣謗未明致哲廟之憂勤不顯此蓋用范忠宣遺表中語兩句但易兩字而甚不然范之辭云致保佑之憂勤不顯專指母后以言正得其實今以保佑爲哲廟則了非本意矣紹興十九年予爲福州教授爲府作謝厯日表頌徳一聮云神祇祖考旣安樂於太平歳月日時又明章於庶證至乾道中有外郡亦上表謝厯蒙其采取用之讀者以爲駢麗精切予笑謂之曰此大有利害今光堯在徳壽所謂考者何哉坐客皆縮頸信乎不可不審也李衞公輞川圖䟦輞川圖一軸李趙公題其末云藍田縣鹿苑寺主僧子良贄於予且曰鹿苑即王右丞輞川之第也右丞篤志奉佛妻死不再娶㓗居逾三十載母夫人卒表宅爲寺今冡墓在寺之西南隅其圖實右丞之親筆予閱玩珍重永爲家藏宏憲題其前一行云元和四年八月十三日宏憲題宏憲者吉甫字也其後衞公又䟦云乘閒閱篋書中得先公相國所收王右丞畫輞川圖實家世之寳也先公凡更三十六鎭故所藏書畫多用方鎭印記大和二年戊申正月四日浙江西道觀察等使撿挍禮部尚書兼潤州刺史李徳裕恭題又一行云開成二年秋七月望日文饒記前後五印曰淮南節度使印浙江西道觀察處置等使之印劒南西川節度使印山南西道節度使印鄭滑節度使印并贊皇二字又内合同印建業文房之印集賢院藏書印此三者南唐李氏所用故後一行曰昇元二年十一月三日雖今所傳爲臨本然正自超妙但衞公所志殊爲可疑唐書李吉甫傳云徳宗以來姑息藩鎭有終身不易地者吉甫爲相歲餘凡易三十六鎭吉甫平生只爲淮南節度耳今乃言身更三十六鎭誠大不然所用印記如浙西西川山西鄭滑皆衞公所歴也且書其父手澤不言第幾子而有李字又自標其字皆非是蓋好事者妄爲之白樂天詩所說淸源寺即輞川云洪慶善作丹陽洪氏家譜序云丹陽之洪本姓𢎞避唐諱改有𢎞憲者元和四年䟦輞川圖亦大錯也白公夜聞歌者白樂天琵琶行蓋在潯陽江上爲商人婦所作而商乃買茶於浮梁婦對客奏曲樂天移船夜登其舟與飲了無所忌豈非以其長安故倡女不以爲嫌邪集中又有一篇題云夜聞歌者時自京城謫潯陽宿於鄂州又在琵琶之前其詞曰夜泊鸚鵡洲秋江月澄澈鄰船有歌者發調堪愁絶歌罷繼以泣泣聲通復咽尋聲見其人有婦顏如雪獨倚㠶檣立娉婷十七八夜淚似眞珠雙雙墮明月借問誰家婦歌泣何凄切一問一霑襟低眉終不說陳鴻長恨傳序云樂天深於詩多於情者也故所遇必寄之吟詠非有意於漁色然鄂州所見亦一女子獨處夫不在焉𤓰田李下之疑唐人不譏也今詩人罕談此章聊復表出謝朏志節荀彧佐魏武帝劉穆之佐宋高祖高徳政佐齊文宣高熲佐隋文帝劉文靜佐唐高祖終之簒漢晉魏周及取隋其功不細矣彧以不言伏后事與勸止九錫飲酖而死穆之居守丹陽宋祖北伐而九錫之㫖從北來愧懼而卒徳政以精神凌逼爲楊愔所譖熲以爲相畜妾爲獨孤后所譖文靜以妾弟告變爲裴寂所譖皆不免於誅蕭道成謀簒宋欲引謝朏參贊大業屏人與之語朏無言道成必欲引參佐命以爲左長史從容閒道石苞事諷之朏訖不順指及受宋禪方爲侍中不肯解璽綬引枕而卧歩出府門道成之子賾欲殺之道成畏得罪於公議曰殺之適成其名正當容之度外耳遂廢于家海陵王之世復爲侍中宣城王鸞謀繼大統多引朝廷名士朏心不願乃求出爲吳興太守其弟瀹爲吏部尚書朏致酒與之曰可力飲此無預人事其心蓋惡鸞而末如之何也朏之志節行義凛凛如此司馬温公猶以爲譏斯亦可恕也已二筆於士匄韓厥下略及之故復詳論于此琵琶亭詩江州琵琶亭下臨江津國朝以來徃來者多題詠其工者輒爲人所傳淳熈己亥歳蜀士郭明復以中元日至亭賦古風一章其前云白樂天流落湓浦作琵琶行其放懷適意視憂患死生禍福得䘮爲何物非深於道者能之乎賈傅謫長沙抑鬱致死陸相竄南賔屏絶人事至從狗竇中度食飲兩公猶有累乎世未能如樂天逍遥自得也予過九江維舟琵琶亭下爲賦此章香山居士頭欲白秋風吹作湓城客眼看世事等虚空雲夢胸中無一物舉觴獨醉天爲家詩成萬象遭梳爬不管時人皆欲殺夜深江上聽琵琶賈胡老婦兒女語淚濕靑衫如著雨此公豈作少狂夢與世浮沉聊爾汝我來後公三百年潯陽至今無管絃公詩有潯陽小處無音樂之句長安不見遺音寂依舊康廬翠掃天郭君成都人隆興癸未登科仕不甚逹但賈誼自長沙召還後爲梁王傅乃卒前所云少誤矣吾州餘干縣東干越亭有琵琶洲在下唐劉長卿張祐輩皆留題紹興中王洋元勃一絶句云塞外風煙能記否天涯淪落自心知眼中風物參差是只欠江州司馬詩眞佳句也減損入官人唐開元十七年國子祭酒楊㻛上言省司奏限天下明經進士及第每年不過百人竊見流外出身每歳二千餘人而明經進士不能居其什一則是服勤道業之士不如胥吏之得仕也若以出身人太多則應諸色裁損不應獨抑明經進士當時以其言爲然淳熈九年大減任子員數是時吏部四選開具以三年爲率文班進士大約三四百人任子文武亦如之而恩倖流外蓋過二千之數甚與開元類也韓蘇文章譬喻韓蘇兩公爲文章用譬喻處重複聮貫至有七八轉者韓公送石洪序云論人高下事後當成敗若河決下流東注若駟馬駕輕車就熟路而王良造父爲之先後也若燭照數計而龜卜也盛山詩序云儒者之於患難其拒而不受於懷也若築河隄以障屋霤其容而消之也若水之於海冰之於夏日其翫而忘之以文辭也若奏金石以破蟋蟀之鳴蟲飛之聲蘇公百歩洪詩云長虹斗落生跳波輕舟南下如投梭水師絶呌鳬鴈起亂石一線爭蹉磨有如兎走鷹隼落駿馬下注千丈坡斷絃離柱箭脫手飛電過隙珠翻荷之類是也唐昭宗贈諫臣官唐僖宗幸蜀政事悉出内侍田令孜之手左拾遺孟昭圖右補闕常濬上䟽論事昭圖坐貶令孜遣人沉之於蟇頥津賜濬死資治通鑑記其事予讀昭宗實録即位之初贈昭圖起居郎濬禮部員外郎以其直諫被戮故褒之方時艱危救亡不暇而初政及此通鑑失書之亦可惜也容齋三筆卷六欽定四庫全書卷容齋三筆卷
