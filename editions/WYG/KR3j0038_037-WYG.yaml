front:
  text: 容齋三筆卷一十四則
  hash: sha256:e435bd977fd4fe0574d5083bb2be6fef020bee58a579f05026ec25508221c308
body:
  text: 宋洪邁撰晁景迃經說景迃子晁以道留意六經之學各著一書發明其㫖故有易規書傳詩序論中庸洪範傳三傳說其說多與世儒異謂易之學者所謂應所謂位所謂承乘所謂主皆非是大抵云繫辭言卦爻象數剛柔變通之類非一未嘗及初應四二應五三應六也以陽居陽以陰居陰爲得位得位者吉以陽居陰以陰居陽爲失位失位者凶然則九五九三六二六四俱善乎六五六三九二九四俱不善乎旣爲有應無應得位不得位之說而求之或不通則又爲承乘之說謂陰承陽則順陽承陰則逆陽乘柔則吉陰乘剛則凶其不思亦甚矣又必以位而論中正如六二九五爲中且正則六五九二俱不善乎初上三四永不得用中乎卦各有主而一槩主之於五亦非也其論書曰予於堯典見天文矣而言四時者不知中星禹貢敷土治水而言九州者不知經水洪範性命之原而言九疇者不知數舜於四凶以堯庭之舊而流放竄殛之穆王將善其祥刑而先醜其耄荒湯之伐桀出不意而奪農時文王受命爲僭王召公之不說類乎無上太甲以不順伊尹而放羣叔纔有流言而誅啓行孥戮之刑以誓不用命盤庚行劓殄之刑而遷國周人飲酒而死魯人不板幹而屋誅先時不及時而殺無赦威不可訖老不足敬禍不足畏凶徳不足忌之類惟此經遭秦火煨燼之後孔壁朽折之餘孔安國初以隷篆推科斗旣而古今文字錯出東京乃取正於杜林傳至唐彌不能一明皇帝詔衞包悉以今文易之其去本幾何其遠矣今之學者盡信不疑殆如手授於洙泗閒不亦惑乎論堯典中星云於春分日而南方井鬼七宿合昏畢見者孔氏之誤也豈有七宿百九度而於一夕閒畢見者哉此實春分之一時正位之中星非常夜昏見之中星也於夏至而東方角亢七宿合昏畢見者孔氏之誤也豈有七宿七十七度而於一夕閒畢見者哉此夏至一時之中星非常夜昏見者也秋分冬至之說皆然凡此以上皆晁氏之說所辯聖典非所敢知但驗之天文不以四時其同在天者常有十餘宿自昏至旦除太陽所舍外餘出者過三之二安得言七宿不能於一夕閒畢見哉蓋晁不識星故云爾其論詩序云作詩者不必有序今之說者曰序與詩同作無乃惑歟且逸詩之傳者岐下之石鼓也又安覩序邪謂晉武公盗立秦仲者石勒之流秦襄公取周地皆不應美文王有聲爲繼伐是文王以伐紂爲志武王以伐紂爲功庭燎沔水鶴鳴白駒箴規誨刺於宣王則雲漢韓奕崧高烝民之作妄也未有小雅之惡如此而大雅之善如彼者也謂子衿候人采緑之序駢蔓無益樛木日月之序爲自戾定之方中木瓜之序爲不純孟子荀卿左氏賈誼劉向漢諸儒論說及詩多矣未嘗有一言以詩序爲議者則序之所作晩矣晁所論是否亦未敢輒言但其中有云秦康公隳穆公之業日稱兵於母家自䘮服以尋干戈終身戰不知己而序渭陽稱其我見舅氏如母存焉是果純孝歟陳厲公弑佗代立而序墓門責佗無良師傅失其類矣予謂康公渭陽之詩乃贈送晉文公入晉時所作去其即位十六年衰服用兵蓋晉襄公耳傳云子墨衰絰者也康公送公子雍于晉蓋徇其請晉背約而與之戰康公何罪哉責其稱兵于母家則不可陳佗殺威公太子而代之故蔡人殺佗而立厲公非厲公罪也晁詆厲以申佗亦爲不可其論三傳謂杜預以左氏之耳目奪夫子之筆削公羊家失之舛雜而何休者又特負於公羊惟榖梁晩出監二氏之違畔而正之然或與之同惡至其精深遠大者眞得子夏之所傳范寗又因諸儒而博辯之申榖梁之志其於是非亦少公矣非若杜征南一切申傳汲然不敢異同也此論最善然則晁公之於羣經可謂自信篤而不詭隨者矣邳肜酈商漢光武討王郎時河北皆叛獨鉅鹿信都堅守議者謂可因二郡兵自送還長安惟邳肜不可以爲若行此策豈徒空失河北必更驚動三輔公旣西則邯鄲之兵不肯背城主而千里送公其離散逃亡可必也光武感其言而止東坡曰此東漢興亡之決邳肜亦可謂漢之元臣也肜在雲臺諸將中不爲人之所標異至此論出識者始知其然漢高祖没吕后與審食其謀曰諸將故與帝爲編户民今乃事少主非盡族是天下不安以故不發䘮酈商見食其曰誠如此天下危矣陳平灌嬰將十萬守滎陽樊噲周勃將二十萬定燕代此聞帝崩諸將皆誅必連兵還嚮以攻關中亡可蹻足待也食其入言之乃發䘮然則是時漢室之危幾於不保酈商笑談閒廓廓無事其功豈不大哉然無有表而出之者迨吕后之亡吕禄據北軍商子寄紿之出游使周勃得入則酈氏父子之於漢謂之社稷臣可也寄與劉揭同說吕禄解將印及文帝論功揭封侯賜金而寄不録平勃亦不爲之一言此又不可曉者其後寄嗣父爲侯又以罪免惜哉武成之書孔子言周之徳其可謂至徳也已矣三分天下有其二以服事殷所謂服事者美其能於紂之世盡臣道也而史記周本紀云西伯蓋受命之年稱王而斷虞芮之訟其後改法度制正朔追尊古公公季爲王是說之非自唐梁肅至于歐陽東坡公孫明復皆嘗著論然其失自武成始也孟子曰吾於武成取二三策而已矣今考其書云大王肇基王迹文王誕膺天命以撫方夏及武王自稱曰周王發皆紂尚在位之辭且大王居邠猶爲狄所迫逐安有肇基王迹之事文王但稱西伯焉得言誕膺天命乎武王未代商已稱周王可乎則武成之書不可盡信非止血流標杵一端也至編簡舛誤特其小小者云象載瑜漢郊祀歌象載瑜章云象載瑜白集西顔師古曰象載象輿也山出象輿瑞應車也赤蛟章云象輿轙即此也而景星章云象載昭庭師古曰象謂懸象也懸象祕事昭顯於庭也二字同出一處而自爲兩說按樂章詞意正指瑞應車言昭列於庭下耳三劉漢釋之說亦得之而謂白集西為西雍之麟此則不然蓋歌詩凡十九章皆書其名於後象載瑜前一行云行幸雍獲白麟作自爲前篇朝隴首覽西垠之章不應又於下篇贅出之也管晏之言孟子所書齊景公問於晏子曰吾欲觀於轉附朝儛遵海而南放於琅邪吾何脩而可以比於先王觀也晏子對曰天子諸侯無非事者春省耕而補不足秋省斂而助不給今也不然師行而糧食從流下而忘反謂之流從流上而忘反謂之連從獸無厭謂之荒樂酒無厭謂之亡先王無流連之樂荒亡之行景公說大戒於國管子内言戒篇曰威公將東游問於管仲曰我游猶軸轉斛南至琅邪司馬曰亦先王之游巳何謂也對曰先王之游也春出原農事之不本者謂之游秋出補人之不足者謂之夕夫師行而糧食其民者謂之亡從樂而不反者謂之荒先王有游夕之業於民無荒亡之行於身威公退再拜命曰寶法觀管晏二子之語一何相似豈非傳記所載容有相犯乎管氏旣自爲一書必不誤當更考之晏子春秋也共工氏禮記祭法漢書郊祀志皆言共工氏霸九州以其無録而王故謂之霸􅍓志則云雖有水徳在火木之閒非其序也任知刑以彊故伯而不王周人其行序故易不載注言以其非次故去之史記律書顓帝有共工之陳以平水害文潁曰共工主水官也少昊氏衰秉政作虐故顓帝伐之本主水官因爲水行也然左傳郯子所叙黃帝炎帝五代所名官共工氏以水紀故爲水師而水名杜預云共工氏以諸侯伯有九州者在神農之前太昊之後亦受水瑞以水名官蓋其與炎黃諸帝均受五行之瑞無所低昂是亦爲王明矣其子曰后土能平九州至今祀以爲社前所紀謂周人去其行序恐非也至於怒觸不周之山天傾西北地不滿東南此說尤爲誕罔洪氏出於此本曰共左傳所書晉左行共華魯共劉皆其裔也後又推本水徳之緒加水於左而爲洪云堯典所稱共工方鳩僝功即舜所流者非此也時以名官故舜命垂爲之漢志之誤昔人謂顏師古爲班氏忠臣以其注釋紀傳雖有舛誤必委曲爲之辨故也如五行志中最多其最顯顯者與尚書及春秋乖戾爲甚桑榖共生於朝劉向以爲商道旣衰高宗乘敝而起旣獲顯榮怠於政事國將危亡故桑糓之異見武丁恐駭謀於忠賢顔注曰桑榖自太戊時生而此云高宗時其說與尚書大傳不同未詳其義或者伏生差謬按蓺文志自云桑榖共生太戊以興鳴雉登鼎武丁爲宗乃是本書所言豈不可爲明證而翻以伏生爲謬何也僖公二十九年大雨雹劉向以爲信用公子遂遂專權自恣僖公不寤後二年殺子赤立宣公又載文公十六年蛇自泉宫出劉向以爲其後公子遂殺二子而立宣公此是文公末年事而劉向旣書之又誤以爲僖顏無所辨隱公三年日有食之劉向以爲其後鄭獲魯隱注引狐壤之戰隱公獲焉此自是隱爲公子時事耳左傳記之甚明宣公十五年王札子殺召伯毛伯董仲舒以爲成公時其他如言楚莊始稱王晉滅江之類顏雖隨事敷演皆云未詳其說終不肯正詆其疵也地理志中沛郡公丘縣曰故滕國周懿王子叔繡所封顏引左傳郜雍曹滕文之昭也爲證亦云未詳其義眞定之肥纍菑川之劇泰山之肥城皆以爲肥子國而遼西之肥如又云肥子奔燕燕封於此魏郡元城縣云魏公子元食邑於此因而遂氏焉常山元氏縣云趙公子元之封邑故曰元氏不應兩邑命名相似如此正文及志五引滹池河皆注云虖音呼池音徒河反又五伯迭興注云此五伯謂齊威宋襄晉文秦穆楚莊也而諸侯王表五伯扶其弱注云謂齊威宋襄晉文秦穆吳夫差也異姓諸侯王表適戍彊於五伯注云謂昆吾大彭豕韋齊威晉文也均出一書皆師古注辭而異同如此漢將軍在御史上漢書百官公卿表御史大夫掌副丞相位上卿銀印靑綬前後左右將軍亦位上卿而金印紫綬故霍光傳所載羣臣連名奏曰丞相敞大將軍光車騎將軍安世度遼將軍明友前將軍增後將軍充國御史大夫誼且云羣臣以次上殿然則凡雜將軍皆在御史大夫上不必前後左右也上元張燈上元張燈太平御覽所載史記樂書曰漢家祀太一以昏時祠到明今人正月望日夜游觀燈是其遺事而今史記無此文唐韋述兩京新記曰正月十五日夜勑金吾㢮禁前後各一日以看燈本朝京師增爲五夜俗言錢忠懿納土進錢買兩夜如前史所謂買宴之比初用十二十三夜至崇寧初以兩日皆國忌遂展至十七十八夜予按國史乾徳五年正月詔以朝廷無事區㝢乂安令開封府更增十七十八兩夕然則俗云因錢氏及崇寧之展日皆非也太平興國五年十月下元京城始張燈如上元之夕至淳化元年六月始罷中元下元張燈七夕用六日太平興國三年七月詔七夕嘉辰著於甲令今之習俗多用六日非舊制也宜復用七日且名爲七夕而用六不知自何時以然唐世無此說必出於五代耳宰相參政員數太祖登極仍用周朝范質王溥魏仁浦三宰相四年皆罷趙普獨相越三月始創參知政事之名而以命薛居正吕餘慶後益以劉熈古是爲一相三參及普罷去以居正及沈義倫爲相盧多遜參政太宗即位多遜亦拜相凡六年三相而無一參自後頗以二相二參爲率至和二年文彥博爲昭文相劉沆爲史館相富弼爲集賢相但用程戡一參惟至道三年吕端以右僕射獨相而吏部侍郎温仲舒兵部侍郎王化基工部尚書李至戸部侍郎李沆四參政前後未之有也朱崖遷客唐韋執誼自宰相貶崖州司戸刺史命攝軍事衙推牒詞云前件官乆在朝廷頗諳公事幸期佐理勿憚縻賢當時傳以爲笑然猶未至於挫抑也盧多遜罷相流崖州知州乃牙挍爲子求昏多遜不許遂侵辱之將加害不得已卒與爲昏紹興中胡邦衡銓竄新州再徙吉陽吉陽即朱崖也軍守張生亦一右列指使遇之亡狀每旬呈必令囚首詣廷下邦衡盡禮事之至作五十韻詩爲其生日壽性命之憂朝不謀夕是時黎酋聞邦衡名遣子就學其居去城三十里嘗邀致入山見軍守者荷枷絣西廡下酋指而語曰此人貪虐已甚吾將殺之先生以爲何如邦衡曰其死有餘罪果若此足以洗一邦怨心然旣蒙垂問切有獻焉賢郎所以相從者爲何事哉當先知君臣上下之名分此人固亡狀要之爲一州主所謂邦君也欲訴其過合以告海南安撫司次至廣西經畧司俟其不行然後訟于樞密院今不應擅殺人也酋悟遽釋之令自書一紙引咎乃再拜而出明日邦衡歸張詣門悔謝殊感再生之恩自此待爲上客邦衡以隆興初在侍從録所作生日詩示仲兄文安公且備言昔日事乃知去天萬里身䧟九淵日與死迫古今一轍也張士貴宋璟唐太宗自臨治兵以部陳不整命大將軍張士貴杖中郎將等怒其杖輕下士貴吏魏徴諫曰將軍之職爲國爪牙使之執杖已非後法况以杖輕下吏乎上亟釋之明皇開元三年御史大夫宋璟坐監朝堂杖人杖輕貶睦州刺史姚崇爲宰相弗能止盧懷謹亦爲相疾亟表言璟明時重器所坐者小望垂矜録上深納之太宗明皇有唐賢君也而以杖人輕之故加罪大將軍御史大夫可謂失政刑矣韓歐文語盤谷序云坐茂林以終日濯淸泉以自㓗采於山美可茹釣於水鮮可食醉翁亭記云野花發而幽香佳木秀而繁隂臨溪而漁溪深而魚肥釀泉爲酒泉香而酒冽山殽野蔌雜然而前陳歐公文勢大抵化韓語也然釣於水鮮可食與臨溪而漁溪深而魚肥采於山與山殽前陳之句煩簡工夫則有不侔矣容齋三筆卷一欽定四庫全書卷容齋三筆卷
