seq: 47
front:
  text: 惜之國史志載其事欲以為夸然不若掩之之為愈也沈括筆談云温州鴈蕩山前世人所不見故謝靈運為太守未嘗游歴因昭應宫採木深入窮山此境始露於外他可知矣
  hash: sha256:9c36dab7f86cacaf4939503e20cd35659f9213f4e4f14e68344b7d6727d0ea68
