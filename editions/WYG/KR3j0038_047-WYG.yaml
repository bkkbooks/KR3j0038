body:
  text: 嵗月日風雷雄雌虞喜天文論漢太初歴十一月甲子夜半冬至云嵗雄在閼逢雌在攝提格月雄在畢雌在觜日雄在子又云甲嵗雄也畢月雄也陬月雌也大抵以十千為嵗陽故謂之雄十二支為嵗隂故謂之雌但畢觜為月雄雌不可曉今之言隂陽者未嘗用雄雌二字也郎顗𫝊引易雌雄祕歴今亡此書宋玉風賦有雄風雌風之說沈約有雌霓連蜷之句春秋元命包曰隂陽合而為雷師曠占曰春雷始起其音格格其霹靂者所謂雄雷旱氣也其鳴依音音不大霹靂者所謂雌雷水氣也見法苑珠林予家有故書一種曰孝經雌雄圖云出京房易𫝊亦日星占相書也東坡三詩東坡初赴惠州過峽山寺不值主人故其詩云山僧本幽獨乞食況未還雲碓水自舂松門風為關石泉解娯客琴筑鳴空山既至惠州殘臘獨出至栖禪寺亦不逢一僧故其詩云江邊有微行詰曲背城市平湖春草合歩到栖禪寺堂空不見人老稚掩關睡所營在一食食已寧復事客行豈無得施子淨掃地風松獨不靜送我作鼓吹後在儋耳作觀棊詩記游廬山白鶴觀觀中人皆闔户晝寢獨聞棊聲云五老峰前白鶴遺址長松䕃庭風日清羙我時獨游不逢一士誰歟棊者户外屨二不聞人聲時聞落子其寂寞冷落之味可以想見句語之妙一至於此天文七政尚書舜典以齊七政孔安國本注謂日月五星也而馬融云七政者北斗七星各有所主第一主日第二主月第三曰命火謂熒惑也第四曰煞土謂填星也第五曰伐水謂辰星也第六曰危木謂嵗星也第七曰罰金謂太白也日月五星各異故曰七政尚書大傳一說又以為七政者謂春秋冬夏天文地理人道所以為政也人道正而萬事順成三說不同然不若孔氏之明白也符讀書城南符讀書城南一章韓文公以訓其子使之腹有詩書致力於學其意羙矣然所謂一為公與相潭潭府中居不見公與相起身自犂鋤等語乃是覬覦富貴為可議也杜牧之寄小姪阿宜詩亦云朝廷用文治大開官職塲願爾出門去取官如驅羊其意與韓類也予向為陳鑄作城南堂記亦及此意云致仕官上夀范蜀公自翰林學士以本官户部侍郎致仕仍居京師同天節乞隨班上夀許之遂著為令韓康公元祐二年以司空致仕太皇太后受册乞隨班稱賀而降詔免赴二者不同如此五經字義相反治之與亂順之與擾定之與荒香之與臭遂之與潰皆羙惡相對之字然五經用之或相反如亂臣十人亂越我家惟以亂民亂為四方新亂為四輔厥亂明我新造邦丕乃俾亂之類以亂訓治也安擾邦國擾而毅擾龍六擾之類以擾訓順也荒度土功遂荒大東大王荒之葛藟荒之之類以荒訓定也無聲無臭胡臭亶時其臭羶臭隂逹于淵泉之類以臭訓香也是用不潰于成草不潰茂之類以潰訓遂也鄭康成箋毛詩潰成與毛公皆釋為遂至於潰茂則以為潰當作彚彚茂貌也自為異同如此鎮星為福世之伎術以五星論命者大率以火土為惡故有晝忌火星夜忌土之語土鎮星也行遲每至一宫則二嵗四月乃去以故為灾最久然以國家論之則不然苻堅欲南伐嵗鎮守斗識者以為不利史記天官書云五潢五帝車舍火入旱金兵水水宋均曰不言木土者徳星不為害也又云五星犯北落軍起火金水尤甚木土軍吉又云鎮星所居國吉未當居而居已去而復還居之其國得土若當居而不居既已居之又西東去其國失土其居久其國福厚其居易輕速也福薄如此則鎮星乃為大福徳與木亡異豈非國家休祥所係非民庶可得侔邪東坡引用史𫝊東坡先生作文引用史𫝊必詳述本末有至百餘字者蓋欲使讀者一覽而得之不待復尋繹書䇿也如勤上人詩集叙引翟公罷廷尉賔客反覆事晁君成詩集叙引李郃漢中以星知二使者事上富丞相詩引左史倚相羙衞武公事答李琮書引李固論發兵討交趾事與朱鄂州書引王濬活巴人生子事盖公堂記引曹參治齊事滕縣公堂記引徐公事温公碑引慕容紹宗李勣事密州通判題名記引羊叔子鄒湛事荔枝歎詩引唐𦍑言荔枝事是也兩莫愁莫愁者郢州石城人今郢有莫愁村畫工傳其貌好事者多寫寄四逺唐書樂志曰莫愁樂者出於石城樂石城有女子名莫愁善歌謡古詞曰莫愁在何處莫愁石城西艇子打兩槳催送莫愁來者是也李義山詩曰海外徒聞更九州他生未卜此生休空𫝊虎旅鳴宵柝無復雞人送曉籌此日六軍同駐馬他時七夕笑牽牛如何四紀為天子不及盧家有莫愁此莫愁者洛陽人梁武帝河中之歌曰河中之水向東流洛陽女兒名莫愁莫愁十三能織綺十四采桑南陌頭十五嫁為盧家婦十六生兒似阿侯盧家蘭室桂為梁中有鬱金蘇合香頭上金釵十二行足下絲履五文章珊瑚挂鏡爛生光平頭奴子擎履箱人生富貴何所望恨不早嫁東家王者是也盧氏之盛如此所云不早嫁東家王莫詳其義近世周羙成樂府西河一闋専詠金陵所云莫愁艇子曾繫之語豈非誤指石頭城為石城乎何公橋詩英州小市江水貫其中舊架木作橋每不過數年輒為湍潦所壊郡守建安何智甫始疊石為之方成而東坡還自海外何求文以紀坡作四言詩一首凡五十六句今載於後集第八卷所謂天壤之間水居其多人之往來如鵜在河是也予侍親居英與僧希賜遊南山歩過橋上讀詩碑希賜云真本藏于何氏此有石刻經黨禁亦不存今以板刻之乃希賜所書也賜因言何公初請記坡為賦此詩既大書矣而未遣送郡候兵執役者見之以告何何又來謁坡曰軾未到橋所難以想像落筆何即命具食拉坡偕往坡曰使君是地主宜先升車何謝不敢乃並轎而行既至坡曰正堪作詩晚當奉戒抵暮送與之盖詩中云我來與公同載而出讙呼填道抱其馬足故欲同行以印此語耳坡公作詩時建中靖國元年辛巳予聞希賜語時紹興十七年丁卯相去四十六年今追憶前事乃紹熈五年甲寅又四十七年矣容齋三筆卷十一欽定四庫全書容齋三筆卷十二十六則宋洪邁撰眄泰秋娘三女白樂天鷰子樓詩序云徐州故張尚書有愛妓曰眄眄善歌舞雅多風態尚書既殁彭城有舊第第中有小樓名鷰子眄眄念舊愛而不嫁居是樓十餘年幽獨塊然白公嘗識之感舊游作二絶句首章云滿䆫明月滿簾霜被冷燈殘拂卧牀鷰子樓中霜月苦秋來只為一人長末章云今春有客洛陽回曾到尚書冡上來見說白楊堪作柱爭教紅粉不成灰讀者傷惻劉夢得泰娘歌云泰娘本韋尚書家主謳者尚書為呉郡得之誨以琵琶使之歌且舞携歸京師尚書薨出居民間為蘄州刺史張愻所得愻謫居武陵而卒泰娘無所歸地荒且逺無有能知其容與藝者故日抱樂器而哭劉公為歌其事云繁華一旦有消歇題劍無光履聲絶蘄州刺史張公子白馬新到銅駝里自言買笑擲黄金月墮雲中從此始山城少人江水碧斷鴈哀絃風雨夕朱弦已絶為知音雲鬢未秋私自惜舉目風煙非舊時夢尋歸路多參差如何將此千行淚更灑湘江斑竹枝杜牧之張好好詩云牧佐故吏部沈公在江西幕好好年十三以善歌來樂籍中隨公移置宣城後為沈著作所納見之於洛陽東城感舊傷懐題詩以贈曰君為豫章姝十三纔有餘主公再三歎謂言天下無自此每相見三日已為踈身外任塵土尊前極歡娯飄然集仙客載以紫雲車爾來未㡬嵗散盡髙陽徒洛陽重相見綽綽為當壚朋遊今在否落拓更能無問館慟哭後水雲秋景初洒盡滿襟淚短歌聊一書予謂婦人女子華落色衰至於失主無依如此多矣是三人者特見紀於英辭鴻筆故名𫝊到今況於士君子終身不遇而與草木俱腐者可勝歎哉然眄眄節義非泰娘好好可及也
