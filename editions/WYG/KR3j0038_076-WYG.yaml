seq: 76
front:
  text: 十十七則宋洪邁撰
  hash: sha256:b5e956255704f1f6b31921f41937542243d46a531e3bdd39b96a5aaafbad8353
body:
  text: 過所刑統衞禁律云不應度闗而給過所若冒名請過所而度者又云以過所與人又闗津疏議闗謂判過所之處津直度人不判過所釋名曰過所至闗津以示之或曰𫝊𫝊轉也轉移所在識以為信漢文帝十二年除闗無用傳張晏曰𫝊信也若今過所也兩行書繒帛分持其一出入闗合之乃得過謂之傳也魏志倉慈為敦煌太守西域雜胡欲詣洛者為封過所廷尉決事曰廣平趙禮詣雒治病門人齎過所詣洛陽責禮冒名渡津受一嵗半刑徐鉉稽神録道士張謹好符法客遊華隂得二奴曰徳兒歸寳謹愿可慿信張東行凡書囊符法過所衣服皆付歸寳負之將及闗二奴忽不見所齎之物皆失之矣時秦隴用兵闗禁嚴急客行無驗皆見刑戮既不敢東度復還主人乃見二兒因擲過所還之然過所二字讀者多不曉盖若今時公慿引㨿之類故裒其事于此露布用兵獲勝則上其功狀於朝謂之露布今博學宏詞科以為一題雖自魏晉以來有之然竟不知所出唯劉勰文心雕龍云露布者盖露板不封布諸觀聽也唐莊宗為晉王時擒滅劉守光命掌書記王緘草露布緘不知故事書之於布遣人曵之為議者所笑然亦有所從來魏高祖南伐長史韓顯宗與齊戍將力戰斬其禆將高祖曰卿何為不作露布對曰頃聞將軍王肅獲賊二三人驢馬數匹皆為露布私每哂之近雖得摧醜虜擒斬不多脫復高曵長縑虛張功捷尤而效之其罪彌甚臣所以斂毫卷帛解上而已以是而言則用絹高懸久矣東坡題潭帖潭州石刻法帖十卷盖錢希白所鑴最為善本吾鄉程欽之待詔以元符三年帥桂林東坡自儋耳移合浦得觀其藏帖每帖各題其末第二卷云唐太宗作詩至多亦有徐庾風氣而世不𫝊獨於初學記時時見之第四卷云吳道子始見張僧繇畫曰浪得名耳已而坐卧其下三日不能去庾征西初不服逸少有家雞野䳱之論後乃以為伯英再生今觀其書乃不逮子敬遠甚正可比羊欣耳第六卷云宰相安和殷生無恙宰相當是簡文帝殷生則淵源也邪第八卷云希白作字自有江左風味故長沙法帖比淳化待詔所摹為勝世俗不察爭訪閣下本誤矣此逸少一卷尤妙庚辰七夕合浦官舍借觀第九卷云謝安問獻之君書何如尊公答曰故自不同安曰外人不爾曰人那得知已上所書今麻沙所刋大全集志林中或有之案庾亮及弟翼俱為征西將軍坡所引者翼也坡又有詩曰暮年却得庾安西自厭家雞題六紙盖指翼前所厯官云此帖今藏予家山公啓事晉書山濤傳濤再居選職十有餘年每一官缺輙啓擬數人詔㫖有所向然後顯奏随帝意所欲為先故帝之所用或非舉首衆情不察以濤輕重任意或譖之於帝濤行之自若一年之後衆情乃􅆍濤所奏甄㧞人物各為題目時稱山公啓事此語今多引用然不得其式法帖中乃有之云侍中尚書僕射奉車都尉新㳫伯臣濤言臣近啓崔諒史曜陳准可補吏部郎詔書可爾此三人皆衆所稱諒尤質止少華可以崇教雖大化未可倉卒風尚所勸為益者多臣以為宜先用諒謹隨事以聞觀此一帖可以槩見然所啓三人後亦無聞既云皆衆所稱當不碌碌也舊潭帖為識者稱許以為賢於他本然於此奏未可倉卒之下乃云風筆惻然全無意義今所録者臨江本也親王回庶官書隨筆中載親王與侍從徃還禮數又得錢丕行年雜紀云昇王受恩命丕是時為將作少監亦投賀狀王降回書簽子啓頭繼為皇太子三司判官並通牓子詣内東門參賀通入後中貴出𫝊令㫖𫝊語及受冊寳訖百官班賀又赴東宫賀宰相親王階下班定太子降階宰相前拜致詞訖又拜太子皆答拜亦致詞叙謝一時之儀如此責降考試官天禧二年九月勑差屯田員外郎判度支計院任布著作郎直史館徐奭太子中允直集賢院麻温其並充開封府發解官十月差兵部員外郎直集賢院楊侃太子中允直集賢院丁度並國子監發解官十一月解一百四人解元郭稹十六日宣翰林學士錢惟演盛度樞密直學士王晦叔龍圖閣待制李虛已李行簡覆考開封舉人為落解舉人有訟不平者及奏名郭稹依舊其餘覆落并却考上人數甚多十二月發解官並降差遣任布鄧州徐奭洪州楊侃江州丁度齊州並監税此事見於錢丕雜紀用五侍從覆考解試前後未之有也青蓮居士李太白贈玊泉仙人掌茶詩序云荆州玉泉寺近清溪諸山徃徃有乳窟其水邉處處有茗草羅生枝葉如碧玊唯玊泉真公常采而飲之余遊金陵見宗僧中孚示予茶數十片其狀如手名為仙人掌茶盖新出乎玉泉之山曠古未覿因持以見遺兼贈詩要予答之遂有此作後之高僧大隠知仙人掌茶發乎中孚禪子及青蓮居士李白也太白之稱但有謫仙人爾青蓮居士獨於此見之文人未嘗引用而仙人掌茶今池州九華山中亦頗有之其狀畧如蕨拳也閩俗詭祕殺人姦㐫之民恃富逞力處心積慮果於殺人然揆之以法盖有勑律所不曾登載善治惡者當原情定罪必致其誅可也閩中習俗尤甚毎執縛其仇窮肆殘虐或以酒調鋸屑逼之使飲欲其粘着肺腑不能傳化馴致痰渴之疾或炒沙鎔蠟灌注耳中令其聾瞶或以濕薦束體布褁卵石痛加敺箠而外無痕傷或按擦肩背使皮膚寛皺乃施針刺入肩井不可復出或以小釣鈎藏於鰍魚之腹強使吞之攻鑽五臟久而必死凡此等者類非一端既痕腫不露於外撿驗不得而見情犯巨蠧功意兩惡而法所不言顔度魯子為轉運使嘗掲榜禁約予守建寧亦窮治一兩事吳楚間士大夫宦游於彼者不可不察也富公遷官富韓公慶厯二年以右正言知制誥報聘契丹還除吏部郎中樞密直學士不受尋除翰林學士又不受三年除右諫議大夫樞密副使力辭乃改資政殿學士而諫議如初公受之又五月復為副樞盖昔時除目才下即時命詞給告及其改命但不拜執政而猶得所進官用今日官制言之是承議郎舊為正言中書舍人舊知制誥而為太中大夫舊為諫議資政殿學士也唐藩鎮行墨勑池州銅陵縣孚貺侯廟有唐中和二年二月一碑其詞云勑宣歙池等州都團練觀察使牒當道先准詔㫖許行墨勑授管内諸州有功刺史大將等憲官具件如後晉朝故晉陽太守兼揚州長史張寛牒奉處分當道先准詔㫖許行墨勑奬勸功勳雖幽顯不同而襃昇一致神久標竒絶早揖英風靈跡屢彰神逵不昧夫寵贈之典非列藩宜為神功既昭乃軍都顒請是行權制用副人心謹議褒贈游擊將軍宣州都督後云使撿挍工部尚書兼御史大夫裴押邑人以為裴休秋浦志亦然予考之非也張魏公宣撫川陜便宜封爵諸神實本諸此吏部循資格唐開元十八年四月以侍中裴光庭兼吏部尚書先是選司注官惟視其人之能否或不次超遷或老於下位有出身二十餘年不得祿者又州縣亦無等級或自大入小或初近後逺皆無定制光庭始奏用循資格各以罷官若干選而集官高者選少卑者選多無問能否選滿則注限年躡級毋得踰越非負譴者皆有陞無降其庸愚沉滯者皆喜謂之聖書而材俊之士無不怨嘆宋璟爭之不能得二十一年光庭薨博士孫琬議光庭用循資格失勸奬之道請謚曰克是年六月制自今選人有才業操行委吏部臨時擢用雖有此制而有司以循資格便於己猶踵行之盖今日吏部四選乃其法也予案元魏肅宗神龜二年官員既少應選者多尚書李韶銓注不行大致怨嗟崔亮代之奏為格制不問士之賢愚專以停解月日為斷沉滯者皆稱其能亮甥劉景安與書曰商周以鄉塾貢士兩漢由州郡薦材魏晉中正雖未盡美應什收六七而朝廷貢材止求其文不取其理察孝廉唯論章句不及治道立中正不考材行空辨姓氏舅屬當銓衡宜須改張易調反為停年格以限之天下士子誰復修厲名行哉洛陽令薛琡上書言黎元命繫長吏若選曹惟取年勞不簡能否義均行鴈次若貫魚執簿呼名一人足矣數人而用何謂銓衡乞令王公貴人薦賢以補郡縣詔公卿議之其後甄琛等繼亮利其便已踵而行之魏之選舉失人自亮始也至孝靜帝元象二年以高澄攝吏部尚書始改亮年勞之制銓擢賢能當是自此一變光庭又祖亮故智云然後人罕有談亮澄事者五行納音六十甲子納音之說術家多不能曉原其所以得名皆從五音所生有條不紊端如貫珠盖甲子為首而五音始於宫宫土生金故甲子為金而乙丑以隂從陽商金生水故丙子為水而丁丑從之角木生火故戊子為火徴火生土故庚子為土羽水生木故壬子為木而已丑辛丑癸丑各從之至於甲寅則納音起於商商金生水故甲寅為水角木生火故丙寅為火徴火生土故戊寅為土羽水生木故庚寅為木宫土生金故壬寅為金而五卯各從之至甲辰則納音起於角角木生火故甲辰為火徴火生土故丙辰為土羽水生木故戊辰為木宫土生金故庚辰為金商金生水故壬辰為水而五已各從之宫商角既然惟徴羽不得居首於是甲午復如甲子甲申如甲寅甲戌如甲辰而五未五酉五亥亦各從其類五行化真五行運化如甲巳化真土之類若推求其義無從可得盖只以五虎元所生命之如甲巳之年丙作首謂丙寅月建也丙屬火火生土故甲巳化真土乙庚之嵗戊為頭謂戊寅月建也戊屬土土生金故乙庚化真金丙辛寄向庚寅去庚屬金金生水故丙辛化真水丁壬壬位順行流壬屬水水生木故丁壬化真木戊癸但向甲寅求甲屬木木生火故戊癸化真火此二說皆得之莆田鄭景實頃在舘中見魏㡬道談五行納音亦然錢忠懿判語王順伯家有錢忠懿一判語其狀云臣贊寧右臣伏奉宣㫖撰文疏今進呈乞給下取設齋日五更前上塔臣自宣却欲重建乞於仁政殿前夜間化却不然便向塔前化並取聖㫖判曰便要吾人宣讀後於真身塔前焚化二十七日而在前花押予謂錢氏固嘗三改元但或言其稱帝則否也此狀内進呈聖㫖等語盖類西河之人擬子夏於夫子故自貽僭帝之議想它所施行皆然矣王逸少為藝所累王逸少在東晉時盖温太真蔡謨謝安石一等人也直以抗懐物外不為人役故功名成就無一可言而其操履識見議論閎卓當世亦少其比公卿愛其才噐頻召不就殷淵源輔政勸使應命遺之書曰足下出處正與隆替對豈可以一世之存亡必從足下從容之適逸少報曰吾素自無廊廟王丞相欲内吾誓不許之手跡猶存由來尚矣不於足下參政而方進退自兒娶女嫁便懐尚子平之志數與親知言之非一日也及殷侯將北伐以為必敗貽書止之殷敗後復圖再舉又遺書曰以區區江左所營綜如此天下寒心久矣自冦亂以來處内外之任者疲竭根本各從所志竟無一功可論一事可紀任其事者豈得辭四海之責哉若猶以前事為未工故復求之於分外宇宙雖廣何所自容又與㑹稽王牋曰今雖有可欣之㑹内求諸已而所憂乃重於所欣以區區吳越經緯天下十分之九不亡何待願令諸軍皆還保淮須根立勢舉謀之未晩其識慮精深如是其至恨不見於用耳而為書名所盖後世但以翰墨稱之晉書夲贊標為唐太宗御撰專頌其研精篆素盡善盡美至有心慕手追之語畧無一詞論其平生則一藝之工為累大矣獻之立志亦似其父謝安欲使題太極殿榜以為萬代寳而難言之試及韋仲將凌雲榜事即正色曰使其若此有以知魏徳之不長遂不之逼觀此一節可以知其為人而亦以書名之故没其盛徳二王尚爾况於他人乎鄂州南樓磨崖慶元元年鄂州修南樓剥土有大石露于外竒崛可觀郡守吳琚見而愛之命洗剔出圭角即而諦視乃磨崖二碑其一刻兩字上曰栁徑二尺四寸筆勢清勁下若翻書人字唯存人脚不可復辨或以為符或以為花押邦人至標飭置神堂香火供事或云道州學側虞帝廟内亦有之云柳君名應辰是唐末五代時湖北人也其一高丈一尺闊如其高而加五寸刻大字八十五凡為九行其文曰乾正元年荆襄冦亂大吳將軍出陳武昌詔太守楊公出鎮後云荆江京漢推忠輔國侍衛將軍吳居中記案楊行密之子溥嗣吳王位是嵗唐明宗天成二年溥以十一月僭帝改元乾貞宋莒公紀年通譜書為乾正云避仁宗嫌名通鑑亦同而此直以為乾正一時所立不應有誤也賞魚袋出處隨筆書衡山唐碑别駕賞魚袋云名不可曉今按唐職林魚𢃄門叙金玊銀鐡𢃄及金銀魚袋云開元勑非灼然有戰功者餘不得輙賞魚袋斯明文也容齋四筆卷十欽定四庫全書容齋四筆卷十一宋洪邁撰
