  text: 一則
  hash: sha256:a1bb02af4558efe9f62283202caeb432a4dfe8bd02b1bbde0df7d7056122fda1
body:
  text: 宋洪邁撰進士試題唐穆宗長慶元年禮部侍郎錢徽知舉放進士鄭朗等三十三人後以段文昌言其不公詔中書舎人王起知制誥白居易重試駮放盧公亮等十人貶徽江州刺史白公集有奏狀論此事大略云伏料自欲重試進士以來論奏者甚衆葢以禮部試進士例許用書䇿兼得通宵得通宵則思慮必周用書冊則文字不錯昨重試之日書䇿不容一字木燭只許兩條廹促驚忙幸皆成就若比禮部所試事挍不同及駮放公亮等勑文以為孤竹管賦出於周禮正經閱其程試之文多是不知本末乃知唐試進士許挾書及見燭如此國朝淳化三年太宗試進士出巵言日出賦題孫何等不知所出相率扣殿檻乞上指示之上為陳大義景徳二年御試天道猶張弓賦後禮部貢院言近年進士惟鈔略古今文賦懐挾入試昨者御試以正經命題多懵所出則知題目不示以出處也大中祥符元年試禮部進士内出清明象天賦等題仍録題解摹印以示之至景祐元年始詔御藥院御試日進士題目具經史所出摹印給之更不許上請儒人論佛書韓文公送文暢序言儒人不當舉浮屠之說以告僧其語云文暢浮屠也如欲聞浮屠之說當自就其師而問之何故謁吾徒而來請也元㣲之作永福寺石壁記云佛書之妙奥僧當為予言予不當為僧言二公之語可謂至當和歸去來今人好和歸去來詞予最敬晁以道所言其答李持國書云足下愛淵明所賦歸去來辭遂同東坡先生和之僕所未喻也建中靖國間東坡和歸去來初至京師其門下賔客從而和者數人皆自謂得意也陶淵明紛然一日滿人目前矣參寥忽以所和篇示予率同賦予謝之曰童子無居位先生無並行與吾師共推東坡一人於淵明間可也參寥即索其文袖之出吳音曰罪過公悔不先與公話今輒以厚於參寥者為子言昔大宋相公謂陶公歸去來是南北文章之絶唱五經之鼓吹近時繪畫歸去來者皆作大聖變和其辭者如即事遣興小詩皆不得正中者也四海一也海一而已地之勢西北高而東南下所謂東北南三海其實一也北至於青滄則云北海南至於交廣則云南海東漸吳越則曰東海無由有所謂西海者詩書禮經所載四海葢引類而言之漢西域傳所云蒲昌海疑亦渟居一澤爾班超遣甘英徃條支臨大海葢即南海之西云李太白世俗多言李太白在當塗采石因醉泛舟於江見月影俯而取之遂溺死故其地有捉月臺予按李陽氷作太白草堂集序云陽氷試弦歌於當塗公疾亟草藁萬卷手集未修枕上授簡俾為序又李華作太白墓誌亦云賦臨終歌而卒乃知俗傳良不足信葢與謂杜子美因食白酒牛炙而死者同也太白雪䜛李太白以布衣入翰林旣而不得官唐史言高力士以脫鞾為恥摘其詩以激楊貴妃為妃所沮止今集中有雪䜛詩一章大率載婦人滛亂敗國其略云彼婦人之猖狂不如鵲之彊彊彼婦人之滛昏不如鶉之奔奔坦蕩君子無悅簧言又云妲己滅紂襃女惑周漢祖吕氏食其在傍秦皇太后毒亦滛荒螮蝀作昏遂掩太陽萬乘尚爾匹夫何傷詞殫意窮心切理直如或妄談昊天是殛予味此詩豈非貴妃與禄山滛亂而白曽發其姦乎不然則飛燕在昭陽之句何足深怨也冉有問衛君冉有曰夫子為衛君乎子貢曰吾將問之入曰伯夷叔齊何人也曰古之賢人也曰怨乎曰求仁而得仁又何怨出曰夫子不為也說者皆評較蒯瞶輒之是非多至數百言惟王逢原以十字蔽之曰賢兄弟譲知惡父子爭矣最為簡妙葢夷齊以兄弟譲國而夫子賢之則不與衞君以父子爭國可知矣晁以道亦有是語而結意不同尹彦明之說與逢原同唯楊中立云世之說者以謂善兄弟之讓則惡父子之爭可知失其㫖矣其意為不可曉商頌宋自微子至戴公禮樂廢壊正考甫得商頌十二篇於周之太師後又亡其七至孔子時所存才五篇爾宋商王之後也於先代之詩如是則其他可知夫子所謂商禮吾能言之宋不足徴也蓋有歎於此把以夏后之裔至於用夷禮尚何有於文獻哉郯國小於把宋少昊氏逺於夏商而鳳鳥名官郯子枚數不忘曰吾祖也我知之其亦賢矣俗語有所本俗語謂錢一貫有畸曰千一千二米一石有畸曰石一石二長一丈有畸曰丈一丈二之類按考工記殳長尋有四尺注云八尺曰尋殳長丈二史記張儀傳尺一之檄漢淮南王安書云丈一之組匈奴傳尺一牘後漢尺一詔書唐城南去天尺五之類然則亦有所本云鄱陽學鄱陽學在城外東湖之北相傳以為范文正公作郡守時所創予攷國史范公以景祐三年乙亥歲四月知饒州四年十二月詔自今須藩鎮乃得立學他州勿聽是月范公移潤州余襄公集有饒州新建州學記實起於慶歴五年乙酉歲其郡守曰都官員外郎張君其略云先是郡先聖祠宫棟宇隳剥前守亦嘗相土而未遑締治於是即其基於東湖之北偏而經營之浮梁人金君卿郎中作郡學荘田記云慶歴四年春詔郡國立學時守都官副郎張侯譚始營之明年學成與余公記合范公在饒時延君卿置館舍使公有意建學記中豈無一言及之蓋是時公既為執政去郡十年矣所謂前守相土者不知為何人國忌休務刑統載唐大和七年勑准令國忌日唯禁飲酒舉樂至於科罰人吏都無明文但縁其日不合釐務官曹即不得决斷刑獄其小小笞責在禮律固無所妨起今以後縱有此類臺府更不要舉奏舊唐書載此事因御史臺奏均王傅王堪男國忌日於私第科決作人故降此詔蓋唐世國忌休務正與私忌義等故雖刑獄亦不决斷謂之不合釐務者此也今在京百官唯雙忌作假以其拜跪多又晝漏已數刻若單忌獨三省歸休耳百司坐曹决獄與常日亡異視古誼為不同元微之詩云縛遣推囚名御史狼藉囚徒滿田地明日不推縁國忌又可證也漢昭順二帝漢昭帝年十四能察霍光之忠知燕王上書之詐誅桑𢎞羊上官桀後世稱其明然和帝時竇憲兄弟專權太后臨朝共圖殺害帝隂知其謀而與内外臣僚莫由親接獨知中常侍鄭衆不事豪黨遂與定議誅憲時亦年十四其剛决不下昭帝但范史發明不出故後世無稱焉順帝時梁商為大將軍輔政商以小黄門曹節用事於中遣子冀與交友而宦官忌其寵反欲害之中常侍張逵蘧政楊定等與左右連謀共譖商及中常侍曹騰孟賁云欲議廢立請収商等按罪帝曰大將軍父子我所親騰賁我所愛必無是但汝曹共妬之耳逵等知言不用遂出矯詔収縛騰賁帝震怒収逵等殺之此事尤與昭帝相類霍光忠於國而為子禹覆其宗梁商忠於國而為子冀覆其宗又相似但順帝復以政付冀其明非昭帝比故不為人所稱三女后之賢王莽女為漢平帝后自劉氏之廢常稱疾不朝㑹莽敬憚傷哀欲嫁之后不肯及莽敗后曰何面目以見漢家自投火中而死楊堅女為周宣帝后知其父有異圖意頗不平形於言色及禪位憤惋愈甚堅内甚愧之欲奪其志后誓不許乃止李昪女為吳太子璉妃昪既簒吳封為永興公主妃聞人呼公主則流涕而辭三女之事略同可畏而仰彼為其父者安所置愧乎賢父兄子弟宋謝晦為右衛將軍權遇已重自彭城還都迎家賔客輻湊兄瞻驚駭曰汝名位未多而人歸趣乃爾此豈門戸之福邪乃以籬隔門庭曰吾不忍見此又言於宋公裕特乞降黜以保衰門及晦立佐命功瞻意憂懼遇病不療而卒晦果覆其宗顔竣於孝武有功貴重其父延之常語之曰吾平生不喜見要人今不幸見汝嘗早詣竣見賓客盈門竣尚未起延之怒曰汝出糞土之中升雲霞之上遽驕傲如此其能乆乎竣竟為孝武所誅延之瞻可謂賢父兄矣隋高熲拜為僕射其母戒之曰汝富貴已極但有一斫頭爾熲由是常恐禍變及罷免為民歡然無恨色後亦不免為煬帝所誅唐潘孟陽為侍郎年未四十母曰以爾之材而位丞郎使吾憂之嚴武卒母哭曰而今而後吾知免為官婢三者可謂賢母矣褚淵助蕭道成簒宋為齊淵從弟炤謂淵子賁曰不知汝家司空將一家物與一家亦復何謂及淵為司徒炤歎曰門户不幸乃復有今日之拜淵卒世子賁恥其父失節服除遂不仕以爵與其弟屏居終身齊王晏助明帝奪國從弟思逺曰兄将來何以自立若及此引决猶可保全門戸及拜驃騎将軍集㑹子弟謂思逺兄思微曰隆昌之末阿戎勸吾自裁若從其語豈有今日思逺曰如阿戎所見今猶未晚也晏歎曰世乃有勸人死者晏果為明帝所誅炤賁思逺可謂賢子弟矣蔡君謨帖蔡君謨一帖云襄昔之為諫臣與今之為詞臣一也為諫臣有言責世人自見踈今無是焉世人見親襄之於人未始異之而人之觀故有以異也觀此帖乃知昔時居臺諫者為人所踈如此今則反是方為此官時其門揮汗成雨一徙他局可張爵羅風俗媮薄甚矣又有送茘枝與昭文相公一帖云襄再拜宿來伏惟台候起居萬福閩中荔枝唯陳家紫號為苐一輒獻左右以伸野芹之誠幸賜収納謹奉手状上聞不宣襄上昭文相公閣下是時侍從與宰相徃還其禮葢如是今之不情苛禮吁可厭哉親王與從官徃還神宗有御筆一紙乃為潁王時封還李受門状者状云右諌議大夫天章閣待制兼侍講李受起居皇子大王而其外封題曰台銜回納下云皇子忠武軍節度使撿挍太尉同中書門下平章事上柱國潁王名謹封名乃親書其後受之子覆以黄繳進故藏于顯謨閣先公得之於燕始知國朝故事親王與從官徃還公禮如此三傳記事秦穆公襲鄭晉納邾㨗菑三傳所書略相似左氏書秦事曰把子自鄭告于秦曰潛師以來國可得也穆公訪諸蹇叔蹇叔曰勞師以襲逺非所聞也且行千里其誰不知公辭焉召孟明出師蹇叔哭之曰孟子吾見師之出而不見其入也公曰爾何知中夀爾墓之木拱矣蹇叔之子與師哭而送之曰晉人禦師必於殽殽有二陵焉必死是間余収爾骨焉秦師遂東公羊曰秦伯将襲鄭百里子與蹇叔子諌曰千里而襲人未有不亡者也秦伯怒曰若爾之年者宰上之木拱矣爾曷知師出百里子與蹇叔子送其子而戒之曰爾即死必於殽嶔巖吾将尸爾焉子揖師而行百里子與蹇叔子從其子而哭之秦伯怒曰爾何為哭吾師對曰臣非敢哭君師哭臣之子也榖梁曰秦伯将襲鄭百里子與蹇叔子諌曰千里而襲人未有不亡者也秦伯曰子之冡木已拱矣何知師行百里子與蹇叔子送其子而戒之曰女死必於殽之巖唫之下我将尸女於是師行百里子與蹇叔子隨其子而哭之秦伯怒曰何為哭吾師也二子曰非敢哭師也哭吾子也我老矣彼不死則我死矣其書邾事左氏曰邾文公元妃齊姜生定公二妃晉姬生捷菑文公卒邾人立定公捷菑奔晉晉趙盾以諸侯之師八百乘納之邾人辭曰齊出貜且長宣子曰辭順而弗從不祥乃還公羊曰晉郤缺帥師革車八百乘以納接菑于邾婁力沛然若有餘而納之邾婁人辭曰接菑晉出也貜且齊出也子以其指則接菑也四貜且也六子以大國壓之則未知齊晉孰有之也貴則皆貴矣雖然貜且也長郤缺曰非吾力不能納也義實不爾克也引師而去之榖梁曰長轂五百乘緜地千里過宋鄭滕薛夐入千乘之國欲變人之主至城下然後知何知之晚也捷菑晉出也貜且齊出也貜且正也捷菑不正也予謂秦之事榖梁紆餘有味邾之事左氏語簡而切欲為文記事者當以是觀之張嘉貞唐張嘉貞為并州長史天兵軍使明皇欲相之而忘其名詔中書侍郎韋抗曰朕嘗記其風操今為北方大将張姓而複名卿為我思之抗曰非張齊邱乎今為朔方節度使帝即使作詔以為相夜閱大臣表疏得嘉貞所獻遂相之議者謂明皇欲大用人而鹵莽若是非得嘉貞表疏則誤相齊邱矣予攷其事大為不然按開元八年嘉貞為相而齊邱以天寳八載始為朔方節度相去三十年安得如上所云者又是時明皇臨御未乆方勵精為治不應置相而不審其名位葢鄭處誨所著明皇雜録妄載其事史家誤采之也資治通鑑棄不取云張九齡作牛公碑張九齡為相明皇欲以涼州都督牛仙客為尚書執不可曰仙客河湟一使典耳擢自胥史目不知書陛下必用仙客臣實恥之帝不悅因是遂罷相觀九齡集中有贈涇州刺史牛公碑葢仙客之父譽之甚至云福善莫大於有後仙客為國之良用商君耕戰之圖修充國羌胡之具出言可復所計而然邊捍長城主恩前席正稱其在涼州時與所諫止尚書事亦才一年然則與仙客非有夙嫌特為公家忠計耳唐人告命唐人重告命故顔魯公自書告身今猶有存者韋述集賢注記記一事尤著漫載於此開元二十三年十月制加皇子榮王巳下官爵令宰相及朝官工書者就集賢院寫告身以進於是宰相張九齡裴耀卿李林甫朝士蕭太師嵩李尚書暠崔少保琳陳黄門希烈嚴中書挺之張兵部均韋太常陟褚諌議庭誨等十三人各寫一通装縹進内上大恱賜三相絹各三百匹餘官各二百匹以唐書考之是時十三王並授開府儀同三司詔詣東宫尚書省上日百官集送有司供帳設樂悉拜王府官屬而不書此事典章輕廢典章故事有一時廢革遂不可復者牧守銅魚之制新除刺史給左魚到州取州庫右魚合契周顯徳六年詔以特降制書何假符契遂廢之唐兩省官上事宰臣送上四相共坐一榻各据一隅謂之押角晉天福五年勑廢之容齋隨筆卷三欽定四庫全書容齋隨筆卷四二十三則宋洪邁撰
