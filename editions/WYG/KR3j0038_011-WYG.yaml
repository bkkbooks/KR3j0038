front:
  text: 十一十六則
  hash: sha256:e901448647ced00eb2912a60bff1e707712230a5155c62e6f681636384ca9e62
body:
  text: 宋洪邁撰將帥貪功以功名為心貪軍旅之寄此自將帥習氣雖古來賢卿大夫未有能知止自斂者也廉頗旣老飯斗米肉十斤被甲上馬以示可用致困郭開之口終不得召漢武帝大擊匈奴李廣數自請行上以為老不許良久乃許之卒有東道失軍之罪宣帝時先零羌反趙充國年七十餘上老之使丙吉問誰可將曰無踰於老臣者矣即馳至金城圖上方畧雖全師制勝而禍及其子卬光武時五溪蠻夷畔馬援請行帝愍其老未許援自請曰臣尚能被甲上馬帝令試之援據鞍顧眄以示可用帝笑曰矍鑠哉是翁也遂用為將果有壺頭之厄李靖為相以足疾就第㑹吐谷渾㓂邉即往見房喬曰吾雖老尚堪一行旣平其國而有高甑生誣罔之事幾於不免太宗將伐遼召入謂曰高麗未服公亦有意乎對曰今疾雖衰陛下誠不棄病且瘳矣帝憫其老不許郭子儀年八十餘猶為關内副元帥朔方河中節度不求退身竟為徳宗冊罷此諸公皆人傑也猶不免此况其下者乎漢二帝治盜漢武帝末年盗賊滋起大羣至數千人小羣以百數上使使者衣繡衣持節虎符發兵以興擊斬首大部或至萬餘級於是作沈命法曰羣盗起不發覺覺而弗捕滿品者二千石以下至小吏主者皆死其後小吏畏誅雖有盗弗敢發恐不能得坐課累府府亦使不言故盗賊寢多上下相為匿以避文法焉光武時羣盗處處並起遣使者下郡國聽羣盗自相紏擿五人共斬一人者除其罪吏雖逗留回避故縱者皆勿問聽以禽討為効其牧守令長坐界内有盗賊而不收捕者及以畏愞捐城委守者皆不以為負但取獲賊多少為殿最唯蔽匿者乃罪之於是更相追捕賊並解散此二事均為治盗而武帝之嚴不若光武之寛其効可睹也漢唐封襌漢光武建武三十年車駕東廵羣臣上言即位三十年宜封禪泰山詔曰即位三十年百姓怨氣滿腹吾誰欺欺天乎何事汙七十二代之編録若郡縣遠遣吏上壽盛稱虚美必髠令屯田從此羣臣不敢復言後二年上齋夜讀河圖㑹昌符曰赤劉之九㑹命岱宗感此文乃詔梁松等按索河雒䜟文言九世封禪事者遂奏三十六事於是求武帝元封故事以三月行封禪禮唐太宗貞觀五年羣臣以四夷咸服表請封禪詔不許六年復請上曰卿軰皆以封禪為帝王盛事朕意不然若天下乂安家給人足雖不封禪庸何傷乎昔秦始皇封禪而漢文帝不封禪後世豈以文帝之賢不及始皇邪且事天掃地而祭何必登泰山之顛封數尺之土然後可以展其誠敬乎已而欲從其請魏鄭公獨以為不可發六難以争之至以謂崇虚名而受實害㑹河南北大水遂寢十年復使房喬裁定其禮將以十六年二月有事于泰山㑹星字太微而罷予謂二帝皆不世出盛德之主灼知封禪之非形諸詔告可謂著明然不能幾時自為翻覆光武惑於䜟記太宗好大喜名以今觀之蓋所以累善政耳漢封禪記應劭漢官儀載馬第伯封禪儀記正紀建武東封事每稱天子為國家其敘山勢峭嶮登陟勞困之狀極工予喜誦之其略云是朝上山騎行往往道峻峭下騎歩牽馬乍歩乍騎且相半至中觀留馬仰望天關如從谷底仰觀抗峯其為高也如視浮雲其峻也石壁窅窱如無道徑遥望其人端如行朽兀或為白石或雪久之白者移過樹乃知是人也殊不可上四布僵卧石上亦頼齎酒脯處處有泉水復勉强相將行到天關自以已至也問道中人言尚十餘里其道旁山脅仰視巖石松樹欎欎蒼蒼若在雲中俛視谿谷碌碌不可見丈尺直上七里頼其羊腸逶迤名曰環道往往有絙索可得而登也兩從者扶挾前人相牽後人見前人履底前人見後人頂如畫初上此道行十餘歩一休稍疲咽脣燋五六歩一休牒牒據頓地不避暗濕前有燥地目視而兩腳不隨又云封畢詔百官以次下國家隨後道廹小歩從匍匐邪上起近炬火止亦駱驛歩從觸擊大石石聲正讙但讙石無相應和者腸不能已口不能黙明日太醫令問起居國家云昨上下山欲行迫前人欲休則後人所蹈道峻危險國家不勞又云東山名曰日觀鷄一鳴時見日始欲出長三丈所秦觀者望見長安吴觀者望見㑹稽周觀者望見齊凡記文之工悉如此而未嘗見稱於昔賢秦吴周三觀亦無曽用之者今應劭書脱畧唯劉昭補注東漢志僅有之亦非全篇也楊虞卿劉禹錫有寄毘陵楊給事詩云曽主魚書輕刺史今朝自請左魚來青雲直上無多地却要斜飛取勢回以其時考之蓋楊虞卿也按唐文宗大和七年以李徳裕為相與之論朋黨事時給事中楊虞卿蕭澣中書舍人張元夫依附權要上干執政下撓有司上聞而惡之於是出虞卿為常州刺史澣為鄭州刺史元夫為汝州刺史皆李宗閔客也他日上復言及朋黨宗閔曰臣素知之故虞卿軰臣皆不與美官徳裕曰給事中中書舍人非美官而何宗閔失色然則虞卿之刺毘陵乃為朝廷所逐耳禹錫猶以為自請詩人之言渠可信哉屯蒙二卦屯蒙二卦皆二陽而四隂屯以六二乘初九之剛蒙以六三乗九二之剛而屯之爻曰女子貞不字十年乃字蒙之爻曰勿用取女見金夫不有躬其正邪不同如此者蓋屯二居中得正不為初剛所誘而上從九五所以為貞蒙三不中不正見九二之陽悦而下從之而舍上九之正應所以勿用士之守身居世而擇所從所處尚監兹哉漢誹謗法漢宣帝詔羣臣議武帝廟樂夏侯勝曰武帝竭民財力奢泰無度天下虚耗百姓流離赤地數千里亡徳澤於民不宜為立廟樂於是丞相御史劾奏勝非議詔書毁先帝不道遂下獄繫再更冬㑹赦乃得免章帝時孔僖崔駰遊太學相與論武帝始為天子崇信聖道及後恣已忘其前善為鄰房生告其誹謗先帝刺譏當世下吏受訊僖以書自訟乃勿問元帝時賈捐之論珠厓事曰武帝籍兵厲馬攘服夷狄天下斷獄萬數冦賊並起軍旅數發父戰死於前子鬬傷於後女子乗亭障孤兒號於道老母寡婦飲泣巷哭是皆廓地泰大征伐不休之故也考三人所指武帝之失捐之言最切而三帝或罪或否豈非夏侯非議詔書僖駰誹謗皆漢法所禁如捐之直指其事則在所不問乎誼向觸諱賈諠上䟽文帝曰生為明帝没為明神使顧成之廟稱為太宗上配太祖與漢亡極雖有愚㓜不肖之嗣猶得蒙業而安植遺腹朝委裘而天下不亂又云萬年之後傳之老母弱子此旣於生時該死事至云傳之老母則是言其當終於太后之前又目其嗣為愚㓜不肖可謂指斥而帝不以為過誼不以為疑劉向上書成帝諌王氏事曰王氏與劉氏且不並立陛下為人子孫守持宗廟而令國祚移於外親降為皁𨽻縱不為身奈宗廟何又云天命所受者博非獨一姓此乃於國存時説亡語而帝不以為過向不以為疑至乞援近宗室幾於自售亦不以為嫌也兩人皆出於忠精至誠故盡言觸忌諱而不自覺文帝以寛待下聖徳固爾而成帝亦能容之後世難及也小貞大貞人君居尊位倒持太阿政令有所不行徳澤有所不下身為寄坐受人指麾危亡之形且立至矣故易有屯其膏小貞吉大貞凶之戒謂當以漸而正之説者多引魯昭公高貴鄉公為比予謂此自係一時國家之隆替君身之禍福蓋有剛決而得志隐忍而危亡者不可一槩論也漢宣帝之誅霍禹和帝之誅竇憲威宗之誅梁冀魏孝莊之誅爾朱榮剛決而得志者也魯昭公之討季氏齊簡公之謀田常高貴鄉公之討司馬昭晉元帝之征王敦唐文宗之謀宦者潞王之徙石敬瑭漢隐帝之殺郭威剛決而失者也若齊欎林王知鸞之異志欲取之而不能漢獻帝知曹操之不臣欲圖之而不果唐昭宗知朱温之必簒欲殺之而不克皆翻以及亡雖欲小正之豈可得也唐詩戲語士人於棋酒閒好稱引戲語以助譚笑大抵皆唐人詩後生多不知所從出漫識所記憶者於此公道世閒惟白髮貴人頭上不曽饒杜牧送隐者詩也因過竹院逢僧話又得浮生半日閒李渉詩也只恐為僧僧不了為僧得了盡輸僧啼得血流無用處不如緘口過殘春杜荀鶴詩也數聲風笛離亭晚君向瀟湘我向秦鄭谷詩也今朝有酒今朝醉明日愁來明日愁勸君不用分明語語得分明出轉難自家飛絮猶無定争解垂絲絆路人明年更有新條在撓亂春風卒未休采得百花成蜜後不知辛苦為誰甜羅隱詩也高駢在西川築城禦蠻朝廷疑之徙鎮荆南作聽箏詩以見意曰昨夜筝聲響碧空宫商信任往來風依稀似曲才堪聽又被吹將别調中今人亦好引此句也何進高叡東漢末何進將誅宦官白皇太后悉罷中常侍小黄門使還里舍張讓子婦太后之妹也讓向子婦叩頭曰老臣得罪當與新婦俱歸私門唯受恩累世今當逺離宫殿願復一入直得暫奉望太后顔色死不恨矣子婦為言之乃詔諸常侍皆復入直不數日進乃為讓所殺董卓隨以兵至讓等雖死漢室亦亡北齊和士開在武成帝世姦蠧敗國及後主嗣立宰相高叡與婁定逺白胡太后出士開為兖州刺史后欲留士開過百日叡守之以死苦言之士開載美女珠簾賂定逺曰蒙王力用為方伯今當逺出願得一辭覲二宫定逺許之士開由是得見太后及帝進説曰臣出之後必有大變今已得入復何所慮於是出定逺為青州而殺叡後二年士開雖死齊室亦亡嗚呼姦佞之難去久矣何進髙叡不惜隕身破家為漢齊社稷計而張讓士開以談笑一言變如反掌忠良受禍宗廟為墟乃知背脅瘭疽决之不可不速虎狼在穽養之則自貽害可不戒哉南鄉掾史金石刻有晉南鄉太守司馬整碑其隂刻掾史以下姓名合三百五十一議曹祭酒十一人掾二十九人諸曹掾史書佐循行幹百三十一人從掾位者九十六人從史位者三十一人部曲督將三十六人其冗如此以晉史考之南鄉本南陽西界魏武平荆州始分為郡至晉泰始中所管八縣才二萬户耳而掾史若是之多掾史旣然吏士又可知矣民力安得不困哉整乃宗室安平王孚之孫也漢景帝忍殺漢景帝恭儉愛民上繼文帝故亦稱為賢君考其天資則刻戾忍殺之人耳自在東宫時因博戲殺吴太子以起老濞之怨即位之後不思罪已一旦於三郡中而削其二以速兵端正信用鼂錯付以國事及爰盎之説行但請斬錯而已帝令有司劾錯以大逆遂父母妻子同産皆棄市七國之役下詔以深入多殺為功比三百石以上皆殺無有所置敢有議詔及不如詔者皆要斬周亞夫以功為丞相坐争封匈奴降將事病免心惡之賜食不置箸叱之使起昧於敬禮大臣之義卒以非罪置之死悲哉光武遣馮異征赤眉敕之曰征伐非必畧地屠城要在平定安集之耳諸將非不健鬬然好虜掠卿本能御吏士念自修敕無為郡縣所苦光武此言視景帝詔書為不侔矣燕昭漢光武之明樂毅為燕破齊或讒之昭王曰齊不下者兩城耳非其力不能㧞欲久仗兵威以服齊人南面而王耳昭王斬言者遣使立毅為齊王毅惶恐不受以死自誓馮異定關中自以久在外不自安人有章言異威權至重百姓歸心號為咸陽王光武以章示異異上書謝詔報曰將軍之於國家恩猶父子何嫌何疑而有懼意及異破隗囂諸將欲分其功璽書誚大司馬以下稱異功若丘山今人咸知毅異之為名將然非二君之明必困讒口矣田單復齊國信陵君敗秦兵陳湯誅郅支盧植破黃巾鄧艾平蜀王濬平吴謝安郤苻堅慕容垂挫桓温史萬歲破突厥李靖滅吐谷渾郭子儀李光弼中興唐室李晟復京師皆有大功於社稷率為􅉲人所惎或至殺身區區庸主不足責唐太宗亦未能免營營青蠅亦可畏哉周南召南毛詩序曰關睢麟趾之化王者之風故繫之周公南言化自北而南也鵲巢騶虞之徳諸侯之風也先王之所以教故繫之召公周南召南正始之道据文義周公召公二公字皆合為南字則與上下文相應蓋簡策誤耳王者之風恐不當繫之周公而先王之所以教又與召公自不相渉也易中爻易繫辭云雜物撰徳辨是與非則非其中爻不備中爻者謂二三四及三四五也如坤坎為師而六五之爻曰長子帥師以正應九二而言蓋指二至四為震也坤艮為謙而初六之爻曰用渉大川蓋自是而上則六二九三六四為坎也歸妺之六五曰帝乙歸妺以下配九二而言蓋指震也而泰之六五亦曰帝乙歸妹固亦下配九二而九三六四六五蓋震體云他皆類此容齋隨筆卷十一欽定四庫全書容齋隨筆卷十二十八則宋洪邁撰
