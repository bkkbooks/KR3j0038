front:
  text: 二十八則
  hash: sha256:ffca80bdd7245b38db458a083ce808f076f097e86fa6f0436977064393088913
body:
  text: 宋洪邁撰權若訥馮澥唐中宗既流殺五王再復武氏陵廟右補闕權若訥上䟽以為天地日月等字皆則天􅀎事賊臣敬暉等輕紊前規削之無益於淳化存之有光於孝理又神龍制書一事以上並依貞觀故事豈可近捨母儀逺尊祖徳䟽奏手制褒美欽宗在位懲王安石蔡京之誤國政事悉以仁宗為法左諌議大夫馮澥上言仁宗皇帝陛下之髙祖也神宗皇帝陛下之祖也子孫之心寧有厚薄王安石司馬光皆天下之大賢其優劣等差自有公論願無作好惡允執厥中則是非自明矣詔牓朝堂侍御史李光駮之不聽復為右正言崔鶠所擊宰相不復問而遷澥吏部侍郎按若訥與澥兩人議論操持絶相似盖澥在崇寧中首上書乞廢元祐皇后自選人除寺監丞其始終大節不論可見建炎初元乃超居政地公議憤之嵗旦飲酒今人元日飲屠酥酒自小者起相傳已久然固有来處後漢李膺杜密以黨人同繫獄值元日於獄中飲酒曰正旦従小起時鏡新書晋董勛云正旦飲酒先從小者何也勛曰俗以小者得嵗故先酒賀之老者失時故後飲酒初學記載四民月令云正旦進酒次第當従小起以年小者起先唐劉夢得白樂天元日舉酒賦詩劉云與君同甲子夀酒讓先杯白云與君同甲子嵗酒合誰先白又有歳假内命酒一篇云歳酒先拈辭不得被君推作少年人顧况云不覺老將春共至更悲携手㡬人全還丹寂寞羞明鏡手把屠蘇讓少年裴夷直云自知年㡬偏應少先把屠蘇不讓春儻更數年逢此日還應惆悵羨他人成文幹云戴星先捧祝堯觴鏡裏堪驚兩鬢霜好是燈前偷失笑屠蘇應不得先嘗方干云纔酌屠蘇定年齒坐中皆笑鬢毛斑然則尚矣東坡亦云但把窮愁博長健不辭最後飲屠酥其義亦然存歿絶句杜子美有存歿絶句二首云席謙不見近弹棊畢曜仍傳舊小詩玉局他年無限笑白楊今日㡬人悲鄭公粉繪随長夜曹霸丹青已白頭天下何曽有山水人間不觧重驊騮每篇一存一歿盖席謙曹霸存畢鄭歿也黄魯直荆江亭即事十首其一云閉門覔句陳無已對客揮毫秦少㳺正字不知温飽未西風吹淚古藤州乃用此體時少㳺歿而無已存也近嵗新安胡仔著漁隠叢話謂魯直以今時人形入詩句盖取法於少陵遂引此句實失扵詳究云湯武之事湯武之事古人言之多矣惟漢轅固黄生争辯最詳黄生曰湯武非受命廼殺也固曰不然桀紂荒亂天下之心皆歸湯武湯武因天下之心而誅桀紂不得已而立非受命為何黄生曰冠雖敝必加於首履雖新必貫於足今桀紂雖失道君上也湯武雖聖臣下也反因過而誅之非殺而何景帝曰食肉毋食馬肝未為不知味言學者毋言湯武受命未為愚遂罷顔師古注云言湯武為殺是背經義故以馬肝為喻也東坡志林云武王非聖人也昔者孔子盖罪湯武伯夷叔齊不食周粟而孔子予之其罪武王也甚矣至孟軻始亂之使當時有良史南巢之事必以叛書牧野之事必以弑書湯武仁人也必将為法受惡可謂至論然予竊考孔子之序書明言伊尹相湯伐桀成湯放桀于南巢武王伐商武王勝商殺受各蔽以一語而大指皦如所謂六藝折衷無待於良史復書也張釋之傳誤漢書紀傳志表矛盾不同非一然唯張釋之為甚本傳云釋之為騎郎事文帝十年不得調亡所知名欲免歸中郎将袁盎惜其去請徙補謁者後拜為廷尉逮事景帝嵗餘為淮南相而百官公卿表所載文帝即位三年釋之為廷尉至十年書廷尉昌廷尉嘉又二人凡歴十三年景帝乃立而張敺為廷尉則是釋之未嘗十年不調及未嘗以廷尉事景帝也張于二廷尉張釋之為廷尉天下無寃民于定國為廷尉人自以不寃此漢史所稱也兩人在職皆十餘年周勃就國人上書告勃欲反下廷尉逮捕吏稍侵辱之勃以千金與獄吏吏使以公主為證太后亦以為無反事乃得赦出釋之正為廷尉不䏻救但申理犯蹕盜環一二細事耳楊惲為人告驕奢不悔過下廷尉案騐始得所予孫㑹宗書定國當惲大逆無道惲坐要斬惲之罪何至扵是其徇主之過如此傳所謂決疑平法務在哀矜者果何為哉漢唐置郵趙充國在金城上書言先零䍐羌事六月戊申奏七月甲寅璽書報従其計按金城至長安一千四百五十里徃反倍之中間更下公卿議臣而自上書至得報首尾纔七日唐開元十年八月己卯夜權椘璧等作亂時明皇幸洛陽相去八百餘里壬午遣河南尹王怡如京師按問宣慰首尾纔三日置郵傳命既如此其速而廷臣共議盖亦未嘗淹久後世所不及也龍且張步韓信擊趙李左車勸陳餘勿與戰餘曰今如此避弗擊諸侯謂吾怯而輕来伐我遂與信戰身死國亡是時信方為漢将始攻下魏代威聲猶未暴白陳餘易之尚不足訝及滅趙服燕則關東六國既定其四矣信伐齊椘使龍且来救或言漢兵不可當龍且曰吾平生知韓信為人易與耳不足畏也何為而止一戰而沒項随以亡耿弇討張步斬其大将軍費邑走邑之弟敢進攻西安臨淄拔其城又走其弟藍勢如破竹先是弇已破尤来大槍延岑彭寵富平獲索矣時步所盜齊地大半為弇所得然步猶曰以尤来大彤十餘萬衆吾皆即其營而破之今弇兵少於彼又皆疲勞何足摧乎竟出兵大戰兄弟成擒兵法云知彼知己百戰不殆龍且張步豈復識此哉梁臨川王宏伐魏魏元英禦之宏停軍不前魏人勸英進據洛水英曰蕭臨川雖騃其下有良将韋裴之屬未可輕也宜且觀形勢勿與交鋒宏卒敗退英之識見非前人可比也然遂進軍圍鍾離魏邢巒以為不可魏主召使還英表稱必克為曹景宗韋叡所挫失亡二十餘萬人智於前而昧於後為可恨耳義理之説無窮經典義理之説最為無窮以故觧釋傳䟽自漢至今不可槩舉至有一字而數說者姑以周易革卦言之己日乃孚革而信之自王輔嗣以降大抵謂即日不孚巳日乃孚巳字讀如矣音盖其義亦止如是耳唯朱子發讀為戊巳之巳予昔與易僧曇瑩論及此問之曰或讀作巳音紀日如何瑩曰豈唯此也雖作已音似日亦有義乃言曰天元十干自甲至已然後為庚庚者革也故巳日乃孚猶云從此而革也十二辰自子至巳六陽數極則變而之隂于是為午故巳日乃孚猶云従此而變也用是知好竒者欲穿鑿附㑹固各有説云開元五王唐明皇兄弟五王兄申王撝以開元十二年寧王憲邠王守禮以二十九年弟岐王範以十四年薛王業以二十二年薨至天寳時已無存者楊太真以三載方入宫而元稹連昌宫詞云百官隊仗避岐薛楊氏諸姨車鬭風李商隠詩云夜半宴歸宫漏永薛王沉醉夀王醒皆失之也巫蠱之禍漢世巫蠱之禍雖起於江充然事㑹之来盖有不可曉者武帝居建章宫親見一男子帶劒入中龍華門疑其異人命收之男子捐劔走逐之弗獲上怒斬門候閉長安城門大索十一日巫蠱始起又嘗晝寢夢木人數千持杖欲擊已乃驚寤因是體不平遂苦忽忽善􅁯此兩事可謂異矣木将腐蠧實生之物将壊蟲實生之是時帝春秋已髙忍而好殺李陵所謂法令無常大臣無罪夷滅者數十家由心術既荒随念招妄男子木人之兆皆迷不復開則謫見於天鬼瞰其室禍之所被以妻則衛皇后以子則戾園以兄子則屈氂以女則諸邑陽石公主以婦則史良娣以孫則史皇孫骨肉之酷如此豈復顧他人哉且兩公主實衛后所生太子未敗數月前皆已下獄誅死則其母與兄豈有全理固不待於江充之譛也唐詩無諱避唐人歌詩其于先世及當時事直辭詠寄略無避隠至宫禁嬖昵非外間所應知者皆反復極言而上之人亦不以為罪如白樂天長恨歌諷諌諸章元微之連昌宫詞始末皆為明皇而發杜子美尤多如兵車行前後出塞新安吏潼關吏石壕吏新婚别垂老别無家别哀王孫悲陳陶哀江頭麗人行悲青坂公孫舞劔器行終篇皆是其他波及者五言如憶昨狼狽初事與古先别不聞夏商衰中自誅褒妲是時妃嬪戮連為糞土叢中宵焚九廟雲漢為之紅先帝正好武寰海未凋枯拓境功未己元和辭大鑪内人紅袖泣王子白衣行毁廟天飛雨焚宫火徹明南内開元曲常時弟子傳法歌聲變轉滿座涕潺湲御氣雲樓敞含風綵仗髙仙人張内樂王母獻宫桃須為下殿走不可好樓居固無牽白馬㡬至著青衣奪馬悲公主登車泣貴嬪兵氣凌行在妖星下直廬落日留王母微風倚少兒䏻畫毛延夀投壺郭舍人鬬雞初賜錦舞馬更登牀驪山絶望幸花萼罷登臨殿瓦鴛鴦坼宫簾翡翠虚七言如關中小兒壊紀綱張后不樂上為忙天子不在咸陽宫得不哀痛塵再䝉曽貌先帝照夜白龍池十日飛霹靂要路何日罷長㦸戰自青羌連白蠻豈謂盡煩回紇馬翻然逺救朔方兵如此之類不能悉書此下如張祐賦連昌宫元日仗千秋樂大酺樂十五夜燈熱戯樂上已樂邠王小管李謨笛退宫人玉環琵琶春鶯囀寧哥来容兒鉢頭邠娘羯鼓耍娘歌悖挐兒舞華清宫長門怨集靈臺阿䳰湯馬嵬歸香嚢子散花樓雨霖鈴等三十篇大抵詠開元天寳間事李義山華清宫馬嵬驪山龍池諸詩亦然今之詩人不敢爾也李晟傷國體将帥握重兵居閫外當國家多事時其奉上承命尤當以恭順為主唐李晟在徳宗朝破朱泚復長安功名震耀盖社稷宗臣也然嘗将神䇿軍戍蜀及還以營妓自随節度使張延賞追而返之由是有隙晟既立大功上召延賞入相晟表陳其過惡上重違其意乃止後嵗餘上命韓滉諭㫖於晟使釋怨滉因使晟表薦延賞遂為相然則輔相之拜罷皆大将得制之其傷國體甚矣徳宗猜忌刻薄渠􅀎釋然晟之失兵柄正縁此耳國學武成王廟夲列晟於十哲乾道中有㫖退於從祀夀皇聖意豈非出此乎元和六學士白樂天分司東都有詩上李留守相公其序言公見過池上汎舟舉酒話及翰林舊事因成四韻後兩聨云白首故情在青雲徃事空同時六學士五相一漁翁此詩盖與李絳者其詞正紀元和二年至六年事予以其時考之所謂五相者裴垍王涯杜元穎崔羣及絳也紹興二十八年三月予入館明年八月除吏部郎官一時同舎祕書丞虞雍公并甫著作郎陳魏公應求祕書郎史魏公直翁挍書郎王魯公季海皆至宰相汪莊敏公明逺至樞密使㤙數與宰相等甚類元和事云二傳誤後世自左氏載石碏事有大義滅親之語後世援以為説殺子孫害兄弟如漢章帝廢太子慶魏孝文殺太子恂唐髙宗廢太子賢者不可勝數公羊書魯隠公威公事有子以母貴母以子貴之語後世援以為說廢長立少以妾為后妃如漢哀帝尊傅昭儀為皇太太后光武廢太子彊而立東海王陽唐髙宗廢太子忠而立孝敬者亦不可勝數卜子夏魏文侯以卜子夏為師按史記所書子夏少孔子四十四嵗孔子卒時子夏年二十八矣是時周敬王四十一年後一年元王立厯正定王考王至威烈王二十三年魏始為侯去孔子卒時七十五年文侯為大夫二十二年而為侯又六年而卒姑以始侯之嵗計之則子夏已百三歳矣方為諸侯師父子忠邪漢王氏擅國王章梅福嘗言之唯劉向勤勤懇懇上封事極諌至云事勢不兩大王氏與劉氏亦且不並立陛下為人子孫守持宗廟而令國祚移於外親降為皁𨽻為後嗣憂昭昭甚明其言痛切如此而子歆乃用王莽舉為侍中為莽典文章倡導在位褒揚功徳安漢宰衡之名皆所共謀馴致攝簒卒之身亦不免魏陳矯事曹氏三世為之盡忠明帝憂社稷問曰司馬懿忠正可謂社稷之臣乎矯曰朝廷之望社稷未知也懿竟竊國柄至孫炎簒魏為晉而矯之子騫乃用佐命勲位極公輔晉郗愔忠於王室而子超黨於桓氏為温建廢立之謀超死愔哀悼成疾後見超書一箱悉與温往反宻計遂大怒曰小子死恨晚更不復哭晉史以為有大義之風向矯愔之忠如是三子不勝誅矣蘇張說六國蘇秦張儀同學於鬼谷而其從横之辯如冰炭水火之不同盖所以設心者異耳蘇欲六國合從以擯秦故言其彊謂燕地方二千餘里帶甲數十萬車六百乘騎六千匹謂趙地亦方二千餘里帶甲數十萬車千乘騎萬匹謂韓地方九百里帶甲數十萬天下之強弓勁弩皆從韓出韓卒之勇一人當百謂魏地方千里卒七十萬齊地方二千餘里臨菑之卒固已二十一萬楚地方五千里帶甲百萬車千乘騎萬匹至於張儀則欲六國為横以事秦故言其弱謂梁地方不過千里卒不過三十萬韓地險惡卒不過二十萬臨菑即墨非齊之有斷趙右肩黔巫非楚有易水長城非燕有然而六王皆聳聽敬從舉國而付之未嘗有一語相折難者彼皆長君持國之日乆逮其臨事乃顧如桔橰隨人俯仰得不危亡幸矣哉且一國之勢猶一家也今夫主一家之政者較量生理名田若干頃嵗收穀粟若干蓺園若干畝嵗收桑麻若干邸舍若干區為錢若干下至牛羊犬雞莫不有數自非童騃孱愚之人未有不能件析而枚數者何待於踈逺游客為吾借箸而籌哉茍一以為多一以為寡將遂挈挈然舉而信之乎鼂錯說景帝曰髙帝大封同姓齊七十餘城楚四十餘城吳五十餘城分天下半以漢之廣三國渠能分其半此錯欲削諸侯故盛言其大爾膠西王將與吳反羣臣諫曰諸侯地不能當漢十二為叛逆非計也是時反者即吳楚諸齊此膠西臣欲止王之謀故盛言其小爾二者視蘇張之言疑若相似而用心則否聽之者惟能知彼知己則善矣容齋續筆卷二欽定四庫全書容齋續筆卷
