seq: 73
front:
  text: 七十四則宋洪邁撰
  hash: sha256:e92aea3d298bff470924a43b82e5be7aafd1b6f0fbdbd11400471e7fa2b67a35
body:
  text: 天咫黄魯直和王定國詩聞蘇子由病卧績溪云湔祓瘴霧姿朝趨去天咫蜀士任淵注引天威不違顔咫尺予按國語楚靈築三城使子晢問范無宇無宇不可王曰是知天咫安知民則韋昭曰咫者少也言少知天道耳酉陽雜爼有天咫篇黄詩盖用此徐師川喜王秀才見過小酌翫月四言曰君家近市所見天咫庭户之閒容光能幾菰蒲之中江湖之涘一碧萬頃長空千里正祖述黄所用云縣尉為少仙隨筆載縣尉為少公予後得晏幾道叔原一帖與通叟少公者正用此也杜詩有野望因過常少仙一篇所謂落盡髙天日幽人未遣回者蜀士注曰少仙應是言縣尉也縣尉謂之少府而梅福為尉有神仙之稱少仙二字尤為清雅與今俗呼為仙尉不侔矣杜詩用受覺二字杜詩所用受覺二字皆絶竒今摭其受字云脩竹不受暑勿受外嫌猜莫受二毛侵監河受貸粟輕燕受風斜能事不受相促迫野航恰受兩三人一雙白魚不受釣雄姿未受伏櫪恩其覺字云已覺糟床注身覺省郎在自覺成老醜更覺松竹幽日覺死生忙最覺潤龍鱗喜覺都城動更覺老隨人毎覺昇元輔覺而行步奔尚覺王孫貴含悽覺汝賢厨煙覺逺庖詩成覺有己已覺披衣慣自覺酒須賒早覺仲容賢城池未覺喧無人覺來徃人才覺弟優直覺巫山暮重覺在天邉行遲更覺仙深覺負平生秋覺追隨盡追隨不覺晩熊羆覺自肥自覺坐能堅已覺良宵永更覺綵衣春已覺氣與嵩華敵未覺千金滿髙價梅花欲開不自覺胡來不覺潼關隘自得隋珠覺夜明放筯未覺金盤空東歸貪路自覺難更覺良工心獨苦始覺屏障生光輝不覺前賢畏後生吏情更覺滄洲逺我獨覺子神充實習池未覺風流盡用之雖多然毎字命意不同又雜於千五百篇中學者讀之唯見其新工也若陳簡齋亦好用此二字未免頻復者盖只在數百篇内所以見其多如未受風作惡不受珠璣絡不受折簡呼不受人招麾不受安危侵飽受今日閒却扇受景風語聞受逺響坐受世故驅庭栢不受寒可復受憂戚寧受此酸辛滔滔江受風坐受世􅄶迫清池不受暑平池受細雨窮村受春晩不受急景催肯受元規塵了不受榮悴意閒不受榮與辱獨自人閒不受寒枯木無枝不受寒天馬何妨畧受鞿來禽花髙不受折不受隂晴與寒暑長林巨木受軒輊未覺懶相先未覺壮心休未覺身淹留未覺墉隂遲未覺欠孟嘉未覺有等倫未覺風來遲未覺經旬乆欲徃還覺非獨覺賦詩難稍覺夜月添菰蒲覺風入未覺此計非髙處覺眼新意定覺景多未覺徐娘老未覺有榮辱未覺饑腸虚未覺平生與願違村空更覺水潺湲眼中㣲覺欠扁舟居夷更覺中原好便覺杯觴耐薄寒墻頭花定覺風闌可謂多矣盖喜用其字自不知下筆所著也西太一宮六言楊柳鳴蜩緑暗荷花落日紅酣三十六陂春水白頭想見江南荆公題西太一宫六言首篇也今臨川刻本以楊柳為柳葉其意欲與荷花為切對而語句遂不佳此猶未足問至改三十六陂春水為三十六宫煙水則極可笑公本意以在京華中故想見江南等物何預於宫禁哉不學者妄意塗竄殊為害也彼盖以太一宫為禁廷離宫爾由與猶同新唐書藩鎮傳序云其人自視由羌狄然據字義由當為猶故吳縝作唐書音訓有紏謬一篇正指其失彼元不深䆒孟子也文惠公頃與予作唐書補過嘗駮其說予作文毎用之輒為人所疑問今為詳載於此如以齊王由反手也由弓人而恥為弓王由足用為善是由惡醉而強酒由已溺之由已飢之由射於百步之外見且由不得亟其義皆然盖由與猶通用也人焉廋哉孔子論人之善惡始之曰視其所以繼之以觀其所由察其所安然後重言之曰人焉廋哉人焉廋哉盖以上之三語詳察之也而孟氏一斷以眸子其言曰存乎人者莫良於眸子眸子不能掩其惡胷中正則眸子瞭焉胷中不正則眸子眊焉聽其言也觀其眸子人焉廋哉說者謂人與物接之時其神在目故胷中正則神精而明不正則神散而昏心之所發并此而觀則人之邪正不可匿矣言猶可以偽為眸子則有不容偽者孔聖既以發之於前孟子知言之要續為之說故簡亮如此舊見王季明云太學士子嘗戯作一論其畧曰知人焉廋哉之義然後知人焉廋哉人焉廋哉之義知人焉廋哉人焉廋哉之義然後知人焉廋哉之義孔子所云人焉廋哉人焉廋哉者詳言之也孟子所云人焉廋哉者畧言之也孔子之所謂人焉廋哉人焉廋哉即孟子之所謂人焉廋哉也孟子之所謂人焉廋哉即孔子之所謂人焉廋哉人焉廋哉也繼又疊三語為一云夫人焉廋哉人焉廋哉人焉廋哉雖曰不同而其所以為人焉廋哉人焉廋哉人焉廋哉未始不同演而成數百字可資一笑亦幾於侮聖言矣乆而俱化天生萬物乆而與之俱化固其理焉無閒於有情無情有知無知也予得雙鴈於衢人鄭伯膺純白色極馴擾可翫寘之雲壑不逺飛翔未幾殞其一其一塊獨無儔因念白鵞正同色又性亦相類乃取一隻與同處始也兩下不相賔接見則東西分背雖一盆飼榖不肯並啜如是五日漸復相就踰旬之後怡然同群但形體有大小而色澤飛鳴則一乆之鴈不自知其為鴈鵞不自知其為鵞宛如同巢而生者與之俱化於是騐焉今人呼鵞為野鴈或稱家鴈其褐色者為鴈鵞鴈之最大者曰天鵞唐太宗時吐蕃禄東贊上書以謂聖功逺被雖鴈飛于天無是之速鵞猶鴈也遂鑄金為鵞以獻盖二禽一種也黄文江賦晩唐士人作律賦多以古事為題寓悲傷之㫖如吳融徐寅諸人是也黄滔字文江亦以此擅名有明皇回駕經馬嵬坡隔句云日慘風悲到玉顔之死處花愁露泣認朱臉之啼痕褒雲萬疊斷腸新出於啼猿秦樹千層比翼不如於飛鳥羽衞參差擁翠華而不發天顔愴悢覺紅袖以難留神仙表態忽零落以無歸雨露成波已沾濡而不及六馬歸秦却經過於此地九泉隔越幾悽惻於平生景陽井云理昧納隍處窮泉而詎得誠乖馭朽攀素綆以胡顔青銅有恨也從零落於秋風碧浪無情寧觧流傳於夜􅐿荒凉四面花朝而不見朱顔滴瀝千尋雨夜而空啼碧溜莫可追尋玉樹之歌聲邈矣最堪惆悵金瓶之咽處依然館娃宫云花顔縹緲欺樹裏之春風銀熖熒煌却城頭之曉色恨留山鳥啼百草之春紅愁寄壠雲鏁四天之暮碧遺堵塵空幾踐群遊之鹿滄洲月在寧銷怒觸之濤陳皇后因賦復寵云已為無雨之期空懸夢寐終自凌雲之製能致煙霄秋色云空三楚之暮天樓中厯厯滿六朝之故地草際悠悠白日上昇云較美古今列子之乘風固劣論功晝夜姮娥之奔月非優凡此數十聮皆研確有情致若夫格律之卑則自當時體如此耳沈季長進言沈季長元豐中為崇政殿說書考開封進士既罷入見神宗曰論不以智治國誰為此者對曰李定所為上曰聞定意譏朕季長曰定事陛下有年頃者御史言定乃人倫所棄陛下力排羣議而定始得為人如初繼又擢用不次定雖懐利尚當知恩臣以此敢謂無譏陛下意詩序曰言之者無罪聞之者足以戒書曰小人怨汝詈汝則皇自敬徳陛下自視豈任智者不知何自嫌疑乃信此為譏也上曰卿言甚善朕今已釋然矣卿長者乃喜為人辯謗對曰臣非為人辯謗乃為陛下辯譖耳他日上語及前代君臣因曰漢武帝學神仙不死之術卿曉其意否此乃貪生以固位耳故其晩年舉指謬戾禍貽骨肉幾覆宗社且人主固位其禍猶爾則為人臣而固位者其患亦何所不至故朕毎患天下之士能輕爵禄者少季長曰士而輕爵禄為士言之則可為國言之則非福也人主有尊徳樂道之志士皆以不得爵禄為耻寧有輕爵禄者哉至於言違諌怫士有去志故以爵禄為輕上曰誠如卿言按季長雖嘗至脩起居注其後但終於庶僚史不立傳王和甫銘其墓載此兩論予在史院時未之見也其子銖為侍從恨不獲附見之故表出於是繁遏渠國語魯叔孫穆子曰金奏肆夏繁遏渠天子所以饗元侯也􅅊昭注曰繁遏渠肆夏之三也禮有九夏皆篇名昭雖曉其義而不詳釋按周禮春官鍾師掌金奏以鍾皷奏九夏鄭氏注引吕叔玉云肆夏繁遏渠皆周頌也肆夏時邁也繁遏執競也渠思文也又曰繁多也遏止也言福禄止於周之多也故執競曰降福穰穰降福簡簡渠大也言以后稷配天王道之大也故思文曰思文后稷克配彼天予謂此說亦近於鑿替戾岡坡公游鶴林招隱有岡字韻詩凡作七首最後云背城借一吾何敢切勿樽前替戾岡小兒問三字所出按晉書佛圖澄傳澄能聽鈴音以知吉凶徃投石勒及劉曜攻洛陽勒将救之其羣下咸諌以為不可勒以訪澄澄曰相輪鈴音云秀支替戾岡僕谷劬禿當此羯語也秀支軍也替戻岡出也僕谷劉曜胡位也劬禿當捉也此言軍出捉得曜也勒遂擒曜坡公正用此云潞公平章重事文潞公元豐六年以太師致仕時七十八歲矣後二年哲宗即位太皇太后垂簾同聽政用司馬公為門下侍郎公奏乞召潞公置之百寮之首以鎮安四海后遣中使梁惟簡宣諭曰彦博名位已重又得人心今天子㓜冲恐其有震主之威且於輔相中無處安排又已致仕難為復起公當時以新入不敢復言元祐元年三月公拜左僕射乃再上奏曰書曰人惟求舊盖以其厯年之多也彥愽沉敏有謀畧知國家治體能斷大事自仁宗以來出将入相功効顯著天下所共知年踰八十精力尚強臣初曽奏陳尋蒙宣諭竊惟彦博一書生爾年逼桑榆富貴已極夫復何求非有兵權死黨可畏懼也假使為相一旦欲罷之止煩召一學士授以詞頭白麻既出則一匹夫爾何難制之有震主之威防慮大過若依今官制用之為相以太師兼侍中行左僕射有何不可儻不欲以劇務煩老臣則凡常程文書只委右僕射以下簽書發遣惟事有難决者方就彦博咨禀自古致仕復起盖非一人彦博今年八十一不過得其數年之力願急用之臣但以門下侍郎助彦博恐亦時有小補今不以彦博首相而以臣處之是猶捨騏驥而策駑駘也竊為朝廷惜之若以除臣左僕射難為無故以他人易之則臣欲露表舉其自代奏入不許給事中范純仁亦勸乞召致留為師臣未幾右僕射韓縝求去后始賜司馬公宻詔欲除彦博兼侍中行右僕射事其合行恩禮令相度條具公以名體未正不敢居其上乞以左僕射自守右僕射詔曰使彦博居卿上非予所以待卿之意卿更思之公執奏言臣為京官時彦博己為宰相今使彥博列位在下非所以正大倫也於是召赴闕既而御史中丞劉摯左正言朱光庭右正言王覿俱上言彦博春秋髙不可為三省長官司馬公又言若令以正太師平章軍國重事亦足以尊老成矣四月遂下制如公言詔一月兩赴經筵六日一入朝因至都堂與執政商量事朝廷有大政令即與輔臣共議潞公此命可謂鄭重費力盖本不出於主意也然居位越五年屢謝病乃得歸竟坐此貽紹聖之貶考課之法廢唐制尚書考功掌内外文武官吏之考課凡應考之官家具録當年功過行能本司及本州長官對衆讀議其優劣定為九等考第然後送省别勑定京官位望髙者二人一挍京官考一挍外官考又定給事中中書舍人各一人一監京官考一監外官考郎中判京官考員外郎判外官考凡考課之法有四善二十七最一最以上有四善為上上有三善或無最而有四善為上中有二善或無最而有三善為上下其末至於居官謟詐貪濁有狀為下下外州則司録録事參軍主之各㨿之以為黜陟國朝此法尚存慶厯皇祐中黄亞夫庶佐一府三州幕其集所載考詞十四篇黄司理者曰治犴獄歲在周矣論其罪棄市者五十四流若徒三百十有四杖百八十六皆得其情無有寃隱不伸非才也其孰能其考可書中舞陽尉者曰舞陽太約地廣它盜徃徃囊槖於其間居一歲為竊與強者凡十一前件官捕得之其亡者一而已矣非才焉固不能可書中法曹劉昭逺者曰法者禮之防也其用之以當人情為得刻者為之則拘而少恩前件官以通經舉進士始掾於此若老於為法者毎抱具獄必傅之經義然後處故無一不當其情其考可書中它皆類此不知其制廢於何時今但付之士按吏据定式書於印紙比者又令郡守定縣令臧否髙下人亦不知所從出若使稍復舊貫似為得宜雖未必人人盡公得實然思過半矣小官受俸沈存中筆談書國初時州縣之小官俸入至薄故有五貫九百六十俸省錢且作足錢用之語黄亞夫皇祐閒自序其所為伐檀集云歴佐一府三州皆為從事踰十年郡之政巨細無不與大抵止於簿書獄訟而已其心之所存可以効於君補於國資於民者曽未有一事可以自見然月廩於官粟麥常兩斛錢常七千問其所為乃一常人皆可不勉而能兹素餐昭昭矣遂以伐檀名其集且識其愧予謂今之仕宦雖主簿尉盖或七八倍於此然常有不足之歎若兩斛七千秪可禄一書吏小挍耳豈非風俗日趨於浮靡人用日以汰物價日以滋致於不能贍足乎亞夫之立志如此真可重也山谷先生乃其子云容齋四筆卷七欽定四庫全書容齋四筆卷
