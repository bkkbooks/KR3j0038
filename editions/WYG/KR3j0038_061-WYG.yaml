seq: 61
front:
  text: 七十四則
  hash: sha256:137c038a3f44ff2e406b441a28cbf3eb5f41ff3fc86db3727b2ecc01a4c90489
body:
  text: 宋洪邁撰盛衰不可常東坡謂廢興成毀不可得而知予每讀書史追悼古昔未嘗不掩卷而歎伶子于叙趙飛燕𫝊極道其姊弟一時之盛而終之以荒田野草之悲言盛之不可留衰之不可推正此意也國初時工部尚書楊玢長安舊居多為鄰里侵占子弟欲以狀訴其事玢批紙尾有試上含元基上望秋風秋草正離離之句方去唐未百年而故宫殿已如此殆於宗周黍離之詠矣慈恩寺塔有荆叔所題一絶句字極小而端勁最為感人其詞曰漢國河山在秦陵草木深暮雲千里色無處不傷心㫖意髙逺不知為何人必唐世詩流所作也李嶠汾隂行云富貴榮華能幾時山川滿目淚沾衣不見只今汾水上唯有年年秋燕飛明皇聞之至於泣下杜甫觀畵馬圖云憶昔巡幸新豐宫翠華拂天來向東騰驤磊落三萬匹皆與此圖筋骨同君不見金粟堆前松栢裏龍媒去盡鳥呼風公孫大娘弟子舞劍器行云先帝侍女八千人公孫劎器初第一五十年間似反掌風塵澒洞昏王室梨園弟子散如烟女樂餘姿映寒日元㣲之連昌宫詞云兩宫定後六七年却尋家舍行宫前莊園燒盡有枯井行宫門闥樹宛然又云舞榭欹傾基尚在文窗窈窕紗猶緑上皇偏愛臨砌花依然御榻臨堦斜寢殿相連端正樓太真梳洗樓上頭晨光未出簾影黑至今反挂珊瑚鉤指似旁人因慟哭却出宫門淚相續凡此諸篇不可勝紀飛燕别𫝊以為伶元所作又有元自叙及宣譚跋語予竊有疑焉不唯其書太媟至云楊雄獨知之雄貪名矯激謝不興交為河東都尉捽辱決曹班躅躅從兄子彪續司馬史記絀子于無所叙皆恐不然而自云成哀之世為淮南相案是時淮南國絶久矣可昭其妄也因序次諸詩聊載於此唐賦造語相似唐人作賦多以造語為竒杜牧阿房宫賦云明星熒熒開粧鏡也緑雲擾擾梳曉鬟也渭流漲膩棄脂水也烟斜霧横焚椒蘭也雷霆乍驚宫車過也轆轆逺聴杳不知其所之也其比興引喻如此其侈然楊敬之華山賦又在其前叙述尤壯曰見若咫尺田千畝矣見若環堵城千雉矣見若杯水池百里矣見若蟻蛭臺九層矣醯雞往來周東西矣蠛蠓紛紛秦速亡矣蜂窠聮聮起阿房矣俄而復然立建章矣小星奕奕焚咸陽矣纍纍繭栗祖龍藏矣後又有李庾者賦西都云秦址薪矣漢址蕪矣西去一舍鞠為墟矣代逺時移作新都矣其文與意皆不逮楊杜逺甚髙彦休闕史云敬之賦五千字唱在人口賦内之句如上數語杜司徒佑李太尉德裕常所誦念牧之乃佑孫則阿房賦實摹倣楊作也彦休者昭宗時人張藴古大寳箴唐太宗初即位直中書省張藴古上大寳箴凡六百餘言遂擢大理丞新唐史附其姓名於文藝謝偃傳末又不載此文但云諷帝以民畏而未懷其詞挺切而已資治通鑑僅載其略曰聖人受命拯溺亨屯故以一人治天下不以天下奉一人壯九重於内所居不過容膝彼昬不知瑶其臺而瓊其室羅八珍於前所食不過適口惟狂㒺念邱其糟而池其酒勿没没而闇勿察察而明雖冕旒蔽目而視於未形雖黈纊塞耳而聽於無聲然此外尚多規正之語如曰惟辟作福為君實難主普天之下處王公之上任土貢其有求具僚陳其所倡是故恐懼之心日弛邪僻之情轉放豈知事起乎所忽禍生乎無妄大明無私照至公無私親禮以禁其奢樂以防其佚勿謂無知居髙聽卑勿謂何害積小就大樂不可極樂極生哀欲不可縱縱欲成災勿内荒於色勿外荒於禽勿貴難得貨勿聽亡國音内荒伐人性外荒蕩人心難得之貨侈亡國之音滛勿謂我尊而慢賢侮士勿謂我智而拒諫矜已安彼反側如春陽秋露巍巍蕩蕩恢漢髙大度撫兹庶事如履薄臨深戰戰栗栗用周文小心一彼此於胸臆捐好惡於心想如衡如石不定物以限物之懸者輕重自見如水如鏡不示物以情物之鑒者妍媸自生勿渾渾而濁勿皎皎而清勿没没而闇勿察察而明吾王撥亂勘以智力民懼其威未懷其徳我皇撫運扇以淳風民懷其始未保其終使人以心應言以行天下為公一人有慶其文大抵不凡既不為史所書故學者亦罕𫝊誦藴古為丞四年以無罪受戮太宗尋悔之乃有覆奏之㫖𫝊亦不書而以為坐事誅皆失之矣舊唐書全載此箴仍專立傳不知宋景文何為削之也國初文籍國初承五季亂離之後所在書籍印板至少宜其焚煬蕩析了無孑遺然太平興國中編次御覽引用一千六百九十種其綱目並載於首卷而雜書古詩賦又不及具録以今考之無傳者十之七八矣則是承平百七十年翻不若極亂之世姚鉉以大中祥符四年集唐文粹其序有云況今厯代文籍略無亡逸觀鉉所類文集蓋亦多不存誠為可歎叙西漢郊祀天地郊祀合祭分祭之論國朝元豐元祐紹聖中三議之矣莫辯於東坡之立説然其大㫖駁當時議臣謂周漢以來皆嘗合祭及謂夏至之日行禮為不便予固贊美之於四筆矣但熟考漢史猶為未盡自髙皇帝增秦四畤為五以事天地武帝以來至于元成皆郊見甘泉武帝因幸汾隂始立后土祠於睢上率嵗嵗間舉之或隔一嵗常以正月郊泰畤三月祠后土成帝建始元年初立南北郊亦用正月三月辛日而罷甘泉汾隂之祭元豐祐紹三議皆未嘗及此蓋盛夏入廟出郊在漢禮元不然也是時坡公以非議者所起故不暇更為之説似不必深攻合祭為王莽所行庶幾往復考賾不至矛盾當復俟知禮者折衷之焉騫騫二字義訓騫騫二字音義訓釋不同以字書正之騫去乾切注云馬腹縶又虧也今列於禮部韻略下平聲二仙中騫虚言切注云飛皃今列於上平聲二十二元中文人相承以騫騰之騫為軒昂掀舉之義非也其字之下從馬馬豈能掀舉哉閔損字子騫雖古聖賢命名制字未必有所拘泥若如虧少之義則渙然矣其下從鳥則於掀飛之訓為得此字殆廢於今故東坡山谷亦皆押騫字入元字如時來或作鵬騫𫝊非其人恐飛騫之類特不暇毛舉深考耳唯韓公和侯恊律詠筍一聮云得時方張王挾勢欲騰騫乃為得之此固小學瑣瑣尤可以見公之不苟於下筆也書麴信陵事夜讀白樂天秦中吟十詩其立碑篇云我聞望江縣麴令撫惸嫠麴名信陵在官有仁政名不聞京師身殁欲歸塟百姓遮路歧攀轅不得去留塟此江湄至今道其名男女涕皆垂無人立碑碣惟有邑人知予因憶少年寓無錫時從錢伸仲大夫借書正得信陵遺集財有詩三十三首祈雨文三首信陵以正元元年鮑防下及第為四人以六年作望江令讀其投石祝江文云必也私欲之求行於邑里慘黷之政施於黎元令長之罪也神得而誅之豈可移於人以害其嵗詳味此言其為政無愧於神天可見矣至大中十一年寄客郷貢進士姚輦以其文示縣令蕭縝縝輟俸買石刋之樂天十詩作於正元元和之際距其亡十五年耳而名已不𫝊新唐藝文志但記詩一卷略無它說非樂天之詩幾於與草木俱腐乾道二年歴陽陸同為望江令得其詩於汝隂王廉清為刋板而致之郡庫但無祈雨文也貢禹朱暉晩達貢禹壯年仕不遇棄官而歸至元帝初乃召用由諫大夫遷光禄奏言臣犬馬之齒八十一凡有一子年十二則禹入朝時蓋年八十其生子時固已七十嵗矣竟再遷至御史大夫列於三公杜子美云長安卿相多少年富貴應須致身早是不然也朱暉在章帝朝自臨淮太守屏居後召拜僕射復為太守上疏乞留中詔許之因議事不合自繫獄不肯復署議曰行年八十得在機宻當以死報遂閉口不復言帝意解遷為尚書令至和帝時復諫征匈奴計其年當九十矣其忠正非禹比也琵琶行海棠詩白樂天琵琶行一篇讀者但羨其風致敬其詞章至形於樂府詠歌之不足遂以謂真為長安故倡所作予竊疑之唐世法網雖於此為寛然樂天嘗居禁宻且謫官未久必不肯乘夜入獨處婦人船中相從飲酒至於極彈絲之樂中夕方去豈不虞商人者他日議其後乎樂天之意直欲攄冩天涯淪落之恨爾東坡謫黄州賦定惠院海棠詩有陋邦何處得此花無乃好事移西蜀天涯流落俱可念為飲一尊歌此曲之句其意亦爾也或謂殊無一話一言與之相似是不然此真能用樂天之意者何必效常人章摹句冩而後已哉東坡不隨人後自屈原詞賦假為漁父日者問答之後後人作者悉相規倣司馬相如子虛上林賦以子虛烏有先生亡是公揚子雲長楊賦以翰林主人子墨客卿班孟堅兩都賦以西都賔東都主人張平子兩都賦以憑虛公子安處先生左太沖三都賦以西蜀公子東吳王孫魏國先生皆改名換字蹈襲一律無復超然新意稍出於法度規矩者晉人成公綏嘯賦無所賔主必假逸羣父子乃能遣詞枚乘七發本只以楚太子吳客為言而曹子建七啓遂有𤣥㣲子鏡機子張景陽七命有沖漠公子殉華大夫之名言話非不工也而此習根著未之或改若東坡公作後把菊賦破題直云吁嗟先生誰使汝坐堂上稱太守殆如飛龍搏鵬騫翔扶揺於烟霄九萬里之外不可摶詰豈區區巢林翾羽者所能窺探其涯涘哉於詩亦然樂天云醉貌如霜葉雖紅不是春坡則曰兒童誤喜朱顔在一笑那知是酒紅杜老云休將短髪還吹帽笑倩旁人為正冠坡則曰酒力漸消風力軟颼颼破帽多情却戀頭鄭谷十日菊云自縁今日人心别未必秋香一夜衰坡則曰相逢不用忙歸去明日黄花蝶也愁又曰萬事到頭都是夢休休明日黄花蝶也愁正采舊公案而機杼一新前無古人於是為至與夫用見他桃李樹思憶後園春之意以為長因送人處憶得别家時為一僧所嗤者有間矣元白習制科白樂天元㣲之同習制科中第之後白公寄㣲之詩曰皆當少壯日同惜盛明時光景嗟虛擲雲霄竊暗闚攻文朝矻矻講學夜孜孜䇿目穿如札毫鋒銳若錐注云時與㣲之結集策略之目其數至百十各有纎鋒細管筆攜以就試相顧輒笑目為毫錐乃知士子待敵編綴應用自唐以來則然毫錐筆之名起於此也門生門下見門生後唐裴尚書年老致政清泰初其門生馬裔孫知舉放榜後引新進士謁謝於裴裴歡宴永日書一絶云官途最重是文衡天與愚夫作盛名三主禮闈今八十門生門下見門生時人榮之事見蘇耆開譚録予以五代登科記考之裴在同光中三知舉四年放進士八人裔孫預焉後十年裔孫為翰林學士以清泰三年放進士十三人茲所書是已裔孫尋拜相新史亦載此一句云白樂天詩有與諸同年賀座主髙侍郞新拜太常同宴蕭尚書亭子一篇注云座主於蕭尚書下及第予考登科記樂天以正元十六年庚辰中書舍人髙郢下第四人登科郢以寳應二年癸夘禮部侍郞蕭昕下第九人登科迨郢拜太常時幾四十年矣昕自癸夘放進士之後二十四年丁夘又以禮部尚書再知貢舉可謂壽俊觀白公所賦益可見唐世舉子之尊尚主司也韓蘇杜公叙馬韓公人物畫記其叙馬處云馬大者九匹於馬之中又有上者下者焉行者牽者奔者涉者陸者翹者顧者鳴者寢者訛者立者齕者飲者溲者陟者降者痒磨樹者噓者嗅者喜而相戲者怒相踶齧者秣者騎者驟者走者載服物者載狐兔者凡馬之事二十有七焉馬大小八十有三而莫有同者焉秦少游謂其叙事該而不煩故倣之而作羅漢記坡公賦韓幹十四馬詩云二馬並驅攢八蹄二馬宛頸鬉尾齊一馬任前雙舉後一馬却避長鳴嘶老髯奚官騎且顧前身作馬通馬語後有八匹飲且行㣲流赴吻若有聲前者既濟出林鶴後者欲涉鶴俛啄最後一匹馬中龍不嘶不動尾揺風韓生畫馬真是馬蘇子作詩如見畫世無伯樂亦無韓此詩此畫誰當看詩之與記其體雖異其為布置鋪冩則同誦坡公之語蓋不待見畫也余雲林繪監中有臨本畧無小異杜老觀曹將軍畫馬圖云昔日太宗拳毛騧近時郭家獅子花今之新圖有二馬復令識者久歎嗟其餘七匹亦殊絶迥若寒空動烟雪霜蹏蹴踏長楸間馬官厮養森成列可憐九馬争神駿顧視清髙氣深穏其語視東坡似若不及至於斯須九重真龍出一洗萬古凡馬空不妨獨步也杜又有畫馬讚云韓幹畫馬毫端有神驊騮老大騕􅒁清新及四蹄雷雹一日天池瞻彼駿骨實維龍媒之句坡公九馬贊言薛紹彭家藏曹將軍九馬圖杜子美所謂作詩者也其詞云牧者萬嵗繪者惟霸甫為作誦偉哉九馬讀此詩文數篇真能使人方寸超然意氣横出可謂妙絶動宫商矣風災霜旱慶元四年饒州盛夏中時雨頻降六七月之間未嘗請禱農家水車龍具倚之於壁父老以為所未見指其西成有秋當倍常嵗而低下之田遂以潦告餘干安仁乃於八月罹地火之厄地火者蓋苗根及心孽蟲生之莖榦焦枯如火烈烈正古之所謂蟊賊也九月十四日嚴霜連降晩稻未實者皆為所薄不能復生諸縣多然有常産者訴於郡縣郡守孜孜愛民有意蠲租然僚吏多云在法無此兩項又云九月正是霜降節不足為異案白樂天諷諫杜陵叟一篇曰九月霜降秋早寒禾穗未熟皆青乾長吏明知不申破急斂暴征求考課此明證也予因記元祐五年蘇公守杭日與宰相吕汲公書論浙西災傷曰賢哲一聞此言理無不行但恐世俗諂薄成風揣所樂聞與所忌諱争言無災或有災而不甚損八月之末秀州數千人訴風災吏以為法有訴水旱而無訴風災閉拒不納老幼相騰踐死者十一人由此言之吏不喜言災者蓋十人而九不可不察也蘇公及此可謂仁人之言豈非昔人立法之初如所謂風災所謂旱霜之類非如水旱之田可以稽考懼貪民乘時或成冒濫故不輕啓其端今日之計固難添創條式但凡有災傷出於水旱之外者專委良守令推而行之則實惠及民可以救其流亡之禍仁政之上也容齋五筆卷七欽定四庫全書容齋五筆卷
