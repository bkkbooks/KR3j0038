  text: 容齋隨筆卷第二二十四則
  hash: sha256:d2279a2bcf104ea09fc9b76136d668ad5e5066c9a41ae51b82ca85320d2e4d15
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_002-1a}
body:
  text: 唐重牡丹歐陽公牡丹釋名云牡丹初不載文字唐人如沈宋元白之流皆善詠花當時有一花之異者彼必形於篇什而寂無傳焉唯劉夢得有詠魚朝恩宅牡丹詩但云一叢千朵而巳亦不云其美且異也豫桉白公集有白牡丹一篇十四韻又秦中吟十篇內買花一章几百言云共道牡丹時相隨買花去一叢深色花十戶中人賦而諷諭樂府有牡丹芳一篇三百四十七字絶道花之妖艷至有遂使王公與卿士遊花冠蓋日相望花開花落二十日一城之人皆若狂之語又寄微之百韻詩云唐昌王蘂會崇敬牡丹期注崇敬寺牡丹花多與微之有期又惜牡丹詩云明朝風起應吹盡夜惜衰紅把火看醉歸盩厔詩云數日非關王事繫牡丹花盡始歸來元微之有入永壽寺看牡丹詩八韻和樂天秋題牡丹叢三韻酬胡三詠牡丹一絶又有五言二絶句許渾亦有詩云近來無奈牡丹何數十千錢買一窠徐凝云三條九陌花時節萬馬千車看牡丹又云何人不愛牡丹花占斷城中好物華然則元白未嘗無詩唐人未嘗不重此花也長歌之哀嬉笑之怒甚於裂眥長歌之哀過於慟哭此語誠然元微之在江陵病中聞白樂天左降江州作絶句云殘燈無焰影憧憧此夕聞君謫九江垂死病中驚起坐暗風吹雨入寒窗樂天以為此句他人尚不可聞況僕心哉微之集作垂死病中仍悵望此三字既不佳又不題為病中作失其意矣東坡守彭城子由來訪之留百餘日而去作二小詩曰逍遙堂後千尋木長送中宵風雨聲悮喜對床尋舊約不知漂泊在彭城秋來東閣涼如水客去山公醉似泥困卧北窗呼不醒風吹松竹雨淒淒東坡以為讀之殆不可為懷乃和其詩以自解至今觀之尚能使人悽然也韋蘇州韋蘇州集中有逢楊開府詩云少事武皇帝無賴恃恩私身作里中橫家藏亡命兒朝持摴蒱局暮竊東鄰姬司隸不敢捕立在白玉墀驪山風雪夜長楊羽獵時一字都不識飲酒肆頑癡武皇升仙去憔悴𬒳人欺讀書事巳晚把筆學題詩兩府始收迹南宫謬見推非才果不容出守撫惸婺矛牙忽逢楊開府論舊涕俱垂味此詩蓋應物自敘其少年事也其不羈乃如此李肇國史補云應物為性髙潔鮮食寡欲所居焚香掃地而坐其為詩馳驟建安巳還各得風韻蓋記其折節後來也唐史失其事不為立傳髙適亦少落魄年五十始為詩即工皆天分超卓不可以常理論云應物為三衛正天寶間所為如是而吏不敢捕又以見時政矣古行宫詩白樂天長恨歌上陽人歌元微之連昌宫詞道開天間宫禁事最為深切矣然微之有行宫一絶句云寥落古行宫宫花寂寞紅白頭宫女在間坐説玄宗語少意足有無窮之味隔是樂天詩云江州去日聽箏夜白髮新生不願聞如今格是頭成雪彈到天明亦任君元微之詩云隔是身如夢頻來不為名憐君近南住時得到山行格與隔二字義同格是猶言巳是也張良無後張良陳平皆漢祖謀臣良之為人非平可比也平嘗曰我多隂謀道家之所禁吾丗即廢矣以吾多隂禍也平傳國至曽孫而以罪絶如其言然良之爵但能至子去其死財十年而絶後丗不復紹封其禍更促於平何哉豫蓋嘗考之沛公攻嶢關秦將欲連和良曰不如因其懈怠擊之公引兵大破秦軍項羽與漢王約中分天下既解而東歸矣良有養虎自遺患之語勸王回軍追羽而滅之此其事固不止於殺降也其無後冝哉周亞夫周亞夫距吳楚堅壁不出軍中夜驚內相攻擊擾亂至於帳下亞夫堅卧不起頃之復定吳奔壁東南陬亞夫使備西北巳而果奔西北不得入漢史書之以為亞夫能持重桉亞夫軍細柳時天子先驅至不得入文帝稱其不可得而犯今乃有軍中夜驚相攻之事安在其能持重乎漢輕族人爰盎陷􅏯錯但云方今計獨有斬錯耳而景帝使丞相以下劾奏遂至父母妻子同産無少長皆棄市主父偃陷齊王於死武帝欲勿誅公孫丞相爭之遂族偃郭解客殺人吏奏解無罪公孫大夫議遂族解且偃解兩人本不死用議者之言殺之足矣何遽至族乎漢之輕於用刑如此漏泄禁中語京房與漢元帝論幽厲事至於十問十答西漢所載君臣之語未有如是之詳盡委曲者蓋漢法漏泄省中語為大罪如夏侯勝出道上語宣帝責之故退不敢言人亦莫能知者房初見帝時出為御史大夫鄭君言之又為張博道其語博密記之後竟以此下獄棄市今史所載豈非獄辭乎王章與成帝論王鳯之罪亦以王音側聽聞之耳田叔貫髙謀弒漢祖事發覺漢詔趙王有敢隨王罪三族唯田叔孟舒等自髠鉗隨王趙王既出上以叔等為郡守文帝初立召叔問曰公知天下長者乎曰故雲中守孟舒長者也是時舒坐虜大入雲中免上曰虜入雲中孟舒不能堅守士卒死者數百人長者固殺人乎叔叩頭曰夫貫髙等謀反天子下明詔趙有敢隨張王者罪三族然孟舒自髠鉗隨張王以身死之豈自知為雲中守哉是乃所以為長者上曰賢哉孟舒復召以為雲中守桉田叔孟舒同隨張王今叔指言舒事幾於自薦矣叔不自以為嫌但欲直孟舒之事文帝不以為過一言開悟為之復用舒君臣之誠意相與如此孟舒魏尚雲中守孟舒坐虜大入雲中免田叔對文帝曰胸奴來為邊寇孟舒知士卒罷敝不忍出言士爭臨城死敵如子為父以故死者數百人孟舒豈驅之哉上曰賢哉孟舒復召以為雲中守又馮唐對文帝曰魏尚為雲中守虜嘗一入尚率車騎擊之士卒終日力戰上功莫府坐首虜差六級下吏削爵臣以為陛下罰太重上赦魏尚復以為雲中守案孟舒魏尚皆以文帝時為雲中守皆坐胸奴入寇獲罪皆得士死力皆用他人言復故官事切相類疑其只一事云秦用他國人七國虎爭天下莫不招致四方遊士然六國所用相皆其宗族及國人如齊之田忌田嬰田文韓之公仲公叔趙之奉陽平原君魏王至以太子為相獨秦不然其始與之謀國以開霸業者魏人公孫鞅也其它若樓緩趙人張儀魏冉范睢皆魏人蔡澤燕人吕不韋韓人李斯楚人皆委國而聽之不疑卒之所以兼天下者諸人之力也燕昭王任郭隗劇辛樂毅幾滅強齊辛毅皆趙人也楚悼王任吳起為相諸侯患楚之強蓋衛人也曹參趙括漢髙祖疾甚吕后問曰蕭相國既死誰令代之上曰曹參可蕭何事惠帝病上問曰君即百歲後誰可代君對曰知臣莫若主帝曰曹參何如曰帝得之矣曹參相齊聞何薨告舍人趣治行吾且入相居無何使者果召參趙括自少時學兵法其父奢不能難然不謂善謂其母曰趙若必將之破趙軍者必括也後廉頗與秦相持秦應侯行千金為反間於趙曰秦之所畏獨趙括耳趙王以括代頗將藺相如諌王不聽括母上書言括不可使王又不聽秦王聞括巳為趙將乃隂使白起代王齕遂勝趙曹參之冝為相髙祖以為可惠帝以為可蕭何以為可參自以為可故漢用之而興趙括之不冝為將其父以為不可母以為不可大臣以為不可秦王知之相應侯知之將白起知之獨趙王以為可故用之而敗嗚呼將相安危所係可不監哉且秦以白起易王齕而趙乃以括代廉頗不待於戰而勝負之形見矣信近於義信近於義言可復也恭近於禮逺恥辱也因不失其親亦可宗也程明道曰因恭信而不失其所以親近於禮義故亦可宗伊川曰因不失於相近亦可尚也又曰因其近禮義而不失其親亦可宗也況於盡禮義者乎范純父曰君子所因者本而立愛必自親始親親必及人故曰因不失其親吕與叔分為三事謝顯道曰君師友三者雖非天屬亦可以親捨此三者之外吾恐不免於諂賤惟親不失其所親然後為可宗也楊中立曰信不失義恭不悖禮又因不失其親焉是亦可宗也尹彥明曰因其近雖未足以盡禮義之本亦不失其所宗尚也豫切以謂義與禮之極多至於不親能至於不失其親斯為可宗也然未敢以為是剛毅近仁剛毅者必不能令色木訥者必不為巧言此近仁鮮仁之辨也忠恕違道曽子曰夫子之道忠恕而巳矣中庸曰忠恕違道不逺學者疑為不同伊川云中庸恐人不喻乃指而示之近又云忠恕固可以貫道子思恐人難曉故降一等言之又云中庸以曽子之言雖是如此又恐人尚疑忠恕未可便為道故曰違道不逺遊定夫云道一而巳豈參彼此所能豫哉此忠恕所以違道為其未能一以貫之也雖然欲求入道者莫近於此此所以違道不逺也楊中立云忠恕固未足以盡道然而違道不逺矣侯師聖云子思之忠恕施諸已而不願亦勿施於人此巳是違道若聖人則不待施諸已而不願然後勿施諸人也諸公之説大氐不同豫切以為道不可名言既麗於忠恕之名則為有迹故曰違道然非忠恕二字亦無可以明道者故曰不逺非謂其未足以盡道也違者違去之謂非違畔之謂老子曰上善若水水善利萬物而不爭處衆人之所惡故幾於道蘇子由解云道無所不在無所不利而水亦然然而既巳麗於形則於道有間矣故曰幾於道然而可名之善未有若此者故曰上善其説與此略同求為可知不患無位患所以立不患莫已知求為可知也為之説者皆以為當求為可知之行唯謝顯道云此論猶有求位求可知之道在至論則不然難用而莫我知斯我貴矣夫復何求豫以為君子不以無位為患而以無所立為患不以莫已知為患而以求為可知為患第四句蓋承上文言之夫求之有道若汲汲然求為可知則亦無所不至矣里仁里仁為美擇不處仁焉得智孟子論函矢巫匠之術而引此以質之説者多以里為居居以親仁為美豫嘗記一説云函矢巫匠皆里中之仁也然於仁之中有不仁存焉則仁亦在夫擇之而已矣嘗與鄭景望言之景望不以為然豫以為此特謂閭巷之間所推以為仁者固在所擇正合孟子之意不然仁之為道大矣尚安所擇而處哉漢采衆議漢元帝時珠崖反連年不定上與有司議大發軍待詔賈捐之建議以為不當擊上以問丞相御史御史大夫陳萬年以為當擊丞相于定國以為捐之議是上從之遂罷珠崖郡胸奴呼韓邪單于既事漢上書願保塞上谷以西請罷邊備塞吏卒以休天子人民天子令下有司議議者皆以為便郎中侯應習邊事以為不可許上問狀應對十䇿有詔勿議罷邊塞事成帝時胸奴使者欲降下公卿議議者言冝如故事受其降光祿大夫谷永以為不如勿受天子從之使者果詐也哀帝時單于求朝帝欲止之以問公卿亦以為虛費府帑可且勿許單于使辭去黃門郎楊雄上書諌天子寤焉召還胸奴使者更報單于書而許之安帝時大將軍鄧騭欲棄涼州并力北邊會公卿集議皆以為然郎中虞詡陳三不可乃更集四府皆從詡議北胸奴復強西域諸國既絶於漢公卿多以為冝閉玉門關絶西域鄧太后召軍司馬班勇問之勇以為不可於是從勇議順帝時交址蠻叛帝召公卿百官及四府掾屬問以方略皆議遣大將發兵赴之議郎李固駮之乞選刺史太守以往四府悉從固議嶺外復平靈帝時涼州兵亂不解司徒崔烈以為冝棄詔會公卿百官議之議郎傅燮以為不可帝從之此八事者所係利害甚大一時公卿百官既同定議矣賈捐之以下八人皆以郎大夫之微獨陳異説漢元成哀安順靈皆非明主悉能違衆而聽之大臣無賢愚亦不復執前説蓋猶有公道存焉每事皆能如是天下其有不治乎漢母后漢母后預政不必臨朝及少主雖長君亦然文帝繫周勃薄太后曰絳侯綰皇帝璽將兵於北軍不以此時反今居一小縣顧欲反邪帝謝曰吏方驗而出之遂赦勃吳楚反誅景帝欲續之竇太后曰吳王老人也冝為宗室順善今乃首亂天下奈何續其後不許吳許立楚後郅都害臨江王竇太后怒會胸奴中都以漢法帝曰都忠臣欲釋之后曰臨江王獨非忠臣乎於是斬都武帝用王臧趙綰太皇竇太后不恱儒術綰請母奏事東宫后大怒求得二人姦利事以責上上下綰臧吏殺之竇嬰田蚡廷辨王太后大怒不食曰我在也而人皆藉吾弟且帝寧能為石人邪帝不直蚡特為太后故殺嬰韓嫣得幸於上江都王為太后泣請得入宿衛比嫣后繇此銜嫣嫣以姦聞后使使賜嫣死上為謝終不能得成帝幸張放太后以為言帝常涕泣而遣之田千秋郅惲漢武帝殺戾太子田千秋訟太子冤曰子弄父兵當何罪帝大感悟曰父子之間人所難言也公獨明其不然公當遂為吾輔佐遂拜為丞相光武廢郭后郅惲言曰夫婦之好父不能得之於子況臣能得之於君乎是臣所不敢言雖然願陛下念其可否之計無令天下有議社稷而巳帝曰惲善恕己量主遂以郭氏為中山王太后卒以壽終此二人者可謂善處人骨肉之間諌不費詞婉而能入者矣戾太子戾太子死武帝追悔為之族江充家黃門蘇文助充譖太子至於焚殺之李壽加兵刃於太子亦以它事族田千秋以一言至為丞相又作思子宮為歸來望思之臺然其孤孫囚係於郡邸獨不能釋之至於掖庭令養視而不問也豈非漢法至嚴既坐太子以反逆之罪雖心知其冤而有所不赦者乎灌夫任安竇嬰為丞相田蚡為太尉同日免蚡後為丞相而嬰不用無藝諸公稍自引而怠驁唯灌夫獨否衛靑為大將軍霍去病財為校尉巳而皆為大司馬靑日衰去病日益貴靑故人門下多去事去病唯任安不肯去灌夫任安可謂賢而知義矣然皆以它事卒不免於族誅事不可料如此單于朝漢漢宣帝黃龍元年正月胸奴單于來朝二月歸國十二月帝崩元帝竟寧元年正月又來朝五月帝崩故哀帝時單于願朝時帝被疾或言胸奴從上遊來厭人自黃龍竟寧時中國輒有大故上由是難之既不許矣俄以楊雄之言復許之然元壽二年正月單于朝六月帝崩事之偶然符合有如此者容齋隨筆卷第二
