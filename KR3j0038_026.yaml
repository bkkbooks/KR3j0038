  text: 容齋續筆卷第八十五則
  hash: sha256:8193f042f2ced030168ad1c20f6409235afd6d985b24a4de00a7e9d1380f45b1
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_026-1a}
body:
  text: 蓍龜卜筮古人重卜筮其究至於通神龜爲卜蓍爲筮故曰假爾泰龜有常假爾泰筮有常定天下之吉凶成天下之亹亹所以使民信時日敬鬼神畏法令舜之命禹武王之伐紂召公相宅周公營成周未甞不昆命元龜襲祥考卜然筮短龜長則龜卜猶在易筮之上漢蓺文志劉向所輯七略自龜書夏龜之屬凡十五家至四百一卷後丗無傳焉今之揲蓍者率多流入於影象所謂龜策惟市井細人始習此蓺其得不過數錢士大夫未甞過而問也伎術標牓所在如織五星六壬衍禽三命軌析太一洞微紫微太素遁甲人人自以爲君平家家自以爲季主每況愈下由是藉手于達官要人舟車交錯於道路毀譽紛紜而術益隱矣周禮太卜掌三兆之灋一曰玉兆二曰瓦兆三曰原兆杜子春云玉兆顓帝之兆瓦兆帝堯之兆原兆有周之兆經兆之體皆百有二十其頌皆千有二百又掌三易之灋曰連山曰歸藏曰周易其經卦皆八其别皆六十有四今獨周易之書存它不復可見丗謂文王重易六爻爲六十四卦然則夏商之易巳如是矣左氏傳所載懿氏占曰鳯望于飛和鳴鏘鏘有嬀之後將育于姜成季之卜曰其名曰友在公之右同復于父敬如君所晉獻公驪姬之繇曰專之渝攘公之羭嫁伯姬之繇曰車說其輹火焚其旗冦張之弧姪其從姑秦伯伐晉曰千乗三去三去之餘獲其雄狐文公納王遇黃帝戰于阪泉之兆鄢陵之戰晉侯筮曰南國䠞射其元王中厥目宋伐鄭趙鞅卜救之遇水適火史龜曰是謂沈陽可以興兵利以伐姜不利子商史墨曰盈水名子水位名位敵不可干也杜氏謂鞅姓盈宋姓子蓋言嬴與盈同也史趙曰是謂如川之滿不可游也衞莊公卜夢曰如魚尾衡流而方羊裔焉闔門塞竇乃自後踰此十占皆不可得其說故杜元凱云凡筮者用周易則其象可推非此而往則臨時占者或取於象或取於氣或取於時日王相以成其占若盡附㑹以爻象則架虚而不經可爲通論然亦安知非連山歸藏所載乎地名異音郡邑之名有與本字大不同者顔師古以爲土俗各有别稱者是也姑以漢書地理志言之馮翊之櫟陽爲藥陽蓮勺爲輦酌太原之慮虒爲廬夷上黨之沾爲添河内之隆慮爲林廬蕩隂爲湯隂潁川之不羮爲不郎南陽之酈爲擲堵陽爲者陽酇爲讃沛之鄼爲嵯鄲爲多清河之鄃爲輸汝南之平輿爲平預濟隂之宛句爲冤劬江夏之沙羡爲沙夷九江之橐皐爲拓姑廬江之雩婁爲吁閭山陽之方與爲房豫琅邪之不其爲不基東海之承爲證長沙之承陽爲烝陽臨淮之取慮爲秋廬㑹稽之諸曁爲諸旣太末爲闥末豫章之餘汗爲餘干梓潼之汁方爲十方蜀郡之徙爲斯益州之味爲昧金城之允吾爲鉛牙允街爲鉛街武威之樸􅯑爲蒲環張掖之番禾爲盤和安定之烏氏爲烏支上郡之龜兹爲丘慈西河之鵠澤爲梏澤代郡之狋氏爲權精遼西之且慮爲趄廬令支爲鈴祇遼東之番汗爲盤寒樂浪之黏蟬爲黏提南海之番禺爲潘隅蒼梧之荔浦爲肄浦交趾之羸􅖮爲蓮簍九眞之都龐爲都聾日南之西捲爲西權淮陽之陽夏爲陽賈魯國之蕃爲皮皆不可求之於義訓字書亦不盡載也韓嬰詩前漢書儒林傳叙詩云漢興申公作魯詩后蒼作齊詩韓嬰作韓詩又云申公爲詩訓故而齊轅固燕韓生皆爲之傳或取春秋采雜說咸非其本義與不得巳魯最爲近之嬰爲文帝博士景帝時至常山太傅推詩人之意作外傳數萬言其語頗與齊魯間殊然歸一也武帝時與董仲舒論於上前精悍分明仲舒不能難其後韓氏有王吉食子公長孫順之學蓺文志韓家詩經二十八卷韓故三十六卷内傳四卷外傳六卷韓說四十一卷今惟存外傳十卷慶曆中將作監主簿李用章序之命工刋刻于杭其末又題云蒙文相公改正三千餘字予家有其書讀首卷第二章曰孔子南遊適楚至於阿谷有處子佩瑱而浣者孔子曰彼婦人其可與言矣乎抽觴以授子貢曰善爲之辭子貢曰吾將南之楚逢天暑願乞一飲以表我心婦人對曰阿谷之水流而趨海欲飲則飲何問婦人乎受子貢觴迎流而挹之置之沙上曰禮固不親授孔子抽琴去其軫子貢往請調其音婦人曰吾五音不知安能調琴孔子抽絺綌五兩以授子貢子貢曰吾不敢以當子身敢置之水浦婦人曰子年甚少何敢受子子不早去今切有狂夫守之者矣詩曰南有喬木不可休息漢有游女不可求思此之謂也觀此章乃謂孔子見處女而教子貢以微詞三挑之以是說詩可乎其謬戾甚矣它亦無足言五行衰絶字木絶於申故柛字之訓爲木自斃水土絶於巳故汜字之訓說文以爲窮瀆圯字之訓爲岸圯及覆火衰於戍故烕爲滅金衰於丑故鈕爲鍵閉製字之義昭矣漢表所記事漢書功臣表所記列侯功狀有紀傳所軼者韓信擊魏以木罌缶度軍表云祝阿侯髙邑以將軍屬淮隂擊魏罌度軍史記作缻蓋此計由邑所建也信謀發兵襲吕后其舎人得罪信信囚欲殺之舎人弟上書變告信欲反晉灼注曰楚漢春秋云謝公也表有滇陽侯樂說史記作欒說以淮隂舎人告反侯蓋非謝公也須昌侯趙衍從漢王起漢中雍軍塞渭上上計欲還衍言從它道道通中牟侯單右車始髙祖微時有急給髙祖馬故得侯邔侯黃極忠以羣盜長爲臨江將巳而爲漢擊臨江王祁侯繒賀從擊項籍漢王敗走賀擊楚迫騎以故不得進漢王顧謂賀祁王史記作侯顔師古曰謂之祁王蓋嘉其功故寵襃之許以爲王也它復有與傳小異者史記張良傳項梁立韓王成以良爲韓申徒徐廣云申徒即司徒語音訛轉也而漢表良以韓申都下韓師古云韓申都即韓王信也楚漢春秋作信都古信申同字案良與韓王信了不相干顔注誤矣自司徒訛爲申徒自申徒爲申都自申都爲信都展轉相傳古書豈復可以字義求也韓信歸漢爲治粟都尉表以爲票客師古曰與紀傳參錯不同或者以其票疾而賔客禮之故云票客也史記作典客索隱以爲粟客此外又有官名非史所載者如孔聚以執盾從周竈以長鉟都尉郭蒙以戸衞宣虎以重將重將者主將領輜重也耏跖以門尉棘丘侯襄以執盾隊史郭亭以塞路塞路者主遮塞要路以備敵冦也丁禮以中㳙騎爰類以愼將謂以謹愼爲將也許盎以駢隣說衞駢隣者二馬曰駢謂並兩騎爲軍翼也說讀曰稅稅衞者軍行初舎止之時主爲衞也許瘛以趙右林將林將者將士林猶言羽林之將也清侯以弩將留肹以客吏馮解散以代大與大與主爵禄之官也史記作太尉靳彊以郎中騎千人之類聊紀於此以示讀史者云蕭何紿韓信黥布爲其臣賁赫告反高祖以語蕭相國相國曰布不冝有此恐仇怨妄誣之請繫赫使人微驗淮南布遂反韓信爲人告反吕后欲召恐其不就乃與蕭相國謀詐令人稱陳豨巳破紿信曰雖病強入賀信入即被誅信之爲大將軍實蕭何所薦今其死也又出其謀故俚語有成也蕭何敗也蕭何之語何尚能救黥布而翻忍於信如此豈非以髙祖出征吕后居内而急變從中起巳爲留守故不得不亟誅之非如布之事尚在疑似之域也彭越無罪韓信英布彭越皆以謀反誅夷信乗髙祖自將征陳豨之時欲詐赦諸官徒發兵襲吕后太子布見漢使驗問即發兵東取荆西擊楚對髙祖言欲爲帝其爲反逆巳明唯越但以稱病不親詣邯鄲之故上旣赦以爲庶人而吕后令人告越復謀反遂及禍三人之事越獨爲冤且扈輒勸越反越不聽有司以越不誅輒爲反形巳具然則貫髙欲殺髙祖張敖不從其事等耳乃以爲不知狀而敖得釋何也樂說告信賁赫告布皆得封列侯而梁大僕告越不論賞豈非漢朝亦知其故耶欒布爲越大夫使於齊而越死還奏事越頭下上召罵布欲亨之布謂越反形未見而帝以苛細誅之上乃釋布拜爲都尉然則髙祖於用刑爲有負於越矣傷哉蜘蛛結罔佛經云蠢動含靈皆有佛性莊子云惟蟲能蟲惟蟲能天蓋雖昆蟲之微天機所運其善巧方便有非人智慮技解所可及者𧖟之作繭蜘蛛之結罔蜂之累房燕之營巢蟻之築垤螟蛉之祝子之類是巳雖然亦各有幸不幸存乎其間蛛之結罔也布絲引經捷急上下其始爲甚難至於緯而織之轉盻可就踈密分寸未甞不齊門檻及花梢竹間則不終日必爲人與風所敗唯閑屋垝垣人迹罕至乃可乆乆而享其安故燕巢幕上季子以爲至危李斯見吏舎厠中䑕食不絜近人犬數驚恐之倉中之䑕食積粟居大廡之下不見人犬之憂歎曰人之賢不肖譬如䑕矣在所自處耳豈不信哉孫權稱至尊陳壽三國志固多出於一時雜史然獨吴書稱孫權爲至尊方在漢建安爲將軍時巳如此至於諸葛亮周瑜見之於文字間亦皆然周瑜病困與權書曰曹公在北劉備寄寓此至尊垂慮之日也魯肅破曹公還權迎之肅曰願至尊威德加乎四海吕蒙遣鄧玄之說郝普曰關羽在南郡至尊身自臨之又曰至尊遣兵相繼於道蒙謀取關羽密陳計策曰羽所以未便東向者以至尊聖明蒙等尚存也陸遜謂蒙曰下見至尊冝好爲計甘寧欲圖荆州曰劉表慮旣不逺兒子又劣至尊當早規之權爲張遼掩襲賀齊曰至尊人主常當持重權欲以諸葛恪典掌軍糧諸葛亮書與陸遜曰家兄年老而恪性踈糧榖軍之要最足下特爲啓至尊轉之遜以白權凡此之類皆非所冝稱若以爲陳壽作史虚辭則魏蜀不然也康山讀書杜子美贈李太白詩康山讀書處頭白好歸來說者以爲即廬山也吳曾能改齋漫録内辨誤一卷正辨是事引杜田杜詩補遺云范傳正李白新墓碑云白本宗室子厥先避仇客蜀居蜀之彰明太白生焉彰明綿州之屬邑有大小康山白讀書于大康山有讀書堂尚存其宅在清廉郷後廢爲僧坊稱隴西院蓋以太白得名院有太白像吳君以是證杜句知康山在蜀非廬山也予案當塗所刋太白集其首載新墓碑宣歙池等州觀察使范傳正撰凡千五百餘字但云自國朝巳來編於屬籍神龍初自碎葉還廣漢因僑爲郡人初無補遺所紀七十餘言豈非好事者僞爲此書如開元遺事之類以附㑹杜老之詩邪歐陽忞輿地廣記云彰明有李白碑白生於此縣蓋亦傳說之誤當以范碑爲正列國城門名郡縣及城門名用一字者爲雅馴近古今獨姑蘇曰吳郡吳縣有盤門閶門葑門婁門齊門它皆不然春秋時列國門名見於左氏傳者鄭最多曰渠門純門時門將門閨門皇門鄟門墓門又有師之梁桔柣之門周曰圉門魯曰雩門雉門稷門萊門鹿門又有子駒之門公羊傳有爭門吏門宋曰耏門桐門盧門曹門澤門揚門桑林之門邾曰魚門范門衞曰閱門蓋獲之門齊曰雍門亦有揚門鹿門稷門吳曰胥門宋垤澤之門見孟子緇塵素衣陳簡齋墨梅絶句一篇云粲粲江南萬玉妃别來幾度見春歸相逢京洛渾依舊只恨緇塵染素衣語意皆妙絶晉陸機爲顧榮贈婦詩云京洛多風塵素衣化爲緇齊謝元暉酬王晉安詩云誰能乆京洛緇塵染素衣正用此也去國立後齊髙氏食邑于盧髙弱以盧叛齊閭丘嬰圍之弱曰苟使髙氏有後請致邑齊人立髙酀弱致盧而出奔晉魯臧氏食邑于防臧紇得罪使來告曰苟守先祀敢不辟邑乃立臧爲紇致防而奔齊案弱紇二人據地要君故孔子曰臧武仲以防求後于魯雖曰不要君吾不信也然齊魯之君竟如其請不以要君之故而背之蓋當是時先王之澤未熄非若戰國務爲詐力權謀之比所謂殺人之中又有禮焉者也降及末丗遂有帶甲約降旣解甲即圍而殺之者不仁孰甚焉詩詞改字王荆公絶句云京口瓜洲一水間鍾山秖隔數重山春風又緑江南岸明月何時照我還吳中士人家藏其草初云又到江南岸圈去到字注曰不好改爲過復圈去而改爲入旋改爲滿凡如是十許字始定爲緑黃魯直詩歸燕略無三月事髙蟬正用一枝鳴用字初曰抱又改曰占曰在曰帶曰要至用字始定予聞於錢伸仲大夫如此今豫章所刻本乃作殘蟬猶占一枝鳴向巨原云元不伐家有魯直所書東坡念奴嬌與今人歌不同者數處如浪淘盡爲浪聲沉周郎赤壁爲孫吳赤壁亂石穿空爲崩雲驚濤拍岸爲掠岸多情應笑我早生華髮爲多情應是笑我生華髮人生如夢爲如寄不知此本今何在也姑舅爲㛰姑舅兄弟爲㛰在禮法不禁而丗俗不曉案刑統户㛰律云父母之姑舅兩姨姊妹及姨若堂姨母之姑堂姑己之堂姨及再從姨堂外甥女女壻姊妹並不得爲㛰姻議曰父母姑舅兩姨姊妹於身無服乃是父母緦麻據身是尊故不合娶及姨又是父母大功尊若堂姨雖於父母無服亦是尊屬母之姑堂姑並是母之小功以上尊巳之堂姨及再從姨堂外甥女亦謂堂姊妹所生者女壻姊妹於身雖並無服據理不可爲㛰並爲尊卑混亂人倫失序之故然則中表兄弟姉妹正是一等其於㛰娶了無所妨予記政和八年知漢陽軍王大夫申明此項勑局看詳以爲如表叔取表姪女從甥女嫁從舅之類甚爲明白徽州法司編類續降有全文今州縣官書判至有將姑舅兄弟成㛰而斷離之者皆失於不能細讀律令也惟西魏文帝時禁中外及從母兄弟姊妹爲㛰周武帝又詔不得娶母同姓以爲妻妾宣帝詔母族絶服外者聽㛰皆偏閏之制漫附於此容齋續筆卷第八
