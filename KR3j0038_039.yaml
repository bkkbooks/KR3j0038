body:
  text: 容齊三筆卷第三十九則兔葵燕麥劉禹錫再游元都觀詩序云唯兔葵燕麥動搖春風耳今人多引用之豫讀北史邢邵傳載邵一書云國子雖有學官之名而無教授之實何異兔絲燕麥南箕北斗哉然則此語由來久矣爾雅曰莃兔葵籥雀麥郭璞注曰頗似葵而葉小狀如藜雀麥即燕麥有毛廣志曰莵葵爚之可食古歌曰田中莵絲何嘗可絡道邊燕麥何嘗可穫皆見於太平御覽上林賦葴析苞荔張揖注曰析似燕麥音斯葉庭圭海録碎事云兔葵苗如龍芮花白莖紫燕麥草似麥亦曰雀麥但未詳出於何書北狄俘虜之苦元魏破江陵盡以所俘士民為奴無問貴賤蓋北方夷俗皆然也自靖康之後陷於金虜者帝子王孫官門仕族之家盡沒為奴婢使供作務每人一月支稗子五斗令自舂為米得一斗八升用為餱糧歲支麻五把令緝為裘此外更無一錢一帛之入男子不能緝者則終歲祼體虜或哀之則使執㸑雖時負火得暖氣然才出外取柴歸再坐火邊皮肉即脫落不日輒死惟喜有手藝如醫人繡工之類尋常只團坐地上以敗席或蘆藉襯之遇客至開筵引能樂者使奏技酒闌客散各復其初依舊環坐刺繡任其生死視如草芥先公在英州為攝守蔡寯言之蔡書於甲戌日記後其子大器録以相示此松漠記聞所遺也太守刺史贈吏民官漢薛宣為左馮翊池陽令舉廉吏獄掾王立未及召立妻受囚家錢慙恐自殺宣移書池陽曰其以府决曹掾書立之柩以顯其魂顔師古注云以此職追贈也後魏并州刺史以部民吳悉逹兄弟行著鄉里板贈其父渤海太守此二者皆以太守刺史而擅贈吏民官職不以為過後世不敢然也李元亮詩啓建昌縣士人李元亮山房公擇尚書族子也抱材尚氣不以辭色假人崇寧中在太學蔡薿為學録元亮惡其人不以所事前廊之禮事之蔡擢第魁多士元亮失意歸鄉大觀二年冬復詣學道過和州蔡解褐即超用才二年至給事中出補外正臨此邦元亮不肯入謁蔡自到官即戒津吏門卒凡士大夫往來無問官髙卑必飛報雖布衣亦然既知其來便命駕先造所館元亮驚喜出迎謝曰所以來顓為門下之故方修贄見之禮須明旦扣典客不意給事先生卑躬下賤如此前贄不可復用當别撰一通然後敬謁蔡退元亮旋營一啓旦而往焉其警䇿曰定館而見長者古所不然輕身以先匹夫今無此事蔡摘讀嗟激留宴連夕餉以五十萬錢且致書延譽於諸公閒遂登三年貢士科元亮亦工詩如人間知晝永花落見春深朝雨未休還暮雨臘寒才過又春寒皆佳句也元魏改功臣姓氏魏孝文自代遷洛欲大革胡俗既自改拓跋為元氏而諸功臣舊族自代來者以姓或重復皆改之於是拔拔氏為長孫氏逹奚氏為奚氏乙旃氏為叔孫氏丘穆陵氏為穆氏步六孤氏為陸氏賀賴氏為賀氏獨孤氏為劉氏賀樓氏為樓氏勿忸于氏為于氏尉遲氏為尉氏其用夏變夷之意如此然至于其孫恭帝翻以中原故家易賜蕃姓如李弼為徒河氏趙肅趙貴為乙弗氏劉亮為侯莫陳氏楊忠為普六茹氏王雄為可頻氏李虎閻慶為大野氏辛威為普毛氏田宏為紇干氏耿豪為和稽氏王勇為厙汗氏楊紹為叱利氏侯植為侯伏侯氏竇熾為紇豆陵氏李穆為㩉拔氏陸通為步六孤氏楊纂為莫胡盧氏冦雋為若口引氏假永為爾綿氏韓褒為侯吕陵氏裴文舉為賀蘭氏王軌為烏九氏陳欣為尉遲氏樊深為萬紐于氏一何其不循乃祖彛憲也是時蓋宇文泰顓國此事皆出其手遂復國姓為拓跋而九十九姓改為單者皆復其舊泰方以時俗文敝命蘇綽倣周書作大誥又悉改官名復周六卿之制顧乃如是殆不可曉也東坡和陶詩陶淵明集歸園田居六詩其末種苗在東臯一篇乃江文通雜體三十篇之一明言斆陶徵君田居蓋陶之三章云種豆南山下草盛豆苗稀晨興理荒穢帶月荷鋤歸故文通云雖有荷鋤倦濁酒聊自適正擬其意也今陶集誤編入東坡据而和之又東方有一士詩十六句復重載於擬古九篇中坡公遂亦兩和之皆隨意即成不復細考耳陶之首章云榮榮窗下蘭密密堂前栁初與君别時不謂行當久出門萬里客中道逢嘉友未言心先醉不在接杯酒蘭枯柳亦衰遂令此言負坡和云有客扣我門繫馬庭前栁庭空鳥雀噪門閉客立久主人枕書卧夢我平生友忽聞剝啄聲驚散一杯酒倒裳起謝客夢覺兩愧負二者金石合奏如出一手何止子由所謂遂與比轍者哉孔戣鄭穆唐孔戣在穆宗時為尚書左丞上書去官天子以為禮部尚書致仕吏部侍郎韓愈奏疏曰戣為人守節清苦論議正平年才七十筋力耳目未覺衰老憂國忘家用意至到如戣輩在朝不過三數人陛下不宜茍順其求不留自助也不報明年正月戣薨國朝鄭穆在元祐中以寶文閣待制兼國子祭酒請老提舉洞霄宫給事中范祖禹言穆雖年出七十精力尚彊古者大夫七十而致仕有不得謝則賜之几杖祭酒居師資之地正宜處老成願母輕聽其去亦不報然穆亦至明年卒二事絶相類陳季常陳慥字季常公弼之子居於黃州之歧亭自稱龍丘先生又曰方山子好賔客喜畜聲妓然其妻桞氏絶凶妬故東坡有詩云龍丘居士亦可憐談空說有夜不眠忽聞河東師子吼拄杖落手心茫然河東師子指桞氏也坡又嘗醉中與季常書云一絶乞秀英君想是其妾小字黃魯直元祐中有與季常簡曰審栁夫人時須醫藥今巳安平否公暮年來想漸求清淨之樂姬媵無新進矣柳夫人比何所念以致疾邪又一帖云承諭老境情味法當如此所苦既不妨游觀山川自可損藥石調護起居飲食而巳河東夫人亦能哀憐老大一任放不解事邪則栁氏之妬名固彰著于外是以二公皆言之云文用諡字先王諡以尊名節以一惠故謂為易名然則諡之為義正訓名也司馬長卿諭蜀文曰身死無名諡為至愚顔注云終以愚死後葉傳稱故謂之諡栁子厚招海賈文曰君不返兮諡為愚二人所用其意則同唯王子淵簫賦曰幸得諡為洞簫兮蒙聖主之渥恩李善謂諡者號也言得諡為簫而常施用之以器物名為諡其語可謂竒矣高唐神女賦宋玉高唐神女二賦其為寓言託興甚明豫嘗即其詞而味其旨蓋所謂發乎情止乎禮義真得詩人風化之本前賦云楚襄王望高唐之上有雲氣問王曰此何氣也對曰所謂朝雲者也昔者先王嘗游高唐夢見一婦人曰妾巫山之女也願薦枕席王因幸之後賦云襄王既使玉賦高唐之事其夜王寢夢與神女遇復命玉賦之若如所言則是王父子皆與此女荒淫殆近於聚麀之醜矣然其賦雖篇首極道神女之美麗至其中則云淡清靜其愔嫕兮性沉詳而不煩意似近而若逺兮若將來而復旋褰余幬而請御兮願盡心之惓惓懷正亮之潔清兮卒與我乎相難頩薄怒以自持兮曽不可乎犯于歡情未接將辭而去遷延引身不可親附願假須臾神女稱遽暗然而冥忽不知處然則神女但與懷王交御雖見夢於襄而未嘗及亂也玉之意可謂正矣今人詩詞顧以襄王藉口考其實則非是頩音匹零反斂容怒色也桞子厚謫龍說有竒女頩爾怒之語正用此也其言明且清禮記緇衣篇詩云昔吾有先正其言明且清國家以寧都邑以成庶民以生誰能秉國成不自為正卒勞百姓鄭氏注不言何詩今毛詩節南山章但有下三句而微不同經典釋文云從第一句至庶民以生五句今詩皆無此語或皆逸詩也豫案文選張華答何劭詩曰周任有遺規其言明且清然則周任所作也而李善注曰子思子詩云昔吾有先正其言明且清世之所存子思子亦無之不知善何所据意當時或有此書善必不妄也特不及周任遺規之義又不可曉侍從轉官元豐未改官制以前用職事官寄祿自諌議大夫轉給事中歷三侍郎左右丞然後轉六尚書各為一官尚書轉僕射非曽任宰相者不許轉今之特進是也故侍從止於吏書由諌議至此凡十一轉其庶僚久於卿列者則自光祿卿轉祕書監繼歷太子賔客遂得工部侍郎蓋以不帶待制以上職不許入兩省給諌耳元豐改諌議為太中大夫給舍為通議六侍郎同為正議左右丞為光祿兵戶刑禮工書同為銀青吏書金紫但六轉視舊法損其五元祐中以為大簡增正議光祿銀青為左右然亦財九資大觀二年置通奉以易右正議正奉以易右光祿宣奉以易左光祿以右銀青為先祿而至銀青者去其左字今皆仍之比倣舊制今之通奉乃工禮侍郎正議乃刑戶正奉乃兵吏宣奉乃左右丞三光祿乃六尚書也凡侍從序遷至金紫無止法建炎以前多有之紹興以來階官到此絶少唯梁揚祖葛勝仲致仕得之近歲有司不能探賾典故豫以宣奉當磨勘又該覃霈顔師魯在天官徑給回授一據而不明言其所由比程叔逹由宣奉納祿不遷官而於待制閣名升二等程大昌亦然以龍圖直學士徑升本學士尤非也豫任中書舍人日巳階太中及以集英修撰出外吏部不復為理年勞凡十八年始以待制得通議殊可笑蓋臺省之中無復有老吏矣曹子建七啓原頭火燒淨兀兀野雉畏鷹出復沒將軍欲以巧伏人盤馬彎弓惜不發地形漸窄觀者多雉驚弓滿徑箭加衝人决起百餘尺紅翎白鏃隨傾斜將軍仰笑軍吏賀五色離披馬前墮此韓昌黎雉帶箭詩東坡嘗大字書之以為絶妙豫讀曹子建七啓論羽獵之美云人稠綱密地逼勢脅乃知韓公用意所來處七啓又云名穢我身位纍我躬與佛氏八大人覺經所書心是惡源形為罪藪皆修巳正心之要語也姦鬼為人禍晉景公疾病求醫于秦秦伯使醫緩為之未至公夢疾為二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可為也隋文帝以子秦孝王俊有疾馳召名醫許智藏俊夢亡妃崔氏泣曰本來相迎如聞許智藏將至其人當必相苦奈何明夜復夢曰吾得計矣當入靈府中以避之及智藏至診俊脉曰疾巳入心不可救也二姦鬼之害人如出一轍近世許叔微家一婦人夢二蒼頭前者云到也未後者應云到也以手中物擊一下遂魘覺後心痛不可忍叔微以神精丹餌之痛止而愈此事亦與上二者相似監司待巡檢今監司巡歷郡邑巡檢尉必迎於本界首公裳危立使者從車內遣謁吏謝之即揖而退未嘗以客禮延之也至有倨橫之人責橋道不整驅之車前使徒步與卒伍齒者豫記張文定公所著搢紳舊聞中一事云余為江西轉運使往䖍州巡檢殿直康懷琪乘舟於三十里相接又欲送至大庾縣遂與偕行及至縣驛驛正㕔東西各有一房豫居其左康處於右日晚命之同食起行數百步逼暮而退夜聞康暴得疾余急趨至康所康已具舟將歸䖍須臾數人扶翼而下余䇿杖隨之觀此則是使者與巡檢同驛而處同席而食至於步行送之登舟今代未之見也十二分野十二國分野上屬二十八宿其為義多不然前輩固有論之者矣其甚不可曉者莫如晉天文志謂自危至奎為娵訾於辰在亥衛之分野也屬并州且衛本受封於河內商虛後徙楚丘河內乃冀州所部漢屬司隸其它邑皆在東郡屬兖州於并州了不相干而并州之下所列郡名乃安定天水隴西酒泉張掖諸郡自係涼州耳又謂自畢至東井為實沈於辰在申魏之分野也屬益州且魏分晉地得河內河東數十縣於益州亦不相干而雍州為秦其下乃列雲中定襄鴈門代太原上黨諸郡蓋又自屬并州及幽州耳謬亂如此而出於李淳風之手豈非蔽於天而不知地乎公孫五樓南燕慕容超嗣位之後悉以國事付公孫五樓燕業為衰晉劉裕伐之或曰燕人若塞大峴之險堅壁清野大軍深入將不能自歸裕曰鮮卑貪婪不知逺計謂我不能持久不過進據臨朐退守廣固必不能守險清野超聞有晉師引羣臣㑹議五樓曰吳兵輕果利在速戰不可爭鋒宜據大峴使不得入各命守宰依險自固焚蕩資儲芟除禾苗使敵無所資彼僑軍無食可以坐制若縱使入峴出城逆戰此下䇿也超不聽裕過大峴燕兵不出喜形于色遂一舉滅燕觀五樓之計正裕之所憚也超平生信用五樓獨於此不然蓋天意也五樓亦可謂智士足與李左車比肩後世姦妄擅國以誤大事者多矣無所謂五樓之智也薦士稱字著年漢魏以來諸公上表薦士必首及本郡名次著其年又稱其字如漢孔融薦禰衡表云處士平原禰衡年二十四字正平齊任昉為蕭揚州作薦士表云祕書丞琅邪王􅌔年二十一字思晦前候官令東海王僧孺年三十五字僧孺是也唐以來乃無此式兄弟邪正王安石引用小人造作新法而弟安國力非之韓絳附㑹安石制置三司條例以得宰相而弟維力爭之曽布當元符靖國之間隂禍善類而弟肇移書力勸之兄弟邪正之不同如此容齊三筆卷第三終
