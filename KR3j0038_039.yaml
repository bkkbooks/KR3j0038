body:
  text: 容齋三筆卷第三十九則兎葵燕麥劉禹錫再游元都觀詩序云唯兎葵燕麥動摇春風耳今人多引用之予讀北史邢邵傳載邵一書云國子雖有學官之名而無教授之實何異兎絲燕麥南箕北斗哉然則此語由來乆矣爾雅曰莃兎葵籥雀麥郭璞注曰頗似葵而葉小狀如藜雀麥即燕麥有毛廣志曰莵葵爚之可食古歌曰田中莵絲何嘗可絡道邊燕麥何嘗可穫皆見於太平御覽上林賦葴析苞荔張揖注曰析似燕麥音斯葉庭珪海錄碎事云兎葵苗如龍芮花白莖紫燕麥草似麥亦曰雀麥但未詳出於何書北狄俘虜之苦元魏破江陵盡以所俘士民爲奴無問貴賤蓋北方夷俗皆然也自靖康之後䧟於金虜者帝子王孫官門仕族之家盡没爲奴婢使供作務毎人一月支稗子五斗令自舂爲米得一斗八升用爲餱糧歳支麻五把令緝爲裘此外更無一錢一帛之入男子不能緝者則終歳祼體虜或哀之則使執㸑雖時負火得煖氣然纔出外取柴歸再坐火邊皮肉即脫落不日輒死惟喜有手藝如醫人繡工之類尋常只團坐地上以敗席或蘆藉襯之遇客至開筵引能樂者使奏技酒闌客散各復其初依舊環坐刺繡任其生死視如草芥先公在英州爲攝守蔡寯言之蔡書於甲戌日記後其子大器錄以相示此松漠記聞所遺也太守刺史贈吏民官漢薛宣爲左馮翊池陽令舉廉吏獄掾王立未及召立妻受囚家錢慙恐自殺宣移書池陽曰其以府决曹掾書立之柩以顯其魂顔師古注云以此職追贈也後魏并州刺史以部民吳悉逹兄弟行著鄉里板贈其父渤海太守此二者皆以太守刺史而擅贈吏民官職不以爲過後世不敢然也李元亮詩啓建昌縣士人李元亮山房公擇尚書族子也抱材尚氣不以辤色假人崇寧中在太學蔡薿爲學録元亮惡其人不以所事前廊之禮事之蔡擢第魁多士元亮失意歸鄕大觀二年冬復詣學道過和州蔡解褐即超用才二年至給事中出補外正臨此邦元亮不肯入謁蔡自到官即戒津吏門卒凡士大夫往來無問官髙卑必飛報雖布衣亦然旣知其來便命駕先造所館元亮驚喜出迎謝曰所以來顓爲門下之故方脩贄見之禮須明旦扣典客不意給事先生卑躬下賤如此前贄不可復用當别撰一通然後敬謁蔡退元亮旋營一啓旦而往焉其警䇿曰定館而見長者古所不然輕身以先匹夫今無此事蔡摘讀嗟激留宴連夕餉以五十萬錢且致書延譽於諸公閒遂登三年貢士科元亮亦工詩如人閑知晝永花落見春深朝雨未休還暮雨臘寒才過又春寒皆佳句也元魏改功臣姓氏魏孝文自代遷洛欲大革胡俗旣自改拓䟦爲元氏而諸功臣舊族自代來者以姓或重複皆改之於是拔㧞氏爲長孫氏逹奚氏爲奚氏乙旃氏爲叔孫氏丘穆陵氏爲穆氏歩六孤氏爲陸氏賀頼氏爲賀氏獨孤氏爲劉氏賀樓氏爲樓氏勿忸于氏爲于氏尉遲氏爲尉氏其用夏變夷之意如此然至于其孫恭帝翻以中原故家易賜蕃姓如李弼爲徒河氏趙肅趙貴爲乙弗氏劉亮爲侯莫陳氏楊忠爲普六茹氏王雄爲可頻氏李虎閻慶爲大野氏辛威爲普毛氏田宏爲紇干氏耿豪爲和稽氏王勇爲厙汗氏楊紹爲叱利氏侯植爲侯伏侯氏竇熾爲紇豆陵氏李穆爲㩉拔氏陸通爲歩六孤氏楊纂爲莫胡盧氏冦雋爲若口引氏叚永爲爾綿氏韓襃爲侯吕陵氏裴文舉爲賀蘭氏王軌爲烏九氏陳忻爲尉遲氏樊深爲萬紐于氏一何其不循乃祖彛憲也是時蓋宇文㤗顓國此事皆出其手遂復國姓爲拓䟦而九十九姓改爲單者皆復其舊泰方以時俗文敝命蘇綽倣周書作大誥又悉改官名復周六卿之制顧乃如是殆不可曉也東坡和陶詩陶淵明集歸園田居六詩其末種苗在東臯一篇乃江文通雜體三十篇之一明言斆陶徵君田居蓋陶之三章云種豆南山下草盛豆苗稀晨興理荒穢帶月荷鋤歸故文通云雖有荷鋤倦濁酒聊自適正擬其意也今陶集誤編入東坡据而和之又東方有一士詩十六句復重載於擬古九篇中坡公遂亦兩和之皆隨意即成不復細考耳陶之首章云榮榮牎下蘭密密堂前栁初與君别時不謂行當乆出門萬里客中道逢嘉友未言心先醉不在接杯酒蘭枯柳亦衰遂令此言負坡和云有客扣我門繫馬庭前栁庭空鳥雀噪門閉客立乆主人枕書卧夢我平生友忽聞剥啄聲驚散一杯酒倒裳起謝客夢覺兩愧負二者金石合奏如出一手何止子由所謂遂與比轍者哉孔戣鄭穆唐孔戣在穆宗時爲尚書左丞上書去官天子以爲禮部尚書致仕吏部侍郎韓愈奏䟽曰戣爲人守節清苦論議正平年纔七十筋力耳目未覺衰老憂國忘家用意至到如戣軰在朝不過三數人陛下不宜茍順其求不留自助也不報明年正月戣薨國朝鄭穆在元祐中以寳文閣待制兼國子祭酒請老提舉洞霄宫給事中范祖禹言穆雖年出七十精力尚彊古者大夫七十而致仕有不得謝則賜之几杖祭酒居師資之地正宜處老成願母輕聽其去亦不報然穆亦至明年卒二事絶相類陳季常陳慥字季常公弼之子居於黄州之歧亭自稱龍丘先生又曰方山子好賔客喜畜聲妓然其妻桞氏絶兇妬故東坡有詩云龍丘居士亦可憐談空說有夜不眠忽聞河東師子吼拄杖落手心茫然河東師子指桞氏也坡又甞醉中與季常書云一絶乞秀英君想是其妾小字黄魯直元祐中有與季常簡曰審栁夫人時須醫藥今巳安平否公暮年來想漸求清淨之樂姬媵無新進矣柳夫人比何所念以致疾邪又一帖云承諭老境情味法當如此所苦旣不妨游觀山川自可損藥石調護起居飲食而巳河東夫人亦能哀憐老大一任放不解事邪則栁氏之妬名固彰著于外是以二公皆言之云文用謚字先王謚以尊名節以壹惠故謂爲易名然則謚之爲義正訓名也司馬長卿諭蜀文曰身死無名謚爲至愚顔注云終以愚死後葉傳稱故謂之謚栁子厚招海賈文曰君不返兮謚爲愚二人所用其意則同唯王子淵簫賦曰幸得謚爲洞簫兮蒙聖主之渥恩李善謂謚者號也言得謚爲簫而常施用之以器物名爲謚其語可謂竒矣高唐神女賦宋玉高唐神女二賦其爲寓言託興甚明予嘗即其詞而味其旨蓋所謂發乎情止乎禮義眞得詩人風化之本前賦云楚襄王望高唐之上有雲氣問王曰此何氣也對曰所謂朝雲者也昔者先王嘗游高唐夢見一婦人曰妾巫山之女也願薦枕席王因幸之後賦云襄王旣使玉賦高唐之事其夜王寢夣與神女遇復命玉賦之若如所言則是王父子皆與此女荒滛殆近於聚麀之醜矣然其賦雖篇首極道神女之美麗至其中則云澹清靜其愔嫕兮性沉詳而不煩意似近而若逺兮若將來而復旋褰余幬而請御兮願盡心之惓惓懷正亮之絜清兮卒與我乎相難頩薄怒以自持兮曽不可乎犯于歡情未接將辭而去遷延引身不可親附願假須臾神女稱遽闇然而㝠忽不知處然則神女但與懷王交御雖見夢於襄而未嘗及亂也玉之意可謂正矣今人詩詞顧以襄王藉口考其實則非是頩音疋零反歛容怒色也桞子厚謫龍說有竒女頩爾怒之語正用此也其言明且清禮記緇衣篇詩云昔吾有先正其言明且清國家以寜都邑以成庶民以生誰能秉國成不自爲正卒勞百姓鄭氏注不言何詩今毛詩節南山章但有下三句而微不同經典釋文云從第一句至庶民以生五句今詩皆無此語或皆逸詩也予案文選張華答何劭詩曰周任有遺規其言明且清然則周任所作也而李善注曰子思子詩云昔吾有先正其言明且清世之所存子思子亦無之不知善何所据意當時或有此書善必不妄也特不及周任遺規之義又不可曉侍從轉官元豐未改官制以前用職事官寄禄自諌議大夫轉給事中歷三侍郎左右丞然後轉六尚書各爲一官尚書轉僕射非曽任宰相者不許轉今之特進是也故侍從止於吏書由諌議至此凡十一轉其庶僚乆於卿列者則自光禄卿轉祕書監繼歷太子賔客遂得工部侍郎蓋以不帶待制以上職不許入兩省給諌耳元豐改諌議爲太中大夫給舍爲通議六侍郎同爲正議左右丞爲光禄兵戸刑禮工書同爲銀青吏書金紫但六轉視舊法損其五元祐中以爲大簡增正議光禄銀青爲左右然亦財九資大觀二年置通奉以易右正議正奉以易右光禄宣奉以易左光祿以右銀青爲先禄而至銀青者去其左字今皆仍之比倣舊制今之通奉乃工禮侍郎正議乃刑戸正奉乃兵吏宣奉乃左右丞三光禄乃六尚書也凡侍從序遷至金紫無止法建炎以前多有之紹興以來階官到此絶少唯梁揚祖葛勝仲致仕得之近歲有司不能探賾典故予以宣奉當磨勘又該覃霈顔師魯在天官徑給回授一據而不明言其所由比程叔逹由宣奉納禄不遷官而於待制閣名陞二等程大昌亦然以龍圖直學士徑升本學士尤非也予任中書舎人日巳階太中及以集英修撰出外吏部不復爲理年勞凡十八年始以待制得通議殊可笑蓋臺省之中無復有老吏矣曹子建七啓原頭火燒淨兀兀野雉畏鷹出復没將軍欲以巧伏人盤馬彎弓惜不發地形漸窄觀者多雉驚弓滿勁箭加衝人决起百餘尺紅翎白鏃隨傾斜將軍仰笑軍吏賀五色離披馬前墮此韓昌黎雉帶箭詩東坡嘗大字書之以爲絶妙予讀曹子建七啓論羽獵之美云人稠綱密地逼勢脅乃知韓公用意所來處七啓又云名穢我身位累我躬與佛氏八大人覺經所書心是惡源形爲罪藪皆修巳正心之要語也姦鬼爲人禍晉景公疾病求醫于秦秦伯使醫緩爲之未至公夢疾爲二豎子曰彼良醫也懼傷我焉逃之其一曰居肓之上膏之下若我何醫至曰疾不可爲也隋文帝以子秦孝王俊有疾馳召名醫許智藏俊夢亡妃崔氏泣曰本來相迎如聞許智藏將至其人當必相苦柰何明夜復夢曰吾得計矣當入靈府中以避之及智藏至診俊脉曰疾巳入心不可救也二姦鬼之害人如出一轍近世許叔微家一婦人夢二蒼頭前者云到也未後者應云到也以手中物擊一下遂魘覺後心痛不可忍叔微以神精丹餌之痛止而愈此事亦與上二者相似監司待巡檢今監司廵歷郡邑廵檢尉必迎於本界首公裳危立使者從車内遣謁吏謝之即揖而退未嘗以客禮延之也至有倨横之人責橋道不整驅之車前使徒步與卒伍齒者予記張文定公所著搢紳舊聞中一事云余爲江西轉運使往䖍州廵檢殿直康懷琪乘舟於三十里相接又欲送至大庾縣遂與偕行及至縣驛驛正㕔東西各有一房予居其左康處於右日晚命之同食起行數百歩逼暮而退夜聞康暴得疾余急趨至康所康已具舟將歸䖍須臾數人扶翼而下余䇿杖隨之觀此則是使者與巡檢同驛而處同席而食至於歩行送之登舟今代未之見也十二分野十二國分野上屬二十八宿其爲義多不然前輩固有論之者矣其甚不可曉者莫如晉天文志謂自危至奎爲娵訾於辰在亥衞之分野也屬并州且衞本受封於河内商虚後徙楚丘河内乃冀州所部漢屬司隷其它邑皆在東郡屬兖州於并州了不相干而并州之下所列郡名乃安定天水隴西酒泉張掖諸郡自係涼州耳又謂自畢至東井爲實沈於辰在申魏之分野也屬益州且魏分晉地得河内河東數十縣於益州亦不相干而雍州爲秦其下乃列雲中定襄鴈門代太原上黨諸郡蓋又自屬并州及幽州耳謬亂如此而出於李淳風之手豈非蔽於天而不知地乎公孫五樓南燕慕容超嗣位之後悉以國事付公孫五樓燕業爲衰晉劉裕伐之或曰燕人若塞大峴之險堅壁清野大軍深入將不能自歸裕曰鮮卑貪婪不知逺計謂我不能持乆不過進據臨朐退守廣固必不能守險清野超聞有晉師引羣臣㑹議五樓曰吳兵輕果利在速戰不可爭鋒宜據大峴使不得入各命守宰依險自固焚蕩資儲芟除禾苗使敵無所資彼僑軍無食可以坐制若縱使入峴出城逆戰此下䇿也超不聽裕過大峴燕兵不出喜形于色遂一舉滅燕觀五樓之計正裕之所憚也超平生信用五樓獨於此不然蓋天意也五樓亦可謂智士足與李左車比肩後世姦妄擅國以誤大事者多矣無所謂五樓之智也薦士稱字著年漢魏以來諸公上表薦士必首及本郡名次著其年又稱其字如漢孔融薦禰衡表云處士平原禰衡年二十四字正平齊任昉爲蕭揚州作薦士表云祕書丞琅邪王􅌔年二十一字思晦前候官令東海王僧孺年三十五字僧孺是也唐以來乃無此式兄弟邪正王安石引用小人造作新法而弟安國力非之韓絳附㑹安石制置三司條例以得宰相而弟維力爭之曽布當元符靖國之間隂禍善類而弟肇移書力勸之兄弟邪正之不同如此容齋三筆卷第三終
