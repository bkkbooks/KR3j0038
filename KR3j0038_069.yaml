front:
  text: 容齋四筆卷第三十六則
  hash: sha256:ad47aafba58d780576c734cb505807fb90c5e23f127e24b41ad210aa7ebdadac
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_069-1a}
body:
  text: 韓退之張籍書韓公集中有答張籍二書其前篇曰吾子所論排釋老不若著書若僕之見則有異乎此請待五六十然後為之吾子又譏吾與人為無實駮雜之説此吾所以為戲耳若商論不能下氣或似有之博塞之譏敢不承教後篇曰二氏行乎中土蓋六百年非可以朝令而夕禁俟五六十為之未失也謂吾與人商論不能下氣若好勝者雖誠有之抑非好己勝也好己之道勝也駮雜之譏前書盡之昔者夫子猶有所戲烏害於道哉大略籍所論四事乞著書譏駮雜諌商論好勝及博塞也今得籍所與書前篇曰漢之衰浮圗之法入中國黃老之術相沿而熾盍為一書以興存聖人之道執事多尚駮雜無實之説使人陳之前以為歡此有纍於盛德又商論之際或不容人之短如任私尚勝者亦有所纍也况為傳塞之戲與人競財乎廢棄日時不識其然願絶博塞之好棄無實之談弘慮以接士嗣孟軻楊雄之作使聖人之道復見於唐後篇曰老釋惑於生人久矣執事可以任著書之事君子汲汲於所欲為若皆待五十六十而後有所為則或有遺恨矣君子發言舉足不逺於禮未聞以駮雜無實之説以為戲也執事每見其説則拊抃呼笑是撓氣害性不得其正矣籍之二書甚徑而直但稱韓公為執事不曰先生考其時乃云執事參於戎府按韓公以正元十二年為汴州推官時年二十有九十五年為徐州推官時年三十有二年位未盛籍未以師禮事之云韓公稱李杜新唐書杜甫傳贊曰昌黎韓愈於文章重許可至歌詩獨推曰李杜文章在光熖萬丈長誠可信云豫讀韓詩其稱李杜者數端聊疏於此石鼓歌曰少陵無人謫仙死才薄將奈石鼓何酬盧雲夫曰髙揖群公謝名譽遠追甫白感至誠薦士曰勃興得李杜萬類困凌暴醉留東野曰昔年因讀李白杜甫詩長恨二人不相從感春曰近憐李杜無檢束爛漫長醉多文辭并唐志所引蓋六用之此日足可惜韓退之此日足可惜一首贈張籍凡百四十句雜用東冬江陽庚青六韻及其亡也籍作詩祭之凡百六十六句用陽庚二韻其語鏗鏘震厲全倣韓體所謂乃出二侍女合彈琵琶筆者是也粉白黛黑韓退之為文章不肯蹈襲前人一言一句故其語曰惟陳言之務去戞戞乎其難哉獨粉白黛緑四字似有所因列子周穆王築中天之臺簡鄭衛之處子娥媌靡曼者粉白黛黑以滿之戰國䇿張儀謂楚王曰鄭周之女粉白黛黑立於衢間見者以為神屈原大招粉白黛黑施芳澤只司馬相如靚莊刻飾郭璞曰粉白黛黑也淮南子毛牆西施施芳澤正娥眉設笄珥衣阿錫粉白黛黑笑目流眺韓公以黑為緑其旨則同李杜往來詩李太白杜子美在布衣時同遊梁宋為詩酒會心之友以杜集考之其稱太白及懷贈之篇甚多如李侯金閨彥脫身事幽討南尋禹穴見李白道甫問訊今何如李白一斗詩百篇自稱臣是酒中仙近來海內為長句汝與山東李白好昔者與髙李晚登單父臺李侯有佳句往往似金鏗憶與髙李輩論交入酒壚白也詩無敵飄然思不群昔年有狂客號爾謫仙人落月滿屋梁猶疑照顔色三夜頻夢君情親見君意秋來相顧尚飄蓬未就丹砂愧葛洪寂寞書齋裏終朝獨爾思涼風起天末君子意何如不見李生久佯狂真可哀凡十四五篇至於太白與子美詩略不見一句或謂堯祠亭別杜輔闕者是巳乃殊不然杜但為右拾遺不曽任輔闕兼自諌省出為華州司功迤邐避難入蜀未嘗復至東州所謂飯顆山頭之嘲亦好事者所撰耳李太白怖州佐李太白上安州裴長史書云白竊慕髙義得趨末塵何圖謗言忽生衆口攢毀將恐投杼下客震於嚴威若使事得其實罪當其身則將浴蘭沐芳自屏於烹鮮之地惟君侯死生之願君侯惠以大遇洞開心顔終乎前恩再辱英眄必能使精誠動天長虹貫曰若赫然作威加以大怒即膝行而前再拜而去耳裴君不知何如人至譽其貴而且賢名飛天京天才超然度越作者稜威雄雄下懾群物豫謂白以白衣入翰林其蓋丗英姿能使髙力士脫鞾於殿上豈拘拘然怖一州佐者邪蓋時有屈伸正自不得不爾大賢不偶神龍困於螻蟻可勝歎哉白此書自敘其平生云昔與蜀中友人吳指南死於洞庭之上白禫服慟哭炎月伏尸猛虎前臨堅守不動遂權殯於湖側數年來觀筯骨尚在雪泣持刃躬申洗削褁骨徒步負之而趨寢興携持無輟身手遂丏貸營葬於鄂城其存交重義如此又與逸人東巖子隱於岷山巢居數年不迹城市飬竒禽千計呼皆就掌取食了無驚猜其飬髙忘機如此而史傳不為書之亦為未盡祝不勝詛齊景公有疾梁丘據請誅祝史晏子曰祝有益也詛亦有損聊攝以東姑尤以西其為人也多矣雖其善祝豈能勝億兆人之詛晉中行寅將亡召其太祝欲加罪曰子為我祝齋戒不敬使吾國亡祝簡對曰今舟車飾賦斂厚民怨謗詛多矣苟以為祝有益於國則詛亦將為損一人祝之一國詛之一祝不勝萬詛國亡不亦冝乎祝其何罪此二説若出一口真藥石之言也吕子論學吕子曰天生人而使其耳可以聞不學其聞則不若聾使其目可以見不學其見則不若盲使其口可以言不學其言則不若喑使其心可以智不學其智則不若狂故凡學非能益之也達天性也能全天之所生而勿敗之可謂善學者矣此説甚美而罕為學者所稱故書以自戒曽太皇太后唐德宗即位訪求其母沈太后歷順宗及憲宗時為曽祖母故稱為曽太皇太后蓋別於祖母也舊新二唐書紀皆載之今慈福太皇太后在夀康太上時已加尊稱若於主上則為曽祖母當用唐故事加曽字向者嘗以告宰相而省吏以為典故所無天子逮事三丗安得有前比亦可謂不知禮矣又嗣濮王士歆在隆興為從叔祖在紹熙為曽叔祖慶元為髙叔祖矣而仍稱皇叔祖如故士歆視嗣秀王伯圭為從祖今圭稱皇伯祖而歆但為皇叔祖乃是弟爾禮寺亦以為國朝以來無稱曽髙者彼蓋不知纍朝尊屬元未之有也中天之臺中天之臺有二其一列子曰西極化人見周穆王王為之改築宫室土木之功赭堊之色無遺巧焉五府為虛而臺始成其髙千仞臨終南之上名曰中天之臺其一新序曰魏王將起中天臺許綰負操鍤入曰臣能商臺王曰若何曰天與地相去萬五千里今王因而半之當起七千五百里之臺髙既如是其趾須方八千里盡王之地不足以為臺趾必起此臺先以兵伐諸侯盡有其地又伐四夷得方八千里乃足以為臺趾度八千里之外當定農畒之地足以奉給王之臺者臺具以備乃可以作王默然無以應乃罷起臺實年官年士大夫敘官閥有所謂實年官年兩説前此未嘗見於官文書大抵布衣應舉必減歲數蓋少壯者欲藉此為求昏地不幸潦倒場屋勉從特恩則年未六十始許入仕不得不豫為之圗至公卿任子欲其早列仕籍或正在童孺故率增擡庚甲有至數歲者然守義之士猶曰兒曹甫䇿名委質而父祖先導之以挾詐欺君不可也比者以朝臣屢言年及七十者不許任監司郡守搢紳多不自安爭引年以決去就江東提刑李信甫雖春秋過七十而官年損其五堅乞致仕有旨官年未及與之外祠知房州章騆六十八歲而官年增其三亦求罷去諸司以其精力未衰援實為請有旨聽終任知嚴州秦焴乞祠之疏曰實年六十五而官年巳踰七十遂得去齊慶胄寧國乞歸亦曰實年七十而官年六十七於是實年官年之字形於制書播告中外是君臣上下公相為欺也掌故之野甚矣此豈可紀於史録哉雷公炮炙論雷公炮炙論載一藥而能治重疾者今醫家罕用之聊志於此其説云髮眉墮落塗半夏而立生目辟眼有五花而自正腳生肉栨裩繫宕根囊皺旋多夜煎竹木體寒腹大全賴鸕鷀血泛經過飮調瓜子咳逆數數酒服熱雄遍體疹風冷調生側腸虛泄利須假草零久渴心煩冝投竹瀝除癥去塊全仗硝􅓀益食加觴須煎蘆朴強筯健骨酒是蓯鱓駐色延年精蒸神錦知瘡所在口點隂膠産後肌浮甘皮酒服腦痛鼻投硝末心痛速覔延胡凡十八項謂眉髮墮落者煉生半夏莖取涎塗髮落處立生玉花者玉加皮也葉有雄雌三葉為雄五葉為雌須使五葉者作末酒浸用之目者正腳有肉杴者取莨岩根繫棍帶上永痊多小便者煎萆解服之永不夜起若患腹大如鼓米飲調鸕鷀末服立枯如故血泛行者搗甜瓜子仁作末去油飲調服之立絶咳逆者天雄炮過以酒調一錢匕服疹風者側子附子傍生者作末冷酒服虛泄者搗五倍子末熟水下之癥塊者以􅓀砂硝石二味乳鉢中研作粉同煆了酒服神效不飲者井飲酒少者煎逆水蘆根并厚朴二味湯服之蓯蓉并鱓魚作末以黃精酒圎服之可力倍常十也黃精自然汁拌細研神錦於桞木甑中蒸七日了以密圎服顔貌可如幼女之容色隂膠即是甑中氣垢點少許於口中即知藏府所起直徹至住處知痛足可醫也産後肌浮酒服甘皮立枯頭痛者以硝石作末內鼻中立止心痛者以延胡索作散酒服之治藥捷法藥有至賤易得人所常用而難於修製者如香附子菟絲子艾葉之類醫家昧其節度或終曰疲勞而不能成本草云凡菟絲子暖湯淘汰去沙土漉乾暖酒漬經一宿漉出暴微白搗之不盡者更以酒漬經三五曰乃出更曬微乾搗之須臾悉盡極易碎蓋以其顆細難施工其説亦殊勞費然自有捷法但撚𥿄條數枚置其間則馴帖成粉香附子洗去皮毛炒之焦熟然後舉投水鉢內候浸漬透徹漉出暴日中微燥乃入搗臼悉應手縻碎艾葉柔軟不可著力若入白茯苓三五片同碾則即時可作細末陳翠説燕后趙左師觸龍説太后使長安君出質用愛憐少子之説以感動之豫嘗論之於隨筆中其事載於戰國䇿史記資治通鑑而燕語中又有陳翠一假甚相似云陳翠合齊燕將令燕王之弟為質於齊太后大怒曰陳公不能為人之國則亦巳矣焉有離人子母者翠遂入見后曰人主之愛子也不如布衣之甚也非徒不愛子也又不愛丈夫子獨甚太后曰何也對曰太后嫁女諸侯奉以千金今王願封公子群臣曰公子無功不當封今以公子為質且以為功而封之也太后弗聽是以知人主之不愛丈夫子獨甚也且太后與王幸而在故公子貴太后千秋之後王棄國家而太子即位公子賤於布衣故非及太后與王封公子則終身不封矣太后曰老婦知長者之計乃命為行具此語與觸龍無異而史記不書通鑑不取學者亦未嘗言燕非強國北燕在春秋時最為僻小能自見於中國者不過三四大率制命於齊七雄之際篇齊所取後賴五國之力樂毅為將然後勝齊然卒於得七十城不能守也故蘇秦説趙王曰趙北有燕燕固弱國不足畏也燕王曰寡人國小西迫強秦南近齊趙齊趙強國也又曰天下之戰國七而燕處弱焉獨戰則不能有所附則無不重昭王謂郭隗曰孤極知燕弱小不足以報齊蘇代曰一齊之強燕猶不能攴奉陽君曰燕弱國也東不如齊西不如趙趙長平之敗壯者皆死燕以二千乘攻之為趙所敗太子丹謂荆軻曰燕小弱數困於兵何足以當秦楚漢之𥘉趙王武臣為燕軍所得趙厮飬卒謂其將曰一趙尚易燕況以兩賢王滅燕易矣彭寵以漁陽叛即時夷滅十六國之起戎狄亂華稱燕稱趙者多矣未嘗有據幽薊之地者也獨安祿山以三十年節制之威又兼領河東乘天寶政亂出不意而舉兵史思明繼之雖為天下之禍旋亦殄滅至於藩鎮擅地所謂范陽盧龍固常受制於天雄成德也劉仁恭守光父子僣竊一方唐莊宗遣周德威攻之克取巡屬十餘州如拾地芥石晉割賂契丹仍其舊國恃以為強然晉開運陽城之戰德光幾不免周丗宗小振之立下三關但太平興國失於輕舉又不治敗將喪師之罪致令披猖以迄于今若以謂幽燕為用武之地則不然也水旱祈禱海內雨暘之數郡異而縣不同為守為令能以民事介心必自知以時禱祈不待上命也而省部循案故例但視天府為節下之諸道轉運司使巡內州縣各詣名山靈祠精潔致禱然固難以一槩論乾道九年秋贑吉連雨暴漲豫守贑方多備土囊壅諸城門以杜水入凡二日乃退而臺符令禱雨豫格之不下但據實報之巳而聞吉州於小廳設祈晴道埸大廳祈雨問其故郡守曰請霽者本郡以淫潦為災而請雨者朝旨也其不知變如此殆為侮威神天幽冥之下將何所據慿哉俚語笑林謂兩商人入神廟其一陸行欲晴許賽以豬頭其一水行欲雨許賽羊頭神顧小鬼言晴乾喫豬頭雨落喫羊頭有何不可正謂此耳坡詩云耕田欲雨刈欲晴去得順風來者怨若使人人禱輒遂造物應須日千變此意未易為庸俗道也容齋四筆卷第三
