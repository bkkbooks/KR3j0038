front:
  text: 容齊續筆卷第十四十七則
  hash: sha256:9dfd471eb5ae1fa1d197dd8f190a614e5231007117f01b4b3334c1bf3301c666
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_032-1a}
body:
  text: 尹文子漢藝文志名家內有尹文子一篇云說齊宣王先公孫龍劉歆云其學本於黃老居稷下與宋鈃彭蒙田駢等同學於公孫龍今其書分為上下兩卷蓋漢末仲長統所銓次也其文僅五千言議論亦非純本黃老者大道篇曰道不足以治則用法法不足以治則用術術不足以治則用權權不足以治則用勢勢不足則反權權用則反術術用則反法法用則反道道用則無為而自治又曰為善使人不能得從此獨善也為巧使人不能得為此獨巧也末盡善巧之理為善與衆行之為巧與衆能之此善之善者巧之巧者也故所貴聖人之治不貴其獨治貴其能與衆共治貴工倕之巧不貴其獨巧貴其能與衆共巧也今丗之人行欲獨賢事欲獨能辨欲出羣勇欲絶衆獨行之賢不足以成化獨能之事不足以周務出羣之辨不可為户說絶衆之勇不可與正陳凡此四者亂之所由生聖人任道立法使賢愚不相棄能鄙不相遺此至治之術也詳味其言頗流而入於兼愛莊子末章叙天下之治方術者曰不纍於俗不飾於物不苟於人不忮於衆願天下之安寧以活民命人我之養畢足而止以此白心古之道術有在於是者宋鈃尹文聞其風而恱之作為華山之冠以自表雖天下不取強聒而不舍者也其為人太多其自為太少蓋亦盡其學云荀卿非十二子有宋鈃而文不預又别一書曰尹子五卷共十九篇其言論膚淺多及釋氏蓋晉宋時細人所作非此之謂也帝王訓儉帝王創業垂統規以節儉貽訓子孫必其繼丗象賢而後可以循其教不然正足取侮笑耳宋孝武大治宫室壞髙祖所居隂室於其處起玉燭殿與羣臣觀之牀頭有土障上挂葛燈籠麻蠅拂侍中袁顗因盛稱髙祖儉素之德上不答獨曰田舍公得此巳為過矣唐髙力士於太宗陵寢宫見梳箱一柞木梳一黑角箆一草根刷子一歎曰先帝親正皇極以致升平隨身服用唯留此物將欲傳示子孫永存節儉具以奏聞明皇詣陵至寢宮問所留示者何在力士捧跪上上跪奉肅敬如不可勝曰夜光之珍垂棘之璧將何以喻此即命史官書之典冊是時明皇履位未久厲精為治故見太宗故物而惕然有感及侈心一動窮天下之力不足以副其求尚何有於此哉宋孝武不足責也若齊髙帝周武帝陳髙祖隋文帝皆有儉德而東昏天元叔寶焬帝之淫侈浮於桀紂又不可以語此云用計臣為相唐自正觀定制以省臺寺監理天下之務官修其方未之或改明皇因時極盛好大喜功於財利之事尤切故宇文融韋堅楊矜王鉷皆以聚斂刻剝進然其職不出户部也楊國忠得志乃以御史大夫判度支權知太府卿及兩京司農太府出納是時猶未立判使之名也肅宗以後兵興費廣第五琦劉晏始以户部侍郎判諸使因之拜相於是鹽鐵有使度支有判元琇班宏裴延齡李巽之徒踵相躡遂浸浸以它官主之權任益重憲宗季年皇甫鎛由判度支程异由衛尉卿鹽鐵使並命為相公論沸騰不恤也逮於宣宗率由此塗大用馬植裴休夏侯孜以鹽鐵盧商崔元式周墀崔龜從蕭鄴劉瑑以度支魏扶魏謨崔謹由蔣伸以户部自是計相不可勝書矣惟裴度判度支上言調兵食非宰相事請以歸有司其識量宏正不可同日語也州縣牌額州縣牌額率係於吉凶以故不敢輕為改易嚴州分水縣故額草書分字縣令有作聰明者謂字體非冝自真書三字刻而立之是年邑境惡民持刃殺人者衆蓋分字為八刀也徽州之山水清逺素無火災紹熙元年添差通判盧瑢悉以所作隸字換郡下扁榜自譙樓儀門凡亭榭臺觀之類一切趨新郡人以為字多燥筆而於州牌尤為不嚴重私切憂之次年四月火起於郡庫經一日兩夕乃止官舍民廬一空盧知猷唐之末丗王綱絶紐學士大夫逃難解散畏死之不暇非有扶顚持危之計能支大厦於將傾者出力以佐時則當委身山棲往而不反為門户性命慮可也白馬之禍豈李振柳璨數凶子所能害哉亦裴崔獨孤諸公有以自取耳偶讀司空表聖集太子太師盧知猷神道碑見其仕於僖昭更歷榮級至尚書右僕射以一品致仕可以歸矣然由間關跋履從昭宗播遷自華幸洛天祐二年九月乃終享年八十有六其得沒於牖下亦云幸也新唐書有傳附於父後甚略云昭宗為劉季述所幽感憤而卒案昭宗以光化三年遭季述之禍天復元年反正至知猷亡時相去五年傳云子文度亦貴顯而碑載嗣子刑部侍郎膺亦不同表聖乃盧幕客當時作志必不誤矣昭宗實録光化四年三月華州奏太子太師盧知猷卒以劉季述之變感憤成疾卒年七十五正與新唐傳同蓋唐武宣以後諸録乃宋敏求補撰簡牘當有散脫者皆當以司空之碑為正又按是年四月改元天復舊唐紀十一月車駕幸鳯翔朱全忠趨長安文武百寮太子太師盧知猷巳下出迎又為可證宰相丗系表知猷生文度而同族曰渥渥之子膺刑部侍郎二者矛盾如此忌諱諱惡周禮春官小史詔王之忌諱鄭氏云先王死日為忌名為諱禮記王制大史典禮執簡記奉諱惡注云諱者先王名惡者忌日若子卯惡烏路反左傳叔弓如滕子服椒為介及郊遇懿伯之忌叔弓不入懿伯椒之叔父忌怨也椒曰公事有公利無私忌椒請先入觀此乃知忌諱之明文漢人表疏如東方朔有不知忌諱之類皆戾本旨今丗俗語言多云無忌諱及不識忌諱蓋非也陳涉不可輕揚子法言或問陳勝吳廣曰亂曰不若是則秦不亡曰亡秦乎恐秦未亡而先亡矣李軌以為輕用其身而要乎非命之運不足為福先適足以為禍始豫謂不然秦以無道毒天下六王皆萬乘之國相踵滅亡豈無孝子慈孫故家遺俗皆奉頭鼠伏自張良狙擊之外更無一人敢西向窺其鋒者陳勝出於戍卒一旦奮發不顧海內豪傑之士乃始雲合響應並起而誅之數月之間一戰失利不幸隕命於御者之手身雖巳死其所置遣侯王將相竟亡秦項氏之起江東亦矯稱陳王之令而度江秦之社稷為墟誰之力也且其稱王之初萬事草創能從陳餘之言迎孔子之孫鮒為博士至尊為太師所與謀議皆非庸人崛起者可及此其志豈小小者哉漢髙帝為之置守冡於碭血食二百年乃絶子雲指以為亂何邪若乃殺吳廣誅故人寡恩忘舊無帝王之度此其所以敗也士丐韓厥晉厲公既殺郤氏三卿羣臣疑懼欒書荀偃執公召士丐丐辭不往召韓厥厥辭曰古人有言曰殺老牛莫之敢尸而況君乎二三子不能事君焉用厥也二子竟弒公而不敢以丐厥為罪豈非畏敬其忠正乎唐武德之季秦王與建成元吉相忌害長孫無忌髙士廉侯君集尉遲敬德等日夜勸王誅之王猶豫未決問於李靖靖辭問於李丗績丗績辭王由是重二人及至登天位皆任為將相知其有所守也晉唐四賢之識見略等而無有稱述者唐史至不書其事殆非所謂發濳德之幽光也蕭道成將革命欲引時賢參贊大業夜召謝朏屏人與語朏竟無一言及王儉禇淵之謀既定道成必欲引朏參佐命朏亦不肯從遂不仕齊丗其亦賢矣孔墨墨翟以兼愛無父之故孟子辭而辟之至比於禽獸然一時之論逮於漢丗往往以配孔子列子載惠盎見宋康王曰孔丘墨翟無地而為君無官而為長天下丈夫女子莫不延頸舉踵而願安利之鄒陽上書於梁孝王曰魯聽季孫之說逐孔子宋任子冉之計囚墨翟以孔墨之辨不能自免於讒諛賈誼過秦云非有仲尼墨翟之知徐樂云非有孔曾墨子之賢是皆以孔墨為一等列鄒之書不足議而誼亦如此韓文公最為發明孟子之學以為功不在禹下者正以辟楊墨耳而著讀墨子一篇云儒墨同是堯舜同非桀紂同修身正心以治天下國家孔子必用墨子墨子必用孔子不相用不足為孔墨此又何也魏鄭公南史梁論亦有抑揚孔墨之語玉川月蝕詩盧同月蝕詩唐史以謂譏切元和逆黨考韓文公效同所作云元和庚寅歲十一月是年為元和五年去憲宗遇害時尚十載同云歲星主福德官爵奉董秦說者謂董秦即李忠臣嘗為將相而臣朱泚至於亡身故同鄙之東坡以為當秦之鎮淮西日代宗避吐蕃之難出狩追諸道兵莫有至者秦方在鞠埸趣命治行諸將請擇日秦曰父母有急難而欲擇日乎即倍道以進雖末節不終似非無功而食祿者近丗有嚴有翼者著藝苑雌黃謂坡之言非也秦守節不終受泚僞官為賊居守何功之足云詩譏刺當時故言及此坡乃謂非無功而食祿謬矣有翼之論一何輕發至詆坡公為非為謬哉豫案是時秦之死二十七年矣何為而追刺之使同欲譏逆黨則應首及祿山與泚矣竊意元和之丗吐突承璀用事同以為嬖幸擅位故用董賢秦宫輩喻之本無預李忠臣事也記前人似亦有此說而不能省憶其詳詩要點檢作詩至百韻詞意既多故有失於點檢者如杜老夔府詠懷前云滿坐涕潺湲後又云伏臘涕漣漣白公寄元微之既云無杯不共持又云笑勸迃辛酒華樽逐勝移觥飛白玉巵飲訝卷波遲歸鞍酩酊馳酡顔烏帽側醉袖玉鞭垂白醪充夜酌嫌醒自啜醨不飲長如醉一篇之中說酒者十一句東坡賦中隱堂五詩各四韻亦有坡垂似伏鼇崩崖露伏龜之語近於意重周蜀九經唐正觀中魏證虞丗南顔師古繼為祕書監請募天下書選五品以上子孫工書者為書手繕寫豫家有舊監本周禮其末云大周廣順三年癸丑五月雕造九經書畢前鄉貢三禮郭溪書列宰相李榖范質判監田敏等銜子後經典釋文末云顯德六年已未三月太廟室長朱延熙書宰相范質王溥如前而田敏以工部尚書為詳勘官此書字畫端嚴有楷法更無舛誤舊五代史漢隱帝時國子監奏周禮儀禮公羊榖梁四經未有印板欲集學官考校雕造從之正尚武之時而能如是蓋至此年而成也成都石本諸經毛詩儀禮禮記皆祕書省祕書郎張紹文書周禮者祕書省校書郎孫朋古書周易者國子博士孫逢吉書尚書者校書郎周德政書爾雅者簡州平泉令張德昭書題云廣政十四年蓋孟昶時所鎸其字體亦皆精謹兩者並用士人筆札猶有正觀遺風故不庸俗可以傳逺唯三傳至皇祐元年方畢工殊不逮前紹興中分命兩淮江東轉運司刻三史板其兩漢書內凡欽宗諱並小書四字曰淵聖御名或徑易為威字而它廟諱皆只缺畫愚而自用為可笑也蜀三傳後列知益州樞密直學士右諌議大夫田況銜大書為三行而轉運使直史館曹穎叔提點刑獄屯田貟外郎孫長卿各細字一行又差低於況今雖執政作牧監司亦與之鴈行也冡宰治內周禮天官冡宰其屬有宫正實掌王宮之戒令糾禁內宰以隂禮教六宮以隂禮教九嬪蓋宫中官之長也故自后夫人之外九嬪丗婦女御以下無不列於屬中後丗宫掖之事非上宰可得而聞也禮記內則篇記男女事父母舅姑細瑣畢載而首句云后王命冡宰降德于衆兆民則以其治內故也宰相爵邑國朝宰相初不用爵邑為輕重然亦嘗以代升黜王文康曾任司空後為太子太師經太宗登極恩但封祁國公吕文穆自司徒謝事為太子太師經東封西祀恩不復再得三公但封徐國許國公而巳寇忠愍罷相學士錢惟演以太子太傅處之真宗令更與些恩數惟演但乞封國公王兾公欽若食邑巳過萬戶及謫為司農卿於銜內盡除去後再拜相乃悉還之湯歧公以大觀文免相因御史言落職鎸爵趙衛公坐舉官犯贓見為使相但降封益川郡公削二千户今周益公亦然皆故實所無也王婺相元封兾嫌其與欽若同屢欲改適有進國史賞豫為擬進韓國制詞用有此兾方莫如韓樂既播告矣而刪定官馮震武以為真宗故封不許用遂貼麻為魯雖著於司封格馮蓋不知富韓公巳用之矣是時婺相以食邑過二萬户為辭壽皇遣中使至邁所居宣示令具前此有無體例及合如何施行事理擬定聞奏遂以邑戶無止法復命乃竟行下楊子一毛孟子曰楊子取為我拔一毛而利天下不為也楊朱之書不傳於今其語無所考惟列子所載楊朱曰伯成子髙不以一毫利物舍國而隱耕古之人損一毫利天下不與也人人不損一毫不利天下天下治矣禽子問楊朱曰去子體之一毛以濟一丗汝為之乎楊子曰丗固非一毛之所濟禽子曰假濟為之乎楊子弗應禽子出語孟孫陽陽曰有侵若肌膚獲萬金者若為之乎曰為之曰有斷若一節得一國子為之乎禽子默然陽曰積一毛以成肌膚積肌膚以成一節一毛固一體萬分中之一物奈何輕之觀此則孟氏之言可證矣李長吉詩李長吉有羅浮山人詩云欲翦湘中一尺天吳娥莫道吳刀澀正用杜老題王宰畫山水圖歌焉得并州快翦刀翦取吳松半江水之句長吉非蹈襲人後者疑亦偶同不失自為好語也子夏經學孔子弟子惟子夏於諸經獨有書雖傳記雜言未可盡信然要為與它人不同矣於易則有傳於詩則有序而毛詩之學一云子夏授髙行子四傳而至小毛公一云子夏傳曾申五傳而至大毛公於禮則有儀禮喪服一篇馬融王肅諸儒多為之訓說於春秋所云不能贊一辭蓋亦嘗從事於斯矣公羊髙實受之於子夏榖梁赤者風俗通亦云子夏門人於論語則鄭康成以為仲弓子夏等所撰定也後漢徐防上疏曰詩書禮樂定自孔子發明章句始於子夏斯其證云容齊續筆卷第十四
