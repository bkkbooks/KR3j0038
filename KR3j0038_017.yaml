front:
  text: 容齊續筆目録鞠文
  hash: sha256:e88daa008cc7c917ad454e7df59f30c522498a4d4762bbfffd1349d4e4209d26
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_017-1a}
body:
  text: 卷第一十八則顔魯公戒石銘雙生子李建州侍從官存亡大計唐人詩不傳泰誓四語重陽上巳改日田宅契劵取直公子奚斯唐藩鎮幕府文中子門人晉燕用兵李衛公帖王孫賦漢郡國諸官漢獄名卷第二十八則權若訥馮澥嵗且飲酒存殁絶句湯武之事張釋之摶誤張于二廷尉漢唐置郵龍且張步義理之説無窮開元五王巫蠱之禍唐詩無諱避李晟傷國體元和六學士二摶誤後丗卜子夏父子忠邪蘇張説六國卷第三十八則一定之計秋興賦太史慈諡法漢文帝受言丹青引詩國風秦中事詩文當句對東坡明正臺諫不相見執政四入頭無望之禍燕説折檻行朱雲陳元逹杜老不忘君栽松詩烏鵲鳴卷第四十七則淮南守備周丗宗竇正固鄭權黨錮牽連之賢漢代文書式資治通鑑弱小不量力田橫吕布中山冝陽相六畜卜筮不同日者柳子厚黨叔文漢武心術禁天髙之稱宣和冗官卷第五十三則秦隋之惡漢唐二武玉川子銀青階買馬牧馬杜詩用字唐虞象刑崔常牛李盜賊怨官吏作詩先賦韻后妃命數公為尊稱臺城少城卷第六十五則嚴武不殺杜甫王嘉薦孔光朱溫三事文字潤筆漢舉賢良戊為武怨耦曰仇説文與經摶不同周亞夫煬王煬帝鄭莊公百六陽九左傳易筮鍾繇自劾大義感人卷第七十七則田租輕重女子夜績淮南王薛國久長建除十二辰俗語算數伾文用事五十絃瑟遷固用疑字僭亂的對月不勝火靈臺有持董仲舒災異對李正巳獻錢宣室昔昔鹽將帥當專卷第八十五則蓍龜卜筮地名異音韓嬰詩五行衰絶字漢表所記事蕭何紿韓信彭越無罪蜘蛛結罔孫權稱至尊康山讀書列國城門名緇塵素衣去國立後詩詞改字姑舅為婚卷第九十四則三家七穆貢薛韋康兒寬張安丗深溝髙壘生之徒十有三臧氏二龜有扈氏太公丹書漢景帝蕭何先見史漢書法薄昭田蚡文字結尾國初古文卷第十十七則經摶煩簡曹參不薦士漢初諸將官漢官名漢唐輔相漢武留意郡守苦蕒菜唐諸生束修范德孺帖民不畏死天下有竒士易卦四德孫堅起兵孫權封兄策踰年改元賊臣遷都輿地道里誤卷第十一十五則古錞于孫玉汝唐人避諱髙鍇取士兵部名存武官名不正名將晚謬唐帝稱太上皇楊諒注荀子昭宗相朱朴楊國忠諸使祖宗朝宰輔百官避宰相百官見宰相東坡自引所為文卷第十二十二則婦人英烈無用之用龍筋鳯髓判唐制舉科目淵有九名東坡論莊子列子書事天生對偶銅雀灌硯崔斯生漢書注冗古迹不可考卷第十三十四則科舉恩數下第再試試賦用韻正元制科貽子録金花帖子物之小大郭令公紀年兆祥民俗火葬太史日官汲冡周書曹子建論文雨水清明卷第十四十七則尹文子帝王訓儉用計臣為相州縣牌額盧知猷忌諱忌惡陳涉不可輕士丐韓厥孔墨玉川月蝕詩詩要點檢周蜀九經冡宰治內宰相爵邑楊子一毛李長吉詩子夏經學卷第十五十三則紫閣山村詩李林甫秦檜注書難書易脫誤南陔六詩紹聖廢春秋王韶熙河書籍之厄逐貧賦澗松山苗男子運起寅宰我作難古人占夢卷第十六十六則髙德儒唐朝士俸微計然意林思潁詩劉蕡下第酒肆旗望賢宰相遭讒宋齊丘鹹杬子月中桂兔唐二帝好名周禮非周公書醉尉亭長三易之名忠臣名不傳唐人酒令容齋續筆目録凡二百四十九則
