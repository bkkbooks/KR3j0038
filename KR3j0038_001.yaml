body:
  text: 歐率更帖臨川石刻雜法帖一卷載歐陽率更一帖云年二十餘至鄱陽地沃土平飲食豐賤衆士往往湊聚每日賞華恣口所須其二張才華議論一時俊傑殷薛二侯故不可言戴君國士出言便是月旦蕭中郎頗縱放誕亦有雅致彭君摛藻特有自然至如閣山神詩先輩亦不能加此數子遂無一在殊使痛心兹蓋吾鄉故實也羅處士志襄陽有隋處士羅君墓志曰君諱靖字禮襄陽廣昌人髙祖長卿齊饒州刺史曽祖弘智梁殿中將軍祖養父靖學優不仕有名當代碑字畫徑楷類禇河南然父子皆名靖為不可曉拓拔魏安同父名屈同之長子亦名屈祖孫同名胡人無足言者但羅君不應爾也唐平蠻碑成都有唐平南蠻碑開元十九年劒南節度副大使張敬忠所立時南蠻大酋長染浪州刺史楊盛顚為邊患明皇遣內常侍髙守信為南道招慰處置使以討之拔其九城此事新舊唐書及野史皆不載肅宗以魚朝恩為觀軍容處置使憲宗用吐突承璀為招討使議者譏其以中人主兵柄不知明皇用守信蓋有以啓之也裴光庭蕭嵩時為相無足責者楊氏苗裔至今猶連晟字云半擇迦大般若經云梵言扇搋半擇迦唐言黃門其類有五一曰半擇迦揔名也有男根用而不生子二曰伊利沙半擇迦此云妬謂他行欲即發不見即無亦具男根而不生子三曰扇搋半擇迦謂本來男根不滿亦不能生子四曰博義半擇迦謂半月能男半月不能男五曰留拏半擇迦此云割謂𬒳割刑者此五種黃門名為人中惡趣受身處搋音丑皆反六十四種惡口大集經載六十四種惡口之業曰粗語軟語非時語妄語漏語大語髙語輕語破語不了語散語低語仰語錯語惡語畏語吃語諍語讇語誑語惱語怯語邪語罪語啞語入語燒語地語獄語虛語慢語不愛語說罪咎語失語别離語利害語兩舌語無義語無護語喜語狂語殺語害語繫語間語縛語打語歌語非法語自讃歎語說他過語說三寶語八月端午唐玄宗以八月五日生以其日為千秋節張說上大衍曆序云謹以開元十六年八月端午赤光照室之夜獻之唐類表有宋璟請以八月五日為千秋節表云月惟仲秋日在端午然則凡月之五日皆可稱端午也贊公少公唐人呼縣令為明府丞為贊府尉為少府李太白集有餞陽曲王贊公賈少公石艾尹少公序蓋陽曲丞尉石艾尉也贊公少公之語益竒郭璞葬地世說郭景純過江居于暨陽墓去水不盈百步時人以為近水景純曰將當為陸今沙漲去墓數十里皆為桑田此說蓋以郭為先知也世傳錦囊葬經為郭所著行山卜宅兆者印為元龜然郭能知水之為陸獨不能卜吉以免其非命乎黃魯直詩徐陵鴛鴦賦云山雞映水那相得孤鸞照鏡不成雙天下真成長會合無勝比翼兩鴛鴦黃魯直題畫睡鴨曰山雞照影空自愛孤鸞舞鏡不作雙天下真成長㑹合兩鳬相倚睡秋江全用徐語點化之末句尤精工又有黔南十絶盡取白樂天語其七篇全用之其三篇頗有改易處樂天寄行簡詩凡八韻後四韻云相去六千里地絶天邈然十書九不達何以開憂顔渴人多夢飲飢人多夢餐春來夢何處合眼到東川魯直翦為兩首其一云相望六千里天地隔江山十書九不到何用一開顔其二云病人多夢醫囚人多夢赦如何春來夢合眼在鄉社樂天歲晚詩七韻首句云霜降水返壑風落木歸山冉冉歲將晏物皆復本源魯直改後兩句七字作冉冉歲華晚昆蟲皆閉關禹治水禹貢叙治水以兾兖青徐揚荆豫梁雍為次考地理言之豫居九州中與充徐接境何為自徐之揚顧以豫為後乎蓋禹順五行而治之耳兾為帝都既在所先而地居北方實於五行為水水生木木東方也故次之以兖青徐木生火火南方也故次之以揚荆火生土土中央也故次之以豫土生金金西方也故終於梁雍所謂彝倫攸叙者此也與鯀之汩陳五行相去逺矣此說豫得之魏幾道敕勒歌魯直題陽關圖詩云想得陽關更西路北風低草見牛羊又集中有書韋深道諸帖云斛律明月胡兒也不以文章顯老胡以重兵困敕勒川召明月作歌以排悶倉卒之間語竒壯如此蓋率意道事實耳豫桉古樂府有敕勒歌以為齊髙歡攻周玉壁而敗恚憤疾發使斛律金唱敕勒歡自和之其歌本鮮卑語詞曰敕勒川隂山下天似穹廬籠罩四野天蒼蒼野茫茫風吹草低見牛羊魯直所題及詩中所用蓋此也但誤以斛律金為明月明月名光金之子也歡敗於玉壁亦非困於敕勒川淺妄書俗間所傳淺妄之書如所謂雲仙散録老杜事實開元天寶遺事之屬皆絶可笑然士大夫或信之至以老杜事實為東坡所作者今蜀本刻杜集遂以入注孔傳續六帖采托唐事殊有工而悉載雲仙録中事自穢其書開天遺事託云王仁𥙿所著仁𥙿五代時人雖文章乏氣骨恐不至此姑析其數端以為笑其一云姚元崇開元𥘉作翰林學士有步輦之召桉元崇自武后時巳為宰相及開元初三入輔矣其二云郭元振少時美風姿宰相張嘉貞欲納為壻遂牽紅絲線得第三女果隨夫貴達桉元振為睿宗宰相明皇初年即貶死後十年嘉貞方作相其三云楊國忠盛時朝之文武爭附之以求冨貴惟張九齡未嘗及門桉九齡去相位十年國忠方得官耳其四云張九齡覽蘇頲文卷謂為文陳之雄師桉頲為相時九齡元未逹也此皆顯顯可言者固鄙淺不足攻然頗能疑誤後生也惟張彖指楊國忠為氷山事資治通鑑亦取之不知别有何据近歲興化軍學刋遺事南劒州學刋散録皆可毀五臣注文選東坡詆五臣注文選以為荒陋豫觀選中謝玄暉和王融詩云阽危賴宗衮微管寄明牧正謂謝安謝玄安石於玄暉為逺祖以其為相故曰宗衮而李周翰注云宗衮謂王導導與融同宗言晉國臨危賴王導而破符堅牧謂謝玄亦同破堅者夫以宗衮為王導固可笑然猶以和王融之故微為有說至以導為與謝玄同破符堅乃是全不知有史䇿而狂妄注書所謂小兒強解事也唯李善注得之文煩簡有當歐陽公進新唐書表曰其事則增於前其文則省於舊夫文貴於達而巳繁與省各有當也史記衛青傳校尉李朔校尉趙不虞校尉公孫戎奴各三從大將軍獲王以千三百户封朔為涉軹侯以千三百户封不虞為隨成侯以千三百户封戎奴為從平侯前漢書但云校尉李朔趙不虞公孫戎奴各三從大將軍封朔為涉軹侯不虞為隨成侯戎奴為從平侯比於史記五十八字中省二十三字然不若史記為朴贍可喜地險古今言地險者以謂函秦宅關河之勝齊負海岱趙魏據大河晉表裏河山蜀有劒門瞿唐之阻楚國方城以為城漢水以為池吳長江萬里兼五湖之固皆足以立國唯宋衛之郊四通五達無一險可恃然東漢之末袁紹跨有青兾幽并四州韓遂馬騰輩分據關中劉璋擅蜀劉表居荆州吕布盜徐袁術包南陽壽春孫䇿取江東天下形勝盡矣曹操晚得兖州倔強其間終之夷羣雄覆漢祚議者尚以為操挾天子以自重故能成功而唐僖昭之時方鎮擅地王氏有趙百年羅洪信在魏劉仁恭在燕李克用在河東王重榮在蒲朱宣朱瑾在兖鄆時溥在徐王敬武在淄青楊行密在淮南王建在蜀天子都長安鳯翔邠華三鎮鼎立為梗李茂貞韓建皆嘗劫遷乘輿而朱溫區區以汴宋亳潁截然中居及其得志乃與操等以在德不在險為言則操溫之德又可見矣史記丗次史記所紀帝王丗次最為不可考信且以稷契論之二人皆帝嚳子同仕於唐虞契之後為商自契至成湯凡十三丗歷五百餘年稷之後為周自稷至武王凡十五丗歷千一百餘年王季蓋與湯為兄弟而丗之相去六百年既巳可疑則周之先十五丗須每丗皆在位七八十年又皆暮年所生嗣君乃合此數則其所享壽皆當過百歲乃可其為漫誕不稽無足疑者國語所載太子晉之言曰自后稷之始基靖民十五王而文始平之皆不然也解釋經旨解釋經旨貴於簡明惟孟子獨然其稱公劉之詩乃積乃倉乃裹餱糧于橐于囊思戢用光弓矢斯張干戈戚揚爰方啓行而釋之之詞但云故居者有積倉行者有裹囊也然後可以爰方啓行其稱蒸民之詩天生蒸民有物有則民之秉夷好是懿德而引孔子之語以釋之但曰故有物必有則民之秉夷也故好是懿德用兩故字一必字一也字而四句之義昭然彼訓曰若稽古三萬言真可覆醬瓿也坤動也剛坤卦文言曰坤至柔而動也剛王弼云動之方正不為邪也程伊川云坤道至柔而其動則剛動剛故應乾不違張橫渠云柔亦有剛靜亦有動伹舉一體則有屈伸動靜終始又云積大勢成而然東坡云夫物非剛者能剛惟柔者能剛爾畜而不發及其極也發之必決張葆光但以訓六二之直陳了翁云至柔至靜坤之至也剛者道之動方者靜之得柔剛靜動坤元之道之德也郭雍云坤雖以柔靜為主苟無方剛之德不足以含洪光大諸家之說率不外此豫頃見臨安退居庵僧曇瑩云動者謂爻之變也坤不動則巳動則陽剛見焉在初為復在二為師在三為謙自是以往皆剛也其說最為分明有理樂天侍兒世言白樂天侍兒唯小蠻樊素二人子讀集中小庭亦有月一篇云菱角執笙簧谷兒抹琵琶紅綃信手舞紫綃隨意歌自注曰菱谷紫紅皆小臧獲名若然則紅紫二綃亦女奴也白公詠史東坡志林云白樂天嘗為王涯所讒貶江州司馬甘露之禍樂天有詩云當君白首同歸日是我青山獨往時不知者以樂天為幸之樂天豈幸人之禍者哉蓋悲之也豫讀白集有詠史一篇注云九年十一月作其詞曰秦磨利刃斬李斯齊燒沸鼎亨酈其可憐黃綺入啇洛間卧白雲歌紫芝彼為𦵔醢機上盡此作鸞凰天外飛去者逍遙來者死乃知禍福非天為正為甘露事而作其悲之之意可見矣十年為一秩白公詩云巳開第七秩飽食仍安眠又云年開第七秩屈指幾多人是時年六十二元日詩也又一篇云行開第八秩可謂盡天年注曰時俗謂七十以上為開第八秩蓋以十年為一秩云司馬溫公作慶文潞公八十會致語云歲曆行開九帙新亦用此也裴晉公禊事唐開成二年三月三日河南尹李待價將禊於洛濵前一日啓留守裴令公公明日召太子少傅白居易太子賔客蕭籍李仍叔劉禹錫中書舍人鄭居中等十五人合宴于舟中自晨及暮前水嬉而後妓樂左筆硯而右壷觴望之若仙觀者如堵裴公首賦一章四坐繼和樂天為十二韻以獻見於集中今人賦上巳鮮有用其事者豫案裴公傳是年起節度河東三年以病丏還東都文宗上巳宴羣臣曲江度不赴帝賜以詩使者及門而度薨與前事相去正一年然樂天又有一篇題云奉和裴令公三月上巳日遊太原龍泉憶去歲稧洛之作是開成三年詩則度以四年三月始薨新史以為三年誤也宰相表却載其三年十二月為中書令四年三月薨而帝紀全失書獨舊史紀傳為是司字作入聲白樂天詩好以司字作入聲讀如云四十著緋軍司馬男兒官職未蹉跎一為州司馬三見歲重陽是也又以相字作入聲如云為問長安月誰教不相離是也相字之下自注云思必切以十字作平聲讀如云在郡六百日入山十二回緑浪東西南北路紅欄三百九十橋是也以琵字作入聲讀如云四絃不似琵琶聲亂寫真環細撼鈴忽聞水上琵琶聲是也武元衡亦有句云唯有白須張司馬不言名利尚相從樂天新居詩白樂天自杭州刺史分司東都有題新居呈王尹兼簡府中三掾詩云弊宅須重葺貧家乏羡財橋慿川守造樹倩府寮栽朱板新猶濕紅英暖漸開仍期更携酒倚檻看花來乃知唐丗風俗尚為可喜今人居間而郡守為之造橋府寮為之栽樹必遭譏議又肯形之篇詠哉黃紙除書樂天好用黃紙除書字如紅旗破賊非吾事黃紙除書無我名正聽山鳥向陽眠黃紙除書落枕前黃紙除書到青宫詔命催白用杜句杜子美詩云夜足霑沙雨春多逆水風白樂天詩巫山暮足霑花雨隴水春多逆浪風全用之唐人重服章唐人重服章故杜子美有銀章付老翁朱紱負平生扶病垂朱紱之句白樂天詩言銀緋處最多七言如大抵著緋冝老大一片緋衫何足道暗淡緋衫稱我身酒典緋花舊賜袍假著緋袍君莫笑腰間紅綬繫未穩朱紱仙郎白雪歌腰佩銀龜朱兩輪便留朱紱還鈴閣映我緋衫渾不見白頭俱未著緋衫緋袍著了好歸田銀魚金帶繞腰光銀章暫假為專城新授銅符未著緋徒使花袍紅似火似挂緋衫衣架上五言如未換銀青綬唯添雪白鬚笑我青袍故饒君茜綬新老逼教垂白官科遣著緋那知垂白日始是著緋年晚遇何足言白髮映朱紱至於形容衣魚之句如魚綴白金隨步躍鵠銜紅綬繞身飛詩䜟不然今人冨貴中作不如意語少壯時作衰病語詩家往往以為䜟白公十八歲病中作絶句云久為勞生事不學攝生道少年巳多病此身豈堪老然白公壽七十五青龍寺詩樂天和錢貟外青龍寺上方望舊山詩云舊峯松雪舊溪雲悵望今朝遙屬君共道使臣非俗吏南山莫動北山文頃於乾道四年講筵開日蒙上書此章於扇以賜改使臣為侍臣云容齊隨筆卷第一
