body:
  text: 容齋五筆卷第一十九則天慶諸節大中祥符之世諛佞之臣造為司命天尊下降及天書等事於是降聖天慶天祺天貺諸節並興始時京師宫觀每節齋醮七日旋減為三日一日後不復講百官朝謁之禮亦罷今中都未嘗舉行亦無休假獨外郡必詣天慶觀朝拜遂休務至有前後各一日此為敬事司命過於上帝矣其當寢明甚惜無人能建白者􅉑州兩刺史唐韓休為􅉑州刺史􅉑於東西京為近州乘輿所至常稅廄芻休請均賦它郡中書令張説曰免􅉑而與它州此守臣為私惠耳休復執論吏白恐忤宰相意休曰刺史幸知民之弊而不救豈為政哉雖得罪所甘心焉訖如休請盧𣏌為䝞州刺史奏言􅉑有官豕三千為民患德宗曰徙之沙苑𣏌曰同州亦陛下百姓臣謂食之便帝曰守􅉑而憂它州宰相材也詔以豕賜貧民遂有意柄任矣俄召入踰年拜相案兩人皆以􅉑州守臣言公家事而休見疑於名相𣏌受知於猜主遇合有命信哉狐假虎威諺有狐假虎威之語稚子來叩其義因示以戰國䇿新序所載戰國䇿云楚宣王問羣臣曰吾聞北方之畏昭奚恤也果誠何如羣臣莫對江乙對曰虎求百獸而食之得狐狐曰子無敢食我矣天帝使我長百獸今子食我是逆天帝命也子以我為不信吾為子先行子隨我後觀百獸之見我而敢不走乎虎以為然故遂與之行獸見之皆走虎不知獸畏已而走也以為畏狐也今王之地方五千里帶甲百萬而專屬之昭奚恤故北方之畏奚恤也其實畏王之甲兵也猶百獸之畏虎也新序並同而其後云故人臣而見畏者是見君之威也君不用則威亡矣俗諺蓋本諸此徐章二先生教人徐仲車先生為楚州教授每升堂訓諸生曰諸君欲為君子而勞已之力費已之財如此而不為猶之可也不勞已之力不費已之財何不為君子鄉人賤之父母患之如此而不為可也鄉人榮之父母欲之何不為君子又曰言其所善行其所善思其所善如此而不為君子者未之有也言其不善行其不善思其不善如此而不為小人者未之有也成都沖退處士章察隱者其學長於易太元為范子功解述大旨再復攡詞曰人之所好而不足者善也所醜而有餘者惡也君子能強其所不足而拂其所有餘則太元之道幾矣此子雲仁義之心豫之於太元𫐠斯而巳或者苦其思艱其言迂溺其所以為數而忘其仁義之大是惡足以語道哉二先生之教人簡易明白學者或未知之故表出于此張吕二公文論張文濳誨人作文以理為主嘗著論云自六經以下至于諸子百氏騷人辨士論述大抵皆將以為寓理之具也故學文之端急於明理如知文而不務理求文之工世未嘗有是也夫決水於江河淮海也順道而行滔滔汨汨日夜不止衝砥柱絶吕梁放於江湖而納之海其舒為淪漣鼓為濤波激之為風飈怒之為雷霆蛟龍魚鱉噴薄出沒是水之竒變也水之𥘉豈若是哉順道而決之因其所遇而變生焉溝瀆東決而西竭下滿而上虛日夜激之欲見其竒彼其所至者哇蛭之玩耳江河淮海之水理逹之文也不求竒而竒至矣激溝瀆而求水之竒此無見於理而欲以言語句讀為竒反覆咀嚼卒亦無有此最文之陋也一時學者仰以為至言豫作史采其語著於本傳中又吕南公云士必不得已於言則文不可以不工蓋意有餘而文不足則如吃人之辨訟心未始不虛理未始不直然而或屈者無助於辭而已矣觀書契以來特立之士未有不善於文者士無志於立則已必有志焉則文何可以卑淺而為之故毅然盡心思欲與古人並此南公與人書如此豫亦載之傳中郎官非時得對唐肅宗在靈武關東獻俘百將即死有歎者司膳貟外郎李勉過而問之曰𬒳脅而官非敢反勉入見帝曰寇亂之汙半天下其欲澡心自歸無繇如盡殺之是驅以助賊也帝馳騎金宥以一郎吏之微而非時得入對雖唐制不可詳知想兵戈艱難時暫如是耳王安石棄地熙寧七年遼主洪基遣泛使蕭禧來言河東地界未決八年再來必欲以代州天池分水嶺為界詔詢于故相文彥博冨弼韓琦曽公亮以可與及不可許之狀皆以為不可王安石當國言曰將欲取之必固與之於是詔不論有無照驗劈撥與之往時界於黃嵬山麓我可以下瞰其應朔武三州既以嶺與之虜遂反瞰欣代凡東西失地七百里案慶曆中虜求關南十縣朝廷方以西夏為慮猶不過增歲弊以塞其欲至於土地尺寸弗與熙寧之兵力勝於曩時而用蕭禧堅坐都亭之故輕棄疆場設險要害之處安石果於大言其實無詞以郤之也孫權謂魯肅勸吾借劉玄德地云帝王之起皆有驅除關羽不足忌此子敬內不能辦外為大言耳安石之語亦然雙生以前為兄續筆巳書公羊傳注雙生子事兹讀西京雜記得一説甚詳云霍將軍妻一産二子疑所為兄弟或曰前生為兄後生為弟今雖俱日亦宜以先生為兄或曰居上者宜為兄居下者宜為弟居下者前生今宜以前生為弟光曰昔殷王祖甲一産二子以卯日生嚚以巳日生良則以嚚為兄以良為弟若以在上者為兄嚚亦當為弟矣許莊公一産二女曰妖曰茂楚大夫唐勒一産二子一男一女男曰正夫女曰瓊華皆以先生為長近代鄭昌時文長倩並生二男滕公一生二女李黎生一男一女並以前生為長霍氏亦以前生為兄焉此最可證風俗通應劭風俗通雖東漢末所作然所載亦難盡信其敘希姓者曰合浦太守虎旗上郡太守邸杜河內太守遇沖北平太守賤瓊東平太守到質沐寵北平太守卑躬鴈門太守宿詳五原太守督汝南太守謁渙九江太守荆修東海太守鄐熙弘農太守移良南郡太守為昆酒泉太守頻暢北海太守處興巴郡太守鹿旗涿郡太守作顯廬江太守貴遷交趾太守賴先外黃令集一洛陽令諸於單父令即賣烏傷令昔登山陽令職洪高唐令用蚪此二十君子皆是郡守縣令惟移良之名曽見於史恐未必然也俗語有出今人意錢賭博皆以四數之謂之攤案廣韻攤字下云攤蒱四數也竹工謂屋椽上織箔曰篖笪廣韻篖字下云筕篖行笪也采帛鋪謂剪截之餘曰帵子帵一歡切注裁餘也挑剔燈火之杖曰栝他念切注火杖也李濟翁資暇集云意錢當曰攤鋪疾道之訛其音為蒲此説不然昏主棄功臣燕昭王伐齊取其七十城所存者惟莒即墨田單一旦悉復之使齊復為齊而襄王聽幸臣九子之譖單幾不免秦符堅舉百萬之師伐晉賴謝安却之而孝武帝聽王國寶之讒安不能立於朝廷之上桓溫伐慕容暐暐兵屢挫議欲奔北慕容垂一戰使燕復存乃用慕客評之毀垂竄身符氏國隨以亡朱泚據京都德宗播遷奉天李懷光繼叛李晟孤軍堅壁竟平大難而德宗用張延賞之譖訖罷其兵且百端疑忌至於鞅鞅以死自古昏主不明輕棄功臣如此真可歎也問故居陶淵明問來使詩云爾從山中來早晚發天目我屋南窗下今生幾叢菊薔薇葉已抽秋蘭氣當馥歸去來山中山中酒應熟諸集中皆不載惟朝文元家本有之蓋天目疑非陶居處然李太白云陶令歸去來田家酒應熟乃用此爾王摩詰詩云君自故鄉來應知故鄉事來日綺窗前寒梅著花未杜公送韋郎歸成都云為問南溪竹抽梢合過墻憶弟云故園花自發春日鳥還飛王介甫云道人北山來問松我東岡舉手指屋脊云今如許長古今詩人懷想故居形之篇詠必以松竹梅菊為比興諸此句皆是也至於杜公將别巫峽贈南鄉兄瀼西果園詩云苔竹素所好萍蓬無定居遠遊長兒子幾地别林廬雜蘂紅相對他時錦不如具舟將出峽巡圃念携鉏每讀至此未嘗不為之悽然寄題草堂云尚念四小松蔓草易拘纏霜骨不甚長永為鄰里憐又一篇云四松𥘉移時大抵三尺強别來忽三歲離立如人長尤可見一時之懷抱也唐宰相不歷守令唐楊綰崔祐甫杜黃裳李藩裴垍皆稱英宰然考其履歷皆未嘗為刺史縣令綰初補太子正字擢右拾遺起居中書舍人禮吏部侍郎國子祭酒太常卿拜相祐甫初調壽安尉歷藩府判官入為起居中書舍人拜相黃裳初佐朔方府入為侍御史太子賔客太常卿拜相藩佐東都徐州府入為祕書郎郎中給事中拜相垍由美原尉四遷考功貟外郎中書舍人戶部侍郎拜相五賢行業史䇿書之巳詳兹不復論然則後之用人必言踐揚中外諳熟民情始堪大用殆為隘矣張釋之栁惲漢張釋之為廷尉文帝出行有人驚乘輿馬使騎捕之屬廷尉釋之奏當此人犯蹕罰金上怒釋之曰方其時上使使誅之則巳顔師古謂言初執獲此人天子即令誅之其事即畢唐栁渾為相玉工為德宗作帶誤毀一銙工私市它玉足之帝識不類怒其欺詔京兆論死渾曰陛下遽殺之則已若委有司須詳讞乃可於法罪當杖請論如律由是工不死豫謂張栁之論可謂善矣然張云上使使誅之則巳柳云陛下遽殺之則巳無乃啓人主徑殺人之端乎斯一節未為至當也人臣震主人臣立社稷大功負海宇重望久在君側為所敬畏其究必至於招疑毀漢高祖有天下韓信之力為多終以挾不賞之功戴震主之威至於誅滅霍光擁昭立宣勢侔人主宣帝謁見高廟光從驂乘上內嚴憚之若有芒刺在背其家既覆俗傳之曰威震主者不畜霍氏之禍萌於驂乘周亞夫平定七國景帝怒其固爭栗太子由此疏之後目送其出曰此鞅鞅非少主臣也訖以無罪殺之謝安却符堅百萬之衆晉室復存功名既盛險詖求進之徒多毀短之孝武稍以踈忌又信會稽王道子之姦扇至使避位出外終以至亡齊文宣之篡魏皆高德政之力德政為相數強諌帝不恱謂左右曰高德政恆以精神凌逼人遂殺之并其妻子隋文帝將篡周欲引高熲入府熲欣然曰願受驅馳縱公事不成亦不辭滅族及帝受禪用為相二十年朝臣莫與為比潁自以為任寄隆重每懷至公無自疑意積為獨孤皇后漢王諒等所譖帝欲成其罪既罷之後至云自其解落暝然忘之如本無高潁不可以身要君自云第一也逮于煬帝竟以冤誅郭子儀再造王室以身為天下安危權任既重功名復大德宗即位自外召還朝所領副元帥諸使悉罷之李晟以孤軍復京城不見信於庸主使之晝夜泣目為之腫卒奪其兵百端疑忌幾於不免李德裕功烈光明佐武宗中興威名獨重宣宗立奉册太極殿帝退謂左右曰向行事近我者非太尉邪每顧我毛髮為之森竪明日罷之終於貶死海外若郭崇韜安重誨皆然也五經秀才唐楊綰為相以進士不鄉舉但試辭賦浮文非取士之實請置五經秀才科李栖筠賈至以綰所言為是然亦不聞施行也陶濳去彭澤晉書及南史陶濳傳皆云濳為彭澤令素簡貴不私事上官郡遣督郵至縣吏白應束帶見之濳歎曰吾不能為五斗米折腰拳拳事鄉里小人即日解印綬去賦歸去來以遂其志案陶集載此辭自有序曰余家貧耕植不足以自給彭澤去家百里故便求之及少日眷然有歸歟之情何則質性自然非矯勵所得飢凍雖切違已交病悵然慷慨深愧平生之志猶望一稔當斂裳宵逝尋程氏妹喪于武昌情在駿奔自免去職在官八十餘曰觀其語意乃以妹喪而去不緣督郵所謂矯勵違巳之説疑心有所屬不欲盡言之耳詞中正喜還家之樂略不及武昌自可見也羌戎畏服老將漢先零羌犯塞趙充國往擊之羌豪相數責曰語汝亡反今天子遣趙將軍來年八九十矣善為兵今請欲一鬪而死可得邪充國時年七十六訖平之唐代宗時回紇吐蕃合兵入寇郭子儀單騎見回紇復與之和諸酋長皆大喜曰嚮以二巫師從軍巫言此行甚安穩不與唐戰見一大人而還今果然矣郭公是時年七十乃知羌戎畏服老將如此班超久在西域思歸故其言云蠻夷之俗畏壯侮老蓋有為而云古人字只一言檀弓云幼名冠字五十以伯仲周道也古之人命字一而已矣𥘉曰子巳而為仲為伯又為叔為季其老而尊者為甫蓋無以兩言相連取義若屈原離騷經名余曰正則兮字余曰靈均案史記原字平所謂靈均者釋平之義以緣飾詞章耳下至西漢與周相接故一切皆然除子房子卿子孟子政子孺子長子雲子兄子真子公子陽子賔子幼之外若仲孺仲卿仲子長卿少卿孺卿君卿客卿遊卿翁卿聖卿長君少君稚君遊君次君贑君近君曼君王孫翁孫次公少公孟公遊公仲公長公君公少叔翁叔長叔中叔子叔長倩曼倩次倩稚季長孺仲孺幼孺少孺次孺翁孺君孺長翁弱翁仲翁少翁君房君賔君倩君敖君蘭君長君仲君孟少季少子少路少遊稚賔稚圭稚遊稚君巨先巨君長賔長房翁思翁子翁仲之類其義只從一訓極為雅馴至於婦人曰少夫君俠政君君力君弟君之阿君單書一字者若陳勝字涉項藕字羽彭越字仲張歐吳廣枚乘字叔楚元王交朱雲字遊爰盎字絲張釋之字季鄭當時字莊劉德字路眭弘字孟逮東漢以下則不盡然容齋五筆卷第一終
