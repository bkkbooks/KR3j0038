front:
  text: 容齋續筆卷第六十五則
  hash: sha256:b5e2eba106500eb91b537f9f52531bcc3193b158617a5078c7e4ef7d44582b1d
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_024-1a}
body:
  text: 嚴武不殺杜甫新唐書嚴武傳云房琯以故宰相為巡內刺史武慢倨不為禮最厚杜甫然欲殺甫數矣李白為蜀道難者為房與杜危之也甫傳云武以丗舊待甫甫見之或時不巾嘗醉登武牀瞪視曰嚴挺之乃有此兒武銜之一日欲殺甫冠鉤于簾三左右白其母奔救得止舊史但云甫性𥚹躁嘗憑醉登武牀斥其父名武不以為忤初無所謂欲殺之説蓋唐小説所載而新書以為然豫案李白蜀道難本以譏章仇兼瓊前人嘗論之矣甫集中詩凡為武作者幾三十篇送其還朝者曰江村獨歸處寂寞養殘生喜其再鎮蜀曰得歸茅屋赴成都直為文翁再剖符此猶是武在時語至哭其歸櫬及八哀詩記室得何遜韜鈐延子荆蓋以自況空餘老賔客身上愧簮纓又以自傷若果有欲殺之怨必不應眷眷如此好事者但以武詩有莫倚善題鸚鵡賦之句故用證前説引黃祖殺禰衡為喻殆是癡人面前不得説夢也武肯以黃祖自比乎王嘉薦孔光漢王嘉為丞相以忠諫忤哀帝事下將軍朝者光祿大夫孔光等劾嘉迷國罔上不道請與廷尉雜治上可其奏光請謁者召嘉詣廷尉嘉對吏自言不能進賢退不肖吏問主名嘉曰賢故丞相孔光不能進嘉死後上覽其對思嘉言復以光為丞相案嘉之就獄由光逢君之惡而嘉且死尚稱其賢嘉用忠直隕命名章一時然亦可謂不知人矣光之邪佞鬼所唾也奴事董賢協媚王莽為漢蟊蜮尚得為賢也哉朱溫三事義理所在雖盜賊凶悖之人亦有不能違者劉仁恭為盧龍節度使其子守文守滄州朱全忠引兵攻之城中食盡使人説以早降守文應之曰僕於幽州父子也梁王方以大義服天下若子叛父而來將安用之全忠愧其辭直為之緩攻其後還師悉焚諸營資糧在舟中者鑿而沉之守文遺全忠書曰城中數萬口不食數月矣與其焚之為煙沉之為泥願乞其所餘以救之全忠為之留數囷滄人賴以濟及篡唐之後蘇循及其子楷自謂有功於梁當不次擢用全忠薄其為人以其為唐鴟梟賣國求利勒循致仕斥楷歸田里宋州節度使進瑞麥省之不懌曰宋州今年水災百姓不足何用此為遣中使詰責之縣令除名此三事在他人為不足道於全忠則為可書矣所謂憎而知其善也文字潤筆作文受謝自晉宋以來有之至唐始盛李雍傳雍尤長碑頌中朝衣冠及天下寺觀多齎持金帛往求其文前後所製凡數百首受納饋遺亦至巨萬時議以為自古鬻文獲財未有如雍者故杜詩云干謁滿其門碑版照四裔豐屋珊瑚鉤騏驎織成罽紫騮隨劒几義取無虛歲又有送斛斯六官詩云故人南郡去去索作碑錢本賣文為活翻令室倒縣蓋笑之也韓愈撰平淮西碑憲宗以石本賜韓宏宏寄絹五百匹作王用碑用男寄鞍馬并白玉帶劉義持愈金數斤去曰此諛墓中人得耳不若與劉君為壽愈不能止劉禹錫祭愈文云公鼎侯碑志隧表阡一字之價輦金如山皇甫湜為裴度作福先寺碑度贈以車馬繒綵甚厚湜大怒曰碑三千字字三縑何遇我薄邪度笑酬以絹九千匹穆宗詔蕭俯撰成德王士真碑俯辭曰王承宗事無可書又撰進之後例得貺遺若黽勉受之則非平生之志帝從其請文宗時長安中爭為碑志若市買然大官卒其門如市至有喧競爭致不由喪家裴均之子持萬縑詣韋貫之求銘貫之曰吾寧餓死豈忍為此哉白居易修香山寺記曰豫與元微之定交於生死之間微之將薨以墓志文見託既而元氏之老狀其臧獲與馬綾帛洎銀鞍玉帶之物價當六七十萬為謝文之贄豫念平生分贄不當納往反再三訖不得巳回施兹寺凡此利益功德應歸微之柳玭善書自御史大夫貶瀘州刺史東川節度使顧彥暉請書德政碑玭曰若以潤筆為贈即不敢從命本朝此風猶存唯蘇坡公於天下未嘗銘墓獨銘五人皆盛德故謂富韓公司馬溫公趙清獻公范蜀公張文定公也此外趙康靖公滕元發二銘乃代文定所為者在翰林日詔撰同知樞密院趙瞻神道碑亦辭不作曾子開與彭器資為執友彭之亡曾公作銘彭之子以金帶縑帛為謝却之至再曰此文本以盡朋友之義若以貨見投非足下所以事父執之道也彭子皇懼而止此帖今藏其家漢舉賢良漢武帝建元元年詔舉賢良方正直言極諫之士丞相綰奏所舉賢良或治申商韓非蘇秦張儀之言亂國政請皆罷奏可是時對者百餘人帝獨善莊助對擢為中大夫後六年當元光元年復詔舉賢良於是董仲舒等出焉資治通鑑書仲舒所對為建元案策問中云朕親耕籍田勸孝弟崇有德使者冠蓋相望問勤勞恤孤獨盡思極神對策曰隂陽錯繆氛氣充塞羣生寡遂黎民未濟必非即位之始年也戊為武十干戊字只與茂同音俗輩呼為務非也吳中術者又稱為武偶閲舊五代史梁開平元年司天監上言日辰內戊字請改為武乃知亦有所自也今北人語多曰武朱溫父名誠以戊類成字故司天諂之耳怨耦曰仇左傳師服曰嘉耦曰妃怨耦曰仇古之命也注云自古有此言案許叔重説文於逑字上引虞書曰方逑孱功又曰怨匹曰逑然則出於虞書今亡矣以鳩僝為逑孱以耦為匹以仇為逑其不同如此而僝字下所引乃曰旁救僝功自有二説旻字下引虞書曰仁閔覆下則稱旻天􅧈字下引虞書雉􅧈今皆無此説文與經傳不同許叔重在東漢與馬融鄭康成輩不甚相先後而所著説文引用經傳多與今文不同聊托逐書十數條以示學者其字異而音同者不載所引周易百榖草木麗乎土為草木䕻乎地服牛乘馬為犕音備牛乘馬夕惕若厲為若夤其文蔚也為斐也乘馬班如為驙如天地絪緼為天地一一繻有衣袽為需有衣袽書晉卦為晉巽為顨艮為所引書帝乃殂落為勛乃殂竄三苗為㝮塞也音倅三苗勿以憸人為譣人譣問也在後之侗為在夏后之詷尚不忌于凶德為上不諅峙乃糗糧為餱糧教胄子為教育子百工營求為敻求至于屬婦為媰婦媰音鄒妊身也有疾弗豫為有疾不悆我之弗辟為不截截諞言為戔戔巧言又圜圜升雲半有半無獂有爪而不敢以撅及以相陵懱維緢有稽之句皆云周書今所無也所引詩既伯既禱為既禡既禱新臺有泚為有玼焉得諼草為安得萱草牆有茨為有薺棘人欒欒為臠臠江之永矣為羕矣得此戚施為􅖚􅠴伐木許許為所所儦儦俟俟為伾伾俟俟嘽嘽駱馬為痑痑赤舄几几為已已又為掔掔音慳民之方殿屎為方念㕧混夷駾矣為大夷呬矣陶復陶穴為陶地也室其會如林為其旝國步斯頻為斯矉滌滌山川為􅣛􅣛論語荷蕢為荷臾褻裘為絬衣又有跢豫之足一句孟子源源而來為謜謜音願徐也接淅為滰淅滰其兩切乾漬米也左傳尨涼為牻涼芟夷為癹音潑夷圭竇為圭窬澤之萑蒲為澤之目籞禁苑也衷甸兩牡為中佃一轅楄柎藉幹為楄部薦幹公羊闖然為覢然覢失冉切暫見也國語觥飯不及壷飱為侊飯不及一食如此者甚多周亞夫漢景帝即位三年七國同日反吳王至稱東帝天下震動周亞夫一出即平之功亦不細矣而訖死於非罪景帝雖未為仁君然亦非好殺卿大夫者何獨至亞夫而忍為之切嘗原其説亞夫之為人班馬雖不明言然必悻直行行者方其將屯細柳秖以備胡且近在長安數十里間非若出臨邊塞與敵對壘有呼吸不可測知之事今天子勞軍至不得入及遣使持節詔之始開壁門又使不得驅馳以軍禮見自言介胄之士不拜天子改容稱謝然後去是乃王旅萬騎乘輿黃屋顧制命於將帥豈人臣之禮哉則其傲睨帝尊習與性成故賜食不設箸有不平之意鞅鞅非少主臣必巳見於辭氣之間以是隕命其可惜也秦王猛伐燕圍鄴符堅自長安赴之至安陽猛潛謁堅堅曰昔周亞夫不迎漢文帝今將軍臨敵而棄軍何也猛曰亞夫前却人主以求名臣竊少之猛之識慮視亞夫有間矣焬王焬帝金酋元顔亮隕於廣陵葛王褎巳自立於是追廢為王而諡曰焬邁奉使之日實首聞之接伴副使袐書少監王補言及此云北人戲誚之曰奉勑江南幹當公事回及歸覲德壽宫奏其事髙宗天顔甚恱曰亮去歲南牧巳而死歸人皆以為類符堅唯吾獨云似隋焬帝其死處既同今得諡又如此豈非天乎此假聖語當不見於史録故竊志之鄭莊公左傳載諸國事於第一卷首書鄭莊公自後紀其所行尤詳仍每事必有君子一説唯詛射潁考叔以為失政刑此外率稱其善杜氏注文又從而獎與之案莊公為周卿士以平王二於虢而取王子為質以威王卑虢公政而取溫之麥取成周之禾以王奪不使知政忿而不朝拒天子之師射王中肩謂天子不能復巡守以泰山之祊易許田不勝其母以害其弟至有城潁及泉之誓是其事君事親可謂亂臣賊子者矣而曾無一語以貶之書薑氏為母子如初杜注云公雖失之於初而孝心不忘故考叔感而通之書鄭伯以齊人朝王曰禮也杜云莊公不以虢公得政而背王故禮之書息侯伐鄭曰不度德杜云鄭莊賢書取郜與防歸于魯曰可謂正矣以王命討不庭不貪其土以勞王爵書使許叔居許東偏曰於是乎有禮度德而處量力而行相時而動可謂知禮書周鄭交惡曰信不由中質無益也是乃以天子諸侯混為一區無復有上下等威之辨射王之夜使祭足勞王杜云鄭志在苟免王討之非也此假尤為悖理唯公羊子於克假于鄢之下書曰大鄭伯之惡為得之百六陽九史傳稱百六陽九為厄會以曆志考之其名有八初入元百六曰陽九次曰隂九又有隂七陽七隂五陽五隂三陽三皆謂之災歲大率經歲四千五百六十而災歲五十七以數計之每及八十歲則值其一今人但知陽九之厄云經歲者常歲也左傳易筮左傳所載周易占筮大抵只一爻之變未嘗有兩爻以上者畢萬筮仕遇屯之比初九變也成季將生遇大有之乾六五變也晉嫁伯姬遇歸妹之睽上六變也晉文公迎天子遇大有乃九三變而之睽叔孫莊叔生子豹遇明夷乃初九變而之謙崔杼娶妻遇困乃六三變而之大過南蒯作亂遇坤乃六五變而之比趙鞅救鄭遇泰乃六五變而之需占者即演而為説然崔杼入于其宫不見其妻叔孫君子于行三日不食殆若專為二子所作也唯陳厲公生敬仲遇觀之否周史曰坤土也巽風也乾天也風為天於土上山也有山之材而照之以天光於是乎居土上杜氏注云自二至四有艮象艮為山豫謂此正是用中爻取義前書論之詳矣又有相與論事不假蓍占而引卦以言者如鄭公子曼滿欲為卿王子伯廖曰周易有之在豐之離晉先縠違命進師知莊子曰周易有之在師之臨楚王忲侈子大叔曰在復之頥但以爻辭合其所行之事耳至於為嬴敗姬伐齊則可等語自是一時探賾索隱非後人所可到也衛襄公生子孔成子占之亦遇屯之比與畢萬同雖史朝與辛廖之言則異然皆以利建侯為主鍾繇自劾漢建安中曹操以鍾繇為司􅊢校尉督關中諸軍詔召河東太守王邑而拜杜畿為太守郡掾詣繇求留邑繇不聽邑詣許自歸繇自以威禁失督司之法乃上書自劾曰謹案侍中守司􅊢校尉東武亭侯鍾繇幸得蒙恩以斗筲之才仍見拔擢顯從近密銜命督使明知詔書深疾長吏政教寬弱檢下無刑久病淹滯衆職荒頓既舉文書操彈失理輕慢憲度不與國同心為臣不忠大為不敬臣請法車召詣廷尉治繇罪大鴻臚削爵土臣輒以文書付功曹從事伏須罪誅詔不許豫觀近時士大夫自劾者不過云乞將臣重行竄黜圔門待罪而巳如繇此章蓋與為它人所糾亡異也豈非身為司􅊢職在刺舉故如是乎大義感人理義感人心其究至於浹肌膚而淪骨髓不過語言造次之間初非有怪竒卓詭之事也楚昭王遭吳闔廬之禍國滅出亡父老送之王曰父老返矣何患無君父老曰有君如是其賢也相與從之或奔走赴秦號哭請救竟以復國漢髙祖入關召諸縣豪桀曰父老苦秦苛法久矣吾當王關中與父老約法三章耳凡吾所以來為父兄除害非有所侵暴母恐乃使人與秦吏行至縣鄉邑告諭之秦民大喜巳而項羽所過殘滅民大失望劉氏四百年基業定於是矣唐明皇避祿山亂至扶風士卒頗懷去就流言不遜召入諭之曰朕託任失人致逆胡亂常須逺避其鋒卿等倉卒從朕不得别父母妻子朕甚愧之今聽各還家朕獨與子弟入蜀今日與卿等訣歸見父母及長安父老為朕致意衆皆哭曰死生從陛下自是流言遂息賊圍張巡於雍丘大將勸巡降巡設天子畫像帥將士朝之人人皆泣巡引六將於前責以大義而斬之士心益勸河北四凶稱王李抱真使賈林説王武俊託為天子之語曰朕前事誠誤朋友失意尚可謝況朕為四海之主乎武俊即首唱從化及奉天詔下武俊遣使謂田恱曰天子方在隱憂以德綏我何得不悔過而歸之王庭湊盜據成德韓愈宣慰庭湊拔刃弦弓以逆及館羅甲士於廷愈為言安史以來逆順禍福之理庭湊恐衆心動麾之使出訖為藩臣黃巢偽赦至鳯翔節度使鄭畋不出樂奏將佐皆哭巢使者怪之幕客曰以相公風痺不能來故悲耳民間聞者無不泣畋曰吾固知人心尚未厭唐賊授首無日矣旋起兵率倡諸鎮以復長安田恱以魏叛喪師遁還亦能以語言動衆心誓同生死乃知陸贄勸德宗痛自咎悔以言謝天下制書所下雖武人悍卒無不感動流涕識者知賊不足平凡此數端皆異代而同符也國家靖康建炎之難極矣不聞有此何邪容齋續筆卷第六
