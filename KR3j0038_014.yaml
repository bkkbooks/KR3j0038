  text: 容齊隨筆卷第十四十七則
  hash: sha256:71250940a639d4860ade168d9eabec68c881a403f7bc955b3440ddd8576d4525
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_014-1a}
body:
  text: 張文潜論詩前輩議論有出於率然不致思而於理近礙者張文潜云詩三百篇雖云婦人女子小夫賤隸所為要之非深於文章者不能作如七月在野至入我牀下於七月巳下皆不道破直至十月方言蟋蟀非深於文章者能為之邪豫謂三百篇固有所謂女婦小賤所為若周公召康公穆公衛武公芮伯凡伯尹吉甫仍叔家父蘇公宋襄公秦康公史克公子素其姓氏明見於大序可一槩論之乎且七月在野八月在宇九月在户本自言農民出入之時耳鄭康成始并入下句皆指為蟋蟀正巳不然今直稱此五句為深於文章者豈其餘不能過此乎以是論詩隘矣漢祖三詐漢髙祖用韓信為大將而三以詐臨之信既定趙髙祖自成臯度河晨自稱漢使馳入信壁信未起即其卧奪其印符麾召諸將易置之項羽死則又襲奪其軍卒之僞遊雲夢而縛信夫以豁逹大度開基之主所行乃如是信之終於謀逆蓋有以啓之矣有心避禍有心於避禍不若無心於任運然有不可一槩論者董卓盜執國柄築塢於郿積榖為三十年儲自云事不成守此足以畢老殊不知一敗則掃地豈容老於塢耶公孫瓉據幽州築京於易地以鐵為門樓櫓千重積榖三百萬斛以為足以待天下之變殊不知梯衝舞於樓上城豈可保邪曹爽為司馬懿所奏梪範勸使舉兵爽不從曰我不失作冨家翁不知誅滅在旦暮耳冨可復得邪張華相晉當賈后之難不能退少子以中台星坼勸其遜位華不從曰天道玄逺不如靜以待之竟為趙王倫所害方事勢不容髮而欲以靜待又可蚩也他人無足言華博物有識亦暗於幾事如此哉蹇解之險蹇卦艮下坎上見險而止故諸爻皆有蹇難之辭獨六二重言蹇蹇說者以為六二與九五為正應如臣之事君當以身任國家之責雖蹇之又蹇亦匪躬以濟之此解釋文義之旨也若尋繹爻畫則有說焉蓋外卦一坎諸爻所同而自六二推之上承九三六四又為坎體是一卦之中巳有二坎也故重言之解卦坎下震上動而免乎險矣六三將出險乃有負乘致寇之咎豈非上承九四六五又為坎乎坎為輿為盜既獲出險而復蹈焉冝其可醜而致戎也是皆中爻之義云士之處丗士之處丗視冨貴利祿當如優伶之為參軍方其据几正坐噫嗚訶箠羣優拱而聽命戲罷則亦巳矣見紛華盛麗當如老人之撫節物以上元清明言之方少年壯盛晝夜出遊若恐不暇燈收花暮輒悵然移日不能忘老人則不然未嘗置欣戚於胸中也覩金珠珍玩當如小兒之弄戲劇方雜然前陳疑若可恱即委之以去了無戀想遭橫逆機穽當如醉人之受罵辱耳無所聞目無所見酒醒之後所以為我者自若也何所加損哉張全義治洛唐洛陽經黃巢之亂城無居人縣邑荒圯僅能築三小城又遭李罕之爭奪但遺餘堵而巳張全義招懷理葺復為壯藩五代史於全義傳書之甚略資治通鑑雖稍詳亦不能盡輒采張文定公所著搢紳舊聞記芟取其要而載于此厥今荆襄淮沔創痍之餘綿地數千里長民之官用守邊保障之勞超階擢職不知幾何人其真能髣佛全義所為者吾未見其人也豈局於文法譏議有所制而不得騁乎全義始至洛於麾下百人中選可使者十八人命之曰屯將人給一旗一榜於舊十八縣中令招農户自耕種流民漸歸又選可使者十八人命之曰屯副民之來者綏撫之除殺人者死餘但加杖無重刑無租稅歸者漸衆又選諳書計者十八人命之曰屯判官不一二年每屯户至數千於農隙時選丁夫教以弓矢槍劒為坐作進退之法行之一二年得丁夫二萬餘人有盜賊即時擒捕關市之賦逮於無籍刑寬事簡逺近趨之如市五年之內號為冨庶於是奏每縣除令簿主之喜民力耕織者知某家𧖟麥善必至其家悉召老幼親慰勞之賜以酒食茶綵遺之布衫裙袴喜動顔色見稼田中無草者必下馬觀之召田主賜衣服若禾下有草耕地不熟則集衆決責之或訴以闕牛則召責其鄰伍曰此少人牛何不衆助自是民以耕桑為務家家有蓄積水旱無飢人在洛四十餘年至今廟食嗚呼今之君子其亦肯以全義之心施諸人乎博古圖政和宣和間朝廷置書局以數十計其荒陋而可笑者莫若博古圖豫比得漢匜因取一冊讀之發書捧腹之餘聊識數事于此父癸匜之銘曰爵方父癸則為之說曰周之君臣其有癸號者惟齊之四丗有癸公癸公之子曰哀公然則作是器也其在哀公之時歟故銘曰父癸者此也夫以十干為號及稱父甲父丁父癸之類夏商皆然編圖者固知之矣獨於此器表為周物且以為癸公之子稱其父其可笑一也周義母匜之銘曰仲姞義母作則為之說曰晉文公杜祁讓逼姞而巳次之趙孟云母義子貴正謂杜祁則所謂仲姞者自名也義母者襄公謂杜祁也夫周丗姞姓女多矣安知此為逼姞杜祁但讓之在上豈可便為母哉既言仲姞自名又以為襄公為杜祁所作然則為誰之物哉其可笑二也漢注水匜之銘曰始建國元年正月癸酉朔日制則為之說曰漢初始元年十二月改為建國此言元年正月者當是明年也案漢書王莽以初始元年十二月癸酉朔日竊即真位遂以其日為始建國元年正月安有明年却稱元年之理其可笑三也楚姬盤之銘曰齊侯作楚姬寶盤則為之說曰楚與齊從親在齊湣王之時所謂齊侯則湣王也周末諸侯自王而稱侯以銘器尚知止乎禮義也夫齊楚之為國各數百年豈必當湣王時從親乎且湣王在齊諸王中最為驕暴嘗稱東帝豈有肯自稱侯之理其可笑四也漢梁山鋗之銘曰梁山銅造則為之說曰梁山銅者紀其所貢之地梁孝王依山鼓鑄為國之冨則銅有自來矣夫即山鑄錢乃吳王濞耳梁山自是山名屬馮翊夏陽縣於梁國何預焉其可笑五也觀此數說他可知矣士大夫論利害士大夫論利害固當先陳其所以利之實然於利之中而有小害存焉亦當科別其故使人主擇而處之乃合母隱勿欺之誼趙充國征先零欲罷騎兵而屯田宣帝恐虜聞兵罷且攻擾田者充國曰虜小寇盜時殺人民其原未可卒禁誠令兵出而虜絶不為寇則出兵可也即今同是而釋坐勝之道非所以視蠻夷也班勇乞復置西域校尉議者難曰班將能保北虜不為邊害乎勇曰今置州牧以禁盜賊若州牧能保盜賊不起者臣亦願以要斬保胸奴之不為邊害也今通西域則虜藝必弱為患微矣若藝歸北虜則中國之費不止十億置之誠便此二人論事可謂極盡利害之要足以為法也舒元輿文舒元輿唐中葉文士也今其遺文所存者才二十四篇既以甘露之禍死文宗因觀牡丹摘其賦中桀句曰向者如迓背者如訣拆者如語含者如咽俯者如怨仰者如恱為之泣下豫最愛其玉筯篆志論李斯李陽氷之書其詞曰斯去千年氷生唐時氷復去矣後來者誰後千年有人誰能待之後千年無人篆止於斯嗚呼主人為吾寶之此銘有不可名言之妙而丗或鮮知之絶唱不可和韋應物在滁州以酒寄全椒山中道士作詩曰今朝郡齊冷忽念山中客澗砥束荆薪歸來煮白石欲持一樽酒逺慰風雨夕落葉滿空山何處尋行迹其為髙妙超詣固不容夸說而結尾兩句非復語言思索可到東坡在惠州依其韻作詩寄羅浮鄧道士曰一杯羅浮春逺餉采薇客遙知獨酌罷醉卧松下石幽人不可見清嘯聞月夕聊戲庵中人空飛本無迹劉夢得山圍故國周遭在潮打空城寂寞回之句白樂天以為後之詩人無復措詞坡公倣之曰山圍故國城空在潮打西陵意未平坡公天才出語驚丗如追和陶詩真與之齊驅獨此二者比之韋劉為不侔豈非絶唱寡和理自應爾邪贈典輕重國朝未改官制以前從官丞郎直學士以降身沒大氐無贈典唯尚書學士有之然亦甚薄余襄公王素自工書得刑書蔡君謨自端明禮侍得吏侍耳元豐以後待制以上皆有四官之恩後遂以為常典而致仕又遷一秩梁揚祖終寶文學士宣奉大夫既以致仕轉光祿遂贈特進龍圖學士蓋以為銀青金紫特進只三官故增其職是從左丞得僕射也節度使舊制贈侍中或太尉官制行多贈開府秦檜創立檢校少保之例以贈王德葉夢得張澄近歲王彥遂用之實無所益也元祐中王巖叟終於朝奉郎端明殿學士以嘗簽書樞密院故超贈正議大夫楊願終於朝奉郎資政殿學士但贈朝請大夫以執政而贈郎秩輕重為不侔皆掌固之失也揚之水左傳所載列國人語言書訊其辭旨如出一手說者遂以為皆左氏所作豫疑其不必然乃若潤色整齊則有之矣試以詩證之揚之水三篇一周詩一鄭詩一晉詩其二篇皆曰不流束薪不流束楚邶之谷風曰習習谷風以隂以雨雅之谷風曰習習谷風維風及雨在南山之陽在南山之下在南山之側在浚之郊在浚之都在浚之城在河之滸在河之漘在河之涘山有樞隰有榆山有苞櫟隰有六駮山有蕨薇隰有𣏌桋言秣其馬言采其虻言觀其旗言韔其弓皆雜出於諸詩而興致一也蓋先王之澤未逺天下書同文師無異道人無異習出口成言皆止乎禮義是以不謀而同爾李陵詩文選編李陵蘇武詩凡七篇人多疑俯觀江漢流之語以為蘇武在長安所作何為乃及江漢東坡云皆後人所擬也豫觀李詩云獨有盈觴酒與子結綢繆盈字正惠帝諱漢法觸諱者有罪不應陵敢用之益知坡公之言為可信也大曲伊涼今樂府所傳大曲皆出於唐而以州名者五伊涼熙石渭也涼州今轉為梁州唐人巳多誤用其實從西涼府來也凡此諸曲唯伊涼最著啓詩詞稱之極多聊紀十數聮以資談助如老去將何散旅愁新教小玉唱伊州求守管絃聲𣢾逐側商調裏唱伊州細蟬金鴈皆零落一曲伊州淚萬行公子邀歡月滿樓雙成揭調唱伊州賺殺唱歌樓上女伊州誤作石州聲胡部笙歌西部頭梨園弟子和涼州唱得涼州意外聲舊人空數米嘉榮霓裳奏罷唱梁州紅袖斜翻翠黛愁行人夜上西城宿聽唱涼州雙管逐丞相新裁別離曲聲聲飛出舊梁州只愁拍盡涼州杖畫出風雷是撥聲一曲涼州今不清邊風蕭颯動江城滿眼由來是舊人那堪更奏梁州曲昨夜蕃軍報國讎沙州都護破梁州邊將皆承主恩澤無人解道取涼州皆王建張祐劉禹錫王昌齡髙駢溫則殺父女長大則殺母忍國之父母見子如臣見君無鼻之國兄弟相逢則相害觸國之子孫長大則殺之如此之類皆悖理害教於事無補次山中興頌與日月爭光若此書不作可也惜哉次山謝表元次山為道州刺史作舂陵行其序云州舊四萬餘户經賊以來不滿四千太半不勝賦稅到官未五十日承諸使征求符牒二百餘封皆曰失期限者罪至貶削於戲若悉應其命則州縣破亂刺史欲焉逃罪若不應命又即獲罪戾吾將靜以安人待罪而巳其辭甚苦大略云州小經亂亡遺人實困疲朝餐是草根暮食乃木皮出言氣欲絶意速行步遲追呼尚不忍況乃鞭撲之郵亭傳急符來往跡相追更無寬大恩但有迫催期欲令鬻兒女言發恐亂隨奈何重驅逐不使存活為安人天子命符節我所持逋緩違詔令蒙責固所冝又賊退示官吏一篇言賊攻永破邵不犯此州蓋蒙其傷憐而巳諸使何為忍苦征斂其詩云城小賊不屠人貧傷可憐是以陷鄰境此州獨見全使臣將王命豈不如賊焉今彼征斂者迫之如火煎二詩憂民慘切如此故杜老以為今盜賊未息知民疾苦得結輩十數公落落參錯天下為邦伯天下少安立可待矣遂有兩章對秋月一字偕華星之句今次山集中載其謝上表兩通其一云今日刺史若無武略以制暴亂若無文才以救疲弊若不清廉以身率下若不變通以救時須則亂將作矣臣料今日州縣堪征稅者無幾巳破敗者實多百姓戀墳墓者蓋少思流亡者乃衆則刺史宜精選謹擇以委任之固不可拘限官次得之貨賄出之權門者也其二云今四方兵革未寧賦斂未息百姓流亡轉甚官吏侵刻日多實不合使凶庸貪猥之徒凡弱下愚之類以貨賂權勢而為州縣長官觀次山表語但因謝上而能極論氏窮吏惡勸天子以精擇長吏有謝表以來未之見也丗人以杜老褒激之故或稍誦其詩以中興頌故誦其文不聞有稱其表者豫是以備録之以風後之君子次山臨道州歲在癸卯唐代宗初元廣德也光武仁君漢光武雖以征伐定天下而其心未嘗不以仁恩招懷為夲隗囂受官爵而復叛賜詔告之曰若束手自詣保無他也公孫述據蜀大軍征之垂滅矣猶下詔喻之曰勿以來歙岑彭受害自疑今以時自詣則家族全詔書手記不可數得朕不食言遣馮異西征戒以平定安集為急怒吳漢殺降責以失斬將弔民之義可謂仁君矣蕭銑舉荆楚降唐而髙祖怒其逐鹿之對誅之於市其隘如此新史猶以髙祖為聖豈理也哉容齊隨筆卷第十四
