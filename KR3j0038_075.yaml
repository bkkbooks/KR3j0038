body:
  text: 容齋四筆卷第九十六則蔣魏公逸史蔣魏公逸史二十卷頴叔所著也多紀當時典章文物云舊有數百冊兵火閒盡失之其曽孫芾始攟摭遺藁而成此書將以奏御以其副上之太史且板行之傳之天下後世旣而不果蔣公在熈寜元祐崇寧時各爲博聞強識然閱其論述頗有可議恨不及丞相在日與之言其一云行守試視其官品之髙下除者必帶本官吕晦叔除守司空而不帶金紫光禄大夫者此翰林之失也旣不帶官不當著守字故晦叔辨之遂去守字爲正司空議者謂超過特進東宫三太儀同矣予謂行守試必帶正官固也然自改官制以後旣爲司空自不應復帶階官吕從金紫遷只是超特進一級耳東宫三太何嘗以爲宰相官儀同又係使相也吕亦無自辨之說其二云文潞公旣爲眞太師矣其罷也乃加守字潞公怏怏諸公欲爲去之議者謂非典故潞公之意止欲以眞太師致仕耳諸公曰如此可乎曰不可爲眞太師則在宰相之上竟不去守字但出劄子令權去之案潞公本以開府儀同三司守太師河東節度使致仕入爲平章軍國重事故繋銜只云太師及再致仕悉還舊稱當時有旨於制詞内除去守字以嘗正任太師也所謂劄子權去恐或不然其三云舊制執政雙轉謂自工部侍郎轉刑部刑部轉兵部兵部轉工部尚書惟宰相對轉工部侍郎直轉工書比執政三遷也予考舊制執政轉官與學士等六侍郎則升兩曹以工禮刑戸兵吏爲叙至兵侍者轉右丞至吏侍者轉左丞皆轉工書然後細遷今言兵侍即轉工書非也宰相爲侍郎者升三曹爲尚書者雙轉如工侍轉戸侍禮侍轉兵侍若係戸侍當改二丞而宰相故事不歷丞故直遷尚書今言工侍對轉工書非也其四云楊察爲翰林學士一夜當三制劉沆以參知政事富弼以宣徽使皆除宰相宣徽在參政下則富當在劉下乃誤以居上人皆不覺其失惟學士李淑知之揚言其事遂貼麻改之予考國史至和元年八月劉沆以參知政事拜集賢相二年六月以忠武軍節度使知永興軍文彦博爲昭文相位第一劉沆遷史館相位第二宣徽南院使判并州富弼爲集賢相位第三其夕三制是巳而劉先一年巳在相位初無失誤貼改之說其五云有四儀同一曰開府儀同三司二曰儀同三司三曰左儀同三司四曰右儀同三司案自漢鄧騭始爲儀同三司魏晉以降但有開府儀同三司之目周陏又增上字爲一階又改儀同三司爲儀同大將軍又有開府上開府儀同上儀同班列益卑未嘗有左右之稱也後進不當輙議前軰因孫偃有問書以示之沈慶之曹景宗詩宋孝武嘗令羣臣賦詩沈慶之手不知書毎恨眼不識字上逼令作詩慶之曰臣不知書請口授師伯上即令顔師伯執筆慶之口授之曰微生遇多幸得逢時運昌朽老筋力盡徒歩還南岡辭榮此聖世何愧張子房上甚恱衆坐並稱其辭意之美梁曹景宗破魏軍還振旅凱入武帝宴飲連句令沈約賦韻景宗不得韻意色不平啓求賦詩帝曰卿伎能甚多人才英拔何必止在一詩景宗巳醉求作不巳時韻巳盡唯餘競病二字景宗便操筆其辭曰去時兒女悲歸來笳鼔競借問行路人何如霍去病帝歎不巳約及朝賢驚嗟竟日予謂沈曹二公未必能辦此疑好事者爲之然正可爲一佳對曰辭榮聖世何愧子房借問路人何如去病若全用後兩句亦自的切藍尾酒白樂天元日對酒詩云三盃藍尾酒一楪膠牙餳又云老過占他藍尾酒病餘收得到頭身歳盞後推藍尾酒春􅌉先勸膠牙餳荆楚歳時記云膠牙者取其堅固如膠也而藍尾之義殊不可曉河東記載申屠澄與路傍茅舍中老父嫗及處女環火而坐嫗自外挈酒壷至曰以君冒寒且進一盃澄因揖遜曰始自主人翁即巡澄當婪尾蓋以藍爲婪當婪尾者謂最在後飲也葉少藴石林燕語云唐人言藍尾多不同藍字多作啉出於侯白酒律謂酒廵匝末坐者連飲三盃爲藍尾蓋末坐遠酒行到常遲故連飲以慰之以啉爲貪婪之意或謂啉爲燣如鐵入火貴其出色此尤無稽則唐人自不能曉此義葉之說如此予謂不然白公三盃之句只爲酒之廵數耳安有連飲者哉侯白滑稽之語見於啓顔録唐蓺丈志白有啓顔録十卷雜語五卷不聞有酒律之書也蘇鶚演義亦引其說歐陽公辤官歐陽公自亳州除兵部尚書知青州辤免至四云恩典超優遷轉頗數臣近自去春由吏部侍郎轉左丞未踰兩月又超轉三資除刑部尚書今纔踰歳又超轉兩資尚書六曹一歳之閒超轉其五累降詔不從其請此是熈寧元年未改官制時今人多不能曉蓋昔者左右丞在尚書下所謂左丞超三資除刑書者謂歷工禮乃至刑也下云又超兩資者謂歷戸部乃至兵也其上唯有吏部故言尚書六曹超轉其五云南北語音不同南北語音之異至於不能相通故器物花木之屬雖人所常用固有不識者如毛鄭釋詩以梅爲枏竹為王芻蔞爲翹翹之草是巳顔師古注漢書亦然淮南王安諌武帝伐越書曰輿轎而隃領服䖍曰轎音橋謂隘道輿車也臣瓉曰今竹輿車也江表作竹輿以行項昭曰陵絶水曰轎音旗廟反師古曰服音瓚說是也項氏謬矣此直言以轎過領耳何云陵絶水乎旗廟之音無所依據又武帝紀戈船將軍張晏曰越人於水中負人船又有蛟龍之害故置戈於船下因以爲名瓉曰伍子胥書有戈船以載干戈因謂之戈船也師古曰以樓船之例言之則非爲載干戈也此蓋船下安戈㦸以禦蛟鼉水蟲之害張說近之二說皆爲三劉所破云今南方竹輿正作旗廟音項亦未爲全非顔乃西北人隨其方言遂音橋又云船下安戈㦸旣難厝置又不可以行且今造舟船甚多未嘗有置戈者顔北人不知行船項說是也予謂項音轎字是也而云陵絶水則謬故劉公以爲未可全非張晏云越人於水中負船尤可笑南舟北帳頃在豫章遇一遼州僧於上藍與之閑談曰南人不信北方有千人之帳北人不信南人有萬斛之舟蓋土俗然也法苑珠林云山中人不信有魚大如木海上人不信有木大如魚胡人見錦不信有蟲食樹吐絲所成吳人身在江南不信有千人氊帳及來河北不信有二萬碩船遼僧之談合於此魏冉罪大自漢以來議者謂秦之亡由商鞅李斯鞅更變法令使民不見德斯焚燒詩書欲人不知古其事固然予觀秦所以得罪於天下後世皆自挾詐失信故耳其始也以商於六百里啖楚絶齊繼約楚懷王入武關辱爲藩臣竟留之至死及其喪歸楚人皆憐之如裴親戚諸侯由是不直秦未及百年三戸亡秦之語遂驗而爲此謀者張儀魏冉也儀之惡不待言而冉之計頗隱故不爲士君子所誅當秦武王薨諸弟爭立唯冉力能立昭王冉者昭王母宣太后之弟也昭王少太后自治事任冉爲政威震秦國才六年而詐留楚王又怒其立太子復取十六城是時王不過十餘歳爲此者必冉也後冉爲范雎所閒而廢逐司馬公以爲冉援立昭王除其災害使諸侯稽首而事秦秦益彊大者冉之功也蓋公不細考之云又嘗請趙王㑹澠池處心積慮亦與詐楚同頼藺相如折之是以無所成不然與楚等耳冉區區匹夫之見徒能爲秦一時之功而詒秦不義不信之名萬世不滅者冉之罪誠大矣辯秦少游義倡夷堅已志載潭州義倡事謂秦少游南遷過潭與之往來後倡竟爲秦死常州教授鍾將之得其說於李結次山爲作傳予反復思之定無此事當時失於審訂然悔之不及矣秦將赴杭倅時有妾邊朝華旣而以妨其學道割愛去之未幾罹黨禍豈復眷戀一倡女哉予記國史所書温益知潭州當紹聖中逐臣在其廵内若范忠宣劉仲馮韓川原伯吕希純子進吕陶元鈞皆爲所侵困鄒公南遷過潭暮投宿村寺益即時遣州都監將數卒夜出城逼使登舟竟凌風絶江去幾於覆舟以是觀之豈肯容少游𣢾昵累日此不待辯而明已志之失著矣姓源韻譜姓氏之書大抵多謬誤如唐正觀氏族志今已亡其本元和姓纂誕妄最多國朝所修姓源韻譜又爲可笑姑以洪氏一項考之云五代時有洪昌洪果皆爲參知政事予案二人乃五代南漢僭主劉之子及晟嗣位用爲知政事其兄弟本連弘字以本朝國諱故五代史追改之元非姓洪氏也此與洪慶善序丹陽弘氏云有弘憲者元和四年嘗䟦輞川圖不知弘憲乃李吉甫之字耳其誤正同三筆已載此說譽人過實稱譽人過實最爲作文章者之疪病班孟堅尚不能免如薦謝夷吾一書予蓋論之於三筆矣栁子厚復杜温夫書云三辱生書書皆逾千言抵吾必曰周孔周孔安可當也語人必於其倫生來柳州見一刺史即周孔之今而去我道連而謁於潮又得二周孔去之京師京師顯人爲文詞立聲名以千數又宜得周孔千百何吾生胷中擾擾焉多周孔哉是時劉夢得在連韓退之在潮故子厚云然此文人人能誦然今之好爲䛕者固自若也予表出之以爲子孫戒張說賀魏元忠衣紫曰公居伊周之任即爲二張所䜛幾於隕命此但形於語言之閒耳作文句法作文旨意句法固有規倣前人而音節鏘亮不嫌於司者如前漢書贊云堅牛奔仲叔孫卒郈伯毀季昭公逐費忌納女楚建走宰嚭譛胥夫差喪李園進妹春申斃上官訴屈懷玉執趙高敗斯二世縊伊戾坎盟宋痤死江充造蠱太子殺息夫作姦東平誅新唐書効之云三宰嘯㐫牝奪辰林甫將蕃黄屋奔鬼質敗謀興元䠞崔桞倒持李宗覆劉夢得因論儆舟篇云越子膝行呉君忽晉宣尸居魏臣怠白公厲劒子西哂李園養士春申易亦効班史語也然其模範本自筍子成相篇書簡循習近代士人相承於書尺語言浸渉竒獧雖有賢識不能自改如小簡問委自言所在必求新異之名予守贑時屬縣興國宰詒書云㶑水有驅䇿乞䟽下㶑水者彼邑一水耳郡中未嘗知此不足以爲工當言下邑屬邑足矣爲縣丞者無不采藍田壁記語云負丞某處哦松無補渉筆承乏皆厭爛陳言至稱丞曰藍田殊爲可笑𥘉赴州郡與人書必言前政頽靡倉庫匱乏未知所以善後㳂習一律正使眞如所陳讀者亦不之信予到當塗日謝執政書云郡雖小而事簡庫錢倉粟自可枝梧得坐嘯道院誠爲至幸周益公荅云從前得外郡太守書未有不以窘冗爲詞獨創見來緘如此蓋覺其與它異也此兩者皆狃熟成俗故紀述以戒子弟輩健訟之誤破句讀書之誤根著于人殆不可復正在易彖之下先釋卦義然後承以本名者凡八卦蒙卦曰蒙山下有險險而止蒙以止字爲句絶乃及於蒙始係以蒙亨以亨行訟卦曰訟上剛下險險而健訟以健字爲句絶乃及於訟始係以訟有孚豫卦剛應而志行順以動豫隨卦剛來而下柔動而說隨蠱卦剛上而柔下巽而止蠱恒卦巽而動剛柔皆應恒解卦解險以動動而免乎險解井卦巽乎水而上水井皆是卦名之上爲句絶而童蒙入學之𥘉其師點句輙混於上遂以健訟相連此下說隨二字尚爲有說若止蒙動豫之類將如之何凡謂頑民好訟者曰嚚訟曰終訟可也黄魯直江西道院賦云細民險而健以終訟爲能筠獨不嚚於訟是巳同人卦柔得中而應乎乾曰同人同人曰同人于野亨据其文義正與諸卦同但多下一曰字王弼以爲乾之所行故特曰同人曰程伊川以爲衍三字恐不然也用史語之失今之牽引史語者亦未免有失張釋之言便宜事文帝曰卑之母甚高論令今可行也遂言秦漢之閒事帝稱善顔師古云令其議論依附時事予謂不欲使爲甚高難行之論故令少卑之爾而今之語者直以言議不足采爲無甚高論又文帝問上林令禽獸簿不能對虎圏嗇夫從旁代對帝曰吏不當如此邪薛廣德諌元帝御樓船曰宜從橋且有血汙車輪之訐張猛曰乗船危就橋安上曰暁人不當如是邪師古謂諌爭之言當如猛之詳婉也案兩帝之語皆是襃嘉之詞猶云獨不當如是乎今乃指人引喻非理或直述其私曰暁人不當如是又韓公送諸葛覺往隨州讀書詩云鄴侯家多書挿架三萬軸一一懸牙籖新若手未觸爲人強記覧過眼不再讀偉哉群聖文磊落載其腹鄴侯蓋謂李繁時爲隨州刺史藏書旣多且記性警敏故籖軸嚴整如是耳今人或指言雖名爲收書而未嘗過目者輙曰新若手未觸亦非也文字書簡謹日作文字紀月日當以實言若拘拘然必以節序則爲牽強乃似麻沙書坊桃源居士輩所䟦耳至於往還書問不可不繋日而性率者一切不書予有婿生子遣報云今日巳時得一子更不知爲何時或又失之好竒外姻孫鼎臣毎致書必題其後曰某節至云小暑前一日驚蟄前兩日之類文惠公常笑云看孫鼎臣書須著置曆日於案上蓋自元正人日三元上巳中秋端午七夕重九除夕外雖寒食冬至亦當謹識之况於小小氣候後生宜戒更衣雅志堂後小室名之曰更衣以爲姻賔憩息地稚子數請所出因録班史語示之灌去傳坐乃起更衣顔注更改也凡乆坐者皆起更衣以其寒煖或變也田延年起至更衣顔注古者延賔必有更衣之處衞皇后傳帝起更衣子夫侍尚衣容齋四筆卷第九終
