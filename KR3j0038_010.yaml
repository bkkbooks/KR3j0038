front:
  text: 容齊隨筆卷第十二十則
  hash: sha256:a8cfd20db6acd451f2c18afccac64b4c4891a699aaaf5fad35e98cdd44982b54
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_010-1a}
body:
  text: 楊彪陳羣魏文帝受禪欲以楊彪為太尉彪辭曰彪備漢三公耄年被病豈可贊惟新之朝乃授光祿大夫相國華歆以形色忤旨徙為司徒而不進爵帝久不懌以問尚書令陳羣曰我應天受禪相國及公獨不怡何也羣對曰臣與相國曽臣漢朝心雖恱喜猶義形於色夫曹氏篡漢忠臣義士之所冝痛心疾首縱力不能討忍復仕其朝為公卿乎歆羣為一丗之賢所立不過如是彪遜詞以免禍亦不敢一言及曹氏之所以得蓋自黨錮禍起天下賢士大夫如李膺范滂之徙屠戮殆盡故所存者如是而巳士風不競悲夫章惇蔡京為政欲殄滅元祐善類正士禁錮者三十年以致靖康之禍其不為歆羣者幾希矣袁盎溫嶠趙談常害袁盎盎兄子種曰君與鬭廷辱之使其毀不用文帝出談參乘盎前曰天子所與共六尺輿者皆天下豪英陛下奈何與刀鋸餘人載上笑下談談泣下車溫嶠將去王敦而懼錢鳯為之姦謀因敦餞別嶠起行酒至鳯擊鳯幘墜作色曰錢鳯何人溫太真行酒而敢不飲及發後鳯入說敦曰嶠於朝廷甚密未必可信敦曰太真昨醉小加聲色豈得以此便相讒二由是鳯謀不行二者之智如此日飲亡何漢書爰盎傳南方卑濕君能日飮亡何顔師古注云無何言更無餘事而史記盎傳作日飲母苛蓋言南方不宜多飲耳今人多用亡何字爰盎小人爰盎真小人每事皆借公言而報私怨初非盡忠一意為君上者也嘗為吕祿舍人故怨周勃文帝禮下勃何豫盎事乃有非社稷臣之語謂勃不能爭吕氏之事適㑹成功耳致文帝有輕勃心既免使就國遂有廷尉之難嘗謁丞相申屠嘉嘉弗為禮則之丞相舍折困之為趙談所害故沮止其參乘素不好􅏯錯故因吳反事請誅之蓋盎夲安陵羣盜冝其忮心忍戾如此死於刺客非不幸也唐書判唐銓選擇人之法有四一曰身謂體貌豐偉二曰言言辭辨正三曰書楷法遒美四曰判文理優長凡試判登科謂之入等甚拙者謂之藍縷選未滿而試文三篇謂之宏辭試判三條謂之拔萃中者即授官既以書為藝故唐人無不工楷法以判為貴故無不習熟而判語必駢儷今所傳龍筋鳯髓判及白樂天集甲乙判是也自朝廷至縣邑莫不皆然非讀書善文不可也宰臣每啓擬一事亦必偶數十語今鄭畋勑語堂判猶存丗俗喜道瑣細遺事參以滑稽目為花判其實乃如此非若今人握筆据案只署一字亦可國初尚有唐餘波久而革去之但體貌豐偉用以取人未為至論古彞器三代彞器其存至今者人皆寶為竒玩然自春秋以來固重之矣經傳所記取郜大鼎于宋魯以吳壽夢之鼎賄荀偃晉賜子産莒之二方鼎齊賂晉以紀甗玉磬徐賂齊以甲父之鼎鄭賂晉以襄鐘衛欲以文之舒鼎定之鞶鑑納魯侯樂毅為燕破齊祭器設於寧臺大吕陳於元英故鼎反乎磨室是巳玉蘂杜䳌物以希見為珍不必異種也長安唐昌觀玉蘂乃今瑒花又名米囊黃魯直易為山礬者潤州鶴林寺杜䳌乃今映山紅又名紅躑躅者二花在江東彌山亘野殆與榛莽相似而唐昌所産至於神女下遊折花而去以踐玉峯之期鶴林之花至以為外國僧鉢盂中所移上玄命三女下司之巳踰百年終歸閬苑是不特土俗罕見雖神仙亦不識也王建宫詞云太儀前日暖房來囑向昭陽乞藥栽勑賜一窠紅躑躅謝恩未了奏花開其重如此蓋宫禁中亦鮮云禮寺失職唐開元中封孔子為文宣王顔子為兖公閔子至子夏為侯羣弟子為伯夲朝祥符中進封公為國公侯為郡公伯為侯紹興二十五年太上皇帝御製贊七十五首而有司但具唐爵故宸翰所標皆用開元國邑其失於考据如此今當請而正之可也紹興末胡馬飲江既而自斃詔加封馬當采石金山三水府太常寺按籍係四字王當加至六字及降告命至其處廟令以舊告來則巳八字矣逐郡為繳回新命而別易二美名以寵之禮寺之失職類此方元顔亮據淮上豫從樞密行府於建康嘗致禱大江能令虜不得渡者當奏冊為帝洎事定朝廷許如約朱丞相漢章曰四瀆當一體獨帝江神禮乎豫曰懲勸之道人神一也彼洪河長淮受國家祭祀血食不為不久當胡騎之來如行枕席唯大江滔滔天險坐遏巨敵之衝使其百萬束手倒戈而退此其靈德隂功於河淮何如自五嶽進冊之後今蔣廟陳果仁祠亦稱之江神之帝於是為不忝矣朱公終以為不可亦僅改兩字吁可惜哉徐凝詩徐凝以瀑布界破青山之句東坡指為惡詩故不為詩人所稱說豫家有凝集觀其餘篇亦自有佳處今漫紀數絶于此漢宫曲云水色簾前流玉霜趙冡飛燕侍昭陽掌中舞罷簫聲絶三十六宫秋夜長憶楊州云蕭娘臉下難勝淚桃葉眉頭易得愁天下三分明月夜二分無賴是楊州相思林云逺客逺遊新過嶺每逢芳樹問芳名長林遍是相思樹爭遣愁人獨自行玩花云一樹梨花春向暮雪枝殘處怨風來明朝漸校無多去看到黃昏不欲回將歸江外辭韓侍郎云一生所遇唯元白天下無人重布衣欲別朱門淚先盡白頭遊子白身歸皆有情致冝其見知於微之樂天也但俗子妄作樂天詩繆為賞激以起東坡之誚耳梅花橫參今人梅花詩詞多用參橫字蓋出柳子厚龍城録所載趙師雄事然此實妄書或以為劉無言所作也其語云東方巳白月落參橫且以冬半視之黃昏時參巳見至丁夜則西沒矣安得將旦而橫乎秦少遊詩月落參橫盡角哀時香消盡令人老承此誤也唯東坡云紛紛初疑月挂樹耿耿獨與參橫昏乃為精當老杜有城擁朝來客天橫醉後參之句以全篇考之蓋初秋所作也致仕之失大夫七十而致事謂之得謝美名也漢韋賢薛廣德疏廣疏受或縣安車以示子孫賣黃金以侈君賜為榮多矣至於龔勝鄭弘輩亦詔策褒表郡縣存問合於三代敬老之義本朝尤重之大臣告老必寵以東宫師傅侍從者艾若朝迥孫奭李柬之亦然宣和以前蓋未有既死而方乞致仕者南度之後故實散亡於是朝奉武翼郎以上不以內外髙卑率為此舉其最甚而無理者雖宰相輔臣考終於位其家發哀即服降㫖聲鍾給賻既巳閲日方且為之告廷出命綸書之中不免有親醫藥介壽康之語如秦太師万俟丞相陳魯公沈必先王時亨鄭仲益是巳其在外者非易簀屬纊不復有請間千百人中有一二焉則知與不知駭惜其死子弟遊宦逺地往往飲泣不寧謁急奔命故及無事日不敢為之紹興二十九年豫為吏部郎因輪對奏言乞令吏部立法自今日以往當得致仕恩澤之人物故者即以告所在州州上省部然後夷考其平生非有贓私過惡於式有纍者輒官其後人若真能陳義引年或辭榮知止者乞厚其節禮以厲風俗賢於率天下為僞也太上覽奏欣納曰朕記得此事之廢方四十年當如卿語既下三省諸公多以為是而首相湯歧公獨難之其議遂寢今不復可正云南班宗室南班宗室自來只以本官奉朝請自隆興以後始帶宫觀使及提舉今嗣濮王永陽恩平安定王以下皆然非制也省郎稱謂除省郎者初降旨揮但云除某部郎官蓋以知州資序者當為郎中不及者為貟外郎及吏部擬告身細銜則始直書之其兼權者𥘉云權某部郎官洎入銜及文書皆曰權貟外郎巳是它部郎中則曰權郎中至紹興末馮方以館職攝吏部欲為異則繫銜曰兼權尚書吏部郎官豫嘗扣其說馮曰所被省劄只言權郎官故不敢耳豫曰省劄中豈有尚書二字乎馮無以對然訖不肯改自後相承效之至今告命及符牒所書亦云權郎官固巳甚野至於尚左侍右之名遂入除目皆小吏不諳熟故事馴以致然書之記注為不美耳水衡都尉二事龔遂為渤海太守宣帝召之議曹王生願從遂不忍逆及引入宫王生從後呼曰天子即問君何以治渤海冝曰皆聖主之德非小臣之力也遂受其言上果問以治狀遂對如王生言天子恱其有讓笑曰君安得長者之言而稱之遂曰乃臣議曹教戒臣也上拜遂水衡都尉以王生為丞豫謂遂之治郡功效著明宣帝不以為賞而顧恱其佞詞乎冝其起王成膠東之僞也禇先生於史記中又載武帝時召北海太守有文學卒史王先生自請與太守俱太守入宫王先生曰天子即問君何以治北海令無盜賊君對曰何哉守曰選擇賢材各任之以其能賞異等罰不肖王先生曰是自譽自伐功不可也願君對言非臣之力盡陛下神靈威武所變化也太守如其言武帝大笑曰安得長者之言而稱之安所受之對曰受之文學卒史於是以太守為水衡都尉王先生為丞二事不應相類如此疑即龔遂而禇誤書也程嬰杵臼春秋於魯成公八年書晉殺趙同趙括於十年書晉景公卒相去二年而史記乃有屠岸賈欲滅趙氏程嬰公孫杵臼共匿趙孤十五年景公復立趙武之說以年丗考之則自同括死後景公又卒厲公立八年而弒悼公立又五年矣其乖妄如是嬰杵臼之事乃戰國俠士刺客所為春秋時風俗無此也元豐中吳處厚以皇嗣未立上書乞立二人廟訪求其墓優加封爵勑令河東路訪尋遺跡得其冢於絳州太平縣詔封嬰為成信侯杵臼為忠智侯廟食於絳後又以為韓厥存趙追封為公三人皆以春秋祠於祚德廟且自晉景公至元豐千六百五十年矣古先聖帝明王之墓尚不可考區區二士豈復有兆域所在乎絳郡以朝命所訪姑指它丘壠為之詞以塞責耳此事之必不然者也處厚之書進御即除將作丞狃於出位陳言以得寵祿遂有訐蔡新州十詩之事所獲幾何詒笑無極哀哉戰國自取亡秦以關中之地日夜東獵六國百有餘年悉禽滅之雖云得地利善為兵故四丗有勝以豫考之實六國自有以致之也韓燕弱小置不足論彼四國者魏以惠王而表齊以閔王而衰楚以懷王而衰趙以孝成王而衰皆本於好兵貪地之故魏承文侯武侯之後表裏山河大於三晋諸侯莫能與之爭而惠王數伐韓趙志吞邯鄲挫敗於齊軍覆子死卒之為秦所困國日以蹙失河西七百里去安邑而都大梁數丗不振訖於殄國閔王承威宣之後山東之建國莫強焉而狃於伐宋之利南侵楚西侵三晉欲并二周為天子遂為燕所屠雖賴田單之力得復亡城子孫沮氣孑孑自保終墮秦計束手為虜懷王貪商於六百里受詐張儀失其名都喪其甲士不能取償身遭囚辱以死趙以上黨之地代韓受兵利令智昏輕用民死同日坑於長平者過四十萬幾於社稷為墟幸不即亡終以不免此四國之君苟為保境睦鄰畏天自守秦雖強大豈能加我哉臨敵易將臨敵易將固兵家之所忌然事當審其是非當易而不易亦非也秦以白起易王齕而勝趙以王翦易李信而滅楚魏公子無忌易晉鄙而勝秦將豈不可易乎燕以騎劫易樂毅而敗趙以趙括易廉頗而敗以趙葱易李牧而滅魏使人代信陵君將亦滅將豈可易乎司空表聖詩東坡稱司空表聖詩文髙雅有承平之遺風蓋嘗自列其詩之有得於文字之表者二十四韻恨當時不識其妙又云表聖論其詩以為得味外味如緑樹連村暗黃花入麥稀此句最善又棋聲花院閉幡影石壇髙吾嘗獨入白鶴觀松隂滿地不見一人惟聞棊聲然後知此句之工但恨其寒儉有僧態豫讀表聖一鳴集有與李生論詩一書乃正坡公所言者其餘五言句云人家寒食月花影午時天雨微吟足思花落夢無憀坡暖冬生笋松涼夏健人川明虹照雨樹密鳥衝人夜短猿悲減風和鵲喜靈馬色經寒慘鵰聲帶晚飢客來當意愜花發遇歌成七言句云孤嶼池痕春漲滿小欄花韻午晴初五更惆悵回孤枕由自殘燈照落花皆可稱也漢丞相漢丞相或終于位或免就國或免為庶人或致仕或以罪死其復召用者但為光祿大夫或特進優遊散秩未嘗有除它官者也御史大夫則間為九卿將軍至東漢則大不然始於光武時王梁罷大司空而為中郎將其後三公去位輒復為大夫列卿如崔烈歷司徒太尉之後乃為城門校尉其體貌大臣之禮亦衰矣冊禮不講唐封拜后妃王公及贈官皆行冊禮文宗大和四年以裴度守司徒平章重事度上表辭冊命其言云臣此官巳三度受冊有靦面目從之然則唐丗以為常儀辭者蓋鮮唯國朝以此禮為重自皇后太子之外雖王公之貴率一章乞免即止典禮益以不講良為可惜容齊隨筆卷第十
