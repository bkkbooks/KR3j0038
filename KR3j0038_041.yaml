body:
  text: 容齊三筆卷第五十七則舜事瞽叟孟子之書上配論語唯記舜事多誤故自國朝以來司馬公李泰伯及吕南公皆有疑非之說其最大者證萬章塗廩浚井象入舜宫之問以為然也孟子既自云堯使九男事之二女女焉百官牛羊倉廩備以事舜於畎畒之中則井廩賤役豈不能使一夫任其事堯為天子象一民耳處心積慮殺兄而據其妻是為公朝無復有紀綱法制矣六藝折中於夫子四嶽之薦舜固曰瞽子父頑母嚚象傲克諧以孝蒸蒸乂不格姦然則堯試舜之時頑傲者既巳格乂矣舜履位之後命禹征有苗益曰帝初于歷山往于田日號泣于旻天于父母負罪引慝祗載見瞽瞍夔䕫齊栗瞽亦允若既言允若豈得復有殺之之意乎司馬公亦引九男百官之語蒸蒸之對而不及益贊禹之辭故詳叙之以示子姪輩若司馬遷史記劉向列女傳所載蓋相承而不察耳至於桃應有瞽叟殺人之問雖曰設疑似而請然亦可謂無稽之言孟子拒而不答可也顧再三為之辭宜其起後學之惑孔子正名子路曰衛君待子而為政子將奚先子曰必也正名乎子路曰子之迂也奚其正夫子責數之以為野蓋是時夫子在衛當輒為君之際留連最久以其拒父而竊位故欲正之此意明白然子欲適晉聞其殺鳴犢臨河而還謂其無罪而殺士也里名勝母曽子不入邑稱朝歌墨子回車邑里之名不善兩賢去之安有命世聖人而肯居無父之國事不孝之君哉是可知已夫子所過者化不令而行不言而信衛輒待以為政當非下愚而不移者苟其用我必將導之以天理而趣反其真所謂命駕虛左而迎其父不難也則其有補於名義豈不大哉為是故不忍亟去以須之既不吾用於是慨然反魯則輒之冥頑悖亂無所逃於天地之閒矣子路曽不能詳味聖言執迷不悟竟於身死其難惜哉濳火字誤今人所用濳火字如濳火軍兵潛火器具其義為防然以書傳考之乃當為􅑒左傳襄二十六年楚師大敗王夷師􅑒昭二十三年子瑕卒楚師􅑒杜預皆注曰吳楚之閒謂火滅為􅑒釋文音子濳反火滅也禮部韻將廉反皆讀如殱音則知當曰􅑒火永興天書大中祥符天書之事起於佞臣固無足言而寇萊公在永興軍信朱能之詐亦為此舉以得召入再登相位馴致雷州之禍鳯德之衰實為可惜而天禧實録所載云周懷政與妖人朱能輩僞造靈命冀圖恩寵且日進藥餌宰相王欽若屢言其妄復密陳規諌懷政懼得罪因共誣譛言捕獲道士譙文易蓄禁書有神術欽若素識之故罷相也朱能之事欽若欲以沮冦公之入則有之謂其陳規諌當大不然儻非出於寇則欽若巳攘臂其閒矣實録蓋欽若提舉日所進是以溢美豈能弭後人公議哉王裒嵇紹舜之罪也殛鮌其舉也興禹鮌之罪足以死舜徇天下之公議以誅之故禹不敢怨而終治水之功以蓋父之惡魏王裒嵇紹其父死於非命裒之父儀猶以為司馬昭安東司馬之故因語言受害裒為之終身不西向而坐紹之父康以魏臣鍾㑹譖之於昭昭方謀篡魏隂忌之以故而及誅紹乃仕於晉武之世至為惠帝盡節而死紹之事親視王裒逺矣溫公通鑑猶取其蕩隂之忠蓋不足道也張詠傳張忠定公詠為一代偉人而治蜀之績尤為超卓然實録所載了不及之但云出知益州就加兵部郎中入為戶部使馬知節自益徙延難其代朝廷以詠前在蜀冦攘之後安集有勞為政明肅逺民便之故特命再任而巳國史本傳略同而增書促招安使上官正出兵一事皆詆其知陳州營産業且與周渭梁鼎輩五人同傳殊失之也韓魏公作公神道碑云公以魁竒豪傑之才逢時自奮智略神出勳業赫赫震暴當世誠一世偉人道州所刻帖有公與潭牧書一𥿄王荆公跋其後云忠定公殁久矣而士大夫至今稱之豈不以剛毅正直有勞于世若公者少歟文潞公云豫嘗守蜀覩忠定之象遺愛在民欽服已甚黃誥云公風烈如此而不至於宰相然有忠定之才而無宰相之位於公何損有宰相之位而無忠定之才於宰相何益公雖老死安肯以此易彼哉觀四人之言史氏發潜德之幽光為有負矣緋紫假服唐宣宗重惜服章牛叢自司勳貟外郎為睦州刺史上賜之紫叢既謝前言曰臣所服緋刺史所借也上遽曰且賜緋然則唐制借服色得於君前服之國朝之制到闕則不許乾道二年豫以起居舍人侍立見浙西提刑姚憲入對紫袍金魚既退一閣門吏踵其後囁嚅後兩日憲辭歸平江乃緋袍豫疑焉以問知閣曽覿曰聞臨安守與本路監司皆許服所借而憲昨紫今緋何也覿曰監司惟置司在輦下則許服漕臣是也若外郡則否前日姚誤紫而謁吏不告已申其罰且備牒使知之故今日只本色以入姚蓋失於審也然考功格令既不頒於外亦自難曉文惠公知徽州日借紫及除江東提舉常平告身不借豫聞嘗借者當如舊與郎官薛良朋言之於是給公據改借後於江西見轉運判官張堅衣緋張嘗知泉州紫𫀆矣豫舉前說張欣然即以申考功已而部符下不許扣其故曰唯知州借紫而就除本路雖運判提舉皆得如初若它路則不可竟不知法如何該說也若曽因知州府借紫而後知軍則其服亦借不以本路它路也近吳鎰以知郴州除提舉湖南茶鹽遂仍借紫正用前比云樞密名稱更易國朝樞密之名其長為使則其二為副使其長為知院則其二為同知院如柴禹錫知院向敏中同知及曹彬為使則敏中改副使王繼英知院王旦同知繼馮拯陳堯叟亦同知及繼英為使拯堯叟乃改簽書院事而恩例同副使王欽若陳堯叟知院馬知節簽書及王陳為使知節遷副使其後知節知院則任中正周起同知惟熙寧初文彥博吕公弼巳為使而陳升之過闕留王安石以升之曽再入樞府遂除知院知院與使並置非故事也安石之意以沮彥博耳紹興以來唯韓世忠張俊為使嶽飛為副使此後除使固多而其二只為同知亦非故事也又使班視宰相而乾道職制雜壓令副使反在同知院之下尤為未然過稱官品士大夫僭妄相尊日以益甚豫向昔所記文官學士武官大夫之諺今又不然天聖職制內外文武官不得容人過稱官品諸節度觀察雖檢校官未至太傅者許稱太傅防禦使至橫行使許稱太保諸司使許稱司徒幕職官等稱本官録事參軍稱都曹縣令稱長官判司簿尉許稱評事其太傅太保司徒皆一時本等檢校所帶之官也自後法令不復有此一項以是其風愈熾不容整革矣仁宗立嗣東坡作范蜀公墓志云仁宗即位三十五年未有繼嗣嘉祐初得疾中外危恐公獨上疏乞擇宗室賢者異其禮物以系天下心凡章十九上至元祐初韓維上言謂其首開建儲之議其後大臣乃繼有論奏司馬溫公行狀云至和三年仁宗始不豫國嗣未立天下寒心而不敢言惟諌官范鎮首發其議光時為并州通判聞而繼之案至和三年九月改為嘉祐元年歲在丁酉而前此皇祐五年甲午有建州人太常博士張述者以繼嗣未立上疏曰陛下春秋四十四宗廟社稷之繼未有託焉以嫌疑而不決非孝也羣臣以諱避而不言非忠也願擇宗親才而賢者異其禮秩試以職務俾內外知聖心有所屬至和二年丙申復言之前後凡七疏最後語尤激切蓋述所論乃在兩公之前而當時及後來莫有知之者為可惜也郎官貟數紹熙四年冬客從中都來持所抄班朝録一編相示蓋朝士官職姓名也讀至尚書郎才有正貟四人其它權攝者亦只六七人耳因記紹興二十九年豫為吏禮部時同舍郎二十人皆正官今既限以曽歷監司郡守故任館職及寺監丞者不可進步其自外召用者資級巳高曽不數月必序遷卿少以是居之者益少政和末郎貟冗溢至於五十有五侍御史張朴上殿徽宗諭使論列退而奏疏劾十有六人大略云才品甚下趍操卑汚有如汪師心者性資茸闟柔佞取容有如黃願汪希旦者淺浮躁妄為胥輩所輕有如李莊者輕侻喧嚚漫不省職有如李揚者粗冗不才𥚹忿輕發有如成禔者人才碌碌初無可取有如張高者志氣衰落難與任事有如常瓌者大言無當誕詭不情有如梁子誨者資望太輕士論不厭有如葉椿唐作求吳直夫章芹李與權王良欽強休甫者乞行罷斥從之考一時標榜未必盡當然十六人者後皆不顯視今日貟數多寡不侔如是秦檜居相位久不欲士大夫在朝末年尤甚二十四司獨刑部有孫敏修一貟餘皆兼攝吏部七司至全付主管告院張云兵工八司併於一寺主簿又可怪也東坡慕樂天蘇公責居黃州始自稱東坡居士詳考其意蓋專慕白樂天而然白公有東坡種花二詩云持錢買花樹城東坡上栽又云東坡春向暮樹木今何如又有步東坡詩云朝上東坡步夕上東坡步東坡何所愛愛此新成樹又有别東坡花樹詩云何處殷勤重回首東坡桃李種新成皆為忠州刺史時所作也蘇公在黃正與白公忠州相似因憶蘇詩如贈寫真李道士云他時要指集賢人知是香山老居士贈善相程傑云我似樂天君記取華顚賞遍洛陽春送程懿叔云我甚似樂天但無素與蠻入侍邇英云定似香山老居士世緣終淺道根深而跋曰樂天自江州司馬除忠州刺史旋以主客郎中知制誥遂拜中書舍人某雖不敢自比然謫居黃州起知文登召為儀曹遂忝侍從出處老少大略相似庶幾復享晚節間適之樂去杭州云出處依稀似樂天敢將衰朽較前賢序曰平生自覺出處老少粗似樂天則公之所以景仰者不止一再言之非東坡之名偶爾暗合也縳雞行老杜縳雞行一篇云小奴縳雞向市賣雞𬒳縳急相喧爭家中厭雞食蟲蟻不知雞賣還遭烹蟲雞於人何厚薄吾叱奴兒解其縛雞蟲得失無了時注目寒江倚山閣此詩自是一假好議論至結句之妙非它人所能跂及也豫友李德逺嘗賦東西船行全擬其意舉以相示云東船得風帆席高千里瞬息輕鴻毛西船見笑苦遲鈍汗流撑折百張篙明日風翻波浪異西笑東船却如此東西相笑無已時我但行藏任天理是時德逺誦至三過頗自喜豫曰語意絶工幾於得奪胎法只恐行藏任理與注目寒江之句似不可同日語德逺以為知言鋭欲易之終不能滿意也油汚衣詩豫甫十歲時過衢州白沙渡見岸上酒店敗壁閒有題詩兩絶其名曰犬落水油汚衣犬詩太俗不足傳獨後一篇殊有理致其詞云一點清油汚白衣斑斑駮駮使人疑縱饒洗遍千江水爭似當初不汚時是時甚愛其語今六十餘年尚歷歷不忘漫志于此北虜誅宗王紹興庚申虜主亶誅宗室七十二王韓昉作詔略云周行管叔之誅漢致燕王之辟兹惟無赦古不為非不圗骨肉之間有懷蜂蠆之毒皇伯太師宋國王宗磐謂為先帝之元子常蓄無君之禍心皇叔太傅兖國王宗俊虞王宗英滕王宗偉等逞躁欲以無厭助逆謀之妄作欲申三宥公議豈容不頓一兵羣凶悉殄巳各伏辜并除屬籍訖紹熙癸丑今虜主誅其叔鄭王詔曰朕早以嫡孫欽承先緒皇叔定武軍節度使鄭王允蹈屬處諸父任當重藩濳引凶徒共為反計自以元妃之長子異於它母之諸王冀幸國災窺伺神器其妹澤國公主長樂牽同産之愛駙馬都尉唐括蒲刺覩狃連姻之私預聞其謀相濟以惡欲寬燕邸之戮姑致郭鄰之囚詢諸羣言用示大戒允蹈及其妻卞王與男案春阿辛并公主皆賜自盡令有司依禮收葬仍為輟朝二事甚相類蓋其視宗族至親與塗之人無異也是年冬倪正父奉使館于中山正其誅戮處相去一月猶血腥觸人枯骸塞井為之終夕不安寢云州郡書院太平興國五年以江州白鹿洞主明起為褒信主簿洞在廬山之陽常聚生徒數百人李煜有國時割善田數十頃取其租廩給之選太學之通經者俾領洞事日為諸生講誦於是起建議以其田入官故爵命之白鹿洞由是漸廢大中祥符二年應天府民曹誠即楚丘戚同文舊居造舍百五十閒聚書數千卷博延生徒講習甚盛府奏其事詔賜額曰應天府書院命奉禮郎戚舜賔主之仍令本府幕職官提舉以誠為府助教宋興天下州府有學自此始其後潭州又有嶽麓書院及慶曆中詔諸路州郡皆立學設官教授則所謂書院者當合而為一今嶽麓白鹿復營之各自養士其所廩給禮貌乃過於郡庠近者巴州亦創置是為一邦而兩學矣太學辟雍並置尚且不可是於義為不然也何韓同姓韓文公送何堅序云何與韓同姓為近嘗疑其說無所從出後讀史記周本紀應劭曰氏姓注云以何姓為韓後鄧名世姓氏書辨證云何氏出自姬姓食采韓原為韓氏韓王建為秦所滅子孫散居陳楚江淮閒以韓為何隨聲變為何氏然不能詳所出也韓王之失國者名安此云建乃齊王之名鄧筆誤耳豫後讀孫愐唐韻云韓滅子孫分散江淮閒音以韓為何字隨音變遂為何氏乃知名世用此容齊三筆卷第五終
