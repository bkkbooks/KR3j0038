front:
  text: 容齋隨筆五集緫序知贑州寺簿洪公伋以書來曰從祖文敏公由右史岀守是邦今四十餘年矣伋何幸逺繼其後官閑無事取文敏隨筆紀録自一至四各十六卷五則絶筆之書僅有十卷悉鋟木于郡齋用以示邦人焉想像抵掌風流宛然如在公其爲我識之僕頃備數憲幕留贑二年至之日文敏去才旬月不及識也而經行之地筆墨飛動人誦其書家有其像平易近民之政悉能言之有訴不平者如訴之於其父而謁其所欲者如謁之於其母後十五年文敏爲翰苑出鎭淛東㒒適後至濫吹朝列相隔又旬月竟不及識而與其子太社􅯗其孫參軍偃相從甚乆得其文愈多而所謂隨筆者僅見一二今所有太半出於淛東歸休之後冝其不盡見也可以稽典故可以廣聞見可以證訛謬可以膏筆端實爲儒生進學之地何止慰贑人去後之思㒒又甞風陳日華盡得夷堅十志與支志三志及四志之二共三百二十卷就摘其間詩詞雜著藥餌符呪之屬以類相從編刻于湖隂之計臺䟽爲十卷覽者便之㒒因此搜索志中欲取其不渉神怪近於人事資鑒戒而佐辯博非夷堅所冝収者別爲一書亦可得十卷俟其成也規以附刻于章貢可乎寺簿方以課最就持憲節威行谿洞折其萌芽民實隂受其賜願少留於此它日有餘力則經紀文敏之家子孫未振家集大全恐馴致散失再爲収拾實難今盤洲小隱二集士夫珍藏墨本已乆獨野處未焉寺簿推廣隨筆之用心願有以亟圖之可也嘉定壬申仲冬𥘉吉寶謨閣直學士太中大夫提舉隆興府玉隆萬壽宮臨川何異謹序容齋隨筆目録
