body:
  text: 第一卷二十五則歐率更帖羅處士志唐平蠻碑半擇迦六十四種惡口八月端午􅐌公少公郭璞葬地黃魯直詩禹治水敕勒歌淺妄書五臣注文選文煩簡有當地險史記丗次解釋經旨坤動也剛樂天侍兒白公詠史十年為一秩裴晉公稧事司字作入聲樂天新居詩黃紙除書白用杜句唐人重服章詩䜟不然靑龍寺詩第二卷二十四則唐重牡丹長歌之哀韋蘇州古行宮詩隔是張良無後周亞夫漢輕族人漏泄禁中語田叔孟舒魏尚秦用他國人曹參趙括信近於義剛毅近仁忠恕違道求為可知里仁漢采衆議漢母后田千秋郅惲戾太子灌夫任安單于朝漢第三卷二十一則進士試題儒人論佛書和歸去來四海一也李太白太白雪讒冉有問衛君商頌俗語有所本鄱陽學國忌休務漢昭順二帝三女后之賢賢父兄子弟蔡君謨帖親王與從官往還三傳記事張嘉貞張九齡作牛公碑唐人告命典章輕廢第四卷二十三則張浮休書溫公客位榜李頎詩詩中用茱茰字鬼宿度河府名軍額馬融皇甫規孟蜀避唐諱翰苑親近寧馨阿堵鳯毛牛米石鼓歌過實送孟東野序噴嚏野史不可信謗書王文正公晉文公南夷服諸葛二疏􅐌李宓伐南詔浮梁陶器第五卷二十五則漢唐八相六卦有坎晉之亡與秦隋異上官桀金日磾漢宣帝忌昌邑王平津侯韓信周瑜漢武賞功明白周召房杜三代書同文周丗中國地李後主梁武帝詩什易舉正其惟聖人乎易說卦元二之災聖人汙草􅞀字字省文負劒辟珥國初人至誠史館玉牒所稗沙門第六卷十九則建武中元帶職人轉官上下四方魏相蕭望之姓氏不可考畏無難緑竹靑靑孔子欲討齊韓退之誕節受賀左氏書事狐突言詞有味宣髮邾文公楚昭王杜悰唐書丗系表魯昭公州縣失故名嚴州當為莊第七卷十八則孟子書百里奚韓柳為文之旨李習之論文魏鄭公諌語虞丗南七發將軍官稱北道主人洛中盱江八賢王導小名漢書用字姜嫄簡狄羌慶同音佐命元臣名丗英宰檀弓誤字薛能詩漢晉太常第八卷十五則諸葛公沐浴佩玉談叢失實石砮陶淵明東晉將相賞魚袋浯溪留題皇甫湜詩人物以義為名人君壽考韓文公佚事論韓公文治生從宦真宗末年第九卷二十八則霍光賞功尺棰取半漢文失材陳軫之說踈顔率兒童之見皇甫湜正閏論簡師之賢老人推恩唐三傑忠義出天資劉歆不孝漢法惡誕謾漢官名五胡亂華石宣為彗三公改它官帶職致仕朋友之義髙科得人辛慶忌楚懷王范增非人傑翰苑故事唐楊州之盛張祜詩古人無忌諱宰我不詐李益盧綸詩第十卷二十則楊彪陳羣袁盎溫嶠日飲亡何爰盎小人唐書判古彝器玉蘂杜䳌禮寺失職徐凝詩梅花橫參致仕之失南班宗室省郎稱謂水衡都尉二事程嬰杵臼戰國自取亡臨敵易將司空表聖詩漢丞相冊禮不講第十一卷十六則將帥貪功漢二帝治盜漢唐封禪漢封禪記楊虞卿屯蒙二卦漢誹謗法誼向觸諱小貞大貞唐詩戲語何進高睿南鄉掾史漢景帝忍殺燕昭漢光武之明周南召南易中爻第十二卷十八則利涉大川光武弃馮衍恭顯議蕭望之􅏯錯張湯逸詩書刑罰四卦巽為魚三省長官王圭李靖虎䕫藩曹操用人漢士擇所從劉公榮元豐官制耳餘袁劉周末存國曹操殺楊修古人重國體第十三卷十八則諌說之難韓馥劉璋蕭房知人俞似詩吳激小詞君子為國兌為羊晏子楊雄一以貫之裴潛陸俟拔亡為存孫吳四英將東坡羅浮詩魏明帝容諌漢丗謀於衆國朝會要孫臏減竈蟲鳥之智第十四卷十七則張文潛論詩漢祖三詐有心避禍蹇解之險士之處丗張全義治洛博古圖士大夫論利害舒元輿文絶唱不可和贈典輕重揚之水李陵詩大曲伊涼元次山元子次山謝表光武仁君第十五卷十九則張文潛哦蘇杜詩任安田仁杜延年杜欽范曅作史唐詩人名不顯者蘇子由詩呼君為爾汝丗事不可料蔡君謨帖語孔氏野史有若張天覺為人為文論事連昌宫詞二士共談張子韶祭文京師老吏曹操唐莊宗雲中守魏尚第十六卷十九則文章小伎三長月兄弟直西垣續樹萱録館職名存南宫適吳王殿王衛尉前代為監治盜法不同和詩當和意稷有天下一丗人材王逢原吏文可笑靖康時事并韶䜟緯之學真假皆妄
