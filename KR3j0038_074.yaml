body:
  text: 容齊四筆卷第八十七則庫路真新唐書地里志襄州土貢􅃮器庫路真二品十乘花文五乘庫路真者漆器名也然其義不可曉元豐九域志云真漆器二十事是以于頔傳頔為襄陽節度襄有髹器天下以為法至頔驕蹇故方帥不法者稱為襄樣節度舊唐書職官志武德七年改秦王齊王下領三衛及庫真驅嘻真並為統軍疑是周隋間西邉方言也記白樂天集曾有一說而未之見得意失意詩舊傳有詩四句誦世人得意者云久旱逄甘雨他鄉見故知洞房花燭夜金榜掛名時好事者續以失意四句曰寡婦携免泣將軍𬒳敵擒失恩宫女面下第舉人心此二詩可喜可悲之狀極矣狄盬盧尹文潞公留守西京年七十七為耆英㑹凡十有二人時富韓公年七十九最長至于太中大夫張問年七十唯司馬公方六十四歲用狄監盧尹故事亦預於㑹或問狄盧之說乃見唐白樂天集今所謂九老圖者懷州司馬胡杲年八十九衛尉卿吉皎年八十六龍武長史鄭據八十四慈州刺史劉嘉侍御史盧正皆八十二其年皆在元豐諸公之上永州刺史張渾刑部尚書白居易皆七十四時㑹昌五年白公序云六賢皆多年壽豫亦次焉祕書監狄兼謨河南尹盧正以年未七十雖與㑹而不及列故溫公紀韓公至張昌言而自不書今士大夫皆熟知此事姑志狄盧二賢以示兒輩但唐兩盧正疑文字或誤云犯而又同㑹項韓兵書漢成帝時任宏論次兵書為四種其權謀中有韓信三篇形藝中有項王一篇前後藝文志載之且云漢興張良韓信序次兵法凡百八十二家刪取要用定著三十五家諸吕用事而盜取之項韓雖不得其死而遺書可傳於後者漢世不廢今不復可見矣承天塔記黃魯直初謫戎涪既得歸而湖北轉運判官陳舉以時相趙清憲與之有小怨訐其所作荆南承天塔記以為幸災遂除名羈管宜州竟卒于彼今豫章集不載其文蓋謂因之兆禍故不忍著録其曽孫􅓌續編别集始得見之大略云余得罪竄黔中道出江陵寓承天禪院住持僧智珠方徹舊浮圖於地而囑余曰成功之後願乞文記之後六年蒙恩東歸則七級巋然巳立於是作記其後云儒者嘗論一佛寺之費蓋中民萬家之産實生民榖帛之蠧雖余亦謂之然然自省事以來觀天下財力屈竭之端國家無大軍旅勤民丁賦之政則蝗旱水溢或疾疫連數十州此蓋生人之共業盈虛有數非人力所能勝者邪其語不過如是𥘉無幸災風刺之意乃至於遠斥以死冤哉穆護歌郭茂倩編次樂府詩穆護砂一篇引歷代歌辭曰曲犯角其語曰玉管朝朝弄清歌日日新折花當驛路寄與隴頭人黃魯直題牧護歌後云豫嘗問人此歌皆莫能說牧護之義昔在巴僰閒六年問諸道人亦莫能說他日船宿雲安野次㑹其人祭神罷而飲福坐客更起舞而歌木瓠其詞有云聽說商人木瓠四海五湖曽去中有數十句皆叙賈人之樂末云一言為報諸人倒盡百瓶歸去繼有數人起舞皆陳述已事而始末略同問其所以為木瓠蓋刳曲木狀如瓠擊之以為歌舞之節耳乃悟穆護蓋木瓠也據此說則茂倩所序為不知本原云且四句律詩如何便差排為犯角曲殊無意義省試取人額纍舉省試鎖院至開院限以月如未訖事則申展亦不過十日所奏名以十四人取一為定數不知此制起於何年黃魯直以元祐三年為貢院參詳官有書帖一紙云正月乙丑鎖太學試禮部進士四千七百三十二人三月戊申具奏進士五百人乃是在院四十四日而九人半取一人視今日為不侔也此帖載於别集通印子魚魚通印之語本出於王荆公送張兵部知福州詩長魚爼上通三印之句蓋以福州瀕海多魚其大如此初不指言為子魚也東坡始以通印子魚對披綿黃雀乃借子字與黃字為假對耳山谷所云子魚通印蠔破山蓋承而用之陳正敏遁齊間覽云其地有通應廟廟前港中子魚最佳王𥘉寮詩通應子魚鹽透白正采其說郡人黃處權云興化子魚去城五十里地名迎仙者為上所産之處土人謂之子魚潭而巳𥘉無通應港之名有大神祠賜額曰顯應乃遁齊所指之廟者亦非通應也潭傍又有小祠一閒􅋻陋之甚農家以祀田神好事欲實遁齊之說遂粉刷一扁妄標曰通應廟側題五小字曰元祐某年立此尤可笑且用神廟封額以名土物它處未嘗有也壽亭侯印荆門玉泉關將軍廟中有壽亭侯印一釰其上大環徑四寸下連四環皆系於印上相傳云紹興中洞庭漁者得之入于潭府以為關雲長封漢壽亭侯此其故物也故以歸之廟中南雄守黃兊見臨川興聖院僧惠通印圖形為作記而復州寶相院又以建炎二年因伐木於三門大樹下土中深四尺餘得此印其環并背俱有文云漢建安二十年壽亭侯印今留於左藏庫邵州守黃沃叔啓慶元二年復買一鈕於郡人張氏其文正同只缺五系環耳豫以謂皆非真漢物且漢壽乃亭名既以封雲長不應去漢字又其大比它漢印幾倍之聞嘉興王仲言亦有其一侯印一而巳安得有四雲長以四年受封當即刻印不應在二十年尤非也是特後人為之以奉廟祭其數必多今流落人閒者尚如此也豫為黃叔啓作辨跋一篇見贅稿茸附治疽漏時康祖病心痔二十年用聖惠方治腰痛者鹿茸附子服之月餘而愈夷堅巳志書其事豫每與醫言輒云癰疽之發藴熱之極也烏有翻使熱藥之理福州醫郭晉卿云脉陷則害漏陷者冷也若氣血溫暖則漏自止正用得茸附案內經素問生氣通天論曰陷脉為痿留連肉腠注云陷脉謂寒氣陷缺其脉也積寒留舍經血稽凝久瘀內攻結於肉理故發為瘍瘻肉腠相連此說可謂明白故復記於此庶幾或有助於瘍醫云莆田荔枝莆田荔枝名品皆出天成雖以其核種之終與其本不相類宋香之後無宋香所存者孫枝爾陳紫之後無陳紫過墻則為小陳紫矣筆談謂焦核荔子土人能為之取本木去其大根火燔令焦復植於土以石壓之令勿生旁枝其核自小里人謂不然此果形狀變態百出不可以理求或似龍牙或類鳯爪叉頭紅之可簪緑珠子之旁綴是豈人力所能加哉𥘉方氏有樹結實數千顆欲重其名以二百顆送蔡忠惠公紿以常歲所産止此公為目之曰方家紅著之於譜印證其妄自後華實雖極繁茂逮至成熟所存者未嘗越二百遂成語䜟此假巳載遁齊間覽中郡士黃處權復志其詳如此雙陸不勝新唐書狄仁傑傳武后召問夢雙陸不勝何也仁傑與王方慶俱在二人同辭對曰雙陸不勝無子也天其意者以警陛下乎於是召還廬陵王舊史不載資治通鑑但書鸚鵡折翼一事而考異云雙陸之說世傳狄梁公傳有之以為李雍所作而其詞多鄙誕疑非本書故黜不取藝文志有李繁大唐說纂四卷今罕得其書豫家有之凡所紀事率不過數十字極為簡要新史大氐采用之其忠節一門曰武后問石泉公王方慶曰朕夜夢雙陸不勝何也曰蓋謂宫中無子意者恐有神靈警夫陛下因陳人心在唐之意后大悟召廬陵王復其儲位俾石泉公為宫相以輔翊之然則新史兼采二李之說而為狄為王莫能辨也通鑑去之似為可惜華元入楚師左傳楚莊王圍宋宋華元夜入楚師登子反之牀起之曰寡君使元以病告子反懼與之盟而退三十里杜注曰兵法因其鄉人而用之必先知其守將左右謁者門者之姓名因而利道之華元蓋用此術得以自通豫案前三年晉楚邲之戰隨武子稱楚之善曰軍行右轅左追蓐前茅慮無中權後徑事政不戒而備大氐言其備豫之固今使敵人能入上將之幕而登其牀則刺客姦人何施不得雖至於王所可也豈所謂軍制乎疑不然也公羊傳云楚使子反乘堙而窺宋城宋華元亦乘堙而出見之其說比左氏為有理公羊用疊語公羊傳書楚子圍宋宋人及楚人平事幾四百字其稱司馬子反者八又再曰將去而歸爾然後而歸爾然後歸爾臣請歸爾吾亦從子而歸爾又三書軍有七日之糧爾凡九用爾字然不覺其煩文書誤一字文書一字之誤有絶係利害者豫親經其三焉至今思之猶為汗下乾道二年冬蒙恩召還過三衢郡守何德輔問奏對用幾劄因出草稿示之其一乞蠲減鄱陽歲貢誕節金千兩事言此貢不知起於何時或云藝祖初下江南郡庫適有金守臣取以獻長春節遂為故事誤書長春為萬春乃金主褒節名也德輔讀之指以相告豫悚然靣發赤亟改之三年以侍講講毛詩作發題引孔子於論語中說詩處云不學詩無以言誤書言為立已寫進讀正本經筵吏袁顯忠曰恐是言字豫愧謝之淳熙十三年在翰苑作賜安南國曆日詔云兹履夏正載頒漢朔書夏正為周正院吏以呈宰執周益公見而摘其誤吏還以告蓋語順意同一時不自覺也歷代史本末古者世有史官其著見於今則自堯舜二典始周之諸侯各有國史孔子因魯史記而作春秋左氏為之傳鄭志宋志晉齊太史南史氏之事皆見焉更纂異同以為國語漢司馬談自以其先周室之太史有述作之意傳其子遷紬金匱石室之書罔羅天下放失舊聞述黃帝以來至于元狩馳騁古今上下數千載閒變編年之體為十二本紀十表八書三十世家七十列傳凡百三十篇而十篇有録無書元成之閒禇先生補缺作武帝紀三王世家龜䇿曰者列傳張晏以為言辭鄙陋今雜於書中而藝文志有馮商續太史公七篇則泯沒不見司馬之書既出後世雖有作者不能少紊其規制班彪固父子以為漢紹堯運建帝業而六世史臣追述功德私作本紀編於百王之末厠於秦項之列故探纂前紀綴輯舊聞以述漢書起元高祖終于王莾之誅大抵仍司馬氏第更八書為十志而無世家凡百卷固死其書未能全女弟昭續成之是為前漢書荀恱漢紀則續所論著者也後漢之事𥘉命儒臣著述於東觀謂之漢記其後有袁宏紀張璠薛瑩謝承華嶠袁山松劉義慶謝沈皆有書宋范曅刪采為十紀八十列傳是為後漢書而張璠以下諸家盡廢其志則劉昭所補也三國雜史至多有王沈魏書元行沖魏典魚豢典略張勃吳録韋昭吳書孫盛魏春秋司馬彪九州春秋丘恱三國典略員半千三國春秋虞漙江表傳今唯以陳壽書為定是為三國志晉書則有王隱虞預謝靈運臧榮緒孫綽于寶諸家唐太宗詔房喬禇遂良等修定為百三十卷以四論太宗所作故揔名之曰御撰是焉晉書至今用之南北兩朝各四代而儹僞之國十數其書尤多如徐爰孫嚴王智深顧野王魏淡張大素李德林之正史皆不傳今之存者沈約宋書蕭子顯齊書姚思廉梁陳書魏收魏書李百藥北齊書令狐德棻周書魏鄭公隋書其它國則有和包漢趙紀田融趙石記范亨燕書王景暉南燕録高閭燕志劉昞涼書裴景仁秦記崔鴻十六國春秋蕭方武敏之三十國春秋李大師延壽父子悉取為南史八十卷北史百卷今沈約以下八史雖存而李氏之書獨行是為南北史唐自高祖至于武宗有實録後唐修為書劉昫所上者是巳而猥釀無統國朝慶曆中復詔刋修歷十七年而成歐陽文忠公主紀表志宋景文公主傳今行於世梁唐晉漢周謂之五代國初監修國史薛居正提舉上之其後歐陽芟為新書故唐書五代史各有舊新之目凡十七代本末如此稚兒數以為問故詳記之賢者一言解疑譖賢者以單詞片言為人釋謗解患卓卓可書者豫得兩事焉秦氏當國時先忠宣公鄭亨仲資政胡明仲侍郎朱新仲舍人皆在謫籍分置廣東方務德為經略帥待之盡禮秦對一客言曰方滋在廣部凡得罪於朝廷者必加意護結得非欲為異日地乎客曰非公相有云不敢輒言方滋之為人天性長者凡於人唯以周旋為志非獨於遷客然也秦悟曰方務德却是箇周旋底人其疑遂釋當時使一憸巧者承其問微肆一語方必得罪而諸公不得安迹矣言之者可謂大君子當求之古人中嚴陵王大卞赴曲江守過南安謁張先生子韶從容言大卞頃在檢院以羅彥濟中丞章去國其後産濟自吏書出守嚴遂遷避于蘭溪彥濟到郡遣書相邀曰與君有同年之契何為爾不得巳復還既見密語云前此臺評乃朱新仲所作託造物之意以相授一時失於審思至今為悔此事既往今適守韶而朱在彼邂逅有弗愜為之奈何張揣其必將修怨即云國光為君子為小人皆在此舉王悚然曰謹受教至則降意彌縫終二年不見分毫形迹蓋本自相善也豫曩侍張公坐聞其言故追紀之容齊四筆卷第八終
