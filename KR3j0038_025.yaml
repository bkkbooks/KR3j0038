body:
  text: 田租輕重李悝為魏文侯作盡地力之教云一夫治田百畝歲收粟百五十石除十一之稅十五石餘百三十五石蓋十一之外更無他數也今時大不然每當輸一石而義倉省耗别為一斗二升官倉明言十加六復於其間用米之精粗為説分若干甲有至七八甲者則數外之取亦如之庾人執槩從而輕重其手度二石二三斗乃可給至於水腳頭子市例之類其名不一合為七八百錢以中價計之并僦船負擔又須五斗殆是一而取三以豫所見唯會稽為輕視前所云不能一半也董仲舒為武帝言民一歲力役三十倍於古而田租口賦二十倍於古謂一歲之中失其資産三十及二十倍也又云或耕豪民之田見稅什五言下戶貧民自無田而耕墾豪冨家田十分之中以五輸本田主今吾鄉俗正如此目為主客分云女子夜績漢食貨志云冬民既入婦人相從夜績女工一月得四十五日謂一月之中又得夜半為四十五日也必相從者所以省費燎火同巧拙而合習俗也戰國策甘茂亡秦出關遇蘇代曰江上之貧女與冨人女會績而無燭處女相與語欲去之女曰妾以無燭故常先至掃室布席何愛餘明之照四壁者幸以賜妾以是知三代之時民風和厚勤朴如此非獨女子也男子亦然豳風晝爾于茅宵爾索綯言晝日往取茅歸夜作綯索以待時用也夜者日之餘其為益多矣淮南王漢淮南厲王死民作歌以諷文帝曰一尺布尚可縫一斗粟尚可春兄弟二人不相容此史漢所書也髙誘作鴻烈解敘及許叔重注文其辭乃云一尺繒好童童一升粟飽蓬蓬兄弟二人不能相容殊為不同後人但引尺布斗粟之喻耳厲王子安復為王招致賔客方術之士作為內書二十一篇外書甚衆又有中篇八卷言神仙黃白之術漢書藝文志淮南內二十一篇淮南外三十三篇列於雜家今所存者二十一卷蓋內篇也壽春有八公山正安所延致客之處傳記不見姓名而髙誘敘以為蘇飛李尚左吳田由雷被毛被伍被晉昌等八人然唯左吳雷被伍被見於史雷被者蓋為安所斥而亡之長安上書者疑不得為賔客之賢也薛國久長左傳載魯哀公大夫云禹合諸侯于塗山執玉帛者萬國今其存者無數十焉漢公孫卿語武帝云黃帝萬諸侯而神靈之封君七千案王制所紀九州凡千七百七十有三國多寡殊不侔以環移之一君會朝所將吏卒始以百人計之則萬國之衆當為百萬塗山之下將安所歸宿乎其為躗言無可疑者所謂存者數十考諸經傳可見者唯薛耳薛之祖是仲為夏禹掌車服大夫自此受封歷商及周末始為宋偃王所滅其享國千九百餘年傳六十四代三代諸侯莫之與比薛壤地褊小以詩則不列於國風以丗家則不列於史記而春秋二百四十二年之間視同儕邾𣏌滕鄫獨未嘗受大國侵伐則其為邦亦自有持守之道矣建除十二辰建除十二辰史漢曆書皆不載日者列傳但有建除家以為不吉一句惟淮南鴻烈解天文訓篇云寅為建卯為除辰為滿巳為平主生午為定未為執主陷申為破主衡酉為危主杓戍為成主少德亥為收主大德子為開主太歲丑為閉主太隂今會元官曆每月遇建平破收日皆不用以建為月陽破為月對平收隨隂陽月遞互為魁罡也酉陽雜爼夢篇云周禮以日月星辰各占六夢謂日有甲乙月有建破今注無此語正義曰案堪輿黃帝問天老事云四月陽建於巳破於亥隂建於未破於癸是為陽破隂隂破陽今不知何書所載但又以十干為破未之前聞也俗語算數三三如九三四十二二八十六四四十六三九二十七四九三十六六六三十六五八四十五九四十五六九五十四七九六十三八九七十二九九八十一皆俗語算數然淮南子中有之三七二十一蘇秦説齊王之辭也漢書律曆志劉歆典領鐘律奏其辭亦云八八六十四杜預注左傳天子用八云八八六十四人又六六三十六人四四十六人如淳孟康晉灼注漢志亦有二八十六三四十二六八四十八八八六十四等語伾文用事唐順宗即位抱疾不能言王伾王叔文以東宫舊人用事政自已出即日禁宫市之擾民五坊小見之暴閭巷罷鹽鐵使之月進出教坊女伎六百還其家以德宗十年不下赦令左降官雖有名德才望不復敘用即追陸贄鄭餘慶韓皋陽城還京師起薑公輔為刺史人情大恱百姓相聚歡呼又謀奪宦者兵既以范希朝及其客韓泰揔統京西諸城鎮行營兵馬中人尚未悟會諸將以狀來辭始大怒令其使歸告其將無以兵屬人當是時此計若成兵柄歸外朝則定策國老等事必不至後日之患矣所交黨與如陸質吕溫李景儉韓曄劉禹錫柳宗元皆一時豪俊知名之士惟其居心不正好謀務速欲盡據大權如鄭珣瑜髙郢武元衡稍異己者皆亟斥徙以故不旋踵而身陷罪戮後丗蓋有居伾文之地而但務嘯引沾沾小人以為鷹犬者殆又不足以望其百一云白樂天諷諫元和四年作其中賣炭翁一篇蓋為宫市然則未嘗能絶也五十絃瑟李商隱詩云錦瑟無端五十絃説者以為錦瑟者令狐丞相侍兒小名此篇皆寓言而不知五十絃所起劉昭釋名箜篌云師延所作靡靡之樂蓋空國之侯所作也假安節樂府録云箜篌乃鄭衛之音以其亡國之聲故號空國之侯亦曰坎侯吳兢解題云漢武依琴造坎侯言坎坎應節也後訛為箜篌豫案史記封禪書云漢公孫卿為武帝言太帝使素女鼓五十弦瑟悲帝禁不止故破其瑟為二十五弦於是武帝益召歌兒作二十五弦及空侯應劭曰帝令樂人侯調始造此器前漢郊祀志備書此事言空侯瑟自此起顔師古不引劭所注然則二樂本始曉然可考雖劉吳博洽亦不深究且空元非國名其説尤穿鑿也初學記太平御覽編載樂事亦遺而不書莊子言魯遽調瑟二十五弦皆動蓋此云續漢書云靈帝胡服作箜篌亦非也遷固用疑字東坡作趙德麟字説云漢武帝獲白麟司馬遷班固書曰獲一角獸蓋麟云蓋之為言疑之也豫觀史漢所紀事凡致疑者或曰若或曰云或曰焉或曰蓋其語舒緩含深意姑以封禪書郊祀志考之漫記于此雍州好畤自古諸神祠皆聚云蓋黃帝時嘗用事雖晚周亦郊焉三神山蓋嘗有至者諸仙人及不死之藥皆在焉未能至望見之焉新垣平望氣言有神氣成五采若人冠絻焉權火舉而祠若光輝然屬天焉出長安門若見五人於道北蓋夜致王夫人之貌云天子自帷中望見焉登中嶽太室從官在山下聞若有言萬歲者云祭封禪祠其夜若有光封欒大詔天若遺朕士而大通焉河東迎鼎有黃雲蓋焉見神人東萊山若云欲見天子方士言蓬萊諸神若將可得天子為塞河興通天臺若見有光云獲若石云于陳倉此外如所謂及羣臣有言老父則大以為仙人也可為觀如緱城神人宜可致天旱意乾封乎然其效可睹矣詞旨亦相似僭亂的對王莽竊位稱新室公孫述稱成家袁術稱仲家董卓郿塢公孫瓉易京皆自然的對也月不勝火莊子外物篇利害相摩生火甚多衆人焚和月固不勝火於是乎有焚和而道盡注云大而暗則多纍小而明則知分東坡所引乃曰郭象以為大而暗不若小而明陋哉斯言也為更之曰月固不勝燭言明於大者必晦於小月能燭天地而不能燭毫釐此其所以不勝火也然卒之火勝月耶月勝火耶豫記朱元成萍洲可談所載王荆公在修撰經義局因見舉燭言佛書有日月燈光明佛燈光豈足以配日月乎吕惠卿曰日煜乎晝月煜乎夜燈煜乎日月所不及其用無差别也公大以為然蓋發言中理出人意表云豫妄意莊子之旨謂人心如月湛然虛靜而為利害所薄生火熾然以焚其和則月不能勝之矣非論其明暗也靈臺有持莊子庚桑楚篇云靈臺者有持而不知其所持而不可持者也郭象云有持者謂不動於物耳其實非持若知其所持而持之持則失也陳碧虛云真宰存焉隨其成心而師之豫謂是皆置論於言意之表玄之又玄復采莊子之語以為説而於本旨殆不然也嘗記洪慶善云此一章謂持心有道苟為不知其所以持之則不復可持矣蓋前二人解釋者為兩而字所惑故從而為之辭董仲舒災異對漢武帝建元六年遼東髙廟長陵髙園殿災董仲舒居家推説其意山稿未上主父偃竊其書奏之上召視諸儒仲舒弟子吕步舒不知其師書以為大愚於是下仲舒吏當死詔赦之仲舒遂不敢復言災異此本傳所書而五行志載其對曰漢當亡秦大敝之後承其下流又多兄弟親戚骨肉之連驕揚奢侈恣睢者衆故天災若語陛下非以太平至公不能治也視親戚貴屬在諸侯逺正最甚者忍而誅之如吾燔遼東髙廟乃可視近臣在國中處旁仄及貴而不正者忍而誅之如吾燔髙園殿乃可云爾在外而不正者雖貴如髙廟猶災燔之況諸侯乎在內不正者雖貴如髙園殿猶燔災之況大臣乎此天意也其後淮南衡山王謀反上思仲舒前言使吕步舒持斧鉞治淮南獄以春秋誼顓斷於外不請既還奏事上皆是之凡與王謀反列侯二千石豪桀皆以罪輕重受誅二獄死者數萬人嗚呼以武帝之嗜殺時臨御方數歲可與為善廟殿之災豈無它説而仲舒首勸其殺骨肉大臣與平生學術大為乖刺馴致數萬人之禍皆此書啓之也然則下吏幾死蓋天所以激步舒云使其就戮非不幸也李正已獻錢唐德宗初即位淄青節度使李正已畏上威名表獻錢三十萬緡上欲受之恐見欺却之則無辭宰相崔祐甫請遣使慰勞淄青將士因以正已所獻錢賜之使將士人人戴上恩諸道知朝廷不重貨財上恱從之正已大慙服天下以為太平之治庶幾可望紹興三十年鎮江都統制劉寶乞詣闕奏事朝廷以其方命刻下罷就散職寶規取恩寵掃一府所有載以自隨巨舟連檣白金至五艦它所齎挾皆稱是其始謀蓋云此行不以何事必可力買既至趑趄國門不許入覲或以謂欲上諸內府豫時為樞密檢詳為丞相言援祐甫所陳乞以寶所齎等第賜其本軍明降詔書遣一朝士以寶平生過惡告諭卒伍使知明天子惠綏惻怛之意或寶靳固奄有仞為巳物則冝因人之言發命詰問在行之物本安所出今安所用悉取而籍之就其舟楫北還充賜尤可以破其溪壑無厭之謀湯𡵨公當國不能用也宣室漢宣室有殿有閣皆在未央宫殿北三輔黃圖以為前殿正室武帝為竇太主置酒引內董偃東方朔曰宣室者先帝之正處也非法度之政不得入焉文帝受釐于此宣帝常齋居以決事如淳曰布政教之室也然則起於髙祖時蕭何所創為退朝聽政之所而史記龜䇿傳云武王圍紂象郎自殺宣室徐廣曰天子之居名曰宣室淮南子云武王甲卒三千破紂牧野殺之宣室注曰商宫名一曰獄也蓋商時巳有此名漢偶與之同黃圖乃以為漢取舊名非也昔昔鹽薛道衡以空梁落燕泥之句為隋焬帝所嫉考其詩名昔昔鹽凡十韻垂柳覆金堤蘼蕪葉復齊水溢芙蓉沼花飛桃李蹊采桑秦氏女織錦竇家妻關山别蕩子風月守空閨常斂千金笑長垂雙玉啼盤龍隨鏡隱彩鳯逐帷低飛魂同夜鵲倦寢憶晨雞暗牖懸蛛網空梁落燕泥前年過代北今歲往遼西一去無消息那能惜馬蹄唐趙嘏廣之為二十章其燕泥一章云春至今朝燕花時伴獨啼飛斜珠箔隔語近畫梁低帷卷間窺户牀空暗落泥誰能長對此雙去復雙栖樂苑以為羽調曲玄怪録載籧篨三娘工唱阿鵲鹽又有突厥鹽黃帝鹽白鴿鹽神雀鹽踈勒鹽滿座鹽歸國鹽唐詩媚賴吳娘唱是鹽更奏新聲刮骨鹽然則歌詩謂之鹽者如吟行曲引之類云今南嶽廟獻神樂曲有黃帝鹽而俗傳以為皇帝炎長沙志從而書之蓋不考也韋縠編唐才調詩以趙詩為劉長卿而題為别宕子怨誤矣將帥當專周易師卦六三師或輿尸凶九五長子帥師弟子輿尸正凶爻意謂用兵當付一帥苟其儔雜然臨之則凶矣輿尸者衆主也安慶緒既敗遁歸相州肅宗命郭汾陽李臨淮九節度致討以二人皆元勳難相統屬故不置元帥但以宦者魚朝恩為觀軍容宣慰處置使步騎六十萬為史思明所挫一戰而潰憲宗討淮西命宣武等十六道進軍雖以韓弘為都統而身未嘗至既無統帥至四年不克及裴度一出才數月即成功穆宗討王庭湊朱克融時裴度鎮河東亦為都招討使羣帥如李光顔烏重嗣皆當時名將而翰林學士元稹意圖宰相忌度先進與知樞密魏簡相結度每奏畫軍事輒從中沮壞之故屯守踰年竟無成績正元之誅吳少誠元和之征盧從史皆此類也石晉開運中為契丹所攻中國兵力寡弱桑維翰為宰相一制指揮節度使十五人雖杜重威李守正張彥澤輩駑材反虜然重威為主將陽城之戰三人者尚能以身徇國大敗強胡耶律德光乘橐它奔竄僅而獲免由是觀之大將之權其可不專邪容齋續筆卷第七
