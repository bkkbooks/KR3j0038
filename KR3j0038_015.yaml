front:
  text: 容齋隨筆卷第十五十九則
  hash: sha256:dd1e54086eb09a33dc8b3977f86d7429e5bcb9d9219d996005d2842f39fa5321
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_015-1a}
body:
  text: 張文潛哦蘇杜詩溪回松風長蒼鼠竄古瓦不知何王殿遺締絶壁下隂房鬼火青壞道哀湍瀉萬籟真笙竽秋色正蕭灑美人為黃土況乃粉黛假當時侍金輿故物獨石馬憂來藉草坐浩歌淚盈把冉冉征途間誰是長年者此老杜玉華宮詩也張文潛暮年在宛丘何大圭方弱冠往謁之凡三日見其吟哦此詩不絶口大圭請其故曰此章乃風雅鼓吹未易為子言大圭曰先生所賦何必減此曰平生極力模寫僅有一篇稍似之然未可同日語遂誦其離黃州詩偶同此韻曰扁舟發孤城揮手謝送者山回地勢卷天豁江面瀉中流望赤壁石腳插水下昏昏煙霧嶺歷歷漁樵舍居夷實三載鄰里通假借別之豈無情老淚為一灑篙工起鳴鼓輕櫓健於馬聊為過江宿寂寂樊山夜此其音響節奏固似之矣讀之可默諭也又好誦東坡梨花絶句所謂梨花淡白柳深靑柳絮飛時花滿城惆悵東欄一株雪人生看得幾清明者每吟一過必擊節賞歎不能巳文潛蓋有省於此云任安田仁任安田仁皆漢武帝時能臣也而漢史載其事甚略褚先生曰兩人俱為衛將軍舍人家監使養惡齧馬仁曰不知人哉家監也安曰將軍尚不知人何乃家監也後有詔募擇衛將軍舍人以為郎會賢大夫趙禹來悉召舍人百餘人以次問之得田仁任安曰獨此兩人可耳餘無可用者將軍上籍以聞詔召此二人帝遂用之仁刺舉三河時河南河內太守皆杜周子弟河東太守石丞相子孫仁巳刺三河皆下吏誅死觀此事可見武帝求才不遺微賤得人之盛誠非後丗所及然班史言霍去病既貴衛青故人門下多去事之唯任安不肯去又言衛將軍進言仁為郎中與褚生所書為不同杜周傳云兩子夾河為郡守治皆酷暴亦不書其所終皆闕文也杜延年杜欽前漢書稱杜延年本大將軍霍光吏光持刑罰嚴延年輔之以寬論議持平合和朝廷杜欽在王鳯莫府救解馮野王王尊之罪過當丗善政多出於欽豫謂光以侯史吳之事一朝殺九卿三人延年不能諌王章言王鳯之過天子感寤欲退鳯欽令鳯上疏謝罪上不忍廢鳯鳯欲遂退欽説之而止章死衆庶寃之欽復説鳯以為天下不知章實有罪而以為坐言事宜因章事舉直言極諌使天下咸知主上聖明不以言罪下若此則流言消釋矣鳯白行其策夫新莽盜國權輿於鳯鳯且退而復止皆欽之謀若欽者蓋漢之賊也而謂當丗善政出其手豈不繆哉范曅作史范曅在獄中與諸甥姪書曰吾既造後漢詳觀古今著述及評論殆少可意者班氏最有髙名既任情無例不可甲乙唯志可推耳博贍可不及之整理未必愧也吾雜傳論皆有精意深旨至於循吏以下及六夷諸序論筆勢縱放實天下之竒作其中合者往往不減過秦篇嘗共比方班氏所作非但不愧之而巳􅐌自是吾文之傑思殆無一字空設竒變不窮同合異體乃自不知所以稱之此書行故應有賞音者自古體大而思精未有此也曅之髙自夸詡如此至以謂過班固固豈可過哉曅所著序論了無可取列傳如鄧禹竇融馬援班超郭泰諸篇者蓋亦有數也人苦不自知可發千載一笑唐詩人有名不顯者溫公詩話云唐之中葉文章特盛其姓名湮沒不傳於丗者甚衆如河中府鸛雀樓有王之奐暢諸二詩二人皆當時所不數而後人擅詩名者豈能及之哉豫觀少陵集中所載韋迢郭受詩少陵酬答至有新詩錦不如自得隨珠覺夜明之語則二人詩名可知矣然非編之杜集幾於無傳焉又有嚴惲惜花一絶云春光冉冉歸何處更向花前把一杯盡日問花花不語為誰零落為誰開前人多不知誰作乃見於皮陸唱和集中大率唐人多工詩雖小説戲劇鬼物假託莫不宛轉有思致不必顓門名家而後可稱也蘇子由詩蘇子由南窗詩云京城三日雪雪盡泥方深閉門謝還往不聞車馬音西齋書帙亂南窗朝日升展轉守牀榻欲起復不能開户失瓊玉滿階松竹隂故人逺方來疑我何苦心踈拙自當爾有酒聊共斟此其少年時所作也東坡好書之以為人間當有數百夲蓋間淡簡逺得味外之味云呼君為爾汝東坡云凡人相與號呼者貴之則曰公賢之則曰君自其下則爾汝之雖王公之貴天下貌畏而心不服則進而君公退而爾汝者多矣豫謂此論特後丗之俗如是爾古之人心口一致事從其真雖君臣父子之間出口而言不復顧忌觀詩書所載可知矣箕子陳洪範對武王而汝之金縢䇿祝周公所以告大王王季文王三丗祖考也而呼之曰爾三王自稱曰豫至云爾之許我我其以璧與圭歸俟爾命爾不許我我乃屏璧與圭殆近乎相質責而邀索也天保報上之詩曰天保定爾俾爾戩榖閟宫頌君之詩曰俾爾冨而昌俾爾昌而熾及節南山正月板蕩卷阿既醉瞻卬諸詩皆呼王為爾大明曰上帝臨女指武王也民勞曰王欲玉女指厲王也至或稱為小子雖幽厲之君亦受之而不怒嗚呼三代之風俗可復見乎晉武公請命乎天子其大夫賦無衣所謂不如子之衣亦指周王也丗事不可料秦始皇并六國一天下東遊會稽度浙江􅏌然謂子孫帝王萬丗之固不知項籍巳縱觀其旁劉季起喟然之歎於咸陽矣曹操芟夷羣雄遂定海內身為漢相日夜窺伺龜鼎不知司馬懿巳入莫府矣梁武帝殺東昏侯覆齊祚而侯景以是年生於漠北唐太宗殺建成元吉遂登天位而武后巳生於并州宣宗之丗無故而復河隴戎狄既衰藩鎮順命而朱溫生矣是豈智力謀慮所可為哉蔡君謨帖語韓獻肅公守成都時蔡君謨與之書曰襄啓歲行甫新魯鈍之資日益衰老雖勉就職務其於精力不堪勞苦念君之生相距旬日如聞年來輔治有方當愈強健果如何哉襄於京居尚留少時佇君還軫伸眉一笑傾懷之極今因樊都官西行奉書問動靖不一一襄上子華端明閣下此帖語簡而情厚初無寒溫之問寢食之祝講德之侫也今風俗日以偷薄士大夫之狷浮者於尺牘之間益出新巧習貫自然雖有先達篤實之賢亦不敢自拔以速嘲罵每詒書多至十數紙必繫銜相與之際悉忘其真言語不情誠意掃地相呼不以字而云某文僣紊官稱無復差等觀此其少愧乎憶二紀之前豫在館中見曽監吉甫與人書獨不作劄子且以字呼同舍同舍因相約云曽公前輩可尊是冝曰丈餘人自今各以字行其過誤者罰一直行之幾月從官郎省欣然皆欲一變而有欲敗此議者載酒飲同舍乞仍舊於是從約皆解遂不可復革可為一歎孔氏野史丗傳孔毅甫野史一卷凡四十事豫得其書於清江劉靖之所載趙清獻為青城宰挈散樂妓以歸為邑尉追還大慟且怒又因與妻忿爭由此惑志文潞公守太原辟司馬溫公為通判夫人生日溫公獻小詞為都漕唐子方峻責歐陽永叔謝希深田元均尹師魯在河南携官妓遊龍門半月不返留守錢思公作簡招之亦不答范文正與京東人石曼卿劉潛之類相結以取名服中上萬言書甚非言不文之義蘇子瞻𬒳命作儲祥宫記大貂陳衍幹當宫事得旨置酒與蘇髙會蘇隂使人發御史董敦逸即有章疏遂墮計中又云子瞻四六表章不成文字其它如潞公范忠宣吕汲公吳沖卿傅獻簡諸公皆不免譏議豫謂決非毅甫所作蓋魏泰碧雲騢之流耳溫公自用龐潁公辟不與潞公子方同時其謬妄不待攻也靖之乃原甫曽孫佳士也而跋是書云孔氏兄弟曽大父行也思其人欲聞其言久矣故録而藏之汪聖錫亦書其後但記上官彥衡一事豈弗深考云有若史記有若傳云孔子沒弟子以若狀似孔子立以為師他日進問曰昔夫子當行使弟子持雨具巳而果雨弟子問何以知之夫子曰詩不云乎月離于畢俾滂沱矣昨暮月不宿畢乎他日月宿畢竟不雨商瞿年長無子孔子曰瞿年四十後當有五丈夫子巳而果然敢問何以知此有若無以應弟子起曰有子避之此非子之座也豫謂此兩事殆近於星曆卜祝之學何足以為聖人而謂孔子言之乎有若不能知何所加損而弟子遽以是斥退之乎孟子稱子夏子張子遊以若似聖人欲以所事孔子事之曽子不可但言江漢秋陽不可尚而巳未嘗深詆也論語記諸善言以有子之言為第二章在曽子之前使有避坐之事弟子肯如是哉檀弓載有子聞曽子喪欲速貧死欲速朽兩語以為非君子之言又以為夫子有為言之子遊曰甚哉有子之言似夫子也則其為門弟子所敬久矣太史公之書於是為失矣且門人所傳者道也豈應以狀貌之似而師之邪丗所圖七十二賢畫象其畫有若遂與孔子略等此又可笑也張天覺為人張天覺為人賢否士大夫或不詳知方大觀政和間時名甚著多以忠直許之蓋其作相適承蔡京之後京弄國為姦天下共疾小變其政便足以致譽飢者易為食故蒙賢者之名靖康初政遂與司馬公范文正同𬒳褒典豫以其實考之彼直姦人之雄爾其外孫何麒作家傳云為熙寧御史則逐於熙寧為元祐廷臣則逐於元祐為紹聖諌官則逐於紹聖為崇寧大臣則逐於崇寧為大觀宰相則逐於政和其迹是矣而實不然為御史時以斷獄失當為密院所治遂托博州事以報之三樞密皆乞去故坐貶為諌官時首攻內侍陳衍以搖宣仁至比之於吕武乞追奪司馬公吕申公贈諡仆碑毀樓論文潞公背負國恩吕汲公動搖先烈辨吕惠卿蔡確無罪後以交通潁昌冨民蓋漸故又貶元符末除中書舍人謝表歷詆元祐諸賢云當元祐之八九年擢黨人之二十輩及在相位乃以與郭天信交結而去耳平生言行如此而得美譽則以蔡京不相能之故然皆章子厚門下客其始非不同也京拜相之詞天覺所作是以得執政云為文論事為文論事當反復致志救首救尾則事詞章著覽者可以立決陳湯斬郅支而功未録劉向上疏論之首言周方叔吉甫誅獫狁次言齊桓公有滅項之罪君子以功覆過李廣利靡億萬之費捐五萬之師廑獲宛王之首孝武不録其過封為列侯末言常惠隨欲擊之烏孫鄭吉迎自來之日逐皆裂土受爵然後極言今康居國強於大宛郅支之號重於宛王殺使者罪甚於留馬而不煩漢士不費斗糧比於二師功德百之又曰言威武勤勞則大於方叔吉甫列功覆過則優於齊桓二師近事之功則髙於安逺長羅而大功未著小惡數布臣竊痛之於是天子乃下詔議封蓋其一疏抑揚援證明白如此故以丞相厈衡中書石顯出力沮害竟不能奪不然衡顯之議豈區區一故九卿所能亢哉連昌宮詞元微之白樂天在唐元和長慶間齊名其賦詠天寶時事連昌宫詞長恨歌皆膾炙人口使讀之者情性蕩搖如身生其時親見其事殆未易以優劣論也然長恨歌不過述明皇追愴貴妃始末無它激揚不若連昌詞有監戒規諷之意如云姚崇宋景作相公勸諌上皇言語切長官清平太守好㨂選皆言由相公開元之末姚宋死朝廷漸漸由妃子祿山宮裏養作兒􅉑國門前閙如市弄權宰相不記名依俙憶得楊與李廟謨顚倒四海搖五十年來作瘡痏其末章及官軍討淮西乞廟謀休用兵之語蓋元和十一二年間所作殊得風人之旨非長恨比云二士共談維摩詰經言文殊從佛所將詣維摩丈室問疾菩薩隨之者以萬億計曰二士共談必説妙法豫觀杜少陵寄李太白詩云何時一尊酒重與細論文使二公真踐此言時得灑掃撰杖屨於其側所謂不二法門不傳之妙啓聰擊蒙出膚寸之澤以潤千里者可勝道哉張子韶祭文先公自領外徙冝春沒於保昌道出南安時猶未聞檜相之死張子韶先生來致祭其文但云維某年月日具官某謹以清酌之奠昭告于某官之靈嗚呼哀哉伏惟尚饗其情旨哀愴乃過於詞前人未有此格也京師老吏京師盛時諸司老吏類多識事體習典故翰苑有孔目吏每學士制草出必據案細讀疑誤輒告劉嗣明嘗作皇子剃胎髮文用克長克君之語吏持以請嗣明曰此言堪為長堪為君真善頌也吏拱手曰內中讀文書不如是最以語忌為嫌既剋長又剋君殆不可用也嗣明悚然亟易之靖康歲都城受圍禦敵器甲刓弊或言太常寺有舊祭服數十間無所用可以藉甲少卿劉珏即具稿欲獻于朝以付書史史作字楷而敏平常無錯誤珏將上馬立俟之既至而結銜脫兩字趣使更寫至于三其誤如初珏怒責之逡巡謝曰非敢誤也某小人竊妄有管見在禮祭服敝則焚之今國家迫急誠不冝以常日論然容臺之職唯當秉禮少卿固體國不若俟朝廷來索則納之賢於先自背禮而有獻也珏愧歎而止後每為人言嘉賞其意今之胥徒雖公府右職省寺掌故但能鼓扇狷浮顧賕謝為業簿書期會之間乃漫不之曉求如彼二人豈可得哉曹操唐莊宗曹操在兖州引兵東擊陶謙於徐而陳宫潛迎吕布為兖牧郡縣皆叛賴程昱荀彧之力全東阿鄄范三城以待操操還執昱手曰微子之力吾無所歸矣表為東平相唐莊宗與梁人相持於河上梁將王檀乘虛襲晉陽城中無備幾陷者數四賴安金全帥子弟擊却之於內石君立引昭義兵破之於外晉陽獲全而莊宗以策非己出金全等賞皆不行操終有天下莊宗雖能滅梁旋踵覆亡考其行事槩可睹矣雲中守魏尚史記漢書所記馮唐救魏尚事其始云魏尚為雲中守與胸奴戰上功莫府一言不相應文吏以法繩之其賞不行臣以為陛下賞太輕罰太重而又申言之云且雲中守魏尚坐上功首虜差六級陛下下之吏削其爵罰作之重言雲中守及姓名而文勢益遒健有力今人無此筆也容齋隨筆卷第十五
