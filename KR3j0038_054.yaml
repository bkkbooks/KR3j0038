body:
  text: 自隨筆權輿而續之次三至五合七十四卷容齋先生文敏洪公之所紀述也筆爲卷各十六咸冠以叙五獨十卷而無題辭蓋未及成而絶筆也先生父子伯仲以文籙相襌屹爲一代詩書禮樂宗主論中興人物巨擘當首屈也蒙知四朝眡儀兩地大而裁成國史作宋一經次而代言坡掖雷風鼔動其它高文大冊昈分兩稾而是書所載又翰墨之餘力也其爲書也隂陽象緯是鈎是索經籍傳註是紏是砭古事於我乎發敭古人於我乎品藻正譌攷異核僞剖微若典故沿革若姓族譜諜文有町畦詩有胎骨源而委葉而根下逮僊梵毉數亦時罔羅爲之量齊千彚萬狀而道以貫之卒歸乎一也圭璋璧琮旅敶位置而犀象珠貝鐘磬彛鬲又錯其中麗其側也今江右祥刑使者寺簿公視先生爲從祖贑㫺作屏依然遺愛聞孫紹最因任乗軺亦旣出潢池赤子勞徠而枕席之臺府文書益省廼裒五筆而刻諸梓校寳婺舊刋兹爲全書將使章貢父老指爲棠隂之茇也以橚閭閻晚生首况摹本俾克紬繹念㫺侍先生丈席嘗竊窺緒餘或與客語悠然反隅或閱近書躍然觸機輙引筆行墨頃刻數則殆如鑿地而井隨鑿湧泉橋衡百罌衮衮不竭巨盎萬繭信手得緒繅之杼之可丈而可匹也漢王充有書釋物類同異正時俗嫌疑名曰論衡而唐李肈紀事實探物理辨疑惑示勸戒采風俗助譚笑號其書國史補論議有識以權衡史籍有功於裨補沿名取義於先生宜兩得也論衡八十五篇二十餘萬言而史𥙷堇堇三卷彼善於此猶足稱雄然史載充著書時閉門濳思絶慶弔之禮戸牖墻壁各置刀筆或者爲先生哂之彼一何勞而我佚也蔡邕入吳始得其書歸藏帳中或捜得抱數卷去邕囑勿廣曰惟我與爾共之噫嘻邕獲它人書閟恡如寳寺簿公乃出其家書與衆共之自是人可讀戸可傳又將無翼而蜚且至雞林矣此其量之廣狹見之公私又何翅山淵夐而霄壤隔也嘉定壬申子月初吉里學生從事郎充江南西路提舉茶鹽司幹辦公事丘橚謹書叔祖文敏公居閑日乆著述爲多隨筆五書凡七十四卷考覈經史捃摭典故參訂品藻精審該洽學士大夫爭欲傳襲伋頃守章貢後公四十年以其書鋟于郡齋朅來守建又後公四十三年於是復鋟此書于建方欲彚公之文刻寘祠下適以移官未暇也當嗣圖之以成山莊先生之志云嘉定十六年秋八月旣望姪孫朝議大夫直華文閣知建寧軍府事新除直敷文閣知隆興府江西安撫伋謹識容齋隨筆初刋于婺女自續至五繼刋于章貢然歳乆字漫不復可辨紹定改元偶得建溪刋本詳加校命工鋟梓始於是年之仲春訖於次年之季秋刋成全書庶幾流傳益廣云重九日臨川周謹書
