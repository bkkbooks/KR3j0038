front:
  text: 會通館印正容齋隨筆序
  hash: sha256:7aae4c59cd8615ef40e39f8d17cd97d1c7e617c462989ad7e32beaa2acc0ba37
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_035-1a}
body:
  text: 博學而詳説之將以反説約也然博而不約者有矣未有不博而能至於約也容齋隨筆書之博者也提綱挈領博而能約者也書成於宋學士洪景盧學者歆羡而未得其真者久矣太醫院醫士吳郡盛用美得之於京師士夫欲版其行邑宰邢君陽民用而未行適僉憲雷公水利江南巡行吾錫遂致禮會通館以逹君志嗚呼燧生當文明之運而活字銅版樂天之成苟以是心至應之惟謹况士夫以稽古為事君以愛民為心而公禮意兼至者乎雖然學者徒務其博而不能反説以至於約則是書為糟粕豈公之所望於人者哉弘治八年中秋錫山華燧序容齋三筆序王右將軍逸少晉宋間第一流人也遺情軒冕擺落世故蓋其生平雅懷自去會稽內史遂不肯復出自誓於父母墓下詞致確苦豫味其言而深悲之又讀所與謝萬石書云坐而獲逸遂其宿心比嘗與安石東遊山海頥養間暇之餘欲與親故時共歡宴銜杯引滿語田里所行故以為撫掌之資其為得意可勝言邪常依依陸賈班嗣之處世老夫忘願盡於此也案是時逸少春秋財五十餘耳史氏不能賞取其高乃屑屑以為坐王懷祖之故待之淺矣豫亦從會稽解組還里于今六年仰瞻昔賢猶駑蹇之視天驥本非倫擬而年齡之運踰七望八法當挂神虎之衣冠無假於誓墓也幸方寸未渠昏於寬間寂寞之濵窮勝樂時之暇時時捉筆據几隨所趣而志之雖無甚竒論然意到即就亦殊自喜於是容齋三筆成纍月矣稚子云不可無序引
  hash: sha256:eac41b41f28c214b3d49660608af81da14c0cf50e6c4adf6409883e9f62ce997
