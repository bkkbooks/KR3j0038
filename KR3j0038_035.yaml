front:
  text: 㑹通館印正容齊隨筆序
  hash: sha256:5509ce9684b1a750882bde2f9343e37eb2da7a0b865776fc1e416382b6d688de
  markers:
  - {type: page-break, offset: 0, content: '', id: KR3j0038_SBCK_035-1a}
body:
  text: 博學而詳說之將以反說約也然博而不約者有矣未有不博而能至於約也容齊隨筆書之博者也提綱挈領博而能約者也書成於宋學士洪景盧學者歆羡而未得其真者久矣太醫院醫士吳郡盛用美得之於京師士夫欲版其行邑宰邢君陽民用而未行適僉憲雷公水利江南巡行吾錫遂致禮㑹通館以逹君志嗚呼燧生當文明之運而活字銅版樂天之成苟以是心至應之惟謹况士夫以稽古為事君以愛民為心而公禮意兼至者乎雖然學者徒務其博而不能反說以至於約則是書為糟粕豈公之所望於人者哉弘治八年中秋錫山華燧序容齊三筆序王右將軍逸少晉宋閒第一流人也遺情軒冕擺落世故蓋其生平雅懷自去㑹稽內史遂不肯復出自誓於父母墓下詞致確苦豫味其言而深悲之又讀所與謝萬石書云坐而獲逸遂其宿心比嘗與安石東游山海頥養間暇之餘欲與親故時共歡宴銜杯引滿語田里所行故以為撫掌之資其為得意可勝言邪常依依陸賈班嗣之處世老夫忘願盡於此也案是時逸少春秋財五十餘耳史氏不能賞取其高乃屑屑以為坐王懷祖之故待之淺矣豫亦從㑹稽解組還里于今六年仰瞻昔賢猶駑蹇之視天驥本非倫擬而年齡之運踰七望八法當挂神虎之衣冠無假於誓墓也幸方寸未渠昏於寬間寂寞之濵窮勝樂時之暇時時捉筆据几隨所趣而志之雖無甚竒論然意到即就亦殊自喜於是容齊三筆成纍月矣稚子云不可無序引
  hash: sha256:b73f72a2913b24d66a1071397f0ba006ab2d16447dd1731c452843fd72feb52e
